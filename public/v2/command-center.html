<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-tokens.css">
<link rel="stylesheet" href="/assets/ryujin-base.css">
<link rel="stylesheet" href="/assets/agent-dock.css">
<style>
  body {
    padding: 0 0 var(--rj-space-24);
    background:
      radial-gradient(circle at top right, rgba(168, 90, 44, 0.04), transparent 60%),
      url('/assets/motifs/birchbark-tile.webp') center / 600px repeat,
      var(--rj-bg-page);
    background-blend-mode: multiply, normal, normal;
  }

  .mode-toggle { display: inline-flex; background: var(--rj-bg-surface); border-radius: var(--rj-radius-pill); padding: 3px; border: 1px solid var(--rj-border-subtle); }
  .mode-toggle button { border: 0; background: transparent; padding: var(--rj-space-1) var(--rj-space-4); border-radius: var(--rj-radius-pill); font-family: var(--rj-font-sans); font-size: var(--rj-text-xs); font-weight: var(--rj-weight-semibold); letter-spacing: var(--rj-tracking-wide); text-transform: uppercase; color: var(--rj-text-secondary); cursor: pointer; transition: all var(--rj-duration-fast) var(--rj-ease-out); }
  .mode-toggle button.active { background: var(--rj-copper-600); color: var(--rj-text-inverse); box-shadow: var(--rj-shadow-sm); }
  .mode-toggle button:not(.active):hover { color: var(--rj-text-primary); }

  .hero {
    width: 100%;
    aspect-ratio: 21 / 9;
    max-height: 280px;
    background: url('/assets/motifs/hero-banner.webp') center / cover no-repeat;
    border-bottom: 1px solid var(--rj-border-subtle);
    position: relative;
  }
  .hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, var(--rj-bg-page)); pointer-events: none; }
  .hero-title { position: absolute; left: var(--rj-space-12); bottom: var(--rj-space-6); z-index: 1; max-width: 720px; }
  .hero-title .badge { display: inline-block; padding: 4px 12px; background: rgba(250, 246, 238, 0.88); border-radius: var(--rj-radius-pill); font-size: var(--rj-text-xs); font-weight: var(--rj-weight-semibold); text-transform: uppercase; letter-spacing: var(--rj-tracking-caps); color: var(--rj-copper-700); margin-bottom: var(--rj-space-2); backdrop-filter: blur(4px); }
  .hero-title h1 { font-size: var(--rj-text-3xl); font-weight: var(--rj-weight-bold); line-height: 1.05; margin: 0; color: var(--rj-charcoal-900); text-shadow: 0 1px 0 rgba(250, 246, 238, 0.5); }
  .hero-title p.tagline { margin: var(--rj-space-2) 0 0; font-size: var(--rj-text-base); color: var(--rj-charcoal-700); }

  .stage { max-width: 1280px; margin: var(--rj-space-8) auto 0; padding: 0 var(--rj-space-6); }
  .pillar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--rj-space-4); margin-bottom: var(--rj-space-10); }
  @media (max-width: 960px) { .pillar-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .pillar-grid { grid-template-columns: 1fr; } }

  .pillar-card { display: flex; flex-direction: column; gap: var(--rj-space-2); cursor: pointer; text-decoration: none; color: inherit; }
  .pillar-card .head { display: flex; align-items: center; justify-content: space-between; }
  .pillar-card .head h3 { margin: 0; font-size: var(--rj-text-base); font-weight: var(--rj-weight-semibold); }
  .pillar-card .stats { display: flex; gap: var(--rj-space-3); margin-top: var(--rj-space-2); }
  .pillar-card .stats div { flex: 1; }
  .pillar-card .stats .label { font-size: 10px; text-transform: uppercase; letter-spacing: var(--rj-tracking-caps); color: var(--rj-text-muted); }
  .pillar-card .stats .value { font-size: var(--rj-text-lg); font-weight: var(--rj-weight-bold); color: var(--rj-text-primary); }

  .view { display: none; animation: rj-view-enter var(--rj-duration-slow) var(--rj-ease-out); }
  body[data-view-mode="graph"]  .view-graph  { display: block; }
  body[data-view-mode="canvas"] .view-canvas { display: block; }
  body[data-view-mode="river"]  .view-river  { display: block; }
  @keyframes rj-view-enter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .canvas-stage { position: relative; height: 540px; background: radial-gradient(circle at center, rgba(168, 90, 44, 0.04), transparent 70%), var(--rj-bg-elevated); border: 1px solid var(--rj-border-subtle); border-radius: var(--rj-radius-lg); overflow: hidden; }
  .canvas-stage svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .cluster { position: absolute; min-width: 180px; padding: var(--rj-space-3); background: var(--rj-bg-page); border: 1px solid var(--rj-border-default); border-radius: var(--rj-radius-md); box-shadow: var(--rj-shadow-sm); }
  .cluster h3 { margin: 0 0 var(--rj-space-2); font-size: var(--rj-text-xs); text-transform: uppercase; letter-spacing: var(--rj-tracking-caps); color: var(--rj-copper-700); font-weight: var(--rj-weight-bold); }
  .cluster ul { margin: 0; padding: 0; list-style: none; font-size: var(--rj-text-sm); }
  .cluster ul li { padding: 2px 0; color: var(--rj-text-body); }

  .river-feed { display: grid; grid-template-columns: 80px 1fr; gap: var(--rj-space-3); }
  .river-time { font-family: var(--rj-font-mono); font-size: var(--rj-text-sm); color: var(--rj-text-muted); padding-top: var(--rj-space-2); }
  .river-card { background: var(--rj-bg-elevated); border: 1px solid var(--rj-border-subtle); border-radius: var(--rj-radius-md); padding: var(--rj-space-3) var(--rj-space-4); margin-bottom: var(--rj-space-3); display: flex; align-items: center; justify-content: space-between; gap: var(--rj-space-3); }
  .river-card .body { flex: 1; }
  .river-card .body b { display: block; color: var(--rj-text-primary); font-weight: var(--rj-weight-semibold); }
  .river-card .body span.sub { color: var(--rj-text-muted); font-size: var(--rj-text-sm); }
</style>
<script src="/assets/auth-guard.js"></script>
</head>
<body>

<header class="rj-topbar">
  <div class="rj-topbar-brand">
    <svg class="rj-topbar-emblem" viewBox="0 0 24 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
      <path d="M2 7 Q 6 1 10 7 Q 14 13 18 7 Q 22 1 22 1 M 2 7 L 22 7"/>
      <circle cx="12" cy="7" r="1.5" fill="currentColor"/>
    </svg>
    <span data-tenant-name>Ryujin OS</span>
  </div>
  <nav class="rj-topbar-nav">
    <a href="/v2/command-center.html" class="active">Cockpit</a>
    <a href="/v2/pillar.html?pillar=sales">Sales</a>
    <a href="/v2/pillar.html?pillar=production">Production</a>
    <a href="/v2/pillar.html?pillar=service">Service</a>
    <a href="/v2/pillar.html?pillar=finance">Finance</a>
    <a href="/v2/pillar.html?pillar=admin">Admin</a>
  </nav>
  <div class="mode-toggle">
    <button class="rj-mode-toggle-btn" data-mode="graph">Graph</button>
    <button class="rj-mode-toggle-btn" data-mode="canvas">Canvas</button>
    <button class="rj-mode-toggle-btn" data-mode="river">River</button>
  </div>
  <a href="/command-center.html" title="Back to the classic cockpit (turns the beta toggle off)" style="margin-left:var(--rj-space-3);font-size:var(--rj-text-xs);color:var(--rj-text-muted);text-decoration:none;letter-spacing:var(--rj-tracking-wide);text-transform:uppercase" onclick="try{localStorage.removeItem('ryujin_cockpit_version');}catch(e){}">← Classic</a>
</header>

<div class="hero">
  <div class="hero-title">
    <span class="badge" id="hero-badge">Cockpit · Today</span>
    <h1 id="hero-title" data-tenant-name>Sample Tenant</h1>
    <p class="tagline" id="hero-tagline" data-tenant-tagline>Today across the business.</p>
  </div>
</div>

<div class="stage">

  <p class="rj-eyebrow">Pillars · at a glance</p>
  <div class="pillar-grid" id="pillar-grid"></div>

  <div class="rj-divider-bead"></div>

  <section class="view view-graph">
    <p class="rj-eyebrow">Today's focus</p>
    <div class="rj-panel rj-panel-featured rj-panel-flush" style="margin-top: var(--rj-space-3);">
      <div class="rj-panel-header rj-panel-header-ornate">
        <div>
          <p class="rj-eyebrow" style="margin: 0;">Most active customer</p>
          <h3 class="rj-h3" style="margin-top: 2px;" id="focus-name">...</h3>
        </div>
        <span class="rj-chip rj-pillar rj-pillar-customer">Customer</span>
      </div>
      <div class="rj-panel-body" id="focus-body">Loading...</div>
    </div>
  </section>

  <section class="view view-canvas">
    <p class="rj-eyebrow">Business map</p>
    <div class="canvas-stage" style="margin-top: var(--rj-space-3);">
      <svg viewBox="0 0 1200 540" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <linearGradient id="connector" x1="0" x2="1">
            <stop offset="0%" stop-color="#d9a37a" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#a85a2c" stop-opacity="0.8"/>
          </linearGradient>
        </defs>
        <path d="M 230 110 Q 400 60 560 200" stroke="url(#connector)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 230 110 Q 220 280 290 400" stroke="url(#connector)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 560 200 Q 760 240 920 140" stroke="url(#connector)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 560 200 Q 700 360 880 420" stroke="url(#connector)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 290 400 Q 580 420 880 420" stroke="url(#connector)" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      <div id="canvas-clusters"></div>
    </div>
  </section>

  <section class="view view-river">
    <p class="rj-eyebrow">Today's stream</p>
    <div class="river-feed" id="river-feed" style="margin-top: var(--rj-space-3);"></div>
  </section>

</div>

<script type="module">
  import { loadLiveData, fmtMoney, escapeHtml as esc } from '/v2/_live-data.js';
  import { readTenantSlug } from '/v2/_tenant.js';
  const RJ_DATA = await loadLiveData(readTenantSlug());

  // Hero · _tenant.js will override with the live company_name once
  // /api/settings resolves. If that fetch fails (offline/dev), keep the
  // synthetic placeholder so the cockpit doesn't read as "Sample Tenant".
  document.getElementById('hero-title').textContent = RJ_DATA.tenant.name;
  document.getElementById('hero-badge').textContent = 'Cockpit · ' + RJ_DATA.tenant.today;

  // Pillar grid
  const pg = document.getElementById('pillar-grid');
  RJ_DATA.pillars.forEach(p => {
    const stats = (RJ_DATA.stats[p.slug] || []).slice(0, 2);
    const card = document.createElement('a');
    card.href = `/v2/pillar.html?pillar=${encodeURIComponent(p.slug)}`;
    card.className = 'rj-panel rj-card-interactive pillar-card';
    card.innerHTML = `
      <div class="head">
        <h3>${esc(p.label)}</h3>
        <span class="rj-chip rj-pillar rj-pillar-${esc(p.slug)}">${esc(p.label.charAt(0))}</span>
      </div>
      <p class="rj-secondary" style="margin: 0; font-size: var(--rj-text-sm);">${esc(p.blurb)}</p>
      <div class="stats">
        ${stats.map(s => `<div><div class="label">${esc(s.label)}</div><div class="value">${esc(s.value)}</div></div>`).join('')}
      </div>
    `;
    pg.appendChild(card);
  });

  // Graph view: most active customer (or empty state)
  const focus = RJ_DATA.customers.slice().sort((a, b) => b.ltv - a.ltv)[0];
  if (!focus) {
    document.getElementById('focus-name').textContent = 'No customers yet';
    document.getElementById('focus-body').innerHTML = `
      <p class="rj-secondary">When you add customers, the most active one appears here with their jobs, proposals, and tickets inline.</p>
    `;
  } else {
    document.getElementById('focus-name').textContent = focus.name;
    document.getElementById('focus-body').innerHTML = `
      <p class="rj-secondary" style="margin: 0 0 var(--rj-space-4);">${esc(focus.address)} · ${esc(focus.phone)} · since ${esc(focus.since)}</p>
      <div class="rj-stat-ornate"><div class="rj-stat-label">Lifetime value</div><div class="rj-stat-value">${fmtMoney(focus.ltv)}</div></div>
      <hr class="rj-divider">
      <div class="rj-stack">
        ${RJ_DATA.jobs.filter(j => j.customerId === focus.id).map(j => `
          <div class="rj-card rj-card-interactive rj-card-ornate"><div class="rj-row rj-row-between"><div class="rj-row"><span class="rj-chip rj-pillar rj-pillar-production">Job</span><b>${esc(j.address)} · ${esc(j.stage)} · ${fmtMoney(j.value)}</b></div><span class="rj-muted">›</span></div></div>
        `).join('')}
        ${RJ_DATA.proposals.filter(p => p.customerId === focus.id).map(p => `
          <div class="rj-card rj-card-interactive rj-card-ornate"><div class="rj-row rj-row-between"><div class="rj-row"><span class="rj-chip rj-pillar rj-pillar-sales">Proposal</span><b>${esc(p.quoteId)} · ${esc(p.status)} · ${fmtMoney(p.value)}</b></div><span class="rj-muted">›</span></div></div>
        `).join('')}
      </div>
    `;
  }

  // Canvas
  const clusters = [
    { top: 60,  left: 80,  title: 'Sales · 12 leads',     items: RJ_DATA.customers.slice(0, 4).map(c => c.name) },
    { top: 150, left: 460, title: 'Customers',            items: RJ_DATA.customers.slice(0, 3).map(c => c.name) },
    { top: 80,  left: 820, title: 'Production · 4 jobs',  items: RJ_DATA.jobs.map(j => j.address) },
    { top: 380, left: 200, title: 'Crew',                 items: ['AJ', 'Diego', 'Ryan'] },
    { top: 400, left: 780, title: 'Materials',            items: ['Coastal · PO 233', 'GenTek · PO 244'] }
  ];
  document.getElementById('canvas-clusters').innerHTML = clusters.map(c => `
    <div class="cluster" style="top: ${c.top}px; left: ${c.left}px;">
      <h3>${esc(c.title)}</h3>
      <ul>${c.items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>
    </div>
  `).join('');

  // River
  document.getElementById('river-feed').innerHTML = RJ_DATA.events.map(ev => `
    <div class="river-time">${esc(ev.time)}</div>
    <div class="river-card">
      <div class="body">
        <b>${esc(ev.title)}${ev.value ? ' · ' + fmtMoney(ev.value) : ''}</b>
        <span class="sub">${esc(ev.sub)}</span>
      </div>
      <span class="rj-chip rj-pillar rj-pillar-${esc(ev.pillar)}">${esc(ev.pillar)}</span>
    </div>
  `).join('');

  // First-visit cockpit default: River. We set localStorage here so
  // view-mode.js (loaded next) reads it instead of falling back to graph.
  try {
    if (!localStorage.getItem('ry_view_mode')) {
      localStorage.setItem('ry_view_mode', 'river');
    }
  } catch { /* private mode, fine */ }
</script>

<script type="module" src="/v2/_tenant.js"></script>
<script type="module" src="/assets/view-mode.js"></script>
<script type="module" src="/assets/agent-dock.js"></script>

</body>
</html>
