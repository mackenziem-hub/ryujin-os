<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Pillar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-tokens.css">
<link rel="stylesheet" href="/assets/ryujin-base.css">
<link rel="stylesheet" href="/assets/agent-dock.css">
<style>
  body {
    padding: 0 0 var(--rj-space-24);
    background:
      radial-gradient(circle at top right, rgba(168, 90, 44, 0.04), transparent 60%),
      url('/assets/motifs/birchbark-tile.webp') center / 600px repeat,
      var(--rj-bg-page);
    background-blend-mode: multiply, normal, normal;
  }

  .mode-toggle { display: inline-flex; background: var(--rj-bg-surface); border-radius: var(--rj-radius-pill); padding: 3px; border: 1px solid var(--rj-border-subtle); }
  .mode-toggle button { border: 0; background: transparent; padding: var(--rj-space-1) var(--rj-space-4); border-radius: var(--rj-radius-pill); font-family: var(--rj-font-sans); font-size: var(--rj-text-xs); font-weight: var(--rj-weight-semibold); letter-spacing: var(--rj-tracking-wide); text-transform: uppercase; color: var(--rj-text-secondary); cursor: pointer; transition: all var(--rj-duration-fast) var(--rj-ease-out); }
  .mode-toggle button.active { background: var(--rj-copper-600); color: var(--rj-text-inverse); box-shadow: var(--rj-shadow-sm); }
  .mode-toggle button:not(.active):hover { color: var(--rj-text-primary); }

  .pillar-hero {
    max-width: 1200px;
    margin: var(--rj-space-8) auto 0;
    padding: 0 var(--rj-space-6);
  }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--rj-space-4); margin: var(--rj-space-6) 0 var(--rj-space-8); }
  @media (max-width: 720px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }

  .stage { max-width: 1200px; margin: 0 auto; padding: 0 var(--rj-space-6); }
  .view { display: none; animation: rj-view-enter var(--rj-duration-slow) var(--rj-ease-out); }
  body[data-view-mode="graph"]  .view-graph  { display: block; }
  body[data-view-mode="canvas"] .view-canvas { display: block; }
  body[data-view-mode="river"]  .view-river  { display: block; }
  @keyframes rj-view-enter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .canvas-stage { position: relative; height: 480px; background: radial-gradient(circle at center, rgba(168, 90, 44, 0.04), transparent 70%), var(--rj-bg-elevated); border: 1px solid var(--rj-border-subtle); border-radius: var(--rj-radius-lg); overflow: hidden; }
  .canvas-stage svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .cluster { position: absolute; min-width: 180px; padding: var(--rj-space-3); background: var(--rj-bg-page); border: 1px solid var(--rj-border-default); border-radius: var(--rj-radius-md); box-shadow: var(--rj-shadow-sm); }
  .cluster h3 { margin: 0 0 var(--rj-space-2); font-size: var(--rj-text-xs); text-transform: uppercase; letter-spacing: var(--rj-tracking-caps); color: var(--rj-copper-700); font-weight: var(--rj-weight-bold); }
  .cluster ul { margin: 0; padding: 0; list-style: none; font-size: var(--rj-text-sm); }
  .cluster ul li { padding: 2px 0; color: var(--rj-text-body); }

  .river-feed { display: grid; grid-template-columns: 80px 1fr; gap: var(--rj-space-3); }
  .river-time { font-family: var(--rj-font-mono); font-size: var(--rj-text-sm); color: var(--rj-text-muted); padding-top: var(--rj-space-2); }
  .river-card { background: var(--rj-bg-elevated); border: 1px solid var(--rj-border-subtle); border-radius: var(--rj-radius-md); padding: var(--rj-space-3) var(--rj-space-4); margin-bottom: var(--rj-space-3); display: flex; align-items: center; justify-content: space-between; gap: var(--rj-space-3); }
  .river-card .body { flex: 1; }
  .river-card .body b { display: block; color: var(--rj-text-primary); font-weight: var(--rj-weight-semibold); }
  .river-card .body span.sub { color: var(--rj-text-muted); font-size: var(--rj-text-sm); }
</style>
<script src="/assets/auth-guard.js"></script>
</head>
<body>

<header class="rj-topbar">
  <div class="rj-topbar-brand">
    <svg class="rj-topbar-emblem" viewBox="0 0 24 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
      <path d="M2 7 Q 6 1 10 7 Q 14 13 18 7 Q 22 1 22 1 M 2 7 L 22 7"/>
      <circle cx="12" cy="7" r="1.5" fill="currentColor"/>
    </svg>
    <span id="brand-text" data-tenant-name>Ryujin OS</span>
  </div>
  <nav class="rj-topbar-nav" id="pillar-nav"></nav>
  <div class="mode-toggle">
    <button class="rj-mode-toggle-btn" data-mode="graph">Graph</button>
    <button class="rj-mode-toggle-btn" data-mode="canvas">Canvas</button>
    <button class="rj-mode-toggle-btn" data-mode="river">River</button>
  </div>
  <a href="/command-center.html" title="Back to the classic cockpit (turns the beta toggle off)" style="margin-left:var(--rj-space-3);font-size:var(--rj-text-xs);font-weight:var(--rj-weight-semibold);color:var(--rj-copper-700);text-decoration:none;letter-spacing:var(--rj-tracking-wide);text-transform:uppercase;padding:6px 12px;border:1px solid var(--rj-copper-600);border-radius:var(--rj-radius-pill);background:var(--rj-bg-page)" onclick="try{localStorage.removeItem('ryujin_cockpit_version');}catch(e){}">← Classic cockpit</a>
</header>

<div class="pillar-hero">
  <p class="rj-eyebrow" id="pillar-label">PILLAR</p>
  <h1 class="rj-h1" id="pillar-title">Loading...</h1>
  <p class="rj-secondary" id="pillar-blurb" style="margin: var(--rj-space-2) 0 0; font-size: var(--rj-text-lg);"></p>
  <div class="stat-grid" id="stat-grid"></div>
</div>

<div class="stage">
  <section class="view view-graph">
    <div class="rj-panel rj-panel-featured rj-panel-flush" id="graph-panel">
      <div class="rj-panel-header rj-panel-header-ornate">
        <div>
          <p class="rj-eyebrow" style="margin: 0;" id="graph-eyebrow">Focused noun</p>
          <h3 class="rj-h3" style="margin-top: 2px;" id="graph-title">...</h3>
        </div>
        <span class="rj-chip rj-pillar" id="graph-chip">...</span>
      </div>
      <div class="rj-panel-body" id="graph-body">Loading...</div>
    </div>
  </section>

  <section class="view view-canvas">
    <div class="canvas-stage" id="canvas-stage">
      <svg viewBox="0 0 1200 480" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <linearGradient id="connector" x1="0" x2="1">
            <stop offset="0%" stop-color="#d9a37a" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#a85a2c" stop-opacity="0.8"/>
          </linearGradient>
        </defs>
        <path d="M 230 110 Q 400 60 560 200" stroke="url(#connector)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 230 110 Q 220 280 290 380" stroke="url(#connector)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 560 200 Q 760 240 920 140" stroke="url(#connector)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 560 200 Q 700 360 880 380" stroke="url(#connector)" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      <div id="canvas-clusters"></div>
    </div>
  </section>

  <section class="view view-river">
    <div class="river-feed" id="river-feed"></div>
  </section>
</div>

<script type="module">
  import { loadLiveData, fmtMoney, escapeHtml as esc, pillarBySlug as _pillarBySlug, eventsForPillar as _eventsForPillar } from '/v2/_live-data.js';
  import { readTenantSlug } from '/v2/_tenant.js';
  const RJ_DATA = await loadLiveData(readTenantSlug());
  const pillarBySlug = (slug) => _pillarBySlug(RJ_DATA, slug);
  const eventsForPillar = (slug) => _eventsForPillar(RJ_DATA, slug);

  const params = new URLSearchParams(window.location.search);
  const pillarSlug = (params.get('pillar') || 'hq').toLowerCase();
  const pillar = pillarBySlug(pillarSlug) || pillarBySlug('hq');

  // Topbar nav
  const nav = document.getElementById('pillar-nav');
  RJ_DATA.pillars.forEach(p => {
    const a = document.createElement('a');
    a.href = `?pillar=${p.slug}`;
    a.textContent = p.label;
    if (p.slug === pillar.slug) a.classList.add('active');
    nav.appendChild(a);
  });

  // Hero
  document.getElementById('pillar-label').textContent = pillar.label.toUpperCase();
  document.getElementById('pillar-title').textContent = pillar.label;
  document.getElementById('pillar-blurb').textContent = pillar.blurb;

  // Stats
  const statGrid = document.getElementById('stat-grid');
  const stats = RJ_DATA.stats[pillar.slug] || [];
  stats.forEach(s => {
    const panel = document.createElement('div');
    panel.className = 'rj-panel';
    panel.innerHTML = `
      <div class="rj-stat-ornate">
        <div class="rj-stat-label">${s.label}</div>
        <div class="rj-stat-value">${s.value}</div>
      </div>
    `;
    statGrid.appendChild(panel);
  });

  // Graph view: render the most prominent noun + edges
  const graphEyebrow = document.getElementById('graph-eyebrow');
  const graphTitle = document.getElementById('graph-title');
  const graphChip = document.getElementById('graph-chip');
  const graphBody = document.getElementById('graph-body');
  graphChip.classList.add(`rj-pillar-${pillar.slug}`);
  graphChip.textContent = pillar.label;

  function renderEmpty(label) {
    graphEyebrow.textContent = label;
    graphTitle.textContent = 'No data yet';
    graphBody.innerHTML = `<p class="rj-secondary">When records exist for this pillar, they appear here with their linked nouns inline.</p>`;
  }

  function renderGraph() {
    if (pillar.slug === 'sales' || pillar.slug === 'customer' || pillar.slug === 'hq') {
      const c = RJ_DATA.customers[0];
      if (!c) return renderEmpty('Customer');
      graphEyebrow.textContent = 'Customer · top';
      graphTitle.textContent = c.name;
      graphBody.innerHTML = `
        <p class="rj-secondary" style="margin: 0 0 var(--rj-space-4);">${esc(c.address)} · ${esc(c.phone)} · since ${esc(c.since)}</p>
        <div class="rj-stat-ornate"><div class="rj-stat-label">Lifetime value</div><div class="rj-stat-value">${fmtMoney(c.ltv)}</div></div>
        <hr class="rj-divider">
        ${renderRail('jobs', RJ_DATA.jobs.filter(j => j.customerId === c.id))}
        ${renderRail('proposals', RJ_DATA.proposals.filter(p => p.customerId === c.id))}
        ${renderRail('tickets', RJ_DATA.tickets.filter(t => t.customerId === c.id))}
      `;
    } else if (pillar.slug === 'production') {
      // Production graph keys off workorders (real jobs), not estimates.
      // Active in_progress takes precedence; fall back to most recent issued
      // or completed if there's nothing live right now.
      const W = RJ_DATA.workorders || [];
      const w = W.find(x => x.status === 'in_progress')
             || W.find(x => x.status === 'issued')
             || W[0];
      if (!w) return renderEmpty('Workorder');
      graphEyebrow.textContent = `WO-${w.woNumber} · ${w.status}`;
      graphTitle.textContent = w.customerName + ' · ' + w.address;
      graphBody.innerHTML = `
        <p class="rj-secondary" style="margin: 0 0 var(--rj-space-4);">${esc(w.packageTier || '')} · ${esc(w.jobType || '')}${w.subCrewLead ? ' · ' + esc(w.subCrewLead) : ''} · starts ${esc(w.startDate || 'TBD')}${w.completedAt ? ' · done ' + esc(w.completedAt) : ''}</p>
        <div class="rj-stat-ornate"><div class="rj-stat-label">Roof squares</div><div class="rj-stat-value">${w.totalSq || '—'}</div></div>
        <p style="margin: var(--rj-space-3) 0 0;"><a href="/job.html?wo=${encodeURIComponent(w.id)}" style="color:var(--rj-copper-700);font-weight:var(--rj-weight-semibold);text-decoration:none">Open job folder →</a></p>
        <hr class="rj-divider">
        ${renderRail('tickets', RJ_DATA.tickets.filter(t => t.customerId === w.customerId))}
      `;
    } else if (pillar.slug === 'service') {
      const j = RJ_DATA.jobs.find(x => x.stage === 'active') || RJ_DATA.jobs[0];
      if (!j) return renderEmpty('Job');
      graphEyebrow.textContent = 'Job · most recent';
      graphTitle.textContent = j.address;
      graphBody.innerHTML = `
        <p class="rj-secondary" style="margin: 0 0 var(--rj-space-4);">Stage ${esc(j.stage)}${j.crew && j.crew.length ? ' · ' + esc(j.crew.join(', ')) : ''} · starts ${esc(j.startDate)}</p>
        <div class="rj-stat-ornate"><div class="rj-stat-label">Contract value</div><div class="rj-stat-value">${fmtMoney(j.value)}</div></div>
        <hr class="rj-divider">
        ${renderRail('tickets', RJ_DATA.tickets.filter(t => t.customerId === j.customerId))}
      `;
    } else if (pillar.slug === 'finance') {
      graphBody.innerHTML = `<p class="rj-secondary">Finance Graph view shows the AR/AP graph: customer → invoices → payments → vendor bills. Wires up in Phase 4.</p>`;
      graphEyebrow.textContent = 'Cashflow graph';
      graphTitle.textContent = 'AR · AP · P&L';
    } else if (pillar.slug === 'materials') {
      graphBody.innerHTML = `<p class="rj-secondary">Materials Graph view shows orders → suppliers → in-stock items → assigned jobs. Wires up in Phase 4.</p>`;
      graphEyebrow.textContent = 'Materials graph';
      graphTitle.textContent = 'POs · Inventory · Jobs';
    } else if (pillar.slug === 'marketing') {
      graphBody.innerHTML = `<p class="rj-secondary">Marketing Graph view shows brand → accounts → clips → posts. Wires up in Phase 4.</p>`;
      graphEyebrow.textContent = 'Marketing graph';
      graphTitle.textContent = 'Brands · Channels · Clips';
    } else {
      graphBody.innerHTML = `<p class="rj-secondary">${pillar.label} Graph view scaffold. Real data wires in Phase 4.</p>`;
      graphEyebrow.textContent = pillar.label;
      graphTitle.textContent = pillar.label + ' overview';
    }
  }

  function renderRail(type, items) {
    if (!items.length) {
      return `<div class="rj-card"><div class="rj-row rj-row-between"><div class="rj-row"><span class="rj-chip rj-pillar rj-pillar-${type === 'jobs' ? 'production' : type === 'proposals' ? 'sales' : 'service'}">${esc(type)}</span><b style="color: var(--rj-text-muted);">None</b></div></div></div>`;
    }
    const cards = items.map(it => {
      const tone = type === 'jobs' ? 'production' : type === 'proposals' ? 'sales' : 'service';
      const text = type === 'jobs' ? `${esc(it.address)} · ${esc(it.stage)} · ${fmtMoney(it.value)}`
                : type === 'proposals' ? `${esc(it.quoteId)} · ${esc(it.status)} · ${fmtMoney(it.value)}`
                : esc(it.title);
      return `<div class="rj-card rj-card-interactive rj-card-ornate"><div class="rj-row rj-row-between"><div class="rj-row"><span class="rj-chip rj-pillar rj-pillar-${tone}">${esc(type)}</span><b>${text}</b></div><span class="rj-muted">›</span></div></div>`;
    }).join('');
    return `<div class="rj-stack" style="margin-bottom: var(--rj-space-3);">${cards}</div>`;
  }

  // Canvas view: render clusters based on pillar
  const canvasClusters = document.getElementById('canvas-clusters');
  function renderCanvas() {
    let clusters = [];
    // Reusable helpers for real-data clusters
    const W = RJ_DATA.workorders || [];
    const E = RJ_DATA.jobs || [];
    const C = RJ_DATA.customers || [];
    const T = RJ_DATA.tickets || [];
    const P = RJ_DATA.proposals || [];
    // Item-level links route to pages that actually exist in /public.
    // Estimates: admin.html drives the estimates list internally — no
    //   per-estimate route in v1 — so link the row to the list page.
    // Proposals: custom-proposals.html is the catalog page; the share
    //   link is the customer-facing surface (slug param, not id).
    // Tickets: service-tickets.html is the open-tickets page.
    // Workorders: job.html?wo=<id> is the canonical per-job folder.
    // Customers: customer.html?id=<id> is the canonical per-customer page.
    const woItem = w => ({ label: `WO-${w.woNumber} · ${w.customerName}`, href: `/job.html?wo=${encodeURIComponent(w.id)}` });
    const estItem = e => ({ label: `#${e.estimateNumber || (e.id || '').slice(0,6)} · ${e.address}`, href: '/admin.html?page=estimates' });
    const propItem = p => ({ label: `${p.quoteId} · ${p.customerName}`, href: '/custom-proposals.html' });
    const tixItem = t => ({ label: `#${t.ticketNumber} · ${t.title}`, href: '/service-tickets.html' });
    const custItem = c => ({ label: c.name, href: `/customer.html?id=${encodeURIComponent(c.id)}` });

    if (pillar.slug === 'hq') {
      const activeWOs = W.filter(w => w.status === 'in_progress' || w.status === 'issued');
      const openTix = T.filter(t => t.status !== 'done' && t.status !== 'cancelled');
      clusters = [
        { top: 60,  left: 80,  title: `Sales · ${E.length} estimates`, items: E.slice(0, 5).map(estItem) },
        { top: 150, left: 460, title: `Customers · ${C.length}`,       items: C.slice(0, 5).map(custItem) },
        { top: 80,  left: 820, title: `Production · ${activeWOs.length} live`, items: activeWOs.slice(0, 5).map(woItem) },
        { top: 340, left: 200, title: `Service · ${openTix.length} open`, items: openTix.slice(0, 5).map(tixItem) },
        { top: 340, left: 780, title: `Proposals · ${P.length}`,       items: P.slice(0, 5).map(propItem) }
      ];
    } else if (pillar.slug === 'sales') {
      // Real estimates grouped by status. The estimate.status enum in this
      // repo isn't fully normalized — bucket pragmatically by what we see
      // (draft/estimated vs sent vs signed) and group the rest under "Other".
      const draft = E.filter(e => ['draft', 'estimated', null, undefined, ''].includes(e.stage));
      const sent  = E.filter(e => e.stage === 'sent');
      const signed = E.filter(e => e.stage === 'signed' || e.stage === 'accepted');
      const other = E.filter(e => !['draft','estimated','sent','signed','accepted','',null,undefined].includes(e.stage));
      clusters = [
        { top: 80,  left: 80,  title: `Drafts · ${draft.length}`,    items: draft.slice(0, 8).map(estItem) },
        { top: 80,  left: 360, title: `Sent · ${sent.length}`,       items: sent.slice(0, 8).map(estItem) },
        { top: 80,  left: 640, title: `Signed · ${signed.length}`,   items: signed.slice(0, 8).map(estItem) },
        { top: 80,  left: 920, title: `Custom proposals · ${P.length}`, items: P.slice(0, 8).map(propItem) },
        { top: 300, left: 300, title: `Customers · ${C.length}`,     items: C.slice(0, 5).map(custItem) },
        ...(other.length ? [{ top: 300, left: 700, title: `Other · ${other.length}`, items: other.slice(0, 6).map(estItem) }] : [])
      ];
    } else if (pillar.slug === 'production') {
      const W = RJ_DATA.workorders || [];
      const wItem = w => ({
        label: `WO-${w.woNumber} · ${w.customerName} · ${w.address}`,
        href: `/job.html?wo=${encodeURIComponent(w.id)}`
      });
      // _live-data.js normalizes workorder dates to camelCase (startDate /
      // completedAt). The snake_case originals only live inside w.raw — read
      // the normalized fields directly so sorting is not a no-op.
      const byStartAsc = (a, b) => {
        const ad = a.startDate ? new Date(a.startDate).getTime() : Infinity;
        const bd = b.startDate ? new Date(b.startDate).getTime() : Infinity;
        return ad - bd;
      };
      const byCompletedDesc = (a, b) => {
        const ad = a.completedAt || (a.raw && a.raw.updated_at);
        const bd = b.completedAt || (b.raw && b.raw.updated_at);
        return new Date(bd || 0) - new Date(ad || 0);
      };
      clusters = [
        { top: 80,  left: 80,  title: 'In progress',  items: W.filter(w => w.status === 'in_progress').sort(byStartAsc).map(wItem) },
        { top: 80,  left: 480, title: 'Scheduled',    items: W.filter(w => w.status === 'issued').sort(byStartAsc).map(wItem) },
        { top: 80,  left: 840, title: 'Complete',     items: W.filter(w => w.status === 'complete').sort(byCompletedDesc).slice(0, 5).map(wItem) },
        { top: 320, left: 200, title: 'Tickets open', items: RJ_DATA.tickets.filter(t => t.status !== 'done' && t.status !== 'cancelled').slice(0, 8).map(t => t.title) },
        { top: 320, left: 720, title: 'Draft / Cancelled', items: W.filter(w => w.status === 'draft' || w.status === 'cancelled').sort(byStartAsc).map(wItem) }
      ];
    } else if (pillar.slug === 'service') {
      const open = T.filter(t => t.status !== 'done' && t.status !== 'cancelled');
      const high = open.filter(t => t.priority === 'high');
      const dueToday = (() => {
        const today = new Date().toISOString().slice(0, 10);
        return open.filter(t => t.dueDate === today);
      })();
      clusters = [
        { top: 80,  left: 80,  title: `Open · ${open.length}`,        items: open.slice(0, 10).map(tixItem) },
        { top: 80,  left: 480, title: `Due today · ${dueToday.length}`, items: dueToday.slice(0, 8).map(tixItem) },
        { top: 80,  left: 840, title: `High priority · ${high.length}`, items: high.slice(0, 8).map(tixItem) }
      ];
    } else if (pillar.slug === 'customer') {
      const topLtv = C.slice().sort((a, b) => (b.ltv || 0) - (a.ltv || 0)).slice(0, 8);
      const recent = C.slice().sort((a, b) => String(b.since || '').localeCompare(String(a.since || ''))).slice(0, 8);
      const phoneCount = C.filter(c => c.phone).length;
      clusters = [
        { top: 80,  left: 80,  title: `All customers · ${C.length}`, items: C.slice(0, 10).map(custItem) },
        { top: 80,  left: 480, title: `Highest LTV`,                 items: topLtv.map(custItem) },
        { top: 80,  left: 840, title: `Recently added`,              items: recent.map(custItem) },
        { top: 320, left: 200, title: `With phone · ${phoneCount}`,  items: C.filter(c => c.phone).slice(0, 8).map(custItem) }
      ];
    } else if (pillar.slug === 'finance') {
      // Pipeline = open estimates × value; Signed = signed estimates this month.
      const today = new Date().toISOString().slice(0, 7);
      const signedThisMonth = E.filter(e => (e.stage === 'signed' || e.stage === 'accepted') && (e.startDate || '').startsWith(today));
      const openEst = E.filter(e => e.stage !== 'signed' && e.stage !== 'accepted' && e.stage !== 'cancelled');
      clusters = [
        { top: 80,  left: 80,  title: `Pipeline · ${openEst.length} open est`, items: openEst.slice(0, 8).map(estItem) },
        { top: 80,  left: 480, title: `Signed this month · ${signedThisMonth.length}`, items: signedThisMonth.slice(0, 8).map(estItem) },
        { top: 80,  left: 840, title: `Proposals · ${P.length}`, items: P.slice(0, 8).map(propItem) },
        { top: 320, left: 200, title: `AR · AP · P&L`,           items: [{ label: 'Wires to QuickBooks / Wave next', href: '#' }] }
      ];
    } else if (pillar.slug === 'materials') {
      // No material_orders API surfaced in v2 yet. Be honest: name what's
      // missing rather than hardcode fake POs.
      clusters = [
        { top: 80,  left: 80,  title: 'Material orders',  items: [{ label: 'Wires to /api/material-orders next', href: '#' }] },
        { top: 80,  left: 480, title: 'Inventory',        items: [{ label: 'No SKU-level tracking yet', href: '#' }] },
        { top: 80,  left: 840, title: 'Suppliers',        items: [{ label: 'Coastal · GenTek · IKO', href: '#' }] }
      ];
    } else if (pillar.slug === 'marketing') {
      clusters = [
        { top: 80,  left: 80,  title: 'Clip pipeline',  items: [{ label: 'Wires to /api/marketing next', href: '/marketing-schedule.html' }] },
        { top: 80,  left: 480, title: 'Brands',         items: [{ label: 'View brand accounts', href: '/marketing-brands.html' }] },
        { top: 80,  left: 840, title: 'Campaigns',      items: [{ label: 'Summer 2026 · NanoSeal Revive', href: '/summer-campaign-2026.html' }] }
      ];
    } else if (pillar.slug === 'admin') {
      clusters = [
        { top: 80,  left: 80,  title: `Customers · ${C.length}`,  items: C.slice(0, 6).map(custItem) },
        { top: 80,  left: 480, title: `Tickets · ${T.length}`,    items: T.slice(0, 6).map(tixItem) },
        { top: 80,  left: 840, title: `Estimates · ${E.length}`,  items: E.slice(0, 6).map(estItem) },
        { top: 320, left: 200, title: `Workorders · ${W.length}`, items: W.slice(0, 6).map(woItem) },
        { top: 320, left: 720, title: `Proposals · ${P.length}`,  items: P.slice(0, 6).map(propItem) }
      ];
    } else {
      clusters = [
        { top: 80,  left: 80,  title: pillar.label, items: [{ label: 'No cluster layout defined for this pillar yet.', href: '#' }] }
      ];
    }
    // Cluster items can be either strings (legacy) or { label, href }
    // (preferred — makes the item clickable). Links inherit the canvas tone
    // and underline-on-hover for affordance.
    function renderItem(i) {
      if (i && typeof i === 'object' && i.href) {
        return `<li><a href="${esc(i.href)}" style="color:var(--rj-text-body);text-decoration:none;display:block;padding:2px 0" onmouseover="this.style.color='var(--rj-copper-700)';this.style.textDecoration='underline'" onmouseout="this.style.color='var(--rj-text-body)';this.style.textDecoration='none'">${esc(i.label)}</a></li>`;
      }
      const label = typeof i === 'object' ? (i.label || '') : i;
      return `<li>${esc(label)}</li>`;
    }
    canvasClusters.innerHTML = clusters.map(c => `
      <div class="cluster" style="top: ${c.top}px; left: ${c.left}px;">
        <h3>${esc(c.title)}</h3>
        <ul>${c.items.map(renderItem).join('')}</ul>
      </div>
    `).join('');
  }

  // River view: render events for this pillar
  const riverFeed = document.getElementById('river-feed');
  function renderRiver() {
    const events = eventsForPillar(pillar.slug);
    if (!events.length) {
      riverFeed.innerHTML = `<div style="grid-column: 1 / -1; padding: var(--rj-space-8); text-align: center;"><p class="rj-secondary">No events for ${pillar.label} today.</p></div>`;
      return;
    }
    riverFeed.innerHTML = events.map(ev => `
      <div class="river-time">${esc(ev.time)}</div>
      <div class="river-card">
        <div class="body">
          <b>${esc(ev.title)}${ev.value ? ' · ' + fmtMoney(ev.value) : ''}</b>
          <span class="sub">${esc(ev.sub)}</span>
        </div>
        <span class="rj-chip rj-pillar rj-pillar-${esc(ev.pillar)}">${esc(ev.pillar)}</span>
      </div>
    `).join('');
  }

  renderGraph();
  renderCanvas();
  renderRiver();

  document.title = `Ryujin OS · ${pillar.label}`;
</script>
