<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Tickets</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow-x:hidden;min-height:100vh}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(251,146,60,0.12) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(251,146,60,0.24);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #fff;border-radius:10px;color:#030611;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none}
.btn-back:hover{background:rgba(255,255,255,0.85);box-shadow:0 0 14px rgba(255,255,255,0.35)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}

.stage{position:relative;z-index:5;padding:80px 28px 60px;max-width:1280px;margin:0 auto}
.hero{margin-bottom:18px}
.hero .eyebrow{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:#fb923c;letter-spacing:3px;margin-bottom:6px}
.hero h1{font-family:'Orbitron',sans-serif;font-size:2em;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media (max-width:1000px){.board{grid-template-columns:repeat(2,1fr)}}
@media (max-width:600px){.board{grid-template-columns:1fr}}
.col{background:rgba(14,22,40,0.55);border:1px solid rgba(251,146,60,0.14);border-radius:14px;overflow:hidden}
.col-head{padding:12px 16px;background:rgba(6,10,20,0.55);border-bottom:1px solid rgba(251,146,60,0.14);display:flex;justify-content:space-between}
.col-head .name{font-family:'Orbitron',sans-serif;font-size:0.72em;font-weight:800;letter-spacing:2px;color:#fb923c}
.col-head .count{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(200,220,255,0.55);letter-spacing:1px}
.col.active .col-head .name{color:#22d3ee}
.col.done .col-head .name{color:#4ade80}
.col.blocked .col-head .name{color:#f87171}
.col-body{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:300px}
.ticket{padding:10px 12px;background:rgba(6,10,20,0.55);border:1px solid rgba(251,146,60,0.1);border-radius:9px;transition:all 0.2s;cursor:pointer}
.ticket:hover{border-color:rgba(251,146,60,0.4)}
.ticket .t-title{font-weight:700;font-size:0.9em;margin-bottom:3px}
.ticket .t-desc{font-size:0.78em;color:rgba(200,220,255,0.65);line-height:1.4}
.ticket .t-foot{display:flex;justify-content:space-between;margin-top:6px;padding-top:6px;border-top:1px solid rgba(251,146,60,0.06);font-family:'Share Tech Mono',monospace;font-size:0.66em;color:rgba(200,220,255,0.55);letter-spacing:0.5px}
.ticket .pri{padding:2px 6px;border-radius:4px;font-weight:700}
.pri.urgent{background:rgba(248,113,113,0.18);color:#f87171}
.pri.high{background:rgba(250,204,21,0.18);color:#facc15}
.pri.medium{background:rgba(34,211,238,0.12);color:#22d3ee}
.pri.low{background:rgba(148,163,184,0.14);color:#94a3b8}
.col-body .empty{text-align:center;padding:30px 10px;color:rgba(200,220,255,0.3);font-family:'Share Tech Mono',monospace;font-size:0.7em;letter-spacing:1.5px}
.loading{text-align:center;padding:60px;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1.5px}
</style>
</head>
<body>
<div class="topbar">
  <a class="btn-back" href="production.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> BACK</a>
  <div style="display:flex;align-items:center;gap:10px"><div style="width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.3),rgba(251,146,60,0.22) 40%,rgba(30,10,5,0.8));box-shadow:0 0 14px rgba(251,146,60,0.35)"></div><div class="brand-name">RYUJIN <span class="dim">· TICKETS</span></div></div>
  <div class="tb-spacer"></div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px" id="countBadge">—</div>
</div>

<div class="stage">
  <div class="hero">
    <div class="eyebrow">PRODUCTION · CREW TASKS + TICKETS</div>
    <h1>Tickets</h1>
  </div>
  <div class="board" id="board"><div class="loading" style="grid-column:1/-1">LOADING TICKETS...</div></div>
</div>

<script>
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function loadAll(){
  try {
    // Pull from the real Action Board (authoritative crew ticket system)
    const r = await fetch('/api/action-board?limit=200');
    if (!r.ok) { document.getElementById('board').innerHTML = '<div class="loading" style="grid-column:1/-1">HTTP ' + r.status + '</div>'; return; }
    const { tickets } = await r.json();
    const norm = (tickets || []).map(t => ({
      ...t,
      _status: (t.status || 'open').toLowerCase(),
      _pri: (t.priority || 'normal').toLowerCase().replace('_priority','').replace('_',' ')
    }));
    const open = norm.filter(t => t._status === 'open');
    const active = norm.filter(t => t._status === 'active' || t._status === 'in_progress');
    const blocked = norm.filter(t => t._status === 'blocked' || t._status === 'on_hold');
    const done = norm.filter(t => t._status === 'completed' || t._status === 'done' || t._status === 'closed').slice(0, 20);

    document.getElementById('countBadge').textContent = (tickets||[]).filter(t=>t.status!=='cancelled').length + ' TICKETS';

    const priClass = p => /top|urgent/.test(p||'') ? 'urgent' : /high/.test(p||'') ? 'high' : /low/.test(p||'') ? 'low' : 'medium';
    window._TICKETS = norm;
    const ticketCard = (t, idx) => `
      <div class="ticket">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div class="t-title" style="flex:1">${esc(t.title || '—')}</div>
          <button onclick='RyujinPDF.ticket(window._TICKETS[${idx}])' style="background:rgba(251,146,60,0.14);border:1px solid rgba(251,146,60,0.4);color:#fb923c;padding:3px 7px;border-radius:5px;font-family:Orbitron,sans-serif;font-size:0.58em;font-weight:700;letter-spacing:1px;cursor:pointer;flex-shrink:0" title="Download PDF">📄</button>
        </div>
        ${t.description ? `<div class="t-desc">${esc((t.description||'').slice(0,140))}${t.description.length > 140 ? '…' : ''}</div>` : ''}
        <div class="t-foot">
          <span class="pri ${priClass(t._pri)}">${(t._pri||'normal').toUpperCase()}</span>
          <span>${t.due_date ? 'Due ' + t.due_date : ''}</span>
        </div>
      </div>`;

    const colHtml = (cls, name, list) => `
      <div class="col ${cls}">
        <div class="col-head"><div class="name">${name}</div><div class="count">${list.length}</div></div>
        <div class="col-body">${list.length ? list.map((t) => ticketCard(t, norm.indexOf(t))).join('') : '<div class="empty">NONE</div>'}</div>
      </div>`;
    document.getElementById('board').innerHTML =
      colHtml('', 'OPEN', open) +
      colHtml('active', 'ACTIVE', active) +
      colHtml('blocked', 'BLOCKED', blocked) +
      colHtml('done', 'DONE (last 20)', done);
  } catch(e) {
    document.getElementById('board').innerHTML = '<div class="loading" style="grid-column:1/-1">Error: ' + e.message + '</div>';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); window.location.href = 'production.html'; } });
loadAll();
</script>
<script src="assets/ryujin-pdf.js"></script>
<script src="assets/ryujin-chat.js"></script>
</body>
</html>
