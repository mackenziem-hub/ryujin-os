<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>Proposal Builder · Ryujin</title>
<link rel="icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;
  --bg-2:#0d1322;
  --card:#11172c;
  --card-grad-a:#161e3a;
  --card-grad-b:#0f1528;
  --border:rgba(255,255,255,0.08);
  --border-hi:rgba(45,212,191,0.30);
  --text:#eaf0fa;
  --text-dim:#9aa8c4;
  --text-muted:#5e6b86;
  --accent:#2dd4bf;
  --accent-hi:#5eead4;
  --danger:#ff6b6b;
  --success:#7ed99e;
  --warn:#fbbf24;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  padding-bottom:calc(110px + max(env(safe-area-inset-bottom),0px));
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(circle at 50% 0%, rgba(45,212,191,0.04), transparent 55%),
    linear-gradient(180deg,#0e1426 0%,#0a0e1a 100%);
}

.topbar{
  position:sticky;top:0;z-index:20;
  background:linear-gradient(180deg,rgba(10,14,26,0.96),rgba(10,14,26,0.78));
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding-top:calc(14px + max(env(safe-area-inset-top),0px));
}
.topbar .brand{font-size:0.85em;font-weight:700;letter-spacing:3px;color:var(--text)}
.topbar .actions{display:flex;gap:8px}
.icon-btn{
  width:38px;height:38px;border-radius:10px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);
}
.icon-btn:active{background:rgba(255,255,255,0.10)}
.icon-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

.app{max-width:760px;margin:0 auto;padding:16px 18px 8px}

.header-card{
  background:linear-gradient(140deg,var(--card-grad-a),var(--card-grad-b));
  border:1px solid var(--border);border-radius:20px;
  padding:18px 20px;margin-bottom:14px;position:relative;overflow:hidden;
}
.header-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(45,212,191,0.40) 50%,transparent);
}
.header-card .label{font-size:0.72em;font-weight:600;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px}
.header-card .customer{font-size:1.3em;font-weight:700;letter-spacing:-0.01em;line-height:1.2}
.header-card .meta{font-size:0.85em;color:var(--text-dim);margin-top:4px;line-height:1.5}
.header-card .pills{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:999px;font-size:0.72em;font-weight:600;
  background:rgba(255,255,255,0.06);color:var(--text-dim);
}
.pill.accent{background:rgba(45,212,191,0.12);color:var(--accent)}
.pill.warn{background:rgba(251,191,36,0.14);color:var(--warn)}
.pill.danger{background:rgba(255,107,107,0.14);color:var(--danger)}

.section{
  background:linear-gradient(140deg,var(--card-grad-a),var(--card-grad-b));
  border:1px solid var(--border);border-radius:18px;
  padding:16px 18px;margin-bottom:14px;
}
.section-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.section-head h2{font-size:1em;font-weight:700;letter-spacing:-0.01em}
.section-head .sub{font-size:0.78em;color:var(--text-muted);font-weight:500}
.section .desc{font-size:0.82em;color:var(--text-dim);line-height:1.5;margin-bottom:12px}

.comp-list{display:flex;flex-direction:column;gap:8px}
.comp-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:12px;
  background:rgba(255,255,255,0.025);border:1px solid var(--border);
  cursor:pointer;transition:background 0.15s,border-color 0.15s;
}
.comp-row:hover{background:rgba(255,255,255,0.04)}
.comp-row.on{background:rgba(45,212,191,0.08);border-color:var(--border-hi)}
.comp-row.off{opacity:0.55}

.comp-toggle{
  width:44px;height:24px;border-radius:999px;flex-shrink:0;
  background:rgba(255,255,255,0.08);position:relative;transition:background 0.2s;
}
.comp-toggle::after{
  content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;
  background:#5e6b86;transition:transform 0.2s,background 0.2s;
}
.comp-row.on .comp-toggle{background:rgba(45,212,191,0.40)}
.comp-row.on .comp-toggle::after{background:var(--accent);transform:translateX(20px)}

.comp-body{flex:1;min-width:0}
.comp-name{font-size:0.94em;font-weight:600;color:var(--text);line-height:1.25}
.comp-meta{font-size:0.75em;color:var(--text-muted);margin-top:3px;line-height:1.4}
.comp-sub{font-size:0.78em;color:var(--text-dim);margin-top:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.comp-price{
  font-size:0.85em;font-weight:700;color:var(--accent);flex-shrink:0;
  font-variant-numeric:tabular-nums;
}
.comp-tier-list{padding:6px 0 0 56px;display:flex;flex-direction:column;gap:4px}

.insp-upload{padding:14px 0 4px;display:flex;align-items:center}
.insp-upload .btn.primary{background:var(--accent);color:#0a0e1a;border:none;border-radius:999px;font-weight:700;font-size:0.88em;cursor:pointer;box-shadow:0 6px 18px rgba(45,212,191,0.20)}
.insp-upload .btn.primary:active{transform:scale(0.97)}
.insp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:14px}
.insp-tile{position:relative;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
.insp-thumb{width:100%;aspect-ratio:4/3;overflow:hidden;background:#0a0e1a}
.insp-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.insp-menu-btn{position:absolute;top:4px;right:4px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.65);border:none;color:#fff;font-size:1.1em;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.insp-menu-btn:hover{background:rgba(0,0,0,0.85)}
.insp-cap{width:100%;background:transparent;border:none;border-top:1px solid var(--border);color:var(--text);font-size:0.78em;padding:7px 9px;font-family:inherit;outline:none}
.insp-cap:focus{background:rgba(45,212,191,0.06)}
/* Slot dropdown: native option lists default to a white panel, which made the
   light option text invisible until highlighted. Force a readable dark panel. */
.insp-slot option{background:#141a2b;color:#e8edf5}
/* Photo annotator modal (pen / arrow / text) */
.anno-backdrop{position:fixed;inset:0;z-index:200;background:rgba(5,8,16,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;gap:10px}
.anno-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;background:var(--card,#141a2b);border:1px solid var(--border);border-radius:12px;padding:8px 12px;max-width:100%}
.anno-toolbar button{font-size:0.8em;padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);cursor:pointer;font-family:inherit}
.anno-toolbar button.on{background:var(--accent);color:#0a0e1a;border-color:var(--accent);font-weight:700}
.anno-swatch{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,0.25);cursor:pointer;padding:0}
.anno-swatch.on{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}
.anno-canvas-wrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;width:100%;overflow:auto}
.anno-canvas-wrap canvas{max-width:100%;max-height:72vh;background:#000;border-radius:8px;touch-action:none;cursor:crosshair}
.comp-tier{font-size:0.78em;color:var(--text-muted);display:flex;justify-content:space-between;gap:8px}
.comp-tier b{color:var(--text-dim);font-weight:500}
.comp-tier .tier-popular{color:var(--accent)}

.action-bar{
  position:fixed;left:0;right:0;bottom:0;z-index:25;
  background:linear-gradient(180deg,rgba(10,14,26,0.55),rgba(10,14,26,0.96));
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-top:1px solid var(--border);
  padding:12px 18px;
  padding-bottom:calc(12px + max(env(safe-area-inset-bottom),0px));
  display:flex;align-items:center;gap:10px;
}
.action-bar .info{flex:1;font-size:0.82em;color:var(--text-dim);line-height:1.3}
.action-bar .info b{color:var(--text);font-weight:600}
.action-bar .btn{
  padding:11px 18px;border-radius:999px;border:1px solid var(--border);
  background:rgba(255,255,255,0.04);color:var(--text);font-weight:600;font-size:0.88em;
  cursor:pointer;display:inline-flex;align-items:center;gap:6px;
}
.action-bar .btn:active{transform:scale(0.97)}
.action-bar .btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2}
.action-bar .btn.primary{
  background:var(--accent);color:#0a0e1a;border-color:var(--accent);
  box-shadow:0 6px 18px rgba(45,212,191,0.20);
}
.action-bar .btn.primary svg{stroke:#0a0e1a}
.action-bar .btn:disabled{opacity:0.5;cursor:not-allowed;box-shadow:none}

#toast{
  position:fixed;bottom:130px;left:50%;transform:translateX(-50%);
  background:rgba(20,30,55,0.96);color:var(--text);
  padding:10px 18px;border-radius:999px;font-size:0.85em;font-weight:500;
  border:1px solid var(--border);
  opacity:0;pointer-events:none;transition:opacity 0.25s,transform 0.25s;
  z-index:40;max-width:88vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
#toast.err{border-color:rgba(255,107,107,0.40);color:var(--danger)}
#toast.ok{border-color:rgba(126,217,158,0.40);color:var(--success)}

.fatal{padding:40px 24px;text-align:center;color:var(--text-dim);max-width:600px;margin:60px auto}
.fatal h2{color:var(--text);font-size:1.15em;font-weight:700;margin-bottom:8px}
.fatal p{font-size:0.9em;line-height:1.5}
.fatal code{
  display:inline-block;background:rgba(255,255,255,0.06);padding:2px 8px;border-radius:6px;
  font-family:'JetBrains Mono',ui-monospace,monospace;font-size:0.85em;color:var(--accent);
}
.spinner{
  display:inline-block;width:14px;height:14px;border:2px solid rgba(45,212,191,0.30);border-top-color:var(--accent);border-radius:50%;
  animation:spin 0.6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{padding:40px;text-align:center;color:var(--text-muted);font-size:0.9em}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">RYUJIN · PROPOSAL BUILDER</div>
  <div class="actions">
    <button class="icon-btn" id="previewBtn" title="Preview as customer">
      <svg viewBox="0 0 24 24"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
    <button class="icon-btn" id="closeBtn" title="Back">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</header>

<main class="app" id="app">
  <div class="loading" id="loadingState">Loading estimate...</div>
</main>

<nav class="action-bar" id="actionBar" hidden>
  <div class="info" id="actionInfo">No changes</div>
  <button class="btn" id="restoreBtn" hidden>Restore v1</button>
  <button class="btn primary" id="saveBtn" disabled>
    <svg viewBox="0 0 24 24"><path d="M5 13l5 5L20 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Save
  </button>
</nav>

<div id="toast"></div>

<script src="/assets/ryujin-slug.js"></script>
<script src="/assets/auth-guard.js"></script>
<script>
(function(){
  const TENANT_SLUG =
    (typeof window.getRyujinTenantSlug === 'function' && window.getRyujinTenantSlug())
    || window.RYUJIN_TENANT_SLUG
    || 'plus-ultra';

  function authHeaders(extra){
    const h = Object.assign({ 'x-tenant-id': TENANT_SLUG }, extra || {});
    if (window.RyujinAuth && typeof window.RyujinAuth.headers === 'function') {
      Object.assign(h, window.RyujinAuth.headers());
    }
    return h;
  }

  const params = new URLSearchParams(window.location.search);
  const estimateId = params.get('estimate_id');

  function fatal(title, msg){
    const app = document.getElementById('app');
    app.innerHTML = `<div class="fatal"><h2>${escapeHtml(title)}</h2><p>${msg || ''}</p></div>`;
  }

  function escapeHtml(s){
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function toast(msg, kind){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = '';
    if (kind === 'err') el.classList.add('err');
    else if (kind === 'ok') el.classList.add('ok');
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2600);
  }

  if (!estimateId){
    fatal('Missing estimate id', 'Open this page with <code>?estimate_id=&lt;uuid&gt;</code>.');
    return;
  }

  if (!/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(estimateId)) {
    fatal('Invalid estimate id', 'The id in the URL is not a valid UUID.');
    return;
  }

  // ── State ──
  let estimate = null;
  let envelope = null;
  let backupEnvelope = null;
  let catalog = null;
  let originalSnapshot = null;
  let dirty = false;
  let saving = false;

  // ── Section grouping ───────────────────────────────────────────
  // Routes a component key to a section by exact match or prefix. Anything
  // not matched here falls through to the "Other" section so new component
  // types stay visible until they're added to a known group.
  const SECTIONS = [
    { id: 'roof', title: 'Roof Systems', sub: 'Customer picks one tier per system shown',
      keys: ['roof_asphalt', 'roof_metal'] },
    { id: 'services', title: 'Roof Preservation', sub: 'Spray-on rejuvenation, parallel to a reshingle',
      prefix: 'service_' },
    { id: 'prep', title: 'Roof Preparation', sub: 'Customer can toggle on or off',
      prefix: 'prep_' },
    { id: 'trim', title: 'Eve Protection', sub: 'Gutters / soffit / fascia / leafguard individual toggles',
      prefix: 'trim_' },
    { id: 'addons', title: 'Add-ons', sub: 'Ventilation, chimney flash, anything addon_*',
      prefix: 'addon_' },
    { id: 'wall', title: 'Wall System (Performance Shell)', sub: 'Siding tiers + wall assembly bundle',
      keys: ['siding', 'wall_assembly'] },
    { id: 'allowances', title: 'Allowances', sub: 'Set-asides credited back at close',
      keys: ['remediation'] },
    { id: 'financing', title: 'Financing', sub: 'Pure UI flag, no math',
      prefix: 'financing_' }
  ];

  function keysForSection(section, allKeys) {
    if (section.keys) return section.keys.filter(k => allKeys.has(k));
    if (section.prefix) return [...allKeys].filter(k => k.startsWith(section.prefix));
    return [];
  }

  // ── Load ──
  async function load(){
    // Fetch estimate + tenant catalog in parallel. Catalog failure is
    // non-fatal: builder still works, just can't add catalog items not
    // already on the estimate.
    let estResp, catResp;
    try {
      [estResp, catResp] = await Promise.all([
        fetch('/api/estimates?id=' + encodeURIComponent(estimateId), { headers: authHeaders() }),
        fetch('/api/envelope-catalog', { headers: authHeaders() })
      ]);
    } catch (e){
      fatal('Network error', escapeHtml(String(e?.message || e)));
      return;
    }

    if (estResp.status === 401){
      if (window.RyujinAuth?.clearAndRedirect) window.RyujinAuth.clearAndRedirect();
      return;
    }
    if (estResp.status === 404){ fatal('Estimate not found', 'No estimate with that id in this tenant.'); return; }
    if (!estResp.ok){ fatal('Load failed', 'API returned ' + estResp.status); return; }
    estimate = await estResp.json();

    if (catResp && catResp.ok) {
      try {
        const j = await catResp.json();
        catalog = j.catalog || null;
      } catch(e){ catalog = null; }
    }

    const cp = estimate.custom_prices || {};
    envelope = cp._envelope ? JSON.parse(JSON.stringify(cp._envelope)) : null;
    backupEnvelope = cp._envelope_v1_backup || null;
    originalSnapshot = JSON.stringify(envelope);

    if (!envelope){
      // No envelope configurator on this estimate (e.g. a plain "Roof Only"
      // proposal). The pricing sections need an envelope, but inspection-photo
      // upload does not — it keys off estimate_id alone. Render a stripped-down
      // view with just the photo uploader so Mac can still add cover / before /
      // after / inspection shots without an envelope. (See the no-envelope fix:
      // photos surface on the proposal via api/proposal's estimate_photos map.)
      renderPhotoOnly();
      return;
    }

    render();
  }

  // ── Photo-only render (no envelope on this estimate) ──
  function renderPhotoOnly(){
    const cust = estimate.customer || {};
    const statusPill = estimate.status ? `<span class="pill">${escapeHtml(estimate.status)}</span>` : '';
    const header = `
      <div class="header-card">
        <div class="label">ESTIMATE PU-${escapeHtml(estimate.estimate_number || '?')}</div>
        <div class="customer">${escapeHtml(cust.full_name || 'Unknown customer')}</div>
        <div class="meta">${escapeHtml(cust.address || estimate.address || '(no address)')} ${cust.city ? '· ' + escapeHtml(cust.city) : ''}</div>
        <div class="pills">${statusPill}<span class="pill warn">No configurator</span></div>
      </div>
    `;
    const notice = `
      <div class="section">
        <div class="section-head">
          <h2>Pricing configurator unavailable</h2>
          <div class="sub">This estimate has no envelope structure, so the pricing/tier sections aren't editable here. You can still upload and manage inspection photos below. Cover and before/after shots will appear on the proposal automatically.</div>
        </div>
      </div>
    `;
    const inspectionPanel = renderInspectionPanel();
    document.getElementById('app').innerHTML = header + notice + inspectionPanel;
    // actionBar stays hidden: there's no envelope to save.
    bindInspectionPanel();
    loadInspectionPhotos();
  }

  // ── Render ──
  function render(){
    const cust = estimate.customer || {};
    const lockPill = estimate.locked_at
      ? '<span class="pill danger">Locked</span>'
      : '<span class="pill accent">Editable</span>';
    const statusPill = estimate.status ? `<span class="pill">${escapeHtml(estimate.status)}</span>` : '';
    const backupPill = backupEnvelope ? '<span class="pill warn">v1 backup available</span>' : '';

    const header = `
      <div class="header-card">
        <div class="label">ESTIMATE PU-${escapeHtml(estimate.estimate_number || '?')}</div>
        <div class="customer">${escapeHtml(cust.full_name || 'Unknown customer')}</div>
        <div class="meta">${escapeHtml(cust.address || estimate.address || '(no address)')} ${cust.city ? '· ' + escapeHtml(cust.city) : ''}</div>
        <div class="pills">${lockPill}${statusPill}${backupPill}</div>
      </div>
    `;

    // Union of estimate keys + catalog keys. Catalog items not on the
    // estimate render as faded "Add from catalog" rows that pull a fresh
    // copy from the catalog when toggled on. This is how Mac gets the full
    // menu visible even on an estimate that was seeded with a subset.
    const estKeys = new Set(Object.keys(envelope.components || {}));
    const catKeys = new Set(Object.keys(catalog?.components || {}));
    const allKeys = new Set([...estKeys, ...catKeys]);

    const sectionsHtml = SECTIONS.map(s => renderSection(s, allKeys)).join('');

    // Catch anything not covered by SECTIONS (orphan / forgotten component types)
    const claimedKeys = new Set(SECTIONS.flatMap(s => keysForSection(s, allKeys)));
    const orphanKeys = [...allKeys].filter(k => !claimedKeys.has(k));
    const orphanSection = orphanKeys.length
      ? renderSection({ id: 'other', title: 'Other components', sub: 'Not in the standard catalog map', keys: orphanKeys }, allKeys)
      : '';

    const catalogNote = catalog?.components
      ? `<div style="font-size:0.78em;color:var(--text-muted);margin-bottom:8px;padding:0 4px">Catalog has ${catKeys.size} components. Estimate has ${estKeys.size}.</div>`
      : `<div style="font-size:0.78em;color:var(--warn);margin-bottom:8px;padding:0 4px">Tenant catalog empty or unreachable. Add new components manually via DB.</div>`;

    // Inspection photos panel: drop-in surface for upload + manage right here
    // in the builder so Mac doesn't have to context-switch to /job.html. Lives
    // between the sections and the rest. Always renders so Mac can upload
    // BEFORE flipping the inspection toggle.
    const inspectionPanel = renderInspectionPanel();

    document.getElementById('app').innerHTML = header + catalogNote + sectionsHtml + orphanSection + inspectionPanel;
    document.getElementById('actionBar').hidden = false;
    if (backupEnvelope) document.getElementById('restoreBtn').hidden = false;
    bind();
    bindInspectionPanel();
    refreshDirty();
    loadInspectionPhotos();
  }

  function renderInspectionPanel(){
    return `
      <div class="section" id="inspectionPanel">
        <div class="section-head" id="inspPanelHead" style="cursor:pointer;user-select:none" title="Click to collapse or expand" onclick="var b=document.getElementById('inspPanelBody'),c=document.getElementById('inspChev');if(b){var hid=b.style.display==='none';b.style.display=hid?'':'none';if(c)c.style.transform=hid?'':'rotate(-90deg)';}">
          <h2>Inspection Photos <span id="inspChev" style="display:inline-block;transition:transform 0.2s;font-size:0.8em">&#9662;</span></h2>
          <div class="sub">Upload + annotate. Show on proposal via the Inspection Photo Gallery toggle above.</div>
        </div>
        <div id="inspPanelBody">
          <div id="inspUploadZone" class="insp-upload">
            <input type="file" id="inspFileInput" accept="image/*,video/*" multiple hidden>
            <button type="button" class="btn primary" id="inspUploadBtn" style="padding:11px 20px">+ Upload photos</button>
            <span id="inspUploadStatus" style="font-size:0.82em;color:var(--text-dim);margin-left:10px"></span>
          </div>
          <div id="inspGrid" class="insp-grid">
            <div style="color:var(--text-muted);font-size:0.85em;padding:14px 0">Loading photos...</div>
          </div>
        </div>
      </div>
    `;
  }

  function bindInspectionPanel(){
    const btn = document.getElementById('inspUploadBtn');
    const input = document.getElementById('inspFileInput');
    if (btn && input) {
      btn.addEventListener('click', () => input.click());
      input.addEventListener('change', e => uploadInspectionPhotos(e.target.files));
    }
  }

  async function loadInspectionPhotos(){
    const grid = document.getElementById('inspGrid');
    if (!grid) return;
    try {
      const r = await fetch('/api/estimate-photos?estimate_id=' + encodeURIComponent(estimateId), { headers: authHeaders() });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const j = await r.json();
      const photos = j.photos || j || [];
      renderInspectionGrid(Array.isArray(photos) ? photos : []);
    } catch (e) {
      grid.innerHTML = `<div style="color:var(--danger);font-size:0.85em;padding:14px 0">Load failed: ${escapeHtml(e.message)}</div>`;
    }
  }

  // Where a photo lands on the proposal. 'general' = unassigned (shows in the
  // loose gallery only). cover/before/after/section1-3/after_bottom drive the
  // curated envelope layout; the rest are tags. Persisted to estimate_photos.category.
  const PHOTO_SLOTS = [
    { v: 'general',      l: 'Unassigned' },
    { v: 'cover',        l: 'Cover' },
    { v: 'before',       l: 'Before (top)' },
    { v: 'after',        l: 'After (top)' },
    { v: 'section1',     l: 'Section 1' },
    { v: 'section2',     l: 'Section 2' },
    { v: 'section3',     l: 'Section 3' },
    { v: 'after_bottom', l: 'After (bottom)' },
    { v: 'inspection',   l: 'Inspection' },
    { v: 'damage',       l: 'Damage' },
    { v: 'material',     l: 'Material' },
    { v: 'site',         l: 'Site' },
    { v: 'other',        l: 'Other' },
  ];
  let _inspPhotosCache = [];
  const _inspSelected = new Set();

  function renderInspectionGrid(photos){
    const grid = document.getElementById('inspGrid');
    if (!grid) return;
    _inspPhotosCache = photos;
    // Drop selections for photos that no longer exist (post-delete, refetch).
    const live = new Set(photos.map(p => p.id));
    _inspSelected.forEach(id => { if (!live.has(id)) _inspSelected.delete(id); });
    if (!photos.length) {
      _inspSelected.clear();
      grid.innerHTML = `<div style="color:var(--text-muted);font-size:0.85em;padding:14px 0">No photos uploaded yet. Drop drone shots + inspection photos in the uploader above.</div>`;
      return;
    }
    const sel = _inspSelected.size;
    const slotOpts = cur => PHOTO_SLOTS.map(o => `<option value="${o.v}"${o.v === (cur || 'general') ? ' selected' : ''}>${o.l}</option>`).join('');
    const toolbar = `
      <div class="insp-toolbar" style="grid-column:1/-1;display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 10px;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,0.02)">
        <span style="font-size:0.8em;color:var(--text-dim)">${photos.length} photo${photos.length === 1 ? '' : 's'}${sel ? ` &bull; ${sel} selected` : ''}</span>
        <button type="button" class="insp-selall" style="font-size:0.78em;padding:4px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer">Select all</button>
        <button type="button" class="insp-clearsel" style="font-size:0.78em;padding:4px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer">Clear</button>
        <span style="flex:1"></span>
        <button type="button" class="insp-delsel" ${sel ? '' : 'disabled'} style="font-size:0.78em;padding:4px 12px;border-radius:7px;border:1px solid var(--danger);background:${sel ? 'rgba(220,38,38,0.14)' : 'transparent'};color:var(--danger);cursor:${sel ? 'pointer' : 'not-allowed'};opacity:${sel ? '1' : '0.5'}">Delete selected${sel ? ` (${sel})` : ''}</button>
      </div>`;
    const tiles = photos.map(p => {
      const checked = _inspSelected.has(p.id);
      return `
      <div class="insp-tile" data-id="${escapeHtml(p.id)}"${checked ? ' style="border-color:var(--accent)"' : ''}>
        <label class="insp-check" style="position:absolute;top:4px;left:4px;z-index:4;width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);border-radius:6px;cursor:pointer" title="Select for bulk delete">
          <input type="checkbox" class="insp-sel" data-id="${escapeHtml(p.id)}" ${checked ? 'checked' : ''} style="width:15px;height:15px;accent-color:var(--accent);margin:0;cursor:pointer">
        </label>
        <div class="insp-thumb"><img src="${escapeHtml(p.url)}" alt="${escapeHtml(p.caption || '')}" loading="lazy"></div>
        <button class="insp-menu-btn" type="button" data-id="${escapeHtml(p.id)}" title="Photo actions">&#8942;</button>
        <select class="insp-slot" data-id="${escapeHtml(p.id)}" title="Where this photo appears on the proposal" style="width:100%;background:rgba(255,255,255,0.03);border:none;border-top:1px solid var(--border);color:var(--text);font-size:0.74em;padding:6px 8px;font-family:inherit;outline:none;cursor:pointer">${slotOpts(p.category)}</select>
        <input class="insp-cap" data-id="${escapeHtml(p.id)}" value="${escapeHtml(p.caption || '')}" placeholder="Caption (optional)">
      </div>`;
    }).join('');
    grid.innerHTML = toolbar + tiles;
    bindInspectionGrid();
  }

  function bindInspectionGrid(){
    const grid = document.getElementById('inspGrid');
    if (!grid) return;
    grid.querySelectorAll('.insp-menu-btn').forEach(b => {
      b.addEventListener('click', e => { e.stopPropagation(); showInspMenu(b.dataset.id, b); });
    });
    grid.querySelectorAll('.insp-cap').forEach(inp => {
      let orig = inp.value;
      inp.addEventListener('focus', () => { orig = inp.value; });
      inp.addEventListener('blur', async () => {
        if (inp.value === orig) return;
        try {
          const r = await fetch('/api/estimate-photos?id=' + encodeURIComponent(inp.dataset.id), {
            method: 'PATCH',
            headers: authHeaders({ 'Content-Type': 'application/json' }),
            body: JSON.stringify({ caption: inp.value }),
          });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          orig = inp.value;
          toast('Caption saved', 'ok');
        } catch (e) {
          toast('Save failed', 'err');
          inp.value = orig;
        }
      });
    });
    // Slot assignment drives the curated proposal layout. 'cover' also flips
    // is_cover (server unsets any prior cover); switching away clears is_cover.
    grid.querySelectorAll('.insp-slot').forEach(s => {
      s.addEventListener('change', async () => {
        const v = s.value;
        const body = (v === 'cover') ? { category: 'cover', is_cover: true } : { category: v, is_cover: false };
        try {
          const r = await fetch('/api/estimate-photos?id=' + encodeURIComponent(s.dataset.id), {
            method: 'PATCH',
            headers: authHeaders({ 'Content-Type': 'application/json' }),
            body: JSON.stringify(body),
          });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          toast('Slot updated', 'ok');
          if (v === 'cover') loadInspectionPhotos(); // refresh so the old cover badge clears
        } catch (e) {
          toast('Update failed', 'err');
          loadInspectionPhotos();
        }
      });
    });
    grid.querySelectorAll('.insp-sel').forEach(cb => {
      cb.addEventListener('change', () => {
        if (cb.checked) _inspSelected.add(cb.dataset.id); else _inspSelected.delete(cb.dataset.id);
        renderInspectionGrid(_inspPhotosCache);
      });
    });
    const selAll = grid.querySelector('.insp-selall');
    const clearSel = grid.querySelector('.insp-clearsel');
    const delSel = grid.querySelector('.insp-delsel');
    if (selAll) selAll.addEventListener('click', () => { _inspPhotosCache.forEach(p => _inspSelected.add(p.id)); renderInspectionGrid(_inspPhotosCache); });
    if (clearSel) clearSel.addEventListener('click', () => { _inspSelected.clear(); renderInspectionGrid(_inspPhotosCache); });
    if (delSel) delSel.addEventListener('click', bulkDeleteInspection);
  }

  async function bulkDeleteInspection(){
    const ids = Array.from(_inspSelected);
    if (!ids.length) return;
    if (!window.confirm(`Delete ${ids.length} selected photo${ids.length === 1 ? '' : 's'} permanently?`)) return;
    let ok = 0, fail = 0;
    for (const id of ids) {
      try {
        const r = await fetch('/api/estimate-photos?id=' + encodeURIComponent(id), { method: 'DELETE', headers: authHeaders() });
        if (r.ok) { ok++; _inspSelected.delete(id); } else { fail++; }
      } catch { fail++; }
    }
    toast(`Deleted ${ok} photo${ok === 1 ? '' : 's'}${fail ? `, ${fail} failed` : ''}`, fail ? 'err' : 'ok');
    loadInspectionPhotos();
  }

  function showInspMenu(photoId, anchor){
    // Simple inline menu rendered next to the kebab. One at a time.
    document.querySelectorAll('.insp-popup').forEach(m => m.remove());
    const rect = anchor.getBoundingClientRect();
    const menu = document.createElement('div');
    menu.className = 'insp-popup';
    menu.style.cssText = `position:fixed;top:${rect.bottom+4}px;left:${rect.right-180}px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px;z-index:50;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,0.4)`;
    const items = [
      { label: 'Annotate (mark up)', action: 'annotate', note: 'Estimate photos cannot be annotated yet' },
      { label: 'Generate mockup (AI)', action: 'mockup', note: 'Coming soon' },
      { label: 'Delete', action: 'delete', danger: true },
    ];
    items.forEach(it => {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = it.label;
      b.style.cssText = `display:block;width:100%;text-align:left;padding:9px 12px;background:transparent;border:none;color:${it.danger?'var(--danger)':'var(--text)'};font-size:0.85em;cursor:pointer;border-radius:6px;font-family:inherit`;
      b.addEventListener('mouseenter', () => b.style.background = 'rgba(255,255,255,0.06)');
      b.addEventListener('mouseleave', () => b.style.background = 'transparent');
      b.addEventListener('click', async ev => {
        ev.stopPropagation();
        menu.remove();
        await handleInspectionAction(it.action, photoId);
      });
      menu.appendChild(b);
    });
    document.body.appendChild(menu);
    setTimeout(() => {
      const closer = (e) => { if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('click', closer); } };
      document.addEventListener('click', closer);
    }, 10);
  }

  // AI render picker: pick a roof material and re-roof the selected home photo
  // via /api/generate-render (Higgsfield img2img). Saves the result as a new
  // estimate photo. Needs HIGGSFIELD_API_KEY configured server-side.
  function openRenderPicker(photoId){
    const photo = (_inspPhotosCache || []).find(p => p.id === photoId);
    if (!photo) { toast('Photo not found', 'err'); return; }
    document.querySelectorAll('.render-backdrop').forEach(n => n.remove());
    const TYPES = [
      { v: 'shingle', l: 'Asphalt shingle' },
      { v: 'community_barn', l: 'Community Barn metal' },
      { v: 'metal', l: 'Standard metal' },
      { v: 'euro_clay', l: 'European clay imitation' },
      { v: 'standing_seam', l: 'Standing seam (premium)' },
    ];
    const back = document.createElement('div');
    back.className = 'render-backdrop';
    back.style.cssText = 'position:fixed;inset:0;z-index:200;background:rgba(5,8,16,0.9);display:flex;align-items:center;justify-content:center;padding:18px';
    back.innerHTML = `
      <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;max-width:460px;width:100%;padding:20px">
        <div style="font-family:'Montserrat',sans-serif;font-weight:700;color:var(--text);margin-bottom:6px">Generate roof render</div>
        <div style="font-size:0.82em;color:var(--text-dim);margin-bottom:14px">Re-roof this photo in a new material. Takes up to a minute.</div>
        <div style="display:flex;flex-direction:column;gap:8px" id="renderTypes"></div>
        <div id="renderStatus" style="font-size:0.82em;color:var(--text-dim);margin-top:12px;min-height:18px"></div>
        <div style="text-align:right;margin-top:12px"><button type="button" id="renderClose" style="font-size:0.82em;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer">Close</button></div>
      </div>`;
    document.body.appendChild(back);
    const status = back.querySelector('#renderStatus');
    const typesWrap = back.querySelector('#renderTypes');
    back.querySelector('#renderClose').addEventListener('click', () => back.remove());
    let busy = false;
    TYPES.forEach(t => {
      const b = document.createElement('button');
      b.type = 'button'; b.textContent = t.l;
      b.style.cssText = 'text-align:left;padding:11px 14px;border-radius:9px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--text);font-size:0.9em;cursor:pointer;font-family:inherit';
      b.addEventListener('click', async () => {
        if (busy) return; busy = true;
        typesWrap.querySelectorAll('button').forEach(x => x.disabled = true);
        status.textContent = `Rendering ${t.l}... (up to about a minute)`;
        try {
          let r = await fetch('/api/generate-render', {
            method: 'POST', headers: authHeaders({ 'Content-Type': 'application/json' }),
            body: JSON.stringify({ estimate_id: estimateId, roof_type: t.v, base_image_url: photo.url }),
          });
          let j = await r.json().catch(() => ({}));
          let tries = 0;
          while (r.status === 202 && j.job_id && tries < 6) {
            tries++;
            status.textContent = `Still rendering ${t.l}... (${tries})`;
            await new Promise(res => setTimeout(res, 7000));
            r = await fetch(`/api/generate-render?estimate_id=${encodeURIComponent(estimateId)}&job_id=${encodeURIComponent(j.job_id)}&roof_type=${encodeURIComponent(t.v)}`, { headers: authHeaders() });
            j = await r.json().catch(() => ({}));
          }
          if (r.status === 501) { status.textContent = j.error || 'Not configured yet.'; busy = false; typesWrap.querySelectorAll('button').forEach(x => x.disabled = false); return; }
          if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
          toast('Render added', 'ok');
          back.remove();
          loadInspectionPhotos();
        } catch (e) {
          status.textContent = 'Failed: ' + e.message;
          busy = false; typesWrap.querySelectorAll('button').forEach(x => x.disabled = false);
        }
      });
      typesWrap.appendChild(b);
    });
  }

  async function handleInspectionAction(action, photoId){
    if (action === 'annotate') {
      openAnnotator(photoId);
      return;
    }
    if (action === 'mockup') {
      openRenderPicker(photoId);
      return;
    }
    if (action === 'delete') {
      if (!window.confirm('Delete this photo permanently?')) return;
      try {
        const r = await fetch('/api/estimate-photos?id=' + encodeURIComponent(photoId), {
          method: 'DELETE',
          headers: authHeaders(),
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        toast('Deleted', 'ok');
        loadInspectionPhotos();
      } catch (e) {
        toast('Delete failed: ' + e.message, 'err');
      }
    }
  }

  // Client-side downscale to stay under Vercel's 4.5MB serverless body cap.
  // Mirrors the helper in /job.html so behavior matches.
  async function downscaleImage(file, maxDim = 2400, quality = 0.85) {
    if (!file.type || !file.type.startsWith('image/')) return file;
    if (file.type === 'image/png') return file;
    try {
      const bmp = await createImageBitmap(file, { imageOrientation: 'from-image' });
      const ratio = Math.min(1, maxDim / Math.max(bmp.width, bmp.height));
      const w = Math.round(bmp.width * ratio);
      const h = Math.round(bmp.height * ratio);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bmp, 0, 0, w, h);
      if (bmp.close) bmp.close();
      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
      if (!blob || blob.size >= file.size) return file;
      const newName = file.name.replace(/\.[^.]+$/, '') + '.jpg';
      return new File([blob], newName, { type: 'image/jpeg', lastModified: file.lastModified });
    } catch (e) {
      return file;
    }
  }

  async function uploadInspectionPhotos(fileList){
    const files = Array.from(fileList || []);
    if (!files.length) return;
    const status = document.getElementById('inspUploadStatus');
    let done = 0, failed = 0;
    for (let i = 0; i < files.length; i++) {
      const original = files[i];
      status.textContent = `compressing ${i+1}/${files.length}...`;
      const f = await downscaleImage(original);
      status.textContent = `uploading ${i+1}/${files.length} (${done} done${failed?` · ${failed} failed`:''})...`;
      const fd = new FormData();
      fd.append('estimate_id', estimateId);
      fd.append('category', 'inspection');
      fd.append('file', f, f.name);
      try {
        const r = await fetch('/api/estimate-photos', { method: 'POST', headers: authHeaders(), body: fd });
        if (!r.ok) {
          const t = await r.text().catch(() => '');
          throw new Error('HTTP ' + r.status + (t ? ': ' + t.slice(0, 200) : ''));
        }
        done++;
      } catch (e) {
        failed++;
        console.error('[insp-upload]', original.name, e.message);
      }
    }
    status.textContent = `Uploaded ${done}/${files.length}${failed?` · ${failed} failed`:''}`;
    document.getElementById('inspFileInput').value = '';
    loadInspectionPhotos();
    setTimeout(() => { if (status) status.textContent = ''; }, 4000);
  }

  // Lightweight photo annotator: pen (colour swatches), arrow, and text box.
  // Composites the markup onto the image at load resolution and uploads the
  // result as a NEW estimate photo (carrying the original's slot/category), so
  // the original is never destroyed. Replay-based op list gives a clean undo.
  function openAnnotator(photoId){
    const photo = (_inspPhotosCache || []).find(p => p.id === photoId);
    if (!photo) { toast('Photo not found', 'err'); return; }
    document.querySelectorAll('.anno-backdrop').forEach(n => n.remove());

    const backdrop = document.createElement('div');
    backdrop.className = 'anno-backdrop';
    backdrop.innerHTML = `
      <div class="anno-toolbar">
        <button data-tool="pen" class="on">Pen</button>
        <button data-tool="arrow">Arrow</button>
        <button data-tool="text">Text</button>
        <span style="width:1px;height:22px;background:var(--border)"></span>
        <button class="anno-swatch on" data-color="#ffd400" style="background:#ffd400" title="Yellow"></button>
        <button class="anno-swatch" data-color="#ff3b30" style="background:#ff3b30" title="Red"></button>
        <button class="anno-swatch" data-color="#ffffff" style="background:#ffffff" title="White"></button>
        <button class="anno-swatch" data-color="#111111" style="background:#111111" title="Black"></button>
        <button class="anno-swatch" data-color="#22d3ee" style="background:#22d3ee" title="Cyan"></button>
        <span style="width:1px;height:22px;background:var(--border)"></span>
        <button data-act="undo">Undo</button>
        <button data-act="revert">Revert to clean</button>
        <button data-act="cancel">Cancel</button>
        <button data-act="save" style="background:var(--accent);color:#0a0e1a;font-weight:700;border-color:var(--accent)">Save markup</button>
      </div>
      <div class="anno-canvas-wrap"><canvas></canvas></div>
      <div style="font-size:0.75em;color:var(--text-dim)">Pen + arrow: click and drag. Text: tap where you want it.</div>
    `;
    document.body.appendChild(backdrop);

    const canvas = backdrop.querySelector('canvas');
    const ctx = canvas.getContext('2d');
    const ops = [];
    let tool = 'pen', color = '#ffd400', drawing = false, cur = null;

    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const maxDim = 2400;
      const ratio = Math.min(1, maxDim / Math.max(img.naturalWidth, img.naturalHeight));
      canvas.width = Math.max(1, Math.round(img.naturalWidth * ratio));
      canvas.height = Math.max(1, Math.round(img.naturalHeight * ratio));
      redraw();
    };
    img.onerror = () => toast('Could not load image for markup', 'err');
    img.src = photo.url;

    const lineW = () => Math.max(2, Math.round(canvas.width / 320));
    function redraw(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (img.complete && img.naturalWidth) ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      ops.forEach(drawOp);
      if (cur) drawOp(cur);
    }
    function drawOp(op){
      ctx.strokeStyle = op.color; ctx.fillStyle = op.color;
      ctx.lineWidth = op.w || lineW(); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      if (op.type === 'pen'){
        ctx.beginPath();
        op.pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
        ctx.stroke();
      } else if (op.type === 'arrow'){
        ctx.beginPath(); ctx.moveTo(op.x1, op.y1); ctx.lineTo(op.x2, op.y2); ctx.stroke();
        const a = Math.atan2(op.y2 - op.y1, op.x2 - op.x1), h = (op.w || lineW()) * 4;
        ctx.beginPath(); ctx.moveTo(op.x2, op.y2);
        ctx.lineTo(op.x2 - h * Math.cos(a - Math.PI / 6), op.y2 - h * Math.sin(a - Math.PI / 6));
        ctx.lineTo(op.x2 - h * Math.cos(a + Math.PI / 6), op.y2 - h * Math.sin(a + Math.PI / 6));
        ctx.closePath(); ctx.fill();
      } else if (op.type === 'text'){
        const fs = op.size || Math.max(16, Math.round(canvas.width / 26));
        ctx.font = `700 ${fs}px Inter, system-ui, sans-serif`;
        ctx.textBaseline = 'top';
        // Clamp x so there is room, then wrap to the remaining width so the text
        // never runs off the photo.
        const x = Math.min(op.x, canvas.width * 0.62);
        const maxW = canvas.width - x - Math.round(canvas.width * 0.04);
        const lines = wrapText(ctx, op.text, Math.max(60, maxW));
        const lh = Math.round(fs * 1.25);
        ctx.lineWidth = Math.max(2, fs / 8); ctx.strokeStyle = 'rgba(0,0,0,0.6)';
        lines.forEach((ln, i) => {
          const ly = op.y + i * lh;
          ctx.strokeText(ln, x, ly);
          ctx.fillStyle = op.color;
          ctx.fillText(ln, x, ly);
        });
      }
    }
    function wrapText(c, text, maxWidth){
      const out = [];
      String(text).split('\n').forEach(para => {
        const words = para.split(/\s+/);
        let line = '';
        for (const w of words){
          const test = line ? line + ' ' + w : w;
          if (c.measureText(test).width > maxWidth && line){ out.push(line); line = w; }
          else line = test;
        }
        out.push(line);
      });
      return out;
    }
    // Inline text box: a textarea overlaid at the tap point. Commits on blur or
    // Enter (Shift+Enter inserts a newline; Esc cancels). The committed text
    // wraps to the image width at render time so it stays on the photo.
    function openTextEditor(canvasPt, ev){
      const existing = backdrop.querySelector('.anno-textinput');
      if (existing) existing.remove();
      const ta = document.createElement('textarea');
      ta.className = 'anno-textinput';
      ta.rows = 1;
      const left = Math.max(8, Math.min(ev.clientX, window.innerWidth - 230));
      const top = Math.max(8, Math.min(ev.clientY, window.innerHeight - 90));
      ta.style.cssText = `position:fixed;left:${left}px;top:${top}px;z-index:220;min-width:160px;max-width:60vw;background:rgba(10,14,26,0.96);color:${color};border:1px solid ${color};border-radius:8px;padding:6px 8px;font:700 16px Inter,system-ui,sans-serif;resize:none;outline:none`;
      backdrop.appendChild(ta);
      ta.focus();
      let committed = false;
      const commit = () => {
        if (committed) return; committed = true;
        const t = ta.value.trim();
        ta.remove();
        if (t){ ops.push({ type: 'text', color, x: canvasPt.x, y: canvasPt.y, text: t }); redraw(); }
      };
      ta.addEventListener('blur', commit);
      ta.addEventListener('keydown', k => {
        if (k.key === 'Enter' && !k.shiftKey){ k.preventDefault(); ta.blur(); }
        else if (k.key === 'Escape'){ k.preventDefault(); ta.value = ''; ta.blur(); }
      });
      ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; });
    }
    function pos(e){
      const r = canvas.getBoundingClientRect();
      return { x: (e.clientX - r.left) * (canvas.width / r.width), y: (e.clientY - r.top) * (canvas.height / r.height) };
    }
    canvas.addEventListener('pointerdown', e => {
      e.preventDefault();
      const p = pos(e);
      if (tool === 'text'){
        openTextEditor(p, e);
        return;
      }
      drawing = true;
      cur = tool === 'pen'
        ? { type: 'pen', color, w: lineW(), pts: [p] }
        : { type: 'arrow', color, w: lineW(), x1: p.x, y1: p.y, x2: p.x, y2: p.y };
      try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
    });
    canvas.addEventListener('pointermove', e => {
      if (!drawing || !cur) return;
      const p = pos(e);
      if (cur.type === 'pen') cur.pts.push(p); else { cur.x2 = p.x; cur.y2 = p.y; }
      redraw();
    });
    const endStroke = () => { if (drawing && cur) ops.push(cur); drawing = false; cur = null; redraw(); };
    canvas.addEventListener('pointerup', endStroke);
    canvas.addEventListener('pointercancel', endStroke);

    backdrop.querySelectorAll('[data-tool]').forEach(b => b.addEventListener('click', () => {
      tool = b.dataset.tool;
      backdrop.querySelectorAll('[data-tool]').forEach(x => x.classList.toggle('on', x === b));
    }));
    backdrop.querySelectorAll('[data-color]').forEach(b => b.addEventListener('click', () => {
      color = b.dataset.color;
      backdrop.querySelectorAll('[data-color]').forEach(x => x.classList.toggle('on', x === b));
    }));
    backdrop.querySelector('[data-act="undo"]').addEventListener('click', () => { ops.pop(); redraw(); });
    backdrop.querySelector('[data-act="revert"]').addEventListener('click', () => {
      if (ops.length && !window.confirm('Clear all markings and revert to the clean photo?')) return;
      ops.length = 0;
      backdrop.querySelectorAll('.anno-textinput').forEach(n => n.remove());
      redraw();
    });
    backdrop.querySelector('[data-act="cancel"]').addEventListener('click', () => backdrop.remove());
    backdrop.querySelector('[data-act="save"]').addEventListener('click', async () => {
      const btn = backdrop.querySelector('[data-act="save"]');
      btn.disabled = true; btn.textContent = 'Saving...';
      let blob;
      try {
        blob = await new Promise((res, rej) => canvas.toBlob(b => b ? res(b) : rej(new Error('toBlob returned null')), 'image/jpeg', 0.92));
      } catch (err) {
        toast('Markup blocked (image CORS) - could not save', 'err');
        btn.disabled = false; btn.textContent = 'Save markup'; return;
      }
      const fd = new FormData();
      fd.append('estimate_id', estimateId);
      fd.append('category', photo.category || 'inspection');
      const baseCap = (photo.caption || '').trim();
      fd.append('caption', baseCap ? baseCap + ' (marked up)' : 'Marked up');
      fd.append('file', new File([blob], 'markup-' + String(photoId).slice(0, 8) + '.jpg', { type: 'image/jpeg' }), 'markup.jpg');
      try {
        const r = await fetch('/api/estimate-photos', { method: 'POST', headers: authHeaders(), body: fd });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        // Non-destructive overtake: the marked-up copy carries the original's
        // slot so it takes over on the proposal, but the clean original is kept
        // (un-slotted) so markup is always reversible. To revert, delete the
        // marked-up copy and the clean original is still here.
        try {
          await fetch('/api/estimate-photos?id=' + encodeURIComponent(photoId), {
            method: 'PATCH',
            headers: authHeaders({ 'Content-Type': 'application/json' }),
            body: JSON.stringify({ category: 'general', is_cover: false }),
          });
        } catch (_) {}
        toast('Markup saved', 'ok');
        backdrop.remove();
        loadInspectionPhotos();
      } catch (err) {
        toast('Save failed: ' + err.message, 'err');
        btn.disabled = false; btn.textContent = 'Save markup';
      }
    });
  }

  function renderSection(section, allKeys){
    const sectionKeys = keysForSection(section, allKeys);
    const items = sectionKeys.map(k => {
      const onEst = envelope.components?.[k] || null;
      const inCat = catalog?.components?.[k] || null;
      // Estimate copy wins if present (it carries the hidden flag + any per-job
      // override). Catalog provides the fallback definition for "add from
      // catalog" rows. notInEstimate=true triggers the faded styling.
      return { key: k, comp: onEst || inCat, notInEstimate: !onEst };
    }).filter(x => x.comp);
    if (!items.length) return '';
    return `
      <div class="section">
        <div class="section-head"><h2>${escapeHtml(section.title)}</h2><div class="sub">${escapeHtml(section.sub)}</div></div>
        <div class="comp-list">
          ${items.map(({key, comp, notInEstimate}) => renderComponent(key, comp, notInEstimate)).join('')}
        </div>
      </div>
    `;
  }

  function renderComponent(key, comp, notInEstimate){
    // notInEstimate: true means component comes from the catalog but isn't on
    // this estimate yet. We render it as a faded row; toggling on copies the
    // catalog definition into envelope.components and removes hidden.
    const on = !notInEstimate && !comp.hidden;
    const label = comp.label || key;
    const price = comp.hard != null ? '$' + Number(comp.hard).toLocaleString() : '';
    const tiers = Array.isArray(comp.tiers) ? comp.tiers : null;
    let priceCell = '';
    if (tiers && tiers.length){
      const range = tierRange(tiers);
      priceCell = `<div class="comp-price">${range}</div>`;
    } else if (price){
      priceCell = `<div class="comp-price">${price}</div>`;
    }
    const sub = comp.subtitle ? `<div class="comp-sub">${escapeHtml(comp.subtitle)}</div>` : '';
    const tierList = tiers && tiers.length ? `
      <div class="comp-tier-list">
        ${tiers.map(t => `<div class="comp-tier"><b>${escapeHtml(t.label || t.slug)}</b><span class="${t.popular?'tier-popular':''}">${t.hard != null ? '$'+Number(t.hard).toLocaleString() : ''}${t.popular?' · popular':''}</span></div>`).join('')}
      </div>
    ` : '';
    const fromCatalogBadge = notInEstimate ? '<span class="pill" style="background:rgba(251,191,36,0.14);color:var(--warn);font-size:0.68em;margin-left:6px;padding:2px 6px">from catalog</span>' : '';
    return `
      <div>
        <div class="comp-row ${on?'on':'off'}" data-key="${escapeHtml(key)}" data-from-catalog="${notInEstimate?'1':''}">
          <div class="comp-toggle"></div>
          <div class="comp-body">
            <div class="comp-name">${escapeHtml(label)}${fromCatalogBadge}</div>
            <div class="comp-meta">${escapeHtml(key)}${tiers ? ' · ' + tiers.length + ' tier' + (tiers.length===1?'':'s') : ''}</div>
            ${sub}
          </div>
          ${priceCell}
        </div>
        ${tierList}
      </div>
    `;
  }

  function tierRange(tiers){
    const prices = tiers.map(t => Number(t.hard) || 0).filter(p => p > 0);
    if (!prices.length) return '';
    const min = Math.min(...prices), max = Math.max(...prices);
    return min === max ? '$' + min.toLocaleString() : '$' + min.toLocaleString() + ' – $' + max.toLocaleString();
  }

  function bind(){
    document.querySelectorAll('.comp-row').forEach(row => {
      row.addEventListener('click', () => {
        const key = row.dataset.key;
        const fromCatalog = row.dataset.fromCatalog === '1';
        if (fromCatalog) {
          // Adding from catalog: clone the catalog definition into the
          // estimate's envelope and mark this row as "on". Re-render is
          // needed because the badge + state shift.
          const catComp = catalog?.components?.[key];
          if (!catComp) return;
          if (!envelope.components) envelope.components = {};
          envelope.components[key] = JSON.parse(JSON.stringify(catComp));
          delete envelope.components[key].hidden;
          render();
          return;
        }
        const comp = envelope.components?.[key];
        if (!comp) return;
        if (comp.hidden) delete comp.hidden;
        else comp.hidden = true;
        row.classList.toggle('on');
        row.classList.toggle('off');
        refreshDirty();
      });
    });
  }

  function refreshDirty(){
    dirty = JSON.stringify(envelope) !== originalSnapshot;
    const onCount = Object.values(envelope.components || {}).filter(c => !c.hidden).length;
    const totalCount = Object.keys(envelope.components || {}).length;
    document.getElementById('actionInfo').innerHTML =
      `<b>${onCount}</b> of ${totalCount} components visible${dirty ? ' · unsaved' : ''}`;
    document.getElementById('saveBtn').disabled = !dirty || saving;
  }

  // ── Save ──
  document.getElementById('saveBtn').addEventListener('click', save);
  document.getElementById('restoreBtn').addEventListener('click', restore);
  document.getElementById('closeBtn').addEventListener('click', () => {
    if (dirty && !window.confirm('Discard unsaved changes?')) return;
    if (window.history.length > 1) window.history.back();
    else window.location.href = '/';
  });
  document.getElementById('previewBtn').addEventListener('click', () => {
    if (!estimate?.share_token){
      toast('No share_token on this estimate yet', 'err');
      return;
    }
    window.open('/proposal-client.html?share=' + encodeURIComponent(estimate.share_token), '_blank');
  });

  async function save(){
    if (saving || !dirty) return;
    saving = true;
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Saving';

    const newCp = { ...(estimate.custom_prices || {}), _envelope: envelope };
    try {
      const r = await fetch('/api/estimates', {
        method: 'PUT',
        headers: authHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ id: estimateId, custom_prices: newCp })
      });
      const json = await r.json();
      if (r.status === 423){
        toast('Estimate is locked. Make a revision to edit.', 'err');
      } else if (!r.ok){
        throw new Error(json.error || 'Save failed');
      } else {
        estimate = json;
        originalSnapshot = JSON.stringify(envelope);
        toast('Saved', 'ok');
      }
    } catch (e){
      toast('Save failed: ' + (e?.message || 'unknown'), 'err');
    } finally {
      saving = false;
      btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M5 13l5 5L20 6" stroke-linecap="round" stroke-linejoin="round"/></svg> Save';
      refreshDirty();
    }
  }

  async function restore(){
    if (!backupEnvelope) return;
    if (!window.confirm('Restore the v1 backup? This will overwrite the current envelope with the original. Your current changes will be lost.')) return;
    envelope = JSON.parse(JSON.stringify(backupEnvelope));
    render();
    refreshDirty();
    toast('Restored from backup (not saved yet)', 'ok');
  }

  load();
})();
</script>
</body>
</html>
