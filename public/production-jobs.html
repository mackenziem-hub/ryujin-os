<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow-x:hidden;min-height:100vh}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(251,146,60,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(248,113,113,0.06) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(251,146,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(251,146,60,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}

.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(251,146,60,0.24);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#fb923c,#f87171,transparent);opacity:0.5}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #fff;border-radius:10px;color:#030611;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none;transition:all 0.2s}
.btn-back:hover{background:rgba(255,255,255,0.85);box-shadow:0 0 14px rgba(255,255,255,0.35)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.3),rgba(251,146,60,0.22) 40%,rgba(30,10,5,0.8));box-shadow:0 0 14px rgba(251,146,60,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}

.stage{position:relative;z-index:5;padding:80px 28px 60px;max-width:1400px;margin:0 auto}
.hero{margin-bottom:20px;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap}
.hero-text .eyebrow{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:#fb923c;letter-spacing:3px;margin-bottom:6px}
.hero-text h1{font-family:'Orbitron',sans-serif;font-size:2em;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn-new-job{padding:12px 22px;border-radius:12px;background:linear-gradient(135deg,rgba(45,212,191,0.3),rgba(20,184,166,0.12));border:1px solid rgba(45,212,191,0.55);color:#2dd4bf;font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:1.5px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:box-shadow 0.18s,background 0.18s}
.btn-new-job:hover{box-shadow:0 0 18px rgba(45,212,191,0.4);background:linear-gradient(135deg,rgba(45,212,191,0.4),rgba(20,184,166,0.18))}
.btn-new-job svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.6;stroke-linecap:round}

.search-row{margin-bottom:18px;position:relative}
.search-input{width:100%;padding:14px 18px 14px 46px;background:rgba(14,22,40,0.65);border:1px solid rgba(251,146,60,0.22);border-radius:12px;color:#e0e6f0;font-family:'Inter',sans-serif;font-size:0.95em;letter-spacing:0.3px;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.search-input:focus{border-color:rgba(251,146,60,0.55);box-shadow:0 0 0 3px rgba(251,146,60,0.08)}
.search-input::placeholder{color:rgba(200,220,255,0.42)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:rgba(251,146,60,0.65);fill:none;stroke-width:2;pointer-events:none}
.search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:6px;background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.3);color:#f87171;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.search-clear.on{display:flex}
.search-clear:hover{background:rgba(248,113,113,0.25)}

.tabs{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid rgba(251,146,60,0.14);padding-bottom:0}
.tab{flex:1;padding:14px 20px;background:transparent;border:none;border-bottom:3px solid transparent;color:rgba(200,220,255,0.55);font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2px;cursor:pointer;transition:color 0.18s,border-color 0.18s,background 0.18s;display:flex;align-items:center;justify-content:center;gap:10px;text-transform:uppercase}
.tab:hover{color:rgba(251,146,60,0.85);background:rgba(251,146,60,0.04)}
.tab.on{color:#fb923c;border-bottom-color:#fb923c;background:rgba(251,146,60,0.06)}
.tab.on.active-tab{color:#22d3ee;border-bottom-color:#22d3ee;background:rgba(34,211,238,0.06)}
.tab.on.completed-tab{color:#4ade80;border-bottom-color:#4ade80;background:rgba(74,222,128,0.06)}
.tab .pill{font-family:'Share Tech Mono',monospace;font-size:0.78em;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,0.08);color:inherit;letter-spacing:1px;font-weight:700;min-width:28px;text-align:center}

.list{display:flex;flex-direction:column;gap:8px}
.row{display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(14,22,40,0.55);border:1px solid rgba(251,146,60,0.12);border-radius:12px;cursor:pointer;text-decoration:none;color:inherit;transition:border-color 0.18s,transform 0.18s,background 0.18s}
.row:hover{border-color:rgba(251,146,60,0.4);transform:translateX(3px);background:rgba(14,22,40,0.8)}
.row .date{flex:0 0 130px;font-family:'Share Tech Mono',monospace;font-size:0.72em;color:#fb923c;letter-spacing:1.5px;line-height:1.3}
.row .main{flex:1;min-width:0}
.row .cust{font-weight:700;font-size:1em;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .addr{font-size:0.8em;color:rgba(200,220,255,0.6);font-family:'Share Tech Mono',monospace;letter-spacing:0.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .meta{flex:0 0 auto;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.row .tier{font-family:'Share Tech Mono',monospace;font-size:0.68em;color:rgba(200,220,255,0.55);letter-spacing:1.2px}
.row .total{font-family:'Orbitron',sans-serif;font-size:0.95em;font-weight:800;color:#fb923c}
.row .chev{flex:0 0 16px;color:rgba(251,146,60,0.4);font-size:1.4em;font-weight:300}

.row.active-now{border-color:rgba(34,211,238,0.32);background:rgba(34,211,238,0.05)}
.row.active-now .date{color:#22d3ee}
.row.overdue{border-color:rgba(248,113,113,0.4);background:rgba(248,113,113,0.05)}
.row.overdue .date{color:#f87171}
.row.complete{opacity:0.78}
.row.complete .date{color:#4ade80}
.row.complete .total{color:#4ade80}

.row .dq{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.dq-chip{font-family:'Share Tech Mono',monospace;font-size:0.62em;padding:2px 7px;border-radius:4px;background:rgba(248,113,113,0.14);color:#f87171;border:1px solid rgba(248,113,113,0.32);letter-spacing:1px;font-weight:700;text-transform:uppercase;line-height:1.4}

@media (max-width:720px){
  .row{flex-wrap:wrap;gap:10px}
  .row .date{flex:0 0 100%;font-size:0.68em}
  .row .meta{flex:1;align-items:flex-end}
  .tabs{gap:2px}
  .tab{padding:12px 8px;font-size:0.7em;letter-spacing:1.2px}
  .tab .pill{font-size:0.72em;padding:1px 6px}
}

.empty{text-align:center;padding:50px 20px;color:rgba(200,220,255,0.45);font-family:'Share Tech Mono',monospace;font-size:0.78em;letter-spacing:1.5px}
.empty img{display:block;margin:0 auto 14px;max-width:140px;height:auto;opacity:0.55}
.loading{text-align:center;padding:60px;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1.5px}
</style>

<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="btn-back" href="production.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> BACK</a>
  <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· JOB FOLDERS</span></div></div>
  <div class="tb-spacer"></div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px" id="countBadge">—</div>
</div>

<div class="stage">
  <div class="hero">
    <div class="hero-text">
      <div class="eyebrow">PRODUCTION · JOB FOLDERS</div>
      <h1>Job Folders</h1>
    </div>
    <button type="button" class="btn-new-job" id="btnNewJob" aria-label="Create new job">
      <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      NEW JOB
    </button>
  </div>

  <div class="search-row">
    <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21" stroke-linecap="round"/></svg>
    <input type="search" class="search-input" id="searchInput" placeholder="Search by customer, address, or WO number..." autocomplete="off">
    <button type="button" class="search-clear" id="searchClear" aria-label="Clear search">&times;</button>
  </div>

  <div class="tabs" role="tablist">
    <button type="button" class="tab on active-tab" data-tab="active" role="tab" aria-selected="true">
      Active <span class="pill" id="cntActive">0</span>
    </button>
    <button type="button" class="tab" data-tab="pending" role="tab" aria-selected="false">
      Pending <span class="pill" id="cntPending">0</span>
    </button>
    <button type="button" class="tab completed-tab" data-tab="completed" role="tab" aria-selected="false">
      Completed <span class="pill" id="cntCompleted">0</span>
    </button>
  </div>

  <div class="list" id="list">
    <div class="loading">LOADING JOBS...</div>
  </div>
</div>

<script>
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtMoney = n => n == null ? '' : '$' + Number(n).toLocaleString('en-US', { maximumFractionDigits: 0 });

function daysBetween(iso){
  if (!iso) return null;
  const d = new Date(iso + (iso.includes('T') ? '' : 'T12:00:00'));
  const now = new Date();
  now.setHours(0,0,0,0);
  const dNorm = new Date(d);
  dNorm.setHours(0,0,0,0);
  return Math.round((dNorm - now) / 86400000);
}

function dateLabel(w, bucket){
  if (bucket === 'completed') {
    const doneIso = w.completed_at || w.updated_at;
    return 'COMPLETED' + (doneIso ? ' · ' + new Date(doneIso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '');
  }
  if (!w.start_date) return 'UNSCHEDULED';
  const diff = daysBetween(w.start_date);
  const dateStr = new Date(w.start_date + 'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  let prefix;
  if (w.status === 'in_progress') prefix = 'IN PROGRESS';
  else if (diff < 0) prefix = Math.abs(diff) + 'D OVERDUE';
  else if (diff === 0) prefix = 'TODAY';
  else if (diff === 1) prefix = 'TOMORROW';
  else prefix = 'IN ' + diff + 'D';
  return prefix + ' · ' + dateStr;
}

// scope_items accepts two shapes ({item, included} objects, or plain strings
// in legacy rows). A blank row added in the editor saves as {item: ''} and
// would otherwise sneak past a naked length check.
function hasUsableScope(items){
  if (!Array.isArray(items)) return false;
  return items.some(s => {
    if (typeof s === 'string') return s.trim().length > 0;
    return !!(s && typeof s.item === 'string' && s.item.trim().length > 0);
  });
}

// Surface data gaps that block install — color, SQ, scope. Only flag for
// jobs not yet complete; completed jobs in the archive shouldn't nag.
function dqIssues(w){
  if (w.status === 'complete' || w.completed_at) return [];
  const out = [];
  if (!w.shingle_color) out.push('NO COLOR');
  if (w.total_sq == null || Number(w.total_sq) === 0) out.push('NO SQ');
  if (!hasUsableScope(w.scope_items)) out.push('NO SCOPE');
  return out;
}

function rowHtml(w, bucket){
  const href = w.estimate?.share_token
    ? 'job.html?share=' + encodeURIComponent(w.estimate.share_token)
    : 'job.html?wo=' + encodeURIComponent(w.id);
  const diff = daysBetween(w.start_date);
  let cls = '';
  if (bucket === 'completed') cls = 'complete';
  else if (w.status === 'in_progress') cls = 'active-now';
  else if (diff != null && diff < 0) cls = 'overdue';
  const woLabel = w.wo_number != null ? 'WO-' + w.wo_number : (w.id || '').slice(0,8);
  const tier = (w.package_tier || w.tier || '').toString();
  const tierLabel = tier ? tier.toUpperCase() + ' · ' : '';
  // Customer revenue: only show the locked accepted total. paysheet.total is
  // sub-pay (labor), not the customer contract amount, so we leave the cell
  // blank for issued jobs that have not been locked yet.
  const total = w.estimate?.final_accepted_total ?? null;
  const issues = dqIssues(w);
  const dqHtml = issues.length
    ? `<div class="dq">${issues.map(i => `<span class="dq-chip">${esc(i)}</span>`).join('')}</div>`
    : '';
  // In the Completed tab a stale 'issued'/'in_progress' status would otherwise
  // render as "GOLD · ISSUED" next to a green COMPLETED date — confusing for
  // closeout-stamped rows. Force the display label when the row landed in the
  // completed bucket.
  const displayStatus = bucket === 'completed' ? 'COMPLETE' : (w.status || 'draft').replace('_',' ').toUpperCase();
  return `
    <a href="${href}" class="row ${cls}" data-search="${esc((w.customer_name || '') + ' ' + (w.address || '') + ' ' + woLabel).toLowerCase()}">
      <div class="date">${esc(dateLabel(w, bucket))}<br><span style="opacity:0.6">${esc(woLabel)}</span></div>
      <div class="main">
        <div class="cust">${esc(w.customer_name || '(no name)')}</div>
        <div class="addr">${esc(w.address || '')}</div>
        ${dqHtml}
      </div>
      <div class="meta">
        <div class="tier">${tierLabel}${esc(displayStatus)}</div>
        <div class="total">${fmtMoney(total)}</div>
      </div>
      <div class="chev">&rsaquo;</div>
    </a>
  `;
}

let buckets = { active: [], pending: [], completed: [] };
let currentTab = 'active';

function bucketize(workorders){
  const active = [];
  const pending = [];
  const completed = [];
  (workorders || []).forEach(w => {
    // completed_at presence is authoritative — the closeout flow stamps it
    // without always flipping status to 'complete' (see WO-18 / WO-15 history).
    if (w.status === 'complete' || w.completed_at) {
      completed.push(w);
    } else if (w.status === 'in_progress') {
      active.push(w);
    } else if (w.status === 'issued') {
      const diff = daysBetween(w.start_date);
      // Active = in flight or due within 7 days (including overdue)
      // Pending = scheduled further out or unscheduled
      if (diff != null && diff <= 7) active.push(w);
      else pending.push(w);
    }
    // draft + unknown statuses are intentionally dropped (matches prior 6-column behavior)
  });

  // Sort active: overdue first (most overdue at top), then today/tomorrow, then this week
  active.sort((a, b) => {
    const ad = daysBetween(a.start_date);
    const bd = daysBetween(b.start_date);
    if (ad == null && bd == null) return 0;
    if (ad == null) return 1;
    if (bd == null) return -1;
    return ad - bd;
  });
  // Pending: earliest scheduled first, unscheduled last
  pending.sort((a, b) => {
    const ad = a.start_date ? new Date(a.start_date).getTime() : Infinity;
    const bd = b.start_date ? new Date(b.start_date).getTime() : Infinity;
    return ad - bd;
  });
  // Completed: most recently completed first
  completed.sort((a, b) => new Date(b.completed_at || b.updated_at || 0) - new Date(a.completed_at || a.updated_at || 0));

  return { active, pending, completed };
}

function render(){
  const list = buckets[currentTab] || [];
  const bucket = currentTab;
  const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  const filtered = q ? list.filter(w => {
    const hay = ((w.customer_name || '') + ' ' + (w.address || '') + ' ' + (w.wo_number != null ? 'wo-' + w.wo_number : '')).toLowerCase();
    return hay.includes(q);
  }) : list;

  const el = document.getElementById('list');
  if (!filtered.length) {
    if (q) {
      el.innerHTML = `<div class="empty">NO MATCHES FOR "${esc(q)}" IN ${bucket.toUpperCase()}</div>`;
    } else {
      el.innerHTML = `<div class="empty"><img src="/assets/images/empty-projects.png" alt="" onerror="this.style.display='none'">NO ${bucket.toUpperCase()} JOBS</div>`;
    }
    return;
  }
  el.innerHTML = filtered.map(w => rowHtml(w, bucket)).join('');
}

function setTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    const on = t.dataset.tab === tab;
    t.classList.toggle('on', on);
    t.setAttribute('aria-selected', on ? 'true' : 'false');
  });
  render();
}

async function loadAll(){
  try {
    const r = await fetch('/api/workorders?limit=200', { headers: { 'x-tenant-id': 'plus-ultra' } });
    if (!r.ok) {
      document.getElementById('list').innerHTML = '<div class="loading">HTTP ' + r.status + '</div>';
      return;
    }
    const { workorders } = await r.json();
    buckets = bucketize(workorders);
    document.getElementById('cntActive').textContent = buckets.active.length;
    document.getElementById('cntPending').textContent = buckets.pending.length;
    document.getElementById('cntCompleted').textContent = buckets.completed.length;
    document.getElementById('countBadge').textContent =
      buckets.active.length + ' ACTIVE · ' + buckets.pending.length + ' PENDING · ' + buckets.completed.length + ' DONE';
    render();
  } catch(e) {
    document.getElementById('list').innerHTML = '<div class="loading">Error: ' + esc(e.message) + '</div>';
  }
}

// Tab clicks
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => setTab(t.dataset.tab));
});

// Search input
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
searchInput.addEventListener('input', () => {
  searchClear.classList.toggle('on', !!searchInput.value);
  render();
});
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.classList.remove('on');
  searchInput.focus();
  render();
});

// Esc clears search if focused, else navigates back
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.activeElement === searchInput && searchInput.value) {
      e.preventDefault();
      searchInput.value = '';
      searchClear.classList.remove('on');
      render();
    } else if (document.activeElement !== searchInput) {
      e.preventDefault();
      window.location.href = 'production.html';
    }
  }
  // "/" focuses the search box (common search shortcut), but only when no
  // other editable field is focused — otherwise it eats slashes typed into
  // address inputs, the quick-create modal, etc.
  if (e.key === '/') {
    const ae = document.activeElement;
    const isEditable = ae && (
      ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.tagName === 'SELECT' || ae.isContentEditable
    );
    if (!isEditable) {
      e.preventDefault();
      searchInput.focus();
    }
  }
});

// Initial-state from URL hash (e.g. #completed)
const initialTab = (location.hash || '').replace('#', '');
if (['active', 'pending', 'completed'].includes(initialTab)) setTab(initialTab);

// Wire the hero CTA to the global quick-create job modal.
document.getElementById('btnNewJob').addEventListener('click', () => {
  if (window.RyujinQuickCreate?.actions?.job) window.RyujinQuickCreate.actions.job();
  else if (window.RyujinQuickCreate?.open) window.RyujinQuickCreate.open();
});

// Refetch when tab regains focus (PR #28 era)
document.addEventListener('visibilitychange', () => { if (!document.hidden) loadAll(); });

loadAll();
</script>

<script src="assets/ryujin-tenant.js"></script>
<script src="assets/ryujin-persist.js"></script>

<script src="assets/ryujin-chat.js"></script>
