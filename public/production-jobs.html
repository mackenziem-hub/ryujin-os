<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Job Folders</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow-x:hidden;min-height:100vh}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(251,146,60,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(248,113,113,0.06) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(251,146,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(251,146,60,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}

.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(251,146,60,0.24);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#fb923c,#f87171,transparent);opacity:0.5}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #fff;border-radius:10px;color:#030611;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none;transition:all 0.2s}
.btn-back:hover{background:rgba(255,255,255,0.85);box-shadow:0 0 14px rgba(255,255,255,0.35)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.3),rgba(251,146,60,0.22) 40%,rgba(30,10,5,0.8));box-shadow:0 0 14px rgba(251,146,60,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}

.stage{position:relative;z-index:5;padding:80px 28px 60px;max-width:1400px;margin:0 auto}
.hero{margin-bottom:20px}
.hero .eyebrow{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:#fb923c;letter-spacing:3px;margin-bottom:6px}
.hero h1{font-family:'Orbitron',sans-serif;font-size:2em;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.board{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
@media (max-width:1280px){.board{grid-template-columns:repeat(3,1fr)}}
@media (max-width:880px){.board{grid-template-columns:repeat(2,1fr)}}
@media (max-width:600px){.board{grid-template-columns:1fr}}

.col{background:rgba(14,22,40,0.55);border:1px solid rgba(251,146,60,0.16);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
.col-head{padding:14px 16px;background:rgba(6,10,20,0.65);border-bottom:1px solid rgba(251,146,60,0.14);display:flex;justify-content:space-between;align-items:center}
.col-head .name{font-family:'Orbitron',sans-serif;font-size:0.76em;font-weight:800;letter-spacing:2px;color:#fb923c}
.col-head .count{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:rgba(200,220,255,0.55);letter-spacing:1.5px}
.col.today .col-head{background:rgba(251,146,60,0.12)}
.col.today .col-head .name{color:#fb923c}
.col.week .col-head .name{color:#facc15}
.col.upcoming .col-head .name{color:#22d3ee}
.col.overdue .col-head{background:rgba(248,113,113,0.1)}
.col.overdue .col-head .name{color:#f87171}
.col.completed .col-head{background:rgba(74,222,128,0.08)}
.col.completed .col-head .name{color:#4ade80}
.card.complete{border-color:rgba(74,222,128,0.2);opacity:0.82}
.card.complete .date{color:#4ade80}

.col-body{padding:12px;display:flex;flex-direction:column;gap:10px;min-height:400px}

.card{padding:12px 14px;background:rgba(6,10,20,0.55);border:1px solid rgba(251,146,60,0.1);border-radius:10px;transition:all 0.2s;cursor:pointer;text-decoration:none;color:inherit;display:block}
.card:hover{border-color:rgba(251,146,60,0.4);transform:translateX(2px);background:rgba(6,10,20,0.8)}
.card .date{font-family:'Share Tech Mono',monospace;font-size:0.66em;color:#fb923c;letter-spacing:1.5px;margin-bottom:4px}
.card .cust{font-weight:700;font-size:0.92em;margin-bottom:2px}
.card .addr{font-size:0.76em;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;letter-spacing:0.5px;line-height:1.4}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid rgba(251,146,60,0.06)}
.card .tier{font-family:'Share Tech Mono',monospace;font-size:0.68em;color:rgba(200,220,255,0.65);letter-spacing:1.2px}
.card .sq{font-family:'Orbitron',sans-serif;font-size:0.86em;font-weight:800;color:#fb923c}
.card.overdue{border-color:rgba(248,113,113,0.4);background:rgba(248,113,113,0.05)}
.card.overdue .date{color:#f87171}

.col-body .empty{text-align:center;padding:30px 10px;color:rgba(200,220,255,0.35);font-family:'Share Tech Mono',monospace;font-size:0.72em;letter-spacing:1.5px}
.loading{text-align:center;padding:60px;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1.5px}
</style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="btn-back" href="production.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> BACK</a>
  <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· JOB FOLDERS</span></div></div>
  <div class="tb-spacer"></div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px" id="countBadge">—</div>
</div>

<div class="stage">
  <div class="hero">
    <div class="eyebrow">PRODUCTION · DISPATCH BOARD</div>
    <h1>Job Folders</h1>
  </div>

  <div class="board" id="board">
    <div class="loading" style="grid-column:1/-1">LOADING JOBS...</div>
  </div>
</div>

<script>
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function daysBetween(iso){
  if (!iso) return null;
  const d = new Date(iso + (iso.includes('T') ? '' : 'T12:00:00'));
  const now = new Date();
  now.setHours(0,0,0,0);
  const dNorm = new Date(d);
  dNorm.setHours(0,0,0,0);
  return Math.round((dNorm - now) / 86400000);
}

function card(w, opts={}){
  const diff = daysBetween(w.start_date);
  let dateLabel;
  if (opts.complete) {
    const doneIso = w.completed_at || w.updated_at;
    dateLabel = 'COMPLETED' + (doneIso ? ' · ' + new Date(doneIso).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '');
  } else {
    dateLabel = w.start_date ? (diff === 0 ? 'TODAY' : diff === 1 ? 'TOMORROW' : diff < 0 ? Math.abs(diff) + ' DAYS AGO' : 'IN ' + diff + ' DAYS') : 'UNSCHEDULED';
    dateLabel += w.start_date ? ' · ' + new Date(w.start_date + 'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
  }
  const href = w.estimate?.share_token ? 'job.html?share=' + encodeURIComponent(w.estimate.share_token) : 'production-workorders.html';
  const cls = opts.complete ? 'complete' : (opts.overdue ? 'overdue' : '');
  return `
    <a href="${href}" class="card ${cls}">
      <div class="date">${esc(dateLabel)}</div>
      <div class="cust">${esc(w.customer_name || '(no name)')}</div>
      <div class="addr">${esc(w.address || '')}</div>
      <div class="card-meta">
        <span class="tier">${(w.package_tier || '—').toUpperCase()} · ${esc(w.status || 'draft').replace('_',' ').toUpperCase()}</span>
        <span class="sq">${w.total_sq || '?'} SQ</span>
      </div>
    </a>
  `;
}

async function loadAll(){
  try {
    const r = await fetch('/api/workorders?limit=200', { headers: { 'x-tenant-id': 'plus-ultra' } });
    if (!r.ok) { document.getElementById('board').innerHTML = '<div class="loading" style="grid-column:1/-1">HTTP ' + r.status + '</div>'; return; }
    const { workorders } = await r.json();
    const active = (workorders || []).filter(w => ['issued','in_progress'].includes(w.status));
    const completed = (workorders || []).filter(w => w.status === 'complete')
      .sort((a,b) => new Date(b.completed_at || b.updated_at || 0) - new Date(a.completed_at || a.updated_at || 0));

    const today = [], thisWeek = [], upcoming = [], overdue = [], unscheduled = [];
    active.forEach(w => {
      const diff = daysBetween(w.start_date);
      if (diff === null) unscheduled.push(w);
      else if (diff < 0) overdue.push(w);
      else if (diff === 0 || diff === 1) today.push(w);
      else if (diff <= 7) thisWeek.push(w);
      else upcoming.push(w);
    });

    // Sort each column by start_date
    [today, thisWeek, upcoming, overdue].forEach(c => c.sort((a,b) => new Date(a.start_date) - new Date(b.start_date)));

    const col = (cls, name, list, opts={}) => `
      <div class="col ${cls}">
        <div class="col-head"><div class="name">${name}</div><div class="count">${list.length}</div></div>
        <div class="col-body">
          ${list.length ? list.map(w => card(w, opts)).join('') : '<div class="empty">NONE</div>'}
        </div>
      </div>
    `;

    document.getElementById('board').innerHTML =
      col('overdue', 'OVERDUE', overdue, {overdue: true}) +
      col('today', 'TODAY + TOMORROW', today) +
      col('week', 'THIS WEEK', thisWeek) +
      col('upcoming', 'UPCOMING + UNSCHEDULED', [...upcoming, ...unscheduled]) +
      col('completed', 'COMPLETED', completed, {complete: true});

    const total = active.length + completed.length;
    document.getElementById('countBadge').textContent = active.length + ' ACTIVE · ' + completed.length + ' DONE';
  } catch(e) {
    document.getElementById('board').innerHTML = '<div class="loading" style="grid-column:1/-1">Error: ' + e.message + '</div>';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); window.location.href = 'production.html'; } });
loadAll();
</script>

<script src="assets/ryujin-mode.js"></script>
<script src="assets/ryujin-tenant.js"></script>
<script src="assets/ryujin-persist.js"></script>

<script src="assets/ryujin-chat.js"></script>
</body>
</html>
