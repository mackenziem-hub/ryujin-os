<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f8f4ea">
<meta name="robots" content="noindex,nofollow">
<title>Plus Ultra Roofing — Document</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<style>
:root{
  --bg:#f8f4ea;
  --bg-deep:#efe7d5;
  --bg-card:#ffffff;
  --ink:#1a1f2e;
  --ink-body:#3d3228;
  --ink-muted:#7a6f5c;
  --accent:#1a3a8c;
  --accent-2:#fdcc02;
  --bronze:#7a5a32;
  --border:rgba(70,55,38,0.14);
  --border-strong:rgba(70,55,38,0.3);
  --shadow-sm:0 2px 8px rgba(60,40,20,0.08);
  --shadow:0 8px 30px rgba(60,40,20,0.12);
  --shadow-lg:0 20px 60px rgba(60,40,20,0.18);
  --success:#0a8754;
  --success-bg:rgba(10,135,84,0.08);
  --warn:#b87b00;
  --warn-bg:rgba(184,123,0,0.10);
  --danger:#c53030;
  --danger-bg:rgba(197,48,48,0.07);
  --tip:#7a5a32;
  --tip-bg:rgba(122,90,50,0.08);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--ink-body);
  line-height:1.7;
  font-size:16px;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
  background-image:
    radial-gradient(at 8% 12%, rgba(253,204,2,0.08) 0, transparent 40%),
    radial-gradient(at 92% 88%, rgba(26,58,140,0.07) 0, transparent 45%);
  background-attachment:fixed;
}
img{max-width:100%;display:block;border-radius:12px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

h1,h2,h3,h4{font-family:'Montserrat',sans-serif;color:var(--ink);font-weight:700;line-height:1.25}
h1{font-size:clamp(2rem,5vw,3rem);letter-spacing:-0.02em;font-family:'Playfair Display',serif;font-weight:700;margin-bottom:14px}
h2{font-size:clamp(1.55rem,3.4vw,2.05rem);letter-spacing:-0.01em;margin-top:48px;margin-bottom:18px;padding-top:14px;border-top:1px solid var(--border)}
h2:first-of-type{border-top:0;padding-top:0;margin-top:30px}
h3{font-size:1.22rem;margin-top:28px;margin-bottom:10px}
h4{font-size:0.85rem;margin-top:18px;margin-bottom:8px;color:var(--bronze);text-transform:uppercase;letter-spacing:0.08em}
p{margin-bottom:16px;max-width:70ch}
ul,ol{margin:0 0 18px 22px;max-width:70ch}
li{margin-bottom:8px}
strong,b{color:var(--ink);font-weight:600}
em{color:var(--bronze)}
hr{border:0;border-top:1px solid var(--border);margin:36px 0}

code{font-family:'JetBrains Mono','Menlo',monospace;font-size:0.88em;background:var(--bg-deep);padding:2px 7px;border-radius:5px;color:var(--ink)}
pre{background:var(--ink);color:#f8f4ea;padding:18px 22px;border-radius:12px;overflow-x:auto;margin:18px 0;max-width:100%;line-height:1.55;font-size:0.88em}
pre code{background:none;color:inherit;padding:0}

blockquote{
  border-left:4px solid var(--accent);background:rgba(26,58,140,0.04);
  padding:14px 20px;margin:20px 0;border-radius:0 10px 10px 0;
  color:var(--ink-body);font-style:italic;
}
blockquote p:last-child{margin-bottom:0}

/* Callout overrides — applied via JS to <blockquote> with [!note] etc */
blockquote.callout{font-style:normal;border-radius:12px;border-left-width:4px;padding:16px 22px;margin:22px 0;display:flex;gap:14px;align-items:flex-start}
blockquote.callout .cal-icon{font-size:1.4rem;line-height:1.2;flex-shrink:0;margin-top:1px}
blockquote.callout .cal-body{flex:1}
blockquote.callout .cal-label{font-family:'Montserrat',sans-serif;font-size:0.72rem;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;display:block;margin-bottom:6px}
blockquote.callout p{margin-bottom:8px}
blockquote.callout p:last-child{margin-bottom:0}
blockquote.callout-note{border-left-color:var(--accent);background:rgba(26,58,140,0.06)}
blockquote.callout-note .cal-label{color:var(--accent)}
blockquote.callout-warning{border-left-color:var(--warn);background:var(--warn-bg)}
blockquote.callout-warning .cal-label{color:var(--warn)}
blockquote.callout-tip{border-left-color:var(--tip);background:var(--tip-bg)}
blockquote.callout-tip .cal-label{color:var(--tip)}
blockquote.callout-critical{border-left-color:var(--danger);background:var(--danger-bg)}
blockquote.callout-critical .cal-label{color:var(--danger)}
blockquote.callout-success{border-left-color:var(--success);background:var(--success-bg)}
blockquote.callout-success .cal-label{color:var(--success)}

table{border-collapse:collapse;width:100%;margin:20px 0;font-size:0.94em;background:var(--bg-card);border-radius:10px;overflow:hidden;box-shadow:var(--shadow-sm)}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
th{background:var(--bg-deep);font-family:'Montserrat',sans-serif;font-weight:700;font-size:0.82rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink)}
tr:last-child td{border-bottom:0}

.kicker{
  font-family:'Inter',sans-serif;font-size:0.72rem;font-weight:700;
  letter-spacing:0.22em;text-transform:uppercase;color:var(--bronze);margin-bottom:10px;
}

/* HERO */
.hero{
  position:relative;overflow:hidden;
  padding:48px 0 50px;
}
.hero::before{
  content:'';position:absolute;top:0;left:0;width:200px;height:200px;
  background:var(--accent-2);clip-path:polygon(0 0,100% 0,0 100%);opacity:0.9;z-index:0;
}
.hero::after{
  content:'';position:absolute;bottom:0;right:0;width:240px;height:240px;
  background:var(--accent);clip-path:polygon(100% 0,100% 100%,0 100%);opacity:0.92;z-index:0;
}
@media (max-width:720px){
  .hero::before{width:110px;height:110px}
  .hero::after{width:130px;height:130px}
}
.hero-inner{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:0 24px}
.hero-header{display:flex;align-items:center;gap:18px;margin-bottom:30px;flex-wrap:wrap}
.hero-header .brand-text{font-family:'Montserrat',sans-serif;font-weight:800;font-size:0.85rem;letter-spacing:0.06em;color:var(--ink);line-height:1.15}
.hero-header .brand-text small{display:block;font-size:0.66rem;font-weight:500;color:var(--ink-muted);letter-spacing:0.16em;margin-top:2px}
.hero-header .spacer{flex:1}
.hero-header .doc-tag{
  font-family:'Montserrat',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.18em;
  color:var(--bronze);background:rgba(255,255,255,0.7);backdrop-filter:blur(6px);
  padding:7px 14px;border-radius:999px;border:1px solid var(--border-strong);
  text-transform:uppercase;
}
.hero-photo{
  width:100%;aspect-ratio:21/8;border-radius:16px;overflow:hidden;
  box-shadow:var(--shadow-lg);margin-bottom:28px;
  background:linear-gradient(135deg,#1a2030,#0a0e18);
}
.hero-photo img{width:100%;height:100%;object-fit:cover}
.hero-title-wrap{
  background:rgba(255,255,255,0.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.6);
  padding:34px 38px;border-radius:16px;box-shadow:var(--shadow);
}
.hero-title-wrap h1{margin:0 0 6px}
.hero-title-wrap .sub{color:var(--ink-muted);font-size:1.02rem;max-width:65ch}
.hero-badges{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.hero-badge{
  font-family:'Montserrat',sans-serif;font-size:0.74rem;font-weight:700;letter-spacing:0.06em;
  background:var(--accent);color:#fff;padding:7px 14px;border-radius:999px;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
}
.hero-badge:hover{background:#0f2a6e;text-decoration:none}
.hero-badge.alt{background:var(--accent-2);color:var(--ink)}
.hero-badge.alt:hover{background:#e0b302}
.hero-badge.ghost{background:rgba(255,255,255,0.6);color:var(--ink);border:1px solid var(--border-strong)}

/* LAYOUT */
.shell{max-width:1180px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:240px 1fr;gap:48px;align-items:start}
@media (max-width:920px){.shell{grid-template-columns:1fr;gap:24px}}

/* TOC */
.toc{
  position:sticky;top:24px;background:rgba(255,255,255,0.72);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:14px;padding:18px 20px;
  font-size:0.88rem;max-height:calc(100vh - 48px);overflow-y:auto;
  box-shadow:var(--shadow-sm);
}
.toc-title{font-family:'Montserrat',sans-serif;font-size:0.7rem;font-weight:800;letter-spacing:0.18em;color:var(--bronze);text-transform:uppercase;margin-bottom:12px}
.toc ul{margin:0;padding:0;list-style:none}
.toc li{margin-bottom:6px}
.toc li.toc-h3{margin-left:14px;font-size:0.84rem}
.toc a{color:var(--ink-muted);display:block;padding:4px 0;border-left:2px solid transparent;padding-left:10px;transition:all 0.15s}
.toc a:hover,.toc a.active{color:var(--accent);border-left-color:var(--accent);text-decoration:none;background:rgba(26,58,140,0.04)}
@media (max-width:920px){
  body{overflow-x:hidden}
  .toc{position:static;max-height:none;margin-bottom:18px}
  .toc, .toc ul, .toc li{max-width:100%}
  .toc a{max-width:100%;overflow-wrap:anywhere;word-break:break-word}
  .shell{padding:0 16px}
  .content{padding:24px 18px}
}

/* CONTENT */
.content{
  background:var(--bg-card);border-radius:18px;padding:48px 56px;
  box-shadow:var(--shadow);border:1px solid var(--border);
  min-height:60vh;
}
@media (max-width:720px){.content{padding:28px 22px}}
.content h2{scroll-margin-top:24px}
.content h3{scroll-margin-top:24px}

/* FOOTER */
.footer{
  text-align:center;padding:40px 24px 60px;color:var(--ink-muted);font-size:0.84rem;
}
.footer .meta{margin-top:8px;font-size:0.76rem;letter-spacing:0.04em}

/* BACK BUTTON (sticky, big, white — hidden in pdf+preview) */
.back-bar{position:fixed;top:18px;left:18px;z-index:100}
.back-bar a{
  display:inline-flex;align-items:center;gap:10px;
  background:#fff;color:var(--ink);
  padding:12px 20px;border-radius:999px;
  font-family:'Montserrat',sans-serif;font-weight:700;font-size:0.88rem;letter-spacing:0.02em;
  text-decoration:none;border:1.5px solid var(--border-strong);
  box-shadow:var(--shadow);
  transition:all 0.15s ease;
}
.back-bar a:hover{transform:translateX(-2px);box-shadow:var(--shadow-lg);text-decoration:none;background:#fff;border-color:var(--accent);color:var(--accent)}
.back-bar svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
body.pdf-mode .back-bar,body.preview-mode .back-bar{display:none}
@media (max-width:720px){.back-bar{top:12px;left:12px}.back-bar a{padding:10px 16px;font-size:0.82rem}}

/* PRINT (PDF) */
body.pdf-mode{background:#fff;background-image:none}
body.pdf-mode .toc,body.pdf-mode .hero::before,body.pdf-mode .hero::after{display:none}
body.pdf-mode .shell{grid-template-columns:1fr;max-width:100%;padding:0}
body.pdf-mode .content{box-shadow:none;border:0;padding:24px 36px;border-radius:0}
body.pdf-mode .hero{padding:24px 0 18px}
body.pdf-mode .hero-title-wrap{box-shadow:none;border:1px solid var(--border)}
body.pdf-mode h2{break-before:auto;break-after:avoid}
body.pdf-mode pre,body.pdf-mode blockquote.callout,body.pdf-mode table{break-inside:avoid}

/* PREVIEW (admin iframe) */
body.preview-mode .hero{padding:24px 0 28px}
body.preview-mode .footer{display:none}

/* LOADING */
.loading{padding:80px 24px;text-align:center;color:var(--ink-muted)}
.loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{padding:60px 24px;text-align:center;color:var(--danger);background:var(--danger-bg);border-radius:14px;margin:40px 24px}
</style>
</head>
<body>
<div class="back-bar"><a href="javascript:void(0)" onclick="docBack()" aria-label="Back to Files"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Back to Files</a></div>
<div id="app" class="loading"><div class="spinner"></div><p style="margin-top:14px">Loading document…</p></div>
<script>
function docBack(){
  try{
    if (history.length > 1 && document.referrer && new URL(document.referrer).origin === location.origin){ history.back(); return; }
  }catch(e){}
  location.href = '/admin.html#documents';
}
</script>

<script>
const params = new URLSearchParams(location.search);
const TENANT = (params.get('tenant') || 'plus-ultra').trim();
const slug = (params.get('slug') || '').trim();
const isPdf = params.get('pdf') === '1';
const isPreview = params.get('preview') === '1';

function escAttr(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function safeUrl(u) {
  const s = String(u || '').trim();
  if (!s) return '';
  if (/^(https?:|\/|#)/i.test(s)) return escAttr(s);
  return '';
}

if (isPdf) document.body.classList.add('pdf-mode');
if (isPreview) document.body.classList.add('preview-mode');

if (!slug) {
  document.getElementById('app').innerHTML = `<div class="error-state">No document slug specified. Use <code>?slug=document-name</code></div>`;
} else {
  loadDoc();
}

function parseFrontmatter(md) {
  if (!md.startsWith('---')) return { meta: {}, body: md };
  const end = md.indexOf('\n---', 3);
  if (end === -1) return { meta: {}, body: md };
  const yaml = md.slice(3, end).trim();
  const body = md.slice(end + 4).trimStart();
  const meta = {};
  yaml.split('\n').forEach(line => {
    const m = line.match(/^([a-z_][a-z0-9_]*)\s*:\s*(.*)$/i);
    if (m) {
      let v = m[2].trim();
      if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) v = v.slice(1, -1);
      meta[m[1]] = v;
    }
  });
  return { meta, body };
}

function applyCallouts(html) {
  return html.replace(
    /<blockquote>\s*<p>\s*\[!(\w+)\]\s*([\s\S]*?)<\/blockquote>/gi,
    (_, type, rest) => {
      const t = type.toLowerCase().replace(/[^a-z]/g, '');
      const icons = { note:'i', warning:'!', tip:'+', critical:'×', success:'✓' };
      const labels = { note:'Note', warning:'Warning', tip:'Tip', critical:'Critical', success:'Confirmed' };
      const icon = icons[t] || 'i';
      const label = labels[t] || 'Note';
      const safeClass = ['note','warning','tip','critical','success'].includes(t) ? t : 'note';
      return `<blockquote class="callout callout-${safeClass}"><div class="cal-icon">${icon}</div><div class="cal-body"><span class="cal-label">${label}</span>${rest.replace(/<\/p>$/,'</p>')}</blockquote>`;
    }
  );
}

function buildToc(content) {
  const headings = content.querySelectorAll('h2, h3');
  if (!headings.length) return '';
  let html = '<div class="toc-title">Contents</div><ul>';
  headings.forEach(h => {
    const id = h.id || h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    h.id = id;
    const cls = h.tagName === 'H3' ? 'toc-h3' : 'toc-h2';
    html += `<li class="${cls}"><a href="#${id}">${h.textContent}</a></li>`;
  });
  html += '</ul>';
  return html;
}

function setupScrollSpy() {
  const links = document.querySelectorAll('.toc a');
  const headings = Array.from(document.querySelectorAll('.content h2, .content h3'));
  if (!headings.length) return;
  const onScroll = () => {
    let active = headings[0];
    for (const h of headings) {
      if (h.getBoundingClientRect().top < 120) active = h;
    }
    links.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + active.id));
  };
  document.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
}

async function loadDoc() {
  try {
    const r = await fetch(`/api/docs?slug=${encodeURIComponent(slug)}&tenant=${TENANT}`);
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${r.status}`);
    }
    const doc = await r.json();
    render(doc);
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="error-state">Could not load document: ${e.message}</div>`;
  }
}

function render(doc) {
  const { meta, body } = parseFrontmatter(doc.markdown || '');
  document.title = `${doc.title} · Plus Ultra Roofing`;

  marked.setOptions({ gfm: true, breaks: false, headerIds: true, mangle: false });
  let bodyHtml = marked.parse(body);
  bodyHtml = applyCallouts(bodyHtml);
  bodyHtml = DOMPurify.sanitize(bodyHtml, { USE_PROFILES: { html: true } });

  const heroImage = safeUrl(doc.hero_image || meta.hero_image || '');
  const summary = escAttr(doc.summary || meta.summary || '');
  const title = escAttr(doc.title || '');
  const docTag = escAttr(meta.doc_tag || (doc.is_system_managed ? 'KNOWLEDGE BASE' : 'PLUS ULTRA DOCUMENT'));

  const badges = [];
  if (doc.gamma_url) {
    const u = safeUrl(doc.gamma_url);
    if (u) badges.push(`<a class="hero-badge alt" href="${u}" target="_blank" rel="noopener">View as Gamma deck</a>`);
  }
  if (doc.notebook_url) {
    const u = safeUrl(doc.notebook_url);
    if (u) badges.push(`<a class="hero-badge" href="${u}" target="_blank" rel="noopener">Audio overview</a>`);
  }
  if (!isPreview && !isPdf) {
    badges.push(`<a class="hero-badge ghost" href="/api/docs-pdf?slug=${encodeURIComponent(slug)}&tenant=${encodeURIComponent(TENANT)}" target="_blank" rel="noopener">Download PDF</a>`);
  }

  const updated = doc.updated_at ? new Date(doc.updated_at).toLocaleDateString('en-CA', { year:'numeric', month:'short', day:'numeric' }) : '';

  document.getElementById('app').classList.remove('loading');
  document.getElementById('app').innerHTML = `
    <header class="hero">
      <div class="hero-inner">
        <div class="hero-header">
          <div class="brand-text">PLUS ULTRA ROOFING<small>RIVERVIEW · MONCTON · NB</small></div>
          <div class="spacer"></div>
          <div class="doc-tag">${docTag}</div>
        </div>
        ${heroImage ? `<div class="hero-photo"><img src="${heroImage}" alt=""></div>` : ''}
        <div class="hero-title-wrap">
          <h1>${title}</h1>
          ${summary ? `<p class="sub">${summary}</p>` : ''}
          ${badges.length ? `<div class="hero-badges">${badges.join('')}</div>` : ''}
        </div>
      </div>
    </header>
    <div class="shell">
      <aside class="toc" id="toc"></aside>
      <main class="content" id="content">${bodyHtml}</main>
    </div>
    <footer class="footer">
      <div>Plus Ultra Roofing · plusultraroofing.com · (506) 540-1052</div>
      ${updated ? `<div class="meta">Last updated ${updated} · v${doc.version || 1}</div>` : ''}
    </footer>
  `;

  const content = document.getElementById('content');
  document.getElementById('toc').innerHTML = buildToc(content);
  setupScrollSpy();

  if (isPdf) {
    document.documentElement.classList.add('pdf-ready');
    Array.from(document.images).forEach(i => { i.loading = 'eager'; });
  }
}
</script>
</body>
</html>
