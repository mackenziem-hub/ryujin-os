<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Roofing Contract &middot; Plus Ultra Roofing</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="/brand/plus-ultra/favicon-mark.png">
<link rel="apple-touch-icon" href="/brand/plus-ultra/favicon-mark.png">

<!-- Fonts: Fraunces (display) + Inter (body), copied from proposal-v2.html. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap">

<!-- The shared Jewels visual language. ONE stylesheet, every component under .pv2. -->
<link rel="stylesheet" href="/proposal-v2.css">

<style>
  /* Contract-specific chrome. Everything visual leans on proposal-v2.css tokens;
     these rules cover load/error states, the selectable tier radios, the payment
     table, terms list, signature pad, and the print/freeze block the stylesheet
     does not own. No em or en dashes anywhere, comments included. */
  html,body{margin:0;padding:0}

  .cv2-boot{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:var(--cream,#f8f4ea);color:var(--ink-soft,#5c5a54);
    font-family:'Inter',system-ui,sans-serif;font-size:15px;
    text-align:center;padding:32px;
  }
  .cv2-boot__spinner{
    width:34px;height:34px;border-radius:50%;
    border:3px solid var(--line,#e6ddc9);border-top-color:var(--bronze,#b08d57);
    margin:0 auto 18px;animation:cv2-spin .9s linear infinite;
  }
  @keyframes cv2-spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.cv2-boot__spinner{animation:none}}

  /* The page shell: a single centered measure of cream-2 cards on cream. */
  .cv2-page{
    max-width:860px;margin:0 auto;padding:var(--s-5,40px) var(--s-3,24px) var(--s-8,80px);
  }
  .cv2-masthead{
    text-align:center;margin-bottom:var(--s-5,40px);
  }
  .cv2-masthead__eyebrow{
    font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;color:var(--bronze,#b08d57);margin:0 0 10px;
  }
  .cv2-masthead h1{
    font-family:'Fraunces','Georgia',serif;color:var(--royal-deep,#13294b);
    font-size:34px;line-height:1.1;margin:0 0 8px;font-weight:600;
  }
  .cv2-masthead__sub{color:var(--ink-soft,#5c5a54);font-size:15px;margin:0}

  /* A contract body block. Each is its own card and never splits across a PDF
     page (break-inside:avoid is also asserted in the print block + the PDF
     endpoint's addStyleTag, so the screen and server PDF agree). */
  .cv2-block{
    background:var(--cream-2,#fffdf7);
    border:1px solid var(--line,#e6ddc9);
    border-radius:var(--r-lg,16px);
    box-shadow:var(--shadow-sm,0 4px 14px rgba(19,41,75,.08));
    padding:var(--s-4,32px) var(--s-4,32px);
    margin:0 0 var(--s-3,24px);
    break-inside:avoid;page-break-inside:avoid;
  }
  .cv2-block__title{
    font-family:'Fraunces','Georgia',serif;color:var(--royal,#1b3a6b);
    font-size:20px;font-weight:600;margin:0 0 16px;
    padding-bottom:10px;border-bottom:1px solid var(--line,#e6ddc9);
  }

  /* Parties: two columns, contractor + customer. */
  .cv2-parties{display:grid;grid-template-columns:1fr 1fr;gap:var(--s-3,24px)}
  @media (max-width:560px){.cv2-parties{grid-template-columns:1fr}}
  .cv2-party__role{
    font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:var(--bronze,#b08d57);margin:0 0 8px;
  }
  .cv2-party__name{font-weight:700;color:var(--ink,#2a2a28);font-size:16px;margin:0 0 4px}
  .cv2-party__line{color:var(--ink-soft,#5c5a54);font-size:14px;line-height:1.5}

  /* Scope of work: numbered measured line items, reuse the proposal scope look. */
  .cv2-scope__row{
    display:flex;align-items:baseline;gap:14px;
    padding:10px 0;border-bottom:1px solid var(--line,#e6ddc9);
  }
  .cv2-scope__row:last-child{border-bottom:none}
  .cv2-scope__num{
    flex:0 0 auto;width:24px;height:24px;border-radius:var(--r-pill,999px);
    background:var(--royal-tint,rgba(27,58,107,.06));color:var(--royal,#1b3a6b);
    font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;
  }
  .cv2-scope__label{flex:1 1 auto;color:var(--ink,#2a2a28);font-size:14px}
  .cv2-scope__qty{flex:0 0 auto;color:var(--ink-soft,#5c5a54);font-size:13px;font-weight:600;text-align:right}

  /* Selectable tier radio cards. Reuse the .pv2-tier card look with a bronze rail
     on the checked one. The radio input itself is visually hidden; the label is
     the whole card. */
  .cv2-tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s-2,16px);margin:0 0 var(--s-3,24px)}
  @media (max-width:720px){.cv2-tiers{grid-template-columns:1fr}}
  .cv2-tier{
    position:relative;display:block;cursor:pointer;
    background:var(--cream-2,#fffdf7);
    border:1px solid var(--line,#e6ddc9);
    border-radius:var(--r-lg,16px);
    padding:var(--s-3,24px) var(--s-2,16px);
    transition:border-color var(--speed,.16s) var(--ease,ease),box-shadow var(--speed,.16s) var(--ease,ease),transform var(--speed,.16s) var(--ease,ease);
  }
  .cv2-tier:hover{border-color:var(--bronze-soft,#e7d8bf);box-shadow:var(--shadow-sm,0 4px 14px rgba(19,41,75,.08))}
  .cv2-tier input[type="radio"]{position:absolute;opacity:0;width:1px;height:1px;pointer-events:none}
  .cv2-tier.is-checked{
    border-color:var(--bronze,#b08d57);
    box-shadow:0 0 0 2px var(--bronze,#b08d57),var(--shadow-lift,0 16px 40px rgba(176,141,87,.22));
  }
  .cv2-tier.is-checked::before{
    content:"";position:absolute;left:0;top:14px;bottom:14px;width:4px;
    border-radius:0 4px 4px 0;background:var(--bronze,#b08d57);
  }
  .cv2-tier__grade{
    font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:var(--bronze,#b08d57);margin:0 0 6px;
  }
  .cv2-tier__name{font-family:'Fraunces','Georgia',serif;color:var(--royal-deep,#13294b);font-size:18px;font-weight:600}
  .cv2-tier__sub{color:var(--ink-soft,#5c5a54);font-size:13px;margin:2px 0 12px}
  .cv2-tier__price{font-family:'Fraunces','Georgia',serif;color:var(--royal,#1b3a6b);font-size:24px;font-weight:600}
  .cv2-tier__pn{color:var(--ink-soft,#5c5a54);font-size:12px;margin-top:2px}
  .cv2-tier__radio-label{
    display:inline-flex;align-items:center;gap:8px;margin-top:14px;
    font-size:13px;font-weight:600;color:var(--royal,#1b3a6b);
  }
  .cv2-tier__dot{
    width:16px;height:16px;border-radius:50%;border:2px solid var(--line,#e6ddc9);
    flex:0 0 auto;position:relative;
  }
  .cv2-tier.is-checked .cv2-tier__dot{border-color:var(--bronze,#b08d57)}
  .cv2-tier.is-checked .cv2-tier__dot::after{
    content:"";position:absolute;inset:3px;border-radius:50%;background:var(--bronze,#b08d57);
  }

  /* Pricing summary block. */
  .cv2-pricerow{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;font-size:15px;color:var(--ink,#2a2a28)}
  .cv2-pricerow + .cv2-pricerow{border-top:1px solid var(--line,#e6ddc9)}
  .cv2-pricerow__label{color:var(--ink-soft,#5c5a54)}
  .cv2-pricerow--total{
    margin-top:8px;padding-top:14px;border-top:2px solid var(--royal,#1b3a6b);
    font-family:'Fraunces','Georgia',serif;font-size:22px;color:var(--royal-deep,#13294b);font-weight:600;
  }
  .cv2-pricerow--total .cv2-pricerow__amt{color:var(--bronze,#b08d57)}

  /* Payment schedule table. */
  .cv2-paytable{width:100%;border-collapse:collapse;font-size:14px}
  .cv2-paytable th,.cv2-paytable td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line,#e6ddc9)}
  .cv2-paytable th{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft,#5c5a54)}
  .cv2-paytable td{color:var(--ink,#2a2a28)}
  .cv2-paytable td.cv2-amt{text-align:right;font-weight:700;color:var(--royal,#1b3a6b)}
  .cv2-paytable tr:last-child td{border-bottom:none}

  /* Warranty + terms copy. */
  .cv2-prose{color:var(--ink,#2a2a28);font-size:14px;line-height:1.65;margin:0 0 12px}
  .cv2-prose:last-child{margin-bottom:0}
  .cv2-terms{margin:0;padding-left:22px;color:var(--ink,#2a2a28);font-size:14px;line-height:1.6}
  .cv2-terms li{margin:0 0 8px}

  /* Signature block: live pad for the customer, pre-printed contractor line. */
  .cv2-sigs{display:grid;grid-template-columns:1fr 1fr;gap:var(--s-4,32px)}
  @media (max-width:560px){.cv2-sigs{grid-template-columns:1fr}}
  .cv2-sig__role{
    font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:var(--bronze,#b08d57);margin:0 0 10px;
  }
  .cv2-sig{
    background:var(--cream,#f8f4ea);
    border:1px dashed var(--line,#e6ddc9);
    border-radius:var(--r-md,12px);
    padding:12px;
  }
  .cv2-sig.is-bad{border-color:#c1532f;background:#fbeee9}
  .cv2-sig__pad{
    position:relative;width:100%;height:130px;
    background:var(--cream-2,#fffdf7);border-radius:var(--r-sm,8px);
    touch-action:none;cursor:crosshair;
  }
  .cv2-sig__pad canvas{width:100%;height:100%;display:block;border-radius:var(--r-sm,8px)}
  .cv2-sig__hint{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#9a8e76;font-size:14px;pointer-events:none;
    font-family:'Fraunces','Georgia',serif;font-style:italic;
  }
  .cv2-sig.is-signed .cv2-sig__hint{display:none}
  .cv2-sig__row{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:10px;font-size:12px;color:var(--ink-soft,#5c5a54);
  }
  .cv2-sig__clear{
    background:transparent;border:1px solid var(--line,#e6ddc9);
    color:var(--royal,#1b3a6b);border-radius:6px;padding:6px 14px;
    font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;
  }
  .cv2-sig__clear:hover{background:var(--royal-tint,rgba(27,58,107,.06))}
  .cv2-sig__date{margin-top:12px;font-size:13px;color:var(--ink-soft,#5c5a54)}
  .cv2-sig__name{margin-top:10px;font-weight:700;color:var(--ink,#2a2a28);font-size:15px}
  .cv2-sig__line{
    margin-top:36px;border-top:1.5px solid var(--royal,#1b3a6b);
    padding-top:6px;font-size:13px;color:var(--ink-soft,#5c5a54);
  }

  /* The sign-and-execute action. */
  .cv2-actions{text-align:center;margin-top:var(--s-3,24px)}
  .cv2-signbtn{
    background:var(--bronze,#b08d57);color:#fff;border:1.5px solid var(--bronze,#b08d57);
    border-radius:var(--r-md,12px);padding:15px 36px;
    font-family:'Inter',sans-serif;font-size:16px;font-weight:700;letter-spacing:.01em;
    cursor:pointer;box-shadow:var(--shadow-lift,0 16px 40px rgba(176,141,87,.22));
    transition:background var(--speed,.16s) var(--ease,ease);
  }
  .cv2-signbtn:hover{background:#9c7c4c}
  .cv2-signbtn:disabled{opacity:.6;cursor:default}

  /* Locked confirmation panel, revealed after a successful sign. */
  .cv2-locked{
    display:none;text-align:center;
    background:var(--cream-2,#fffdf7);
    border:1px solid var(--bronze,#b08d57);border-top:4px solid var(--bronze,#b08d57);
    border-radius:var(--r-lg,16px);box-shadow:var(--shadow-lift,0 16px 40px rgba(176,141,87,.22));
    padding:var(--s-5,40px) var(--s-4,32px);margin:var(--s-3,24px) 0 0;
  }
  .cv2-locked.is-open{display:block}
  .cv2-locked__seal{
    width:60px;height:60px;border-radius:50%;background:var(--success,#3f7d5b);
    margin:0 auto 16px;display:flex;align-items:center;justify-content:center;
  }
  .cv2-locked__seal svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
  .cv2-locked h3{font-family:'Fraunces','Georgia',serif;color:var(--royal-deep,#13294b);font-size:24px;margin:0 0 8px}
  .cv2-locked p{color:var(--ink-soft,#5c5a54);font-size:15px;margin:0 0 6px}
  .cv2-locked__amt{font-family:'Fraunces','Georgia',serif;color:var(--bronze,#b08d57);font-size:22px;margin:14px 0}
  .cv2-download{
    display:inline-flex;align-items:center;gap:8px;margin-top:14px;
    background:var(--royal-deep,#13294b);color:#fff;text-decoration:none;
    border-radius:var(--r-pill,999px);padding:12px 24px;
    font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
  }
  .cv2-download:hover{background:var(--royal,#1b3a6b)}
  .cv2-download svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  .cv2-err{display:none;text-align:center;color:#c1532f;font-size:14px;margin-top:14px}
  .cv2-err.is-on{display:block}

  /* PRINT / FREEZE: drives both the in-browser print path and the ?pdf=1 mode.
     Every contract section stays whole across a page break; all interactive
     chrome (radios, buttons, signature controls) is suppressed. */
  .cv2-pdf input[type="radio"],
  .cv2-pdf button,
  .cv2-pdf .cv2-sig__clear,
  .cv2-pdf .cv2-sig__row,
  .cv2-pdf .cv2-actions,
  .cv2-pdf .cv2-err{display:none !important}
  @media print{
    input[type="radio"],button,.cv2-sig__clear,.cv2-sig__row,.cv2-actions,.cv2-err{display:none !important}
    .cv2-block,.cv2-section,.cv2-locked{break-inside:avoid;page-break-inside:avoid}
    .pv2,body{background:#fff !important}
  }
</style>
</head>
<body class="pv2">

<main id="cv2-root">
  <div class="cv2-boot" id="cv2-boot">
    <div>
      <div class="cv2-boot__spinner" aria-hidden="true"></div>
      Preparing your contract.
    </div>
  </div>
</main>

<script>
/* ============================================================================
   contract-v2.html  ::  the customer-facing contract FORM

   Served at /c/<slug> via a Vercel rewrite to ?instance=<slug>. Fetches the
   SAME ProposalData /api/proposal-v2 returns, ports the proposal-v2.html
   pricing helpers and signature pad VERBATIM so the contract price equals the
   proposal price to the dollar, renders the selectable tier cards plus the
   contract body (parties, scope, pricing, payment schedule, warranty, terms,
   signature), and posts the exact accept payload to /api/proposal-v2-accept.

   ?pdf=1 freezes the page for the server PDF renderer: radios/buttons/sig
   chrome hidden, the ?tier= card pinned, and a window.__CONTRACT_READY sentinel
   flipped once the body has rendered + images have loaded.

   No em or en dashes anywhere, comments included.
   ========================================================================== */

(function () {
  'use strict';

  var DATA = null;
  var ctx = null;

  // The live selection state for the contract. tierId + panelSel drive the price.
  var state = {
    tierId: null,
    pathId: null,
    panelSel: null,
    pdfMode: false,
    pinnedTier: null,
    pinnedPanel: null
  };

  /* --------------------------------------------------------------------------
     SMALL HELPERS
     -------------------------------------------------------------------------- */
  function $(sel, root) { return (root || document).querySelector(sel); }

  function el(tag, cls, html) {
    var node = document.createElement(tag);
    if (cls) node.className = cls;
    if (html != null) node.innerHTML = html;
    return node;
  }

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  /* ---- PORTED VERBATIM from proposal-v2.html: pricing helpers --------------
     money, round25, taxRate, activeTiers, activePanels, tierTotal, effTier,
     findTier, getAddons/addonsSubtotal/selectedAddonsList, computeTotals.
     The math MUST match the proposal to the dollar. */

  // Currency, whole dollars, Canadian grouping.
  function money(n) {
    return '$' + (Math.round(Number(n) || 0)).toLocaleString('en-CA');
  }

  // Round a display amount to the nearest 25 dollars (house rule).
  function round25(n) {
    return Math.round((Number(n) || 0) / 25) * 25;
  }

  // The tax rate the data carries, defaulting to NB HST.
  function taxRate() {
    var p = DATA && DATA.products;
    return (p && typeof p.taxRate === 'number') ? p.taxRate : 0.15;
  }

  // Resolve the tier list for the active products mode and path.
  function activeTiers() {
    var p = DATA.products || {};
    if (p.mode === 'two_path' && p.twoPath) {
      var path = (state.pathId === 'A') ? p.twoPath.pathA : p.twoPath.pathB;
      return (path && path.tiers) || [];
    }
    return p.tiers || [];
  }

  // The metal panel profiles for the active mode/path, or null when not metal.
  function activePanels() {
    var p = DATA.products || {};
    if (p.mode === 'two_path' && p.twoPath) {
      var path = (state.pathId === 'A') ? p.twoPath.pathA : p.twoPath.pathB;
      if (path && Array.isArray(path.panels) && path.panels.length) {
        return { panels: path.panels, def: path.defaultPanel || path.panels[0] };
      }
      return null;
    }
    if (Array.isArray(p.panels) && p.panels.length) {
      return { panels: p.panels, def: p.defaultPanel || p.panels[0] };
    }
    return null;
  }

  var PANEL_LABELS = {
    flat: 'Standard Ribbed',
    wavy: 'European Clay',
    stand: 'Standing Seam'
  };

  // Pre-tax total for a tier, panel-aware. A metal tier carries panelPrices
  // { flat, wavy, stand }; the charged base follows the active panel.
  function tierTotal(t) {
    if (!t) return 0;
    if (t.panelPrices) {
      var ap = activePanels();
      var sel = state.panelSel || (ap && ap.def) || 'flat';
      var v = t.panelPrices[sel];
      if (v == null && ap && ap.def != null) v = t.panelPrices[ap.def];
      if (v != null) return Number(v) || 0;
    }
    return Number(t.total) || 0;
  }

  // Resolve the active variant of a multi-variant card. Plain cards pass through.
  function effTier(t) {
    if (!t || !t.variants || !t.variants.length) return t;
    var sel = (DATA && DATA.products && DATA.products.recommended);
    // The contract pins a tier directly; honour the selected id when it maps to
    // a variant, else the first variant.
    for (var i = 0; i < t.variants.length; i++) {
      if (t.variants[i].id === state.tierId) return t.variants[i];
    }
    return t.variants[0];
  }

  function findTier(id) {
    var list = activeTiers();
    for (var i = 0; i < list.length; i++) {
      var t = list[i];
      if (t.id === id) return effTier(t);
      if (t.variants) {
        for (var j = 0; j < t.variants.length; j++) {
          if (t.variants[j].id === id) return t.variants[j];
        }
      }
    }
    return list[0] ? effTier(list[0]) : null;
  }

  function getAddons() {
    var p = DATA.products || {};
    return Array.isArray(p.addons) ? p.addons : [];
  }

  // Selected add-ons. The contract surfaces the proposal's already-accepted
  // add-on selection when present; otherwise it carries none (the proposal is
  // where add-ons are toggled). state.addons is a Set of selected slugs.
  function selectedAddonSet() {
    if (state._addonSet) return state._addonSet;
    var set = {};
    var accepted = DATA && DATA.accepted_payload;
    var list = accepted && Array.isArray(accepted.addons) ? accepted.addons : [];
    list.forEach(function (a) {
      var slug = (typeof a === 'string') ? a : (a && a.slug);
      if (slug) set[slug] = true;
    });
    state._addonSet = set;
    return set;
  }

  function addonsSubtotal() {
    var set = selectedAddonSet();
    var sum = 0;
    getAddons().forEach(function (a) {
      if (set[a.slug]) sum += Number(a.price) || 0;
    });
    return sum;
  }

  function selectedAddonsList() {
    var set = selectedAddonSet();
    return getAddons()
      .filter(function (a) { return set[a.slug]; })
      .map(function (a) { return { slug: a.slug, label: a.label, price: Number(a.price) || 0 }; });
  }

  // The single source of truth for the displayed number, ported verbatim.
  // Pre-tax base = selected tier total + selected add-ons.
  // Displayed total = base x (1 + tax), rounded to nearest 25.
  function computeTotals() {
    var t = findTier(state.tierId);
    var base = (t ? tierTotal(t) : 0) + addonsSubtotal();
    var withTax = base * (1 + taxRate());
    var display = round25(withTax);
    return { tier: t, base: base, withTax: withTax, display: display };
  }

  /* ---- token resolution (light port; the API already resolves tokens) ----- */
  function resolveVars(input) {
    if (input == null) return '';
    var str = String(input);
    if (str.indexOf('{{') === -1) return str;
    var vars = (ctx && ctx.variables) || {};
    return str.replace(/\{\{\s*([\w.]+)\s*\}\}/g, function (whole, key) {
      if (Object.prototype.hasOwnProperty.call(vars, key)) {
        var v = vars[key];
        return (v == null) ? '' : String(v);
      }
      return '';
    });
  }

  /* ---- signature capture (PORTED VERBATIM from proposal-v2.html) ----------- */
  var signatureData = null;
  function initSignature() {
    var canvas = $('#cv2-sig-canvas');
    if (!canvas) return;
    var pen = canvas.getContext('2d');
    function resize() {
      var rect = canvas.getBoundingClientRect();
      var dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      pen.setTransform(dpr, 0, 0, dpr, 0, 0);
      pen.strokeStyle = '#13294b';
      pen.lineWidth = 2;
      pen.lineCap = 'round';
      pen.lineJoin = 'round';
    }
    resize();
    window.addEventListener('resize', resize);

    var drawing = false, hasDrawn = false;
    function pos(e) {
      var rect = canvas.getBoundingClientRect();
      var t = e.touches ? e.touches[0] : e;
      return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }
    function start(e) {
      e.preventDefault(); drawing = true;
      var p = pos(e); pen.beginPath(); pen.moveTo(p.x, p.y);
      var sig = $('#cv2-sig'); if (sig) sig.classList.remove('is-bad');
    }
    function move(e) {
      if (!drawing) return; e.preventDefault();
      var p = pos(e); pen.lineTo(p.x, p.y); pen.stroke(); hasDrawn = true;
    }
    function done() {
      if (!drawing) return; drawing = false;
      if (hasDrawn) {
        signatureData = canvas.toDataURL('image/png');
        var sig = $('#cv2-sig'); if (sig) sig.classList.add('is-signed');
      }
    }
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', done);
    canvas.addEventListener('mouseleave', done);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', done);
  }
  function clearSignature() {
    var canvas = $('#cv2-sig-canvas');
    if (!canvas) return;
    var pen = canvas.getContext('2d');
    pen.clearRect(0, 0, canvas.width, canvas.height);
    signatureData = null;
    var sig = $('#cv2-sig');
    if (sig) sig.classList.remove('is-signed');
  }

  /* ---- sign flow ----------------------------------------------------------
     Builds the EXACT payload proposal-v2.html's acceptProposal sends, posts to
     the same /api/proposal-v2-accept, then reveals the locked panel + download. */
  var accepted = false;
  function signContract() {
    if (accepted) return;
    var errEl = $('#cv2-err');
    if (errEl) { errEl.classList.remove('is-on'); errEl.textContent = ''; }

    if (!signatureData) {
      var sig = $('#cv2-sig');
      if (sig) {
        sig.classList.add('is-bad');
        sig.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      return;
    }

    var totals = computeTotals();
    var t = totals.tier;
    accepted = true;

    var payload = {
      instanceSlug: DATA.meta && DATA.meta.instanceSlug,
      estimateId: DATA.meta && DATA.meta.estimateId,
      refId: DATA.meta && DATA.meta.refId,
      tierId: t ? t.id : null,
      tier: t ? { id: t.id, name: t.name, sub: t.sub, total: tierTotal(t) } : null,
      panel: (t && t.panelPrices) ? state.panelSel : null,
      addons: selectedAddonsList(),
      addonsSubtotal: addonsSubtotal(),
      baseTotal: totals.base,
      totalWithTax: totals.display,
      signature: signatureData,
      acceptedAt: new Date().toISOString()
    };

    var btn = $('#cv2-sign-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Signing...'; }

    fetch('/api/proposal-v2-accept', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
      .then(function (res) {
        // res.ok covers a fresh accept; an already_accepted case also returns a
        // 200 from the endpoint, so any 2xx reveals the locked panel.
        if (res.ok) return res.json().catch(function () { return {}; });
        throw new Error('Request failed (' + res.status + ')');
      })
      .then(function () { revealLocked(payload, totals); })
      .catch(function (e) {
        accepted = false;
        if (btn) { btn.disabled = false; btn.textContent = 'Sign and accept contract'; }
        if (errEl) {
          errEl.textContent = 'We could not record your signature just now. Please try again or call us.';
          errEl.classList.add('is-on');
        }
        console.error('[contract-v2] sign failed:', e && e.message);
      });
  }

  // Reveal the locked confirmation panel and wire the Download contract PDF link.
  function revealLocked(payload, totals) {
    var t = totals.tier;
    var pickLabel = t ? (t.name + (t.sub ? ' · ' + t.sub : '')) : '';

    var pickEl = $('#cv2-locked-pick');
    if (pickEl) pickEl.textContent = pickLabel ? ('You chose ' + pickLabel + '.') : '';
    var amtEl = $('#cv2-locked-amt');
    if (amtEl) amtEl.textContent = money(totals.display) + ' incl. HST';

    var slug = (DATA.meta && DATA.meta.instanceSlug) || state.slug || '';
    var chosen = payload.tierId || state.tierId || '';
    var file = 'PU-contract-' + String(slug).replace(/[^\w\-]+/g, '_').slice(0, 40) + '.pdf';
    var href = '/api/contract-v2-pdf?instance=' + encodeURIComponent(slug) +
      '&tier=' + encodeURIComponent(chosen) +
      (payload.panel ? ('&panel=' + encodeURIComponent(payload.panel)) : '') +
      '&download=' + encodeURIComponent(file);
    var dl = $('#cv2-download');
    if (dl) dl.setAttribute('href', href);

    var panel = $('#cv2-locked');
    if (panel) {
      panel.classList.add('is-open');
      panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  // Resolve the default tier: ?tier= -> accepted_payload.selectedTier ->
  // products.recommended -> first tier. Default panel resolves similarly.
  function resolveDefaults(params) {
    var prods = DATA.products || {};

    // Path default for two_path before tier resolution.
    if (prods.mode === 'two_path' && prods.twoPath) {
      state.pathId = (prods.twoPath.defaultPath === 'A') ? 'A' : 'B';
    }

    var accepted = DATA.accepted_payload || {};
    var acceptedTier = accepted.selectedTier || accepted.tierId || (accepted.tier && accepted.tier.id);

    var wantTier = params.get('tier') || acceptedTier || prods.recommended;
    var tiers = activeTiers();
    var ids = {};
    tiers.forEach(function (t) {
      ids[t.id] = true;
      if (t.variants) t.variants.forEach(function (v) { ids[v.id] = true; });
    });
    state.tierId = (wantTier && ids[wantTier]) ? wantTier : (tiers[0] && tiers[0].id) || null;

    // Panel default: ?panel= -> accepted_payload.panel -> path/products default.
    var ap = activePanels();
    if (ap) {
      var wantPanel = params.get('panel') || accepted.panel || ap.def;
      state.panelSel = (ap.panels.indexOf(wantPanel) !== -1) ? wantPanel : ap.def;
    } else {
      state.panelSel = null;
    }
  }

  // Flip the PDF-ready sentinel. Called in a finally-style path so a render error
  // still signals the PDF endpoint not to hang.
  function markContractReady() {
    if (window.__CONTRACT_READY === true) return;
    window.__CONTRACT_READY = true;
    if (!document.getElementById('contract-ready')) {
      var marker = document.createElement('div');
      marker.id = 'contract-ready';
      document.body.appendChild(marker);
    }
  }

  function renderData(data, params) {
    DATA = data || {};
    if (!DATA.products) {
      throw new Error('This contract has no pricing yet.');
    }
    buildCtx();
    resolveDefaults(params);
    if (state.pdfMode) document.body.classList.add('cv2-pdf');
    renderContractBody();
  }

  function boot() {
    var params = new URLSearchParams(location.search);
    state.pdfMode = params.get('pdf') === '1';

    var slug = params.get('instance');
    if (!slug) {
      var m = location.pathname.match(/^\/c\/([^\/?#]+)/);
      if (m) slug = decodeURIComponent(m[1]);
    }
    state.slug = slug || '';

    if (!slug) {
      showError('No contract reference in the link.');
      markContractReady();
      return;
    }

    fetch('/api/proposal-v2?instance=' + encodeURIComponent(slug), { headers: { 'Accept': 'application/json' } })
      .then(function (res) {
        if (!res.ok) throw new Error('Request failed (' + res.status + ')');
        return res.json();
      })
      .then(function (data) {
        try {
          renderData(data, params);
        } catch (err) {
          showError(err && err.message ? err.message : 'Unknown error.');
        }
      })
      .catch(function (err) {
        console.error('[contract-v2] boot failed:', err);
        showError(err && err.message ? err.message : 'Unknown error.');
      })
      .then(function () {
        // Always flip the sentinel after a paint, render-ok or not, so the PDF
        // endpoint never hangs waiting on a page that errored.
        requestAnimationFrame(function () {
          requestAnimationFrame(markContractReady);
        });
      });
  }

  window.CV2 = {
    get data() { return DATA; },
    get state() { return state; },
    selectTier: selectTier
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
