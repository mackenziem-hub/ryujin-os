<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060a14">
<title>Calendar · Ryujin OS</title>
<link rel="icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a14;--card:rgba(20,30,50,0.85);
  --border:rgba(34,211,238,0.16);--border-hi:rgba(34,211,238,0.35);
  --text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);
  --cyan:#22d3ee;--orange:#fb923c;--violet:#a78bfa;--green:#4ade80;--gold:#facc15;--red:#f87171;--gray:#6b7280;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;
  color:var(--text);min-height:100vh;padding:18px 14px 60px;
}
.wrap{max-width:1500px;margin:0 auto}

/* Big white back button per Mac's UI rule */
.back{
  display:inline-flex;align-items:center;gap:8px;margin-bottom:16px;
  font-family:'Orbitron',monospace;font-size:0.85em;letter-spacing:1.4px;
  text-transform:uppercase;font-weight:700;color:#fff;text-decoration:none;
  background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.45);
  padding:11px 22px;border-radius:22px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:all 0.15s;
}
.back:hover{background:rgba(255,255,255,0.16);border-color:#fff}
.back:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

.crumb{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
h1{
  font-family:'Orbitron',monospace;font-size:1.7em;font-weight:700;letter-spacing:1px;
  background:linear-gradient(135deg,#e0e6f0 20%,var(--cyan) 65%,var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:6px;
}
.sub{font-size:0.9em;color:var(--text-dim);margin-bottom:18px;line-height:1.5}
.sub b{color:var(--text)}

.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.toolbar .stat{font-family:'Share Tech Mono',monospace;font-size:0.74em;letter-spacing:1px;color:var(--text-dim);background:rgba(8,12,24,0.6);border:1px solid var(--border);padding:6px 11px;border-radius:14px}
.toolbar .stat b{color:var(--cyan)}

.viewToggle{
  display:inline-flex;background:rgba(8,12,24,0.7);border:1px solid var(--border);
  border-radius:18px;padding:3px;margin-left:auto;
}
.viewToggle button{
  font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.3px;text-transform:uppercase;
  background:transparent;border:none;color:var(--text-dim);padding:7px 14px;border-radius:15px;
  cursor:pointer;transition:all 0.15s;
}
.viewToggle button.active{background:var(--cyan);color:#001218;font-weight:700}
.viewToggle button:not(.active):hover{color:var(--text)}

/* Range selector: day / week / month / quarter. Sits next to viewToggle. */
.rangeSelector{display:inline-flex;background:rgba(8,12,24,0.7);border:1px solid var(--border);border-radius:18px;padding:3px}
.rangeSelector button{
  font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.3px;text-transform:uppercase;
  background:transparent;border:none;color:var(--text-dim);padding:7px 14px;border-radius:15px;
  cursor:pointer;transition:all 0.15s;
}
.rangeSelector button.active{background:var(--violet);color:#1a0e30;font-weight:700}
.rangeSelector button:not(.active):hover{color:var(--text)}

.legend{display:flex;flex-wrap:wrap;gap:8px;font-size:0.7em;color:var(--text-dim);margin-bottom:14px}
.legend .lg{display:inline-flex;align-items:center;gap:5px;background:rgba(8,12,24,0.5);border:1px solid var(--border);padding:4px 9px;border-radius:10px;font:inherit;color:var(--text-dim);cursor:pointer;transition:opacity .12s,border-color .12s}
.legend .lg:hover{border-color:var(--cyan)}
.legend .lg.off{opacity:0.4}
.legend .lg.off .dot{box-shadow:none !important;opacity:0.5}
.legend .dot{width:8px;height:8px;border-radius:50%}
.legend .dot.install{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.legend .dot.service{background:var(--orange);box-shadow:0 0 6px var(--orange)}
.legend .dot.inspection{background:var(--violet);box-shadow:0 0 6px var(--violet)}
.legend .dot.gcal{background:var(--green);box-shadow:0 0 6px var(--green)}
.legend .dot.block{background:#94a3b8;box-shadow:0 0 6px #94a3b8}

/* Per-day grid layout adapts to range:
   day = 1 col (mobile + desktop)
   week = 7 cols on desktop, vertical stack on mobile
   month/quarter = vertical stack always (too wide for grid) */
.board{display:flex;flex-direction:column;gap:10px}
/* Week + day now render the time-grid (.tg fills #board as a flex child);
   month/quarter stack the list board vertically. The old 7-col week grid rule
   was removed so it can't squish or override the time-grid / crew-view toggle. */

.col{
  background:rgba(11,17,32,0.72);border:1px solid var(--border);border-radius:14px;
  padding:11px 11px 13px;
  display:flex;flex-direction:column;gap:7px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.col.today{border-color:var(--border-hi);box-shadow:0 0 18px rgba(34,211,238,0.13)}
.col.past{opacity:0.6}
.col-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.col-day{font-family:'Orbitron',monospace;font-size:0.72em;letter-spacing:1.5px;color:var(--text);text-transform:uppercase}
.col-day.is-today{color:var(--cyan)}
.col-date{font-family:'Share Tech Mono',monospace;font-size:0.78em;color:var(--cyan)}
.col-count{font-family:'Share Tech Mono',monospace;font-size:0.65em;color:var(--text-muted);letter-spacing:1px}

.evt{
  background:rgba(20,30,50,0.7);border:1px solid var(--border);border-radius:10px;
  padding:8px 11px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;
}
.evt:hover{border-color:var(--border-hi);transform:translateY(-1px)}
.evt:focus-visible{outline:2px solid var(--cyan);outline-offset:1px}
.evt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.evt.install::before{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.evt.service::before{background:var(--orange);box-shadow:0 0 6px var(--orange)}
.evt.service.urgent::before{background:var(--red);box-shadow:0 0 8px var(--red)}
.evt.service.high::before{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.evt.inspection::before{background:var(--violet);box-shadow:0 0 6px var(--violet)}
.evt.gcal::before{background:var(--green);box-shadow:0 0 6px var(--green)}

/* Phase 2 drag: only workorder-bucketed installs are moveable / resizable. */
.evt[data-draggable="install"]{cursor:grab}
.evt[data-draggable="install"].dragging{opacity:0.4;outline:2px dashed var(--cyan);outline-offset:1px;cursor:grabbing}
.evt.install.ghost{opacity:0.5;border-style:dashed;cursor:default;background:rgba(20,30,50,0.4)}
.evt.install.ghost:hover{transform:none;border-color:var(--border)}
.ghost-cont{font-size:0.72em;color:var(--text-muted)}
.evt-resize{position:absolute;left:0;right:0;bottom:0;height:10px;cursor:ns-resize;touch-action:none}
.evt-resize::after{content:'';position:absolute;left:50%;bottom:2px;transform:translateX(-50%);width:26px;height:3px;border-radius:2px;background:var(--cyan);opacity:0.4}
.evt[data-draggable="install"]:hover .evt-resize::after{opacity:0.85}
.col.drop-target{outline:2px dashed var(--cyan);outline-offset:-3px;background:rgba(34,211,238,0.07)}
.drag-ghost{position:fixed;z-index:9000;pointer-events:none;opacity:0.85;width:210px;box-shadow:0 10px 30px rgba(0,0,0,0.6);transform:translate(-50%,-50%);border-radius:10px}
.cal-toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%);z-index:9100;background:rgba(8,12,24,0.95);border:1px solid var(--border-hi);color:var(--text);padding:10px 16px;border-radius:12px;font-size:0.85em;box-shadow:0 8px 24px rgba(0,0,0,0.5);max-width:90vw}
.cal-toast.err{border-color:var(--red);color:#fca5a5}

.evt-type{font-family:'Share Tech Mono',monospace;font-size:0.6em;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:2px}
.evt.install .evt-type{color:var(--cyan)}
.evt.service .evt-type{color:var(--orange)}
.evt.inspection .evt-type{color:var(--violet)}
.evt.gcal .evt-type{color:var(--green)}
.evt-title{font-size:0.9em;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:2px;word-wrap:break-word}
.evt-detail{font-size:0.76em;color:var(--text-dim);line-height:1.35;word-wrap:break-word}
.evt-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;font-family:'Share Tech Mono',monospace;font-size:0.62em;letter-spacing:0.6px;color:var(--text-muted);align-items:center}
.evt-meta .chip{background:rgba(8,12,24,0.55);border:1px solid var(--border);padding:2px 6px;border-radius:7px}
.evt-meta .crew{display:inline-flex;gap:3px;align-items:center;margin-left:2px}
.crew-dot{width:14px;height:14px;border-radius:50%;border:1px solid rgba(0,0,0,0.4);font-size:8px;display:inline-flex;align-items:center;justify-content:center;color:#001;font-weight:800;font-family:'Inter',sans-serif;letter-spacing:0}

.empty-day{font-size:0.78em;color:var(--text-muted);text-align:center;padding:14px 4px;font-style:italic}
.notify-pill{display:inline-flex;align-items:center;gap:4px;background:rgba(250,204,21,0.18);border:1px solid rgba(250,204,21,0.45);color:var(--gold);padding:2px 8px;border-radius:8px;font-family:'Share Tech Mono',monospace;font-size:0.62em;letter-spacing:0.8px;text-transform:uppercase;margin-top:5px;font-weight:600}
.crew-chip{display:inline-flex;align-items:center;background:rgba(8,12,24,0.55);border:1px solid var(--border);padding:2px 7px;border-radius:7px;font-family:'Share Tech Mono',monospace;font-size:0.62em;letter-spacing:0.8px;text-transform:uppercase;font-weight:600}
.crew-chip.muted{color:var(--text-muted)}
.evt.block::before{background:#a78bfa;box-shadow:0 0 6px #a78bfa}
.evt.block.plus-ultra::before{background:var(--gold);box-shadow:0 0 6px var(--gold)}
.evt.block.atlantic::before{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.evt.block .evt-type{color:#a78bfa}
.evt.block.plus-ultra .evt-type{color:var(--gold)}
.evt.block.atlantic .evt-type{color:var(--cyan)}
.fab{position:fixed;right:18px;bottom:18px;z-index:30;width:54px;height:54px;border-radius:50%;border:2px solid var(--cyan);background:linear-gradient(135deg,rgba(34,211,238,0.95),rgba(34,211,238,0.7));color:#001218;font-size:1.6em;font-weight:700;cursor:pointer;box-shadow:0 6px 18px rgba(34,211,238,0.5);display:flex;align-items:center;justify-content:center;transition:transform 0.15s;font-family:'Inter',sans-serif}
.fab:hover{transform:scale(1.08)}
.fab:focus-visible{outline:2px solid #fff;outline-offset:3px}
.modal-mask{position:fixed;inset:0;background:rgba(2,5,12,0.78);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;z-index:60}
.modal-mask.on{display:flex}
@media(min-width:768px){.modal-mask{align-items:center}}
.modal{background:rgba(11,17,32,0.97);border:1px solid var(--border-hi);border-radius:18px 18px 0 0;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;padding:22px 22px 26px}
@media(min-width:768px){.modal{border-radius:18px}}
.modal h2{font-family:'Orbitron',monospace;font-size:1.15em;margin-bottom:14px;color:var(--text)}
.modal label{display:block;font-family:'Share Tech Mono',monospace;font-size:0.7em;letter-spacing:1.2px;color:var(--text-dim);text-transform:uppercase;margin:12px 0 5px}
.modal input,.modal select,.modal textarea{width:100%;background:rgba(8,12,24,0.6);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:9px;font-family:'Inter',sans-serif;font-size:0.95em}
.modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:var(--border-hi)}
.modal textarea{min-height:74px;resize:vertical;font-family:'Inter',sans-serif}
.modal .row{display:flex;gap:10px}
.modal .row > *{flex:1}
.modal .crew-pick{display:flex;gap:8px;margin-top:5px}
.modal .crew-pick label{display:inline-flex;align-items:center;gap:6px;font-size:0.8em;font-family:'Inter',sans-serif;text-transform:none;letter-spacing:0;color:var(--text);cursor:pointer;background:rgba(8,12,24,0.55);border:1.5px solid var(--border);padding:8px 12px;border-radius:11px;margin:0;flex:1;justify-content:center}
.modal .crew-pick label.sel-plus-ultra{border-color:var(--gold);background:rgba(250,204,21,0.12);color:var(--gold)}
.modal .crew-pick label.sel-atlantic{border-color:var(--cyan);background:rgba(34,211,238,0.12);color:var(--cyan)}
.modal .crew-pick input{display:none}
.modal .err{color:#fecaca;font-size:0.78em;margin-top:8px}
.modal .actions{display:flex;gap:10px;margin-top:20px;padding-top:14px;border-top:1px solid var(--border)}
.modal .actions button{font-family:'Orbitron',monospace;font-size:0.78em;letter-spacing:1.3px;text-transform:uppercase;padding:10px 18px;border-radius:12px;cursor:pointer}
.modal .actions .primary{background:var(--cyan);border:1px solid var(--cyan);color:#001218;font-weight:700;flex:1}
.modal .actions .primary:disabled{opacity:0.5;cursor:not-allowed}
.modal .actions .secondary{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.drawer .notes{background:rgba(250,204,21,0.08);border:1px solid rgba(250,204,21,0.25);color:var(--text);padding:11px 14px;border-radius:10px;margin-top:6px;font-size:0.86em;line-height:1.5;white-space:pre-wrap}
.drawer .notes.notify{background:rgba(250,204,21,0.18);border-color:rgba(250,204,21,0.55)}
.refresh-meta{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-muted);text-align:right;margin-top:18px;letter-spacing:1px}
.error-banner{background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.35);color:#fecaca;padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:0.85em}

/* Detail drawer */
.drawer-mask{position:fixed;inset:0;background:rgba(2,5,12,0.75);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;z-index:50}
.drawer-mask.on{display:flex}
@media(min-width:768px){.drawer-mask{align-items:center}}
.drawer{
  background:rgba(11,17,32,0.96);border:1px solid var(--border-hi);
  border-radius:18px 18px 0 0;max-width:560px;width:100%;
  max-height:85vh;overflow-y:auto;padding:22px 22px 30px;
}
@media(min-width:768px){.drawer{border-radius:18px}}
.drawer h2{font-family:'Orbitron',monospace;font-size:1.15em;margin-bottom:6px;color:var(--text)}
.drawer .src{font-family:'Share Tech Mono',monospace;font-size:0.7em;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px}
.drawer dl{display:grid;grid-template-columns:90px 1fr;gap:8px 14px;margin-bottom:18px;font-size:0.88em}
.drawer dt{color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:0.78em;letter-spacing:0.5px}
.drawer dd{color:var(--text)}
.drawer dd a{color:var(--cyan);text-decoration:none}
.drawer dd a:hover{text-decoration:underline}
.drawer .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.drawer .actions button,.drawer .actions a{
  font-family:'Orbitron',monospace;font-size:0.74em;letter-spacing:1.3px;text-transform:uppercase;
  background:rgba(34,211,238,0.1);border:1px solid var(--border-hi);color:var(--cyan);
  padding:8px 14px;border-radius:12px;cursor:pointer;text-decoration:none;transition:all 0.15s;
}
.drawer .actions button:hover,.drawer .actions a:hover{background:rgba(34,211,238,0.2)}
.drawer .actions .danger{background:rgba(248,113,113,0.1);border-color:rgba(248,113,113,0.45);color:#fecaca}
.drawer .actions .danger:hover{background:rgba(248,113,113,0.2)}
.drawer .actions .close{background:transparent;border-color:var(--border);color:var(--text-dim);margin-left:auto}

/* Per-crew view: 2 columns (Plus Ultra in-house + Atlantic Roofing). */
.crewboard{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:12px;padding-bottom:8px}
@media(max-width:767px){.crewboard{grid-template-columns:1fr}}
.crew-col{background:rgba(11,17,32,0.72);border:1px solid var(--border);border-radius:14px;padding:11px;display:flex;flex-direction:column;gap:8px;min-width:160px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.crew-col-head{display:flex;align-items:center;gap:8px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.crew-col-head .crew-dot{width:22px;height:22px;font-size:11px}
.crew-col-head .crew-name{font-family:'Orbitron',monospace;font-size:0.82em;font-weight:700;color:var(--text);letter-spacing:1px}
.crew-col-head .crew-status{font-family:'Share Tech Mono',monospace;font-size:0.6em;color:var(--text-muted);margin-left:auto;letter-spacing:1px}
.crew-day-group{padding-top:8px;border-top:1px dashed rgba(34,211,238,0.08);margin-top:4px}
.crew-day-group:first-of-type{border-top:none;padding-top:0;margin-top:0}
.crew-day-label{font-family:'Share Tech Mono',monospace;font-size:0.68em;color:var(--cyan);letter-spacing:1.2px;margin-bottom:5px}
.crew-empty{font-size:0.76em;color:var(--text-muted);font-style:italic;padding:6px 0}

/* Hide opposite view */
.board.crew-view,.crewboard.day-view-active{display:none}
.crewboard{display:none}
body[data-view="crew"] .board{display:none}
body[data-view="crew"] .crewboard{display:grid}
@media(min-width:1024px){body[data-view="crew"] .crewboard{display:grid}}
.cal-ic{width:1em;height:1em;vertical-align:-0.15em;display:inline-block;flex:0 0 auto}
.empty-illus{display:block;width:150px;max-width:55%;margin:6px auto 10px;opacity:0.82}
.modal .rr-illus{display:block;width:100%;max-height:84px;object-fit:cover;border-radius:10px;margin:0 0 8px;opacity:0.85}
.modal select{width:100%;padding:10px 12px;background:rgba(6,10,20,0.7);border:1px solid rgba(34,211,238,0.25);border-radius:9px;color:#e0e6f0;font-family:inherit;font-size:0.95em;margin-bottom:6px}
@media (prefers-reduced-motion: reduce){
  *{transition-duration:0.01ms !important;animation-duration:0.01ms !important;animation-iteration-count:1 !important}
  .evt:hover,.fab:hover{transform:none !important}
}
@media (max-width:720px){
  .modal input,.modal select,.modal textarea{font-size:16px}
}
/* Inline edit form inside the detail drawer (Phase 1: edit without leaving). */
.drawer .edit{margin-top:14px;border-top:1px solid var(--border);padding-top:12px}
.drawer .edit label{display:block;font-size:0.7em;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin:10px 0 5px;font-weight:700}
.drawer .edit input[type=text],.drawer .edit input[type=date],.drawer .edit input[type=number],.drawer .edit input[type=time],.drawer .edit textarea,.drawer .edit select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:9px;background:rgba(8,12,24,0.6);color:var(--text);font-family:inherit;font-size:0.92em;outline:none}
.drawer .edit input:focus,.drawer .edit textarea:focus,.drawer .edit select:focus{border-color:var(--cyan)}
.drawer .edit textarea{min-height:58px;resize:vertical}
.drawer .edit .quick{display:flex;gap:7px;margin-top:6px}
.drawer .edit .quick button{flex:1;font:inherit;font-size:0.76em;font-weight:700;padding:7px 10px;border-radius:9px;border:1.5px solid var(--border);background:rgba(8,12,24,0.55);color:var(--text-dim);cursor:pointer}
.drawer .edit .quick button.pu{border-color:var(--gold);color:var(--gold)}
.drawer .edit .quick button.at{border-color:var(--cyan);color:var(--cyan)}
.drawer .edit .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.drawer .save-msg{font-size:0.82em;margin-top:8px;min-height:15px}
.drawer .save-msg.ok{color:var(--green)}.drawer .save-msg.err{color:#f87171}
.drawer .actions button.primary{background:var(--cyan);color:#001218;border:none;font-weight:700;padding:9px 16px;border-radius:10px;cursor:pointer}
.drawer .actions button.primary:disabled{opacity:0.6;cursor:default}

<body data-view="day" data-range="week">

<div class="wrap">

  <a class="back" id="backLink" href="/cockpit.html">&larr; Back</a>

  <div class="crumb">Operations &middot; Calendar</div>
  <h1>Service Calendar</h1>
  <p class="sub">Next <b>7 days</b>. Installs, inspections, service visits, and your Google Calendar in one view. Tap any card for details.</p>

  <div id="errBanner"></div>

  <div class="toolbar">
    <span class="stat"><b id="totInstalls">&mdash;</b> installs</span>
    <span class="stat"><b id="totInspections">&mdash;</b> inspections</span>

</div>

<div class="drawer-mask" id="drawerMask" role="dialog" aria-modal="true" aria-label="Event detail">

</div>

<button class="fab" id="fab" type="button" title="Add event" aria-label="Add event">+</button>

<div class="modal-mask" id="createMask" role="dialog" aria-modal="true" aria-label="Create event">
  <div class="modal">
    <h2>New event</h2>

    <label for="evtServiceType">Service type</label>

<script>
const TENANT = window.RYUJIN_TENANT_SLUG;
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// Calendar icon kit (additive). Fetch the icon map once; ic(id) emits the
// inline SVG (stroke currentColor, themeable by the parent's color). Safe
// no-op if the kit fails to load.
let ICONS = {};
const iconsReady = fetch('/assets/icons/calendar-icons.json')
  .then(r => r.ok ? r.json() : {})
  .then(m => { ICONS = m || {}; })
  .catch(() => {});
function ic(id, cls){ const s = ICONS[id]; return s ? s.replace('<svg ', '<svg class="cal-ic ' + (cls || '') + '" ') : ''; }

// Crew model: two buckets per Mac's 2026-05-29 direction. Plus Ultra
// in-house collapses Mac + Diego + AJ + Pavanjot + Sukhsahib. Atlantic
// is the subs bucket (currently just Ryan's sub row, kept active).
const CREW_ROSTER = [
  {
    key: 'plus-ultra',
    name: 'Plus Ultra in-house',
    shortName: 'Plus Ultra',
    color: '#facc15',
    match: ['plus ultra crew','plus ultra in-house','plus ultra in house','plus ultra','mackenzie','diego','aj','arjun','ajith','pavanjot','pavan','sukhsahib','sukh','singh']
  },
  {
    key: 'atlantic',
    name: 'Atlantic Roofing',
    shortName: 'Atlantic',
    color: '#22d3ee',
    match: ['atlantic roofing','atlantic','ryan']
  }
];

// Booking-side inspectors for the round-robin "assigned to" display. Keys are
// GHL user IDs (assignedUserId from /api/ghl?mode=appointments). Fill from the
// GHL handoff; until then the inspector chip/row no-ops safely.
const INSPECTORS = {
  // '<AJ_GHL_USER_ID>':    { name: 'AJ',    color: '#2dd4bf' },
  // '<DIEGO_GHL_USER_ID>': { name: 'Diego', color: '#22d3ee' }
};
function inspectorFor(id){ return id && INSPECTORS[id] ? INSPECTORS[id] : null; }

const SERVICE_TYPES = {
  'roof-inspection': { label: 'Roof Inspection', icon: 'roof-inspection' },
  'service-call':    { label: 'Service Call',    icon: 'service-call' },
  'site-inspection': { label: 'Site Inspection', icon: 'site-inspection' }
};

function bucketCrew(install){
  const s = String(install.sub_crew_lead || '').toLowerCase();
  if (s){
    for (const c of CREW_ROSTER){
      for (const pat of c.match){
        if (s.includes(pat)) return c.key;
      }
    }
  }
  const names = (install.crew || []).map(c => String(c.name || '').toLowerCase()).join(' ');
  if (names){
    for (const c of CREW_ROSTER){
      for (const pat of c.match){
        if (names.includes(pat)) return c.key;
      }
    }
  }
  return null;
}
function crewByKey(key){ return CREW_ROSTER.find(c => c.key === key) || null; }

let MY_ROLE = null;

// Phase 2 drag state (installs only). `inflight` blocks overlapping writes;
// `suppressClick` stops the post-drag synthetic click from opening the drawer.
const DRAG = { active: false, resizing: false, inflight: false, suppressClick: false };

// Range selector state. Mac wanted day/week/month/quarter — server clamps to
// 90 days max so quarter caps there. Default week matches the original layout.
const RANGE_DAYS = { day: 1, week: 7, month: 30, quarter: 90 };
let currentRange = 'week';
function currentDays(){ return RANGE_DAYS[currentRange]; }

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmt$(n){if (n == null || n === '') return ''; const x = Number(n); if (!Number.isFinite(x)) return ''; return '$' + Math.round(x).toLocaleString()}
// Bucket by the business timezone (America/Halifax), NOT UTC, so evening
// events don't land on the wrong day and counts match the board.
const BIZ_TZ = 'America/Halifax';
function isoDay(d){const dt=new Date(d);if(isNaN(dt))return '';const p=new Intl.DateTimeFormat('en-CA',{timeZone:BIZ_TZ,year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(dt);const g=t=>(p.find(x=>x.type===t)||{}).value;return g('year')+'-'+g('month')+'-'+g('day')}
function clockHM(iso){if(!iso)return '';const d=new Date(iso);if(isNaN(d))return '';const p=new Intl.DateTimeFormat('en-US',{timeZone:BIZ_TZ,hour:'numeric',minute:'2-digit',hour12:false}).formatToParts(d);const h=+(p.find(x=>x.type==='hour')||{}).value;const m=+(p.find(x=>x.type==='minute')||{}).value;const ampm=h>=12?'p':'a';const hh=((h+11)%12)+1;return hh+(m?':'+String(m).padStart(2,'0'):'')+ampm}
// 24h HH:MM in the business timezone, for prefilling <input type=time> when
// editing a timestamped calendar block.
function hhmm(iso){if(!iso)return '';const d=new Date(iso);if(isNaN(d))return '';const p=new Intl.DateTimeFormat('en-GB',{timeZone:BIZ_TZ,hour:'2-digit',minute:'2-digit',hour12:false}).formatToParts(d);const g=t=>(p.find(x=>x.type===t)||{}).value;return g('hour')+':'+g('minute');}
// Halifax UTC offset (ms) at a given instant, DST-correct via Intl.
function halifaxOffsetMs(utcMs){const dtf=new Intl.DateTimeFormat('en-US',{timeZone:BIZ_TZ,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});const p=dtf.formatToParts(new Date(utcMs));const g=t=>+(p.find(x=>x.type===t)||{}).value;let hh=g('hour');if(hh===24)hh=0;const asUTC=Date.UTC(g('year'),g('month')-1,g('day'),hh,g('minute'),g('second'));return asUTC-utcMs;}
// Build a UTC ISO instant from a Halifax wall-clock date (YYYY-MM-DD) + time
// (HH:MM), DST-correct, REGARDLESS of the browser's own timezone. Without this
// a block created on a non-Atlantic device stores the wrong instant and
// re-buckets to the wrong Halifax day on reload. (Review fix 2026-05-29.)
function halifaxWallClockToISO(dateStr,timeStr){const a=String(dateStr).split('-').map(Number);const b=String(timeStr||'08:00').split(':').map(Number);const guess=Date.UTC(a[0],(a[1]||1)-1,a[2]||1,b[0]||0,b[1]||0,0);let inst=guess-halifaxOffsetMs(guess);const off2=halifaxOffsetMs(inst);if(off2!==halifaxOffsetMs(guess))inst=guess-off2;return new Date(inst).toISOString();}
// Add i calendar days to a date (DST-safe: a calendar add, not a raw 86.4M-ms
// step, so a spring-forward / fall-back day can't dup or skip a column key).
function addDays(base,i){const d=new Date(base);d.setDate(d.getDate()+i);return d;}
// A GHL appointment that's cancelled/no-show shouldn't render as a live booking.
function apptIsActive(a){const st=String(a&&a.status||'').toLowerCase().replace(/[^a-z]/g,'');return !(st==='cancelled'||st==='canceled'||st==='noshow'||st==='invalid');}
function nameMatchesCrew(name, matchKeys){
  const lc = String(name||'').toLowerCase();
  if (!lc) return false;
  return matchKeys.some(k => lc.includes(k));
}
function crewForName(name){
  for (const c of CREW_ROSTER) if (nameMatchesCrew(name, c.match)) return c;
  return null;
}

async function getToken(){return localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token')}

async function loadMe(){
  try{
    const tok = await getToken();
    const r = await fetch('/api/me', { headers: tok ? { 'Authorization': 'Bearer ' + tok } : {} });
    if (!r.ok) return;
    const me = await r.json();
    MY_ROLE = me.role || 'crew';
  }catch(_){}
}

function showErr(msg){
  const eb = document.getElementById('errBanner');
  eb.innerHTML = msg ? `<div class="error-banner">${esc(msg)}</div>` : '';
}

// Per-source state. Each source updates independently so a slow GHL
// API doesn't block installs from rendering. Schedule is the fastest
// (single Supabase round trip) and inspections are the slowest (1+N
// GHL API calls), so this matters in the field.
const STATE = {
  sched:  { status: 'loading', data: null },
  ghl:    { status: 'loading', data: null },
  gcal:   { status: 'loading', data: null },
  blocks: { status: 'loading', data: null }
};

function fetchWithTimeout(url, opts, ms){
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { ...opts, signal: ctrl.signal })
    .finally(() => clearTimeout(timer));
}

function renderSkeleton(){
  // Paint the empty day grid immediately so the user sees the calendar
  // chrome before any fetch settles. Each column shows "loading…" until
  // its source flips to ok/error. Number of columns derives from
  // currentDays() so day=1, week=7, month=30, quarter=90.
  const todayIso = isoDay(new Date());
  const today = new Date(); today.setHours(0,0,0,0);
  const n = currentDays();
  const cols = [];
  for (let i = 0; i < n; i++){
    const d = addDays(today, i);
    const dayKey = isoDay(d);
    const dayName = DAY_NAMES[d.getDay()];
    const dayDate = (d.getMonth() + 1) + '/' + d.getDate();
    const isToday = dayKey === todayIso;
    cols.push(`
      <div class="col ${isToday ? 'today' : ''}" data-date="${esc(dayKey)}">
        <div class="col-head">
          <div>
            <div class="col-day ${isToday ? 'is-today' : ''}">${esc(dayName)}${isToday ? ' (today)' : ''}</div>
            <div class="col-date">${esc(dayDate)}</div>
          </div>
          <div class="col-count">&middot;</div>
        </div>
        <div class="empty-day">loading…</div>
      </div>`);
  }
  document.getElementById('board').innerHTML = cols.join('');
}

function updateToolbar(){
  const sched = STATE.sched, ghl = STATE.ghl, gcal = STATE.gcal;
  const installCount = sched.data
    ? ((sched.data.jobs && sched.data.jobs.length) || (sched.data.days || []).reduce((a, d) => a + (d.installs?.length || 0), 0))
    : null;
  const serviceCount = sched.data ? (sched.data.total_service ?? 0) : null;
  const inspectionCount = ghl.data ? (ghl.data.appointments || []).filter(apptIsActive).length : null;
  const gcalCount = gcal.data ? (gcal.data.events || []).length : null;
  const gcalSuffix = gcal.data && gcal.data.configured === false ? ' (off)' : '';

  document.getElementById('totInstalls').textContent =
    sched.status === 'loading' ? '…' : sched.status === 'ok' ? installCount : '!';
  document.getElementById('totService').textContent =
    sched.status === 'loading' ? '…' : sched.status === 'ok' ? serviceCount : '!';
  document.getElementById('totInspections').textContent =
    ghl.status === 'loading' ? '…' : ghl.status === 'ok' ? inspectionCount : '!';
  document.getElementById('totGcal').textContent =
    gcal.status === 'loading' ? '…' : gcal.status === 'ok' ? (gcalCount + gcalSuffix) : '!';

  // Error banner aggregates whichever sources failed/timed out.
  const errs = [];
  if (STATE.sched.status === 'error') errs.push('schedule ' + (STATE.sched.errMsg || 'failed'));
  if (STATE.sched.status === 'timeout') errs.push('schedule timed out');
  if (STATE.ghl.status === 'error') errs.push('inspections ' + (STATE.ghl.errMsg || 'failed'));
  if (STATE.ghl.status === 'timeout') errs.push('inspections timed out (GHL slow)');
  if (STATE.gcal.status === 'error') errs.push('google cal ' + (STATE.gcal.errMsg || 'failed'));
  if (STATE.gcal.status === 'timeout') errs.push('google cal timed out');
  if (STATE.blocks.status === 'error') errs.push('blocks ' + (STATE.blocks.errMsg || 'failed'));
  showErr(errs.length ? 'Partial load: ' + errs.join(', ') : '');

  const allSettled = STATE.sched.status !== 'loading' && STATE.ghl.status !== 'loading' && STATE.gcal.status !== 'loading' && STATE.blocks.status !== 'loading';
  if (allSettled) {
    document.getElementById('refreshMeta').textContent =
      'Last refreshed ' + new Date().toLocaleTimeString() + ' · auto-refresh every 3 min';
  } else {
    document.getElementById('refreshMeta').textContent = 'Loading…';
  }
}

// Source filters: click a legend chip to hide/show that event kind. Filter
// state is in-memory (resets per load); toolbar counts stay totals.
const LEGEND_ITEMS = [
  { kind: 'install', label: 'Install' },
  { kind: 'inspection', label: 'Inspection' },
  { kind: 'service', label: 'Service' },
  { kind: 'block', label: 'Blocks' },
  { kind: 'gcal', label: 'Google Cal' }
];
const HIDDEN = new Set();
function renderLegend(){
  const el = document.getElementById('legend');
  if (!el) return;
  el.innerHTML = LEGEND_ITEMS.map(it => {
    const off = HIDDEN.has(it.kind);
    return `<button type="button" class="lg${off ? ' off' : ''}" data-kind="${it.kind}" aria-pressed="${off ? 'false' : 'true'}" title="${off ? 'Show' : 'Hide'} ${esc(it.label)}"><span class="dot ${it.kind}"></span>${esc(it.label)}</button>`;
  }).join('');
  el.querySelectorAll('.lg[data-kind]').forEach(b => b.addEventListener('click', () => {
    const k = b.dataset.kind;
    if (HIDDEN.has(k)) HIDDEN.delete(k); else HIDDEN.add(k);
    renderLegend();
    rerender();
  }));
}

function rerender(){
  // Never repaint mid drag/resize: it would yank the card out from under the pointer.
  if (DRAG.active || DRAG.resizing) return;
  const sched = STATE.sched.data || { days: [], jobs: [], total_service: 0 };
  const ghl = STATE.ghl.data || { appointments: [] };
  const gcal = STATE.gcal.data || { events: [] };
  const blocks = STATE.blocks.data || { blocks: [] };
  const merged = normalize(sched, ghl, gcal, blocks);
  const hasAny = merged.some(d => d.events.length > 0);
  // Apply legend source filters before rendering (hides cards on board + crew
  // lanes only; toolbar counts remain totals).
  const view = HIDDEN.size
    ? merged.map(d => ({ date: d.date, events: d.events.filter(e => !HIDDEN.has(e.kind === 'install-ghost' ? 'install' : e.kind)) }))
    : merged;
  const allSettled = STATE.sched.status !== 'loading' && STATE.ghl.status !== 'loading' && STATE.gcal.status !== 'loading' && STATE.blocks.status !== 'loading';
  if (hasAny || allSettled) {
    // Week + day get the time-grid (deck mockup); month/quarter keep the list
    // board (a time grid does not fit 30/90 columns).
    if (currentRange === 'week' || currentRange === 'day') renderTimeGrid(view);
    else renderDayView(view);
    renderCrewView(view);
  }
  updateToolbar();
}

async function loadAll(){
  const tok = await getToken();
  if (!tok) { document.getElementById('board').innerHTML = '<div class="col"><div class="empty-day">Sign in required.</div></div>'; return; }
  const hdr = { 'Authorization': 'Bearer ' + tok, 'x-tenant-id': TENANT };

  // Reset state to loading for this refresh cycle.
  STATE.sched  = { status: 'loading', data: null };
  STATE.ghl    = { status: 'loading', data: null };
  STATE.gcal   = { status: 'loading', data: null };
  STATE.blocks = { status: 'loading', data: null };
  renderSkeleton();
  updateToolbar();

  const days = currentDays();

  // Schedule: ~1s normally. Bump to 8s on bad days.
  fetchWithTimeout('/api/schedule?days=' + days, { headers: hdr }, 8000)
    .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
    .then(d => { STATE.sched = { status: 'ok', data: d }; })
    .catch(e => {
      const isTimeout = e.name === 'AbortError';
      STATE.sched = { status: isTimeout ? 'timeout' : 'error', data: null, errMsg: e.message };
    })
    .finally(rerender);

  // GHL appointments: 1+N GHL API calls. Allow up to 12s before giving
  // up so the calendar still renders installs even when GHL is slow.
  fetchWithTimeout('/api/ghl?mode=appointments&days=' + days, { headers: hdr }, 12000)
    .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
    .then(d => { STATE.ghl = { status: 'ok', data: d }; })
    .catch(e => {
      const isTimeout = e.name === 'AbortError';
      STATE.ghl = { status: isTimeout ? 'timeout' : 'error', data: null, errMsg: e.message };
    })
    .finally(rerender);

  // Google Cal: fast (single ICS fetch) or off (no env var). 6s plenty.
  fetchWithTimeout('/api/google-cal?days=' + days, { headers: hdr }, 6000)
    .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
    .then(d => { STATE.gcal = { status: 'ok', data: d }; })
    .catch(e => {
      const isTimeout = e.name === 'AbortError';
      STATE.gcal = { status: isTimeout ? 'timeout' : 'error', data: null, errMsg: e.message };
    })
    .finally(rerender);

  fetchWithTimeout('/api/calendar-blocks?days=' + days, { headers: hdr }, 6000)
    .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
    .then(d => { STATE.blocks = { status: 'ok', data: d }; })
    .catch(e => {
      const isTimeout = e.name === 'AbortError';
      STATE.blocks = { status: isTimeout ? 'timeout' : 'error', data: null, errMsg: e.message };
    })
    .finally(rerender);
}

function normalize(sched, ghl, gcal, blocksData){
  // Bucket: { 'YYYY-MM-DD': { date, events: [...] } } for the current range.
  const today = new Date(); today.setHours(0,0,0,0);
  const n = currentDays();
  const days = {};
  for (let i = 0; i < n; i++){
    const d = addDays(today, i);
    days[isoDay(d)] = { date: isoDay(d), events: [] };
  }

  // 1) Installs from /api/schedule (estimates + workorders), already day-bucketed.
  for (const day of (sched.days || [])){
    if (!days[day.date]) continue;
    for (const j of (day.installs || [])){
      days[day.date].events.push({
        kind: 'install', id: j.id, ref: j.ref, title: j.label,
        time: j.time || '', startTime: j.scheduled_at || null,
        address: j.address || '', phone: j.phone || '',
        value: j.value || null, state: j.state || '',
        crew: j.crew || [], crew_lead: j.crew_lead || null,
        sub_crew_lead: j.sub_crew_lead || null,
        wo_number: j.wo_number || null, wo_id: j.wo_id || null, wo_start_date: j.wo_start_date || null, project_id: j.project_id || null,
        source: j.source || null,
        duration_days: j.duration_days || null, live: !!j.live,
        progress_pct: j.progress_pct || null,
        special_notes: j.special_notes || null
      });
      // Multi-day workorder install: drop faint continuation ghosts on the
      // covered days so the span reads in every layout. Ghosts are display-only
      // (no data-evt, not counted, not draggable); only workorder-bucketed
      // installs span (they are the ones the calendar can resize/move).
      const dur = Number(j.duration_days) || 1;
      if (j.source === 'workorder' && j.wo_id && dur > 1){
        const startD = new Date(day.date + 'T00:00:00');
        for (let k = 1; k < dur; k++){
          const gKey = isoDay(addDays(startD, k));
          if (!days[gKey]) continue;
          days[gKey].events.push({ kind: 'install-ghost', id: String(j.id) + '-g' + k, ref: j.ref, title: j.label, dayNum: k + 1, duration_days: dur });
        }
      }
    }
    for (const t of (day.service || [])){
      days[day.date].events.push({
        kind: 'service', id: t.id, title: t.label, subtitle: t.title || '',
        time: t.time || '', priority: t.priority || 'normal',
        status: t.status || 'open', phone: t.phone || ''
      });
    }
  }

  // 2) Inspections from GHL. Bucket by startTime day.
  // Codex P2 (PR #108): GHL emits startTime as epoch ms in some cases
  // and ISO-8601 strings in others. Accept both: try Number first, fall
  // back to Date parse, drop only when neither produces a finite ms value.
  for (const a of (ghl.appointments || [])){
    if (!apptIsActive(a)) continue;
    let startMs = Number(a.startTime);
    if (!Number.isFinite(startMs)) startMs = new Date(a.startTime).getTime();
    if (!Number.isFinite(startMs)) continue;
    // endTime is the same dual-format hazard as startTime (GHL sends epoch ms
    // OR ISO-8601). Parse defensively: a bad value must resolve to null, never
    // throw, or one bad row blanks the whole board.
    let endMs = a.endTime != null ? Number(a.endTime) : NaN;
    if (a.endTime != null && !Number.isFinite(endMs)) endMs = new Date(a.endTime).getTime();
    const dayKey = isoDay(new Date(startMs));
    if (!days[dayKey]) continue;
    days[dayKey].events.push({
      kind: 'inspection', id: a.id, title: a.title || 'Inspection',
      time: clockHM(new Date(startMs)),
      startTime: new Date(startMs).toISOString(),
      endTime: Number.isFinite(endMs) ? new Date(endMs).toISOString() : null,
      address: a.address || '', phone: a.contactPhone || '',
      contactName: a.contactName || '', contactId: a.contactId || '',
      assignedUserId: a.assignedUserId || '', status: a.status || '',
      calendarName: a.calendarName || ''
    });
  }

  // 3) Google Cal events.
  for (const e of (gcal.events || [])){
    const startT = new Date(e.startTime);
    if (isNaN(startT)) continue;
    const dayKey = isoDay(startT);
    if (!days[dayKey]) continue;
    days[dayKey].events.push({
      kind: 'gcal', id: e.uid || (e.summary + '-' + e.startTime),
      title: e.summary || '(untitled)',
      time: e.allDay ? 'all day' : clockHM(e.startTime),
      startTime: e.startTime, endTime: e.endTime,
      address: e.location || '', notes: e.description || '',
      allDay: !!e.allDay
    });
  }

  // 4) Calendar blocks (ad-hoc events from the + FAB).
  for (const b of ((blocksData && blocksData.blocks) || [])){
    const startT = new Date(b.starts_at);
    if (isNaN(startT)) continue;
    const dayKey = isoDay(startT);
    if (!days[dayKey]) continue;
    days[dayKey].events.push({
      kind: 'block', id: b.id, title: b.title || '(untitled)',
      time: clockHM(b.starts_at),
      startTime: b.starts_at, endTime: b.ends_at,
      notes: b.notes || '',
      crew_label: b.crew_label || null,
      service_type: b.service_type || null,
      assigned_to: b.assigned_to || null
    });
  }

  // Sort each day by time, untimed events sort last.
  const TYPE_ORDER = { inspection: 0, service: 1, install: 2, block: 3, gcal: 4 };
  for (const k of Object.keys(days)){
    days[k].events.sort((a, b) => {
      const ta = a.startTime ? new Date(a.startTime).getTime() : NaN;
      const tb = b.startTime ? new Date(b.startTime).getTime() : NaN;
      const va = Number.isFinite(ta), vb = Number.isFinite(tb);
      if (va && vb) return ta - tb;
      if (va) return -1; if (vb) return 1;
      return (TYPE_ORDER[a.kind] || 9) - (TYPE_ORDER[b.kind] || 9);
    });
  }

  return Object.values(days).sort((a, b) => a.date.localeCompare(b.date));
}

function crewBadges(crew){
  if (!Array.isArray(crew) || crew.length === 0) return '';
  return '<span class="crew">' + crew.map(c => {
    const m = crewForName(c.name);
    const color = m ? m.color : '#6b7280';
    const initial = String(c.name||'?').trim().charAt(0).toUpperCase();
    return `<span class="crew-dot" style="background:${color}" title="${esc(c.name||'')}">${esc(initial)}</span>`;
  }).join('') + '</span>';
}

function evtCard(ev, allowDrag){
  // Multi-day continuation ghost: display-only chip on a covered day. No
  // data-evt (so it is skipped by the click + drag wiring), not counted.
  if (ev.kind === 'install-ghost'){
    return `<div class="evt install ghost" aria-hidden="true"><div class="evt-type">${ic('booked')} Install</div><div class="ghost-cont">&#8627; ${esc(ev.title || '')} &middot; day ${ev.dayNum}/${ev.duration_days}</div></div>`;
  }
  const cls = ['evt', ev.kind, ev.priority === 'urgent' || ev.priority === 'high' ? ev.priority : '', ev.kind === 'block' && ev.crew_label ? ev.crew_label : ''].filter(Boolean).join(' ');
  let typeLine = '';
  let body = '';
  if (ev.kind === 'install'){
    typeLine = ic('booked') + ' Install &middot; ' + esc(ev.ref || '');
    const notifyPill = ev.special_notes && /NOTIFY CUSTOMER/i.test(ev.special_notes)
      ? '<div class="notify-pill">' + ic('conflict') + ' notify customer</div>'
      : '';
    const bucket = bucketCrew(ev);
    const crew = bucket ? crewByKey(bucket) : null;
    const crewIc = bucket === 'atlantic' ? ic('crew-atlantic') : ic('crew-inhouse');
    const crewChip = crew
      ? `<span class="crew-chip" style="background:${crew.color}22;border-color:${crew.color}66;color:${crew.color}">${crewIc} ${esc(crew.shortName)}</span>`
      : '<span class="crew-chip muted">unassigned</span>';
    body = `
      ${ev.time ? `<div class="evt-meta"><span class="chip">${esc(ev.time)}</span></div>` : ''}
      <div class="evt-title">${esc(ev.title)}${ev.live ? ' <span style="color:var(--green);font-size:0.7em">&#9679; LIVE</span>' : ''}</div>
      ${ev.address ? `<div class="evt-detail">${esc(ev.address)}</div>` : ''}
      ${notifyPill}
      <div class="evt-meta">
        ${crewChip}
        ${ev.state ? `<span class="chip">${esc(ev.state)}</span>` : ''}
        ${ev.value ? `<span class="chip">${fmt$(ev.value)}</span>` : ''}
        ${ev.duration_days ? `<span class="chip">${ic('buffer')} ${esc(ev.duration_days)}d</span>` : ''}
        ${crewBadges(ev.crew)}
      </div>`;
  } else if (ev.kind === 'inspection'){
    typeLine = ic('site-inspection') + ' ' + esc(ev.calendarName || 'Inspection');
    const insp = inspectorFor(ev.assignedUserId);
    const inspChip = insp ? `<span class="crew-chip" style="background:${insp.color}22;border-color:${insp.color}66;color:${insp.color}">${ic('inspector')} ${esc(insp.name)}</span>` : '';
    body = `
      <div class="evt-title">${esc(ev.contactName || ev.title || 'Inspection')}</div>
      <div class="evt-meta"><span class="chip">${esc(ev.time || '')}</span>${ev.address ? `<span class="chip">${esc(ev.address)}</span>` : ''}${inspChip}</div>`;
  } else if (ev.kind === 'service'){
    typeLine = ic('service-call') + ' Service Call &middot; ' + (ev.priority === 'urgent' ? ic('conflict') + ' URGENT' : ev.priority === 'high' ? ic('conflict') + ' HIGH' : esc(ev.status || 'open'));
    body = `
      <div class="evt-title">${esc(ev.title)}</div>
      ${ev.subtitle ? `<div class="evt-detail">${esc(ev.subtitle)}</div>` : ''}
      <div class="evt-meta">${ev.time ? `<span class="chip">${esc(ev.time)}</span>` : ''}${ev.phone ? `<span class="chip">${esc(ev.phone)}</span>` : ''}</div>`;
  } else if (ev.kind === 'gcal'){
    typeLine = 'Google Cal';
    body = `
      <div class="evt-title">${esc(ev.title)}</div>
      ${ev.address ? `<div class="evt-detail">${esc(ev.address)}</div>` : ''}
      <div class="evt-meta"><span class="chip">${esc(ev.time || '')}</span></div>`;
  } else if (ev.kind === 'block'){
    const crew = ev.crew_label ? crewByKey(ev.crew_label) : null;
    const st = ev.service_type ? SERVICE_TYPES[ev.service_type] : null;
    typeLine = st ? (ic(st.icon) + ' ' + st.label) : (crew ? esc(crew.shortName) : 'Event');
    const crewChip = crew
      ? `<span class="crew-chip" style="background:${crew.color}22;border-color:${crew.color}66;color:${crew.color}">${esc(crew.shortName)}</span>`
      : '';
    const assignChip = ev.assigned_to
      ? `<span class="crew-chip" style="background:#2dd4bf22;border-color:#2dd4bf66;color:#2dd4bf">${ic('inspector')} ${esc(ev.assigned_to)}</span>`
      : '';
    body = `
      <div class="evt-title">${esc(ev.title)}</div>
      <div class="evt-meta">${ev.time ? `<span class="chip">${esc(ev.time)}</span>` : ''}${crewChip}${assignChip}</div>`;
  }
  // Only pure workorder-bucketed installs are draggable/resizable: they bucket
  // by the WO's own start_date, so a move (PUT start_date) re-buckets cleanly.
  // Estimate-scheduled installs + all other kinds stay locked (view only).
  // allowDrag is true only from renderDayView (the drag engine runs on #board in
  // day view only); crew view passes false so it shows no dead grab/resize UI.
  const isDraggable = allowDrag && ev.kind === 'install' && ev.source === 'workorder' && !!ev.wo_id && (MY_ROLE === 'owner' || MY_ROLE === 'admin');
  const dragAttr = isDraggable ? ' data-draggable="install"' : '';
  const resizeHandle = isDraggable ? '<div class="evt-resize" aria-hidden="true" title="Drag to set how many days"></div>' : '';
  return `<div class="${cls}" tabindex="0" role="button" aria-label="${esc((ev.kind || 'event') + ': ' + (ev.title || '') + (ev.time ? ' at ' + ev.time : ''))}" data-evt='${esc(JSON.stringify(ev))}'${dragAttr}>
    <div class="evt-type">${typeLine}</div>
    ${body}
    ${resizeHandle}
  </div>`;
}

// Float hour-of-day (Halifax) for placing a timed event in the grid; null if untimed.
function eventHour(ev){
  if (ev.startTime){ const hm = hhmm(ev.startTime); if (hm){ const p = hm.split(':'); return Number(p[0]) + Number(p[1]) / 60; } }
  const m = /(\d{1,2}):(\d{2})/.exec(ev.time || '');
  if (m) return Number(m[1]) + Number(m[2]) / 60;
  return null;
}
function eventDurH(ev){
  if (ev.startTime && ev.endTime){ const d = (new Date(ev.endTime) - new Date(ev.startTime)) / 3600000; if (Number.isFinite(d) && d > 0) return d; }
  return 1;
}

// Time-grid week/day view: an all-day lane (installs as spanning bars) above an
// hourly grid (timed inspections / service / blocks / gcal positioned by time).
// Matches the deck mockup. Used for day + week ranges; month/quarter keep the
// list board (a time grid does not fit 30/90 days).
function renderTimeGrid(days){
  const n = days.length;
  const GS = 7, GE = 20, HRS = GE - GS;     // visible band: 7am - 8pm
  const todayIso = isoDay(new Date());

  const heads = days.map((d, i) => {
    const dt = new Date(d.date + 'T00:00:00');
    const today = d.date === todayIso;
    return `<div class="tg-dh ${today ? 'today' : ''}" data-date="${esc(d.date)}" data-idx="${i}"><div class="dn">${DAY_NAMES[dt.getDay()]}</div><div class="dd">${dt.getDate()}</div></div>`;
  }).join('');

  // All-day lane: installs span their duration; all-day gcal sits one column.
  let bars = '';
  days.forEach((d, i) => {
    d.events.filter(e => e.kind === 'install').forEach(ev => {
      const dur = Math.max(1, Number(ev.duration_days) || 1);
      const span = Math.min(dur, n - i);
      const isDraggable = ev.source === 'workorder' && !!ev.wo_id && (MY_ROLE === 'owner' || MY_ROLE === 'admin');
      bars += `<div class="tg-bar evt install${isDraggable ? ' tg-draggable' : ''}" style="grid-column:${i + 1}/span ${span}" data-evt='${esc(JSON.stringify(ev))}'${isDraggable ? ' data-draggable="install"' : ''} title="${esc(ev.title || '')}">`
        + `<span class="tg-bar-t">${esc(ev.title || '')}</span>`
        + (dur > 1 ? `<span class="tg-bar-d">${dur}d</span>` : '')
        + (isDraggable ? '<span class="tg-bar-rz" aria-hidden="true"></span>' : '')
        + `</div>`;
    });
    d.events.filter(e => e.kind === 'gcal' && e.allDay).forEach(ev => {
      bars += `<div class="tg-bar gcal evt gcal" style="grid-column:${i + 1}/span 1" data-evt='${esc(JSON.stringify(ev))}' title="${esc(ev.title || '')}"><span class="tg-bar-t">${esc(ev.title || '')}</span></div>`;
    });
  });

  const cols = days.map(d => {
    const today = d.date === todayIso;
    const timed = d.events.filter(e => e.kind === 'inspection' || e.kind === 'service' || e.kind === 'block' || (e.kind === 'gcal' && !e.allDay));
    const chips = timed.map(ev => {
      let h = eventHour(ev); if (h == null) h = 8;
      const top = Math.max(0, Math.min(HRS - 0.5, h - GS)) / HRS * 100;
      const height = Math.max(5, Math.min(HRS, eventDurH(ev)) / HRS * 100);
      const cls = ['tg-ev', ev.kind, (ev.priority === 'urgent' || ev.priority === 'high') ? ev.priority : ''].filter(Boolean).join(' ');
      return `<div class="${cls}" style="top:${top.toFixed(2)}%;height:${height.toFixed(2)}%" data-evt='${esc(JSON.stringify(ev))}'>`
        + `<span class="tg-ev-t">${esc(ev.contactName || ev.title || '')}</span>`
        + (ev.time ? `<span class="tg-ev-m">${esc(ev.time)}</span>` : '')
        + `</div>`;
    }).join('');
    return `<div class="tg-col ${today ? 'today' : ''}">${chips}</div>`;
  }).join('');

  let hours = '';
  for (let h = GS; h < GE; h++){ hours += `<div class="tg-hour">${((h + 11) % 12) + 1}${h < 12 ? 'a' : 'p'}</div>`; }

  const tgBoard = document.getElementById('board');
  tgBoard.innerHTML = `<div class="tg" style="--cols:${n};--rowh:46px;--hrs:${HRS}">
    <div class="tg-head"><div></div>${heads}</div>
    <div class="tg-allday"><div class="tg-gutter">all day</div><div class="tg-allday-track" style="--cols:${n}">${bars || '<div class="tg-allday-empty"></div>'}</div></div>
    <div class="tg-body"><div class="tg-hours">${hours}</div><div class="tg-cols" style="--cols:${n}">${cols}</div></div>
  </div>`;

  document.querySelectorAll('#board .evt[data-evt]').forEach(el => {
    el.addEventListener('click', () => { if (DRAG.suppressClick){ DRAG.suppressClick = false; return; } openDrawer(JSON.parse(el.dataset.evt)); });
  });
}

function renderDayView(days){
  const todayIso = isoDay(new Date());
  const html = days.map(d => {
    const date = new Date(d.date + 'T00:00:00');
    const dayName = DAY_NAMES[date.getDay()];
    const dayDate = (date.getMonth() + 1) + '/' + date.getDate();
    const isToday = d.date === todayIso;
    const count = d.events.filter(e => e.kind !== 'install-ghost').length;  // badge = real bookings, not continuation ghosts
    const cards = d.events.length
      ? d.events.map(e => evtCard(e, true)).join('')
      : '<div class="empty-day"><img class="empty-illus" src="/assets/calendar/empty-booking.webp" alt="" loading="lazy">no events</div>';
    return `
      <div class="col ${isToday ? 'today' : ''}" data-date="${esc(d.date)}">
        <div class="col-head">
          <div>
            <div class="col-day ${isToday ? 'is-today' : ''}">${esc(dayName)}${isToday ? ' (today)' : ''}</div>
            <div class="col-date">${esc(dayDate)}</div>
          </div>
          <div class="col-count">${count}</div>
        </div>
        ${cards}
      </div>`;
  }).join('');
  document.getElementById('board').innerHTML = html;
  document.querySelectorAll('.evt').forEach(el => {
    if (!el.dataset.evt) return;  // continuation ghosts: display only, no click/drag
    el.addEventListener('click', () => { if (DRAG.suppressClick){ DRAG.suppressClick = false; return; } openDrawer(JSON.parse(el.dataset.evt)); });
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openDrawer(JSON.parse(el.dataset.evt)); } });
  });
}

function renderCrewView(days){
  // Two-bucket crew view: Plus Ultra in-house vs Atlantic Roofing.
  // Inspections + service + gcal always render under Plus Ultra since
  // they're handled by Mac's team.
  const html = CREW_ROSTER.map(crew => {
    const dayGroups = days.map(d => {
      const matched = d.events.filter(ev => {
        if (ev.kind === 'install') return bucketCrew(ev) === crew.key;
        if (ev.kind === 'block') return ev.crew_label === crew.key;
        if ((ev.kind === 'inspection' || ev.kind === 'service') && crew.key === 'plus-ultra') return true;
        if (ev.kind === 'gcal' && crew.key === 'plus-ultra') return true;
        return false;
      });
      if (matched.length === 0) return '';
      const date = new Date(d.date + 'T00:00:00');
      const dayName = DAY_NAMES[date.getDay()];
      return `
        <div class="crew-day-group">
          <div class="crew-day-label">${esc(dayName)} ${date.getMonth()+1}/${date.getDate()}</div>
          ${matched.map(e => evtCard(e, false)).join('')}
        </div>`;
    }).join('');
    const body = dayGroups || `<div class="crew-empty"><img class="empty-illus" src="/assets/calendar/empty-booking.webp" alt="" loading="lazy">No assignments in this range</div>`;
    return `
      <div class="crew-col" data-crew="${esc(crew.key)}">
        <div class="crew-col-head">
          <span class="crew-dot" style="background:${crew.color};color:#041018">${(crew.key === 'atlantic' ? ic('crew-atlantic') : ic('crew-inhouse')) || esc(crew.name.charAt(0))}</span>
          <span class="crew-name">${esc(crew.shortName)}</span>
        </div>
        ${body}
      </div>`;
  }).join('');
  document.getElementById('crewboard').innerHTML = html;
  document.querySelectorAll('.crewboard .evt').forEach(el => {
    el.addEventListener('click', () => openDrawer(JSON.parse(el.dataset.evt)));
  });
}

function openDrawer(ev){
  const isPrivileged = MY_ROLE === 'owner' || MY_ROLE === 'admin';
  let title = ev.title;
  let src = '';
  let dl = '';
  let editForm = '';
  let actions = '<button class="close" id="drawerClose">Close</button>';

  if (ev.kind === 'install'){
    title = ev.title;

// Save an install edit (crew lead / schedule / notes) to its workorder. Mirrors
// production-workorders.html: PUT /api/workorders with the safe-field allowlist.
// Stays on the calendar; refreshes data on success.
async function saveInstall(id, btn){
  const msg = document.getElementById('edMsg');
  const setMsg = (cls, t) => { if (msg){ msg.className = 'save-msg ' + cls; msg.textContent = t; } };
  const durRaw = document.getElementById('edDur').value;
  // Always send these fields, null when cleared, so the inline editor can
  // unschedule an install / remove a duration (matches production-workorders.html).
  const body = {
    id,
    sub_crew_lead: (document.getElementById('edCrew').value || '').trim() || null,
    start_date: document.getElementById('edDate').value || null,
    estimated_duration_days: durRaw === '' ? null : Number(durRaw),
    special_notes: (document.getElementById('edNotes').value || '').trim() || null
  };
  btn.disabled = true; btn.textContent = 'Saving...'; setMsg('', '');
  try {
    const tok = await getToken();
    const r = await fetch('/api/workorders', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tok, 'x-tenant-id': TENANT },
      body: JSON.stringify(body)
    });
    if (!r.ok){ const b = await r.json().catch(() => ({})); setMsg('err', 'Save failed: ' + (b.error || ('HTTP ' + r.status))); btn.disabled = false; btn.textContent = 'Save'; return; }
    setMsg('ok', 'Saved.'); btn.textContent = 'Saved';
    setTimeout(() => { closeDrawer(); loadAll(); }, 500);
  } catch (e){ setMsg('err', 'Network error: ' + e.message); btn.disabled = false; btn.textContent = 'Save'; }
}

// Save a calendar-block edit. PATCH /api/calendar-blocks?id=... (id is a query
// param, not a body field). Date+time -> Halifax wall-clock ISO, DST-correct.
async function saveBlock(id, btn){
  const msg = document.getElementById('edMsg');
  const setMsg = (cls, t) => { if (msg){ msg.className = 'save-msg ' + cls; msg.textContent = t; } };
  const title = (document.getElementById('edTitle').value || '').trim();
  const date = document.getElementById('edDate').value;
  const time = document.getElementById('edTime').value;
  if (!title){ setMsg('err', 'Title is required.'); return; }
  if (!date){ setMsg('err', 'Date is required.'); return; }
  const body = {
    title,
    starts_at: halifaxWallClockToISO(date, time),
    crew_label: document.getElementById('edCrew').value || null,
    service_type: document.getElementById('edSvc').value || null,
    assigned_to: document.getElementById('edAssign').value || null,
    notes: (document.getElementById('edNotes').value || '').trim() || null
  };
  btn.disabled = true; btn.textContent = 'Saving...'; setMsg('', '');
  try {
    const tok = await getToken();
    const r = await fetch('/api/calendar-blocks?id=' + encodeURIComponent(id), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tok, 'x-tenant-id': TENANT },
      body: JSON.stringify(body)
    });
    if (!r.ok){ const b = await r.json().catch(() => ({})); setMsg('err', 'Save failed: ' + (b.error || ('HTTP ' + r.status))); btn.disabled = false; btn.textContent = 'Save'; return; }
    setMsg('ok', 'Saved.'); btn.textContent = 'Saved';
    setTimeout(() => { closeDrawer(); loadAll(); }, 500);
  } catch (e){ setMsg('err', 'Network error: ' + e.message); btn.disabled = false; btn.textContent = 'Save'; }
}

    headers: { 'Authorization': 'Bearer ' + tok, 'x-tenant-id': TENANT }

  loadAll();

// Smart Back: if we arrived here from another Ryujin page, go back to it.
// Otherwise fall through to the href (the cockpit). Never strands the user on
// command-center when they came from somewhere else.
(function(){
  const back = document.getElementById('backLink');
  if (!back) return;
  back.addEventListener('click', e => {
    let sameOrigin = false;
    try { sameOrigin = !!document.referrer && new URL(document.referrer).origin === location.origin; } catch(_){}
    if (sameOrigin && history.length > 1){ e.preventDefault(); history.back(); }
  });
})();

// Range selector wires. Switching ranges re-fires the fetches with new
// days param and re-paints the skeleton at the new column count.
document.querySelectorAll('.rangeSelector button').forEach(btn => {
  btn.addEventListener('click', () => {
    const newRange = ({1:'day',7:'week',30:'month',90:'quarter'})[Number(btn.dataset.days)];
    if (newRange === currentRange) return;
    currentRange = newRange;
    document.body.dataset.range = newRange;
    document.querySelectorAll('.rangeSelector button').forEach(b => {
      b.classList.toggle('active', b === btn);
      b.setAttribute('aria-selected', b === btn ? 'true' : 'false');
    });
    loadAll();
  });
});

// ── Phase 2: drag an install to reschedule + drag its bottom edge to set duration ──
// Pointer Events unify mouse / touch / pen. A move starts on long-press so a
// vertical scroll on mobile is not hijacked. Only workorder-bucketed installs
// are draggable (set in evtCard); writes go to PUT /api/workorders then loadAll.
let _toastTimer = null;
function calToast(msg, isErr){
  let t = document.getElementById('calToast');
  if (!t){ t = document.createElement('div'); t.id = 'calToast'; document.body.appendChild(t); }
  t.className = 'cal-toast' + (isErr ? ' err' : '');
  t.textContent = msg;
  t.style.display = 'block';
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { t.style.display = 'none'; }, isErr ? 5000 : 2400);
}

async function putWorkorder(body){
  const tok = await getToken();
  const r = await fetch('/api/workorders', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tok, 'x-tenant-id': TENANT },
    body: JSON.stringify(body)
  });
  if (!r.ok){ const b = await r.json().catch(() => ({})); throw new Error(b.error || ('HTTP ' + r.status)); }
  return r;
}

async function rescheduleInstall(ev, newDate, card){
  const srcCol = card.closest('.col[data-date]');
  const beforeNext = card.nextSibling;
  const sel = (window.CSS && CSS.escape) ? CSS.escape(newDate) : newDate;
  const targetCol = document.querySelector('.col[data-date="' + sel + '"]');
  if (targetCol) targetCol.appendChild(card);          // optimistic move
  DRAG.inflight = true;
  try {
    await putWorkorder({ id: ev.wo_id, start_date: newDate });
    DRAG.inflight = false;
    calToast('Moved to ' + newDate);
    loadAll();
  } catch (e){
    if (srcCol){ beforeNext ? srcCol.insertBefore(card, beforeNext) : srcCol.appendChild(card); }  // revert
    DRAG.inflight = false;
    calToast('Move failed: ' + e.message, true);
  }
}

async function resizeInstall(ev, newDur){
  DRAG.inflight = true;
  try {
    await putWorkorder({ id: ev.wo_id, estimated_duration_days: newDur });
    DRAG.inflight = false;
    calToast('Set to ' + newDur + ' day' + (newDur > 1 ? 's' : ''));
    loadAll();
  } catch (e){
    DRAG.inflight = false;
    calToast('Resize failed: ' + e.message, true);
  }
}

async function tgReschedule(ev, newDate){
  // Time-grid all-day bar move: no optimistic DOM shuffle (grid-column repaint
  // is fiddly), just write then reload so the bar re-lands on the right day.
  DRAG.inflight = true;
  try {
    await putWorkorder({ id: ev.wo_id, start_date: newDate });
    DRAG.inflight = false; calToast('Moved to ' + newDate); loadAll();
  } catch (e){ DRAG.inflight = false; calToast('Move failed: ' + e.message, true); }
}

function initDragEngine(){
  const board = document.getElementById('board');
  if (!board) return;
  const STEP = 26;                 // px of vertical drag per duration day (list board)
  let mode = null;                 // arm|move|resize (list) ; tg-arm|tg-move|tg-resize (time-grid)
  let armTimer = null;
  let card = null, ev = null, ghost = null, dropCol = null, pid = null, tgDate = null;
  let startX = 0, startY = 0, baseDur = 1;

  const privileged = () => MY_ROLE === 'owner' || MY_ROLE === 'admin';
  const dayView = () => document.body.dataset.view === 'day';
  const colW = () => { const h = document.querySelector('.tg-dh'); return h ? h.getBoundingClientRect().width : 120; };
  function dayAtX(x){ for (const h of document.querySelectorAll('.tg-dh[data-date]')){ const r = h.getBoundingClientRect(); if (x >= r.left && x < r.right) return h.dataset.date; } return null; }
  function clearTgTargets(){ document.querySelectorAll('.tg-dh.drop-target').forEach(h => h.classList.remove('drop-target')); }
  function attach(){ window.addEventListener('pointermove', onMove, true); window.addEventListener('pointerup', onUp, true); window.addEventListener('pointercancel', onUp, true); }
  function teardown(){ window.removeEventListener('pointermove', onMove, true); window.removeEventListener('pointerup', onUp, true); window.removeEventListener('pointercancel', onUp, true); }
  function cleanup(){
    if (armTimer){ clearTimeout(armTimer); armTimer = null; }
    if (ghost){ ghost.remove(); ghost = null; }
    if (card){ card.classList.remove('dragging'); delete card.dataset.previewDur; }
    document.querySelectorAll('.col.drop-target').forEach(c => c.classList.remove('drop-target'));
    clearTgTargets();
    dropCol = null; tgDate = null; mode = null; card = null; ev = null;
    DRAG.active = false; DRAG.resizing = false;
    teardown();
  }
  function markSuppressClick(){ DRAG.suppressClick = true; setTimeout(() => { DRAG.suppressClick = false; }, 400); }
  function moveGhost(x, y){ if (ghost){ ghost.style.left = x + 'px'; ghost.style.top = y + 'px'; } }
  function colAt(x, y){ const el = document.elementFromPoint(x, y); return el ? el.closest('.col[data-date]') : null; }

  function onDown(e){
    if ((e.button != null && e.button !== 0) || DRAG.inflight || !privileged() || !dayView()) return;
    let parsed;
    // Time-grid all-day install bar
    const bar = e.target.closest('.tg-bar[data-draggable="install"]');
    if (bar){
      try { parsed = JSON.parse(bar.dataset.evt || 'null'); } catch (_){ return; }
      if (!parsed || !parsed.wo_id) return;
      card = bar; ev = parsed; pid = e.pointerId; startX = e.clientX; startY = e.clientY; attach();
      if (e.target.closest('.tg-bar-rz')){
        mode = 'tg-resize'; baseDur = Number(ev.duration_days) || 1; DRAG.resizing = true;
        try { card.setPointerCapture(pid); } catch (_){}
        e.preventDefault();
      } else { mode = 'tg-arm'; armTimer = setTimeout(beginTgMove, 230); }
      return;
    }
    // List board card (month/quarter)
    const c = e.target.closest('.evt[data-draggable="install"]');
    if (!c) return;
    try { parsed = JSON.parse(c.dataset.evt || 'null'); } catch (_){ return; }
    if (!parsed || !parsed.wo_id) return;
    card = c; ev = parsed; pid = e.pointerId; startX = e.clientX; startY = e.clientY; attach();
    if (e.target.closest('.evt-resize')){
      mode = 'resize'; baseDur = Number(ev.duration_days) || 1; DRAG.resizing = true;
      try { card.setPointerCapture(pid); } catch (_){}
      e.preventDefault();
    } else { mode = 'arm'; armTimer = setTimeout(beginMove, 230); }
  }

  function beginMove(){
    if (mode !== 'arm' || !card) return;
    mode = 'move'; DRAG.active = true;
    try { card.setPointerCapture(pid); } catch (_){}
    card.classList.add('dragging');
    ghost = card.cloneNode(true); ghost.className = 'evt ' + (ev.kind || '') + ' drag-ghost'; ghost.removeAttribute('data-draggable');
    document.body.appendChild(ghost); moveGhost(startX, startY);
  }
  function beginTgMove(){
    if (mode !== 'tg-arm' || !card) return;
    mode = 'tg-move'; DRAG.active = true;
    try { card.setPointerCapture(pid); } catch (_){}
    card.classList.add('dragging');
    ghost = card.cloneNode(true); ghost.className = 'tg-bar evt install drag-ghost'; ghost.removeAttribute('data-draggable'); ghost.style.gridColumn = '';
    document.body.appendChild(ghost); moveGhost(startX, startY);
  }

  function onMove(e){
    if (mode === 'arm' || mode === 'tg-arm'){ if (Math.hypot(e.clientX - startX, e.clientY - startY) > 9) cleanup(); return; }
    if (mode === 'move'){
      e.preventDefault(); moveGhost(e.clientX, e.clientY);
      const col = colAt(e.clientX, e.clientY);
      if (col !== dropCol){ if (dropCol) dropCol.classList.remove('drop-target'); dropCol = col; if (dropCol) dropCol.classList.add('drop-target'); }
      return;
    }
    if (mode === 'tg-move'){
      e.preventDefault(); moveGhost(e.clientX, e.clientY);
      const date = dayAtX(e.clientX);
      if (date !== tgDate){ clearTgTargets(); tgDate = date; if (date){ const h = [...document.querySelectorAll('.tg-dh[data-date]')].find(x => x.dataset.date === date); if (h) h.classList.add('drop-target'); } }
      return;
    }
    if (mode === 'resize'){ e.preventDefault(); const d = Math.round((e.clientY - startY) / STEP); card.dataset.previewDur = String(Math.max(1, Math.min(30, baseDur + d))); return; }
    if (mode === 'tg-resize'){ e.preventDefault(); const d = Math.round((e.clientX - startX) / colW()); card.dataset.previewDur = String(Math.max(1, Math.min(60, baseDur + d))); return; }
  }

  function onUp(){
    if (mode === 'arm' || mode === 'tg-arm'){ cleanup(); return; }   // tap -> drawer via click
    if (mode === 'move'){
      const newDate = dropCol ? dropCol.dataset.date : null;
      const srcCol = card ? card.closest('.col[data-date]') : null;
      const curDate = srcCol ? srcCol.dataset.date : null;
      const evRef = ev, cardRef = card; cleanup();
      if (!newDate || newDate === curDate) return;
      markSuppressClick(); rescheduleInstall(evRef, newDate, cardRef); return;
    }
    if (mode === 'tg-move'){
      const newDate = tgDate;
      const curDate = String(ev.wo_start_date || ev.startTime || '').slice(0, 10);
      const evRef = ev; cleanup();
      if (!newDate || newDate === curDate) return;
      markSuppressClick(); tgReschedule(evRef, newDate); return;
    }
    if (mode === 'resize' || mode === 'tg-resize'){
      const newDur = Number(card.dataset.previewDur) || baseDur;
      const evRef = ev; cleanup();
      if (newDur === baseDur) return;
      markSuppressClick(); resizeInstall(evRef, newDur); return;
    }
  }

  board.addEventListener('pointerdown', onDown);
}

(async function init(){
  await loadMe();
  // Hide the create FAB for non-privileged roles (was a dead-end alert on click).
  if (!(MY_ROLE === 'owner' || MY_ROLE === 'admin')){
    const fab = document.getElementById('fab');
    if (fab) fab.style.display = 'none';
  }
  // Interactive source-filter legend, available immediately (independent of the
  // icon kit / data load).
  renderLegend();
  // Icon kit is decorative + has a no-op fallback: wire chrome and repaint when
  // it settles, but never gate the operational data load on it.
  iconsReady.then(() => { wireKitChrome(); rerender(); });
  await loadAll();
  initDragEngine();
  // Background refresh: skip when the tab is hidden, a dialog is open, or a
  // drag / write is in flight (would yank the dragged card or clobber a save).
  setInterval(() => {
    if (document.hidden) return;
    if (DRAG.active || DRAG.resizing || DRAG.inflight) return;
    if (document.querySelector('.modal-mask.on, .drawer-mask.on')) return;
    loadAll();
  }, 3 * 60 * 1000);
})();
</script>
