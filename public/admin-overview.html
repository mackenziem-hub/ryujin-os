<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060a14">
<title>Overview · Ryujin OS</title>
<script>
  // Mobile users get the redesigned /portal-mobile.html. Desktop continues
  // on this richer admin-overview dashboard.
  (function () {
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) &&
      !window.matchMedia('(min-width: 1024px)').matches;
    if (isMobile) {
      location.replace('/portal-mobile.html' + location.search + location.hash);
      return;
    }
    const u = (new URLSearchParams(location.search).get('user_id') || '').toLowerCase();
    const pillar = ({
      mac: 'hq', mackenzie: 'hq', catherine: 'hq',
      melodie: 'finance',
      aj: 'service',
      darcy: 'sales',
      diego: 'production', pavanjot: 'production',
    })[u] || 'hq';
    document.documentElement.dataset.pillar = pillar;
  })();
</script>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/assets/logo/icon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<style>
:root{
  --bg:#060a14;
  --glass:rgba(20,30,50,0.85);
  --glass2:rgba(22,34,58,0.80);
  --glass-border:rgba(34,211,238,0.16);
  --glass-border-hi:rgba(34,211,238,0.35);
  --text:#d0daf0;
  --text-dim:rgba(160,190,230,0.55);
  --text-muted:rgba(140,170,220,0.30);
  --cyan:#22d3ee;
  --blue:#4a9eff;
  --purple:#7c3aed;
  --green:#4ade80;
  --yellow:#facc15;
  --red:#f87171;
  --orange:#fb923c;
  --radius:12px;
  --sidebar-w:72px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ─── Sidebar (matches admin.html rail) ─── */
.sidebar{
  width:var(--sidebar-w);
  background:rgba(8,12,24,0.98);
  border-right:1px solid var(--glass-border);
  display:flex;flex-direction:column;align-items:center;
  position:fixed;top:0;bottom:0;z-index:50;
  box-shadow:2px 0 12px rgba(0,0,0,0.4);
}
.sidebar-logo{
  width:44px;height:44px;margin:18px 0 12px;border-radius:12px;
  background:url('/assets/logo/logo-glow.jpg') center/cover;
  box-shadow:0 0 20px rgba(34,211,238,0.3);
  cursor:pointer;
}
.sidebar-divider{
  width:32px;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  opacity:0.3;margin:4px 0 8px;
}
.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:12px;border:1px solid transparent;cursor:pointer;
  color:var(--text-dim);transition:all 0.25s;position:relative;
  text-decoration:none;
}
.nav-icon:hover{background:rgba(34,211,238,0.06);color:var(--text)}
.nav-icon.active{
  background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(124,58,237,0.06));
  color:var(--cyan);border-color:rgba(34,211,238,0.2);
  box-shadow:0 0 20px rgba(34,211,238,0.08);
}
.nav-icon.active::before{
  content:'';position:absolute;left:-1px;top:25%;bottom:25%;
  width:3px;background:var(--cyan);border-radius:0 3px 3px 0;
  box-shadow:0 0 8px var(--cyan);
}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ─── Main ─── */
.main{margin-left:var(--sidebar-w);padding:18px 22px 60px;max-width:1600px}

/* ─── Header — date, salutation, user selector ─── */
.hq-header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.hq-title{flex:1;min-width:280px}
.hq-title .date{
  font-family:'Share Tech Mono',monospace;
  font-size:0.8em;color:var(--text-dim);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;
}
.hq-title h1{
  font-family:'Orbitron',monospace;font-size:1.7em;font-weight:700;letter-spacing:1.5px;
  background:linear-gradient(135deg,#e0e6f0 20%,var(--cyan) 70%,var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hq-title .salutation{font-size:0.85em;color:var(--text-dim);margin-top:6px}

.user-pill-row{display:flex;align-items:center;gap:10px}
.user-pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 14px;border-radius:24px;
  background:var(--glass);border:1px solid var(--glass-border);
  font-size:0.78em;cursor:pointer;color:var(--text-dim);
  transition:all 0.2s;letter-spacing:0.4px;
  font-family:inherit;
}
.user-pill:hover{border-color:var(--glass-border-hi);color:var(--text)}
.user-pill.active{
  background:linear-gradient(135deg,rgba(34,211,238,0.14),rgba(124,58,237,0.08));
  color:var(--cyan);border-color:rgba(34,211,238,0.4);
}
.user-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan)}

/* ─── Power Level Strip ─── */
.power-strip{
  display:flex;align-items:center;gap:14px;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:10px 14px;margin-bottom:18px;
  position:relative;overflow:hidden;
}
.power-strip::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan) 30%,var(--purple) 70%,transparent);opacity:0.6;
}
.power-level{display:flex;align-items:center;gap:10px;font-family:'Orbitron',monospace}
.power-level .lvl-num{
  font-size:1.6em;font-weight:800;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.power-level .lvl-label{font-size:0.66em;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase}
.xp-bar-wrap{flex:1;min-width:160px}
.xp-bar-meta{display:flex;justify-content:space-between;font-size:0.7em;color:var(--text-dim);margin-bottom:4px;font-family:'Share Tech Mono',monospace;letter-spacing:1px}
.xp-bar{
  height:8px;border-radius:4px;background:rgba(34,211,238,0.08);
  border:1px solid var(--glass-border);overflow:hidden;position:relative;
}
.xp-bar-fill{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--cyan),var(--purple));
  box-shadow:0 0 10px rgba(34,211,238,0.4);
  transition:width 0.6s ease;
}
.dragon-challenge{
  display:flex;flex-direction:column;align-items:flex-end;gap:2px;
  padding-left:14px;border-left:1px solid var(--glass-border);min-width:140px;
}
.dragon-challenge .dc-label{font-size:0.62em;letter-spacing:2px;color:var(--text-dim);font-family:'Orbitron',monospace;text-transform:uppercase}
.dragon-challenge .dc-progress{font-size:0.95em;font-weight:700;color:var(--text)}
.dragon-challenge .dc-progress .achieved{color:var(--green)}

/* ─── Section header ─── */
.section-head{
  display:flex;align-items:baseline;gap:10px;margin:18px 0 10px;
  font-family:'Orbitron',monospace;
}
.section-head h2{
  font-size:0.78em;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:var(--text);
}
.section-head .count-pill{
  font-size:0.65em;font-family:'Share Tech Mono',monospace;
  padding:2px 8px;border-radius:10px;
  background:rgba(34,211,238,0.1);border:1px solid var(--glass-border);
  color:var(--cyan);
}

/* ─── Briefing ─── */
.briefing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.brief-card{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:12px 14px;
  position:relative;cursor:pointer;transition:all 0.2s;overflow:hidden;
}
.brief-card:hover{border-color:var(--glass-border-hi);transform:translateY(-1px)}
.brief-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan) 25%,var(--purple) 75%,transparent);
  opacity:0.6;
}
.brief-card.urgent::before{background:linear-gradient(90deg,transparent,var(--red) 25%,var(--orange) 75%,transparent);opacity:0.85}
.brief-card.high::before{background:linear-gradient(90deg,transparent,var(--orange) 25%,var(--yellow) 75%,transparent);opacity:0.7}
.brief-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.brief-prio{
  font-family:'Share Tech Mono',monospace;font-size:0.6em;letter-spacing:1.6px;
  text-transform:uppercase;padding:2px 7px;border-radius:9px;
}
.brief-prio.urgent{background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.3)}
.brief-prio.high{background:rgba(251,146,60,0.15);color:var(--orange);border:1px solid rgba(251,146,60,0.3)}
.brief-prio.normal{background:rgba(34,211,238,0.1);color:var(--cyan);border:1px solid var(--glass-border)}
.brief-source{font-size:0.65em;color:var(--text-muted);font-family:'Share Tech Mono',monospace;letter-spacing:1px;text-transform:uppercase}
.brief-title{font-size:0.92em;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:4px}
.brief-body{font-size:0.78em;color:var(--text-dim);line-height:1.4}

/* ─── Quest Board ─── */
.quest-counts-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.qc-tile{
  flex:1;min-width:110px;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:10px 12px;
  display:flex;flex-direction:column;gap:2px;position:relative;overflow:hidden;
}
.qc-tile .num{font-family:'Orbitron',monospace;font-size:1.4em;font-weight:800;color:var(--text)}
.qc-tile.urgent .num{color:var(--red)}
.qc-tile.daily .num{color:var(--cyan)}
.qc-tile.campaign .num{color:var(--purple)}
.qc-tile.optional .num{color:var(--text-dim)}
.qc-tile .lbl{font-family:'Orbitron',monospace;font-size:0.6em;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}

.quest-list{display:flex;flex-direction:column;gap:8px}
.quest-card{
  display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:12px 14px;
  cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;
}
.quest-card:hover{border-color:var(--glass-border-hi);background:var(--glass2)}
.quest-card.completed{opacity:0.55}
.quest-card.completed .quest-title{text-decoration:line-through}
.quest-check{
  width:22px;height:22px;border-radius:50%;
  border:2px solid var(--glass-border-hi);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.2s;flex-shrink:0;
}
.quest-check:hover{border-color:var(--cyan);box-shadow:0 0 8px rgba(34,211,238,0.3)}
.quest-card.completed .quest-check{
  background:var(--green);border-color:var(--green);
  box-shadow:0 0 8px rgba(74,222,128,0.4);
}
.quest-check svg{width:12px;height:12px;stroke:#0a0e1a;fill:none;stroke-width:3;display:none}
.quest-card.completed .quest-check svg{display:block}
.quest-body{min-width:0}
.quest-meta-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.quest-cat{
  font-family:'Share Tech Mono',monospace;font-size:0.6em;letter-spacing:1.5px;
  text-transform:uppercase;padding:1px 7px;border-radius:8px;
  background:rgba(34,211,238,0.08);color:var(--cyan);border:1px solid var(--glass-border);
}
.quest-cat.sales{background:rgba(34,211,238,0.1);color:var(--cyan)}
.quest-cat.marketing{background:rgba(124,58,237,0.12);color:#a78bfa;border-color:rgba(124,58,237,0.25)}
.quest-cat.ops{background:rgba(74,222,128,0.10);color:var(--green);border-color:rgba(74,222,128,0.25)}
.quest-cat.finance{background:rgba(250,204,21,0.10);color:var(--yellow);border-color:rgba(250,204,21,0.25)}
.quest-cat.customer{background:rgba(74,158,255,0.10);color:var(--blue);border-color:rgba(74,158,255,0.25)}
.quest-cat.strategy{background:rgba(124,58,237,0.10);color:#a78bfa;border-color:rgba(124,58,237,0.25)}
.quest-type{
  font-family:'Share Tech Mono',monospace;font-size:0.6em;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--text-muted);
}
.quest-source{font-family:'Share Tech Mono',monospace;font-size:0.6em;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase}
.quest-title{font-size:0.92em;font-weight:600;color:var(--text);line-height:1.3}
.quest-desc{font-size:0.76em;color:var(--text-dim);line-height:1.35;margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.quest-xp{
  font-family:'Orbitron',monospace;font-size:0.75em;font-weight:700;
  color:var(--cyan);white-space:nowrap;
}

/* ─── KPI tiles ─── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.kpi-tile{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:14px 16px;
  position:relative;overflow:hidden;cursor:pointer;
  transition:all 0.2s;
}
.kpi-tile:hover{border-color:var(--glass-border-hi)}
.kpi-tile::before{
  content:'';position:absolute;bottom:-1px;right:-1px;
  width:18px;height:18px;
  border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);
  border-radius:0 0 var(--radius) 0;opacity:0.25;
}
/* KPI gauge motifs — Grok batch May 9 2026. Rotate 3 styles via :nth-child for variety */
.kpi-tile::after{content:'';position:absolute;right:-12px;top:50%;transform:translateY(-50%);width:90px;height:90px;background-size:contain;background-repeat:no-repeat;background-position:right center;opacity:0.16;pointer-events:none;z-index:0}
.kpi-tile:nth-child(3n+1)::after{background-image:url('/assets/images/kpi-gauge-circle.png')}
.kpi-tile:nth-child(3n+2)::after{background-image:url('/assets/images/kpi-gauge-bar.png')}
.kpi-tile:nth-child(3n+3)::after{background-image:url('/assets/images/kpi-gauge-trend.png')}
.kpi-label,.kpi-value,.kpi-trend{position:relative;z-index:1}
.kpi-label{font-family:'Orbitron',monospace;font-size:0.62em;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
.kpi-value{font-family:'Orbitron',monospace;font-size:1.5em;font-weight:800;color:var(--text);line-height:1.1}
.kpi-unit{font-size:0.55em;color:var(--text-dim);font-weight:500;margin-left:3px}
.kpi-trend{margin-top:4px;font-size:0.7em;font-family:'Share Tech Mono',monospace;letter-spacing:1px}
.kpi-trend.up{color:var(--green)}
.kpi-trend.down{color:var(--red)}
.kpi-trend.flat{color:var(--text-dim)}

/* ─── Empty / loading states ─── */
.empty-state{
  text-align:center;padding:30px 20px;color:var(--text-dim);
  border:1px dashed var(--glass-border);border-radius:var(--radius);
  font-size:0.85em;
}
.empty-state .ico{font-size:2em;margin-bottom:8px;opacity:0.5}
.skeleton{
  background:linear-gradient(90deg,var(--glass) 0%,var(--glass2) 50%,var(--glass) 100%);
  background-size:200% 100%;animation:sk 1.4s infinite;
  border:1px solid var(--glass-border);border-radius:var(--radius);
  height:60px;
}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

.banner{
  display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);
  font-size:0.8em;margin-bottom:14px;line-height:1.4;
}
.banner.warn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:var(--orange)}
.banner.info{background:rgba(34,211,238,0.06);border:1px solid var(--glass-border);color:var(--text-dim)}
.banner code{font-family:'Share Tech Mono',monospace;background:rgba(0,0,0,0.3);padding:1px 6px;border-radius:4px;color:var(--text)}

@media(max-width:768px){
  /* Collapse the icon rail on phones — the agent overlay is the primary
     interface and the rail just steals horizontal space + creates icon
     overlap. Sidebar links are still reachable via direct URL or via the
     agent's navigate actions. */
  .sidebar{display:none}
  .main{margin-left:0;padding:12px}
  .hq-title h1{font-size:1.3em}
  .hq-header{flex-direction:column;align-items:flex-start;gap:8px}
  .user-pill-row{flex-wrap:wrap;width:100%}
  .user-pill{font-size:0.7em;padding:6px 10px}
  .briefing-grid{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:540px){
  .kpi-grid{grid-template-columns:1fr}
  .quest-card{grid-template-columns:auto 1fr;row-gap:6px}
}
</style>

<script src="/assets/entitlements-client.js" defer></script>
<script src="/assets/mode-switcher.js" defer></script>
<script src="/assets/agent-mode-shell.js" defer></script>
<script src="/assets/interactive-mode-shell.js" defer></script>
<script src="/assets/labels-client.js" defer></script>

    </a>

</aside>

<main class="main">

  <div class="hq-header">
    <div class="hq-title">
      <div class="date" id="dateLine">Loading…</div>
      <h1>Command Overview</h1>
      <div class="salutation" id="salutation">Welcome back.</div>
    </div>
    <div class="user-pill-row" id="userPills"></div>
  </div>

  <div id="banner-slot"></div>

  <!-- Morning Briefing -->
  <div class="section-head" style="background:url('/assets/images/briefing-hero.png') right center/auto 100% no-repeat;background-blend-mode:overlay;border-radius:14px;padding:18px 22px;margin-bottom:10px;border:1px solid var(--glass-border);min-height:88px">
    <h2>Morning Briefing</h2>
    <span class="count-pill" id="briefCount">—</span>
  </div>
  <div id="briefingArea">
    <div class="skeleton" style="margin-bottom:8px"></div>
    <div class="skeleton" style="margin-bottom:8px"></div>
    <div class="skeleton"></div>
  </div>

  <!-- Tasks -->
  <div class="section-head">
    <h2>Tasks</h2>
    <span class="count-pill" id="questCount">—</span>
  </div>
  <div class="quest-list" id="questList">
    <div class="skeleton"></div>
  </div>

  <!-- KPIs -->
  <div class="section-head" style="margin-top:24px">
    <h2>KPIs</h2>
    <span class="count-pill" id="kpiCount">—</span>
  </div>
  <div class="kpi-grid" id="kpiGrid">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

  <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:32px;justify-content:flex-end">
    <a href="#" data-install-btn style="display:inline-block;font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.6px;text-transform:uppercase;color:rgba(160,190,230,0.55);text-decoration:none;border:1px solid rgba(34,211,238,0.16);padding:8px 16px;border-radius:18px;transition:all 0.15s">📱 Install on phone</a>
  </div>

</main>
<script src="/assets/install-pwa.js" defer></script>

<script>
const TENANT = 'plus-ultra';
// Users are placeholders until we have real user IDs from the users table.
// localStorage stores the slug; once Mac, Catherine, Darcy have rows, swap to uuids.
const USERS = [
  { id: null,        label: 'All',       short: 'All' },
  { id: 'mac',       label: 'Mackenzie', short: 'Mac' },
  { id: 'catherine', label: 'Catherine', short: 'Cat' },
  { id: 'darcy',     label: 'Darcy',     short: 'Darcy' }
];
let activeUserId = localStorage.getItem('overview_active_user') || null;
if (activeUserId === 'null') activeUserId = null;

function fmtDate(d) {
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}
function salutation() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning.';
  if (h < 18) return 'Good afternoon.';
  return 'Good evening.';
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function levelLabel(lvl) {
  if (!lvl) return 'Genin Roofer';
  if (lvl >= 50) return 'Dragon Master';
  if (lvl >= 30) return 'Sage';
  if (lvl >= 15) return 'Sensei';
  if (lvl >= 8)  return 'Adept';
  if (lvl >= 3)  return 'Apprentice';
  return 'Genin Roofer';
}
function xpForLevel(lvl) { return Math.floor((lvl - 1) * (lvl - 1) * 50); }

function renderUserPills() {
  const wrap = document.getElementById('userPills');
  wrap.innerHTML = USERS.map(u => `
    <button class="user-pill ${(activeUserId == u.id || (!activeUserId && !u.id)) ? 'active' : ''}"
            data-uid="${u.id || ''}">
      <span class="dot"></span>${u.short}
    </button>
  `).join('');
  wrap.querySelectorAll('.user-pill').forEach(b => {
    b.addEventListener('click', () => {
      activeUserId = b.dataset.uid || null;
      localStorage.setItem('overview_active_user', activeUserId || 'null');
      renderUserPills();
      load();
    });
  });
}

function renderPower(state) {
  const u = state.user || {};
  const lvl = u.power_level || 1;
  const xp  = u.xp_total || 0;
  const xpThisLvl = xp - xpForLevel(lvl);
  const xpNeeded  = Math.max(1, xpForLevel(lvl + 1) - xpForLevel(lvl));
  const pct = Math.min(100, Math.round((xpThisLvl / xpNeeded) * 100));

  // Gamification UI (power level / XP bar / dragon challenge) was retired
  // in the mobile-simplification pass. State fields still flow from /api/state
  // but no longer render. lvl/xp/pct kept above so we don't break the API
  // contract if a future refactor wants to re-enable.
  void lvl; void xp; void xpThisLvl; void xpNeeded; void pct;
}

function renderBriefing(items) {
  const area = document.getElementById('briefingArea');
  document.getElementById('briefCount').textContent = items.length;
  if (items.length === 0) {
    area.innerHTML = `
      <div class="empty-state">
        <div class="ico">◇</div>
        Nothing on the briefing today. Agents run at 10:45 UTC daily — fresh items appear after that.
      </div>`;
    return;
  }
  area.innerHTML = `<div class="briefing-grid">${items.map(b => `
    <div class="brief-card ${b.priority || 'normal'}">
      <div class="brief-meta">
        <span class="brief-prio ${b.priority || 'normal'}">${(b.priority || 'normal').toUpperCase()}</span>
        ${b.source_agent ? `<span class="brief-source">${escapeHtml(b.source_agent)} agent</span>` : ''}
      </div>
      <div class="brief-title">${escapeHtml(b.title)}</div>
      ${b.body ? `<div class="brief-body">${escapeHtml(b.body)}</div>` : ''}
    </div>`).join('')}</div>`;
}

function renderQuestCounts(c) {
  // Only the open-count pill remains; category-split tiles (urgent/daily/
  // campaign/optional) were retired in the mobile-simplification pass.
  document.getElementById('questCount').textContent  = c.open ?? 0;
}

function renderQuests(quests) {
  const list = document.getElementById('questList');
  if (quests.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="ico">◇</div>
        No tasks right now. Agents emit tasks on each daily run; you can also add one manually.
      </div>`;
    return;
  }
  list.innerHTML = quests.map(q => `
    <div class="quest-card ${q.status === 'completed' ? 'completed' : ''}" data-id="${q.id}">
      <div class="quest-check" data-id="${q.id}" data-status="${q.status}">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <div class="quest-body">
        <div class="quest-meta-row">
          <span class="quest-cat ${q.category}">${escapeHtml(q.category)}</span>
          <span class="quest-type">${escapeHtml(q.type)}</span>
          ${q.source_agent ? `<span class="quest-source">via ${escapeHtml(q.source_agent)}</span>` : ''}
        </div>
        <div class="quest-title">${escapeHtml(q.title)}</div>
        ${q.description ? `<div class="quest-desc">${escapeHtml(q.description)}</div>` : ''}
      </div>
    </div>`).join('');

  list.querySelectorAll('.quest-check').forEach(el => {
    el.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = el.dataset.id;
      const cur = el.dataset.status;
      const next = cur === 'completed' ? 'open' : 'completed';
      const resp = await fetch(`/api/quests?id=${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'x-tenant-id': TENANT },
        body: JSON.stringify({ status: next })
      });
      if (resp.ok) load();
    });
  });
}

function renderKpis(kpis) {
  const grid = document.getElementById('kpiGrid');
  document.getElementById('kpiCount').textContent = kpis.length;
  if (kpis.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="ico">▲</div>
        No KPIs tracked yet. Agents populate these on each daily run.
      </div>`;
    return;
  }
  grid.innerHTML = kpis.map(k => {
    const trend = k.trend || (k.trend_pct > 0 ? 'up' : k.trend_pct < 0 ? 'down' : 'flat');
    const trendArrow = trend === 'up' ? '▲' : trend === 'down' ? '▼' : '—';
    return `
    <div class="kpi-tile" data-key="${escapeHtml(k.key)}">
      <div class="kpi-label">${escapeHtml(k.label)}</div>
      <div class="kpi-value">${k.unit === '$' ? '$' : ''}${escapeHtml(k.value || '—')}<span class="kpi-unit">${k.unit && k.unit !== '$' ? escapeHtml(k.unit) : ''}</span></div>
      ${k.trend_pct !== null && k.trend_pct !== undefined ? `<div class="kpi-trend ${trend}">${trendArrow} ${Math.abs(k.trend_pct)}%</div>` : ''}
    </div>`;
  }).join('');
}

function showBanner(kind, msg, isHtml=false) {
  const slot = document.getElementById('banner-slot');
  if (isHtml) slot.innerHTML = `<div class="banner ${kind}">${msg}</div>`;
  else slot.innerHTML = `<div class="banner ${kind}">${escapeHtml(msg)}</div>`;
}

async function load() {
  document.getElementById('dateLine').textContent = fmtDate(new Date());
  document.getElementById('salutation').textContent = salutation();

  let url = '/api/state';
  if (activeUserId) url += `?user_id=${encodeURIComponent(activeUserId)}`;
  try {
    const resp = await fetch(url, { headers: { 'x-tenant-id': TENANT } });
    if (!resp.ok) {
      const txt = await resp.text();
      // Schema not applied? Show a helpful banner.
      if (resp.status === 500 && /relation .* does not exist|column .* does not exist/i.test(txt)) {
        showBanner('warn', `Migration <code>041_admin_core</code> not yet applied. Apply via Supabase Studio SQL Editor or <code>node scripts/run-migration.mjs schema/migration_041_admin_core.sql</code>.`, true);
      } else {
        showBanner('warn', `Could not load state: HTTP ${resp.status} — ${txt.slice(0, 200)}`);
      }
      renderPower({ user: null, dragonChallenge: {} });
      renderBriefing([]);
      renderQuestCounts({});
      renderQuests([]);
      renderKpis([]);
      return;
    }
    const state = await resp.json();
    renderPower(state);
    renderBriefing(state.briefing || []);
    renderQuestCounts((state.quests && state.quests.counts) || {});
    renderQuests((state.quests && state.quests.open) || []);
    renderKpis(state.kpis || []);
    document.getElementById('banner-slot').innerHTML = '';
  } catch (e) {
    showBanner('warn', `Network error: ${e.message}`);
  }
}

renderUserPills();
load();
// Auto-refresh every 5 min so a manual agent run shows up
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
