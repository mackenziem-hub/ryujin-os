<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060a14">
<title>Strategy · Marketing · Ryujin OS</title>
<link rel="icon" href="/assets/logo/icon.png" onerror="this.href='/assets/logo/logo-glow.jpg'">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<style>
:root{
  --bg:#060a14;--glass:rgba(20,30,50,0.85);--glass2:rgba(22,34,58,0.80);
  --glass-border:rgba(34,211,238,0.16);--glass-border-hi:rgba(34,211,238,0.35);
  --text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);
  --cyan:#22d3ee;--blue:#4a9eff;--purple:#7c3aed;
  --green:#4ade80;--yellow:#facc15;--red:#f87171;--orange:#fb923c;--gold:#fbbf24;
  --radius:12px;--sidebar-w:72px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;overflow-x:hidden}

.sidebar{width:var(--sidebar-w);background:rgba(8,12,24,0.98);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;bottom:0;z-index:50;box-shadow:2px 0 12px rgba(0,0,0,0.4)}
.sidebar-logo{width:44px;height:44px;margin:18px 0 12px;border-radius:12px;background:url('/assets/logo/logo-glow.jpg') center/cover;box-shadow:0 0 20px rgba(34,211,238,0.3);cursor:pointer}
.sidebar-divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;margin:4px 0 8px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid transparent;cursor:pointer;color:var(--text-dim);transition:all 0.25s;position:relative;text-decoration:none}
.nav-icon:hover{background:rgba(34,211,238,0.06);color:var(--text)}
.nav-icon.active{background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(124,58,237,0.06));color:var(--cyan);border-color:rgba(34,211,238,0.2);box-shadow:0 0 20px rgba(34,211,238,0.08)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:3px;background:var(--cyan);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--cyan)}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.main{margin-left:var(--sidebar-w);padding:18px 22px 60px;max-width:1400px}
.hq-header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.hq-title .crumb{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hq-title h1{font-family:'Orbitron',monospace;font-size:1.7em;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,#e0e6f0 20%,var(--cyan) 70%,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hq-title .sub{font-size:0.85em;color:var(--text-dim);margin-top:6px;max-width:680px;line-height:1.4}
.btn{font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:8px 16px;border-radius:18px;cursor:pointer;border:1px solid var(--glass-border);background:transparent;color:var(--text-dim);transition:all 0.2s}
.btn:hover{color:var(--text);border-color:var(--glass-border-hi)}
.btn.primary{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#0a0e1a;border:none;box-shadow:0 0 12px rgba(34,211,238,0.3)}

.frame-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:18px}
.frame-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:12px 14px;position:relative;overflow:hidden}
.frame-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--purple) 30%,var(--cyan) 70%,transparent);opacity:0.5}
.frame-h{font-family:'Orbitron',monospace;font-size:0.55em;letter-spacing:1.8px;color:var(--text-dim);text-transform:uppercase;margin-bottom:4px}
.frame-num{font-family:'Orbitron',monospace;font-size:1.5em;font-weight:800;color:var(--cyan);line-height:1}
.frame-num.green{color:var(--green)}.frame-num.gold{color:var(--gold)}.frame-num.purple{color:#a78bfa}
.frame-sub{font-size:0.7em;color:var(--text-muted);font-family:'Share Tech Mono',monospace;letter-spacing:0.5px;margin-top:3px}

.section-head{display:flex;align-items:baseline;gap:10px;margin:18px 0 10px;font-family:'Orbitron',monospace}
.section-head h2{font-size:0.78em;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.section-head .count-pill{font-size:0.65em;font-family:'Share Tech Mono',monospace;padding:2px 8px;border-radius:10px;background:rgba(34,211,238,0.1);border:1px solid var(--glass-border);color:var(--cyan)}

.briefing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.brief-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:12px 14px;position:relative;overflow:hidden}
.brief-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan) 25%,var(--purple) 75%,transparent);opacity:0.6}
.brief-card.urgent::before{background:linear-gradient(90deg,transparent,var(--red) 25%,var(--orange) 75%,transparent);opacity:0.85}
.brief-card.high::before{background:linear-gradient(90deg,transparent,var(--orange) 25%,var(--yellow) 75%,transparent);opacity:0.7}
.brief-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.brief-prio{font-family:'Share Tech Mono',monospace;font-size:0.6em;letter-spacing:1.6px;text-transform:uppercase;padding:2px 7px;border-radius:9px}
.brief-prio.urgent{background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.3)}
.brief-prio.high{background:rgba(251,146,60,0.15);color:var(--orange);border:1px solid rgba(251,146,60,0.3)}
.brief-prio.normal{background:rgba(34,211,238,0.1);color:var(--cyan);border:1px solid var(--glass-border)}
.brief-title{font-size:0.92em;font-weight:600;color:var(--text);line-height:1.35}
.brief-body{font-size:0.78em;color:var(--text-dim);line-height:1.4;margin-top:4px}

.camp-row{display:flex;flex-direction:column;gap:8px}
.camp-item{display:grid;grid-template-columns:auto 1fr auto auto;gap:14px;align-items:center;background:var(--glass);border:1px solid var(--glass-border);border-radius:8px;padding:10px 14px;font-size:0.85em}
.camp-status{font-family:'Share Tech Mono',monospace;font-size:0.6em;letter-spacing:1.4px;text-transform:uppercase;padding:2px 7px;border-radius:8px}
.camp-status.active{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.25)}
.camp-status.draft,.camp-status.scheduled{background:rgba(140,170,220,0.08);color:var(--text-dim);border:1px solid var(--glass-border)}
.camp-name{font-weight:600}
.camp-step{font-family:'Share Tech Mono',monospace;font-size:0.75em;color:var(--cyan);letter-spacing:0.5px}

.empty-state{text-align:center;padding:24px 16px;color:var(--text-dim);border:1px dashed var(--glass-border);border-radius:var(--radius);font-size:0.85em}
.empty-state .ico{font-size:1.6em;margin-bottom:6px;opacity:0.5}
.skeleton{background:linear-gradient(90deg,var(--glass) 0%,var(--glass2) 50%,var(--glass) 100%);background-size:200% 100%;animation:sk 1.4s infinite;border:1px solid var(--glass-border);border-radius:var(--radius);height:60px;margin-bottom:6px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);font-size:0.8em;margin-bottom:14px}
.banner.warn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:var(--orange)}

@media(max-width:768px){.main{padding:12px}.hq-title h1{font-size:1.3em}}
</style>
<script src="/assets/marketing-toolbar.js" defer></script>
  <script src="/assets/ryujin-slug.js"></script>
</head>
<body>

<aside class="sidebar">
  <a href="/admin.html" class="sidebar-logo" title="Admin Home"></a>
  <div class="sidebar-divider"></div>
  <nav class="sidebar-nav">
    <a href="/admin-overview.html" class="nav-icon" title="Overview"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg></a>
    <a href="/admin-quests.html" class="nav-icon" title="Quests"><svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M21 12c0 5-4 9-9 9s-9-4-9-9 4-9 9-9c2 0 4 1 5 2"/></svg></a>
    <a href="/admin-agents.html" class="nav-icon" title="Agents"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-2a8 8 0 0116 0v2"/></svg></a>
    <a href="/marketing.html" class="nav-icon active" title="Marketing"><svg viewBox="0 0 24 24"><path d="M3 11l18-9v18l-18-9zM7 13v6"/></svg></a>
    <a href="/sales-portal.html" class="nav-icon" title="Sales"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9a4 4 0 100 8h6a4 4 0 110 8H6"/></svg></a>
    <a href="/admin.html" class="nav-icon" title="Full Admin"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></a>
  </nav>
</aside>

<main class="main">

  <div class="hq-header">
    <div class="hq-title">
      <div class="crumb">Marketing · Strategy</div>
      <h1>Strategy</h1>
      <div class="sub">Today's marketing landscape — Hormozi framework, agent briefing, active campaigns, scheduled fan-out.</div>
    </div>
    <a class="btn primary" href="/marketing.html">← Back to Marketing</a>
  </div>

  <div id="banner-slot"></div>

  <div class="frame-strip" id="frameStrip">
    <div class="skeleton" style="height:74px"></div>
    <div class="skeleton" style="height:74px"></div>
    <div class="skeleton" style="height:74px"></div>
    <div class="skeleton" style="height:74px"></div>
  </div>

  <div class="section-head">
    <h2>Today's Brief</h2>
    <span class="count-pill" id="briefCount">—</span>
  </div>
  <div id="briefingArea">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

  <div class="section-head" style="margin-top:24px">
    <h2>Active Campaigns</h2>
    <span class="count-pill" id="campCount">—</span>
  </div>
  <div class="camp-row" id="campList">
    <div class="empty-state">Loading…</div>
  </div>

  <div class="section-head" style="margin-top:24px">
    <h2>Scheduled This Week</h2>
    <span class="count-pill" id="schedCount">—</span>
  </div>
  <div class="camp-row" id="schedList">
    <div class="empty-state">Loading…</div>
  </div>

</main>

<script>
const TENANT = window.RYUJIN_TENANT_SLUG;
function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtRel(iso) {
  if (!iso) return '';
  const dt = new Date(iso).getTime() - Date.now();
  const abs = Math.abs(dt);
  if (abs < 60000) return 'now';
  if (abs < 3600000) return (dt > 0 ? 'in ' : '') + Math.floor(abs / 60000) + 'm' + (dt > 0 ? '' : ' ago');
  if (abs < 86400000) return (dt > 0 ? 'in ' : '') + Math.floor(abs / 3600000) + 'h' + (dt > 0 ? '' : ' ago');
  return (dt > 0 ? 'in ' : '') + Math.floor(abs / 86400000) + 'd' + (dt > 0 ? '' : ' ago');
}
function showBanner(msg, isHtml=false) {
  const slot = document.getElementById('banner-slot');
  if (isHtml) slot.innerHTML = `<div class="banner warn">${msg}</div>`;
  else slot.innerHTML = `<div class="banner warn">${escapeHtml(msg)}</div>`;
}
function frameValue(kpis, key, fallback='—') {
  const k = (kpis || []).find(x => x.key === key);
  return k ? (k.unit === '$' ? '$' + k.value : k.value) : fallback;
}
function renderFramework(kpis) {
  const leads = frameValue(kpis, 'marketing.leads_this_week', '0');
  const conv = frameValue(kpis, 'marketing.conversion_rate', '0%');
  const spend = frameValue(kpis, 'marketing.meta_spend', '$0');
  const pipeline = frameValue(kpis, 'sales.pipeline_value', '$0');
  document.getElementById('frameStrip').innerHTML = `
    <div class="frame-card"><div class="frame-h">① Offer</div><div class="frame-num gold">${pipeline}</div><div class="frame-sub">Pipeline value</div></div>
    <div class="frame-card"><div class="frame-h">② Audience</div><div class="frame-num green">${leads}</div><div class="frame-sub">Leads this week</div></div>
    <div class="frame-card"><div class="frame-h">③ Creative</div><div class="frame-num purple">${spend}</div><div class="frame-sub">Ad spend</div></div>
    <div class="frame-card"><div class="frame-h">④ Funnel</div><div class="frame-num">${conv}</div><div class="frame-sub">Conversion rate</div></div>
  `;
}
function renderBriefing(items) {
  document.getElementById('briefCount').textContent = items.length;
  const area = document.getElementById('briefingArea');
  if (items.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="ico">◇</div>Marketing briefing is empty today. The agent runs at 10:45 UTC daily.</div>`;
    return;
  }
  area.innerHTML = `<div class="briefing-grid">${items.map(b => `
    <div class="brief-card ${b.priority || 'normal'}">
      <div class="brief-meta"><span class="brief-prio ${b.priority || 'normal'}">${(b.priority || 'normal').toUpperCase()}</span></div>
      <div class="brief-title">${escapeHtml(b.title)}</div>
      ${b.body ? `<div class="brief-body">${escapeHtml(b.body)}</div>` : ''}
    </div>`).join('')}</div>`;
}
async function loadCampaigns() {
  try {
    const resp = await fetch('/api/campaigns?status=active&limit=20', { headers: { 'x-tenant-id': TENANT } });
    if (!resp.ok) {
      document.getElementById('campCount').textContent = '0';
      document.getElementById('campList').innerHTML = `<div class="empty-state">Campaigns table not ready (apply migration 043).</div>`;
      return;
    }
    const data = await resp.json();
    const list = data.campaigns || [];
    document.getElementById('campCount').textContent = list.length;
    if (list.length === 0) {
      document.getElementById('campList').innerHTML = `<div class="empty-state">No active campaigns. Build one in <a href="/marketing-campaign.html" style="color:var(--cyan)">Campaigns</a>.</div>`;
      return;
    }
    document.getElementById('campList').innerHTML = list.map(c => `
      <div class="camp-item">
        <span class="camp-status ${c.status}">${c.status}</span>
        <div class="camp-name">${escapeHtml(c.name)}</div>
        <div class="camp-step">Step ${c.hormozi_step || 1}/5</div>
        <a class="btn" href="/marketing-campaign.html" style="font-size:0.6em">Edit</a>
      </div>`).join('');
  } catch {
    document.getElementById('campList').innerHTML = `<div class="empty-state">Could not load campaigns.</div>`;
  }
}
async function loadScheduled() {
  const since = new Date().toISOString();
  const until = new Date(Date.now() + 7 * 86400000).toISOString();
  try {
    const resp = await fetch(`/api/scheduled-posts?since=${encodeURIComponent(since)}&until=${encodeURIComponent(until)}`, { headers: { 'x-tenant-id': TENANT } });
    if (!resp.ok) {
      document.getElementById('schedCount').textContent = '0';
      document.getElementById('schedList').innerHTML = `<div class="empty-state">Scheduled posts unavailable.</div>`;
      return;
    }
    const data = await resp.json();
    const list = data.posts || [];
    document.getElementById('schedCount').textContent = list.length;
    if (list.length === 0) {
      document.getElementById('schedList').innerHTML = `<div class="empty-state">Nothing scheduled in the next 7 days. Schedule via <a href="/marketing-content-calendar.html" style="color:var(--cyan)">Content Calendar</a>.</div>`;
      return;
    }
    list.sort((a, b) => new Date(a.scheduled_at) - new Date(b.scheduled_at));
    document.getElementById('schedList').innerHTML = list.slice(0, 12).map(p => `
      <div class="camp-item">
        <span class="camp-status ${p.status === 'scheduled' ? 'active' : 'draft'}">${escapeHtml(p.status || '—')}</span>
        <div class="camp-name">${escapeHtml(p.account_label || p.platform || 'post')}</div>
        <div class="camp-step">${escapeHtml(p.platform || '')}</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:0.75em;color:var(--text-dim)">${fmtRel(p.scheduled_at)}</div>
      </div>`).join('');
  } catch {
    document.getElementById('schedList').innerHTML = `<div class="empty-state">Could not load scheduled posts.</div>`;
  }
}
async function load() {
  try {
    const resp = await fetch('/api/marketing-state', { headers: { 'x-tenant-id': TENANT } });
    if (!resp.ok) {
      const txt = await resp.text();
      if (resp.status === 500 && /relation .* does not exist/i.test(txt)) showBanner(`Migration 041 not applied yet.`, true);
      else showBanner(`Could not load: HTTP ${resp.status}`);
      return;
    }
    const data = await resp.json();
    document.getElementById('banner-slot').innerHTML = '';
    renderFramework(data.kpis || []);
    renderBriefing(data.briefing || []);
  } catch (e) { showBanner(`Network: ${e.message}`); }
}
load(); loadCampaigns(); loadScheduled();
setInterval(load, 5 * 60 * 1000);
</script>
