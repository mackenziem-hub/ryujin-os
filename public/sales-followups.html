<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Follow-Ups</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow-x:hidden;min-height:100vh}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(34,211,238,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(124,58,237,0.08) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(34,211,238,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}
.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(34,211,238,0.22);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#22d3ee,#7c3aed,transparent);opacity:0.5}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #fff;border-radius:10px;color:#030611;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none;transition:all 0.2s}
.btn-back:hover{background:rgba(255,255,255,0.85);box-shadow:0 0 14px rgba(255,255,255,0.35)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(200,240,255,0.3),rgba(34,211,238,0.22) 40%,rgba(5,15,30,0.8));box-shadow:0 0 14px rgba(34,211,238,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}

.stage{position:relative;z-index:5;padding:80px 28px 60px;max-width:1280px;margin:0 auto}
.hero{margin-bottom:18px}
.hero .eyebrow{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:#22d3ee;letter-spacing:3px;margin-bottom:6px}
.hero h1{font-family:'Orbitron',sans-serif;font-size:2em;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{padding:14px 18px;background:rgba(14,22,40,0.55);border:1px solid rgba(34,211,238,0.16);border-radius:12px}
.stat .lbl{font-family:'Share Tech Mono',monospace;font-size:0.66em;color:rgba(200,220,255,0.5);letter-spacing:1.5px;text-transform:uppercase}
.stat .val{font-family:'Orbitron',sans-serif;font-size:1.4em;font-weight:900;color:#22d3ee;margin-top:4px}
.stat.warn .val{color:#facc15}
.stat.urgent .val{color:#f87171}
@media (max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}}

.buckets{display:flex;flex-direction:column;gap:16px}
.bucket{background:rgba(14,22,40,0.55);border:1px solid rgba(34,211,238,0.14);border-radius:14px;overflow:hidden}
.bucket-head{padding:12px 18px;background:rgba(6,10,20,0.65);border-bottom:1px solid rgba(34,211,238,0.14);display:flex;justify-content:space-between;align-items:center}
.bucket-head .name{font-family:'Orbitron',sans-serif;font-size:0.8em;font-weight:800;letter-spacing:2px;color:#22d3ee}
.bucket-head .count{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:rgba(200,220,255,0.55);letter-spacing:1.5px}
.bucket.urgent .bucket-head{background:rgba(248,113,113,0.08);border-bottom-color:rgba(248,113,113,0.3)}
.bucket.urgent .bucket-head .name{color:#f87171}
.bucket.today .bucket-head{background:rgba(250,204,21,0.08)}
.bucket.today .bucket-head .name{color:#facc15}
.bucket-body{display:flex;flex-direction:column}

.row{display:grid;grid-template-columns:2fr 100px 110px 120px 40px;gap:12px;align-items:center;padding:12px 18px;border-bottom:1px solid rgba(34,211,238,0.06);transition:background 0.15s;text-decoration:none;color:inherit}
.row:hover{background:rgba(34,211,238,0.04)}
.row:last-child{border-bottom:none}
.row .name{font-weight:700;font-size:0.95em;margin-bottom:2px}
.row .addr{font-size:0.74em;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;letter-spacing:0.5px}
.row .age{font-family:'Share Tech Mono',monospace;font-size:0.72em;letter-spacing:1px}
.row .val{font-family:'Orbitron',sans-serif;font-size:0.92em;font-weight:800;color:#22d3ee}
.row .arrow{color:rgba(34,211,238,0.4);justify-self:end}
.row:hover .arrow{color:#22d3ee}
.row .arrow svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.row.stale .age{color:#f87171}
.row.warm .age{color:#facc15}
.row.fresh .age{color:rgba(200,220,255,0.6)}

@media (max-width:760px){
  .row{grid-template-columns:1fr auto}
  .row>div:nth-child(2),.row>div:nth-child(3){display:none}
}

.bucket-empty{padding:24px;text-align:center;color:rgba(200,220,255,0.4);font-family:'Share Tech Mono',monospace;font-size:0.74em;letter-spacing:1.5px}
.loading{text-align:center;padding:60px;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1.5px}

.stage-badge{display:inline-block;padding:2px 7px;font-family:'Share Tech Mono',monospace;font-size:0.6em;font-weight:700;letter-spacing:1.2px;border-radius:4px;background:rgba(124,58,237,0.15);color:#a78bfa;margin-top:3px;border:1px solid rgba(124,58,237,0.28)}
</style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="btn-back" href="sales.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> BACK</a>
  <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· FOLLOW-UPS</span></div></div>
  <div class="tb-spacer"></div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px" id="countBadge">—</div>
</div>

<div class="stage">
  <div class="hero">
    <div class="eyebrow">SALES · STALE DEALS + DUE OUTREACH</div>
    <h1>Follow-Ups</h1>
  </div>

  <div class="stats">
    <div class="stat urgent"><div class="lbl">Stale (30+ days)</div><div class="val" id="sStale">—</div></div>
    <div class="stat warn"><div class="lbl">Aging (14-30 days)</div><div class="val" id="sAging">—</div></div>
    <div class="stat"><div class="lbl">Fresh (&lt;14 days)</div><div class="val" id="sFresh">—</div></div>
    <div class="stat"><div class="lbl">Total Open Value</div><div class="val" id="sValue">—</div></div>
  </div>

  <div class="buckets" id="buckets">
    <div class="loading">LOADING PIPELINE...</div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = n => n ? '$' + Math.round(n/1000) + 'K' : '—';

function daysSince(iso){
  if (!iso) return 999;
  const d = new Date(iso);
  if (isNaN(d.getTime())) return 999;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}

// Stages that NEED follow-up (active sales stages, not closed)
const FOLLOWUP_STAGES = [
  'Quote Sent','Quote Prepped','Verified Lead - Quote Pending','Verified Lead | Ready to Prep Quote',
  'Appointment Booked','Ready to Present','Inspection Scheduled','Text Sent- Awaiting Response',
  'Follow Up Text Sent','Client Responded','Proposal Sent','New Lead','Unverified Lead'
];

async function loadAll(){
  try {
    const r = await fetch('https://shenron-app.vercel.app/api/ghl?mode=pipeline&limit=200');
    if (!r.ok) { $('buckets').innerHTML = '<div class="loading">GHL fetch failed · HTTP ' + r.status + '</div>'; return; }
    const { opportunities } = await r.json();
    const needsFollowup = (opportunities || []).filter(o =>
      o.status === 'open' && FOLLOWUP_STAGES.some(s => (o.stage || '').includes(s.split(' ')[0]) || (o.stage || '') === s)
    );

    // Bucket by staleness
    const stale = []; const aging = []; const fresh = [];
    needsFollowup.forEach(o => {
      const days = daysSince(o.lastStatusChange || o.createdAt);
      o._days = days;
      if (days >= 30) stale.push(o);
      else if (days >= 14) aging.push(o);
      else fresh.push(o);
    });

    // Sort each by staleness (oldest first inside each bucket)
    [stale, aging, fresh].forEach(b => b.sort((a,b2) => b2._days - a._days));

    const totalValue = needsFollowup.reduce((s,o) => s + (Number(o.value)||0), 0);
    $('sStale').textContent = stale.length;
    $('sAging').textContent = aging.length;
    $('sFresh').textContent = fresh.length;
    $('sValue').textContent = totalValue ? money(totalValue) : '—';
    $('countBadge').textContent = needsFollowup.length + ' NEED OUTREACH';

    const row = (o, ageClass) => `
      <a class="row ${ageClass}" href="https://app.gohighlevel.com/v2/location/aHotOUdq9D8m3JPrRz9n/opportunities/list" target="_blank">
        <div>
          <div class="name">${esc(o.name || '(no name)')}</div>
          <div class="addr">${esc(o.pipeline || '')}</div>
          <div class="stage-badge">${esc(o.stage || '—')}</div>
        </div>
        <div class="age">${o._days}d ago</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(200,220,255,0.65);letter-spacing:1px">${esc(o.source || '—')}</div>
        <div class="val">${o.value ? money(o.value) : '—'}</div>
        <div class="arrow"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
      </a>`;

    const bucket = (cls, name, list, ageClass) => `
      <div class="bucket ${cls}">
        <div class="bucket-head"><div class="name">${name}</div><div class="count">${list.length}</div></div>
        <div class="bucket-body">
          ${list.length ? list.map(o => row(o, ageClass)).join('') : '<div class="bucket-empty">NONE</div>'}
        </div>
      </div>`;

    $('buckets').innerHTML =
      bucket('urgent', '🔥 STALE · 30+ DAYS · NEEDS OUTREACH NOW', stale, 'stale') +
      bucket('today', '⚠ AGING · 14–30 DAYS', aging, 'warm') +
      bucket('', 'FRESH · <14 DAYS', fresh, 'fresh');
  } catch(e) {
    $('buckets').innerHTML = '<div class="loading">Error: ' + esc(e.message) + '</div>';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); window.location.href = 'sales.html'; } });
loadAll();
</script>

<script src="assets/ryujin-mode.js"></script>
<script src="assets/ryujin-tenant.js"></script>
<script src="assets/ryujin-persist.js"></script>

</body>
</html>
