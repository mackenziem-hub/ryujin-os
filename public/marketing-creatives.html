<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Creatives</title>
<!-- Auth gate: tokenless users bounce to /login before any logic runs -->
<script src="/assets/auth-guard.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">

<style>
:root{--accent:#a78bfa;--accent-deep:#7c3aed;--border:rgba(124,58,237,0.24);--border-hi:rgba(124,58,237,0.5);
  --text:#e0e6f0;--text-dim:rgba(160,190,230,0.62);--text-muted:rgba(140,170,220,0.32);
  --green:#4ade80;--red:#f87171;--yellow:#facc15;--cyan:#22d3ee;--orange:#fb923c;
  --panel:rgba(14,22,40,0.78)}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:var(--text);overflow:hidden}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 40% 30%,rgba(124,58,237,0.08),transparent 55%),linear-gradient(180deg,#060a14,#030611)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(124,58,237,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,0.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at center,black 40%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 40%,transparent 85%)}
.app{position:relative;z-index:2;height:100vh;display:grid;grid-template-rows:52px 1fr;gap:10px;padding:10px 12px}
.topbar{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);position:relative;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--cyan),transparent);opacity:0.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(220,200,255,0.3),rgba(124,58,237,0.22) 40%,rgba(10,5,25,0.8));box-shadow:0 0 14px rgba(124,58,237,0.35)}
.brand-name{font-family:'Inter',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:var(--text-dim);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}
.tb-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(6,10,20,0.6);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all 0.2s}
.tb-icon:hover{color:var(--accent);border-color:var(--border-hi)}
.tb-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round}
.tb-stat{font-family:'JetBrains Mono',monospace;font-size:0.7em;color:var(--text-dim);letter-spacing:1px}

.main{padding:10px;display:grid;grid-template-rows:auto 1fr;gap:10px;min-height:0}
.toolbar{display:flex;gap:8px;align-items:center;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 14px;backdrop-filter:blur(14px);flex-wrap:wrap}
.filter-btn{padding:6px 14px;background:transparent;border:1px solid transparent;border-radius:8px;font-family:'Inter',sans-serif;font-size:0.66em;font-weight:700;letter-spacing:1.5px;color:var(--text-dim);cursor:pointer;transition:all 0.2s}
.filter-btn:hover{background:rgba(124,58,237,0.06);color:var(--text)}
.filter-btn.active{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.35);color:var(--accent)}
.btn-upload{margin-left:auto;padding:8px 16px;background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(124,58,237,0.12));color:var(--accent);border:1px solid rgba(124,58,237,0.45);border-radius:8px;font-family:'Inter',sans-serif;font-size:0.68em;font-weight:800;letter-spacing:1.5px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-upload:hover{box-shadow:0 0 14px rgba(124,58,237,0.3)}
.btn-upload:disabled{opacity:0.5;cursor:wait}
.btn-upload svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}

.creative-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;padding:0;overflow-y:auto;align-content:start}
.cre-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all 0.2s;position:relative;backdrop-filter:blur(14px)}
.cre-card:hover{transform:translateY(-3px);border-color:var(--border-hi);box-shadow:0 10px 30px rgba(0,0,0,0.4),0 0 20px rgba(124,58,237,0.2)}
.cre-thumb{aspect-ratio:9/16;background:linear-gradient(160deg,rgba(124,58,237,0.2),rgba(10,20,40,0.6));position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.cre-thumb img,.cre-thumb video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cre-thumb::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,rgba(124,58,237,0.25),transparent 60%);pointer-events:none}
.cre-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.9);z-index:2;pointer-events:none}
.cre-play svg{width:44px;height:44px;fill:currentColor;filter:drop-shadow(0 0 12px rgba(124,58,237,0.7))}
.cre-tag{position:absolute;top:10px;right:10px;padding:3px 8px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:0.58em;letter-spacing:0.8px;backdrop-filter:blur(6px);z-index:3}
.cre-tag.ready{background:rgba(140,170,220,0.25);color:#fff;border:1px solid rgba(140,170,220,0.3)}
.cre-tag.scheduled{background:rgba(34,211,238,0.35);color:#fff;border:1px solid rgba(34,211,238,0.55)}
.cre-tag.posted{background:rgba(74,222,128,0.4);color:#fff;border:1px solid rgba(74,222,128,0.6)}
.cre-tag.rendering{background:rgba(251,146,60,0.35);color:#fff;border:1px solid rgba(251,146,60,0.6)}
.cre-tag.queued{background:rgba(250,204,21,0.3);color:#fff;border:1px solid rgba(250,204,21,0.5)}
.cre-tag.failed{background:rgba(248,113,113,0.4);color:#fff;border:1px solid rgba(248,113,113,0.65)}
.cre-meta{padding:12px 14px}
.cre-name{font-family:'Inter',sans-serif;font-size:0.82em;font-weight:700;letter-spacing:0.5px;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cre-stats{display:flex;gap:10px;font-size:0.68em;color:var(--text-dim);font-family:'JetBrains Mono',monospace;letter-spacing:0.5px;flex-wrap:wrap}
.cre-stats .v{color:var(--text);font-weight:700}
.cre-plats{display:flex;gap:3px;margin-top:6px}
.plat-pill{padding:1px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:0.62em;background:rgba(124,58,237,0.15);color:var(--accent);letter-spacing:0.5px;font-weight:700}

.empty,.loading{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:0.8em;letter-spacing:1.3px;gap:12px;text-align:center}
.empty svg,.loading svg{width:48px;height:48px;stroke:currentColor;fill:none;stroke-width:1.5;opacity:0.5}

/* preview modal */
.mdl-back{position:fixed;inset:0;background:rgba(3,6,17,0.82);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.mdl-back.open{display:flex}
.mdl{width:min(520px,100%);max-height:92vh;background:var(--panel);border:1px solid var(--border-hi);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;box-shadow:0 0 40px rgba(124,58,237,0.25)}
.mdl-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.mdl-title{font-family:'Inter',sans-serif;font-size:0.9em;font-weight:800;letter-spacing:1.8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mdl-close{background:transparent;border:none;color:var(--text-dim);cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.mdl-close:hover{color:var(--text);background:rgba(124,58,237,0.1)}
.mdl-close svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.mdl video{width:100%;max-height:60vh;border-radius:10px;background:#000}
.mdl-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-family:'JetBrains Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:0.5px}
.mdl-info .row{display:flex;flex-direction:column;gap:3px}
.mdl-info .lbl{font-size:0.78em;color:var(--text-muted);letter-spacing:1.2px}
.mdl-info .val{color:var(--text)}
.mdl-actions{display:flex;gap:8px;justify-content:flex-end}
.mdl-btn{padding:8px 14px;border-radius:8px;font-family:'Inter',sans-serif;font-size:0.66em;font-weight:700;letter-spacing:1.3px;cursor:pointer;border:1px solid;transition:all 0.18s}
.mdl-btn.ghost{background:transparent;border-color:var(--border);color:var(--text-dim)}
.mdl-btn.ghost:hover{color:var(--text);border-color:var(--border-hi)}
.mdl-btn.primary{background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(124,58,237,0.12));border-color:rgba(124,58,237,0.5);color:var(--accent)}
.mdl-btn.primary:hover{box-shadow:0 0 14px rgba(124,58,237,0.35)}
.mdl-btn.danger{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.3);color:var(--red)}
.mdl-btn.danger:hover{background:rgba(248,113,113,0.15)}

/* toast */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel);border:1px solid var(--border-hi);border-radius:10px;padding:10px 18px;font-family:'JetBrains Mono',monospace;font-size:0.78em;letter-spacing:0.8px;color:var(--text);z-index:200;opacity:0;pointer-events:none;transition:all 0.25s;backdrop-filter:blur(12px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<div class="bg"></div>
<div class="bg-grid"></div>

<div class="app">
  <div class="topbar">
    <button class="tb-icon" data-ry-back data-ry-back-default="marketing.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· MARKETING · CREATIVES</span></div></div>
    <div class="tb-spacer"></div>
    <div class="tb-stat" id="lib-count">LOADING…</div>

      <div class="loading">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        <div>LOADING LIBRARY…</div>
      </div>
    </div>
  </div>
</div>

<!-- Preview modal -->
<div class="mdl-back" id="mdl-back">
  <div class="mdl" onclick="event.stopPropagation()">
    <div class="mdl-head">
      <div class="mdl-title" id="mdl-title">CLIP</div>
      <button class="mdl-close" id="mdl-close"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <video id="mdl-video" controls playsinline></video>

    <div class="mdl-actions">
      <button class="mdl-btn danger" id="mdl-delete">DELETE</button>
      <div style="flex:1"></div>
      <button class="mdl-btn ghost" id="mdl-campaign">USE IN CAMPAIGN</button>
      <button class="mdl-btn primary" id="mdl-edit">EDIT IN CALENDAR</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="assets/ryujin-mode.js"></script>
<script src="assets/ryujin-tenant.js"></script>
<script src="assets/ryujin-persist.js"></script>
<script src="assets/ryujin-api.js"></script>
<script src="assets/ryujin-scenario.js"></script>
<script src="assets/ryujin-xp.js"></script>
<script src="assets/ryujin-mode-badge.js"></script>
<script src="assets/cockpit-launcher.js"></script>

<script>
// ─── State ─────────────────────────────────────────────────────────────
const state = {
  clips: [],
  filter: 'all',
  openClipId: null,
};

// ─── API helpers ───────────────────────────────────────────────────────
const TENANT = (window.RyujinTenant && RyujinTenant.get && RyujinTenant.get().slug) || 'plus-ultra';
function apiHeaders(json) {
  const h = { 'x-tenant-id': TENANT };
  if (json) h['Content-Type'] = 'application/json';
  return h;
}
async function apiList() {
  const r = await fetch('/api/marketing', { headers: apiHeaders() });
  if (!r.ok) throw new Error('List failed: ' + r.status);
  const j = await r.json();
  return j.clips || [];
}
async function apiDelete(id) {
  const r = await fetch('/api/marketing?id=' + encodeURIComponent(id), {
    method: 'DELETE',
    headers: apiHeaders(),
  });
  if (!r.ok) throw new Error('Delete failed');
  return r.json();
}
async function apiUpload(file, fields) {
  const fd = new FormData();
  fd.append('file', file);
  for (const [k, v] of Object.entries(fields)) {
    if (v !== undefined && v !== null && v !== '') fd.append(k, v);
  }
  const r = await fetch('/api/marketing', { method: 'POST', headers: apiHeaders(), body: fd });
  if (!r.ok) {
    const j = await r.json().catch(()=>({}));
    throw new Error(j.error || 'Upload failed');
  }
  return r.json();
}

// ─── Status bucketing ─────────────────────────────────────────────────
// Backend statuses: queued, rendering, ready, scheduled, posted, failed
// UI buckets:       ready, scheduled, posted, rendering (queued rolls up here), failed
function uiStatus(c) {
  if (c.status === 'failed') return 'failed';
  if (c.status === 'posted') return 'posted';
  if (c.status === 'queued' || c.status === 'rendering') return 'rendering';
  if (c.status === 'scheduled') return 'scheduled';
  if (c.scheduled_at && new Date(c.scheduled_at) > new Date()) return 'scheduled';
  return 'ready';
}
function matchesFilter(c) {
  if (state.filter === 'all') return true;
  return uiStatus(c) === state.filter;
}

// ─── Formatters ───────────────────────────────────────────────────────
function humanSize(bytes) {
  if (!bytes) return '';
  const mb = bytes / 1024 / 1024;
  if (mb >= 1) return mb.toFixed(1) + 'MB';
  return (bytes / 1024).toFixed(0) + 'KB';
}
function humanDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' · ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ─── Rendering ────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('creative-grid');
  const visible = state.clips.filter(matchesFilter);
  const totalLive = state.clips.filter(c => uiStatus(c) === 'posted' || uiStatus(c) === 'scheduled').length;
  document.getElementById('lib-count').textContent =
    `${state.clips.length} CLIP${state.clips.length===1?'':'S'} · ${totalLive} LIVE/SCHEDULED`;

  if (!visible.length) {
    if (!state.clips.length) {
      grid.innerHTML = `
        <div class="empty">
          <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><polygon points="10 8 16 12 10 16"/></svg>
          <div>NO CLIPS YET</div>
          <div style="font-size:0.82em;color:var(--text-muted);margin-top:4px">DROP A SELFIE VIDEO TO START · WHISPER + HAIKU WILL CAPTION IT · 9:16 RENDER IN THE BACKGROUND</div>
        </div>`;
    } else {
      grid.innerHTML = `
        <div class="empty">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <div>NO CLIPS MATCH THIS FILTER</div>
        </div>`;
    }
    return;
  }

  grid.innerHTML = '';
  for (const c of visible) grid.appendChild(renderCard(c));
}

function renderCard(c) {
  const card = document.createElement('div');
  card.className = 'cre-card';
  card.dataset.id = c.id;
  const st = uiStatus(c);

  // Thumb: prefer thumbnail_url, fallback to video poster from rendered/source
  const thumb = document.createElement('div');
  thumb.className = 'cre-thumb';
  if (c.thumbnail_url) {
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.src = c.thumbnail_url;
    img.alt = c.title || '';
    thumb.appendChild(img);
  } else if (c.rendered_url || c.source_url) {
    const v = document.createElement('video');
    v.preload = 'metadata';
    v.muted = true;
    v.playsInline = true;
    v.src = (c.rendered_url || c.source_url) + '#t=0.5';
    thumb.appendChild(v);
  }
  const tag = document.createElement('span');
  tag.className = `cre-tag ${st}`;
  tag.textContent = st.toUpperCase();
  thumb.appendChild(tag);
  const play = document.createElement('div');
  play.className = 'cre-play';
  play.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21"/></svg>';
  thumb.appendChild(play);

  card.appendChild(thumb);

  const meta = document.createElement('div');
  meta.className = 'cre-meta';
  const name = document.createElement('div');
  name.className = 'cre-name';
  name.textContent = c.title || c.source_filename || 'Untitled';
  meta.appendChild(name);

  const stats = document.createElement('div');
  stats.className = 'cre-stats';
  if (c.scheduled_at) {
    const s = document.createElement('span');
    s.innerHTML = (st === 'posted' ? 'Posted ' : 'Scheduled ') + '<span class="v">' + humanDate(c.scheduled_at) + '</span>';
    stats.appendChild(s);
  } else {
    const s = document.createElement('span');
    s.innerHTML = 'Created <span class="v">' + humanDate(c.created_at) + '</span>';
    stats.appendChild(s);
  }
  if (c.source_size_bytes) {
    const s = document.createElement('span');
    s.innerHTML = '<span class="v">' + humanSize(c.source_size_bytes) + '</span>';
    stats.appendChild(s);
  }
  meta.appendChild(stats);

  if (c.target_platforms?.length) {
    const plats = document.createElement('div');
    plats.className = 'cre-plats';
    for (const p of c.target_platforms) {
      const pill = document.createElement('span');
      pill.className = 'plat-pill';
      pill.textContent = p.toUpperCase();
      plats.appendChild(pill);
    }
    meta.appendChild(plats);
  }

  card.appendChild(meta);

  card.addEventListener('click', () => openPreview(c));
  return card;
}

// ─── Preview modal ─────────────────────────────────────────────────────
const mdlBack = document.getElementById('mdl-back');
const mdlVideo = document.getElementById('mdl-video');

function openPreview(c) {
  state.openClipId = c.id;
  document.getElementById('mdl-title').textContent = c.title || c.source_filename || 'Untitled';

  const src = c.rendered_url || c.source_url || '';
  if (src) {
    mdlVideo.src = src;
    mdlVideo.style.display = '';
  } else {
    mdlVideo.removeAttribute('src');
    mdlVideo.style.display = 'none';
  }

  const info = document.getElementById('mdl-info');
  const st = uiStatus(c);
  const rows = [
    ['STATUS', st.toUpperCase()],
    ['SCHEDULED', c.scheduled_at ? humanDate(c.scheduled_at) : '—'],
    ['CREATED', humanDate(c.created_at)],
    ['PLATFORMS', (c.target_platforms || []).map(p => p.toUpperCase()).join(' · ') || '—'],
    ['SOURCE', c.source_filename || '—'],
    ['SIZE', humanSize(c.source_size_bytes) || '—'],
  ];
  info.innerHTML = rows.map(([l, v]) =>
    `<div class="row"><div class="lbl">${l}</div><div class="val">${v}</div></div>`
  ).join('');

  mdlBack.classList.add('open');
}

function closePreview() {
  mdlBack.classList.remove('open');
  state.openClipId = null;
  mdlVideo.pause?.();
  mdlVideo.removeAttribute('src');
  mdlVideo.load?.();
}

document.getElementById('mdl-close').addEventListener('click', closePreview);
mdlBack.addEventListener('click', (e) => { if (e.target === mdlBack) closePreview(); });

document.getElementById('mdl-edit').addEventListener('click', () => {
  if (!state.openClipId) return;
  window.location.href = 'marketing-content-calendar.html?clip=' + encodeURIComponent(state.openClipId);
});
document.getElementById('mdl-campaign').addEventListener('click', () => {
  if (!state.openClipId) return;
  window.location.href = 'marketing-campaign.html?clip=' + encodeURIComponent(state.openClipId);
});
document.getElementById('mdl-delete').addEventListener('click', async () => {
  if (!state.openClipId) return;
  if (!confirm('Delete this clip permanently? This cannot be undone.')) return;
  try {
    await apiDelete(state.openClipId);
    toast('Deleted');
    closePreview();
    await refresh();
  } catch (e) {
    toast('ERROR · ' + e.message, true);
  }
});

// ─── Upload ────────────────────────────────────────────────────────────
const uploadBtn = document.getElementById('upload-btn');
const fileInput = document.getElementById('file-input');
uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', async () => {
  const f = fileInput.files?.[0];
  fileInput.value = '';
  if (!f) return;

  const defaultTitle = f.name.replace(/\.[^.]+$/, '').replace(/[_-]+/g, ' ');
  const title = prompt('Title for this clip:', defaultTitle);
  if (title === null) return;

  uploadBtn.disabled = true;
  const orig = uploadBtn.innerHTML;
  uploadBtn.innerHTML = 'UPLOADING…';
  try {
    await apiUpload(f, {
      title: title.trim() || defaultTitle,
      platforms: 'facebook,instagram',
    });
    toast('Uploaded · rendering in background');
    await refresh();
  } catch (e) {
    toast('ERROR · ' + e.message, true);
  } finally {
    uploadBtn.disabled = false;
    uploadBtn.innerHTML = orig;
  }
});

// ─── Filters ──────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  state.filter = b.dataset.filter;
  render();
}));

// ─── Toasts ───────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = isError ? 'rgba(248,113,113,0.5)' : 'var(--border-hi)';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

// ─── Refresh ──────────────────────────────────────────────────────────
async function refresh() {
  try {
    state.clips = await apiList();
    RyujinStore?.save?.('creative_cache', state.clips);
  } catch (e) {
    toast('Load failed · offline mode', true);
    state.clips = RyujinStore?.load?.('creative_cache', []) || [];
  }
  render();
}

// ─── Keyboard shortcuts ───────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (mdlBack.classList.contains('open')) {
    if (e.key === 'Escape') closePreview();
    return;
  }
  if (e.key === 'Escape') window.location.href = 'marketing.html';
  if (e.key === 'u' && !/input|textarea/i.test(document.activeElement.tagName)) {
    uploadBtn.click();
  }
});
document.addEventListener('contextmenu', (e) => {
  if (mdlBack.classList.contains('open')) return;
  e.preventDefault();
  window.location.href = 'marketing.html';
});

// ─── Chat integration ─────────────────────────────────────────────────
if (window.Ryujin?.init) {
  Ryujin.init({
    sector: 'CREATIVES',
    root: {
      msg: "Creative library. Drop a selfie video and I'll caption + render it in 9:16. Click any clip to preview or send to a campaign.",
      choices: [
        { text: 'Upload new video', next: 'up' },
        { text: 'Open content calendar', next: 'cal' },
        { text: 'Just browse', dismiss: true },
      ],
    },
    states: {
      up: { effect: () => uploadBtn.click(), choices: [] },
      cal: { effect: () => window.location.href = 'marketing-content-calendar.html', choices: [] },
    },
  });
}

// ─── Boot ──────────────────────────────────────────────────────────────
refresh();
</script>
