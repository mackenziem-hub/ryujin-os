<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060a14">
<title>Warranty Claims · Service · Ryujin OS</title>
<link rel="icon" href="/assets/logo/icon.png" onerror="this.href='/assets/logo/logo-glow.jpg'">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<script src="/assets/service-toolbar.js" defer></script>
<style>
:root{--bg:#060a14;--glass:rgba(20,30,50,0.85);--glass2:rgba(22,34,58,0.80);--glass-border:rgba(34,211,238,0.16);--glass-border-hi:rgba(34,211,238,0.35);--text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);--cyan:#22d3ee;--purple:#7c3aed;--green:#4ade80;--yellow:#facc15;--red:#f87171;--orange:#fb923c;--gold:#fbbf24;--radius:12px;--sidebar-w:72px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;overflow-x:hidden}
.sidebar{width:var(--sidebar-w);background:rgba(8,12,24,0.98);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;bottom:0;z-index:50}
.sidebar-logo{width:44px;height:44px;margin:18px 0 12px;border-radius:12px;background:url('/assets/logo/logo-glow.jpg') center/cover;box-shadow:0 0 20px rgba(34,211,238,0.3);cursor:pointer}
.sidebar-divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;margin:4px 0 8px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid transparent;color:var(--text-dim);text-decoration:none;transition:all 0.25s;position:relative}
.nav-icon:hover{background:rgba(34,211,238,0.06);color:var(--text)}
.nav-icon.active{background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(124,58,237,0.06));color:var(--cyan);border-color:rgba(34,211,238,0.2)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:3px;background:var(--cyan);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--cyan)}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.main{margin-left:var(--sidebar-w);padding:18px 22px 60px;max-width:1300px}
.hq-header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.hq-title .crumb{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hq-title h1{font-family:'Orbitron',monospace;font-size:1.7em;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,#e0e6f0 20%,var(--cyan) 70%,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hq-title .sub{font-size:0.85em;color:var(--text-dim);margin-top:6px}
.btn{font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:8px 16px;border-radius:18px;cursor:pointer;border:1px solid var(--glass-border);background:transparent;color:var(--text-dim);transition:all 0.2s}
.btn:hover{color:var(--text);border-color:var(--glass-border-hi)}
.btn.primary{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#0a0e1a;border:none;box-shadow:0 0 12px rgba(34,211,238,0.3)}

.filter-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:10px 12px;position:relative;overflow:hidden}
.filter-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan) 50%,transparent);opacity:0.4}
.label{font-family:'Orbitron',monospace;font-size:0.6em;letter-spacing:1.8px;color:var(--text-muted);text-transform:uppercase;margin-right:6px}
.fchip{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:18px;background:rgba(6,10,20,0.4);border:1px solid var(--glass-border);font-size:0.72em;cursor:pointer;color:var(--text-dim);transition:all 0.2s;font-family:inherit}
.fchip:hover{border-color:var(--glass-border-hi);color:var(--text)}
.fchip.active{background:linear-gradient(135deg,rgba(34,211,238,0.14),rgba(124,58,237,0.08));color:var(--cyan);border-color:rgba(34,211,238,0.4)}
.btn-new{margin-left:auto;background:linear-gradient(135deg,var(--cyan),var(--purple));color:#0a0e1a;font-weight:700;font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.5px;text-transform:uppercase;border:none;padding:8px 18px;border-radius:18px;cursor:pointer;box-shadow:0 0 12px rgba(34,211,238,0.3)}

.section-head{display:flex;align-items:baseline;gap:10px;margin:18px 0 10px;font-family:'Orbitron',monospace}
.section-head h2{font-size:0.78em;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.section-head .count-pill{font-size:0.65em;font-family:'Share Tech Mono',monospace;padding:2px 8px;border-radius:10px;background:rgba(34,211,238,0.1);border:1px solid var(--glass-border);color:var(--cyan)}

.claim-list{display:flex;flex-direction:column;gap:6px}
.claim-row{display:grid;grid-template-columns:auto 1fr auto auto auto;gap:14px;align-items:center;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:12px 14px;cursor:pointer;transition:all 0.2s}
.claim-row:hover{border-color:var(--glass-border-hi)}
.claim-type{font-family:'Share Tech Mono',monospace;font-size:0.6em;letter-spacing:1.2px;text-transform:uppercase;padding:2px 7px;border-radius:8px;background:rgba(251,191,36,0.1);color:var(--gold);border:1px solid rgba(251,191,36,0.25)}
.claim-type.workmanship{background:rgba(34,211,238,0.1);color:var(--cyan);border:1px solid var(--glass-border)}
.claim-type.surestart_10yr{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.25)}
.claim-info{min-width:0}
.claim-title{font-weight:600;color:var(--text);font-size:0.95em;margin-bottom:2px}
.claim-meta{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:0.5px}
.claim-status{font-family:'Share Tech Mono',monospace;font-size:0.62em;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:8px}
.claim-status.open{background:rgba(34,211,238,0.1);color:var(--cyan);border:1px solid var(--glass-border)}
.claim-status.documenting{background:rgba(124,58,237,0.1);color:#a78bfa;border:1px solid rgba(124,58,237,0.25)}
.claim-status.filed{background:rgba(251,146,60,0.1);color:var(--orange);border:1px solid rgba(251,146,60,0.25)}
.claim-status.approved{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.25)}
.claim-status.denied{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.25)}
.claim-status.resolved{background:rgba(140,170,220,0.08);color:var(--text-dim);border:1px solid var(--glass-border)}
.claim-time{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:var(--text-muted);letter-spacing:0.5px;white-space:nowrap}

.empty-state{text-align:center;padding:30px 16px;color:var(--text-dim);border:1px dashed var(--glass-border);border-radius:var(--radius);font-size:0.85em}
.empty-state .ico{font-size:1.8em;margin-bottom:6px;opacity:0.5}
.skeleton{background:linear-gradient(90deg,var(--glass) 0%,var(--glass2) 50%,var(--glass) 100%);background-size:200% 100%;animation:sk 1.4s infinite;border:1px solid var(--glass-border);border-radius:var(--radius);height:64px;margin-bottom:6px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);font-size:0.8em;margin-bottom:14px}
.banner.warn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:var(--orange)}
.banner code{font-family:'Share Tech Mono',monospace;background:rgba(0,0,0,0.3);padding:1px 6px;border-radius:4px;color:var(--text)}

/* Modal (same shape as service-tickets) */
.modal-backdrop{position:fixed;inset:0;background:rgba(3,6,17,0.75);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-backdrop.show{display:flex}
.modal{background:var(--glass);border:1px solid var(--glass-border-hi);border-radius:14px;padding:22px 24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative;backdrop-filter:blur(20px)}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan) 30%,var(--purple) 70%,transparent);border-radius:14px 14px 0 0}
.modal h3{font-family:'Orbitron',monospace;font-size:0.9em;letter-spacing:2px;color:var(--text);margin-bottom:14px;text-transform:uppercase}
.field{margin-bottom:12px}
.field label{display:block;font-family:'Orbitron',monospace;font-size:0.6em;letter-spacing:1.8px;color:var(--text-dim);text-transform:uppercase;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:rgba(6,10,20,0.5);border:1px solid var(--glass-border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:0.9em;font-family:inherit;outline:none}
.field textarea{resize:vertical;min-height:70px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

@media(max-width:768px){.main{padding:12px}.hq-title h1{font-size:1.3em}}
</style>
</head>
<body>

<aside class="sidebar">
  <a href="/admin.html" class="sidebar-logo" title="Admin Home"></a>
  <div class="sidebar-divider"></div>
  <nav class="sidebar-nav">
    <a href="/admin-overview.html" class="nav-icon" title="Overview"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg></a>
    <a href="/marketing.html" class="nav-icon" title="Marketing"><svg viewBox="0 0 24 24"><path d="M3 11l18-9v18l-18-9zM7 13v6"/></svg></a>
    <a href="/sales.html" class="nav-icon" title="Sales"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9a4 4 0 100 8h6a4 4 0 110 8H6"/></svg></a>
    <a href="/production.html" class="nav-icon" title="Production"><svg viewBox="0 0 24 24"><path d="M2 22V12l10-7 10 7v10M2 12l10 7 10-7M9 22V14h6v8"/></svg></a>
    <a href="/service.html" class="nav-icon active" title="Service"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg></a>
    <a href="/admin.html" class="nav-icon" title="Full Admin"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></a>
  </nav>
</aside>

<main class="main">

  <div class="hq-header">
    <div class="hq-title">
      <div class="crumb">Service · Warranty Claims</div>
      <h1>Warranty Claims</h1>
      <div class="sub">CertainTeed manufacturer + workmanship + SureStart 10-yr filings. Track from documenting → filed → approved/denied → resolved.</div>
    </div>
    <a class="btn primary" href="/service.html">← Service</a>
  </div>

  <div id="banner-slot"></div>

  <div class="filter-bar">
    <span class="label">Status</span>
    <button class="fchip active" data-st="">All</button>
    <button class="fchip" data-st="open">Open</button>
    <button class="fchip" data-st="documenting">Documenting</button>
    <button class="fchip" data-st="filed">Filed</button>
    <button class="fchip" data-st="approved">Approved</button>
    <button class="fchip" data-st="resolved">Resolved</button>
    <span class="label" style="margin-left:14px">Type</span>
    <button class="fchip active" data-tp="">All</button>
    <button class="fchip" data-tp="manufacturer">Manufacturer</button>
    <button class="fchip" data-tp="workmanship">Workmanship</button>
    <button class="fchip" data-tp="surestart_10yr">SureStart</button>
    <button class="btn-new" id="btnNew">+ New Claim</button>
  </div>

  <div class="section-head"><h2>Claims</h2><span class="count-pill" id="claimCount">—</span></div>
  <div class="claim-list" id="claimList"><div class="skeleton"></div><div class="skeleton"></div></div>

</main>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h3 id="modalTitle">New Warranty Claim</h3>
    <div class="field"><label>Title</label><input id="f_title" placeholder="e.g. Shingle granule loss — 95 Cornhill" /></div>
    <div class="field-row">
      <div class="field"><label>Type</label><select id="f_type"><option value="manufacturer">Manufacturer</option><option value="workmanship">Workmanship</option><option value="surestart_10yr">SureStart 10-yr</option><option value="suregold">SureGold</option><option value="other">Other</option></select></div>
      <div class="field"><label>Manufacturer</label><input id="f_mfr" placeholder="CertainTeed / IKO / etc." value="CertainTeed" /></div>
    </div>
    <div class="field"><label>Defect Observed</label><textarea id="f_defect" placeholder="What's the customer reporting / what did inspection find?"></textarea></div>
    <div class="field-row">
      <div class="field"><label>Status</label><select id="f_status"><option value="open">Open</option><option value="documenting">Documenting</option><option value="filed">Filed</option><option value="approved">Approved</option><option value="denied">Denied</option><option value="resolved">Resolved</option></select></div>
      <div class="field"><label>Reference Number</label><input id="f_ref" placeholder="manufacturer claim #" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn" id="btnCancel">Cancel</button>
      <button class="btn primary" id="btnSave">Save Claim</button>
    </div>
  </div>
</div>

<script>
const TENANT = (function(){ try { const c = JSON.parse(localStorage.getItem('ry_tenant_cfg') || 'null'); if (c && c.slug) return c.slug; } catch (e) {} return 'plus-ultra'; })();
let cache = []; let activeStatus = ''; let activeType = ''; let editing = null;
function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtRel(iso) { if (!iso) return ''; const dt = Date.now() - new Date(iso).getTime(); if (dt < 60000) return 'just now'; if (dt < 3600000) return Math.floor(dt/60000) + 'm ago'; if (dt < 86400000) return Math.floor(dt/3600000) + 'h ago'; return Math.floor(dt/86400000) + 'd ago'; }
function showBanner(msg, isHtml=false) { const slot = document.getElementById('banner-slot'); if (isHtml) slot.innerHTML = `<div class="banner warn">${msg}</div>`; else slot.innerHTML = `<div class="banner warn">${escapeHtml(msg)}</div>`; }

function renderClaims(list) {
  document.getElementById('claimCount').textContent = list.length;
  const el = document.getElementById('claimList');
  if (list.length === 0) { el.innerHTML = `<div class="empty-state"><div class="ico">⚖</div>No warranty claims match. Click <b>+ New Claim</b> to file one.</div>`; return; }
  el.innerHTML = list.map(c => {
    const customer = c.customer?.full_name || 'unknown';
    return `
      <div class="claim-row" data-id="${c.id}">
        <div class="claim-type ${c.claim_type}">${escapeHtml(c.claim_type)}</div>
        <div class="claim-info">
          <div class="claim-title">${escapeHtml(c.title)}</div>
          <div class="claim-meta">${escapeHtml(customer)} · ${escapeHtml(c.manufacturer || 'no mfr')}${c.reference_number ? ` · ref ${escapeHtml(c.reference_number)}` : ''}</div>
        </div>
        <div class="claim-status ${c.status}">${escapeHtml(c.status)}</div>
        <div class="claim-time">${fmtRel(c.updated_at || c.created_at)}</div>
      </div>`;
  }).join('');
  el.querySelectorAll('.claim-row').forEach(row => row.addEventListener('click', () => editClaim(row.dataset.id)));
}

async function load() {
  try {
    const params = new URLSearchParams();
    if (activeStatus) params.set('status', activeStatus);
    if (activeType) params.set('claim_type', activeType);
    const resp = await fetch(`/api/warranty-claims?${params}`, { headers: { 'x-tenant-id': TENANT } });
    if (!resp.ok) {
      const txt = await resp.text();
      if (resp.status === 500 && /relation .* does not exist/i.test(txt)) showBanner(`Migration <code>047_service</code> not applied yet.`, true);
      else showBanner(`Could not load: HTTP ${resp.status}`);
      cache = []; renderClaims([]);
      return;
    }
    const data = await resp.json();
    cache = data.claims || [];
    document.getElementById('banner-slot').innerHTML = '';
    renderClaims(cache);
  } catch (e) { showBanner(`Network: ${e.message}`); }
}

function openModal(c) {
  editing = c;
  document.getElementById('modalTitle').textContent = c ? 'Edit Claim' : 'New Warranty Claim';
  document.getElementById('f_title').value = c?.title || '';
  document.getElementById('f_type').value = c?.claim_type || 'manufacturer';
  document.getElementById('f_mfr').value = c?.manufacturer || 'CertainTeed';
  document.getElementById('f_defect').value = c?.defect_observed || '';
  document.getElementById('f_status').value = c?.status || 'open';
  document.getElementById('f_ref').value = c?.reference_number || '';
  document.getElementById('modalBackdrop').classList.add('show');
}
function closeModal() { document.getElementById('modalBackdrop').classList.remove('show'); editing = null; }
function editClaim(id) { const c = cache.find(x => x.id === id); if (c) openModal(c); }

async function saveClaim() {
  const payload = {
    title: document.getElementById('f_title').value.trim(),
    claim_type: document.getElementById('f_type').value,
    manufacturer: document.getElementById('f_mfr').value.trim() || null,
    defect_observed: document.getElementById('f_defect').value.trim() || null,
    status: document.getElementById('f_status').value,
    reference_number: document.getElementById('f_ref').value.trim() || null
  };
  if (!payload.title) { alert('Title required'); return; }
  const url = editing ? `/api/warranty-claims?id=${editing.id}` : '/api/warranty-claims';
  const method = editing ? 'PUT' : 'POST';
  const r = await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'x-tenant-id': TENANT }, body: JSON.stringify(payload) });
  if (r.ok) { closeModal(); load(); } else { alert(`Save failed: ${r.status}`); }
}

document.querySelectorAll('.fchip[data-st]').forEach(c => c.addEventListener('click', () => { document.querySelectorAll('.fchip[data-st]').forEach(x => x.classList.toggle('active', x === c)); activeStatus = c.dataset.st; load(); }));
document.querySelectorAll('.fchip[data-tp]').forEach(c => c.addEventListener('click', () => { document.querySelectorAll('.fchip[data-tp]').forEach(x => x.classList.toggle('active', x === c)); activeType = c.dataset.tp; load(); }));
document.getElementById('btnNew').addEventListener('click', () => openModal(null));
document.getElementById('btnCancel').addEventListener('click', closeModal);
document.getElementById('btnSave').addEventListener('click', saveClaim);
document.getElementById('modalBackdrop').addEventListener('click', e => { if (e.target.id === 'modalBackdrop') closeModal(); });

load();
</script>
</body>
</html>
