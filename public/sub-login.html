<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#0b1d3a">
<title>Crew Portal · Sign in</title>
<link rel="icon" type="image/jpeg" href="/assets/branding/orb.jpg">
<link rel="apple-touch-icon" href="/assets/branding/orb.jpg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#0b1d3a;
  --accent-soft:#eef2f8;
  --accent-line:#1e3a6e;
  --bg:#f7f8fa;
  --surface:#ffffff;
  --ink:#101828;
  --ink-2:#475467;
  --ink-3:#98a2b3;
  --line:#e4e7ec;
  --green:#15803d;
  --green-bg:#dcfce7;
  --red:#b91c1c;
  --red-bg:#fee2e2;
  --shadow:0 1px 2px rgba(16,24,40,0.06),0 1px 3px rgba(16,24,40,0.04);
  --shadow-lg:0 8px 24px rgba(16,24,40,0.12);
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.45}
.wrap{max-width:440px;margin:0 auto;padding:48px 20px 24px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:32px 24px}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.brand .logo{width:48px;height:48px;border-radius:10px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;letter-spacing:0.5px;flex-shrink:0;overflow:hidden}
.brand .logo img{width:100%;height:100%;object-fit:cover}
.brand .name{font-weight:700;font-size:17px;color:var(--ink);line-height:1.2}
.brand .sub{font-size:13px;color:var(--ink-2);line-height:1.2;margin-top:2px}
h1{font-size:22px;font-weight:700;letter-spacing:-0.3px;margin-bottom:6px}
.lede{font-size:14px;color:var(--ink-2);margin-bottom:22px;line-height:1.5}
label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
input[type="tel"]{width:100%;padding:14px 14px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:16px;color:var(--ink);background:var(--surface);transition:border-color 0.15s}
input[type="tel"]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(11,29,58,0.10)}
.hint{font-size:12px;color:var(--ink-3);margin-top:6px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 18px;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid transparent;line-height:1;min-height:50px;width:100%;margin-top:18px}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:active{background:var(--accent-line)}
.btn:disabled{opacity:0.55;cursor:wait}
.alert{margin-top:18px;padding:12px 14px;border-radius:10px;font-size:14px;line-height:1.5;display:none}
.alert.show{display:block}
.alert.green{background:var(--green-bg);color:var(--green);border:1px solid #bbf7d0}
.alert.red{background:var(--red-bg);color:var(--red);border:1px solid #fecaca}
.foot{text-align:center;font-size:12px;color:var(--ink-3);margin-top:24px;line-height:1.6}
.foot a{color:var(--ink-2);text-decoration:none;border-bottom:1px dotted var(--ink-3)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:-2px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <div class="brand">
      <div class="logo" id="logo">PU</div>
      <div>
        <div class="name" id="brandName">Plus Ultra</div>
        <div class="sub">Crew Portal</div>
      </div>
    </div>

    <h1>Sign in</h1>
    <p class="lede" id="lede">Enter the phone number on file with the office and we'll text you a fresh portal link.</p>

    <form id="form" autocomplete="off">
      <label for="phone">Phone number</label>
      <input id="phone" name="phone" type="tel" inputmode="tel" placeholder="(506) 555-1234" required autocomplete="tel" />
      <div class="hint">Same number the office texts you on. Canadian or US, any format.</div>
      <button id="submit" class="btn primary" type="submit">Text me my link</button>
    </form>

    <div id="alert" class="alert"></div>

    <div class="foot">
      Already have your link? Open it from your texts. Lost it again? Just resubmit this form.
    </div>
  </div>
</div>

<script src="/assets/ryujin-slug.js"></script>
<script>
(function(){
  const TENANT =
    (typeof window.getRyujinTenantSlug === 'function' && window.getRyujinTenantSlug())
    || window.RYUJIN_TENANT_SLUG
    || 'plus-ultra';

  const form = document.getElementById('form');
  const phoneInput = document.getElementById('phone');
  const submitBtn = document.getElementById('submit');
  const alertBox = document.getElementById('alert');

  const reason = new URLSearchParams(location.search).get('reason');
  if (reason === 'expired') {
    document.getElementById('lede').textContent = 'Your old portal link is no longer working. Enter your phone number and we will text you a fresh one.';
  }

  function showAlert(kind, msg){
    alertBox.className = 'alert show ' + kind;
    alertBox.textContent = msg;
  }
  function clearAlert(){
    alertBox.className = 'alert';
    alertBox.textContent = '';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearAlert();
    const phone = phoneInput.value.trim();
    if (!phone) {
      showAlert('red', 'Enter your phone number.');
      return;
    }
    submitBtn.disabled = true;
    const originalLabel = submitBtn.textContent;
    submitBtn.innerHTML = '<span class="spin"></span> Sending...';
    try {
      const r = await fetch(`/api/sub-auth?action=request_link&tenant=${TENANT}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-tenant-id': TENANT },
        body: JSON.stringify({ phone })
      });
      const body = await r.json().catch(() => ({}));
      if (!r.ok) {
        showAlert('red', body.error || `Could not send. Try again or call the office.`);
      } else {
        showAlert('green', `If we have that number on file, you'll get a text in a few seconds. Open the link and bookmark it on your phone.`);
        form.reset();
      }
    } catch (err) {
      showAlert('red', `Network error. Check your signal and try again.`);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = originalLabel;
    }
  });

  // Tenant-aware branding (best effort, never blocks).
  fetch(`/api/tenant-branding?tenant=${TENANT}`, { headers: { 'x-tenant-id': TENANT } })
    .then(r => r.ok ? r.json() : null)
    .then(b => {
      if (!b) return;
      if (b.company_name) document.getElementById('brandName').textContent = b.company_name;
      if (b.accent_color) {
        document.documentElement.style.setProperty('--accent', b.accent_color);
        document.documentElement.style.setProperty('--accent-line', b.accent_color);
      }
      if (b.logo_url) {
        const logo = document.getElementById('logo');
        logo.innerHTML = `<img src="${b.logo_url}" alt="">`;
      } else if (b.company_name) {
        const initials = b.company_name.split(/\s+/).slice(0,2).map(w => w[0]||'').join('').toUpperCase();
        if (initials) document.getElementById('logo').textContent = initials;
      }
    })
    .catch(() => {});
})();
</script>
</body>
</html>
