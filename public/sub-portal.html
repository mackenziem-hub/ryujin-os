<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060a14">
<title>Sub Portal — Ryujin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
:root{
  --bg:#060a14;--surface:rgba(14,22,40,0.85);--surface-hi:rgba(22,34,60,0.95);
  --border:rgba(34,211,238,0.1);--border-hi:rgba(34,211,238,0.28);
  --text:#d0daf0;--text-dim:rgba(160,190,230,0.55);
  --cyan:#22d3ee;--blue:#4a9eff;--green:#4ade80;--yellow:#facc15;--red:#f87171;--orange:#fb923c;
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 30% 10%,rgba(34,211,238,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(74,158,255,0.05) 0%,transparent 50%)}
.wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:14px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;backdrop-filter:blur(12px)}
.brand{font-family:'Orbitron';font-size:0.72em;letter-spacing:1.8px;color:var(--cyan);font-weight:600}
.who{font-size:0.85em;font-weight:600}
.who small{display:block;font-size:0.75em;color:var(--text-dim);font-weight:400;margin-top:2px}
h1{font-size:1.1em;margin:6px 0 10px;letter-spacing:0.5px}
h2{font-size:0.85em;margin:14px 0 8px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;backdrop-filter:blur(12px);cursor:pointer;transition:border-color 0.2s,transform 0.1s}
.card:hover{border-color:var(--border-hi)}
.card:active{transform:scale(0.99)}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.addr{font-weight:600;font-size:0.95em}
.cust{color:var(--text-dim);font-size:0.82em;margin-top:2px}
.pill{font-size:0.68em;padding:3px 8px;border-radius:20px;background:rgba(34,211,238,0.1);color:var(--cyan);border:1px solid var(--border-hi);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap}
.pill.green{background:rgba(74,222,128,0.12);color:var(--green);border-color:rgba(74,222,128,0.25)}
.pill.yellow{background:rgba(250,204,21,0.12);color:var(--yellow);border-color:rgba(250,204,21,0.25)}
.pill.red{background:rgba(248,113,113,0.12);color:var(--red);border-color:rgba(248,113,113,0.25)}
.pill.orange{background:rgba(251,146,60,0.12);color:var(--orange);border-color:rgba(251,146,60,0.25)}
.meta{margin-top:8px;display:flex;gap:12px;flex-wrap:wrap;font-size:0.78em;color:var(--text-dim)}
.meta span b{color:var(--text);font-weight:600}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:8px;border:1px solid var(--border-hi);background:rgba(34,211,238,0.08);color:var(--cyan);font-size:0.82em;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:0.3px;text-decoration:none}
.btn:hover{background:rgba(34,211,238,0.14)}
.btn.primary{background:var(--cyan);color:#0a1628;border-color:var(--cyan)}
.btn.primary:hover{background:#5eeaff}
.btn.ghost{background:transparent;color:var(--text-dim);border-color:var(--border)}
.btn.small{padding:6px 10px;font-size:0.72em}
.btn.full{width:100%}
.empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:0.9em}
.err{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--red);padding:16px;border-radius:var(--radius);font-size:0.88em;margin-bottom:14px}

/* Drawer */
.drawer-bg{position:fixed;inset:0;background:rgba(6,10,20,0.7);backdrop-filter:blur(6px);z-index:50;display:none}
.drawer-bg.on{display:block}
.drawer{position:fixed;bottom:0;left:0;right:0;max-height:92vh;overflow-y:auto;background:var(--surface-hi);border-top:1px solid var(--border-hi);border-radius:20px 20px 0 0;padding:18px 16px 30px;z-index:51;transform:translateY(100%);transition:transform 0.25s}
.drawer.on{transform:translateY(0)}
.drawer-close{position:absolute;top:10px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);border:none;font-size:18px}
.drawer h3{font-size:1em;margin-bottom:4px}
.drawer h3 small{display:block;font-size:0.78em;color:var(--text-dim);font-weight:400;margin-top:4px}

/* Tabs — scrollable horizontal strip for 7 tabs on phone */
.tabs{display:flex;gap:4px;margin:14px 0;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:9px 12px;font-size:0.78em;color:var(--text-dim);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;font-weight:600;letter-spacing:0.3px;white-space:nowrap}
.tab.on{color:var(--cyan);border-bottom-color:var(--cyan)}

.scope-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:0.86em;display:flex;justify-content:space-between;gap:12px}
.scope-item:last-child{border-bottom:none}
.scope-item b{font-weight:600}
.line{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dotted var(--border);font-size:0.85em}
.line:last-child{border-bottom:none}
.line.total{font-weight:700;color:var(--cyan);font-size:0.95em;border-top:1px solid var(--border-hi);margin-top:6px;padding-top:10px}
.sub-label{color:var(--text-dim);font-size:0.78em;margin-top:8px;text-transform:uppercase;letter-spacing:1.2px}
.entry{padding:10px 12px;background:rgba(34,211,238,0.04);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.entry .row{margin-bottom:4px}
.entry .desc{font-size:0.86em;line-height:1.4}
.entry .amt{font-weight:700;color:var(--green)}
.entry-form{background:var(--surface);padding:14px;border-radius:10px;border:1px solid var(--border);margin-top:10px}
.entry-form label{display:block;font-size:0.72em;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.2px;margin:10px 0 5px}
.entry-form input,.entry-form select,.entry-form textarea{width:100%;padding:10px 12px;background:rgba(6,10,20,0.6);border:1px solid var(--border-hi);border-radius:8px;color:var(--text);font-family:inherit;font-size:0.9em}
.entry-form textarea{min-height:68px;resize:vertical}
.type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.type-chip{padding:10px 8px;background:rgba(34,211,238,0.05);border:1px solid var(--border);border-radius:8px;font-size:0.78em;cursor:pointer;text-align:center;color:var(--text-dim);font-weight:600}
.type-chip.on{background:rgba(34,211,238,0.15);border-color:var(--cyan);color:var(--cyan)}
.photo-strip{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.photo-strip img{width:56px;height:56px;object-fit:cover;border-radius:6px;border:1px solid var(--border)}

/* Photo gallery */
.gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
.gallery .ph{position:relative;aspect-ratio:4/3;background:rgba(6,10,20,0.6);border-radius:8px;overflow:hidden;cursor:pointer;border:1px solid var(--border)}
.gallery .ph img{width:100%;height:100%;object-fit:cover;display:block}
.gallery .ph .cap{position:absolute;left:0;right:0;bottom:0;padding:6px 8px;background:linear-gradient(to top,rgba(0,0,0,0.85) 30%,transparent);font-size:0.72em;color:#fff;font-weight:600}
.gallery .ph.cover{outline:2px solid var(--cyan);outline-offset:-2px}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.94);z-index:60;display:none;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
.lightbox.on{display:flex}
.lightbox img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px}

/* Materials table */
.mat-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;padding:8px 0;border-bottom:1px dotted var(--border);font-size:0.84em;align-items:center}
.mat-row:last-child{border-bottom:none}
.mat-row .lbl{font-weight:600}
.mat-row .src{font-size:0.74em;color:var(--text-dim);margin-top:2px}
.mat-row .qty{color:var(--cyan);font-weight:600;white-space:nowrap}
.mat-row .sup{font-size:0.68em;padding:3px 7px;border-radius:14px;background:rgba(34,211,238,0.08);color:var(--cyan);border:1px solid var(--border-hi);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;white-space:nowrap}
.mat-row .sup.kent{color:var(--orange);background:rgba(251,146,60,0.1);border-color:rgba(251,146,60,0.3)}
.mat-row .sup.coastal{color:var(--green);background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.3)}
.color-banner{padding:10px 12px;border-radius:10px;margin-bottom:12px;font-size:0.86em;font-weight:600}
.color-banner.locked{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);color:var(--green)}
.color-banner.tbd{background:rgba(250,204,21,0.1);border:1px solid rgba(250,204,21,0.3);color:var(--yellow)}

/* Schedule */
.sched-block{padding:12px 14px;background:rgba(34,211,238,0.04);border:1px solid var(--border);border-radius:10px;margin-bottom:10px}
.sched-block .lbl{font-size:0.7em;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px}
.sched-block .val{font-size:0.95em;font-weight:600}
.sched-block .val a{color:var(--cyan);text-decoration:none}

/* Rates */
.rate-group{margin-bottom:14px}
.rate-group h4{font-size:0.78em;text-transform:uppercase;letter-spacing:1.2px;color:var(--cyan);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.rate-line{display:flex;justify-content:space-between;padding:5px 0;font-size:0.84em;border-bottom:1px dotted rgba(34,211,238,0.05)}
.rate-line:last-child{border-bottom:none}
.rate-line .lbl{color:var(--text-dim)}
.rate-line .val{font-weight:600;color:var(--text);white-space:nowrap}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface-hi);border:1px solid var(--border-hi);padding:10px 18px;border-radius:8px;z-index:99;font-size:0.85em;box-shadow:0 6px 20px rgba(0,0,0,0.5)}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="topbar">
    <div class="brand">RYUJIN · SUB</div>
    <div class="who" id="who">…</div>
  </div>
  <div id="err" class="err" style="display:none"></div>
  <h1>Your Jobs</h1>
  <div id="jobList" class="empty">Loading…</div>
</div>

<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">✕</button>
  <div id="drawerBody"></div>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('on')"><img id="lightboxImg" src=""></div>

<script>
const API = '/api';
const TENANT = 'plus-ultra';
let currentSub = null;
let currentWo = null;
let draftPhotos = [];
let visibility = {
  show_pay: true, show_materials: true, show_photos: true,
  show_full_scope: true, show_schedule: true, show_contingencies: true, show_rates: true
};
let currentRateSheet = null; // cached for the rate suggestion form

function qs(k){return new URLSearchParams(location.search).get(k)}
function esc(s){return String(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}
function money(n){return '$'+Number(n||0).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2})}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2400)}
function fmtDate(d){if(!d)return 'TBD';return new Date(d).toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'})}

async function api(path, opts = {}){
  const url = `${API}${path}${path.includes('?')?'&':'?'}tenant=${TENANT}`;
  const r = await fetch(url, {headers:{'Content-Type':'application/json','x-tenant-id':TENANT},...opts});
  const body = await r.json().catch(()=>({}));
  if (!r.ok) throw new Error(body.error || r.statusText);
  return body;
}

async function boot(){
  let token = qs('token');
  if (token) localStorage.setItem('ry_sub_token', token);
  else token = localStorage.getItem('ry_sub_token');

  if (!token){
    document.getElementById('err').style.display='block';
    document.getElementById('err').textContent='No access link. Ask the owner for your portal URL.';
    document.getElementById('jobList').innerHTML='';
    return;
  }

  try {
    const { sub } = await api(`/sub-auth?token=${token}`);
    currentSub = sub;
    if (sub.portal_visibility && typeof sub.portal_visibility === 'object'){
      visibility = { ...visibility, ...sub.portal_visibility };
    }
    document.getElementById('who').innerHTML = `${esc(sub.name)}<small>${esc(sub.company||'')}</small>`;
    await loadJobs();
  } catch (e) {
    localStorage.removeItem('ry_sub_token');
    document.getElementById('err').style.display='block';
    document.getElementById('err').textContent = e.message + '. Ask the owner to send a fresh link.';
    document.getElementById('jobList').innerHTML='';
  }
}

async function loadJobs(){
  const { workorders } = await api(`/sub-auth?sub_id=${currentSub.id}&action=jobs`);
  const list = document.getElementById('jobList');
  if (!workorders.length){ list.innerHTML='<div class="empty">No jobs assigned yet.</div>'; return }

  list.innerHTML = workorders.map(w=>{
    const date = w.start_date ? new Date(w.start_date).toLocaleDateString('en-CA',{month:'short',day:'numeric'}) : 'TBD';
    const pill = w.status==='complete' ? 'green' : w.status==='issued' ? 'yellow' : 'orange';
    return `
    <div class="card" onclick="openWo('${w.id}')">
      <div class="row">
        <div>
          <div class="addr">${esc(w.address||'')}</div>
          <div class="cust">${esc(w.customer_name||'')}</div>
        </div>
        <span class="pill ${pill}">${esc(w.status)}</span>
      </div>
      <div class="meta">
        <span>📅 <b>${date}</b></span>
        <span>📐 <b>${esc(w.total_sq||'?')} SQ</b></span>
        ${w.paysheet?.total ? `<span>💵 <b>${money(w.paysheet.total)}</b></span>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function openWo(id){
  const { workorders } = await api(`/sub-auth?sub_id=${currentSub.id}&action=jobs`);
  const wo = workorders.find(w=>w.id===id);
  if (!wo) return;
  currentWo = wo;
  const ps = wo.paysheet;
  const entriesRes = await api(`/job-log?workorder_id=${id}`).catch(()=>({entries:[]}));
  const entries = entriesRes.entries || [];

  // Build the tab strip dynamically based on visibility flags
  const tabDefs = [
    { id: 'tScope', label: 'Scope', show: true }, // always shown — even when full scope hidden, status data shows
    { id: 'tSchedule', label: '📅 Schedule', show: !!visibility.show_schedule },
    { id: 'tMaterials', label: '📦 Materials', show: !!visibility.show_materials },
    { id: 'tPhotos', label: '📷 Photos', show: !!visibility.show_photos },
    { id: 'tPay', label: 'Pay', show: !!visibility.show_pay },
    { id: 'tRates', label: '📜 Rates', show: !!visibility.show_rates },
    { id: 'tLog', label: `Job Log (${entries.length})`, show: true } // always shown for change submissions
  ].filter(t => t.show);

  const tabsHtml = tabDefs.map((t,i) => `<button class="tab ${i===0?'on':''}" onclick="tab(event,'${t.id}')">${t.label}</button>`).join('');

  const body = document.getElementById('drawerBody');
  body.innerHTML = `
    <h3>${esc(wo.address||'')}<small>${esc(wo.customer_name||'')} · WO#${wo.wo_number||'?'}</small></h3>
    <div class="tabs">${tabsHtml}</div>
    <div id="tScope">
      ${renderScopeTab(wo)}
    </div>
    <div id="tSchedule" style="display:none"><div class="empty" style="padding:14px">Loading…</div></div>
    <div id="tMaterials" style="display:none"><div class="empty" style="padding:14px">Loading…</div></div>
    <div id="tPhotos" style="display:none"><div class="empty" style="padding:14px">Loading…</div></div>
    <div id="tPay" style="display:none">
      ${renderPayTab(ps)}
    </div>
    <div id="tRates" style="display:none"><div class="empty" style="padding:14px">Loading…</div></div>
    <div id="tLog" style="display:none">
      ${entries.length ? entries.map(renderEntry).join('') : '<div class="empty" style="padding:14px 10px">No entries yet.</div>'}
      <button class="btn primary full" style="margin-top:12px" onclick="showEntryForm()">+ ADD ENTRY</button>
      <div id="entryFormWrap"></div>
    </div>
  `;
  document.getElementById('drawerBg').classList.add('on');
  document.getElementById('drawer').classList.add('on');

  // Re-fetch full paysheet if we only got the summary
  if (ps && !ps.labour_breakdown){
    const full = await api(`/paysheets?id=${ps.id}`).catch(()=>null);
    if (full){ currentWo.paysheet = full; document.getElementById('tPay').innerHTML = renderPayTab(full); }
  }
}

function renderScopeTab(wo){
  const showFull = !!visibility.show_full_scope;
  return `
    <div class="meta" style="margin-bottom:12px">
      <span>📐 <b>${esc(wo.total_sq||'?')} SQ</b></span>
      <span>📏 <b>${esc(wo.roof_pitch||'?')}</b></span>
      <span>🎨 <b>${esc(wo.package_tier||'?')}</b> ${esc(wo.shingle_color||'')}</span>
    </div>
    ${wo.special_notes ? `<div class="card" style="cursor:default;background:rgba(250,204,21,0.05);border-color:rgba(250,204,21,0.2)"><div class="sub-label" style="margin:0 0 4px">⚠ SPECIAL NOTES</div>${esc(wo.special_notes)}</div>` : ''}
    ${showFull ? (wo.scope_items||[]).map(s=>`<div class="scope-item"><div><b>${esc(s.item)}</b>${s.notes?`<br><span style="color:var(--text-dim);font-size:0.82em">${esc(s.notes)}</span>`:''}</div>${s.qty?`<span class="pill">${esc(s.qty)}</span>`:''}</div>`).join('') : '<div class="empty" style="padding:20px;font-size:0.84em">Full scope is owner-only on this portal. Tap Materials or Schedule for what you need.</div>'}
    ${showFull && wo.additional_scope ? `<div class="sub-label">Additional scope</div><div style="font-size:0.85em;line-height:1.5;color:var(--text-dim)">${esc(wo.additional_scope)}</div>` : ''}
  `;
}

function renderPayTab(ps){
  if (!ps) return '<div class="empty">No pay sheet linked yet.</div>';
  const lines = (ps.labour_breakdown||[]).map(l=>`<div class="line"><span>${esc(l.description||l.label||'Line')}</span><span>${money(l.total)}</span></div>`).join('');
  const addons = (ps.add_ons||[]).map(a=>`<div class="line"><span>${esc(a.description||a.label)} ${a.qty?'× '+esc(a.qty):''}</span><span>${money(a.total)}</span></div>`).join('');
  const surcharges = (ps.surcharges||[]).map(s=>`<div class="line"><span>${esc(s.description||s.label)}</span><span>${money(s.total)}</span></div>`).join('');

  // Contingency rates block — pulled from the rate sheet if visibility allows
  const contingencyHtml = visibility.show_contingencies ? `
    <div class="sub-label" style="margin-top:14px">Contingency rates (if needed mid-job)</div>
    <div class="line"><span>Re-deck — PU-supplied OSB</span><span>$30/sheet</span></div>
    <div class="line"><span>Re-deck — sub-supplied OSB</span><span>$52/sheet</span></div>
    <div class="line"><span>Extra layer tear-off</span><span>$15/SQ</span></div>
    <div class="line"><span>Additional pipe boots</span><span>$25 each</span></div>
    <div class="line"><span>Cut-in vent</span><span>$15 each</span></div>
  ` : '';

  return `
    ${lines || '<div class="empty" style="padding:14px">No labor lines yet.</div>'}
    ${addons}
    ${surcharges}
    <div class="line"><span>Subtotal</span><span>${money(ps.subtotal)}</span></div>
    <div class="line"><span>HST</span><span>${money(ps.hst)}</span></div>
    <div class="line total"><span>Total</span><span>${money(ps.total)}</span></div>
    ${ps.balance_due != null ? `<div class="line"><span>Balance Due</span><span>${money(ps.balance_due)}</span></div>` : ''}
    ${contingencyHtml}
    <div style="margin-top:14px;font-size:0.78em;color:var(--text-dim);line-height:1.5">Need a change? Add it under Job Log — owner reviews and the pay sheet adjusts.</div>
  `;
}

function tab(ev, id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  ev.target.classList.add('on');
  ['tScope','tSchedule','tMaterials','tPhotos','tPay','tRates','tLog'].forEach(x=>{
    const el = document.getElementById(x);
    if (el) el.style.display = x===id ? 'block' : 'none';
  });
  // Lazy-load tab content
  if (id === 'tSchedule') loadScheduleTab();
  if (id === 'tMaterials') loadMaterialsTab();
  if (id === 'tPhotos') loadPhotosTab();
  if (id === 'tRates') loadRatesTab();
}

async function loadScheduleTab(){
  const el = document.getElementById('tSchedule');
  if (el.dataset.loaded) return;
  try {
    const token = localStorage.getItem('ry_sub_token');
    const r = await api(`/sub-portal?action=schedule&wo_id=${currentWo.id}&token=${token}`);
    el.innerHTML = `
      <div class="sched-block">
        <div class="lbl">Start date</div>
        <div class="val">${fmtDate(r.start_date)} · ~${esc(r.estimated_duration_days||'?')} day${r.estimated_duration_days==1?'':'s'}</div>
      </div>
      <div class="sched-block">
        <div class="lbl">Address</div>
        <div class="val">${esc(r.address||'—')}</div>
        ${r.map_url ? `<a class="btn small" href="${esc(r.map_url)}" target="_blank" style="margin-top:8px;display:inline-flex">📍 Open in Google Maps</a>` : ''}
      </div>
      ${r.gps_coords ? `<div class="sched-block"><div class="lbl">GPS</div><div class="val">${r.gps_coords.lat}, ${r.gps_coords.lng}</div></div>` : ''}
      <div class="sched-block">
        <div class="lbl">Site supervisor</div>
        <div class="val">${esc(r.supervisor_contact?.name||'AJ')}${r.supervisor_contact?.role ? ` · ${esc(r.supervisor_contact.role)}` : ''}</div>
        ${r.supervisor_contact?.phone ? `<a class="btn small" href="tel:${esc(r.supervisor_contact.phone)}" style="margin-top:8px;display:inline-flex">📞 ${esc(r.supervisor_contact.phone)}</a>` : '<div class="cust" style="margin-top:6px">No phone on file — text Mac if you need them.</div>'}
      </div>
      ${r.onsite_contact ? `<div class="sched-block"><div class="lbl">Onsite contact</div><div class="val">${esc(r.onsite_contact)}</div></div>` : ''}
      ${r.special_notes ? `<div class="sched-block" style="background:rgba(250,204,21,0.05);border-color:rgba(250,204,21,0.2)"><div class="lbl">⚠ Special notes</div><div class="val" style="font-weight:400;font-size:0.86em;line-height:1.5">${esc(r.special_notes)}</div></div>` : ''}
    `;
    el.dataset.loaded = '1';
  } catch (e) {
    el.innerHTML = `<div class="err">Couldn't load schedule: ${esc(e.message)}</div>`;
  }
}

async function loadMaterialsTab(){
  const el = document.getElementById('tMaterials');
  if (el.dataset.loaded) return;
  try {
    const token = localStorage.getItem('ry_sub_token');
    const r = await api(`/sub-portal?action=materials&wo_id=${currentWo.id}&token=${token}`);
    const colorClass = r.color_status?.startsWith('locked') ? 'locked' : 'tbd';
    const colorIcon = colorClass === 'locked' ? '✅' : '⏳';
    const supplierBlocks = Object.entries(r.supplier_summary || {}).map(([sup, total]) =>
      `<div class="line"><span>${esc(sup)}</span><span>${money(total)}</span></div>`
    ).join('');
    const items = (r.items || []).map(it => {
      const sup = (it.supplier||'').toLowerCase();
      const supClass = sup.includes('coastal') ? 'coastal' : sup.includes('kent') ? 'kent' : '';
      return `<div class="mat-row">
        <div>
          <div class="lbl">${esc(it.label)}</div>
          ${it.source_detail ? `<div class="src">${esc(it.source_detail)}</div>` : ''}
        </div>
        <div class="qty">${esc(it.quantity)} ${esc(it.unit||'')}</div>
        <div class="sup ${supClass}">${esc(it.supplier||'?')}</div>
      </div>`;
    }).join('');

    el.innerHTML = `
      <div class="color-banner ${colorClass}">${colorIcon} Color: ${esc(r.color_status||'?')}${r.shingle_product?` · ${esc(r.shingle_product)}`:''}</div>
      ${items || '<div class="empty" style="padding:20px">No materials list yet — owner is finalizing.</div>'}
      ${supplierBlocks ? `<div class="sub-label" style="margin-top:14px">Supplier breakdown</div>${supplierBlocks}<div class="line total"><span>Estimated total</span><span>${money(r.total_estimated)}</span></div>` : ''}
      <div style="margin-top:14px;font-size:0.78em;color:var(--text-dim);line-height:1.5">If you buy materials yourself, log it under Job Log → Material so it gets reimbursed.</div>
    `;
    el.dataset.loaded = '1';
  } catch (e) {
    el.innerHTML = `<div class="err">Couldn't load materials: ${esc(e.message)}</div>`;
  }
}

async function loadPhotosTab(){
  const el = document.getElementById('tPhotos');
  if (el.dataset.loaded) return;
  try {
    const token = localStorage.getItem('ry_sub_token');
    const r = await api(`/sub-portal?action=photos&wo_id=${currentWo.id}&token=${token}`);
    if (!r.photos?.length){
      el.innerHTML = `<div class="empty" style="padding:30px">No photos uploaded yet.${r.note?'<br><br>'+esc(r.note):''}</div>`;
      el.dataset.loaded = '1';
      return;
    }
    el.innerHTML = `
      <div class="gallery">
        ${r.photos.map(p => `<div class="ph ${p.is_cover?'cover':''}" onclick="openLightbox('${esc(p.url)}')"><img src="${esc(p.url)}" loading="lazy"><div class="cap">${esc(p.caption||(p.is_cover?'cover':'photo'))}</div></div>`).join('')}
      </div>
      <div style="margin-top:14px;font-size:0.78em;color:var(--text-dim);line-height:1.5">Need to add a photo? Use Job Log to upload it with context.</div>
    `;
    el.dataset.loaded = '1';
  } catch (e) {
    el.innerHTML = `<div class="err">Couldn't load photos: ${esc(e.message)}</div>`;
  }
}

async function loadRatesTab(){
  const el = document.getElementById('tRates');
  if (el.dataset.loaded) return;
  try {
    const token = localStorage.getItem('ry_sub_token');
    const r = await api(`/sub-portal?action=rates&token=${token}`);
    currentRateSheet = r;
    const groupsHtml = Object.entries(r.groups || {}).map(([groupName, lines]) => `
      <div class="rate-group">
        <h4>${esc(groupName)}</h4>
        ${lines.filter(l => l.value != null && l.value !== 0).map(l => `<div class="rate-line"><span class="lbl">${esc(l.label)}</span><span class="val">$${esc(l.value)} <span style="color:var(--text-dim);font-weight:400;font-size:0.82em">${esc(l.unit||'')}</span></span></div>`).join('')}
      </div>
    `).join('');

    el.innerHTML = `
      <div style="margin-bottom:12px;padding:10px 12px;background:rgba(34,211,238,0.06);border-radius:8px;border:1px solid var(--border);font-size:0.84em">
        <b>${esc(r.sub_name)}</b> · ${esc(r.sub_contact||'')}<br>
        <span style="color:var(--text-dim);font-size:0.82em">Rate sheet: ${esc(r.rate_sheet_version||'?')}</span>
      </div>
      <button class="btn primary full" style="margin-bottom:14px" onclick="showRateSuggestForm()">💡 SUGGEST A RATE CHANGE</button>
      <div id="rateSuggestWrap"></div>
      ${groupsHtml}
      ${r.rate_sheet_source ? `<div class="cust" style="margin-top:10px;font-size:0.74em">Source: ${esc(r.rate_sheet_source)}</div>` : ''}
    `;
    el.dataset.loaded = '1';
  } catch (e) {
    el.innerHTML = `<div class="err">Couldn't load rates: ${esc(e.message)}</div>`;
  }
}

function openLightbox(url){
  const lb = document.getElementById('lightbox');
  document.getElementById('lightboxImg').src = url;
  lb.classList.add('on');
}

function renderEntry(e){
  const label = {
    material_purchase:'🧾 Material',
    scope_change:'📐 Scope Change',
    additional_fee:'➕ Extra Fee',
    advance_payout:'💵 Advance',
    note:'📝 Note',
    rate_suggestion:'💡 Rate Suggestion',
    change_order:'📋 Change Order'
  }[e.entry_type] || e.entry_type;
  const pill = e.status==='approved'?'green':e.status==='denied'?'red':'yellow';
  const autoFlag = e.auto_approved_at ? '<span class="pill green" style="margin-left:4px" title="Auto-approved by threshold">AUTO</span>' : '';
  const rateBlock = e.entry_type === 'rate_suggestion' && e.rate_suggestion_item
    ? `<div class="cust" style="margin-top:6px">${esc(e.rate_suggestion_item)}: $${e.rate_suggestion_current ?? '?'} → $${e.rate_suggestion_proposed ?? '?'}</div>`
    : '';
  return `<div class="entry">
    <div class="row">
      <span class="pill">${label}</span>
      <span>
        <span class="pill ${pill}">${e.status}</span>${autoFlag}
      </span>
    </div>
    <div class="desc">${esc(e.description)}</div>
    ${rateBlock}
    ${e.vendor?`<div class="cust">Vendor: ${esc(e.vendor)}</div>`:''}
    ${e.amount?`<div style="margin-top:4px" class="amt">${money(e.amount)}</div>`:''}
    ${(e.photos||[]).length ? `<div class="photo-strip">${e.photos.map(u=>`<img src="${esc(u)}" onclick="openLightbox('${esc(u)}')">`).join('')}</div>` : ''}
    ${e.review_notes?`<div class="cust" style="margin-top:6px">Owner: ${esc(e.review_notes)}</div>`:''}
  </div>`;
}

let entryFormVisible = false;
let entryFormType = null;
function showEntryForm(){
  if (entryFormVisible) return;
  entryFormVisible = true;
  draftPhotos = [];
  entryFormType = null;
  const wrap = document.getElementById('entryFormWrap');
  const types = [
    ['material_purchase','🧾 Material'],
    ['scope_change','📐 Scope'],
    ['additional_fee','➕ Fee'],
    ['advance_payout','💵 Advance'],
    ['note','📝 Note'],
    ['change_order','📋 Change Order']
  ];
  wrap.innerHTML = `<div class="entry-form">
    <label>Type</label>
    <div class="type-grid">
      ${types.map(([v,l])=>`<div class="type-chip" data-t="${v}" onclick="pickType(this)">${l}</div>`).join('')}
    </div>
    <label>Description</label>
    <textarea id="eDesc" placeholder="What happened — be specific (soft deck found, extra LF, material bought, etc.)"></textarea>
    <label>Amount (CAD) — leave 0 if N/A</label>
    <input id="eAmt" type="number" step="0.01" placeholder="0.00">
    <label>Vendor (material purchases only)</label>
    <input id="eVendor" placeholder="Kent, Coastal, etc.">
    <label>Photos (receipts, scope evidence)</label>
    <input id="ePhoto" type="file" accept="image/*" multiple onchange="uploadPhotos(event)">
    <div class="photo-strip" id="draftStrip"></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn primary" style="flex:1" onclick="submitEntry()">SUBMIT FOR REVIEW</button>
      <button class="btn ghost" onclick="hideEntryForm()">Cancel</button>
    </div>
  </div>`;
}

function showRateSuggestForm(){
  if (!currentRateSheet) { toast('Rates still loading…'); return }
  const wrap = document.getElementById('rateSuggestWrap');
  if (wrap.dataset.open === '1') {
    wrap.innerHTML = '';
    wrap.dataset.open = '0';
    return;
  }
  // Build a flat list of every rate line for the dropdown
  const allLines = [];
  Object.entries(currentRateSheet.groups || {}).forEach(([group, lines]) => {
    lines.forEach(l => {
      if (l.value != null && l.value !== 0) {
        allLines.push({
          group, key: l.key, label: l.label, current: l.value, unit: l.unit
        });
      }
    });
  });
  wrap.innerHTML = `<div class="entry-form">
    <label>Which rate?</label>
    <select id="rsItem" onchange="rsItemChanged()">
      <option value="">Pick a rate to change…</option>
      ${allLines.map(l => `<option value="${esc(l.key)}" data-current="${esc(l.current)}" data-label="${esc(l.label)}" data-unit="${esc(l.unit||'')}">${esc(l.group)} → ${esc(l.label)} ($${esc(l.current)} ${esc(l.unit||'')})</option>`).join('')}
    </select>
    <label>Current rate</label>
    <input id="rsCurrent" readonly placeholder="(auto-fills when you pick a rate)">
    <label>Proposed rate (CAD)</label>
    <input id="rsProposed" type="number" step="0.01" placeholder="What you think it should be">
    <label>Why? (justification)</label>
    <textarea id="rsJustify" placeholder="Material costs went up, harder install than typical, etc. Be specific so Mac can decide fast."></textarea>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn primary" style="flex:1" onclick="submitRateSuggestion()">SUBMIT SUGGESTION</button>
      <button class="btn ghost" onclick="document.getElementById('rateSuggestWrap').innerHTML='';document.getElementById('rateSuggestWrap').dataset.open='0'">Cancel</button>
    </div>
  </div>`;
  wrap.dataset.open = '1';
}

function rsItemChanged(){
  const sel = document.getElementById('rsItem');
  const opt = sel.options[sel.selectedIndex];
  if (!opt || !opt.value) { document.getElementById('rsCurrent').value = ''; return; }
  document.getElementById('rsCurrent').value = '$' + opt.dataset.current + ' ' + (opt.dataset.unit || '');
}

async function submitRateSuggestion(){
  const sel = document.getElementById('rsItem');
  const opt = sel.options[sel.selectedIndex];
  if (!opt || !opt.value) { toast('Pick a rate first'); return }
  const proposed = Number(document.getElementById('rsProposed').value);
  if (!Number.isFinite(proposed) || proposed <= 0) { toast('Enter a proposed rate'); return }
  const justify = document.getElementById('rsJustify').value.trim();
  if (!justify) { toast('Add a justification — Mac needs context'); return }

  const body = {
    workorder_id: currentWo.id,
    subcontractor_id: currentSub.id,
    paysheet_id: currentWo.paysheet?.id || null,
    entry_type: 'rate_suggestion',
    description: `Suggesting ${opt.dataset.label} change: from ${document.getElementById('rsCurrent').value} → $${proposed}. Justification: ${justify}`,
    amount: 0,
    vendor: null,
    photos: [],
    rate_suggestion_item: opt.dataset.label,
    rate_suggestion_current: parseFloat(opt.dataset.current),
    rate_suggestion_proposed: proposed,
    created_by_sub: true
  };
  try {
    await api('/job-log', { method:'POST', body: JSON.stringify(body) });
    toast('Suggestion submitted — Mac will review');
    document.getElementById('rateSuggestWrap').innerHTML='';
    document.getElementById('rateSuggestWrap').dataset.open='0';
  } catch (e) { toast('Failed: '+e.message) }
}

function hideEntryForm(){
  entryFormVisible = false;
  document.getElementById('entryFormWrap').innerHTML='';
}

function pickType(el){
  document.querySelectorAll('.type-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  entryFormType = el.dataset.t;
}

async function uploadPhotos(ev){
  for (const file of ev.target.files){
    try {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('workorder_id', currentWo.id);
      const r = await fetch(`/api/job-log-photo?tenant=${TENANT}`, { method:'POST', headers:{'x-tenant-id':TENANT}, body: fd });
      const body = await r.json();
      if (!r.ok) throw new Error(body.error || r.statusText);
      draftPhotos.push(body.url);
      document.getElementById('draftStrip').innerHTML = draftPhotos.map(u=>`<img src="${u}">`).join('');
    } catch (e){ toast('Photo upload failed: '+e.message) }
  }
}

async function submitEntry(){
  const type = entryFormType || document.querySelector('.type-chip.on')?.dataset.t;
  const desc = document.getElementById('eDesc').value.trim();
  if (!type){ toast('Pick a type'); return }
  if (!desc){ toast('Description required'); return }

  const body = {
    workorder_id: currentWo.id,
    subcontractor_id: currentSub.id,
    paysheet_id: currentWo.paysheet?.id || null,
    entry_type: type,
    description: desc,
    amount: Number(document.getElementById('eAmt').value) || 0,
    vendor: document.getElementById('eVendor').value.trim() || null,
    photos: draftPhotos,
    created_by_sub: true
    // NOTE: don't set status — let server route by threshold
  };

  try {
    const result = await api('/job-log', { method:'POST', body: JSON.stringify(body) });
    if (result.status === 'approved' && result._routing?.auto_approved){
      toast('Auto-approved — counts toward your pay sheet');
    } else {
      toast('Submitted for owner review');
    }
    hideEntryForm();
    openWo(currentWo.id);
  } catch (e) { toast('Failed: '+e.message) }
}

function closeDrawer(){
  document.getElementById('drawerBg').classList.remove('on');
  document.getElementById('drawer').classList.remove('on');
  currentWo = null;
  entryFormVisible = false;
  currentRateSheet = null;
}

boot();
</script>
</body>
</html>
