<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060a14">
<title>Sub Portal — Ryujin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
:root{
  --bg:#060a14;--surface:rgba(14,22,40,0.85);--surface-hi:rgba(22,34,60,0.95);
  --border:rgba(34,211,238,0.1);--border-hi:rgba(34,211,238,0.28);
  --text:#d0daf0;--text-dim:rgba(160,190,230,0.55);
  --cyan:#22d3ee;--blue:#4a9eff;--green:#4ade80;--yellow:#facc15;--red:#f87171;--orange:#fb923c;
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 30% 10%,rgba(34,211,238,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(74,158,255,0.05) 0%,transparent 50%)}
.wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:14px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;backdrop-filter:blur(12px)}
.brand{font-family:'Orbitron';font-size:0.72em;letter-spacing:1.8px;color:var(--cyan);font-weight:600}
.who{font-size:0.85em;font-weight:600}
.who small{display:block;font-size:0.75em;color:var(--text-dim);font-weight:400;margin-top:2px}
h1{font-size:1.1em;margin:6px 0 10px;letter-spacing:0.5px}
h2{font-size:0.85em;margin:14px 0 8px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;backdrop-filter:blur(12px);cursor:pointer;transition:border-color 0.2s,transform 0.1s}
.card:hover{border-color:var(--border-hi)}
.card:active{transform:scale(0.99)}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.addr{font-weight:600;font-size:0.95em}
.cust{color:var(--text-dim);font-size:0.82em;margin-top:2px}
.pill{font-size:0.68em;padding:3px 8px;border-radius:20px;background:rgba(34,211,238,0.1);color:var(--cyan);border:1px solid var(--border-hi);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap}
.pill.green{background:rgba(74,222,128,0.12);color:var(--green);border-color:rgba(74,222,128,0.25)}
.pill.yellow{background:rgba(250,204,21,0.12);color:var(--yellow);border-color:rgba(250,204,21,0.25)}
.pill.red{background:rgba(248,113,113,0.12);color:var(--red);border-color:rgba(248,113,113,0.25)}
.pill.orange{background:rgba(251,146,60,0.12);color:var(--orange);border-color:rgba(251,146,60,0.25)}
.meta{margin-top:8px;display:flex;gap:12px;flex-wrap:wrap;font-size:0.78em;color:var(--text-dim)}
.meta span b{color:var(--text);font-weight:600}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:8px;border:1px solid var(--border-hi);background:rgba(34,211,238,0.08);color:var(--cyan);font-size:0.82em;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:0.3px}
.btn:hover{background:rgba(34,211,238,0.14)}
.btn.primary{background:var(--cyan);color:#0a1628;border-color:var(--cyan)}
.btn.primary:hover{background:#5eeaff}
.btn.ghost{background:transparent;color:var(--text-dim);border-color:var(--border)}
.btn.small{padding:6px 10px;font-size:0.72em}
.btn.full{width:100%}
.empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:0.9em}
.err{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--red);padding:16px;border-radius:var(--radius);font-size:0.88em;margin-bottom:14px}

/* Drawer */
.drawer-bg{position:fixed;inset:0;background:rgba(6,10,20,0.7);backdrop-filter:blur(6px);z-index:50;display:none}
.drawer-bg.on{display:block}
.drawer{position:fixed;bottom:0;left:0;right:0;max-height:92vh;overflow-y:auto;background:var(--surface-hi);border-top:1px solid var(--border-hi);border-radius:20px 20px 0 0;padding:18px 16px 30px;z-index:51;transform:translateY(100%);transition:transform 0.25s}
.drawer.on{transform:translateY(0)}
.drawer-close{position:absolute;top:10px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);border:none;font-size:18px}
.drawer h3{font-size:1em;margin-bottom:4px}
.drawer h3 small{display:block;font-size:0.78em;color:var(--text-dim);font-weight:400;margin-top:4px}
.tabs{display:flex;gap:4px;margin:14px 0;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:9px;font-size:0.8em;color:var(--text-dim);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;font-weight:600;letter-spacing:0.3px}
.tab.on{color:var(--cyan);border-bottom-color:var(--cyan)}
.scope-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:0.86em;display:flex;justify-content:space-between;gap:12px}
.scope-item:last-child{border-bottom:none}
.scope-item b{font-weight:600}
.line{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dotted var(--border);font-size:0.85em}
.line:last-child{border-bottom:none}
.line.total{font-weight:700;color:var(--cyan);font-size:0.95em;border-top:1px solid var(--border-hi);margin-top:6px;padding-top:10px}
.sub-label{color:var(--text-dim);font-size:0.78em;margin-top:8px}
.entry{padding:10px 12px;background:rgba(34,211,238,0.04);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.entry .row{margin-bottom:4px}
.entry .desc{font-size:0.86em;line-height:1.4}
.entry .amt{font-weight:700;color:var(--green)}
.entry-form{background:var(--surface);padding:14px;border-radius:10px;border:1px solid var(--border);margin-top:10px}
.entry-form label{display:block;font-size:0.72em;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.2px;margin:10px 0 5px}
.entry-form input,.entry-form select,.entry-form textarea{width:100%;padding:10px 12px;background:rgba(6,10,20,0.6);border:1px solid var(--border-hi);border-radius:8px;color:var(--text);font-family:inherit;font-size:0.9em}
.entry-form textarea{min-height:68px;resize:vertical}
.type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.type-chip{padding:10px 8px;background:rgba(34,211,238,0.05);border:1px solid var(--border);border-radius:8px;font-size:0.78em;cursor:pointer;text-align:center;color:var(--text-dim);font-weight:600}
.type-chip.on{background:rgba(34,211,238,0.15);border-color:var(--cyan);color:var(--cyan)}
.photo-strip{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.photo-strip img{width:56px;height:56px;object-fit:cover;border-radius:6px;border:1px solid var(--border)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface-hi);border:1px solid var(--border-hi);padding:10px 18px;border-radius:8px;z-index:99;font-size:0.85em;box-shadow:0 6px 20px rgba(0,0,0,0.5)}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="topbar">
    <div class="brand">RYUJIN · SUB</div>
    <div class="who" id="who">…</div>
  </div>
  <div id="err" class="err" style="display:none"></div>
  <h1>Your Jobs</h1>
  <div id="jobList" class="empty">Loading…</div>
</div>

<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">✕</button>
  <div id="drawerBody"></div>
</div>

<script>
const API = '/api';
const TENANT = 'plus-ultra';
let currentSub = null;
let currentWo = null;
let draftPhotos = [];

function qs(k){return new URLSearchParams(location.search).get(k)}
function esc(s){return String(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}
function money(n){return '$'+Number(n||0).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2})}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2400)}

async function api(path, opts = {}){
  const url = `${API}${path}${path.includes('?')?'&':'?'}tenant=${TENANT}`;
  const r = await fetch(url, {headers:{'Content-Type':'application/json','x-tenant-id':TENANT},...opts});
  const body = await r.json().catch(()=>({}));
  if (!r.ok) throw new Error(body.error || r.statusText);
  return body;
}

async function boot(){
  let token = qs('token');
  if (token) localStorage.setItem('ry_sub_token', token);
  else token = localStorage.getItem('ry_sub_token');

  if (!token){
    document.getElementById('err').style.display='block';
    document.getElementById('err').textContent='No access link. Ask the owner for your portal URL.';
    document.getElementById('jobList').innerHTML='';
    return;
  }

  try {
    const { sub } = await api(`/sub-auth?token=${token}`);
    currentSub = sub;
    document.getElementById('who').innerHTML = `${esc(sub.name)}<small>${esc(sub.company||'')}</small>`;
    await loadJobs();
  } catch (e) {
    localStorage.removeItem('ry_sub_token');
    document.getElementById('err').style.display='block';
    document.getElementById('err').textContent = e.message + '. Ask the owner to send a fresh link.';
    document.getElementById('jobList').innerHTML='';
  }
}

async function loadJobs(){
  const { workorders } = await api(`/sub-auth?sub_id=${currentSub.id}&action=jobs`);
  const list = document.getElementById('jobList');
  if (!workorders.length){ list.innerHTML='<div class="empty">No jobs assigned yet.</div>'; return }

  list.innerHTML = workorders.map(w=>{
    const date = w.start_date ? new Date(w.start_date).toLocaleDateString('en-CA',{month:'short',day:'numeric'}) : 'TBD';
    const pill = w.status==='complete' ? 'green' : w.status==='issued' ? 'yellow' : 'orange';
    return `
    <div class="card" onclick="openWo('${w.id}')">
      <div class="row">
        <div>
          <div class="addr">${esc(w.address||'')}</div>
          <div class="cust">${esc(w.customer_name||'')}</div>
        </div>
        <span class="pill ${pill}">${esc(w.status)}</span>
      </div>
      <div class="meta">
        <span>📅 <b>${date}</b></span>
        <span>📐 <b>${esc(w.total_sq||'?')} SQ</b></span>
        ${w.paysheet?.total ? `<span>💵 <b>${money(w.paysheet.total)}</b></span>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function openWo(id){
  const { workorders } = await api(`/sub-auth?sub_id=${currentSub.id}&action=jobs`);
  const wo = workorders.find(w=>w.id===id);
  if (!wo) return;
  currentWo = wo;
  const ps = wo.paysheet;
  const entriesRes = await api(`/job-log?workorder_id=${id}`).catch(()=>({entries:[]}));
  const entries = entriesRes.entries || [];

  const body = document.getElementById('drawerBody');
  body.innerHTML = `
    <h3>${esc(wo.address||'')}<small>${esc(wo.customer_name||'')} · WO#${wo.wo_number||'?'}</small></h3>
    <div class="tabs">
      <button class="tab on" onclick="tab(event,'tScope')">Scope</button>
      <button class="tab" onclick="tab(event,'tPay')">Pay</button>
      <button class="tab" onclick="tab(event,'tLog')">Job Log (${entries.length})</button>
    </div>
    <div id="tScope">
      <div class="meta" style="margin-bottom:12px">
        <span>📐 <b>${esc(wo.total_sq||'?')} SQ</b></span>
        <span>📏 <b>${esc(wo.roof_pitch||'?')}</b></span>
        <span>🎨 <b>${esc(wo.package_tier||'?')}</b> ${esc(wo.shingle_color||'')}</span>
      </div>
      ${wo.special_notes ? `<div class="card" style="cursor:default;background:rgba(250,204,21,0.05);border-color:rgba(250,204,21,0.2)"><div class="sub-label" style="margin:0 0 4px">⚠ SPECIAL NOTES</div>${esc(wo.special_notes)}</div>` : ''}
      ${(wo.scope_items||[]).map(s=>`<div class="scope-item"><div><b>${esc(s.item)}</b>${s.notes?`<br><span style="color:var(--text-dim);font-size:0.82em">${esc(s.notes)}</span>`:''}</div>${s.qty?`<span class="pill">${esc(s.qty)}</span>`:''}</div>`).join('')}
      ${wo.additional_scope ? `<div class="sub-label">Additional scope</div><div style="font-size:0.85em;line-height:1.5;color:var(--text-dim)">${esc(wo.additional_scope)}</div>` : ''}
    </div>
    <div id="tPay" style="display:none">
      ${!ps ? '<div class="empty">No pay sheet linked yet.</div>' : `
        ${(ps.labour_breakdown||[]).map(l=>`<div class="line"><span>${esc(l.description)}</span><span>${money(l.total)}</span></div>`).join('') || '<div class="empty" style="padding:14px">Loading…</div>'}
        ${(ps.add_ons||[]).map(a=>`<div class="line"><span>${esc(a.description)} ${a.qty?'× '+esc(a.qty):''}</span><span>${money(a.total)}</span></div>`).join('')}
        <div class="line"><span>Subtotal</span><span>${money(ps.subtotal)}</span></div>
        <div class="line"><span>HST</span><span>${money(ps.hst)}</span></div>
        <div class="line total"><span>Total</span><span>${money(ps.total)}</span></div>
        <div class="line"><span>Balance Due</span><span>${money(ps.balance_due)}</span></div>
        <div style="margin-top:14px;font-size:0.78em;color:var(--text-dim);line-height:1.5">Need a change? Add it under Job Log — owner reviews and adjusts the pay sheet.</div>
      `}
    </div>
    <div id="tLog" style="display:none">
      ${entries.length ? entries.map(renderEntry).join('') : '<div class="empty" style="padding:14px 10px">No entries yet.</div>'}
      <button class="btn primary full" style="margin-top:12px" onclick="showEntryForm()">+ ADD ENTRY</button>
      <div id="entryFormWrap"></div>
    </div>
  `;
  document.getElementById('drawerBg').classList.add('on');
  document.getElementById('drawer').classList.add('on');
  // Re-fetch full paysheet if needed
  if (ps && !ps.labour_breakdown){
    const full = await api(`/paysheets?id=${ps.id}`).catch(()=>null);
    if (full){ currentWo.paysheet = full; openWo(id); }
  }
}

function renderEntry(e){
  const label = { material_purchase:'🧾 Material', scope_change:'📐 Scope Change', additional_fee:'➕ Extra Fee', advance_payout:'💵 Advance', note:'📝 Note' }[e.entry_type] || e.entry_type;
  const pill = e.status==='approved'?'green':e.status==='denied'?'red':'yellow';
  return `<div class="entry">
    <div class="row">
      <span class="pill">${label}</span>
      <span class="pill ${pill}">${e.status}</span>
    </div>
    <div class="desc">${esc(e.description)}</div>
    ${e.vendor?`<div class="cust">Vendor: ${esc(e.vendor)}</div>`:''}
    ${e.amount?`<div style="margin-top:4px" class="amt">${money(e.amount)}</div>`:''}
    ${(e.photos||[]).length ? `<div class="photo-strip">${e.photos.map(u=>`<img src="${esc(u)}" onclick="window.open('${esc(u)}','_blank')">`).join('')}</div>` : ''}
    ${e.review_notes?`<div class="cust" style="margin-top:6px">Owner: ${esc(e.review_notes)}</div>`:''}
  </div>`;
}

function tab(ev, id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  ev.target.classList.add('on');
  ['tScope','tPay','tLog'].forEach(x=>{document.getElementById(x).style.display = x===id ? 'block' : 'none'});
}

let entryFormVisible = false;
function showEntryForm(){
  if (entryFormVisible) return;
  entryFormVisible = true;
  draftPhotos = [];
  const wrap = document.getElementById('entryFormWrap');
  wrap.innerHTML = `<div class="entry-form">
    <label>Type</label>
    <div class="type-grid">
      ${[['material_purchase','🧾 Material'],['scope_change','📐 Scope'],['additional_fee','➕ Fee'],['advance_payout','💵 Advance'],['note','📝 Note']].map(([v,l])=>`<div class="type-chip" data-t="${v}" onclick="pickType(this)">${l}</div>`).join('')}
    </div>
    <label>Description</label>
    <textarea id="eDesc" placeholder="What happened — be specific (soft deck found, extra LF, material bought, etc.)"></textarea>
    <label>Amount (CAD) — leave 0 if N/A</label>
    <input id="eAmt" type="number" step="0.01" placeholder="0.00">
    <label>Vendor (material purchases only)</label>
    <input id="eVendor" placeholder="Kent, BMR, etc.">
    <label>Photos (receipts, scope evidence)</label>
    <input id="ePhoto" type="file" accept="image/*" multiple onchange="uploadPhotos(event)">
    <div class="photo-strip" id="draftStrip"></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn primary" style="flex:1" onclick="submitEntry()">SUBMIT FOR REVIEW</button>
      <button class="btn ghost" onclick="hideEntryForm()">Cancel</button>
    </div>
  </div>`;
}

function hideEntryForm(){
  entryFormVisible = false;
  document.getElementById('entryFormWrap').innerHTML='';
}

function pickType(el){
  document.querySelectorAll('.type-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}

async function uploadPhotos(ev){
  for (const file of ev.target.files){
    try {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('workorder_id', currentWo.id);
      const r = await fetch(`/api/job-log-photo?tenant=${TENANT}`, { method:'POST', headers:{'x-tenant-id':TENANT}, body: fd });
      const body = await r.json();
      if (!r.ok) throw new Error(body.error || r.statusText);
      draftPhotos.push(body.url);
      document.getElementById('draftStrip').innerHTML = draftPhotos.map(u=>`<img src="${u}">`).join('');
    } catch (e){ toast('Photo upload failed: '+e.message) }
  }
}

async function submitEntry(){
  const type = document.querySelector('.type-chip.on')?.dataset.t;
  const desc = document.getElementById('eDesc').value.trim();
  if (!type){ toast('Pick a type'); return }
  if (!desc){ toast('Description required'); return }

  const body = {
    workorder_id: currentWo.id,
    subcontractor_id: currentSub.id,
    paysheet_id: currentWo.paysheet?.id || null,
    entry_type: type,
    description: desc,
    amount: Number(document.getElementById('eAmt').value) || 0,
    vendor: document.getElementById('eVendor').value.trim() || null,
    photos: draftPhotos,
    created_by_sub: true,
    status: 'pending'
  };

  try {
    await api('/job-log', { method:'POST', body: JSON.stringify(body) });
    toast('Submitted for owner review');
    hideEntryForm();
    openWo(currentWo.id);
  } catch (e) { toast('Failed: '+e.message) }
}

function closeDrawer(){
  document.getElementById('drawerBg').classList.remove('on');
  document.getElementById('drawer').classList.remove('on');
  currentWo = null;
  entryFormVisible = false;
}

boot();
</script>
</body>
</html>
