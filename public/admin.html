function copyQuoteSummary() {
  const text = getQuoteSummaryText();
  navigator.clipboard.writeText(text).then(() => {
    toast('Quote summary copied to clipboard', 'success');
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    toast('Copied to clipboard', 'success');
  });
}

async function uploadQuotePhotos(fileList) {
  if (!quoteState.answers._photos) quoteState.answers._photos = [];
  for (const file of fileList) {
    if (!file.type.startsWith('image/')) continue;
    // Convert to base64 data URL for now (works in proposal render)
    // TODO: upload to Vercel Blob for persistent URLs
    const reader = new FileReader();
    reader.onload = (e) => {
      quoteState.answers._photos.push(e.target.result);
      renderQuoteForm();
    };
    reader.readAsDataURL(file);
  }
}

async function generateOutputs(type) {
  if (!quoteState.result) return;
  // Get the system-specific offer IDs for comparison
  const sysMap = {residential:'asphalt',metal:'metal',flat:'asphalt',exterior:'exterior',combined:'combined'};
  const sysOffers = offersCache ? (offersCache.offers||[]).filter(o => o.system === (sysMap[quoteState.system]||'asphalt')).map(o => o.id) : [];

  const payload = {
    quote_result: quoteState.result,
    customer_name: quoteState.answers.customerName || '',
    property_address: quoteState.answers.address || '',
    prepared_by: 'Mackenzie Mazerolle',
    compare_offer_ids: sysOffers,
    measurements: quoteState.result.measurements,
    photos: quoteState.answers._photos || []
  };

  // Types that render as HTML
  const renderTypes = ['proposal', 'contract', 'sales_page'];

  if (renderTypes.includes(type)) {
    const od = await api(`/outputs?type=${type}`, {method:'POST', body:JSON.stringify(payload)});
    if (od.error) { toast('Output error: ' + od.error, 'error'); return; }
    const resp = await fetch(`${API}/render?type=${type}&tenant=${TENANT}`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(od)});
    if (!resp.ok) { toast('Render failed', 'error'); return; }
    const html = await resp.text();
    const w = window.open('', '_blank');
    if (!w) { toast('Pop-up blocked — allow pop-ups for this site', 'error'); return; }
    w.document.write(html); w.document.close();
    return;
  }

  if (type === 'all') {
    const ad = await api('/outputs?type=all', {method:'POST', body:JSON.stringify(payload)});
    if (ad.error) { toast('Output error: ' + ad.error, 'error'); return; }
    for (const t of ['proposal', 'contract', 'sales_page']) {
      const data = t === 'sales_page' ? ad.outputs?.salesPage : ad.outputs?.[t];
      if (!data) continue;
      const resp = await fetch(`${API}/render?type=${t}&tenant=${TENANT}`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
      if (!resp.ok) continue;
      const html = await resp.text();
      const w = window.open('', '_blank');
      if (w) { w.document.write(html); w.document.close(); }
    }
    return;
  }

  // Fallback: show JSON
  const r = await api(`/outputs?type=${type}`, {method:'POST', body:JSON.stringify(payload)});
  const w = window.open('', '_blank');
  if (w) w.document.write(`<pre style="background:#060a14;color:#d0daf0;padding:20px;font-family:monospace;font-size:13px;white-space:pre-wrap">${JSON.stringify(r,null,2)}</pre>`);
}

async function createEstimateFromQuote() {
  if(!quoteState.result) return;
  const name = quoteState.answers.customerName || prompt('Customer name:');
  if(!name) return;
  const addr = quoteState.answers.address || '';
  const phone = quoteState.answers.customerPhone || '';
  const email = quoteState.answers.customerEmail || '';
  const notes = quoteState.answers.notes || '';

  // Find or create customer
  let cid = null;
  const custs = await api('/customers');
  const ex = (custs.customers||[]).find(c => (c.full_name||'').toLowerCase() === name.toLowerCase());
  if (ex) {
    cid = ex.id;
  } else {
    const nc = await api('/customers', {method:'POST', body:JSON.stringify({full_name:name, address:addr, phone:phone, email:email})});
    if (nc.id) cid = nc.id;
  }

  const est = await api('/estimates', {method:'POST', body:JSON.stringify({
    customer_id: cid, address: addr, status: 'draft',
    system: quoteState.result.offer.system,
    package: quoteState.result.offer.slug,
    total_price: quoteState.result.summary.sellingPrice,
    total_with_tax: quoteState.result.summary.totalWithTax,
    measurements: quoteState.result.measurements,
    choices: quoteState.result.choices,
    notes: (notes ? notes + ' — ' : '') + 'Generated via Quote Builder — ' + quoteState.result.offer.name
  })});

  if (est.error) { sfx.play('error'); toast('Error: ' + est.error, 'error'); return; }
  sfx.play('success');

  // Show confirmation inline instead of alert
  const rd = document.getElementById('quoteResult');
  if (rd) {
    const confirmHtml = `<div class="panel" style="margin-top:12px;border-color:var(--green);text-align:center;padding:24px">
      <div style="font-size:2em;margin-bottom:8px">&#10003;</div>
      <div style="font-family:'Orbitron',monospace;font-size:0.9em;font-weight:700;color:var(--green);letter-spacing:1px">ESTIMATE SAVED</div>
      <div style="font-size:0.82em;color:var(--text-dim);margin-top:6px">${esc(name)} &mdash; ${esc(quoteState.result.offer.name)} &mdash; ${fmt$(quoteState.result.summary.totalWithTax)}</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:16px">
        <button class="btn btn-primary btn-sm" onclick="navigate('estimates')">View Estimates</button>
        <button class="btn btn-outline btn-sm" onclick="generateOutputs('proposal')">Print Proposal</button>
        <button class="btn btn-outline btn-sm" onclick="generateOutputs('contract')">Generate Contract</button>
      </div>
    </div>`;
    rd.insertAdjacentHTML('beforeend', confirmHtml);
    rd.lastElementChild.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

let productSearch = '';
async function renderProducts(m) {
  m.innerHTML = '<div class="loading"><div class="spinner"></div>Loading product catalog...</div>';

  const [catalogData, merchantData] = await Promise.all([
    api('/merchants?mode=products'),
    api('/merchants')
  ]);

  const categories = catalogData.categories || [];
  const products = catalogData.products || [];
  const merchants = merchantData.merchants || [];

  const filtered = productSearch
    ? products.filter(p => (p.name||'').toLowerCase().includes(productSearch.toLowerCase()) || (p.brand||'').toLowerCase().includes(productSearch.toLowerCase()))
    : products;

  // Group by category
  const groups = {};
  for (const p of filtered) {
    const catName = p.category?.name || 'Uncategorized';
    if (!groups[catName]) groups[catName] = [];
    groups[catName].push(p);
  }

  let html = `<div class="page-header"><div><h1>Products & Pricing</h1><div class="sub">${products.length} products &bull; ${merchants.length} merchants</div></div></div>`;

  // Stats
  const withPricing = products.filter(p => p.merchant_count > 0 || p.has_pricing).length;
  html += `<div class="stat-row" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px">
    <div class="panel" style="padding:12px 14px">
      <div style="font-family:'Orbitron',monospace;font-size:1.4em;font-weight:700;color:var(--cyan)">${products.length}</div><div class="mega-label">Products</div></div>
    <div class="panel" style="padding:12px 14px">
      <div style="font-family:'Orbitron',monospace;font-size:1.4em;font-weight:700;color:var(--green)">${merchants.length}</div><div class="mega-label">Merchants</div></div>
    <div class="panel" style="padding:12px 14px">
      <div style="font-family:'Orbitron',monospace;font-size:1.4em;font-weight:700;color:var(--purple)">${categories.length}</div><div class="mega-label">Categories</div></div>
    <div class="panel" style="padding:12px 14px">
      ${progressBar(products.length > 0 ? Math.round(withPricing/products.length*100) : 0, 'cyan', 'Priced', withPricing + '/' + products.length)}
    </div>
  </div>`;

  // Search
  html += `<div class="panel" style="margin-bottom:10px;padding:8px 14px;display:flex;align-items:center;gap:10px">
    <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:var(--text-dim);fill:none;stroke-width:2;flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Search products by name or brand..." value="${esc(productSearch)}" onkeyup="productSearch=this.value;clearTimeout(window._prodDebounce);window._prodDebounce=setTimeout(()=>renderProducts(document.getElementById('main')),300)" style="border:none;background:transparent;color:var(--text);font-size:0.88em;width:100%;outline:none">
    ${productSearch ? `<button class="btn btn-sm btn-outline" onclick="productSearch='';renderProducts(document.getElementById('main'))" style="flex-shrink:0">Clear</button>` : ''}
  </div>`;

  // Merchants row
  if (merchants.length > 0) {
    html += `<div class="panel" style="margin-bottom:10px;padding:10px 14px"><div class="panel-header"><div class="panel-title">Merchants</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">`;
    for (const m of merchants) {
      html += `<div style="padding:6px 12px;border-radius:8px;background:rgba(34,211,238,0.04);border:1px solid var(--glass-border);font-size:0.78em">
        <span style="font-weight:600">${esc(m.name)}</span>
        ${m.city ? `<span class="text-dim"> &bull; ${esc(m.city)}</span>` : ''}
      </div>`;
    }
    html += '</div></div>';
  }

  // Products by category
  if (Object.keys(groups).length === 0) {
    html += `<div class="panel" style="text-align:center;padding:40px"><div style="font-size:0.9em;color:var(--text-dim)">${productSearch ? 'No products match your search.' : 'No products in catalog.'}</div></div>`;
  } else {
    for (const [catName, items] of Object.entries(groups)) {
      html += `<div class="panel" style="margin-bottom:8px">
        <div class="panel-header"><div class="panel-title">${esc(catName)}</div><span class="badge badge-blue">${items.length}</span></div>
        <div class="table-wrap"><table>
          <thead><tr><th>Product</th><th>Brand</th><th>Unit</th><th class="text-right">Price</th><th>Source</th></tr></thead><tbody>`;
      for (const p of items) {
        const price = p.best_price || p.price;
        const source = p.best_source || p.price_source || '';
        html += `<tr>
          <td style="font-weight:600;font-size:0.85em">${esc(p.name)}</td>
          <td class="text-dim" style="font-size:0.82em">${esc(p.brand || '—')}</td>
          <td class="text-dim" style="font-size:0.78em">${esc(p.unit || 'each')}</td>
          <td class="text-right" style="font-family:'Orbitron',monospace;font-size:0.85em;color:${price ? 'var(--cyan)' : 'var(--text-dim)'}">${price ? fmt$(price) : '—'}</td>
          <td class="text-dim" style="font-size:0.7em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(source)}</td>
        </tr>`;
      }
      html += '</tbody></table></div></div>';
    }
  }

  m.innerHTML = html;
}

  html += `<div class="dash-grid" style="grid-template-columns:repeat(${Math.min(sysCount,4)},1fr);margin-bottom:10px">`;
  for (const [sys,items] of Object.entries(groups)) {
    const confirmed = items.filter(o => !o.has_estimated_pricing).length;
    html += `<div class="panel" style="text-align:center;padding:12px">
      <div style="font-size:1.3em;margin-bottom:4px">${sysIcons[sys]||'📦'}</div>
      <div style="font-family:'Orbitron',monospace;font-size:1.4em;font-weight:700;color:var(--cyan)">${items.length}</div>
      <div class="mega-label">${sys}</div>
      <div style="font-size:0.6em;color:var(--green);margin-top:4px">${confirmed} confirmed pricing</div>
    </div>`;
  }
  html += '</div>';

  // Offer cards grouped by system
  for (const [sys,items] of Object.entries(groups)) {
    html += `<div style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:1.1em">${sysIcons[sys]||'📦'}</span>
        <span style="font-family:'Orbitron',monospace;font-size:0.7em;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)">${sysLabels[sys]||sys}</span>
        <span class="badge badge-blue">${items.length}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px">`;

    for (const o of items) {
      const copy = PACKAGE_COPY[o.slug] || { tagline: o.badge||'', icon: sysIcons[sys]||'📦', color: 'cyan' };
      html += `<div class="panel" style="padding:14px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:1.1em">${copy.icon}</span>
            <div>
              <div style="font-weight:700;font-size:0.88em;color:var(--${copy.color})">${esc(o.name)}</div>
              <div style="font-size:0.62em;color:var(--text-dim);font-family:monospace">${esc(o.slug)}</div>
            </div>
          </div>
          <div style="display:flex;gap:4px">
            ${o.badge ? `<span class="badge badge-blue">${esc(o.badge)}</span>` : ''}
            ${o.is_default ? '<span class="badge badge-green">Default</span>' : ''}
          </div>
        </div>

        <div style="font-size:0.75em;color:var(--text-dim);line-height:1.5;margin-bottom:10px;max-height:40px;overflow:hidden">${esc(o.description||copy.tagline||'')}</div>

        <div style="display:flex;gap:8px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--glass-border)">
          ${o.warranty_years ? `<div style="display:flex;align-items:center;gap:3px;font-size:0.7em"><svg viewBox="0 0 24 24" style="width:10px;height:10px;stroke:var(--green);fill:none;stroke-width:2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span style="color:var(--green)">${o.warranty_years}yr</span></div>` : ''}
          <div style="font-size:0.65em;color:var(--text-dim)">${o.pricing_method||'multiplier'}</div>
          ${o.has_estimated_pricing ? '<span class="badge badge-yellow" style="font-size:0.5em">EST</span>' : '<span class="badge badge-green" style="font-size:0.5em">Verified</span>'}
          <div style="font-size:0.6em;color:var(--text-dim);margin-left:auto">#${o.sort_order}</div>
        </div>
      </div>`;
    }
    html += '</div></div>';
  }
  m.innerHTML = html;
}

let custSearch = '';
async function renderCustomers(m) {
  m.innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>';
  const data = await api('/customers');
  const custs = data.customers || [];
  const withEmail = custs.filter(c => c.email).length;
  const withPhone = custs.filter(c => c.phone).length;
  const completeness = custs.length > 0 ? Math.round(((withEmail + withPhone) / (custs.length * 2)) * 100) : 0;

  const filtered = custSearch
    ? custs.filter(c => (c.full_name||c.name||'').toLowerCase().includes(custSearch.toLowerCase()) || (c.email||'').toLowerCase().includes(custSearch.toLowerCase()) || (c.phone||'').includes(custSearch) || (c.address||'').toLowerCase().includes(custSearch.toLowerCase()))
    : custs;

  let html = `<div class="page-header"><div><h1>Customers</h1><div class="sub">${custs.length} contacts</div></div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-sm btn-outline" onclick="guide.start('customers')" style="color:var(--cyan);border-color:rgba(34,211,238,0.2)">
        <svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></button>
      <button class="btn btn-primary btn-sm" onclick="showNewCustomer()">+ New Customer</button>

  // Stat row with completeness
  html += `<div class="stat-row" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px">
    <div class="panel" style="padding:12px 14px;display:flex;align-items:center;gap:10px">
      <div class="orb purple" style="width:40px;height:40px"></div>
      <div><div style="font-family:'Orbitron',monospace;font-size:1.5em;font-weight:700;color:var(--purple)">${custs.length}</div><div class="mega-label">Total</div></div></div>
    <div class="panel" style="padding:12px 14px">
      <div style="font-family:'Orbitron',monospace;font-size:1.4em;font-weight:700;color:var(--cyan)">${withEmail}</div><div class="mega-label">With Email</div></div>

      <div style="font-family:'Orbitron',monospace;font-size:1.4em;font-weight:700;color:var(--green)">${withPhone}</div><div class="mega-label">With Phone</div></div>

      ${progressBar(completeness, completeness >= 70 ? 'green' : completeness >= 40 ? 'cyan' : 'yellow', 'Contact Data', completeness + '%')}
    </div>
  </div>`;

  // Search bar
  html += `<div class="panel" style="margin-bottom:10px;padding:8px 14px;display:flex;align-items:center;gap:10px">
    <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:var(--text-dim);fill:none;stroke-width:2;flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Search by name, email, phone, or address..." value="${esc(custSearch)}" onkeyup="custSearch=this.value;clearTimeout(window._custDebounce);window._custDebounce=setTimeout(()=>renderCustomers(document.getElementById('main')),300)" style="border:none;background:transparent;color:var(--text);font-size:0.88em;width:100%;outline:none">
    ${custSearch ? `<button class="btn btn-sm btn-outline" onclick="custSearch='';renderCustomers(document.getElementById('main'))" style="flex-shrink:0">Clear</button>` : ''}
  </div>`;

  // Customer cards
  if (filtered.length === 0) {
    html += `<div class="panel" style="text-align:center;padding:40px">
      <div style="font-size:0.9em;color:var(--text-dim)">${custSearch ? 'No customers match your search.' : 'No customers yet.'}</div>
      <button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="showNewCustomer()">Add First Customer</button></div>`;

    for (const c of filtered) {
      const name = c.full_name || c.name || 'Unknown';
      const custEsts = allEsts.filter(e => e.customer_id === c.id);
      const custTotal = custEsts.reduce((s,e) => s + (e.total_with_tax || e.total_price || 0), 0);

      html += `<details class="panel" style="cursor:default;padding:0">
        <summary style="padding:12px 14px;cursor:pointer;list-style:none;display:block">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:36px;height:36px;border-radius:50%;background:rgba(167,139,250,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;color:var(--purple);font-size:0.82em">${name.charAt(0).toUpperCase()}</div>
            <div style="flex:1;min-width:0">

              <div style="display:flex;gap:8px;font-size:0.72em;color:var(--text-dim)">
                ${c.address ? `<span>${esc(c.address)}${c.city ? ', ' + esc(c.city) : ''}</span>` : ''}
              </div>
            </div>
            ${custEsts.length > 0 ? `<div style="text-align:right"><div style="font-family:'Orbitron',monospace;font-size:0.85em;font-weight:700;color:var(--cyan)">${fmt$(custTotal)}</div><div style="font-size:0.6em;color:var(--text-dim)">${custEsts.length} est.</div></div>` : ''}
          </div>
        </summary>
        <div style="padding:0 14px 14px;border-top:1px solid var(--glass-border)">
          <!-- Contact info -->
          <div style="display:flex;gap:12px;font-size:0.78em;padding:8px 0">
            ${c.email ? `<div style="display:flex;align-items:center;gap:4px;color:var(--cyan)"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${esc(c.email)}</div>` : '<span class="text-dim">No email</span>'}
            ${c.phone ? `<div style="display:flex;align-items:center;gap:4px;color:var(--green)"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72"/></svg>${esc(c.phone)}</div>` : '<span class="text-dim">No phone</span>'}
          </div>
          ${c.notes ? `<div style="font-size:0.7em;color:var(--text-dim);padding:4px 0">${esc(c.notes)}</div>` : ''}

          <!-- Estimate history -->
          ${custEsts.length > 0 ? `
            <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--glass-border)">
              <div style="font-size:0.65em;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:6px">Estimates</div>
              ${custEsts.map(e => {
                const sc = e.status==='accepted'?'green':e.status==='sent'?'blue':e.status==='declined'?'red':'dim';
                return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:0.78em">
                  <div><span class="badge badge-${sc}" style="font-size:0.7em">${e.status||'draft'}</span> <span class="text-dim">${esc(e.package||'')}</span></div>
                  <span style="font-family:'Orbitron',monospace;color:var(--cyan)">${e.total_with_tax?fmt$(e.total_with_tax):e.total_price?fmt$(e.total_price):'—'}</span>
                </div>`;
              }).join('')}
            </div>
          ` : ''}

          <!-- Actions -->
          <div style="display:flex;gap:4px;margin-top:8px;padding-top:8px;border-top:1px solid var(--glass-border)">
            <button class="btn btn-sm btn-primary" onclick="quoteState.answers={customerName:'${esc(name)}',address:'${esc(c.address||'')}',customerEmail:'${esc(c.email||'')}',customerPhone:'${esc(c.phone||'')}'};navigate('quote')">New Quote</button>
          </div>
        </div>
      </details>`;
    }
    html += '</div>';
  }
  m.innerHTML = html;
}

let estFilter = 'all';
async function renderEstimates(m) {
  m.innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>';
  const data = await api('/estimates');
  const ests = data.estimates || [];
  const totalVal = ests.reduce((s,e) => s + (e.total_price||0), 0);
  const draft = ests.filter(e => e.status==='draft');
  const sent = ests.filter(e => e.status==='sent');
  const accepted = ests.filter(e => e.status==='accepted');
  const declined = ests.filter(e => e.status==='declined');
  const acceptedVal = accepted.reduce((s,e) => s + (e.total_price||0), 0);

  const filtered = estFilter === 'all' ? ests : ests.filter(e => e.status === estFilter);

  let html = `<div class="page-header"><div><h1>Estimates</h1><div class="sub">${ests.length} total &mdash; ${fmt$(totalVal)} pipeline</div></div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-sm btn-outline" onclick="guide.start('estimates')" style="color:var(--cyan);border-color:rgba(34,211,238,0.2)">
        <svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></button>
      <button class="btn btn-primary btn-sm" onclick="navigate('quote')">+ New Quote</button>
    </div></div>`;

  // Pipeline stat cards
  html += `<div class="stat-row" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px">
    <div class="panel" style="padding:12px 14px;cursor:pointer;${estFilter==='all'?'border-color:var(--cyan)':''}" onclick="estFilter='all';renderEstimates(document.getElementById('main'))">
      <div class="mega-num cyan sm" style="font-size:1.6em">${fmt$(totalVal)}</div><div class="mega-label">Pipeline</div></div>
    <div class="panel" style="padding:12px 14px;cursor:pointer;${estFilter==='draft'?'border-color:var(--text-dim)':''}" onclick="estFilter='draft';renderEstimates(document.getElementById('main'))">
      <div style="font-family:'Orbitron',monospace;font-size:1.4em;font-weight:700;color:var(--text-dim)">${draft.length}</div><div class="mega-label">Draft</div></div>
    <div class="panel" style="padding:12px 14px;cursor:pointer;${estFilter==='sent'?'border-color:var(--blue)':''}" onclick="estFilter='sent';renderEstimates(document.getElementById('main'))">
      <div style="font-family:'Orbitron',monospace;font-size:1.4em;font-weight:700;color:var(--blue)">${sent.length}</div><div class="mega-label">Sent</div></div>
    <div class="panel" style="padding:12px 14px;cursor:pointer;${estFilter==='accepted'?'border-color:var(--green)':''}" onclick="estFilter='accepted';renderEstimates(document.getElementById('main'))">
      <div style="font-family:'Orbitron',monospace;font-size:1.4em;font-weight:700;color:var(--green)">${accepted.length}</div><div class="mega-label">Accepted</div>
      ${acceptedVal>0?`<div style="font-size:0.65em;color:var(--green);margin-top:2px">${fmt$(acceptedVal)}</div>`:''}</div>
    <div class="panel" style="padding:12px 14px;cursor:pointer;${estFilter==='declined'?'border-color:var(--red)':''}" onclick="estFilter='declined';renderEstimates(document.getElementById('main'))">
      <div style="font-family:'Orbitron',monospace;font-size:1.4em;font-weight:700;color:var(--red)">${declined.length}</div><div class="mega-label">Declined</div></div>
  </div>`;

  // Conversion progress
  const closeRate = ests.length > 0 ? Math.round((accepted.length / ests.length) * 100) : 0;
  html += `<div class="panel" style="margin-bottom:10px;padding:10px 14px">${progressBar(closeRate, closeRate >= 15 ? 'green' : closeRate >= 8 ? 'cyan' : 'yellow', 'Close Rate', closeRate + '% (' + accepted.length + '/' + ests.length + ')')}</div>`;

  // Estimate cards
  if (filtered.length === 0) {
    html += `<div class="panel" style="text-align:center;padding:40px"><div style="font-size:0.9em;color:var(--text-dim)">No ${estFilter === 'all' ? '' : estFilter + ' '}estimates yet.</div>
      <button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="navigate('quote')">Create First Quote</button></div>`;
  } else {
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:8px">';
    for (const e of filtered) {
      const sc = e.status==='accepted'?'green':e.status==='sent'?'blue':e.status==='declined'?'red':'dim';
      const pkg = e.package || e.system || '';
      const created = e.created_at ? new Date(e.created_at).toLocaleDateString() : '';
      const custName = e.customer?.full_name || 'Unknown Customer';
      const hasMeasurements = e.measurements && Object.keys(e.measurements).length > 0;
      const eid = e.id;

      html += `<details class="panel" style="cursor:default;padding:0">
        <summary style="padding:12px 14px;cursor:pointer;list-style:none;display:block">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
            <div>
              <div style="font-weight:700;font-size:0.92em">${esc(custName)}</div>
              <div style="font-size:0.75em;color:var(--text-dim)">${esc(e.address||'No address')}</div>
            </div>
            <span class="badge badge-${sc}">${e.status||'draft'}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              ${pkg ? `<span style="font-size:0.68em;color:var(--text-dim);text-transform:capitalize">${esc(pkg)}</span>` : ''}
              <div style="font-family:'Orbitron',monospace;font-size:1.15em;font-weight:700;color:var(--cyan)">${e.total_with_tax ? fmt$(e.total_with_tax) : e.total_price ? fmt$(e.total_price) : '—'}</div>
            </div>
            <div style="font-size:0.68em;color:var(--text-dim)">${created}</div>
          </div>
        </summary>
        <div style="padding:0 14px 14px;border-top:1px solid var(--glass-border)">
          <!-- Measurements summary -->
          ${hasMeasurements ? `<div style="display:flex;gap:12px;flex-wrap:wrap;padding:10px 0;font-size:0.75em">
            ${e.measurements.input_sqft ? `<div><span class="text-dim">Area:</span> ${e.measurements.input_sqft} sqft</div>` : ''}
            ${e.measurements.pitch ? `<div><span class="text-dim">Pitch:</span> ${e.measurements.pitch}</div>` : ''}
            ${e.measurements.measuredSQ ? `<div><span class="text-dim">SQ:</span> ${e.measurements.measuredSQ}</div>` : ''}
            ${e.measurements.workdays ? `<div><span class="text-dim">Days:</span> ${e.measurements.workdays}</div>` : ''}
            ${e.measurements.distanceKM ? `<div><span class="text-dim">Dist:</span> ${e.measurements.distanceKM}km</div>` : ''}
          </div>` : ''}

          <!-- Price breakdown -->
          ${e.total_price ? `<div style="display:flex;justify-content:space-between;font-size:0.78em;padding:4px 0">
            <span class="text-dim">Selling</span><span>${fmt$(e.total_price)}</span></div>` : ''}
          ${e.total_with_tax && e.total_price ? `<div style="display:flex;justify-content:space-between;font-size:0.78em;padding:4px 0">
            <span class="text-dim">Tax incl.</span><span style="font-weight:600;color:var(--cyan)">${fmt$(e.total_with_tax)}</span></div>` : ''}

          ${e.notes ? `<div style="font-size:0.72em;color:var(--text-dim);padding:6px 0;border-top:1px solid var(--glass-border);margin-top:6px">${esc(e.notes)}</div>` : ''}

          <!-- Status actions -->
          <div style="display:flex;gap:4px;margin-top:10px;padding-top:8px;border-top:1px solid var(--glass-border)">
            ${e.status==='draft' ? `<button class="btn btn-sm btn-primary" onclick="updateEstStatus('${eid}','sent')">Mark Sent</button>` : ''}
            ${e.status==='sent' ? `<button class="btn btn-sm btn-success" onclick="updateEstStatus('${eid}','accepted')">Accepted</button><button class="btn btn-sm btn-danger" onclick="updateEstStatus('${eid}','declined')">Declined</button>` : ''}
            ${e.status==='accepted' ? `<span style="font-size:0.72em;color:var(--green);font-weight:600;padding:4px 0">CLOSED</span>` : ''}
            ${e.status==='declined' ? `<button class="btn btn-sm btn-outline" onclick="updateEstStatus('${eid}','draft')">Reopen</button>` : ''}
          </div>

          <!-- Output & re-quote actions -->
          <div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">
            <button class="btn btn-sm btn-outline" onclick="reQuoteEstimate('${eid}','${esc(custName)}','${esc(e.address||'')}','${esc(pkg)}')">Re-Quote</button>
            <button class="btn btn-sm btn-outline" onclick="generateEstOutputs('${eid}','proposal')">Proposal</button>
            <button class="btn btn-sm btn-outline" onclick="generateEstOutputs('${eid}','sales_page')">Sales Page</button>
            <button class="btn btn-sm btn-outline" onclick="generateEstOutputs('${eid}','contract')">Contract</button>
          </div>
        </div>
      </details>`;
    }
    html += '</div>';
  }
  m.innerHTML = html;
}

async function updateEstStatus(id, status) {
  const r = await api('/estimates', {method:'PUT', body:JSON.stringify({id, status})});
  if (r.error) { toast('Error: ' + r.error, 'error'); return; }

function reQuoteEstimate(id, name, address, pkg) {
  // Pre-fill quote builder with saved data
  quoteState.mode = 'guided';
  quoteState.answers = { customerName: name, address: address, _offer_slug: pkg };
  // Try to get the estimate to load measurements
  api('/estimates?id=' + id).then(data => {
    const est = data.estimate || data;
    if (est.measurements) {
      Object.assign(quoteState.answers, {
        squareFeet: est.measurements.input_sqft,
        pitch: est.measurements.pitch,
        distanceKM: est.measurements.distanceKM,
        complexity: est.measurements.complexity
      });
    }
    if (est.system) quoteState.system = est.system === 'asphalt' ? 'residential' : est.system;
    navigate('quote');
  });
}

async function generateEstOutputs(id, type) {
  // Fetch estimate, build a minimal quote result, generate output
  const data = await api('/estimates?id=' + id);
  const est = data.estimate || data;
  if (!est || !est.package) { toast('Estimate data incomplete', 'error'); return; }

  // Re-calculate via the API
  const calcPayload = {
    system: est.system || 'residential',
    offer_slug: est.package,
    answers: {
      address: est.address || '',
      ...(est.measurements || {}),
      squareFeet: est.measurements?.input_sqft || 0,
      distanceKM: est.measurements?.distanceKM || 10
    }
  };
  const quoteResult = await api('/quote?mode=guided&materials=1', {method:'POST', body:JSON.stringify(calcPayload)});
  if (quoteResult.error) { toast('Quote error: ' + quoteResult.error, 'error'); return; }

  // Generate output
  const sysMap = {residential:'asphalt',metal:'metal',flat:'asphalt',exterior:'exterior',combined:'combined'};
  const sysOffers = offersCache ? (offersCache.offers||[]).filter(o => o.system === (sysMap[est.system]||'asphalt')).map(o => o.id) : [];

  const payload = {
    quote_result: quoteResult,
    customer_name: est.customer?.full_name || '',
    property_address: est.address || '',
    prepared_by: 'Mackenzie Mazerolle',
    compare_offer_ids: sysOffers,
    measurements: quoteResult.measurements
  };

  const od = await api('/outputs?type=' + type, {method:'POST', body:JSON.stringify(payload)});
  if (od.error) { toast('Output error: ' + od.error, 'error'); return; }

  const resp = await fetch(API + '/render?type=' + type + '&tenant=' + TENANT, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(od)});
  if (!resp.ok) { toast('Render failed', 'error'); return; }
  const html = await resp.text();
  const w = window.open('', '_blank');
  if (w) { w.document.write(html); w.document.close(); }
}

const cutscene = {
  done: false,

  shouldPlay() {
    return !localStorage.getItem('ryujin_cutscene_seen');
  },

  init() {
    const el = document.getElementById('cutscene');
    if (!el) return;

    if (!this.shouldPlay()) {
      el.remove();
      renderPage();
      return;
    }

    // Hide main UI during cutscene
    document.querySelector('.layout').style.visibility = 'hidden';
    document.querySelector('.video-bg').style.visibility = 'hidden';
    const bottomBar = document.getElementById('bottomBar');
    if (bottomBar) bottomBar.style.visibility = 'hidden';

    // Play intro video with fade in
    const video = document.getElementById('csVideo');
    setTimeout(() => { video.style.opacity = '1'; }, 300);
    video.play().catch(() => {});

    // When video ends (or after 15s fallback), fade out video, fade in ACTIVATE
    const showActivate = () => {
      if (this.done) return;
      video.style.transition = 'opacity 2s ease';
      video.style.opacity = '0';
      setTimeout(() => {
        document.getElementById('csActivatePhase').style.transition = 'opacity 1.5s ease';
        document.getElementById('csActivatePhase').style.opacity = '1';
        sfx.play('success');
      }, 800);
    };
    video.addEventListener('ended', showActivate, { once: true });
    setTimeout(showActivate, 15000);
  },

  // Activate pressed
  activate() {
    if (this.done) return;
    this.done = true;
    sfx.play('success');
    const btn = document.getElementById('csActivate');
    btn.textContent = 'INITIALIZING...';
    btn.style.pointerEvents = 'none';
    btn.style.boxShadow = '0 0 80px rgba(34,211,238,0.4)';

    setTimeout(() => this.finish(), 800);
  },

  // Finish: remove cutscene, show app
  finish() {
    this.done = true;
    localStorage.setItem('ryujin_cutscene_seen', '1');

    const el = document.getElementById('cutscene');
    el.classList.add('done');

    // Show main UI
    document.querySelector('.layout').style.visibility = '';
    document.querySelector('.video-bg').style.visibility = '';
    const bottomBar = document.getElementById('bottomBar');
    if (bottomBar) bottomBar.style.visibility = '';

    renderPage();

    setTimeout(() => el.remove(), 1000);

    // Launch welcome tutorial after cutscene
    if (typeof guide !== 'undefined' && !guide.hasSeen('welcome') && guide.isAutoEnabled()) {
      setTimeout(() => guide.start('welcome'), 1200);
    }
  },

  // Skip
  skip() {
    this.done = true;
    this.finish();
  },

  // Reset (for replay from menu)
  reset() {
    localStorage.removeItem('ryujin_cutscene_seen');
  }
};

    `;
    document.head.appendChild(style);
  },

  // ── Start a flow ──
  start(flowName) {
    this.injectStyles();
    const flow = this.flows[flowName];
    if (!flow) return;
    this.flow = flow;
    this.step = 0;
    this.active = true;
    sfx.play('navigate');

    // Create overlay container
    if (!this.overlay) {
      this.overlay = document.createElement('div');
      this.overlay.className = 'guide-overlay';
      this.overlay.id = 'guideOverlay';
      document.body.appendChild(this.overlay);
    }

    // Create backdrop
    let backdrop = document.getElementById('guideBackdrop');
    if (!backdrop) {
      backdrop = document.createElement('div');
      backdrop.className = 'guide-backdrop';
      backdrop.id = 'guideBackdrop';
      backdrop.onclick = () => this.next();
      document.body.appendChild(backdrop);
    }
    backdrop.classList.remove('hidden');

    this.showStep();
  },

  // ── Show current step ──
  showStep() {
    if (!this.active || !this.flow) return;
    const s = this.flow[this.step];
    if (!s) { this.end(); return; }

    // If step waits for result, don't render yet — onQuoteResult will advance
    if (s.wait === 'result') {
      // Poll for result element
      this._waitForEl('#quoteResult .quote-result', () => this._renderStep(s), 10000);
      return;
    }

    // Run action if present
    if (s.action) {
      s.action();
      // Wait for page render
      setTimeout(() => this._renderStep(s), 500);
    } else {
      this._renderStep(s);
    }
  },

  // ── Wait for element to appear ──
  _waitForEl(sel, cb, timeout) {
    const start = Date.now();
    const check = () => {
      if (!this.active) return;
      const el = document.querySelector(sel);
      if (el) { cb(); return; }
      if (Date.now() - start > timeout) { cb(); return; }
      setTimeout(check, 300);
    };
    check();
  },

  _renderStep(s) {
    const overlay = this.overlay;

    // ── Spotlight (updates per step) ──
    let spot = overlay.querySelector('.guide-spotlight');
    if (s.target && s.highlight) {
      const el = document.querySelector(s.target);
      if (el) {
        const r = el.getBoundingClientRect();
        const pad = 8;
        if (!spot) { spot = document.createElement('div'); spot.className = 'guide-spotlight'; overlay.appendChild(spot); }
        spot.style.cssText = `top:${r.top - pad}px;left:${r.left - pad}px;width:${r.width + pad*2}px;height:${r.height + pad*2}px`;
      }
    } else if (spot) {
      spot.remove();
    }

    // ── Bubble (create once, reuse) ──
    if (!this.bubble || !this.bubble.parentNode) {
      const bubble = document.createElement('div');
      bubble.className = 'guide-bubble entering';
      bubble.innerHTML = `
        <div class="guide-mascot">
          <div class="guide-mascot-avatar"><video autoplay muted loop playsinline><source src="/assets/Talking head.mp4" type="video/mp4"></video></div>
          <div class="guide-mascot-info">
            <span class="guide-mascot-name">RYUJIN</span>
            <span class="guide-mascot-role" id="guideStep"></span>
          </div>
        </div>
        <div class="guide-text" id="guideText"></div>
        <div class="guide-footer">
          <div class="guide-dots" id="guideDots"></div>
          <div class="guide-btns">
            <button class="guide-btn guide-btn-skip" onclick="guide.end()">Skip</button>
            <button class="guide-btn guide-btn-next" id="guideNextBtn" onclick="guide.next()">Next →</button>
          </div>
        </div>`;
      overlay.appendChild(bubble);
      this.bubble = bubble;
      // Remove entering class after animation
      setTimeout(() => bubble.classList.remove('entering'), 600);
    }

    // ── Update content inside fixed box ──
    const stepEl = document.getElementById('guideStep');
    if (stepEl) stepEl.textContent = `${this.step + 1}/${this.flow.length}`;

    const dotsEl = document.getElementById('guideDots');
    if (dotsEl) dotsEl.innerHTML = this.flow.map((_,i) =>
      `<div class="guide-dot ${i < this.step ? 'done' : i === this.step ? 'active' : ''}"></div>`
    ).join('');

    const nextBtn = document.getElementById('guideNextBtn');
    if (nextBtn) nextBtn.textContent = this.step === this.flow.length - 1 ? 'Done' : 'Next →';

    // Typewriter — clear and retype
    const textEl = document.getElementById('guideText');
    if (textEl) {
      textEl.innerHTML = '';
      this._typewrite(s.msg, textEl);
    }
  },

  // ── Typewriter ──
  _typewrite(text, el, i = 0) {
    if (!this.active) return;
    if (i <= text.length) {
      el.innerHTML = text.substring(0, i) + (i < text.length ? '<span class="typing-cursor"></span>' : '');
      this._typeTimer = setTimeout(() => this._typewrite(text, el, i + 1), 22);
    }
  },

  // ── Next step ──
  next() {
    if (!this.active) return;
    clearTimeout(this._typeTimer);
    this.step++;
    if (this.step >= this.flow.length) {
      this.end();
      return;
    }
    sfx.play('click');
    this.showStep();
  },

  // ── Seen tracking ──
  _seenKey(name) { return 'ryujin_guide_' + name; },
  hasSeen(name) { return localStorage.getItem(this._seenKey(name)) === '1'; },
  markSeen(name) { localStorage.setItem(this._seenKey(name), '1'); },
  clearSeen(name) { localStorage.removeItem(this._seenKey(name)); },
  clearAll() { for (const k of Object.keys(this.flows)) this.clearSeen(k); this.setAutoEnabled(true); },
  isAutoEnabled() { return localStorage.getItem('ryujin_guide_auto') !== '0'; },
  setAutoEnabled(v) { localStorage.setItem('ryujin_guide_auto', v ? '1' : '0'); },

  // ── End tutorial ──
  end() {
    const flowName = this._currentFlowName;
    this.active = false;
    this.flow = null;
    this._currentFlowName = null;
    this.bubble = null;
    clearTimeout(this._typeTimer);
    if (this.overlay) { this.overlay.remove(); this.overlay = null; }
    const backdrop = document.getElementById('guideBackdrop');
    if (backdrop) backdrop.classList.add('hidden');
    sfx.play('success');
    if (flowName) this.markSeen(flowName);
  },

  // ── Start (override to track name) ──
  _origStart: null,

  // ── Continue to result tutorial after quote calculation ──
  onQuoteResult() {
    if (this.active && this._currentFlowName === 'quote') {
      this.end();
      setTimeout(() => this.start('result'), 600);
    }
    // testdrive: the wait:result step will be handled by _waitForEl
  },

  // ── Auto-launch for current page (if not seen & auto enabled) ──
  autoLaunchForPage(page) {
    if (!this.isAutoEnabled()) return;
    if (this.active) return;
    const flowName = page === 'quote' ? 'quote' : page;
    if (this.flows[flowName] && !this.hasSeen(flowName)) {
      setTimeout(() => this.start(flowName), 600);
    }
  },

  // ── Tutorial menu ──
  menuOpen: false,
  toggleMenu() {
    this.menuOpen = !this.menuOpen;
    const menu = document.getElementById('guideMenu');
    if (menu) {
      menu.classList.toggle('open', this.menuOpen);
      if (this.menuOpen) this._renderMenu();
    }
  },
  closeMenu() {
    this.menuOpen = false;
    const menu = document.getElementById('guideMenu');
    if (menu) menu.classList.remove('open');
  },
  _renderMenu() {
    const list = document.getElementById('guideMenuList');
    if (!list) return;
    list.innerHTML = '';
    for (const [name, meta] of Object.entries(this.flowMeta)) {
      const seen = this.hasSeen(name);
      const item = document.createElement('div');
      item.className = 'guide-menu-item';
      item.innerHTML = `
        <div class="gmi-icon">${meta.icon}</div>
        <div class="gmi-info">
          <div class="gmi-label">${meta.label}</div>
          <div class="gmi-desc">${meta.desc}</div>
        </div>
        ${seen ? '<div class="gmi-seen">DONE</div>' : ''}`;
      item.onclick = () => { this.closeMenu(); this.start(name); };
      list.appendChild(item);
    }
    // Update auto toggle
    const autoChk = document.getElementById('guideAutoToggle');
    if (autoChk) autoChk.checked = this.isAutoEnabled();
  },

  // ── Inject help button + menu ──
  injectHelpButton() {
    this.injectStyles();
    if (document.getElementById('guideHelpBtn')) return;

    // Help button
    const btn = document.createElement('button');
    btn.className = 'guide-help-btn';
    btn.id = 'guideHelpBtn';
    btn.textContent = '?';
    btn.title = 'Tutorials';
    btn.onclick = () => this.toggleMenu();
    document.body.appendChild(btn);

    // Menu panel
    const menu = document.createElement('div');
    menu.className = 'guide-menu';
    menu.id = 'guideMenu';
    menu.innerHTML = `
      <div class="guide-menu-head">
        <div class="guide-menu-title">Tutorials</div>
        <button class="guide-menu-close" onclick="guide.closeMenu()">&times;</button>
      </div>
      <div id="guideMenuList"></div>
      <div style="padding:4px 14px 8px;border-top:1px solid rgba(34,211,238,0.06)">
        <div class="guide-menu-item" onclick="guide.closeMenu();cutscene.reset();location.reload()" style="border:none;margin:0 -14px;border-radius:8px">
          <div class="gmi-icon">🎬</div>
          <div class="gmi-info"><div class="gmi-label">Replay Opening</div><div class="gmi-desc">Watch the boot cinematic again</div></div>
        </div>
      </div>
      <div class="guide-menu-footer">
        <label class="guide-menu-toggle">
          <input type="checkbox" id="guideAutoToggle" onchange="guide.setAutoEnabled(this.checked)">
          Auto-show on new pages
        </label>
        <button class="guide-menu-reset" onclick="guide.clearAll();cutscene.reset();guide._renderMenu()">Reset all</button>
      </div>`;
    document.body.appendChild(menu);
  }
};

// Patch start to track flow name
const _origGuideStart = guide.start.bind(guide);
guide.start = function(flowName) {
  this._currentFlowName = flowName;
  this.closeMenu();
  _origGuideStart(flowName);
};

// Inject help button + menu
guide.injectHelpButton();

// Auto-launch welcome is handled by cutscene.finish() — no duplicate here
// If cutscene was already seen (skipped init), launch welcome if needed
if (!cutscene.shouldPlay() && !guide.hasSeen('welcome') && guide.isAutoEnabled()) {
  setTimeout(() => guide.start('welcome'), 800);
}

          <div>
            <div class="ryu-name">RYUJIN</div>
            <div class="ryu-status">Online</div>
          </div>
          <button class="ryu-close" onclick="ryujinChat.toggle()">&times;</button>
        </div>
        <div class="ryu-messages" id="ryuMessages">
          <div class="ryu-msg ai">Ryujin OS reporting. All systems operational. Head to the Quote Builder to start pricing your next job, or check the Dashboard for your pipeline overview.</div>
        </div>
        <div class="ryu-input">
          <input type="text" id="ryuInput" placeholder="Ask Ryujin anything..." onkeydown="if(event.key==='Enter')ryujinChat.send()">
          <button onclick="ryujinChat.send()">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    `);

    // Play greeting audio if available
    this.playVoice('greeting');
  },

  toggle() {
    this.open = !this.open;
    document.getElementById('ryuOrb').classList.toggle('hidden', this.open);
    document.getElementById('ryuPanel').classList.toggle('closed', !this.open);
    if (this.open) {
      setTimeout(() => document.getElementById('ryuInput').focus(), 400);
    }
  },

  async send() {
    const input = document.getElementById('ryuInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';

    // Add user message
    this.addMessage(msg, 'user');
    this.history.push({ role: 'user', content: msg });

    // Show typing
    const msgs = document.getElementById('ryuMessages');
    const typing = document.createElement('div');
    typing.className = 'ryu-typing';
    typing.innerHTML = '<span>.</span><span>.</span><span>.</span>';
    msgs.appendChild(typing);
    msgs.scrollTop = msgs.scrollHeight;

    // Call assistant API
    try {
      const result = await api('/assistant', {
        method: 'POST',
        body: JSON.stringify({
          message: msg,
          context: {
            page: currentPage,
            quoteResult: quoteState.result ? {
              offer: quoteState.result.offer,
              summary: quoteState.result.summary
            } : null
          },
          history: this.history.slice(-10)
        })
      });

      typing.remove();

      const response = result.response || result.error || "Signal lost. Try again.";
      this.addMessage(response, 'ai');
      this.history.push({ role: 'assistant', content: response });

      // Handle actions
      if (result.action) {
        if (result.action.type === 'navigate') {
          setTimeout(() => navigate(result.action.target), 800);
        }
      }

      // Voice
      if (msg.toLowerCase().includes('quote')) this.playVoice('guide-quote');
      else if (result.action) this.playVoice('confirm');

    } catch (e) {
      typing.remove();
      this.addMessage("Connection interrupted. Standing by.", 'ai');
    }
  },

  addMessage(text, type) {
    const msgs = document.getElementById('ryuMessages');
    const div = document.createElement('div');
    div.className = `ryu-msg ${type}`;
    div.textContent = text;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  },

  playVoice(clip) {
    // Will play pre-scripted voice clips when available
    // Files expected at /assets/voice/{clip}.mp3
    try {
      const audio = new Audio(`/assets/voice/${clip}.mp3`);
      audio.volume = 0.6;
      audio.play().catch(() => {}); // Silently fail if not found
    } catch(e) {}
  }
};

// Init the chat widget
ryujinChat.init();
</script>
</body>
</html>
