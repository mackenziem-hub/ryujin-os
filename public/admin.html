<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060a14">
<title>Ryujin OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a14;--glass:rgba(20,30,50,0.85);--glass2:rgba(22,34,58,0.80);
  --glass-border:rgba(34,211,238,0.16);--glass-border-hi:rgba(34,211,238,0.35);
  --text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);
  --cyan:#22d3ee;--blue:#4a9eff;--purple:#7c3aed;
  --green:#4ade80;--yellow:#facc15;--red:#f87171;--orange:#fb923c;
  --glow:rgba(34,211,238,0.12);--glow-hi:rgba(34,211,238,0.30);
  --sidebar-w:72px;--radius:12px;--bottom-h:62px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ─── Video BG ─── */
.video-bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.video-bg video{width:100%;height:100%;object-fit:cover;opacity:0.18;filter:saturate(1.4) hue-rotate(-5deg)}
.video-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,10,20,0.3) 0%,rgba(6,10,20,0.6) 100%)}

/* ─── Scanlines — lightweight ─── */
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 4px,rgba(0,0,0,0.01) 4px,rgba(0,0,0,0.01) 5px);opacity:0.3;will-change:auto}

/* ─── Layout ─── */
.layout{display:flex;min-height:100vh;position:relative;z-index:1}

/* ─── Sidebar — icon-only glass rail ─── */
.sidebar{
  width:var(--sidebar-w);background:rgba(10,16,30,0.92);
  backdrop-filter:blur(40px) saturate(1.8);
  border-right:1px solid var(--glass-border);
  display:flex;flex-direction:column;align-items:center;
  position:fixed;top:0;bottom:0;z-index:50;
  box-shadow:4px 0 40px rgba(0,0,0,0.6)}

.sidebar-logo{
  width:44px;height:44px;margin:18px 0 12px;border-radius:12px;
  background:url('/assets/logo/logo-glow.jpg') center/cover;
  box-shadow:0 0 20px rgba(34,211,238,0.3);cursor:pointer;
  transition:box-shadow 0.3s;overflow:hidden}
.sidebar-logo:hover{box-shadow:0 0 35px rgba(34,211,238,0.5)}

.sidebar-divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;margin:4px 0 8px}

.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:12px;border:1px solid transparent;cursor:pointer;
  color:var(--text-dim);transition:all 0.25s;position:relative}
.nav-icon:hover{background:rgba(34,211,238,0.06);color:var(--text);border-color:rgba(34,211,238,0.08)}
.nav-icon.active{
  background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(124,58,237,0.06));
  color:var(--cyan);border-color:rgba(34,211,238,0.2);
  box-shadow:0 0 20px rgba(34,211,238,0.08)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:3px;background:var(--cyan);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--cyan)}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-icon .tooltip{
  position:absolute;left:calc(100% + 12px);top:50%;transform:translateY(-50%);
  background:rgba(6,10,20,0.95);border:1px solid var(--glass-border);
  padding:6px 12px;border-radius:8px;font-size:0.75em;font-weight:600;
  white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.2s;
  letter-spacing:0.5px;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.nav-icon:hover .tooltip{opacity:1}

/* ─── Main ─── */
.main{flex:1;margin-left:var(--sidebar-w);padding:10px 14px 76px;max-width:1600px}

/* ─── Page Header ─── */
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:2px 0}
.page-header h1{font-family:'Orbitron',monospace;font-size:1.1em;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,#e0e6f0 30%,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.page-header .sub{font-size:0.72em;color:var(--text-dim);margin-top:2px}

/* ─── Glass Panel ─── */
.panel{
  background:rgba(14,22,40,0.88);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:12px 14px;
  backdrop-filter:blur(40px) saturate(1.8);
  box-shadow:0 4px 30px rgba(0,0,0,0.4),inset 0 1px 0 rgba(34,211,238,0.04);
  position:relative;overflow:hidden;
  transition:border-color 0.3s,box-shadow 0.3s}
.panel:hover{border-color:var(--glass-border-hi);box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 30px rgba(34,211,238,0.08)}
/* Top-edge glow — prominent gradient line */
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 2%,var(--cyan) 25%,var(--purple) 75%,transparent 98%);opacity:0.7;transition:opacity 0.3s;z-index:2;
  border-radius:var(--radius) var(--radius) 0 0}
.panel:hover::before{opacity:1}
/* Corner brackets */
.panel::after{content:'';position:absolute;bottom:-1px;right:-1px;width:20px;height:20px;
  border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);border-radius:0 0 var(--radius) 0;opacity:0.25;transition:opacity 0.3s;filter:drop-shadow(0 0 3px rgba(34,211,238,0.2))}
.panel:hover::after{opacity:0.5}
/* Header bar glow line */
.panel-header{position:relative;padding-bottom:10px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.panel-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--cyan),var(--purple) 60%,transparent 90%);opacity:0.35}
.panel-title{font-family:'Orbitron',monospace;font-size:0.65em;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-dim)}
.panel-sub{font-size:0.75em;color:var(--text-dim);margin-top:2px}

/* ─── Panel internal dividers ─── */
.panel-zone{border-top:1px solid rgba(34,211,238,0.08);padding-top:14px;margin-top:14px}
.panel-row{display:flex;gap:16px;align-items:center}
.panel-col{flex:1}

/* ─── Progress Bar ─── */
.progress{height:8px;background:rgba(34,211,238,0.08);border-radius:4px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:4px;transition:width 1.5s ease;position:relative}
.progress-fill.cyan{background:linear-gradient(90deg,#0891b2,var(--cyan));box-shadow:0 0 18px rgba(34,211,238,0.4),0 0 4px rgba(34,211,238,0.6)}
.progress-fill.green{background:linear-gradient(90deg,#16a34a,var(--green));box-shadow:0 0 18px rgba(74,222,128,0.4),0 0 4px rgba(74,222,128,0.6)}
.progress-fill.purple{background:linear-gradient(90deg,#6d28d9,var(--purple));box-shadow:0 0 18px rgba(124,58,237,0.4),0 0 4px rgba(124,58,237,0.6)}
.progress-fill.orange{background:linear-gradient(90deg,#c2410c,var(--orange));box-shadow:0 0 18px rgba(251,146,60,0.4),0 0 4px rgba(251,146,60,0.6)}
.progress-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:0.78em}
.progress-label .value{font-family:'Orbitron',monospace;font-weight:600;color:var(--cyan)}

/* ─── Toggle Switch ─── */
.toggle{position:relative;width:44px;height:24px;cursor:pointer;display:inline-block}
.toggle input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;border-radius:12px;background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.15);transition:all 0.3s}
.toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#4a5568;transition:all 0.3s;box-shadow:0 0 4px rgba(0,0,0,0.3)}
.toggle input:checked+.toggle-track{background:rgba(34,211,238,0.2);border-color:rgba(34,211,238,0.4);box-shadow:0 0 12px rgba(34,211,238,0.15)}
.toggle input:checked+.toggle-track+.toggle-thumb{left:23px;background:var(--cyan);box-shadow:0 0 10px rgba(34,211,238,0.4)}

/* ─── 3D Glass Orb ─── */
.orb{
  width:56px;height:56px;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 35% 30%,rgba(200,230,255,0.3) 0%,rgba(34,211,238,0.2) 30%,rgba(10,20,40,0.6) 70%,rgba(6,10,20,0.85) 100%);
  box-shadow:0 0 30px rgba(34,211,238,0.2),inset 0 -4px 12px rgba(0,0,0,0.3),inset 0 2px 8px rgba(200,230,255,0.12);
  position:relative;overflow:hidden}
.orb::after{content:'';position:absolute;top:7px;left:12px;width:18px;height:9px;background:rgba(255,255,255,0.2);border-radius:50%;transform:rotate(-20deg);filter:blur(2px)}
.orb.green{background:radial-gradient(circle at 35% 30%,rgba(200,255,220,0.25) 0%,rgba(74,222,128,0.2) 30%,rgba(10,30,20,0.6) 70%,rgba(6,10,20,0.85) 100%);box-shadow:0 0 30px rgba(74,222,128,0.18),0 0 60px rgba(74,222,128,0.06),inset 0 -4px 12px rgba(0,0,0,0.3)}
.orb.purple{background:radial-gradient(circle at 35% 30%,rgba(220,200,255,0.25) 0%,rgba(167,139,250,0.2) 30%,rgba(20,10,40,0.6) 70%,rgba(6,10,20,0.85) 100%);box-shadow:0 0 30px rgba(167,139,250,0.18),0 0 60px rgba(167,139,250,0.06),inset 0 -4px 12px rgba(0,0,0,0.3)}

/* ─── Mega Number (hero stat) ─── */
.mega-num{font-family:'Orbitron',monospace;font-size:3.8em;font-weight:900;letter-spacing:-1px;line-height:1;text-shadow:0 0 40px currentColor,0 0 80px currentColor;filter:drop-shadow(0 0 6px currentColor)}
.mega-num.cyan{color:var(--cyan)}
.mega-num.green{color:var(--green)}
.mega-num.blue{color:var(--blue)}
.mega-num.purple{color:var(--purple)}
.mega-num.orange{color:var(--orange)}
.mega-num.sm{font-size:2.4em}
.mega-label{font-size:0.6em;color:var(--text-dim);text-transform:uppercase;letter-spacing:3px;margin-top:3px}

/* ─── Mini Area Chart (SVG) ─── */
.mini-chart{width:100%;height:80px;margin-top:8px}
.mini-chart svg{width:100%;height:100%}
.chart-area{fill:url(#chartGrad);opacity:0.6}
.chart-line{fill:none;stroke:var(--cyan);stroke-width:2;filter:drop-shadow(0 0 4px rgba(34,211,238,0.4))}

/* ─── Dashboard Grid ─── */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.dash-grid .span-2{grid-column:span 2}
.dash-grid .span-3{grid-column:span 3}
.dash-grid .span-4{grid-column:span 4}
.dash-grid .row-2{grid-row:span 2}

/* ─── Circular Gauge ─── */
.gauge{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 10px}
.gauge-ring{position:relative;width:100px;height:100px}
.gauge-ring svg{width:100px;height:100px;transform:rotate(-90deg)}
.gauge-ring circle{fill:none;stroke-width:6;stroke-linecap:round}
.gauge-ring .track{stroke:rgba(34,211,238,0.06)}
.gauge-ring .fill{stroke:var(--cyan);transition:stroke-dashoffset 1.5s ease;filter:drop-shadow(0 0 12px rgba(34,211,238,0.5))}
.gauge-value{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-number{font-family:'Orbitron',monospace;font-size:1.5em;font-weight:800;color:var(--cyan);text-shadow:0 0 30px rgba(34,211,238,0.5);filter:drop-shadow(0 0 4px rgba(34,211,238,0.3))}
.gauge-unit{font-size:0.58em;color:var(--text-dim);margin-top:-2px}
.gauge-label{font-family:'Orbitron',monospace;font-size:0.55em;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-top:8px;text-align:center}

/* ─── Compact Stat ─── */
.stat{padding:12px 14px}
.stat-value{font-family:'Orbitron',monospace;font-size:1.3em;font-weight:700;letter-spacing:-0.5px}
.stat-label{font-size:0.6em;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px}
.stat-change{font-size:0.72em;margin-top:4px}
.stat-change.up{color:var(--green)}
.stat-change.down{color:var(--red)}

/* ─── Bottom Toolbar ─── */
.bottom-bar{
  position:fixed;bottom:0;left:var(--sidebar-w);right:0;height:var(--bottom-h);z-index:50;
  background:rgba(8,14,28,0.94);backdrop-filter:blur(40px) saturate(1.8);
  border-top:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:center;gap:2px;padding:0 12px;
  box-shadow:0 -4px 40px rgba(0,0,0,0.5)}
.bottom-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),transparent);opacity:0.4}
.bot-btn{
  flex:1;max-width:100px;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 4px;border:none;background:none;color:var(--text-dim);cursor:pointer;
  border-radius:10px;transition:all 0.25s;position:relative}
.bot-btn:hover{color:var(--text);background:rgba(34,211,238,0.04)}
.bot-btn.active{color:var(--cyan)}
.bot-btn.active::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--cyan);border-radius:0 0 2px 2px;box-shadow:0 0 8px var(--cyan)}
.bot-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.bot-btn span{font-size:0.55em;font-weight:600;letter-spacing:1px;text-transform:uppercase}

/* ─── Alert Row ─── */
.alert-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;margin-bottom:4px;font-size:0.78em;
  background:rgba(248,113,113,0.04);border:1px solid rgba(248,113,113,0.08)}
.alert-row.warn{background:rgba(250,204,21,0.04);border-color:rgba(250,204,21,0.08)}
.alert-row.info{background:rgba(34,211,238,0.04);border-color:rgba(34,211,238,0.06)}
.alert-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.alert-dot.red{background:var(--red);box-shadow:0 0 6px var(--red)}
.alert-dot.yellow{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.alert-dot.cyan{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}

/* ─── Mini Stat Block ─── */
.mini-stat{display:flex;align-items:center;gap:10px;padding:6px 0}
.mini-stat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mini-stat-icon.cyan{background:rgba(34,211,238,0.08);color:var(--cyan)}
.mini-stat-icon.green{background:rgba(74,222,128,0.08);color:var(--green)}
.mini-stat-icon.purple{background:rgba(167,139,250,0.08);color:#a78bfa}
.mini-stat-icon.orange{background:rgba(251,146,60,0.08);color:var(--orange)}
.mini-stat-icon.red{background:rgba(248,113,113,0.08);color:var(--red)}
.mini-stat-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.mini-stat-val{font-family:'Orbitron',monospace;font-size:1.1em;font-weight:700}
.mini-stat-lbl{font-size:0.62em;color:var(--text-dim);letter-spacing:0.5px}

/* ─── Ticket List (compact) ─── */
.ticket-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(34,211,238,0.04);cursor:pointer;transition:background 0.15s}
.ticket-row:last-child{border:none}
.ticket-row:hover{background:rgba(34,211,238,0.03);margin:0 -8px;padding-left:8px;padding-right:8px;border-radius:8px}
.ticket-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ticket-dot.open{background:var(--blue);box-shadow:0 0 6px var(--blue)}
.ticket-dot.active{background:var(--green);box-shadow:0 0 6px var(--green)}
.ticket-dot.urgent{background:var(--red);box-shadow:0 0 6px var(--red)}
.ticket-info{flex:1;min-width:0}
.ticket-name{font-size:0.82em;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ticket-meta{font-size:0.7em;color:var(--text-dim)}

/* ─── Buttons ─── */
.btn{padding:9px 20px;border:none;border-radius:9px;font-family:inherit;font-weight:600;font-size:0.82em;cursor:pointer;transition:all 0.25s;display:inline-flex;align-items:center;gap:6px;letter-spacing:0.3px}
.btn-primary{background:linear-gradient(135deg,var(--cyan),#0891b2);color:#000;font-weight:700;box-shadow:0 0 20px rgba(34,211,238,0.2)}
.btn-primary:hover{box-shadow:0 0 30px rgba(34,211,238,0.4);transform:translateY(-1px)}
.btn-success{background:linear-gradient(135deg,var(--green),#22c55e);color:#000;box-shadow:0 0 12px rgba(74,222,128,0.15)}
.btn-outline{background:rgba(34,211,238,0.04);border:1px solid var(--glass-border);color:var(--text);backdrop-filter:blur(10px)}
.btn-outline:hover{background:rgba(34,211,238,0.08);border-color:rgba(34,211,238,0.2)}
.btn-sm{padding:5px 12px;font-size:0.75em}
.btn-danger{background:rgba(248,113,113,0.08);color:var(--red);border:1px solid rgba(248,113,113,0.12)}

/* ─── Forms ─── */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:0.65em;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:6px}
.form-hint{font-size:0.65em;color:var(--text-muted);margin-top:4px}
input[type="text"],input[type="number"],input[type="email"],input[type="tel"],select,textarea{
  width:100%;padding:10px 14px;border:1px solid var(--glass-border);border-radius:9px;
  background:rgba(6,12,24,0.7);color:var(--text);font-family:inherit;font-size:0.88em;
  backdrop-filter:blur(8px);transition:all 0.25s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 12px rgba(34,211,238,0.1)}
select{cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2322d3ee' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}
textarea{resize:vertical;min-height:80px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 18px}
.form-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.form-full{grid-column:1 / -1}

/* ─── Badges ─── */
.badge{display:inline-block;padding:3px 10px;border-radius:16px;font-size:0.65em;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;border:1px solid transparent}
.badge-blue{background:rgba(34,211,238,0.08);color:var(--cyan);border-color:rgba(34,211,238,0.12)}
.badge-green{background:rgba(74,222,128,0.08);color:var(--green);border-color:rgba(74,222,128,0.12)}
.badge-yellow{background:rgba(250,204,21,0.08);color:var(--yellow);border-color:rgba(250,204,21,0.1)}
.badge-red{background:rgba(248,113,113,0.08);color:var(--red);border-color:rgba(248,113,113,0.12)}
.badge-purple{background:rgba(167,139,250,0.08);color:#a78bfa;border-color:rgba(167,139,250,0.12)}
.badge-dim{background:rgba(34,211,238,0.03);color:var(--text-dim);border-color:rgba(34,211,238,0.05)}
.badge-estimated{background:rgba(250,204,21,0.06);color:var(--yellow);border-color:rgba(250,204,21,0.1)}

/* ─── Tables ─── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:0.82em}
th{text-align:left;padding:10px 12px;font-family:'Orbitron',monospace;font-size:0.58em;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim);border-bottom:1px solid var(--glass-border)}
td{padding:9px 12px;border-bottom:1px solid rgba(34,211,238,0.03);vertical-align:middle;transition:background 0.15s}
tr:hover td{background:rgba(34,211,238,0.02)}
.text-right{text-align:right}
.text-dim{color:var(--text-dim)}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-yellow{color:var(--yellow)}
.text-cyan{color:var(--cyan)}

/* ─── Tabs ─── */
.tab-bar{display:flex;gap:2px;padding:3px;background:var(--glass);border:1px solid var(--glass-border);border-radius:11px;margin-bottom:18px;width:fit-content;backdrop-filter:blur(10px)}
.tab{padding:7px 16px;border:none;background:none;color:var(--text-dim);font-family:inherit;font-size:0.78em;font-weight:600;border-radius:9px;cursor:pointer;transition:all 0.25s}
.tab.active{background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(124,58,237,0.06));color:var(--cyan)}
.tab:hover:not(.active){color:var(--text)}

/* ─── Quote Result ─── */
.quote-result{border:1px solid var(--glass-border-hi);border-radius:var(--radius);padding:24px;background:linear-gradient(135deg,rgba(34,211,238,0.05),rgba(124,58,237,0.02));backdrop-filter:blur(20px);position:relative;overflow:hidden}
.quote-result::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),transparent);opacity:0.5}
.quote-total{font-family:'Orbitron',monospace;font-size:2em;font-weight:800;color:var(--cyan);text-shadow:0 0 30px rgba(34,211,238,0.3)}
.quote-detail{font-size:0.8em;color:var(--text-dim);margin-top:4px}
.line-items{margin-top:18px}
.line-item{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(34,211,238,0.04);font-size:0.85em}
.line-item:last-child{border:none}
.line-item:hover{background:rgba(34,211,238,0.02);margin:0 -6px;padding-left:6px;padding-right:6px;border-radius:6px}
.line-item .name{flex:1}
.line-item .qty{width:55px;text-align:center;color:var(--text-dim);font-family:'Orbitron',monospace;font-size:0.82em}
.line-item .cost{width:90px;text-align:right;font-weight:600;font-family:'Orbitron',monospace;font-size:0.85em}
.line-item.estimated .name::after{content:" *";color:var(--yellow)}

/* ─── Global Search Overlay ─── */
.search-overlay{position:fixed;inset:0;z-index:9990;background:rgba(6,10,20,0.7);backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;padding-top:15vh}
.search-overlay.open{display:flex}
.search-box{width:90%;max-width:560px;background:rgba(14,22,40,0.95);border:1px solid var(--glass-border-hi);border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.search-input{width:100%;padding:16px 20px;border:none;background:transparent;color:var(--text);font-family:inherit;font-size:1em;outline:none}
.search-input::placeholder{color:var(--text-muted)}
.search-results{max-height:50vh;overflow-y:auto;border-top:1px solid var(--glass-border)}
.search-item{padding:10px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:0.88em;transition:background 0.15s}
.search-item:hover,.search-item.active{background:rgba(34,211,238,0.06)}
.search-item .type{font-size:0.6em;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);width:60px;flex-shrink:0}
.search-item .name{font-weight:500;flex:1}
.search-item .meta{font-size:0.75em;color:var(--text-dim)}
.search-hint{padding:10px 20px;font-size:0.72em;color:var(--text-muted);border-top:1px solid var(--glass-border);display:flex;gap:16px}
.search-hint kbd{padding:1px 6px;border-radius:4px;background:rgba(34,211,238,0.08);border:1px solid var(--glass-border);font-family:monospace;font-size:0.9em}

/* ─── Toast Notifications ─── */
.toast-container{position:fixed;bottom:80px;right:16px;z-index:9998;display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none}
.toast{padding:12px 18px;border-radius:10px;font-size:0.82em;font-weight:500;pointer-events:auto;
  backdrop-filter:blur(20px);box-shadow:0 4px 20px rgba(0,0,0,0.4);animation:toastIn 0.3s ease;
  display:flex;align-items:center;gap:8px;max-width:360px}
.toast.success{background:rgba(16,60,16,0.92);color:var(--green);border:1px solid rgba(74,222,128,0.2)}
.toast.error{background:rgba(60,16,16,0.92);color:var(--red);border:1px solid rgba(248,113,113,0.2)}
.toast.info{background:rgba(16,30,60,0.92);color:var(--cyan);border:1px solid rgba(34,211,238,0.2)}
.toast.out{animation:toastOut 0.3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateX(40px)}}

/* ─── Loading ─── */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text-dim);gap:10px}
.spinner{width:20px;height:20px;border:2px solid rgba(34,211,238,0.12);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.7s linear infinite;box-shadow:0 0 8px rgba(34,211,238,0.1)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Page transitions ─── */
.main{animation:pageIn 0.35s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ─── Panel entry stagger ─── */
.panel{animation:panelIn 0.4s ease both}
.panel:nth-child(1){animation-delay:0s}
.panel:nth-child(2){animation-delay:0.05s}
.panel:nth-child(3){animation-delay:0.1s}
.panel:nth-child(4){animation-delay:0.15s}
.panel:nth-child(5){animation-delay:0.2s}
.panel:nth-child(6){animation-delay:0.25s}
.panel:nth-child(7){animation-delay:0.3s}
.panel:nth-child(8){animation-delay:0.35s}
@keyframes panelIn{from{opacity:0;transform:translateY(10px) scale(0.98)}to{opacity:1;transform:none}}

/* ─── Quick action buttons ─── */
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.action-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  padding:16px 10px;border-radius:12px;border:1px solid var(--glass-border);
  background:rgba(34,211,238,0.03);cursor:pointer;transition:all 0.25s;color:var(--text-dim)}
.action-btn:hover{background:rgba(34,211,238,0.08);border-color:rgba(34,211,238,0.2);color:var(--cyan)}
.action-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.action-btn span{font-size:0.68em;font-weight:600;letter-spacing:0.5px}

/* ─── Responsive ─── */
@media(max-width:1100px){
  .dash-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0;padding:10px 8px 80px}
  .bottom-bar{left:0}
  .dash-grid{grid-template-columns:1fr}
  .dash-grid .span-2,.dash-grid .span-3,.dash-grid .span-4{grid-column:span 1}

  /* Page header */
  .page-header{flex-wrap:wrap;gap:8px}
  .page-header h1{font-size:0.95em}

  /* Panels */
  .panel{padding:12px;border-radius:10px}

  /* Mega numbers — smaller on mobile */
  .mega-num{font-size:2.6em}
  .mega-num.sm{font-size:1.6em}

  /* Forms */
  .form-grid{grid-template-columns:1fr}
  .form-grid.cols-3{grid-template-columns:1fr}

  /* Tables */
  .table-wrap{margin:0 -12px;padding:0 12px}
  table{font-size:0.75em}
  th{font-size:0.5em;padding:8px 6px}
  td{padding:7px 6px}

  /* Tabs */
  .tab-bar{width:100%}
  .tab{flex:1;text-align:center;padding:7px 8px}

  /* Action grid */
  .action-grid{grid-template-columns:1fr 1fr;gap:6px}
  .action-btn{padding:12px 8px}

  /* Quote result */
  .quote-result{padding:16px 12px}
  .quote-total{font-size:2em!important}
  .line-item{font-size:0.8em}
  .line-item .cost{width:70px}
  .line-item .qty{width:40px}

  /* Bottom bar */
  .bottom-bar{height:56px;gap:0;padding:0 4px}
  .bot-btn{padding:6px 2px;gap:2px}
  .bot-btn svg{width:18px;height:18px}
  .bot-btn span{font-size:0.48em;letter-spacing:0.5px}

  /* Gauges */
  .gauge{padding:10px 8px}
  .gauge-ring{width:80px;height:80px}
  .gauge-ring svg{width:80px;height:80px}
  .gauge-number{font-size:1.2em}

  /* Orbs */
  .orb{width:44px;height:44px}

  /* Guide bubble — full width on mobile */
  .guide-bubble{width:calc(100vw - 16px)!important;left:8px!important;transform:none!important;
    bottom:60px!important;height:150px!important;border-radius:12px}

  /* Guide menu */
  .guide-menu{right:8px;left:8px;bottom:100px;width:auto}
  .guide-help-btn{bottom:68px;right:12px;width:32px;height:32px;font-size:0.7em}

  /* Cutscene */
  .cs-terminal{font-size:0.68em;padding:12px;width:95vw}
  .cs-logo{width:80px;height:80px;border-radius:16px}
  .cs-wordmark{width:min(200px,55vw)}
  .cs-tagline{font-size:0.55em;letter-spacing:2px}
  .cs-activate{padding:12px 32px;font-size:0.75em;letter-spacing:3px}
  .cs-skip{top:16px;right:16px;padding:6px 14px;font-size:0.55em}
  .cs-version{font-size:0.45em}

  /* Ryujin chat widget */
  .ryu-orb{width:48px;height:48px;bottom:68px;right:12px}
  .ryu-panel{width:calc(100vw - 16px);height:60vh;bottom:68px;right:8px;left:8px;border-radius:16px}

  /* System selector — 5→3 on mobile */
  .sys-grid{grid-template-columns:repeat(3,1fr)!important}

  /* Stat rows — 4/3/5 cols → 2 */
  .stat-row{grid-template-columns:repeat(2,1fr)!important}

  /* Package cards — force 1 col on mobile */
  .pkg-card{min-width:0!important}

  /* Collapsible sections */
  details.panel summary{padding:10px 12px!important}

  /* Settings side-by-side → stacked */
  .dash-grid[style*="1fr 1fr"]{grid-template-columns:1fr!important}
}

/* Small phones */
@media(max-width:380px){
  .sys-grid{grid-template-columns:repeat(2,1fr)!important}
  .mega-num{font-size:2em}
  .mega-num.sm{font-size:1.3em}
  .page-header h1{font-size:0.85em}
  .bot-btn span{display:none}
  .bottom-bar{height:48px}
  .main{padding-bottom:60px}
}

/* ─── Opening Cutscene ─── */
.cutscene{position:fixed;inset:0;z-index:99999;background:#020408;display:flex;align-items:center;justify-content:center;
  flex-direction:column;overflow:hidden;transition:opacity 1.2s ease;opacity:0;animation:csFadeIn 1.5s ease 0.3s forwards}
@keyframes csFadeIn{to{opacity:1}}
.cutscene.done{opacity:0;pointer-events:none;transition:opacity 1.5s ease}
.cutscene video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

.cs-skip{position:fixed;top:24px;right:28px;z-index:100001;padding:8px 18px;border:1px solid rgba(34,211,238,0.2);
  border-radius:8px;background:rgba(6,10,20,0.7);color:rgba(160,190,230,0.6);font-family:'Orbitron',monospace;
  font-size:0.65em;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;
  backdrop-filter:blur(10px);transition:all 0.3s}
.cs-skip:hover{color:#22d3ee;border-color:rgba(34,211,238,0.4);background:rgba(34,211,238,0.06)}

/* Cutscene phases */
.cs-phase{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;
  z-index:1;transition:opacity 1s}
.cs-phase video{opacity:0.35;filter:saturate(1.3);position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

/* Phase 4: Logo + Activate */
.cs-logo-wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:16px}
.cs-logo{width:120px;height:120px;border-radius:24px;background:url('/assets/logo/logo-glow.jpg') center/cover;
  box-shadow:0 0 60px rgba(34,211,238,0.3),0 0 120px rgba(34,211,238,0.1);
  animation:logoFloat 3s ease infinite;border:2px solid rgba(34,211,238,0.2)}
@keyframes logoFloat{0%,100%{transform:translateY(0) scale(1);box-shadow:0 0 60px rgba(34,211,238,0.3)}
  50%{transform:translateY(-8px) scale(1.02);box-shadow:0 0 80px rgba(34,211,238,0.45)}}
.cs-wordmark{width:min(280px,60vw);opacity:0.9;filter:drop-shadow(0 0 20px rgba(34,211,238,0.3))}
.cs-tagline{font-family:'Orbitron',monospace;font-size:0.7em;color:rgba(34,211,238,0.5);letter-spacing:3px;
  text-transform:uppercase;margin-top:4px;text-shadow:0 0 10px rgba(34,211,238,0.2)}

.cs-activate{margin-top:32px;padding:14px 48px;border:2px solid rgba(34,211,238,0.3);border-radius:12px;
  background:rgba(34,211,238,0.06);color:#22d3ee;font-family:'Orbitron',monospace;font-size:0.9em;
  font-weight:700;letter-spacing:4px;text-transform:uppercase;cursor:pointer;
  backdrop-filter:blur(10px);transition:all 0.4s;position:relative;overflow:hidden;
  box-shadow:0 0 30px rgba(34,211,238,0.1)}
.cs-activate::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(34,211,238,0.1),transparent);
  transform:translateX(-100%);animation:activateShine 3s ease infinite}
@keyframes activateShine{0%{transform:translateX(-100%)}60%,100%{transform:translateX(100%)}}
.cs-activate:hover{background:rgba(34,211,238,0.12);border-color:rgba(34,211,238,0.5);
  box-shadow:0 0 50px rgba(34,211,238,0.25);transform:scale(1.03)}
.cs-activate:active{transform:scale(0.98)}

/* Version text */
.cs-version{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100001;
  font-family:'Orbitron',monospace;font-size:0.55em;color:rgba(34,211,238,0.25);letter-spacing:3px}
</style>
</head>

const CACHE_TTL = 60000; // 1 minute
let cacheTimestamps = {};

async function api(path, opts = {}) {
  const sep = path.includes('?') ? '&' : '?';
  try {
    const resp = await fetch(`${API}${path}${sep}tenant=${TENANT}`, {
      ...opts, headers: { 'Content-Type': 'application/json', ...opts.headers }
    });
    if (!resp.ok) return await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
    return resp.json();
  } catch (e) { return { error: 'Connection failed' }; }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function fmt$(n) { return '$' + (n || 0).toLocaleString(); }

// Toast notifications
function toast(msg, type='info', duration=3500) {
  let c = document.getElementById('toastContainer');
  if (!c) { c = document.createElement('div'); c.id='toastContainer'; c.className='toast-container'; document.body.appendChild(c); }
  const icons = {success:'&#10003;', error:'&#10007;', info:'&#9432;'};
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = `<span style="font-size:1.1em">${icons[type]||''}</span>${esc(msg)}`;
  c.appendChild(t);
  setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 300); }, duration);
}

// ─── Global Search (Ctrl+K) ───
const globalSearch = {
  open: false,
  toggle() {
    this.open = !this.open;
    let overlay = document.getElementById('searchOverlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'searchOverlay';
      overlay.className = 'search-overlay';
      overlay.innerHTML = `<div class="search-box">
        <input class="search-input" id="globalSearchInput" placeholder="Search customers, estimates, pages..." oninput="globalSearch.search(this.value)">
        <div class="search-results" id="searchResults"></div>
        <div class="search-hint"><span><kbd>Esc</kbd> close</span><span><kbd>Enter</kbd> select</span><span><kbd>D</kbd> dashboard <kbd>Q</kbd> quote <kbd>E</kbd> estimates</span></div>
      </div>`;
      overlay.addEventListener('click', (e) => { if (e.target === overlay) globalSearch.toggle(); });
      document.body.appendChild(overlay);
    }
    overlay.classList.toggle('open', this.open);
    if (this.open) {
      const inp = document.getElementById('globalSearchInput');
      inp.value = '';
      inp.focus();
      this.search('');
    }
  },
  async search(q) {
    const results = document.getElementById('searchResults');
    if (!results) return;
    const items = [];

    // Pages
    const pages = [
      {name:'Dashboard',page:'dashboard',icon:'Command Center'},
      {name:'Quote Builder',page:'quote',icon:'Calculate quotes'},
      {name:'Estimates',page:'estimates',icon:'Pipeline'},
      {name:'Customers',page:'customers',icon:'Database'},
      {name:'Offers',page:'offers',icon:'Packages'},
      {name:'Products',page:'products',icon:'Catalog'},
      {name:'Settings',page:'settings',icon:'Configuration'}
    ];
    for (const p of pages) {
      if (!q || p.name.toLowerCase().includes(q.toLowerCase())) {
        items.push({type:'Page', name:p.name, meta:p.icon, action:()=>{globalSearch.toggle();navigate(p.page);}});
      }
    }

    // Search customers & estimates if query is non-empty
    if (q && q.length >= 2) {
      const [custData, estData] = await Promise.all([
        cachedApi('/customers','customers'),
        cachedApi('/estimates','estimates')
      ]);
      const ql = q.toLowerCase();
      for (const c of (custData.customers||[]).filter(c => (c.full_name||'').toLowerCase().includes(ql) || (c.email||'').toLowerCase().includes(ql) || (c.phone||'').includes(ql)).slice(0,5)) {
        items.push({type:'Customer', name:c.full_name||c.name, meta:c.email||c.phone||'', action:()=>{globalSearch.toggle();navigate('customers');}});
      }
      for (const e of (estData.estimates||[]).filter(e => (e.customer?.full_name||'').toLowerCase().includes(ql) || (e.address||'').toLowerCase().includes(ql)).slice(0,5)) {
        items.push({type:'Estimate', name:e.customer?.full_name||'—', meta: (e.total_with_tax?fmt$(e.total_with_tax):'') + ' ' + (e.status||''), action:()=>{globalSearch.toggle();navigate('estimates');}});
      }
    }

    results.innerHTML = items.length === 0
      ? '<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:0.85em">No results</div>'
      : items.map((item,i) => `<div class="search-item${i===0?' active':''}" onclick="globalSearch._items[${i}].action()">
          <span class="type">${item.type}</span><span class="name">${esc(item.name)}</span><span class="meta">${esc(item.meta)}</span>
        </div>`).join('');
    this._items = items;
  },
  _items: []
};

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  // Ctrl+K or Cmd+K — global search
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); globalSearch.toggle(); return; }
  // Escape — close search
  if (e.key === 'Escape' && globalSearch.open) { globalSearch.toggle(); return; }
  // Enter — select first search result
  if (e.key === 'Enter' && globalSearch.open && globalSearch._items.length > 0) { globalSearch._items[0].action(); return; }
  // Don't trigger shortcuts when typing in inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  // Page shortcuts
  const shortcuts = {d:'dashboard',q:'quote',e:'estimates',c:'customers',o:'offers',p:'products',s:'settings'};
  if (shortcuts[e.key] && !e.ctrlKey && !e.metaKey && !e.altKey) { navigate(shortcuts[e.key]); }
});

// Cached API for read-heavy endpoints
async function cachedApi(path, key) {
  const now = Date.now();
  if (window['_cache_'+key] && cacheTimestamps[key] && (now - cacheTimestamps[key]) < CACHE_TTL) return window['_cache_'+key];
  const r = await api(path);
  window['_cache_'+key] = r;
  cacheTimestamps[key] = now;
  return r;
}
function invalidateCache(key) { delete window['_cache_'+key]; delete cacheTimestamps[key]; }

// ─── Sound system ───
const sfx = {
  ctx: null,
  init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
  play(type) {
    try {
      this.init();
      const ctx = this.ctx;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      gain.gain.value = 0.04;

      if (type === 'click') {
        osc.frequency.value = 800;
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.08);
      } else if (type === 'navigate') {
        osc.frequency.value = 600;
        osc.frequency.linearRampToValueAtTime(900, ctx.currentTime + 0.12);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.15);
      } else if (type === 'success') {
        osc.frequency.value = 523;
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.3);
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2); gain2.connect(ctx.destination);
        osc2.frequency.value = 659;
        gain2.gain.value = 0.04;
        gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
        osc2.start(ctx.currentTime + 0.12);
        osc2.stop(ctx.currentTime + 0.35);
      } else if (type === 'error') {
        osc.type = 'sawtooth';
        osc.frequency.value = 200;
        gain.gain.value = 0.03;
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.2);
      }
    } catch(e) {}
  }
};

function navigate(page) {
  currentPage = page;
  sfx.play('navigate');
  document.querySelectorAll('.nav-icon').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  document.querySelectorAll('.bot-btn').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  const m = document.getElementById('main');
  m.style.animation = 'none';
  m.offsetHeight;
  m.style.animation = '';
  renderPage();
  // Auto-launch tutorial if not seen
  if (typeof guide !== 'undefined') guide.autoLaunchForPage(page);
}

function renderPage() {
  const m = document.getElementById('main');
  switch(currentPage) {
    case 'dashboard': return renderDashboard(m);
    case 'quote': return renderQuoteBuilder(m);
    case 'offers': return renderOffers(m);
    case 'customers': return renderCustomers(m);
    case 'estimates': return renderEstimates(m);
    case 'products': return renderProducts(m);
    case 'settings': return renderSettings(m);
    default: m.innerHTML = '<div class="loading"><div class="spinner"></div>Coming soon</div>';
  }
}

// ─── SVG gauge helper (compact) ───
function gaugeHTML(value, max, label, unit, color) {
  const pct = Math.min(value / max, 1);
  const circ = 2 * Math.PI * 42;
  const offset = circ * (1 - pct);
  const c = color || 'var(--cyan)';
  return `<div class="gauge panel">
    <div class="gauge-ring">
      <svg viewBox="0 0 100 100">
        <circle class="track" cx="50" cy="50" r="42"/>
        <circle class="fill" cx="50" cy="50" r="42" stroke="${c}"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
      </svg>
      <div class="gauge-value">
        <div class="gauge-number" style="color:${c}">${typeof value === 'number' ? value.toLocaleString() : value}</div>
        ${unit ? `<div class="gauge-unit">${unit}</div>` : ''}
      </div>
    </div>
    <div class="gauge-label">${label}</div>
  </div>`;
}

// ─── Mini gauge inline helper ───
function miniGaugeHTML(value, max, label, color) {
  const pct = Math.min(value / max, 1);
  const circ = 2 * Math.PI * 22;
  const offset = circ * (1 - pct);
  const c = color || 'var(--cyan)';
  return `<div style="text-align:center">
    <div style="position:relative;width:54px;height:54px;margin:0 auto">
      <svg viewBox="0 0 54 54" style="transform:rotate(-90deg)"><circle cx="27" cy="27" r="22" fill="none" stroke="rgba(34,211,238,0.06)" stroke-width="4"/><circle cx="27" cy="27" r="22" fill="none" stroke="${c}" stroke-width="4" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" filter="drop-shadow(0 0 3px ${c})"/></svg>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:0.85em;font-weight:700;color:${c}">${value}</div>
    </div>
    <div style="font-size:0.55em;color:var(--text-dim);text-transform:capitalize;margin-top:4px;letter-spacing:1px">${label}</div>
  </div>`;
}

// SVG gradient definition for charts (injected once)
const SVG_DEFS = `<defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22d3ee" stop-opacity="0.55"/><stop offset="100%" stop-color="#22d3ee" stop-opacity="0.02"/></linearGradient><linearGradient id="gg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4ade80" stop-opacity="0.45"/><stop offset="100%" stop-color="#4ade80" stop-opacity="0.02"/></linearGradient></defs>`;

// Generate chart from real data or fallback to demo
function dataPoints(values, h, w) {
  if (!values || values.length === 0) return [];
  const max = Math.max(...values, 1);
  return values.map((v, i) => {
    const x = values.length === 1 ? w/2 : (i / (values.length - 1)) * w;
    const y = h - (v / max) * h * 0.85 - h * 0.05;
    return `${x},${y}`;
  });
}
function areaChart(w, h, color, values) {
  const pts = values && values.length > 1 ? dataPoints(values, h, w) : dataPoints(Array.from({length:12}, () => Math.random()*70+30), h, w);
  const line = pts.join(' ');
  const area = `0,${h} ${line} ${w},${h}`;
  const grad = color === 'green' ? 'url(#gg)' : 'url(#cg)';
  const stroke = color === 'green' ? 'var(--green)' : 'var(--cyan)';
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${SVG_DEFS}<polygon points="${area}" fill="${grad}"/><polyline points="${line}" fill="none" stroke="${stroke}" stroke-width="2" stroke-linecap="round" filter="drop-shadow(0 0 4px ${stroke})"/></svg>`;
}

// Build monthly pipeline data from estimates
function buildMonthlyData(estimates, field, months) {
  const now = new Date();
  const data = [];
  for (let i = months - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const nextD = new Date(now.getFullYear(), now.getMonth() - i + 1, 1);
    const val = estimates.filter(e => {
      const cd = new Date(e.created_at);
      return cd >= d && cd < nextD;
    }).reduce((s, e) => s + (e[field] || 0), 0);
    data.push(val);
  }
  return data;
}

function progressBar(pct,color,label,value){
  return `<div><div class="progress-label"><span>${label}</span><span class="value">${value||pct+'%'}</span></div><div class="progress"><div class="progress-fill ${color}" style="width:${pct}%"></div></div></div>`;
}

    <div class="panel-header"><div class="panel-title">Active Operations</div><span class="badge badge-blue">${activeTickets.length}</span></div>`;
  if (activeTickets.length === 0) {
    html += '<div style="text-align:center;padding:16px;color:var(--text-dim);font-size:0.82em">All systems clear.</div>';
  } else {
    for (const t of activeTickets.slice(0, 5)) {
      const dotClass = t.priority === 'urgent' ? 'urgent' : t.status === 'active' ? 'active' : 'open';
      html += `<div class="ticket-row">
        <div class="ticket-dot ${dotClass}"></div>
        <div class="ticket-info"><div class="ticket-name">${esc(t.title)}</div>
          <div class="ticket-meta">${t.assigned_to_name||'Unassigned'}${t.due_date?' &bull; '+new Date(t.due_date).toLocaleDateString():''}</div></div>
        <span class="badge badge-${dotClass==='urgent'?'red':dotClass==='active'?'green':'blue'}">${t.status}</span></div>`;
    }
    if (activeTickets.length > 5) html += `<div style="text-align:center;padding:6px;font-size:0.72em;color:var(--text-dim)">+${activeTickets.length-5} more</div>`;
  }
  html += '</div>';

  // ═══ ROW 4: Quick Actions (span 1) + Alerts (span 1) + Revenue Chart (span 2) ═══

  // Panel 9: Today's Focus (smart action items)
  const sentEstimates = estList.filter(e => e.status === 'sent');
  const staleDrafts = estList.filter(e => e.status === 'draft' && e.created_at && (Date.now() - new Date(e.created_at).getTime()) > 48*3600000);
  html += `<div class="panel">
    <div class="panel-header"><div class="panel-title">Today's Focus</div></div>`;

  if (sentEstimates.length > 0) {
    html += `<div class="alert-row info" style="cursor:pointer" onclick="estFilter='sent';navigate('estimates')">
      <div class="alert-dot cyan"></div><span><strong>${sentEstimates.length}</strong> sent — follow up today</span></div>`;
  }
  if (staleDrafts.length > 0) {
    html += `<div class="alert-row warn" style="cursor:pointer" onclick="estFilter='draft';navigate('estimates')">
      <div class="alert-dot yellow"></div><span><strong>${staleDrafts.length}</strong> stale drafts — send or archive</span></div>`;
  }
  if (draftCount > 0 && staleDrafts.length === 0) {
    html += `<div class="alert-row info" style="cursor:pointer" onclick="estFilter='draft';navigate('estimates')">
      <div class="alert-dot cyan"></div><span>${draftCount} drafts ready to send</span></div>`;
  }
  if (sentEstimates.length === 0 && staleDrafts.length === 0 && draftCount === 0) {
    html += `<div style="text-align:center;padding:10px;font-size:0.78em;color:var(--text-dim)">Pipeline clear — time to prospect</div>`;
  }

  html += `<div class="action-grid" style="margin-top:8px">
    <div class="action-btn" onclick="navigate('quote')">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/></svg><span>New Quote</span></div>
    <div class="action-btn" onclick="navigate('customers')">
      <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg><span>+ Customer</span></div>
  </div></div>`;

  // Panel 10: System Status & Alerts
  html += `<div class="panel">
    <div class="panel-header"><div class="panel-title">System Status</div></div>`;
  if (urgentTickets.length > 0) {
    html += `<div class="alert-row"><div class="alert-dot red"></div><span>${urgentTickets.length} urgent ticket${urgentTickets.length>1?'s':''}</span></div>`;
  }
  html += `<div class="alert-row info"><div class="alert-dot cyan"></div><span>Engine v3.1 &bull; ${offerCount} offers &bull; ${custList.length} customers</span></div>`;
  const closeRate = estList.length > 0 ? Math.round((acceptedCount / estList.length) * 100) : 0;
  html += `<div style="margin-top:8px">${progressBar(closeRate, closeRate >= 15 ? 'green' : closeRate >= 8 ? 'cyan' : 'yellow', 'Close Rate', closeRate + '% (' + acceptedCount + '/' + estList.length + ')')}</div>`;
  html += '</div>';

  // Panel 11: Revenue Trend (span 2)
  html += `<div class="panel span-2">
    <div class="panel-header"><div class="panel-title">Revenue Trend</div></div>
    <div style="display:flex;gap:20px;margin-bottom:6px">
      <div><span style="font-family:'Orbitron',monospace;font-size:1.4em;font-weight:700;color:var(--green)">${fmt$(acceptedCount > 0 ? estList.filter(e=>e.status==='accepted').reduce((s,e)=>s+(e.total_price||0),0) : 0)}</span><div class="mega-label">Accepted Value</div></div>
    </div>
    <div style="height:60px">${areaChart(400,60,'green',buildMonthlyData(estList.filter(e=>e.status==='accepted'),'total_price',6))}</div>
  </div>`;

  // ═══ ROW 5: Systems Online (span 1) + Recent Estimates (span 3) ═══

  // Panel 12: Systems Online (compact list)
  html += `<div class="panel">
    <div class="panel-header"><div class="panel-title">Systems</div><span class="badge badge-green" style="font-size:0.5em">All OK</span></div>`;
  for (const [sys, count] of Object.entries(systems)) {
    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(34,211,238,0.04)">
      <div style="display:flex;align-items:center;gap:6px">
        <div style="width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 4px var(--green)"></div>
        <span style="font-size:0.75em;text-transform:capitalize">${sys}</span></div>
      <span class="badge badge-blue" style="font-size:0.55em">${count}</span></div>`;
  }
  html += '</div>';

  // Panel 13: Recent Estimates (span 3)
  html += `<div class="panel span-3">
    <div class="panel-header"><div class="panel-title">Recent Estimates</div><button class="btn btn-sm btn-outline" onclick="navigate('estimates')">View All</button></div>
    <div class="table-wrap"><table>
      <thead><tr><th>Customer</th><th>Status</th><th class="text-right">Amount</th><th>Date</th></tr></thead><tbody>`;
  for (const e of estList.slice(0, 5)) {
    const sc = e.status==='accepted'?'green':e.status==='sent'?'blue':'dim';
    html += `<tr><td style="font-weight:600;font-size:0.82em">${esc(e.customer?.full_name||e.customer?.name||'—')}</td>
      <td><span class="badge badge-${sc}">${e.status||'draft'}</span></td>
      <td class="text-right" style="font-family:'Orbitron',monospace;color:var(--cyan);font-size:0.85em">${e.total_price?fmt$(e.total_price):'—'}</td>
      <td class="text-dim" style="font-size:0.78em">${e.created_at?new Date(e.created_at).toLocaleDateString():'—'}</td></tr>`;
  }
  html += '</tbody></table></div></div>';

  // ═══ ROW 6: Activity Feed (span 4) ═══
  const recentActivity = [];
  for (const e of estList.slice(0, 8)) {
    const when = e.created_at ? timeAgo(new Date(e.created_at)) : '';
    recentActivity.push({
      icon: e.status === 'accepted' ? '&#10003;' : e.status === 'sent' ? '&#9993;' : '&#128196;',
      color: e.status === 'accepted' ? 'var(--green)' : e.status === 'sent' ? 'var(--blue)' : 'var(--text-dim)',
      text: `${e.status === 'accepted' ? 'Accepted' : e.status === 'sent' ? 'Sent' : 'Created'} estimate for <strong>${esc(e.customer?.full_name||'—')}</strong>${e.total_price ? ' — '+fmt$(e.total_price) : ''}`,
      when
    });
  }
  for (const c of custList.slice(0, 4)) {
    if (c.created_at) {
      recentActivity.push({
        icon: '&#128100;', color: 'var(--purple)',
        text: `Added <strong>${esc(c.full_name||c.name||'—')}</strong> to database`,
        when: timeAgo(new Date(c.created_at))
      });
    }
  }
  recentActivity.sort((a,b) => (b._ts||0) - (a._ts||0));

  if (recentActivity.length > 0) {
    html += `<div class="panel span-4">
      <div class="panel-header"><div class="panel-title">Recent Activity</div></div>`;
    for (const a of recentActivity.slice(0, 8)) {
      html += `<div style="display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid rgba(34,211,238,0.03);font-size:0.8em">
        <span style="color:${a.color};font-size:1.1em;width:20px;text-align:center;flex-shrink:0">${a.icon}</span>
        <span style="flex:1;line-height:1.4">${a.text}</span>
        <span style="font-size:0.85em;color:var(--text-dim);white-space:nowrap">${a.when}</span>
      </div>`;
    }
    html += '</div>';
  }

  html += '</div>'; // close dash-grid
  m.innerHTML = html;
}

function timeAgo(date) {
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  if (s < 604800) return Math.floor(s/86400) + 'd ago';
  return date.toLocaleDateString();
}

// ─── Form field helper ───
function qField(key,label,type,opts={}) {
  const val = quoteState.answers[key] ?? opts.default ?? '';
  const req = opts.required ? ' *' : '';
  const hint = opts.hint ? `<div class="form-hint">${esc(opts.hint)}</div>` : '';
  if (type === 'select') {
    const options = (opts.options||[]).map(o => {
      const lb = opts.labels ? (opts.labels[o]||o) : o;
      return `<option value="${o}" ${val==o?'selected':''}>${lb}</option>`;
    }).join('');
    return `<div class="form-group"><label class="form-label">${esc(label)}${req}</label><select data-qkey="${esc(key)}" onchange="quoteState.answers[this.dataset.qkey]=this.value">${options}</select>${hint}</div>`;
  }
  if (type === 'checkbox') {
    return `<div class="form-group" style="display:flex;align-items:center;gap:8px;padding-top:18px"><input type="checkbox" ${val?'checked':''} data-qkey="${esc(key)}" onchange="quoteState.answers[this.dataset.qkey]=this.checked" style="width:auto;accent-color:var(--cyan)"><label class="form-label" style="margin:0">${esc(label)}</label></div>`;
  }
  return `<div class="form-group"><label class="form-label">${esc(label)}${req}</label><input type="${type}" value="${val}" data-qkey="${esc(key)}" onchange="quoteState.answers[this.dataset.qkey]=this.type==='number'?Number(this.value):this.value" placeholder="${esc(opts.hint||'')}">${hint}</div>`;
}

function formSection(title, icon, content, open=true) {
  return `<details class="panel" style="cursor:default;padding:0" ${open?'open':''}>
    <summary style="padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;list-style:none">
      <span style="font-size:1.1em">${icon}</span>
      <span class="panel-title" style="font-size:0.7em">${title}</span>
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:var(--text-dim);fill:none;stroke-width:2;margin-left:auto;transition:transform 0.2s"><polyline points="6 9 12 15 18 9"/></svg>
    </summary>
    <div style="padding:0 14px 14px;border-top:1px solid var(--glass-border)"><div class="form-grid" style="margin-top:12px">${content}</div></div>
  </details>`;
}

            <img src="${esc(url)}" style="width:100%;height:100%;object-fit:cover">

    // ═══ Section 7: Site Conditions ═══
    html += formSection('Site & Access', '📋',

    // ═══ Section 6: Package Selection — Visual Cards ═══
    html += `<div class="panel" style="padding:14px"><div class="panel-header"><div class="panel-title">Select Package</div><span class="badge badge-blue">${offers.length} available</span></div>`;
    html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:10px">`;
    for (const o of offers) {
      const copy = PACKAGE_COPY[o.slug] || { tagline: o.badge || '', copy: o.description || '', icon: '📦', color: 'cyan' };
      const sel = quoteState.answers._offer_slug === o.slug;
      html += `<div onclick="quoteState.answers._offer_slug='${o.slug}';document.querySelectorAll('.pkg-card').forEach(c=>c.style.borderColor='var(--glass-border)');this.style.borderColor='var(--${copy.color})'"
        class="pkg-card" style="padding:14px;border-radius:10px;border:2px solid ${sel?'var(--'+copy.color+')':'var(--glass-border)'};background:${sel?'rgba(34,211,238,0.04)':'rgba(6,12,24,0.5)'};cursor:pointer;transition:all 0.25s;position:relative">
        ${copy.recommended?'<div style="position:absolute;top:-8px;right:10px;background:var(--yellow);color:#000;font-size:0.55em;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:1px">RECOMMENDED</div>':''}
        <div style="font-size:1.3em;margin-bottom:4px">${copy.icon}</div>
        <div style="font-family:'Orbitron',monospace;font-size:0.75em;font-weight:700;color:var(--${copy.color})">${esc(o.name)}</div>
        ${o.badge?`<div style="font-size:0.65em;color:var(--${copy.color});opacity:0.7;margin-top:2px">${esc(o.badge)}</div>`:''}
        <div style="font-size:0.68em;color:var(--text-dim);margin-top:6px;line-height:1.4">${esc(copy.tagline)}</div>
        ${o.warranty_years?`<div style="font-size:0.6em;color:var(--text-dim);margin-top:6px;display:flex;align-items:center;gap:4px"><svg viewBox="0 0 24 24" style="width:10px;height:10px;stroke:var(--green);fill:none;stroke-width:2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>${o.warranty_years}-yr warranty</div>`:''}
      </div>`;
    }
    html += '</div>';

    // Expandable sales copy for selected package
    const selOffer = offers.find(o => o.slug === quoteState.answers._offer_slug);
    if (selOffer) {
      const selCopy = PACKAGE_COPY[selOffer.slug] || { copy: selOffer.description || '' };
      html += `<div style="margin-top:10px;padding:10px 12px;border-radius:8px;background:rgba(34,211,238,0.03);border:1px solid var(--glass-border);font-size:0.78em;color:var(--text-dim);line-height:1.5">${esc(selCopy.copy || selOffer.description || '')}</div>`;
    }

    html += `<div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="runGuidedQuote()" style="flex:1;min-width:140px">Calculate Quote</button>
      <button class="btn btn-outline" onclick="runCompare()" style="flex:1;min-width:140px">Compare All Packages</button>
    </div></div>`;

    form.innerHTML = html;
  } else {
    // ═══ ADVANCED MODE — Line Item Editor ═══
    if (!quoteState.result) {
      form.innerHTML = `<div class="panel"><div class="panel-title">Advanced Mode</div><div class="panel-sub" style="margin-top:6px">Run a guided quote first, then switch to advanced to edit individual line items.</div><div style="margin-top:14px"><button class="btn btn-outline" onclick="setQuoteMode('guided')">Start Guided</button></div></div>`;
      return;
    }
    const items = quoteState.result.lineItems || [];
    let html = `<div class="panel"><div class="panel-header"><div class="panel-title">Line Item Editor</div><span class="badge badge-blue">${items.length} items</span></div>
      <div class="table-wrap"><table><thead><tr><th style="width:28px"></th><th>Item</th><th>Cat</th><th style="width:70px">Qty</th><th style="width:50px">Unit</th><th style="width:90px">Cost</th><th class="text-right" style="width:90px">Total</th><th style="width:100px">Source</th></tr></thead><tbody>`;
    for (const li of items) {
      const ovr = quoteState.overrides[li.item_key]||{};
      const inc = ovr.included!==undefined?ovr.included:li.included;
      const qty = ovr.quantity!==undefined?ovr.quantity:li.quantity;
      const uc = ovr.unit_cost!==undefined?ovr.unit_cost:li.unit_cost;
      const tot = Math.round(qty*uc*100)/100;
      html += `<tr style="${!inc?'opacity:0.35':''}"><td><input type="checkbox" ${inc?'checked':''} onchange="toggleLineItem('${li.item_key}',this.checked)"></td>
        <td style="font-weight:500;font-size:0.82em">${esc(li.label)}${li.estimated?'<span class="text-yellow"> *</span>':''}</td>
        <td><span class="badge badge-dim">${li.category}</span></td>
        <td><input type="number" value="${qty}" style="width:60px;padding:3px 6px;font-size:0.82em" onchange="overrideQty('${li.item_key}',Number(this.value))"></td>
        <td class="text-dim" style="font-size:0.75em">${li.unit}</td>
        <td><input type="number" value="${uc}" step="0.01" style="width:80px;padding:3px 6px;font-size:0.82em" onchange="overrideCost('${li.item_key}',Number(this.value))"></td>
        <td class="text-right" style="font-weight:600;font-family:'Orbitron',monospace;font-size:0.82em">${fmt$(tot)}</td>
        <td class="text-dim" style="font-size:0.68em;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${li.price_source||''}</td></tr>`;
    }
    html += `</tbody></table></div><div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-primary" onclick="recalcWithOverrides()">Recalculate</button>
      <button class="btn btn-outline" onclick="quoteState.overrides={};renderQuoteBuilder(document.getElementById('main'))">Reset Overrides</button></div></div>`;
    form.innerHTML = html;
  }
}

async function runGuidedQuote() {
  const rd = document.getElementById('quoteResult');
  rd.innerHTML = '<div class="loading"><div class="spinner"></div>Calculating...</div>';
  const a = {...quoteState.answers}; const slug = a._offer_slug; delete a._offer_slug;

  // Run quote + comparison in parallel
  const [r, comp] = await Promise.all([
    api('/quote?mode=guided&materials=1', {method:'POST',body:JSON.stringify({system:quoteState.system,offer_slug:slug,answers:a})}),
    api('/quote?mode=compare', {method:'POST',body:JSON.stringify({measurements:a})}).catch(() => null)
  ]);

  if (r.error) { rd.innerHTML = `<div class="panel" style="border-color:var(--red)"><div class="panel-title text-red">Error</div><div class="panel-sub">${esc(r.error)}</div></div>`; return; }
  quoteState.result = r;
  quoteState._comparison = comp; // store for inline display
  sfx.play('success');
  renderQuoteResult(rd, r);
  setTimeout(() => guide.onQuoteResult(), 500);
}

async function runCompare() {
  const rd = document.getElementById('quoteResult');
  rd.innerHTML = '<div class="loading"><div class="spinner"></div>Comparing...</div>';
  const a = {...quoteState.answers}; delete a._offer_slug;
  const r = await api('/quote?mode=compare', {method:'POST',body:JSON.stringify({measurements:a})});
  if (r.error) { rd.innerHTML = `<div class="panel" style="border-color:var(--red)"><div class="panel-title text-red">Error</div><div class="panel-sub">${esc(r.error)}</div></div>`; return; }
  renderCompareResult(rd, r);
}

function renderQuoteResult(el, r) {
  const s = r.summary;
  const includedItems = r.lineItems.filter(li => li.included);
  const marginPct = parseFloat(s.netMargin) || 0;
  const marginColor = marginPct >= 30 ? 'green' : marginPct >= 20 ? 'cyan' : marginPct >= 10 ? 'yellow' : 'red';

  const custName = quoteState.answers.customerName || '';
  const addr = quoteState.answers.address || '';

  // Bundle line items into client-facing categories (mirrors outputGenerators.js)
  const bundleMap = {
    'Roofing System': ['shingles','underlayment','ice_water','starter','ridge_cap','drip_edge','valley_metal','pipe_flashing','step_flashing','ridge_vent','nails','caulking','base_labor','tearoff_labor','extra_layer_labor','cedar_tearoff_labor','redeck_labor','valley_labor','ridge_vent_labor','pipe_labor','chimney_labor','cricket_labor','vent_labor','metal_panels','metal_strapping','metal_labor','flat_membrane','flat_insulation','flat_adhesive','flat_labor'],
    'Siding System': ['siding','j_channel','corner_posts_outside','corner_posts_inside','window_trim','undersill_trim','starter_strip_siding','drip_cap','metal_trim','strip_existing'],
    'Wall Substrate & Insulation': ['osb_substrate','housewrap','eps_foam','ventigrid','sheathing_inspection'],
    'Soffit & Fascia': ['soffit','fascia'],
    'Gutters & Drainage': ['gutters','leaf_guard'],
    'Windows & Doors': ['window_capping','door_capping','window_replacement','window_small','window_medium','window_large'],
    'Remediation Allowance': ['remediation'],
    'Project Logistics': ['distance_adder','project_overhead','disposal','warranty']

  const mult = s.hardCost > 0 ? s.sellingPrice / s.hardCost : 1;

    const hardTotal = includedItems.filter(li => keys.includes(li.item_key)).reduce((sum,li) => sum + li.total_cost, 0);
    if (hardTotal <= 0) continue;

      <div>
        ${custName ? `<div style="font-size:0.72em;color:var(--text-dim);letter-spacing:0.5px;margin-bottom:2px">Prepared for</div><div style="font-size:1.1em;font-weight:700">${esc(custName)}</div>` : ''}
        ${addr ? `<div style="font-size:0.78em;color:var(--text-dim);margin-top:2px">${esc(addr)}</div>` : ''}

      <div style="text-align:right">

          <span style="font-family:'Orbitron',monospace;font-size:0.8em;font-weight:700;color:var(--${copy.color})">${esc(r.offer.name)}</span>
          ${r.offer.badge ? `<span class="badge badge-blue">${esc(r.offer.badge)}</span>` : ''}
        </div>
        ${r.offer.warranty_years ? `<div style="font-size:0.68em;color:var(--green);margin-top:4px"><svg viewBox="0 0 24 24" style="width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2;vertical-align:middle"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> ${r.offer.warranty_years}-Year Workmanship Warranty</div>` : ''}
      </div>
    </div>

    <!-- ═══ HERO PRICE ═══ -->
    <div style="text-align:center;padding:20px 0;border-top:1px solid var(--glass-border);border-bottom:1px solid var(--glass-border)">

      ${s.hasEstimatedPricing ? '<div style="margin-top:6px"><span class="badge badge-estimated">* Contains estimated pricing — verify with supplier</span></div>' : ''}
    </div>

    <!-- ═══ PACKAGE POSITION BAR (inline price anchor) ═══ -->`;
  if (quoteState._comparison && quoteState._comparison.offers) {

      .sort((a,b) => a.total - b.total);
    const maxTotal = Math.max(...compOffers.map(o => o.total));
    if (compOffers.length > 1) {
      html += `<div style="padding:12px 0;border-bottom:1px solid var(--glass-border)">
        <div style="font-size:0.6em;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px">How Your Package Compares</div>
        <div style="display:flex;gap:4px;align-items:flex-end;height:48px">`;
      for (const o of compOffers) {
        const pct = Math.max((o.total / maxTotal) * 100, 15);
        const color = o.selected ? 'var(--cyan)' : 'rgba(34,211,238,0.15)';
        html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px" title="${o.name}: ${fmt$(o.total)}">
          <div style="font-size:0.55em;color:${o.selected?'var(--cyan)':'var(--text-dim)'};font-weight:${o.selected?'700':'400'};white-space:nowrap">${fmt$(o.total)}</div>
          <div style="width:100%;height:${pct}%;min-height:6px;background:${color};border-radius:4px 4px 0 0;transition:height 0.5s"></div>

      const highest = compOffers[compOffers.length - 1];
      const selected = compOffers.find(o => o.selected);
      if (selected && highest && !highest.selected && highest.total > selected.total) {
        const savings = highest.total - selected.total;

      </div>
      <div style="text-align:center;padding:6px 14px;border-radius:8px;background:rgba(34,211,238,0.03)">
        <div style="font-family:'Orbitron',monospace;font-size:1.1em;font-weight:700;color:var(--text-dim)">${fmt$(s.hardCost)}</div><div class="mega-label">Hard Cost</div>
      </div>
      ${s.pricePerSQ ? `<div style="text-align:center;padding:6px 14px;border-radius:8px;background:rgba(34,211,238,0.03)"><div style="font-family:'Orbitron',monospace;font-size:1.1em;font-weight:700;color:var(--blue)">${fmt$(s.pricePerSQ)}</div><div class="mega-label">/SQ</div></div>` : ''}
    </div>
    <div style="margin:0 0 14px">${progressBar(Math.min(marginPct,50)/50*100, marginColor, 'Net Margin', s.netMargin+(s.marginProtected?' (floor protected)':''))}</div>

    <!-- ═══ SCOPE OF WORK ═══ -->
    <div style="margin-bottom:14px">
      <div style="font-family:'Orbitron',monospace;font-size:0.6em;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px">Scope of Work</div>
      <div style="font-size:0.8em;color:var(--text-dim);line-height:1.6;margin-bottom:10px">${esc(copy.copy || r.offer.description || '')}</div>`;

  // Bundled retail line items
  for (const b of bundles) {
    html += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(34,211,238,0.05);font-size:0.88em">
      <span style="font-weight:500">${b.label}</span>

  html += `<div style="display:flex;justify-content:space-between;padding:10px 0 4px;font-size:0.92em;font-weight:700;border-top:2px solid var(--glass-border);margin-top:4px">

function renderCompareResult(el, r) {
  const offers = r.offers||{};
  const sorted = Object.entries(offers).sort((a,b) => a[1].summary.sellingPrice - b[1].summary.sellingPrice);

  // Package highlights
  const highlights = {
    'economy': ['IKO Cambridge shingles','Standard underlayment','10-year warranty'],
    'gold': ['CertainTeed Landmark','Synthetic underlayment','15-year warranty'],
    'platinum': ['CertainTeed Landmark PRO','Grace ice shield','Metal valleys','20-year warranty'],
    'diamond': ['CertainTeed Presidential','Premium everything','25-year warranty'],
    'performance-shell-plus': ['Full wall rebuild','VentiGrid rain screen','Remediation included'],
    'hardie-shell': ['James Hardie siding','DrainWrap premium','15-year warranty'],
    'metal-shell': ['Steel siding','Full wall assembly','15-year warranty'],
    'gold-shell': ['Gold roof + shell','Complete exterior','Bundle savings'],
    'platinum-shell': ['Platinum roof + shell','Premium everything','20-year warranty']
  };

  let html = `<div style="margin-top:12px">
    <div class="panel" style="margin-bottom:10px"><div class="panel-header"><div class="panel-title">Package Comparison</div><span class="badge badge-blue">${sorted.length} packages</span></div>
    <div style="font-size:0.78em;color:var(--text-dim)">Click any package to see the full proposal breakdown.</div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px">`;

  for (const [slug,q] of sorted) {
    const s = q.summary;
    const mp = parseFloat(s.netMargin)||0;
    const mc = mp >= 30 ? 'green' : mp >= 20 ? 'cyan' : mp >= 10 ? 'yellow' : 'red';
    const copy = PACKAGE_COPY[slug] || { tagline: q.offer.badge||'', icon: '📦', color: 'cyan' };
    const hl = highlights[slug] || [];
    const isRec = copy.recommended;

    html += `<div class="panel" style="cursor:pointer;transition:all 0.25s;position:relative;${isRec?'border-color:var(--yellow);box-shadow:0 0 20px rgba(250,204,21,0.08)':''}" onclick="quoteState.answers._offer_slug='${slug}';runGuidedQuote()">
      ${isRec?'<div style="position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--yellow);color:#000;font-size:0.5em;font-weight:800;padding:2px 10px;border-radius:4px;letter-spacing:1.5px;white-space:nowrap">RECOMMENDED</div>':''}
      <div style="text-align:center;padding-bottom:10px;border-bottom:1px solid var(--glass-border)">
        <div style="font-size:1.4em;margin-bottom:4px">${copy.icon}</div>
        <div style="font-family:'Orbitron',monospace;font-size:0.85em;font-weight:700;color:var(--${copy.color})">${esc(q.offer.name)}</div>
        ${q.offer.badge?`<div style="font-size:0.62em;color:var(--${copy.color});opacity:0.7;margin-top:2px">${esc(q.offer.badge)}</div>`:''}
      </div>

      <div style="text-align:center;padding:12px 0">
        <div style="font-family:'Orbitron',monospace;font-size:1.8em;font-weight:900;color:var(--cyan);text-shadow:0 0 20px rgba(34,211,238,0.3)">${fmt$(s.totalWithTax)}</div>
        <div style="font-size:0.7em;color:var(--text-dim)">${fmt$(s.sellingPrice)} + ${s.taxLabel||'HST'}</div>
      </div>

      <div style="font-size:0.72em;margin-bottom:8px">
        ${hl.map(h => `<div style="display:flex;align-items:center;gap:5px;padding:2px 0;color:var(--text-dim)"><svg viewBox="0 0 24 24" style="width:10px;height:10px;stroke:var(--green);fill:none;stroke-width:3;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg>${esc(h)}</div>`).join('')}
      </div>

      <div style="display:flex;justify-content:space-between;font-size:0.7em;padding-top:8px;border-top:1px solid var(--glass-border)">
        <span class="text-dim">Margin</span><span class="text-${mc}" style="font-weight:600">${s.netMargin}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:0.7em;padding:2px 0">
        <span class="text-dim">/SQ</span><span style="font-family:'Orbitron',monospace;font-size:0.9em">${s.pricePerSQ?fmt$(s.pricePerSQ):'—'}</span>
      </div>
      ${q.offer.warranty_years?`<div style="display:flex;justify-content:space-between;font-size:0.7em;padding:2px 0"><span class="text-dim">Warranty</span><span style="color:var(--green)">${q.offer.warranty_years} years</span></div>`:''}
    </div>`;
  }
  html += '</div></div>';
  el.innerHTML = html;
}

function getQuoteSummaryText() {

  const s = quoteState.result.summary;

function shareQuoteViaSMS() {
  const phone = quoteState.answers.customerPhone || '';
