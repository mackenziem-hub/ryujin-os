<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plus Ultra Roofing — Commercial Proposal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    color: #1a1d23;
    line-height: 1.55;
    font-size: 15px;
    background: #f5f7fa;
    min-height: 100vh;
  }
  .wrap {
    max-width: 920px;
    margin: 0 auto;
    background: #fff;
    box-shadow: 0 4px 20px rgba(10,58,78,0.08);
    min-height: 100vh;
  }
  .brand-bar {
    background: linear-gradient(135deg, #0a3a4e 0%, #144a63 100%);
    color: #e0f7fa;
    padding: 16px 36px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 4px solid #22d3ee;
  }
  .brand-name { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; color: #fff; }
  .brand-tag { font-size: 11px; color: #7dd3fc; letter-spacing: 2px; text-transform: uppercase; }
  .page { padding: 32px 36px 48px 36px; }
  h1 {
    font-size: 32px;
    color: #0a3a4e;
    margin: 6px 0 6px 0;
    line-height: 1.15;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .subtitle { font-size: 17px; color: #475766; margin-bottom: 18px; }
  h2 {
    font-size: 19px;
    color: #0a3a4e;
    margin: 28px 0 10px 0;
    padding-bottom: 6px;
    border-bottom: 2px solid #22d3ee;
    font-weight: 700;
  }
  h3 { font-size: 15px; color: #0a3a4e; margin: 18px 0 8px 0; font-weight: 700; }
  .cover-meta {
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 6px 18px;
    margin: 10px 0;
    font-size: 14px;
  }
  .cover-meta strong { color: #0a3a4e; }
  .cover-img {
    width: 100%;
    height: 360px;
    object-fit: cover;
    border-radius: 8px;
    margin: 18px 0;
    background: #e1e7ee;
  }
  .key-finding {
    background: #fff7ed;
    border-left: 5px solid #d97706;
    padding: 16px 20px;
    margin: 16px 0;
    border-radius: 0 8px 8px 0;
  }
  .key-finding .label {
    font-size: 11px;
    color: #d97706;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .key-finding .text { font-size: 15px; color: #1a1d23; line-height: 1.55; }
  .findings { width: 100%; border-collapse: collapse; margin: 12px 0 16px 0; font-size: 14px; }
  .findings th {
    background: #0a3a4e; color: #fff; padding: 10px 14px;
    text-align: left; font-weight: 600; font-size: 13px;
  }
  .findings td { padding: 9px 14px; border-bottom: 1px solid #e1e7ee; vertical-align: top; }
  .findings tr:nth-child(even) td { background: #f7f9fc; }
  .sev-critical { color: #c1272d; font-weight: 700; }
  .sev-high { color: #d97706; font-weight: 600; }
  .sev-mod { color: #5a6b7d; }
  .photo-section h3 { margin-top: 22px; color: #475766; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 12px 0 20px 0;
  }
  .photo-cell { display: flex; flex-direction: column; }
  .photo-cell img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.15s;
    background: #e1e7ee;
  }
  .photo-cell img:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(10,58,78,0.15); }
  .photo-caption {
    font-size: 12px;
    color: #5a6b7d;
    margin-top: 4px;
    line-height: 1.4;
  }
  .photo-caption.danger { color: #c1272d; font-weight: 600; }
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 14px 0 24px 0;
  }
  .option-card {
    border: 2px solid #e1e7ee;
    border-radius: 10px;
    padding: 20px;
    background: #fff;
    display: flex;
    flex-direction: column;
  }
  .option-card.recommended {
    border-color: #22d3ee;
    background: #f0fafd;
    box-shadow: 0 4px 16px rgba(34,211,238,0.15);
  }
  .option-card .tag {
    display: inline-block;
    background: #22d3ee;
    color: #003845;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 8px;
    align-self: flex-start;
  }
  .option-card .tag.alt { background: #d97706; color: #fff; }
  .option-card .name { font-size: 19px; font-weight: 800; color: #0a3a4e; margin-bottom: 4px; }
  .option-card .price { font-size: 26px; font-weight: 800; color: #0a3a4e; margin: 8px 0; letter-spacing: -0.5px; }
  .option-card .scope { font-size: 14px; color: #475766; margin-bottom: 10px; line-height: 1.55; }
  .option-card ul { margin-left: 18px; font-size: 13.5px; }
  .option-card li { margin: 4px 0; line-height: 1.5; }
  .math-table { margin: 14px 0; }
  .math-table table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .math-table th { background: #0a3a4e; color: #fff; padding: 10px 14px; text-align: left; font-weight: 600; }
  .math-table td { padding: 10px 14px; border-bottom: 1px solid #e1e7ee; }
  .math-table tr:nth-child(even) td { background: #f7f9fc; }
  .next-step {
    background: linear-gradient(135deg, #0a3a4e 0%, #144a63 100%);
    color: #e0f7fa;
    padding: 24px 28px;
    border-radius: 10px;
    margin: 24px 0;
  }
  .next-step h3 { color: #fff; margin-top: 0; font-size: 19px; border: none; }
  .next-step p { color: #cffafe; line-height: 1.65; }
  .next-step a { color: #22d3ee; text-decoration: none; font-weight: 600; }
  .next-step a:hover { text-decoration: underline; }
  .footer-note {
    font-size: 12.5px;
    color: #5a6b7d;
    font-style: italic;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid #d0dae5;
    line-height: 1.55;
  }
  .footer {
    text-align: center;
    padding: 24px 36px;
    background: #f7f9fc;
    border-top: 1px solid #d0dae5;
    color: #5a6b7d;
    font-size: 12px;
  }
  .pdf-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #22d3ee;
    color: #003845;
    padding: 10px 18px;
    border-radius: 6px;
    font-weight: 700;
    text-decoration: none;
    font-size: 14px;
    margin-top: 12px;
  }
  .pdf-btn:hover { background: #06b6d4; color: #fff; }
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .loading { padding: 60px; text-align: center; color: #5a6b7d; font-size: 14px; }
  .err { padding: 40px; color: #c1272d; text-align: center; }
  @media (max-width: 720px) {
    .page { padding: 20px; }
    h1 { font-size: 24px; }
    .options-grid { grid-template-columns: 1fr; }
    .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .photo-cell img { height: 150px; }
    .cover-img { height: 220px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand-bar">
    <div class="brand-name">PLUS ULTRA ROOFING</div>
    <div class="brand-tag">Go Beyond. Go Plus Ultra.</div>
  </div>
  <div class="page" id="content">
    <div class="loading">Loading proposal…</div>
  </div>
  <div class="footer">Plus Ultra Roofing · Riverview NB · (506) 540-1052 · plusultraroofing.com</div>
</div>
<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')"><img id="lightboxImg" src=""></div>

<script>
async function loadProposal() {
  const params = new URLSearchParams(location.search);
  const share = params.get('share');
  const content = document.getElementById('content');

  if (!share) {
    content.innerHTML = '<div class="err">Missing ?share=&lt;token&gt; in URL.</div>';
    return;
  }

  try {
    const r = await fetch('/api/proposal?share=' + encodeURIComponent(share));
    if (!r.ok) throw new Error('Proposal not found');
    const data = await r.json();
    render(data);
  } catch (e) {
    content.innerHTML = '<div class="err">' + e.message + '</div>';
  }
}

function fmtMoney(n) {
  if (typeof n !== 'number') return '—';
  return '$' + n.toLocaleString('en-US');
}

function render(d) {
  const content = document.getElementById('content');
  // Photos from estimate_photos
  const photos = (d.media && d.media.gallery) || [];
  const cover = (d.customer && d.customer.coverImage) || (photos[0] && photos[0].img) || '';

  // calculated_packages → tier cards. Custom commercial schema (commercial_reroof, commercial_repair, commercial_stopgap)
  // Falls back gracefully if structure differs.
  const allTiers = (d.tiers && d.tiers.asphalt) || [];
  const tiers = allTiers.length ? allTiers : (d.media && d.media.tiers) || [];

  // Pull notes content for inspection findings (first note expected to be the structured scope writeup)
  // Notes from /api/proposal aren't surfaced directly — pull from rawNotes if present, else show empty findings
  const rawNotes = d.rawNotes || '';

  const customerName = (d.customer && d.customer.name) || 'Property Owner';
  const customerAddress = (d.customer && d.customer.address) || '';

  // Detect property by share token
  const isFoodBank = (d.shareToken || '').includes('-56');
  const isDickey = (d.shareToken || '').includes('-57');

  const title = isFoodBank ? 'Commercial Roof — 32 Church Street'
              : isDickey   ? 'Commercial Roof — 21 Dickey Street'
              : 'Commercial Roof Proposal';

  const subtitle = isFoodBank ? 'Inspection Report & Re-Roof Proposal · Amherst, Nova Scotia'
                 : isDickey   ? 'Inspection Report & Repair / Replacement Options · Amherst, Nova Scotia'
                 : 'Inspection Report & Pricing · Amherst, Nova Scotia';

  const roofArea = isFoodBank ? '~1,860 sqft (59 × 28 + 13 × 16)'
                 : isDickey   ? '~5,768 sqft (122 × 44 + two 25 × 8 protrusions)'
                 : '—';

  // Top findings (hardcoded per property — read from estimate notes/tags would be cleaner long-term)
  const findingsHtml = isFoodBank ? foodBankFindings()
                     : isDickey   ? dickeyFindings()
                     : '';
  const optionsHtml = isFoodBank ? foodBankOptions(tiers)
                    : isDickey   ? dickeyOptions(tiers)
                    : genericOptions(tiers);

  // Build photo sections
  let photosHtml = '';
  if (photos.length) {
    if (isFoodBank) {
      photosHtml = '<h2>Inspection Photos</h2>' + photoGrid(photos);
    } else if (isDickey) {
      // Group dickey photos into 3 sections
      const g1 = photos.slice(0, 6);
      const g2 = photos.slice(6, 12);
      const g3 = photos.slice(12, 18);
      photosHtml = '<h2>Inspection Photos</h2><div class="photo-section">'
        + '<h3>Field overview · seam failures · felt lifting</h3>' + photoGrid(g1)
        + '<h3>Flashing separation · cracked wood · interior leak zone</h3>' + photoGrid(g2)
        + '<h3>Field deterioration · spot repairs · entryway leak source</h3>' + photoGrid(g3)
        + '</div>';
    } else {
      photosHtml = '<h2>Inspection Photos</h2>' + photoGrid(photos);
    }
  }

  // PDF download link from proposals table (if linked)
  const pdfUrl = d.legacyPdfUrl || '';
  const pdfBtnHtml = pdfUrl ? `<a class="pdf-btn" href="${pdfUrl}" target="_blank" download>📄 Download PDF</a>` : '';

  // Optional Visual Walkthrough deck (Gamma) — set via estimates.custom_prices._gamma_deck_url
  const gammaUrl = d.gammaDeckUrl || '';
  const gammaLabel = d.gammaDeckLabel || 'View Visual Walkthrough';
  const gammaBtnHtml = gammaUrl
    ? `<a class="pdf-btn" href="${gammaUrl}" target="_blank" rel="noopener" style="background:#0a3a4e;color:#fff;margin-right:8px">▶ ${gammaLabel}</a>`
    : '';

  content.innerHTML = `
    <h1>${title}</h1>
    <div class="subtitle">${subtitle}</div>
    ${gammaBtnHtml ? `<div style="margin:14px 0 8px 0">${gammaBtnHtml}</div>` : ''}
    <div class="cover-meta">
      <span><strong>Prepared for:</strong></span><span>${customerName}</span>
      <span><strong>Property:</strong></span><span>${customerAddress}</span>
      <span><strong>Roof area:</strong></span><span>${roofArea}</span>
      <span><strong>Inspected:</strong></span><span>May 11, 2026 — Mackenzie Mazerolle, Plus Ultra Roofing</span>
      <span><strong>Proposal valid:</strong></span><span>30 days from issue</span>
    </div>
    ${cover ? `<img class="cover-img" src="${cover}" alt="Roof overview" onclick="openLightbox('${cover}')">` : ''}
    ${findingsHtml}
    ${photosHtml}
    <h2>Options & Pricing</h2>
    ${optionsHtml}
    <div class="next-step">
      <h3>Next Step</h3>
      <p>We'd like to walk the building together before locking final pricing. Available this week or next — let us know what mornings work.</p>
      <p style="margin-top:10px;">Mackenzie Mazerolle · Plus Ultra Roofing<br>
        <a href="tel:+15065401052">(506) 540-1052</a> · <a href="mailto:mackenzie.m@plusultraroofing.com">mackenzie.m@plusultraroofing.com</a></p>
    </div>
    ${pdfBtnHtml}
    <div class="footer-note">Pricing subject to deck condition findings on day one of tear-off. Any structural repairs required will be quoted in advance with photos before proceeding.</div>
  `;
}

function photoGrid(photos) {
  return '<div class="photo-grid">' + photos.map(p => {
    const cap = (p.desc || p.caption || '').trim();
    const isDanger = /entryway|leak source|active leak|critical/i.test(cap);
    return `<div class="photo-cell">
      <img src="${p.img || p.url}" alt="${cap}" onclick="openLightbox('${p.img || p.url}')">
      ${cap ? `<div class="photo-caption ${isDanger ? 'danger' : ''}">${cap}</div>` : ''}
    </div>`;
  }).join('') + '</div>';
}

function foodBankFindings() {
  return `
    <h2>The Core Problem</h2>
    <div class="key-finding">
      <div class="label">Critical finding</div>
      <div class="text">The roof assembly does not have a clearly identifiable waterproof membrane. We found loose gravel sitting directly on insulation/foam board, with no membrane layer between them. The two air-intake units are the loudest symptom of leaks, but water is finding its way through the entire field of the roof. <strong>Patching cannot fix this — there is nothing to patch onto.</strong> This roof has either fully decomposed past its waterproofing layer, or was originally installed without one. Either way, replacement is the only durable fix.</div>
    </div>
    <h2>Inspection Findings</h2>
    <table class="findings">
      <thead><tr><th>Issue</th><th>Location</th><th>Severity</th></tr></thead>
      <tbody>
        <tr><td>Two HVAC / air-intake unit curbs leaking actively</td><td>Roof centre</td><td class="sev-critical">ACTIVE LEAK</td></tr>
        <tr><td>Surrounding area saturated</td><td>Around air intakes</td><td class="sev-critical">ACTIVE LEAK</td></tr>
        <tr><td>No identifiable membrane layer in field</td><td>Entire roof</td><td class="sev-critical">CRITICAL</td></tr>
        <tr><td>Exposed foam board / cover board</td><td>Multiple areas</td><td class="sev-critical">CRITICAL</td></tr>
        <tr><td>Cracked sealant + lifted flashing overlap</td><td>Perimeter</td><td class="sev-high">HIGH</td></tr>
        <tr><td>Terminal bar pulling away from wall</td><td>Perimeter</td><td class="sev-high">HIGH</td></tr>
        <tr><td>Rolled roofing exposed beneath terminal bar</td><td>Wall transitions</td><td class="sev-high">HIGH</td></tr>
        <tr><td>Debris and safety hazards on roof surface</td><td>Various</td><td class="sev-mod">SAFETY HAZARD</td></tr>
      </tbody>
    </table>`;
}

function dickeyFindings() {
  return `
    <h2>Primary Leak Source — Identified</h2>
    <div class="key-finding">
      <div class="label">Pinpointed during walkthrough</div>
      <div class="text">Directly in front of the main entrance: two flashings close together, with the surrounding membrane <strong>soft and bubbling underfoot</strong>. This confirms wet insulation trapped beneath the membrane — the position aligns with the interior leak path. This is the source we can target with confidence. The interior floor depression at the door area aligns with this same zone and is flagged as a structural concern worth investigating before any work begins.</div>
    </div>
    <h2>Other Conditions Documented</h2>
    <table class="findings">
      <thead><tr><th>Issue</th><th>Severity</th></tr></thead>
      <tbody>
        <tr><td>Felt lifting and seam cracking across the field (multiple distinct points)</td><td class="sev-high">HIGH</td></tr>
        <tr><td>Open seam gaps at several locations</td><td class="sev-high">HIGH</td></tr>
        <tr><td>Holes in flashings; nails lifting at field areas</td><td class="sev-high">HIGH</td></tr>
        <tr><td>Wet insulation under membrane (~200-400 sqft beyond entryway)</td><td class="sev-high">HIGH</td></tr>
        <tr><td>Holes especially on bottom of units (lodging area roof sections)</td><td class="sev-high">HIGH</td></tr>
        <tr><td>Floor depression inside building under door area</td><td class="sev-critical">INVESTIGATE STRUCTURAL</td></tr>
        <tr><td>Tar buildup at flashings — years of band-aid patching</td><td class="sev-mod">MODERATE</td></tr>
        <tr><td>Excessive moss growth in low spots (ponding water)</td><td class="sev-mod">MODERATE</td></tr>
        <tr><td>Cracked exposed wood at perimeter</td><td class="sev-mod">MODERATE</td></tr>
        <tr><td>Gravel lumped at seams — sinking when stepped on</td><td class="sev-mod">MODERATE</td></tr>
      </tbody>
    </table>`;
}

function foodBankOptions(tiers) {
  return `
    <div class="options-grid">
      <div class="option-card recommended">
        <div class="tag">RECOMMENDED</div>
        <div class="name">Full Roof Replacement</div>
        <div class="price">$38,500 – $46,500</div>
        <div class="scope">Complete strip and rebuild from the deck up. <strong>20-year workmanship warranty.</strong></div>
        <ul>
          <li>Strip existing gravel, foam, and any remaining membrane</li>
          <li>Inspect and repair deck as needed</li>
          <li>New vapor barrier + R-30 polyiso insulation + ½" Densdeck cover board</li>
          <li>2-ply SBS modified bitumen membrane (base + cap)</li>
          <li>All new perimeter flashings + termination bars</li>
          <li>Both HVAC air-intake curbs rebuilt from scratch</li>
          <li>Full debris haul (gravel weight included)</li>
          <li>20-year Plus Ultra workmanship + manufacturer warranty (12-20 yrs)</li>
        </ul>
      </div>
      <div class="option-card">
        <div class="tag alt">BUDGET ALTERNATIVE</div>
        <div class="name">Stop-Bleed Repair</div>
        <div class="price">$10,000 – $14,000</div>
        <div class="scope"><strong>Buys 12–24 months only.</strong> Does not address the underlying assembly issue. We can do this work if grant/funding timing requires it, but you'll be back to a full re-roof within two years.</div>
        <ul>
          <li>Re-flash both HVAC air-intake curbs</li>
          <li>Reseal the worst 80 LF of perimeter flashings</li>
          <li>3–4 spot membrane patches at known failure points</li>
          <li>Pick up broken glass + debris</li>
        </ul>
      </div>
    </div>`;
}

function dickeyOptions(tiers) {
  return `
    <div class="options-grid">
      <div class="option-card">
        <div class="tag alt">TIER 1</div>
        <div class="name">Targeted Entryway Repair</div>
        <div class="price">$15,000 – $20,000</div>
        <div class="scope">Surgical fix on the identified entryway leak source. <strong>5–8 years of life</strong> on that section.</div>
        <ul>
          <li>Strip ~300 sqft around the entryway zone</li>
          <li>Remove + replace wet insulation</li>
          <li>New cover board + 2-ply SBS membrane patch with reinforced mesh perimeter</li>
          <li>Both entryway flashings stripped + rebuilt</li>
          <li>Reseal worst 100 LF of perimeter flashings</li>
          <li>Re-distribute gravel ballast over the repair zone</li>
        </ul>
      </div>
      <div class="option-card recommended">
        <div class="tag">RECOMMENDED — TIER 2</div>
        <div class="name">Full Replacement</div>
        <div class="price">$95,000 – $115,000</div>
        <div class="scope">Complete strip and rebuild on all 5,768 sqft. <strong>22-year life.</strong> Eliminates the entire field of risk.</div>
        <ul>
          <li>Remove all gravel ballast, membrane, and insulation</li>
          <li>Deck inspection + repair</li>
          <li>New vapor barrier + R-30 polyiso + ½" cover board</li>
          <li>2-ply SBS modified bitumen across entire field</li>
          <li>All new perimeter flashings + termination bars (~350 LF)</li>
          <li>Every HVAC curb + roof penetration re-flashed</li>
          <li>20-year Plus Ultra workmanship warranty</li>
        </ul>
      </div>
    </div>
    <h2>The Cost-Per-Year Math</h2>
    <div class="math-table">
      <table>
        <thead><tr><th>Option</th><th>Up-Front</th><th>Useful Life</th><th>Cost per Year</th></tr></thead>
        <tbody>
          <tr><td>Tier 1 — Targeted Repair</td><td>$17,500</td><td>7 years</td><td><strong>$2,500/yr</strong></td></tr>
          <tr><td>Tier 2 — Full Replacement</td><td>$105,000</td><td>22 years</td><td><strong>$4,770/yr</strong></td></tr>
        </tbody>
      </table>
    </div>
    <p style="font-size:14px; color:#475766; margin-top:8px;">Tier 1 has better cost-per-year on paper, but only if no other zone of the roof fails. Given the 91 documented conditions, the chance of another $15-25K repair within 5 years is high. Once you've spent $17K on this zone and $20K on the next one, the gap to full replacement has narrowed and you still have an aging roof.</p>`;
}

function genericOptions(tiers) {
  if (!tiers.length) return '<p>Pricing not configured yet. Contact us for a custom quote.</p>';
  return '<div class="options-grid">' + tiers.map(t => `
    <div class="option-card">
      <div class="name">${t.name || t.id || 'Option'}</div>
      <div class="price">${fmtMoney(t.total)}</div>
      <div class="scope">${t.desc || ''}</div>
    </div>
  `).join('') + '</div>';
}

function openLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}

loadProposal();
</script>
</body>
</html>
