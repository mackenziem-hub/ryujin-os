<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060a14">
<title>Sales Portal · Ryujin OS</title>
<link rel="icon" href="/assets/logo/icon.png" onerror="this.href='/assets/logo/logo-glow.jpg'">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<style>
:root{
  --bg:#060a14;--glass:rgba(20,30,50,0.85);--glass2:rgba(22,34,58,0.80);
  --glass-border:rgba(34,211,238,0.16);--glass-border-hi:rgba(34,211,238,0.35);
  --text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);
  --cyan:#22d3ee;--blue:#4a9eff;--purple:#7c3aed;
  --green:#4ade80;--yellow:#facc15;--red:#f87171;--orange:#fb923c;--gold:#fbbf24;
  --radius:12px;--sidebar-w:72px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;overflow-x:hidden}

.sidebar{width:var(--sidebar-w);background:rgba(8,12,24,0.98);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;bottom:0;z-index:50;box-shadow:2px 0 12px rgba(0,0,0,0.4)}
.sidebar-logo{width:44px;height:44px;margin:18px 0 12px;border-radius:12px;background:url('/assets/logo/logo-glow.jpg') center/cover;box-shadow:0 0 20px rgba(34,211,238,0.3);cursor:pointer}
.sidebar-divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;margin:4px 0 8px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid transparent;cursor:pointer;color:var(--text-dim);transition:all 0.25s;position:relative;text-decoration:none}
.nav-icon:hover{background:rgba(34,211,238,0.06);color:var(--text)}
.nav-icon.active{background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(124,58,237,0.06));color:var(--cyan);border-color:rgba(34,211,238,0.2);box-shadow:0 0 20px rgba(34,211,238,0.08)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:3px;background:var(--cyan);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--cyan)}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.main{margin-left:var(--sidebar-w);padding:18px 22px 60px;max-width:1600px}

.hq-header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.hq-title{flex:1;min-width:280px}
.hq-title .crumb{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hq-title h1{font-family:'Orbitron',monospace;font-size:1.7em;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,#e0e6f0 20%,var(--cyan) 70%,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hq-title .sub{font-size:0.85em;color:var(--text-dim);margin-top:6px}

.owner-pill-row{display:flex;align-items:center;gap:10px}
.owner-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:24px;background:var(--glass);border:1px solid var(--glass-border);font-size:0.78em;cursor:pointer;color:var(--text-dim);transition:all 0.2s;letter-spacing:0.4px;font-family:inherit}
.owner-pill:hover{border-color:var(--glass-border-hi);color:var(--text)}
.owner-pill.active{background:linear-gradient(135deg,rgba(34,211,238,0.14),rgba(124,58,237,0.08));color:var(--cyan);border-color:rgba(34,211,238,0.4)}
.owner-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan)}

/* Stat row */
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:18px}
.stat-tile{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
.stat-tile::before{content:'';position:absolute;bottom:-1px;right:-1px;width:18px;height:18px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);border-radius:0 0 var(--radius) 0;opacity:0.25}
.stat-label{font-family:'Orbitron',monospace;font-size:0.6em;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px}
.stat-value{font-family:'Orbitron',monospace;font-size:1.6em;font-weight:800;line-height:1.1;color:var(--text)}
.stat-value.cyan{color:var(--cyan)}
.stat-value.green{color:var(--green)}
.stat-value.gold{color:var(--gold)}
.stat-value.purple{color:#a78bfa}

/* Commission strip */
.comm-strip{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:14px 18px;margin-bottom:18px;
  display:flex;flex-wrap:wrap;gap:24px;align-items:center;position:relative;overflow:hidden;
}
.comm-strip::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold) 30%,var(--cyan) 70%,transparent);opacity:0.6}
.comm-strip h3{font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:2.5px;color:var(--text-dim);text-transform:uppercase}
.comm-tile{display:flex;flex-direction:column;gap:2px;min-width:140px}
.comm-tile .v{font-family:'Orbitron',monospace;font-size:1.3em;font-weight:800;color:var(--text)}
.comm-tile .v.gold{color:var(--gold)}
.comm-tile .v.green{color:var(--green)}
.comm-tile .v.cyan{color:var(--cyan)}
.comm-tile .l{font-family:'Orbitron',monospace;font-size:0.58em;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase}

/* Section head */
.section-head{display:flex;align-items:baseline;gap:10px;margin:22px 0 10px;font-family:'Orbitron',monospace}
.section-head h2{font-size:0.78em;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.section-head .count-pill{font-size:0.65em;font-family:'Share Tech Mono',monospace;padding:2px 8px;border-radius:10px;background:rgba(34,211,238,0.1);border:1px solid var(--glass-border);color:var(--cyan)}

/* Pipeline columns */
.pipeline-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:1100px){.pipeline-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.pipeline-grid{grid-template-columns:1fr}}
.pipe-col{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:12px;min-height:200px;
  position:relative;overflow:hidden;
}
.pipe-col::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0.7}
.pipe-col.sent::before{background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.pipe-col.approved::before{background:linear-gradient(90deg,transparent,#a78bfa,transparent)}
.pipe-col.scheduled::before{background:linear-gradient(90deg,transparent,var(--orange),transparent)}
.pipe-col.won::before{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.pipe-col h3{font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.pipe-col h3 .num{font-size:1.1em;color:var(--text)}
.pipe-card{
  background:rgba(6,10,20,0.4);border:1px solid var(--glass-border);
  border-radius:8px;padding:8px 10px;font-size:0.78em;margin-bottom:6px;cursor:pointer;
  transition:all 0.2s;
}
.pipe-card:hover{border-color:var(--glass-border-hi)}
.pipe-card .name{font-weight:600;color:var(--text);margin-bottom:2px}
.pipe-card .num{font-family:'Share Tech Mono',monospace;font-size:0.85em;color:var(--text-dim)}
.pipe-card .price{font-family:'Orbitron',monospace;font-size:0.95em;color:var(--cyan);font-weight:700;margin-top:2px}

/* Follow-ups */
.fu-list{display:flex;flex-direction:column;gap:6px}
.fu-row{
  display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center;
  background:var(--glass);border:1px solid rgba(248,113,113,0.25);
  border-radius:8px;padding:10px 14px;font-size:0.85em;
}
.fu-row.cold{border-color:rgba(248,113,113,0.4);background:rgba(248,113,113,0.04)}
.fu-name{font-weight:600;color:var(--text)}
.fu-meta{font-family:'Share Tech Mono',monospace;font-size:0.78em;color:var(--text-dim);letter-spacing:0.5px;margin-top:2px}
.fu-stale{font-family:'Orbitron',monospace;font-size:0.7em;color:var(--orange);font-weight:700}
.fu-stale.cold{color:var(--red)}
.fu-price{font-family:'Orbitron',monospace;font-weight:700;color:var(--cyan);font-size:0.92em}
.fu-actions{display:flex;gap:4px}
.fu-actions a{
  background:transparent;border:1px solid var(--glass-border);color:var(--text-dim);
  width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  text-decoration:none;transition:all 0.2s;
}
.fu-actions a:hover{color:var(--cyan);border-color:var(--glass-border-hi)}
.fu-actions svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* Timeline */
.timeline{display:flex;flex-direction:column;gap:5px}
.tl-row{
  display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;
  background:rgba(6,10,20,0.35);border:1px solid var(--glass-border);
  border-radius:8px;padding:7px 12px;font-size:0.78em;
}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tl-dot.created{background:var(--text-dim)}
.tl-dot.approved{background:#a78bfa}
.tl-dot.scheduled{background:var(--orange)}
.tl-dot.won{background:var(--green);box-shadow:0 0 6px var(--green)}
.tl-text{color:var(--text)}
.tl-text .kind{font-family:'Share Tech Mono',monospace;font-size:0.78em;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-right:6px}
.tl-time{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-muted);letter-spacing:0.5px}

/* Empty / loading */
.empty-state{text-align:center;padding:18px;color:var(--text-dim);border:1px dashed var(--glass-border);border-radius:var(--radius);font-size:0.85em}
.empty-state .ico{font-size:1.4em;margin-bottom:5px;opacity:0.5}
.skeleton{background:linear-gradient(90deg,var(--glass) 0%,var(--glass2) 50%,var(--glass) 100%);background-size:200% 100%;animation:sk 1.4s infinite;border:1px solid var(--glass-border);border-radius:var(--radius);height:60px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

.banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);font-size:0.8em;margin-bottom:14px;line-height:1.4}
.banner.warn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:var(--orange)}
.banner.info{background:rgba(34,211,238,0.06);border:1px solid var(--glass-border);color:var(--text-dim)}
.banner code{font-family:'Share Tech Mono',monospace;background:rgba(0,0,0,0.3);padding:1px 6px;border-radius:4px;color:var(--text)}

@media(max-width:768px){
  .main{padding:12px}
  .hq-title h1{font-size:1.3em}
}
</style>
<script src="/assets/sales-toolbar.js" defer></script>
  <script src="/assets/ryujin-slug.js"></script>
</head>
<body>

<aside class="sidebar">
  <a href="/admin.html" class="sidebar-logo" title="Admin Home"></a>
  <div class="sidebar-divider"></div>
  <nav class="sidebar-nav">
    <a href="/admin-overview.html" class="nav-icon" title="Overview"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg></a>
    <a href="/admin-quests.html" class="nav-icon" title="Quests"><svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M21 12c0 5-4 9-9 9s-9-4-9-9 4-9 9-9c2 0 4 1 5 2"/></svg></a>
    <a href="/admin-agents.html" class="nav-icon" title="Agents"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-2a8 8 0 0116 0v2"/></svg></a>
    <a href="/sales-portal.html" class="nav-icon active" title="Sales"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9a4 4 0 100 8h6a4 4 0 110 8H6"/></svg></a>
    <a href="/admin-power.html" class="nav-icon" title="Power Level"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h7l-1 8 10-12h-7z"/></svg></a>
    <a href="/admin.html" class="nav-icon" title="Full Admin"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></a>
  </nav>
</aside>

<main class="main">

  <div class="hq-header">
    <div class="hq-title">
      <div class="crumb" id="crumb">Admin · Sales</div>
      <h1 id="ownerHeading">Sales Portal</h1>
      <div class="sub" id="ownerSub">Pipeline, commissions, and follow-ups for the selected sales owner.</div>
    </div>
    <div class="owner-pill-row" id="ownerPills">
      <button class="owner-pill active" data-owner="darcy"><span class="dot"></span>Darcy</button>
      <button class="owner-pill" data-owner="mac"><span class="dot"></span>Mac</button>
    </div>
  </div>

  <div id="banner-slot"></div>

  <!-- Stats row -->
  <div class="stat-row" id="statRow">
    <div class="skeleton" style="height:80px"></div>
    <div class="skeleton" style="height:80px"></div>
    <div class="skeleton" style="height:80px"></div>
    <div class="skeleton" style="height:80px"></div>
  </div>

  <!-- Commission -->
  <div class="comm-strip" id="commStrip">
    <h3>Commission</h3>
    <div class="comm-tile"><div class="v cyan" id="cmPending">—</div><div class="l">Pending</div></div>
    <div class="comm-tile"><div class="v gold" id="cmMonth">—</div><div class="l">Signed This Month</div></div>
    <div class="comm-tile"><div class="v green" id="cmLifetime">—</div><div class="l">Lifetime Signed</div></div>
  </div>

  <!-- Pipeline -->
  <div class="section-head">
    <h2>Pipeline</h2>
    <span class="count-pill" id="pipeCount">—</span>
  </div>
  <div class="pipeline-grid" id="pipelineGrid"></div>

  <!-- Follow-ups -->
  <div class="section-head" style="margin-top:24px">
    <h2>Follow-ups Needed</h2>
    <span class="count-pill" id="fuCount">—</span>
  </div>
  <div class="fu-list" id="fuList"></div>

  <!-- Recent activity -->
  <div class="section-head" style="margin-top:24px">
    <h2>Recent Activity</h2>
    <span class="count-pill" id="tlCount">—</span>
  </div>
  <div class="timeline" id="timelineList"></div>

</main>

<script>
const TENANT = window.RYUJIN_TENANT_SLUG;
let owner = new URLSearchParams(location.search).get('owner') || localStorage.getItem('sales_portal_owner') || 'darcy';

function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtMoney(n) { if (n == null || isNaN(n)) return '—'; return '$' + Math.round(n).toLocaleString(); }
function fmtRel(iso) {
  if (!iso) return '';
  const dt = Date.now() - new Date(iso).getTime();
  if (dt < 60000) return 'just now';
  if (dt < 3600000) return Math.floor(dt / 60000) + 'm ago';
  if (dt < 86400000) return Math.floor(dt / 3600000) + 'h ago';
  return Math.floor(dt / 86400000) + 'd ago';
}

function showBanner(msg, isHtml=false) {
  const slot = document.getElementById('banner-slot');
  if (isHtml) slot.innerHTML = `<div class="banner warn">${msg}</div>`;
  else slot.innerHTML = `<div class="banner warn">${escapeHtml(msg)}</div>`;
}

function renderOwnerPills() {
  document.querySelectorAll('.owner-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.owner === owner);
  });
  const cap = owner.charAt(0).toUpperCase() + owner.slice(1);
  document.getElementById('ownerHeading').textContent = `${cap}'s Sales Portal`;
  document.getElementById('crumb').textContent = `Admin · Sales · ${cap}`;
}

function renderStats(s) {
  const row = document.getElementById('statRow');
  row.innerHTML = `
    <div class="stat-tile"><div class="stat-label">In-Flight</div><div class="stat-value cyan">${s.inFlight || 0}</div></div>
    <div class="stat-tile"><div class="stat-label">Pipeline Value</div><div class="stat-value">${fmtMoney(s.pipelineValue)}</div></div>
    <div class="stat-tile"><div class="stat-label">Won</div><div class="stat-value green">${s.won || 0}</div></div>
    <div class="stat-tile"><div class="stat-label">Close Rate</div><div class="stat-value gold">${s.closeRate != null ? s.closeRate + '%' : '—'}</div></div>
  `;
}

function renderCommission(c) {
  document.getElementById('cmPending').textContent = fmtMoney(c.pending);
  document.getElementById('cmMonth').textContent = fmtMoney(c.signed_this_month);
  document.getElementById('cmLifetime').textContent = fmtMoney(c.lifetime);
}

function renderPipeline(p) {
  const cols = [
    { key: 'sent', label: 'Sent', items: p.sent || [] },
    { key: 'approved', label: 'Approved', items: p.approved || [] },
    { key: 'scheduled', label: 'Scheduled', items: p.scheduled || [] },
    { key: 'won', label: 'Won', items: p.won || [] }
  ];
  const total = cols.reduce((s, c) => s + c.items.length, 0);
  document.getElementById('pipeCount').textContent = total;
  document.getElementById('pipelineGrid').innerHTML = cols.map(col => `
    <div class="pipe-col ${col.key}">
      <h3>${col.label} <span class="num">${col.items.length}</span></h3>
      ${col.items.length === 0
        ? `<div class="empty-state" style="padding:14px"><div style="font-size:0.85em">None</div></div>`
        : col.items.slice(0, 8).map(e => `
          <div class="pipe-card">
            <div class="name">${escapeHtml(e.customer || '—')}</div>
            <div class="num">est ${escapeHtml(e.estimate_number || e.id?.slice(0, 8) || '')}</div>
            <div class="price">${fmtMoney(e.selling_price)}</div>
          </div>
        `).join('')
      }
      ${col.items.length > 8 ? `<div style="text-align:center;color:var(--text-dim);font-size:0.78em;margin-top:4px">+${col.items.length - 8} more</div>` : ''}
    </div>
  `).join('');
}

function renderFollowUps(list) {
  document.getElementById('fuCount').textContent = list.length;
  const el = document.getElementById('fuList');
  if (list.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="ico">✓</div>No stale proposals — pipeline is clean.</div>`;
    return;
  }
  el.innerHTML = list.map(f => {
    const cold = f.days_stale >= 7;
    return `
      <div class="fu-row ${cold ? 'cold' : ''}">
        <div>
          <div class="fu-name">${escapeHtml(f.customer)}</div>
          <div class="fu-meta">est ${escapeHtml(f.estimate_number || '')} · ${escapeHtml(f.address || 'no address')}</div>
        </div>
        <div class="fu-price">${fmtMoney(f.selling_price)}</div>
        <div class="fu-stale ${cold ? 'cold' : ''}">${f.days_stale}d stale</div>
        <div class="fu-actions">
          ${f.phone ? `<a href="tel:${escapeHtml(f.phone)}" title="Call"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg></a>` : ''}
          ${f.email ? `<a href="mailto:${escapeHtml(f.email)}" title="Email"><svg viewBox="0 0 24 24"><path d="M4 4h16c1 0 2 1 2 2v12c0 1-1 2-2 2H4c-1 0-2-1-2-2V6c0-1 1-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg></a>` : ''}
        </div>
      </div>`;
  }).join('');
}

function renderTimeline(list) {
  document.getElementById('tlCount').textContent = list.length;
  const el = document.getElementById('timelineList');
  if (list.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="ico">·</div>No recent activity.</div>`;
    return;
  }
  el.innerHTML = list.map(e => `
    <div class="tl-row">
      <div class="tl-dot ${e.kind}"></div>
      <div class="tl-text"><span class="kind">${escapeHtml(e.kind)}</span>${escapeHtml(e.customer || '—')} <span style="color:var(--text-muted);font-size:0.85em">· est ${escapeHtml(e.estimate_number || '')}</span></div>
      <div class="tl-time">${fmtRel(e.at)}</div>
    </div>
  `).join('');
}

async function load() {
  renderOwnerPills();
  try {
    const resp = await fetch(`/api/sales-portal?owner=${encodeURIComponent(owner)}`, { headers: { 'x-tenant-id': TENANT } });
    if (!resp.ok) {
      const txt = await resp.text();
      showBanner(`Could not load sales data: HTTP ${resp.status} — ${txt.slice(0, 200)}`);
      return;
    }
    const data = await resp.json();
    document.getElementById('banner-slot').innerHTML = '';
    renderStats(data.stats || {});
    renderCommission(data.commission || {});
    renderPipeline(data.pipeline || {});
    renderFollowUps(data.followUps || []);
    renderTimeline(data.timeline || []);
  } catch (e) {
    showBanner(`Network error: ${e.message}`);
  }
}

document.querySelectorAll('.owner-pill').forEach(p => {
  p.addEventListener('click', () => {
    owner = p.dataset.owner;
    localStorage.setItem('sales_portal_owner', owner);
    history.replaceState(null, '', `?owner=${owner}`);
    load();
  });
});

load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
