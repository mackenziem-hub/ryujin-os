<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060a14">
<title>Leads · Marketing · Ryujin OS</title>
<!-- Auth gate: tokenless users bounce to /login before any logic runs -->
<script src="/assets/auth-guard.js"></script>
<link rel="icon" href="/assets/logo/icon.png" onerror="this.href='/assets/logo/logo-glow.jpg'">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=optional" rel="stylesheet">
<style>
:root{
  --bg:#060a14;--glass:rgba(20,30,50,0.85);--glass2:rgba(22,34,58,0.80);
  --glass-border:rgba(34,211,238,0.16);--glass-border-hi:rgba(34,211,238,0.35);
  --text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);
  --cyan:#22d3ee;--blue:#4a9eff;--purple:#7c3aed;
  --green:#4ade80;--yellow:#facc15;--red:#f87171;--orange:#fb923c;--gold:#fbbf24;
  --radius:12px;--sidebar-w:72px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;overflow-x:hidden}

.sidebar{width:var(--sidebar-w);background:rgba(8,12,24,0.98);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;bottom:0;z-index:50;box-shadow:2px 0 12px rgba(0,0,0,0.4)}
.sidebar-logo{width:44px;height:44px;margin:18px 0 12px;border-radius:12px;background:url('/assets/logo/logo-glow.jpg') center/cover;box-shadow:0 0 20px rgba(34,211,238,0.3);cursor:pointer}
.sidebar-divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;margin:4px 0 8px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid transparent;cursor:pointer;color:var(--text-dim);transition:all 0.25s;position:relative;text-decoration:none}
.nav-icon:hover{background:rgba(34,211,238,0.06);color:var(--text)}
.nav-icon.active{background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(124,58,237,0.06));color:var(--cyan);border-color:rgba(34,211,238,0.2);box-shadow:0 0 20px rgba(34,211,238,0.08)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:3px;background:var(--cyan);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--cyan)}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.main{margin-left:var(--sidebar-w);padding:18px 22px 60px;max-width:1600px}

.hq-header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.hq-title{flex:1;min-width:280px}
.hq-title .crumb{font-family:'JetBrains Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hq-title h1{font-family:'Inter',monospace;font-size:1.7em;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,#e0e6f0 20%,var(--cyan) 70%,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hq-title .sub{font-size:0.85em;color:var(--text-dim);margin-top:6px}

.hq-actions{display:flex;align-items:center;gap:10px}
.btn{font-family:'Inter',monospace;font-size:0.7em;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:8px 16px;border-radius:18px;cursor:pointer;border:1px solid var(--glass-border);background:transparent;color:var(--text-dim);transition:all 0.2s}
.btn:hover{color:var(--text);border-color:var(--glass-border-hi)}
.btn.primary{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#0a0e1a;border:none;box-shadow:0 0 12px rgba(34,211,238,0.3)}
.btn.primary:hover{box-shadow:0 0 18px rgba(34,211,238,0.5)}

/* KPI rail (top of page) */
.kpi-rail{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:18px}
.kpi-tile{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
.kpi-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.45}
.kpi-tile::after{content:'';position:absolute;bottom:-1px;right:-1px;width:18px;height:18px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);border-radius:0 0 var(--radius) 0;opacity:0.25}
.kpi-label{font-family:'Inter',monospace;font-size:0.6em;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px}
.kpi-value{font-family:'Inter',monospace;font-size:1.6em;font-weight:800;color:var(--text);line-height:1.1}
.kpi-value.cyan{color:var(--cyan)}
.kpi-value.green{color:var(--green)}
.kpi-value.purple{color:#a78bfa}
.kpi-value.gold{color:var(--gold)}

/* Filter bar */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:10px 12px;position:relative;overflow:hidden}
.filter-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan) 50%,transparent);opacity:0.4}
.label{font-family:'Inter',monospace;font-size:0.6em;letter-spacing:1.8px;color:var(--text-muted);text-transform:uppercase;margin-right:6px}
.fchip{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:18px;background:rgba(6,10,20,0.4);border:1px solid var(--glass-border);font-size:0.72em;cursor:pointer;color:var(--text-dim);transition:all 0.2s;font-family:inherit;letter-spacing:0.3px}
.fchip:hover{border-color:var(--glass-border-hi);color:var(--text)}
.fchip.active{background:linear-gradient(135deg,rgba(34,211,238,0.14),rgba(124,58,237,0.08));color:var(--cyan);border-color:rgba(34,211,238,0.4)}
.search-input{background:rgba(6,10,20,0.5);border:1px solid var(--glass-border);color:var(--text);padding:7px 12px;border-radius:18px;font-size:0.78em;font-family:inherit;min-width:200px;flex:1;max-width:320px;outline:none;margin-left:auto}
.search-input::placeholder{color:var(--text-muted)}
.search-input:focus{border-color:var(--glass-border-hi)}

/* Section head */
.section-head{display:flex;align-items:baseline;gap:10px;margin:18px 0 10px;font-family:'Inter',monospace}
.section-head h2{font-size:0.78em;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.section-head .count-pill{font-size:0.65em;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:10px;background:rgba(34,211,238,0.1);border:1px solid var(--glass-border);color:var(--cyan)}

/* Lead rows */
.lead-list{display:flex;flex-direction:column;gap:6px}
.lead-row{
  display:grid;grid-template-columns:1fr auto auto auto auto;gap:14px;align-items:center;
  background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);
  padding:12px 14px;transition:all 0.2s;
}
.lead-row:hover{border-color:var(--glass-border-hi)}
.lead-info{min-width:0}
.lead-name{font-weight:600;color:var(--text);font-size:0.95em;margin-bottom:2px}
.lead-meta{font-family:'JetBrains Mono',monospace;font-size:0.75em;color:var(--text-dim);letter-spacing:0.5px;display:flex;gap:10px;flex-wrap:wrap}
.lead-meta span{white-space:nowrap}
.lead-source-pill{font-family:'JetBrains Mono',monospace;font-size:0.62em;letter-spacing:1.4px;text-transform:uppercase;padding:2px 7px;border-radius:8px;background:rgba(34,211,238,0.1);color:var(--cyan);border:1px solid var(--glass-border)}
.lead-source-pill.instant_estimator{background:rgba(74,222,128,0.1);color:var(--green);border-color:rgba(74,222,128,0.25)}
.lead-source-pill.manual{background:rgba(140,170,220,0.08);color:var(--text-dim);border-color:var(--glass-border)}
.lead-source-pill.facebook,.lead-source-pill.fb_ad{background:rgba(74,158,255,0.1);color:var(--blue);border-color:rgba(74,158,255,0.25)}
.lead-source-pill.google,.lead-source-pill.google_ads{background:rgba(251,191,36,0.1);color:var(--gold);border-color:rgba(251,191,36,0.25)}
.lead-age{font-family:'Inter',monospace;font-size:0.78em;color:var(--text-dim);font-weight:600}
.lead-age.fresh{color:var(--green)}
.lead-age.cold{color:var(--orange)}
.lead-age.dead{color:var(--red)}
.lead-actions{display:flex;gap:4px}
.lead-actions a,.lead-actions button{
  background:transparent;border:1px solid var(--glass-border);color:var(--text-dim);
  width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  text-decoration:none;cursor:pointer;transition:all 0.2s;
}
.lead-actions a:hover,.lead-actions button:hover{color:var(--cyan);border-color:var(--glass-border-hi);background:rgba(34,211,238,0.06)}
.lead-actions svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.empty-state{text-align:center;padding:30px 16px;color:var(--text-dim);border:1px dashed var(--glass-border);border-radius:var(--radius);font-size:0.85em}
.empty-state .ico{font-size:1.8em;margin-bottom:6px;opacity:0.5}
.skeleton{background:linear-gradient(90deg,var(--glass) 0%,var(--glass2) 50%,var(--glass) 100%);background-size:200% 100%;animation:sk 1.4s infinite;border:1px solid var(--glass-border);border-radius:var(--radius);height:64px;margin-bottom:6px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

.banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);font-size:0.8em;margin-bottom:14px;line-height:1.4}
.banner.warn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:var(--orange)}
.banner code{font-family:'JetBrains Mono',monospace;background:rgba(0,0,0,0.3);padding:1px 6px;border-radius:4px;color:var(--text)}

@media(max-width:768px){
  .main{padding:12px}
  .hq-title h1{font-size:1.3em}
  .lead-row{grid-template-columns:1fr auto;gap:10px}
  .lead-row .lead-source-pill,.lead-row .lead-age{grid-column:1/-1;justify-self:start}
}
</style>
<script src="/assets/marketing-toolbar.js" defer></script>
  <script src="/assets/ryujin-slug.js"></script>
</head>
<body>

<aside class="sidebar">
  <a href="/admin.html" class="sidebar-logo" title="Admin Home"></a>
  <div class="sidebar-divider"></div>
  <nav class="sidebar-nav">
    <a href="/admin-overview.html" class="nav-icon" title="Overview"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg></a>
    <a href="/admin-quests.html" class="nav-icon" title="Quests"><svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M21 12c0 5-4 9-9 9s-9-4-9-9 4-9 9-9c2 0 4 1 5 2"/></svg></a>
    <a href="/admin-agents.html" class="nav-icon" title="Agents"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-2a8 8 0 0116 0v2"/></svg></a>
    <a href="/marketing.html" class="nav-icon active" title="Marketing"><svg viewBox="0 0 24 24"><path d="M3 11l18-9v18l-18-9zM7 13v6"/></svg></a>
    <a href="/sales-portal.html" class="nav-icon" title="Sales"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9a4 4 0 100 8h6a4 4 0 110 8H6"/></svg></a>
    <a href="/admin.html" class="nav-icon" title="Full Admin"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></a>
  </nav>
</aside>

<main class="main">

  <div class="hq-header">
    <div class="hq-title">
      <div class="crumb">Marketing · Leads</div>
      <h1>Leads</h1>
      <div class="sub">Live GHL contact flow. Filter by source, search by name, click to call/text/email.</div>
    </div>
    <div class="hq-actions">
      <button class="btn" id="btnRefresh">↻ Refresh</button>
      <a class="btn primary" href="/marketing.html">← Back to Marketing</a>
    </div>
  </div>

  <div id="banner-slot"></div>

  <!-- KPI rail -->
  <div class="kpi-rail" id="kpiRail">
    <div class="skeleton" style="height:80px"></div>
    <div class="skeleton" style="height:80px"></div>
    <div class="skeleton" style="height:80px"></div>
    <div class="skeleton" style="height:80px"></div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <span class="label">Source</span>
    <button class="fchip active" data-src="">All</button>
    <button class="fchip" data-src="instant_estimator">Instant Estimator</button>
    <button class="fchip" data-src="facebook">Facebook</button>
    <button class="fchip" data-src="google">Google</button>
    <button class="fchip" data-src="manual">Manual</button>
    <span class="label" style="margin-left:14px">Window</span>
    <button class="fchip active" data-days="30">30d</button>
    <button class="fchip" data-days="7">7d</button>
    <button class="fchip" data-days="1">24h</button>
    <input class="search-input" id="searchInput" placeholder="Search by name, email, phone…" />
  </div>

  <!-- Lead rows -->
  <div class="section-head">
    <h2>Leads</h2>
    <span class="count-pill" id="leadCount">—</span>
  </div>
  <div class="lead-list" id="leadList">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

</main>

<script>
const TENANT = window.RYUJIN_TENANT_SLUG;
let activeSource = '';
let activeDays = 30;
let searchTerm = '';
let cache = [];

function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtAge(iso) {
  if (!iso) return { label: '—', cls: '' };
  const dt = Date.now() - new Date(iso).getTime();
  if (dt < 60000) return { label: 'just now', cls: 'fresh' };
  if (dt < 3600000) return { label: Math.floor(dt / 60000) + 'm ago', cls: 'fresh' };
  if (dt < 86400000) return { label: Math.floor(dt / 3600000) + 'h ago', cls: 'fresh' };
  const days = Math.floor(dt / 86400000);
  if (days < 3) return { label: days + 'd ago', cls: '' };
  if (days < 14) return { label: days + 'd ago', cls: 'cold' };
  return { label: days + 'd ago', cls: 'dead' };
}
function showBanner(msg, isHtml=false) {
  const slot = document.getElementById('banner-slot');
  if (isHtml) slot.innerHTML = `<div class="banner warn">${msg}</div>`;
  else slot.innerHTML = `<div class="banner warn">${escapeHtml(msg)}</div>`;
}

function pillClass(src) {
  if (!src) return '';
  if (src.includes('instant')) return 'instant_estimator';
  if (src.includes('manual')) return 'manual';
  if (src.includes('fb') || src.includes('facebook')) return 'facebook';
  if (src.includes('google')) return 'google';
  return '';
}

function pickSource(c) {
  // Prefer a 'source:<x>' tag, fallback to c.source field
  const tag = (c.tags || []).find(t => typeof t === 'string' && t.startsWith('source:'));
  if (tag) return tag.slice(7);
  return c.source || 'unknown';
}

function renderKpis(stats) {
  document.getElementById('kpiRail').innerHTML = `
    <div class="kpi-tile"><div class="kpi-label">Total (${activeDays}d)</div><div class="kpi-value cyan">${stats.total ?? 0}</div></div>
    <div class="kpi-tile"><div class="kpi-label">Last 24h</div><div class="kpi-value green">${stats.last_24h ?? 0}</div></div>
    <div class="kpi-tile"><div class="kpi-label">Last 7d</div><div class="kpi-value purple">${stats.last_7d ?? 0}</div></div>
    <div class="kpi-tile"><div class="kpi-label">Top Source</div><div class="kpi-value gold" style="font-size:1em;letter-spacing:0.5px">${topSource(stats.sources)}</div></div>
  `;
}
function topSource(srcMap) {
  if (!srcMap) return '—';
  const entries = Object.entries(srcMap);
  if (entries.length === 0) return '—';
  entries.sort((a, b) => b[1] - a[1]);
  return `${entries[0][0]} (${entries[0][1]})`;
}

function renderLeads(list) {
  document.getElementById('leadCount').textContent = list.length;
  const el = document.getElementById('leadList');
  if (list.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="ico">◇</div>No leads match the current filters.</div>`;
    return;
  }
  el.innerHTML = list.map(c => {
    const age = fmtAge(c.date_added || c.last_activity);
    const src = pickSource(c);
    return `
      <div class="lead-row">
        <div class="lead-info">
          <div class="lead-name">${escapeHtml(c.name)}</div>
          <div class="lead-meta">
            ${c.email ? `<span>${escapeHtml(c.email)}</span>` : ''}
            ${c.phone ? `<span>${escapeHtml(c.phone)}</span>` : ''}
            ${c.city ? `<span>${escapeHtml(c.city)}</span>` : ''}
          </div>
        </div>
        <div class="lead-source-pill ${pillClass(src)}">${escapeHtml(src)}</div>
        <div class="lead-age ${age.cls}">${age.label}</div>
        <div class="lead-actions">
          ${c.phone ? `<a href="tel:${escapeHtml(c.phone)}" title="Call"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg></a>` : ''}
          ${c.phone ? `<a href="sms:${escapeHtml(c.phone)}" title="Text"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></a>` : ''}
          ${c.email ? `<a href="mailto:${escapeHtml(c.email)}" title="Email"><svg viewBox="0 0 24 24"><path d="M4 4h16c1 0 2 1 2 2v12c0 1-1 2-2 2H4c-1 0-2-1-2-2V6c0-1 1-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg></a>` : ''}
        </div>
      </div>`;
  }).join('');
}

function applyFilters() {
  const term = searchTerm.toLowerCase().trim();
  return cache.filter(c => {
    if (activeSource) {
      const src = pickSource(c);
      if (src !== activeSource) return false;
    }
    if (term) {
      const blob = `${c.name} ${c.email || ''} ${c.phone || ''} ${c.city || ''}`.toLowerCase();
      if (!blob.includes(term)) return false;
    }
    return true;
  });
}

async function load() {
  const params = new URLSearchParams();
  if (activeSource) params.set('source', activeSource);
  params.set('since_days', String(activeDays));
  try {
    const resp = await fetch(`/api/leads?${params}`, { headers: { 'x-tenant-id': TENANT } });
    if (!resp.ok) {
      const txt = await resp.text();
      if (resp.status === 502 && /GHL/.test(txt)) {
        showBanner(`GHL is unreachable. Check GHL_TOKEN and connectivity.`);
      } else {
        showBanner(`Could not load leads: HTTP ${resp.status} — ${txt.slice(0, 200)}`);
      }
      cache = [];
      renderKpis({});
      renderLeads([]);
      return;
    }
    const data = await resp.json();
    cache = data.contacts || [];
    document.getElementById('banner-slot').innerHTML = '';
    renderKpis(data.stats || {});
    renderLeads(applyFilters());
  } catch (e) {
    showBanner(`Network error: ${e.message}`);
  }
}

document.querySelectorAll('.fchip[data-src]').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.fchip[data-src]').forEach(x => x.classList.toggle('active', x === c));
    activeSource = c.dataset.src;
    load();
  });
});
document.querySelectorAll('.fchip[data-days]').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.fchip[data-days]').forEach(x => x.classList.toggle('active', x === c));
    activeDays = parseInt(c.dataset.days);
    load();
  });
});
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value;
  renderLeads(applyFilters());
});
document.getElementById('btnRefresh').addEventListener('click', load);

load();
setInterval(load, 60 * 1000);
</script>
</body>
</html>
