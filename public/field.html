<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0c0f">
<title>Plus Ultra — Field</title>
<style>#ry-mode-badge{display:none !important}</style>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
// Opt OUT of the operator-cockpit chrome that auth-guard injects fleet-wide
// (Ryujin Drive AI overlay, global-nav pill, Cmd-K palette, unread badges,
// prefetch, skin). This is a crew field app, not the admin OS, and it has its
// own scoped assistant + nav. Setting these guard flags before auth-guard runs
// makes its `if(!flag)` injections no-op. Auth REDIRECT still runs.
window.__ryujinDriveMounted=true; window.__ryujinGlobalNavInjected=true;
window.__ryujinPaletteInjected=true; window.__ryujinUnreadInjected=true;
window.__ryujinPrefetchInjected=true; window.__ryujinSkinInjected=true;
</script>
<script src="/assets/auth-guard.js"></script>
<script src="/assets/ryujin-slug.js"></script>
<style>
  :root{
    --bg:#0b0c0f; --surface:#14161b; --surface-2:#1a1d24; --row:#15171d;
    --border:#252932; --border-hi:#39404c;
    --text:#eceef2; --dim:#9aa2ae; --faint:#646b76;
    --accent:#5b9dff; --accent-dim:rgba(91,157,255,0.14);
    --blueprint:#5fc4e6; --bp-dim:rgba(95,196,230,0.12);
    --green:#56d68c; --amber:#f0a64f; --red:#f4736b;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
    --sans:Inter,system-ui,-apple-system,sans-serif; --r:12px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;padding-bottom:88px;line-height:1.4;min-height:100vh}
  .bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:54px;background:rgba(11,12,15,0.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
  .bar .brand{font-weight:700;font-size:14px;letter-spacing:.3px}.bar .brand span{color:var(--blueprint)}
  .bar .right{display:flex;align-items:center;gap:13px}
  .inbox,.aibtn{position:relative;cursor:pointer;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
  .inbox:hover,.aibtn:hover{border-color:var(--border-hi);background:var(--surface-2)}
  .inbox svg{width:18px;height:18px;stroke:var(--dim);fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .aibtn svg{width:19px;height:19px;fill:var(--blueprint);stroke:none}
  .ai-overlay{position:fixed;inset:0;z-index:40;background:rgba(4,6,10,0.6);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
  .ai-overlay.on{display:flex;animation:fade .15s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .ai-sheet{width:100%;max-width:680px;height:78vh;max-height:680px;background:var(--surface);border:1px solid var(--border-hi);border-bottom:none;border-radius:18px 18px 0 0;display:flex;flex-direction:column;overflow:hidden;animation:up .22s cubic-bezier(.2,.9,.3,1)}
  @keyframes up{from{transform:translateY(40px)}to{transform:none}}
  .ai-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
  .ai-head .t{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px}
  .ai-head .t svg{width:18px;height:18px;fill:var(--blueprint)}
  .ai-x{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;font-size:15px}
  .ai-log{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
  .ai-msg{max-width:88%;padding:11px 14px;border-radius:13px;font-size:14px;line-height:1.5}
  .ai-msg.user{align-self:flex-end;background:var(--accent);color:#04101f;border-bottom-right-radius:4px}
  .ai-msg.ai{align-self:flex-start;background:var(--row);border:1px solid var(--border);border-bottom-left-radius:4px}
  .ai-input{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border)}
  .ai-input input{flex:1;padding:12px 14px;background:var(--bg);border:1px solid var(--border-hi);border-radius:11px;color:var(--text);font-family:var(--sans);font-size:15px}
  .ai-input input:focus{outline:none;border-color:var(--accent)}
  .ai-input button{padding:0 18px;border:none;border-radius:11px;background:var(--accent);color:#04101f;font-family:var(--sans);font-weight:700;font-size:14px;cursor:pointer}
  .ai-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .ai-chip{font-size:12px;padding:6px 11px;border-radius:8px;border:1px solid var(--border-hi);background:var(--surface-2);color:var(--dim);cursor:pointer}
  .ai-chip:hover{border-color:var(--accent);color:var(--accent)}
  .inbox .badge{position:absolute;top:-5px;right:-5px;min-width:17px;height:17px;border-radius:9px;background:var(--red);color:#fff;font-family:var(--mono);font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--bg)}
  .who{font-family:var(--mono);font-size:12px;color:var(--dim);display:flex;align-items:center;gap:7px}
  .who .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green)}
  .acctwrap{position:relative;display:flex;align-items:center;gap:8px}
  .whoami{display:flex;align-items:center;gap:6px;height:34px;padding:0 11px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:var(--mono);font-size:12px;cursor:pointer;max-width:150px;overflow:hidden;white-space:nowrap}
  .whoami:hover{border-color:var(--accent);color:var(--text)}
  .whoami .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);flex-shrink:0}
  .whoami-role{color:var(--faint);text-transform:uppercase;font-size:10px;letter-spacing:.5px}
  @media(max-width:380px){.whoami-role{display:none}}
  .cog{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:transparent;cursor:pointer;padding:0}
  .cog svg{width:18px;height:18px;fill:none;stroke:var(--dim);stroke-width:2}
  .cog:hover svg{stroke:var(--accent)}
  .acctmenu{position:absolute;top:42px;right:0;min-width:182px;background:var(--surface);border:1px solid var(--border-hi);border-radius:12px;padding:8px;display:none;flex-direction:column;gap:8px;z-index:50;box-shadow:0 8px 30px rgba(0,0,0,0.5)}
  .acctmenu.on{display:flex}
  .acctwho{font-family:var(--mono);font-size:12px;color:var(--dim);display:flex;align-items:center;gap:7px;padding:6px 8px 10px;border-bottom:1px solid var(--border)}
  .acctwho .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);flex-shrink:0}
  .acctout{padding:10px;border-radius:9px;border:1px solid var(--border-hi);background:transparent;color:var(--accent);font-family:var(--sans);font-weight:700;font-size:14px;cursor:pointer}
  .acctout:hover{background:var(--accent);color:#04101f}
  .newmsg{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:11px;margin-bottom:12px;border-radius:11px;border:1px solid var(--border-hi);background:transparent;color:var(--accent);font-family:var(--sans);font-weight:700;font-size:14px;cursor:pointer}
  .newmsg svg{width:16px;height:16px;fill:none;stroke:var(--accent);stroke-width:2.2}
  .newmsg:hover{background:var(--accent);color:#04101f}.newmsg:hover svg{stroke:#04101f}
  .compose-body{padding:14px 16px;display:flex;flex-direction:column;gap:13px;overflow:auto}
  .compose-field label,.compose-to-fixed label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--faint);text-transform:uppercase;margin-bottom:6px}
  .compose-field select{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border-hi);border-radius:11px;color:var(--text);font-family:var(--sans);font-size:15px}
  .compose-to-fixed{font-family:var(--sans);font-size:15px;color:var(--text)}.compose-to-fixed b{color:var(--accent)}
  #composeBody{width:100%;min-height:150px;resize:vertical;padding:13px 14px;background:var(--bg);border:1px solid var(--border-hi);border-radius:11px;color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.5}
  #composeBody:focus,.compose-field select:focus{outline:none;border-color:var(--accent)}
  .thread-log{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:11px}
  .tmsg{max-width:80%;padding:9px 13px;border-radius:14px;font-size:14.5px;line-height:1.45;word-break:break-word}
  .tmsg .twho{font-family:var(--mono);font-size:10px;letter-spacing:.6px;text-transform:uppercase;opacity:.7;margin-bottom:3px}
  .tmsg .twhen{font-family:var(--mono);font-size:10px;opacity:.55;margin-top:4px}
  .tmsg.them{align-self:flex-start;background:var(--row);border:1px solid var(--border);border-bottom-left-radius:5px}
  .tmsg.me{align-self:flex-end;background:var(--accent);color:#04101f;border-bottom-right-radius:5px}
  .tmsg.me .twho,.tmsg.me .twhen{opacity:.75}
  #threadReplyBar input{flex:1;padding:12px 14px;background:var(--bg);border:1px solid var(--border-hi);border-radius:11px;color:var(--text);font-family:var(--sans);font-size:15px}
  #threadReplyBar input:focus{outline:none;border-color:var(--accent)}
  #threadReplyBar button{padding:0 18px;border:none;border-radius:11px;background:var(--accent);color:#04101f;font-family:var(--sans);font-weight:700;font-size:14px;cursor:pointer}
  .wrap{max-width:760px;margin:0 auto;padding:18px 16px}
  .view{display:none}.view.on{display:block}
  .lbl{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--faint);text-transform:uppercase;margin:18px 4px 9px;display:flex;justify-content:space-between}
  .lbl:first-child{margin-top:2px}.lbl .n{color:var(--dim)}
  .empty{text-align:center;color:var(--faint);font-size:13.5px;padding:30px 10px}
  .task{display:flex;align-items:center;gap:13px;padding:14px 15px;background:var(--row);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:border-color .15s,background .15s}
  .task:hover{border-color:var(--border-hi);background:var(--surface-2)}
  .check{width:22px;height:22px;border-radius:7px;border:2px solid var(--border-hi);flex-shrink:0;cursor:pointer}
  .check.done{background:var(--green);border-color:var(--green);position:relative}
  .check.done::after{content:"";position:absolute;left:6px;top:2px;width:5px;height:10px;border:solid #04110a;border-width:0 2px 2px 0;transform:rotate(45deg)}
  .task .body{flex:1;min-width:0}.task .t{font-weight:600;font-size:15px}
  .task.done .t{color:var(--dim);text-decoration:line-through}
  .task .s{font-size:12.5px;color:var(--dim);margin-top:2px;font-family:var(--mono)}
  .chip{font-family:var(--mono);font-size:10.5px;letter-spacing:.5px;padding:3px 8px;border-radius:6px;text-transform:uppercase;font-weight:600;white-space:nowrap}
  .chip.active{background:rgba(86,214,140,0.12);color:var(--green);border:1px solid rgba(86,214,140,0.25)}
  .chip.open{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(91,157,255,0.25)}
  .chip.urgent{background:rgba(244,115,107,0.12);color:var(--red);border:1px solid rgba(244,115,107,0.25)}
  .chip.high{background:rgba(240,166,79,0.12);color:var(--amber);border:1px solid rgba(240,166,79,0.25)}
  .chip.done2{background:rgba(255,255,255,0.05);color:var(--faint);border:1px solid var(--border)}
  .jobsearch{width:100%;padding:12px 14px;background:var(--row);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--sans);font-size:14px;margin-top:8px}
  .jobsearch:focus{outline:none;border-color:var(--border-hi)}.jobsearch::placeholder{color:var(--faint)}
  .newbtn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:15px;border:none;border-radius:var(--r);background:var(--accent);color:#04101f;font-family:var(--sans);font-weight:700;font-size:15px;cursor:pointer;margin-bottom:6px}
  .newbtn:hover{filter:brightness(1.07)}.newbtn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round}
  .folder{display:flex;align-items:center;gap:14px;padding:15px;background:var(--row);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:border-color .15s,background .15s}
  .folder:hover{border-color:var(--blueprint);background:var(--surface-2)}
  .folder .ic{width:40px;height:40px;flex-shrink:0;border-radius:9px;background:var(--bp-dim);display:flex;align-items:center;justify-content:center}
  .folder .ic svg{width:26px;height:26px;stroke:var(--blueprint);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .folder .body{flex:1;min-width:0}.folder .addr{font-weight:700;font-size:15.5px;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .folder .cust{font-size:12.5px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .folder .right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
  .folder .count{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .panel{background:var(--surface);border:1px solid var(--border-hi);border-radius:var(--r);padding:18px;margin-bottom:14px;display:none}
  .panel.on{display:block;animation:slide .18s ease-out}
  @keyframes slide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .panel h3{font-size:15px;margin-bottom:4px}.panel p{font-size:12.5px;color:var(--dim);margin-bottom:14px}
  .panel label{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--faint);text-transform:uppercase;display:block;margin-bottom:6px}
  .panel input,.panel textarea{width:100%;padding:13px 14px;background:var(--bg);border:1px solid var(--border-hi);border-radius:9px;color:var(--text);font-family:var(--sans);font-size:15px;margin-bottom:13px}
  .panel textarea{min-height:70px;resize:vertical}
  .panel input:focus,.panel textarea:focus{outline:none;border-color:var(--accent)}
  .panel input::placeholder,.panel textarea::placeholder{color:var(--faint)}
  .panel .opt{color:var(--faint);text-transform:none;letter-spacing:0;font-size:11px}
  .measure{font-family:var(--mono);font-size:12px;color:var(--blueprint);background:var(--bp-dim);border:1px solid rgba(95,196,230,0.25);border-radius:8px;padding:9px 12px;margin-bottom:13px;display:none}
  .acwrap{position:relative}
  .ac{position:absolute;top:46px;left:0;right:0;z-index:6;background:var(--surface);border:1px solid var(--border-hi);border-radius:9px;overflow:hidden;display:none;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
  .ac.on{display:block}
  .ac-item{padding:11px 13px;font-size:13.5px;cursor:pointer;border-bottom:1px solid var(--border)}
  .ac-item:last-child{border-bottom:none}.ac-item:hover{background:var(--surface-2)}
  .prow{display:flex;gap:9px}
  .prow button{flex:1;padding:13px;border-radius:9px;font-family:var(--sans);font-weight:700;font-size:14px;cursor:pointer;border:1px solid var(--border-hi);background:transparent;color:var(--dim)}
  .prow button.go{background:var(--accent);color:#04101f;border-color:var(--accent)}
  .prow button:disabled{opacity:.5}
  .back{font-family:var(--mono);font-size:13px;color:var(--accent);cursor:pointer;margin-bottom:14px;display:inline-flex;align-items:center;gap:6px}
  .jhead .addr{font-size:22px;font-weight:800;letter-spacing:-.3px}
  .jmeta{font-family:var(--mono);font-size:12px;color:var(--dim);margin-top:6px;display:flex;flex-wrap:wrap;gap:14px}
  .jmeta b{color:var(--text);font-weight:600}
  .jactions{display:flex;gap:8px;margin-top:14px}
  .jactions button{flex:1;padding:11px;border:1px solid var(--border-hi);border-radius:10px;background:var(--surface);color:var(--text);font-family:var(--sans);font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;text-decoration:none}
  .jactions button:hover{border-color:var(--accent)}
  .jactions button svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .upload{display:flex;align-items:center;gap:12px;width:100%;padding:16px;border:1.5px dashed var(--border-hi);border-radius:var(--r);background:var(--surface);color:var(--text);cursor:pointer;margin-bottom:9px;transition:border-color .15s,background .15s}
  .upload:hover{border-color:var(--accent);background:var(--accent-dim)}
  .upload .uic{width:42px;height:42px;border-radius:10px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .upload .uic svg{width:22px;height:22px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .upload .ut{font-weight:700;font-size:14.5px}.upload .us{font-size:12px;color:var(--dim);margin-top:1px}
  .upload.cam .uic{background:var(--bp-dim)} .upload.cam .uic svg{stroke:var(--blueprint)}
  .mic{display:inline-flex;align-items:center;gap:7px;padding:0 14px;border:1px solid var(--border-hi);border-radius:11px;background:var(--surface);color:var(--blueprint);font-family:var(--sans);font-weight:700;font-size:14px;cursor:pointer}
  .mic svg{width:16px;height:16px;fill:none;stroke:var(--blueprint);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .mic.rec{background:rgba(239,68,68,.14);border-color:#ef4444;color:#ef4444;animation:micpulse 1.3s ease-in-out infinite} .mic.rec svg{stroke:#ef4444}
  @keyframes micpulse{0%,100%{opacity:1}50%{opacity:.62}}
  /* Rapid-fire in-app camera */
  .cammodal{position:fixed;inset:0;z-index:300;background:#000;display:none;flex-direction:column}
  .cammodal.on{display:flex}
  .cammodal video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
  .cambar{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:center;padding:16px;gap:10px}
  .cambar .cdone{background:rgba(0,0,0,.55);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:11px;padding:10px 18px;font-family:var(--sans);font-weight:700;font-size:15px;cursor:pointer}
  .cambar .ccount{font-family:var(--mono);background:rgba(0,0,0,.55);color:#fff;padding:7px 13px;border-radius:20px;font-size:13px}
  .camfoot{position:relative;z-index:2;margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:13px;padding:0 14px 32px}
  .camstrip{display:flex;gap:7px;width:100%;overflow-x:auto;min-height:0}
  .camstrip:empty{display:none}
  .camthumb{position:relative;width:52px;height:52px;flex-shrink:0;border-radius:8px;overflow:hidden;border:2px solid rgba(255,255,255,.55)}
  .camthumb img{width:100%;height:100%;object-fit:cover}
  .camthumb .ust{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.42);color:#fff;font-size:13px}
  .shutter{width:74px;height:74px;border-radius:50%;background:#fff;border:5px solid rgba(255,255,255,.45);cursor:pointer;transition:transform .07s,background .12s;flex-shrink:0}
  .shutter:active{transform:scale(.91)}
  .shutter.flash{background:var(--accent)}
  .camhint{color:rgba(255,255,255,.7);font-size:12px;font-family:var(--mono)}
  /* Photo bin: per-tile delete X + long-press multi-select */
  .thumb .thx{position:absolute;top:5px;right:5px;width:27px;height:27px;border-radius:50%;border:none;background:rgba(8,10,16,.72);color:#fff;font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);z-index:2;transition:transform .1s ease-out}
  .thumb .thx:active{transform:scale(.88)}
  .thumb .tcheck{position:absolute;top:6px;left:6px;width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.85);background:rgba(8,10,16,.45);display:none;z-index:2}
  .thumb.sel{outline:3px solid var(--accent);outline-offset:-3px}
  .grid.selmode .thumb .thx{display:none}
  .grid.selmode .thumb .tcheck{display:block}
  .grid.selmode .thumb.sel .tcheck{background:var(--accent);border-color:var(--accent)}
  .grid.selmode .thumb.sel .tcheck::after{content:"";position:absolute;left:6px;top:2px;width:5px;height:10px;border:solid #04101f;border-width:0 2px 2px 0;transform:rotate(45deg)}
  /* Contextual select bar: top-mounted so it never collides with the bottom nav */
  .selbar{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:calc(env(safe-area-inset-top,0px) + 11px) 14px 11px;background:rgba(11,12,15,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-hi);transform:translateY(-100%);transition:transform .2s cubic-bezier(.22,1,.36,1)}
  .selbar.on{transform:translateY(0)}
  .selbar .sc{font-family:var(--mono);font-size:13px;color:var(--text)}
  .selbar button{padding:9px 15px;border-radius:10px;font-family:var(--sans);font-weight:700;font-size:14px;cursor:pointer;border:1px solid var(--border-hi);background:transparent;color:var(--text)}
  .selbar button.del{background:var(--red);border-color:var(--red);color:#fff}
  /* Lightbox */
  .lightbox{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;background:rgba(5,6,9,.95);backdrop-filter:blur(8px);opacity:0;visibility:hidden;transition:opacity .18s ease-out,visibility .18s}
  .lightbox.on{opacity:1;visibility:visible}
  .lbx-top{display:flex;justify-content:flex-end;align-items:center;padding:calc(env(safe-area-inset-top,0px) + 12px) 14px 0;z-index:2}
  .lbx-top button{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.22);background:rgba(0,0,0,.4);color:#fff;font-size:21px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .lbx-stage{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;position:relative;padding:8px}
  .lbx-stage img,.lbx-stage video{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px}
  .lbx-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;border:none;background:rgba(0,0,0,.5);color:#fff;font-size:24px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .lbx-nav.prev{left:8px}.lbx-nav.next{right:8px}
  .lbx-foot{display:flex;gap:10px;justify-content:center;padding:14px 16px calc(env(safe-area-inset-bottom,0px) + 22px)}
  .lbx-foot button{flex:1;max-width:190px;padding:13px;border-radius:11px;border:1px solid var(--border-hi);background:var(--surface);color:var(--text);font-family:var(--sans);font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .lbx-foot button svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .lbx-foot button.danger{color:var(--red);border-color:rgba(244,115,107,.4)}
  @media(prefers-reduced-motion:reduce){.lightbox,.selbar,.thumb .thx{transition:none}}
  .takebtn{width:100%;padding:13px;border:1px solid var(--border-hi);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--sans);font-weight:600;font-size:14px;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:9px}
  .takebtn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
  .thumb{aspect-ratio:1;border-radius:9px;background:var(--surface-2);border:1px solid var(--border);position:relative;overflow:hidden}
  .thumb img,.thumb video{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .vb{position:absolute;left:6px;bottom:6px;font-family:var(--mono);font-size:9px;color:#fff;background:rgba(0,0,0,.6);padding:2px 6px;border-radius:5px}
  .note{background:var(--row);border:1px solid var(--border);border-left:2px solid var(--amber);border-radius:10px;padding:13px 15px;margin-bottom:8px}
  .note .meta{font-family:var(--mono);font-size:11px;color:var(--faint);margin-bottom:5px;display:flex;justify-content:space-between}
  .note .meta b{color:var(--amber);font-weight:600}
  .note .txt{font-size:14px;line-height:1.5;white-space:pre-wrap}
  .addnote{width:100%;padding:12px;border:1px dashed var(--border-hi);border-radius:10px;background:transparent;color:var(--dim);font-family:var(--sans);font-size:13.5px;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
  .addnote:hover{border-color:var(--amber);color:var(--amber)}.addnote svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
  .syncbar{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--bp-dim);border:1px solid rgba(95,196,230,0.25);border-radius:10px;margin-bottom:14px}
  .syncbar .l{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--blueprint);font-weight:600}
  .syncbar .l svg{width:16px;height:16px;stroke:var(--blueprint);fill:none;stroke-width:2}
  .syncbar .st{font-family:var(--mono);font-size:11px;color:var(--green)}
  .day{font-family:var(--mono);font-size:12px;color:var(--text);font-weight:600;margin:16px 4px 9px;letter-spacing:.5px}.day:first-child{margin-top:2px}
  .ev{display:flex;gap:13px;padding:13px 15px;background:var(--row);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px}
  .ev .time{font-family:var(--mono);font-size:12px;color:var(--accent);width:64px;flex-shrink:0;padding-top:1px}
  .ev .body .t{font-weight:600;font-size:14.5px}.ev .body .s{font-size:12.5px;color:var(--dim);margin-top:2px}
  .ev.gcal{border-left:2px solid var(--blueprint)}.ev.job{border-left:2px solid var(--green)}
  /* calendar */
  .caltop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .calnav{display:flex;align-items:center;gap:8px}
  .calnav button{width:32px;height:32px;border-radius:8px;border:1px solid var(--border-hi);background:var(--surface);color:var(--text);cursor:pointer;font-size:16px;line-height:1}
  .calnav .rng{font-weight:700;font-size:14px;min-width:128px;text-align:center}
  .caltog{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border-hi);border-radius:9px;padding:3px}
  .caltog button{padding:6px 14px;border:none;background:transparent;color:var(--dim);font-family:var(--sans);font-weight:600;font-size:13px;border-radius:7px;cursor:pointer}
  .caltog button.on{background:var(--accent-dim);color:var(--accent)}
  .weekgrid{display:grid;grid-template-columns:1fr;gap:8px}
  @media(min-width:760px){.weekgrid{grid-template-columns:repeat(7,1fr);gap:6px}}
  .wday{background:var(--row);border:1px solid var(--border);border-radius:10px;padding:10px;min-height:64px}
  .wday.today{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent-dim)}
  .wday .dh{font-family:var(--mono);font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:flex;justify-content:space-between}
  .wday.today .dh{color:var(--accent)}
  .pill{display:block;font-size:11.5px;padding:5px 8px;border-radius:7px;margin-bottom:5px;line-height:1.25;border:1px solid var(--border);background:var(--surface-2);white-space:normal}
  .pill.job{border-left:2px solid var(--green)}.pill.gcal{border-left:2px solid var(--blueprint)}
  .pill .pt{font-family:var(--mono);font-size:10px;color:var(--faint)}
  .monthgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .mhead{font-family:var(--mono);font-size:10px;color:var(--faint);text-align:center;padding:4px 0;letter-spacing:.5px}
  .mcell{aspect-ratio:1;background:var(--row);border:1px solid var(--border);border-radius:8px;padding:5px 6px;cursor:pointer;display:flex;flex-direction:column;gap:3px;overflow:hidden}
  .mcell.out{opacity:.35}.mcell.today{border-color:var(--accent)}.mcell.sel{background:var(--accent-dim);border-color:var(--accent)}
  .mcell .mn{font-size:12px;font-weight:600}
  .mcell .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:2px}
  .mcell .dot.job{background:var(--green)}.mcell .dot.gcal{background:var(--blueprint)}
  .msg{display:flex;gap:12px;padding:14px 15px;background:var(--row);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer}
  .msg:hover{border-color:var(--border-hi)}.msg.unread{border-left:2px solid var(--accent)}
  .av{width:38px;height:38px;border-radius:50%;background:var(--surface-2);border:1px solid var(--border-hi);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--dim);flex-shrink:0;text-transform:uppercase}
  .msg .body{flex:1;min-width:0}.msg .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .msg .nm{font-weight:700;font-size:14.5px}.msg .tm{font-family:var(--mono);font-size:11px;color:var(--faint);flex-shrink:0}
  .msg .pv{font-size:13px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.msg.unread .pv{color:var(--text)}
  .oscard{background:linear-gradient(160deg,var(--bp-dim),var(--row));border:1px solid rgba(95,196,230,0.3);border-radius:var(--r);padding:15px 16px;margin-bottom:16px}
  .oscard .oslbl{display:flex;align-items:center;gap:7px;font-weight:700;font-size:14.5px;color:var(--blueprint)}
  .oscard .ossub{font-size:12.5px;color:var(--dim);margin:3px 0 11px}
  .osrow{display:flex;gap:8px}
  .osrow input{flex:1;padding:12px 13px;background:var(--bg);border:1px solid var(--border-hi);border-radius:10px;color:var(--text);font-family:var(--sans);font-size:14.5px}
  .osrow input:focus{outline:none;border-color:var(--blueprint)}.osrow input::placeholder{color:var(--faint)}
  .osrow button{padding:0 18px;border:none;border-radius:10px;background:var(--blueprint);color:#04141a;font-family:var(--sans);font-weight:700;font-size:14px;cursor:pointer}
  .osresult{font-size:13px;margin-top:9px;min-height:1px;line-height:1.5}
  .osresult .osok{color:var(--green)}.osresult .osok b{color:var(--text)}
  .osresult .osnote{color:var(--dim)}
  .clockcard{text-align:center;padding:34px 20px;background:var(--row);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px}
  .clockcard .time{font-family:var(--mono);font-size:36px;color:var(--green);letter-spacing:1px}
  .clockcard .sub{color:var(--dim);font-size:13px;margin-top:8px}
  .clockbtn{width:100%;padding:15px;border:none;border-radius:var(--r);font-family:var(--sans);font-weight:700;font-size:15px;cursor:pointer}
  .clockbtn.in{background:var(--green);color:#04140a}.clockbtn.out{background:var(--red);color:#1a0606}
  .nav{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;z-index:20;display:flex;gap:2px;padding:5px;background:rgba(18,20,26,0.94);backdrop-filter:blur(14px);border:1px solid var(--border-hi);border-radius:16px;box-shadow:0 14px 40px rgba(0,0,0,.5)}
  .nav button{display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 16px;border:none;background:transparent;color:var(--faint);cursor:pointer;border-radius:11px;font-family:var(--sans)}
  .nav button.on{color:var(--accent);background:var(--accent-dim)}
  .nav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .nav button span{font-size:10px;font-weight:600;letter-spacing:.3px}
  .nav button{position:relative}
  .nav button .navbadge{position:absolute;top:2px;right:8px;min-width:16px;height:16px;border-radius:8px;background:var(--red);color:#fff;font-family:var(--mono);font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center;padding:0 4px;border:2px solid rgba(18,20,26,0.94)}
  .td-row{display:flex;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
  .td-row .k{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--faint);text-transform:uppercase}
  .td-row .v{font-size:14.5px;text-align:right}
  .td-desc{font-size:14px;line-height:1.5;color:var(--text);white-space:pre-wrap;margin-top:6px;text-align:left}
  .td-actions{display:flex;gap:9px;padding:14px;border-top:1px solid var(--border)}
  .td-actions button{flex:1;padding:13px;border-radius:10px;font-family:var(--sans);font-weight:700;font-size:14px;cursor:pointer;border:1px solid var(--border-hi);background:transparent;color:var(--dim)}
  .td-actions button.go{background:var(--green);color:#04140a;border-color:var(--green)}
  .td-actions button.warn{background:var(--accent-dim);color:var(--accent);border-color:rgba(91,157,255,0.3)}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#04101f;color:var(--accent);border:1px solid var(--accent);padding:10px 18px;border-radius:10px;font-family:var(--mono);font-size:12px;display:none;z-index:30;max-width:90%;text-align:center}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border-hi);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media(min-width:900px){.wrap{padding:24px 20px}#v-jobs .wrap,#v-tasks .wrap{max-width:760px}}
</style>
</head>
<body>
<div class="bar">
  <div class="brand">PLUS&nbsp;ULTRA <span>· FIELD</span></div>
  <div class="right">
    <div class="aibtn" onclick="openAI()" title="Ask the assistant"><svg viewBox="0 0 24 24"><path d="M12 3l1.7 4.3L18 9l-4.3 1.7L12 15l-1.7-4.3L6 9l4.3-1.7z"/><path d="M18.5 14.5l.6 1.6 1.6.6-1.6.6-.6 1.6-.6-1.6-1.6-.6 1.6-.6z"/></svg></div>
    <div class="inbox" onclick="switchTab('messages')"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span class="badge" id="msgBadge">0</span></div>
    <div class="acctwrap">
      <button class="whoami" id="whoamiChip" onclick="toggleMenu(event)" title="Account"><span class="dot"></span><span id="whoamiName">…</span><span class="whoami-role" id="whoamiRole"></span></button>
      <button class="cog" onclick="toggleMenu(event)" title="Account"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
      <div class="acctmenu" id="acctMenu">
        <div class="acctwho" id="acctWho"><span class="dot"></span><span id="meName">…</span></div>
        <button class="acctout" onclick="signOut()">Sign out</button>
      </div>
    </div>
  </div>
</div>

<div class="view on" id="v-tasks"><div class="wrap" id="tasksWrap"><div class="empty">Loading…</div></div></div>
<div class="view" id="v-jobs"><div class="wrap" id="jobsWrap"><div class="empty">Loading…</div></div></div>
<div class="view" id="v-job"><div class="wrap" id="jobWrap"></div></div>
<div class="view" id="v-schedule"><div class="wrap" id="schedWrap"><div class="empty">Loading…</div></div></div>
<div class="view" id="v-messages"><div class="wrap" id="msgWrap"><div class="empty">Loading…</div></div></div>
<div class="view" id="v-clock"><div class="wrap" id="clockWrap"><div class="empty">Loading…</div></div></div>

<input type="file" id="photoInput" accept="image/*,video/*" multiple style="display:none">
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
<div class="cammodal" id="camModal">
  <video id="camVideo" autoplay playsinline muted></video>
  <div class="cambar"><button class="cdone" onclick="closeCamera()">Done</button><span class="ccount"><span id="camCount">0</span> shot</span></div>
  <div class="camfoot"><div class="camstrip" id="camStrip"></div><button class="shutter" id="camShutter" onclick="snapPhoto()" aria-label="Take photo"></button><div class="camhint">Tap to shoot. Camera stays ready for the next one.</div></div>
</div>
<canvas id="camCanvas" style="display:none"></canvas>
<div class="selbar" id="selBar"><button onclick="exitSelMode()">Cancel</button><span class="sc" id="selCount">0 selected</span><button class="del" onclick="deleteSelected()">Delete</button></div>
<div class="lightbox" id="lightbox">
  <div class="lbx-top"><button onclick="closeLightbox()" aria-label="Close">&times;</button></div>
  <div class="lbx-stage" id="lbxStage"></div>
  <div class="lbx-foot" id="lbxFoot"></div>
</div>

<div class="ai-overlay" id="aiOverlay" onclick="if(event.target===this)closeAI()">
  <div class="ai-sheet">
    <div class="ai-head"><div class="t"><svg viewBox="0 0 24 24"><path d="M12 3l1.7 4.3L18 9l-4.3 1.7L12 15l-1.7-4.3L6 9l4.3-1.7z"/></svg>Field Assistant</div><button class="ai-x" onclick="closeAI()">✕</button></div>
    <div class="ai-log" id="aiLog"></div>
    <div class="ai-input"><input id="aiInput" placeholder="Ask what you need to do…" onkeydown="if(event.key==='Enter')sendAI()" autocomplete="off"><button onclick="sendAI()">Send</button></div>
    <div class="oscard" style="margin:10px 10px 4px"><div class="oslbl"><svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:var(--blueprint)"><path d="M12 3l1.7 4.3L18 9l-4.3 1.7L12 15l-1.7-4.3L6 9l4.3-1.7z"/></svg>Ask the OS</div><div class="ossub">Need something done? It routes to the right person.</div><div class="osrow"><input id="osInput" placeholder="e.g. I need materials for 15 Bissett" onkeydown="if(event.key==='Enter')sendOS()" autocomplete="off"><button onclick="sendOS()">Send</button></div><div id="osResult" class="osresult"></div></div>
  </div>
</div>

<div class="ai-overlay" id="taskOverlay" onclick="if(event.target===this)closeTask()">
  <div class="ai-sheet" style="height:auto;max-height:80vh">
    <div class="ai-head"><div class="t"><svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Task details</div><button class="ai-x" onclick="closeTask()">✕</button></div>
    <div class="ai-log" id="taskBody" style="gap:0;padding:0 0 6px"></div>
    <div class="td-actions" id="taskActions"></div>
  </div>
</div>

<div class="ai-overlay" id="composeOverlay" onclick="if(event.target===this)closeCompose()">
  <div class="ai-sheet" style="height:auto;max-height:82vh">
    <div class="ai-head"><div class="t"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>New message</div><button class="ai-x" onclick="closeCompose()">✕</button></div>
    <div class="compose-body">
      <div class="compose-field"><label>To</label><select id="composeTo"><option value="">Loading…</option></select></div>
      <textarea id="composeBody" placeholder="Write a message…"></textarea>
    </div>
    <div class="ai-input" style="border-top:1px solid var(--border)"><button id="composeSend" onclick="sendCompose()" style="flex:1">Send</button></div>
  </div>
</div>

<div class="ai-overlay" id="threadOverlay" onclick="if(event.target===this)closeThread()">
  <div class="ai-sheet">
    <div class="ai-head"><div class="t"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span id="threadWith">Thread</span></div><button class="ai-x" onclick="closeThread()">✕</button></div>
    <div class="thread-log" id="threadLog"></div>
    <div class="ai-input" id="threadReplyBar" style="display:none"><input id="threadReply" placeholder="Reply…" onkeydown="if(event.key==='Enter')sendThreadReply()" autocomplete="off"><button id="threadSend" onclick="sendThreadReply()">Send</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="nav">
  <button class="on" data-tab="tasks" onclick="switchTab('tasks')"><svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><span>Tasks</span></button>
  <button data-tab="jobs" onclick="switchTab('jobs')"><svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg><span>Jobs</span></button>
  <button data-tab="schedule" onclick="switchTab('schedule')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg><span>Schedule</span></button>
  <button data-tab="clock" onclick="switchTab('clock')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg><span>Clock</span></button>
  <button data-tab="messages" onclick="switchTab('messages')"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span>Inbox</span><span class="navbadge" id="navMsgBadge">0</span></button>
  <button data-tab="ai" onclick="openAI()"><svg viewBox="0 0 24 24"><path d="M12 3l1.7 4.3L18 9l-4.3 1.7L12 15l-1.7-4.3L6 9l4.3-1.7z"/><path d="M18.5 14.5l.6 1.6 1.6.6-1.6.6-.6 1.6-.6-1.6-1.6-.6 1.6-.6z"/></svg><span>AI</span></button>
</div>

<script>
const API = window.location.origin + '/api';
const TENANT = window.RYUJIN_TENANT_SLUG || 'plus-ultra';
let ME = null, CUR_TAB = 'tasks', CUR_JOB = null, TASKS = {}, CUR_MEDIA = [];
let CAPS = null, ROLE = null;
// One app for the whole company; the tools you see are gated by your role's
// capabilities (lib/roleCapabilities.js, served via /api/companion-init). The
// server still re-checks scope on every endpoint, so this is the UI gate only.
const TAB_CAP = { tasks:'show_tasks', jobs:'show_jobs', schedule:'show_schedule', clock:'show_clock', messages:'show_inbox', workorders:'show_workorders', paysheets:'show_paysheets' };
function can(k){ return !CAPS || !!CAPS[k]; }
function applyCaps(){
  if(!CAPS) return;
  document.querySelectorAll('.nav button[data-tab]').forEach(b=>{
    const tab=b.dataset.tab; if(tab==='ai') return;
    const key=TAB_CAP[tab];
    b.style.display = (key && !CAPS[key]) ? 'none' : '';
  });
  const ib=document.querySelector('.bar .inbox'); if(ib) ib.style.display = CAPS.show_inbox ? '' : 'none';
}
function firstVisibleTab(){
  const order=['tasks','jobs','schedule','clock','messages','workorders','paysheets'];
  for(const t of order){ const b=document.querySelector('.nav button[data-tab="'+t+'"]'); if(b && b.style.display!=='none') return t; }
  return 'jobs';
}
let TEAM = null, ACTIVE_THREAD = null, REPLY = {}, MY_ID = null;

function tok(){ try { return localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token') || ''; } catch(e){ return ''; } }
async function api(path, opts){
  opts = opts || {};
  const sep = path.includes('?') ? '&' : '?';
  const h = Object.assign({ 'Content-Type':'application/json', 'x-tenant-id':TENANT }, opts.headers||{});
  const t = tok(); if (t) h['Authorization'] = 'Bearer ' + t;
  try { const r = await fetch(API+path+sep+'tenant='+TENANT, Object.assign({}, opts, { headers:h })); return await r.json(); }
  catch(e){ return { error:'Connection failed' }; }
}
function esc(s){ return (s==null?'':String(s)).replace(/[<>&"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function toast(m){ const t=document.getElementById('toast'); t.innerHTML=m; t.style.display='block'; clearTimeout(window._tt); window._tt=setTimeout(()=>t.style.display='none',2800); }
function ago(iso){ if(!iso) return ''; const d=new Date(iso), s=(Date.now()-d.getTime())/1000; if(s<60)return'just now'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago'; return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function timeStr(iso){ if(!iso) return ''; return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
function statusChip(s){ const m={active:'active',not_started:'open',pending:'open',open:'open',paused:'high',punch_list:'high',complete:'done2',done:'done2',cancelled:'done2'}; const lbl={not_started:'New',punch_list:'Punch',complete:'Complete'}; return '<span class="chip '+(m[s]||'open')+'">'+esc(lbl[s]||s||'open').replace('_',' ')+'</span>'; }

// ── LIVE PRESENCE ── heartbeat the current view + job + action so Mac's cockpit
// mirrors the app in real time. Best-effort: a failure here never affects the app.
let PRES={view:'tasks',context:''};
function presencePing(action){ try{ const t=tok(); if(!t) return; fetch(API+'/presence?tenant='+TENANT,{method:'POST',headers:{'Content-Type':'application/json','x-tenant-id':TENANT,'Authorization':'Bearer '+t},body:JSON.stringify({view:PRES.view,context:PRES.context,action:action||''})}).catch(()=>{}); }catch(e){} }
function presenceSet(view,context){ PRES.view=view; if(context!==undefined) PRES.context=context; presencePing(); }

function switchTab(tab){
  presenceSet(tab,'');
  CUR_TAB = tab;
  // Leaving a view drops any photo select-mode + lightbox so the top select bar
  // or the lightbox never floats over the next tab.
  exitSelMode(); closeLightbox();
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('v-'+tab).classList.add('on');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on', b.dataset.tab===tab));
  window.scrollTo(0,0);
  if(tab==='tasks') renderTasks();
  else if(tab==='jobs') renderJobs();
  else if(tab==='schedule') renderSchedule();
  else if(tab==='messages') renderMessages();
  else if(tab==='clock') renderClock();
}

// ── TASKS ──
async function renderTasks(){
  const w = document.getElementById('tasksWrap');
  if(!ME?.id){ w.innerHTML='<div class="empty">Could not load your profile. Reopen the app from the login screen.</div>'; return; }
  const mine = await api('/tickets?assigned_to='+ME.id);
  const all = await api('/tickets?status=open');
  const mineRows = (mine.tickets||[]).filter(t=>t.status!=='cancelled');
  // Group my tickets by the supported statuses: open -> To do, active -> In progress, done -> Completed.
  // Any other non-done status (e.g. the allowed-but-unused 'blocked') falls into To do so nothing is hidden.
  const toDo = mineRows.filter(t=>t.status!=='active'&&t.status!=='done');
  const inProgress = mineRows.filter(t=>t.status==='active');
  const myDone = mineRows.filter(t=>t.status==='done');
  const myIds = new Set(mineRows.map(t=>t.id));
  const avail = (all.tickets||[]).filter(t=>!myIds.has(t.id)&&!t.assigned_to);
  // Cache rows so the details panel renders instantly; openTask refreshes from the single GET.
  TASKS = {}; [...mineRows, ...avail].forEach(t=>{ TASKS[t.id]=t; });
  const section = (title,list,mode)=> list.length ? '<div class="lbl">'+title+' <span class="n">'+list.length+'</span></div>'+list.map(t=>taskRow(t,mode)).join('') : '';
  let h = section('To do', toDo, 'mine') + section('In progress', inProgress, 'mine');
  if(!toDo.length && !inProgress.length) h += '<div class="empty">No tasks assigned to you. Nice.</div>';
  h += section('Available to grab', avail, 'avail');
  h += section('Completed', myDone, 'mine');
  w.innerHTML = h;
}
function taskRow(t, mode){
  const prc = t.priority==='urgent'?'urgent':t.priority==='high'?'high':null;
  const loc = t.project?.address || t.customer?.address || '';
  const done = t.status==='done';
  if(mode==='avail'){
    return '<div class="task" onclick="claimTask(\''+t.id+'\')"><div class="check" style="border-radius:50%"></div><div class="body"><div class="t">'+esc(t.title)+'</div><div class="s">'+esc(loc||'tap to grab')+'</div></div><span class="chip open">Grab</span></div>';
  }
  if(mode==='view'){
    const who = t.assigned_user?.name ? ' · '+t.assigned_user.name : '';
    return '<div class="task" style="cursor:default"><div class="check '+(done?'done':'')+'"></div><div class="body"><div class="t">'+esc(t.title)+'</div><div class="s">'+esc((loc||'task')+who)+'</div></div>'+(prc?'<span class="chip '+prc+'">'+t.priority+'</span>':statusChip(t.status))+'</div>';
  }
  return '<div class="task '+(done?'done':'')+'" onclick="openTask(\''+t.id+'\')"><div class="check '+(done?'done':'')+'" onclick="event.stopPropagation();'+(done?'':'completeTask(\''+t.id+'\')')+'"></div><div class="body"><div class="t">'+esc(t.title)+'</div><div class="s">'+esc(loc||(t.due_date?'due '+t.due_date:'task'))+'</div></div>'+(prc?'<span class="chip '+prc+'">'+t.priority+'</span>':statusChip(t.status))+'</div>';
}
async function claimTask(id){
  if(!ME?.id){ toast('No user on this session'); return; }
  const r = await api('/tickets', { method:'PUT', body: JSON.stringify({ id, assigned_to:ME.id, action:'acknowledge' }) });
  if(r&&r.id) toast('Task claimed'); else toast((r&&r.error)||'Could not claim');
  renderTasks();
}
async function completeTask(id){
  const t=TASKS[id]; const title=t?t.title:'this task';
  if(!confirm('Mark "'+title+'" complete?')) return;
  const r = await api('/tickets', { method:'PUT', body: JSON.stringify({ id, action:'complete' }) });
  if(r && r.id) toast('Task completed'); else toast((r&&r.error)||'Could not update the task');
  closeTask(); renderTasks();
}
async function reopenTask(id){
  const r = await api('/tickets', { method:'PUT', body: JSON.stringify({ id, status:'active', completed_at:null }) });
  if(r && r.id) toast('Task reopened'); else toast((r&&r.error)||'Could not reopen the task');
  closeTask(); renderTasks();
}
function openTask(id){
  const ov=document.getElementById('taskOverlay'); ov.classList.add('on');
  drawTask(TASKS[id]||{id});
  // Refresh with full detail (description + joins) without blocking the open.
  api('/tickets?id='+encodeURIComponent(id)).then(t=>{ if(t && t.id){ TASKS[id]=Object.assign({}, TASKS[id], t); if(ov.classList.contains('on')) drawTask(TASKS[id]); } });
}
function closeTask(){ document.getElementById('taskOverlay').classList.remove('on'); }
function drawTask(t){
  const body=document.getElementById('taskBody'); const act=document.getElementById('taskActions');
  if(!t){ body.innerHTML='<div class="empty">Task not found.</div>'; act.innerHTML='<button onclick="closeTask()">Close</button>'; return; }
  const done=t.status==='done';
  const loc=t.project?.address || t.customer?.address || '';
  const who=t.assigned_user?.name || '';
  let h='<div style="padding:6px 16px 0"><div style="font-weight:700;font-size:17px;line-height:1.3">'+esc(t.title||'Untitled task')+'</div></div><div style="padding:0 16px">';
  h+='<div class="td-row"><span class="k">Status</span><span class="v">'+statusChip(t.status)+'</span></div>';
  if(t.priority) h+='<div class="td-row"><span class="k">Priority</span><span class="v">'+esc(t.priority)+'</span></div>';
  if(who) h+='<div class="td-row"><span class="k">Assigned</span><span class="v">'+esc(who)+'</span></div>';
  if(loc) h+='<div class="td-row"><span class="k">Location</span><span class="v">'+esc(loc)+'</span></div>';
  if(t.due_date) h+='<div class="td-row"><span class="k">Due</span><span class="v">'+esc(t.due_date)+'</span></div>';
  if(t.completed_at) h+='<div class="td-row"><span class="k">Completed</span><span class="v">'+esc(ago(t.completed_at))+'</span></div>';
  if(t.description) h+='<div class="td-row" style="display:block;border-bottom:none"><span class="k">Details</span><div class="td-desc">'+esc(t.description)+'</div></div>';
  h+='</div>';
  body.innerHTML=h;
  act.innerHTML = done
    ? '<button onclick="closeTask()">Close</button><button class="warn" onclick="reopenTask(\''+t.id+'\')">Reopen</button>'
    : '<button onclick="closeTask()">Close</button><button class="go" onclick="completeTask(\''+t.id+'\')">Mark complete</button>';
}

// ── JOBS ──
let ALL_JOBS = [];
async function renderJobs(){
  const w = document.getElementById('jobsWrap');
  let h = '<button class="newbtn" onclick="toggleNew()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New Job</button>';
  h += '<div class="panel" id="newpanel"><h3>Create a job folder</h3><p>Just the address. Everything else can come later.</p>'
    + '<label>Address</label><div class="acwrap"><input type="text" id="nj_addr" placeholder="e.g. 15 Bissett Ave, Riverview" autocomplete="off" oninput="njInput()"><div class="ac" id="nj_ac"></div></div>'
    + '<div class="measure" id="nj_measure"></div>'
    + '<label>Customer name <span class="opt">(optional)</span></label><input type="text" id="nj_cust" placeholder="e.g. Ryan Racho">'
    + '<div class="prow"><button onclick="toggleNew()">Cancel</button><button class="go" id="nj_go" onclick="createJob()">Create folder</button></div></div>';
  h += '<div id="upnext"></div>';
  h += '<input type="text" class="jobsearch" id="jobSearch" placeholder="Search jobs by address…" oninput="filterJobs(this.value)">';
  h += '<div class="lbl">Job folders <span class="n" id="jobCount">…</span></div>';
  h += '<div id="folderList"><div class="empty">Loading…</div></div>';
  w.innerHTML = h;
  renderUpNext();
  const d = await api('/projects?limit=500');
  ALL_JOBS = (d.projects||[]).filter(p=>p.status!=='cancelled');
  filterJobs('');
}
// "Up next" — scheduled work orders by start_date, today/tomorrow flagged. Each
// opens the full digital folder (job.html?wo=) with its scope + materials.
async function renderUpNext(){
  const box = document.getElementById('upnext'); if(!box) return;
  const today = ymd(new Date());
  const tmrw = ymd(new Date(Date.now()+86400000));
  // ?from=today so upcoming jobs are returned even when the tenant has many past
  // work orders (the endpoint orders start_date ascending, so future rows would
  // otherwise fall past the page limit).
  const d = await api('/workorders?from='+today+'&limit=12');
  const wos = (d.workorders||[])
    .filter(w=>w.status!=='cancelled' && w.start_date)
    .sort((a,b)=>String(a.start_date).localeCompare(String(b.start_date)))
    .slice(0,4);
  if(!wos.length){ box.innerHTML=''; return; }
  let h = '<div class="lbl">Up next</div>';
  h += wos.map(w=>{
    const wd = ymd(new Date(w.start_date+'T00:00:00'));
    const when = wd===today ? 'TODAY' : wd===tmrw ? 'TOMORROW' : new Date(w.start_date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
    const hot = wd===today || wd===tmrw;
    // Multi-day jobs (estimated_duration_days > 1) show their end date so crew see
    // a job runs across days, e.g. a 2-day job starting Monday reads "TODAY / thru TUE".
    const dur = Number(w.estimated_duration_days)||0;
    let endLabel='';
    if(dur>1){ const e=new Date(w.start_date+'T00:00:00'); e.setDate(e.getDate()+dur-1); endLabel=e.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase(); }
    return '<div class="folder" onclick="openJobByWo(\''+(w.id||w.wo_number)+'\')"><div class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg></div><div class="body"><div class="addr">'+esc(w.address||w.customer_name||'Job')+'</div><div class="cust">'+esc([w.customer_name,w.shingle_product].filter(Boolean).join(' · ')||'Scheduled')+'</div></div><div class="right"><span class="chip '+(hot?'active':'open')+'">'+when+'</span>'+(endLabel?'<span style="font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:3px">thru '+endLabel+'</span>':'')+'</div></div>';
  }).join('');
  box.innerHTML = h;
}
let _js=null;
function filterJobs(q){
  q = (q||'').trim();
  const c=document.getElementById('jobCount'), fl=document.getElementById('folderList');
  if(!q){ if(c) c.textContent=ALL_JOBS.length; if(fl) fl.innerHTML = ALL_JOBS.length ? ALL_JOBS.map(folderRow).join('') : '<div class="empty">No jobs yet. Tap New Job to start one.</div>'; return; }
  const ql=q.toLowerCase();
  const local = ALL_JOBS.filter(p=>((p.address||'')+' '+(p.name||'')+' '+(p.customer?.full_name||'')+' '+(p.city||'')).toLowerCase().includes(ql));
  if(c) c.textContent=local.length;
  if(fl) fl.innerHTML = local.length ? local.map(folderRow).join('') : '<div class="empty">Searching all jobs…</div>';
  // Server search reaches jobs beyond the loaded page; merge with the instant local hits.
  clearTimeout(_js); _js=setTimeout(async ()=>{
    const d = await api('/projects?limit=100&search='+encodeURIComponent(q));
    const sb=document.getElementById('jobSearch'); if(sb && sb.value.trim()!==q) return;
    const server=(d.projects||[]).filter(p=>p.status!=='cancelled');
    const seen=new Set(local.map(p=>p.id));
    const merged=local.concat(server.filter(p=>!seen.has(p.id)));
    if(c) c.textContent=merged.length;
    if(fl) fl.innerHTML = merged.length ? merged.map(folderRow).join('') : '<div class="empty">No matching jobs.</div>';
  }, 350);
}
function folderRow(p){
  const cust = p.customer?.full_name || p.crew_lead?.name || '';
  const sub = [cust, p.city].filter(Boolean).join(' · ');
  const cid = p.customer?.id || p.customer_id || '';
  return '<div class="folder" onclick="openFolder(\''+cid+'\',\''+p.id+'\')"><div class="ic"><svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><line x1="3" y1="11" x2="21" y2="11" stroke-dasharray="2 2"/><line x1="9" y1="11" x2="9" y2="19" stroke-dasharray="2 2"/></svg></div><div class="body"><div class="addr">'+esc(p.address||p.name||'Job')+'</div><div class="cust">'+esc(sub||'No customer yet')+'</div></div><div class="right">'+statusChip(p.status)+'</div></div>';
}
// Job-folder taps open the SIMPLE in-app folder (photos + footage upload, notes).
// It is the photo-first surface field crew use to push site photos and drone clips
// up fast. The heavy digital folder (job.html: WO scope, computed materials,
// paysheet, P&L) stays one tap away for owner/admin/manager via the footer link
// inside the folder, and from Up next / the calendar / the Production board.
function openFolder(custId, projId){
  openJob(projId);
}
function toggleNew(){ const p=document.getElementById('newpanel'); if(p){ p.classList.toggle('on'); if(p.classList.contains('on')) document.getElementById('nj_addr').focus(); } }
let _measure=null, _mt=null, _act=null, _preds=[];
function njInput(){ njAutocomplete(); njMeasure(); }
async function njAutocomplete(){
  const inp=document.getElementById('nj_addr'); const ac=document.getElementById('nj_ac');
  const v=inp.value.trim();
  clearTimeout(_act);
  if(v.length<3){ ac.innerHTML=''; ac.classList.remove('on'); return; }
  _act=setTimeout(async ()=>{
    const d=await api('/places-autocomplete?q='+encodeURIComponent(v));
    if(inp.value.trim()!==v) return;
    _preds=d.predictions||[];
    if(!_preds.length){ ac.innerHTML=''; ac.classList.remove('on'); return; }
    ac.innerHTML=_preds.map((p,i)=>'<div class="ac-item" onclick="pickPlace('+i+')">'+esc(p.description)+'</div>').join('');
    ac.classList.add('on');
  }, 280);
}
function pickPlace(i){ const p=_preds[i]; if(!p) return; const inp=document.getElementById('nj_addr'); inp.value=p.description; const ac=document.getElementById('nj_ac'); ac.innerHTML=''; ac.classList.remove('on'); njMeasure(); }
function njMeasure(){
  const v = document.getElementById('nj_addr').value.trim();
  const box = document.getElementById('nj_measure'); _measure=null;
  clearTimeout(_mt); if(v.length<6){ box.style.display='none'; return; }
  const q = v;
  _mt = setTimeout(async ()=>{
    box.style.display='block'; box.innerHTML='<span class="spin"></span> measuring roof…';
    const r = await api('/roof-lookup', { method:'POST', body: JSON.stringify({ address:q }) });
    // Ignore a stale response if the address changed while this was in flight.
    if(document.getElementById('nj_addr') && document.getElementById('nj_addr').value.trim() !== q) return;
    if(r && r.ok){ _measure=r; box.innerHTML='📐 ~'+r.sq+' SQ · '+r.pitchX12+'/12 pitch · '+r.segments+' planes <span style="color:var(--faint)">('+r.imageryQuality+')</span>'; }
    else { _measure=null; box.innerHTML='<span style="color:var(--faint)">No rooftop match yet — you can still create the folder.</span>'; }
  }, 700);
}
async function createJob(){
  const addr = document.getElementById('nj_addr').value.trim();
  const custName = document.getElementById('nj_cust').value.trim();
  if(!addr){ toast('Enter an address'); return; }
  const btn=document.getElementById('nj_go'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  const parts = addr.split(',');
  const city = parts.length>1 ? parts[1].trim() : 'Riverview';
  const measure = _measure;
  // Create the project FIRST (address-only). If the optional customer link fails
  // afterward, the folder just stays customer-less rather than leaving an orphan
  // customer record behind.
  const p = await api('/projects', { method:'POST', body: JSON.stringify({ name: addr, address: parts[0].trim(), city, province:'NB', status:'not_started' }) });
  if(!(p && p.id)){ btn.disabled=false; btn.textContent='Create folder'; toast((p&&p.error)||'Could not create the folder.'); return; }
  let resultMsg = 'Folder created';
  if(custName){
    const c = await api('/customers', { method:'POST', body: JSON.stringify({ full_name:custName, address:addr }) });
    if(c && c.id){
      const link = await api('/projects', { method:'PUT', body: JSON.stringify({ id:p.id, customer_id:c.id }) });
      // Rare: customer created but the link write failed. The customer exists and
      // is searchable; surface it so it can be attached from the folder manually.
      if(!(link && link.id)){ resultMsg = 'Folder created. Customer "'+custName+'" saved but not linked, attach it from the folder.'; }
    }
    else { resultMsg = 'Folder created. You can add the customer from the folder.'; }
  }
  if(measure){ await api('/projects?action=add-note', { method:'POST', body: JSON.stringify({ project_id:p.id, body:'Auto roof measure: ~'+measure.sq+' SQ, '+measure.pitchX12+'/12 pitch, '+measure.segments+' planes ('+measure.imageryQuality+' imagery).' }) }); }
  btn.disabled=false; btn.textContent='Create folder';
  toast(resultMsg); _measure=null;
  document.getElementById('nj_addr').value=''; document.getElementById('nj_cust').value=''; openJob(p.id);
}

// ── JOB DETAIL ──
// The simple, photo-first job folder: basic info (incl. the work order color),
// the photo + drone/footage upload, and notes. Deliberately minimal. It is the
// surface field crew use on site to push photos up fast. Scope, materials,
// paysheet, P&L and the on-the-spot proposal live in the full digital folder
// (job.html), one tap away for owner/admin/manager via the footer link.
async function openJob(id){
  CUR_JOB = id;
  // A fresh render rebuilds the photo grid, so any prior select-mode is stale.
  exitSelMode();
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('v-job').classList.add('on');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on', b.dataset.tab==='jobs'));
  window.scrollTo(0,0);
  const w = document.getElementById('jobWrap');
  w.innerHTML = '<div class="empty">Loading…</div>';
  const [det, fl, nts, wod] = await Promise.all([
    api('/projects?id='+id),
    api('/files?project_id='+id),
    api('/projects?action=notes&project_id='+id),
    api('/workorders?limit=200')
  ]);
  const pr = (det && det.id) ? det : {};
  const files = fl.files || [];
  const addr = pr.address || pr.name || 'Job';
  presenceSet('job', addr);
  const cust = pr.customer?.full_name || '';
  const est = pr.estimate || null;
  // Work order color (shingle): the project carries no direct WO link, so match on
  // the linked estimate first, then an exact address match. Crew want the roof
  // color at a glance.
  const wos = (wod && wod.workorders) || [];
  const wo = (est?.id && wos.find(x=>x.linked_estimate_id===est.id))
    || (pr.address && wos.find(x=>x.address && x.address.trim().toLowerCase()===pr.address.trim().toLowerCase()))
    || null;
  const woColor = (wo && (wo.shingle_color || wo.shingle_product)) || '';
  let h = '<span class="back" onclick="switchTab(\'jobs\')">← Job folders</span>';
  h += '<div class="jhead"><div class="addr">'+esc(addr)+'</div></div>';
  const m=[]; if(cust) m.push('Customer <b>'+esc(cust)+'</b>'); m.push('Status <b>'+esc((pr.status||'new').replace('_',' '))+'</b>'); if(woColor) m.push('Color <b>'+esc(woColor)+'</b>'); if(est?.estimate_number) m.push('Est <b>'+esc(est.estimate_number)+'</b>');
  h += '<div class="jmeta">'+m.join('')+'</div>';
  const mapq = encodeURIComponent([addr, pr.city, 'NB'].filter(Boolean).join(', '));
  h += '<div class="jactions"><button onclick="openNoteBox()"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4z"/></svg>Add note</button>'
    + '<a class="jactions-a" style="text-decoration:none;flex:1"><button onclick="window.open(\'https://www.google.com/maps/search/?api=1&query='+mapq+'\')" style="width:100%"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>Navigate</button></a></div>';
  // photos (images + video only; PDFs and other docs are not gallery tiles)
  const media = files.filter(f=>{ const m=f.mime_type||''; return m.startsWith('image')||m.startsWith('video'); });
  h += '<div class="lbl">Photos &amp; footage <span class="n">'+media.length+'</span></div>';
  h += '<button class="upload cam" onclick="openCamera()"><div class="uic"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg></div><div><div class="ut">Take photos</div><div class="us">Live camera, rapid fire. Shoot one after another into the bin</div></div></button>';
  h += '<button class="upload" onclick="document.getElementById(\'photoInput\').click()"><div class="uic"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div><div><div class="ut">Upload photos &amp; footage</div><div class="us">Drone clips and bulk photos from your gallery</div></div></button>';
  CUR_MEDIA = media;
  if(media.length){ h += '<div class="grid" id="photoGrid">' + media.map((f,i)=>{ const vid=(f.mime_type||'').startsWith('video'); const inner=vid?'<video src="'+esc(f.url)+'" muted preload="metadata"></video><span class="vb">▶</span>':'<img loading="lazy" src="'+esc(f.thumbnail_url||f.url)+'">'; return '<div class="thumb" data-fid="'+esc(f.id)+'" onpointerdown="thumbHoldStart(event,'+i+')" onpointermove="thumbHoldMove(event)" onpointerup="thumbHoldEnd()" onpointercancel="thumbHoldEnd()" onpointerleave="thumbHoldEnd()" onclick="thumbTap(event,'+i+')" oncontextmenu="return false">'+inner+'<button class="thx" onpointerdown="event.stopPropagation()" onclick="event.stopPropagation();delPhoto(\''+esc(f.id)+'\')" aria-label="Delete photo">&times;</button><span class="tcheck"></span></div>'; }).join('') + '</div>'; }
  // notes
  const notes = nts.notes || [];
  h += '<div class="lbl">Notes <span class="n">'+notes.length+'</span></div>';
  h += '<div class="panel" id="noteBox"><label>New note</label><textarea id="noteTxt" placeholder="Type, or tap the mic to dictate…"></textarea><div class="prow"><button onclick="closeNoteBox()">Cancel</button><button class="mic" id="micBtn" onclick="toggleDictate()"><svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>Dictate</button><button class="go" onclick="saveNote()">Save note</button></div></div>';
  h += '<button class="addnote" onclick="openNoteBox()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add a note</button>';
  if(pr.notes){ h += '<div class="note"><div class="meta"><b>Job (original)</b></div><div class="txt">'+esc(pr.notes)+'</div></div>'; }
  h += notes.map(n=>'<div class="note"><div class="meta"><b>'+esc(n.guest_name||'Crew')+'</b><span>'+ago(n.created_at)+'</span></div><div class="txt">'+esc(n.body)+'</div></div>').join('');
  // Owner/admin/manager keep the rich digital folder (scope, materials, paysheet,
  // P&L, proposal close) one tap away; crew/sub stay on this clean photo-first folder.
  if(pr.customer_id && ['owner','admin','manager'].includes(String(ROLE||'').toLowerCase())){
    h += '<a href="/job.html?id='+encodeURIComponent(pr.customer_id)+'" style="display:block;margin-top:18px;padding:13px;text-align:center;border:1px solid var(--border-hi);border-radius:var(--r);color:var(--dim);text-decoration:none;font-size:13px">Open full digital folder · scope, materials, P&amp;L &rarr;</a>';
  }
  w.innerHTML = h;
}
function openNoteBox(){ const b=document.getElementById('noteBox'); if(b){ b.classList.add('on'); document.getElementById('noteTxt').focus(); } }
function closeNoteBox(){ const b=document.getElementById('noteBox'); if(b) b.classList.remove('on'); }
async function saveNote(){
  const txt = document.getElementById('noteTxt').value.trim();
  if(!txt){ toast('Write something first'); return; }
  const r = await api('/projects?action=add-note', { method:'POST', body: JSON.stringify({ project_id:CUR_JOB, body:txt }) });

// Photo/footage upload, shared by the gallery picker (#photoInput, multiple) and
// the camera capture (#cameraInput). Small images go multipart (server thumbnails +
// EXIF); videos (drone) and anything over the 50MB function cap go straight to Blob.
async function uploadJobFiles(input){
  if(!input.files.length || !CUR_JOB) return;
  const files=[...input.files]; input.value=''; const job=CUR_JOB, total=files.length;
  presencePing('uploading '+total+' photo'+(total===1?'':'s'));
  const small=[], big=[];
  files.forEach(f=>{ ((f.type||'').startsWith('video') || f.size>50*1024*1024) ? big.push(f) : small.push(f); });
  let done=0, failed=0;
  const prog=()=>toast('<span class="spin"></span> uploading '+(done+failed)+'/'+total+'…');
  prog();
  if(small.length){
    const fd=new FormData(); fd.append('project_id', job); fd.append('category','general'); if(ME?.id) fd.append('uploaded_by', ME.id);
    small.forEach(f=>fd.append('files', f));
    try{ const t=tok(); const r=await fetch(API+'/files?tenant='+TENANT,{method:'POST',headers:t?{Authorization:'Bearer '+t,'x-tenant-id':TENANT}:{'x-tenant-id':TENANT},body:fd}); r.ok?(done+=small.length):(failed+=small.length); }
    catch(e){ failed+=small.length; }
    prog();
  }
  if(big.length){
    try{
      const { upload } = await import('https://esm.sh/@vercel/blob@0.27/client');
      for(const f of big){
        try{
          const blob = await upload(f.name, f, { access:'public', handleUploadUrl:'/api/marketing-upload-token?tenant='+TENANT, clientPayload: JSON.stringify({tenant:TENANT}), contentType: f.type||undefined });
          const t=tok();
          const r=await fetch(API+'/files?tenant='+TENANT,{ method:'POST', headers: Object.assign({'Content-Type':'application/json','x-tenant-id':TENANT}, t?{Authorization:'Bearer '+t}:{}), body: JSON.stringify({ project_id:job, url:blob.url, filename:f.name, mime_type:f.type, file_size:f.size, category:'general', uploaded_by: ME?.id||null }) });
          r.ok?done++:failed++;
        }catch(e){ failed++; }
        prog();
      }
    }catch(e){ failed+=big.length; toast('Big-file upload unavailable right now'); }
  }
  toast(failed ? (done+' uploaded, '+failed+' failed') : ('Uploaded '+done+' file'+(done===1?'':'s')));
  if(CUR_JOB===job) openJob(job);
}
document.getElementById('photoInput').addEventListener('change', function(){ uploadJobFiles(this); });
document.getElementById('cameraInput').addEventListener('change', function(){ uploadJobFiles(this); });

// ── RAPID-FIRE CAMERA ──
// Live in-app camera (getUserMedia) that stays open so crew fire shot after shot.
// Each frame is captured to canvas and uploaded in the background while the camera
// stays ready. Falls back to the native single-capture input if getUserMedia is
// blocked or unavailable (older devices, denied permission).
let _camStream=null, _camJob=null, _camCount=0;
async function openCamera(){
  if(!CUR_JOB){ return; }
  _camJob=CUR_JOB; _camCount=0;
  document.getElementById('camCount').textContent='0';
  document.getElementById('camStrip').innerHTML='';
  document.getElementById('camModal').classList.add('on');
  try{
    _camStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ ideal:'environment' } }, audio:false });
    const v=document.getElementById('camVideo'); v.srcObject=_camStream; await v.play().catch(()=>{});
  }catch(e){
    closeCamera();
    toast('Live camera unavailable, opening the camera app.');
    document.getElementById('cameraInput').click();
  }
}
function closeCamera(){
  document.getElementById('camModal').classList.remove('on');
  if(_camStream){ _camStream.getTracks().forEach(t=>t.stop()); _camStream=null; }
  const v=document.getElementById('camVideo'); if(v) v.srcObject=null;
  // Refresh the folder so the new shots show in the bin.
  if(_camCount>0 && CUR_JOB===_camJob) openJob(_camJob);
}
async function snapPhoto(){
  const v=document.getElementById('camVideo'); if(!v||!v.videoWidth) return;
  const c=document.getElementById('camCanvas'); c.width=v.videoWidth; c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0,c.width,c.height);
  const sh=document.getElementById('camShutter'); sh.classList.add('flash'); setTimeout(()=>sh.classList.remove('flash'),110);
  if(navigator.vibrate) try{ navigator.vibrate(28); }catch(e){}
  const blob = await new Promise(res=>c.toBlob(res,'image/jpeg',0.9));
  if(!blob) return;
  _camCount++; const cc=document.getElementById('camCount'); if(cc) cc.textContent=_camCount;
  const url=URL.createObjectURL(blob);
  const strip=document.getElementById('camStrip');
  const t=document.createElement('div'); t.className='camthumb'; t.innerHTML='<img src="'+url+'"><span class="ust"><span class="spin"></span></span>';
  if(strip) strip.prepend(t);
  const job=_camJob;
  uploadCameraShot(blob, 'photo-'+Date.now()+'.jpg', job).then(ok=>{
    const u=t.querySelector('.ust'); if(u){ u.textContent = ok?'✓':'!'; if(ok) setTimeout(()=>u.remove(),700); }
  });
}
async function uploadCameraShot(blob, fname, job){
  try{
    const fd=new FormData(); fd.append('project_id', job); fd.append('category','general'); if(ME?.id) fd.append('uploaded_by', ME.id);
    fd.append('files', blob, fname);
    const t=tok();
    const r=await fetch(API+'/files?tenant='+TENANT,{ method:'POST', headers: t?{Authorization:'Bearer '+t,'x-tenant-id':TENANT}:{'x-tenant-id':TENANT}, body:fd });
    return r.ok;
  }catch(e){ return false; }
}

function selThumb(id){ const g=document.getElementById('photoGrid'); if(!g) return null; const sel=(window.CSS&&CSS.escape)?CSS.escape(id):id; return g.querySelector('.thumb[data-fid="'+sel+'"]'); }
function thumbHoldStart(e,i){ _suppressTap=false; _holdXY={x:e.clientX,y:e.clientY}; _hold=setTimeout(()=>{ _hold=null; if(!PSEL_MODE) enterSelMode(); const f=CUR_MEDIA[i]; if(f) selectPhoto(f.id,true); _suppressTap=true; if(navigator.vibrate)try{navigator.vibrate(22)}catch(_){}; }, 450); }

async function delPhoto(id){ if(!confirm('Delete this photo? This cannot be undone.')) return; const r=await api('/files?id='+encodeURIComponent(id),{method:'DELETE'}); if(r && !r.error){ toast('Photo deleted'); if(CUR_JOB) openJob(CUR_JOB); } else { toast((r&&r.error)||'Could not delete'); } }
