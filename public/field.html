// Voice dictation in the note box (Web Speech API). Where the browser lacks it
// (some iOS Safari builds), the textarea still accepts OS-level dictation / Wispr,
// so point the user there instead of failing silently.
let _dict=null, _dictOn=false;
function toggleDictate(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const ta = document.getElementById('noteTxt'); const btn = document.getElementById('micBtn');
  if(!ta) return;
  if(!SR){ toast('In-app dictation is not supported on this browser. You can still use your keyboard mic or Wispr right in the note.'); ta.focus(); return; }
  if(_dictOn && _dict){ _dict.stop(); return; }
  _dict = new SR(); _dict.lang='en-CA'; _dict.interimResults=true; _dict.continuous=true;
  const base = ta.value ? ta.value.replace(/\s*$/,'')+' ' : '';
  let finalTxt='';
  _dict.onresult=(e)=>{ let interim=''; for(let i=e.resultIndex;i<e.results.length;i++){ const r=e.results[i]; r.isFinal ? (finalTxt+=r[0].transcript+' ') : (interim+=r[0].transcript); } ta.value=base+finalTxt+interim; };
  _dict.onerror=(e)=>{ if(e&&e.error&&e.error!=='aborted') toast('Mic: '+e.error); };
  _dict.onend=()=>{ _dictOn=false; if(btn) btn.classList.remove('rec'); };
  try{ _dict.start(); _dictOn=true; if(btn) btn.classList.add('rec'); ta.focus(); }
  catch(e){ toast('Could not start the mic'); }
}

// ── SCHEDULE ──
let CAL_VIEW='week', CAL_ANCHOR=null, CAL_SEL=null, CAL_DATA={job:{},gc:{},wo:{},configured:false};
let USER_ICS='';
// Per-user key so a shared crew tablet never carries one user's calendar secret
// to the next login. Loaded in boot() once ME is known.
function icsKey(){ return (ME && ME.id) ? 'ryujin_user_ics_'+ME.id : null; }
function calConnectToggle(){ const p=document.getElementById('calConnect'); if(p){ p.classList.toggle('on'); const i=document.getElementById('calIcsInput'); if(i&&p.classList.contains('on')){ i.value=USER_ICS; i.focus(); } } }
function calSaveIcs(){
  const v=(document.getElementById('calIcsInput').value||'').trim();
  if(v && !/^https:\/\/calendar\.google\.com\/calendar\/ical\/.+\.ics(\?.*)?$/i.test(v)){ toast('That is not an iCal feed. Use the "Secret address in iCal format" URL (ends in .ics)'); return; }
  USER_ICS=v; try{ const k=icsKey(); if(k){ v?localStorage.setItem(k,v):localStorage.removeItem(k); } }catch(e){}
  toast(v?'Your calendar is connected':'Calendar disconnected');
  renderSchedule();
}
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function startOfWeek(d){ const x=new Date(d); x.setHours(0,0,0,0); x.setDate(x.getDate()-x.getDay()); return x; }
function calShift(n){ const d=new Date(CAL_ANCHOR); if(CAL_VIEW==='week'){ d.setDate(d.getDate()+7*n); } else { d.setDate(1); d.setMonth(d.getMonth()+n); } CAL_ANCHOR=d; CAL_SEL=null; renderSchedule(); }
function calSetView(v){ if(CAL_VIEW===v) return; CAL_VIEW=v; CAL_SEL=null; renderSchedule(); }
function calPick(k){ CAL_SEL=(CAL_SEL===k?null:k); drawCalendar(); }
async function renderSchedule(){
  if(!CAL_ANCHOR) CAL_ANCHOR=new Date();
  let from, to;
  if(CAL_VIEW==='week'){ const s=startOfWeek(CAL_ANCHOR); from=ymd(s); const e=new Date(s); e.setDate(s.getDate()+6); to=ymd(e); }
  else { const gs=startOfWeek(new Date(CAL_ANCHOR.getFullYear(),CAL_ANCHOR.getMonth(),1)); from=ymd(gs); const ge=new Date(gs); ge.setDate(gs.getDate()+41); to=ymd(ge); }
  const cal = await api('/tickets?view=calendar&from='+from+'&to='+to+(ME?.id?'&assigned_to='+ME.id:''));
  // Google events for the EXACT visible range (the endpoint reads the full ICS,
  // so this includes the earlier days of the current week/month, not just
  // forward-from-today).
  // POST when a personal calendar is connected so the secret iCal URL travels in
  // the body, never in a logged request URL. Plain GET otherwise.
  const gc = USER_ICS
    ? await api('/google-cal', { method:'POST', body: JSON.stringify({ from, to, ics: USER_ICS }) })
    : await api('/google-cal?from='+from+'&to='+to);
  // Scheduled work orders are the real job calendar. Place each on every day it
  // spans (start_date through start_date + duration - 1) so a 2-day job shows on
  // both days. Not assignee-filtered: WOs are assigned to sub/crew entities, not
  // user ids, so the whole crew sees the job board.
  const wod = await api('/workorders?from='+from+'&limit=80');
  const wob={};
  (wod.workorders||[]).filter(w=>w.status!=='cancelled' && w.start_date).forEach(w=>{
    const dur=Math.max(1, Number(w.estimated_duration_days)||1);
    for(let i=0;i<dur;i++){ const d=new Date(w.start_date+'T00:00:00'); d.setDate(d.getDate()+i); const k=ymd(d); if(k<from||k>to) continue; (wob[k]=wob[k]||[]).push(w); }
  });
  const job=(cal.calendar)||{}; const gcb={};
  (gc.events||[]).forEach(e=>{ const dt=e.startTime?new Date(e.startTime):null; if(!dt)return; (gcb[ymd(dt)]=gcb[ymd(dt)]||[]).push(e); });
  CAL_DATA={job, gc:gcb, wo:wob, configured:!!gc.configured, personal:!!gc.personal};
  drawCalendar();
}
function calHeader(rangeLabel){
  return '<div class="caltop"><div class="calnav"><button onclick="calShift(-1)">&lsaquo;</button><span class="rng">'+esc(rangeLabel)+'</span><button onclick="calShift(1)">&rsaquo;</button></div>'
    +'<div class="caltog"><button class="'+(CAL_VIEW==='week'?'on':'')+'" onclick="calSetView(\'week\')">Week</button><button class="'+(CAL_VIEW==='month'?'on':'')+'" onclick="calSetView(\'month\')">Month</button></div></div>'
    +'<div class="syncbar" onclick="calConnectToggle()" style="cursor:pointer"><div class="l"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>Google Calendar</div><div class="st">'+(CAL_DATA.personal?'your calendar ▾':(CAL_DATA.configured?'shared cal ▾':'connect ▾'))+'</div></div>'
    +'<div class="panel" id="calConnect"><h3>Connect your Google Calendar</h3><p>Paste your calendar\'s secret iCal URL. In Google Calendar: Settings → your calendar → "Secret address in iCal format".</p><label>Secret iCal URL</label><input type="text" id="calIcsInput" placeholder="https://calendar.google.com/calendar/ical/.../basic.ics" autocomplete="off"><div class="prow"><button onclick="calConnectToggle()">Close</button><button class="go" onclick="calSaveIcs()">'+(USER_ICS?'Update':'Connect')+'</button></div></div>';
}
function dayPills(key, max){
  let items=[];
  (CAL_DATA.wo[key]||[]).forEach(w=>items.push('<span class="pill job" onclick="event.stopPropagation();openJobByWo(\''+(w.id||w.wo_number)+'\')" style="cursor:pointer">'+esc(w.address||w.customer_name||'Job')+(w.customer_name&&w.address?'<span class="pt"> '+esc(w.customer_name)+'</span>':'')+'</span>'));
  (CAL_DATA.job[key]||[]).forEach(t=>items.push('<span class="pill job">'+esc(t.title)+(t.project?.address?'<span class="pt"> '+esc(t.project.address)+'</span>':'')+'</span>'));
  (CAL_DATA.gc[key]||[]).forEach(e=>items.push('<span class="pill gcal"><span class="pt">'+(e.allDay?'all day':timeStr(e.startTime))+' </span>'+esc(e.summary||'Event')+'</span>'));
  if(max && items.length>max){ const extra=items.length-max; items=items.slice(0,max); items.push('<span class="pill" style="text-align:center;color:var(--faint)">+'+extra+' more</span>'); }
  return items.join('');
}
function drawCalendar(){
  const w=document.getElementById('schedWrap'); const today=ymd(new Date());
  if(CAL_VIEW==='week'){
    const start=startOfWeek(CAL_ANCHOR); const end=new Date(start); end.setDate(start.getDate()+6);
    const rng=start.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+end.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    let h=calHeader(rng)+'<div class="weekgrid">';
    for(let i=0;i<7;i++){ const d=new Date(start); d.setDate(start.getDate()+i); const k=ymd(d);
      h+='<div class="wday'+(k===today?' today':'')+'"><div class="dh"><span>'+d.toLocaleDateString('en-US',{weekday:'short'})+'</span><span>'+d.getDate()+'</span></div>'+(dayPills(k)||'<div style="font-size:11px;color:var(--faint)">—</div>')+'</div>'; }
    w.innerHTML=h+'</div>'; return;
  }
  const mo=CAL_ANCHOR.getMonth();
  const gridStart=startOfWeek(new Date(CAL_ANCHOR.getFullYear(),mo,1));
  let h=calHeader(CAL_ANCHOR.toLocaleDateString('en-US',{month:'long',year:'numeric'}))+'<div class="monthgrid">';
  ['S','M','T','W','T','F','S'].forEach(d=>h+='<div class="mhead">'+d+'</div>');
  for(let i=0;i<42;i++){ const d=new Date(gridStart); d.setDate(gridStart.getDate()+i); const k=ymd(d);
    const jc=(CAL_DATA.job[k]||[]).length+(CAL_DATA.wo[k]||[]).length, gn=(CAL_DATA.gc[k]||[]).length;
    let dots=''; if(jc) dots+='<span class="dot job"></span>'; if(gn) dots+='<span class="dot gcal"></span>';
    h+='<div class="mcell'+(d.getMonth()!==mo?' out':'')+(k===today?' today':'')+(k===CAL_SEL?' sel':'')+'" onclick="calPick(\''+k+'\')"><div class="mn">'+d.getDate()+'</div><div>'+dots+'</div></div>'; }
  h+='</div>';
  if(CAL_SEL){ h+='<div class="day">'+new Date(CAL_SEL+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}).toUpperCase()+'</div>'; const p=dayPills(CAL_SEL); h+= p?('<div style="margin-top:4px">'+p+'</div>'):'<div class="empty">Nothing on this day.</div>'; }
  w.innerHTML=h;
}

// ── MESSAGES (threaded) ──
// Inbox is a thread list: every message belongs to a thread_id, so the list
// collapses to one row per conversation (latest message wins). Tapping a row
// opens the full back-and-forth; replying stays in the same thread. New messages
// start a fresh thread you can return to.
function meId(fallback){ const id=(ME && ME.id) || fallback || MY_ID || null; if(id) MY_ID=id; return id; }
async function renderMessages(){
  const w = document.getElementById('msgWrap');
  const d = await api('/messages?box=all&limit=300');
  const msgs = d.messages||[];
  const mid = meId(d.me && d.me.id);
  setBadge(msgs.filter(m=>!m.read_at && m.to_user_id===mid).length);
  const byThread = new Map();
  for(const m of msgs){ const c=byThread.get(m.thread_id); if(!c || new Date(m.created_at)>new Date(c.created_at)) byThread.set(m.thread_id,m); }
  const threads = [...byThread.values()].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  let h = '<div class="lbl">Messages</div>';
  h += '<button class="newmsg" onclick="openCompose()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New message</button>';
  h += threads.length ? threads.map(m=>{
    const fromMe = m.from_user_id===mid;
    const other = fromMe ? (m.to_user?.name||'Recipient') : (m.from_user?.name||m.from_label||'System');
    const unread = !m.read_at && m.to_user_id===mid;
    const preview = (fromMe?'You: ':'')+(m.body||'');
    return '<div class="msg '+(unread?'unread':'')+'" onclick="openThread(\''+m.thread_id+'\')"><div class="av">'+esc((other[0]||'?').toUpperCase())+'</div><div class="body"><div class="top"><span class="nm">'+esc(other)+'</span><span class="tm">'+ago(m.created_at)+'</span></div><div class="pv">'+esc(preview.slice(0,140))+'</div></div></div>';
  }).join('') : '<div class="empty">No messages yet. Tap New message to start a thread.</div>';
  w.innerHTML = h;
}
async function openThread(threadId){
  ACTIVE_THREAD = threadId;
  document.getElementById('threadOverlay').classList.add('on');
  const log=document.getElementById('threadLog'); log.innerHTML='<div class="empty">Loading…</div>';
  const bar=document.getElementById('threadReplyBar'); bar.style.display='none';
  const d=await api('/messages?thread_id='+encodeURIComponent(threadId));
  const mid=meId(d.me && d.me.id);
  const msgs=(d.messages||[]).slice().sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  if(!msgs.length){ log.innerHTML='<div class="empty">Empty thread.</div>'; return; }
  const head=msgs[0];
  const otherName = head.from_user_id===mid ? (head.to_user?.name||'Recipient') : (head.from_user?.name||head.from_label||'System');
  const otherId = head.from_user_id===mid ? head.to_user_id : head.from_user_id;
  document.getElementById('threadWith').textContent = otherName;
  log.innerHTML = msgs.map(m=>{ const fromMe=m.from_user_id===mid; const who=fromMe?'You':(m.from_user?.name||m.from_label||'System'); return '<div class="tmsg '+(fromMe?'me':'them')+'"><div class="twho">'+esc(who)+'</div><div class="tbody">'+esc(m.body||'')+'</div><div class="twhen">'+ago(m.created_at)+'</div></div>'; }).join('');
  log.scrollTop=log.scrollHeight;
  for(const m of msgs){ if(!m.read_at && m.to_user_id===mid){ api('/messages?id='+m.id,{method:'PATCH',body:JSON.stringify({read:true})}); } }
  REPLY = { to:otherId, head:head.id, thread:threadId };
  if(otherId){ bar.style.display='flex'; const inp=document.getElementById('threadReply'); inp.value=''; setTimeout(()=>inp.focus(),60); }
}
function closeThread(){ document.getElementById('threadOverlay').classList.remove('on'); ACTIVE_THREAD=null; if(CUR_TAB==='messages') renderMessages(); }
async function sendThreadReply(){
  const inp=document.getElementById('threadReply'); const text=(inp.value||'').trim(); if(!text) return;
  if(!REPLY.to){ toast('No one to reply to in this thread.'); return; }
  const btn=document.getElementById('threadSend'); btn.disabled=true;
  const r=await api('/messages',{ method:'POST', body:JSON.stringify({ to_user_id:REPLY.to, body:text, reply_to:REPLY.head, thread_id:REPLY.thread }) });
  btn.disabled=false;
  if(r && r.error){ toast(r.error); return; }
  inp.value=''; openThread(REPLY.thread);
}
async function loadTeam(){ if(TEAM) return TEAM; const d=await api('/users'); TEAM=((d&&d.users)||[]).filter(u=>u.id && u.id!==meId()); return TEAM; }
async function openCompose(){
  document.getElementById('composeBody').value='';
  const sel=document.getElementById('composeTo'); sel.innerHTML='<option value="">Loading…</option>';
  document.getElementById('composeOverlay').classList.add('on');
  const team=await loadTeam();
  sel.innerHTML = team.length ? team.map(u=>'<option value="'+u.id+'">'+esc(u.name||u.email||'User')+(u.role?' · '+u.role:'')+'</option>').join('') : '<option value="">No teammates found</option>';
}
function closeCompose(){ document.getElementById('composeOverlay').classList.remove('on'); }
async function sendCompose(){
  const btn=document.getElementById('composeSend');
  const bodyTxt=(document.getElementById('composeBody').value||'').trim();
  if(!bodyTxt){ toast('Write a message first.'); return; }
  const toId = document.getElementById('composeTo').value;
  if(!toId){ toast('Pick who to send to.'); return; }
  btn.disabled=true; btn.textContent='Sending…';
  const r=await api('/messages',{ method:'POST', body:JSON.stringify({ to_user_id:toId, body:bodyTxt }) });
  btn.disabled=false; btn.textContent='Send';
  if(r && r.error){ toast(r.error); return; }
  closeCompose();
  if(r.thread_id){ openThread(r.thread_id); } else { renderMessages(); }
}
function toggleMenu(e){ if(e) e.stopPropagation(); const m=document.getElementById('acctMenu'); if(!m) return; m.classList.toggle('on'); }
function signOut(){ try{ localStorage.removeItem('ryujin_token'); localStorage.removeItem('ryujin_user'); sessionStorage.removeItem('ryujin_token'); sessionStorage.removeItem('ryujin_user'); }catch(e){} location.href='/login.html'; }
document.addEventListener('click', ()=>{ const m=document.getElementById('acctMenu'); if(m) m.classList.remove('on'); });
function setBadge(n){ ['msgBadge','navMsgBadge'].forEach(id=>{ const b=document.getElementById(id); if(!b) return; if(n>0){ b.textContent=n; b.style.display='flex'; } else b.style.display='none'; }); }
async function sendOS(){
  const inp=document.getElementById('osInput'); if(!inp) return; const q=(inp.value||'').trim(); if(!q) return;
  const out=document.getElementById('osResult'); out.innerHTML='<span class="spin"></span> routing…'; inp.disabled=true;
  const r=await api('/os-dispatch',{method:'POST',body:JSON.stringify({message:q})});
  inp.disabled=false; inp.focus();
  if(r&&r.ok&&r.routed_to&&r.routed_to.length){ const names=[...new Set(r.routed_to.map(x=>x.name))].join(', '); out.innerHTML='<span class="osok">✓ Sent to <b>'+esc(names)+'</b>. They will be notified.</span>'; inp.value=''; presencePing('asked the OS'); }
  else if(r&&r.ok){ out.innerHTML='<span class="osnote">'+esc(r.note||'Logged it.')+'</span>'; }
  else { out.innerHTML='<span class="osnote">'+esc((r&&r.error)||'Could not route that. Try again.')+'</span>'; }
}

// ── CLOCK ──
async function renderClock(){
  const w = document.getElementById('clockWrap');
  if(!ME?.id){ w.innerHTML='<div class="empty">Could not load your profile. Reopen the app from the login screen.</div>'; return; }
  const n=new Date(); const today=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
  const d = await api('/time?user_id='+ME.id+'&from='+today+'&to='+today);
  const open = (d.entries||[]).find(e=>!e.clock_out);
  let h='';
  if(open){ h += '<div class="clockcard"><div class="time">'+timeStr(open.clock_in)+'</div><div class="sub">Clocked in since '+timeStr(open.clock_in)+'</div></div><button class="clockbtn out" onclick="clockOut()">Clock out</button>'; }
  else { const done=(d.entries||[]).find(e=>e.clock_out); h += '<div class="clockcard"><div class="time" style="color:var(--dim)">'+(done?Number(done.total_hours||0).toFixed(2)+' h':'--:--')+'</div><div class="sub">'+(done?'Logged today':'Not clocked in')+'</div></div><button class="clockbtn in" onclick="clockIn()">Clock in</button>'; }
  w.innerHTML = h;
}
async function clockIn(){ if(!ME?.id){ toast('No user'); return; } const r=await api('/time',{method:'POST',body:JSON.stringify({user_id:ME.id})}); if(r&&r.id){ toast('Clocked in'); presencePing('clocked in'); } else toast((r&&r.error)||'Could not clock in'); renderClock(); }
async function clockOut(){ if(!ME?.id) return; const r=await api('/time',{method:'PUT',body:JSON.stringify({user_id:ME.id,action:'clock_out'})}); if(r&&r.id){ toast('Clocked out'); presencePing('clocked out'); } else toast((r&&r.error)||'Could not clock out'); renderClock(); }

// ── FIELD ASSISTANT ──
let AI_HIST=[];
function openAI(){
  document.getElementById('aiOverlay').classList.add('on');
  setTimeout(()=>{ const i=document.getElementById('aiInput'); if(i) i.focus(); },60);
  if(!AI_HIST.length){
    const greet = 'Hey'+(ME?.name?' '+ME.name.split(' ')[0]:'')+'. Ask me what you need to do today, or tell me to open a job or start an upload.';
    aiPush('ai', greet);
    const log=document.getElementById('aiLog'); const c=document.createElement('div'); c.className='ai-chips';
    ['What do I need to do today?','Open a job','Upload photos to a job'].forEach(t=>{ const b=document.createElement('div'); b.className='ai-chip'; b.textContent=t; b.onclick=()=>{ document.getElementById('aiInput').value=t; sendAI(); }; c.appendChild(b); });
    log.appendChild(c);
  }
}
function closeAI(){ document.getElementById('aiOverlay').classList.remove('on'); }
function aiFormat(t){ let s=esc(t); s=s.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>'); s=s.replace(/^[\-\*•]\s+/gm,'• '); s=s.replace(/\n/g,'<br>'); return s; }
function aiPush(role, text){ const log=document.getElementById('aiLog'); const d=document.createElement('div'); d.className='ai-msg '+role; d.innerHTML=(role==='ai'?aiFormat(text):esc(text)); log.appendChild(d); log.scrollTop=log.scrollHeight; return d; }
async function sendAI(){
  const inp=document.getElementById('aiInput'); const q=(inp.value||'').trim(); if(!q) return;
  inp.value=''; const chips=document.querySelector('.ai-chips'); if(chips) chips.remove();
  aiPush('user', q);
  const loading=aiPush('ai','<span class="spin"></span>');
  const r = await api('/field-assistant', { method:'POST', body: JSON.stringify({ message:q, history:AI_HIST.slice(-6) }) });
  loading.remove();
  if(r && r.reply){ aiPush('ai', r.reply); AI_HIST.push({role:'user',content:q},{role:'assistant',content:r.reply}); if(r.action) execAI(r.action); }
  else { aiPush('ai', (r&&r.error)==='sign_in_required' ? 'Your session expired, reopen from the login screen.' : ((r&&r.error)||'I could not reach the assistant. Try again.')); }
}
function aiGo(id, upload){ closeAI(); openJob(id); if(upload) setTimeout(()=>{ const pi=document.getElementById('photoInput'); if(pi) pi.click(); }, 700); }
async function execAI(a){
  try{
    if(a.type==='navigate' && /^(tasks|jobs|schedule|clock)$/.test(a.tab||'')){ closeAI(); switchTab(a.tab); return; }
    if(a.type==='open_folder' && (a.wo||a.id)){ closeAI(); const wv=String(a.wo||'').replace(/^\s*wo\s*#?\s*/i,'').trim(); window.location.href = wv ? ('/job.html?wo='+encodeURIComponent(wv)) : ('/job.html?id='+encodeURIComponent(a.id)); return; }
    if((a.type==='open_job'||a.type==='upload') && a.query){
      const upload=a.type==='upload';
      const m=await aiMatches(a.query);
      if(m.length===1){ aiGo(m[0].id, upload); }
      else if(m.length>1){ aiOfferMatches(m, upload, a.query); }
      else aiPush('ai','I could not find a job matching "'+esc(a.query)+'". Check the Jobs tab.');
    }
  }catch(e){}
}
async function aiMatches(q){
  const ql=String(q).toLowerCase();
  const local=(ALL_JOBS||[]).filter(p=>((p.address||'')+' '+(p.name||'')+' '+(p.customer?.full_name||'')).toLowerCase().includes(ql));
  const d=await api('/projects?limit=10&search='+encodeURIComponent(q));
  const server=(d.projects||[]).filter(p=>p.status!=='cancelled');
  const seen=new Set(local.map(p=>p.id));
  return local.concat(server.filter(p=>!seen.has(p.id)));
}
function aiOfferMatches(list, upload, q){
  aiPush('ai','A few jobs match "'+esc(q)+'". Which one?');
  const log=document.getElementById('aiLog'); const c=document.createElement('div'); c.className='ai-chips';
  list.slice(0,6).forEach(p=>{ const b=document.createElement('div'); b.className='ai-chip'; b.textContent=(p.address||p.name)+(p.customer?.full_name?' · '+p.customer.full_name:''); b.onclick=()=>aiGo(p.id, upload); c.appendChild(b); });
  log.appendChild(c); log.scrollTop=log.scrollHeight;
}

// ── AUTO-UPDATE ── never let a crew device sit on a stale cached build. Compare
// this document's ETag (a content hash that changes every deploy) against the
// live one and reload when it differs, on a timer + whenever the tab refocuses.
// Skips the reload while a sheet is open or text is half-typed so it never yanks
// anyone mid-task; the next check (or the next refocus) catches it.
let BOOT_TAG = null;
async function liveTag(){ try{ const r=await fetch(location.pathname,{method:'HEAD',cache:'no-store'}); return r.headers.get('etag')||r.headers.get('last-modified'); }catch(e){ return null; } }
function updBusy(){ try{ if(document.querySelector('.ai-overlay.on')) return true; for(const el of document.querySelectorAll('textarea,input')){ const t=(el.type||'').toLowerCase(); if(t==='file'||t==='checkbox'||t==='radio'||t==='hidden') continue; if((el.value||'').trim()) return true; } }catch(e){} return false; }
async function checkUpdate(force){ const t=await liveTag(); if(!t) return; if(!BOOT_TAG){ BOOT_TAG=t; return; } if(t!==BOOT_TAG && (force||!updBusy())) location.reload(); }

// ── BOOT ──
async function boot(){
  checkUpdate();
  setInterval(()=>checkUpdate(false), 120000);
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) checkUpdate(false); });
  // Identity + capabilities in one call: same app for everyone, tools gated by role.
  let ci=null; try{ ci=await api('/companion-init'); }catch(e){}
  if(ci && ci.ok){ ME={ id:ci.user&&ci.user.id, name:ci.user&&ci.user.name, email:ci.user&&ci.user.email }; CAPS=ci.capabilities||null; ROLE=ci.role||null; }
  if(!ME || !ME.id){ const me = await api('/auth?action=me'); if(me && me.user) ME = me.user; }
  if(!ME){ try{ ME = JSON.parse(localStorage.getItem('ryujin_user')||'null'); }catch(e){} }
  document.getElementById('meName').textContent = ME ? (ME.name||'Field') : 'Field';
  const fn = ME ? (ME.name||'Field').split(' ')[0] : 'Field';
  const wn=document.getElementById('whoamiName'); if(wn) wn.textContent=fn;
  const wr=document.getElementById('whoamiRole'); if(wr) wr.textContent=ROLE?('· '+ROLE):'';
  applyCaps();
  try{ const k=icsKey(); USER_ICS = k ? (localStorage.getItem(k)||'') : ''; }catch(e){}
  setInterval(()=>presencePing(), 12000);
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) presencePing(); });
  switchTab(firstVisibleTab());
  if(can('show_inbox')) api('/messages?box=unread').then(d=>setBadge((d.messages||[]).length||0));
  // Preload jobs so the assistant can resolve a job by customer name (client-side
  // match includes customers) from a fresh session, before Jobs is ever opened.
  if(!(ALL_JOBS && ALL_JOBS.length)){ api('/projects?limit=500').then(d=>{ ALL_JOBS=(d.projects||[]).filter(p=>p.status!=='cancelled'); }); }
}
boot();
