<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Production</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow:hidden;position:relative}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(251,146,60,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(248,113,113,0.08) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(251,146,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(251,146,60,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}
.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(251,146,60,0.24);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#fb923c,#f87171,transparent);opacity:0.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.3),rgba(251,146,60,0.22) 40%,rgba(30,10,5,0.8));box-shadow:0 0 14px rgba(251,146,60,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}
.tb-stat{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:0.68em;color:rgba(160,190,230,0.62);letter-spacing:1px}
.tb-stat .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.tb-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.24);color:rgba(160,190,230,0.62);cursor:pointer;transition:all 0.2s}
.tb-icon:hover{color:#fb923c;border-color:rgba(251,146,60,0.5);background:rgba(251,146,60,0.08)}
.tb-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#subhub-stage{position:absolute;inset:0;width:100%;height:100%}
</style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <button class="tb-icon" onclick="goBackToMainHub()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· PRODUCTION</span></div></div>
  <div class="tb-stat"><div class="dot"></div><span>ACTION BOARD · LIVE</span></div>
  <div class="tb-spacer"></div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px">CREW · DISPATCH</div>
</div>

<div id="subhub-stage"></div>

<script src="assets/ryujin-search.js"></script>
<script src="assets/ryujin-chat.js"></script>
<script src="assets/ryujin-tutor.js"></script>
<script src="assets/ryujin-subhub.js"></script>
<script>
RyujinSubHub.init({
  sector: 'PRODUCTION',
  subtitle: 'DISPATCH · SCHEDULE · PAY · SUPPLY',
  accent: { main: '#fb923c', deep: '#c2410c', glow: 'rgba(251,146,60,0.35)' },
  panels: [
    {
      title: 'WORK ORDERS',
      sub: 'Per-job scope · crew assignments · task checklists · client info',
      meta: 'SIGNED JOBS · CREW · TASKS',
      url: 'production-workorders.html',
      icon: '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/><line x1="9" y1="11" x2="15" y2="11"/></svg>'
    },
    {
      title: 'ACTIVE JOBS',
      sub: 'Crew tickets · assignments · in progress · overdue',
      meta: 'TICKETS · CREW DISPATCH',
      url: 'production-jobs.html',
      icon: '<svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>'
    },
    {
      title: 'CALENDAR',
      sub: 'Month view · jobs · inspections · material deliveries · weather alerts',
      meta: 'JOBS · INSPECTIONS · WEATHER',
      url: 'production-calendar.html',
      icon: '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'
    },
    {
      title: 'PAY SHEETS',
      sub: 'Sub contractor pay · uplifts · deductions · PDF export',
      meta: 'SUB PAY · DEDUCTIONS · PDF',
      url: 'production-paysheet.html',
      icon: '<svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>'
    },
    {
      title: 'MATERIALS',
      sub: 'Orders · deliveries · CertainTeed · Sterling gutters · tracking',
      meta: 'PER-JOB SHOPPING · POs',
      url: 'production-materials.html',
      icon: '<svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>'
    }
  ]
});

Ryujin.init({
  sector: 'PRODUCTION',
  autoOpen: false,
  root: {
    msg: "Production floor. Pick a system — work orders, active jobs, calendar, pay sheets, or materials.",
    choices: [
      { text: 'Active Jobs', next: 'jobs' },
      { text: '3-day Schedule', next: 'sched' },
      { text: 'Generate Pay Sheet', next: 'pay' },
      { text: 'Material orders', next: 'mat' }
    ]
  },
  states: {
    jobs: { effect: () => setTimeout(() => window.location.href='production-jobs.html', 500), choices: [] },
    sched: { effect: () => setTimeout(() => window.location.href='production-schedule.html', 500), choices: [] },
    pay: { effect: () => setTimeout(() => window.location.href='production-paysheet.html', 500), choices: [] },
    mat: { effect: () => setTimeout(() => window.location.href='production-materials.html', 500), choices: [] }
  }
});

function goBackToMainHub(){
  if (window.parent !== window && window.parent.exitSectionOverlay) { window.parent.exitSectionOverlay(); return; }
  window.location.href = 'command-center.html';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); goBackToMainHub(); } });
document.addEventListener('contextmenu', e => { e.preventDefault(); goBackToMainHub(); });
</script>

<script src="assets/ryujin-mode.js"></script>
<script src="assets/ryujin-tenant.js"></script>
<script src="assets/ryujin-persist.js"></script>
<script src="assets/ryujin-api.js"></script>
<script src="assets/ryujin-scenario.js"></script>
<script src="assets/ryujin-xp.js"></script>
<script src="assets/ryujin-mode-badge.js"></script>

</body>
</html>
