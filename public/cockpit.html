<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#030611">
<title>Ryujin · Cockpit</title>
<link rel="icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#030611; --bg-2:#06101f;
  --teal:#2dd4bf; --teal-2:#5eead4; --teal-dim:rgba(45,212,191,0.5);
  --ink:#e6f1f4; --ink-dim:rgba(190,214,222,0.62);
  --line:rgba(45,212,191,0.16); --line-2:rgba(45,212,191,0.32);
  --red:#f87171; --amber:#fbbf24; --green:#4ade80;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;overflow:hidden}

/* Ambient dragon + caustics background */
#bg-dragon{position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover;z-index:0;opacity:0.22;mix-blend-mode:screen;filter:hue-rotate(120deg) saturate(1.2) brightness(1.05) contrast(1.05);pointer-events:none}
.vignette{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(120% 90% at 50% 38%,rgba(3,6,17,0) 0%,rgba(3,6,17,0.5) 62%,rgba(3,6,17,0.92) 100%)}

.shell{position:relative;z-index:2;height:100vh;display:grid;grid-template-rows:56px 1fr;}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 22px}
.wordmark{font-weight:900;letter-spacing:3px;font-size:0.95em}
.wordmark span{color:var(--teal)}
.modes{display:flex;gap:2px;background:rgba(255,255,255,0.04);border:1px solid var(--line);border-radius:999px;padding:3px}
.mode{font:inherit;font-size:0.74em;font-weight:700;letter-spacing:0.5px;color:var(--ink-dim);background:transparent;border:none;border-radius:999px;padding:7px 15px;cursor:pointer}
.mode.active{background:rgba(45,212,191,0.16);color:var(--teal-2);box-shadow:0 0 0 1px var(--line-2) inset}
.mode:disabled{opacity:0.45;cursor:not-allowed}

/* Stage */
.stage{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:10px 20px 40px;overflow-y:auto}
.stage.answering{justify-content:flex-start;padding-top:24px}

/* Dragon orb */
.orb-wrap{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;transition:width 0.4s ease,height 0.4s ease}
.stage.answering .orb-wrap{width:120px;height:120px}
#orb{width:100%;height:100%;object-fit:contain;border-radius:50%;position:relative;z-index:2;filter:drop-shadow(0 0 24px rgba(45,212,191,0.35))}
.orb-glow{position:absolute;inset:-18%;z-index:1;border-radius:50%;background:radial-gradient(circle,rgba(45,212,191,0.28) 0%,rgba(45,212,191,0) 65%);animation:breathe 4.5s ease-in-out infinite}
.orb-wrap[data-state="thinking"] .orb-glow{animation-duration:1.4s;background:radial-gradient(circle,rgba(45,212,191,0.42) 0%,rgba(45,212,191,0) 68%)}
.orb-wrap[data-state="speaking"] .orb-glow{animation-duration:2s;background:radial-gradient(circle,rgba(94,234,212,0.4) 0%,rgba(45,212,191,0) 70%)}
.orb-wrap[data-state="listening"] .orb-glow{background:radial-gradient(circle,rgba(14,165,233,0.32) 0%,rgba(45,212,191,0) 66%)}
@keyframes breathe{0%,100%{transform:scale(1);opacity:0.85}50%{transform:scale(1.08);opacity:1}}

/* Prompt */
.prompt-wrap{width:100%;max-width:680px;flex:0 0 auto}
#summon-form{display:flex;align-items:center;gap:10px;background:rgba(8,18,32,0.66);backdrop-filter:blur(10px);border:1px solid var(--line-2);border-radius:16px;padding:6px 6px 6px 20px;box-shadow:0 18px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(45,212,191,0.06)}
#summon-form:focus-within{border-color:var(--teal-dim);box-shadow:0 18px 60px rgba(0,0,0,0.55),0 0 30px rgba(45,212,191,0.18)}
#cmd{flex:1;background:transparent;border:none;outline:none;color:var(--ink);font:inherit;font-size:1.18em;font-weight:500;padding:14px 0}
#cmd::placeholder{color:rgba(190,214,222,0.4)}
#send{flex:0 0 auto;width:48px;height:48px;border-radius:12px;border:none;background:linear-gradient(160deg,var(--teal),#0ea5e9);color:#04121a;font-size:1.3em;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.12s,filter 0.12s}
#send:hover{filter:brightness(1.1)}
#send:active{transform:scale(0.94)}
#send:disabled{opacity:0.5;cursor:default}
.state-label{height:20px;margin-top:12px;text-align:center;font-size:0.78em;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--teal-2);opacity:0.85}

/* Chips */
.chips-row{width:100%;max-width:760px;display:flex;flex-direction:column;align-items:center;gap:14px;flex:0 0 auto}
.fallback-chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.chip{font:inherit;font-size:0.84em;font-weight:600;color:var(--ink-dim);background:rgba(14,26,40,0.6);border:1px solid var(--line);border-radius:999px;padding:9px 16px;cursor:pointer;transition:all 0.14s}
.chip:hover{color:var(--teal-2);border-color:var(--line-2);background:rgba(45,212,191,0.08)}

/* Answer surface */
.answer{width:100%;max-width:760px;flex:0 0 auto;margin-top:4px;animation:rise 0.3s ease both}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.tools{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.tool{display:flex;align-items:center;gap:9px;font-size:0.82em;color:var(--ink-dim);font-family:'JetBrains Mono',monospace}
.tool .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex:0 0 auto;box-shadow:0 0 8px currentColor;animation:pulse 1s infinite}
.tool.ok .dot{background:var(--green);animation:none}
.tool.err .dot{background:var(--red);animation:none}
.tool.wait .dot{background:var(--teal)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
.reply{background:rgba(8,18,32,0.7);border:1px solid var(--line);border-left:3px solid var(--teal);border-radius:14px;padding:20px 24px;font-size:1.06em;color:var(--ink);white-space:pre-wrap;word-wrap:break-word;min-height:30px}
.reply:empty{display:none}
.lens{display:inline-block;font-size:0.66em;letter-spacing:1.5px;text-transform:uppercase;font-weight:800;color:var(--teal-2);background:rgba(45,212,191,0.1);border:1px solid var(--line-2);padding:4px 10px;border-radius:999px;margin-bottom:10px}
.approvals{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.approve-btn{display:flex;align-items:center;gap:10px;font:inherit;font-size:0.92em;font-weight:700;color:#04121a;background:linear-gradient(160deg,var(--teal),#0ea5e9);border:none;border-radius:12px;padding:13px 18px;cursor:pointer;text-align:left}
.approve-btn:hover{filter:brightness(1.08)}
.approve-btn.done{background:rgba(74,222,128,0.16);color:var(--green);box-shadow:0 0 0 1px rgba(74,222,128,0.4) inset;cursor:default}
.approve-btn .code{font-family:'JetBrains Mono',monospace;font-size:0.82em;opacity:0.8}
.err-line{color:var(--red);font-size:0.9em;margin-top:8px}

#needs-you-now{display:flex;justify-content:center}

@media(max-width:640px){
  .orb-wrap{width:150px;height:150px}
  #cmd{font-size:1.05em}
  .modes .mode{padding:7px 11px}
}
</style>
</head>
<body>

<video id="bg-dragon" muted playsinline loop preload="none" disableremoteplayback data-src="/assets/videos/bacround cinematic update.mp4"></video>
<div class="vignette"></div>

<div class="shell">
  <header class="topbar">
    <div class="wordmark">RYUJIN <span>OS</span></div>
    <div class="modes" role="tablist" aria-label="Mode">
      <button class="mode active" type="button" aria-selected="true">Agent</button>
      <button class="mode" type="button" disabled title="Coming soon">Interactive</button>
      <button class="mode" type="button" disabled title="Coming soon">Advanced</button>
    </div>
  </header>

  <main class="stage" id="stage">
    <div class="orb-wrap" id="orbWrap" data-state="idle">
      <video id="orb" src="/assets/orbs/idle.mp4" autoplay loop muted playsinline preload="auto"></video>
      <div class="orb-glow"></div>
    </div>

    <div class="prompt-wrap">
      <form id="summon-form" autocomplete="off">
        <input id="cmd" name="cmd" placeholder="What do you need?" aria-label="Command" autocomplete="off" />
        <button id="send" type="submit" aria-label="Summon">&#8593;</button>
      </form>
      <div class="state-label" id="stateLabel"></div>
    </div>

    <div class="answer" id="answer" hidden>
      <div id="lens"></div>
      <div class="tools" id="tools"></div>
      <div class="reply" id="reply"></div>
      <div class="approvals" id="approvals"></div>
    </div>

    <div class="chips-row">
      <div id="needs-you-now"></div>
      <div class="fallback-chips" id="fallbackChips">
        <button class="chip" type="button" data-q="What needs me today?">What needs me today?</button>
        <button class="chip" type="button" data-q="How is the pipeline looking?">Pipeline status</button>
        <button class="chip" type="button" data-q="What is overdue right now?">What is overdue?</button>
      </div>
    </div>
  </main>
</div>

<script>
window.RYUJIN_TENANT_SLUG = window.RYUJIN_TENANT_SLUG || 'plus-ultra';
</script>
<script src="/assets/needs-you-now.js" defer></script>
<script>
(function () {
  'use strict';

  var ORB_STATES = { idle: '/assets/orbs/idle.mp4', listening: '/assets/orbs/listening.mp4', thinking: '/assets/orbs/thinking.mp4', speaking: '/assets/orbs/speaking.mp4', alert: '/assets/orbs/alert.mp4' };
  var STATE_LABELS = { idle: '', listening: 'Listening', thinking: 'Summoning', speaking: '', alert: '' };

  var orb = document.getElementById('orb');
  var orbWrap = document.getElementById('orbWrap');
  var stateLabel = document.getElementById('stateLabel');
  var stage = document.getElementById('stage');
  var form = document.getElementById('summon-form');
  var cmd = document.getElementById('cmd');
  var sendBtn = document.getElementById('send');
  var answerEl = document.getElementById('answer');
  var toolsEl = document.getElementById('tools');
  var replyEl = document.getElementById('reply');
  var approvalsEl = document.getElementById('approvals');
  var lensEl = document.getElementById('lens');
  var fallbackChips = document.getElementById('fallbackChips');

  var conversation = [];      // {role, content} prior turns
  var conversationId = null;
  var currentState = 'idle';
  var busy = false;
  var toolNodes = {};         // tool_use id -> {el}

  function setState(s) {
    if (s === currentState) return;
    currentState = s;
    orbWrap.setAttribute('data-state', s);
    stateLabel.textContent = STATE_LABELS[s] || '';
    var src = ORB_STATES[s] || ORB_STATES.idle;
    if (orb.getAttribute('src') !== src) {
      orb.setAttribute('src', src);
      try { orb.load(); var p = orb.play(); if (p && p.catch) p.catch(function () {}); } catch (e) {}
    }
  }

  function authHeaders() {
    var h = { 'Content-Type': 'application/json' };
    try {
      var t = localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token');
      if (t) h.Authorization = 'Bearer ' + t;
    } catch (e) {}
    return h;
  }

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function resetAnswer() {
    toolsEl.innerHTML = '';
    replyEl.textContent = '';
    approvalsEl.innerHTML = '';
    lensEl.innerHTML = '';
    toolNodes = {};
    answerEl.hidden = false;
    stage.classList.add('answering');
  }

  function showLens(name) {
    if (!name) return;
    lensEl.innerHTML = '<span class="lens">' + esc(name) + ' lens</span>';
  }

  function toolStart(ts) {
    if (!ts || !ts.id) return;
    var el = document.createElement('div');
    el.className = 'tool wait';
    el.innerHTML = '<span class="dot"></span><span class="lbl">' + esc(ts.label || 'Working') + '</span>';
    toolsEl.appendChild(el);
    toolNodes[ts.id] = el;
  }

  function toolEnd(te) {
    if (!te || !te.id) return;
    var el = toolNodes[te.id];
    if (!el) return;
    if (te.status === 'error') el.className = 'tool err';
    else if (te.status === 'pending_approval') el.className = 'tool wait';
    else el.className = 'tool ok';
  }

  function addApproval(code, label) {
    if (!code) return;
    if (approvalsEl.querySelector('[data-code="' + code + '"]')) return;
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'approve-btn';
    btn.setAttribute('data-code', code);
    btn.innerHTML = '<span>Confirm: ' + esc(label || 'this action') + '</span><span class="code">' + esc(code) + '</span>';
    btn.addEventListener('click', function () {
      if (btn.classList.contains('done') || busy) return;
      btn.classList.add('done');
      btn.querySelector('span').textContent = 'Confirmed';
      summon(code + ' confirmed');
    });
    approvalsEl.appendChild(btn);
  }

  function showError(msg) {
    var e = document.createElement('div');
    e.className = 'err-line';
    e.textContent = 'Something went sideways: ' + (msg || 'unknown error');
    replyEl.parentNode.insertBefore(e, approvalsEl);
  }

  async function summon(text) {
    text = (text || '').trim();
    if (!text || busy) return;
    busy = true;
    sendBtn.disabled = true;
    cmd.value = '';
    resetAnswer();
    setState('thinking');

    var body = {
      message: text,
      history: conversation.slice(-12),
      mode: 'quick',
      effort: 'medium',
      conversation_id: conversationId || undefined
    };

    var answer = '';
    var gotText = false;
    var finished = false;

    try {
      var res = await fetch('/api/chat', { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) });
      if (!res.ok || !res.body) {
        var txt = '';
        try { txt = (await res.json()).error; } catch (e) {}
        showError(txt || ('HTTP ' + res.status));
        setState('idle');
        busy = false; sendBtn.disabled = false;
        return;
      }
      var reader = res.body.getReader();
      var dec = new TextDecoder();
      var buf = '';
      while (true) {
        var chunk = await reader.read();
        if (chunk.done) break;
        buf += dec.decode(chunk.value, { stream: true });
        var lines = buf.split('\n');
        buf = lines.pop() || '';
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (line.indexOf('data: ') !== 0) continue;
          var raw = line.slice(6).trim();
          if (!raw) continue;
          var d;
          try { d = JSON.parse(raw); } catch (e) { continue; }
          if (d.text) {
            if (!gotText) { gotText = true; setState('speaking'); }
            answer += d.text;
            replyEl.textContent = answer;
          } else if (d.tool_start) {
            setState('thinking');
            toolStart(d.tool_start);
          } else if (d.tool_end) {
            toolEnd(d.tool_end);
            if (d.tool_end.status === 'pending_approval' && d.tool_end.code) {
              addApproval(d.tool_end.code, (d.tool_end.label || ''));
            }
          } else if (d.matched_archetype) {
            showLens(d.matched_archetype);
          } else if (d.done) {
            if (d.conversation_id) conversationId = d.conversation_id;
            finished = true; break;
          } else if (d.error) {
            showError(d.error);
            finished = true; break;
          }
        }
        if (finished) { try { reader.cancel(); } catch (e) {} break; }
      }
    } catch (err) {
      showError(err && err.message ? err.message : 'network error');
    }

    if (answer) {
      conversation.push({ role: 'user', content: text });
      conversation.push({ role: 'assistant', content: answer });
    }
    setState('idle');
    busy = false;
    sendBtn.disabled = false;
    cmd.focus();
  }

  // Input state cues
  cmd.addEventListener('focus', function () { if (!busy) setState('listening'); });
  cmd.addEventListener('blur', function () { if (!busy && !cmd.value) setState('idle'); });
  cmd.addEventListener('input', function () { if (!busy) setState(cmd.value ? 'listening' : 'idle'); });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    summon(cmd.value);
  });

  fallbackChips.addEventListener('click', function (e) {
    var t = e.target.closest('.chip');
    if (!t) return;
    summon(t.getAttribute('data-q') || t.textContent);
  });

  // Ambient dragon video (lazy, autoplay-safe)
  (function bgDragon() {
    var bgv = document.getElementById('bg-dragon');
    if (!bgv) return;
    var start = function () {
      if (!bgv.getAttribute('src') && bgv.dataset.src) {
        bgv.setAttribute('src', bgv.dataset.src);
        bgv.setAttribute('autoplay', '');
        bgv.load();
        var p = bgv.play();
        if (p && p.catch) p.catch(function () {
          var resume = function () { bgv.play().catch(function () {}); document.removeEventListener('pointerdown', resume); };
          document.addEventListener('pointerdown', resume, { once: true });
        });
      }
    };
    if (document.readyState === 'complete') setTimeout(start, 1500);
    else window.addEventListener('load', function () { setTimeout(start, 1500); });
  })();

  cmd.focus();
})();
</script>
</body>
</html>
