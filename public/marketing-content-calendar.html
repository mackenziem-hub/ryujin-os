<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060a14">
<title>Content Calendar · Marketing · Ryujin OS</title>
<link rel="icon" href="/assets/logo/icon.png" onerror="this.href='/assets/logo/logo-glow.jpg'">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<style>
:root{
  --bg:#060a14;--glass:rgba(20,30,50,0.85);--glass2:rgba(22,34,58,0.80);
  --glass-border:rgba(34,211,238,0.16);--glass-border-hi:rgba(34,211,238,0.35);
  --text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);
  --cyan:#22d3ee;--blue:#4a9eff;--purple:#7c3aed;
  --green:#4ade80;--yellow:#facc15;--red:#f87171;--orange:#fb923c;--gold:#fbbf24;
  --radius:12px;--sidebar-w:72px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;overflow-x:hidden}

.sidebar{width:var(--sidebar-w);background:rgba(8,12,24,0.98);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;bottom:0;z-index:50;box-shadow:2px 0 12px rgba(0,0,0,0.4)}
.sidebar-logo{width:44px;height:44px;margin:18px 0 12px;border-radius:12px;background:url('/assets/logo/logo-glow.jpg') center/cover;box-shadow:0 0 20px rgba(34,211,238,0.3);cursor:pointer}
.sidebar-divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;margin:4px 0 8px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid transparent;cursor:pointer;color:var(--text-dim);transition:all 0.25s;position:relative;text-decoration:none}
.nav-icon:hover{background:rgba(34,211,238,0.06);color:var(--text)}
.nav-icon.active{background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(124,58,237,0.06));color:var(--cyan);border-color:rgba(34,211,238,0.2);box-shadow:0 0 20px rgba(34,211,238,0.08)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:3px;background:var(--cyan);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--cyan)}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.main{margin-left:var(--sidebar-w);padding:18px 22px 60px;max-width:1700px}

.hq-header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.hq-title{flex:1;min-width:280px}
.hq-title .crumb{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hq-title h1{font-family:'Orbitron',monospace;font-size:1.7em;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,#e0e6f0 20%,var(--cyan) 70%,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hq-title .sub{font-size:0.85em;color:var(--text-dim);margin-top:6px}

.hq-actions{display:flex;align-items:center;gap:10px}
.btn{font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:8px 16px;border-radius:18px;cursor:pointer;border:1px solid var(--glass-border);background:transparent;color:var(--text-dim);transition:all 0.2s}
.btn:hover{color:var(--text);border-color:var(--glass-border-hi)}
.btn.primary{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#0a0e1a;border:none;box-shadow:0 0 12px rgba(34,211,238,0.3)}
.btn.primary:hover{box-shadow:0 0 18px rgba(34,211,238,0.5)}

/* Layout: clip rail + calendar grid */
.layout{display:grid;grid-template-columns:240px 1fr;gap:14px;align-items:flex-start}
@media(max-width:900px){.layout{grid-template-columns:1fr}}

/* Clip rail */
.rail{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:12px;position:relative;overflow:hidden;max-height:80vh;display:flex;flex-direction:column}
.rail::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan) 30%,var(--purple) 70%,transparent);opacity:0.6}
.rail-h{font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px;padding:0 4px}
.rail-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.clip-item{
  background:rgba(6,10,20,0.4);border:1px solid var(--glass-border);
  border-radius:8px;padding:8px 10px;cursor:grab;transition:all 0.2s;
  display:flex;flex-direction:column;gap:2px;
}
.clip-item:hover{border-color:var(--glass-border-hi);background:var(--glass2)}
.clip-item.selected{border-color:var(--cyan);background:rgba(34,211,238,0.08);box-shadow:0 0 8px rgba(34,211,238,0.2)}
.clip-name{font-size:0.8em;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.clip-meta{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:var(--text-dim);letter-spacing:0.5px}
.clip-status{font-family:'Share Tech Mono',monospace;font-size:0.6em;letter-spacing:1px;text-transform:uppercase;padding:1px 6px;border-radius:6px;align-self:flex-start;margin-top:2px}
.clip-status.ready{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.25)}
.clip-status.scheduled{background:rgba(34,211,238,0.1);color:var(--cyan);border:1px solid var(--glass-border)}
.clip-status.rendering{background:rgba(124,58,237,0.1);color:#a78bfa;border:1px solid rgba(124,58,237,0.25)}

/* Calendar */
.cal-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:14px;position:relative;overflow:hidden}
.cal-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan) 30%,var(--purple) 70%,transparent);opacity:0.6}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav h2{font-family:'Orbitron',monospace;font-size:0.95em;letter-spacing:1.5px;color:var(--text)}
.cal-nav-btns{display:flex;gap:6px}
.cal-nav-btns button{background:rgba(6,10,20,0.5);border:1px solid var(--glass-border);color:var(--text-dim);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.cal-nav-btns button:hover{color:var(--cyan);border-color:var(--glass-border-hi)}
.cal-nav-btns svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;min-height:420px}
.day-col{background:rgba(6,10,20,0.35);border:1px solid var(--glass-border);border-radius:8px;padding:8px 6px;display:flex;flex-direction:column;gap:5px;min-height:240px;transition:all 0.2s}
.day-col.today{border-color:var(--glass-border-hi);background:rgba(34,211,238,0.04)}
.day-col.dragover{background:rgba(34,211,238,0.12);border-color:var(--cyan);box-shadow:0 0 8px rgba(34,211,238,0.3)}
.day-h{font-family:'Orbitron',monospace;font-size:0.6em;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;text-align:center;padding-bottom:4px;border-bottom:1px solid var(--glass-border);margin-bottom:4px}
.day-h .num{display:block;font-size:1.6em;font-weight:800;color:var(--text);margin-top:2px;letter-spacing:0}
.day-col.today .day-h .num{color:var(--cyan);text-shadow:0 0 8px rgba(34,211,238,0.4)}

.scheduled-card{
  background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(124,58,237,0.06));
  border:1px solid rgba(34,211,238,0.3);border-radius:6px;
  padding:5px 7px;cursor:pointer;transition:all 0.2s;
}
.scheduled-card:hover{border-color:var(--cyan);transform:translateY(-1px)}
.scheduled-time{font-family:'Share Tech Mono',monospace;font-size:0.62em;color:var(--cyan);letter-spacing:0.5px}
.scheduled-name{font-size:0.74em;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scheduled-brand{font-family:'Share Tech Mono',monospace;font-size:0.6em;color:var(--text-dim);letter-spacing:0.5px}

.empty-state{text-align:center;padding:14px 8px;color:var(--text-muted);border:1px dashed var(--glass-border);border-radius:6px;font-size:0.7em;line-height:1.4}
.skeleton{background:linear-gradient(90deg,var(--glass) 0%,var(--glass2) 50%,var(--glass) 100%);background-size:200% 100%;animation:sk 1.4s infinite;border:1px solid var(--glass-border);border-radius:8px;height:50px;margin-bottom:6px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);font-size:0.8em;margin-bottom:14px;line-height:1.4}
.banner.warn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:var(--orange)}
.banner.info{background:rgba(34,211,238,0.06);border:1px solid var(--glass-border);color:var(--text-dim)}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(3,6,17,0.75);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-backdrop.show{display:flex}
.modal{background:var(--glass);border:1px solid var(--glass-border-hi);border-radius:14px;padding:22px 24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;position:relative;backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan) 30%,var(--purple) 70%,transparent);border-radius:14px 14px 0 0}
.modal h3{font-family:'Orbitron',monospace;font-size:0.9em;letter-spacing:2px;color:var(--text);margin-bottom:14px;text-transform:uppercase}
.field{margin-bottom:12px}
.field label{display:block;font-family:'Orbitron',monospace;font-size:0.6em;letter-spacing:1.8px;color:var(--text-dim);text-transform:uppercase;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:rgba(6,10,20,0.5);border:1px solid var(--glass-border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:0.85em;font-family:inherit;outline:none;transition:border-color 0.2s}
.field input:focus,.field select:focus{border-color:var(--glass-border-hi)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

@media(max-width:768px){.main{padding:12px}.hq-title h1{font-size:1.3em}}
</style>
<script src="/assets/marketing-toolbar.js" defer></script>
</head>
<body>

<aside class="sidebar">
  <a href="/admin.html" class="sidebar-logo" title="Admin Home"></a>
  <div class="sidebar-divider"></div>
  <nav class="sidebar-nav">
    <a href="/admin-overview.html" class="nav-icon" title="Overview"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg></a>
    <a href="/admin-quests.html" class="nav-icon" title="Quests"><svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M21 12c0 5-4 9-9 9s-9-4-9-9 4-9 9-9c2 0 4 1 5 2"/></svg></a>
    <a href="/admin-agents.html" class="nav-icon" title="Agents"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-2a8 8 0 0116 0v2"/></svg></a>
    <a href="/marketing.html" class="nav-icon active" title="Marketing"><svg viewBox="0 0 24 24"><path d="M3 11l18-9v18l-18-9zM7 13v6"/></svg></a>
    <a href="/sales-portal.html" class="nav-icon" title="Sales"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9a4 4 0 100 8h6a4 4 0 110 8H6"/></svg></a>
    <a href="/admin.html" class="nav-icon" title="Full Admin"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></a>
  </nav>
</aside>

<main class="main">

  <div class="hq-header">
    <div class="hq-title">
      <div class="crumb">Marketing · Content Calendar</div>
      <h1>Content Calendar</h1>
      <div class="sub">Schedule clips across your brands. Drag a clip to a day, or click to compose. 7-day view.</div>
    </div>
    <div class="hq-actions">
      <a class="btn primary" href="/marketing.html">← Back to Marketing</a>
    </div>
  </div>

  <div id="banner-slot"></div>

  <div class="layout">

    <!-- Clip rail -->
    <aside class="rail">
      <div class="rail-h">Ready Clips</div>
      <div class="rail-list" id="clipList">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </aside>

    <!-- Calendar -->
    <section class="cal-card">
      <div class="cal-nav">
        <h2 id="weekLabel">—</h2>
        <div class="cal-nav-btns">
          <button id="btnPrev" title="Previous week"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
          <button id="btnToday" title="This week" style="width:auto;padding:0 12px;font-family:inherit;font-size:0.7em;letter-spacing:1.5px;text-transform:uppercase">Today</button>
          <button id="btnNext" title="Next week"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </section>

  </div>

</main>

<!-- Schedule modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h3 id="modalTitle">Schedule Post</h3>
    <div class="field">
      <label>Clip</label>
      <div id="modalClipName" style="font-weight:600;padding:8px 12px;background:rgba(6,10,20,0.5);border:1px solid var(--glass-border);border-radius:8px;font-size:0.85em">—</div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Date</label>
        <input id="f_date" type="date" />
      </div>
      <div class="field">
        <label>Time</label>
        <input id="f_time" type="time" value="09:00" />
      </div>
    </div>
    <div class="field">
      <label>Brands</label>
      <div id="brandsCheckList" style="display:flex;flex-direction:column;gap:6px;max-height:160px;overflow-y:auto;padding:8px 12px;background:rgba(6,10,20,0.5);border:1px solid var(--glass-border);border-radius:8px"></div>
    </div>
    <div class="field">
      <label>Caption (auto-generated; edit before sending)</label>
      <textarea id="f_caption" rows="3" placeholder="Auto-fill on save"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" id="btnCancel">Cancel</button>
      <button class="btn primary" id="btnSchedule">Schedule</button>
    </div>
  </div>
</div>

<script>
const TENANT = (function(){
  // Auth-set on login; authoritative for non-default tenants.
  try { const a = JSON.parse(localStorage.getItem('ryujin_tenant') || 'null'); if (a && a.slug) return a.slug; } catch (e) {}
  // Branding-config fallback (user changed brand without re-login).
  try { const c = JSON.parse(localStorage.getItem('ry_tenant_cfg') || 'null'); if (c && c.slug) return c.slug; } catch (e) {}
  return 'plus-ultra';
})();
let clips = [];
let scheduledByDay = {};
let brands = [];
let weekStart = startOfWeek(new Date());
let selectedClip = null;

function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function startOfWeek(d) {
  const x = new Date(d);
  const day = x.getDay() || 7;
  x.setDate(x.getDate() - (day - 1));
  x.setHours(0, 0, 0, 0);
  return x;
}
function fmtMonthDay(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function fmtTime(iso) { const d = new Date(iso); return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }); }
function isoDay(d) { return d.toISOString().slice(0, 10); }

function showBanner(msg, kind='warn') {
  document.getElementById('banner-slot').innerHTML = `<div class="banner ${kind}">${escapeHtml(msg)}</div>`;
}

function renderWeekLabel() {
  const end = new Date(weekStart); end.setDate(end.getDate() + 6);
  document.getElementById('weekLabel').textContent = `${fmtMonthDay(weekStart)} – ${fmtMonthDay(end)}`;
}

function renderClips() {
  const ready = clips.filter(c => c.status === 'ready' || c.status === 'scheduled' || c.status === 'rendering');
  const list = document.getElementById('clipList');
  if (ready.length === 0) {
    list.innerHTML = `<div class="empty-state">No clips. Upload via <a href="/marketing-creatives.html" style="color:var(--cyan)">Creatives</a>.</div>`;
    return;
  }
  list.innerHTML = ready.map(c => `
    <div class="clip-item ${selectedClip === c.id ? 'selected' : ''}" data-id="${c.id}" draggable="true">
      <div class="clip-name">${escapeHtml(c.title || c.id.slice(0, 8))}</div>
      <div class="clip-meta">${(c.duration_seconds || 0).toFixed(0)}s · ${c.platforms ? c.platforms.join(',') : '—'}</div>
      <span class="clip-status ${c.status}">${c.status}</span>
    </div>`).join('');
  list.querySelectorAll('.clip-item').forEach(el => {
    el.addEventListener('click', () => {
      selectedClip = el.dataset.id;
      renderClips();
    });
    el.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/clip', el.dataset.id);
      selectedClip = el.dataset.id;
    });
  });
}

function renderCalendar() {
  renderWeekLabel();
  const todayKey = isoDay(new Date());
  const grid = document.getElementById('calGrid');
  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart); d.setDate(d.getDate() + i);
    const key = isoDay(d);
    const isToday = key === todayKey;
    const dayPosts = (scheduledByDay[key] || []).sort((a, b) => new Date(a.scheduled_at) - new Date(b.scheduled_at));
    html += `
      <div class="day-col ${isToday ? 'today' : ''}" data-date="${key}">
        <div class="day-h">${d.toLocaleDateString('en-US', { weekday: 'short' })}<span class="num">${d.getDate()}</span></div>
        ${dayPosts.length === 0 ? `<div class="empty-state">drop or click clip</div>` : dayPosts.map(p => `
          <div class="scheduled-card" data-id="${p.id}">
            <div class="scheduled-time">${fmtTime(p.scheduled_at)}</div>
            <div class="scheduled-name">${escapeHtml(p.clip_title || 'Post')}</div>
            <div class="scheduled-brand">${escapeHtml(p.brand_name || p.platform || '')}</div>
          </div>
        `).join('')}
      </div>`;
  }
  grid.innerHTML = html;
  // Drop handlers
  grid.querySelectorAll('.day-col').forEach(col => {
    col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('dragover'); });
    col.addEventListener('dragleave', () => col.classList.remove('dragover'));
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('dragover');
      const clipId = e.dataTransfer.getData('text/clip');
      if (clipId) openModal(clipId, col.dataset.date);
    });
    col.addEventListener('click', () => {
      if (selectedClip) openModal(selectedClip, col.dataset.date);
    });
  });
}

async function loadClips() {
  try {
    const resp = await fetch('/api/marketing', { headers: { 'x-tenant-id': TENANT } });
    if (!resp.ok) { showBanner(`Failed to load clips: HTTP ${resp.status}`); return; }
    const data = await resp.json();
    clips = data.clips || data || [];
    renderClips();
  } catch (e) { showBanner(`Network: ${e.message}`); }
}

async function loadScheduled() {
  const start = weekStart.toISOString();
  const end = new Date(weekStart); end.setDate(end.getDate() + 7);
  try {
    const resp = await fetch(`/api/scheduled-posts?since=${encodeURIComponent(start)}&until=${encodeURIComponent(end.toISOString())}`, { headers: { 'x-tenant-id': TENANT } });
    if (!resp.ok) {
      // No banner here; section just renders empty
      scheduledByDay = {};
      renderCalendar();
      return;
    }
    const data = await resp.json();
    scheduledByDay = {};
    for (const p of (data.posts || [])) {
      const k = p.scheduled_at ? p.scheduled_at.slice(0, 10) : null;
      if (!k) continue;
      (scheduledByDay[k] = scheduledByDay[k] || []).push(p);
    }
    renderCalendar();
  } catch { renderCalendar(); }
}

async function loadBrands() {
  try {
    const resp = await fetch('/api/brands', { headers: { 'x-tenant-id': TENANT } });
    if (!resp.ok) return;
    const data = await resp.json();
    brands = data.brands || [];
  } catch {}
}

// Modal
function openModal(clipId, date) {
  const c = clips.find(x => x.id === clipId);
  if (!c) return;
  selectedClip = clipId;
  renderClips();
  document.getElementById('modalClipName').textContent = c.title || clipId.slice(0, 8);
  document.getElementById('f_date').value = date || isoDay(new Date());
  document.getElementById('f_time').value = '09:00';
  document.getElementById('f_caption').value = '';
  // Brand checklist
  const cl = document.getElementById('brandsCheckList');
  if (brands.length === 0) {
    cl.innerHTML = `<div style="color:var(--text-dim);font-size:0.85em">No brands configured. Add via <a href="/marketing-brands.html" style="color:var(--cyan)">Brands</a>.</div>`;
  } else {
    cl.innerHTML = brands.map(b => `
      <label style="display:flex;align-items:center;gap:8px;font-size:0.85em;cursor:pointer">
        <input type="checkbox" data-brand-id="${b.id}" /> ${escapeHtml(b.name)}
      </label>
    `).join('');
  }
  document.getElementById('modalBackdrop').classList.add('show');
}
function closeModal() { document.getElementById('modalBackdrop').classList.remove('show'); }

async function schedule() {
  const c = clips.find(x => x.id === selectedClip);
  if (!c) return;
  const date = document.getElementById('f_date').value;
  const time = document.getElementById('f_time').value;
  if (!date || !time) { alert('Date + time required'); return; }
  const scheduled_at = new Date(`${date}T${time}`).toISOString();
  const checked = [...document.querySelectorAll('#brandsCheckList input:checked')].map(i => i.dataset.brandId);
  if (checked.length === 0) { alert('Pick at least one brand'); return; }

  // Build posts[] for /api/schedule-clip — one entry per brand × default account fan-out
  // Simplest v1: one post per brand using brand's default platforms
  const caption = document.getElementById('f_caption').value;
  const posts = checked.map(brandId => {
    const brand = brands.find(b => b.id === brandId);
    return {
      brandId,
      caption: caption || (brand?.tagline || c.title || 'New post'),
      platforms: brand?.platforms || ['facebook', 'instagram']
    };
  });
  const btn = document.getElementById('btnSchedule');
  btn.disabled = true; btn.textContent = 'Scheduling…';
  try {
    const resp = await fetch('/api/schedule-clip', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-tenant-id': TENANT },
      body: JSON.stringify({ mediaUrl: c.output_url || c.source_url, scheduledAt: scheduled_at, clipId: c.id, posts })
    });
    if (!resp.ok) {
      const txt = await resp.text();
      alert(`Schedule failed: ${txt.slice(0, 200)}`);
    } else {
      closeModal();
      loadScheduled();
    }
  } catch (e) { alert(`Network: ${e.message}`); }
  btn.disabled = false; btn.textContent = 'Schedule';
}

document.getElementById('btnCancel').addEventListener('click', closeModal);
document.getElementById('btnSchedule').addEventListener('click', schedule);
document.getElementById('modalBackdrop').addEventListener('click', e => { if (e.target.id === 'modalBackdrop') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && document.getElementById('modalBackdrop').classList.contains('show')) closeModal(); });

document.getElementById('btnPrev').addEventListener('click', () => { weekStart.setDate(weekStart.getDate() - 7); loadScheduled(); });
document.getElementById('btnNext').addEventListener('click', () => { weekStart.setDate(weekStart.getDate() + 7); loadScheduled(); });
document.getElementById('btnToday').addEventListener('click', () => { weekStart = startOfWeek(new Date()); loadScheduled(); });

(async () => {
  await Promise.all([loadClips(), loadBrands()]);
  await loadScheduled();
})();
</script>
</body>
