<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Customers</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow-x:hidden;min-height:100vh}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(34,211,238,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(124,58,237,0.08) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(34,211,238,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}
.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(34,211,238,0.22);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#22d3ee,#7c3aed,transparent);opacity:0.5}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #fff;border-radius:10px;color:#030611;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none;transition:all 0.2s}
.btn-back:hover{background:rgba(255,255,255,0.85);box-shadow:0 0 14px rgba(255,255,255,0.35)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(200,240,255,0.3),rgba(34,211,238,0.22) 40%,rgba(5,15,30,0.8));box-shadow:0 0 14px rgba(34,211,238,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}

.stage{position:relative;z-index:5;padding:80px 28px 60px;max-width:1280px;margin:0 auto}
.hero{margin-bottom:20px}
.hero .eyebrow{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:#22d3ee;letter-spacing:3px;margin-bottom:6px}
.hero h1{font-family:'Orbitron',sans-serif;font-size:2em;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{padding:14px 18px;background:rgba(14,22,40,0.55);border:1px solid rgba(34,211,238,0.16);border-radius:12px}
.stat .lbl{font-family:'Share Tech Mono',monospace;font-size:0.66em;color:rgba(200,220,255,0.5);letter-spacing:1.5px;text-transform:uppercase}
.stat .val{font-family:'Orbitron',sans-serif;font-size:1.4em;font-weight:900;color:#22d3ee;margin-top:4px}
@media (max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}}

.search{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search input{flex:1;min-width:220px;padding:11px 14px;background:rgba(6,10,20,0.55);border:1px solid rgba(34,211,238,0.18);border-radius:10px;color:#e0e6f0;font-family:'Inter',sans-serif;font-size:0.94em;outline:none;transition:all 0.2s}
.search input:focus{border-color:rgba(34,211,238,0.5)}
.search select{padding:11px 14px;background:rgba(6,10,20,0.55);border:1px solid rgba(34,211,238,0.18);border-radius:10px;color:#e0e6f0;font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1px;cursor:pointer;outline:none}

.list{display:flex;flex-direction:column;gap:8px}
.row{display:grid;grid-template-columns:2fr 120px 100px 120px 40px;align-items:center;gap:12px;padding:14px 18px;background:rgba(14,22,40,0.55);border:1px solid rgba(34,211,238,0.12);border-radius:12px;transition:all 0.2s;text-decoration:none;color:inherit}
.row:hover{border-color:rgba(34,211,238,0.5);background:rgba(14,22,40,0.75);transform:translateX(3px)}
.row.head{background:transparent;border-color:transparent;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.66em;letter-spacing:2px;text-transform:uppercase;padding:8px 18px;margin-bottom:-4px}
.row.head:hover{transform:none;background:transparent;border-color:transparent}
.row .name{font-weight:700;font-size:1em;margin-bottom:2px}
.row .addr{font-size:0.78em;color:rgba(200,220,255,0.6);font-family:'Share Tech Mono',monospace;letter-spacing:0.5px}
.row .phone{font-family:'Share Tech Mono',monospace;font-size:0.76em;color:rgba(200,220,255,0.7)}
.row .arrow{justify-self:end;color:rgba(34,211,238,0.5)}
.row:hover .arrow{color:#22d3ee;transform:translateX(4px);transition:all 0.2s}
.row .arrow svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.badge{display:inline-block;padding:3px 9px;font-family:'Share Tech Mono',monospace;font-size:0.62em;font-weight:700;letter-spacing:1.5px;border-radius:5px}
.src-chip{display:inline-block;padding:2px 7px;font-family:'Share Tech Mono',monospace;font-size:0.58em;font-weight:700;letter-spacing:1.2px;border-radius:4px;margin-right:4px}
.src-chip.ryujin{background:rgba(34,211,238,0.14);color:#22d3ee}
.src-chip.ghl{background:rgba(124,58,237,0.18);color:#a78bfa}

@media (max-width:760px){
  .row{grid-template-columns:1fr auto}
  .row>div:nth-child(2),.row>div:nth-child(3),.row>div:nth-child(4){display:none}
  .row.head{display:none}
}

.empty{text-align:center;padding:60px 20px;color:rgba(200,220,255,0.5);font-size:0.95em;line-height:1.6}
.loading{text-align:center;padding:40px;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1.5px}
</style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="btn-back" href="sales.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> BACK</a>
  <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· CUSTOMERS</span></div></div>
  <div class="tb-spacer"></div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px" id="countBadge">—</div>
</div>

<div class="stage">
  <div class="hero">
    <div class="eyebrow">SALES · UNIFIED CUSTOMER LIST</div>
    <h1>Customers</h1>
  </div>

  <div class="stats">
    <div class="stat"><div class="lbl">Total</div><div class="val" id="sTotal">—</div></div>
    <div class="stat"><div class="lbl">In Ryujin</div><div class="val" id="sRyujin">—</div></div>
    <div class="stat"><div class="lbl">With Estimate</div><div class="val" id="sEst">—</div></div>
    <div class="stat"><div class="lbl">GHL Only</div><div class="val" id="sGhl">—</div></div>
  </div>

  <div class="search">
    <input id="searchIn" type="text" placeholder="Search by name, address, phone, or email..." oninput="applyFilter()"/>
    <select id="sortIn" onchange="applyFilter()">
      <option value="new">Newest first</option>
      <option value="name">Name A–Z</option>
      <option value="city">City</option>
    </select>
    <select id="filterIn" onchange="applyFilter()">
      <option value="all">All sources</option>
      <option value="ryujin">Ryujin (has estimate)</option>
      <option value="ghl">GHL only</option>
    </select>
  </div>

  <div class="list" id="listHost">
    <div class="loading">LOADING CUSTOMERS...</div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let CACHED = [];
let LOADED = false;

async function loadAll(){
  try {
    const headers = { 'x-tenant-id': 'plus-ultra' };
    // 1. Ryujin customers + estimates
    const [custR, estR] = await Promise.all([
      fetch('/api/customers?limit=500', { headers }),
      fetch('/api/estimates?limit=200', { headers })
    ]);
    const ryujinCusts = custR.ok ? (await custR.json()).customers || [] : [];
    const estimates = estR.ok ? (await estR.json()).estimates || [] : [];

    const estByCustId = {};
    estimates.forEach(e => {
      if (e.customer_id && !estByCustId[e.customer_id]) estByCustId[e.customer_id] = e;
    });

    const byKey = new Map(); // key by ghl_contact_id or name+phone

    ryujinCusts.forEach(c => {
      const e = estByCustId[c.id];
      const key = c.ghl_contact_id || (c.full_name + '|' + (c.phone || ''));
      byKey.set(key, {
        source: ['ryujin', c.ghl_contact_id ? 'ghl' : null].filter(Boolean),
        name: c.full_name,
        phone: c.phone,
        email: c.email,
        address: [c.address, c.city, c.province].filter(Boolean).join(', '),
        city: c.city,
        ghl_id: c.ghl_contact_id,
        estimate: e,
        created: c.created_at,
        notes: c.notes
      });
    });

    // 2. GHL contacts — pull top 50 recent (limited; full search done via ghl-lookup)
    try {
      // No endpoint for listing all GHL contacts, but we can fetch via a broad query
      const ghlR = await fetch('https://shenron-app.vercel.app/api/ghl?mode=contacts&q=&limit=100');
      if (ghlR.ok) {
        const { contacts } = await ghlR.json();
        (contacts || []).forEach(g => {
          const key = g.id;
          if (byKey.has(key)) {
            // already linked through a Ryujin customer
            const existing = byKey.get(key);
            if (!existing.source.includes('ghl')) existing.source.push('ghl');
            return;
          }
          // Check if already present by name+phone
          const altKey = (g.name || '') + '|' + (g.phone || '');
          if (byKey.has(altKey)) return;
          byKey.set(key, {
            source: ['ghl'],
            name: g.name,
            phone: g.phone,
            email: g.email,
            address: [g.address, g.city, g.state].filter(Boolean).join(', '),
            city: g.city,
            ghl_id: g.id,
            estimate: null,
            created: g.createdAt,
            tags: g.tags,
            notes: g.source
          });
        });
      }
    } catch(e) {
      console.warn('GHL fetch failed', e);
    }

    CACHED = [...byKey.values()];
    LOADED = true;
    renderStats(CACHED);
    applyFilter();
    $('countBadge').textContent = CACHED.length + ' CONTACT' + (CACHED.length === 1 ? '' : 'S');
  } catch(e) {
    $('listHost').innerHTML = '<div class="empty">Error: ' + esc(e.message) + '</div>';
  }
}

function renderStats(list){
  $('sTotal').textContent = list.length;
  $('sRyujin').textContent = list.filter(c => c.source.includes('ryujin')).length;
  $('sEst').textContent = list.filter(c => c.estimate).length;
  $('sGhl').textContent = list.filter(c => c.source.length === 1 && c.source[0] === 'ghl').length;
}

function renderList(list){
  const host = $('listHost');
  if (!list.length) {
    if (!LOADED) { host.innerHTML = '<div class="loading">LOADING...</div>'; return; }
    host.innerHTML = '<div class="empty">No customers match.</div>';
    return;
  }
  const head = `<div class="row head"><div>NAME / ADDRESS</div><div>SOURCE</div><div>PHONE</div><div>ESTIMATE</div><div></div></div>`;
  const rows = list.map(c => {
    const chips = c.source.map(s => `<span class="src-chip ${s}">${s.toUpperCase()}</span>`).join('');
    const estLabel = c.estimate ? `PU-${c.estimate.estimate_number}` : '—';
    const href = c.estimate ? `/job.html?share=${encodeURIComponent(c.estimate.share_token || '')}` : '#';
    return `
      <${c.estimate ? 'a' : 'div'} ${c.estimate ? `href="${href}" target="_blank"` : ''} class="row">
        <div>
          <div class="name">${esc(c.name || '(no name)')}</div>
          <div class="addr">${esc(c.address || '—')}</div>
        </div>
        <div>${chips}</div>
        <div class="phone">${esc(c.phone || '—')}</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:0.78em;color:${c.estimate ? '#22d3ee' : 'rgba(200,220,255,0.35)'};letter-spacing:1px">${esc(estLabel)}</div>
        <div class="arrow"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
      </${c.estimate ? 'a' : 'div'}>
    `;
  }).join('');
  host.innerHTML = head + rows;
}

function applyFilter(){
  const q = ($('searchIn').value || '').toLowerCase();
  const filter = $('filterIn').value;
  const sort = $('sortIn').value;
  let list = CACHED.slice();
  if (filter === 'ryujin') list = list.filter(c => c.source.includes('ryujin'));
  else if (filter === 'ghl') list = list.filter(c => c.source.length === 1 && c.source[0] === 'ghl');
  if (q) list = list.filter(c => ((c.name||'') + ' ' + (c.address||'') + ' ' + (c.phone||'') + ' ' + (c.email||'')).toLowerCase().includes(q));
  if (sort === 'name') list.sort((a,b) => (a.name||'').localeCompare(b.name||''));
  else if (sort === 'city') list.sort((a,b) => (a.city||'').localeCompare(b.city||''));
  else list.sort((a,b) => new Date(b.created||0) - new Date(a.created||0));
  renderList(list);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); window.location.href = 'sales.html'; } });
loadAll();
</script>

<script src="assets/ryujin-mode.js"></script>
<script src="assets/ryujin-tenant.js"></script>
<script src="assets/ryujin-persist.js"></script>

<script src="assets/ryujin-chat.js"></script>
</body>
</html>
