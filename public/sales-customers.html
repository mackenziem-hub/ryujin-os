<style>
:root{
  --bg-deep:#030611;--glass:rgba(14,22,40,0.78);
  --border:rgba(34,211,238,0.22);--border-hi:rgba(34,211,238,0.45);
  --accent:#22d3ee;
  --text:#e0e6f0;--text-dim:rgba(160,190,230,0.62);--text-muted:rgba(140,170,220,0.32);
  --green:#4ade80;--yellow:#facc15;--red:#f87171;--orange:#fb923c;--purple:#7c3aed;--blue:#4a9eff;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-deep);color:var(--text);overflow:hidden}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 40% 30%,rgba(34,211,238,0.08) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(34,211,238,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,0.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at center,black 40%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 40%,transparent 85%)}

.app{position:relative;z-index:2;height:100vh;display:grid;grid-template-rows:52px 1fr;gap:10px;padding:10px 12px}
.topbar{display:flex;align-items:center;gap:12px;background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);padding:0 14px;backdrop-filter:blur(20px);position:relative;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--purple),transparent);opacity:0.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(200,240,255,0.3),rgba(34,211,238,0.22) 40%,rgba(5,15,30,0.8));box-shadow:0 0 14px rgba(34,211,238,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:var(--text-dim);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}
.tb-search{flex:0 1 360px;max-width:360px;position:relative}
.tb-search input{width:100%;padding:8px 14px 8px 38px;background:rgba(6,10,20,0.7);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:0.88em;outline:none}
.tb-search input:focus{border-color:var(--accent);box-shadow:0 0 10px rgba(34,211,238,0.15)}
.tb-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text-dim);fill:none;stroke-width:2;stroke-linecap:round}
.tb-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(6,10,20,0.6);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all 0.2s}
.tb-icon:hover{color:var(--accent);border-color:var(--border-hi);background:rgba(34,211,238,0.08)}
.tb-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.main{display:grid;grid-template-columns:1fr 2fr;gap:10px;min-height:0}
.panel{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(14px);display:flex;flex-direction:column;min-height:0;overflow:hidden;position:relative}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.45}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid rgba(34,211,238,0.1);flex-shrink:0}
.panel-title{font-family:'Orbitron',sans-serif;font-size:0.62em;font-weight:700;letter-spacing:2.5px;color:var(--text-dim)}
.panel-badge{background:rgba(34,211,238,0.12);border:1px solid rgba(34,211,238,0.28);padding:2px 8px;border-radius:5px;font-family:'Share Tech Mono',monospace;font-size:0.65em;color:var(--accent);letter-spacing:0.5px}
.panel-body{flex:1;overflow-y:auto;padding:8px}

/* Contact list */
.contact-row{display:flex;gap:12px;align-items:center;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;transition:all 0.2s}
.contact-row:hover{background:rgba(34,211,238,0.05);border-color:rgba(34,211,238,0.1)}
.contact-row.selected{background:rgba(34,211,238,0.1);border-color:rgba(34,211,238,0.3)}
.contact-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,rgba(34,211,238,0.3),rgba(124,58,237,0.15));border:1px solid rgba(34,211,238,0.25);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:800;font-size:0.78em;color:var(--accent);flex-shrink:0}
.contact-body{flex:1;min-width:0}
.contact-name{font-size:0.88em;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.contact-meta{font-size:0.68em;color:var(--text-dim);font-family:'Share Tech Mono',monospace;letter-spacing:0.3px;margin-top:2px}
.contact-status{font-size:0.62em;padding:2px 7px;border-radius:4px;flex-shrink:0;font-family:'Share Tech Mono',monospace;letter-spacing:0.5px}
.contact-status.won{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.25)}
.contact-status.open{background:rgba(34,211,238,0.1);color:var(--accent);border:1px solid rgba(34,211,238,0.25)}
.contact-status.cold{background:rgba(140,170,220,0.08);color:var(--text-muted);border:1px solid rgba(140,170,220,0.15)}

/* Detail pane */
.detail-header{padding:20px 22px;border-bottom:1px solid rgba(34,211,238,0.1);background:rgba(6,12,24,0.5)}
.detail-top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.detail-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,rgba(34,211,238,0.35),rgba(124,58,237,0.15));border:1px solid rgba(34,211,238,0.35);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:800;font-size:1.2em;color:var(--accent);box-shadow:0 0 20px rgba(34,211,238,0.2);flex-shrink:0}
.detail-info{flex:1}
.detail-name{font-family:'Orbitron',sans-serif;font-size:1.2em;font-weight:800;letter-spacing:1px;margin-bottom:3px}
.detail-sub{font-size:0.82em;color:var(--text-dim);font-family:'Share Tech Mono',monospace;letter-spacing:0.4px}
.detail-actions{display:flex;gap:6px;flex-wrap:wrap}
.act-btn{padding:7px 13px;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:0.64em;font-weight:700;letter-spacing:1.2px;cursor:pointer;border:1px solid;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px}
.act-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round}
.act-btn.primary{background:linear-gradient(135deg,rgba(34,211,238,0.25),rgba(34,211,238,0.1));color:var(--accent);border-color:rgba(34,211,238,0.4)}
.act-btn.primary:hover{background:linear-gradient(135deg,rgba(34,211,238,0.4),rgba(34,211,238,0.2));box-shadow:0 0 12px rgba(34,211,238,0.25)}
.act-btn.ghost{background:rgba(6,10,20,0.5);color:var(--text-dim);border-color:var(--border)}

.detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px 16px;border-bottom:1px solid rgba(34,211,238,0.08);flex-shrink:0}
.detail-stat{padding:10px 12px;background:rgba(6,10,20,0.5);border:1px solid rgba(34,211,238,0.1);border-radius:8px}
.detail-stat .lbl{font-family:'Share Tech Mono',monospace;font-size:0.58em;color:var(--text-muted);letter-spacing:0.8px;text-transform:uppercase}
.detail-stat .val{font-family:'Orbitron',sans-serif;font-weight:700;font-size:1em;margin-top:2px;color:var(--text)}

.detail-tabs{display:flex;gap:2px;padding:10px 14px;border-bottom:1px solid rgba(34,211,238,0.08);flex-shrink:0}
.tab{padding:7px 14px;background:transparent;border:1px solid transparent;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:0.62em;font-weight:700;letter-spacing:1.5px;color:var(--text-dim);cursor:pointer;transition:all 0.2s}

.detail-feed{flex:1;overflow-y:auto;padding:14px 18px}

.log-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.log-icon.email{background:rgba(124,58,237,0.1);color:var(--purple)}
.log-icon.meet{background:rgba(250,204,21,0.1);color:var(--yellow)}
.log-icon.note{background:rgba(140,170,220,0.08);color:var(--text-dim)}
.log-icon.proposal{background:rgba(251,146,60,0.1);color:var(--orange)}
.log-icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.log-body{flex:1;min-width:0}
.log-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.log-type{font-family:'Orbitron',sans-serif;font-size:0.64em;font-weight:700;letter-spacing:1px;color:var(--accent);text-transform:uppercase}
.log-date{font-family:'Share Tech Mono',monospace;font-size:0.66em;color:var(--text-muted)}
.log-msg{font-size:0.84em;margin-top:4px;line-height:1.5;color:var(--text)}
.log-msg i{color:var(--text-dim)}

.empty{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:0.84em;font-family:'Share Tech Mono',monospace;letter-spacing:0.5px}
.embed-mode .chat-fab{display:none}
</style>

function renderList(filter = ''){
  const el = document.getElementById('contactList');
  const lower = filter.toLowerCase();
  const filtered = contacts.filter(c =>
    !filter ||
    c.name.toLowerCase().includes(lower) ||
    c.meta.toLowerCase().includes(lower) ||
    c.email.toLowerCase().includes(lower) ||
    c.address.toLowerCase().includes(lower)
  );
  if (!filtered.length) { el.innerHTML = '<div class="empty">No contacts match.</div>'; return; }
  el.innerHTML = filtered.map(c => `
    <div class="contact-row" data-id="${c.id}" onclick="pickContact('${c.id}')">
      <div class="contact-avatar">${c.initials}</div>
      <div class="contact-body">
        <div class="contact-name">${c.name}</div>
        <div class="contact-meta">${c.meta}</div>
      </div>
      <span class="contact-status ${c.status}">${c.status === 'won' ? c.value : c.status.toUpperCase()}</span>
    </div>
  `).join('');
  // Restore selection
  if (selectedId) {
    document.querySelector(`.contact-row[data-id="${selectedId}"]`)?.classList.add('selected');
  }
}

let selectedId = 'partridge';
let activeTab = 'timeline';

function pickContact(id){
  selectedId = id;
  document.querySelectorAll('.contact-row').forEach(r => r.classList.toggle('selected', r.dataset.id === id));
  renderDetail();
}

function setTab(t){ activeTab = t; renderDetail(); }

// ── Live hydration from Supabase ──
// Fetch /api/customers, merge with the demo list (real contacts first so they
// show up at top), and re-render. Offline? keep the hardcoded showcase.
async function hydrateCustomers(){
  try {
    const r = await fetch('/api/customers?tenant=plus-ultra&limit=100', { headers: { 'x-tenant-id': 'plus-ultra' } });
    if (!r.ok) return;
    const { customers } = await r.json();
    if (!Array.isArray(customers) || !customers.length) return;
    const real = customers.map(c => {
      const name = c.full_name || c.name || 'Unnamed';
      const parts = name.split(/\s+/).filter(Boolean);
      const initials = ((parts[0]||'?')[0] + (parts[1]||'')[0] || '?').toUpperCase();
      const statusMap = { 'lead':'open','quoted':'open','sold':'won','lost':'cold','cold':'cold' };
      return {
        id: 'crm-' + c.id,
        name,
        initials,
        status: statusMap[c.status] || 'open',
        value: c.estimated_value ? '$' + Math.round(c.estimated_value/1000) + 'K' : '—',
        meta: [c.city, c.notes].filter(Boolean).join(' · ') || 'Supabase contact',
        phone: c.phone || '',
        email: c.email || '',
        address: c.address || '',
        firstTouch: c.created_at ? new Date(c.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—',
        lastTouch: c.updated_at ? new Date(c.updated_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—',
        rep: 'Mackenzie',
        totalJobs: 0,
        lifetimeValue: c.estimated_value ? '$' + Math.round(c.estimated_value/1000) + 'K' : '—',
        closeProb: '—',
        logs: [{ type:'note', date: c.created_at ? new Date(c.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—', msg: 'Imported from CRM — log first interaction.' }]
      };
    });
    // Real contacts first, then the demo showcase so a new user still sees narrative data
    contacts = [...real, ...contacts];
    renderList();
  } catch(e) { /* offline — keep demo */ }
}
hydrateCustomers();
