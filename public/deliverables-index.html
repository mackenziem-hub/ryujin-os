<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deliverables Index - Plus Ultra Fleet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070b14; --bg2:#0c1322; --ink:#eaf1ff; --dim:#9fb0cc; --line:rgba(150,180,230,.14);
  --teal:#46e0c4; --mint:#7af0d0; --gold:#ffcf5c; --violet:#9d8cff; --rose:#ff7aa8; --sky:#5cc8ff;
  --glass:rgba(20,30,52,.55); --glass2:rgba(28,40,68,.45);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:'Lexend',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:var(--ink); background:var(--bg); line-height:1.5;
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
}
/* animated background */
.bg{position:fixed;inset:0;z-index:-2;background:
  radial-gradient(1100px 700px at 12% -8%, rgba(70,224,196,.16), transparent 60%),
  radial-gradient(900px 640px at 92% 8%, rgba(157,140,255,.14), transparent 60%),
  radial-gradient(840px 600px at 50% 110%, rgba(92,200,255,.12), transparent 60%),
  linear-gradient(180deg,var(--bg),var(--bg2));}
.bg::after{content:"";position:absolute;inset:-40%;z-index:-1;
  background:conic-gradient(from 0deg at 50% 50%, transparent, rgba(70,224,196,.06), transparent 30%, rgba(157,140,255,.06), transparent 60%);
  animation:spin 48s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.grain{position:fixed;inset:0;z-index:-1;opacity:.04;pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,.5) .5px, transparent .5px);background-size:3px 3px;}

header{position:sticky;top:0;z-index:20;backdrop-filter:blur(16px) saturate(140%);
  background:linear-gradient(180deg, rgba(8,12,22,.86), rgba(8,12,22,.5));
  border-bottom:1px solid var(--line);}
.wrap{max-width:1180px;margin:0 auto;padding:0 22px}
.top{display:flex;align-items:center;gap:18px;padding:16px 0 10px;flex-wrap:wrap}
.back{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;
  color:#06121a;background:linear-gradient(180deg,#ffffff,#dff7f0);
  border:none;border-radius:12px;padding:11px 18px;cursor:pointer;
  box-shadow:0 6px 20px rgba(122,240,208,.25);text-decoration:none;display:inline-flex;align-items:center;gap:8px;}
.back:hover{transform:translateY(-1px);filter:brightness(1.04)}
.brand{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;letter-spacing:.2px}
.brand b{background:linear-gradient(90deg,var(--mint),var(--sky));-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{color:var(--dim);font-size:13px}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
.pill{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;color:var(--mint);
  background:rgba(70,224,196,.1);border:1px solid rgba(70,224,196,.25);border-radius:999px;padding:6px 12px}
.pill.recent{color:var(--gold);background:rgba(255,207,92,.1);border-color:rgba(255,207,92,.28)}

.controls{display:flex;gap:12px;align-items:center;padding:10px 0 16px;flex-wrap:wrap}
.search{flex:1;min-width:240px;position:relative}
.search input{width:100%;font-family:inherit;font-size:15px;color:var(--ink);
  background:var(--glass);border:1px solid var(--line);border-radius:13px;padding:13px 14px 13px 42px;outline:none;}
.search input:focus{border-color:rgba(122,240,208,.55);box-shadow:0 0 0 3px rgba(70,224,196,.12)}
.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.55}
select{font-family:inherit;font-size:14px;color:var(--ink);background:var(--glass);
  border:1px solid var(--line);border-radius:11px;padding:12px 14px;outline:none;cursor:pointer}
.chips{display:flex;gap:8px;flex-wrap:wrap;padding-bottom:14px}
.chip{font-family:'Space Grotesk',sans-serif;font-size:12.5px;font-weight:600;color:var(--dim);
  background:var(--glass2);border:1px solid var(--line);border-radius:999px;padding:7px 14px;cursor:pointer;transition:.15s}
.chip:hover{color:var(--ink);border-color:rgba(150,180,230,.4)}
.chip.on{color:#06121a;background:linear-gradient(180deg,var(--mint),var(--teal));border-color:transparent}

main{max-width:1180px;margin:0 auto;padding:8px 22px 80px}
.count{color:var(--dim);font-size:13px;margin:6px 2px 16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.card{background:var(--glass);border:1px solid var(--line);border-radius:16px;padding:16px 17px;
  backdrop-filter:blur(10px);transition:.18s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:9px}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--teal))}
.card:hover{transform:translateY(-2px);border-color:rgba(150,180,230,.34);box-shadow:0 14px 34px rgba(0,0,0,.34)}
.crow{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.tag{font-family:'Space Grotesk',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  color:var(--accent,var(--teal));background:color-mix(in srgb,var(--accent,var(--teal)) 14%, transparent);
  border:1px solid color-mix(in srgb,var(--accent,var(--teal)) 34%, transparent);border-radius:7px;padding:3px 8px}
.date{font-size:12px;color:var(--dim);font-variant-numeric:tabular-nums}
.new{font-size:10px;font-weight:700;color:#06121a;background:var(--gold);border-radius:6px;padding:2px 7px;letter-spacing:.4px}
.title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;line-height:1.3;color:var(--ink)}
.summary{font-size:13.5px;color:var(--dim);display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.foot{display:flex;align-items:center;gap:10px;margin-top:auto;padding-top:6px}
.pathlink{font-family:'Space Grotesk',sans-serif;font-size:11.5px;color:var(--sky);text-decoration:none;
  word-break:break-all;opacity:.85}
.pathlink:hover{text-decoration:underline;opacity:1}
.prog{font-family:'Space Grotesk',sans-serif;font-size:10px;color:var(--violet);background:rgba(157,140,255,.1);
  border:1px solid rgba(157,140,255,.26);border-radius:6px;padding:2px 7px;margin-left:auto;white-space:nowrap}
.empty{text-align:center;color:var(--dim);padding:60px 20px;font-size:15px}
footer{max-width:1180px;margin:0 auto;padding:0 22px 50px;color:var(--dim);font-size:12px}
.copy{cursor:pointer;color:var(--dim);font-size:11px;border:1px solid var(--line);border-radius:7px;padding:3px 8px;background:transparent}
.copy:hover{color:var(--ink)}
@media(max-width:560px){.grid{grid-template-columns:1fr}.stats{width:100%}}
/* embed mode: ?embed=1 suppresses the chrome so it mounts cleanly in the Ryujin artifact shell */
body.embed header{position:static;backdrop-filter:none;background:transparent;border-bottom:none}
body.embed .chrome-only{display:none}
body.embed .top{padding:6px 0 4px}
body.embed main{padding-top:10px}
body.embed .bg::after{animation:none}
</style>
</head>
<body>
<div class="bg"></div><div class="grain"></div>
<header>
  <div class="wrap">
    <div class="top">
      <a class="back chrome-only" href="javascript:history.length>1?history.back():location.href='https://ryujin-os.vercel.app/bridge.html'">&larr; Back</a>
      <div class="chrome-only">
        <div class="brand">Deliverables <b>Index</b></div>

        <input id="q" type="search" placeholder="Search title, summary, path, program..." autofocus>
      </div>
      <select id="typeSel"><option value="">All types</option></select>
      <select id="sortSel">
        <option value="date">Newest first</option>
        <option value="dateAsc">Oldest first</option>
        <option value="title">Title A-Z</option>
        <option value="type">Type</option>
      </select>
    </div>
    <div class="chips" id="chips"></div>
  </div>
</header>
<main>
  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">No deliverables match. Clear the filters.</div>
</main>

const CUTOFF = "2026-06-12";
const ACCENT = {research:'#5cc8ff',spec:'#9d8cff',mockup:'#ff7aa8',deck:'#ffcf5c',audit:'#46e0c4',
  draft:'#7af0d0',brief:'#9d8cff',finance:'#ffcf5c',playbook:'#5cc8ff',view:'#46e0c4',artifact:'#ff7aa8',doc:'#9fb0cc'};
let state={q:'',type:'',sort:'date',chip:''};
const $=s=>document.querySelector(s);

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function hrefFor(r){
  if(r.external) return r.path;
  // local file path relative to Plus Ultra root; index sits in _brain/hub so go up two.
  return '../../'+r.path;
}

function apply(){
  let r=DATA.slice();
  if(state.type) r=r.filter(x=>x.type===state.type);
  if(state.chip==='recent') r=r.filter(x=>x.date>=CUTOFF);
  else if(state.chip&&state.chip.startsWith('prog:')) r=r.filter(x=>x.program===state.chip.slice(5));
  if(state.q){
    const q=state.q.toLowerCase();
    r=r.filter(x=>(x.title+' '+x.summary+' '+x.path+' '+(x.program||'')+' '+x.type).toLowerCase().includes(q));
  }
  const s=state.sort;
  r.sort((a,b)=>{
    if(s==='title')return a.title.localeCompare(b.title);
    if(s==='type')return a.type.localeCompare(b.type)||(a.date<b.date?1:-1);
    if(s==='dateAsc')return a.date<b.date?-1:a.date>b.date?1:0;
    return a.date<b.date?1:a.date>b.date?-1:a.title.localeCompare(b.title);
  });
  render(r);
}

function render(r){
  $('#count').textContent=r.length+' of '+DATA.length+' deliverables';
  const g=$('#grid');
  $('#empty').style.display=r.length?'none':'block';
  g.innerHTML=r.map(x=>{
    const ac=ACCENT[x.type]||'#9fb0cc';
    const isNew=x.date>=CUTOFF;
    return '<div class="card" style="--accent:'+ac+'">'
      +'<div class="crow"><span class="tag">'+esc(x.type)+'</span>'
      +'<span class="date">'+esc(x.date)+'</span>'
      +(isNew?'<span class="new">NEW</span>':'')+'</div>'
      +'<div class="title">'+esc(x.title)+'</div>'
      +(x.summary?'<div class="summary">'+esc(x.summary)+'</div>':'')
      +'<div class="foot"><a class="pathlink" href="'+esc(hrefFor(x))+'" '+(x.external?'target="_blank" rel="noopener"':'')+'>'+esc(x.path)+'</a>'
      +(x.program?'<span class="prog">'+esc(x.program)+'</span>':'')+'</div>'
      +'</div>';
  }).join('');
}

function buildChrome(){
  // idempotent: reset dynamic chrome so live-data refresh can rebuild without duplicating
  const _sel=$('#typeSel'); while(_sel.options.length>1) _sel.remove(1);
  $('#chips').innerHTML='';
  $('#genat').textContent='Generated '+new Date("2026-06-14T21:52:49.057Z").toLocaleString();
  $('#totalPill').textContent=DATA.length+' total';
  const rc=DATA.filter(x=>x.date>=CUTOFF).length;
  $('#recentPill').textContent=rc+' in last 48h';
  // type dropdown
  const types={}; DATA.forEach(x=>types[x.type]=(types[x.type]||0)+1);
  const sel=$('#typeSel');
  Object.keys(types).sort().forEach(t=>{
    const o=document.createElement('option');o.value=t;o.textContent=t+' ('+types[t]+')';sel.appendChild(o);
  });
  // chips: recent + top programs
  const progs={}; DATA.forEach(x=>{if(x.program)progs[x.program]=(progs[x.program]||0)+1;});
  const topProgs=Object.entries(progs).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const chips=$('#chips');
  const mk=(label,key)=>{const c=document.createElement('span');c.className='chip';c.textContent=label;
    c.onclick=()=>{state.chip=state.chip===key?'':key;[...chips.children].forEach(n=>n.classList.toggle('on',n===c&&state.chip===key));apply();};return c;};
  chips.appendChild(mk('Last 48h','recent'));
  topProgs.forEach(([p,n])=>chips.appendChild(mk(p+' ('+n+')','prog:'+p)));
  // footer type breakdown
  $('#foot').textContent='By type:  '+Object.entries(types).sort().map(([k,v])=>k+' '+v).join('   ');
}

$('#q').addEventListener('input',e=>{state.q=e.target.value;apply();});
$('#typeSel').addEventListener('change',e=>{state.type=e.target.value;apply();});
$('#sortSel').addEventListener('change',e=>{state.sort=e.target.value;apply();});
// embed mode for the Ryujin artifact shell
if(new URLSearchParams(location.search).get('embed')==='1')document.body.classList.add('embed');
buildChrome();apply();
// poster-fed live data: prefer a served/poster JSON, fall back to the embedded snapshot (file://-safe)
async function loadLiveData(){
  const url=window.DELIVERABLES_DATA_URL||new URLSearchParams(location.search).get('data')||'./deliverables-index.json';
  try{
    const r=await fetch(url,{cache:'no-store'});
    if(!r.ok)return;
    const j=await r.json();
    const recs=Array.isArray(j)?j:(j&&j.records);
    if(Array.isArray(recs)&&recs.length){DATA=recs;buildChrome();apply();}
  }catch(e){/* file:// or offline: keep the embedded snapshot */}
}
loadLiveData();
</script>
