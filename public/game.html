<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#060a14" />
<title>RYUJIN OS · Plus Ultra Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Orbitron:wght@500;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-deep: #060a14;
    --bg-mid: #0a1024;
    --bg-panel: rgba(10,16,36,0.78);
    --bg-panel-solid: #0a1024;
    --fg: #e0e8f5;
    --fg-dim: #9aa8c4;
    --cyan: #22d3ee;
    --cyan-glow: rgba(34,211,238,0.6);
    --gold: #fde047;
    --gold-soft: #fbbf24;
    --magenta: #ec4899;
    --green: #34d399;
    --orange: #fdba74;
    --violet: #a78bfa;
    --pink: #f9a8d4;
    --red: #ef4444;
    --amber: #fbbf24;

    --sec-HQ: var(--gold);
    --sec-SALES: var(--magenta);
    --sec-PRODUCTION: var(--amber);
    --sec-SERVICE: var(--green);
    --sec-CUSTOMER: var(--orange);
    --sec-FINANCE: var(--cyan);
    --sec-ADMIN: var(--violet);
    --sec-MARKETING: var(--pink);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-deep);
    color: var(--fg);
    font-family: 'Inter', system-ui, sans-serif;
    height: 100%; overflow: hidden;
    user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  img { display: block; max-width: 100%; user-drag: none; -webkit-user-drag: none; }

  /* CRT scanlines + vignette */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 5000;
    background: repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,0.10) 3px, rgba(0,0,0,0) 4px);
  }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 5001;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
  }

  #app { position: fixed; inset: 0; overflow: hidden; }

  /* Global title bar */
  .topbar {
    position: fixed; top: 12px; left: 12px; right: 12px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 8px 16px; z-index: 200;
    background: linear-gradient(180deg, rgba(10,16,36,0.92), rgba(10,16,36,0.78));
    border: 1px solid rgba(34,211,238,0.35);
    box-shadow: 0 0 24px rgba(34,211,238,0.15), inset 0 0 0 1px rgba(10,16,36,0.8);
    font-family: 'Orbitron', monospace;
  }
  .topbar.hidden { display: none; }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .topbar-brand { font-weight: 900; font-size: 14px; color: var(--gold); letter-spacing: 3px; }
  .topbar-brand .sub { font-weight: 500; font-size: 9px; color: var(--cyan); letter-spacing: 2px; display: block; margin-top: -2px; }
  .topbar-stats { display: flex; align-items: center; gap: 16px; font-size: 11px; }
  .stat-chip { display: flex; align-items: center; gap: 6px; padding: 4px 10px; background: rgba(34,211,238,0.08); border: 1px solid rgba(34,211,238,0.25); }
  .stat-chip .label { color: var(--fg-dim); font-size: 9px; letter-spacing: 1px; }
  .stat-chip .value { color: var(--gold); font-weight: 700; }
  .stat-chip.alert .value { color: var(--red); }
  .stat-chip.warn .value { color: var(--amber); }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .ico-btn {
    width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center;
    background: rgba(10,16,36,0.7); border: 1px solid rgba(34,211,238,0.4); color: var(--cyan);
    cursor: pointer; font-family: 'Press Start 2P', monospace; font-size: 12px; padding: 0;
  }
  .ico-btn:hover { background: rgba(34,211,238,0.15); border-color: var(--cyan); }
  .freshness-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 8px var(--green); margin-right: 4px;
  }
  .freshness-dot.stale { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .freshness-dot.down { background: var(--red); box-shadow: 0 0 8px var(--red); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }

  /* View container */
  .view { position: fixed; inset: 0; opacity: 0; pointer-events: none; transition: opacity .25s ease; }
  .view.active { opacity: 1; pointer-events: auto; }

  /* ───── TITLE ───── */
  .view-title {
    background: #000;
    display: flex; align-items: center; justify-content: center;
  }
  .view-title .bg {
    position: absolute; inset: 0;
    background: url('/assets/rpg/ui/title-screen.webp') center/cover no-repeat;
    opacity: 0.9;
  }
  .view-title .scrim {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.45) 100%);
  }
  .title-press {
    position: absolute; bottom: 12%; left: 0; right: 0; text-align: center;
    font-family: 'Press Start 2P', monospace; font-size: 18px; color: var(--gold);
    letter-spacing: 4px; text-shadow: 0 0 16px rgba(253,224,71,0.7);
    animation: blink 0.9s steps(2,end) infinite;
    z-index: 10;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .title-version {
    position: absolute; bottom: 4%; right: 4%;
    font-family: 'VT323', monospace; font-size: 14px; color: var(--cyan);
    z-index: 10;
  }
  .title-loading {
    position: absolute; top: 4%; left: 4%;
    font-family: 'VT323', monospace; font-size: 14px; color: var(--fg-dim);
    z-index: 10;
  }

  /* ───── MAP ───── */
  .view-map {
    background: var(--bg-deep);
    display: flex; align-items: center; justify-content: center;
    padding: 70px 12px 12px;
  }
  .map-frame {
    position: relative; width: 100%; height: 100%; max-width: 1600px;
    border: 1px solid rgba(34,211,238,0.3);
    box-shadow: 0 0 32px rgba(34,211,238,0.15);
  }
  .map-bg {
    position: absolute; inset: 0;
    /* Painted Chrono Trigger style ship deck plan as the live overworld.
       Building sprite overlays are hidden via .map-building below so the
       painted doors don't visually compete with floating house sprites -
       only clickable name plates show on top. SECTORS x/y are tuned to
       roughly land each name plate near its painted room on the ship. */
    background: url('/assets/rpg/scenes/overworld/shipdeck.webp') center/cover no-repeat;
    background-color: #060a14;
    image-rendering: pixelated;
  }
  /* Walkable overworld layer: pixel-art buildings + player + wizard on the
     tile-art world. Buildings render as bare PNG sprites with a drop shadow;
     no modern panel chrome. */
  .map-world { position: absolute; inset: 0; }
  .map-building {
    position: absolute;
    width: 13%; aspect-ratio: 1/1;
    transform: translate(-50%, -100%);   /* anchor on the building's bottom-middle */
    cursor: pointer;
    image-rendering: pixelated;
    /* Medieval building sprite hidden: painted shipdeck.webp already shows
       the rooms. Only the cyan-bordered nameplate (.b-label) renders so
       the player has a clickable hotspot at each sector's coords. */
    background-image: none !important;
    background-color: rgba(34,211,238,0.06);
    border: 1px dashed rgba(34,211,238,0.35);
    transition: background-color .15s ease, border-color .15s ease, transform .15s ease;
  }
  .map-building.tall { aspect-ratio: 1/1.4; width: 11%; }  /* admin */
  .map-building:hover, .map-building.near {
    background-color: rgba(253,224,71,0.18);
    border-color: var(--gold);
    transform: translate(-50%, -102%);
    z-index: 5;
  }
  .map-building.alert {
    background-color: rgba(239,68,68,0.18);
    border-color: var(--red);
    animation: pulseAlert 1.2s ease-in-out infinite;
  }
  .map-building.warn { background-color: rgba(251,191,36,0.18); border-color: var(--amber); }
  @keyframes pulseAlert { 50% { box-shadow: 0 0 22px var(--red), inset 0 0 12px rgba(239,68,68,0.45); } }
  /* Per-building nameplate sits below the sprite — classic FF town label */
  .map-building .b-label {
    position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
    font-family: 'Press Start 2P', monospace; font-size: 8px;
    background: rgba(6,10,20,0.92); color: var(--gold);
    padding: 3px 8px; border: 1px solid rgba(253,224,71,0.4);
    letter-spacing: 1px; white-space: nowrap;
    pointer-events: none;
  }
  /* Headline stat is now in the topbar + dialogue, not on every tile */
  .map-building .b-stat { display: none; }
  .map-building[data-sector="HQ"] .b-label { color: var(--gold); border-color: var(--gold); }
  .map-building[data-sector="SALES"] .b-label { color: var(--magenta); border-color: var(--magenta); }
  .map-building[data-sector="PRODUCTION"] .b-label { color: var(--amber); border-color: var(--amber); }
  .map-building[data-sector="SERVICE"] .b-label { color: var(--green); border-color: var(--green); }
  .map-building[data-sector="CUSTOMER"] .b-label { color: var(--orange); border-color: var(--orange); }
  .map-building[data-sector="FINANCE"] .b-label { color: var(--cyan); border-color: var(--cyan); }
  .map-building[data-sector="ADMIN"] .b-label { color: var(--violet); border-color: var(--violet); }
  .map-building[data-sector="MARKETING"] .b-label { color: var(--pink); border-color: var(--pink); }

  /* Wandering Claude wizard on the overworld — appears wherever the most
     recent CC session has a current_sector. Click/SPACE-near to talk. */
  .wizard-walker {
    position: absolute;
    width: 5.5%; aspect-ratio: 1/1;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 3px solid var(--violet);
    box-shadow: 0 0 18px rgba(167,139,250,0.6), inset 0 0 0 1px rgba(6,10,20,0.6);
    overflow: hidden;
    background: var(--bg-panel-solid) center/cover;
    z-index: 9;
    cursor: pointer;
    transition: left .4s ease, top .4s ease;
    animation: pulseWiz 1.8s ease-in-out infinite;
  }
  .wizard-walker .badge {
    position: absolute; top: -8px; right: -8px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--violet); color: var(--bg-deep);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    border: 2px solid var(--bg-deep);
  }

  /* Brief black flash overlay used when entering/exiting buildings */
  .view-flash {
    position: fixed; inset: 0; background: #000; pointer-events: none;
    opacity: 0; z-index: 4900; transition: opacity .14s ease-out;
  }
  .view-flash.on { opacity: 1; }

  /* Player avatar — pixel-art sprite. The sprite faces right by default;
     facing-left flips horizontally via scaleX(-1). Tile-snap movement
     animates the left/top properties between tile steps. */
  /* Player avatar - Chrono Trigger style pixel-art sprite of Mac (blue
     captain's coat, gold trim, blonde hair). Anchor on feet, sized to
     match the room interior scale. No circular border anymore - this
     is the actual character, not a portrait icon. */
  .player-avatar {
    position: absolute;
    width: 5.5%; aspect-ratio: 1 / 1;
    transform: translate(-50%, -100%);
    background-image: url('/assets/rpg/sprites/crew/mack.webp');
    background-size: contain; background-position: center bottom; background-repeat: no-repeat;
    image-rendering: pixelated;
    z-index: 10;
    pointer-events: none;
    filter: drop-shadow(0 3px 0 rgba(0,0,0,0.55));
    transition: left .14s linear, top .14s linear;
  }
  /* Walk-bob: subtle vertical bob during a step */
  .player-avatar.moving.step-b { transform: translate(-50%, -103%); }
  .player-avatar.face-right { transform: translate(-50%, -100%) scaleX(-1); }
  .player-avatar.moving.face-right.step-b { transform: translate(-50%, -103%) scaleX(-1); }

  /* Interact prompt that appears above building/NPC when player is near */
  .interact-prompt {
    position: absolute;
    transform: translate(-50%, -100%);
    background: rgba(6,10,20,0.95);
    border: 2px solid var(--gold);
    color: var(--gold);
    font-family: 'Press Start 2P', monospace; font-size: 8px;
    padding: 6px 10px; letter-spacing: 1px;
    box-shadow: 0 0 16px rgba(253,224,71,0.5);
    animation: promptBob 1s ease-in-out infinite alternate;
    z-index: 12;
    white-space: nowrap;
    pointer-events: none;
  }
  @keyframes promptBob { from { margin-top: -10px; } to { margin-top: -18px; } }

  /* Status pip on a building (overdue/alert/warn counter) */
  .b-pip {
    position: absolute; top: -10px; right: -10px;
    min-width: 22px; height: 22px; padding: 0 6px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace; font-size: 8px;
    border: 2px solid var(--bg-deep);
    z-index: 6;
  }
  .b-pip.alert { background: var(--red); color: #fff; box-shadow: 0 0 10px var(--red); animation: pulse 1s ease-in-out infinite; }
  .b-pip.warn  { background: var(--amber); color: var(--bg-deep); box-shadow: 0 0 8px var(--amber); }

  /* CC wizard pip on a building */
  .wizard-pip {
    position: absolute; top: -10px; left: -10px;
    display: flex; align-items: center; justify-content: center;
    background: var(--violet); border: 2px solid var(--bg-deep);
    width: 22px; height: 22px; border-radius: 50%;
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    color: var(--bg-deep);
    animation: pulseWiz 1.8s ease-in-out infinite;
    z-index: 7;
  }
  @keyframes pulseWiz { 50% { box-shadow: 0 0 12px rgba(167,139,250,0.7); } }

  /* Snapshot-delta sprite reactions — borrowed from Pixel Agents / Tokburn:
     a live data event (revenue signed, deal added, ticket overdue) spawns
     a floating value above the relevant NPC sprite and pulses the building
     tile on the overworld. */
  /* Wandering crew NPCs — give each sector interior the always-on motion
     of Pixel Agents. 32x32 circular portrait, name label, smooth motion
     via left/top % transitions, and a hue-rotate to differentiate. */
  .crew-wanderer {
    position: absolute; width: 64px; aspect-ratio: 1 / 1;
    transform: translate(-50%, -100%);
    background-size: contain; background-position: center bottom; background-repeat: no-repeat;
    transition: left 0.18s linear, top 0.18s linear;
    z-index: 8;
    animation: crewBob 1.8s ease-in-out infinite;
    image-rendering: pixelated;
    filter: drop-shadow(0 2px 0 rgba(0,0,0,0.55));
  }
  .crew-wanderer.face-left { transform: translate(-50%, -100%) scaleX(-1); }
  .crew-wanderer.face-left .wander-nameplate { transform: translateX(-50%) scaleX(-1); }
  .wander-nameplate {
    position: absolute; bottom: -16px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Press Start 2P', monospace; font-size: 6px;
    letter-spacing: 1px; white-space: nowrap;
    color: var(--fg); background: rgba(6,10,20,0.85);
    padding: 2px 6px; border: 1px solid rgba(34,211,238,0.35);
    text-shadow: 1px 1px 0 #000;
  }
  @keyframes crewBob { 50% { transform: translate(-50%, -103%); } }
  .crew-wanderer.face-left { animation: crewBobFlip 1.8s ease-in-out infinite; }
  @keyframes crewBobFlip { 50% { transform: translate(-50%, -103%) scaleX(-1); } }

  /* Idle "breathing" on the central god so the room never feels frozen.
     Animates filter brightness only, which composes with the inline
     box-shadow accent glow set per-sector in renderInterior — so the
     per-sector cyan/gold/magenta accent is preserved. */
  .npc-sprite { animation: npcBreathe 3.2s ease-in-out infinite; }
  @keyframes npcBreathe {
    0%, 100% { filter: brightness(1.0); }
    50%      { filter: brightness(1.15); }
  }

  /* Floating pop is anchored to #sectorRoom at the NPC's %-coords (NOT a
     child of .npc-sprite) so it never inherits the face-left scaleX(-1)
     mirror — otherwise the text would render backwards. */
  .sprite-pop {
    position: absolute;
    transform: translate(-50%, 0);
    font-family: 'Press Start 2P', monospace; font-size: 12px;
    letter-spacing: 1px; white-space: nowrap;
    text-shadow: 0 0 8px currentColor, 1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000;
    pointer-events: none; z-index: 60;
    animation: spritePop 1.6s ease-out forwards;
  }
  @keyframes spritePop {
    0%   { transform: translate(-50%, 0)     scale(0.6); opacity: 0; }
    20%  { transform: translate(-50%, -20px) scale(1.2); opacity: 1; }
    70%  { transform: translate(-50%, -48px) scale(1.0); opacity: 1; }
    100% { transform: translate(-50%, -64px) scale(0.9); opacity: 0; }
  }
  .map-building.react-pulse {
    animation: reactPulse 1.6s ease-out;
  }
  @keyframes reactPulse {
    0%, 100% { filter: drop-shadow(0 0 0 transparent) drop-shadow(0 4px 0 rgba(6,10,20,0.5)); }
    30%      { filter: drop-shadow(0 0 24px var(--pulse-color, #fde047)) drop-shadow(0 4px 0 rgba(6,10,20,0.5)); }
    60%      { filter: drop-shadow(0 0 14px var(--pulse-color, #fde047)) drop-shadow(0 4px 0 rgba(6,10,20,0.5)); }
  }

  /* Virtual D-pad + action button for touch devices */
  .virtual-pad {
    position: fixed; left: 16px; bottom: 16px;
    display: none; z-index: 150;
    width: 132px; height: 132px;
    touch-action: none;
  }
  .virtual-pad.show { display: block; }
  .vp-btn {
    position: absolute;
    width: 44px; height: 44px;
    background: rgba(10,16,36,0.78); border: 2px solid var(--cyan);
    color: var(--cyan); font-family: 'Press Start 2P', monospace; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none;
  }
  .vp-btn.held { background: rgba(34,211,238,0.35); color: var(--gold); }
  .vp-up    { top: 0;    left: 44px; }
  .vp-down  { bottom: 0; left: 44px; }
  .vp-left  { left: 0;   top: 44px; }
  .vp-right { right: 0;  top: 44px; }
  .vp-action {
    position: fixed; right: 18px; bottom: 18px;
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(253,224,71,0.18); border: 2px solid var(--gold);
    color: var(--gold); font-family: 'Press Start 2P', monospace; font-size: 10px;
    display: none; align-items: center; justify-content: center;
    z-index: 150; cursor: pointer; touch-action: none;
    box-shadow: 0 0 16px rgba(253,224,71,0.4);
  }
  .vp-action.show { display: flex; }
  .vp-action.held { background: rgba(253,224,71,0.4); }

  /* ───── SECTOR (walkable interior) ───── */
  .view-sector { padding-top: 70px; }
  .sector-room {
    position: absolute; inset: 70px 12px 12px;
    border: 2px solid var(--cyan);
    box-shadow: 0 0 30px rgba(34,211,238,0.18), inset 0 0 0 1px rgba(6,10,20,0.9);
    overflow: hidden;
  }
  .sector-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center; background-repeat: no-repeat;
  }
  .sector-bg::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(6,10,20,0.2) 0%, rgba(6,10,20,0.35) 50%, rgba(6,10,20,0.65) 100%);
  }
  /* The NPC sprite in interior — uses portrait WebP at fixed position */
  .npc-sprite {
    position: absolute;
    transform: translate(-50%, -50%);
    width: 13%; aspect-ratio: 3/4;
    background-size: cover; background-position: center top;
    border: 3px solid;
    box-shadow: 0 0 24px;
    z-index: 8;
    cursor: pointer;
    image-rendering: pixelated;
  }
  /* Field-ops comms terminal: glowing console instead of a portrait.
     Pixel-blue scanline pattern with a centered amber "TX" glyph and a
     blinking cyan cursor so it reads as an interactive comms station. */
  .npc-sprite.comms-terminal {
    background:
      repeating-linear-gradient(to bottom, rgba(34,211,238,0.18) 0, rgba(34,211,238,0.18) 2px, transparent 3px, transparent 4px),
      linear-gradient(180deg, #0c1a3e 0%, #060a14 100%);
    border-color: var(--cyan);
    box-shadow: 0 0 28px rgba(34,211,238,0.55), inset 0 0 18px rgba(34,211,238,0.25);
    aspect-ratio: 1/1.1;
    width: 11%;
    animation: commsPulse 2.4s ease-in-out infinite;
  }
  .npc-sprite.comms-terminal::before {
    content: 'TX'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace; font-size: 22px;
    color: var(--gold); text-shadow: 0 0 8px var(--gold);
  }
  .npc-sprite.comms-terminal::after {
    content: ''; position: absolute; bottom: 14%; left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 12px; background: var(--cyan);
    box-shadow: 0 0 10px var(--cyan);
    animation: commsBlink 0.9s steps(1, end) infinite;
  }
  @keyframes commsPulse {
    0%, 100% { box-shadow: 0 0 24px rgba(34,211,238,0.45), inset 0 0 14px rgba(34,211,238,0.20); }
    50%      { box-shadow: 0 0 36px rgba(34,211,238,0.70), inset 0 0 22px rgba(34,211,238,0.30); }
  }
  @keyframes commsBlink { 50% { opacity: 0; } }
  .npc-sprite.near {
    /* Bob the shadow, not the transform, so it composes with face-left mirror */
    animation: npcGlow .9s ease-in-out infinite alternate;
  }
  /* Horizontal mirror — player on NPC's left side flips the portrait to face them */
  .npc-sprite.face-left { transform: translate(-50%, -50%) scaleX(-1); }
  .npc-sprite.face-left .npc-nameplate { transform: translateX(-50%) scaleX(-1); }
  @keyframes npcGlow { from { filter: brightness(1) drop-shadow(0 0 0 transparent); } to { filter: brightness(1.06) drop-shadow(0 0 12px currentColor); } }
  .npc-sprite .npc-nameplate {
    position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
    background: rgba(6,10,20,0.92);
    padding: 4px 10px;
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    color: var(--gold); letter-spacing: 2px;
    white-space: nowrap;
    border: 1px solid;
  }
  /* Door zone — visible glow at bottom-center, walk-into exits */
  .door-zone {
    position: absolute;
    left: 50%; bottom: 0;
    transform: translateX(-50%);
    width: 14%; height: 7%;
    background: linear-gradient(0deg, rgba(34,211,238,0.45), rgba(34,211,238,0.0));
    border-top: 2px dashed var(--cyan);
    z-index: 5;
    pointer-events: none;
  }
  .door-zone::before {
    content: 'EXIT'; position: absolute; top: 8px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Press Start 2P', monospace; font-size: 8px;
    color: var(--cyan); letter-spacing: 2px;
    text-shadow: 0 0 6px var(--cyan);
  }
  /* Terminal zone (computer desk) — interactable for stats panel */
  .terminal-zone {
    position: absolute;
    width: 8%; height: 10%;
    transform: translate(-50%, -50%);
    background: linear-gradient(180deg, rgba(34,211,238,0.25), rgba(34,211,238,0.08));
    border: 2px solid var(--cyan);
    z-index: 6;
    cursor: pointer;
    box-shadow: 0 0 14px rgba(34,211,238,0.4), inset 0 0 12px rgba(6,10,20,0.5);
  }
  .terminal-zone::after {
    content: 'TERM'; position: absolute; bottom: -22px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Press Start 2P', monospace; font-size: 8px;
    color: var(--cyan); white-space: nowrap;
  }
  /* Sector mini-HUD (sector name + alert level, top-left of room) */
  .sector-hud {
    position: absolute; top: 12px; left: 12px;
    z-index: 11;
    background: rgba(6,10,20,0.85);
    border: 1px solid var(--cyan);
    padding: 8px 14px;
    pointer-events: none;
  }
  .sector-hud .eyebrow {
    font-family: 'Press Start 2P', monospace; font-size: 8px; letter-spacing: 2px;
    color: var(--cyan); margin-bottom: 4px;
  }
  .sector-hud .head {
    font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 700;
    color: var(--gold); letter-spacing: 2px;
  }
  .sector-hud .ticker {
    font-family: 'VT323', monospace; font-size: 14px; color: var(--cyan);
    letter-spacing: 1px; margin-top: 6px; padding-top: 6px;
    border-top: 1px dashed rgba(34,211,238,0.25);
  }
  .sector-hud .head .role {
    display: block; font-size: 11px; color: var(--fg-dim); font-weight: 500;
    letter-spacing: 1px; margin-top: 2px;
  }

  /* Dialogue choices (below body once typewriter completes) */
  .dialogue-choices {
    display: none;
    margin-top: 12px;
    flex-direction: column; gap: 6px;
  }
  .dialogue-choices.show { display: flex; }
  .dialogue-choice {
    background: rgba(6,10,20,0.7);
    border: 1px solid rgba(34,211,238,0.4);
    color: var(--fg);
    font-family: 'VT323', monospace; font-size: 18px;
    padding: 8px 14px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    text-align: left;
  }
  .dialogue-choice .num {
    color: var(--cyan); font-family: 'Press Start 2P', monospace; font-size: 10px;
    min-width: 18px;
  }
  .dialogue-choice:hover, .dialogue-choice.focused {
    background: rgba(34,211,238,0.18);
    border-color: var(--cyan);
    color: var(--gold);
    box-shadow: inset 3px 0 0 var(--gold);
  }
  .dialogue-choice.danger:hover, .dialogue-choice.danger.focused {
    border-color: var(--red); color: var(--red); box-shadow: inset 3px 0 0 var(--red);
  }
  /* Stats grid is still used inside modals (terminal opens the stats view) */
  .sector-stats-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px;
    font-size: 13px;
  }
  .sector-stats-grid .k { color: var(--fg-dim); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
  .sector-stats-grid .v { color: var(--fg); font-weight: 600; font-family: 'VT323', monospace; font-size: 18px; }
  .btn-ry {
    background: linear-gradient(180deg, rgba(34,211,238,0.18), rgba(34,211,238,0.06));
    border: 1px solid var(--cyan); color: var(--cyan);
    padding: 10px 18px; font-family: 'Press Start 2P', monospace; font-size: 10px;
    letter-spacing: 2px; cursor: pointer;
    box-shadow: inset 0 0 0 1px rgba(10,16,36,0.6);
  }
  .btn-ry:hover { background: rgba(34,211,238,0.25); color: var(--gold); }
  .btn-ry.primary { color: var(--gold); border-color: var(--gold); background: linear-gradient(180deg, rgba(253,224,71,0.18), rgba(253,224,71,0.06)); }
  .btn-ry.primary:hover { background: rgba(253,224,71,0.25); }
  .btn-ry.danger { color: var(--red); border-color: var(--red); }

  /* ───── DIALOGUE overlay ───── */
  .dialogue {
    position: fixed; left: 12px; right: 12px; bottom: 12px;
    display: none; z-index: 400;
  }
  .dialogue.open { display: block; }
  .dialogue-box {
    position: relative;
    background: linear-gradient(180deg, rgba(10,16,36,0.96), rgba(10,16,36,0.92));
    border: 2px solid var(--cyan);
    box-shadow: 0 0 30px rgba(34,211,238,0.3), inset 0 0 0 1px rgba(6,10,20,0.9);
    padding: 20px 24px 18px;
    min-height: 130px;
  }
  .dialogue-speaker {
    position: absolute; top: -14px; left: 18px;
    padding: 5px 14px;
    background: var(--bg-panel-solid); border: 2px solid var(--cyan);
    font-family: 'Press Start 2P', monospace; font-size: 10px; letter-spacing: 2px;
    color: var(--gold);
  }
  .dialogue-body {
    font-family: 'VT323', monospace; font-size: 22px;
    color: var(--fg); line-height: 1.35;
    white-space: pre-wrap;
    min-height: 90px;
  }
  .dialogue-advance {
    position: absolute; bottom: 8px; right: 14px;
    font-family: 'Press Start 2P', monospace; font-size: 12px; color: var(--cyan);
    animation: blink 0.9s steps(2,end) infinite;
  }
  .dialogue-portrait {
    position: absolute; bottom: 100%; right: 12px;
    width: 90px; height: 120px;
    border: 2px solid var(--cyan); background: var(--bg-panel-solid);
    overflow: hidden; margin-bottom: 4px;
    box-shadow: 0 0 16px rgba(34,211,238,0.3);
  }
  .dialogue-portrait img { width: 100%; height: 100%; object-fit: cover; }

  /* ───── PAUSE / MODAL ───── */
  .modal-back {
    position: fixed; inset: 0; z-index: 600;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.78);
    padding: 20px;
  }
  .modal-back.open { display: flex; }
  .modal {
    background: linear-gradient(180deg, var(--bg-panel-solid), #0e1530);
    border: 2px solid var(--cyan);
    box-shadow: 0 0 30px rgba(34,211,238,0.3), inset 0 0 0 2px rgba(10,16,36,0.7);
    padding: 24px 28px;
    min-width: 360px; max-width: 92vw; max-height: 90vh; overflow: auto;
    color: var(--fg);
  }
  .modal h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px; color: var(--gold);
    letter-spacing: 3px; margin: 0 0 18px 0;
  }
  .menu-item {
    padding: 10px 14px; display: flex; align-items: center; gap: 12px;
    cursor: pointer; border-left: 3px solid transparent;
    font-family: 'VT323', monospace; font-size: 20px;
  }
  .menu-item:hover, .menu-item.focused {
    background: rgba(34,211,238,0.15); border-left-color: var(--cyan);
    color: var(--cyan);
  }
  .menu-item .arrow { opacity: 0; }
  .menu-item.focused .arrow, .menu-item:hover .arrow { opacity: 1; }
  .modal-hint {
    margin-top: 14px; color: var(--fg-dim); font-size: 12px; font-family: 'Inter', sans-serif;
  }

  /* Quest log */
  .quest-list { display: flex; flex-direction: column; gap: 10px; }
  .quest-card {
    border: 1px solid rgba(34,211,238,0.3); padding: 10px 14px;
    background: rgba(34,211,238,0.04);
    display: grid; grid-template-columns: 8px 1fr auto; gap: 12px; align-items: center;
  }
  .quest-card .pri { width: 8px; height: 100%; min-height: 36px; }
  .quest-card.urgent .pri { background: var(--red); }
  .quest-card.high .pri { background: var(--amber); }
  .quest-card.normal .pri { background: var(--cyan); }
  .quest-card .body .title { font-weight: 600; font-size: 14px; color: var(--fg); }
  .quest-card .body .ctx { font-size: 11px; color: var(--fg-dim); margin-top: 2px; }
  .quest-card .dismiss {
    background: transparent; border: 1px solid var(--fg-dim); color: var(--fg-dim);
    width: 26px; height: 26px; cursor: pointer; font-family: monospace; font-size: 14px;
  }
  .quest-card .dismiss:hover { color: var(--red); border-color: var(--red); }

  /* Crew party panel */
  .party-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .party-card {
    border: 1px solid rgba(34,211,238,0.3); background: var(--bg-panel-solid);
    text-align: center; overflow: hidden;
  }
  .party-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
  .party-card .name {
    font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 6px 0;
    color: var(--gold); letter-spacing: 1px;
  }

  /* CC wizard popup in sector */
  .wiz-pop {
    position: fixed; right: 14px; bottom: 160px; z-index: 300;
    width: 64px; height: 80px;
    border: 2px solid var(--violet); background: var(--bg-panel-solid);
    overflow: hidden; cursor: pointer;
    box-shadow: 0 0 18px rgba(167,139,250,0.45);
    animation: pulseWiz 2s ease-in-out infinite;
  }
  .wiz-pop img { width: 100%; height: 100%; object-fit: cover; }
  .wiz-pop .badge {
    position: absolute; top: -8px; right: -8px;
    background: var(--violet); color: var(--bg-deep);
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace; font-size: 9px;
  }

  /* Toast notifications */
  .toast-stack {
    position: fixed; top: 76px; right: 12px; z-index: 700;
    display: flex; flex-direction: column; gap: 8px;
    max-width: 320px;
  }
  .toast {
    border: 1px solid var(--cyan); background: var(--bg-panel-solid);
    padding: 10px 14px; font-size: 13px;
    box-shadow: 0 0 14px rgba(34,211,238,0.25);
    animation: toastIn .2s ease;
  }
  .toast.amber { border-color: var(--amber); }
  .toast.red { border-color: var(--red); }
  @keyframes toastIn { from { transform: translateX(20px); opacity: 0; } }

  /* Tap textarea */
  textarea, input[type="text"] {
    width: 100%; padding: 8px 10px;
    background: var(--bg-deep); color: var(--fg); border: 1px solid var(--cyan);
    font-family: 'VT323', monospace; font-size: 18px;
  }

  /* Mobile */
  @media (max-width: 720px) {
    .topbar { padding: 6px 10px; gap: 6px; flex-wrap: nowrap; }
    .topbar-brand { font-size: 11px; letter-spacing: 2px; }
    .topbar-brand .sub { font-size: 7px; }
    /* 8 stat chips at ~50px each don't fit 375px -- scroll horizontally instead
       of wrapping (which shoved the map below the viewport). */
    .topbar-stats { gap: 8px; overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: thin; }
    .stat-chip { padding: 3px 6px; font-size: 10px; flex-shrink: 0; }
    .stat-chip .label { font-size: 7px; }
    .map-grid { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(4, 1fr); }
    .map-hot .hot-label { font-size: 8px; }
    .map-hot .hot-stat { font-size: 13px; }
    /* Mobile overworld: shrink player + buildings to fit 9:16 viewport */
    .player-avatar { width: 7%; }
    .map-building { width: 22%; height: 18%; padding: 6px; }
    .map-building .b-label { font-size: 8px; }
    .map-building .b-stat { font-size: 12px; }
    .npc-sprite { width: 18%; }
    .party-grid { grid-template-columns: repeat(3, 1fr); }
    .title-press { font-size: 14px; }
    .dialogue-body { font-size: 18px; }
  }

  /* User text the operator might want to copy/paste (customer names,
     quest titles, recent activity rows). The global user-select:none on
     html/body would block this otherwise. */
  .dialogue-body, .quest-card .title, .quest-card .ctx, .modal .addr,
  .recent-activity .title, .stat-chip .value {
    user-select: text;
    -webkit-user-select: text;
  }
</style>
  <script src="/assets/ryujin-slug.js"></script>

<body>
<div id="app">
  <!-- Topbar -->
  <div class="topbar hidden" id="topbar">
    <div class="topbar-left">
      <div class="topbar-brand">RYUJIN OS<span class="sub">PLUS ULTRA OPERATIONS</span></div>
    </div>
    <div class="topbar-stats" id="topbarStats"></div>
    <div class="topbar-right">
      <button class="ico-btn" id="btnMute" title="Mute SFX (M)">♪</button>
      <button class="ico-btn" id="btnPause" title="Menu (Esc)">☰</button>
    </div>
  </div>

  <!-- TITLE view -->
  <div class="view view-title active" id="viewTitle">
    <div class="bg"></div>
    <div class="scrim"></div>
    <div class="title-loading" id="titleLoading">connecting to plus ultra…</div>
    <div class="title-press" id="titlePress">PRESS START</div>
    <div class="title-version">v1.0 · cyberpunk overworld</div>
  </div>

  <!-- MAP view (walkable overworld) -->
  <div class="view view-map" id="viewMap">
    <div class="map-frame">
      <div class="map-bg"></div>
      <div class="map-world" id="mapWorld">
        <!-- Buildings + player avatar injected here -->
      </div>
    </div>
  </div>

  <!-- SECTOR view (walkable interior) -->
  <div class="view view-sector" id="viewSector">
    <div class="sector-room" id="sectorRoom">
      <div class="sector-bg" id="sectorBg"></div>
      <div class="sector-hud" id="sectorHud">
        <div class="eyebrow">SECTOR · <span id="hudSecId">--</span></div>
        <div class="head"><span id="hudSecNpc">--</span><span class="role" id="hudSecRole">--</span></div>
        <div class="ticker" id="hudSecTicker">--</div>
      </div>
      <!-- NPC sprite, terminal zone, door zone, player avatar injected here -->
    </div>
  </div>

  <!-- Virtual D-pad + action button (touch-only, shown on mobile) -->
  <div class="virtual-pad" id="virtualPad" aria-hidden="true">
    <div class="vp-btn vp-up"    data-dir="up"    title="Up">▲</div>
    <div class="vp-btn vp-down"  data-dir="down"  title="Down">▼</div>
    <div class="vp-btn vp-left"  data-dir="left"  title="Left">◀</div>
    <div class="vp-btn vp-right" data-dir="right" title="Right">▶</div>
  </div>
  <div class="vp-action" id="vpAction" title="Action (interact)" aria-label="Interact">A</div>

  <!-- Dialogue overlay -->
  <div class="dialogue" id="dialogue" role="dialog" aria-modal="true" aria-live="polite">
    <div class="dialogue-portrait" id="dialoguePortrait"><img id="dialoguePortraitImg" alt="NPC portrait" /></div>
    <div class="dialogue-box">
      <div class="dialogue-speaker" id="dialogueSpeaker">ZEUS</div>
      <div class="dialogue-body" id="dialogueBody"></div>
      <div class="dialogue-choices" id="dialogueChoices" role="menu" aria-label="Dialogue options"></div>
      <div class="dialogue-advance" id="dialogueAdvance" aria-hidden="true">▼</div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-back" id="modalBack">
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" tabindex="-1"></div>
  </div>

  <!-- Toasts -->
  <div class="toast-stack" id="toastStack"></div>

  <!-- View flash (brief black overlay on enter/exit building) -->
  <div class="view-flash" id="viewFlash"></div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
// RYUJIN OS -- Plus Ultra Operations · Game Shell v1.0
// ═══════════════════════════════════════════════════════════════

const TENANT = window.RYUJIN_TENANT_SLUG;
const API_BASE = (window.location.protocol === 'file:' ||
                  /^(localhost|127\.0\.0\.1)$/.test(window.location.hostname))
                 ? 'https://ryujin-os.vercel.app' : '';
const SNAPSHOT_REFRESH_MS = 5 * 60 * 1000;
const CC_REFRESH_MS = 30 * 1000;
const SAVE_KEY = 'ryujin_game_save_v1';

// Each sector has a fixed position on the overworld in % coordinates
// (origin top-left, x→right, y→down). `bg` is the interior scene WebP
// shown when player enters; `sprite` is the small pixel-art building
// shown on the overworld map.
const SECTORS = [
  { id:'HQ',        npc:'MACK',     role:'Owner',        href:'/command-center.html',         bg:'/assets/rpg/scenes/sectors/hq.webp',         sprite:'/assets/rpg/sprites/buildings/hq.webp',         x:50, y:24 },
  { id:'SALES',     npc:'MACK',     role:'Sales',        href:'/sales-cockpit.html',          bg:'/assets/rpg/scenes/sectors/sales.webp',      sprite:'/assets/rpg/sprites/buildings/sales.webp',      x:20, y:40 },
  { id:'FINANCE',   npc:'MEL',      role:'Books',        href:'/admin.html?page=finance',     bg:'/assets/rpg/scenes/sectors/finance.webp',    sprite:'/assets/rpg/sprites/buildings/finance.webp',    x:80, y:40 },
  { id:'ADMIN',     npc:'CAT',      role:'EA',           href:'/administration.html',         bg:'/assets/rpg/scenes/sectors/admin.webp',      sprite:'/assets/rpg/sprites/buildings/admin.webp',      x:50, y:58, tall:true },
  { id:'MATERIALS', npc:'PAVANJOT', role:'Quartermaster',href:'/production-materials.html',   bg:'/assets/rpg/scenes/sectors/materials.webp',  sprite:'/assets/rpg/sprites/buildings/production.webp', x:88, y:18 },
  { id:'PRODUCTION',npc:'DIEGO',    role:'Foreman',      href:'/production.html',             bg:'/assets/rpg/scenes/sectors/production.webp', sprite:'/assets/rpg/sprites/buildings/production.webp', x:20, y:74 },
  { id:'SERVICE',   npc:'AJ',       role:'Repairs',      href:'/service-tickets.html',        bg:'/assets/rpg/scenes/sectors/service.webp',    sprite:'/assets/rpg/sprites/buildings/service.webp',    x:80, y:74 },
  { id:'CUSTOMER',  npc:'MEL',      role:'Customer Care',href:'/customers.html',              bg:'/assets/rpg/scenes/sectors/customer.webp',   sprite:'/assets/rpg/sprites/buildings/customer.webp',   x:32, y:92 },
  { id:'MARKETING', npc:'CAT',      role:'Marketing',    href:'/admin.html?page=marketing',   bg:'/assets/rpg/scenes/sectors/marketing.webp',  sprite:'/assets/rpg/sprites/buildings/marketing.webp',  x:68, y:92 }
];

// Overworld movement: classic-FF tile-snap. Each held key queues one step;
// player tweens to the next tile over STEP_MS, then if the key is still
// held queues the next step. CSS transition on .player-avatar left/top
// handles the visual tween (140ms linear matches STEP_MS).
const TILE_W_PCT = 4;    // horizontal step in %
const TILE_H_PCT = 5;    // vertical step in %
const STEP_MS    = 140;  // ms per tile-step animation
// Interior is still continuous % motion since the room is small and rotates
// the player relative to the NPC/terminal/door positions.
const INTERIOR_SPEED_PCT_PER_MS = 0.038;
// Building footprint for AABB collision. Buildings are bottom-anchored
// so the rectangle extends UP from sec.y (the door tile at the base) to
// sec.y - h. Half-width is symmetric around sec.x. Tall ADMIN building
// gets a larger footprint matching its sprite.
function getBuildingFoot(sec) {
  const mobile = window.matchMedia('(max-width: 720px)').matches;
  if (sec && sec.tall) return mobile ? { hw: 6,  h: 18 } : { hw: 5,   h: 18 };
  return                       mobile ? { hw: 9,  h: 14 } : { hw: 6.5, h: 13 };
}
const INTERACT_PAD = { w: 3, h: 3 };  // extra % beyond footprint where "near" prompt shows
// NPC interaction radius inside a room (% from NPC center)
const NPC_INTERACT_R = 13;
// Terminal interaction radius
const TERM_INTERACT_R = 10;
// Door zone hit radius (% from bottom-center of room)
const DOOR_ZONE_TOP = 88;

// Crew accent palette — each crew member gets a distinct color used for
// HUD chrome, dialogue border, and the room glow when they're the lead
// NPC. Multiple sectors can share a crew member (Mack runs HQ + Sales,
// Mel runs Finance + Customer, Cat runs Admin + Marketing) and the
// accent follows the person, not the room.
const NPC_ACCENT = {
  MACK:'#fde047', CAT:'#f9a8d4', MEL:'#22d3ee', AJ:'#34d399',
  DIEGO:'#fbbf24', PAVANJOT:'#fdba74', DARCY:'#a78bfa'
};
// Crew NPCs use the /crew/ portrait directory; lookups not found there
// fall back to the legacy top-level path so older identifiers (gods,
// claude-wizard) still resolve.
const _CREW_PORTRAIT_IDS = new Set(['mack','mackenzie','cat','mel','melodie','aj','diego','pavanjot','darcy']);
const NPC_PORTRAIT = (npc) => {
  const lc = npc.toLowerCase();
  const fileId = lc === 'mack' ? 'mackenzie' : (lc === 'mel' ? 'melodie' : lc);
  if (_CREW_PORTRAIT_IDS.has(lc)) return `/assets/rpg/portraits/crew/${fileId}.webp`;
  return `/assets/rpg/portraits/${lc}.webp`;
};
const FALLBACK_PORTRAIT = '/assets/rpg/ui/dragon-sigil.webp';
// Attach a graceful 404 fallback to any portrait image element. Called
// after setting src, so a broken WebP path swaps to the dragon sigil
// rather than collapsing the card layout to a broken-image icon.
function attachPortraitFallback(imgEl) {
  if (!imgEl) return;
  imgEl.onerror = () => { imgEl.onerror = null; imgEl.src = FALLBACK_PORTRAIT; };
}

// Crew rendered as CT-style pixel-art sprites (transparent PNGs, no
// portrait circles). The `img` here drives the wandering NPC inside
// each sector room. Lead-NPC portraits used in dialogue still resolve
// via NPC_PORTRAIT() which uses /portraits/crew/ for portrait fidelity
// in the dialogue box; sprites here are for in-world rendering.
const CREW = [
  { id:'mackenzie', name:'CEO MACK',  img:'/assets/rpg/sprites/crew/mack.webp' },
  { id:'cat',       name:'CAT',       img:'/assets/rpg/sprites/crew/cat.webp' },
  { id:'darcy',     name:'DARCY',     img:'/assets/rpg/sprites/crew/darcy.webp' },

function defaultSave() {
  return {
    dismissed_quests: [], visited_sectors: [], spoken_to: [],
    muted: false, last_visit_at: null,
    player_x: 50, player_y: 32
  };
}
function loadSave() {
  let parsed;
  try { parsed = JSON.parse(localStorage.getItem(SAVE_KEY)); }
  catch { parsed = null; }
  if (!parsed || typeof parsed !== 'object') return defaultSave();
  // Coerce shape: arrays must be arrays, booleans booleans. Earlier saves
  // (or a future bug writing the wrong shape) shouldn't crash quest log
  // or sector entry when .includes()/.push() runs on a non-array.
  const def = defaultSave();
  const numOr = (v, d) => (typeof v === 'number' && !isNaN(v)) ? v : d;
  return {
    dismissed_quests: Array.isArray(parsed.dismissed_quests) ? parsed.dismissed_quests : def.dismissed_quests,
    visited_sectors: Array.isArray(parsed.visited_sectors) ? parsed.visited_sectors : def.visited_sectors,
    spoken_to: Array.isArray(parsed.spoken_to) ? parsed.spoken_to : def.spoken_to,
    muted: typeof parsed.muted === 'boolean' ? parsed.muted : def.muted,
    last_visit_at: parsed.last_visit_at || def.last_visit_at,
    player_x: numOr(parsed.player_x, def.player_x),
    player_y: numOr(parsed.player_y, def.player_y),
  };
}
function persistSave() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state.save)); } catch {}
}

// Player position persistence is throttled so we don't write localStorage on
// every animation frame. ~500ms feels snappy enough that a reload during a
// walk drops back within half a step.
let _playerSavePending = false;
function schedulePlayerSave() {
  if (_playerSavePending) return;
  _playerSavePending = true;
  setTimeout(() => {
    _playerSavePending = false;
    state.save.player_x = state.player.x;
    state.save.player_y = state.player.y;
    persistSave();
  }, 500);
}

// ═════ DOM helpers (XSS-safe) ═════
function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(k => {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'text') e.textContent = attrs[k];
    else if (k.startsWith('on') && typeof attrs[k] === 'function') e.addEventListener(k.slice(2), attrs[k]);
    else if (k === 'style' && typeof attrs[k] === 'object') Object.assign(e.style, attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  (children || []).forEach(c => { if (c != null) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  return e;
}
const $ = id => document.getElementById(id);
function fmt$(n) { if (n == null) return '--'; if (n >= 1000) return '$' + Math.round(n/1000) + 'K'; return '$' + Math.round(n); }
function pct(n) { return n == null ? '--' : Math.round(n * 100) + '%'; }

// ═════ Snapshot normalization ═════
// Prod /api/snapshot returns { sections: {...}, updated_at }. Unwrap so
// consumers can read s.revenue, s.tickets, etc. Also reshape pipeline
// (server returns an array of deals) into the object shape the UI expects,
// and synthesize an alerts[] from watchdog state since alerts is not in
// the prod payload.
function normalizeSnapshot(raw) {
  if (!raw) return raw;
  const s = raw.sections ? { ...raw.sections } : { ...raw };
  if (Array.isArray(s.pipeline)) {
    const arr = s.pipeline;
    const openish = arr.filter(d => !/lost|cancelled|won|signed/i.test(d.status || 'open'));
    s.pipeline = {
      deals: arr,
      totalValue: openish.reduce((a, d) => a + (d.value || 0), 0),
      openDeals: openish.length,
      top5_deals: openish.slice().sort((a, b) => (b.value || 0) - (a.value || 0)).slice(0, 5)
    };
  }
  if (!Array.isArray(s.alerts)) {
    const out = [];
    const wd = s.watchdog || {};
    if ((wd.tier1Count || 0) > 0) out.push(`Watchdog: ${wd.tier1Count} tier-1 items`);
    if ((wd.tier2Count || 0) > 5) out.push(`Watchdog: ${wd.tier2Count} tier-2 items`);
    s.alerts = out;
  }
  return s;
}

// ═════ Event bus (snapshot deltas → sprite reactions) ═════
// Lightweight pub/sub so any handler can subscribe to "X just happened"
// without coupling to fetchSnapshot. Patterned after Tokburn/Pixel Agents
// where live state diffs drive on-screen sprite animations.
const _bus = {};
function on(evt, fn)  { (_bus[evt] = _bus[evt] || []).push(fn); }
function emit(evt, data) { (_bus[evt] || []).forEach(fn => { try { fn(data); } catch {} }); }

// Compute event list from prev→curr snapshot diff. Pure function — no DOM.
// Add new diff rules here as more sprite reactions get wired up.
function diffSnapshot(prev, curr) {
  const out = [];
  if (!prev || !curr) return out;
  const pRev = prev.revenue || {}, cRev = curr.revenue || {};
  const pT   = prev.tickets || {}, cT   = curr.tickets || {};
  const pP   = prev.pipeline || {}, cP   = curr.pipeline || {};
  if ((cRev.signedRevenue || 0) > (pRev.signedRevenue || 0)) {
    out.push({ type: 'revenue.signed.up', sector: 'FINANCE', from: pRev.signedRevenue || 0, to: cRev.signedRevenue, delta: cRev.signedRevenue - (pRev.signedRevenue || 0) });
  }
  if ((cT.overdueCount || 0) > (pT.overdueCount || 0)) {
    out.push({ type: 'tickets.overdue.up', sector: 'PRODUCTION', from: pT.overdueCount || 0, to: cT.overdueCount, delta: cT.overdueCount - (pT.overdueCount || 0) });
  }
  if ((cP.openDeals || 0) > (pP.openDeals || 0)) {
    out.push({ type: 'pipeline.deal.new', sector: 'SALES', from: pP.openDeals || 0, to: cP.openDeals, delta: cP.openDeals - (pP.openDeals || 0) });
  }
  return out;
}

// ═════ Data fetches ═════
async function fetchSnapshot() {
  const isFirstLoad = !state.snapshot;
  const prev = state.snapshot;
  try {
    const r = await fetch(`${API_BASE}/api/snapshot?tenant=${TENANT}`, { credentials: 'omit' });
    if (!r.ok) throw new Error('snapshot ' + r.status);
    const raw = await r.json();
    // Reject empty/null body. A 200 with `{}` or `null` would otherwise
    // normalize to an empty-but-truthy snapshot and the UI would silently
    // render zero everywhere with no error indicator.
    if (!raw || typeof raw !== 'object' || (!raw.sections && !raw.revenue && !raw.tickets)) {
      throw new Error('snapshot empty or malformed');
    }
    state.snapshot = normalizeSnapshot(raw);
    state.snapshotErr = null;
    state.snapshotAt = Date.now();
    if (isFirstLoad) {
      const wd = (state.snapshot.alerts || []).find(a => /watchdog|cron/i.test(String(a)));
      if (wd) { toast(wd, 'amber'); sfxBoss(); }
    } else {
      // Subsequent polls: diff against the prior snapshot and broadcast
      // any positive deltas so subscribed sprite reactions can fire.
      diffSnapshot(prev, state.snapshot).forEach(ev => emit(ev.type, ev));
    }
  } catch (e) {
    state.snapshotErr = String(e.message || e);
  }
  renderTopbar();
  // Update the building stat chips + HUD without nuking the player avatar
  if (state.view === 'MAP') refreshBuildingStats();
  else if (state.view === 'SECTOR') refreshInteriorHud();
}
async function fetchMe() {
  try {
    const r = await fetch(`${API_BASE}/api/me`, { credentials: 'omit' });
    if (r.ok) state.me = await r.json();
  } catch {}
}
async function fetchCcSessions() {
  try {
    const r = await fetch(`${API_BASE}/api/cc-presence?tenant=${TENANT}`, { credentials: 'omit' });
    if (!r.ok) throw new Error('cc-presence ' + r.status);
    const data = await r.json();
    state.ccSessions = Array.isArray(data.sessions) ? data.sessions : [];
  } catch { state.ccSessions = []; }
  // Wizards moved in/out of sectors: refresh pip counts without rebuilding
  if (state.view === 'MAP') refreshBuildingWizardPips();
  renderWizardPop();
}

// ═════ Per-sector daily line (from snapshot) ═════
// Switches on sec.id so multiple sectors can share the same crew member
// (Mack runs HQ + Sales, Mel runs Finance + Customer, Cat runs Admin +
// Marketing) with sector-specific dialogue. Voice is the crew member
// speaking in plain shop-talk - no more Greek metaphors.
function godLine(sec) {
  const npcOrSec = (typeof sec === 'string') ? null : sec;
  const sectorId = npcOrSec ? npcOrSec.id : null;
  const s = state.snapshot;
  if (!s) return 'Awaiting today\'s briefing...';
  const rev = s.revenue || {};
  const t = s.tickets || {};
  const pipe = s.pipeline || {};
  const leads = s.leads || {};
  const ads = s.metaAds || {};
  const brief = s.briefing_morning || {};
  const alerts = s.alerts || [];

  const byStat = t.byStatus || {};
  const recent = (rev.recentActivity || []).slice(0, 3);

  switch (sectorId) {
    case 'HQ': {
      const stat = (brief.status || 'unknown').toUpperCase();
      const top = brief.top3 && brief.top3[0];
      const topLine = top ? (top.action || top.title || '') : 'Nothing flagged.';
      return `Briefing: ${stat}.\nTop priority: ${topLine}`;
    }
    case 'SALES': {
      const signed = Math.round((rev.signedRevenue || 0) / 1000);
      const pipeVal = Math.round((pipe.totalValue || 0) / 1000);
      const accepted = recent.filter(r => /accepted|signed/i.test(r.action || '')).length;
      return `Closed $${signed}K MTD. Pipeline holds $${pipeVal}K across ${pipe.openDeals || 0} deals. ${accepted ? accepted + ' proposal' + (accepted > 1 ? 's' : '') + ' accepted today.' : 'No new acceptances today.'}`;
    }
    case 'PRODUCTION': {
      const open = byStat.open || 0;
      const active = byStat.active || 0;
      const overdue = t.overdueCount || 0;
      return `${active} jobs running. ${open} queued. ${overdue} overdue. ${overdue > 20 ? "We're swamped, boss." : 'Crew is keeping pace.'}`;
    }
    case 'SERVICE': {
      const active = byStat.active || 0;
      const today = (t.activeToday || []).length;
      return `${active} active calls. ${today} on the dispatch board today. ${active > 5 ? 'Truck is loaded up.' : 'Quiet day so far.'}`;
    }
    case 'CUSTOMER': {
      const conv = (state.snapshot.ghl_conversations_24h_count) || (alerts.find(a => /conversation/i.test(a)) ? '?' : 0);
      const totalTix = t.total || 0;
      return `${conv || 'a handful of'} conversations moved today. ${totalTix} tickets open with customers.`;
    }
    case 'FINANCE': {
      const signed = Math.round((rev.signedRevenue || 0) / 1000);
      const pend = rev.pendingRevenue || 0;
      const pendNote = pend === 0 && signed > 0 ? ' Pending revenue counter looks stuck, want me to audit?' : '';
      return `Signed $${signed}K month-to-date. Pending $${Math.round(pend/1000)}K.${pendNote}`;
    }
    case 'ADMIN': {
      const watchdog = alerts.find(a => /watchdog|cron/i.test(String(a)));
      const stale = alerts.find(a => /stale/i.test(String(a)));
      if (watchdog) return `Heads up: ${watchdog}. I'll keep tabs.`;
      if (stale) return `${stale}. Want me to sweep it?`;
      return 'All systems quiet. Inbox under control.';
    }
    case 'MATERIALS': {
      const mat = s.materialOrders;
      if (!mat || typeof mat !== 'object') return 'Inventory feed not wired up yet. Walk in and I will show you what we have.';
      const ords = mat.openCount || 0;
      return ords ? `${ords} material order${ords > 1 ? 's' : ''} open with suppliers.` : 'Pallets stacked, shelves stocked. We are good.';
    }
    case 'MARKETING': {
      const cpl = ads.avgCPL;
      const lw = leads.thisWeek || 0;
      const total = leads.total || 0;
      return `${lw} leads this week (${total} all-time). CPL ${cpl != null ? '$' + cpl.toFixed(2) : '?'}. ${lw < 3 ? 'Want me to push more spend?' : 'Funnel is humming.'}`;
    }
  }
  return 'Quiet today.';
}

function sectorStatBlocks(sectorId) {

      const mat = s.materialOrders;

function sectorAlertLevel(sectorId) {
  const s = state.snapshot;
  if (!s) return 'ok';
  const t = s.tickets || {};
  const alerts = s.alerts || [];
  const brief = s.briefing_morning || {};

  if (sectorId === 'HQ') {
    return (brief.status === 'red') ? 'alert' : (brief.status === 'yellow' ? 'warn' : 'ok');
  }
  if (sectorId === 'PRODUCTION') {
    const ov = t.overdueCount || 0;
    return ov > 20 ? 'alert' : ov > 5 ? 'warn' : 'ok';
  }
  if (sectorId === 'ADMIN') {
    return alerts.find(a => /watchdog|cron|down/i.test(String(a))) ? 'alert' : 'ok';
  }
  if (sectorId === 'FINANCE') {
    const rev = s.revenue || {};
    return (rev.pendingRevenue === 0 && (rev.signedRevenue || 0) > 0) ? 'warn' : 'ok';
  }
  return 'ok';
}

function sectorHeadline(sectorId) {
  // One-line headline for map tile
  const s = state.snapshot;
  if (!s) return 'loading…';
  const rev = s.revenue || {};
  const t = s.tickets || {};
  const pipe = s.pipeline || {};
  const ads = s.metaAds || {};
  const brief = s.briefing_morning || {};
  const alerts = s.alerts || [];
  const leads = s.leads || {};

  switch (sectorId) {
    case 'HQ': return `Briefing ${(brief.status || '?').toUpperCase()}`;
    case 'SALES': return `${fmt$(rev.signedRevenue)} signed`;
    case 'PRODUCTION': return `${(t.byStatus && t.byStatus.open) || 0} open · ${t.overdueCount || 0} overdue`;
    case 'SERVICE': return `${(t.byStatus && t.byStatus.active) || 0} active`;
    case 'CUSTOMER': return `${t.total || 0} tickets`;
    case 'FINANCE': return `${fmt$(rev.signedRevenue)} MTD`;
    case 'ADMIN': {
      const watchdog = alerts.find(a => /watchdog|cron/i.test(String(a)));
      return watchdog ? 'WATCHDOG DOWN' : 'systems nominal';
    }
    case 'MARKETING': return `CPL $${ads.avgCPL != null ? ads.avgCPL.toFixed(2) : '?'} · ${leads.thisWeek || 0}/wk`;
    case 'MATERIALS': {
      const mat = s.materialOrders;
      return (mat && typeof mat === 'object') ? ((mat.openCount || 0) + ' orders open') : 'no data yet';
    }
  }
}

// ═════ WebAudio chiptune SFX ═════
let audioCtx = null;
function ensureAudio() {
  if (audioCtx || state.save.muted) return audioCtx;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
  return audioCtx;
}
function beep(freq, durMs, type, vol) {
  if (state.save.muted) return;
  const a = ensureAudio(); if (!a) return;
  const t0 = a.currentTime;
  const o = a.createOscillator();
  const g = a.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(vol || 0.05, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + durMs / 1000);
  o.connect(g); g.connect(a.destination);
  o.start(t0); o.stop(t0 + durMs / 1000);
}

const sfxFootstep = () => beep(140 + Math.random() * 40, 28, 'square', 0.012);
// Footstep cadence accumulator — ticked by updateOverworld/updateInterior.
let _footstepAcc = 0;
function maybeFootstep(dtMs) {
  _footstepAcc += dtMs;
  if (_footstepAcc >= 240) { _footstepAcc = 0; sfxFootstep(); }
}
const sfxConfirm = () => { beep(660, 50, 'square', 0.05); setTimeout(() => beep(880, 60, 'square', 0.05), 40); };
const sfxOpen    = () => { beep(440, 40, 'triangle', 0.05); beep(660, 80, 'triangle', 0.04); };
const sfxClose   = () => beep(330, 60, 'triangle', 0.04);
const sfxAdvance = () => beep(990, 20, 'square', 0.025);
const sfxBoss    = () => { beep(110, 250, 'sawtooth', 0.06); setTimeout(() => beep(82, 350, 'sawtooth', 0.06), 200); };
['click','keydown','touchstart'].forEach(ev => window.addEventListener(ev, function once() { ensureAudio(); window.removeEventListener(ev, once); }, { once: true }));

function renderTopbar() {
  const tb = $('topbar');
  tb.classList.toggle('hidden', state.view === 'TITLE');
  if (state.view === 'TITLE') return;

  const s = state.snapshot;
  const stats = $('topbarStats');
  stats.textContent = '';
  if (!s) {
    stats.appendChild(el('span', { class: 'stat-chip', text: 'loading…' }));
    return;
  }
  const rev = s.revenue || {};
  const t = s.tickets || {};
  const brief = s.briefing_morning || {};
  const alerts = s.alerts || [];

  const ageMin = state.snapshotAt ? Math.round((Date.now() - state.snapshotAt) / 60000) : 0;
  const dot = el('span', { class: 'freshness-dot' + (state.snapshotErr ? ' down' : ageMin > 60 ? ' stale' : '') });

  const chips = [
    { l: 'CEO MACK', v: 'Lv ' + computeLevel(rev.signedRevenue || 0) },
    { l: 'MTD', v: fmt$(rev.signedRevenue) },
    { l: 'TICKETS', v: ((t.byStatus && t.byStatus.open) || 0) + ' open' },
    { l: 'OVERDUE', v: t.overdueCount || 0, level: (t.overdueCount || 0) > 20 ? 'alert' : (t.overdueCount || 0) > 5 ? 'warn' : '' },
    { l: 'BRIEF', v: (brief.status || '?').toUpperCase(), level: brief.status === 'red' ? 'alert' : brief.status === 'yellow' ? 'warn' : '' },
    { l: 'ALERTS', v: alerts.length, level: alerts.length ? 'warn' : '' },
    { l: 'CC', v: state.ccSessions.length },
    { l: 'SYNC', v: ageMin + 'm ago' }
  ];
  chips.forEach(c => {
    const chip = el('div', { class: 'stat-chip' + (c.level ? ' ' + c.level : '') }, [
      el('span', { class: 'label', text: c.l }),
      el('span', { class: 'value', text: String(c.v) })
    ]);
    if (c.l === 'SYNC') chip.insertBefore(dot, chip.firstChild);
    stats.appendChild(chip);
  });
}

function computeLevel(signedRev) {
  // Simple level curve: each level = $25K signed MTD threshold, max display 99
  if (!signedRev) return 1;
  return Math.min(99, Math.max(1, Math.floor(signedRev / 25000) + 1));
}

// ═════ View transitions ═════
function setView(v) {
  $('viewTitle').classList.toggle('active', v === 'TITLE');
  $('viewMap').classList.toggle('active', v === 'MAP');
  $('viewSector').classList.toggle('active', v === 'SECTOR');
  state.view = v;
  renderTopbar();
  renderWizardPop();
}

// ═════ TITLE view ═════
function enterTitle() {
  setView('TITLE');
  $('titlePress').style.display = 'block';
  $('titleLoading').textContent = state.snapshot ? '✓ live data ready' : 'connecting…';
  closeDialogue();
}
function bootPressStart() {
  sfxConfirm();
  $('titlePress').textContent = 'LOADING…';
  $('titlePress').style.animation = 'none';
  setTimeout(() => {
    setView('MAP');
    renderWorld();
