// ═════ Input ═════
// Movement keys are tracked as held state and consumed by the game loop.
// Discrete keys (Enter, Esc, number keys, etc.) fire on the keydown edge.
function setMoveKey(k, down) {
  if (k === 'ArrowUp'    || k === 'w' || k === 'W') { state.input.up = down; return true; }
  if (k === 'ArrowDown'  || k === 's' || k === 'S') { state.input.down = down; return true; }
  if (k === 'ArrowLeft'  || k === 'a' || k === 'A') { state.input.left = down; return true; }
  if (k === 'ArrowRight' || k === 'd' || k === 'D') { state.input.right = down; return true; }
  return false;
}

document.addEventListener('keydown', (e) => {
  // Don't capture input when the user is typing in a real input/textarea
  // (none today, but defensive against future modals with text fields)
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  const k = e.key;

  // Tool overlay open: B/ESC closes, everything else is left to the iframe.
  // Note: keystrokes that happen with the iframe focused don't reach this
  // handler at all (cross-frame isolation), so the CLOSE button + click-on-
  // overlay-edge are the dependable exits when the user is reading the tool.
  if (state.toolOverlay) {
    if (k === 'Escape' || k === 'b' || k === 'B') { e.preventDefault(); closeToolOverlay(); return; }
    return;
  }

  // 8-bit console open: number-pick, arrow-focus, confirm, back, refresh.
  if (state.console) {
    if (k === 'Escape' || k === 'b' || k === 'B') { e.preventDefault(); consoleBack(); return; }
    if (state.console.loading) { e.preventDefault(); return; }
    if (/^[1-4]$/.test(k)) {
      const idx = parseInt(k, 10) - 1;
      if (idx < state.console.options.length) { e.preventDefault(); state.console.focusIdx = idx; refreshConsoleFocus(); confirmConsoleOption(); }
      return;
    }
    if (k === 'ArrowDown' || k === 'ArrowRight' || k === 's' || k === 'S') { e.preventDefault(); moveConsoleFocus(1); return; }
    if (k === 'ArrowUp' || k === 'ArrowLeft' || k === 'w' || k === 'W') { e.preventDefault(); moveConsoleFocus(-1); return; }
    if (k === 'Enter' || k === 'z' || k === 'Z' || k === ' ' || k === 'e' || k === 'E') { e.preventDefault(); confirmConsoleOption(); return; }
    if (k === 'r' || k === 'R') { e.preventDefault(); loadConsoleOptions(state.console.trail[state.console.trail.length - 1]); return; }
    return;
  }

  // Modal open: navigate menu items
  if (state.modal) {
    if (k === 'Escape' || k === 'x' || k === 'X' || k === 'b' || k === 'B') { e.preventDefault(); closeModal(); return; }
    if (k === 'ArrowDown' || k === 'ArrowUp') {
      e.preventDefault();
      const f = state.modal.focusable || [];
      if (!f.length) return;
      state.modal.focusIdx = (state.modal.focusIdx + (k === 'ArrowDown' ? 1 : -1) + f.length) % f.length;
      refreshModalFocus();
      return;
    }
    if (k === 'Enter' || k === 'z' || k === 'Z' || k === ' ') {
      e.preventDefault();
      const node = state.modal.focusable[state.modal.focusIdx];
      if (node && typeof node.click === 'function') node.click();
      return;
    }
    return;
  }

  // Dialogue open: choices navigation OR advance/skip
  if (state.dialogue) {
    if (k === 'Escape' || k === 'x' || k === 'X' || k === 'b' || k === 'B') { e.preventDefault(); closeDialogue(); sfxClose(); return; }
    // Choices visible: arrow keys cycle, Enter selects, number keys jump
    if (state.dialogue.choices && state.dialogue.revealed >= state.dialogue.body.length) {
      if (k === 'ArrowDown' || k === 's' || k === 'S') { e.preventDefault(); moveChoiceFocus(1); return; }
      if (k === 'ArrowUp' || k === 'w' || k === 'W')   { e.preventDefault(); moveChoiceFocus(-1); return; }
      if (/^[1-9]$/.test(k)) {
        const idx = parseInt(k, 10) - 1;
        if (idx < state.dialogue.choices.length) { e.preventDefault(); selectChoice(idx); return; }
      }
      if (k === 'Enter' || k === 'z' || k === 'Z' || k === ' ' || k === 'e' || k === 'E') {
        e.preventDefault(); selectChoice(state.dialogue.choiceIdx); return;
      }
      return;
    }
    if (k === 'Enter' || k === 'z' || k === 'Z' || k === ' ' || k === 'e' || k === 'E') {
      e.preventDefault(); advanceDialogue(); return;
    }
    return;
  }

  // TITLE: any START key boots
  if (state.view === 'TITLE') {
    if (k === 'Enter' || k === 'z' || k === 'Z' || k === ' ') { e.preventDefault(); bootPressStart(); return; }
    return;
  }

  // Quick back-to-ship from any room. B is intuitive ("back") and gives
  // an explicit one-key exit even from a 'terminal portal' or any sector
  // interior - the player never feels trapped.
  if ((k === 'b' || k === 'B') && state.view === 'SECTOR') {
    e.preventDefault(); sfxClose(); exitToOverworld(); return;
  }

  // C opens the current department's 8-bit console from inside a room.
  if ((k === 'c' || k === 'C') && state.view === 'SECTOR' && state.interior) {
    e.preventDefault(); openConsole(state.interior.sec); return;
  }

  // Global hotkeys (work in MAP + SECTOR)
  if (k === 'Escape') { e.preventDefault(); openMainMenu(); return; }
  if (k === 'm' || k === 'M') {
    e.preventDefault(); state.save.muted = !state.save.muted; persistSave();
    $('btnMute').style.opacity = state.save.muted ? '0.4' : '1';
    Music.update();
    if (!state.save.muted) sfxConfirm();
    return;
  }
  if (k === 'q' || k === 'Q') { e.preventDefault(); openQuestModal(); return; }

  // Movement (held)
  if (setMoveKey(k, true)) { e.preventDefault(); return; }

  // Action (interact)
  if (k === ' ' || k === 'Enter' || k === 'z' || k === 'Z' || k === 'e' || k === 'E') {
    e.preventDefault();
    handleAction();
    return;
  }
});

document.addEventListener('keyup', (e) => {
  if (setMoveKey(e.key, false)) e.preventDefault();
});
// Defensive: if window loses focus mid-walk, clear all held keys so the
// player doesn't keep walking after Alt-Tab back.
window.addEventListener('blur', () => {
  state.input.up = state.input.down = state.input.left = state.input.right = false;
});

// On viewport resize the BUILDING_HALF footprint changes (desktop 8x11 vs
// mobile 11x9). If the player's current position is now inside a building's
// collision rect, nudge them out so movement isn't soft-locked. Debounced.
let _resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    if (state.view === 'MAP' && collidesOverworld(state.player.x, state.player.y)) {
      // Walk player out to the nearest open cell — try cardinal nudges first
      const tries = [[0, -4], [0, 4], [-4, 0], [4, 0], [0, -10], [0, 10]];
      for (const [dx, dy] of tries) {
        const nx = clamp(state.player.x + dx, 3, 97);
        const ny = clamp(state.player.y + dy, 5, 95);
        if (!collidesOverworld(nx, ny)) { state.player.x = nx; state.player.y = ny; break; }
      }
      const av = $('playerAvatar');
      if (av) { av.style.left = state.player.x + '%'; av.style.top = state.player.y + '%'; }
    }
  }, 200);
});

// Tool overlay — opens a sector tool's command-center surface inside the
// game as an iframe modal. Closes back to the room with the player intact.
// Lets Mac keep "I'm in the FINANCE room" context while reading the P&L.
function openToolOverlay(tool) {
  closeToolOverlay(); // single overlay at a time
  const wrap = el('div', { class: 'tool-overlay', id: 'toolOverlay', tabindex: '-1',
    onclick: (e) => { if (e.target === wrap) closeToolOverlay(); } });
  const chrome = el('div', { class: 'frame-chrome' });
  const bar = el('div', { class: 'frame-bar' });
  const title = el('div', { class: 'frame-title', text: tool.label });
  const hint = el('div', { class: 'frame-hint', text: '[B] OR [ESC] OR CLOSE TO RETURN' });
  const closeBtn = el('button', { type: 'button', class: 'frame-close', text: 'CLOSE', onclick: closeToolOverlay });
  bar.appendChild(title); bar.appendChild(hint); bar.appendChild(closeBtn);
  // When running off localhost, the local static server doesn't serve
  // /api/* so the iframed page would render empty. Point the iframe at
  // prod so real data lands inside the overlay either way.
  // Append ?arcade=1 so the loaded tool page activates its 8-bit skin +
  // controller focus-nav (arcade-mode.js); opened outside the game it
  // stays its normal Grok palette.
  const sep = tool.href.indexOf('?') >= 0 ? '&' : '?';
  const iframeSrc = (API_BASE ? API_BASE : '') + tool.href + sep + 'arcade=1';
  const frame = el('iframe', { src: iframeSrc, allow: 'fullscreen', loading: 'eager' });
  chrome.appendChild(bar);
  chrome.appendChild(frame);
  wrap.appendChild(chrome);
  document.body.appendChild(wrap);
  state.toolOverlay = { tool };
  // Defer focus to next tick so the iframe's content can claim it naturally;
  // overlay div keeps focus when iframe is empty so ESC works immediately.
  setTimeout(() => { try { wrap.focus(); } catch {} }, 0);
}
function closeToolOverlay() {
  const w = document.getElementById('toolOverlay');
  if (w) w.remove();
  state.toolOverlay = null;
}

// An arcade-mode tool page (in the iframe) posts this when the operator
// presses B inside it, so the controller can close the overlay even when
// the iframe (not the game) had focus.
window.addEventListener('message', (e) => {
  if (e && e.data && e.data.type === 'ryujin:arcade-back' && state.toolOverlay) closeToolOverlay();
});

// ═══════════════════════════════════════════════════════════════
// 8-BIT CONSOLE
// The interactive multiple-choice model (the same /api/options
// backend the Grok-palette interactive mode uses) ported into the
// game as a native CT-window. Walk to a department terminal, hit
// the action button, and the pillar's live top-4 actions render as
// a controller-navigable 8-bit menu. No iframe (so the pad drives
// it), no native window.confirm. Real tool pages still open in the
// iframe overlay (openToolOverlay) for the navigate_to leaves.
// ═══════════════════════════════════════════════════════════════

// Sector id -> /api/options pillar slug. Only the seven registered
// pillars resolve (see lib/archetypeRegistry PILLAR_REGISTRY); ADMIN
// and the materials/Decisions hall have no archetype, so they fall
// back to the iframe panel and never dead-end.
const SECTOR_PILLAR = {
  HQ: 'hq', SALES: 'sales', MARKETING: 'marketing', FINANCE: 'finance',
  PRODUCTION: 'production', SERVICE: 'service', CUSTOMER: 'customer'
};

// Per pillar+state cache. Every /api/options call is a Claude (Sonnet)
// call, so caching keeps the shared ANTHROPIC_API_KEY cost bounded when
// the operator re-opens a console or backs up the trail (see memory
// no-batch-jobs-on-shared-anthropic-key). State-changing actions bust
// their own state key so the re-read is fresh.
const _optionsCache = new Map();      // `${pillar}|${state}` -> { at, data }
const OPTIONS_TTL_MS = 8 * 60 * 1000;

function openConsole(sec) {
  if (!sec) return;
  const pillar = SECTOR_PILLAR[sec.id];
  if (!pillar) {
    // No archetype for this sector: open the live panel instead.
    if (sec.href) { sfxOpen(); openToolOverlay({ label: (sec.id || 'PANEL') + ' PANEL', href: sec.href }); }
    return;
  }
  if (state.console) closeConsole();
  if (state.dialogue) { try { closeDialogue(); } catch (e) {} }
  state.console = {
    sec, pillar, archetype: null,
    trail: ['root'], options: [], focusIdx: 0, loading: true,
    ctx: '', status: '', statusKind: ''
  };
  buildConsoleDom();
  sfxOpen();
  if (window.RyujinPad) RyujinPad.rumble(0.3, 90);
  loadConsoleOptions('root');
}

function closeConsole() {
  const w = $('gameConsole'); if (w) w.remove();
  state.console = null;
  sfxClose();
  updatePadHints();
}

function buildConsoleDom() {
  const old = $('gameConsole'); if (old) old.remove();
  const c = state.console; if (!c) return;
  const w = el('div', { class: 'game-console', id: 'gameConsole',
    role: 'dialog', 'aria-modal': 'true', 'aria-label': (c.sec.npc || c.sec.id) + ' console',
    onclick: (e) => { if (e.target === w) closeConsole(); } });
  const win = el('div', { class: 'gc-window' }, [
    el('div', { class: 'gc-head' }, [
      el('div', { class: 'gc-title', id: 'gcTitle', text: (c.sec.npc || c.sec.id) + ' CONSOLE' }),
      el('div', { class: 'gc-sub', id: 'gcSub', text: (c.pillar || '').toUpperCase() }),
      el('button', { type: 'button', class: 'gc-close', title: 'Back / Close (B)', 'aria-label': 'Close console', text: '✕', onclick: consoleBack })
    ]),
    el('div', { class: 'gc-context', id: 'gcContext', text: 'Loading...' }),
    el('div', { class: 'gc-options', id: 'gcOptions', role: 'listbox', 'aria-label': 'Actions' }),
    el('div', { class: 'gc-status', id: 'gcStatus' }),
    el('div', { class: 'gc-controls' }, [
      el('span', { text: '[1-4]/A DO' }),
      el('span', { text: 'STICK MOVE' }),
      el('span', { text: 'B/ESC BACK' }),
      el('span', { text: 'Y/R REFRESH' })
    ])
  ]);
  w.appendChild(win);
  $('app').appendChild(w);
  updatePadHints();
}

async function loadConsoleOptions(stateId) {
  const c = state.console; if (!c) return;
  c.loading = true; c.options = []; c.focusIdx = 0;
  renderConsole();
  const cacheKey = c.pillar + '|' + stateId;
  const cached = _optionsCache.get(cacheKey);
  if (cached && (Date.now() - cached.at) < OPTIONS_TTL_MS) {
    applyConsoleData(cached.data);
    return;
  }
  try {
    const url = API_BASE + '/api/options?pillar=' + encodeURIComponent(c.pillar) +
      (stateId && stateId !== 'root' ? '&state=' + encodeURIComponent(stateId) : '');
    const r = await fetch(url, { headers: { 'x-tenant-id': TENANT } });
    if (state.console !== c) return;   // console closed/replaced mid-flight
    if (!r.ok) {
      // Unknown pillar (400) or not entitled (403): use the live panel.
      if ((r.status === 400 || r.status === 403) && c.sec.href) {
        closeConsole(); openToolOverlay({ label: (c.sec.id || 'PANEL') + ' PANEL', href: c.sec.href }); return;
      }
      c.loading = false; c.ctx = 'Could not load actions (HTTP ' + r.status + '). Press Y to retry.';
      renderConsole(); return;
    }
    const data = await r.json();
    if (state.console !== c) return;
    _optionsCache.set(cacheKey, { at: Date.now(), data });
    applyConsoleData(data);
  } catch (e) {
    if (state.console !== c) return;
    c.loading = false; c.ctx = 'Network error: ' + e.message + '. Press Y to retry.';
    renderConsole();
  }
}

function applyConsoleData(data) {
  const c = state.console; if (!c) return;
  if (data.archetype && !c.archetype) {
    c.archetype = data.archetype;
    const win = $('gameConsole') && $('gameConsole').querySelector('.gc-window');
    if (win && data.archetype.accent_color) win.style.setProperty('--archetype-color', data.archetype.accent_color);
    const sub = $('gcSub');
    if (sub && data.archetype.name) sub.textContent = data.archetype.name.toUpperCase() + ' / ' + c.pillar.toUpperCase();
  }
  c.ctx = data.context_summary || '';
  c.options = Array.isArray(data.options) ? data.options.slice(0, 4) : [];
  c.focusIdx = 0;
  c.loading = false;
  renderConsole();
}

function renderConsole() {
  const c = state.console; if (!c) return;
  const ctxEl = $('gcContext'), optsEl = $('gcOptions'), stEl = $('gcStatus');
  if (!ctxEl || !optsEl) return;
  if (c.loading) {
    ctxEl.textContent = 'Reading the room...';
    optsEl.textContent = '';
    optsEl.appendChild(el('div', { class: 'gc-loading' }, [
      el('span', { text: 'asking the ' + c.pillar + ' agent' }),
      el('span', { class: 'blip', text: ' ...' })
    ]));
    if (stEl) stEl.textContent = '';
    return;
  }
  ctxEl.textContent = c.ctx || '';
  optsEl.textContent = '';
  if (!c.options.length) {
    optsEl.appendChild(el('div', { class: 'gc-empty', text: 'No actions surfaced. Y to refresh, B to leave.' }));
  } else {
    c.options.forEach((o, i) => {
      optsEl.appendChild(el('div', {
        class: 'gc-opt' + (i === c.focusIdx ? ' focused' : ''),
        role: 'option', 'aria-selected': i === c.focusIdx ? 'true' : 'false',
        'data-kind': o.kind || '', 'data-idx': String(i),
        onclick: () => { c.focusIdx = i; refreshConsoleFocus(); confirmConsoleOption(); }
      }, [
        el('span', { class: 'gc-key', text: String(i + 1) }),
        el('div', { class: 'gc-txt' }, [
          el('div', { class: 'gc-label', text: o.label || ('Option ' + (i + 1)) }),
          o.why ? el('div', { class: 'gc-why', text: o.why }) : null
        ]),
        o.recommended_rank === 1 ? el('span', { class: 'gc-rec', text: '* BEST' }) : null
      ]));
    });
  }
  if (stEl) { stEl.textContent = c.status || ''; stEl.className = 'gc-status' + (c.statusKind ? ' ' + c.statusKind : ''); }
}

function refreshConsoleFocus() {
  const c = state.console; if (!c) return;
  document.querySelectorAll('#gcOptions .gc-opt').forEach((n, i) => {
    const f = i === c.focusIdx;
    n.classList.toggle('focused', f);
    n.setAttribute('aria-selected', f ? 'true' : 'false');
  });
}

function moveConsoleFocus(delta) {
  const c = state.console; if (!c || c.loading || !c.options.length) return;
  c.focusIdx = (c.focusIdx + delta + c.options.length) % c.options.length;
  refreshConsoleFocus();
  sfxAdvance();
}

function consoleBack() {
  const c = state.console; if (!c) return;
  if (c.trail.length > 1) {
    c.trail.pop();
    sfxClose();
    loadConsoleOptions(c.trail[c.trail.length - 1]);
  } else {
    closeConsole();
  }
}

function setConsoleStatus(msg, kind) {
  const c = state.console; if (!c) return;
  c.status = msg || ''; c.statusKind = kind || '';
  const stEl = $('gcStatus');
  if (stEl) { stEl.textContent = c.status; stEl.className = 'gc-status' + (c.statusKind ? ' ' + c.statusKind : ''); }
}

async function confirmConsoleOption() {
  const c = state.console; if (!c || c.loading || c.busy) return;
  const o = c.options[c.focusIdx];
  if (!o) return;
  c.busy = true;   // lock so a double A-press can't double-submit a mutation
  sfxConfirm();
  if (window.RyujinPad) RyujinPad.rumble(0.45, 110);
  try { await executeConsoleOption(o); }
  finally { if (state.console === c) c.busy = false; }
}

async function executeConsoleOption(o) {
  const c = state.console; if (!c) return;
  const k = o.kind, p = o.payload || {};
  // Navigation kinds open the real tool INSIDE the game (iframe overlay)
  // so the operator never leaves the world; the console stays mounted
  // underneath and closing the overlay returns to it.
  if (k === 'navigate_to' || k === 'escalate_to_advanced') {
    if (p.url) openToolOverlay({ label: o.label || c.sec.id, href: p.url });
    else setConsoleStatus('No destination on that action.', 'err');
    return;
  }
  if (k === 'open_estimate') { openToolOverlay({ label: 'ESTIMATE', href: '/admin.html#estimates' + (p.estimate_id ? '/' + encodeURIComponent(p.estimate_id) : '') }); return; }
  if (k === 'open_customer') { openToolOverlay({ label: 'CUSTOMER', href: '/customer-profile.html?id=' + encodeURIComponent(p.customer_id || '') }); return; }
  // Compose surfaces open in a NEW tab so the game stays alive; a
  // window.location.href to mailto:/sms: would unload game.html entirely.
  if (k === 'send_email' && p.to) { window.open(gmailComposeUrl(p.to, p.subject || '', p.body || ''), '_blank', 'noopener,noreferrer'); setConsoleStatus('Opened a compose tab for ' + p.to + '.', 'ok'); return; }
  if (k === 'send_sms' && p.to) { window.open('sms:' + encodeURIComponent(p.to) + (p.body ? '?&body=' + encodeURIComponent(p.body) : ''), '_blank', 'noopener,noreferrer'); setConsoleStatus('Opened SMS to ' + p.to + '.', 'ok'); return; }
  if (k === 'create_quest') {
    setConsoleStatus('Adding quest...', '');
    try {
      const r = await fetch(API_BASE + '/api/quests', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-tenant-id': TENANT },
        body: JSON.stringify({ title: p.title, description: p.description || '', priority: p.priority || 'normal' })
      });
      if (state.console !== c) return;
      const msg = r.ok ? 'Quest added' + (p.title ? ': ' + p.title : '') : 'Quest failed (' + r.status + ')';
      setConsoleStatus(msg, r.ok ? 'ok' : 'err'); toast(msg);   // toast survives the re-fetch that clears the status line
    } catch (e) { if (state.console === c) setConsoleStatus('Network error: ' + e.message, 'err'); }
    pushConsoleState('after_quest_added');
    return;
  }
  if (k === 'run_agent' && p.agent_slug) {
    setConsoleStatus('Running ' + p.agent_slug + '...', '');
    try {
      const tok = localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token');
      const r = await fetch(API_BASE + '/api/agents/' + encodeURIComponent(p.agent_slug), { headers: { 'x-tenant-id': TENANT, ...(tok ? { Authorization: 'Bearer ' + tok } : {}) } });
      if (state.console !== c) return;
      const msg = r.ok ? 'Agent ' + p.agent_slug + ' ran.' : 'Agent failed (' + r.status + ')';
      setConsoleStatus(msg, r.ok ? 'ok' : 'err'); toast(msg);
    } catch (e) { if (state.console === c) setConsoleStatus('Network error: ' + e.message, 'err'); }
    pushConsoleState('after_agent_run');
    return;
  }
  if (k === 'compose_message' && p.to_user) {
    setConsoleStatus('Sending message...', '');
    try {
      const tok = localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token');
      const r = await fetch(API_BASE + '/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-tenant-id': TENANT, ...(tok ? { Authorization: 'Bearer ' + tok } : {}) },
        body: JSON.stringify({ to_user_id: p.to_user, subject: p.subject || ('From the ' + c.pillar + ' console'), body: p.body || '', from_label: p.from_label || (c.pillar + ' console') })
      });
      if (state.console === c) setConsoleStatus(r.ok ? 'Message sent.' : 'Send failed (' + r.status + ')', r.ok ? 'ok' : 'err');
    } catch (e) { if (state.console === c) setConsoleStatus('Send error: ' + e.message, 'err'); }
    return;
  }
  setConsoleStatus('Action "' + k + '" is not wired yet.', 'err');
}

// Drill the console into a new state, busting that state's cache so a
// state-changing action re-reads fresh options from the agent.
function pushConsoleState(stateId) {
  const c = state.console; if (!c) return;
  c.trail.push(stateId);
  // A state-changing action can stale BOTH the new state and the parent
  // (root) options that surfaced it, so drop every cached state for this
  // pillar; backing out then forces a fresh read instead of re-showing
  // the just-completed action as still live.
  Array.from(_optionsCache.keys()).forEach(key => { if (key.indexOf(c.pillar + '|') === 0) _optionsCache.delete(key); });
  loadConsoleOptions(stateId);
}

// ═══════════════════════════════════════════════════════════════
// GAMEPAD ROUTING + HINTS
// Movement (held stick/dpad) is read straight off RyujinPad.dir in
// the update loops. Here we route the discrete button edges to the
// same handlers the keyboard uses, dispatched by the current state.
// ═══════════════════════════════════════════════════════════════

function padAction() {
  // A button: context-confirm. toolOverlay (iframe tool) is the outermost
  // layer; A does nothing there (mouse/CLOSE/B handle it), matching keydown.
  if (state.toolOverlay) return;
  if (state.console) { confirmConsoleOption(); return; }
  if (state.modal) {
    const node = state.modal.focusable[state.modal.focusIdx];
    if (node && typeof node.click === 'function') node.click();
    return;
  }
  if (state.dialogue) {
    if (state.dialogue.choices && state.dialogue.revealed >= state.dialogue.body.length) selectChoice(state.dialogue.choiceIdx);
    else advanceDialogue();
    return;
  }
  if (state.view === 'TITLE') { bootPressStart(); return; }
  handleAction();
}

function padBack() {
  // B button: context-back. toolOverlay first so B closes the iframe tool
  // (the console stays mounted underneath and is returned to), instead of
  // falling through to exitToOverworld and teleporting behind the overlay.
  if (state.toolOverlay) { closeToolOverlay(); return; }
  if (state.console) { consoleBack(); return; }
  if (state.modal) { closeModal(); return; }
  if (state.dialogue) { closeDialogue(); sfxClose(); return; }
  if (state.view === 'SECTOR') { sfxClose(); exitToOverworld(); return; }
  // On the overworld B is a no-op (Start opens the menu).
}

function padNav(delta) {
  // Dpad/stick edge: only meaningful inside a menu-like overlay; on the
  // play views, walking is handled by the held-direction read instead.
  if (state.console) { moveConsoleFocus(delta); return; }
  if (state.modal) {
    const f = state.modal.focusable || [];
    if (!f.length) return;
    state.modal.focusIdx = (state.modal.focusIdx + delta + f.length) % f.length;
    refreshModalFocus();
    return;
  }
  if (state.dialogue && state.dialogue.choices && state.dialogue.revealed >= state.dialogue.body.length) {
    moveChoiceFocus(delta);
    return;
  }
}

function padX() {
  // X button: open the current department console from inside a room.
  if (state.toolOverlay || state.console || state.modal || state.dialogue) return;
  if (state.view === 'SECTOR' && state.interior) openConsole(state.interior.sec);
}

function padY() {
  // Y button: refresh console options, else open the quest log.
  if (state.toolOverlay) return;
  if (state.console) { if (!state.console.loading) loadConsoleOptions(state.console.trail[state.console.trail.length - 1]); return; }
  if (state.modal || state.dialogue || state.view === 'TITLE') return;
  openQuestModal();
}

function padStart() {
  // Start: toggle the pause menu.
  if (state.toolOverlay) return;
  if (state.modal) { closeModal(); return; }
  if (state.console || state.dialogue || state.view === 'TITLE') return;
  openMainMenu();
}

let _gamepadWired = false;
let _padAudioHinted = false;
function wireGamepad() {
  if (_gamepadWired || !window.RyujinPad) return;
  _gamepadWired = true;
  const pad = window.RyujinPad;
  const after = (fn) => () => { fn(); updatePadHints(); };
  pad.on('A', after(padAction));
  pad.on('B', after(padBack));
  pad.on('X', after(padX));
  pad.on('Y', after(padY));
  pad.on('START', after(padStart));
  pad.on('NAV_UP', () => padNav(-1));
  pad.on('NAV_DOWN', () => padNav(1));
  pad.on('NAV_LEFT', () => padNav(-1));
  pad.on('NAV_RIGHT', () => padNav(1));
  pad.onConnect(() => {
    const h = $('gpHud'); if (h) { h.classList.add('connected'); h.setAttribute('aria-hidden', 'false'); }
    // A controller press is not a DOM user-gesture, but if audio was
    // already unlocked by an earlier click this lets the pad-only
    // operator hear music/sfx; harmless no-op otherwise.
    try { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); } catch (e) {}
    // Pad-only operators get no sound until a real gesture unlocks WebAudio;
    // cue them once that one tap/key is needed.
    if ((!audioCtx || audioCtx.state !== 'running') && !_padAudioHinted) { _padAudioHinted = true; toast('Controller ready. Tap the screen or press any key once to enable sound.'); }
    Music.update();
    updatePadHints();
  });
  pad.onDisconnect(() => {
    const h = $('gpHud'); if (h) { h.classList.remove('connected'); h.setAttribute('aria-hidden', 'true'); }
    updatePadHints();
  });
}

// Contextual button-hint bar. Only shown when a pad is connected.
function updatePadHints() {
  const bar = $('gpHints'); if (!bar) return;
  if (!(window.RyujinPad && RyujinPad.isConnected())) { bar.classList.remove('show'); bar.setAttribute('aria-hidden', 'true'); return; }
  let hints;
  if (state.console)      hints = [['A', 'DO'], ['+', 'MOVE'], ['B', 'BACK'], ['Y', 'REFRESH']];
  else if (state.dialogue) hints = [['A', 'NEXT'], ['B', 'CLOSE']];
  else if (state.modal)    hints = [['A', 'PICK'], ['+', 'MOVE'], ['B', 'CLOSE']];
  else if (state.view === 'TITLE')  hints = [['A', 'START']];
  else if (state.view === 'SECTOR') hints = [['+', 'WALK'], ['A', 'USE'], ['X', 'CONSOLE'], ['B', 'SHIP']];
  else                     hints = [['+', 'WALK'], ['A', 'ENTER'], ['ST', 'MENU'], ['Y', 'QUESTS']];
  bar.textContent = '';
  hints.forEach(([key, label]) => {
    bar.appendChild(el('span', {}, [
      el('span', { class: 'k' + (key.length > 1 ? ' k-sq' : ''), text: key }),
      label
    ]));
  });
  bar.classList.add('show'); bar.setAttribute('aria-hidden', 'false');
}

// "Action" button — interact with the closest target in the current view
function handleAction() {
  // The on-screen touch A button calls handleAction directly, so honor the
  // overlay/console layers here too (keyboard already routes around them):
  // tool overlay swallows it; console A confirms the focused option instead
  // of re-entering the room and re-launching the console.
  if (state.toolOverlay) return;
  if (state.console) { confirmConsoleOption(); return; }
  if (state.view === 'MAP') {
    // Building takes priority over the wizard if both are reachable — the
    // wizard parks next to a building so its radius can overlap. Buildings
    // are the primary navigation target; wizard is a bonus interaction.
    if (state.nearBuilding) { sfxConfirm(); enterSector(); return; }
    // Wizard walker within radius? Open the Claude session dialogue —
    // keeps the wizard reachable via keyboard / virtual A button, not
    // only via mouse click on the sprite.
    const wiz = $('wizardWalker');
    if (wiz) {
      const wx = parseFloat(wiz.style.left);
      const wy = parseFloat(wiz.style.top);
      if (Math.hypot(state.player.x - wx, state.player.y - wy) < 8) {
        sfxConfirm(); openWizardDialogue(); return;
      }
    }
  } else if (state.view === 'SECTOR') {
    const intr = state.interior;
    if (!intr) return;
    if (state.nearTarget === 'guest') { sfxConfirm(); if (state.nearGuest) openGuestDialog(state.nearGuest.npc); }
    else if (state.nearTarget === 'npc') { sfxConfirm(); talkToNpc(intr.sec); }
    else if (state.nearTarget === 'terminal') { openConsole(intr.sec); }
    else if (state.nearTarget === 'tool') { sfxOpen(); if (state.nearTool && state.nearTool.href) openToolOverlay(state.nearTool); }
    else if (state.nearTarget === 'door') { sfxClose(); exitToOverworld(); }
  }
}

// Click handlers for global buttons + touch D-pad wiring
document.addEventListener('DOMContentLoaded', () => {
  $('btnMute').addEventListener('click', () => {
    state.save.muted = !state.save.muted; persistSave();
    $('btnMute').style.opacity = state.save.muted ? '0.4' : '1';
    Music.update();
    if (!state.save.muted) sfxConfirm();
  });
  $('btnPause').addEventListener('click', () => openMainMenu());
  $('viewTitle').addEventListener('click', () => { if (state.view === 'TITLE') bootPressStart(); });
  // Dialogue click:
  //   - With choices visible: only skip the typewriter; never auto-pick a
  //     choice from a body click (the choice list is the explicit menu).
  //   - Without choices (single-line dialogues like the Claude wizard popup):
  //     click advances/closes the dialogue, same as Enter.
  $('dialogue').addEventListener('click', (e) => {
    if (e.target.closest('.dialogue-choice')) return;
    if (!state.dialogue) return;
    if (state.dialogue.choices) {
      if (state.dialogue.revealed < state.dialogue.body.length) advanceDialogue();
    } else {
      advanceDialogue();
    }
  });
  $('modalBack').addEventListener('click', (e) => { if (e.target.id === 'modalBack') closeModal(); });
  $('btnMute').style.opacity = state.save.muted ? '0.4' : '1';

  // Virtual D-pad + action button visibility is owned by setView (shown on
  // the MAP/SECTOR play views for touch devices, hidden elsewhere), so it is
  // never stranded on the title screen. Nothing to toggle here at setup.

  // D-pad: held while pressed; works on both mouse + touch
  document.querySelectorAll('.vp-btn').forEach(btn => {
    const dir = btn.getAttribute('data-dir');
    const set = (down) => {
      if (dir === 'up')    state.input.up = down;
      if (dir === 'down')  state.input.down = down;
      if (dir === 'left')  state.input.left = down;
      if (dir === 'right') state.input.right = down;
      btn.classList.toggle('held', down);
    };
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); set(true); }, { passive: false });
    btn.addEventListener('touchend',   (e) => { e.preventDefault(); set(false); });
    btn.addEventListener('touchcancel',(e) => { e.preventDefault(); set(false); });
    btn.addEventListener('mousedown',  (e) => { e.preventDefault(); set(true); });
    btn.addEventListener('mouseup',    () => set(false));
    btn.addEventListener('mouseleave', () => set(false));
  });

  // Action (A) button — single-tap action
  const actBtn = $('vpAction');
  const fireAction = (e) => { e.preventDefault(); actBtn.classList.add('held'); handleAction(); setTimeout(() => actBtn.classList.remove('held'), 120); };
  actBtn.addEventListener('touchstart', fireAction, { passive: false });
  actBtn.addEventListener('mousedown',  fireAction);

  // Sector HUD's persistent "Back to ship" button. Guards against double
  // exit if the player is already on the overworld (no-op if no interior).
  const exitBtn = $('hudExitBtn');
  if (exitBtn) {
    exitBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (state.view !== 'SECTOR' || !state.interior) return;
      sfxClose(); exitToOverworld();
    });
  }

  // Gamepad: wire button routing + the connected HUD / hint bar.
  wireGamepad();
  updatePadHints();

  // Preload the player's walk (frame B) sprites so the first step does
  // not flash the rest frame while the step sprite decodes.
  ['mack-step', 'mack-back-step', 'mack-side-step'].forEach(n => {
    const im = new Image(); im.src = '/assets/rpg/sprites/crew/' + n + '.webp';
  });
});

// ═════ Boot ═════
async function boot() {
  // Defensive clamp: if state.focusedSector ever picks up an out-of-range
  // value from a future save migration or URL hash, snap it to a real index.
  state.focusedSector = Math.max(0, Math.min(SECTORS.length - 1, state.focusedSector | 0));

  // Rehydrate player position from save (default = (50, 60) — middle of the
  // open band, the visual center of the hub). Migrate legacy saves that
  // froze the old (50, 32) default so existing users land centered too.
  if (state.save.player_x === 50 && state.save.player_y === 32) {
    state.save.player_x = 50; state.save.player_y = 60; persistSave();
  }
  state.player.x = clamp(state.save.player_x, 3, 97);
  state.player.y = clamp(state.save.player_y, 5, 95);
  if (collidesOverworld(state.player.x, state.player.y)) { state.player.x = 50; state.player.y = 60; }

  // Warm sector backdrops AFTER boot settles, not during it. The old
  // synchronous version kicked off all 8 WebP fetch+decodes up front and
  // stalled cold-start on integrated GPUs. Rooms already apply their own bg
  // lazily on entry (see renderInterior), so this is a pure prefetch that is
  // safe to defer to idle time and decode off the main thread. Worst case if a
  // room is entered before warmup runs is the same single-image load it does
  // today. requestIdleCallback falls back to a timeout where unsupported.
  const warmSectorBgs = () => {
    SECTORS.forEach(s => { const img = new Image(); img.decoding = 'async'; img.src = s.bg; });
  };
  (window.requestIdleCallback || ((fn) => setTimeout(fn, 1200)))(warmSectorBgs);

  // Begin parallel data fetch
  Promise.allSettled([fetchSnapshot(), fetchMe(), fetchCcSessions()]);
  // Update title-screen status after data lands
  setTimeout(() => { if ($('titleLoading')) $('titleLoading').textContent = state.snapshot ? '✓ live data ready · press start' : (state.snapshotErr ? '⚠ offline mode · press start' : 'connecting…'); }, 2500);
  // Refresh loops. IDs captured in state._intervals so a future teardown
  // path (or BFCache restoration) can clear them. Watchdog alert toast is
  // fired by fetchSnapshot on first successful load so it does not race
  // the cold-start fetch latency.
  state._intervals.push(setInterval(fetchSnapshot, SNAPSHOT_REFRESH_MS));
  state._intervals.push(setInterval(fetchCcSessions, CC_REFRESH_MS));
}
// On BFCache restore (back/forward navigation), clear stale intervals and
// re-boot so we don't double-poll.
window.addEventListener('pageshow', (e) => {
  if (e.persisted) {
    state._intervals.forEach(id => clearInterval(id));
    state._intervals = [];
    stopGameLoop();
    boot();
    // If user is mid-walk when navigating back, restart the loop. The
    // loop boots itself on PRESS START otherwise.
    if (state.view !== 'TITLE') startGameLoop();
  }
});
// ═════ Sprite reactions (subscribed to snapshot-delta events) ═════
// One handler per event type. Each picks the right surface to react on
// based on current view: floating pop above the NPC if you're inside the
// sector, a pulse on the building tile if you're on the overworld, plus
// a topbar toast either way so the moment is never silent.
function spawnFloatingPop(text, color, sectorId) {
  // Only render the pop above the NPC when the player is actually inside
  // the matching sector. Otherwise a FINANCE event would spawn over the
  // SALES or ADMIN NPC the player happens to be standing in front of.
  if (state.view !== 'SECTOR') return;
  const intr = state.interior;
  if (!intr || (sectorId && intr.sec.id !== sectorId)) return;
  const room = document.getElementById('sectorRoom');
  if (!room) return;
  // Anchor at the NPC's % position (not a child of #npcSprite) so face-left
  // scaleX(-1) on the sprite doesn't mirror our pop text.
  const pop = document.createElement('div');
  pop.className = 'sprite-pop';
  pop.textContent = text;
  pop.style.color = color || '#fde047';
  pop.style.left = intr.npcX + '%';
  pop.style.top  = (intr.npcY - 8) + '%';
  room.appendChild(pop);
  setTimeout(() => pop.remove(), 1800);
}
function pulseBuilding(sectorId, color) {
  if (state.view !== 'MAP') return;
  const tile = document.querySelector('.map-building[data-sector="' + sectorId + '"]');
  if (!tile) return;
  tile.style.setProperty('--pulse-color', color || '#fde047');
  tile.classList.add('react-pulse');
  setTimeout(() => tile.classList.remove('react-pulse'), 1600);
}
on('revenue.signed.up', (ev) => {
  spawnFloatingPop('+' + fmt$(ev.delta), '#fde047', ev.sector);
  pulseBuilding('FINANCE', '#fde047');
  toast('Revenue signed: +' + fmt$(ev.delta), 'gold');
  sfxConfirm();
});
on('pipeline.deal.new', (ev) => {
  spawnFloatingPop('+' + ev.delta + ' DEAL', '#ec4899', ev.sector);
  pulseBuilding('SALES', '#ec4899');
  toast('New deal in pipeline (' + ev.to + ' open)', 'pink');
  sfxConfirm();
});
on('tickets.overdue.up', (ev) => {
  spawnFloatingPop('+' + ev.delta + ' OVERDUE', '#ef4444', ev.sector);
  pulseBuilding('PRODUCTION', '#ef4444');
  toast('Overdue tickets rising: ' + ev.to, 'red');
  sfxBoss();
});

boot();
</script>
