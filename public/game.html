}

// ═══════════════════════════════════════════════════════════════
// OVERWORLD (walkable MAP) — buildings positioned with %-coords,
// player avatar drifts continuously, AABB collision triggers the
// near-building prompt; SPACE/Action enters the sector interior.
// ═══════════════════════════════════════════════════════════════

// Live-update building stat lines + alert classes when snapshot refreshes,
// without re-rendering the whole world (so we don't trample player position
// or interact prompt mid-walk).
function refreshBuildingStats() {
  document.querySelectorAll('.map-building').forEach(node => {
    const id = node.getAttribute('data-sector');
    const sec = SECTORS.find(s => s.id === id);
    if (!sec) return;
    const lvl = sectorAlertLevel(id);
    node.classList.toggle('alert', lvl === 'alert');
    node.classList.toggle('warn',  lvl === 'warn');
    const stat = node.querySelector('.b-stat');
    if (stat) {
      stat.textContent = sectorHeadline(id);
      stat.classList.toggle('alert', lvl === 'alert');
      stat.classList.toggle('warn',  lvl === 'warn');
    }
    // Pip refresh
    node.querySelectorAll('.b-pip').forEach(n => n.remove());
    const overdueCount = (state.snapshot && id === 'PRODUCTION') ? (state.snapshot.tickets && state.snapshot.tickets.overdueCount) : 0;
    if (lvl === 'alert' && overdueCount > 0) {
      node.appendChild(el('div', { class: 'b-pip alert', text: String(overdueCount) }));
    } else if (lvl === 'warn') {
      node.appendChild(el('div', { class: 'b-pip warn', text: '!' }));
    }
  });
}

function refreshBuildingWizardPips() {
  document.querySelectorAll('.map-building').forEach(node => {
    const id = node.getAttribute('data-sector');
    const wizardsHere = state.ccSessions.filter(c => (c.current_sector || '').toUpperCase() === id);
    node.querySelectorAll('.wizard-pip').forEach(n => n.remove());
    if (wizardsHere.length) {
      node.appendChild(el('div', { class: 'wizard-pip', text: String(wizardsHere.length), title: wizardsHere.map(w => w.user_label || 'Claude').join(', ') }));
    }
  });
  renderWizardWalker();
}

// Wandering wizard sprite on the overworld — appears next to whichever
// building has the most-recent CC session. Tappable / walkable-up-to.
function renderWizardWalker() {
  if (state.view !== 'MAP') return;
  const world = $('mapWorld');
  if (!world) return;
  const existing = $('wizardWalker');
  if (!state.ccSessions.length) { if (existing) existing.remove(); return; }
  // Pick the freshest session that has a current_sector
  const sess = state.ccSessions
    .filter(c => c.current_sector)
    .sort((a, b) => (Date.parse(b.last_activity_at || 0) || 0) - (Date.parse(a.last_activity_at || 0) || 0))[0];
  if (!sess) { if (existing) existing.remove(); return; }
  const sec = SECTORS.find(s => s.id === (sess.current_sector || '').toUpperCase());
  if (!sec) { if (existing) existing.remove(); return; }
  // Park the wizard just outside the building's south-east corner
  const f = getBuildingFoot(sec);
  const wx = clamp(sec.x + f.hw + 2.5, 5, 95);
  const wy = clamp(sec.y, 5, 95);
  const label = sess.user_label || 'Claude';
  const count = state.ccSessions.length;
  if (existing) {
    existing.style.left = wx + '%';
    existing.style.top  = wy + '%';
    existing.title = `Talk to Claude · ${count} active`;
    const badge = existing.querySelector('.badge');
    if (badge) badge.textContent = String(count);
  } else {
    const wiz = el('div', {
      class: 'wizard-walker',
      id: 'wizardWalker',
      title: `Talk to Claude · ${count} active`,
      style: { left: wx + '%', top: wy + '%', backgroundImage: `url('/assets/rpg/sprites/crew/claude-wizard.webp')` },
      onclick: () => { sfxConfirm(); openWizardDialogue(); }
    }, [
      el('div', { class: 'badge', text: String(count) })
    ]);
    world.appendChild(wiz);
  }
}

// Brief black flash overlay for entering/exiting sectors. The CSS transition
// is 140ms; we hold opacity for ~50ms in the middle of that for a clean
// "fade-out / swap / fade-in" feel. Total ~280ms — short enough to be snappy.
function viewFlash(swapFn) {
  const f = $('viewFlash');
  if (!f) { swapFn(); return; }
  f.classList.add('on');
  setTimeout(() => {
    try { swapFn(); } finally {
      setTimeout(() => f.classList.remove('on'), 50);
    }
  }, 140);
}

function refreshInteriorHud() {
  const intr = state.interior; if (!intr) return;
  const t = document.getElementById('hudSecTicker');
  if (t) t.textContent = sectorHeadline(intr.sec.id) || '--';
}

// ═════ Wandering crew NPCs (constant motion = Pixel Agents feel) ═════
// Each sector gets 1-3 crew members who pace random targets inside the
// room. Slow speed + occasional pause keeps it ambient, not hectic.
const WANDERER_SPEED_PCT_PER_MS = 0.012;
function pickWanderTarget() {
  // Keep wanderers in the open band between NPC (top) and door (bottom),
  // avoiding the terminal corner so they don't visually overlap the desk.
  const tx = 18 + Math.random() * 64;   // 18..82
  const ty = 50 + Math.random() * 28;   // 50..78
  return { tx, ty };
}
function initWanderers(sec) {
  const roster = CREW_PER_SECTOR[sec.id] || [];
  return roster.map((id, i) => {
    const c = CREW_BY_ID[id]; if (!c) return null;
    const spawn = pickWanderTarget();
    return {
      id, name: c.name, img: c.img,
      x: spawn.tx, y: spawn.ty,
      tx: spawn.tx, ty: spawn.ty,
      pauseUntil: performance.now() + 300 + i * 200,
      facingDir: 'down',
      hue: (i * 137) % 360   // hue-rotate spread, Pixel Agents palette trick
    };
  }).filter(Boolean);
}
function tickWanderers(dtMs) {
  const intr = state.interior; if (!intr || !intr.wanderers) return;
  const now = performance.now();
  intr.wanderers.forEach(w => {
    if (now < w.pauseUntil) return;
    const dx = w.tx - w.x, dy = w.ty - w.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 0.5) {
      // Arrived — pause briefly, then pick a new target
      const next = pickWanderTarget();
      w.tx = next.tx; w.ty = next.ty;
      w.pauseUntil = now + 600 + Math.random() * 1200;
      return;
    }
    const step = WANDERER_SPEED_PCT_PER_MS * dtMs;
    const nx = w.x + (dx / dist) * step;
    const ny = w.y + (dy / dist) * step;
    w.x = nx; w.y = ny;
    const absx = Math.abs(dx), absy = Math.abs(dy);
    w.facingDir = (absy >= absx) ? (dy < 0 ? 'up' : 'down') : (dx < 0 ? 'left' : 'right');
    const node = document.getElementById('wander-' + w.id);
    if (node) {
      node.style.left = w.x + '%';
      node.style.top  = w.y + '%';
      node.classList.toggle('face-left', w.facingDir === 'left');
    }
  });
}
function renderWanderers(room) {
  const intr = state.interior; if (!intr) return;
  intr.wanderers = initWanderers(intr.sec);
  intr.wanderers.forEach(w => {
    const node = el('div', {
      class: 'crew-wanderer',
      id: 'wander-' + w.id,
      title: w.name,
      style: {
        left: w.x + '%',
        top:  w.y + '%',
        backgroundImage: `url('${w.img}')`,
        /* No hue-rotate now that each crew has distinct character art -
           shifting hues would mangle the per-crew colors (Cat's pink,
           AJ's green, etc.) which are already part of the sprite. */
      }
    }, [
      el('div', { class: 'wander-nameplate', text: w.name })
    ]);
    room.appendChild(node);
  });
}

function renderWorld() {
  const world = $('mapWorld');
  world.textContent = '';

  SECTORS.forEach((sec, i) => {
    const lvl = sectorAlertLevel(sec.id);
    const overdueCount = (state.snapshot && sec.id === 'PRODUCTION') ? (state.snapshot.tickets && state.snapshot.tickets.overdueCount) : 0;
    const tile = el('div', {
      class: 'map-building' + (sec.tall ? ' tall' : '') + (lvl === 'alert' ? ' alert' : lvl === 'warn' ? ' warn' : ''),
      'data-sector': sec.id,
      style: { left: sec.x + '%', top: sec.y + '%', backgroundImage: `url('${sec.sprite}')` },
      onclick: () => { state.focusedSector = i; sfxStep(); enterSector(); }
    }, [
      el('div', { class: 'b-label', text: sec.id })
    ]);

    // Alert/warn pip (overdue count, etc.)
    if (lvl === 'alert' && overdueCount > 0) {
      tile.appendChild(el('div', { class: 'b-pip alert', text: String(overdueCount) }));
    } else if (lvl === 'warn') {
      tile.appendChild(el('div', { class: 'b-pip warn', text: '!' }));
    }

    // CC wizards stationed here
    const wizardsHere = state.ccSessions.filter(c => (c.current_sector || '').toUpperCase() === sec.id);
    if (wizardsHere.length) {
      tile.appendChild(el('div', { class: 'wizard-pip', text: String(wizardsHere.length), title: wizardsHere.map(w => w.user_label || 'Claude').join(', ') }));
    }

    world.appendChild(tile);
  });

  // Player sprite — pixel-art div with backgroundImage flipped by facing class
  const av = el('div', {
    class: 'player-avatar face-' + (state.player.facingDir || 'down'),
    id: 'playerAvatar',
    style: { left: state.player.x + '%', top: state.player.y + '%' }
  });
  world.appendChild(av);

  // Re-render the wandering wizard now that the world container is fresh
  renderWizardWalker();
}

// Tile-snap overworld movement. Runs from the game loop; if no step is
// in flight and a direction key is held, queue one. Once the step's
// CSS transition completes (STEP_MS), snap and let the next tick queue
// the follow-up step. Buildings are AABB-rejected at queue time.
function updateOverworld(dtMs) {
  const p = state.player;
  // Step in progress? Wait for it to finish before queuing another.
  if (p.stepEndsAt && performance.now() < p.stepEndsAt) return;
  if (p.stepEndsAt) {
    // Tween just finished — snap to target and clear step state.
    p.x = p.targetX; p.y = p.targetY;
    p.stepEndsAt = 0;
    schedulePlayerSave();
    refreshNearBuilding();
  }
  // Direction priority: vertical > horizontal so diagonal hold prefers
  // up/down. Classic FF feel — also avoids querying diagonal-collision.
  let dir = null;
  if (state.input.up)         dir = 'up';
  else if (state.input.down)  dir = 'down';
  else if (state.input.left)  dir = 'left';
  else if (state.input.right) dir = 'right';
  if (!dir) {
    const av = $('playerAvatar'); if (av) { av.classList.remove('moving'); av.classList.remove('step-b'); }
    refreshNearBuilding();
    return;
  }
  // Compute target tile
  let dx = 0, dy = 0;
  if (dir === 'up')    dy = -TILE_H_PCT;
  if (dir === 'down')  dy =  TILE_H_PCT;
  if (dir === 'left')  dx = -TILE_W_PCT;
  if (dir === 'right') dx =  TILE_W_PCT;
  const tx = clamp(p.x + dx, 3, 97);
  const ty = clamp(p.y + dy, 5, 95);
  // Reject if target is inside a building footprint (face the dir anyway
  // so the player visually turns to look at the wall even when blocked).
  p.facingDir = dir;
  applyFacing();
  if (collidesOverworld(tx, ty)) {
    refreshNearBuilding();
    return;
  }
  // Queue the step
  p.targetX = tx;
  p.targetY = ty;
  p.stepEndsAt = performance.now() + STEP_MS;
  p.stepParity = !p.stepParity;
  const av = $('playerAvatar');
  if (av) {
    av.style.left = tx + '%';
    av.style.top  = ty + '%';
    av.classList.add('moving');
    av.classList.toggle('step-b', p.stepParity);
  }
  sfxFootstep();
}

function applyFacing() {
  const av = $('playerAvatar'); if (!av) return;
  av.classList.remove('face-up', 'face-down', 'face-left', 'face-right');
  av.classList.add('face-' + (state.player.facingDir || 'down'));
}

// Building-foot collision: target tile inside the bottom-anchored AABB
// of any building? Each sector has its own footprint (tall ADMIN bigger).
function collidesOverworld(x, y) {
  for (const sec of SECTORS) {
    const f = getBuildingFoot(sec);
    if (x > sec.x - f.hw && x < sec.x + f.hw && y > sec.y - f.h && y < sec.y) return true;
  }
  return false;
}

function refreshNearBuilding() {
  const p = state.player;
  let near = null;
  for (let i = 0; i < SECTORS.length; i++) {
    const sec = SECTORS[i];
    const f = getBuildingFoot(sec);
    // "Near" is the band just outside the footprint, biased toward the
    // bottom (the door tile) so player approaches the building from the
    // front rather than around the sides.
    const insideX = p.x > sec.x - f.hw - INTERACT_PAD.w && p.x < sec.x + f.hw + INTERACT_PAD.w;
    const nearDoor = p.y >= sec.y && p.y < sec.y + INTERACT_PAD.h + 2;
    if (insideX && nearDoor) { near = { sec, index: i }; break; }
  }
  const prev = state.nearBuilding;
  state.nearBuilding = near;
  if (near && (!prev || prev.sec.id !== near.sec.id)) {
    document.querySelectorAll('.map-building').forEach(el => el.classList.toggle('near', el.getAttribute('data-sector') === near.sec.id));
    state.focusedSector = near.index;
    showInteractPrompt('PRESS [SPACE] TO ENTER', near.sec.x, near.sec.y - 2);
  } else if (!near && prev) {
    document.querySelectorAll('.map-building').forEach(el => el.classList.remove('near'));
    hideInteractPrompt();
  }
}

function showInteractPrompt(text, xPct, yPct) {
  let p = $('interactPrompt');
  if (!p) {
    p = el('div', { class: 'interact-prompt', id: 'interactPrompt' });
    // Append to whichever view is active (map-world or sector-room)
    const host = state.view === 'MAP' ? $('mapWorld') : $('sectorRoom');
    host.appendChild(p);
  } else if (p.parentElement.id !== (state.view === 'MAP' ? 'mapWorld' : 'sectorRoom')) {
    // Move prompt between hosts if view changed
    p.remove();
    const host = state.view === 'MAP' ? $('mapWorld') : $('sectorRoom');
    host.appendChild(p);
  }
  p.textContent = text;
  p.style.left = xPct + '%';
  p.style.top  = yPct + '%';
}
function hideInteractPrompt() {
  const p = $('interactPrompt'); if (p) p.remove();
}

// ═══════════════════════════════════════════════════════════════
// SECTOR INTERIOR (walkable room) — sector scene WebP as bg, NPC
// at fixed position, terminal in corner, door at bottom. Player
// walks around; SPACE near NPC/terminal/door triggers respective
// interaction.
// ═══════════════════════════════════════════════════════════════

function enterSector() {
  const sec = SECTORS[state.focusedSector];
  if (!sec) return;
  sfxOpen();
  // Any in-flight overworld step is abandoned; snap to current position
  // so exit doesn't teleport the player to a stale tile target.
  state.player.stepEndsAt = 0;
  state.player.targetX = state.player.x;
  state.player.targetY = state.player.y;
  // Remember overworld position so we can spawn there on exit
  state.worldReturn = { x: state.player.x, y: state.player.y };
  state.interior = {
    sec,
    playerX: 50,                  // spawn at door
    playerY: 82,
    facing: -Math.PI / 2,         // facing up toward NPC
    npcX: 50, npcY: 38,
    termX: 14, termY: 28,
    lastEnter: Date.now()
  };
  if (!state.save.visited_sectors.includes(sec.id)) {
    state.save.visited_sectors.push(sec.id);
    persistSave();
  }
  state.save.last_visit_at = new Date().toISOString();
  persistSave();
  hideInteractPrompt();
  // Flash → swap to SECTOR view → render interior — feels like walking through a door
  viewFlash(() => {
    setView('SECTOR');
    renderInterior();
  });
}

function renderInterior() {
  const intr = state.interior;
  if (!intr) return;
  const sec = intr.sec;
  const room = $('sectorRoom');
  $('sectorBg').style.backgroundImage = `url('${sec.bg}')`;

  // Update HUD (top-left chrome)
  $('hudSecId').textContent = sec.id;
  $('hudSecNpc').textContent = sec.npc;
  $('hudSecRole').textContent = sec.role;
  $('sectorHud').style.borderColor = NPC_ACCENT[sec.npc] || 'var(--cyan)';
  $('hudSecNpc').style.color = NPC_ACCENT[sec.npc] || 'var(--gold)';
  refreshInteriorHud();

  // Tear down old interior interactables (re-rendered each enter)
  room.querySelectorAll('.npc-sprite, .terminal-zone, .door-zone, .player-avatar, .interact-prompt, .crew-wanderer, .sprite-pop').forEach(n => n.remove());

  // Spawn the wandering crew so they fill the room ambiently. z-index in
  // CSS keeps them below the player avatar even on overlap.
  renderWanderers(room);

  // NPC / comms-terminal at the back of the room. Field-ops sectors
  // (Production, Service, Materials) render a glowing comms terminal
  // instead of a character sprite - those crew members are out on
  // jobs, you reach them via SMS or email through the terminal.
  const accent = NPC_ACCENT[sec.npc] || '#fde047';
  const isField = FIELD_SECTORS.has(sec.id);
  const npc = el('div', {
    class: 'npc-sprite' + (isField ? ' comms-terminal' : ''),
    id: 'npcSprite',
    // Skip inline backgroundImage when isField so the .comms-terminal CSS
    // gradient/scanline isn't overridden by higher-specificity inline style.
    style: Object.assign(
      { left: intr.npcX + '%', top: intr.npcY + '%', borderColor: accent, boxShadow: `0 0 24px ${accent}55` },
      isField ? {} : { backgroundImage: `url('${NPC_PORTRAIT(sec.npc)}')` }
    ),
    onclick: () => {
      if (state.dialogue) return;
      sfxConfirm();
      if (isField) openCommsDialog(sec); else openNpcDialogueTree(sec);
    }
  }, [
    el('div', { class: 'npc-nameplate', text: isField ? ('MESSAGE ' + sec.npc) : sec.npc, style: { color: accent, borderColor: accent } })
  ]);
  room.appendChild(npc);

  // Terminal (computer / desk) — opens the stats modal
  const term = el('div', {
    class: 'terminal-zone',
    id: 'termZone',
    style: { left: intr.termX + '%', top: intr.termY + '%' },
    onclick: () => { sfxOpen(); openSectorTerminalModal(sec); }
  });
  room.appendChild(term);

  // Door zone (bottom-center) — walking into it returns to overworld
  const door = el('div', { class: 'door-zone', id: 'doorZone' });
  room.appendChild(door);

  // Player avatar at spawn — same pixel sprite as overworld, facing up
  // toward the NPC since spawn is at the bottom door.
  const av = el('div', {
    class: 'player-avatar face-up',
    id: 'playerAvatar',
    style: { left: intr.playerX + '%', top: intr.playerY + '%' }
  });
  room.appendChild(av);

  // Auto-talk on first entry per sector. Field sectors skip the auto-talk
  // since there's no one in the room - the player can walk up to the comms
  // terminal and message the field crew when they want to, not on entry.
  if (state._autoTalkTimer) { clearTimeout(state._autoTalkTimer); state._autoTalkTimer = null; }
  if (!state.save.spoken_to.includes(sec.id)) {
    state.save.spoken_to.push(sec.id);
    persistSave();
    if (!FIELD_SECTORS.has(sec.id)) {
      state._autoTalkTimer = setTimeout(() => { state._autoTalkTimer = null; openNpcDialogueTree(sec); }, 450);
    }
  }
}

function updateInterior(dtMs) {
  const intr = state.interior; if (!intr) return;
  tickWanderers(dtMs);
  let vx = 0, vy = 0;
  if (state.input.left)  vx -= 1;
  if (state.input.right) vx += 1;
  if (state.input.up)    vy -= 1;
  if (state.input.down)  vy += 1;

  if (vx !== 0 || vy !== 0) {
    const len = Math.hypot(vx, vy);
    vx /= len; vy /= len;
    intr.facing = Math.atan2(vy, vx);
    // Pick a cardinal facing for the sprite (the one closest to motion angle)
    const absx = Math.abs(vx), absy = Math.abs(vy);
    intr.facingDir = (absy >= absx) ? (vy < 0 ? 'up' : 'down') : (vx < 0 ? 'left' : 'right');
    const step = INTERIOR_SPEED_PCT_PER_MS * dtMs;
    intr.playerX = clamp(intr.playerX + vx * step, 4, 96);
    intr.playerY = clamp(intr.playerY + vy * step, 4, 98);
    const av = $('playerAvatar');
    if (av) {
      av.style.left = intr.playerX + '%';
      av.style.top  = intr.playerY + '%';
      av.classList.remove('face-up', 'face-down', 'face-left', 'face-right');
      av.classList.add('face-' + intr.facingDir, 'moving');
    }
    maybeFootstep(dtMs);
    // Walking into the door zone exits to overworld
    if (intr.playerY > DOOR_ZONE_TOP + 3) {
      exitToOverworld();
      return;
    }
  } else {
    const av = $('playerAvatar'); if (av) av.classList.remove('moving');
  }

  // Recompute near-target each tick
  const dn = Math.hypot(intr.playerX - intr.npcX, intr.playerY - intr.npcY);
  const dt = Math.hypot(intr.playerX - intr.termX, intr.playerY - intr.termY);
  const dd = intr.playerY - DOOR_ZONE_TOP;

  let target = null, label = '', tx = 0, ty = 0;
  if (dn < NPC_INTERACT_R) {
    target = 'npc';
    label = FIELD_SECTORS.has(intr.sec.id)
      ? `PRESS [SPACE] TO MESSAGE ${intr.sec.npc}`
      : `PRESS [SPACE] TO TALK · ${intr.sec.npc}`;
    tx = intr.npcX; ty = intr.npcY - 11;
  }
  else if (dt < TERM_INTERACT_R) { target = 'terminal'; label = 'PRESS [SPACE] TO READ TERMINAL'; tx = intr.termX; ty = intr.termY - 8; }
  else if (dd > -2) { target = 'door'; label = 'PRESS [SPACE] OR WALK DOWN TO EXIT'; tx = 50; ty = DOOR_ZONE_TOP - 4; }

  if (target !== state.nearTarget) {
    state.nearTarget = target;
    if (target) showInteractPrompt(label, tx, ty); else hideInteractPrompt();
    document.querySelectorAll('.npc-sprite').forEach(n => n.classList.toggle('near', target === 'npc'));
  }
  // NPC mirrors to face the player when they pass on the left/right side.
  // Small but recognizable touch — the god turns to greet you.
  const npc = $('npcSprite');
  if (npc) {
    const flip = intr.playerX < intr.npcX;
    npc.style.setProperty('--bg-flip', flip ? '-1' : '1');
    // We can't `scaleX(-1)` because the npc-sprite uses translate(-50%,-50%)
    // and its keyframe animation. Instead, mirror via background-position
    // by toggling a data attribute the CSS could read; or scale the inner.
    // Simpler: flip the entire transform by adding/removing a class.
    npc.classList.toggle('face-left', flip);
  }
}

function exitToOverworld() {
  state.interior = null;
  state.nearTarget = null;
  setView('MAP');
  // Prefer the exact pre-entry position so the player walks out exactly
  // where they walked in. Fall back to a collision-safe spawn next to the
  // building if worldReturn would itself collide (defensive — shouldn't
  // happen because worldReturn was a walkable cell, but resize between
  // enter and exit could shift the collision footprint).
  const sec = SECTORS[state.focusedSector];
  const f = sec ? getBuildingFoot(sec) : { hw: 6.5, h: 13 };
  const ret = state.worldReturn || {};
  let nx = (typeof ret.x === 'number') ? ret.x : (sec ? sec.x : 50);
  let ny = (typeof ret.y === 'number') ? ret.y : (sec ? sec.y + 3 : 60);
  if (collidesOverworld(nx, ny) && sec) {
    // Pick the first cardinal direction outside the building that's clear.
    // Buildings are bottom-anchored so the natural exit is just below sec.y.
    const offsets = [
      { dx: 0,           dy:  4 },          // just below door
      { dx: 0,           dy: -f.h - 4 },    // above (clear of building top)
      { dx:  f.hw + 4,   dy: 0 },           // right
      { dx: -f.hw - 4,   dy: 0 },           // left
    ];
    for (const o of offsets) {
      const cx = clamp(sec.x + o.dx, 5, 95);
      const cy = clamp(sec.y + o.dy, 7, 93);
      if (!collidesOverworld(cx, cy)) { nx = cx; ny = cy; break; }
    }
  }
  state.player.x = clamp(nx, 3, 97);
  state.player.y = clamp(ny, 5, 95);
  // Re-sync the tile-step target to the new spawn so the next tick
  // doesn't lerp from a stale target into the spawn cell.
  state.player.targetX = state.player.x;
  state.player.targetY = state.player.y;
  state.player.stepEndsAt = 0;
  hideInteractPrompt();
  state.nearBuilding = null;
  sfxClose();
  // Flash → swap to MAP view → re-render world
  viewFlash(() => { setView('MAP'); renderWorld(); });
}

function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

// ═══════════════════════════════════════════════════════════════
// GAME LOOP — requestAnimationFrame driven while view is MAP or
// SECTOR. Auto-pauses while a dialogue or modal is open (input is
// still captured for the menu / dialogue handlers).
// ═══════════════════════════════════════════════════════════════

function startGameLoop() {
  if (state._rafId) return;
  state._lastTick = performance.now();
  const loop = (now) => {
    const dt = Math.min(48, now - state._lastTick); // clamp huge gaps (tab return)
    state._lastTick = now;
    // Movement only happens when not in a dialogue/modal
    if (!state.dialogue && !state.modal) {
      if (state.view === 'MAP') updateOverworld(dt);
      else if (state.view === 'SECTOR') updateInterior(dt);
    } else {
      // Stop avatar walk-animation while paused
      const av = $('playerAvatar'); if (av) av.classList.remove('moving');
    }
    state._rafId = requestAnimationFrame(loop);
  };
  state._rafId = requestAnimationFrame(loop);
}
function stopGameLoop() {
  if (state._rafId) { cancelAnimationFrame(state._rafId); state._rafId = null; }
}

// ═══════════════════════════════════════════════════════════════
// DIALOGUE — branching tree per NPC. Each option is either an
// action (`do:`) that returns a follow-up dialogue text, a leaf
// (`leave`), or a navigation (`href`/`modal`).
// ═══════════════════════════════════════════════════════════════

// Build the choice tree for a given NPC. Choices return their own
// follow-up body when selected, then re-enter the same tree so the
// player can ask a second question without re-opening dialogue.
function buildDialogueChoices(sec) {
  const s = state.snapshot || {};
  const rev = s.revenue || {};
  const t = s.tickets || {};
  const pipe = s.pipeline || {};
  const ads = s.metaAds || {};
  const brief = s.briefing_morning || {};
  const leads = s.leads || {};
  const alerts = s.alerts || [];

  const enterPanel = { label: `Open ${sec.id} live panel`, kind: 'href', href: sec.href };
  const leave      = { label: 'Leave',                    kind: 'leave', danger: true };

  switch (sec.id) {
    case 'HQ': {
      const top3 = brief.top3 || [];
      return [
        { label: 'Today\'s briefing', kind: 'reply',
          body: `Status: ${(brief.status || 'unknown').toUpperCase()}. ${top3.length ? top3.length + ' priority items flagged.' : 'Nothing flagged.'}` },
        { label: 'Top 3 priorities', kind: 'reply',
          body: top3.length ? top3.slice(0,3).map((q,i) => `${i+1}. ${q.action || q.title || 'priority ' + (i+1)}`).join('\n') : 'Nothing flagged right now.' },
        { label: 'Open the quest log', kind: 'modal', modal: 'quests' },
        enterPanel,
        leave
      ];
    }
    case 'SALES': {
      const signed = Math.round((rev.signedRevenue || 0) / 1000);
      const pipeVal = Math.round((pipe.totalValue || 0) / 1000);
      const top = (pipe.top5_deals || [])[0];
      return [
        { label: 'How is the pipeline?', kind: 'reply',
          body: `Pipeline holds $${pipeVal}K across ${pipe.openDeals || 0} open deals. Closed $${signed}K month-to-date.` },
        { label: 'Top deal right now', kind: 'reply',
          body: top ? `${top.customer || top.name || 'top deal'} · ${fmt$(top.value)}` : 'No open deals in pipeline.' },
        { label: 'New leads this week', kind: 'reply',
          body: `${leads.thisWeek || 0} new leads this week, ${leads.total || 0} all-time.` },
        enterPanel,
        leave
      ];
    }
    case 'PRODUCTION': {
      const byStat = t.byStatus || {};
      const active = byStat.active || 0;
      const open = byStat.open || 0;
      const overdue = t.overdueCount || 0;
      return [
        { label: 'Active jobs right now', kind: 'reply',
          body: `${active} active · ${open} open · ${overdue} overdue. ${overdue > 20 ? "We're swamped, boss." : overdue > 5 ? 'Need to catch up a bit.' : 'Workload steady.'}` },
        { label: 'Who has the most overdue?', kind: 'reply',
          body: bottleneckAssignee() },
        { label: 'Open production cockpit', kind: 'href', href: sec.href },
        leave
      ];
    }
    case 'SERVICE': {
      const byStat = t.byStatus || {};
      const active = byStat.active || 0;
      const today = (t.activeToday || []).length;
      return [
        { label: 'Dispatch board status', kind: 'reply',
          body: `${active} active calls, ${today} on dispatch today.` },
        { label: 'Unassigned tickets', kind: 'reply',
          body: `${(t.byAssignee && t.byAssignee.Unassigned) || 0} unassigned tickets in queue.` },
        enterPanel,
        leave
      ];
    }
    case 'CUSTOMER': {
      const totalTix = t.total || 0;
      const recent = (rev.recentActivity || []).slice(0,3);
      return [
        { label: 'Customer pulse', kind: 'reply',
          body: `${totalTix} tickets open across all customers right now.` },
        { label: 'Recent activity (top 3)', kind: 'reply',
          body: recent.length ? recent.map(r => `· ${(r.customer || 'customer')}, ${(r.action || 'event')}`).join('\n') : 'No recent customer activity in current snapshot.' },
        enterPanel,
        leave
      ];
    }
    case 'FINANCE': {
      const signed = Math.round((rev.signedRevenue || 0) / 1000);
      const pend = Math.round((rev.pendingRevenue || 0) / 1000);
      const adRoi = brief.kpiScouter && brief.kpiScouter.adROI;
      return [
        { label: 'Show me the money (MTD)', kind: 'reply',
          body: `Signed $${signed}K, pending $${pend}K month-to-date.` },
        { label: 'Ad ROI right now', kind: 'reply',
          body: adRoi != null ? `Ad ROI ${adRoi}.` : 'Ad ROI signal not present in this snapshot.' },
        { label: 'Open finance dashboard', kind: 'href', href: sec.href },
        leave
      ];
    }
    case 'ADMIN': {
      const watchdog = alerts.find(a => /watchdog|cron/i.test(String(a)));
      const stale = alerts.find(a => /stale/i.test(String(a)));
      return [
        { label: 'Watchdog status', kind: 'reply',
          body: watchdog ? watchdog : 'Watchdog clean. Cron firing as scheduled.' },
        { label: 'Any stale data?', kind: 'reply',
          body: stale ? stale : 'No stale data flagged. Snapshot is current.' },
        { label: 'Active Claude sessions', kind: 'reply',
          body: state.ccSessions.length ? state.ccSessions.map(c => `· ${c.user_label || 'Claude'} ${c.last_tool || 'idle'}`).join('\n') : 'No active Claude Code sessions right now.' },
        { label: 'Open admin console', kind: 'href', href: sec.href },
        leave
      ];
    }
    case 'MATERIALS': {
      const mat = s.materialOrders;
      const have = mat && typeof mat === 'object';
      const ords = have ? (mat.openCount || 0) : null;
      let inv;
      if (!have) inv = 'Inventory feed not wired into the snapshot pipeline yet, but you can open the board.';
      else if (ords) inv = `${ords} material order${ords > 1 ? 's' : ''} open with suppliers right now.`;
      else inv = 'Pallets stacked, shelves stocked. We are good.';
      return [
        { label: 'Inventory check', kind: 'reply', body: inv },
        { label: 'Open materials board', kind: 'href', href: sec.href },
        leave
      ];
    }
    case 'MARKETING': {
      const cpl = ads.avgCPL;
      const lw = leads.thisWeek || 0;
      const total = leads.total || 0;
      return [
        { label: 'Lead flow this week', kind: 'reply',
          body: `${lw} new leads this week. ${total} all-time. ${lw < 3 ? 'Time to amplify.' : lw < 8 ? 'Steady channel.' : 'Channel singing.'}` },
        { label: 'Cost per lead', kind: 'reply',
          body: cpl != null ? `Average CPL $${cpl.toFixed(2)} across active campaigns.` : 'CPL not present in this snapshot.' },
        { label: 'Active campaigns', kind: 'reply',
          body: `${ads.activeCampaigns || 0} active campaigns.` },
        { label: 'Open marketing dashboard', kind: 'href', href: sec.href },
        leave
      ];
    }
  }
  return [enterPanel, leave];
}

function bottleneckAssignee() {
  const t = (state.snapshot && state.snapshot.tickets) || {};
  const byA = t.byAssignee || {};
  let max = 0, who = null;
  Object.keys(byA).forEach(name => { if ((byA[name] || 0) > max) { max = byA[name]; who = name; } });
  return who ? `${who} has the heaviest load (${max} tickets).` : 'No assignee breakdown in current snapshot.';
}

// Field-ops comms terminal dialog. Renders a dialogue with SMS / Email
// choices that defer to the device's tel: and mailto: handlers - no
// server-side messaging API required. Greys out a channel when the
// crew member's contact field is empty so Mac can see what to fill in.
function openCommsDialog(sec) {
  const c = CREW_CONTACTS[sec.npc] || { name: sec.npc, sms: '', email: '' };
  const accent = NPC_ACCENT[sec.npc] || '#22d3ee';
  // Only render the channels that are configured. A footer note flags any
  // missing channel so Mac knows to fill CREW_CONTACTS - the disabled rows
  // can't be presented as 'reply' choices because the generic reply path
  // would rebuild choices from buildDialogueChoices() and kick the player
  // out of the comms dialog into the unrelated sector NPC tree.
  const missing = [];
  if (!c.sms) missing.push('SMS number');
  if (!c.email) missing.push('email');
  const footer = missing.length ? `\n\n(${missing.join(' and ')} not configured for ${c.name} - update CREW_CONTACTS in game.html.)` : '';
  const body = `${c.name} is in the field. Reach them by SMS or email - the message opens in your device's default app.` + footer;
  const choices = [];
  if (c.sms)   choices.push({ label: `Text ${c.name} (${c.sms})`,    kind: 'href', href: 'sms:' + c.sms });
  if (c.email) choices.push({ label: `Email ${c.name} (${c.email})`, kind: 'href', href: 'mailto:' + c.email });
  choices.push({ label: 'Leave', kind: 'leave', danger: true });
  openDialogue({
    speaker: 'COMMS · ' + sec.id,
    accent,
    portrait: NPC_PORTRAIT(sec.npc),
    body,
    choices,
    choiceIdx: 0,
    kind: 'comms',
    sec
  });
}

function openNpcDialogueTree(sec, options) {
  const speaker = sec.npc;
  const body = (options && options.body) || godLine(sec);
  const choices = buildDialogueChoices(sec);
  openDialogue({
    speaker,
    accent: NPC_ACCENT[speaker],
    portrait: NPC_PORTRAIT(speaker),
    body,
    choices,
    choiceIdx: 0,
    kind: 'npc-tree',
    sec
  });
}

// Legacy single-line talk (kept so existing code paths still work)
function talkToNpc(sec) {
  if (FIELD_SECTORS.has(sec.id)) openCommsDialog(sec);
  else openNpcDialogueTree(sec);
}
function openDialogue(d) {
  state.dialogue = Object.assign({ revealed: 0, choiceIdx: 0 }, d);
  $('dialogue').classList.add('open');
  document.body.classList.add('dialogue-open');
  $('dialogueSpeaker').textContent = d.speaker;
  $('dialogueSpeaker').style.color = d.accent || '#fde047';
  $('dialogueSpeaker').style.borderColor = d.accent || 'var(--cyan)';
  $('dialogueBody').textContent = '';
  $('dialogueAdvance').style.display = 'none';
  $('dialogueChoices').classList.remove('show');
  $('dialogueChoices').textContent = '';
  if (d.portrait) {
    $('dialoguePortrait').style.display = 'block';
    $('dialoguePortraitImg').src = d.portrait;
    attachPortraitFallback($('dialoguePortraitImg'));
  } else {
    $('dialoguePortrait').style.display = 'none';
  }
  // Start typewriter; on completion, either show advance-arrow or branching choices
  if (state._typewriterTimer) clearInterval(state._typewriterTimer);
  state._typewriterTimer = setInterval(() => {
    if (!state.dialogue) { clearInterval(state._typewriterTimer); return; }
    state.dialogue.revealed += 2;
    const visible = state.dialogue.body.slice(0, state.dialogue.revealed);
    $('dialogueBody').textContent = visible;
    if (state.dialogue.revealed % 8 === 0) sfxAdvance();
    if (state.dialogue.revealed >= state.dialogue.body.length) {
      clearInterval(state._typewriterTimer);
      onDialogueBodyComplete();
    }
  }, 24);
}

function onDialogueBodyComplete() {
  if (!state.dialogue) return;
  if (state.dialogue.choices && state.dialogue.choices.length) {
    renderDialogueChoices();
  } else {
    $('dialogueAdvance').style.display = 'block';
  }
}

function renderDialogueChoices() {
  const box = $('dialogueChoices');
  box.textContent = '';
  const choices = state.dialogue.choices || [];
  choices.forEach((c, i) => {
    const row = el('button', {
      type: 'button',
      class: 'dialogue-choice' + (c.danger ? ' danger' : '') + (i === state.dialogue.choiceIdx ? ' focused' : ''),
      onclick: (e) => { e.stopPropagation(); selectChoice(i); }
    }, [
      el('span', { class: 'num', text: String(i + 1) }),
      el('span', { text: c.label })
    ]);
    box.appendChild(row);
  });
  box.classList.add('show');
  $('dialogueAdvance').style.display = 'none';
}

function moveChoiceFocus(delta) {
  if (!state.dialogue || !state.dialogue.choices) return;
  const n = state.dialogue.choices.length;
  state.dialogue.choiceIdx = (state.dialogue.choiceIdx + delta + n) % n;
  document.querySelectorAll('.dialogue-choice').forEach((node, i) => node.classList.toggle('focused', i === state.dialogue.choiceIdx));
  sfxStep();
}

function selectChoice(idx) {
  if (!state.dialogue || !state.dialogue.choices) return;
  const c = state.dialogue.choices[idx];
  if (!c) return;
  sfxConfirm();
  if (c.kind === 'leave') {
    closeDialogue();
  } else if (c.kind === 'href') {
    closeDialogue();
    window.location.href = c.href;
  } else if (c.kind === 'modal') {
    closeDialogue();
    if (c.modal === 'quests') openQuestModal();
    else if (c.modal === 'party') openPartyModal();
    else if (c.modal === 'inventory') openInventoryModal();
    else if (c.modal === 'settings') openSettingsModal();
  } else if (c.kind === 'reply') {
    // Replace body with the reply, then re-show same choice list so the
    // player can ask another question without re-opening.
    const sec = state.dialogue.sec;
    const speaker = state.dialogue.speaker;
    state.dialogue.body = c.body;
    state.dialogue.revealed = 0;
    state.dialogue.choiceIdx = 0;
    $('dialogueChoices').classList.remove('show');
    $('dialogueChoices').textContent = '';
    $('dialogueBody').textContent = '';
    $('dialogueAdvance').style.display = 'none';
    if (state._typewriterTimer) clearInterval(state._typewriterTimer);
    // Speed up reply typewriter so chained Q&A feels snappy
    state._typewriterTimer = setInterval(() => {
      if (!state.dialogue) { clearInterval(state._typewriterTimer); return; }
      state.dialogue.revealed += 3;
      $('dialogueBody').textContent = state.dialogue.body.slice(0, state.dialogue.revealed);
      if (state.dialogue.revealed % 10 === 0) sfxAdvance();
      if (state.dialogue.revealed >= state.dialogue.body.length) {
        clearInterval(state._typewriterTimer);
        // Refresh the choice list so it stays available
        state.dialogue.choices = buildDialogueChoices(sec);
        renderDialogueChoices();
      }
    }, 22);
  }
}

function closeDialogue() {
  state.dialogue = null;
  $('dialogue').classList.remove('open');
  document.body.classList.remove('dialogue-open');
  $('dialogueChoices').classList.remove('show');
  $('dialogueChoices').textContent = '';
  if (state._typewriterTimer) clearInterval(state._typewriterTimer);
}
function advanceDialogue() {
  if (!state.dialogue) return;
  if (state.dialogue.revealed < state.dialogue.body.length) {
    // Skip typewriter
    state.dialogue.revealed = state.dialogue.body.length;
    $('dialogueBody').textContent = state.dialogue.body;
    if (state._typewriterTimer) clearInterval(state._typewriterTimer);
    onDialogueBodyComplete();
    sfxAdvance();
  } else if (state.dialogue.choices && state.dialogue.choices.length) {
    // Choices showing: Enter selects current focus
    selectChoice(state.dialogue.choiceIdx);
  } else {
    closeDialogue();
    sfxClose();
  }
}

// ═════ MODALS ═════
function openModal(node, focusable) {
  $('modal').textContent = '';
  $('modal').appendChild(node);
  $('modalBack').classList.add('open');

function closeModal() {
  $('modalBack').classList.remove('open');

  sfxClose();

function refreshModalFocus() {

function openMainMenu() {
  const items = [
    { label: 'QUEST LOG', kind: 'quests' },

    ]);

function handleMenuPick(kind) {
  closeModal();
  if (kind === 'quests') openQuestModal();
  else if (kind === 'party') openPartyModal();
  else if (kind === 'inventory') openInventoryModal();
  else if (kind === 'map') { state.interior = null; setView('MAP'); renderWorld(); }
  else if (kind === 'settings') openSettingsModal();
  else if (kind === 'exit') { try { localStorage.setItem('ry_ui_mode', 'normal'); } catch {} window.location.href = '/command-center.html'; }
  else if (kind === 'title') { setView('TITLE'); enterTitle(); }

function openQuestModal() {
  const s = state.snapshot;
  const briefTop = (s && s.briefing_morning && s.briefing_morning.top3) || [];
  const activeToday = (s && s.tickets && s.tickets.activeToday) || [];

  const allQuests = [
    ...briefTop.map((q, i) => ({
      id: 'brief-' + (q.rank || i),
      title: q.action || q.title || ('Priority ' + (i+1)),
      ctx: q.context || q.priority || '',
      pri: (q.priority === 'top_priority' || q.priority === 'urgent') ? 'urgent' : (q.priority === 'high' ? 'high' : 'normal'),
      origin: 'BRIEFING'
    })),
    ...activeToday.slice(0, 6).map(t => ({
      id: 'tix-' + t.id,
      title: t.title || t.id,
      ctx: (t.assignee || 'unassigned') + ' · ' + (t.days_overdue ? t.days_overdue + 'd overdue' : (t.priority || 'normal')),
      pri: (t.priority === 'urgent' || (t.days_overdue || 0) > 7) ? 'urgent' : (t.priority === 'high' ? 'high' : 'normal'),
      origin: 'TICKETS'
    }))
  ].filter(q => !state.save.dismissed_quests.includes(q.id));

  const body = el('div', {}, [el('h2', { text: 'QUEST LOG' })]);
  if (!allQuests.length) {
    body.appendChild(el('div', { class: 'modal-hint', text: 'No active quests. Either you\'re winning or the briefing hasn\'t fired today.' }));
  } else {
    const list = el('div', { class: 'quest-list' });
    allQuests.forEach(q => {
      const card = el('div', { class: 'quest-card ' + q.pri }, [
        el('div', { class: 'pri' }),
        el('div', { class: 'body' }, [
          el('div', { class: 'title', text: q.title }),
          el('div', { class: 'ctx', text: q.origin + ' · ' + q.ctx })
        ]),
        el('button', { class: 'dismiss', text: '✕', title: 'Dismiss', onclick: () => {
          state.save.dismissed_quests.push(q.id);
          persistSave();
          openQuestModal();
        }})
      ]);
      list.appendChild(card);
    });
    body.appendChild(list);
  }
  body.appendChild(el('div', { class: 'modal-hint', text: 'Dismissals persist across sessions. Reset in Settings.' }));
  openModal(body, []);
}

function openPartyModal() {
  const body = el('div', {}, [el('h2', { text: 'CREW PARTY' })]);
  const grid = el('div', { class: 'party-grid' });
  CREW.forEach(c => {
    grid.appendChild(el('div', { class: 'party-card' }, [
      el('img', { src: c.img, alt: c.name }),
      el('div', { class: 'name', text: c.name })
    ]));
  });
  body.appendChild(grid);
  body.appendChild(el('div', { class: 'modal-hint', text: 'Plus Ultra crew roster. Click a portrait to load their dossier (coming soon).' }));
  openModal(body, []);
}

function openInventoryModal() {
  const s = state.snapshot;
  const recent = (s && s.revenue && s.revenue.recentActivity) || [];
  const body = el('div', {}, [el('h2', { text: 'RECENT ACTIVITY' })]);
  if (!recent.length) {
    body.appendChild(el('div', { class: 'modal-hint', text: 'No recent activity in current snapshot.' }));
  } else {
    const list = el('div', { class: 'quest-list' });
    recent.forEach(r => {
      list.appendChild(el('div', { class: 'quest-card normal' }, [
        el('div', { class: 'pri' }),
        el('div', { class: 'body' }, [
          el('div', { class: 'title', text: (r.customer || 'Customer') + ' -- ' + (r.action || 'event') }),
          el('div', { class: 'ctx', text: r.date || '' })
        ])
      ]));
    });
    body.appendChild(list);
  }
  openModal(body, []);
}

function openSettingsModal() {
  const body = el('div', {}, [el('h2', { text: 'SETTINGS' })]);
  const muteRow = el('div', { class: 'menu-item', onclick: () => {
    state.save.muted = !state.save.muted; persistSave(); openSettingsModal();
    if (!state.save.muted) sfxConfirm();
  }}, [
    el('span', { class: 'arrow', text: '▶' }),
    el('span', { text: state.save.muted ? 'SFX: MUTED' : 'SFX: ON' })
  ]);
  body.appendChild(muteRow);
  const resetRow = el('div', { class: 'menu-item', onclick: () => {
    if (confirm('Reset save? Dismissed quests will return.')) { state.save = defaultSave(); persistSave(); closeModal(); toast('Save reset'); }
  }}, [
    el('span', { class: 'arrow', text: '▶' }),
    el('span', { text: 'RESET SAVE' })
  ]);
  body.appendChild(resetRow);
  const closeRow = el('div', { class: 'menu-item', onclick: closeModal }, [
    el('span', { class: 'arrow', text: '▶' }),
    el('span', { text: 'CLOSE' })
  ]);
  body.appendChild(closeRow);
  body.appendChild(el('div', { class: 'modal-hint', text: 'Save is local to this browser. Cross-device sync is on the roadmap.' }));
  openModal(body, [muteRow, resetRow, closeRow]);
}

// ═════ CC wizard NPC popup ═════
function renderWizardPop() {
  // Show wizard popup in SECTOR view if there's an active CC session
  document.querySelectorAll('.wiz-pop').forEach(n => n.remove());
  if (state.view !== 'SECTOR' || !state.ccSessions.length) return;
  const wiz = el('div', {
    class: 'wiz-pop',
    title: 'Talk to Claude · ' + state.ccSessions.length + ' active',
    onclick: openWizardDialogue
  }, [
    el('img', { src: '/assets/rpg/sprites/crew/claude-wizard.webp', alt: 'Claude' }),
    el('div', { class: 'badge', text: String(state.ccSessions.length) })
  ]);
  $('app').appendChild(wiz);
}

function openWizardDialogue() {
  const sessions = state.ccSessions;
  const lines = sessions.map(s => {
    const label = s.user_label || s.session_id.slice(0, 12);
    const tool = s.last_tool || 'idle';
    const summ = s.last_action_summary ? ' (' + s.last_action_summary + ')' : '';
    return '· ' + label + ' · ' + tool + summ;
  });
  const body = 'Active Claude Code sessions:\n\n' + lines.join('\n') + '\n\n[Press X to close · M to message]';
  openDialogue({
    speaker: 'CLAUDE',
    accent: '#a78bfa',
    portrait: '/assets/rpg/sprites/crew/claude-wizard.webp',
    body
  });
}

// ═════ Toasts ═════
function toast(msg, level) {
  const t = el('div', { class: 'toast' + (level ? ' ' + level : ''), text: msg });
  $('toastStack').appendChild(t);
  setTimeout(() => { t.style.transition = 'opacity .4s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 3500);
}

// ═════ Input ═════
// Movement keys are tracked as held state and consumed by the game loop.
// Discrete keys (Enter, Esc, number keys, etc.) fire on the keydown edge.
function setMoveKey(k, down) {
  if (k === 'ArrowUp'    || k === 'w' || k === 'W') { state.input.up = down; return true; }
  if (k === 'ArrowDown'  || k === 's' || k === 'S') { state.input.down = down; return true; }
  if (k === 'ArrowLeft'  || k === 'a' || k === 'A') { state.input.left = down; return true; }
  if (k === 'ArrowRight' || k === 'd' || k === 'D') { state.input.right = down; return true; }
  return false;
}

document.addEventListener('keydown', (e) => {
  // Don't capture input when the user is typing in a real input/textarea
  // (none today, but defensive against future modals with text fields)
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  const k = e.key;

  // Modal open: navigate menu items
  if (state.modal) {
    if (k === 'Escape' || k === 'x' || k === 'X' || k === 'b' || k === 'B') { e.preventDefault(); closeModal(); return; }
    if (k === 'ArrowDown' || k === 'ArrowUp') {
      e.preventDefault();
      const f = state.modal.focusable || [];
      if (!f.length) return;
      state.modal.focusIdx = (state.modal.focusIdx + (k === 'ArrowDown' ? 1 : -1) + f.length) % f.length;
      refreshModalFocus();
      return;
    }
    if (k === 'Enter' || k === 'z' || k === 'Z' || k === ' ') {
      e.preventDefault();
      const node = state.modal.focusable[state.modal.focusIdx];
      if (node && typeof node.click === 'function') node.click();
      return;
    }
    return;
  }

  // Dialogue open: choices navigation OR advance/skip
  if (state.dialogue) {
    if (k === 'Escape' || k === 'x' || k === 'X' || k === 'b' || k === 'B') { e.preventDefault(); closeDialogue(); sfxClose(); return; }
    // Choices visible: arrow keys cycle, Enter selects, number keys jump
    if (state.dialogue.choices && state.dialogue.revealed >= state.dialogue.body.length) {
      if (k === 'ArrowDown' || k === 's' || k === 'S') { e.preventDefault(); moveChoiceFocus(1); return; }
      if (k === 'ArrowUp' || k === 'w' || k === 'W')   { e.preventDefault(); moveChoiceFocus(-1); return; }
      if (/^[1-9]$/.test(k)) {
        const idx = parseInt(k, 10) - 1;
        if (idx < state.dialogue.choices.length) { e.preventDefault(); selectChoice(idx); return; }
      }
      if (k === 'Enter' || k === 'z' || k === 'Z' || k === ' ' || k === 'e' || k === 'E') {
        e.preventDefault(); selectChoice(state.dialogue.choiceIdx); return;
      }
      return;
    }
    if (k === 'Enter' || k === 'z' || k === 'Z' || k === ' ' || k === 'e' || k === 'E') {
      e.preventDefault(); advanceDialogue(); return;
    }
    return;
  }

  // TITLE: any START key boots
  if (state.view === 'TITLE') {
    if (k === 'Enter' || k === 'z' || k === 'Z' || k === ' ') { e.preventDefault(); bootPressStart(); return; }
    return;
  }

  // Global hotkeys (work in MAP + SECTOR)
  if (k === 'Escape') { e.preventDefault(); openMainMenu(); return; }
  if (k === 'm' || k === 'M') {
    e.preventDefault(); state.save.muted = !state.save.muted; persistSave();
    $('btnMute').style.opacity = state.save.muted ? '0.4' : '1';
    if (!state.save.muted) sfxConfirm();
    return;
  }
  if (k === 'q' || k === 'Q') { e.preventDefault(); openQuestModal(); return; }

  // Movement (held)
  if (setMoveKey(k, true)) { e.preventDefault(); return; }

  // Action (interact)
  if (k === ' ' || k === 'Enter' || k === 'z' || k === 'Z' || k === 'e' || k === 'E') {
    e.preventDefault();
    handleAction();
    return;
  }
});

document.addEventListener('keyup', (e) => {
  if (setMoveKey(e.key, false)) e.preventDefault();
});
// Defensive: if window loses focus mid-walk, clear all held keys so the
// player doesn't keep walking after Alt-Tab back.
window.addEventListener('blur', () => {
  state.input.up = state.input.down = state.input.left = state.input.right = false;
});

// On viewport resize the BUILDING_HALF footprint changes (desktop 8x11 vs
// mobile 11x9). If the player's current position is now inside a building's
// collision rect, nudge them out so movement isn't soft-locked. Debounced.
let _resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    if (state.view === 'MAP' && collidesOverworld(state.player.x, state.player.y)) {
      // Walk player out to the nearest open cell — try cardinal nudges first
      const tries = [[0, -4], [0, 4], [-4, 0], [4, 0], [0, -10], [0, 10]];
      for (const [dx, dy] of tries) {
        const nx = clamp(state.player.x + dx, 3, 97);
        const ny = clamp(state.player.y + dy, 5, 95);
        if (!collidesOverworld(nx, ny)) { state.player.x = nx; state.player.y = ny; break; }
      }
      const av = $('playerAvatar');
      if (av) { av.style.left = state.player.x + '%'; av.style.top = state.player.y + '%'; }
    }
  }, 200);
});

// "Action" button — interact with the closest target in the current view
function handleAction() {
  if (state.view === 'MAP') {
    // Building takes priority over the wizard if both are reachable — the
    // wizard parks next to a building so its radius can overlap. Buildings
    // are the primary navigation target; wizard is a bonus interaction.
    if (state.nearBuilding) { sfxConfirm(); enterSector(); return; }
    // Wizard walker within radius? Open the Claude session dialogue —
    // keeps the wizard reachable via keyboard / virtual A button, not
    // only via mouse click on the sprite.
    const wiz = $('wizardWalker');
    if (wiz) {
      const wx = parseFloat(wiz.style.left);
      const wy = parseFloat(wiz.style.top);
      if (Math.hypot(state.player.x - wx, state.player.y - wy) < 8) {
        sfxConfirm(); openWizardDialogue(); return;
      }
    }
  } else if (state.view === 'SECTOR') {
    const intr = state.interior;
    if (!intr) return;
    if (state.nearTarget === 'npc') { sfxConfirm(); talkToNpc(intr.sec); }
    else if (state.nearTarget === 'terminal') { sfxOpen(); openSectorTerminalModal(intr.sec); }
    else if (state.nearTarget === 'door') { sfxClose(); exitToOverworld(); }
  }
}

// Click handlers for global buttons + touch D-pad wiring
document.addEventListener('DOMContentLoaded', () => {
  $('btnMute').addEventListener('click', () => {
    state.save.muted = !state.save.muted; persistSave();
    $('btnMute').style.opacity = state.save.muted ? '0.4' : '1';
    if (!state.save.muted) sfxConfirm();
  });
  $('btnPause').addEventListener('click', () => openMainMenu());
  $('viewTitle').addEventListener('click', () => { if (state.view === 'TITLE') bootPressStart(); });
  // Dialogue click:
  //   - With choices visible: only skip the typewriter; never auto-pick a
  //     choice from a body click (the choice list is the explicit menu).
  //   - Without choices (single-line dialogues like the Claude wizard popup):
  //     click advances/closes the dialogue, same as Enter.
  $('dialogue').addEventListener('click', (e) => {
    if (e.target.closest('.dialogue-choice')) return;
    if (!state.dialogue) return;
    if (state.dialogue.choices) {
      if (state.dialogue.revealed < state.dialogue.body.length) advanceDialogue();
    } else {
      advanceDialogue();
    }
  });
  $('modalBack').addEventListener('click', (e) => { if (e.target.id === 'modalBack') closeModal(); });
  $('btnMute').style.opacity = state.save.muted ? '0.4' : '1';

  // Touch device detection — show virtual D-pad + action button if any
  // touch input is supported. Hidden by default on mouse/keyboard so it
  // doesn't crowd the desktop view.
  const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if (isTouch) {
    $('virtualPad').classList.add('show');
    $('vpAction').classList.add('show');
  }

  // D-pad: held while pressed; works on both mouse + touch
  document.querySelectorAll('.vp-btn').forEach(btn => {
    const dir = btn.getAttribute('data-dir');
    const set = (down) => {
      if (dir === 'up')    state.input.up = down;
      if (dir === 'down')  state.input.down = down;
      if (dir === 'left')  state.input.left = down;
      if (dir === 'right') state.input.right = down;
      btn.classList.toggle('held', down);
    };
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); set(true); }, { passive: false });
    btn.addEventListener('touchend',   (e) => { e.preventDefault(); set(false); });
    btn.addEventListener('touchcancel',(e) => { e.preventDefault(); set(false); });
    btn.addEventListener('mousedown',  (e) => { e.preventDefault(); set(true); });
    btn.addEventListener('mouseup',    () => set(false));
    btn.addEventListener('mouseleave', () => set(false));
  });

  // Action (A) button — single-tap action
  const actBtn = $('vpAction');
  const fireAction = (e) => { e.preventDefault(); actBtn.classList.add('held'); handleAction(); setTimeout(() => actBtn.classList.remove('held'), 120); };
  actBtn.addEventListener('touchstart', fireAction, { passive: false });
  actBtn.addEventListener('mousedown',  fireAction);
});

// ═════ Boot ═════
async function boot() {
  // Defensive clamp: if state.focusedSector ever picks up an out-of-range
  // value from a future save migration or URL hash, snap it to a real index.
  state.focusedSector = Math.max(0, Math.min(SECTORS.length - 1, state.focusedSector | 0));

  // Rehydrate player position from save (default = (50, 32) open band). If
  // the saved cell collides with a building (e.g. a save written before
  // BUILDING_HALF turned dynamic), nudge to default.
  state.player.x = clamp(state.save.player_x, 3, 97);
  state.player.y = clamp(state.save.player_y, 5, 95);
  if (collidesOverworld(state.player.x, state.player.y)) { state.player.x = 50; state.player.y = 32; }

  // Preload sector backdrops so the first SECTOR view doesn't flash blank
  // while the WebP loads over the network. Cheap parallel image warmup.
  SECTORS.forEach(s => { const img = new Image(); img.src = s.bg; });

  // Begin parallel data fetch
  Promise.allSettled([fetchSnapshot(), fetchMe(), fetchCcSessions()]);
  // Update title-screen status after data lands
  setTimeout(() => { if ($('titleLoading')) $('titleLoading').textContent = state.snapshot ? '✓ live data ready · press start' : (state.snapshotErr ? '⚠ offline mode · press start' : 'connecting…'); }, 2500);
  // Refresh loops. IDs captured in state._intervals so a future teardown
  // path (or BFCache restoration) can clear them. Watchdog alert toast is
  // fired by fetchSnapshot on first successful load so it does not race
  // the cold-start fetch latency.
  state._intervals.push(setInterval(fetchSnapshot, SNAPSHOT_REFRESH_MS));
  state._intervals.push(setInterval(fetchCcSessions, CC_REFRESH_MS));
}
// On BFCache restore (back/forward navigation), clear stale intervals and
// re-boot so we don't double-poll.
window.addEventListener('pageshow', (e) => {
  if (e.persisted) {
    state._intervals.forEach(id => clearInterval(id));
    state._intervals = [];
    stopGameLoop();
    boot();
    // If user is mid-walk when navigating back, restart the loop. The
    // loop boots itself on PRESS START otherwise.
    if (state.view !== 'TITLE') startGameLoop();
  }
});
// ═════ Sprite reactions (subscribed to snapshot-delta events) ═════
// One handler per event type. Each picks the right surface to react on
// based on current view: floating pop above the NPC if you're inside the
// sector, a pulse on the building tile if you're on the overworld, plus
// a topbar toast either way so the moment is never silent.
function spawnFloatingPop(text, color, sectorId) {
  // Only render the pop above the NPC when the player is actually inside
  // the matching sector. Otherwise a FINANCE event would spawn over the
  // SALES or ADMIN NPC the player happens to be standing in front of.
  if (state.view !== 'SECTOR') return;
  const intr = state.interior;
  if (!intr || (sectorId && intr.sec.id !== sectorId)) return;
  const room = document.getElementById('sectorRoom');
  if (!room) return;
  // Anchor at the NPC's % position (not a child of #npcSprite) so face-left
  // scaleX(-1) on the sprite doesn't mirror our pop text.
  const pop = document.createElement('div');
  pop.className = 'sprite-pop';
  pop.textContent = text;
  pop.style.color = color || '#fde047';
  pop.style.left = intr.npcX + '%';
  pop.style.top  = (intr.npcY - 8) + '%';
  room.appendChild(pop);
  setTimeout(() => pop.remove(), 1800);
}
function pulseBuilding(sectorId, color) {
  if (state.view !== 'MAP') return;
  const tile = document.querySelector('.map-building[data-sector="' + sectorId + '"]');
  if (!tile) return;
  tile.style.setProperty('--pulse-color', color || '#fde047');
  tile.classList.add('react-pulse');
  setTimeout(() => tile.classList.remove('react-pulse'), 1600);
}
on('revenue.signed.up', (ev) => {
  spawnFloatingPop('+' + fmt$(ev.delta), '#fde047', ev.sector);
  pulseBuilding('FINANCE', '#fde047');
  toast('Revenue signed: +' + fmt$(ev.delta), 'gold');
  sfxConfirm();
});
on('pipeline.deal.new', (ev) => {
  spawnFloatingPop('+' + ev.delta + ' DEAL', '#ec4899', ev.sector);
  pulseBuilding('SALES', '#ec4899');
  toast('New deal in pipeline (' + ev.to + ' open)', 'pink');
  sfxConfirm();
});
on('tickets.overdue.up', (ev) => {
  spawnFloatingPop('+' + ev.delta + ' OVERDUE', '#ef4444', ev.sector);
  pulseBuilding('PRODUCTION', '#ef4444');
  toast('Overdue tickets rising: ' + ev.to, 'red');
  sfxBoss();
});

boot();
</script>
</body>
