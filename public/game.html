// Live-update building stat lines + alert classes when snapshot refreshes,
// without re-rendering the whole world (so we don't trample player position
// or interact prompt mid-walk).
function refreshBuildingStats() {
  document.querySelectorAll('.map-building').forEach(node => {
    const id = node.getAttribute('data-sector');
    const sec = SECTORS.find(s => s.id === id);
    if (!sec) return;
    const lvl = sectorAlertLevel(id);
    node.classList.toggle('alert', lvl === 'alert');
    node.classList.toggle('warn',  lvl === 'warn');
    const stat = node.querySelector('.b-stat');
    if (stat) {
      stat.textContent = sectorHeadline(id);
      stat.classList.toggle('alert', lvl === 'alert');
      stat.classList.toggle('warn',  lvl === 'warn');
    }
    // Pip refresh: every alerting sector surfaces its driving number (not
    // just Production), data-driven via sectorPipValue so the overworld reads
    // as a glanceable live dashboard rather than a single lit building.
    node.querySelectorAll('.b-pip').forEach(n => n.remove());
    if (lvl === 'alert' || lvl === 'warn') {
      node.appendChild(el('div', { class: 'b-pip ' + lvl, text: String(sectorPipValue(id)) }));
    }
  });
}

function refreshBuildingWizardPips() {
  document.querySelectorAll('.map-building').forEach(node => {
    const id = node.getAttribute('data-sector');
    const wizardsHere = state.ccSessions.filter(c => (c.current_sector || '').toUpperCase() === id);
    node.querySelectorAll('.wizard-pip').forEach(n => n.remove());
    if (wizardsHere.length) {
      node.appendChild(el('div', { class: 'wizard-pip', text: String(wizardsHere.length), title: wizardsHere.map(w => w.user_label || 'Claude').join(', ') }));
    }
  });
  renderWizardWalker();
}

// Wandering wizard sprite on the overworld — appears next to whichever
// building has the most-recent CC session. Tappable / walkable-up-to.
function renderWizardWalker() {
  if (state.view !== 'MAP') return;
  const world = $('mapWorld');
  if (!world) return;
  const existing = $('wizardWalker');
  if (!state.ccSessions.length) { if (existing) existing.remove(); return; }
  // Pick the freshest session that has a current_sector
  const sess = state.ccSessions
    .filter(c => c.current_sector)
    .sort((a, b) => (Date.parse(b.last_activity_at || 0) || 0) - (Date.parse(a.last_activity_at || 0) || 0))[0];
  if (!sess) { if (existing) existing.remove(); return; }
  const sec = SECTORS.find(s => s.id === (sess.current_sector || '').toUpperCase());
  if (!sec) { if (existing) existing.remove(); return; }
  // Park the wizard just outside the building's south-east corner
  const f = getBuildingFoot(sec);
  const wx = clamp(sec.x + f.hw + 2.5, 5, 95);
  const wy = clamp(sec.y, 5, 95);
  const label = sess.user_label || 'Claude';
  const count = state.ccSessions.length;
  if (existing) {
    existing.style.left = wx + '%';
    existing.style.top  = wy + '%';
    existing.title = `Talk to Claude · ${count} active`;
    const badge = existing.querySelector('.badge');
    if (badge) badge.textContent = String(count);
  } else {
    const wiz = el('div', {
      class: 'wizard-walker',
      id: 'wizardWalker',
      title: `Talk to Claude · ${count} active`,
      style: { left: wx + '%', top: wy + '%', backgroundImage: `url('/assets/rpg/sprites/crew/claude-wizard.webp')` },
      onclick: () => { sfxConfirm(); openWizardDialogue(); }
    }, [
      el('div', { class: 'badge', text: String(count) })
    ]);
    world.appendChild(wiz);
  }
}

// Brief black flash overlay for entering/exiting sectors. The CSS transition
// is 140ms; we hold opacity for ~50ms in the middle of that for a clean
// "fade-out / swap / fade-in" feel. Total ~280ms — short enough to be snappy.
function viewFlash(swapFn) {
  const f = $('viewFlash');
  if (!f) { swapFn(); return; }
  f.classList.add('on');
  setTimeout(() => {
    try { swapFn(); } finally {
      setTimeout(() => f.classList.remove('on'), 50);
    }
  }, 140);
}

function refreshInteriorHud() {
  const intr = state.interior; if (!intr) return;
  const t = document.getElementById('hudSecTicker');
  if (t) t.textContent = sectorHeadline(intr.sec.id) || '--';
}

function renderWorld() {
  const world = $('mapWorld');
  world.textContent = '';

  SECTORS.forEach((sec, i) => {
    const lvl = sectorAlertLevel(sec.id);
    const tile = el('div', {
      class: 'map-building' + (sec.tall ? ' tall' : '') + (lvl === 'alert' ? ' alert' : lvl === 'warn' ? ' warn' : ''),
      'data-sector': sec.id,
      style: { left: sec.x + '%', top: sec.y + '%', backgroundImage: `url('${sec.sprite}')` },
      /* No click handler — walk near + SPACE/Enter is the only entry path.
         Click previously also mutated state.focusedSector which let a stray
         click on a distant building hijack the next SPACE press (codex P2). */
    }, [
      el('div', { class: 'b-label', text: sec.id })
    ]);

    // Alert/warn pip: same data-driven value as the live refresh path
    // (sectorPipValue) so the initial render and every refresh stay in sync.
    if (lvl === 'alert' || lvl === 'warn') {
      tile.appendChild(el('div', { class: 'b-pip ' + lvl, text: String(sectorPipValue(sec.id)) }));
    }

    // CC wizards stationed here
    const wizardsHere = state.ccSessions.filter(c => (c.current_sector || '').toUpperCase() === sec.id);
    if (wizardsHere.length) {
      tile.appendChild(el('div', { class: 'wizard-pip', text: String(wizardsHere.length), title: wizardsHere.map(w => w.user_label || 'Claude').join(', ') }));
    }

    world.appendChild(tile);
  });

  // Player sprite — pixel-art div with backgroundImage flipped by facing class.
  // Drop any stale #playerAvatar from the interior side first so the id stays
  // unique document-wide (see matching cleanup in renderInterior).
  document.querySelectorAll('#playerAvatar').forEach(n => n.remove());
  const av = el('div', {
    class: 'player-avatar face-' + (state.player.facingDir || 'down'),
    id: 'playerAvatar',
    style: { left: state.player.x + '%', top: state.player.y + '%' }
  });
  world.appendChild(av);

  // Re-render the wandering wizard now that the world container is fresh
  renderWizardWalker();
}

// Tile-snap overworld movement. Runs from the game loop; if no step is
// in flight and a direction key is held, queue one. Once the step's
// CSS transition completes (STEP_MS), snap and let the next tick queue
// the follow-up step. Buildings are AABB-rejected at queue time.
function updateOverworld(dtMs) {
  // Suppress map movement during the sector-entry walk-to-door window
  // (state._entering is set for ~350ms by enterSector). Without this
  // guard the loop keeps advancing state.player and rewriting
  // #playerAvatar's left/top, fighting the walking-in CSS transition.
  if (state._entering) return;
  const p = state.player;
  // Step in progress? Wait for it to finish before queuing another.
  if (p.stepEndsAt && performance.now() < p.stepEndsAt) return;
  if (p.stepEndsAt) {
    // Tween just finished — snap to target and clear step state.
    p.x = p.targetX; p.y = p.targetY;
    p.stepEndsAt = 0;
    schedulePlayerSave();
    refreshNearBuilding();
  }
  // Direction priority: vertical > horizontal so diagonal hold prefers
  // up/down. Classic FF feel, also avoids querying diagonal-collision.
  // Gamepad stick/dpad (RyujinPad.dir) is OR-ed with the held keys so the
  // overworld walks identically on keyboard, touch, or an Xbox pad.
  const pd = window.RyujinPad ? RyujinPad.dir : null;
  const held = (a) => state.input[a] || (pd && pd[a]);
  let dir = null;
  if (held('up'))         dir = 'up';
  else if (held('down'))  dir = 'down';
  else if (held('left'))  dir = 'left';
  else if (held('right')) dir = 'right';
  if (!dir) {
    const av = $('playerAvatar'); if (av) { av.classList.remove('moving'); av.classList.remove('step-b'); }
    refreshNearBuilding();
    return;
  }
  // Compute target tile
  let dx = 0, dy = 0;
  if (dir === 'up')    dy = -TILE_H_PCT;
  if (dir === 'down')  dy =  TILE_H_PCT;
  if (dir === 'left')  dx = -TILE_W_PCT;
  if (dir === 'right') dx =  TILE_W_PCT;
  const tx = clamp(p.x + dx, 3, 97);
  const ty = clamp(p.y + dy, 5, 95);
  // Reject if target is inside a building footprint (face the dir anyway
  // so the player visually turns to look at the wall even when blocked).
  p.facingDir = dir;
  applyFacing();
  if (collidesOverworld(tx, ty)) {
    // Blocked by a building: settle to the rest frame instead of freezing
    // mid-step while the player keeps pushing into the wall.
    const av = $('playerAvatar'); if (av) av.classList.remove('moving', 'step-b');
    refreshNearBuilding();
    return;
  }
  // Queue the step
  p.targetX = tx;
  p.targetY = ty;
  p.stepEndsAt = performance.now() + STEP_MS;
  p.stepParity = !p.stepParity;
  const av = $('playerAvatar');
  if (av) {
    av.style.left = tx + '%';
    av.style.top  = ty + '%';
    av.classList.add('moving');
    av.classList.toggle('step-b', p.stepParity);
  }
  sfxFootstep();
}

function applyFacing() {
  const av = $('playerAvatar'); if (!av) return;
  av.classList.remove('face-up', 'face-down', 'face-left', 'face-right');
  av.classList.add('face-' + (state.player.facingDir || 'down'));
}

// Building-foot collision: target tile inside the bottom-anchored AABB
// of any building? Each sector has its own footprint (tall ADMIN bigger).
function collidesOverworld(x, y) {
  for (const sec of SECTORS) {
    const f = getBuildingFoot(sec);
    if (x > sec.x - f.hw && x < sec.x + f.hw && y > sec.y - f.h && y < sec.y) return true;
  }
  return false;
}

function refreshNearBuilding() {
  const p = state.player;
  let near = null;
  for (let i = 0; i < SECTORS.length; i++) {
    const sec = SECTORS[i];
    const f = getBuildingFoot(sec);
    // "Near" is the band just outside the footprint, biased toward the
    // bottom (the door tile) so player approaches the building from the
    // front rather than around the sides.
    const insideX = p.x > sec.x - f.hw - INTERACT_PAD.w && p.x < sec.x + f.hw + INTERACT_PAD.w;
    const nearDoor = p.y >= sec.y && p.y < sec.y + INTERACT_PAD.h + 2;
    if (insideX && nearDoor) { near = { sec, index: i }; break; }
  }
  const prev = state.nearBuilding;
  state.nearBuilding = near;
  if (near && (!prev || prev.sec.id !== near.sec.id)) {
    document.querySelectorAll('.map-building').forEach(el => el.classList.toggle('near', el.getAttribute('data-sector') === near.sec.id));
    state.focusedSector = near.index;
    showInteractPrompt('PRESS [SPACE] TO ENTER', near.sec.x, near.sec.y - 2);
  } else if (!near && prev) {
    document.querySelectorAll('.map-building').forEach(el => el.classList.remove('near'));
    hideInteractPrompt();
  }
}

function showInteractPrompt(text, xPct, yPct) {
  let p = $('interactPrompt');
  if (!p) {
    p = el('div', { class: 'interact-prompt', id: 'interactPrompt' });
    // Append to whichever view is active (map-world or sector-room)
    const host = state.view === 'MAP' ? $('mapWorld') : $('sectorRoom');
    host.appendChild(p);
  } else if (p.parentElement.id !== (state.view === 'MAP' ? 'mapWorld' : 'sectorRoom')) {
    // Move prompt between hosts if view changed
    p.remove();
    const host = state.view === 'MAP' ? $('mapWorld') : $('sectorRoom');
    host.appendChild(p);
  }
  p.textContent = text;
  p.style.left = xPct + '%';
  p.style.top  = yPct + '%';
}
function hideInteractPrompt() {
  const p = $('interactPrompt'); if (p) p.remove();
}

// ═══════════════════════════════════════════════════════════════
// SECTOR INTERIOR (walkable room) — sector scene WebP as bg, NPC
// at fixed position, terminal in corner, door at bottom. Player
// walks around; SPACE near NPC/terminal/door triggers respective
// interaction.
// ═══════════════════════════════════════════════════════════════

function enterSector() {
  const sec = SECTORS[state.focusedSector];
  if (!sec) return;
  sfxOpen();
  // Any in-flight overworld step is abandoned; snap to current position
  // so exit doesn't teleport the player to a stale tile target.
  state.player.stepEndsAt = 0;
  state.player.targetX = state.player.x;
  state.player.targetY = state.player.y;
  // Remember overworld position so we can spawn there on exit
  state.worldReturn = { x: state.player.x, y: state.player.y };
  // Walk-in phase 1 (overworld): slide the player onto the building's
  // painted door at sec.x/sec.y over ~350ms so the entry reads as the
  // character walking up to the doorway. Skip if reduced motion is
  // preferred OR if the player is already standing on the door (e.g.
  // re-entering immediately after exit).
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const overworldAv = $('playerAvatar');
  const overworldStepMs = reducedMotion ? 0 : 350;
  if (overworldAv && overworldStepMs > 0) {
    overworldAv.classList.remove('moving', 'step-b', 'face-down', 'face-left', 'face-right');
    overworldAv.classList.add('walking-in', 'face-up');
    overworldAv.style.left = sec.x + '%';
    overworldAv.style.top  = (sec.y - 1) + '%';
  }
  // Pause the overworld game loop so it doesn't overwrite #playerAvatar
  // styles or advance state.player during the walking-in transition.
  // Cleared INSIDE the viewFlash swap callback (post setView('SECTOR'))
  // so the 140ms flash window also stays paused — clearing it before
  // viewFlash would leave the map view live during the fade and let a
  // held movement key queue another step on top of the walk-to-door.
  state._entering = true;
  hideInteractPrompt();
  setTimeout(() => {
    // Spawn at the bottom door of the interior so walk-in phase 2 can
    // animate the player up to the talk position at y=60. Without
    // reduced motion: y=92 (door). With reduced motion: y=60 (instant).
    const spawnY = reducedMotion ? 60 : 92;
    state.interior = {
      sec,
      playerX: 50,
      playerY: spawnY,
      facing: -Math.PI / 2,         // facing up toward NPC
      npcX: 50, npcY: 38,
      termX: 14, termY: 28,
      lastEnter: Date.now()
    };
    if (!state.save.visited_sectors.includes(sec.id)) {
      state.save.visited_sectors.push(sec.id);
      persistSave();
    }
    state.save.last_visit_at = new Date().toISOString();
    persistSave();
    // Flash → swap to SECTOR view → render interior — walking through the door
    viewFlash(() => {
      setView('SECTOR');
      renderInterior();
      // Now safe to resume the overworld loop (view is SECTOR so the
      // updateOverworld() early-exit on state.view check would already
      // skip it, but clearing the flag keeps the state field clean).
      state._entering = false;
      if (reducedMotion) return;
      // Walk-in phase 2 (interior): animate from door (y=92) up to talk
      // position (y=60) so the character walks into the room.
      requestAnimationFrame(() => {
        setTimeout(() => {
          const interiorAv = $('playerAvatar');
          if (!interiorAv || !state.interior) return;
          interiorAv.classList.add('spawn-walk-up', 'face-up');
          state.interior.playerY = 60;
          interiorAv.style.top = '60%';
          setTimeout(() => {
            if (interiorAv && interiorAv.parentNode) interiorAv.classList.remove('spawn-walk-up');
          }, 400);
        }, 40);
      });
    });
  }, overworldStepMs);
}

function renderInterior() {
  const intr = state.interior;
  if (!intr) return;
  const sec = intr.sec;
  const room = $('sectorRoom');
  $('sectorBg').style.backgroundImage = `url('${sec.bg}')`;

  // Update HUD (top-left chrome)
  $('hudSecId').textContent = sec.id;
  $('hudSecNpc').textContent = sec.npc;
  $('hudSecRole').textContent = sec.role;
  $('sectorHud').style.borderColor = NPC_ACCENT[sec.npc] || 'var(--cyan)';
  $('hudSecNpc').style.color = NPC_ACCENT[sec.npc] || 'var(--gold)';
  refreshInteriorHud();

  // Tear down old interior interactables (re-rendered each enter)
  room.querySelectorAll('.npc-sprite, .terminal-zone, .tool-zone, .door-zone, .player-avatar, .interact-prompt, .sprite-pop').forEach(n => n.remove());
  // Drop any stale #playerAvatar elsewhere in the document (overworld leaves
  // one inside #mapWorld). Duplicate ids made $('playerAvatar') resolve to
  // the hidden overworld sprite, so updateInterior's left/top writes landed
  // off-screen and the visible interior sprite never moved.
  document.querySelectorAll('#playerAvatar').forEach(n => n.remove());

  // NPC at the back of the room. Field-ops sectors (Production, Service,
  // Materials) render a glowing comms terminal — those crew members are
  // out on jobs, you reach them via SMS / email through the terminal.
  // Office sectors render the lead NPC as a visible chibi crew sprite
  // standing at the back of the room. Painted character figures were
  // removed from the bg art in Phase 4 (codex P2: otherwise the TALK
  // nameplate floats over empty floor in character-free rooms).
  const accent = NPC_ACCENT[sec.npc] || '#fde047';
  const isField = FIELD_SECTORS.has(sec.id);
  const npcSpriteSlug = (sec.npc || '').toLowerCase();
  const npcStyle = { left: intr.npcX + '%', top: intr.npcY + '%' };
  if (isField) {
    Object.assign(npcStyle, { borderColor: accent, boxShadow: `0 0 24px ${accent}55` });
  } else if (npcSpriteSlug && npcSpriteSlug !== 'ryujin' && npcSpriteSlug !== 'claude') {
    // RYUJIN + CLAUDE are painted into the bg art (throne, decision
    // hall) so they don't get a free-floating crew sprite overlay.
    npcStyle.backgroundImage = `url('/assets/rpg/sprites/crew/${npcSpriteSlug}.webp')`;
  } else if (npcSpriteSlug === 'claude') {
    // Render the wizard sprite at the NPC slot so the Decisions Hall
    // has a visible Claude figure (the materials.webp bg is a generic
    // jade temple interior with no painted character).
    npcStyle.backgroundImage = `url('/assets/rpg/sprites/crew/claude-wizard.webp')`;
  }
  const npc = el('div', {
    class: 'npc-sprite' + (isField ? ' comms-terminal' : ' crew-guest'),
    id: 'npcSprite',
    'data-target-name': sec.npc,
    style: npcStyle,
    onclick: () => {
      if (state.dialogue) return;
      sfxConfirm();
      if (isField) openCommsDialog(sec); else openNpcDialogueTree(sec);
    }
  }, [
    el('div', { class: 'npc-nameplate', text: nameplateLabel(sec, isField), style: { color: accent, borderColor: accent } })
  ]);
  room.appendChild(npc);

  // Guest crew (e.g. Mel + Cat posted in HQ alongside Ryujin). Sprite
  // overlay on the room bg, clickable for a generic Email + Leave dialog.
  // Domain dialogue still lives in each crew member's own sector.
  if (Array.isArray(sec.guests)) {
    sec.guests.forEach(g => {
      const gAccent = NPC_ACCENT[g.npc] || '#fde047';
      const gSpriteId = g.npc.toLowerCase() === 'mel' ? 'mel' : g.npc.toLowerCase();
      const guest = el('div', {
        class: 'npc-sprite crew-guest',
        'data-target-name': g.npc,
        style: {
          left: g.x + '%', top: g.y + '%',
          backgroundImage: `url('/assets/rpg/sprites/crew/${gSpriteId}.webp')`
        },
        onclick: () => {
          if (state.dialogue) return;
          sfxConfirm();
          openGuestDialog(g.npc);
        }
      }, [
        el('div', { class: 'npc-nameplate', text: 'TALK · ' + g.npc, style: { color: gAccent, borderColor: gAccent } })
      ]);
      room.appendChild(guest);
    });
  }

  // Terminal (computer / desk) — opens the stats modal
  const term = el('div', {
    class: 'terminal-zone',
    id: 'termZone',
    style: { left: intr.termX + '%', top: intr.termY + '%' },
    // Per Mac: terminal opens the SECTOR-specific panel directly,
    // not a stats modal that then needs another click. Each sector's
    // href already points to the right cockpit page (sales-cockpit
    // for SALES, admin.html?page=finance for FINANCE, etc.) - HQ is
    // the only one whose panel IS the whole command center, by design.
    onclick: () => { sfxOpen(); window.location.href = sec.href; }
  });
  room.appendChild(term);

  // Tool hotspots — per-sector deep links into the matching command-center
  // surfaces. Walk near + SPACE/Enter opens the tool in the same tab. Each
  // gets a labeled gold-bordered panel; updateInterior toggles .near for
  // visual confirmation when the player is in range.
  (sec.tools || []).forEach((t, i) => {
    const tn = el('div', {
      class: 'tool-zone',
      id: 'toolZone_' + i,
      style: { left: t.x + '%', top: t.y + '%' },
      'data-label': t.label,
      'data-idx': String(i)
    });
    room.appendChild(tn);
  });

  // Door zone (bottom-center) — walk near + SPACE/Enter exits to overworld
  const door = el('div', { class: 'door-zone', id: 'doorZone' });
  room.appendChild(door);

  // Player avatar at spawn — same pixel sprite as overworld, facing up
  // toward the NPC since spawn is at the bottom door.
  const av = el('div', {
    class: 'player-avatar face-up',
    id: 'playerAvatar',
    style: { left: intr.playerX + '%', top: intr.playerY + '%' }
  });
  room.appendChild(av);

  // Auto-talk on first entry disabled. The dialogue blocks player
  // movement (game loop pauses on state.dialogue) which made the room
  // feel "stuck on entry". Player walks in free, sees the painted
  // character + floating TALK label, hits SPACE when near to talk.
  if (state._autoTalkTimer) { clearTimeout(state._autoTalkTimer); state._autoTalkTimer = null; }
  if (!state.save.spoken_to.includes(sec.id)) {
    state.save.spoken_to.push(sec.id);
    persistSave();
  }
}

function updateInterior(dtMs) {
  const intr = state.interior; if (!intr) return;
  // Gamepad stick/dpad OR-ed with held keys, same as the overworld.
  const pd = window.RyujinPad ? RyujinPad.dir : null;
  const held = (a) => state.input[a] || (pd && pd[a]);
  let vx = 0, vy = 0;
  if (held('left'))  vx -= 1;
  if (held('right')) vx += 1;
  if (held('up'))    vy -= 1;
  if (held('down'))  vy += 1;

  if (vx !== 0 || vy !== 0) {
    const len = Math.hypot(vx, vy);
    vx /= len; vy /= len;
    intr.facing = Math.atan2(vy, vx);
    // Pick a cardinal facing for the sprite (the one closest to motion angle)
    const absx = Math.abs(vx), absy = Math.abs(vy);
    intr.facingDir = (absy >= absx) ? (vy < 0 ? 'up' : 'down') : (vx < 0 ? 'left' : 'right');
    const step = INTERIOR_SPEED_PCT_PER_MS * dtMs;
    intr.playerX = clamp(intr.playerX + vx * step, 4, 96);
    intr.playerY = clamp(intr.playerY + vy * step, 4, 98);
    const av = $('playerAvatar');
    if (av) {
      av.style.left = intr.playerX + '%';
      av.style.top  = intr.playerY + '%';
      av.classList.remove('face-up', 'face-down', 'face-left', 'face-right');
      av.classList.add('face-' + intr.facingDir, 'moving');
    }
    maybeFootstep(dtMs);
    // Exiting a sector requires explicit A/Enter at the door prompt, no
    // walk-into-zone auto-exit (per Mac, the player should always confirm
    // a view change, never get teleported out by drift).
  } else {
    const av = $('playerAvatar'); if (av) av.classList.remove('moving', 'step-b');
    // Prime the accumulator so the next walk flips to the step frame on its
    // first footstep instead of showing the rest frame for up to ~240ms.
    _footstepAcc = 240;
  }

  // Recompute near-target each tick
  const dn = Math.hypot(intr.playerX - intr.npcX, intr.playerY - intr.npcY);
  const dt = Math.hypot(intr.playerX - intr.termX, intr.playerY - intr.termY);
  const dd = intr.playerY - DOOR_ZONE_TOP;

  // Guests get their own near-check so keyboard SPACE and the on-screen
  // action button can reach them. Without this, guest sprites would be
  // mouse-click only and SPACE near Mel/Cat in HQ would either no-op or
  // open Ryujin's tree if he was in range. (codex P2)
  let nearGuest = null;
  let nearGuestDist = Infinity;
  if (Array.isArray(intr.sec.guests)) {
    intr.sec.guests.forEach(g => {
      const dg = Math.hypot(intr.playerX - g.x, intr.playerY - g.y);
      if (dg < NPC_INTERACT_R && dg < nearGuestDist) {
        nearGuest = g;
        nearGuestDist = dg;
      }
    });
  }

  let target = null, label = '', tx = 0, ty = 0;
  // Guest beats main NPC when strictly closer; ties go to the main NPC
  // so Ryujin remains the default interaction at the back of the room.
  if (nearGuest && nearGuestDist < dn) {
    target = 'guest';
    label = 'PRESS [SPACE] TO TALK · ' + nearGuest.npc;
    tx = nearGuest.x; ty = nearGuest.y - 11;
    state.nearGuest = nearGuest;
  }
  else if (dn < NPC_INTERACT_R) {
    target = 'npc';
    label = interactPromptLabel(intr.sec, FIELD_SECTORS.has(intr.sec.id));
    tx = intr.npcX; ty = intr.npcY - 11;
    state.nearGuest = null;
  }
  else if (dt < TERM_INTERACT_R) { target = 'terminal'; label = 'PRESS [SPACE] TO READ TERMINAL'; tx = intr.termX; ty = intr.termY - 8; state.nearGuest = null; }
  else {
    // Find the nearest tool hotspot within TOOL_INTERACT_R. Multiple tools
    // may overlap the player's reach if they sit on the same wall — pick
    // the closest so the prompt + interact target is unambiguous.
    let nearTool = null, nearToolDist = Infinity, nearToolIdx = -1;
    (intr.sec.tools || []).forEach((t, i) => {
      const dToTool = Math.hypot(intr.playerX - t.x, intr.playerY - t.y);
      if (dToTool < TOOL_INTERACT_R && dToTool < nearToolDist) {
        nearTool = t; nearToolDist = dToTool; nearToolIdx = i;
      }
    });
    if (nearTool) {
      target = 'tool'; label = 'PRESS [SPACE] TO OPEN ' + nearTool.label;
      tx = nearTool.x; ty = nearTool.y - 8;
      state.nearTool = nearTool;
      state.nearGuest = null;
    }
    else if (dd > -2) { target = 'door'; label = 'PRESS [SPACE] TO EXIT'; tx = 50; ty = DOOR_ZONE_TOP - 4; state.nearGuest = null; state.nearTool = null; }
    else { state.nearGuest = null; state.nearTool = null; }
  }

  if (target !== state.nearTarget) {
    state.nearTarget = target;
    if (target) showInteractPrompt(label, tx, ty); else hideInteractPrompt();
    // Glow only the specific sprite the player is near. data-target-name
    // is set on the main NPC and each guest at render time.
    const nearName = target === 'npc' ? intr.sec.npc
                   : target === 'guest' ? nearGuest.npc
                   : null;
    document.querySelectorAll('.npc-sprite').forEach(n => {
      n.classList.toggle('near', !!nearName && n.dataset.targetName === nearName);
    });
    // Toggle .near on the active tool hotspot so it visually confirms the
    // player is in range. Update _activeToolIdx FIRST so the toggle reads the
    // fresh value on the same transition that flipped target -> tool (codex
    // P3 — otherwise the highlight stays off until the next state change).
    state._activeToolIdx = (target === 'tool') ? (intr.sec.tools || []).indexOf(state.nearTool) : -1;
    document.querySelectorAll('.tool-zone').forEach(n => {
      const idx = parseInt(n.dataset.idx || '-1', 10);
      n.classList.toggle('near', target === 'tool' && idx === state._activeToolIdx);
    });
  }
  // NPC mirrors to face the player when they pass on the left/right side.
  // Small but recognizable touch — the god turns to greet you.
  const npc = $('npcSprite');
  if (npc) {
    const flip = intr.playerX < intr.npcX;
    npc.style.setProperty('--bg-flip', flip ? '-1' : '1');
    // We can't `scaleX(-1)` because the npc-sprite uses translate(-50%,-50%)
    // and its keyframe animation. Instead, mirror via background-position
    // by toggling a data attribute the CSS could read; or scale the inner.
    // Simpler: flip the entire transform by adding/removing a class.
    npc.classList.toggle('face-left', flip);
  }
}

function exitToOverworld() {
  // Cancel any pending first-entry auto-talk timer; otherwise the dialogue
  // would pop on the overworld a moment after a quick exit (B key / button).
  if (state._autoTalkTimer) { clearTimeout(state._autoTalkTimer); state._autoTalkTimer = null; }
  // Also close any open dialogue (comms terminal etc) so the player lands
  // cleanly on the map without a stale dialog stuck open over it.
  if (state.dialogue) { try { closeDialogue(); } catch {} }
  state.interior = null;
  state.nearTarget = null;
  setView('MAP');
  // Prefer the exact pre-entry position so the player walks out exactly
  // where they walked in. Fall back to a collision-safe spawn next to the
  // building if worldReturn would itself collide (defensive — shouldn't
  // happen because worldReturn was a walkable cell, but resize between
  // enter and exit could shift the collision footprint).
  const sec = SECTORS[state.focusedSector];
  const f = sec ? getBuildingFoot(sec) : { hw: 6.5, h: 13 };
  const ret = state.worldReturn || {};
  let nx = (typeof ret.x === 'number') ? ret.x : (sec ? sec.x : 50);
  let ny = (typeof ret.y === 'number') ? ret.y : (sec ? sec.y + 3 : 60);
  if (collidesOverworld(nx, ny) && sec) {
    // Pick the first cardinal direction outside the building that's clear.
    // Buildings are bottom-anchored so the natural exit is just below sec.y.
    const offsets = [
      { dx: 0,           dy:  4 },          // just below door
      { dx: 0,           dy: -f.h - 4 },    // above (clear of building top)
      { dx:  f.hw + 4,   dy: 0 },           // right
      { dx: -f.hw - 4,   dy: 0 },           // left
    ];
    for (const o of offsets) {
      const cx = clamp(sec.x + o.dx, 5, 95);
      const cy = clamp(sec.y + o.dy, 7, 93);
      if (!collidesOverworld(cx, cy)) { nx = cx; ny = cy; break; }
    }
  }
  state.player.x = clamp(nx, 3, 97);
  state.player.y = clamp(ny, 5, 95);
  // Re-sync the tile-step target to the new spawn so the next tick
  // doesn't lerp from a stale target into the spawn cell.
  state.player.targetX = state.player.x;
  state.player.targetY = state.player.y;
  state.player.stepEndsAt = 0;
  hideInteractPrompt();
  state.nearBuilding = null;
  sfxClose();
  // Flash → swap to MAP view → re-render world
  viewFlash(() => { setView('MAP'); renderWorld(); });
}

// Stats terminal (replaces the old static stats panel)
function openSectorTerminalModal(sec) {
  const body = el('div', {}, [el('h2', { text: `${sec.npc} TERMINAL · ${sec.id}` })]);
  body.appendChild(el('div', { class: 'modal-hint', text: sec.role.toUpperCase(), style: { color: NPC_ACCENT[sec.npc], marginBottom: '10px' } }));
  const grid = el('div', { class: 'sector-stats-grid' });
  sectorStatBlocks(sec.id).forEach(b => {
    grid.appendChild(el('div', { class: 'k', text: b.k }));
    grid.appendChild(el('div', { class: 'v', text: String(b.v) }));
  });
  body.appendChild(grid);
  const enterRow = el('div', { class: 'menu-item', onclick: () => { sfxConfirm(); window.location.href = sec.href; } }, [
    el('span', { class: 'arrow', text: '▶' }),
    el('span', { text: 'OPEN LIVE PANEL' })
  ]);
  const closeRow = el('div', { class: 'menu-item', onclick: closeModal }, [
    el('span', { class: 'arrow', text: '▶' }),
    el('span', { text: 'CLOSE [X]' })
  ]);
  body.appendChild(el('div', { style: { marginTop: '14px' } }, [enterRow, closeRow]));
  body.appendChild(el('div', { class: 'modal-hint', text: 'Live panel is the real cockpit page for this pillar.' }));
  openModal(body, [enterRow, closeRow]);
}

function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function anyMoveKeyHeld() { return state.input.up || state.input.down || state.input.left || state.input.right; }

// ═══════════════════════════════════════════════════════════════
// GAME LOOP — requestAnimationFrame driven while view is MAP or
// SECTOR. Auto-pauses while a dialogue or modal is open (input is
// still captured for the menu / dialogue handlers).
// ═══════════════════════════════════════════════════════════════

function startGameLoop() {
  if (state._rafId) return;
  state._lastTick = performance.now();
  const loop = (now) => {
    const dt = Math.min(48, now - state._lastTick); // clamp huge gaps (tab return)
    state._lastTick = now;
    // Movement only happens when not in a dialogue/modal/tool overlay/console
    if (!state.dialogue && !state.modal && !state.toolOverlay && !state.console) {
      if (state.view === 'MAP') updateOverworld(dt);
      else if (state.view === 'SECTOR') updateInterior(dt);
    } else {
      // Stop avatar walk-animation while paused
      const av = $('playerAvatar'); if (av) av.classList.remove('moving', 'step-b');
    }
    state._rafId = requestAnimationFrame(loop);
  };
  state._rafId = requestAnimationFrame(loop);
}
function stopGameLoop() {
  if (state._rafId) { cancelAnimationFrame(state._rafId); state._rafId = null; }
}

// ═══════════════════════════════════════════════════════════════
// DIALOGUE — branching tree per NPC. Each option is either an
// action (`do:`) that returns a follow-up dialogue text, a leaf
// (`leave`), or a navigation (`href`/`modal`).
// ═══════════════════════════════════════════════════════════════

// Build the choice tree for a given NPC. Choices return their own
// follow-up body when selected, then re-enter the same tree so the
// player can ask a second question without re-opening dialogue.
// Wrapper that augments the per-sector dialogue tree with a generic
// "Email <crew>" option whenever the lead NPC has an entry in
// CREW_CONTACTS. Injected immediately before Leave so it sits at the
// bottom of the choices but above the dismiss.
function buildDialogueChoices(sec) {
  const base = _buildSectorChoices(sec);
  const c = CREW_CONTACTS[sec.npc];
  if (c && c.email) {
    const leaveIdx = base.findIndex(ch => ch.kind === 'leave');
    const emailChoice = { label: `Email ${c.name} (${c.email})`, kind: 'extern', href: gmailComposeUrl(c.email) };
    base.splice(leaveIdx >= 0 ? leaveIdx : base.length, 0, emailChoice);
  }
  return base;
}

function _buildSectorChoices(sec) {
  const s = state.snapshot || {};
  const rev = s.revenue || {};
  const t = s.tickets || {};
  const pipe = s.pipeline || {};
  const ads = s.metaAds || {};
  const brief = s.briefing_morning || {};
  const leads = s.leads || {};
  const alerts = s.alerts || [];

  const enterPanel = { label: `Open ${sec.id} live panel`, kind: 'href', href: sec.href };
  const leave      = { label: 'Leave',                    kind: 'leave', danger: true };

  switch (sec.id) {
    case 'HQ': {
      const top3 = brief.top3 || [];
      return [
        { label: 'Today\'s briefing', kind: 'reply',
          body: `Status: ${(brief.status || 'unknown').toUpperCase()}. ${top3.length ? top3.length + ' priority items flagged.' : 'Nothing flagged.'}` },
        { label: 'Top 3 priorities', kind: 'reply',
          body: top3.length ? top3.slice(0,3).map((q,i) => `${i+1}. ${q.action || q.title || 'priority ' + (i+1)}`).join('\n') : 'Nothing flagged right now.' },
        { label: 'Open the quest log', kind: 'modal', modal: 'quests' },
        enterPanel,
        leave
      ];
    }
    case 'SALES': {
      const signed = Math.round((rev.signedRevenue || 0) / 1000);
      const pipeVal = Math.round((pipe.totalValue || 0) / 1000);
      const top = (pipe.top5_deals || [])[0];
      return [
        { label: 'How is the pipeline?', kind: 'reply',
          body: `Pipeline holds $${pipeVal}K across ${pipe.openDeals || 0} open deals. Closed $${signed}K month-to-date.` },
        { label: 'Top deal right now', kind: 'reply',
          body: top ? `${top.customer || top.name || 'top deal'} · ${fmt$(top.value)}` : 'No open deals in pipeline.' },
        { label: 'New leads this week', kind: 'reply',
          body: `${leads.thisWeek || 0} new leads this week, ${leads.total || 0} all-time.` },
        enterPanel,
        leave
      ];
    }
    case 'PRODUCTION': {
      const byStat = t.byStatus || {};
      const active = byStat.active || 0;
      const open = byStat.open || 0;
      const overdue = t.overdueCount || 0;
      return [
        { label: 'Active jobs right now', kind: 'reply',
          body: `${active} active · ${open} open · ${overdue} overdue. ${overdue > 20 ? "We're swamped, boss." : overdue > 5 ? 'Need to catch up a bit.' : 'Workload steady.'}` },
        { label: 'Who has the most overdue?', kind: 'reply',
          body: bottleneckAssignee() },
        { label: 'Open production cockpit', kind: 'href', href: sec.href },
        leave
      ];
    }
    case 'SERVICE': {
      const byStat = t.byStatus || {};
      const active = byStat.active || 0;
      const today = (t.activeToday || []).length;
      return [
        { label: 'Dispatch board status', kind: 'reply',
          body: `${active} active calls, ${today} on dispatch today.` },
        { label: 'Unassigned tickets', kind: 'reply',
          body: `${(t.byAssignee && t.byAssignee.Unassigned) || 0} unassigned tickets in queue.` },
        enterPanel,
        leave
      ];
    }
    case 'CUSTOMER': {
      const totalTix = t.total || 0;
      const recent = (rev.recentActivity || []).slice(0,3);
      return [
        { label: 'Customer pulse', kind: 'reply',
          body: `${totalTix} tickets open across all customers right now.` },
        { label: 'Recent activity (top 3)', kind: 'reply',
          body: recent.length ? recent.map(r => `· ${(r.customer || 'customer')}, ${(r.action || 'event')}`).join('\n') : 'No recent customer activity in current snapshot.' },
        enterPanel,
        leave
      ];
    }
    case 'FINANCE': {
      const signed = Math.round((rev.signedRevenue || 0) / 1000);
      const pend = Math.round((rev.pendingRevenue || 0) / 1000);
      const adRoi = brief.kpiScouter && brief.kpiScouter.adROI;
      return [
        { label: 'Show me the money (MTD)', kind: 'reply',
          body: `Signed $${signed}K, pending $${pend}K month-to-date.` },
        { label: 'Ad ROI right now', kind: 'reply',
          body: adRoi != null ? `Ad ROI ${adRoi}.` : 'Ad ROI signal not present in this snapshot.' },
        { label: 'Open finance dashboard', kind: 'href', href: sec.href },
        leave
      ];
    }
    case 'ADMIN': {
      const watchdog = alerts.find(a => /watchdog|cron/i.test(String(a)));
      const stale = alerts.find(a => /stale/i.test(String(a)));
      return [
        { label: 'Watchdog status', kind: 'reply',
          body: watchdog ? watchdog : 'Watchdog clean. Cron firing as scheduled.' },
        { label: 'Any stale data?', kind: 'reply',
          body: stale ? stale : 'No stale data flagged. Snapshot is current.' },
        { label: 'Active Claude sessions', kind: 'reply',
          body: state.ccSessions.length ? state.ccSessions.map(c => `· ${c.user_label || 'Claude'} ${c.last_tool || 'idle'}`).join('\n') : 'No active Claude Code sessions right now.' },
        { label: 'Open admin console', kind: 'href', href: sec.href },
        leave
      ];
    }
    case 'MIT': {
      const top3 = brief.top3 || [];
      // t.overdueCount is the tenant-wide overdue total (used by the
      // overworld Production alert pip too). Snapshot does not expose a
      // per-assignee overdue rollup, so label this as the team total
      // rather than "Your overdue" to avoid overstating Mac's queue.
      // Per-assignee filter wires up when t.overdueByAssignee lands.
      const overdue = t.overdueCount || 0;
      const myToday = (t.activeToday || []).filter(x => /macken/i.test(String(x.assignee || ''))).length;
      const pipeSugg = (s.pipelineSuggestions && s.pipelineSuggestions.openCount) || 0;
      const watchdog = alerts.find(a => /watchdog|stale|overdue|alert/i.test(String(a)));
      const top3Body = top3.length
        ? top3.slice(0, 3).map((q, i) => `${i + 1}. ${q.action || q.title || ('priority ' + (i + 1))}`).join('\n')
        : 'The morning brief is clear. Nothing flagged in top-3.';
      return [
        { label: `Today's act-now (${top3.length})`, kind: 'reply', body: top3Body },
        { label: `Team overdue (${overdue})`,
          kind: overdue > 0 ? 'href' : 'reply',
          href: '/admin.html?page=tickets',
          body: overdue > 0 ? null : 'Zero overdue across the team. Plate clear.' },
        { label: `On your plate today (${myToday})`,
          kind: myToday > 0 ? 'href' : 'reply',
          href: '/admin.html?page=tickets',
          body: myToday > 0 ? null : 'Nothing scheduled on your plate today.' },
        { label: `Pipeline suggestions awaiting${pipeSugg ? ' (' + pipeSugg + ')' : ''}`,
          kind: 'href', href: '/admin-pipeline.html' },
        { label: 'Surface alerts', kind: 'reply',
          body: watchdog ? String(watchdog) : 'Watchdog clean. Nothing flagged.' },
        leave
      ];
    }
    case 'MARKETING': {
      const cpl = ads.avgCPL;
      const lw = leads.thisWeek || 0;
      const total = leads.total || 0;
      return [
        { label: 'Lead flow this week', kind: 'reply',
          body: `${lw} new leads this week. ${total} all-time. ${lw < 3 ? 'Time to amplify.' : lw < 8 ? 'Steady channel.' : 'Channel singing.'}` },
        { label: 'Cost per lead', kind: 'reply',
          body: cpl != null ? `Average CPL $${cpl.toFixed(2)} across active campaigns.` : 'CPL not present in this snapshot.' },
        { label: 'Active campaigns', kind: 'reply',
          body: `${ads.activeCampaigns || 0} active campaigns.` },
        { label: 'Open marketing dashboard', kind: 'href', href: sec.href },
        leave
      ];
    }
  }
  return [enterPanel, leave];
}

function bottleneckAssignee() {
  const t = (state.snapshot && state.snapshot.tickets) || {};
  const byA = t.byAssignee || {};
  let max = 0, who = null;
  Object.keys(byA).forEach(name => { if ((byA[name] || 0) > max) { max = byA[name]; who = name; } });
  return who ? `${who} has the heaviest load (${max} tickets).` : 'No assignee breakdown in current snapshot.';
}

// Guest crew dialog. Used when the player talks to a crew member who is
// posted in a sector that isn't their own station (e.g. Mel + Cat in HQ

// own sector; this is a lightweight "hi, email me" interaction so the
// player can reach out without leaving the room they're in.
function openGuestDialog(npc) {
  const c = CREW_CONTACTS[npc];
  if (!c) return;
  const accent = NPC_ACCENT[npc] || '#f4c95d';

// Field-ops comms terminal dialog. Renders a dialogue with SMS / Email
// choices that defer to the device's tel: and mailto: handlers - no
// server-side messaging API required. Greys out a channel when the
// crew member's contact field is empty so Mac can see what to fill in.
function openCommsDialog(sec) {
  const c = CREW_CONTACTS[sec.npc] || { name: sec.npc, sms: '', email: '' };
  const accent = NPC_ACCENT[sec.npc] || '#f4c95d';

  // When email is missing (e.g. Pavanjot today), the dialog still

  const footer = c.email ? '' : `\n\n(${c.name} has no workspace email configured yet - add to CREW_CONTACTS when their account lands.)`;
  const body = `${c.name} is in the field. Reach them by email - the message opens a Gmail compose tab so the game stays running.` + footer;
  const choices = [];

  choices.push({ label: 'Leave', kind: 'leave', danger: true });

    speaker: 'COMMS · ' + sec.id,

  });

function openNpcDialogueTree(sec, options) {
  const speaker = sec.npc;
  const body = (options && options.body) || godLine(sec);
  const choices = buildDialogueChoices(sec);
  openDialogue({
    speaker,
    accent: NPC_ACCENT[speaker],
    portrait: NPC_PORTRAIT(speaker),
    body,
    choices,
    choiceIdx: 0,

  });
}

// Legacy single-line talk (kept so existing code paths still work)
function talkToNpc(sec) {
  if (FIELD_SECTORS.has(sec.id)) openCommsDialog(sec);
  else openNpcDialogueTree(sec);
}
function openDialogue(d) {
  state.dialogue = Object.assign({ revealed: 0, choiceIdx: 0 }, d);
  $('dialogue').classList.add('open');
  document.body.classList.add('dialogue-open');
  // Speech bubble above the painted speaker (sector interior only).
  // Position is sec.talk if set, else slightly above intr.npcX/Y.
  spawnSpeechBubble();
  $('dialogueSpeaker').textContent = d.speaker;
  $('dialogueSpeaker').style.color = d.accent || '#fde047';
  $('dialogueSpeaker').style.borderColor = d.accent || 'var(--gold)';
  $('dialogueBody').textContent = '';
  $('dialogueAdvance').style.display = 'none';
  $('dialogueChoices').classList.remove('show');
  $('dialogueChoices').textContent = '';
  if (d.portrait) {
    $('dialoguePortrait').style.display = 'block';
    $('dialoguePortraitImg').src = d.portrait;
    attachPortraitFallback($('dialoguePortraitImg'));
  } else {
    $('dialoguePortrait').style.display = 'none';
  }
  // Start typewriter; on completion, either show advance-arrow or branching choices
  if (state._typewriterTimer) clearInterval(state._typewriterTimer);
  state._typewriterTimer = setInterval(() => {
    if (!state.dialogue) { clearInterval(state._typewriterTimer); return; }
    state.dialogue.revealed += 2;
    const visible = state.dialogue.body.slice(0, state.dialogue.revealed);
    $('dialogueBody').textContent = visible;
    if (state.dialogue.revealed % 4 === 0) sfxChatter(state.dialogue.speaker);
    if (state.dialogue.revealed >= state.dialogue.body.length) {
      clearInterval(state._typewriterTimer);
      onDialogueBodyComplete();
    }
  }, 24);
}

function onDialogueBodyComplete() {
  if (!state.dialogue) return;
  setSpeechBubbleDone();   // stop the bouncing once the speaker finishes
  if (state.dialogue.choices && state.dialogue.choices.length) {
    renderDialogueChoices();
  } else {
    $('dialogueAdvance').style.display = 'block';
  }
}

function renderDialogueChoices() {
  const box = $('dialogueChoices');
  box.textContent = '';
  const choices = state.dialogue.choices || [];
  choices.forEach((c, i) => {
    const row = el('button', {
      type: 'button',
      class: 'dialogue-choice' + (c.danger ? ' danger' : '') + (i === state.dialogue.choiceIdx ? ' focused' : ''),
      onclick: (e) => { e.stopPropagation(); selectChoice(i); }
    }, [
      el('span', { class: 'num', text: String(i + 1) }),
      el('span', { text: c.label })
    ]);
    box.appendChild(row);
  });
  box.classList.add('show');
  $('dialogueAdvance').style.display = 'none';
}

function moveChoiceFocus(delta) {
  if (!state.dialogue || !state.dialogue.choices) return;
  const n = state.dialogue.choices.length;
  state.dialogue.choiceIdx = (state.dialogue.choiceIdx + delta + n) % n;
  document.querySelectorAll('.dialogue-choice').forEach((node, i) => node.classList.toggle('focused', i === state.dialogue.choiceIdx));
  sfxStep();
}

function selectChoice(idx) {
  if (!state.dialogue || !state.dialogue.choices) return;
  const c = state.dialogue.choices[idx];
  if (!c) return;
  sfxConfirm();
  if (c.kind === 'leave') {
    closeDialogue();
  } else if (c.kind === 'href') {
    closeDialogue();
    window.location.href = c.href;
  } else if (c.kind === 'extern') {
    // External tab (Gmail compose, etc.) - keep dialogue open so the
    // player can flip back to the game after sending. noopener for the
    // standard target=_blank security hygiene.
    window.open(c.href, '_blank', 'noopener,noreferrer');
  } else if (c.kind === 'modal') {
    closeDialogue();
    if (c.modal === 'quests') openQuestModal();
    else if (c.modal === 'party') openPartyModal();
    else if (c.modal === 'inventory') openInventoryModal();
    else if (c.modal === 'settings') openSettingsModal();
  } else if (c.kind === 'reply') {
    // Replace body with the reply, then re-show same choice list so the
    // player can ask another question without re-opening.
    const sec = state.dialogue.sec;
    const speaker = state.dialogue.speaker;
    state.dialogue.body = c.body;
    state.dialogue.revealed = 0;
    state.dialogue.choiceIdx = 0;
    $('dialogueChoices').classList.remove('show');
    $('dialogueChoices').textContent = '';
    $('dialogueBody').textContent = '';
    $('dialogueAdvance').style.display = 'none';
    if (state._typewriterTimer) clearInterval(state._typewriterTimer);
    spawnSpeechBubble();   // restart bouncing dots for the reply
    // Speed up reply typewriter so chained Q&A feels snappy
    state._typewriterTimer = setInterval(() => {
      if (!state.dialogue) { clearInterval(state._typewriterTimer); return; }
      state.dialogue.revealed += 3;
      $('dialogueBody').textContent = state.dialogue.body.slice(0, state.dialogue.revealed);
      if (state.dialogue.revealed % 5 === 0) sfxChatter(state.dialogue.speaker);
      if (state.dialogue.revealed >= state.dialogue.body.length) {
        clearInterval(state._typewriterTimer);
        setSpeechBubbleDone();   // stop bubble bouncing after reply finishes
        // Refresh the choice list so it stays available
        state.dialogue.choices = buildDialogueChoices(sec);
        renderDialogueChoices();
      }
    }, 22);
  }
}

function closeDialogue() {
  state.dialogue = null;
  $('dialogue').classList.remove('open');
  document.body.classList.remove('dialogue-open');
  $('dialogueChoices').classList.remove('show');
  $('dialogueChoices').textContent = '';
  if (state._typewriterTimer) clearInterval(state._typewriterTimer);
  removeSpeechBubble();
}

// Speech bubble helpers. Bubble is animated while text is revealing
// (bouncing dots), then fades / stops bouncing once typewriter
// finishes so the player knows it's their turn to advance/choose.
function spawnSpeechBubble() {
  if (state.view !== 'SECTOR' || !state.interior) return;
  removeSpeechBubble();
  const room = $('sectorRoom'); if (!room) return;
  const intr = state.interior;
  const talk = (intr.sec && intr.sec.talk) || {};
  const tx = (typeof talk.x === 'number') ? talk.x : intr.npcX;
  const ty = (typeof talk.y === 'number') ? talk.y : (intr.npcY - 10);
  const bubble = el('div', { class: 'speech-bubble', id: 'speechBubble', style: { left: tx + '%', top: ty + '%' } });
  bubble.textContent = '...';
  room.appendChild(bubble);
}
function setSpeechBubbleDone() {
  const b = document.getElementById('speechBubble');
  if (b) b.classList.add('done');
}
function removeSpeechBubble() {
  const b = document.getElementById('speechBubble');
  if (b) b.remove();
}
function advanceDialogue() {
  if (!state.dialogue) return;
  if (state.dialogue.revealed < state.dialogue.body.length) {
    // Skip typewriter
    state.dialogue.revealed = state.dialogue.body.length;
    $('dialogueBody').textContent = state.dialogue.body;
    if (state._typewriterTimer) clearInterval(state._typewriterTimer);
    onDialogueBodyComplete();
    sfxAdvance();
  } else if (state.dialogue.choices && state.dialogue.choices.length) {
    // Choices showing: Enter selects current focus
    selectChoice(state.dialogue.choiceIdx);
  } else {
    closeDialogue();
    sfxClose();
  }
}

// ═════ MODALS ═════
function openModal(node, focusable) {

function refreshModalFocus() {

function openMainMenu() {
  const items = [
    { label: 'QUEST LOG', kind: 'quests' },
    { label: 'CREW PARTY', kind: 'party' },
    { label: 'INVENTORY', kind: 'inventory' },
    { label: 'STRATEGIC MAP', kind: 'map' },

    { label: 'EXIT TO COCKPIT', kind: 'exit' },
    { label: 'EXIT TO TITLE', kind: 'title' }
  ];

function handleMenuPick(kind) {
  closeModal();
  if (kind === 'quests') openQuestModal();
  else if (kind === 'party') openPartyModal();
  else if (kind === 'inventory') openInventoryModal();
  else if (kind === 'map') { state.interior = null; setView('MAP'); renderWorld(); }
  else if (kind === 'settings') openSettingsModal();
  else if (kind === 'exit') { try { localStorage.setItem('ry_ui_mode', 'normal'); } catch {} window.location.href = '/command-center.html'; }
  else if (kind === 'title') { setView('TITLE'); enterTitle(); }
}

function openQuestModal() {
  const s = state.snapshot;
  const briefTop = (s && s.briefing_morning && s.briefing_morning.top3) || [];
  const activeToday = (s && s.tickets && s.tickets.activeToday) || [];

  const allQuests = [
    ...briefTop.map((q, i) => ({
      id: 'brief-' + (q.rank || i),
      title: q.action || q.title || ('Priority ' + (i+1)),
      ctx: q.context || q.priority || '',
      pri: (q.priority === 'top_priority' || q.priority === 'urgent') ? 'urgent' : (q.priority === 'high' ? 'high' : 'normal'),
      origin: 'BRIEFING'
    })),
    ...activeToday.slice(0, 6).map(t => ({
      id: 'tix-' + t.id,
      title: t.title || t.id,
      ctx: (t.assignee || 'unassigned') + ' · ' + (t.days_overdue ? t.days_overdue + 'd overdue' : (t.priority || 'normal')),
      pri: (t.priority === 'urgent' || (t.days_overdue || 0) > 7) ? 'urgent' : (t.priority === 'high' ? 'high' : 'normal'),
      origin: 'TICKETS'
    }))
  ].filter(q => !state.save.dismissed_quests.includes(q.id));
