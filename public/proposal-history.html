<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#030611">
<title>Ryujin OS · All Proposals</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
:root{
  --bg-deep:#030611; --glass:rgba(14,22,40,0.78);
  --border:rgba(34,211,238,0.18); --border-hi:rgba(34,211,238,0.4);
  --accent:#22d3ee; --purple:#7c3aed;
  --text:#e0e6f0; --text-dim:rgba(160,190,230,0.62); --text-muted:rgba(140,170,220,0.32);
  --green:#4ade80; --yellow:#facc15; --red:#f87171;
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-deep);color:var(--text);min-height:100vh;padding:14px}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(34,211,238,0.06),transparent 55%),radial-gradient(ellipse at 75% 80%,rgba(124,58,237,0.05),transparent 55%),linear-gradient(180deg,#060a14,#000);pointer-events:none}
body::after{content:'';position:fixed;inset:0;z-index:1;background-image:linear-gradient(rgba(34,211,238,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,0.02) 1px,transparent 1px);background-size:72px 72px;mask-image:radial-gradient(ellipse at center,black 30%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 30%,transparent 85%);pointer-events:none}

.wrap{position:relative;z-index:2;max-width:1200px;margin:0 auto}
.top{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(14px);margin-bottom:14px}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:28px;height:28px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(200,240,255,0.3),rgba(34,211,238,0.22) 40%,rgba(5,15,30,0.8));box-shadow:0 0 12px rgba(34,211,238,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:var(--text-dim);font-weight:500;letter-spacing:2px;margin-left:8px}
.sep{flex:1}
.btn{padding:7px 14px;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:0.62em;font-weight:700;letter-spacing:1.5px;cursor:pointer;border:1px solid;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn.ghost{background:rgba(6,10,20,0.5);color:var(--text-dim);border-color:var(--border)}
.btn.ghost:hover{color:var(--accent);border-color:var(--border-hi);background:rgba(34,211,238,0.06)}
.btn.primary{background:linear-gradient(135deg,rgba(34,211,238,0.3),rgba(34,211,238,0.1));color:var(--accent);border-color:rgba(34,211,238,0.4)}
.btn.primary:hover{background:linear-gradient(135deg,rgba(34,211,238,0.4),rgba(34,211,238,0.2));box-shadow:0 0 14px rgba(34,211,238,0.25)}
.btn.danger{background:rgba(248,113,113,0.1);color:var(--red);border-color:rgba(248,113,113,0.3)}

.hero{padding:30px 20px;text-align:center;margin-bottom:14px}
.hero .eyebrow{font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:4px;color:var(--accent);margin-bottom:14px;text-transform:uppercase}
.hero h1{font-family:'Orbitron',sans-serif;font-size:2.2em;font-weight:900;line-height:1.1;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--text-dim);margin-top:8px;font-size:0.95em}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{padding:14px 16px;background:var(--glass);border:1px solid var(--border);border-radius:var(--radius)}
.stat .lbl{font-family:'Orbitron',sans-serif;font-size:0.56em;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}
.stat .val{font-family:'Orbitron',sans-serif;font-size:1.5em;font-weight:900;margin-top:4px;background:linear-gradient(135deg,#fff 20%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.search{padding:14px 16px;background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search input{flex:1;min-width:200px;background:rgba(6,10,20,0.6);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:0.92em;outline:none}
.search input:focus{border-color:var(--border-hi);box-shadow:0 0 10px rgba(34,211,238,0.12)}
.search select{background:rgba(6,10,20,0.6);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:0.86em;cursor:pointer}

.list{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(14px);overflow:hidden}
.row{display:grid;grid-template-columns:2fr 1.2fr 1fr 1fr 1.8fr;gap:14px;padding:14px 18px;border-bottom:1px solid rgba(34,211,238,0.08);align-items:center;transition:background 0.15s}
.row:last-child{border-bottom:none}
.row:hover{background:rgba(34,211,238,0.03)}
.row.head{font-family:'Orbitron',sans-serif;font-size:0.62em;font-weight:700;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;background:rgba(34,211,238,0.05);border-bottom:1px solid rgba(34,211,238,0.2)}
.row .client-name{font-weight:700;font-size:0.96em}
.row .client-meta{font-size:0.75em;color:var(--text-dim);font-family:'Share Tech Mono',monospace;letter-spacing:0.3px;margin-top:2px}
.row .sys-tier{font-family:'Share Tech Mono',monospace;font-size:0.8em;color:var(--text-dim);letter-spacing:0.8px}
.row .date{font-family:'Orbitron',sans-serif;font-weight:700;font-size:0.82em;color:var(--accent)}
.row .date-rel{font-size:0.72em;color:var(--text-muted);margin-top:2px;font-family:'Share Tech Mono',monospace}
.row .ref{font-family:'Share Tech Mono',monospace;font-size:0.78em;color:var(--purple);letter-spacing:1px}
.row .actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.empty{padding:60px 30px;text-align:center;color:var(--text-muted);font-size:0.95em;line-height:1.7}
.empty a{color:var(--accent);text-decoration:none;font-weight:700}

@media(max-width:820px){
  .row{grid-template-columns:1fr;gap:6px;padding:14px}
  .row.head{display:none}
  .row .actions{justify-content:flex-start;margin-top:8px}
  .stats{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="wrap">

  <div class="top">
    <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN OS <span class="dim">· ALL PROPOSALS</span></div></div>
    <div class="sep"></div>
    <a class="btn ghost" href="sales-proposals.html">← PROPOSALS HUB</a>
    <a class="btn primary" href="sales-proposal.html?skip=1">+ NEW PROPOSAL</a>
  </div>

  <div class="hero">
    <div class="eyebrow">EVERY PROPOSAL · DRAFT + SENT + ACCEPTED</div>
    <h1>All Proposals</h1>
    <p>Every proposal you've built in Ryujin — draft, sent, accepted. Search by client, address, or ref. Click any row to open.</p>
  </div>

  <div class="stats">
    <div class="stat"><div class="lbl">Total</div><div class="val" id="sTotal">0</div></div>
    <div class="stat"><div class="lbl">Drafts</div><div class="val" id="sDrafts">0</div></div>
    <div class="stat"><div class="lbl">Accepted</div><div class="val" id="sAccepted">0</div></div>
    <div class="stat"><div class="lbl">Pipeline Value</div><div class="val" id="sPipe">—</div></div>
  </div>

  <div class="search">
    <input id="searchIn" type="text" placeholder="Search by client name, address, or ref…" oninput="applyFilter()"/>
    <select id="sortIn" onchange="applyFilter()">
      <option value="new">Newest first</option>
      <option value="old">Oldest first</option>
      <option value="client">Client A→Z</option>
      <option value="value">Highest value</option>
    </select>
    <select id="filterIn" onchange="applyFilter()">
      <option value="all">All statuses</option>
      <option value="draft">Drafts only</option>
      <option value="sent">Sent only</option>
      <option value="accepted">Accepted only</option>
    </select>
  </div>

  <div class="list" id="listHost"></div>

</div>

<script>
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function loadSent(){
  try { return JSON.parse(localStorage.getItem('ry_v1_proposals_sent') || '[]'); } catch(e){ return []; }
}
function loadAccepted(){
  try { return JSON.parse(localStorage.getItem('ry_v1_accepted_proposals') || '[]'); } catch(e){ return []; }
}
function saveSent(list){ try { localStorage.setItem('ry_v1_proposals_sent', JSON.stringify(list)); } catch(e){} }

function relDate(iso){
  const d = new Date(iso);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.round(diff/60) + 'm ago';
  if (diff < 86400) return Math.round(diff/3600) + 'h ago';
  if (diff < 604800) return Math.round(diff/86400) + 'd ago';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + (d.getFullYear() !== new Date().getFullYear() ? ', ' + d.getFullYear() : '');
}
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}) + ' · ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

function money(n){ return n ? '$' + Math.round(n/1000) + 'K' : '—'; }

function statusBadge(status){
  const s = String(status || 'draft').toLowerCase();
  const map = {
    draft: { color: '#94a3b8', bg: 'rgba(148,163,184,0.12)', label: 'DRAFT' },
    sent: { color: '#22d3ee', bg: 'rgba(34,211,238,0.14)', label: 'SENT' },
    accepted: { color: '#4ade80', bg: 'rgba(74,222,128,0.14)', label: 'ACCEPTED' },
    signed: { color: '#4ade80', bg: 'rgba(74,222,128,0.14)', label: 'SIGNED' },
    rejected: { color: '#f87171', bg: 'rgba(248,113,113,0.14)', label: 'REJECTED' },
    cancelled: { color: '#f87171', bg: 'rgba(248,113,113,0.14)', label: 'CANCELLED' }
  };
  const m = map[s] || map.draft;
  return `<span style="display:inline-block;padding:3px 9px;background:${m.bg};color:${m.color};font-family:'Share Tech Mono',monospace;font-size:0.62em;font-weight:700;letter-spacing:1.5px;border-radius:5px;border:1px solid ${m.color}33">${m.label}</span>`;
}

function renderStats(all){
  $('sTotal').textContent = all.length;
  $('sDrafts').textContent = all.filter(p => (p.status || 'draft').toLowerCase() === 'draft').length;
  $('sAccepted').textContent = all.filter(p => /accepted|signed/i.test(p.status || '')).length;
  const pipe = all.filter(p => !/accepted|signed|rejected|cancelled/i.test(p.status || ''))
                  .reduce((s,p) => s + (p.value || 0), 0);
  $('sPipe').textContent = pipe ? money(pipe) : '—';
}

function renderList(list){
  const host = $('listHost');
  if (!list.length) {
    host.innerHTML = '<div class="empty">No proposals yet.<br><br><a href="sales-proposal.html?skip=1">Create your first →</a></div>';
    return;
  }
  const rows = list.map((p, i) => {
    const url = p.url || p.proposalUrl || '#';
    return `
      <div class="row" data-idx="${i}" data-status="${esc((p.status||'').toLowerCase())}" data-search="${esc(((p.client||'') + ' ' + (p.refId||'') + ' ' + (p.address||'')).toLowerCase())}">
        <div>
          <div class="client-name">${esc(p.client || '—')}</div>
          <div class="client-meta">${esc(p.refId || '')} ${p.address ? '· ' + esc(p.address) : ''}</div>
        </div>
        <div>${statusBadge(p.status)}</div>
        <div>
          <div class="date">${esc(fmtDate(p.at))}</div>
          <div class="date-rel">${esc(relDate(p.at))}</div>
        </div>
        <div class="ref" style="font-family:'Orbitron',sans-serif;font-weight:800;color:#22d3ee">${money(p.value)}</div>
        <div class="actions">
          <a class="btn primary" href="${esc(url)}" target="_blank" rel="noopener">OPEN</a>
          <button class="btn ghost" onclick="copyLink(this, location.origin + '${esc(url)}')">COPY LINK</button>
        </div>
      </div>`;
  }).join('');
  const head = `<div class="row head"><div>CLIENT</div><div>STATUS</div><div>UPDATED</div><div>VALUE</div><div style="text-align:right">ACTIONS</div></div>`;
  host.innerHTML = head + rows;
}

let CACHED = [];

function applyFilter(){
  const q = ($('searchIn').value || '').toLowerCase();
  const status = $('filterIn').value;
  const sort = $('sortIn').value;
  let list = CACHED.slice();
  if (status !== 'all') list = list.filter(p => new RegExp(status, 'i').test(p.status || ''));
  if (q) list = list.filter(p => ((p.client||'') + ' ' + (p.refId||'') + ' ' + (p.address||'')).toLowerCase().includes(q));
  if (sort === 'old') list.sort((a,b) => new Date(a.at) - new Date(b.at));
  else if (sort === 'client') list.sort((a,b) => (a.client||'').localeCompare(b.client||''));
  else if (sort === 'value') list.sort((a,b) => (b.value||0) - (a.value||0));
  else list.sort((a,b) => new Date(b.at) - new Date(a.at));
  renderList(list);
}

function copyLink(btn, url){
  const ta = document.createElement('textarea');
  ta.value = url;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e){}
  ta.remove();
  const orig = btn.textContent;
  btn.textContent = 'COPIED';
  btn.style.color = 'var(--green)';
  setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1400);
}

function clearHistory(){
  if (!confirm('Delete all sent-proposal history from this machine? This does not affect proposals already received by clients.')) return;
  try { localStorage.removeItem('ry_v1_proposals_sent'); } catch(e){}
  init();
}

async function fetchServerEstimates(){
  try {
    const r = await fetch('/api/estimates?limit=200', { headers: { 'x-tenant-id': 'plus-ultra' } });
    if (!r.ok) return [];
    const { estimates } = await r.json();
    if (!Array.isArray(estimates)) return [];
    return estimates.map(e => {
      const pkgs = e.calculated_packages || {};
      let topVal = 0;
      for (const k in pkgs) { const t = (pkgs[k] || {}).total || 0; if (t > topVal) topVal = t; }
      const selVal = (pkgs[e.selected_package] || {}).total || topVal;
      return {
        at: e.updated_at || e.created_at,
        client: e.customer?.full_name || '(no name)',
        refId: 'PU-' + (e.estimate_number || e.id.slice(0, 8).toUpperCase()),
        address: [e.customer?.address, e.customer?.city].filter(Boolean).join(', '),
        tier: e.selected_package || '—',
        value: selVal,
        url: '/proposal-client.html?share=' + encodeURIComponent(e.share_token || ''),
        status: e.status,
        _server: true
      };
    });
  } catch(e) { console.warn('Server estimates fetch failed', e); return []; }
}

async function init(){
  const local = loadSent();
  const server = await fetchServerEstimates();
  const localKeys = new Set(local.map(l => l.refId).filter(Boolean));
  CACHED = [...server.filter(s => !localKeys.has(s.refId)), ...local]
    .sort((a,b) => new Date(b.at) - new Date(a.at));
  renderStats(CACHED);
  renderList(CACHED);
}
init();
</script>

</body>
</html>
