<!DOCTYPE html>
<html lang="en" data-portal-auth="off">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>Ryujin</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;
  --bg-2:#0d1322;
  --card:#11172c;
  --card-grad-a:#161e3a;
  --card-grad-b:#0f1528;
  --border:rgba(255,255,255,0.06);
  --border-hi:rgba(245,236,217,0.25);
  --text:#eaf0fa;
  --text-dim:#9aa8c4;
  --text-muted:#5e6b86;
  --cream:#f5ecd9;
  --cream-hi:#fff6e0;
  --cream-dim:rgba(245,236,217,0.78);
  --success:#7ed99e;
  --danger:#ff6b6b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  padding:max(env(safe-area-inset-top),0) 0 calc(96px + max(env(safe-area-inset-bottom),0)) 0;
  overflow-x:hidden;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(circle at 50% 0%, rgba(245,236,217,0.04), transparent 55%),
    radial-gradient(circle at 50% 95%, rgba(245,236,217,0.03), transparent 50%),
    linear-gradient(180deg, #0e1426 0%, #0a0e1a 100%);
}
.app{max-width:480px;margin:0 auto;padding:14px 18px 8px}

/* ── Top bar ────────────────────────────────────────── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 0 18px}
.brand{font-size:1em;font-weight:700;letter-spacing:3px;color:var(--text)}
.avatar-pill{
  position:relative;width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#22305a,#0d1322);
  border:1.5px solid rgba(245,236,217,0.20);
  display:flex;align-items:center;justify-content:center;
  color:var(--cream);font-weight:700;font-size:0.92em;
  cursor:pointer;overflow:hidden;
}
.avatar-pill img{width:100%;height:100%;object-fit:cover}
.avatar-pill .presence{
  position:absolute;right:-1px;bottom:-1px;width:11px;height:11px;border-radius:50%;
  background:var(--success);border:2px solid var(--bg);
}

/* ── Greeting ───────────────────────────────────────── */
.greet{padding:0 2px 16px}
.greet h1{font-size:2em;font-weight:700;color:var(--text);letter-spacing:-0.02em;line-height:1.05;margin-bottom:6px}
.greet .agent-line{font-size:0.95em;color:var(--text-dim);line-height:1.4}
.greet .agent-line b{color:var(--cream);font-weight:600}

/* ── Hero job card ──────────────────────────────────── */
.job-card{
  background:linear-gradient(140deg,var(--card-grad-a),var(--card-grad-b));
  border:1px solid var(--border);border-radius:22px;
  padding:20px 20px 18px;margin-bottom:14px;position:relative;overflow:hidden;
}
.job-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(245,236,217,0.40) 50%,transparent);
}
.job-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:14px}
.job-head .addr{font-size:1.45em;font-weight:700;letter-spacing:-0.01em;line-height:1.15}
.job-head .customer{font-size:0.92em;color:var(--text-dim);margin-top:3px;font-weight:500}
.job-photo{
  width:78px;height:78px;border-radius:14px;flex-shrink:0;
  background:#1a2240 center/cover no-repeat;
  border:1px solid var(--border);
}
.job-photo.placeholder{
  background:linear-gradient(135deg,#1f2a4a,#141a2e);
  display:flex;align-items:center;justify-content:center;color:var(--text-muted);
}
.job-photo.placeholder svg{width:32px;height:32px;stroke:currentColor;fill:none;stroke-width:1.5}
.job-action{display:flex;align-items:center;gap:8px;font-size:0.95em;color:var(--text);margin-bottom:16px}
.job-action svg{width:16px;height:16px;stroke:var(--cream);fill:none;stroke-width:2.2;flex-shrink:0}
.job-cta-row{display:flex;align-items:center;gap:14px}
.cta-primary{
  flex:1;display:inline-flex;align-items:center;justify-content:center;
  padding:14px 22px;border-radius:999px;
  background:var(--cream);color:#0a0e1a;font-weight:700;font-size:1em;
  border:none;cursor:pointer;letter-spacing:0.2px;
  box-shadow:0 6px 22px rgba(245,236,217,0.18);
}
.cta-primary:active{transform:scale(0.98)}
.cta-secondary{
  display:inline-flex;align-items:center;gap:6px;
  color:var(--text);font-weight:500;font-size:0.95em;
  background:none;border:none;cursor:pointer;padding:8px 4px;
}
.cta-secondary svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}

/* ── Two-card row ───────────────────────────────────── */
.duo{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.duo-card{
  background:linear-gradient(140deg,var(--card-grad-a),var(--card-grad-b));
  border:1px solid var(--border);border-radius:18px;
  padding:14px 16px;cursor:pointer;position:relative;overflow:hidden;
}
.duo-card .lbl{font-size:0.78em;color:var(--text-dim);font-weight:500;margin-bottom:6px;letter-spacing:0.2px}
.duo-card .big{font-size:1.5em;font-weight:700;color:var(--cream);letter-spacing:-0.02em;line-height:1.1}
.duo-card .sub{font-size:0.78em;color:var(--text-muted);margin-top:4px}
.duo-card .top-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.duo-card .pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:999px;
  background:rgba(245,236,217,0.12);color:var(--cream);
  font-size:0.72em;font-weight:600;
}
.duo-card .pill.empty{background:rgba(255,255,255,0.06);color:var(--text-muted)}
.spark{height:30px;margin-top:8px}
.msg-stack{display:flex;align-items:center;gap:0;margin-top:10px;min-height:30px}
.msg-stack .av{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#22305a,#0d1322) center/cover no-repeat;
  border:2px solid var(--card-grad-a);margin-left:-8px;flex-shrink:0;
}
.msg-stack .av:first-child{margin-left:0}
.msg-stack .empty{color:var(--text-muted);font-size:0.82em}

/* ── Tasks card ─────────────────────────────────────── */
.tasks-card{
  background:linear-gradient(140deg,var(--card-grad-a),var(--card-grad-b));
  border:1px solid var(--border);border-radius:18px;
  padding:16px 18px;margin-bottom:14px;
}
.tasks-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.tasks-head .title{font-size:1.05em;font-weight:600}
.tasks-head .count{font-size:0.85em;color:var(--text-dim)}
.tasks-list .row{
  display:flex;align-items:center;gap:12px;padding:10px 0;
  border-top:1px solid var(--border);
}
.tasks-list .row:first-child{border-top:none;padding-top:6px}
.tasks-list .row .check{
  width:22px;height:22px;border-radius:50%;
  border:1.6px solid var(--text-muted);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;background:transparent;
}
.tasks-list .row .check.done{background:var(--cream);border-color:var(--cream)}
.tasks-list .row .check.done::after{content:'';width:8px;height:8px;border-radius:50%;background:#0a0e1a}
.tasks-list .row .body{flex:1;min-width:0}
.tasks-list .row .ttl{font-size:0.95em;color:var(--text);line-height:1.3}
.tasks-list .row .meta{font-size:0.78em;color:var(--text-muted);margin-top:2px}
.tasks-empty{padding:14px 0;color:var(--text-muted);font-size:0.92em;text-align:center}

/* ── Bottom tab bar + mic FAB ───────────────────────── */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;
  padding:10px 14px calc(8px + env(safe-area-inset-bottom)) 14px;
  background:rgba(10,14,26,0.88);
  border-top:1px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  z-index:50;
}
.tabbar-inner{
  max-width:480px;margin:0 auto;
  display:grid;grid-template-columns:64px repeat(5,1fr);gap:0;align-items:end;
}
.mic-cell{display:flex;align-items:center;justify-content:flex-start}
.mic-fab{
  width:56px;height:56px;border-radius:50%;
  background:var(--cream);color:#0a0e1a;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 22px rgba(245,236,217,0.32), 0 0 18px rgba(245,236,217,0.15);
  position:relative;
}
.mic-fab svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2}
.mic-fab::after{
  content:'';position:absolute;inset:-6px;border-radius:50%;
  border:1px solid rgba(245,236,217,0.20);
  animation:mic-ring 2.6s ease-out infinite;
}
@keyframes mic-ring{
  0%{transform:scale(0.9);opacity:0.0}
  20%{opacity:0.55}
  100%{transform:scale(1.55);opacity:0}
}
@media (prefers-reduced-motion: reduce){ .mic-fab::after{ animation:none } }
.mic-fab:active{transform:scale(0.94)}
.tab{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 0 2px;background:transparent;border:none;cursor:pointer;
  color:var(--text-muted);font-family:inherit;text-decoration:none;position:relative;
}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.tab .lbl{font-size:0.7em;font-weight:500;letter-spacing:0.2px}
.tab.active{color:var(--cream)}
.tab .tab-badge{
  position:absolute;top:2px;right:calc(50% - 18px);
  background:var(--cream);color:#0a0e1a;
  min-width:16px;height:16px;border-radius:8px;
  font-size:0.65em;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;
}

/* ── Responsive ─────────────────────────────────────── */
@media (min-width:520px){
  .app{padding-top:24px}
}
@media (max-width:400px){
  .app{padding:14px 14px 8px}
  .greet h1{font-size:1.7em}
  .job-head .addr{font-size:1.25em}
  .job-photo{width:64px;height:64px;border-radius:12px}
  .duo-card .big{font-size:1.3em}
}
</style>
</head>
<body>

<div class="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">RYUJIN</div>
    <button class="avatar-pill" id="avatarBtn" aria-label="Your profile">
      <span id="avatarInitials">—</span>

  <!-- Greeting -->

    </div>

</div>

<!-- Bottom tab bar with mic FAB -->
<nav class="tabbar">
  <div class="tabbar-inner">
    <div class="mic-cell">
      <button class="mic-fab" id="micBtn" aria-label="Ask Ryujin">
        <svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="22"/></svg>
      </button>

      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
      <span class="lbl">Today</span>
    </a>
    <a class="tab" href="#jobs" data-tab="jobs">
      <svg viewBox="0 0 24 24"><path d="M3 12 12 4l9 8"/><path d="M5 10v10h14V10"/></svg>

      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H8l-5 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="lbl">Messages</span>

    <a class="tab" href="#pay" data-tab="pay">
      <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="3"/><line x1="6" y1="12" x2="6.01" y2="12"/><line x1="18" y1="12" x2="18.01" y2="12"/></svg>

<script>
  // This page is always agent mode. Reused agent-mode-shell.js opens the
  // overlay when we fire 'ryujin:auto-launch-agent'.
  document.documentElement.dataset.mode = 'agent';
  (function () {
    const p = new URLSearchParams(location.search);
    const explicit = (p.get('pillar') || '').toLowerCase();
    const r = (p.get('role') || '').toLowerCase();
    const u = (p.get('user_id') || p.get('user') || '').toLowerCase();
    const byRole = { sales: 'sales', service: 'service', crew: 'production', estimator: 'sales' };
    const byUser = { mac: 'hq', mackenzie: 'hq', catherine: 'hq', melodie: 'finance',
                     aj: 'service', darcy: 'sales', diego: 'production', pavanjot: 'production' };
    const pillar = explicit || byRole[r] || byUser[u] || 'hq';
    document.documentElement.dataset.pillar = pillar;
  })();
</script>
<script src="/assets/agent-mode-shell.js" defer></script>

<script>
const TENANT = 'plus-ultra';
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

let userId = null;
let userName = '';
let userInitials = '—';
let isAdmin = false;

async function loadMe(){
  const tok = localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token');
  if (!tok) return;
  try{
    const r = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${tok}` } });
    if (!r.ok) return;
    const me = await r.json();
    userId = me.user_id;
    userName = me.name || '';
    userInitials = (userName.split(/\s+/).map(s=>s[0]||'').slice(0,2).join('') || '—').toUpperCase();
    isAdmin = !!me.is_admin;
  }catch{}
}

function applyGreeting(){
  const h = new Date().getHours();
  const part = h < 5 ? 'evening' : (h < 12 ? 'morning' : (h < 18 ? 'afternoon' : 'evening'));
  const first = (userName.split(/\s+/)[0]) || 'there';
  document.getElementById('greetLine').textContent = `Good ${part}, ${first}`;
  document.getElementById('avatarInitials').textContent = userInitials;
}

async function loadToday(){
  // Pull the day's queue from /api/state. Top item becomes the hero job;
  // rest fall into the Tasks card. If nothing is open, show a clean empty.
  const today = new Date().toISOString().slice(0,10);
  let items = [];
  try{
    const u = (!isAdmin && userId) ? `&user_id=${encodeURIComponent(userId)}` : '';
    const r = await fetch(`/api/state?for_date=${today}${u}`, { headers: { 'x-tenant-id': TENANT } });
    if (r.ok){
      const data = await r.json();
      const quests = (data.quests?.open || []).map(q => ({
        title: q.title || 'Untitled task',
        priority: q.metadata?.urgency || q.priority || 'normal',
        address: q.metadata?.job_address || q.metadata?.address || null,
        customer: q.metadata?.customer_name || null,
        due: q.due_date || q.scheduled_for || null,
      }));
      const briefing = (data.briefing || []).map(b => ({
        title: b.title || 'Briefing item',
        priority: b.priority || 'normal',
      }));
      const seen = new Set();
      items = [...quests, ...briefing].filter(t => {
        if (seen.has(t.title)) return false;
        seen.add(t.title); return true;
      }).sort((a,b) => priRank(a.priority) - priRank(b.priority));
    }
  }catch{}

  renderJobHero(items[0] || null, items.length);
  renderTasks(items.slice(1));
}

function priRank(p){ return p === 'urgent' ? 0 : p === 'high' ? 1 : 2 }

function renderJobHero(top, total){
  const addr = document.getElementById('jobAddr');
  const cust = document.getElementById('jobCustomer');
  const act  = document.getElementById('jobActionText');
  const agent = document.getElementById('agentLine');

  if (!top){
    addr.textContent = 'All caught up';
    cust.textContent = 'No active jobs for today.';
    act.textContent  = 'Ask Ryujin to plan your week.';
    agent.innerHTML  = 'Nothing scheduled — <b>tap the mic</b> to pull next from the board.';
    document.getElementById('startJobBtn').textContent = 'Pull next job';
    return;
  }

  if (top.address){
    addr.textContent = top.address;
    cust.textContent = top.customer || 'Plus Ultra Roofing';
  } else {
    addr.textContent = top.title;
    cust.textContent = top.customer || '';
  }
  act.textContent = top.title;

  const first = (userName.split(/\s+/)[0]) || 'there';
  const label = total === 1 ? 'one thing today' : `${total} things today`;
  agent.innerHTML = `You've got <b>${esc(label)}</b>${top.address ? ` — first stop <b>${esc(top.address)}</b>.` : '.'}`;
}

function renderTasks(rest){
  const list = document.getElementById('taskList');
  const cnt  = document.getElementById('taskCount');
  if (!rest.length){
    cnt.textContent = '0 more';
    list.innerHTML = '<div class="tasks-empty">Nothing else on deck.</div>';
    return;
  }
  cnt.textContent = `${rest.length} more`;
  list.innerHTML = rest.slice(0, 4).map(t => `
    <div class="row">
      <button class="check" aria-label="Mark done"></button>
      <div class="body">
        <div class="ttl">${esc(t.title)}</div>
        ${t.address ? `<div class="meta">${esc(t.address)}</div>` : ''}
      </div>
    </div>
  `).join('');
}

async function loadPay(){
  // No per-user weekly earnings endpoint yet — leave as clean stub.
  // TODO(next session): wire /api/paysheet-mine or sum paysheets by sub_id this week.
  const amount = document.getElementById('payAmount');
  const sub    = document.getElementById('payJobs');
  amount.textContent = '—';
  sub.textContent = 'coming soon';
  // Decorative flat line so the card doesn't look broken.
  const spark = document.getElementById('paySpark');
  spark.innerHTML = '<polyline fill="none" stroke="rgba(245,236,217,0.25)" stroke-width="1.5" points="0,22 24,18 48,20 72,14 96,15 120,8"/>';
}

async function refreshBadge(){
  try{
    const tok = localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token');
    if (!tok) return;
    const r = await fetch('/api/messages?box=unread', {
      headers: { 'Authorization': `Bearer ${tok}`, 'x-tenant-id': TENANT },
    });
    if (!r.ok) return;
    const data = await r.json();
    const count = typeof data.unread_count === 'number' ? data.unread_count : (data.messages?.length || 0);

    const pill = document.getElementById('msgPill');
    const badge = document.getElementById('msgBadge');
    const stack = document.getElementById('msgStack');

    if (count > 0){
      pill.textContent = `${count} new`;
      pill.classList.remove('empty');
      badge.style.display = 'flex';
      badge.textContent = count > 9 ? '9+' : String(count);
      // Show up to 3 sender avatars stacked
      const senders = (data.messages || []).slice(0,3);
      stack.innerHTML = senders.length
        ? senders.map(() => `<span class="av" aria-hidden="true"></span>`).join('')
        : `<span class="empty">${count} unread</span>`;
    } else {
      pill.textContent = '0 new';
      pill.classList.add('empty');
      badge.style.display = 'none';
      stack.innerHTML = '<span class="empty">No unread</span>';
    }

    if ('setAppBadge' in navigator){
      try{
        if (count > 0) await navigator.setAppBadge(count);
        else await navigator.clearAppBadge();
      }catch{}
    }
  }catch{}
}

function summonAgent(){
  document.dispatchEvent(new CustomEvent('ryujin:auto-launch-agent', { detail: { source: 'mobile' } }));
}

function wireTaps(){
  document.getElementById('micBtn').addEventListener('click', summonAgent);
  document.getElementById('startJobBtn').addEventListener('click', summonAgent);
  document.getElementById('directionsBtn').addEventListener('click', () => {
    const addr = document.getElementById('jobAddr').textContent.trim();
    if (addr && addr !== 'All caught up' && addr !== 'No job assigned'){
      window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(addr)}`, '_blank');
    } else {
      summonAgent();
    }
  });
  document.getElementById('payCard').addEventListener('click', () => { location.hash = '#pay' });
  document.getElementById('msgCard').addEventListener('click', () => { location.href = '/messages.html' });
  document.getElementById('avatarBtn').addEventListener('click', () => { location.hash = '#profile' });
}

(async function init(){
  await loadMe();
  applyGreeting();
  wireTaps();
  await Promise.all([loadToday(), loadPay(), refreshBadge()]);
  setInterval(loadToday, 5 * 60 * 1000);
  setInterval(refreshBadge, 60 * 1000);
})();
</script>
