<!DOCTYPE html>
<html lang="en" data-portal-auth="off">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>Ryujin Team</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;
  --bg-2:#0d1322;
  --card:#11172a;
  --card-2:#161e36;
  --border:rgba(34,211,238,0.10);
  --border-hi:rgba(34,211,238,0.32);
  --text:#e6ecf8;
  --text-dim:#9aa8c4;
  --text-muted:#5c6a85;
  --cyan:#22d3ee;
  --cyan-soft:rgba(34,211,238,0.18);
  --gold:#f59e0b;
  --orange:#fb923c;
  --red:#f87171;
  --green:#4ade80;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  padding:max(env(safe-area-inset-top), 0) 0 calc(72px + max(env(safe-area-inset-bottom),0)) 0;
  overflow-x:hidden;
}
.app{max-width:480px;margin:0 auto;padding:12px 16px 8px}

/* ── Top bar ────────────────────────────────────────── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 0 16px}
.brand{display:flex;align-items:center;gap:10px}
.brand-dragon{width:30px;height:30px;border-radius:8px;background-image:url('/assets/archetypes/ryujin-dragon.png');background-size:cover;background-position:center;flex-shrink:0}
.brand-name{font-size:0.95em;font-weight:700;letter-spacing:2.5px;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:14px}
.icon-btn{
  position:relative;width:36px;height:36px;border-radius:50%;
  background:transparent;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-dim);
}
.icon-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.icon-btn .badge{
  position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;
  background:var(--cyan);box-shadow:0 0 8px var(--cyan);
}
.avatar-pill{
  width:38px;height:38px;border-radius:50%;
  border:2px solid var(--cyan);
  background:linear-gradient(135deg,#1a2240,#0d1322);
  display:flex;align-items:center;justify-content:center;
  color:var(--cyan);font-weight:700;font-size:0.85em;
  cursor:pointer;
}

/* ── Hero greeting card ─────────────────────────────── */
.greet-card{
  background:linear-gradient(135deg,var(--card-2),var(--card));
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px 18px 16px;
  display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;
  position:relative;overflow:hidden;
  margin-bottom:18px;
}
.greet-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan) 50%,transparent);opacity:0.4;
}
.greet-text .hello{font-size:0.95em;color:var(--text-dim);margin-bottom:2px}
.greet-text .name{font-size:1.4em;font-weight:700;color:var(--text);line-height:1.15;margin-bottom:6px}
.greet-text .meta{font-size:0.82em;color:var(--cyan);font-weight:500}
.greet-portrait{
  width:96px;height:96px;border-radius:50%;
  background-color:#0a0e1a;
  background-size:cover;background-position:center top;
  border:2px solid var(--cyan);
  box-shadow:0 0 30px rgba(34,211,238,0.35), inset 0 0 24px rgba(34,211,238,0.06);
  position:relative;flex-shrink:0;cursor:pointer;
}
.greet-portrait::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:1px solid rgba(34,211,238,0.18);
  pointer-events:none;
}

/* ── Section heading ────────────────────────────────── */
.section-title{
  font-size:1.05em;font-weight:600;color:var(--text);
  margin:6px 4px 10px;
}
.section-row{display:flex;justify-content:space-between;align-items:center;margin:6px 4px 10px}
.section-row .more{font-size:0.85em;color:var(--text-dim);text-decoration:none}
.section-row .more svg{width:14px;height:14px;vertical-align:-2px;margin-left:4px;stroke:currentColor;fill:none;stroke-width:2}

/* ── Ticket / task card ─────────────────────────────── */
.task-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;margin-bottom:10px;
  display:flex;flex-direction:column;gap:10px;
  cursor:pointer;transition:border-color 0.15s;
}
.task-card:hover{border-color:var(--border-hi)}
.task-card .title-row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.task-card .title{font-size:0.98em;font-weight:600;color:var(--text);line-height:1.3;flex:1;min-width:0}
.task-card .chev{color:var(--text-dim);flex-shrink:0}
.task-card .chev svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.task-card .status-row{display:flex;align-items:center;gap:8px;font-size:0.82em;color:var(--cyan)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.task-card .footer-row{display:flex;justify-content:space-between;align-items:center;font-size:0.82em;color:var(--text-dim)}
.task-card .due{display:flex;align-items:center;gap:6px}
.task-card .due-dot{width:6px;height:6px;border:1.5px solid var(--text-dim);border-radius:50%}
.priority-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:999px;
  background:rgba(245,158,11,0.12);color:var(--gold);
  font-size:0.78em;font-weight:600;
  border:1px solid rgba(245,158,11,0.25);
}
.priority-chip svg{width:11px;height:11px;fill:currentColor}

/* ── Quick schedule strip ───────────────────────────── */
.cal-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;margin-bottom:18px;
}
.cal-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:0;text-align:center;font-size:0.78em;margin-top:8px}
.cal-grid .h{color:var(--text-muted);font-weight:500;padding:6px 0 8px}
.cal-grid .d{padding:8px 0;color:var(--text-dim);position:relative}
.cal-grid .d .dot{display:block;width:5px;height:5px;border-radius:50%;background:var(--cyan);margin:2px auto 0;box-shadow:0 0 4px var(--cyan)}
.cal-grid .d .dot.two{box-shadow:0 0 4px var(--cyan);background:linear-gradient(90deg,var(--cyan) 50%,transparent 50%) right/200% 100%}

/* ── AI Assistant row ───────────────────────────────── */
.ai-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px 18px;margin-bottom:30px;
}
.ai-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ai-head .lbl{font-size:1em;font-weight:600;color:var(--text)}
.ai-head .bubble{
  background:#1a2240;border:1px solid var(--border);
  padding:6px 12px;border-radius:14px;border-top-left-radius:4px;
  font-size:0.78em;color:var(--text-dim);max-width:60%;line-height:1.3;
}
.ai-row{display:flex;justify-content:space-around;align-items:flex-end;gap:10px}
.ai-portrait{
  width:88px;height:88px;border-radius:50%;
  background-color:#0a0e1a;background-size:cover;background-position:center top;
  border:1.5px solid rgba(34,211,238,0.25);
  cursor:pointer;transition:all 0.18s;flex-shrink:0;
}
.ai-portrait:hover, .ai-portrait.active{
  border-color:var(--cyan);box-shadow:0 0 24px rgba(34,211,238,0.35);
  transform:translateY(-2px);
}

/* ── Bottom tab bar ─────────────────────────────────── */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;
  padding:8px 12px calc(8px + env(safe-area-inset-bottom)) 12px;
  background:rgba(10,14,26,0.94);
  border-top:1px solid var(--border);
  backdrop-filter:blur(14px);
  z-index:50;
}
.tabbar-inner{
  max-width:480px;margin:0 auto;
  display:grid;grid-template-columns:repeat(5,1fr);gap:4px;align-items:end;
  position:relative;
}
.tab{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 0 4px;
  background:transparent;border:none;cursor:pointer;
  color:var(--text-muted);font-family:inherit;text-decoration:none;
}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.tab .lbl{font-size:0.72em;font-weight:500}
.tab.active{color:var(--cyan)}
.tab-fab{position:relative}
.tab-fab .fab{
  position:absolute;left:50%;top:-26px;transform:translateX(-50%);
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,#1a2240,#0a0e1a);
  background-image:url('/assets/archetypes/ryujin-dragon.png');background-size:cover;
  border:2px solid var(--cyan);
  box-shadow:0 6px 18px rgba(34,211,238,0.35), 0 0 14px rgba(34,211,238,0.4);
  cursor:pointer;
}

/* Larger screens — center the whole thing nicely */
@media (min-width:600px){
  body{background:radial-gradient(circle at top,#11172a 0%, #0a0e1a 70%) no-repeat fixed}
}
</style>
</head>
<body>

<div class="app">

  <!-- ── Top bar ─────────────────────────────────────── -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-dragon" aria-hidden="true"></div>
      <div class="brand-name">RYUJIN TEAM</div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" aria-label="Notifications" id="notifBtn">
        <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="badge" id="notifBadge" style="display:none"></span>
      </button>
      <button class="avatar-pill" id="avatarBtn" aria-label="Your profile">—</button>
    </div>
  </div>

  <!-- ── Greeting + agent portrait ──────────────────── -->
  <div class="greet-card">
    <div class="greet-text">
      <div class="hello" id="greetHello">Good morning,</div>
      <div class="name" id="greetName">Loading…</div>
      <div class="meta" id="greetMeta">—</div>
    </div>
    <div class="greet-portrait" id="greetPortrait" aria-label="Tap to talk to your agent" role="button" tabindex="0"></div>
  </div>

  <!-- ── Active tasks ───────────────────────────────── -->
  <div class="section-row">
    <div class="section-title" style="margin:0">Active Tasks</div>
    <a class="more" href="/admin-quests.html">View all <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></a>
  </div>
  <div id="taskList">
    <div class="task-card" style="opacity:0.5">
      <div class="title-row"><div class="title">Loading your tasks…</div></div>
    </div>
  </div>

  <!-- ── Quick schedule ─────────────────────────────── -->
  <div class="section-row" style="margin-top:6px">
    <div class="section-title" style="margin:0">Quick Schedule</div>
    <a class="more" href="#" id="schedMore">Open <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></a>
  </div>
  <div class="cal-card">
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- ── AI Assistant ───────────────────────────────── -->
  <div class="section-row" style="margin-top:6px">
    <div class="section-title" style="margin:0">AI Assistant</div>
  </div>
  <div class="ai-card">
    <div class="ai-head">
      <div class="lbl">Pick one:</div>
      <div class="bubble" id="aiBubble">How can I help with your day?</div>
    </div>
    <div class="ai-row">
      <div class="ai-portrait" data-archetype="sage"
           style="background-image:url('/assets/archetypes/sage-bust.png')"
           title="Sage — strategic advisor" role="button" tabindex="0"></div>
      <div class="ai-portrait" data-archetype="sovereign"
           style="background-image:url('/assets/archetypes/sovereign-bust.png')"
           title="Sovereign — decisive operator" role="button" tabindex="0"></div>
      <div class="ai-portrait" data-archetype="caregiver"
           style="background-image:url('/assets/archetypes/caregiver-bust.png')"
           title="Caregiver — service & support" role="button" tabindex="0"></div>
    </div>
  </div>

</div>

<!-- ── Bottom tab bar ───────────────────────────────── -->
<nav class="tabbar">
  <div class="tabbar-inner">
    <a class="tab active" href="#tasks">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="lbl">Tasks</span>
    </a>
    <a class="tab" href="#schedule">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span class="lbl">Schedule</span>
    </a>
    <div class="tab tab-fab">
      <button class="fab" id="centerFab" aria-label="Open agent"></button>
    </div>
    <a class="tab" href="#photos">
      <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <span class="lbl">Photos</span>
    </a>
    <a class="tab" href="#performance">
      <svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      <span class="lbl">Performance</span>
    </a>
  </div>
</nav>

<!-- Reuse the existing mode-switcher + agent shell pipeline so tapping the
     portrait / FAB opens the same Claude-backed agent overlay. -->
<script>
  // Always agent mode on this mobile-first page.
  document.documentElement.dataset.mode = 'agent';
  // Derive pillar from explicit ?pillar=, then ?role= (sales/service/crew),
  // then ?user_id=<slug>, then default to hq.
  (function () {
    const p = new URLSearchParams(location.search);
    const explicit = (p.get('pillar') || '').toLowerCase();
    const r = (p.get('role') || '').toLowerCase();
    const u = (p.get('user_id') || p.get('user') || '').toLowerCase();
    const byRole = { sales: 'sales', service: 'service', crew: 'production', estimator: 'sales' };
    const byUser = { mac: 'hq', mackenzie: 'hq', catherine: 'hq', melodie: 'finance',
                     aj: 'service', darcy: 'sales', diego: 'production', pavanjot: 'production' };
    const pillar = explicit || byRole[r] || byUser[u] || 'hq';
    document.documentElement.dataset.pillar = pillar;
  })();
</script>
<script src="/assets/agent-mode-shell.js" defer></script>

<script>
const TENANT = 'plus-ultra';

function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

const params = new URLSearchParams(location.search);
let userId = null;
let userName = '';
let userInitials = '—';

async function loadMe(){
  const tok = localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token');
  if (!tok) return;
  try{
    const r = await fetch('/api/me',{headers:{'Authorization':`Bearer ${tok}`}});
    if (!r.ok) return;
    const me = await r.json();
    userId = me.user_id;
    userName = me.name || '';
    userInitials = userName.split(/\s+/).map(s=>s[0]||'').slice(0,2).join('').toUpperCase() || '—';
  }catch{}
}

function greet(){
  const h = new Date().getHours();
  const part = h < 5 ? 'Evening' : (h < 12 ? 'morning' : (h < 18 ? 'afternoon' : 'evening'));
  document.getElementById('greetHello').textContent = `Good ${part},`;
  document.getElementById('greetName').textContent = userName || 'there';
  document.getElementById('avatarBtn').textContent = userInitials;
}

function pickGreetPortrait(){
  const pillar = document.documentElement.dataset.pillar || 'hq';
  const map = { hq:'sage', sales:'sovereign', service:'caregiver', production:'sovereign', customer:'caregiver', finance:'sage', marketing:'sage' };
  const a = map[pillar] || 'sage';
  document.getElementById('greetPortrait').style.backgroundImage = `url('/assets/archetypes/${a}-bust.png')`;
}

async function loadTasks(){
  const today = new Date().toISOString().slice(0,10);
  try{
    const u = userId ? `&user_id=${encodeURIComponent(userId)}` : '';
    const r = await fetch(`/api/state?for_date=${today}${u}`,{headers:{'x-tenant-id':TENANT}});
    if (!r.ok) { renderTasks([]); return; }
    const data = await r.json();
    const briefing = data.briefing || [];
    const quests = (data.quests?.open || []).map(q=>({
      title:q.title, body:q.description||'',
      priority:q.metadata?.urgency==='urgent'?'urgent':(q.metadata?.urgency==='high'?'high':'normal'),
      source:q.source_agent || ''
    }));
    renderTasks([...quests, ...briefing].slice(0,6));
    document.getElementById('greetMeta').textContent = `${quests.length + briefing.length} tasks today`;
  }catch{ renderTasks([]); }
}

function renderTasks(items){
  const root = document.getElementById('taskList');
  if (!items.length){
    root.innerHTML = `<div class="task-card" style="opacity:0.7"><div class="title-row"><div class="title">All caught up — no tasks today.</div></div></div>`;
    return;
  }
  root.innerHTML = items.map(t => {
    const pri = (t.priority||'normal').toLowerCase();
    const pill = (pri==='urgent'||pri==='high') ? `<span class="priority-chip"><svg viewBox="0 0 24 24"><path d="M13.5 2L4 14h7v8l9-12h-7z"/></svg> Priority</span>` : '';
    return `
      <div class="task-card">
        <div class="title-row">
          <div class="title">${esc(t.title)}</div>
          <div class="chev"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
        </div>
        <div class="status-row"><span class="status-dot"></span> ${esc(t.source || pri || 'open').replace(/^./,c=>c.toUpperCase())}</div>
        <div class="footer-row">
          <span class="due"><span class="due-dot"></span> Due today</span>
          ${pill}
        </div>
      </div>`;
  }).join('');
}

function renderCalendar(){
  const grid = document.getElementById('calGrid');
  // Two weeks starting Sunday, with dots on a couple of days as decoration.
  const today = new Date();
  const sunday = new Date(today); sunday.setDate(today.getDate() - today.getDay());
  const headers = ['Su','Mo','Tu','We','Th','Fr','Sa','Su'];
  let html = headers.map(h=>`<div class="h">${h}</div>`).join('');
  for (let row=0; row<2; row++){
    for (let col=0; col<8; col++){
      const d = new Date(sunday);
      d.setDate(sunday.getDate() + row*7 + col);
      const dd = String(d.getDate()).padStart(2,'0');
      // Decorative dots: Mon-Tue of the first row look "scheduled" like the mockup
      const dot = (row===0 && (col===1 || col===2)) ? '<span class="dot"></span>' : '';
      html += `<div class="d">${dd}${dot}</div>`;
    }
  }
  grid.innerHTML = html;
}

function wireAgentTriggers(){
  const open = (archetype) => {
    if (archetype) document.documentElement.dataset.pillar = ({
      sage:'hq', sovereign:'sales', caregiver:'service'
    })[archetype] || document.documentElement.dataset.pillar;
    // Hand off to the existing agent shell — it auto-opens on data-mode='agent'.
    document.dispatchEvent(new CustomEvent('ryujin:auto-launch-agent', { detail: { source: 'mobile-tap' } }));
  };
  document.getElementById('greetPortrait').addEventListener('click', () => open());
  document.getElementById('centerFab').addEventListener('click', () => open());
  document.querySelectorAll('.ai-portrait').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.ai-portrait').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      open(el.dataset.archetype);
    });
  });
}

(async function init(){
  await loadMe();
  greet();
  pickGreetPortrait();
  renderCalendar();
  wireAgentTriggers();
  await loadTasks();
  setInterval(loadTasks, 5*60*1000);
})();
</script>

</body>
</html>
