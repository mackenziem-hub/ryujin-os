<!DOCTYPE html>
<html lang="en" data-portal-auth="off">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>Ryujin Team</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;
  --bg-2:#0d1322;
  --card:#11172c;
  --card-grad-a:#161e3a;
  --card-grad-b:#0f1528;
  --border:rgba(255,255,255,0.06);
  --border-hi:rgba(34,211,238,0.3);
  --text:#eaf0fa;
  --text-dim:#9aa8c4;
  --text-muted:#5e6b86;
  --cyan:#22d3ee;
  --cyan-hi:#7be9f7;
  --orange:#fb923c;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}

body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  padding:max(env(safe-area-inset-top),0) 0 calc(86px + max(env(safe-area-inset-bottom),0)) 0;
  overflow-x:hidden;
  position:relative;
}
/* Subtle radial-burst background pattern (like the mockup phone frame edges) */
body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(circle at 50% 30%, rgba(34,211,238,0.06), transparent 55%),
    radial-gradient(circle at 50% 75%, rgba(124,58,237,0.04), transparent 50%);
  pointer-events:none;
}

.app{max-width:480px;margin:0 auto;padding:14px 18px 8px}

/* ── Top bar ────────────────────────────────────────── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 0 22px}
.brand{display:flex;align-items:center;gap:10px}
.brand-dragon{
  width:32px;height:32px;border-radius:8px;
  background-image:url('/assets/archetypes/ryujin-dragon.png');
  background-size:cover;background-position:center;
  flex-shrink:0;
}
.brand-name{font-size:0.95em;font-weight:700;letter-spacing:2.5px;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:14px}
.icon-btn{
  position:relative;width:38px;height:38px;border-radius:50%;
  background:transparent;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-dim);
}
.icon-btn svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.icon-btn .badge{
  position:absolute;top:6px;right:8px;width:8px;height:8px;border-radius:50%;
  background:var(--cyan);box-shadow:0 0 8px var(--cyan);
}
.avatar-pill{
  width:42px;height:42px;border-radius:50%;
  border:2px solid var(--cyan);
  background:linear-gradient(135deg,#1a2240,#0d1322);
  display:flex;align-items:center;justify-content:center;
  color:var(--cyan);font-weight:700;font-size:0.9em;
  cursor:pointer;
}

/* ── Greeting hero card ─────────────────────────────── */
.greet-card{
  background:linear-gradient(140deg,var(--card-grad-a),var(--card-grad-b));
  border:1px solid var(--border);
  border-radius:22px;
  padding:24px 22px;
  margin-bottom:24px;
  display:grid;grid-template-columns:1fr 160px;gap:16px;align-items:center;
  position:relative;overflow:hidden;
}
.greet-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(34,211,238,0.5) 50%,transparent);
}
.greet-text .hello{font-size:1em;color:var(--text-dim);margin-bottom:4px;font-weight:500}
.greet-text .name{font-size:1.6em;font-weight:700;color:var(--text);line-height:1.1;margin-bottom:8px;letter-spacing:-0.01em}
.greet-text .meta{font-size:0.92em;color:var(--cyan);font-weight:600}

/* The dramatic portrait with cyan light rays — the centerpiece. */
.portrait-wrap{
  position:relative;width:160px;height:160px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.portrait-rays{
  position:absolute;inset:-32px;border-radius:50%;
  /* Many narrow conic stripes, rotating slowly */
  background:conic-gradient(from 0deg,
    transparent 0deg,    rgba(34,211,238,0.55) 3deg,   transparent 6deg,
    transparent 14deg,   rgba(34,211,238,0.32) 17deg,  transparent 20deg,
    transparent 28deg,   rgba(34,211,238,0.50) 31deg,  transparent 34deg,
    transparent 44deg,   rgba(34,211,238,0.28) 47deg,  transparent 50deg,
    transparent 58deg,   rgba(34,211,238,0.45) 61deg,  transparent 64deg,
    transparent 72deg,   rgba(34,211,238,0.30) 75deg,  transparent 78deg,
    transparent 88deg,   rgba(34,211,238,0.55) 91deg,  transparent 94deg,
    transparent 104deg,  rgba(34,211,238,0.30) 107deg, transparent 110deg,
    transparent 118deg,  rgba(34,211,238,0.45) 121deg, transparent 124deg,
    transparent 134deg,  rgba(34,211,238,0.28) 137deg, transparent 140deg,
    transparent 148deg,  rgba(34,211,238,0.50) 151deg, transparent 154deg,
    transparent 164deg,  rgba(34,211,238,0.35) 167deg, transparent 170deg,
    transparent 178deg,  rgba(34,211,238,0.55) 181deg, transparent 184deg,
    transparent 194deg,  rgba(34,211,238,0.28) 197deg, transparent 200deg,
    transparent 208deg,  rgba(34,211,238,0.45) 211deg, transparent 214deg,
    transparent 224deg,  rgba(34,211,238,0.32) 227deg, transparent 230deg,
    transparent 238deg,  rgba(34,211,238,0.55) 241deg, transparent 244deg,
    transparent 254deg,  rgba(34,211,238,0.28) 257deg, transparent 260deg,
    transparent 268deg,  rgba(34,211,238,0.45) 271deg, transparent 274deg,
    transparent 284deg,  rgba(34,211,238,0.32) 287deg, transparent 290deg,
    transparent 298deg,  rgba(34,211,238,0.55) 301deg, transparent 304deg,
    transparent 314deg,  rgba(34,211,238,0.28) 317deg, transparent 320deg,
    transparent 328deg,  rgba(34,211,238,0.45) 331deg, transparent 334deg,
    transparent 344deg,  rgba(34,211,238,0.32) 347deg, transparent 350deg,
    transparent 358deg);
  filter:blur(1.5px);
  -webkit-mask-image:radial-gradient(circle, transparent 32%, black 36%, black 78%, transparent 100%);
          mask-image:radial-gradient(circle, transparent 32%, black 36%, black 78%, transparent 100%);
  animation: ry-spin 18s linear infinite;
  opacity:0.85;
  pointer-events:none;
}
@keyframes ry-spin { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }
@media (prefers-reduced-motion: reduce) { .portrait-rays { animation: none } }
.portrait-glow{
  position:absolute;inset:-10px;border-radius:50%;
  background:radial-gradient(circle, rgba(34,211,238,0.55) 0%, rgba(34,211,238,0.15) 35%, transparent 70%);
  filter:blur(6px);
  pointer-events:none;
}
.portrait-disc{
  position:relative;z-index:2;
  width:128px;height:128px;border-radius:50%;
  background-color:#0a0e1a;
  background-size:cover;background-position:center 22%;
  border:2px solid var(--cyan);
  box-shadow:0 0 0 4px rgba(10,14,26,0.85), inset 0 0 30px rgba(34,211,238,0.08);
}

/* Joi-style particle emanation — small cyan motes drift upward from
   behind the disc, fading in/out. Each particle has its own duration,
   delay, and horizontal jitter via custom properties. */
.portrait-particles{
  position:absolute;inset:-30px;border-radius:50%;
  pointer-events:none;z-index:0;overflow:hidden;
  -webkit-mask-image:radial-gradient(circle, transparent 36%, black 42%);
          mask-image:radial-gradient(circle, transparent 36%, black 42%);
}
.portrait-particles .p{
  position:absolute;left:50%;bottom:14%;
  width:3px;height:3px;border-radius:50%;
  background:rgba(34,211,238,0.85);
  box-shadow:0 0 6px rgba(34,211,238,0.8), 0 0 10px rgba(124,58,237,0.4);
  opacity:0;
  animation:portrait-drift var(--dur,5.5s) ease-out infinite;
  animation-delay:var(--delay,0s);
  transform-origin:center;
}
.portrait-particles .p.b{width:2px;height:2px;background:rgba(124,58,237,0.7);box-shadow:0 0 5px rgba(124,58,237,0.6)}
@keyframes portrait-drift{
  0%   { opacity:0; transform:translate(-50%, 0) translateX(0) scale(0.4) }
  12%  { opacity:1 }
  60%  { opacity:0.85 }
  100% { opacity:0; transform:translate(-50%, -190px) translateX(var(--dx,0px)) scale(1.05) }
}
@media (prefers-reduced-motion: reduce){ .portrait-particles .p { animation:none; opacity:0 } }

/* ── Section header ─────────────────────────────────── */
.section-head{
  display:flex;justify-content:space-between;align-items:center;
  margin:6px 4px 12px;
}
.section-head .title{font-size:1.15em;font-weight:600;color:var(--text);letter-spacing:-0.01em}
.section-head .more{
  font-size:0.85em;color:var(--text-dim);text-decoration:none;
  display:inline-flex;align-items:center;gap:4px;
}
.section-head .more svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2}

/* ── Featured ticket card ───────────────────────────── */
.ticket-card{
  background:linear-gradient(140deg,var(--card-grad-a),var(--card-grad-b));
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px 20px 16px;
  margin-bottom:24px;
  position:relative;overflow:hidden;
  cursor:pointer;
}
.ticket-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(34,211,238,0.4) 50%,transparent);
}
.ticket-title-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:6px}
.ticket-title{font-size:1.05em;font-weight:600;color:var(--text);line-height:1.3;flex:1;min-width:0}
.ticket-chev{color:var(--text-dim);flex-shrink:0;display:flex;align-items:center}
.ticket-chev svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}
.ticket-status{display:flex;align-items:center;gap:8px;font-size:0.88em;color:var(--cyan);margin-bottom:14px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.ticket-footer{display:flex;justify-content:space-between;align-items:center}
.ticket-due{display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:0.88em}
.due-ring{width:14px;height:14px;border:1.6px solid var(--text-muted);border-radius:50%}
.priority-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:999px;
  background:rgba(251,146,60,0.15);color:var(--orange);
  font-size:0.85em;font-weight:600;
  border:1px solid rgba(251,146,60,0.3);
}
.priority-pill svg{width:13px;height:13px;fill:currentColor}

.assignee-pill{
  display:inline-flex;align-items:center;
  padding:5px 11px;border-radius:999px;
  background:rgba(34,211,238,0.10);color:var(--cyan);
  font-size:0.78em;font-weight:600;letter-spacing:0.2px;
  border:1px solid rgba(34,211,238,0.25);
}
.assignee-pill.anyone{
  background:rgba(255,255,255,0.05);color:var(--text-dim);
  border-color:rgba(255,255,255,0.08);
}

/* ── Quick schedule card ────────────────────────────── */
.cal-card{
  background:linear-gradient(140deg,var(--card-grad-a),var(--card-grad-b));
  border:1px solid var(--border);border-radius:18px;
  padding:18px 16px 14px;margin-bottom:24px;position:relative;overflow:hidden;
}
.cal-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(34,211,238,0.4) 50%,transparent);
}
.cal-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:0;text-align:center;font-size:0.78em;margin-top:6px}
.cal-grid .h{color:var(--text-muted);font-weight:500;padding:6px 0 10px}
.cal-grid .d{padding:8px 0;color:var(--text-dim);position:relative}
.cal-grid .d .dot{display:block;width:6px;height:6px;border-radius:50%;background:var(--cyan);margin:3px auto 0;box-shadow:0 0 6px var(--cyan)}
.cal-grid .d .dot.two{position:relative}
.cal-grid .d .dot.two::after{
  content:'';position:absolute;left:8px;top:0;width:6px;height:6px;border-radius:50%;
  background:var(--cyan);box-shadow:0 0 6px var(--cyan);
}

/* ── AI Assistant strip ─────────────────────────────── */
.ai-card{
  background:linear-gradient(140deg,var(--card-grad-a),var(--card-grad-b));
  border:1px solid var(--border);border-radius:18px;
  padding:18px 18px 22px;margin-bottom:32px;position:relative;overflow:hidden;
}
.ai-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(34,211,238,0.4) 50%,transparent);
}
.ai-head{
  display:flex;align-items:center;gap:12px;margin-bottom:18px;
  flex-wrap:wrap;
}
.ai-head .lbl{font-size:1.05em;font-weight:600;color:var(--text)}
.ai-bubble{
  background:#1a2240;border:1px solid var(--border);
  padding:8px 14px;border-radius:16px;border-top-left-radius:4px;
  font-size:0.85em;color:var(--text-dim);max-width:65%;line-height:1.35;
}
.ai-row{display:flex;justify-content:space-around;align-items:center;gap:14px}
.ai-portrait{
  width:96px;height:96px;border-radius:50%;
  background-color:#0a0e1a;background-size:cover;background-position:center 18%;
  border:2px solid rgba(34,211,238,0.22);
  cursor:pointer;transition:all 0.2s;flex-shrink:0;
  position:relative;
  /* Subtle "alive" glow that pulses slowly so the trio feels present even
     when there's no active conversation. Each bust offset its phase so they
     don't pulse in unison. */
  animation: ai-breathe 5.4s ease-in-out infinite;
}
.ai-portrait:nth-child(2){ animation-delay: -1.8s }
.ai-portrait:nth-child(3){ animation-delay: -3.6s }
@keyframes ai-breathe {
  0%, 100% { box-shadow: 0 0 0 rgba(34,211,238,0), inset 0 0 0 rgba(34,211,238,0); border-color: rgba(34,211,238,0.22); }
  50%      { box-shadow: 0 0 22px rgba(34,211,238,0.30), inset 0 0 14px rgba(34,211,238,0.05); border-color: rgba(34,211,238,0.45); }
}
.ai-portrait::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:1px solid transparent;transition:border-color 0.2s;
}
.ai-portrait:active, .ai-portrait.active{
  border-color:var(--cyan);
  box-shadow:0 0 26px rgba(34,211,238,0.5);
  animation-play-state: paused;
}
.ai-portrait.active::after{border-color:rgba(34,211,238,0.25)}
@media (prefers-reduced-motion: reduce){ .ai-portrait { animation: none } }

/* ── Bottom tab bar ─────────────────────────────────── */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;
  padding:10px 14px calc(8px + env(safe-area-inset-bottom)) 14px;
  background:rgba(13,17,30,0.92);
  border-top:1px solid var(--border);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  z-index:50;
}
.tabbar-inner{
  max-width:480px;margin:0 auto;
  display:grid;grid-template-columns:1fr 1fr 64px 1fr 1fr;gap:0;align-items:end;
  position:relative;
}
.tab{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 0 2px;
  background:transparent;border:none;cursor:pointer;
  color:var(--text-muted);font-family:inherit;text-decoration:none;
}
.tab svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.tab .lbl{font-size:0.74em;font-weight:500;letter-spacing:0.2px}
.tab.active{color:var(--cyan)}
.tab-spacer{display:flex;justify-content:center;align-items:flex-end;position:relative}
.fab{
  position:absolute;left:50%;bottom:8px;transform:translateX(-50%);
  width:60px;height:60px;border-radius:50%;
  background-color:#0a0e1a;
  background-image:url('/assets/archetypes/ryujin-dragon.png');
  background-size:cover;background-position:center;
  border:2px solid var(--cyan);
  box-shadow:0 6px 22px rgba(34,211,238,0.45), 0 0 18px rgba(34,211,238,0.35);
  cursor:pointer;
}
.fab:active{transform:translateX(-50%) scale(0.94)}

/* iPad / wider — keep the column constrained to a "phone" width */
@media (min-width:520px){
  .app{padding-top:24px}
  body{background:radial-gradient(circle at 50% -10%, #11172c 0%, #0a0e1a 70%) no-repeat fixed}
}
</style>
</head>
<body>

<div class="app">

  <!-- ── Top bar ───────────────────────────────────── -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-dragon" aria-hidden="true"></div>
      <div class="brand-name">RYUJIN TEAM</div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" aria-label="Notifications">
        <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="badge" id="notifBadge"></span>
      </button>
      <button class="avatar-pill" id="avatarBtn" aria-label="Your profile">—</button>
    </div>
  </div>

  <!-- ── Greeting hero ─────────────────────────────── -->
  <div class="greet-card">
    <div class="greet-text">
      <div class="hello" id="greetHello">Good morning,</div>
      <div class="name" id="greetName">Loading…</div>
      <div class="meta" id="greetMeta">—</div>
    </div>
    <div class="portrait-wrap" id="portraitTap" role="button" tabindex="0" aria-label="Tap to talk to your agent">
      <div class="portrait-glow"></div>
      <div class="portrait-rays"></div>
      <div class="portrait-particles" aria-hidden="true">
        <span class="p"  style="--dur:5.2s; --delay:0s;    --dx:-18px; left:42%"></span>
        <span class="p b" style="--dur:6.4s; --delay:0.6s;  --dx:14px;  left:52%"></span>
        <span class="p"  style="--dur:5.8s; --delay:1.2s;  --dx:-8px;  left:48%"></span>
        <span class="p b" style="--dur:6.0s; --delay:1.8s;  --dx:22px;  left:55%"></span>
        <span class="p"  style="--dur:5.4s; --delay:2.4s;  --dx:-26px; left:46%"></span>
        <span class="p"  style="--dur:6.2s; --delay:3.0s;  --dx:10px;  left:50%"></span>
        <span class="p b" style="--dur:5.6s; --delay:3.6s;  --dx:-12px; left:44%"></span>
        <span class="p"  style="--dur:6.0s; --delay:4.4s;  --dx:18px;  left:54%"></span>
      </div>
      <div class="portrait-disc" id="portraitDisc"></div>
    </div>
  </div>

  <!-- ── Active Tickets ─────────────────────────────── -->
  <div class="section-head">
    <div class="title">Active Tickets</div>
    <a class="more" href="/admin-quests.html">View all <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></a>
  </div>
  <div id="ticketSlot">
    <!-- Single featured ticket card, populated by JS. -->
    <div class="ticket-card" style="opacity:0.6">
      <div class="ticket-title-row">
        <div class="ticket-title">Loading…</div>
      </div>
    </div>
  </div>

  <!-- ── Quick Schedule ─────────────────────────────── -->
  <div class="section-head">
    <div class="title">Quick Schedule</div>
    <a class="more" href="#">Open <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></a>
  </div>
  <div class="cal-card">
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- ── AI Assistant ───────────────────────────────── -->
  <div class="ai-card">
    <div class="ai-head">
      <div class="lbl">AI Assistant</div>
      <div class="ai-bubble" id="aiBubble">Need help with this paysheet?</div>
    </div>
    <div class="ai-row">
      <div class="ai-portrait" data-archetype="sage"
           style="background-image:url('/assets/archetypes/sage-bust.png')"
           role="button" tabindex="0" aria-label="Chat with Sage"></div>
      <div class="ai-portrait" data-archetype="sovereign"
           style="background-image:url('/assets/archetypes/sovereign-bust.png')"
           role="button" tabindex="0" aria-label="Chat with Sovereign"></div>
      <div class="ai-portrait" data-archetype="caregiver"
           style="background-image:url('/assets/archetypes/caregiver-bust.png')"
           role="button" tabindex="0" aria-label="Chat with Caregiver"></div>
    </div>
  </div>

</div>

<!-- ── Bottom tab bar ───────────────────────────────── -->
<nav class="tabbar">
  <div class="tabbar-inner">
    <a class="tab active" href="#tickets">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="lbl">Tickets</span>
    </a>

      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>

<script>
  // This page is always agent mode. The reused agent-mode-shell.js will
  // open the overlay when we fire 'ryujin:auto-launch-agent'.
  document.documentElement.dataset.mode = 'agent';
  (function () {
    const p = new URLSearchParams(location.search);
    const explicit = (p.get('pillar') || '').toLowerCase();
    const r = (p.get('role') || '').toLowerCase();
    const u = (p.get('user_id') || p.get('user') || '').toLowerCase();
    const byRole = { sales: 'sales', service: 'service', crew: 'production', estimator: 'sales' };
    const byUser = { mac: 'hq', mackenzie: 'hq', catherine: 'hq', melodie: 'finance',
                     aj: 'service', darcy: 'sales', diego: 'production', pavanjot: 'production' };
    const pillar = explicit || byRole[r] || byUser[u] || 'hq';
    document.documentElement.dataset.pillar = pillar;
  })();
</script>
<script src="/assets/agent-mode-shell.js" defer></script>

<script>
const TENANT = 'plus-ultra';
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

let userId = null;
let userName = '';
let userInitials = '—';
let isAdmin = false;
const USERS_BY_ID = {};  // user_id → { name, role }

async function loadMe(){
  const tok = localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token');
  if (!tok) return;
  try{
    const r = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${tok}` } });
    if (!r.ok) return;
    const me = await r.json();
    userId = me.user_id;
    userName = me.name || '';
    userInitials = (userName.split(/\s+/).map(s=>s[0]||'').slice(0,2).join('') || '—').toUpperCase();
    isAdmin = !!me.is_admin;
  }catch{}
}

async function loadTeam(){
  // Only admins need the user roster (to label each team task by assignee).
  if (!isAdmin) return;
  try{
    const r = await fetch('/api/users', { headers: { 'x-tenant-id': TENANT } });
    if (!r.ok) return;
    const data = await r.json();
    for (const u of (data.users || [])) USERS_BY_ID[u.id] = { name: u.name || '', role: u.role || '' };
  }catch{}
}

function firstName(uid){
  if (!uid) return 'Anyone';
  const u = USERS_BY_ID[uid];
  if (!u) return '';
  return (u.name.split(/\s+/)[0]) || '';
}

function applyGreeting(){
  const h = new Date().getHours();
  const part = h < 5 ? 'evening' : (h < 12 ? 'morning' : (h < 18 ? 'afternoon' : 'evening'));
  document.getElementById('greetHello').textContent = `Good ${part},`;
  // First name only — the mockup uses a single name on its own line.
  const first = (userName.split(/\s+/)[0]) || 'there';
  document.getElementById('greetName').textContent = first;
  document.getElementById('avatarBtn').textContent = userInitials;
}

function applyPortrait(){
  const pillar = document.documentElement.dataset.pillar || 'hq';
  const map = { hq:'sage', finance:'sage', marketing:'sage',
                sales:'sovereign', production:'sovereign',
                service:'caregiver', customer:'caregiver' };
  const archetype = map[pillar] || 'sage';
  document.getElementById('portraitDisc').style.backgroundImage = `url('/assets/archetypes/${archetype}-bust.png')`;
}

async function loadTickets(){
  const today = new Date().toISOString().slice(0,10);
  try{
    // Admins see the whole team's queue (no user_id filter — /api/state
    // returns every briefing_item + open quest for the tenant). Non-admins
    // stay scoped to their own assigned_to + for_user_id rows.
    const u = (!isAdmin && userId) ? `&user_id=${encodeURIComponent(userId)}` : '';
    const r = await fetch(`/api/state?for_date=${today}${u}`, { headers: { 'x-tenant-id': TENANT } });
    if (!r.ok) { renderTickets([]); return; }
    const data = await r.json();
    const quests = (data.quests?.open || []).map(q => ({
      title: q.title || 'Untitled task',
      assigned_to: q.assigned_to || null,
      priority: q.metadata?.urgency || (q.priority === 'urgent' || q.priority === 'high' ? q.priority : 'normal'),
      status: q.status || 'open',
      source: q.source_agent || (q.metadata?.intent || '').replace(/_/g,' '),
      created_at: q.created_at,
    }));
    const briefing = (data.briefing || []).map(b => ({
      title: b.title || 'Briefing item',
      assigned_to: b.for_user_id || null,
      priority: b.priority || 'normal',
      status: 'open',
      source: b.source_agent || 'agent',
      created_at: b.created_at,
    }));
    // Combine, urgent/high first, dedupe by title.
    const seen = new Set();
    const all = [...quests, ...briefing]
      .filter(t => { if (seen.has(t.title)) return false; seen.add(t.title); return true; })
      .sort((a,b) => priorityRank(a.priority) - priorityRank(b.priority));
    renderTickets(all);
  }catch{ renderTickets([]); }
}

function priorityRank(p){
  if (p === 'urgent') return 0;
  if (p === 'high') return 1;
  return 2;
}

function renderTickets(items){
  const total = items.length;
  document.getElementById('greetMeta').textContent = total === 0
    ? 'All caught up'
    : `${total} task${total === 1 ? '' : 's'}${isAdmin ? ' across the team' : ' today'}`;

  const slot = document.getElementById('ticketSlot');
  if (!items.length){
    slot.innerHTML = `
      <div class="ticket-card" style="opacity:0.7">
        <div class="ticket-title-row">
          <div class="ticket-title">No active tickets — you're clear.</div>
        </div>
      </div>`;
    return;
  }

  // Admins see up to 6 cards (team-wide), non-admins see up to 4 of their own.
  const top = items.slice(0, isAdmin ? 6 : 4);
  slot.innerHTML = top.map(t => {
    const status = (t.source || t.status || 'open').replace(/_/g,' ').replace(/^./, c => c.toUpperCase());
    const priority = t.priority === 'urgent' || t.priority === 'high';
    const assignee = isAdmin ? firstName(t.assigned_to) : '';
    const assigneePill = assignee
      ? `<span class="assignee-pill">${esc(assignee)}</span>`
      : (isAdmin ? `<span class="assignee-pill anyone">Team</span>` : '');
    return `
      <div class="ticket-card">
        <div class="ticket-title-row">
          <div class="ticket-title">${esc(t.title)}</div>
          <span class="ticket-chev"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></span>
        </div>
        <div class="ticket-status"><span class="status-dot"></span>${esc(status)}</div>
        <div class="ticket-footer">
          ${assigneePill || `<div class="ticket-due"><span class="due-ring"></span>Due Today</div>`}
          ${priority ? `<span class="priority-pill"><svg viewBox="0 0 24 24"><path d="M13.5 2L4 14h7v8l9-12h-7z"/></svg>Priority</span>` : ''}
        </div>
      </div>`;
  }).join('');
}

function renderCalendar(){
  // Mockup shows 9 day cells per row (Set/Mon/Tu/Te/We/Th/Fr/Fi/Sa).
  // We render the current Sun-thru-next-Sun + 1, two weeks total.
  const grid = document.getElementById('calGrid');
  const today = new Date();
  const sunday = new Date(today); sunday.setDate(today.getDate() - today.getDay());
  const heads = ['Su','Mo','Tu','We','Th','Fr','Sa','Su','Mo'];
  let html = heads.map(h => `<div class="h">${h}</div>`).join('');
  for (let row = 0; row < 2; row++) {
    for (let col = 0; col < 9; col++) {
      const d = new Date(sunday);
      d.setDate(sunday.getDate() + row * 7 + col);
      const dd = String(d.getDate()).padStart(2, '0');
      // Decorative dots on Mon+Tue of the first row (matches mockup placement).
      const dot = (row === 0 && (col === 1 || col === 2)) ? '<span class="dot two"></span>' : '';
      html += `<div class="d">${dd}${dot}</div>`;
    }
  }
  grid.innerHTML = html;
}

function summonAgent(archetype){
  if (archetype) {
    document.documentElement.dataset.pillar = ({
      sage: 'hq', sovereign: 'sales', caregiver: 'service'
    })[archetype] || document.documentElement.dataset.pillar;
  }
  document.dispatchEvent(new CustomEvent('ryujin:auto-launch-agent', { detail: { source: 'mobile' } }));
}

function wireTaps(){
  document.getElementById('portraitTap').addEventListener('click', () => summonAgent());
  document.getElementById('centerFab').addEventListener('click', () => summonAgent());
  document.querySelectorAll('.ai-portrait').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.ai-portrait').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      summonAgent(el.dataset.archetype);
    });
  });
}

// ── Notification badge ──────────────────────────────
// iOS / Android PWA app-icon badge via the Badging API. Polls the unread
// inbox count from /api/messages?box=unread and reflects it on the home
// screen icon when the app is installed standalone. Also paints the in-app
// bell dot in the top bar so users see new mail without leaving this page.
async function refreshBadge(){
  try{
    const tok = localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token');
    if (!tok) return;
    const r = await fetch('/api/messages?box=unread', {
      headers: { 'Authorization': `Bearer ${tok}`, 'x-tenant-id': TENANT },
    });
    if (!r.ok) return;
    const data = await r.json();
    const n = (data.messages || data.unread_count !== undefined ? data.unread_count : (data.messages?.length || 0));
    const count = typeof n === 'number' ? n : (data.messages?.length || 0);
    const bellDot = document.getElementById('notifBadge');
    if (bellDot) bellDot.style.display = count > 0 ? 'block' : 'none';
    if ('setAppBadge' in navigator){
      try{
        if (count > 0) await navigator.setAppBadge(count);
        else await navigator.clearAppBadge();
      }catch{ /* iOS may reject if not in standalone — harmless */ }
    }
  }catch{ /* offline ok */ }
}

(async function init(){
  await loadMe();
  await loadTeam();
  applyGreeting();
  applyPortrait();
  renderCalendar();
  wireTaps();
  await loadTickets();
  await refreshBadge();
  setInterval(loadTickets, 5 * 60 * 1000);
  setInterval(refreshBadge, 60 * 1000);
})();
</script>
