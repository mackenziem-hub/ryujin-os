function render(){
  const rows=filtered();
  document.getElementById('s-assets').textContent=D.rows.length;
  document.getElementById('cnt').textContent=rows.length+' / '+D.rows.length+' shown';
  const out=document.getElementById('out');
  if(!rows.length){out.innerHTML='<div class="empty">No assets match.</div>';return}
  const g=state.grp;
  if(!g){out.innerHTML=TH+rows.map(rowHtml).join('')+'</tbody></table>';return}
  const groups={};rows.forEach(r=>{const key=g==='mo'?(r.m.slice(0,7)||'(no date)'):r[g]||'(none)';(groups[key]=groups[key]||[]).push(r)});
  const keys=Object.keys(groups).sort((a,b)=>g==='mo'?b.localeCompare(a):a.localeCompare(b));
  out.innerHTML=keys.map(k=>{const gr=groups[k];const gb=(gr.reduce((a,r)=>a+r.s,0)/1024).toFixed(1);
    return '<div class="grp">'+k+' <small>('+gr.length+' assets, '+gb+' GB)</small></div>'+TH+gr.map(rowHtml).join('')+'</tbody></table>'}).join('');
}
render();
</script></body></html>
