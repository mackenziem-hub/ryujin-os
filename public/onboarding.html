<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#030611">
<title>Ryujin OS · Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:#000;color:#e0e6f0;position:relative;user-select:none;-webkit-user-select:none}

.bg-dragon{position:fixed;inset:0;z-index:0;background-image:url('assets/grok-image-7faae61d-ab16-4bdd-9cbd-847de42e01db.png');background-size:cover;background-position:center;opacity:0.35;mix-blend-mode:screen;filter:drop-shadow(0 0 40px rgba(34,211,238,0.3))}
.bg-caustic{position:fixed;inset:0;z-index:1;background-image:url('assets/grok-image-13862a83-9822-4cbd-9913-0bf1c615e042.png');background-size:cover;opacity:0.2;mix-blend-mode:screen;pointer-events:none}
.bg-gradient{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse at center,rgba(34,211,238,0.08) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#000 100%);pointer-events:none}
.bg-grid{position:fixed;inset:0;z-index:2;pointer-events:none;background-image:linear-gradient(rgba(34,211,238,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}

.scene{position:relative;z-index:10;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}

.ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:580px;height:580px;border-radius:50%;border:1px solid rgba(34,211,238,0.15);pointer-events:none;animation:ringSpin 24s linear infinite}
.ring.inner{width:420px;height:420px;border-color:rgba(124,58,237,0.2);animation-direction:reverse;animation-duration:18s}
@keyframes ringSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}

.card{position:relative;z-index:5;max-width:680px;width:calc(100% - 40px)}

/* Step indicator */
.steps{display:flex;justify-content:center;gap:6px;margin-bottom:30px}
.step-dot{width:44px;height:4px;border-radius:3px;background:rgba(34,211,238,0.15);transition:all 0.4s}
.step-dot.on{background:linear-gradient(90deg,#22d3ee,#7c3aed);box-shadow:0 0 10px rgba(34,211,238,0.4);width:68px}
.step-dot.done{background:rgba(34,211,238,0.5)}

.badge{display:inline-block;padding:5px 14px;border-radius:20px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);color:#22d3ee;font-family:'Share Tech Mono',monospace;font-size:0.68em;letter-spacing:2px;margin-bottom:18px}

h1{font-family:'Orbitron',sans-serif;font-size:2.6em;font-weight:900;letter-spacing:-0.5px;line-height:1.1;background:linear-gradient(135deg,#ffffff 20%,#22d3ee 55%,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px rgba(34,211,238,0.25));margin-bottom:14px;animation:fadeSlide 0.8s cubic-bezier(.2,.8,.3,1)}
.sub{font-size:1.1em;line-height:1.6;color:rgba(200,220,255,0.72);max-width:560px;margin:0 auto 32px;animation:fadeSlide 0.8s 0.1s cubic-bezier(.2,.8,.3,1) backwards}
.sub b{color:#22d3ee;font-weight:600}

@keyframes fadeSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.hero-ring{position:relative;width:200px;height:200px;margin:0 auto 30px;animation:fadeSlide 1s cubic-bezier(.2,.8,.3,1)}
.hero-orb{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(220,240,255,0.4) 0%,rgba(34,211,238,0.45) 25%,rgba(10,25,50,0.9) 70%,rgba(0,5,15,0.95) 100%);box-shadow:0 0 80px rgba(34,211,238,0.4),0 0 160px rgba(34,211,238,0.2),inset 0 -10px 30px rgba(0,0,0,0.4),inset 0 6px 20px rgba(200,230,255,0.2);animation:heroPulse 3s ease-in-out infinite}
.hero-orb::after{content:'';position:absolute;top:16px;left:40px;width:52px;height:26px;background:rgba(255,255,255,0.3);border-radius:50%;transform:rotate(-22deg);filter:blur(5px)}
@keyframes heroPulse{0%,100%{box-shadow:0 0 80px rgba(34,211,238,0.4),0 0 160px rgba(34,211,238,0.2),inset 0 -10px 30px rgba(0,0,0,0.4),inset 0 6px 20px rgba(200,230,255,0.2)}50%{box-shadow:0 0 100px rgba(34,211,238,0.55),0 0 200px rgba(34,211,238,0.3),inset 0 -10px 30px rgba(0,0,0,0.4),inset 0 6px 20px rgba(200,230,255,0.25)}}
.hero-circ{position:absolute;inset:-12px;border-radius:50%;border:1px solid rgba(34,211,238,0.3);animation:ringSpin 10s linear infinite}
.hero-circ.r2{inset:-30px;border-color:rgba(124,58,237,0.25);animation-direction:reverse;animation-duration:14s}

/* Sector grid preview */
.sector-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:540px;margin:24px auto 0;animation:fadeSlide 0.8s 0.2s cubic-bezier(.2,.8,.3,1) backwards}
.sector-preview{padding:14px 12px;background:rgba(6,12,24,0.7);border:1px solid rgba(34,211,238,0.2);border-radius:12px;backdrop-filter:blur(10px);position:relative;overflow:hidden;transition:all 0.3s}
.sector-preview:hover{border-color:rgba(34,211,238,0.5);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4),0 0 20px rgba(34,211,238,0.15)}
.sector-preview::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#22d3ee,transparent);opacity:0.5}
.sector-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;color:#22d3ee}
.sector-icon.m{background:rgba(124,58,237,0.15);color:#a78bfa;border:1px solid rgba(124,58,237,0.3)}
.sector-icon.s{background:rgba(34,211,238,0.15);color:#22d3ee;border:1px solid rgba(34,211,238,0.3)}
.sector-icon.p{background:rgba(251,146,60,0.15);color:#fb923c;border:1px solid rgba(251,146,60,0.3)}
.sector-icon.pp{background:rgba(74,222,128,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.3)}
.sector-icon.a{background:rgba(74,158,255,0.15);color:#4a9eff;border:1px solid rgba(74,158,255,0.3)}
.sector-icon.d{background:rgba(34,211,238,0.15);color:#22d3ee;border:1px solid rgba(34,211,238,0.3)}
.sector-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.sector-name{font-family:'Orbitron',sans-serif;font-size:0.66em;font-weight:800;letter-spacing:1.5px}
.sector-sub{font-size:0.6em;color:rgba(160,190,230,0.5);margin-top:3px;font-family:'Share Tech Mono',monospace}

/* Controls demo */
.controls-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:560px;margin:24px auto 0;animation:fadeSlide 0.8s 0.2s cubic-bezier(.2,.8,.3,1) backwards}
.ctrl-card{padding:14px 12px;background:rgba(6,12,24,0.7);border:1px solid rgba(34,211,238,0.2);border-radius:12px;backdrop-filter:blur(10px)}
.ctrl-key{display:inline-flex;align-items:center;justify-content:center;min-width:36px;height:28px;padding:0 8px;border-radius:7px;background:rgba(34,211,238,0.12);border:1px solid rgba(34,211,238,0.35);font-family:'Orbitron',sans-serif;font-weight:800;font-size:0.7em;color:#22d3ee;letter-spacing:0.5px;box-shadow:inset 0 -2px 0 rgba(0,0,0,0.3);margin-bottom:8px}
.ctrl-what{font-size:0.68em;color:rgba(200,220,255,0.7);line-height:1.45}

/* Buttons */
.actions{display:flex;gap:10px;justify-content:center;margin-top:34px}
.btn{padding:13px 30px;border-radius:11px;font-family:'Orbitron',sans-serif;font-weight:800;font-size:0.76em;letter-spacing:2.5px;cursor:pointer;border:1px solid;transition:all 0.25s;display:inline-flex;align-items:center;gap:8px}
.btn.primary{background:linear-gradient(135deg,#22d3ee,#0891b2);color:#000;border-color:#22d3ee;box-shadow:0 0 30px rgba(34,211,238,0.35),0 4px 20px rgba(0,0,0,0.4)}
.btn.primary:hover{box-shadow:0 0 50px rgba(34,211,238,0.55),0 6px 28px rgba(0,0,0,0.5);transform:translateY(-2px)}
.btn.ghost{background:rgba(6,12,24,0.6);color:rgba(200,220,255,0.75);border-color:rgba(34,211,238,0.25)}
.btn.ghost:hover{background:rgba(34,211,238,0.08);color:#e0e6f0;border-color:rgba(34,211,238,0.5)}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}

/* Footer hint */
.foot{position:fixed;bottom:24px;left:0;right:0;text-align:center;z-index:5;font-family:'Share Tech Mono',monospace;font-size:0.62em;color:rgba(160,190,230,0.35);letter-spacing:2px}
.foot kbd{display:inline-block;padding:2px 8px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);border-radius:4px;color:#22d3ee;margin:0 4px;font-family:inherit}

/* Scene transitions */
.scene-inner{transition:opacity 0.4s, transform 0.4s}
.scene-inner.fading{opacity:0;transform:translateY(-10px)}
</style>
</head>
<body>

<script>
// Auth guard — when deployed, require login first
(function(){
  try {
    if (window.parent !== window || location.protocol === 'file:') return;
    const token = localStorage.getItem('ryujin_token');
    if (!token) { window.location.href = '/login.html'; }
  } catch(e){}
})();
</script>
<div class="bg-dragon"></div>
<div class="bg-caustic"></div>
<div class="bg-gradient"></div>
<div class="bg-grid"></div>

<div class="ring"></div>
<div class="ring inner"></div>

<div class="scene">

  <div class="steps" id="steps">
    <div class="step-dot on"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
  </div>

  <div class="card">
    <div class="scene-inner" id="sceneInner">
      <!-- rendered by JS -->
    </div>
  </div>

</div>

<div class="foot">
  Press <kbd>ENTER</kbd> or <kbd>SPACE</kbd> to continue &nbsp;\u00B7&nbsp; <kbd>ESC</kbd> to skip
</div>

<script>
const scenes = [
  {
    badge: 'RYUJIN OS',
    orb: true,
    title: 'Welcome to your operating system.',
    sub: 'Ryujin is the first business-in-a-box with <b>native AI</b>. Not a spreadsheet, not a dashboard \u2014 a system that thinks ahead and tells you what to do next.',
    primary: 'BEGIN',
    skip: 'SKIP INTRO'
  },
  {
    badge: 'SIX SECTORS',
    title: 'Everything your business needs, mapped.',
    sub: 'Your whole operation runs through six sectors. Click to enter. <b>Each one has its own tools</b> \u2014 but the dragon handles the hard parts.',
    grid: true,
    primary: 'NEXT',
    skip: 'SKIP'
  },
  {
    badge: 'CONTROLS',
    title: 'Three ways to fly it.',
    sub: 'Mouse, keyboard, or Xbox controller. All fluent. <b>Point and click for fast. Controller for couch-level strategy.</b>',
    controls: true,
    primary: 'NEXT',
    skip: 'SKIP'
  },
  {
    badge: 'READY',
    orb: true,
    title: 'The storm watches. Ready when you are.',
    sub: 'Ryujin is already loaded with your business data. Partridge is waiting on a call. Peach needs a proposal by Saturday. <b>Let the dragon show you where to start.</b>',
    primary: 'ENTER THE OS',
    skip: ''
  }
];

let idx = 0;
const inner = document.getElementById('sceneInner');
const stepsEl = document.getElementById('steps');

function render(){
  const s = scenes[idx];
  const dots = stepsEl.querySelectorAll('.step-dot');
  dots.forEach((d, i) => { d.classList.toggle('on', i === idx); d.classList.toggle('done', i < idx); });

  const sectorsHTML = s.grid ? `
    <div class="sector-grid">
      <div class="sector-preview"><div class="sector-icon d"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></div><div class="sector-name">DASHBOARD</div><div class="sector-sub">live AI box</div></div>
      <div class="sector-preview"><div class="sector-icon m"><svg viewBox="0 0 24 24"><path d="M3 11l18-8-8 18-2-8-8-2z"/></svg></div><div class="sector-name">MARKETING</div><div class="sector-sub">ads \u00B7 content</div></div>
      <div class="sector-preview"><div class="sector-icon s"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div class="sector-name">SALES</div><div class="sector-sub">pipeline \u00B7 proposals</div></div>
      <div class="sector-preview"><div class="sector-icon p"><svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/></svg></div><div class="sector-name">PRODUCTION</div><div class="sector-sub">crews \u00B7 jobs</div></div>
      <div class="sector-preview"><div class="sector-icon pp"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="sector-name">POST-PROD</div><div class="sector-sub">close-out \u00B7 reviews</div></div>
      <div class="sector-preview"><div class="sector-icon a"><svg viewBox="0 0 24 24"><path d="M12 2l7 4v6c0 5-3.5 9-7 10-3.5-1-7-5-7-10V6l7-4z"/></svg></div><div class="sector-name">ADMIN</div><div class="sector-sub">pricing \u00B7 team</div></div>
    </div>` : '';

  const controlsHTML = s.controls ? `
    <div class="controls-grid">
      <div class="ctrl-card"><span class="ctrl-key">CLICK</span><div class="ctrl-what">Enter a sector or system</div></div>
      <div class="ctrl-card"><span class="ctrl-key">SCROLL</span><div class="ctrl-what">Snap between 3 zoom levels</div></div>
      <div class="ctrl-card"><span class="ctrl-key">\u2190 \u2192</span><div class="ctrl-what">Rotate between panels</div></div>
      <div class="ctrl-card"><span class="ctrl-key">ESC</span><div class="ctrl-what">Back out one level</div></div>
      <div class="ctrl-card"><span class="ctrl-key">RIGHT-CLICK</span><div class="ctrl-what">Also backs out</div></div>
      <div class="ctrl-card"><span class="ctrl-key">F</span><div class="ctrl-what">Fullscreen toggle</div></div>
      <div class="ctrl-card"><span class="ctrl-key">A</span><div class="ctrl-what">Controller: select</div></div>
      <div class="ctrl-card"><span class="ctrl-key">B</span><div class="ctrl-what">Controller: back</div></div>
    </div>` : '';

  const orbHTML = s.orb ? `
    <div class="hero-ring">
      <div class="hero-circ"></div>
      <div class="hero-circ r2"></div>
      <div class="hero-orb"></div>
    </div>` : '';

  inner.innerHTML = `
    ${orbHTML}
    <div class="badge">${s.badge}</div>
    <h1>${s.title}</h1>
    <div class="sub">${s.sub}</div>
    ${sectorsHTML}
    ${controlsHTML}
    <div class="actions">
      ${s.skip ? `<button class="btn ghost" onclick="skip()">${s.skip}</button>` : ''}
      <button class="btn primary" onclick="nextScene()">${s.primary}<svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></button>
    </div>
  `;
}

function nextScene(){
  if (idx >= scenes.length - 1) { finish(); return; }
  inner.classList.add('fading');
  setTimeout(() => {
    idx++;
    render();
    inner.classList.remove('fading');
  }, 320);
}
function skip(){ finish(); }
function finish(){
  try { localStorage.setItem('ry_onboarding_done', '1'); } catch(e){}
  inner.style.transition = 'opacity 0.6s, transform 0.6s';
  document.body.style.transition = 'opacity 0.6s';
  inner.style.opacity = '0';
  inner.style.transform = 'scale(0.95)';
  document.body.style.opacity = '0';
  setTimeout(() => { window.location.href = 'command-center.html'; }, 650);
}

window.nextScene = nextScene;
window.skip = skip;

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); nextScene(); }
  else if (e.key === 'Escape') { e.preventDefault(); skip(); }
});

render();
</script>
</body>
</html>
