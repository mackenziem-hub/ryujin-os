<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal Activity · Plus Ultra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#05070f;--bg-1:#080b18;--ink:#f3f6ff;--ink-soft:#aeb8d4;--ink-dim:#717d9c;
    --gold:#f3c969;--gold-deep:#d8a838;--gold-glow:rgba(243,201,105,.30);
    --green:#4fd28b;--blue:#6aa6ff;--red:#ff6b6b;--violet:#b89bff;
    --line:rgba(255,255,255,.08);--surface:rgba(255,255,255,.035);--surface-2:rgba(255,255,255,.06);
    --r:18px;--ease:cubic-bezier(.16,1,.3,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--bg-0);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;
    background-image:radial-gradient(1100px 640px at 84% -8%, rgba(243,201,105,.10), transparent 58%),radial-gradient(900px 600px at 6% 108%, rgba(60,90,180,.13), transparent 55%),linear-gradient(160deg,var(--bg-1),var(--bg-0) 62%,#04060d)}
  .wrap{max-width:1480px;margin:0 auto;padding:1.8rem 3vw 4rem}
  .topbar{display:flex;align-items:center;gap:1.1rem;flex-wrap:wrap;margin-bottom:1.8rem}
  .back{display:inline-flex;align-items:center;gap:.5rem;background:#fff;color:#05070f;font-weight:700;font-size:.9rem;text-decoration:none;padding:.65rem 1.1rem;border-radius:12px;box-shadow:0 6px 22px -8px rgba(255,255,255,.5);transition:transform .18s var(--ease),box-shadow .18s var(--ease)}
  .back:hover{transform:translateY(-1px);box-shadow:0 11px 28px -8px rgba(255,255,255,.6)}
  .back svg{width:17px;height:17px;stroke:#05070f;stroke-width:2.4;fill:none}
  .ttl{flex:1;min-width:220px}
  .ttl .eyebrow{font-family:'JetBrains Mono',monospace;font-size:.66rem;letter-spacing:.34em;text-transform:uppercase;color:var(--gold);font-weight:600}
  .ttl h1{font-family:'Sora',sans-serif;font-weight:700;font-size:clamp(1.5rem,2.8vw,2.3rem);letter-spacing:-.02em;margin-top:.3rem;text-wrap:balance}
  .live{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap}
  .pulse{display:inline-flex;align-items:center;gap:.55rem;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--ink-soft);letter-spacing:.06em;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:.5rem .95rem}
  .pulse .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px rgba(79,210,139,.85);animation:beat 2.4s var(--ease) infinite}
  .pulse.stale .dot{background:var(--red);box-shadow:0 0 10px rgba(255,107,107,.8);animation:none}
  @keyframes beat{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.82)}}
  .rfr{cursor:pointer;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-soft);border-radius:999px;padding:.5rem .9rem;font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.04em;transition:color .18s,border-color .18s}
  .rfr:hover{color:var(--gold);border-color:rgba(243,201,105,.4)}
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
  .tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:1.25rem 1.3rem;position:relative;overflow:hidden}
  .tile::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c,transparent);opacity:.7}
  .tile .v{font-family:'Sora';font-weight:700;font-size:clamp(1.7rem,2.8vw,2.4rem);letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1;color:var(--c,var(--ink))}
  .tile .l{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);margin-top:.65rem}
  .tile .s{font-size:.8rem;color:var(--ink-soft);margin-top:.3rem}
  .grid{display:grid;grid-template-columns:1.55fr .95fr;gap:1.3rem;margin-bottom:1.5rem}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);display:flex;flex-direction:column;min-height:0}
  .phead{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.3rem .8rem;border-bottom:1px solid var(--line)}
  .phead h2{font-family:'Sora';font-weight:600;font-size:1.02rem;letter-spacing:-.01em;display:flex;align-items:center;gap:.55rem}
  .phead .meta{font-family:'JetBrains Mono';font-size:.66rem;color:var(--ink-dim);letter-spacing:.08em}
  .hdot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px rgba(79,210,139,.85);animation:beat 2.4s var(--ease) infinite}
  .feed{overflow-y:auto;max-height:540px;padding:.4rem .4rem .6rem}
  .feed::-webkit-scrollbar{width:8px}.feed::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:8px}
  .ev{display:grid;grid-template-columns:34px 1fr auto;gap:.85rem;align-items:center;padding:.7rem .9rem;border-radius:12px;transition:background .2s}
  .ev:hover{background:rgba(255,255,255,.025)}
  .ev .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-weight:700;font-size:1rem;border:1px solid var(--line);background:var(--surface-2)}
  .ev.view .ic{color:var(--gold);border-color:rgba(243,201,105,.35)}
  .ev.explore .ic{color:var(--violet);border-color:rgba(184,155,255,.35)}
  .ev.pdf .ic,.ev.video .ic{color:var(--blue);border-color:rgba(106,166,255,.35)}
  .ev.accept .ic{color:var(--green);border-color:rgba(79,210,139,.45);background:rgba(79,210,139,.12)}
  .ev .who{font-weight:600;font-size:.95rem;color:var(--ink)}
  .ev .what{font-size:.82rem;color:var(--ink-soft);margin-top:.12rem}
  .ev .what b{color:var(--ink);font-weight:600}
  .ev .when{font-family:'JetBrains Mono';font-size:.7rem;color:var(--ink-dim);white-space:nowrap;text-align:right}
  .ev.fresh{animation:slidein .55s var(--ease) both}
  @keyframes slidein{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
  .sk{display:grid;grid-template-columns:34px 1fr auto;gap:.85rem;align-items:center;padding:.7rem .9rem}
  .sk .b{height:12px;border-radius:6px;background:linear-gradient(90deg,rgba(255,255,255,.05),rgba(255,255,255,.1),rgba(255,255,255,.05));background-size:200% 100%;animation:shimmer 1.4s linear infinite}
  .sk .b.sq{width:34px;height:34px;border-radius:10px}
  @keyframes shimmer{to{background-position:-200% 0}}
  .empty{padding:2.5rem 1rem;text-align:center;color:var(--ink-dim);font-family:'JetBrains Mono';font-size:.84rem;line-height:1.6}
  .empty a{color:var(--gold)}
  .spot{position:relative;flex:1;min-height:300px;overflow:hidden}
  .card{position:absolute;inset:0;padding:1.6rem 1.5rem 2.4rem;display:flex;flex-direction:column;justify-content:center;gap:.45rem;opacity:0;transform:scale(.985);transition:opacity .7s var(--ease),transform .7s var(--ease);pointer-events:none}
  .card.on{opacity:1;transform:none;pointer-events:auto}
  .card .ck{font-family:'JetBrains Mono';font-size:.64rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:600}
  .card .big{font-family:'Sora';font-weight:800;font-size:clamp(2.6rem,5vw,3.6rem);letter-spacing:-.03em;line-height:.95;font-variant-numeric:tabular-nums;color:var(--gold)}
  .card .big.green{color:var(--green)}.card .big.red{color:var(--red)}.card .big.ink{color:var(--ink)}
  .card .u{font-family:'Inter';font-size:1rem;color:var(--ink-dim);font-weight:500}
  .card .nm{font-family:'Sora';font-weight:600;font-size:1.25rem;color:#fff;line-height:1.15;text-wrap:balance}
  .card .sub{font-size:.9rem;color:var(--ink-soft);line-height:1.5}
  .card .mini{display:flex;gap:.5rem;margin-top:.6rem}
  .card .mini .seg{flex:1;text-align:center;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:.6rem .3rem}
  .card .mini .seg .n{font-family:'Sora';font-weight:700;font-size:1.3rem;font-variant-numeric:tabular-nums}
  .card .mini .seg .t{font-family:'JetBrains Mono';font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);margin-top:.25rem}
  .dots{position:absolute;bottom:14px;left:0;right:0;display:flex;gap:.45rem;justify-content:center;z-index:2}
  .dots .d{width:22px;height:3px;border-radius:3px;background:rgba(255,255,255,.16);cursor:pointer;transition:background .3s,transform .3s}
  .dots .d.on{background:var(--gold);transform:scaleY(1.6)}
  .tsec{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
  thead th{font-family:'JetBrains Mono';font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);text-align:right;padding:.9rem 1.2rem;font-weight:600;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap}
  thead th:first-child{text-align:left}
  thead th:hover{color:var(--gold)}
  thead th .ar{opacity:.55;font-size:.66rem}
  tbody td{padding:.8rem 1.2rem;text-align:right;font-size:.9rem;border-bottom:1px solid rgba(255,255,255,.04);color:var(--ink-soft)}
  tbody td:first-child{text-align:left;color:var(--ink);font-weight:500}
  tbody tr{transition:background .18s}tbody tr:hover{background:rgba(255,255,255,.025)}
  tbody tr a{color:inherit;text-decoration:none}tbody tr a:hover{color:var(--gold)}
  .pill{display:inline-block;font-family:'JetBrains Mono';font-size:.58rem;letter-spacing:.06em;padding:.2rem .55rem;border-radius:999px;font-weight:600;text-transform:uppercase}
  .pill.accepted{background:rgba(79,210,139,.16);color:var(--green);border:1px solid rgba(79,210,139,.3)}
  .pill.sent{background:rgba(243,201,105,.14);color:var(--gold);border:1px solid rgba(243,201,105,.28)}
  .pill.draft{background:rgba(174,184,212,.12);color:var(--ink-soft);border:1px solid var(--line)}
  .vh{color:var(--gold);font-weight:700}.vm{color:var(--ink);font-weight:600}.muted{color:var(--ink-dim)}
  .shead{font-family:'JetBrains Mono';font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);padding:.9rem 1.3rem;border-bottom:1px solid var(--line)}
  @media(max-width:1080px){ .grid{grid-template-columns:1fr} .spot{min-height:260px} }
  @media(max-width:720px){ .tiles{grid-template-columns:repeat(2,1fr)} .ev{grid-template-columns:30px 1fr} .ev .when{grid-column:2;text-align:left;margin-top:.2rem} thead th,tbody td{padding:.6rem;font-size:.78rem} .col-addr{display:none} }
  @media(prefers-reduced-motion:reduce){ *{animation:none!important} .card{transition:opacity .25s linear} }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="back" href="/sales.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> Sales</a>
    <div class="ttl">
      <div class="eyebrow">Sales · live tracking</div>
      <h1>Proposal Activity</h1>
    </div>
    <div class="live">
      <div class="pulse" id="pulse"><span class="dot"></span><span id="sync">connecting</span></div>
      <button class="rfr" id="rfr">&#8635; Refresh</button>
    </div>
  </div>

  <div class="tiles" id="tiles">
    <div class="tile" style="--c:var(--green)"><div class="v">&middot;</div><div class="l">Accepted</div><div class="s">&nbsp;</div></div>
    <div class="tile" style="--c:var(--gold)"><div class="v">&middot;</div><div class="l">Sent &middot; awaiting</div><div class="s">&nbsp;</div></div>
    <div class="tile"><div class="v">&middot;</div><div class="l">Draft</div><div class="s">&nbsp;</div></div>
    <div class="tile" style="--c:var(--red)"><div class="v">&middot;</div><div class="l">Stale &gt; 7d</div><div class="s">&nbsp;</div></div>
  </div>

  <div class="grid">
    <div class="panel">
      <div class="phead"><h2><span class="hdot"></span> Live activity</h2><span class="meta" id="feedmeta"></span></div>
      <div class="feed" id="feed">
        <div class="sk"><div class="b sq"></div><div><div class="b" style="width:55%"></div><div class="b" style="width:35%;margin-top:.5rem"></div></div><div class="b" style="width:42px"></div></div>
        <div class="sk"><div class="b sq"></div><div><div class="b" style="width:48%"></div><div class="b" style="width:30%;margin-top:.5rem"></div></div><div class="b" style="width:42px"></div></div>
        <div class="sk"><div class="b sq"></div><div><div class="b" style="width:62%"></div><div class="b" style="width:40%;margin-top:.5rem"></div></div><div class="b" style="width:42px"></div></div>
        <div class="sk"><div class="b sq"></div><div><div class="b" style="width:44%"></div><div class="b" style="width:28%;margin-top:.5rem"></div></div><div class="b" style="width:42px"></div></div>
      </div>
    </div>
    <div class="panel">
      <div class="phead"><h2>Spotlight</h2><span class="meta">auto &middot; 6s</span></div>
      <div class="spot" id="spot">
        <div class="card on"><div class="ck">warming up</div><div class="sub">Pulling live engagement&hellip;</div></div>
      </div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

  <div class="tsec">
    <div class="shead" id="tcount">All live proposals</div>
    <table>
      <thead><tr>
        <th data-k="customer">Customer <span class="ar"></span></th>
        <th data-k="status">Status <span class="ar"></span></th>
        <th data-k="views">Opens <span class="ar">&#9660;</span></th>
        <th data-k="lastViewedAt" class="col-addr">Last seen <span class="ar"></span></th>
        <th data-k="fromPrice">Value <span class="ar"></span></th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<script>
  var IDX='/api/proposals-index', FEED='/api/proposal-activity-feed';
  var sortKey='views', sortDir=-1;
  var idx=null, feed=[], lastTopTs=0, rotTimer=null, rotI=0, paused=false, cards=[];

  function authHeaders(){
    var h={'accept':'application/json'};
    try{
      var t=localStorage.getItem('ryujin_token')||sessionStorage.getItem('ryujin_token');
      if(t)h['Authorization']='Bearer '+t;
      var rt=localStorage.getItem('ryujin_tenant'); if(rt){var s=(JSON.parse(rt)||{}).slug; if(s)h['x-tenant-id']=s;}
    }catch(e){}
    return h;
  }
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function money(n){if(n==null||isNaN(n))return '<span class="muted">-</span>';return '$'+Number(n).toLocaleString('en-US',{maximumFractionDigits:0});}
  function kfmt(n){n=Number(n)||0;if(n>=1000000)return '$'+(n/1000000).toFixed(1)+'M';if(n>=1000)return '$'+Math.round(n/1000)+'K';return '$'+n;}
  function ago(iso){if(!iso)return '<span class="muted">never</span>';var t=Date.parse(iso);if(isNaN(t))return '<span class="muted">-</span>';var d=(Date.now()-t)/1000;if(d<60)return 'just now';if(d<3600)return Math.round(d/60)+'m ago';if(d<86400)return Math.round(d/3600)+'h ago';return Math.round(d/86400)+'d ago';}
  function agoPlain(iso){return ago(iso).replace(/<[^>]+>/g,'');}
  var KIND={view:{g:'&#9678;',v:'opened the proposal'},explore:{g:'&#8862;',v:'compared the options'},pdf:{g:'&#10515;',v:'saved the PDF'},video:{g:'&#9655;',v:'played the walkthrough'},accept:{g:'&#10003;',v:'accepted the proposal'}};

  function setSync(t,bad){document.getElementById('sync').textContent=t;document.getElementById('pulse').className='pulse'+(bad?' stale':'');}

  function renderTiles(c){
    c=c||{};var b=c.byBucket||{};
    var data=[['var(--green)',b.accepted||0,'Accepted',(c.total||0)+' in book'],
      ['var(--gold)',b.sent||0,'Sent &middot; awaiting','out for decision'],
      ['',b.draft||0,'Draft','not yet sent'],
      ['var(--red)',c.stale||0,'Stale &gt; 7d',kfmt(c.staleValue)+' quiet']];
    document.getElementById('tiles').innerHTML=data.map(function(r){return '<div class="tile"'+(r[0]?' style="--c:'+r[0]+'"':'')+'><div class="v">'+r[1]+'</div><div class="l">'+r[2]+'</div><div class="s">'+r[3]+'</div></div>';}).join('');
  }

  function renderFeed(){
    var el=document.getElementById('feed');
    if(!feed.length){el.innerHTML='<div class="empty">No proposal activity yet.<br>Opens stream in here live.</div>';return;}
    var newTop=Date.parse(feed[0].ts)||0;
    el.innerHTML=feed.slice(0,50).map(function(e){
      var k=KIND[e.kind]||KIND.view;
      var fresh=lastTopTs>0&&(Date.parse(e.ts)||0)>lastTopTs;
      return '<div class="ev '+e.kind+(fresh?' fresh':'')+'"><div class="ic">'+k.g+'</div>'+
        '<div><div class="who">'+esc(e.customer)+'</div><div class="what"><b>'+k.v+'</b>'+(e.address?' &middot; '+esc(e.address):'')+'</div></div>'+
        '<div class="when">'+ago(e.ts)+'</div></div>';
    }).join('');
    lastTopTs=newTop;
    document.getElementById('feedmeta').textContent=feed.length+' events';
  }

  function buildSpotlight(){
    var rows=(idx&&idx.proposals)||[];var c=(idx&&idx.counts)||{};var b=c.byBucket||{};
    var hot=rows.filter(function(r){return (r.bucket||'')!=='accepted'&&Number(r.views)>0;}).sort(function(a,b){return b.views-a.views;})[0];
    var mid=new Date();mid.setHours(0,0,0,0);var midMs=mid.getTime();
    var today=feed.filter(function(e){return (Date.parse(e.ts)||0)>=midMs;});
    var todayProps=({}); today.forEach(function(e){todayProps[e.customer]=1;}); var tp=Object.keys(todayProps).length;
    var stale=rows.filter(function(r){return (r.bucket||'')==='sent';}).sort(function(a,b){return (Number(b.fromPrice)||0)-(Number(a.fromPrice)||0);})[0];
    cards=[];
    if(hot)cards.push('<div class="ck">&#128293; Hottest right now</div><div class="big">'+hot.views+'<span class="u"> opens</span></div><div class="nm">'+esc(hot.customer)+'</div><div class="sub">'+(hot.fromPrice?money(hot.fromPrice)+' &middot; ':'')+'last seen '+agoPlain(hot.lastViewedAt)+', not signed yet</div>');
    cards.push('<div class="ck">&#128200; Today\'s pulse</div><div class="big ink">'+today.length+'<span class="u"> opens today</span></div><div class="sub">across '+tp+' proposal'+(tp===1?'':'s')+' &middot; '+(feed.length?'live stream active':'quiet so far')+'</div>');
    if(stale)cards.push('<div class="ck">&#9888;&#65039; Going stale</div><div class="big red">'+(c.stale||0)+'<span class="u"> quiet 7d+</span></div><div class="nm">'+esc(stale.customer)+'</div><div class="sub">'+kfmt(c.staleValue)+' of sent proposals gone quiet &middot; chase the top ones</div>');
    cards.push('<div class="ck">&#9638; The book</div><div class="nm" style="margin-bottom:.3rem">'+(c.total||0)+' proposals</div><div class="mini"><div class="seg"><div class="n" style="color:var(--green)">'+(b.accepted||0)+'</div><div class="t">Accepted</div></div><div class="seg"><div class="n" style="color:var(--gold)">'+(b.sent||0)+'</div><div class="t">Sent</div></div><div class="seg"><div class="n">'+(b.draft||0)+'</div><div class="t">Draft</div></div></div>');
    document.getElementById('spot').innerHTML=cards.map(function(h,i){return '<div class="card'+(i===0?' on':'')+'">'+h+'</div>';}).join('');
    var dots=document.getElementById('dots');
    dots.innerHTML=cards.map(function(_,i){return '<div class="d'+(i===0?' on':'')+'" data-i="'+i+'"></div>';}).join('');
    Array.prototype.forEach.call(dots.children,function(d){d.addEventListener('click',function(){go(+d.dataset.i);restart();});});
    rotI=0;restart();
  }
  function go(i){
    if(!cards.length)return;rotI=(i+cards.length)%cards.length;
    var sc=document.getElementById('spot').children,dc=document.getElementById('dots').children;
    for(var j=0;j<sc.length;j++)sc[j].classList.toggle('on',j===rotI);
    for(var k=0;k<dc.length;k++)dc[k].classList.toggle('on',k===rotI);
  }
  function restart(){if(rotTimer)clearInterval(rotTimer);rotTimer=setInterval(function(){if(!paused)go(rotI+1);},6000);}
  (function(){var s=document.getElementById('spot');s.addEventListener('mouseenter',function(){paused=true;});s.addEventListener('mouseleave',function(){paused=false;});})();

  function renderTable(){
    var rows=((idx&&idx.proposals)||[]).filter(function(r){return (r.bucket||'')!=='accepted';});
    rows.sort(function(a,b){
      var x=a[sortKey],y=b[sortKey];
      if(sortKey==='views'||sortKey==='fromPrice')return ((Number(x)||0)-(Number(y)||0))*sortDir;
      if(sortKey==='lastViewedAt')return ((Date.parse(x)||0)-(Date.parse(y)||0))*sortDir;
      x=String(x||'').toLowerCase();y=String(y||'').toLowerCase();return (x<y?-1:x>y?1:0)*sortDir;
    });
    document.getElementById('tcount').textContent='All live proposals &middot; '+rows.length+' open (accepted hidden)';
    var tb=document.getElementById('rows');
    if(!rows.length){tb.innerHTML='<tr><td colspan="5"><div class="empty">No open proposals.</div></td></tr>';return;}
    tb.innerHTML=rows.map(function(r){
      var nm=r.openUrl?'<a href="'+esc(r.openUrl)+'" target="_blank" rel="noopener">'+esc(r.customer)+'</a>':esc(r.customer);
      var b=(r.bucket||'').toLowerCase();var cls=b==='draft'?'draft':'sent';
      var vv=Number(r.views)||0;var vc=vv>=20?'<span class="vh">'+vv+'</span>':vv>=3?'<span class="vm">'+vv+'</span>':vv>0?vv:'<span class="muted">0</span>';
      return '<tr><td>'+nm+'<div class="muted col-addr" style="font-size:.72rem">'+esc(r.address||r.ref||'')+'</div></td>'+
        '<td><span class="pill '+cls+'">'+esc(r.status||b)+'</span></td>'+
        '<td>'+vc+'</td><td class="col-addr">'+ago(r.lastViewedAt)+'</td><td>'+money(r.fromPrice)+'</td></tr>';
    }).join('');
  }

  function loadIdx(){
    return fetch(IDX,{credentials:'include',headers:authHeaders()}).then(function(r){
      if(r.status===401)throw new Error('NO_SESSION');if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
    }).then(function(j){idx=j;renderTiles(j.counts);renderTable();});
  }
  function loadFeed(){
    return fetch(FEED,{credentials:'include',headers:authHeaders()}).then(function(r){
      if(r.status===401)throw new Error('NO_SESSION');if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
    }).then(function(j){feed=j.events||[];renderFeed();});
  }
  function refresh(){
    setSync('syncing');
    Promise.all([loadIdx(),loadFeed()]).then(function(){
      buildSpotlight();
      setSync('live &middot; '+new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'}));
    }).catch(function(e){
      if(String(e.message).indexOf('NO_SESSION')>=0){
        document.getElementById('feed').innerHTML='<div class="empty">Session expired. <a href="/login.html">Sign in</a> to load activity.</div>';
        setSync('signed out',true);
      }else setSync('error: '+e.message,true);
    });
  }

  Array.prototype.forEach.call(document.querySelectorAll('thead th'),function(th){
    th.addEventListener('click',function(){
      var k=th.getAttribute('data-k');
      if(sortKey===k)sortDir=-sortDir;else{sortKey=k;sortDir=(k==='customer')?1:-1;}
      Array.prototype.forEach.call(document.querySelectorAll('thead th .ar'),function(a){a.textContent='';});
      th.querySelector('.ar').innerHTML=sortDir<0?'&#9660;':'&#9650;';
      renderTable();
    });
  });
  document.getElementById('rfr').addEventListener('click',refresh);
  refresh();
  setInterval(loadFeed,30000);
  setInterval(function(){loadIdx().then(function(){if(!paused)buildSpotlight();}).catch(function(){});},60000);
  setInterval(renderFeed,60000);
</script>
</body>
</html>
