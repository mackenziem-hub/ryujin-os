<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal Activity · Plus Ultra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#05070f;--bg-1:#080b18;--ink:#f3f6ff;--ink-soft:#aab4cf;--ink-dim:#6b7796;
    --gold:#f3c969;--gold-deep:#d8a838;--gold-glow:rgba(243,201,105,.35);
    --green:#4fd28b;--yellow:#f3c969;--red:#ff6b6b;
    --line:rgba(255,255,255,.08);--glass:rgba(255,255,255,.035);--glass-bright:rgba(255,255,255,.06);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg-0);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;
    background-image:radial-gradient(1200px 700px at 82% -5%, rgba(243,201,105,.10), transparent 60%),radial-gradient(900px 600px at 8% 105%, rgba(60,90,180,.14), transparent 55%),linear-gradient(160deg,var(--bg-1),var(--bg-0) 60%,#04060d)}
  .wrap{max-width:1280px;margin:0 auto;padding:2.2rem 5vw 5rem}
  .topbar{display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;margin-bottom:2.2rem}
  .back{display:inline-flex;align-items:center;gap:.5rem;background:#fff;color:#05070f;font-weight:700;font-size:.92rem;text-decoration:none;padding:.7rem 1.2rem;border-radius:12px;box-shadow:0 6px 22px -6px rgba(255,255,255,.4);transition:.18s}
  .back:hover{transform:translateY(-1px);box-shadow:0 10px 28px -6px rgba(255,255,255,.55)}
  .back svg{width:18px;height:18px;stroke:#05070f;stroke-width:2.4;fill:none}
  .titleblock{flex:1;min-width:240px}
  .kicker{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:.7rem}
  .kicker::before{content:"";width:30px;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}
  h1{font-family:'Sora',sans-serif;font-weight:700;font-size:clamp(1.6rem,3.2vw,2.6rem);letter-spacing:-.02em;margin-top:.5rem}
  .live{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
  .pulse{display:inline-flex;align-items:center;gap:.5rem;font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--ink-soft);letter-spacing:.1em;background:var(--glass-bright);border:1px solid var(--line);border-radius:999px;padding:.5rem 1rem}
  .pulse .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px rgba(79,210,139,.8);animation:blink 2s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
  .refresh{cursor:pointer;background:var(--glass-bright);border:1px solid var(--line);color:var(--ink-soft);border-radius:999px;padding:.5rem .95rem;font-family:'JetBrains Mono',monospace;font-size:.74rem;letter-spacing:.08em;transition:.18s}
  .refresh:hover{color:var(--gold);border-color:rgba(243,201,105,.4)}
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:1.1rem;margin-bottom:2.4rem}
  .tile{background:var(--glass);border:1px solid var(--line);border-radius:18px;padding:1.5rem 1.4rem;backdrop-filter:blur(14px);box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
  .tile .v{font-family:'Sora';font-weight:800;font-size:clamp(1.8rem,3.4vw,2.7rem);letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
  .tile .l{font-family:'JetBrains Mono',monospace;font-size:.64rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);margin-top:.7rem}
  .tile .sub{font-size:.8rem;color:var(--ink-soft);margin-top:.35rem}
  .tile.gold .v{color:var(--gold)}
  .tile.green .v{color:var(--green)}
  .tile.red .v{background:linear-gradient(180deg,#fff,var(--red) 150%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .section-h{font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);font-weight:600;margin:0 0 1.1rem;display:flex;align-items:center;gap:.7rem}
  .section-h .count{color:var(--ink-dim)}
  .hot{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-bottom:2.6rem}
  .hotcard{background:linear-gradient(135deg,rgba(243,201,105,.10),rgba(243,201,105,.02));border:1px solid rgba(243,201,105,.28);border-radius:16px;padding:1.2rem 1.3rem;text-decoration:none;color:inherit;display:block;transition:.18s}
  .hotcard:hover{transform:translateY(-2px);border-color:rgba(243,201,105,.55);box-shadow:0 14px 34px -16px var(--gold-glow)}
  .hotcard .nm{font-family:'Sora';font-weight:600;font-size:1.08rem;color:#fff}
  .hotcard .meta{font-size:.8rem;color:var(--ink-soft);margin-top:.25rem}
  .hotcard .opens{font-family:'Sora';font-weight:800;font-size:1.9rem;color:var(--gold);font-variant-numeric:tabular-nums;margin-top:.7rem;line-height:1}
  .hotcard .opens span{font-family:'JetBrains Mono';font-size:.62rem;letter-spacing:.16em;color:var(--ink-dim);text-transform:uppercase;font-weight:600;margin-left:.4rem}
  .panel{background:var(--glass);border:1px solid var(--line);border-radius:18px;overflow:hidden;backdrop-filter:blur(14px)}
  table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
  thead th{font-family:'JetBrains Mono',monospace;font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);text-align:right;padding:.9rem 1.2rem;font-weight:600;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap}
  thead th:first-child{text-align:left}
  thead th:hover{color:var(--gold)}
  thead th .ar{opacity:.5;font-size:.7rem}
  tbody td{padding:.85rem 1.2rem;text-align:right;font-size:.92rem;border-bottom:1px solid rgba(255,255,255,.04);color:var(--ink-soft)}
  tbody td:first-child{text-align:left;color:var(--ink);font-weight:500}
  tbody tr{transition:background .2s}
  tbody tr:hover{background:rgba(255,255,255,.025)}
  tbody tr a{color:inherit;text-decoration:none}
  tbody tr a:hover{color:var(--gold)}
  .pill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.08em;padding:.2rem .55rem;border-radius:999px;font-weight:600;text-transform:uppercase}
  .pill.accepted{background:rgba(79,210,139,.16);color:var(--green);border:1px solid rgba(79,210,139,.3)}
  .pill.sent{background:rgba(243,201,105,.14);color:var(--gold);border:1px solid rgba(243,201,105,.28)}
  .pill.draft{background:rgba(170,180,207,.12);color:var(--ink-soft);border:1px solid var(--line)}
  .views-hi{color:var(--gold);font-weight:700}
  .views-mid{color:var(--ink);font-weight:600}
  .muted{color:var(--ink-dim)}
  .state{text-align:center;padding:4rem 1rem;color:var(--ink-dim);font-family:'JetBrains Mono',monospace;font-size:.9rem}
  .state a{color:var(--gold)}
  .err{color:var(--red)}
  @media(max-width:780px){
    .tiles{grid-template-columns:repeat(2,1fr)}
    thead th,tbody td{padding:.6rem .6rem;font-size:.78rem}
    .col-addr,.col-updated{display:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="back" href="/sales.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> Sales</a>
    <div class="titleblock">
      <div class="kicker">Sales · live tracking</div>
      <h1>Proposal Activity</h1>
    </div>
    <div class="live">
      <div class="pulse"><span class="dot"></span><span id="lastsync">connecting...</span></div>
      <button class="refresh" id="refreshBtn">↻ Refresh</button>
    </div>
  </div>

  <div class="tiles" id="tiles"></div>

  <div id="hotwrap" style="display:none">
    <div class="section-h">Hot right now <span class="count" id="hotcount"></span></div>
    <div class="hot" id="hot"></div>
  </div>

  <div class="section-h">All live proposals <span class="count" id="tablecount"></span></div>
  <div class="panel">
    <table>
      <thead>
        <tr>
          <th data-k="customer">Customer <span class="ar"></span></th>
          <th data-k="status">Status <span class="ar"></span></th>
          <th data-k="views">Opens <span class="ar">▼</span></th>
          <th data-k="lastViewedAt" class="col-updated">Last seen <span class="ar"></span></th>
          <th data-k="fromPrice">Value <span class="ar"></span></th>
        </tr>
      </thead>
      <tbody id="rows"><tr><td colspan="5"><div class="state">Loading live proposal activity...</div></td></tr></tbody>
    </table>
  </div>
</div>

<script>
  var API = '/api/proposals-index';
  var sortKey = 'views';
  var sortDir = -1;
  var data = null;

  function fmtMoney(n){ if(n==null||isNaN(n)) return '<span class="muted">-</span>'; return '$' + Number(n).toLocaleString('en-US',{maximumFractionDigits:0}); }
  function fmtK(n){ n=Number(n)||0; return n>=1000 ? '$'+(n/1000000>=1?(n/1000000).toFixed(1)+'M':Math.round(n/1000)+'K') : '$'+n; }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function timeAgo(iso){
    if(!iso) return '<span class="muted">never</span>';
    var t = Date.parse(iso); if(isNaN(t)) return '<span class="muted">-</span>';
    var d = (Date.now()-t)/1000;
    if(d<3600) return Math.max(1,Math.round(d/60))+'m ago';
    if(d<86400) return Math.round(d/3600)+'h ago';
    return Math.round(d/86400)+'d ago';
  }
  function statusPill(bucket,status){
    var b = (bucket||'').toLowerCase();
    var cls = b==='accepted'?'accepted':(b==='draft'?'draft':'sent');
    return '<span class="pill '+cls+'">'+esc(status||b||'open')+'</span>';
  }
  function viewsCell(v){
    v = Number(v)||0;
    if(v>=20) return '<span class="views-hi">'+v+'</span>';
    if(v>=3) return '<span class="views-mid">'+v+'</span>';
    if(v>0) return v;
    return '<span class="muted">0</span>';
  }

  function renderTiles(c){
    c = c||{};
    var bb = c.byBucket||{};
    var t = document.getElementById('tiles');
    t.innerHTML = [
      ['green', bb.accepted||0, 'Accepted', (c.total||0)+' total in book'],
      ['gold', bb.sent||0, 'Sent · awaiting', 'live proposals out'],
      ['', bb.draft||0, 'Draft', 'built, not sent'],
      ['red', c.stale||0, 'Stale &gt; 7d', fmtK(c.staleValue)+' gone quiet']
    ].map(function(r){
      return '<div class="tile '+r[0]+'"><div class="v">'+r[1]+'</div><div class="l">'+r[2]+'</div><div class="sub">'+r[3]+'</div></div>';
    }).join('');
  }

  function renderHot(rows){
    var hot = rows.filter(function(r){ return (r.bucket||'').toLowerCase()!=='accepted' && (Number(r.views)||0)>0; })
                  .sort(function(a,b){ return (Number(b.views)||0)-(Number(a.views)||0); })
                  .slice(0,8);
    var wrap = document.getElementById('hotwrap');
    if(!hot.length){ wrap.style.display='none'; return; }
    wrap.style.display='block';
    document.getElementById('hotcount').textContent = '· '+hot.length+' engaged, unsigned';
    document.getElementById('hot').innerHTML = hot.map(function(r){
      var href = r.openUrl ? esc(r.openUrl) : null;
      var inner = '<div class="nm">'+esc(r.customer)+'</div>'+
                  '<div class="meta">'+esc(r.address||r.ref||'')+(r.fromPrice?' · '+fmtMoney(r.fromPrice):'')+'</div>'+
                  '<div class="opens">'+(Number(r.views)||0)+'<span>opens · '+timeAgo(r.lastViewedAt).replace(/<[^>]+>/g,'')+'</span></div>';
      return href ? '<a class="hotcard" href="'+href+'" target="_blank" rel="noopener">'+inner+'</a>' : '<div class="hotcard">'+inner+'</div>';
    }).join('');
  }

  function renderTable(rows){
    var live = rows.filter(function(r){ return (r.bucket||'').toLowerCase()!=='accepted'; });
    live.sort(function(a,b){
      var x=a[sortKey], y=b[sortKey];
      if(sortKey==='fromPrice'||sortKey==='views'){ x=Number(x)||0; y=Number(y)||0; return (x-y)*sortDir; }
      if(sortKey==='lastViewedAt'){ x=Date.parse(x)||0; y=Date.parse(y)||0; return (x-y)*sortDir; }
      x=String(x||'').toLowerCase(); y=String(y||'').toLowerCase();
      return (x<y?-1:x>y?1:0)*sortDir;
    });
    document.getElementById('tablecount').textContent = '· '+live.length+' open (accepted hidden)';
    var tb = document.getElementById('rows');
    if(!live.length){ tb.innerHTML='<tr><td colspan="5"><div class="state">No open proposals.</div></td></tr>'; return; }
    tb.innerHTML = live.map(function(r){
      var name = r.openUrl ? '<a href="'+esc(r.openUrl)+'" target="_blank" rel="noopener">'+esc(r.customer)+'</a>' : esc(r.customer);
      return '<tr>'+
        '<td>'+name+'<div class="muted col-addr" style="font-size:.74rem">'+esc(r.address||r.ref||'')+'</div></td>'+
        '<td>'+statusPill(r.bucket,r.status)+'</td>'+
        '<td>'+viewsCell(r.views)+'</td>'+
        '<td class="col-updated">'+timeAgo(r.lastViewedAt)+'</td>'+
        '<td>'+fmtMoney(r.fromPrice)+'</td>'+
      '</tr>';
    }).join('');
  }

  function renderAll(){
    if(!data) return;
    renderTiles(data.counts);
    renderHot(data.proposals||[]);
    renderTable(data.proposals||[]);
  }

  function setSync(txt, isErr){
    var el = document.getElementById('lastsync');
    el.textContent = txt;
    el.className = isErr ? 'err' : '';
  }

  function load(){
    setSync('syncing...');
    fetch(API, { credentials:'include', headers:{ 'accept':'application/json' } })
      .then(function(r){
        if(r.status===401) throw new Error('NO_SESSION');
        if(!r.ok) throw new Error('HTTP '+r.status);
        return r.json();
      })
      .then(function(j){
        data = j;
        renderAll();
        var d=new Date();
        setSync('live · '+d.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'}));
      })
      .catch(function(e){
        if(String(e.message).indexOf('NO_SESSION')>=0){
          document.getElementById('rows').innerHTML='<tr><td colspan="5"><div class="state">Session expired. <a href="/login.html">Sign in</a> to load activity.</div></td></tr>';
          setSync('signed out', true);
        } else {
          setSync('error: '+e.message, true);
        }
      });
  }

  Array.prototype.forEach.call(document.querySelectorAll('thead th'), function(th){
    th.addEventListener('click', function(){
      var k = th.getAttribute('data-k');
      if(sortKey===k){ sortDir = -sortDir; } else { sortKey = k; sortDir = (k==='customer')?1:-1; }
      Array.prototype.forEach.call(document.querySelectorAll('thead th .ar'), function(a){ a.textContent=''; });
      th.querySelector('.ar').textContent = sortDir<0 ? '▼' : '▲';
      renderTable(data?data.proposals||[]:[]);
    });
  });
  document.getElementById('refreshBtn').addEventListener('click', load);
  load();
  setInterval(load, 60000);
</script>
</body>
</html>
