<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plus Ultra Roofing · Proposal</title>
<style>
  :root {
    --pu-blue: #1d3a8a;
    --pu-yellow: #fdd835;
    --pu-cream: #faf7f2;
    --pu-black: #0a0a0a;
    --pu-gray: #5a5a5a;
    --pu-line: #d8d2c4;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--pu-black);
    background: #e8e3d6;
    line-height: 1.5;
  }
  .page {
    width: 8.5in;
    min-height: 11in;
    margin: 24px auto;
    background: var(--pu-cream);
    padding: 0;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    position: relative;
  }
  .brand-stripe {
    height: 8px;
    background: linear-gradient(to right, var(--pu-blue) 0%, var(--pu-blue) 70%, var(--pu-yellow) 70%, var(--pu-yellow) 100%);
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 48px 16px 48px;
    border-bottom: 1px solid var(--pu-line);
  }
  .logo-block { display: flex; align-items: center; gap: 16px; }
  .logo-img { height: 72px; width: auto; display: block; }
  .logo-text { line-height: 1.1; }
  .logo-text .tagline { font-size: 11px; color: var(--pu-gray); text-transform: uppercase; letter-spacing: 2px; }
  .header-right { text-align: right; font-size: 12px; color: var(--pu-gray); }
  .header-right .doctype { font-size: 11px; text-transform: uppercase; letter-spacing: 2.5px; color: var(--pu-blue); font-weight: 700; margin-bottom: 4px; }
  .header-right .quote-id { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 13px; color: var(--pu-black); font-weight: 600; }
  .header-right .date { margin-top: 2px; }

  .hero {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 7;
    overflow: hidden;
    background: #0a0a0a;
  }
  .hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero .caption {
    position: absolute; bottom: 14px; left: 22px;
    background: rgba(10,10,10,0.72);
    color: var(--pu-cream);
    padding: 8px 14px;
    font-size: 12px; letter-spacing: 1.5px;
    text-transform: uppercase;
    border-left: 3px solid var(--pu-yellow);
  }
  .hero.no-image { aspect-ratio: auto; height: 0; }

  .body { padding: 28px 48px 0 48px; }

  .customer-block {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    background: white;
    border: 1px solid var(--pu-line);
    padding: 18px 22px;
    margin-bottom: 24px;
  }
  .customer-block .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--pu-gray); margin-bottom: 4px; }
  .customer-block .value { font-size: 14px; color: var(--pu-black); font-weight: 600; }
  .customer-block .value .sub { display: block; font-weight: 400; color: var(--pu-gray); font-size: 12px; margin-top: 2px; }

  h2.section {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--pu-blue);
    border-bottom: 2px solid var(--pu-yellow);
    padding-bottom: 6px;
    margin: 0 0 12px 0;
    font-weight: 800;
  }

  .scope-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 28px;
    font-size: 13px;
    margin-bottom: 24px;
  }
  .scope-grid .row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dotted var(--pu-line); }
  .scope-grid .row span:first-child { color: var(--pu-gray); }
  .scope-grid .row span:last-child { font-weight: 600; }

  ul.deliverables {
    list-style: none;
    padding: 0;
    margin: 0 0 24px 0;
    columns: 2;
    column-gap: 28px;
    font-size: 13px;
  }
  ul.deliverables li {
    padding: 5px 0 5px 18px;
    position: relative;
    break-inside: avoid;
  }
  ul.deliverables li::before {
    content: "";
    position: absolute; left: 0; top: 11px;
    width: 8px; height: 8px;
    background: var(--pu-yellow);
    border: 1.5px solid var(--pu-blue);
    border-radius: 50%;
  }

  .exclusions {
    background: #fff8e1;
    border-left: 4px solid var(--pu-yellow);
    padding: 14px 18px;
    font-size: 12px;
    margin-bottom: 24px;
  }
  .exclusions h3 { margin: 0 0 6px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--pu-blue); }
  .exclusions ul { margin: 0; padding-left: 18px; }
  .exclusions li { margin-bottom: 3px; }

  .notice {
    background: #fff1e0;
    border-left: 4px solid #d97706;
    padding: 14px 18px;
    font-size: 12.5px;
    margin-bottom: 24px;
    line-height: 1.55;
  }
  .notice h3 {
    margin: 0 0 6px 0;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #b45309;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .notice .tag {
    background: #d97706;
    color: white;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 1px;
    font-weight: 700;
  }
  .notice strong { color: #b45309; }
  .notice .price-line {
    display: inline-block;
    margin-top: 6px;
    background: white;
    border: 1px solid #d97706;
    padding: 4px 10px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-weight: 600;
    color: var(--pu-black);
  }

  .investment {
    background: var(--pu-blue);
    color: white;
    padding: 22px 26px;
    margin-bottom: 18px;
  }
  .investment h2 { color: var(--pu-yellow); border-color: var(--pu-yellow); margin-bottom: 16px; }
  .investment-grid { display: grid; grid-template-columns: 1fr auto; gap: 8px 24px; font-size: 14px; }
  .investment-grid .label { color: rgba(255,255,255,0.85); }
  .investment-grid .amount { font-family: "SF Mono", Menlo, Consolas, monospace; font-weight: 600; text-align: right; }
  .investment-grid .total-row { border-top: 1px solid rgba(253,216,53,0.4); padding-top: 10px; margin-top: 6px; font-size: 18px; font-weight: 700; }
  .investment-grid .total-row .amount { color: var(--pu-yellow); font-size: 22px; }

  .payment-terms {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
    font-size: 13px;
  }
  .payment-terms .card { background: white; border: 1px solid var(--pu-line); padding: 14px 16px; }
  .payment-terms .card .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--pu-gray); margin-bottom: 4px; }
  .payment-terms .card .value { font-size: 16px; font-weight: 700; color: var(--pu-blue); }
  .payment-terms .card .note { font-size: 11px; color: var(--pu-gray); margin-top: 4px; }

  .warranty {
    border: 1px dashed var(--pu-blue);
    padding: 14px 18px;
    margin-bottom: 24px;
    font-size: 12px;
  }
  .warranty h3 { margin: 0 0 6px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--pu-blue); }

  .signature-block {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
    padding-top: 16px;
    border-top: 2px solid var(--pu-blue);
  }
  .signature-block .sig-line { border-bottom: 1.5px solid var(--pu-black); height: 36px; margin-bottom: 4px; }
  .signature-block .label { font-size: 11px; color: var(--pu-gray); text-transform: uppercase; letter-spacing: 1px; }

  .accept-action {
    margin: 16px 0 24px 0;
    padding: 22px 24px;
    background: linear-gradient(135deg, #fff8e1 0%, #fffbe8 100%);
    border: 2px solid var(--pu-blue);
    border-radius: 10px;
    text-align: center;
  }
  .accept-action .blurb {
    font-size: 13px; color: var(--pu-gray);
    margin-bottom: 14px; line-height: 1.6;
  }
  .accept-btn {
    display: inline-block;
    background: var(--pu-blue);
    color: var(--pu-yellow);
    font-family: inherit;
    font-size: 16px; font-weight: 800;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 14px 36px;
    border: 3px solid var(--pu-yellow);
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .accept-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(29,58,138,0.35);
  }
  .accept-btn:active { transform: translateY(0); }
  .accept-btn:disabled {
    background: #5a5a5a; color: #d8d2c4;
    border-color: #d8d2c4; cursor: not-allowed;
    transform: none; box-shadow: none;
  }
  .accept-confirm, .accept-success { display: none; }
  .accept-confirm.show, .accept-success.show { display: block; }
  .accept-confirm .question {
    font-size: 14px; color: var(--pu-black);
    margin-bottom: 16px; font-weight: 600;
  }
  .accept-confirm .row { display: flex; gap: 12px; justify-content: center; }
  .accept-confirm .btn-yes, .accept-confirm .btn-no {
    font-family: inherit; font-size: 13px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 10px 22px; border-radius: 6px;
    cursor: pointer; transition: transform 0.12s;
  }
  .accept-confirm .btn-yes {
    background: var(--pu-blue); color: var(--pu-yellow);
    border: 2px solid var(--pu-yellow);
  }
  .accept-confirm .btn-no {
    background: white; color: var(--pu-gray);
    border: 2px solid var(--pu-line);
  }
  .accept-confirm .btn-yes:hover, .accept-confirm .btn-no:hover { transform: translateY(-1px); }
  .accept-success { text-align: left; }
  .accept-success .checkmark {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--pu-blue); color: var(--pu-yellow);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 900;
    margin: 0 auto 14px auto;
    border: 3px solid var(--pu-yellow);
  }
  .accept-success .headline {
    font-size: 18px; font-weight: 800; color: var(--pu-blue);
    text-align: center; margin-bottom: 8px;
  }
  .accept-success .detail {
    font-size: 13px; color: var(--pu-gray);
    text-align: center; line-height: 1.6;
  }
  .accept-success .stamp {
    margin-top: 14px; padding: 10px 14px;
    background: white;
    border: 1px dashed var(--pu-blue);
    border-radius: 6px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px; color: var(--pu-black);
    text-align: center; letter-spacing: 0.5px;
  }
  .accept-error {
    margin-top: 12px; color: #b91c1c;
    font-size: 12px; font-weight: 600;
  }

  .footer {
    margin-top: 24px;
    padding: 16px 48px 24px 48px;
    border-top: 1px solid var(--pu-line);
    font-size: 11px;
    color: var(--pu-gray);
    text-align: center;
    line-height: 1.7;
  }
  .footer strong { color: var(--pu-blue); }

  .loading, .error-page {
    width: 100%;
    padding: 80px 20px;
    text-align: center;
    color: var(--pu-gray);
    font-family: "SF Mono", Menlo, Consolas, monospace;
  }
  .error-page h1 { color: var(--pu-blue); margin-bottom: 8px; }

  @media print {
    body { background: white; }
    .page { box-shadow: none; margin: 0; }
    .accept-action { display: none !important; }
  }
</style>
</head>
<body>

<div id="root">
  <div class="loading">Loading proposal...</div>
</div>

<script>
(function() {
  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) {
      for (var k in attrs) {
        if (k === 'style') node.setAttribute('style', attrs[k]);
        else if (k === 'className') node.className = attrs[k];
        else if (k === 'html') node.innerHTML = attrs[k];
        else node.setAttribute(k, attrs[k]);
      }
    }
    if (children) {
      for (var i = 0; i < children.length; i++) {
        var c = children[i];
        if (c == null) continue;
        if (typeof c === 'string') node.appendChild(document.createTextNode(c));
        else node.appendChild(c);
      }
    }
    return node;
  }

  function fmtMoney(n) {
    if (n == null || isNaN(Number(n))) return '$0.00';
    return '$' + Number(n).toLocaleString('en-CA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtDate(iso) {
    if (!iso) return '';
    var d = new Date(iso.length === 10 ? iso + 'T00:00:00' : iso);
    return d.toLocaleDateString('en-CA', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function buildHeader(p) {
    return el('div', { className: 'header' }, [
      el('div', { className: 'logo-block' }, [
        el('img', { src: '/brand/plus-ultra/logo.png', alt: 'Plus Ultra Roofing', className: 'logo-img' }),
        el('div', { className: 'logo-text' }, [
          el('div', { className: 'tagline' }, ['Workmanship beyond the standard'])
        ])
      ]),
      el('div', { className: 'header-right' }, [
        el('div', { className: 'doctype' }, ['Roofing Proposal']),
        el('div', { className: 'quote-id' }, [p.quote_id || '']),
        el('div', { className: 'date' }, [
          'Issued ' + fmtDate(p.issued_date) + '  ·  Valid ' + (p.valid_days || 30) + ' days'
        ])
      ])
    ]);
  }

  function buildHero(p) {
    if (!p.cover_url) return null;
    return el('div', { className: 'hero' }, [
      el('img', { src: p.cover_url, alt: p.address }),
      el('div', { className: 'caption' }, [p.address.toUpperCase()])
    ]);
  }

  function buildCustomer(p) {
    return el('div', { className: 'customer-block' }, [
      el('div', null, [
        el('div', { className: 'label' }, ['Prepared For']),
        el('div', { className: 'value' }, [
          p.customer_name,
          el('span', { className: 'sub' }, [p.address])
        ])
      ]),
      el('div', null, [
        el('div', { className: 'label' }, ['Prepared By']),
        el('div', { className: 'value' }, [
          (p.sales_rep || 'Mackenzie Mazerolle') + ', Owner',
          el('span', { className: 'sub' }, [
            (p.sales_rep_phone || '(506) 616-4607') + ' · ' + (p.sales_rep_email || 'mackenzie.m@plusultraroofing.com')
          ])
        ])
      ])
    ]);
  }

  function buildScope(p) {
    var parts = [];
    parts.push(el('h2', { className: 'section' }, ['Scope of Work · ' + (p.scope_title || 'Custom Scope')]));
    if (p.scope_long) {
      parts.push(el('p', { style: 'font-size: 13px; color: var(--pu-gray); margin: 0 0 16px 0;' }, [p.scope_long]));
    }
    var rows = Array.isArray(p.scope_grid) ? p.scope_grid : [];
    if (rows.length) {
      var grid = el('div', { className: 'scope-grid' });
      for (var i = 0; i < rows.length; i++) {
        var r = rows[i];
        grid.appendChild(el('div', { className: 'row' }, [
          el('span', null, [r.label || '']),
          el('span', null, [r.value || ''])
        ]));
      }
      parts.push(grid);
    }
    return parts;
  }

  function buildRedeckingNotice(p) {
    if (!p.redecking_risk) return null;
    var sheetPrice = Number(p.redecking_sheet_price ?? 85);
    var defaultText = 'Given the age of the home and the steep pitch on the work area, there is a high likelihood that some of the existing roof deck will need to be replaced once we have the old shingles off. We always assess this in person at tear-off, show you any soft or rotted sheets before they are replaced, and only charge for what is actually swapped.';
    var customText = p.redecking_notice_text || defaultText;
    return el('div', { className: 'notice' }, [
      el('h3', null, [
        el('span', { className: 'tag' }, ['Heads-up']),
        document.createTextNode(' Re-decking Risk on This Home')
      ]),
      document.createTextNode(customText),
      el('br'),
      el('br'),
      el('strong', null, ['Re-decking is priced transparently at:']),
      document.createTextNode(' '),
      el('span', { className: 'price-line' }, ['$' + sheetPrice.toFixed(2) + ' per 4 ft x 8 ft sheet']),
      document.createTextNode('  That price is all-in: OSB sheathing material, removal of the rotted sheet, install of the new sheet, and labor. No surprise add-ons.')
    ]);
  }

  function buildDeliverables(p) {
    var items = Array.isArray(p.deliverables) ? p.deliverables : [];
    if (!items.length) return null;
    var parts = [el('h2', { className: 'section' }, ["What's Included"])];
    var ul = el('ul', { className: 'deliverables' });
    for (var i = 0; i < items.length; i++) ul.appendChild(el('li', null, [items[i]]));
    parts.push(ul);
    return parts;
  }

  function buildExclusions(p) {
    var items = Array.isArray(p.exclusions) ? p.exclusions : [];
    if (!items.length) return null;
    var ul = el('ul');
    for (var i = 0; i < items.length; i++) ul.appendChild(el('li', null, [items[i]]));
    return el('div', { className: 'exclusions' }, [
      el('h3', null, ['Not Included in This Quote']),
      ul
    ]);
  }

  function buildInvestment(p) {
    return el('div', { className: 'investment' }, [
      el('h2', { className: 'section', style: 'color: var(--pu-yellow); border-color: var(--pu-yellow);' }, ['Investment']),
      el('div', { className: 'investment-grid' }, [
        el('div', { className: 'label' }, ['Subtotal']),
        el('div', { className: 'amount' }, [fmtMoney(p.subtotal)]),
        el('div', { className: 'label' }, ['HST (' + Number(p.hst_pct || 15).toFixed(0) + '%)']),
        el('div', { className: 'amount' }, [fmtMoney(p.hst_amount)]),
        el('div', { className: 'label total-row' }, ['Total']),
        el('div', { className: 'amount total-row' }, [fmtMoney(p.total_incl_hst)])
      ])
    ]);
  }

  function buildPaymentTerms(p) {
    var depositPct = Number(p.deposit_pct || 30).toFixed(0);
    return el('div', { className: 'payment-terms' }, [
      el('div', { className: 'card' }, [
        el('div', { className: 'label' }, ['Deposit on Signing']),
        el('div', { className: 'value' }, [fmtMoney(p.deposit)]),
        el('div', { className: 'note' }, [depositPct + '% of total. Secures material order and schedule slot.'])
      ]),
      el('div', { className: 'card' }, [
        el('div', { className: 'label' }, ['Balance on Completion']),
        el('div', { className: 'value' }, [fmtMoney(p.balance)]),
        el('div', { className: 'note' }, ['Due upon final walkthrough and customer sign-off.'])
      ])
    ]);
  }

  function buildWarranty(p) {
    var years = p.warranty_years || 15;
    var defaultText = years + '-year combined warranty covering both CertainTeed Landmark manufacturer defects and Plus Ultra Roofing installation workmanship. Transferable to subsequent owners within the warranty term. Limited to the scope of work described above.';
    var text = p.warranty_text || defaultText;
    return el('div', { className: 'warranty' }, [
      el('h3', null, ['Workmanship + Material Warranty']),
      document.createTextNode(text)
    ]);
  }

  function buildAccept(p) {
    var block = el('div', { className: 'accept-action', id: 'acceptBlock' });
    block.setAttribute('data-slug', p.slug);

    var initial = el('div', { className: 'accept-initial', id: 'acceptInitial' }, [
      el('div', { className: 'blurb' }, [
        'Ready to move ahead? Click below to accept this proposal. ' +
        (p.sales_rep || 'Mackenzie') + ' will be in touch right after to confirm next steps and collect the deposit.'
      ]),
      el('button', { type: 'button', className: 'accept-btn', id: 'acceptBtn' }, ['Accept This Proposal'])
    ]);

    var confirm = el('div', { className: 'accept-confirm', id: 'acceptConfirm' }, [
      el('div', { className: 'question' }, [
        'Confirm: you accept the scope and pricing above and want Plus Ultra Roofing to move ahead?'
      ]),
      el('div', { className: 'row' }, [
        el('button', { type: 'button', className: 'btn-no', id: 'acceptCancel' }, ['Not Yet']),
        el('button', { type: 'button', className: 'btn-yes', id: 'acceptYes' }, ['Yes, Accept'])
      ]),
      el('div', { className: 'accept-error', id: 'acceptError', style: 'display:none' })
    ]);

    var success = el('div', { className: 'accept-success', id: 'acceptSuccess' }, [
      el('div', { className: 'checkmark' }, ['✓']),
      el('div', { className: 'headline' }, ['Proposal Accepted']),
      el('div', { className: 'detail' }, [
        'Thank you. ' + (p.sales_rep || 'Mackenzie') + ' has been notified and will reach out shortly to confirm next steps and collect the deposit.'
      ]),
      el('div', { className: 'stamp', id: 'acceptStamp' }, ['Recorded'])
    ]);

    block.appendChild(initial);
    block.appendChild(confirm);
    block.appendChild(success);

    // If already signed, jump straight to success state
    if (p.status === 'signed' && p.accepted_at) {
      initial.style.display = 'none';
      success.classList.add('show');
      var d = new Date(p.accepted_at);
      success.querySelector('#acceptStamp').textContent = 'Recorded ' + d.toLocaleString('en-CA', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit'
      });
    }

    return block;
  }

  function buildSignatureBlock(p) {
    return el('div', { className: 'signature-block' }, [
      el('div', null, [
        el('div', { className: 'sig-line' }),
        el('div', { className: 'label' }, ['Customer Signature  ·  ' + p.customer_name])
      ]),
      el('div', null, [
        el('div', { className: 'sig-line' }),
        el('div', { className: 'label' }, ['Date'])
      ])
    ]);
  }

  function buildAcceptance(p) {
    var parts = [el('h2', { className: 'section' }, ['Acceptance'])];
    parts.push(el('p', { style: 'font-size: 12px; color: var(--pu-gray); margin: 0 0 12px 0;' }, [
      'Accepting this proposal confirms the scope, pricing, and terms as written. Plus Ultra Roofing will schedule the install within ' + (p.valid_days || 30) + ' days of receiving acceptance and deposit, subject to weather and crew availability.'
    ]));
    parts.push(buildAccept(p));
    parts.push(buildSignatureBlock(p));
    return parts;
  }

  function buildFooter() {
    return el('div', { className: 'footer' }, [
      el('strong', null, ['Plus Ultra Roofing']),
      document.createTextNode('  ·  Riverview / Moncton, NB  ·  (506) 616-4607  ·  plusultraroofing.com'),
      el('br'),
      document.createTextNode("Workers' Comp covered  ·  Fully insured  ·  HST # on request")
    ]);
  }

  function appendAll(parent, items) {
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      if (item == null) continue;
      if (Array.isArray(item)) appendAll(parent, item);
      else parent.appendChild(item);
    }
  }

  function render(p) {
    document.title = 'Plus Ultra Roofing · ' + p.customer_name + ', ' + p.address;

    var root = document.getElementById('root');
    root.innerHTML = '';
    var page = el('div', { className: 'page' });
    page.appendChild(el('div', { className: 'brand-stripe' }));
    page.appendChild(buildHeader(p));
    var hero = buildHero(p);
    if (hero) page.appendChild(hero);

    var body = el('div', { className: 'body' });
    appendAll(body, [
      buildCustomer(p),
      buildScope(p),
      buildRedeckingNotice(p),
      buildDeliverables(p),
      buildExclusions(p),
      buildInvestment(p),
      buildPaymentTerms(p),
      buildWarranty(p),
      buildAcceptance(p)
    ]);
    page.appendChild(body);
    page.appendChild(buildFooter());

    root.appendChild(page);

    wireAccept(p);
    fireOpenedEvent(p);
  }

  function wireAccept(p) {
    var btn = document.getElementById('acceptBtn');
    if (!btn) return;
    var initial = document.getElementById('acceptInitial');
    var confirmEl = document.getElementById('acceptConfirm');
    var successEl = document.getElementById('acceptSuccess');
    var btnYes = document.getElementById('acceptYes');
    var btnNo = document.getElementById('acceptCancel');
    var errEl = document.getElementById('acceptError');
    var stamp = document.getElementById('acceptStamp');

    btn.addEventListener('click', function() {
      initial.style.display = 'none';
      confirmEl.classList.add('show');
      errEl.style.display = 'none';
    });
    btnNo.addEventListener('click', function() {
      confirmEl.classList.remove('show');
      initial.style.display = 'block';
    });
    btnYes.addEventListener('click', async function() {
      btnYes.disabled = true; btnNo.disabled = true;
      btnYes.textContent = 'Sending...';
      errEl.style.display = 'none';
      try {
        var r = await fetch('/api/custom-proposal-accept', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug: p.slug, accepted_at: new Date().toISOString() })
        });
        if (!r.ok) {
          var body = await r.text();
          throw new Error('Server responded ' + r.status + ': ' + body.substring(0, 200));
        }
        confirmEl.classList.remove('show');
        var now = new Date();
        stamp.textContent = 'Recorded ' + now.toLocaleString('en-CA', {
          year: 'numeric', month: 'short', day: 'numeric',
          hour: 'numeric', minute: '2-digit'
        });
        successEl.classList.add('show');
      } catch (e) {
        btnYes.disabled = false; btnNo.disabled = false;
        btnYes.textContent = 'Yes, Accept';
        errEl.textContent = 'Something went wrong. Please try again or call (506) 616-4607. (' + e.message + ')';
        errEl.style.display = 'block';
      }
    });
  }

  function fireOpenedEvent(p) {
    // Best-effort proposal-opened beacon for owner notifications.
    // Errors are silent so the customer's view never breaks.
    try {
      fetch('/api/proposal-events', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'custom_proposal_opened',
          slug: p.slug,
          quote_id: p.quote_id,
          at: new Date().toISOString()
        })
      }).catch(function() {});
    } catch (_) {}
  }

  function showError(slug, status, message) {
    var root = document.getElementById('root');
    root.innerHTML = '';
    root.appendChild(el('div', { className: 'page' }, [
      el('div', { className: 'error-page' }, [
        el('h1', null, ['Proposal not found']),
        el('p', null, ['We could not load the proposal at this link.']),
        el('p', { style: 'margin-top: 12px;' }, [
          'Slug: ', el('code', null, [slug || '(none)']), '  ·  Status: ', String(status)
        ]),
        el('p', { style: 'margin-top: 24px;' }, [
          'Please call (506) 616-4607 if you were expecting to see a proposal here.'
        ])
      ])
    ]));
  }

  function getSlug() {
    var params = new URLSearchParams(window.location.search);
    var slug = params.get('slug');
    if (slug) return slug.trim();
    // Fallback: parse from pathname /proposals/custom/<slug>
    var m = window.location.pathname.match(/\/proposals\/custom\/([^\/]+?)(?:\.html)?$/);
    return m ? decodeURIComponent(m[1]) : '';
  }

  async function load() {
    var slug = getSlug();
    if (!slug) return showError('', 'no-slug', 'missing slug');
    try {
      var r = await fetch('/api/custom-proposals?slug=' + encodeURIComponent(slug), { cache: 'no-store' });
      if (!r.ok) return showError(slug, r.status, await r.text());
      var body = await r.json();
      // API wraps single-row responses as { proposal: {...} }; tolerate legacy flat shape too
      var p = (body && body.proposal) ? body.proposal : body;
      render(p);
    } catch (e) {
      showError(slug, 'fetch-failed', e.message);
    }
  }

  load();
})();
</script>

</body>
</html>
