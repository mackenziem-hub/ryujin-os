<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Marketing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow:hidden;position:relative}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(34,211,238,0.08) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(124,58,237,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}
.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(124,58,237,0.24);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#7c3aed,#22d3ee,transparent);opacity:0.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(220,200,255,0.3),rgba(124,58,237,0.22) 40%,rgba(10,5,25,0.8));box-shadow:0 0 14px rgba(124,58,237,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}
.tb-stat{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:0.68em;color:rgba(160,190,230,0.62);letter-spacing:1px}
.tb-stat .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.tb-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(6,10,20,0.6);border:1px solid rgba(124,58,237,0.24);color:rgba(160,190,230,0.62);cursor:pointer;transition:all 0.2s}
.tb-icon:hover{color:#a78bfa;border-color:rgba(124,58,237,0.5);background:rgba(124,58,237,0.08)}
.tb-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#subhub-stage{position:absolute;inset:0;width:100%;height:100%}
</style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <button class="tb-icon" onclick="goBackToMainHub()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· MARKETING</span></div></div>
  <div class="tb-stat"><div class="dot"></div><span>META API · ONLINE</span></div>
  <div class="tb-spacer"></div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px">ADS · LEADS · CREATIVES</div>
</div>

<div id="subhub-stage"></div>

<script src="assets/ryujin-search.js"></script>
<script src="assets/ryujin-chat.js"></script>
<script src="assets/ryujin-tutor.js"></script>
<script src="assets/ryujin-subhub.js"></script>
<script>
RyujinSubHub.init({
  sector: 'MARKETING',
  subtitle: 'ADS · CONTENT · LEADS · CREATIVES',
  accent: { main: '#a78bfa', deep: '#7c3aed', glow: 'rgba(124,58,237,0.4)' },
  panels: [
    {
      title: 'STRATEGY',
      sub: 'Hormozi Core Four · Martell task hierarchy · today\u2019s priority brief',
      meta: 'HORMOZI · MARTELL · BRIEF',
      url: 'marketing-strategy.html',
      icon: '<svg viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4.5L18 22l-6-4-6 4 1.5-8.5L2 9h7z"/></svg>'
    },
    {
      title: 'ADS & CAMPAIGNS',
      sub: 'Active campaigns · creative performance · funnel · spend',
      meta: 'CAMPAIGNS · SPEND',
      url: 'marketing-ads.html',
      icon: '<svg viewBox="0 0 24 24"><path d="M3 11l18-8-8 18-2-8-8-2z"/></svg>'
    },
    {
      title: 'NEW CAMPAIGN',
      sub: 'Build and launch a new campaign · audience · creative · budget',
      meta: 'NEW · AUDIENCE · CREATIVE',
      url: 'marketing-campaign.html',
      icon: '<svg viewBox="0 0 24 24"><polyline points="5 12 12 5 19 12" transform="rotate(90 12 12)"/><line x1="12" y1="19" x2="12" y2="5"/></svg>'
    },
    {
      title: 'CREATIVES',
      sub: 'Video library · hook rates · star ratings · upload',
      meta: 'LIBRARY · UPLOAD · HOOKS',
      url: 'marketing-creatives.html',
      icon: '<svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><polygon points="10 8 16 12 10 16"/></svg>'
    },
    {
      title: 'CONTENT CALENDAR',
      sub: 'Compose · schedule · drag across the month · auto-caption render',
      meta: 'COMPOSE · SCHEDULE · POST',
      url: 'marketing-content-calendar.html',
      icon: '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'
    },
    {
      title: 'LEADS',
      sub: 'Fresh leads · sources · re-engagement · stale list',
      meta: 'INBOUND · SOURCES · STALE',
      url: 'marketing-leads.html',
      icon: '<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>'
    }
  ]
});

Ryujin.init({
  sector: 'MARKETING',
  autoOpen: false,
  root: {
    msg: "Marketing. Pick a system — strategy, ads, new campaign, creatives, content calendar, or leads.",
    choices: [
      { text: 'Open Strategy Brief', next: 'strat' },
      { text: 'Ads & Campaigns', next: 'ads' },
      { text: 'Launch a new one', next: 'new' },
      { text: 'Creative library', next: 'cre' },
      { text: 'Content calendar', next: 'cal' },
      { text: 'Re-engage stale leads', next: 'leads' }
    ]
  },
  states: {
    strat: { effect: () => setTimeout(() => window.location.href='marketing-strategy.html', 500), choices: [] },
    ads: { effect: () => setTimeout(() => window.location.href='marketing-ads.html', 500), choices: [] },
    new: { effect: () => setTimeout(() => window.location.href='marketing-campaign.html', 500), choices: [] },
    cre: { effect: () => setTimeout(() => window.location.href='marketing-creatives.html', 500), choices: [] },
    cal: { effect: () => setTimeout(() => window.location.href='marketing-content-calendar.html', 500), choices: [] },
    leads: { effect: () => setTimeout(() => window.location.href='marketing-leads.html', 500), choices: [] }
  }
});

function goBackToMainHub(){
  if (window.parent !== window && window.parent.exitSectionOverlay) { window.parent.exitSectionOverlay(); return; }
  window.location.href = 'command-center.html';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); goBackToMainHub(); } });
document.addEventListener('contextmenu', e => { e.preventDefault(); goBackToMainHub(); });
</script>

<script src="assets/ryujin-mode.js"></script>
<script src="assets/ryujin-tenant.js"></script>
<script src="assets/ryujin-persist.js"></script>
<script src="assets/ryujin-api.js"></script>
<script src="assets/ryujin-scenario.js"></script>
<script src="assets/ryujin-xp.js"></script>
<script src="assets/ryujin-mode-badge.js"></script>

</body>
</html>
