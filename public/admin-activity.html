<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060a14">
<title>Activity Log · Ryujin OS</title>
<link rel="icon" href="/apple-touch-icon.png">
<script src="/assets/portal-auth-client.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a14;--card:rgba(20,30,50,0.85);--card-hi:rgba(22,34,58,0.95);--border:rgba(34,211,238,0.16);--border-hi:rgba(34,211,238,0.35);--text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);--cyan:#22d3ee;--purple:#7c3aed;--green:#4ade80;--gold:#fbbf24;--red:#f87171;--orange:#fb923c}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;padding:24px 32px 80px}
.wrap{max-width:1500px;margin:0 auto}
.crumb{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.crumb a{color:var(--cyan);text-decoration:none}
h1{font-family:'Orbitron',monospace;font-size:1.6em;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,#e0e6f0 20%,var(--cyan) 65%,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.sub{font-size:0.9em;color:var(--text-dim);margin-bottom:20px;line-height:1.5}

.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:16px}
.bar label{font-family:'Share Tech Mono',monospace;font-size:0.7em;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-right:4px}
.bar select,.bar input{background:rgba(8,12,24,0.7);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 12px;font-family:inherit;font-size:0.85em;min-width:140px}
.bar select:focus,.bar input:focus{border-color:var(--border-hi);outline:none}
.bar button{padding:7px 14px;background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.35);color:var(--cyan);border-radius:8px;font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.4px;text-transform:uppercase;cursor:pointer;font-weight:700}
.bar button:hover{background:rgba(34,211,238,0.18)}

.summary{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:18px;font-family:'Share Tech Mono',monospace;font-size:0.78em;color:var(--text-dim);letter-spacing:1.2px}
.summary span{padding:5px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.summary span b{color:var(--cyan);font-weight:800}

table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
th{font-family:'Orbitron',monospace;font-size:0.65em;letter-spacing:2px;text-transform:uppercase;text-align:left;padding:12px 14px;color:var(--text-dim);background:rgba(8,12,24,0.6);border-bottom:1px solid var(--border);font-weight:700}
td{padding:11px 14px;font-size:0.84em;border-bottom:1px solid rgba(34,211,238,0.06);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(34,211,238,0.03)}
.action-pill{display:inline-block;padding:2px 9px;border-radius:10px;background:rgba(34,211,238,0.1);color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:0.74em;font-weight:600;letter-spacing:0.8px}
.action-pill.created,.action-pill.signed,.action-pill.accepted{background:rgba(74,222,128,0.12);color:var(--green)}
.action-pill.updated,.action-pill.edited{background:rgba(34,211,238,0.12);color:var(--cyan)}
.action-pill.deleted,.action-pill.cancelled,.action-pill.declined{background:rgba(248,113,113,0.12);color:var(--red)}
.action-pill.sent,.action-pill.notified{background:rgba(124,58,237,0.12);color:#a78bfa}
.entity{font-family:'Share Tech Mono',monospace;font-size:0.74em;color:var(--text-dim);letter-spacing:0.8px}
.entity b{color:var(--text);font-weight:700}
.user-cell{font-size:0.82em}
.user-cell .role{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:var(--text-dim);letter-spacing:0.8px;display:block;margin-top:1px}
.detail-cell{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:var(--text-dim);max-width:380px;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.4}
.detail-cell.open{white-space:pre-wrap;max-height:300px;overflow-y:auto;background:rgba(8,12,24,0.5);border-radius:6px;padding:8px}
.when{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-muted);letter-spacing:0.8px;white-space:nowrap}
.empty{padding:40px;text-align:center;color:var(--text-dim);font-size:0.9em}
.pagination{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding:8px 14px;font-family:'Share Tech Mono',monospace;font-size:0.78em;color:var(--text-dim)}
.pagination button{background:rgba(34,211,238,0.06);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:0.88em;letter-spacing:1px}
.pagination button:hover:not(:disabled){background:rgba(34,211,238,0.12);border-color:var(--border-hi)}
.pagination button:disabled{opacity:0.3;cursor:not-allowed}

.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(34,211,238,0.06);border:1px solid var(--border);border-radius:8px;color:var(--cyan);text-decoration:none;font-family:'Orbitron',monospace;font-size:0.7em;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px}
.back-btn:hover{background:rgba(34,211,238,0.12)}
</style>
  <script src="/assets/ryujin-slug.js"></script>
</head>
<body>

<div class="wrap">
  <a href="/administration.html" class="back-btn">← Administration</a>
  <div class="crumb"><a href="/administration.html">Administration</a> / Activity Log</div>
  <h1>Activity Log</h1>
  <div class="sub">Every action across the system — proposals signed, estimates updated, paysheets accepted, messages sent, GHL pipeline moves, agent runs. Filterable by user, entity, and action.</div>

  <div class="bar" id="filterBar">
    <label>Days</label>
    <select id="f_days">
      <option value="1">Today</option>
      <option value="3">3 days</option>
      <option value="7" selected>7 days</option>
      <option value="14">14 days</option>
      <option value="30">30 days</option>
      <option value="90">90 days</option>
    </select>
    <label>User</label>
    <select id="f_user"><option value="">All users</option></select>
    <label>Entity</label>
    <select id="f_entity_type"><option value="">All entities</option></select>
    <label>Action</label>
    <select id="f_action"><option value="">All actions</option></select>
    <button onclick="load()">Apply</button>
    <button onclick="resetFilters()" style="background:transparent;color:var(--text-dim);border-color:rgba(255,255,255,0.08)">Clear</button>
    <button onclick="exportCSV()" style="margin-left:auto;background:rgba(124,58,237,0.1);color:#a78bfa;border-color:rgba(124,58,237,0.35)" title="Export current view as CSV">Export CSV</button>
  </div>

  <div class="summary" id="summary">—</div>

  <table>
    <thead>
      <tr>
        <th style="width:130px">When</th>
        <th style="width:140px">User</th>
        <th style="width:130px">Action</th>
        <th style="width:200px">Entity</th>
        <th>Details</th>
      </tr>
    </thead>
    <tbody id="rows"><tr><td colspan="5" class="empty">Loading…</td></tr></tbody>
  </table>

  <div class="pagination" id="pagination" style="display:none">
    <span id="pageInfo">—</span>
    <div style="display:flex;gap:6px">
      <button id="prevBtn" onclick="page(-1)">← Prev</button>
      <button id="nextBtn" onclick="page(+1)">Next →</button>
    </div>
  </div>
</div>

<script src="/assets/messages-badge.js" defer></script>
<script>
const TENANT = window.RYUJIN_TENANT_SLUG;
const PAGE_SIZE = 100;
let users = [];
let offset = 0;
let total = 0;
let currentRows = [];

function authHeaders() {
  const tok = localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token');
  const h = { 'x-tenant-id': TENANT };
  if (tok) h['Authorization'] = 'Bearer ' + tok;
  return h;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtWhen(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return d.toLocaleString('en-CA', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function fmtDetails(d) {
  if (!d || typeof d !== 'object') return '';
  return JSON.stringify(d, null, 2);
}

async function loadUsers() {
  try {
    const r = await fetch('/api/users', { headers: authHeaders() });
    if (!r.ok) return;
    const data = await r.json();
    users = data.users || data.data || data || [];
    const sel = document.getElementById('f_user');
    sel.innerHTML = '<option value="">All users</option>' + users.map(u => `<option value="${u.id}">${escapeHtml(u.name)} · ${escapeHtml(u.role)}</option>`).join('');
  } catch {}
}

function buildParams() {
  const p = new URLSearchParams();
  p.set('days', document.getElementById('f_days').value);
  p.set('limit', PAGE_SIZE);
  p.set('offset', offset);
  const u = document.getElementById('f_user').value;
  if (u) p.set('user_id', u);
  const e = document.getElementById('f_entity_type').value;
  if (e) p.set('entity_type', e);
  const a = document.getElementById('f_action').value;
  if (a) p.set('action', a);
  return p;
}

async function load() {
  document.getElementById('rows').innerHTML = '<tr><td colspan="5" class="empty">Loading…</td></tr>';
  const r = await fetch(`/api/activity?${buildParams()}`, { headers: authHeaders() });
  if (r.status === 401) {
    document.getElementById('rows').innerHTML = `<tr><td colspan="5" class="empty">Not signed in. <a href="/login.html?force=1&next=/admin-activity.html" style="color:var(--cyan)">Sign in</a>.</td></tr>`;
    return;
  }
  if (r.status === 403) {
    document.getElementById('rows').innerHTML = `<tr><td colspan="5" class="empty">Owner / admin only.</td></tr>`;
    return;
  }
  if (!r.ok) {
    document.getElementById('rows').innerHTML = `<tr><td colspan="5" class="empty">Failed (HTTP ${r.status})</td></tr>`;
    return;
  }
  const data = await r.json();
  total = data.total || 0;
  currentRows = data.activity || [];

  // Populate facet dropdowns once.
  const entSel = document.getElementById('f_entity_type');
  if (entSel.options.length <= 1 && data.facets?.entity_types?.length) {
    const cur = entSel.value;
    entSel.innerHTML = '<option value="">All entities</option>' + data.facets.entity_types.map(e => `<option value="${escapeHtml(e)}">${escapeHtml(e)}</option>`).join('');
    if (cur) entSel.value = cur;
  }
  const actSel = document.getElementById('f_action');
  if (actSel.options.length <= 1 && data.facets?.actions?.length) {
    const cur = actSel.value;
    actSel.innerHTML = '<option value="">All actions</option>' + data.facets.actions.map(a => `<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join('');
    if (cur) actSel.value = cur;
  }

  renderSummary(data);
  renderRows();
}

function renderSummary(data) {
  const summary = document.getElementById('summary');
  const fired = currentRows.length;
  summary.innerHTML = `
    <span>Window <b>${escapeHtml(document.getElementById('f_days').value)} days</b></span>
    <span>Showing <b>${fired}</b> of <b>${total}</b></span>
    <span>Window started <b>${new Date(Date.now() - parseInt(document.getElementById('f_days').value,10)*86400000).toLocaleDateString('en-CA')}</b></span>
  `;
}

function renderRows() {
  if (currentRows.length === 0) {
    document.getElementById('rows').innerHTML = '<tr><td colspan="5" class="empty">No activity in this window.</td></tr>';
    document.getElementById('pagination').style.display = 'none';
    return;
  }
  document.getElementById('rows').innerHTML = currentRows.map((row, i) => {
    const actionCls = (row.action || '').toLowerCase().replace(/[^a-z]/g,'-');
    const detailJson = fmtDetails(row.details);
    const detailShort = detailJson ? detailJson.slice(0, 90).replace(/\n/g,' ') + (detailJson.length > 90 ? '…' : '') : '';
    return `
      <tr>
        <td class="when">${fmtWhen(row.created_at)}</td>
        <td class="user-cell">${escapeHtml(row.user?.name || '—')}${row.user?.role ? `<span class="role">${escapeHtml(row.user.role)}</span>` : ''}</td>
        <td><span class="action-pill ${escapeHtml(actionCls)}">${escapeHtml(row.action || '—')}</span></td>
        <td class="entity"><b>${escapeHtml(row.entity_type || '?')}</b><br><span style="font-size:0.92em">${escapeHtml((row.entity_id || '').slice(0,8))}…</span></td>
        <td><div class="detail-cell" data-i="${i}" onclick="toggleDetails(this)">${escapeHtml(detailShort) || '—'}</div></td>
      </tr>
    `;
  }).join('');
  // Pagination.
  const pag = document.getElementById('pagination');
  pag.style.display = '';
  document.getElementById('pageInfo').textContent = `${offset + 1}–${Math.min(offset + PAGE_SIZE, total)} of ${total}`;
  document.getElementById('prevBtn').disabled = offset === 0;
  document.getElementById('nextBtn').disabled = offset + PAGE_SIZE >= total;
}

function toggleDetails(el) {
  const i = parseInt(el.dataset.i, 10);
  const full = fmtDetails(currentRows[i].details);
  if (el.classList.contains('open')) {
    const short = full ? full.slice(0,90).replace(/\n/g,' ') + (full.length > 90 ? '…' : '') : '';
    el.textContent = short || '—';
    el.classList.remove('open');
  } else {
    el.textContent = full || '—';
    el.classList.add('open');
  }
}

function page(dir) {
  offset = Math.max(0, offset + dir * PAGE_SIZE);
  load();
}

function resetFilters() {
  document.getElementById('f_user').value = '';
  document.getElementById('f_entity_type').value = '';
  document.getElementById('f_action').value = '';
  document.getElementById('f_days').value = '7';
  offset = 0;
  load();
}

function exportCSV() {
  if (!currentRows.length) return;
  const headers = ['when','user','role','action','entity_type','entity_id','details'];
  const rows = currentRows.map(r => [
    r.created_at,
    r.user?.name || '',
    r.user?.role || '',
    r.action || '',
    r.entity_type || '',
    r.entity_id || '',
    JSON.stringify(r.details || {}).replace(/"/g, '""')
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ryujin-activity-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('f_days').addEventListener('change', () => { offset = 0; load(); });
document.getElementById('f_user').addEventListener('change', () => { offset = 0; load(); });
document.getElementById('f_entity_type').addEventListener('change', () => { offset = 0; load(); });
document.getElementById('f_action').addEventListener('change', () => { offset = 0; load(); });

loadUsers().then(load);
</script>
<script src="/assets/portal-tabbar.js" defer></script>
</body>
</html>
