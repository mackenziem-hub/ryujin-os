<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Production Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--accent:#fb923c;--border:rgba(251,146,60,0.24);--border-hi:rgba(251,146,60,0.55);
  --text:#e0e6f0;--text-dim:rgba(160,190,230,0.62);--text-muted:rgba(140,170,220,0.32);
  --green:#4ade80;--red:#f87171;--yellow:#facc15;--cyan:#22d3ee;--purple:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:var(--text);overflow:hidden}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 35% 25%,rgba(251,146,60,0.08),transparent 55%),linear-gradient(180deg,#060a14,#030611)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(251,146,60,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(251,146,60,0.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at center,black 40%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 40%,transparent 85%)}
.app{position:relative;z-index:2;height:100vh;display:grid;grid-template-rows:56px 1fr;gap:10px;padding:10px 12px}

.topbar{display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.82);border:1px solid var(--border);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);position:relative;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--red),transparent);opacity:0.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.3),rgba(251,146,60,0.22) 40%,rgba(30,10,5,0.8));box-shadow:0 0 14px rgba(251,146,60,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.82em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:var(--text-dim);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}
.btn{padding:8px 14px;border-radius:9px;font-family:'Orbitron',sans-serif;font-size:0.68em;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:all 0.2s;border:1px solid;display:inline-flex;align-items:center;gap:8px;text-decoration:none}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn.ghost{background:rgba(6,10,20,0.6);border-color:var(--border);color:var(--text-dim)}
.btn.ghost:hover{border-color:var(--border-hi);color:var(--accent)}
.btn.primary{background:linear-gradient(135deg,var(--accent),#c2410c);border-color:var(--accent);color:#0a0604}

.main{display:grid;grid-template-columns:1fr 320px;gap:10px;min-height:0}
.panel{background:rgba(14,22,40,0.78);border:1px solid var(--border);border-radius:14px;backdrop-filter:blur(14px);display:flex;flex-direction:column;min-height:0;overflow:hidden;position:relative}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.5}

/* Calendar */
.cal-head{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid rgba(251,146,60,0.12);gap:12px;flex-wrap:wrap}
.cal-title{font-family:'Orbitron',sans-serif;font-size:1em;font-weight:900;letter-spacing:1.5px;color:var(--accent)}
.cal-nav{display:flex;gap:6px;align-items:center}
.cal-nav button{width:34px;height:34px;border-radius:8px;background:rgba(6,10,20,0.6);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.cal-nav button:hover{border-color:var(--border-hi);color:var(--accent)}
.cal-nav button svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.cal-today{padding:7px 14px;background:rgba(251,146,60,0.1);border:1px solid var(--border-hi);color:var(--accent);border-radius:8px;font-family:'Orbitron',sans-serif;font-size:0.68em;font-weight:800;letter-spacing:1.5px;cursor:pointer}
.cal-view-toggle{display:flex;gap:2px;padding:3px;background:rgba(6,10,20,0.55);border:1px solid rgba(251,146,60,0.15);border-radius:9px}
.cal-view-btn{padding:6px 14px;background:transparent;border:none;color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:0.66em;letter-spacing:1.2px;cursor:pointer;border-radius:7px;transition:all 0.15s}
.cal-view-btn.on{background:rgba(251,146,60,0.15);color:var(--accent)}

.cal-grid{flex:1;overflow:auto;padding:14px 18px}
.cal-weekhdr{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px}
.cal-weekhdr .d{font-family:'Share Tech Mono',monospace;font-size:0.68em;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;text-align:center;padding:6px 0}
.cal-month{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;grid-auto-rows:minmax(108px,auto)}
.cal-day{background:rgba(6,10,20,0.48);border:1px solid rgba(251,146,60,0.08);border-radius:9px;padding:8px;display:flex;flex-direction:column;cursor:pointer;transition:all 0.15s;min-height:108px}
.cal-day:hover{border-color:rgba(251,146,60,0.28);background:rgba(251,146,60,0.04)}
.cal-day.dim{opacity:0.35}
.cal-day.today{border-color:var(--accent);background:rgba(251,146,60,0.08);box-shadow:inset 0 0 0 1px var(--accent)}
.cal-day .n{font-family:'Orbitron',sans-serif;font-weight:800;font-size:0.9em;color:var(--text);margin-bottom:4px}
.cal-day.today .n{color:var(--accent)}
.cal-day .ev-list{display:flex;flex-direction:column;gap:3px;overflow:hidden}
.ev-chip{font-family:'Share Tech Mono',monospace;font-size:0.64em;letter-spacing:0.3px;padding:3px 6px;border-radius:4px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:3px solid}
.ev-chip.job{background:rgba(251,146,60,0.15);border-color:var(--accent);color:var(--accent)}
.ev-chip.inspect{background:rgba(34,211,238,0.15);border-color:var(--cyan);color:var(--cyan)}
.ev-chip.material{background:rgba(74,222,128,0.15);border-color:var(--green);color:var(--green)}
.ev-chip.warranty{background:rgba(167,139,250,0.15);border-color:var(--purple);color:var(--purple)}
.ev-chip.meet{background:rgba(250,204,21,0.15);border-color:var(--yellow);color:var(--yellow)}

/* Right panel: upcoming list + weather */
.panel-head{padding:14px 18px;border-bottom:1px solid rgba(251,146,60,0.12)}
.panel-title{font-family:'Orbitron',sans-serif;font-size:0.68em;font-weight:800;letter-spacing:2.5px;color:var(--accent);text-transform:uppercase}
.panel-sub{font-family:'Share Tech Mono',monospace;font-size:0.66em;color:var(--text-muted);letter-spacing:1px;margin-top:3px}
.panel-body{flex:1;overflow-y:auto;padding:14px 18px}

.wx-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(6,10,20,0.55);border:1px solid rgba(251,146,60,0.12);border-radius:9px;margin-bottom:6px}
.wx-row.alert{border-color:var(--red);background:rgba(239,68,68,0.06)}
.wx-row.warn{border-color:var(--yellow);background:rgba(250,204,21,0.06)}
.wx-day{font-family:'Orbitron',sans-serif;font-weight:800;font-size:0.72em;letter-spacing:1px}
.wx-info{font-family:'Share Tech Mono',monospace;font-size:0.68em;color:var(--text-dim);letter-spacing:0.5px}
.wx-temp{font-family:'Orbitron',sans-serif;font-weight:700;font-size:0.82em;color:var(--accent)}

.up-card{padding:12px 14px;background:rgba(6,10,20,0.5);border:1px solid rgba(251,146,60,0.1);border-left:3px solid var(--accent);border-radius:0 9px 9px 0;margin-bottom:7px;cursor:pointer;transition:all 0.15s}
.up-card:hover{background:rgba(251,146,60,0.04);border-color:rgba(251,146,60,0.3);border-left-color:var(--accent)}
.up-card.inspect{border-left-color:var(--cyan)}
.up-card.warranty{border-left-color:var(--purple)}
.up-card.meet{border-left-color:var(--yellow)}
.up-card .d{font-family:'Share Tech Mono',monospace;font-size:0.66em;color:var(--accent);letter-spacing:1.2px;margin-bottom:3px}
.up-card.inspect .d{color:var(--cyan)}
.up-card.warranty .d{color:var(--purple)}
.up-card.meet .d{color:var(--yellow)}
.up-card .t{font-size:0.85em;font-weight:600;margin-bottom:2px}
.up-card .m{font-family:'Share Tech Mono',monospace;font-size:0.68em;color:var(--text-muted);letter-spacing:0.3px}

.legend{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;padding:10px 12px;margin-top:10px;background:rgba(6,10,20,0.4);border-radius:8px;border:1px solid rgba(251,146,60,0.08)}
.legend-item{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:0.6em;color:var(--text-dim);letter-spacing:0.8px}
.legend-dot{width:10px;height:3px;border-radius:1px}

/* Day detail modal */
.day-modal{position:fixed;inset:0;z-index:400;background:rgba(3,6,17,0.88);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:30px}
.day-modal.on{display:flex}
.day-card{background:rgba(10,18,34,0.98);border:1px solid var(--border-hi);border-radius:18px;padding:28px 32px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 28px 80px rgba(0,0,0,0.6),0 0 40px rgba(251,146,60,0.15)}
.day-card h2{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.4em;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
.day-card .dc-sub{font-family:'Share Tech Mono',monospace;font-size:0.74em;color:var(--text-muted);letter-spacing:1.5px;margin-bottom:20px}
.day-card .dc-close{position:absolute;top:14px;right:18px;background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:1.4em;padding:4px 10px;border-radius:6px}
.day-card .dc-close:hover{color:var(--accent)}

@media (max-width: 900px){
  .main{grid-template-columns:1fr}
  .cal-day{min-height:80px}
}


/* Mobile — tool pages should be scrollable and stack columns */
@media (max-width: 900px){
  html,body{overflow:auto!important;height:auto!important;min-height:100%}
  body{overflow-x:hidden}
  .app{height:auto!important;min-height:100vh;grid-template-rows:auto auto 1fr!important;padding:8px 8px}
  .topbar{position:sticky;top:0;z-index:15;flex-wrap:wrap;padding:8px 12px!important;height:auto!important;gap:6px}
  .topbar .btn,.topbar .tb-icon{padding:6px 9px;font-size:0.6em;letter-spacing:0.8px}
  .topbar .btn svg,.topbar .tb-icon svg{width:12px;height:12px}
  .topbar .brand-name{font-size:0.7em}
  .tb-spacer{display:none}
  .main{grid-template-columns:1fr!important;grid-auto-rows:auto!important;gap:10px}
  .panel{max-height:none;min-height:280px}
  .panel-head{padding:12px 14px!important;flex-wrap:wrap;gap:8px}
  .panel-body{padding:10px 12px!important}
  .field-row,.field-row.three{grid-template-columns:1fr!important}
  /* Pay sheet 3-col → 1-col */
  .step-nav{order:-1;max-height:none;padding:10px!important}
  .content-body{padding:14px 16px!important}
  .content-foot{flex-direction:column;gap:6px;padding:10px!important}
  .content-foot .btn{width:100%;justify-content:center}
}
</style>
</head>
<body data-prod-tool="calendar">

<div class="bg"></div>
<div class="bg-grid"></div>

<div class="app">
  <div class="topbar">
    <button class="btn ghost" onclick="goBack()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· PRODUCTION CALENDAR</span></div></div>
    <div class="tb-spacer"></div>
    <button class="btn ghost" onclick="newEvent()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>NEW EVENT</button>
    <button class="btn ghost" onclick="exportICS()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>EXPORT .ICS</button>
    <a class="btn ghost" href="command-center.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>MAIN MENU</a>
  </div>

  <div class="main">

    <div class="panel">
      <div class="cal-head">
        <div class="cal-title" id="calTitle">—</div>
        <div class="cal-nav">
          <button onclick="navMonth(-1)" title="Prev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
          <button class="cal-today" onclick="goToday()">TODAY</button>
          <button onclick="navMonth(1)" title="Next"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
      </div>
      <div class="cal-grid">
        <div class="cal-weekhdr">
          <div class="d">Sun</div><div class="d">Mon</div><div class="d">Tue</div><div class="d">Wed</div><div class="d">Thu</div><div class="d">Fri</div><div class="d">Sat</div>
        </div>
        <div class="cal-month" id="calMonth"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Upcoming</div>
        <div class="panel-sub">Next 14 days + weather</div>
      </div>
      <div class="panel-body">
        <div class="panel-title" style="font-size:0.6em;margin-bottom:8px">3-DAY FORECAST</div>
        <div id="wxList"></div>

        <div class="panel-title" style="font-size:0.6em;margin:14px 0 8px">NEXT UP</div>
        <div id="upList"></div>

        <div class="legend">
          <div class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span>Job</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--cyan)"></span>Inspection</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--green)"></span>Materials</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--purple)"></span>Warranty</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--yellow)"></span>Meeting</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Day detail modal -->
<div class="day-modal" id="dayModal">
  <div class="day-card" style="position:relative">
    <button class="dc-close" onclick="closeDay()">×</button>
    <h2 id="dcTitle">—</h2>
    <div class="dc-sub" id="dcSub">—</div>
    <div id="dcEvents"></div>
    <button class="btn primary" style="width:100%;margin-top:14px;justify-content:center" onclick="addEventForSelected()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>ADD EVENT</button>
  </div>
</div>

<script src="assets/ryujin-mode.js"></script>
<script src="assets/ryujin-tenant.js"></script>
<script src="assets/ryujin-persist.js"></script>
<script src="assets/ryujin-api.js"></script>
<script src="assets/ryujin-scenario.js"></script>
<script src="assets/ryujin-xp.js"></script>
<script src="assets/ryujin-mode-badge.js"></script>
<script>

// ── Calendar events — seeded from real Plus Ultra signed jobs (as of Apr 19 2026) ──
// Edit / add / delete from the UI. Changes persist in localStorage.
const DEFAULT_EVENTS = [
  // Richard Seyeau — 10 Edgewater, Shediac (Apr 22-23)
  { d: '2026-04-22', type: 'job', t: 'Seyeau · Day 1 — mansard + caulk', m: '10 Edgewater Dr, Shediac · AJ + Diego · punch list + mansard finish' },
  { d: '2026-04-23', type: 'job', t: 'Seyeau · Day 2 — walkthrough + invoice', m: '10 Edgewater Dr, Shediac · final walkthrough · invoice balance' },
  // Sackville — 7 Main St (active)
  { d: '2026-04-20', type: 'job', t: '7 Main St · exterior — Day 1', m: 'Sackville · Diego + Pavanjot · siding/soffit/fascia/gutters' },
  { d: '2026-04-21', type: 'job', t: '7 Main St · exterior — Day 2', m: 'Sackville · Diego + Pavanjot · continue exterior' },
  { d: '2026-04-22', type: 'job', t: '7 Main St · exterior — Day 3', m: 'Sackville · Diego + Pavanjot' },
  { d: '2026-04-23', type: 'job', t: '7 Main St · exterior — Day 4 · wrap', m: 'Sackville · touch-ups + walkthrough' },
  // Arzaga — 105 Rue Fortune, Dieppe (Apr 28-30)
  { d: '2026-04-28', type: 'job', t: 'Arzaga · Day 1 — 27 SQ tear-off', m: '105 Rue Fortune, Dieppe · Platinum · Ryan · Atlantic' },
  { d: '2026-04-29', type: 'job', t: 'Arzaga · Day 2 — I&W + underlayment', m: '105 Rue Fortune, Dieppe · shingle install starts' },
  { d: '2026-04-30', type: 'job', t: 'Arzaga · Day 3 — finish + walkthrough', m: '105 Rue Fortune, Dieppe · ridge vent + cleanup' },
  // Northrup — 79 Willow St, Amherst NS (May 2-3)
  { d: '2026-05-02', type: 'job', t: 'Northrup · Day 1 — 11 SQ (Amherst NS)', m: '79 Willow St, Amherst NS · OUT-OF-TOWN · Ryan · Atlantic · travel 100km' },
  { d: '2026-05-03', type: 'job', t: 'Northrup · Day 2 — finish + invoice', m: '79 Willow St, Amherst NS · Platinum · steel chimney' },
  // Pardy — 316 Pointe a Nicet (May 5-7) — scope to finalize
  { d: '2026-05-01', type: 'meet', t: 'Pardy — finalize scope', m: '316 Pointe a Nicet Rd · confirm SQ, tier, color, start date' },
  { d: '2026-05-05', type: 'job', t: 'Pardy · Day 1', m: '316 Pointe a Nicet Rd · scope TBD · confirm before' },
  { d: '2026-05-06', type: 'job', t: 'Pardy · Day 2', m: '316 Pointe a Nicet Rd' },
  { d: '2026-05-07', type: 'job', t: 'Pardy · Day 3 — wrap', m: '316 Pointe a Nicet Rd' },
  // Fram — Windyhill Rd (May 12-14)
  { d: '2026-05-12', type: 'job', t: 'Fram · Day 1 — 22 SQ tear-off', m: '25 Windyhill Road, Indian Mountain · Platinum · Ryan · Atlantic' },
  { d: '2026-05-13', type: 'job', t: 'Fram · Day 2 — install', m: '25 Windyhill Road · shingle install' },
  { d: '2026-05-14', type: 'job', t: 'Fram · Day 3 — finish + walkthrough', m: '25 Windyhill Road · ridge + cleanup' },
  // Faulkner — needs scope
  { d: '2026-04-22', type: 'meet', t: 'Faulkner — gather scope + contact', m: 'Estimator OS #69 · phone/address/measurements missing' },
  // Ongoing
  { d: '2026-04-21', type: 'meet', t: 'Darcy 1:1 — pipeline review', m: 'Weekly check-in · 3 jobs need follow-up (Gould, Pardy scope, Faulkner details)' }
];

// Weather forecast — empty until wired to a real API.
// TODO: plug Environment Canada API keyed on tenant postal code.
const WEATHER = [];

// ── State ──
function loadEvents(){
  try {
    const r = localStorage.getItem('ry_v1_calendar_events_v3');
    if (r) return JSON.parse(r);
  } catch(e){}
  // First load: seed with real scheduled jobs
  try { localStorage.setItem('ry_v1_calendar_events_v3', JSON.stringify(DEFAULT_EVENTS)); } catch(e){}
  return DEFAULT_EVENTS.slice();
}
function saveEvents(list){ try { localStorage.setItem('ry_v1_calendar_events_v3', JSON.stringify(list)); } catch(e){} }

const events = loadEvents();
let viewDate = new Date();
let selectedISO = null;

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function $(id){ return document.getElementById(id); }
function iso(d){ return d.toISOString().slice(0,10); }
function fromISO(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }

function eventsFor(isoDate){ return events.filter(e => e.d === isoDate); }

// ── Calendar rendering ──
function renderCalendar(){
  $('calTitle').textContent = MONTHS[viewDate.getMonth()] + ' ' + viewDate.getFullYear();
  const year = viewDate.getFullYear(), month = viewDate.getMonth();
  const firstOfMonth = new Date(year, month, 1);
  const startDow = firstOfMonth.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const gridStart = new Date(year, month, 1 - startDow);

  const today = iso(new Date());
  const days = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart);
    d.setDate(gridStart.getDate() + i);
    days.push(d);
  }
  // Trim to show only full weeks needed
  const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;
  const trimmed = days.slice(0, totalCells);

  $('calMonth').innerHTML = trimmed.map(d => {
    const dIso = iso(d);
    const isThisMonth = d.getMonth() === month;
    const isToday = dIso === today;
    const evs = eventsFor(dIso);
    return `
      <div class="cal-day ${isThisMonth ? '' : 'dim'} ${isToday ? 'today' : ''}" onclick="openDay('${dIso}')">
        <div class="n">${d.getDate()}</div>
        <div class="ev-list">
          ${evs.slice(0, 4).map(e => `<div class="ev-chip ${e.type}">${e.t}</div>`).join('')}
          ${evs.length > 4 ? `<div class="ev-chip" style="color:var(--text-muted);background:transparent;border:none">+${evs.length - 4} more</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function navMonth(dir){
  viewDate.setMonth(viewDate.getMonth() + dir);
  renderCalendar();
}
function goToday(){ viewDate = new Date(); renderCalendar(); }

// ── Right panel ──
function renderSidebar(){
  $('wxList').innerHTML = WEATHER.length
    ? WEATHER.map(w => `<div class="wx-row ${w.cls}"><div><div class="wx-day">${w.day}</div><div class="wx-info">${w.info}</div></div><div class="wx-temp">${w.temp}</div></div>`).join('')
    : '<div style="padding:14px 16px;background:rgba(6,10,20,0.4);border:1px dashed rgba(251,146,60,0.18);border-radius:9px;text-align:center;color:var(--text-muted);font-size:0.78em;line-height:1.5">Weather feed not wired yet.<br><span style="font-family:\'Share Tech Mono\',monospace;font-size:0.88em">Coming soon — Environment Canada for your region.</span></div>';

  const today = new Date();
  const in14 = new Date();
  in14.setDate(today.getDate() + 14);
  const upcoming = events
    .filter(e => { const d = fromISO(e.d); return d >= new Date(today.toDateString()) && d <= in14; })
    .sort((a, b) => a.d.localeCompare(b.d))
    .slice(0, 12);
  $('upList').innerHTML = upcoming.length ? upcoming.map(e => {
    const d = fromISO(e.d);
    const label = d.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
    return `
      <div class="up-card ${e.type}" onclick="openDay('${e.d}')">
        <div class="d">${label}</div>
        <div class="t">${e.t}</div>
        <div class="m">${e.m || ''}</div>
      </div>
    `;
  }).join('') : '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:0.85em">No events in the next 14 days.</div>';
}

// ── Day modal ──
function openDay(dIso){
  selectedISO = dIso;
  const d = fromISO(dIso);
  $('dcTitle').textContent = d.toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric' });
  $('dcSub').textContent = dIso.toUpperCase();
  const evs = eventsFor(dIso);
  $('dcEvents').innerHTML = evs.length ? evs.map((e, i) => `
    <div class="up-card ${e.type}" style="margin-bottom:10px">
      <div class="d">${e.type.toUpperCase()}</div>
      <div class="t">${e.t}</div>
      <div class="m">${e.m || ''}</div>
      <button class="btn ghost" style="margin-top:8px;padding:5px 10px;font-size:0.62em" onclick="deleteEvent(${events.indexOf(e)})">DELETE</button>
    </div>
  `).join('') : '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:0.85em">No events for this day. Add one below.</div>';
  $('dayModal').classList.add('on');
}
function closeDay(){ $('dayModal').classList.remove('on'); }

function addEventForSelected(){
  if (!selectedISO) return;
  addEventPrompt(selectedISO);
}
function newEvent(){
  const date = prompt('Date (YYYY-MM-DD)?', iso(new Date()));
  if (!date) return;
  addEventPrompt(date);
}
function addEventPrompt(date){
  const t = prompt('Event title?');
  if (!t) return;
  const type = prompt('Type? (job / inspect / material / warranty / meet)', 'job').toLowerCase();
  const m = prompt('Notes / details?', '') || '';
  events.push({ d: date, type: ['job','inspect','material','warranty','meet'].includes(type) ? type : 'job', t, m });
  saveEvents(events);
  renderCalendar();
  renderSidebar();
  if (selectedISO === date) openDay(date);
}
function deleteEvent(idx){
  if (idx < 0 || !events[idx]) return;
  if (!confirm('Delete "' + events[idx].t + '"?')) return;
  events.splice(idx, 1);
  saveEvents(events);
  renderCalendar();
  renderSidebar();
  if (selectedISO) openDay(selectedISO);
}

function exportICS(){
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Ryujin OS//Production Calendar//EN'];
  events.forEach(e => {
    const d = e.d.replace(/-/g,'');
    lines.push('BEGIN:VEVENT');
    lines.push('UID:' + d + '-' + Math.random().toString(36).slice(2,9) + '@ryujin');
    lines.push('DTSTART;VALUE=DATE:' + d);
    lines.push('SUMMARY:' + e.t);
    lines.push('DESCRIPTION:' + (e.m || '').replace(/\n/g, ' · '));
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  if (window.RyujinActions) RyujinActions.downloadText('ryujin-production.ics', lines.join('\r\n'));
}

function goBack(){ window.location.href = 'production.html'; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') { if ($('dayModal').classList.contains('on')) closeDay(); else goBack(); } });
document.addEventListener('contextmenu', e => { e.preventDefault(); if ($('dayModal').classList.contains('on')) closeDay(); else goBack(); });

window.navMonth = navMonth;
window.goToday = goToday;
window.openDay = openDay;
window.closeDay = closeDay;
window.addEventForSelected = addEventForSelected;
window.newEvent = newEvent;
window.deleteEvent = deleteEvent;
window.exportICS = exportICS;
window.goBack = goBack;

renderCalendar();
renderSidebar();
</script>
<script src="assets/ryujin-prod-nav.js"></script>
</body>
</html>
