<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Production Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow-x:hidden;min-height:100vh}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(251,146,60,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(248,113,113,0.06) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(251,146,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(251,146,60,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}

.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(251,146,60,0.24);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#fb923c,#f87171,transparent);opacity:0.5}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #fff;border-radius:10px;color:#030611;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none;transition:all 0.2s}
.btn-back:hover{background:rgba(255,255,255,0.85);box-shadow:0 0 14px rgba(255,255,255,0.35)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.3),rgba(251,146,60,0.22) 40%,rgba(30,10,5,0.8));box-shadow:0 0 14px rgba(251,146,60,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}

.stage{position:relative;z-index:5;padding:80px 28px 60px;max-width:1280px;margin:0 auto}
.hero{margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap}
.hero .eyebrow{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:#fb923c;letter-spacing:3px;margin-bottom:6px}
.hero h1{font-family:'Orbitron',sans-serif;font-size:2em;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.month-nav{display:flex;align-items:center;gap:12px}
.month-nav button{width:40px;height:40px;border-radius:10px;background:rgba(14,22,40,0.7);border:1px solid rgba(251,146,60,0.25);color:#fb923c;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.month-nav button:hover{background:rgba(251,146,60,0.1);border-color:#fb923c}
.month-nav button svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.month-label{font-family:'Orbitron',sans-serif;font-size:1.1em;font-weight:900;letter-spacing:2px;color:#e0e6f0;min-width:200px;text-align:center}

.calendar{background:rgba(14,22,40,0.55);border:1px solid rgba(251,146,60,0.16);border-radius:14px;overflow:hidden}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);background:rgba(6,10,20,0.65);border-bottom:1px solid rgba(251,146,60,0.18)}
.cal-header .dow{padding:12px 14px;font-family:'Share Tech Mono',monospace;font-size:0.68em;letter-spacing:2px;color:rgba(200,220,255,0.6);text-transform:uppercase;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(110px, auto)}
.cal-cell{border-right:1px solid rgba(251,146,60,0.08);border-bottom:1px solid rgba(251,146,60,0.08);padding:8px;position:relative;transition:background 0.15s;min-height:110px}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.other-month{background:rgba(6,10,20,0.3);opacity:0.5}
.cal-cell.today{background:rgba(251,146,60,0.08)}
.cal-cell.today .day-num{color:#fb923c;font-weight:900}
.day-num{font-family:'Orbitron',sans-serif;font-size:0.82em;font-weight:700;color:rgba(200,220,255,0.75);margin-bottom:6px}
.event{display:block;padding:3px 7px;margin-bottom:3px;font-size:0.72em;border-radius:5px;cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid transparent;text-decoration:none}
.event:hover{transform:translateX(2px)}
.event.wo{background:rgba(251,146,60,0.15);color:#fb923c;border-color:rgba(251,146,60,0.35)}
.event.ps{background:rgba(34,211,238,0.12);color:#22d3ee;border-color:rgba(34,211,238,0.28)}
.event.accepted{background:rgba(74,222,128,0.14);color:#4ade80;border-color:rgba(74,222,128,0.3)}
.more-indicator{font-family:'Share Tech Mono',monospace;font-size:0.68em;color:rgba(200,220,255,0.4);letter-spacing:0.5px;padding:2px 7px;margin-top:2px}

.legend{display:flex;gap:16px;margin-top:14px;font-family:'Share Tech Mono',monospace;font-size:0.72em;color:rgba(200,220,255,0.6);letter-spacing:1px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-sw{width:14px;height:14px;border-radius:4px;border:1px solid}
.legend-sw.wo{background:rgba(251,146,60,0.25);border-color:rgba(251,146,60,0.5)}
.legend-sw.ps{background:rgba(34,211,238,0.2);border-color:rgba(34,211,238,0.45)}
.legend-sw.accepted{background:rgba(74,222,128,0.22);border-color:rgba(74,222,128,0.5)}

/* Weather pill in day cells */
.wx{position:absolute;top:6px;right:7px;font-family:'Share Tech Mono',monospace;font-size:0.62em;letter-spacing:0.5px;padding:2px 6px;border-radius:4px;background:rgba(6,10,20,0.7);color:rgba(200,220,255,0.65);display:flex;align-items:center;gap:4px;line-height:1}
.wx.clear{color:#facc15;background:rgba(250,204,21,0.1);border:1px solid rgba(250,204,21,0.22)}
.wx.cloudy{color:rgba(200,220,255,0.75);border:1px solid rgba(200,220,255,0.15)}
.wx.rain{color:#22d3ee;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.3)}
.wx.heavy{color:#f87171;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.35)}
.wx.snow{color:#fff;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.22)}
.wx .temp{color:rgba(200,220,255,0.55);font-size:0.82em;margin-left:2px}
.day-num{padding-right:52px}

.loading{text-align:center;padding:50px;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1.5px}

@media (max-width:760px){
  .cal-cell{min-height:78px;padding:5px}
  .day-num{font-size:0.72em}
  .event{font-size:0.6em;padding:2px 5px}
}
</style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="btn-back" href="production.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> BACK</a>
  <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· CALENDAR</span></div></div>
  <div class="tb-spacer"></div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px" id="countBadge">—</div>
</div>

<div class="stage">
  <div class="hero">
    <div class="hero-left">
      <div class="eyebrow">PRODUCTION · MONTH VIEW</div>
      <h1>Calendar</h1>
    </div>
    <div class="month-nav">
      <button onclick="prevMonth()" title="Previous month"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="month-label" id="monthLabel">—</div>
      <button onclick="nextMonth()" title="Next month"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
      <button onclick="goToday()" title="Jump to today" style="width:auto;padding:0 14px;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:700;letter-spacing:1.5px">TODAY</button>
    </div>
  </div>

  <div class="calendar">
    <div class="cal-header">
      <div class="dow">Sun</div><div class="dow">Mon</div><div class="dow">Tue</div><div class="dow">Wed</div><div class="dow">Thu</div><div class="dow">Fri</div><div class="dow">Sat</div>
    </div>
    <div class="cal-grid" id="calGrid">
      <div class="loading" style="grid-column:1/-1">LOADING SCHEDULED WORK...</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-sw wo"></div> Work Orders (scheduled start)</div>
    <div class="legend-item"><div class="legend-sw ps"></div> Pay Sheets (sub scheduled)</div>
    <div class="legend-item"><div class="legend-sw accepted"></div> Accepted Estimates (awaiting schedule)</div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let EVENTS = {}; // {'YYYY-MM-DD': [{type, title, url, tier}]}
let WEATHER = {}; // {'YYYY-MM-DD': {code, tmax, tmin, precip}}
let viewYear = (new Date()).getFullYear();
let viewMonth = (new Date()).getMonth();

function weatherTag(code, precip){
  if (code == null) return null;
  // Open-Meteo WMO weather codes: https://open-meteo.com/en/docs
  if (code === 0) return { cls: 'clear', icon: '☀', desc: 'Clear' };
  if ([1,2,3].includes(code)) return { cls: 'cloudy', icon: '⛅', desc: 'Partly cloudy' };
  if ([45,48].includes(code)) return { cls: 'cloudy', icon: '🌫', desc: 'Fog' };
  if ([51,53,55,56,57].includes(code)) return { cls: 'rain', icon: '🌦', desc: 'Drizzle' };
  if ([61,63,65,80,81,82].includes(code)) return { cls: precip >= 70 ? 'heavy' : 'rain', icon: '🌧', desc: 'Rain' };
  if ([66,67].includes(code)) return { cls: 'heavy', icon: '🌧', desc: 'Freezing rain' };
  if ([71,73,75,77,85,86].includes(code)) return { cls: 'snow', icon: '❄', desc: 'Snow' };
  if ([95,96,99].includes(code)) return { cls: 'heavy', icon: '⛈', desc: 'Thunderstorm' };
  return { cls: 'cloudy', icon: '', desc: '' };
}

async function loadWeather(){
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=46.088&longitude=-64.778' +
      '&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max' +
      '&timezone=America/Moncton&forecast_days=16';
    const r = await fetch(url);
    if (!r.ok) return;
    const d = await r.json();
    const days = d.daily || {};
    (days.time || []).forEach((date, i) => {
      WEATHER[date] = {
        code: days.weather_code?.[i],
        tmax: days.temperature_2m_max?.[i],
        tmin: days.temperature_2m_min?.[i],
        precip: days.precipitation_probability_max?.[i]
      };
    });
  } catch(e) { /* silent — weather is nice to have */ }
}

function dateKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function parseDate(iso){
  if (!iso) return null;
  // Handle YYYY-MM-DD or full ISO
  const d = new Date(iso + (iso.includes('T') ? '' : 'T12:00:00'));
  if (isNaN(d.getTime())) return null;
  return d;
}

async function loadEvents(){
  try {
    // Fire weather in parallel (don't wait — calendar renders without it if slow)
    loadWeather().then(() => render());
    const headers = { 'x-tenant-id': 'plus-ultra' };
    const [woR, psR, esR] = await Promise.all([
      fetch('/api/workorders?limit=200', { headers }),
      fetch('/api/paysheets?limit=200', { headers }),
      fetch('/api/estimates?limit=200', { headers })
    ]);
    const wos = woR.ok ? (await woR.json()).workorders || [] : [];
    const pss = psR.ok ? (await psR.json()).paysheets || [] : [];
    const ests = esR.ok ? (await esR.json()).estimates || [] : [];

    // Work orders → pin on start_date
    wos.forEach(w => {
      const d = parseDate(w.start_date);
      if (!d) return;
      const k = dateKey(d);
      (EVENTS[k] = EVENTS[k] || []).push({
        type: 'wo',
        title: (w.customer_name || '?') + ' · ' + (w.total_sq || '?') + ' SQ',
        sub: w.address,
        url: 'production-workorders.html',
        tier: (w.package_tier || '').toUpperCase()
      });
    });

    // Pay sheets → pin on scheduled_date (if set)
    pss.forEach(p => {
      const d = parseDate(p.scheduled_date);
      if (!d) return;
      const k = dateKey(d);
      (EVENTS[k] = EVENTS[k] || []).push({
        type: 'ps',
        title: (p.customer_name || '?') + ' · $' + Math.round((Number(p.total)||0)/1000) + 'K',
        sub: p.address,
        url: 'production-paysheet.html'
      });
    });

    // Accepted estimates without a WO start date → show on today as "awaiting schedule"
    const woEstIds = new Set(wos.map(w => w.linked_estimate_id).filter(Boolean));
    const today = dateKey(new Date());
    ests.forEach(e => {
      if ((e.status || '').toLowerCase() !== 'accepted') return;
      if (woEstIds.has(e.id)) return;
      (EVENTS[today] = EVENTS[today] || []).push({
        type: 'accepted',
        title: '⚠ ' + ((e.customer || {}).full_name || '?') + ' — schedule',
        sub: 'Accepted, no WO yet',
        url: 'sales-proposals.html'
      });
    });

    render();
  } catch(e) {
    $('calGrid').innerHTML = '<div class="loading" style="grid-column:1/-1">Error loading: ' + e.message + '</div>';
  }
}

function render(){
  $('monthLabel').textContent = MONTH_NAMES[viewMonth] + ' ' + viewYear;

  const first = new Date(viewYear, viewMonth, 1);
  const last = new Date(viewYear, viewMonth + 1, 0);
  const daysInMonth = last.getDate();
  const startDow = first.getDay(); // 0 = Sunday

  const cells = [];
  // Prev-month tail
  const prevLast = new Date(viewYear, viewMonth, 0).getDate();
  for (let i = startDow - 1; i >= 0; i--) {
    cells.push({ year: viewMonth === 0 ? viewYear - 1 : viewYear, month: viewMonth === 0 ? 11 : viewMonth - 1, day: prevLast - i, otherMonth: true });
  }
  // This month
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ year: viewYear, month: viewMonth, day: d, otherMonth: false });
  }
  // Next-month head to fill to 42 cells (6 weeks)
  const remaining = 42 - cells.length;
  for (let d = 1; d <= remaining; d++) {
    cells.push({ year: viewMonth === 11 ? viewYear + 1 : viewYear, month: viewMonth === 11 ? 0 : viewMonth + 1, day: d, otherMonth: true });
  }

  const todayKey = dateKey(new Date());
  let totalEvents = 0;

  $('calGrid').innerHTML = cells.map(c => {
    const iso = `${c.year}-${String(c.month+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`;
    const evs = EVENTS[iso] || [];
    if (!c.otherMonth) totalEvents += evs.length;
    const MAX = 3;
    const shown = evs.slice(0, MAX);
    const extra = evs.length > MAX ? evs.length - MAX : 0;
    const wx = WEATHER[iso];
    const tag = wx ? weatherTag(wx.code, wx.precip || 0) : null;
    const wxHtml = tag ? `<div class="wx ${tag.cls}" title="${tag.desc}${wx.precip!=null?' · '+wx.precip+'% precip':''}${wx.tmin!=null?' · '+Math.round(wx.tmin)+'°/'+Math.round(wx.tmax)+'°':''}">${tag.icon}${wx.tmax!=null?'<span class="temp">'+Math.round(wx.tmax)+'°</span>':''}</div>` : '';
    return `<div class="cal-cell ${c.otherMonth ? 'other-month' : ''} ${iso === todayKey ? 'today' : ''}">
      ${wxHtml}
      <div class="day-num">${c.day}</div>
      ${shown.map(e => `<a class="event ${e.type}" href="${e.url}" title="${(e.sub || e.title).replace(/"/g,'&quot;')}">${e.title}</a>`).join('')}
      ${extra ? `<div class="more-indicator">+${extra} more</div>` : ''}
    </div>`;
  }).join('');

  $('countBadge').textContent = totalEvents + ' ITEM' + (totalEvents === 1 ? '' : 'S') + ' THIS MONTH';
}

function prevMonth(){
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  render();
}
function nextMonth(){
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  render();
}
function goToday(){
  const n = new Date();
  viewYear = n.getFullYear();
  viewMonth = n.getMonth();
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { e.preventDefault(); window.location.href = 'production.html'; }
  if (e.key === 'ArrowLeft') prevMonth();
  if (e.key === 'ArrowRight') nextMonth();
});

loadEvents();
</script>

<script src="assets/ryujin-mode.js"></script>
<script src="assets/ryujin-tenant.js"></script>
<script src="assets/ryujin-persist.js"></script>

</body>
</html>
