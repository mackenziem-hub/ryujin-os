<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0e1a;color:#e0e6f0;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 50%,rgba(15,40,80,0.6) 0%,transparent 70%),radial-gradient(ellipse at 70% 30%,rgba(10,30,60,0.4) 0%,transparent 60%);animation:drift 30s ease infinite alternate}
@keyframes drift{0%{opacity:0.7}100%{opacity:1}}
.card{position:relative;z-index:1;text-align:center;padding:60px 40px;max-width:500px}
.logo{font-size:4em;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(100,160,255,0.3))}
h1{font-size:2.4em;font-weight:800;letter-spacing:-1px;margin-bottom:8px;background:linear-gradient(135deg,#e0e6f0 0%,#7eb8ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{color:rgba(200,220,255,0.5);font-size:1.05em;letter-spacing:1px;margin-bottom:32px}
.status{display:inline-block;padding:8px 20px;border:1px solid rgba(100,160,255,0.2);border-radius:20px;font-size:0.85em;color:rgba(160,200,255,0.6);letter-spacing:0.5px}
.status::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:#4ade80;margin-right:8px;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="logo">&#x7ADC;</div>
  <h1>Ryujin OS</h1>
  <div class="tagline">Smart systems designed for you, by you.</div>
  <div class="status">API Online</div>
  <div style="margin-top:24px;display:flex;gap:12px;justify-content:center">
    <a href="/login.html" style="padding:12px 28px;background:#4a9eff;color:#fff;border-radius:10px;text-decoration:none;font-weight:700;font-size:0.9em">Sign In</a>
    <a href="/app.html" style="padding:12px 28px;background:rgba(255,255,255,0.06);color:#e0e6f0;border:1px solid rgba(255,255,255,0.1);border-radius:10px;text-decoration:none;font-weight:600;font-size:0.9em">Crew App</a>
  </div>
</div>
<script>
  // Auto-route if already logged in
  const t = localStorage.getItem('ryujin_token');
  if (t) {
    fetch('/api/auth?action=me', { headers: { Authorization: 'Bearer ' + t } })
      .then(r => r.json()).then(d => {
        if (d.user) {
          const role = d.user.role || 'crew';
          window.location.href = (role === 'owner' || role === 'admin' || role === 'manager') ? '/admin.html' : '/app.html';
        }
      }).catch(() => {});
  }
</script>
</body>
</html>
