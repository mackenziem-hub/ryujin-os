<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Ryujin</title>
<script src="/assets/auth-guard.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<!-- Canonical AI design bar (the COMPARE mockup Mac picked 2026-06-16). The shell's
     local :root below aliases these so there is ONE source of truth for the look. -->
<link rel="stylesheet" href="/assets/ryujin-shell-tokens.css" />
<style>
  /* ============================================================
     RYUJIN OS - AMBIENT
     A luminous AI presence is the whole interface.
     You ask. It answers, terse. You elaborate. Panels resolve in.
     Drill: in, in, in - out.
     ============================================================ */

  :root {
    /* Token bar comes from /assets/ryujin-shell-tokens.css (the canonical COMPARE
       design bar). The local names below ALIAS those canonical vars so the rest of
       this 880-line sheet keeps its names while one source of truth owns the values.
       Shell-only steps (a third ground, a brighter accent tint) stay literal. */
    --ground-0: var(--ground, #060709);
    --ground-1: #0a0c10;
    --ground-2: #0e1116;

    /* Ink - high-contrast soft white, no pure white (values already on the bar) */
    --ink:        #f3f5f8;
    --ink-soft:   #c3c9d4;
    --ink-mute:   #8b93a3;
    --ink-faint:  #7d8493;   /* AA-safe for meta text: 5.0:1 on ground, 4.6:1 on glass */

    /* One restrained cool-blue accent. Used sparingly. */
    --accent:        #4a9eff;
    --accent-soft:   #7bb8ff;
    --accent-dim:    rgba(74, 158, 255, 0.5);
    --accent-ghost:  rgba(74, 158, 255, 0.12);

    /* Glass - aliased to the canonical bar where names differ; shell extras stay literal */
    --glass-fill:   var(--glass, rgba(20, 24, 31, 0.62));
    --glass-fill-2: var(--glass-2, rgba(24, 29, 38, 0.74));
    --glass-edge:   var(--edge, rgba(255, 255, 255, 0.10));
    --glass-edge-2: var(--edge-soft, rgba(255, 255, 255, 0.06));
    --glass-inner:  rgba(255, 255, 255, 0.04);

    /* Semantic z-scale - ground < presence < veil < panel < active-panel < bubble < input.
       The veil dims everything beneath the panels, but never the panels, the
       tethered bubble, or the ask line, which stay live above it. */
    --z-ground:   0;
    --z-presence: 10;
    --z-veil:     15;
    --z-panel:    20;
    --z-active:   30;
    --z-bubble:   40;
    --z-input:    50;

    /* Motion - premium ease-out, no bounce */
    --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);    /* expo-ish */
    --ease-out-q:  cubic-bezier(0.22, 1, 0.36, 1);   /* quint */
    --ease-soft:   cubic-bezier(0.33, 1, 0.68, 1);   /* gentle */

    --r-lg: 22px;
    --r-md: 16px;
    --r-sm: 11px;

    --shadow-panel: 0 1px 0 rgba(255,255,255,0.05) inset,
                    0 24px 60px -20px rgba(0,0,0,0.7),
                    0 8px 24px -12px rgba(0,0,0,0.6);

    color-scheme: dark;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: var(--ground-0);
  }

  body {
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    color: var(--ink);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    letter-spacing: -0.011em;
    -webkit-tap-highlight-color: transparent;
  }

  .mono {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-feature-settings: "tnum" 1, "zero" 1;
    letter-spacing: -0.01em;
  }

  /* ============================================================
     THE SPACE - a vast, near-empty dark room.
     A single soft light gradient settles low, where the presence lives.
     Brightens almost imperceptibly when the AI speaks.
     ============================================================ */

  .space {
    position: fixed;
    inset: 0;
    z-index: var(--z-ground);
    background:
      radial-gradient(120% 90% at 50% 118%, rgba(74,158,255,0.05), transparent 55%),
      radial-gradient(80% 60% at 50% 130%, rgba(74,158,255,0.06), transparent 60%),
      radial-gradient(140% 120% at 50% -10%, var(--ground-2), var(--ground-0) 55%);
    transition: filter 1.2s var(--ease-soft);
  }

  /* very faint vertical grain - depth, not texture */
  .space::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(100% 100% at 50% 100%, transparent 60%, rgba(0,0,0,0.35));
    pointer-events: none;
  }

  /* when speaking, the whole scene lifts by a hair */
  body.is-speaking .space { filter: brightness(1.08); }

  /* ============================================================
     THE PRESENCE - a refined luminous ring, low and centered.
     Restrained. Precise geometry. Brightens subtly when it speaks.
     Can dock to the right.
     ============================================================ */

  .stage {
    position: fixed;
    inset: 0;
    z-index: var(--z-presence);
    display: grid;
    place-items: center;
    pointer-events: none;
  }

  .presence {
    position: absolute;
    left: 50%;
    bottom: 32vh;
    transform: translate(-50%, 0);
    width: 96px;
    height: 96px;
    pointer-events: auto;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    border: none;
    padding: 0;
    border-radius: 50%;
    transition:
      left 1.1s var(--ease-out),
      bottom 1.1s var(--ease-out),
      width 0.9s var(--ease-out),
      height 0.9s var(--ease-out);
    will-change: transform, left, bottom;
  }

  /* docked to the right while it keeps speaking */
  body.is-docked .presence {
    left: auto;
    right: clamp(28px, 5vw, 64px);
    bottom: 50vh;
    width: 64px;
    height: 64px;
  }

  /* the sheen ring - a perfect circle that clips its own square fill.
     overflow:hidden + border-radius:50% guarantees no square bleed. */
  .presence__ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
    opacity: 0.9;
    transition: opacity 0.8s var(--ease-soft);
  }
  .presence__ring::before {
    content: "";
    position: absolute;
    inset: -25%;
    border-radius: 50%;
    background:
      conic-gradient(from 200deg,
        transparent 0deg,
        rgba(123,184,255,0.0) 40deg,
        rgba(123,184,255,0.6) 150deg,
        rgba(180,215,255,0.9) 215deg,
        rgba(123,184,255,0.35) 300deg,
        transparent 360deg);
    animation: drift 16s linear infinite;
  }
  /* punch the centre out so only a soft annulus of sheen shows */
  .presence__ring::after {
    content: "";
    position: absolute;
    inset: 7%;
    border-radius: 50%;
    background: radial-gradient(circle, var(--ground-1) 56%, transparent 78%);
  }

  /* the thin precise rim - a true circle, no fill box at all */
  .presence__rim {
    position: absolute;
    inset: 2%;
    border-radius: 50%;
    border: 1px solid rgba(160,200,255,0.32);
    box-shadow:
      0 0 0 0.5px rgba(74,158,255,0.12),
      inset 0 0 14px rgba(74,158,255,0.10);
    transition: border-color 0.8s var(--ease-soft), box-shadow 0.8s var(--ease-soft);
  }

  /* soft inner core - a quiet point of light */
  .presence__core {
    position: absolute;
    inset: 26%;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 42%,
      rgba(228,240,255,0.95),
      rgba(123,184,255,0.5) 48%,
      rgba(74,158,255,0.10) 76%,
      transparent);
    filter: blur(0.5px);
    opacity: 0.55;
    transition: opacity 0.8s var(--ease-soft), transform 0.8s var(--ease-soft);
  }

  /* ambient halo - barely there at rest, truly circular */
  .presence__halo {
    position: absolute;
    inset: -45%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,158,255,0.20) 0%, rgba(74,158,255,0.06) 38%, transparent 62%);
    opacity: 0.35;
    filter: blur(10px);
    transition: opacity 0.8s var(--ease-soft);
    pointer-events: none;
  }

  .presence__breath {
    position: absolute;
    inset: 0;
    animation: breath 7s var(--ease-soft) infinite;
  }

  @keyframes drift { to { transform: rotate(360deg); } }
  @keyframes breath {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.03); }
  }

  /* SPEAKING: the presence glows softly - never flashy */
  body.is-speaking .presence__ring { opacity: 1; }
  body.is-speaking .presence__core { opacity: 1; transform: scale(1.05); }
  body.is-speaking .presence__halo { opacity: 0.85; }
  body.is-speaking .presence__rim  { border-color: rgba(180,210,255,0.5); box-shadow: 0 0 0 0.5px rgba(74,158,255,0.25), inset 0 0 18px rgba(74,158,255,0.18); }

  /* thinking - the core dims and the sheen quickens a touch */
  body.is-thinking .presence__core { opacity: 0.32; }
  body.is-thinking .presence__ring::before { animation-duration: 7s; }
  body.is-thinking .presence__ring { opacity: 1; }

  .presence:hover .presence__halo { opacity: 0.6; }
  .presence:focus-visible { outline: none; }
  .presence:focus-visible .presence__halo { opacity: 0.75; }

  /* ============================================================
     THE BUBBLE - terse answer, clean glass, tethered to presence.
     ============================================================ */

  .bubble {
    position: fixed;
    z-index: var(--z-bubble);
    max-width: min(34rem, 78vw);
    padding: 18px 22px 16px;
    border-radius: var(--r-md);
    background: var(--glass-fill-2);
    border: 1px solid var(--glass-edge);
    box-shadow: var(--shadow-panel);
    backdrop-filter: blur(26px) saturate(140%);
    -webkit-backdrop-filter: blur(26px) saturate(140%);
    /* centered above the resting presence by default */
    left: 50%;
    bottom: calc(32vh + 120px);
    transform: translate(-50%, 8px);
    opacity: 0;
    pointer-events: none;
    visibility: hidden;
    transition:
      opacity 0.55s var(--ease-out),
      transform 0.55s var(--ease-out),
      left 1.1s var(--ease-out),
      bottom 1.1s var(--ease-out),
      right 1.1s var(--ease-out);
  }

  .bubble.show {
    opacity: 1;
    transform: translate(-50%, 0);
    pointer-events: auto;
    visibility: visible;
  }

  /* docked bubble sits to the left of the right-side presence */
  body.is-docked .bubble {
    left: auto;
    right: clamp(108px, calc(5vw + 80px), 144px);
    bottom: calc(50vh - 18px);
    transform: translate(0, 0);
    max-width: min(28rem, 60vw);
  }
  body.is-docked .bubble.show { transform: translate(0, 0); }

  .bubble__answer {
    font-size: 1.18rem;
    line-height: 1.42;
    color: var(--ink);
    letter-spacing: -0.018em;
    margin: 0;
    text-wrap: pretty;
  }
  .bubble__answer .num { color: var(--accent-soft); }

  .bubble__foot {
    margin-top: 13px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .elaborate {
    appearance: none;
    border: 1px solid var(--glass-edge);
    background: rgba(74,158,255,0.08);
    color: var(--accent-soft);
    font: inherit;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: -0.005em;
    padding: 7px 14px 7px 12px;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: background 0.3s var(--ease-soft), border-color 0.3s var(--ease-soft), transform 0.3s var(--ease-out);
  }
  .elaborate:hover { background: rgba(74,158,255,0.16); border-color: var(--accent-dim); transform: translateY(-1px); }
  .elaborate:active { transform: translateY(0); }
  .elaborate svg { width: 13px; height: 13px; opacity: 0.9; }
  .elaborate:focus-visible { outline: 2px solid var(--accent-dim); outline-offset: 2px; }

  .bubble__hint {
    font-size: 0.74rem;
    color: var(--ink-faint);
    letter-spacing: 0.01em;
  }

  /* ============================================================
     THE ASK - a single hairline line of light. The only chrome.
     ============================================================ */

  .ask {
    position: fixed;
    z-index: var(--z-input);
    left: 50%;
    bottom: clamp(34px, 7vh, 64px);
    transform: translateX(-50%);
    width: min(40rem, 86vw);
    transition: opacity 0.5s var(--ease-soft);
  }

  .ask__field {
    position: relative;
    display: flex;
    align-items: center;
  }

  /* the hairline */
  .ask__line {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent,
      rgba(255,255,255,0.14) 12%,
      rgba(255,255,255,0.22) 50%,
      rgba(255,255,255,0.14) 88%,
      transparent);
    transition: background 0.4s var(--ease-soft);
  }
  .ask__field:focus-within .ask__line {
    background: linear-gradient(90deg,
      transparent,
      rgba(74,158,255,0.35) 12%,
      rgba(74,158,255,0.6) 50%,
      rgba(74,158,255,0.35) 88%,
      transparent);
  }

  .ask__input {
    flex: 1;
    appearance: none;
    background: transparent;
    border: none;
    outline: none;
    color: var(--ink);
    font: inherit;
    font-size: 1.06rem;
    letter-spacing: -0.014em;
    padding: 14px 2px 13px;
  }
  .ask__input::placeholder { color: var(--ink-faint); }

  .ask__send {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--ink-mute);
    cursor: pointer;
    padding: 8px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    transition: color 0.3s var(--ease-soft), background 0.3s var(--ease-soft);
  }
  .ask__send:hover { color: var(--accent-soft); background: rgba(74,158,255,0.08); }
  .ask__send:focus-visible { outline: 2px solid var(--accent-dim); outline-offset: 2px; }
  .ask__send svg { width: 18px; height: 18px; }

  /* suggested prompts - sparse chips, low key, above the line */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 9px;
    margin-bottom: 16px;
    justify-content: center;
    transition: opacity 0.6s var(--ease-soft), transform 0.6s var(--ease-out);
  }
  body.has-spoken .chips { opacity: 0; transform: translateY(6px); pointer-events: none; height: 0; margin: 0; overflow: hidden; }

  .chip {
    appearance: none;
    font: inherit;
    font-size: 0.84rem;
    color: var(--ink-soft);
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--glass-edge-2);
    border-radius: 999px;
    padding: 8px 15px;
    cursor: pointer;
    letter-spacing: -0.005em;
    transition: color 0.3s var(--ease-soft), background 0.3s var(--ease-soft), border-color 0.3s var(--ease-soft), transform 0.3s var(--ease-out);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .chip:hover { color: var(--ink); background: rgba(74,158,255,0.07); border-color: var(--accent-dim); transform: translateY(-1px); }
  .chip:focus-visible { outline: 2px solid var(--accent-dim); outline-offset: 2px; }

  /* ============================================================
     PANELS - the IA. Floating, partially transparent, layered.
     Drill deepens; prior panel recedes in z with depth.
     ============================================================ */

  .veil {
    position: fixed;
    inset: 0;
    z-index: var(--z-veil);
    background: rgba(3,4,6,0.5);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s var(--ease-soft);
  }
  body.panel-open .veil { opacity: 1; pointer-events: auto; }

  .panels {
    position: fixed;
    inset: 0;
    z-index: var(--z-panel);
    display: grid;
    place-items: center;
    pointer-events: none;
  }

  .panel {
    position: absolute;
    width: min(40rem, 90vw);
    max-height: min(76vh, 660px);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border-radius: var(--r-lg);
    background: var(--glass-fill);
    border: 1px solid var(--glass-edge);
    box-shadow: var(--shadow-panel);
    backdrop-filter: blur(34px) saturate(150%);
    -webkit-backdrop-filter: blur(34px) saturate(150%);
    opacity: 0;
    pointer-events: none;
    transform: translateY(20px) scale(0.97);
    transition:
      opacity 0.6s var(--ease-out),
      transform 0.6s var(--ease-out),
      filter 0.6s var(--ease-soft);
    will-change: transform, opacity;
  }

  .panel.active {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0) scale(1);
    z-index: var(--z-active);
  }

  /* a panel that has been drilled past - recede in depth */
  .panel.receded {
    opacity: 0.32;
    pointer-events: none;
    transform: translateY(-22px) scale(0.93);
    filter: blur(2px) saturate(0.7);
    z-index: var(--z-panel);
  }
  .panel.receded-2 {
    opacity: 0.16;
    transform: translateY(-40px) scale(0.88);
    filter: blur(4px) saturate(0.5);
  }

  .panel__head {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--glass-edge-2);
  }
  .panel__title-wrap { flex: 1; min-width: 0; }
  .panel__kicker {
    font-size: 0.72rem;
    color: var(--ink-mute);
    letter-spacing: 0.01em;
    margin: 0 0 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel__kicker .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent-dim);
  }
  .panel__title {
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: -0.022em;
    margin: 0;
    color: var(--ink);
    text-wrap: balance;
  }

  .panel__close {
    appearance: none;
    border: 1px solid var(--glass-edge-2);
    background: rgba(255,255,255,0.03);
    color: var(--ink-mute);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: grid; place-items: center;
    flex: none;
    transition: color 0.3s var(--ease-soft), background 0.3s var(--ease-soft), transform 0.3s var(--ease-out);
  }
  .panel__close:hover { color: var(--ink); background: rgba(255,255,255,0.07); transform: scale(1.05); }
  .panel__close:focus-visible { outline: 2px solid var(--accent-dim); outline-offset: 2px; }
  .panel__close svg { width: 14px; height: 14px; }

  .panel__body {
    padding: 20px 24px 24px;
    overflow-y: auto;
    overscroll-behavior: contain;
  }
  .panel__body::-webkit-scrollbar { width: 8px; }
  .panel__body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 8px; }

  /* breadcrumb for the drill depth */
  .crumb {
    display: flex; align-items: center; gap: 7px;
    font-size: 0.72rem; color: var(--ink-faint);
    margin-bottom: 16px;
  }
  .crumb button {
    appearance: none; background: none; border: none;
    color: var(--ink-mute); font: inherit; font-size: inherit;
    cursor: pointer; padding: 0;
    transition: color 0.25s var(--ease-soft);
  }
  .crumb button:hover { color: var(--accent-soft); }
  .crumb .sep { opacity: 0.5; }
  .crumb .here { color: var(--ink-soft); }

  /* ---- content primitives ---- */

  .lede {
    font-size: 0.96rem;
    color: var(--ink-soft);
    line-height: 1.55;
    margin: 0 0 20px;
    max-width: 60ch;
  }

  /* a quiet stat line - NOT a hero metric template */
  .figure-row {
    display: flex;
    flex-wrap: wrap;
    gap: 28px 40px;
    align-items: flex-end;
    padding: 4px 0 22px;
    border-bottom: 1px solid var(--glass-edge-2);
    margin-bottom: 22px;
  }
  .figure {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .figure__val {
    font-size: 1.7rem;
    font-weight: 500;
    letter-spacing: -0.03em;
    color: var(--ink);
    line-height: 1;
  }
  .figure__val.accent { color: var(--accent-soft); }
  .figure__lbl {
    font-size: 0.76rem;
    color: var(--ink-mute);
    letter-spacing: -0.003em;
  }

  /* rows - drillable */
  .rows { display: flex; flex-direction: column; }
  .section-h {
    font-size: 0.78rem;
    color: var(--ink-mute);
    font-weight: 500;
    margin: 4px 0 10px;
    letter-spacing: -0.002em;
  }
  .row {
    appearance: none;
    text-align: left;
    width: 100%;
    background: transparent;
    border: none;
    border-radius: var(--r-sm);
    padding: 13px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    font: inherit;
    color: var(--ink);
    transition: background 0.25s var(--ease-soft), transform 0.25s var(--ease-out);
  }
  .row:hover { background: rgba(255,255,255,0.04); }
  .row:focus-visible { outline: 2px solid var(--accent-dim); outline-offset: -2px; }
  .row.is-drillable:hover { transform: translateX(2px); }
  .row + .row { border-top: 1px solid var(--glass-edge-2); }

  .row__main { flex: 1; min-width: 0; }
  .row__name { font-size: 0.98rem; font-weight: 500; letter-spacing: -0.012em; }
  .row__sub  { font-size: 0.8rem; color: var(--ink-mute); margin-top: 2px; }
  .row__val  { text-align: right; flex: none; }
  .row__amt  { font-size: 0.98rem; color: var(--ink); }
  .row__meta { font-size: 0.76rem; color: var(--ink-faint); margin-top: 2px; }
  .row__chev {
    color: var(--ink-faint);
    flex: none;

  /* tiny meta pills row */
  .meta-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));

  .draft__bar {
    display: flex; align-items: center; gap: 9px;

  /* ============================================================
     PREVIEW MARKER + WORDMARK
     ============================================================ */
  .marker {
    position: fixed;
    top: 22px; left: 24px;
    z-index: 60;
    display: flex; align-items: center; gap: 9px;

  .marker .glyph {
    width: 18px; height: 18px;

    border: 1px solid var(--glass-edge);
    border-radius: 5px;
    color: var(--accent-soft);
    font-size: 0.7rem;
  }

  .wordmark {
    position: fixed;
    top: 22px; right: 24px;
    z-index: 60;
    font-size: 0.78rem;
    color: var(--ink-mute);
    letter-spacing: -0.01em;
    pointer-events: none;
    user-select: none;
    display: flex; align-items: center; gap: 8px;
  }
  .wordmark b { color: var(--ink-soft); font-weight: 600; }
  .wordmark .pip-live { width:6px; height:6px; border-radius:50%; background: var(--accent); box-shadow: 0 0 8px var(--accent-dim); }

  /* a single faint line just beneath the resting presence - the AI's

  .seed-hint {
    position: fixed;
    left: 50%;
    bottom: calc(32vh - 42px);

    .panel { transition: opacity 0.18s linear; transform: none !important; }

    .panel.receded, .panel.receded-2 { filter: none; }
    .bubble { transition: opacity 0.18s linear; }
    .space { transition: none; }
  }

  /* ============================================================
     GLANCE - the resting monitor. The shell at rest IS a live
     dashboard, not a blank prompt. Fades when you ask.
     ============================================================ */
  .glance {
    position: fixed; left: 50%; top: 12.5vh; transform: translateX(-50%);
    z-index: var(--z-presence);
    width: min(700px, 92vw);

  .glance__sub { font-size: 0.72rem; color: var(--ink-faint); }
  .glance__kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .gk { background: rgba(255,255,255,0.035); border: 1px solid var(--glass-edge); border-radius: 13px; padding: 11px 13px; backdrop-filter: blur(10px); }
  .gk .v { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-weight: 600; font-size: 1.12rem; color: var(--ink-soft); letter-spacing: -0.01em; }
  .gk .l { font-size: 0.64rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-faint); margin-top: 4px; }
  .gk.alarm .v { color: #ff6b76; }
  .gk.good .v { color: var(--accent); }
  .glance__pile { background: rgba(255,255,255,0.035); border: 1px solid var(--glass-edge); border-radius: 13px; overflow: hidden; backdrop-filter: blur(10px); }
  .gp { display: flex; align-items: center; gap: 11px; padding: 10px 14px; border-top: 1px solid var(--glass-edge); transition: background 0.15s; color: inherit; text-decoration: none; }
  .gp:first-child { border-top: none; }
  .gp:hover { background: rgba(255,255,255,0.05); }
  .gp__name { flex: 1; font-size: 0.9rem; color: var(--ink-soft); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .gp__sub { color: var(--ink-faint); font-size: 0.78rem; }
  .gp__amt { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 0.85rem; color: var(--ink); }
  .gp__open { font-size: 0.68rem; letter-spacing: 0.04em; color: var(--accent-soft); border: 1px solid var(--glass-edge); border-radius: 7px; padding: 3px 9px; }
  .glance__hint { text-align: center; font-size: 0.78rem; color: var(--ink-faint); margin-top: 1px; }
  /* HOME - return from a conversation back to the resting monitor */
  .home-btn {
    position: fixed; top: 21px; left: 50%; transform: translateX(-50%);
    z-index: 61; display: none; align-items: center; gap: 7px;
    font-size: 0.72rem; letter-spacing: 0.04em; color: var(--ink-mute);
    background: rgba(255,255,255,0.04); border: 1px solid var(--glass-edge);

    transition: opacity 0.3s, background 0.15s;
  }
  body.has-spoken .home-btn { display: inline-flex; }

  @media (max-width: 560px) { .glance { top: 9vh; width: 94vw; } .glance__kpis { grid-template-columns: repeat(2, 1fr); } }
</style>

<body>

  <!-- THE SPACE -->

<script>

     --------------------------------------------------------- */
  var TENANT = "plus-ultra";
  function token() {
    try { return localStorage.getItem("ryujin_token") || sessionStorage.getItem("ryujin_token") || ""; }
    catch (e) { return ""; }

  function tHeaders() {
    return { "x-tenant-id": TENANT, "Authorization": "Bearer " + token() };

  /* ---------------------------------------------------------
     FORMATTERS
     --------------------------------------------------------- */
  function money(n) {
    var v = Number(n);
    if (!isFinite(v)) return null;
    return "$" + Math.round(v).toLocaleString("en-CA");
  }
  function money2(n) {
    var v = Number(n);
    if (!isFinite(v)) return null;
    return "$" + v.toFixed(2);
  }
  function num(n) {
    var v = Number(n);
    if (!isFinite(v)) return null;
    return String(Math.round(v));

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")

  /* ---------------------------------------------------------

          why: "high value ($21k) · quiet 39d, prime to nudge · quote is out",

        { name: "Jean Gauvin", value: "$20,750", stage: "Quote sent", rep: "Darcy", quiet: 39, score: 90,

  /* ---------------------------------------------------------

  function setFreshness(label) {

    }
    if (pipe.proposalsOut) {
      if (pipe.proposalsOut.value != null) LIVE.sales.proposalsOut = money(pipe.proposalsOut.value) || LIVE.sales.proposalsOut;
      if (pipe.proposalsOut.count != null) LIVE.sales.proposalsOutCount = num(pipe.proposalsOut.count) || LIVE.sales.proposalsOutCount;
    }
    if (pipe.signedBacklog) {
      if (pipe.signedBacklog.value != null) { LIVE.sales.signedBacklog = money(pipe.signedBacklog.value) || LIVE.sales.signedBacklog; LIVE.cashflow.signedBacklog = LIVE.sales.signedBacklog; }
      if (pipe.signedBacklog.count != null) { LIVE.sales.signedBacklogCount = num(pipe.signedBacklog.count) || LIVE.sales.signedBacklogCount; LIVE.cashflow.signedBacklogCount = LIVE.sales.signedBacklogCount; }
    }
    if (coll.d30 && coll.d30.value != null) { LIVE.sales.collected30 = money(coll.d30.value) || LIVE.sales.collected30; LIVE.cashflow.collected30 = LIVE.sales.collected30; }
    if (coll.d90 && coll.d90.value != null) { LIVE.sales.collected90 = money(coll.d90.value) || LIVE.sales.collected90; LIVE.cashflow.collected90 = LIVE.sales.collected90; }

    // ---- ADS ----
    var ads = sec.metaAds || {};
    if (ads.totalSpend != null) LIVE.ads.lifetimeSpend = money(ads.totalSpend) || LIVE.ads.lifetimeSpend;
    if (ads.avgCPL != null) LIVE.ads.cpl = (money2(ads.avgCPL) || LIVE.ads.cpl);
    if (ads.totalAllLeads != null) LIVE.ads.leads = num(ads.totalAllLeads) || LIVE.ads.leads;
    if (ads.totalCampaigns != null) LIVE.ads.campaignsTotal = num(ads.totalCampaigns) || LIVE.ads.campaignsTotal;
    if (ads.activeCampaignCount != null) LIVE.ads.activeCount = num(ads.activeCampaignCount) || LIVE.ads.activeCount;
    if (Array.isArray(ads.activeCampaigns) && ads.activeCampaigns.length) {
      LIVE.ads.campaigns = ads.activeCampaigns.map(function (c) {
        var sp = Number(c.spend);
        return {
          name: c.name || "Campaign",
          spend: money2(c.spend) || (money(c.spend) || "n/a"),
          spendNum: isFinite(sp) ? sp : 0,
          results: c.results != null ? num(c.results) : "0",
          status: c.status || "Active",
          dailyBudget: c.dailyBudget != null ? (typeof c.dailyBudget === "number" ? ("$" + c.dailyBudget + "/day") : String(c.dailyBudget)) : ""
        };
      });
    }

    // ---- DAY ----
    var tk = sec.tickets || {}, st = sec.salesTasks || {};
    if (st.open != null) LIVE.day.tasksOpen = num(st.open) || LIVE.day.tasksOpen;
    if (st.overdue != null) LIVE.day.tasksOverdue = num(st.overdue) || LIVE.day.tasksOverdue;
    else if (tk.overdueCount != null) LIVE.day.tasksOverdue = num(tk.overdueCount) || LIVE.day.tasksOverdue;
    if (Array.isArray(tk.activeToday) && tk.activeToday.length) {
      LIVE.day.jobsActive = String(tk.activeToday.length);
      LIVE.day.activeJobs = tk.activeToday.slice(0, 8).map(function (j) {
        return {
          title: j.title || "Job",
          assignee: j.assignee || "Unassigned",
          status: j.status || "active",
          daysOverdue: (j.days_overdue != null ? Number(j.days_overdue) : null)
        };
      });
    }

    // ---- CASHFLOW ----
    var cf = sec.cashflow || {};
    if (cf.last90Days) {
      if (cf.last90Days.totalCollected != null) LIVE.cashflow.collected90 = money(cf.last90Days.totalCollected) || LIVE.cashflow.collected90;
      if (cf.last90Days.totalOutstanding != null) LIVE.cashflow.outstanding = money(cf.last90Days.totalOutstanding) || LIVE.cashflow.outstanding;
    }
    if (cf.last7Days && cf.last7Days.collected != null) LIVE.cashflow.collected7 = money(cf.last7Days.collected) || LIVE.cashflow.collected7;

    // ---- PROPOSALS (the desk: native estimates w/ share links) ----
    var np = sec.nativeProposals || {};
    if (Array.isArray(np.proposals) && np.proposals.length) {
      var byNum = {};
      np.proposals.forEach(function (p) {
        if (p == null || p.number == null) return;
        if (!byNum[p.number] || String(p.updatedAt || "") > String(byNum[p.number].updatedAt || "")) byNum[p.number] = p;
      });
      var rows = Object.keys(byNum).map(function (k) { return byNum[k]; })
        .sort(function (a, b) { return String(b.updatedAt || "").localeCompare(String(a.updatedAt || "")); });
      LIVE.proposals.all = rows.map(function (p) {
        return {
          number: p.number,
          customer: p.customer || "Customer",
          address: p.address || "",
          price: (typeof p.fromPrice === "number" && p.fromPrice > 0) ? money(p.fromPrice) : "",
          priceNum: (typeof p.fromPrice === "number") ? p.fromPrice : 0,
          status: p.status || "draft",
          mode: p.mode || "",
          share: p.shareToken || ("plus-ultra-" + p.number)
        };
      });
      LIVE.proposals.drafts = LIVE.proposals.all.filter(function (p) { return p.status === "draft"; });
      LIVE.proposals.closePile = LIVE.proposals.drafts.slice(0, 6);
      LIVE.proposals.draftCount = String(LIVE.proposals.drafts.length);
      var dv = LIVE.proposals.drafts.reduce(function (a, p) { return a + (p.priceNum || 0); }, 0);
      LIVE.proposals.draftValue = money(dv) || "";
    }
  }

  function applyCrm(crm) {
    var list = (crm && Array.isArray(crm.customers)) ? crm.customers : [];
    // top follow-ups = isTop20, ranked by followupScore desc.
    var ranked = list.filter(function (c) { return c && c.isTop20; })
      .sort(function (a, b) { return (b.followupScore || 0) - (a.followupScore || 0); });
    if (!ranked.length) return; // keep baked fallback
    LIVE.followups.ranked = ranked.slice(0, 6).map(function (c) {
      var df = c.draftFollowup || {};
      return {
        name: c.name || "Contact",
        value: money(c.totalProposalValue) || "n/a",
        stage: c.stage || "Quote sent",
        rep: c.rep || "Darcy",
        quiet: (c.lastTouchAgeDays != null ? Number(c.lastTouchAgeDays) : null),
        score: (c.followupScore != null ? Math.round(c.followupScore) : null),
        reasons: Array.isArray(c.followupReasons) && c.followupReasons.length ? c.followupReasons : [],
        draft: df.body || "",
        why: df.why || (Array.isArray(c.followupReasons) ? c.followupReasons.join(" · ") : ""),
        rfq: df.readForcingQuestion || ""
      };
    });
  }

    var s = LIVE.sales, f = (LIVE.followups.ranked && LIVE.followups.ranked[0]) || null, a = LIVE.ads, d = LIVE.day, c = LIVE.cashflow;

    KB.sales.answer = 'Signed <span class="num">' + esc(s.signedMtd) + '</span> this month. '
      + '<span class="num">' + esc(s.proposalsOut) + '</span> in proposals out across <span class="num">' + esc(s.proposalsOutCount) + '</span>.';

    if (f) {

      KB.followups.answer = esc(firstName(f.name)) + ' first. <span class="num">' + esc(f.value) + '</span>, '
        + esc(String(f.stage || "quote out").toLowerCase()) + qbit + '. You are the closer.';

    KB.ads.answer = '<span class="num">' + esc(a.lifetimeSpend) + '</span> lifetime. '
      + '<span class="num">' + esc(a.cpl) + '</span> CPL, <span class="num">' + esc(a.activeCount) + '</span> live campaigns.';

    var firstJob = (d.activeJobs && d.activeJobs[0]) || null;

      : '';
    KB.day.answer = '<span class="num">' + esc(d.tasksOpen) + '</span> tasks open, '
      + '<span class="num">' + esc(d.tasksOverdue) + '</span> overdue.' + jobBit;

    KB.cashflow.answer = 'Collected <span class="num">' + esc(c.collected30) + '</span> in 30 days. '
      + '<span class="num">' + esc(c.outstanding) + '</span> out, deposit-paid WIP.';

    var pr = LIVE.proposals;
    if (pr && pr.drafts && pr.drafts.length) {
      var topP = pr.closePile[0];
      KB.proposals.answer = '<span class="num">' + esc(pr.draftCount) + '</span> live proposals, '
        + '<span class="num">' + esc(pr.draftValue || "") + '</span> on the desk'
        + (topP ? '. ' + esc(firstName(topP.customer)) + ' first.' : '.');
    }

  function loadLive() {
    setFreshness("Live · loading");
    var snapReq = fetch("/api/snapshot", { cache: "no-store", headers: tHeaders() })
      .then(function (r) { if (!r.ok) throw new Error("snapshot " + r.status); return r.json(); })
      .then(function (j) { applySnapshot(j); return true; })
      .catch(function () { return false; });

    var crmReq = fetch("/api/crm-proposals", { cache: "no-store", headers: tHeaders() })
      .then(function (r) { if (!r.ok) throw new Error("crm " + r.status); return r.json(); })
      .then(function (j) { applyCrm(j); return true; })
      .catch(function () { return false; });

    Promise.all([snapReq, crmReq]).then(function (res) {
      LIVE.fetched = true;
      rebuildKB();
      // if a panel/bubble is already showing the same flow, refresh it in place
      if (lastQuery && lastQuery.panel) {
        answerEl.innerHTML = KB[panelKeyToKB(lastQuery.panel)] ? KB[panelKeyToKB(lastQuery.panel)].answer : answerEl.innerHTML;
      }
      var ok = res[0] || res[1];
      if (ok) stampNow(res[0] && res[1] ? "" : "partial");
      else setFreshness("Live · fallback data");
      renderGlance();
    });
  }

  function panelKeyToKB(panel) {
    return panel === "sales" ? "sales"
      : panel === "followups" ? "followups"
      : panel === "ads" ? "ads"
      : panel === "day" ? "day"
      : panel === "cashflow" ? "cashflow" : "fallback";
  }

  /* return from a conversation back to the resting monitor */
  function goHome() {
    closeAll();

  /* ---------------------------------------------------------
     ROUTING - keyword chips/typed prompts map to the 5 fast local
     flows. Anything else falls through to the live AI (chat SSE).
     --------------------------------------------------------- */
  function route(q) {
    var s = (q || "").toLowerCase();
    if (/(follow|follow-up|who should|nudge|chase|sharon|gauvin|baxter)/.test(s)) return KB.followups;
    if (/(ad|spend|cpl|campaign|meta|google ads)/.test(s)) return KB.ads;
    if (/(cashflow|cash flow|collect|outstanding|owed|ar\b|receivable)/.test(s)) return KB.cashflow;
    if (/(my day|today|priorit|task|overdue|schedule|jobs)/.test(s)) return KB.day;
    if (/(propos|my desk|on my desk|close pile|quotes out|send a quote|quote sent|estimate)/.test(s)) return KB.proposals;
    if (/(sale|signed|revenue|month|pipeline|backlog|ytd)/.test(s)) return KB.sales;
    return null; // no local match -> ask the live AI
  }

  /* ---------------------------------------------------------
     PANEL CONTENT BUILDERS
     Each returns an HTMLElement for a .panel, built from LIVE
     (which carries either live values or the baked fallback).

  function chev() {
    return '<span class="row__chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></span>';
  }

  function makePanel(opts) {
    var p = document.createElement("section");
    p.className = "panel";
    p.setAttribute("role", "dialog");
    p.setAttribute("aria-modal", "false");
    p.setAttribute("aria-label", opts.title);

    var crumbHtml = "";
    if (opts.crumbs && opts.crumbs.length) {
      crumbHtml = '<nav class="crumb" aria-label="Drill path">';
      for (var i = 0; i < opts.crumbs.length; i++) {
        var c = opts.crumbs[i];
        if (i === opts.crumbs.length - 1) {
          crumbHtml += '<span class="here">' + c.label + '</span>';
        } else {
          crumbHtml += '<button data-pop="' + (opts.crumbs.length - 1 - i) + '">' + c.label + '</button><span class="sep">/</span>';
        }
      }
      crumbHtml += '</nav>';
    }

    p.innerHTML =
      '<header class="panel__head">' +
        '<div class="panel__title-wrap">' +
          '<p class="panel__kicker"><span class="dot"></span>' + opts.kicker + '</p>' +
          '<h2 class="panel__title">' + opts.title + '</h2>' +
        '</div>' +
        '<button class="panel__close" aria-label="Close panel (Esc)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6 18 18"/><path d="M18 6 6 18"/></svg></button>' +
      '</header>' +
      '<div class="panel__body">' + crumbHtml + opts.body + '</div>';

    return p;
  }

          '<div class="meta-cell"><div class="k">Stage</div><div class="v">' + esc(r.stage) + '</div></div>' +
          '<div class="meta-cell"><div class="k">Quiet</div><div class="v mono">' + (r.quiet != null ? r.quiet + ' days' : 'n/a') + '</div></div>' +
          '<div class="meta-cell"><div class="k">Rep</div><div class="v">' + esc(r.rep) + '</div></div>' +
        '</div>' +
        reasonsHtml +
        draftHtml
    });
  }

  /* ---- ADS snapshot (depth 0) ---- */
  function panelAds() {
    var a = LIVE.ads;
    var camps = a.campaigns || [];
    var maxSpend = camps.reduce(function (m, c) { return Math.max(m, c.spendNum || 0); }, 0) || 1;
    var totalSpend = camps.reduce(function (m, c) { return m + (c.spendNum || 0); }, 0) || 1;

    var rowsHtml = '<div class="rows">';
    camps.forEach(function (c, i) {
      var pipCls = /run/i.test(c.status) ? "live" : (/learn/i.test(c.status) ? "warm" : "");
      var subMeta = "Meta · " + esc(String(c.status).toLowerCase()) + (c.dailyBudget ? " · " + esc(c.dailyBudget) : "");
      rowsHtml +=
        '<button class="row is-drillable" data-drill="camp:' + i + '">' +
          '<div class="row__main"><div class="row__name">' + esc(c.name) + '</div><div class="row__sub"><span class="pip ' + pipCls + '">' + subMeta + '</span></div></div>' +
          '<div class="row__val"><div class="row__amt mono">' + esc(c.spend) + '</div><div class="row__meta">' + esc(c.results) + ' leads</div></div>' + chev() +
        '</button>';
    });
    rowsHtml += '</div>';

    var barsHtml = '<div>';
    camps.forEach(function (c) {
      var pct = Math.round(((c.spendNum || 0) / totalSpend) * 100);
      barsHtml +=
        '<div class="bar-line"><span class="bar-line__name">' + esc(c.name) + '</span>' +
        '<span class="bar-track"><span class="bar-fill" data-w="' + pct + '"></span></span>' +
        '<span class="bar-line__val mono">' + pct + '%</span></div>';
    });
    barsHtml += '</div>';

    return makePanel({
      kicker: "Marketing · lifetime",
      title: "Ad snapshot",
      crumbs: [{ label: "Ad snapshot" }],
      body:
        '<div class="figure-row">' +
          '<div class="figure"><span class="figure__val accent mono">' + esc(a.lifetimeSpend) + '</span><span class="figure__lbl">Lifetime spend</span></div>' +
          '<div class="figure"><span class="figure__val mono">' + esc(a.cpl) + '</span><span class="figure__lbl">Cost per lead</span></div>' +
          '<div class="figure"><span class="figure__val mono">' + esc(a.leads) + '</span><span class="figure__lbl">Leads · ' + esc(a.campaignsTotal) + ' campaigns</span></div>' +
        '</div>' +
        '<p class="section-h">Live campaigns · drill into any</p>' +
        rowsHtml +
        '<p class="section-h" style="margin-top:22px">Spend split, live</p>' +
        barsHtml +
        '<p class="row__meta" style="margin-top:18px">Meta only. Google Ads conversion pixel still pending, so CPL counts Meta leads only.</p>'
    });
  }

  function panelCampaign(idx, crumbs) {
    var c = LIVE.ads.campaigns[idx];
    if (!c) return panelAds();
    var statusCls = /run/i.test(c.status) ? "live" : (/learn/i.test(c.status) ? "warm" : "");
    return makePanel({
      kicker: "Campaign · Meta",
      title: c.name,
      crumbs: crumbs || [{ label: "Ad snapshot" }, { label: c.name }],
      body:
        '<p class="lede">' + esc(c.name) + ' on Meta. ' + (c.dailyBudget ? esc(c.dailyBudget) + '. ' : '') + 'Status ' + esc(String(c.status).toLowerCase()) + '.</p>' +
        '<div class="meta-grid">' +
          '<div class="meta-cell"><div class="k">Spend</div><div class="v mono">' + esc(c.spend) + '</div></div>' +
          '<div class="meta-cell"><div class="k">Leads</div><div class="v mono">' + esc(c.results) + '</div></div>' +
          (c.dailyBudget ? '<div class="meta-cell"><div class="k">Daily budget</div><div class="v mono">' + esc(c.dailyBudget) + '</div></div>' : '') +
          '<div class="meta-cell"><div class="k">Status</div><div class="v"><span class="pip ' + statusCls + '">' + esc(c.status) + '</span></div></div>' +
        '</div>'
    });
  }

  /* ---- DAY / PRIORITIES panel (depth 0) ---- */
  function panelDay() {
    var d = LIVE.day;
    var jobs = d.activeJobs || [];
    var rowsHtml = '<div class="rows">';
    if (jobs.length) {
      jobs.forEach(function (j) {
        var pipCls = (j.daysOverdue != null && j.daysOverdue > 0) ? "warm" : "live";
        var sub = esc(j.status) + ' · assignee ' + esc(j.assignee) + (j.daysOverdue != null && j.daysOverdue > 0 ? ' · ' + j.daysOverdue + ' days overdue' : '');
        rowsHtml +=
          '<button class="row" data-drill="">' +
            '<div class="row__main"><div class="row__name">' + esc(j.title) + '</div><div class="row__sub"><span class="pip ' + pipCls + '">' + sub + '</span></div></div>' +
            '<div class="row__val"><div class="row__meta">' + (j.daysOverdue != null && j.daysOverdue > 0 ? 'needs a push' : 'on track') + '</div></div>' +
          '</button>';
      });
    } else {
      rowsHtml += '<div class="row" style="cursor:default"><div class="row__main"><div class="row__sub">No jobs active today.</div></div></div>';
    }
    rowsHtml += '</div>';

    return makePanel({
      kicker: "Today · priorities",
      title: "What's my day",
      crumbs: [{ label: "Today" }],
      body:
        '<div class="figure-row">' +
          '<div class="figure"><span class="figure__val mono">' + esc(d.tasksOpen) + '</span><span class="figure__lbl">Tasks open</span></div>' +
          '<div class="figure"><span class="figure__val accent mono">' + esc(d.tasksOverdue) + '</span><span class="figure__lbl">Overdue</span></div>' +
          '<div class="figure"><span class="figure__val mono">' + esc(d.jobsActive) + '</span><span class="figure__lbl">Job active today</span></div>' +
        '</div>' +
        '<p class="section-h">Jobs active today</p>' +
        rowsHtml +
        '<p class="section-h" style="margin-top:22px">Open task load</p>' +
        '<ul class="timeline">' +
          '<li><div class="when">' + esc(d.tasksOverdue) + ' overdue</div><div class="what">GHL and Automator tasks, mostly Quote required follow-throughs.</div></li>' +
          '<li><div class="when">' + esc(d.tasksOpen) + ' open</div><div class="what">The full active task queue across the book today.</div></li>' +
          '<li><div class="when">priority read</div><div class="what">Clear the quiet quotes first, they are the biggest dollars on the board.</div></li>' +
        '</ul>'
    });
  }

  /* ---- CASHFLOW panel (depth 0) ---- */
  function panelCashflow() {
    var c = LIVE.cashflow;
    return makePanel({
      kicker: "Finance · collections",
      title: "Cashflow",
      crumbs: [{ label: "Cashflow" }],
      body:
        '<div class="figure-row">' +
          '<div class="figure"><span class="figure__val accent mono">' + esc(c.collected30) + '</span><span class="figure__lbl">Collected, 30 days</span></div>' +
          '<div class="figure"><span class="figure__val mono">' + esc(c.collected90) + '</span><span class="figure__lbl">Collected, 90 days</span></div>' +
          '<div class="figure"><span class="figure__val mono">' + esc(c.collected7) + '</span><span class="figure__lbl">Collected, 7 days</span></div>' +
        '</div>' +
        '<div class="meta-grid">' +
          '<div class="meta-cell"><div class="k">Outstanding</div><div class="v mono">' + esc(c.outstanding) + '</div></div>' +
          '<div class="meta-cell"><div class="k">Nature</div><div class="v">Deposit-paid WIP</div></div>' +
          '<div class="meta-cell"><div class="k">Signed backlog</div><div class="v mono">' + esc(c.signedBacklog) + ' · ' + esc(c.signedBacklogCount) + ' jobs</div></div>' +
        '</div>' +
        '<p class="lede" style="margin-top:4px">The ' + esc(c.outstanding) + ' outstanding is mostly deposit-paid work in progress, not aged receivable. Nothing to chase. The quiet 7-day collection is timing, the backlog converts as jobs complete.</p>' +
        '<ul class="timeline">' +
          '<li><div class="when">last 30 days</div><div class="what">Collected ' + esc(c.collected30) + ' across recent jobs.</div></li>' +
          '<li><div class="when">last 90 days</div><div class="what">Collected ' + esc(c.collected90) + ', the steady run-rate.</div></li>' +
          '<li><div class="when">outstanding</div><div class="what">' + esc(c.outstanding) + ' still out, deposit-paid WIP, frame it neutral.</div></li>' +
        '</ul>'
    });
  }

  /* ---------------------------------------------------------
     PANEL STACK MANAGEMENT - the drill
     --------------------------------------------------------- */
  var stack = []; // array of { el }
  var lastQuery = null;

  function animateBars(el) {
    var fills = el.querySelectorAll(".bar-fill[data-w]");
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        fills.forEach(function (f) { f.style.width = f.getAttribute("data-w") + "%"; });
      });
    });
  }

  function restack() {
    // newest = active; below it recede with increasing depth
    for (var i = 0; i < stack.length; i++) {
      var el = stack[i].el;
      el.classList.remove("active", "receded", "receded-2");
      var depthFromTop = stack.length - 1 - i;
      if (depthFromTop === 0) el.classList.add("active");
      else if (depthFromTop === 1) el.classList.add("receded");
      else el.classList.add("receded-2");
    }
  }

  function pushPanel(el) {
    panels.appendChild(el);
    stack.push({ el: el });
    body.classList.add("panel-open");
    restack();
    animateBars(el);
    // focus the close button of the new active panel for keyboard users
    var close = el.querySelector(".panel__close");
    if (close) setTimeout(function () { close.focus({ preventScroll: true }); }, reduceMotion ? 20 : 320);
  }

  function popPanel() {
    if (!stack.length) return;
    var top = stack.pop();
    var el = top.el;
    if (reduceMotion) {
      el.remove();
    } else {
      el.classList.remove("active");
      el.style.opacity = "0";
      el.style.transform = "translateY(18px) scale(0.97)";
      el.style.pointerEvents = "none";
      var toRemove = el;
      setTimeout(function () { toRemove.remove(); }, 480);
    }
    restack();
    if (!stack.length) {
      body.classList.remove("panel-open");
    } else {
      var newTopClose = stack[stack.length - 1].el.querySelector(".panel__close");
      if (newTopClose) newTopClose.focus({ preventScroll: true });
    }
  }

  function popTo(remaining) {
    // pop until exactly `remaining` panels left
    while (stack.length > remaining && stack.length > 0) {
      var top = stack.pop();
      top.el.remove();
    }
    restack();
    if (!stack.length) body.classList.remove("panel-open");
  }

  function closeAll() {
    while (stack.length) {
      var top = stack.pop();
      top.el.remove();
    }
    body.classList.remove("panel-open");
    if (presence) presence.focus({ preventScroll: true });
  }

  /* open the root panel for the current answer */
  function elaborateCurrent() {
    if (!lastQuery || !lastQuery.panel) return;
    closeAll();
    var el;
    if (lastQuery.panel === "sales") el = panelSales();
    else if (lastQuery.panel === "followups") el = panelFollowups();
    else if (lastQuery.panel === "ads") el = panelAds();
    else if (lastQuery.panel === "day") el = panelDay();
    else if (lastQuery.panel === "cashflow") el = panelCashflow();
    else if (lastQuery.panel === "proposals") el = panelProposals();
    if (el) pushPanel(el);
  }

  /* drill from a row into a deeper panel */
  function drillInto(key) {
    if (!key) return;
    var crumbs = [];
    // build the breadcrumb trail from the panels already in the stack
    stack.forEach(function (s) {
      var t = s.el.querySelector(".panel__title");
      if (t) crumbs.push({ label: t.textContent });
    });

    var el;
    if (key.indexOf("fu:") === 0) {
      var fi = parseInt(key.slice(3), 10);
      var fr = LIVE.followups.ranked[fi];
      crumbs.push({ label: fr ? fr.name : "Follow-up" });
      el = panelFollowupDeal(fi, crumbs);
    } else if (key.indexOf("camp:") === 0) {
      var ci = parseInt(key.slice(5), 10);
      var cc = LIVE.ads.campaigns[ci];
      crumbs.push({ label: cc ? cc.name : "Campaign" });
      el = panelCampaign(ci, crumbs);
    }
    if (el) pushPanel(el);
  }

  /* ---------------------------------------------------------
     SPEAK - the presence brightens, terse answer resolves in
     --------------------------------------------------------- */
  var speakTimer = null;

  function speak(entry) {
    lastQuery = entry;
    body.classList.add("has-spoken");

    // a brief thinking beat (the core dims, the sheen quickens), then it speaks
    bubble.classList.remove("show");
    body.classList.remove("is-speaking");
    body.classList.add("is-thinking");

    var thinkMs = reduceMotion ? 80 : 520;
    clearTimeout(speakTimer);
    speakTimer = setTimeout(function () {
      body.classList.remove("is-thinking");
      body.classList.add("is-speaking");

      answerEl.innerHTML = entry.answer;
      elaborateBtn.style.display = entry.panel ? "" : "none";
      bubbleFoot.querySelector(".bubble__hint").textContent = entry.panel ? "or ask again" : "";

      bubble.classList.add("show");
    }, thinkMs);
  }

  /* ---------------------------------------------------------
     ASK ANYTHING (free-text) - the live Ryujin AI over chat SSE.
     READ-ONLY: only POST /api/chat {message}; never any write,
     send, or proposal-altering call.
     --------------------------------------------------------- */
  var chatAbort = null;

  function showStreamingBubble() {
    lastQuery = { answer: "", panel: null };
    body.classList.add("has-spoken");
    bubble.classList.remove("show");
    body.classList.remove("is-speaking");
    body.classList.add("is-thinking");
    answerEl.textContent = "Thinking…";
    elaborateBtn.style.display = "none";
    bubbleFoot.querySelector(".bubble__hint").textContent = "";
    var t = reduceMotion ? 40 : 240;
    setTimeout(function () { bubble.classList.add("show"); }, t);
  }

  function parseSseChunk(chunk, onText, onDone) {
    // chunk is a complete SSE event-block string ("data: {...}")
    var lines = chunk.split(/\r?\n/);
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (line.indexOf("data: ") !== 0) continue;
      var payload = line.slice(6).trim();
      if (!payload) continue;
      var obj;
      try { obj = JSON.parse(payload); } catch (e) { continue; }
      if (obj && typeof obj.text === "string") onText(obj.text);
      if (obj && obj.done) onDone();
    }
  }

  function askAI(q) {
    if (chatAbort) { try { chatAbort.abort(); } catch (e) {} }
    chatAbort = (typeof AbortController !== "undefined") ? new AbortController() : null;
    showStreamingBubble();

    var acc = "";
    var started = false;

    fetch("/api/chat", {
      method: "POST",
      cache: "no-store",
      headers: Object.assign({ "Content-Type": "application/json", "Accept": "text/event-stream" }, tHeaders()),
      body: JSON.stringify({ message: q }),
      signal: chatAbort ? chatAbort.signal : undefined
    }).then(function (resp) {
      if (!resp.ok) throw new Error("chat " + resp.status);

      function flushSpeaking() {
        if (!started) {
          started = true;
          body.classList.remove("is-thinking");
          body.classList.add("is-speaking");
        }
        answerEl.textContent = acc || "…";
      }
      function onText(t) { acc += t; flushSpeaking(); }
      function done() {
        body.classList.remove("is-thinking");
        body.classList.add("is-speaking");
        answerEl.textContent = acc.trim() || "No answer came back. Try sales, follow-ups, ads, your day, or cashflow.";
      }

      // Prefer a true stream; fall back to .text() if the body is not readable.
      if (resp.body && resp.body.getReader && typeof TextDecoder !== "undefined") {
        var reader = resp.body.getReader();
        var dec = new TextDecoder();
        var buf = "";
        function pump() {
          return reader.read().then(function (res) {
            if (res.done) {
              if (buf.trim()) parseSseChunk(buf, onText, done);
              done();
              return;
            }
            buf += dec.decode(res.value, { stream: true });
            var blocks = buf.split(/\r?\n\r?\n/);
            buf = blocks.pop();
            blocks.forEach(function (b) { parseSseChunk(b, onText, function () {}); });
            // reflect progress without waiting for the next block boundary
            if (acc) flushSpeaking();
            return pump();
          });
        }
        return pump();
      } else {
        return resp.text().then(function (txt) {
          txt.split(/\r?\n\r?\n/).forEach(function (b) { parseSseChunk(b, onText, function () {}); });
          done();
        });
      }
    }).catch(function () {
      body.classList.remove("is-thinking");
      body.classList.add("is-speaking");
      answerEl.textContent = "I can pull sales, follow-ups, ads, your day, or cashflow.";
      bubble.classList.add("show");
    });
  }

  /* unified entry: local fast-flow if a keyword matches, else the live AI */
  function ask(q) {
    var entry = route(q);
    closeAll();
    askInput.value = "";
    if (entry) {
      speak(entry);
    } else {
      // free-text -> the live Ryujin AI over /api/chat (SSE). The drive/takeover
      // overlay is not wired for real answers yet, so route straight to the
      // working chat instead of dead-ending in it.
      askAI(q);
    }
  }

  /* ---------------------------------------------------------
     WIRING
     --------------------------------------------------------- */
  askForm.addEventListener("submit", function (e) {
    e.preventDefault();
    var q = askInput.value.trim();
    if (!q) return;
    ask(q);
  });

  chips.addEventListener("click", function (e) {
    var btn = e.target.closest(".chip");
    if (!btn) return;
    ask(btn.getAttribute("data-q"));
  });

  presence.addEventListener("click", function () {
    // tapping the presence focuses the ask line - the AI is the navigation
    if (stack.length) { closeAll(); return; }
    askInput.focus();
  });

  elaborateBtn.addEventListener("click", function () {
    elaborateCurrent();
    // once the answer expands into a panel, the presence drifts to the right
    // and the terse bubble retires - its content now lives in the panel.
    body.classList.add("is-docked");
    bubble.classList.remove("show");
  });

  // delegated panel interactions: drill, close, crumb-pop, copy draft (copy-only)
  panels.addEventListener("click", function (e) {
    var closeBtn = e.target.closest(".panel__close");
    if (closeBtn) { popPanel(); return; }

    var copyBtn = e.target.closest("[data-copy]");
    if (copyBtn) {
      var panelEl = copyBtn.closest(".panel");
      var bodyEl = panelEl && panelEl.querySelector("[data-draft-body]");
      var text = bodyEl ? bodyEl.textContent : "";
      var done = function () {
        var was = copyBtn.textContent;
        copyBtn.textContent = "Copied";
        setTimeout(function () { copyBtn.textContent = was; }, 1600);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done, function () {});
      } else {
        try {
          var ta = document.createElement("textarea");
          ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
          document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove();
          done();
        } catch (err) {}
      }
      return;
    }

    var crumbBtn = e.target.closest(".crumb button[data-pop]");
    if (crumbBtn) {
      var remaining = parseInt(crumbBtn.getAttribute("data-pop"), 10);
      popTo(remaining);
      return;
    }

    var row = e.target.closest(".row.is-drillable");
    if (row) {
      drillInto(row.getAttribute("data-drill"));
      return;
    }
  });

  veil.addEventListener("click", function () { closeAll(); body.classList.remove("is-docked"); });

  // keyboard: Esc pops one level; if nothing open, undock; then dismiss bubble
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      if (stack.length) { popPanel(); if (!stack.length) body.classList.remove("is-docked"); }
      else if (body.classList.contains("is-docked")) { body.classList.remove("is-docked"); }
      else if (bubble.classList.contains("show")) { bubble.classList.remove("show"); body.classList.remove("is-speaking"); }
      else if (body.classList.contains("has-spoken")) { goHome(); }
    }
    // "/" focuses the ask line, like a real operator instrument
    if (e.key === "/" && document.activeElement !== askInput) {
      e.preventDefault();
      askInput.focus();
    }
  });

  // when all panels close via other paths, return the presence home after a beat
  var undockObserver = new MutationObserver(function () {
    if (!body.classList.contains("panel-open") && body.classList.contains("is-docked")) {
      setTimeout(function () {
        if (!body.classList.contains("panel-open")) body.classList.remove("is-docked");
      }, 400);
    }
  });
  undockObserver.observe(body, { attributes: true, attributeFilter: ["class"] });

  if (homeBtn) homeBtn.addEventListener("click", goHome);

  /* ---------------------------------------------------------
     BOOT - render the resting monitor, pull live data, then keep
     it fresh every 60s (read-only).
     --------------------------------------------------------- */
  renderGlance();
  loadLive();
  setInterval(loadLive, 60000);

})();
</script>
