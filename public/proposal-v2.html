<style>
  /* Page-level scaffolding only. Everything visual lives in proposal-v2.css.
     These rules cover load and error states the stylesheet does not own. */
  html,body{margin:0;padding:0}
  .pv2-boot{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:#f8f4ea;color:#5c5a54;
    font-family:'Inter',system-ui,sans-serif;font-size:15px;
    text-align:center;padding:32px;
  }
  .pv2-boot__spinner{
    width:34px;height:34px;border-radius:50%;
    border:3px solid #e6ddc9;border-top-color:#b08d57;
    margin:0 auto 18px;animation:pv2-spin .9s linear infinite;
  }
  @keyframes pv2-spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.pv2-boot__spinner{animation:none}}

  /* Signature pad: not in the component sheet, lives with the accept block. */
  .pv2-sig{
    background:rgba(255,255,255,.10);
    border:1px dashed rgba(255,255,255,.35);
    border-radius:12px;
    padding:14px;
    max-width:460px;
    margin:0 auto 24px;
  }
  .pv2-sig.is-bad{border-color:#e7a99a}
  .pv2-sig__pad{
    position:relative;
    width:100%;height:140px;
    background:#fffdf7;border-radius:8px;
    touch-action:none;cursor:crosshair;
  }
  .pv2-sig__pad canvas{width:100%;height:100%;display:block;border-radius:8px}
  .pv2-sig__hint{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    color:#9a8e76;font-size:14px;pointer-events:none;
    font-family:'Fraunces','Georgia',serif;font-style:italic;
  }
  .pv2-sig.is-signed .pv2-sig__hint{display:none}
  .pv2-sig__row{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:10px;font-size:12px;color:#dfe6f2;
  }
  .pv2-sig__clear{
    background:transparent;border:1px solid rgba(255,255,255,.3);
    color:#fff;border-radius:6px;padding:6px 14px;
    font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;
  }
  .pv2-sig__clear:hover{background:rgba(255,255,255,.12)}

  /* Accept confirmation overlay. */
  .pv2-modal{
    position:fixed;inset:0;z-index:50;
    display:none;align-items:center;justify-content:center;
    background:rgba(19,41,75,.62);padding:24px;
  }
  .pv2-modal.is-open{display:flex}
  .pv2-modal__card{
    background:#fffdf7;border-radius:16px;
    max-width:440px;width:100%;
    padding:40px 32px;text-align:center;
    box-shadow:0 30px 80px rgba(19,41,75,.4);
    border-top:4px solid #b08d57;
  }
  .pv2-modal__seal{
    width:64px;height:64px;border-radius:50%;
    background:#3f7d5b;margin:0 auto 18px;
    display:flex;align-items:center;justify-content:center;
  }
  .pv2-modal__seal svg{width:30px;height:30px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
  .pv2-modal__card h3{font-family:'Fraunces','Georgia',serif;color:#13294b;font-size:24px;margin:0 0 8px}
  .pv2-modal__card p{color:#5c5a54;font-size:15px;margin:0 0 6px}
  .pv2-modal__amt{font-family:'Fraunces','Georgia',serif;color:#b08d57;font-size:22px;margin:14px 0}

  .pv2-visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}

  /* Metal panel preview: framed photoreal render of the roof in the active
     panel profile, above the metal tier cards. Matches the cream + bronze
     proposal aesthetic. Only ever rendered on a metal ladder. */
  .pv2 .pv2-panelimg{
    max-width:680px;
    margin:0 auto 30px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }
  .pv2 .pv2-panelimg__frame{
    width:100%;
    border-radius:16px;
    overflow:hidden;
    background:#fffdf7;
    border:1px solid #e6ddc9;

    display:block;

  /* Save as PDF: a floating action on every proposal. Hidden when printing. */

    position:fixed;top:16px;right:16px;z-index:40;
    display:inline-flex;align-items:center;gap:8px;
    background:#13294b;color:#fff;border:1px solid rgba(255,255,255,.25);
    border-radius:999px;padding:10px 18px;cursor:pointer;
    font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:600;letter-spacing:.02em;
    box-shadow:0 10px 30px rgba(19,41,75,.35);

  .pv2-pdfbtn:hover{background:#1b3766}
  .pv2-pdfbtn svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  @media (max-width:560px){.pv2-pdfbtn{top:10px;right:10px;padding:9px 14px;font-size:12px}}

  /* Print rules live in proposal-v2.css section 17 (the canonical Save-as-PDF
     stylesheet) so the browser print path and the server PDF stay in step. */

  /* Explainer video now renders before the packages with a chapter strip (see .pv2-explainer in proposal-v2.css), not under the intro. */
  /* Standalone Book-a-Call CTA, sits ABOVE the navy accept box: red pulse button + a hint line underneath. */
  .pv2-bookcta{max-width:640px;margin:0 auto 22px;text-align:center}
  .pv2-bookcta__row{display:flex;align-items:center;justify-content:center}
  .pv2-bookcta__btn{display:inline-flex;align-items:center;gap:8px;background:#c62828;color:#fff;border:0;border-radius:12px;padding:14px 30px;font-family:inherit;font-weight:700;font-size:15px;line-height:1.3;letter-spacing:.01em;cursor:pointer;box-shadow:0 10px 26px rgba(198,40,40,.34);animation:pv2-bookpulse 2.4s ease-in-out infinite;transition:background .15s ease,transform .15s ease}
  .pv2-bookcta__btn:hover{background:#a81f1f;transform:translateY(-1px)}
  .pv2-bookcta__cal{margin-right:2px}
  .pv2-bookcta__hint{margin-top:9px;font-size:13px;color:#5c5a54;letter-spacing:.005em}
  .pv2-bookcta.is-open .pv2-bookcta__hint{display:none}
  .pv2-bookcta__wrap{margin-top:14px;border-radius:14px;overflow:hidden;box-shadow:0 12px 30px rgba(19,41,75,.18)}
  .pv2-bookcta__frame{width:100%;min-height:680px;border:none;display:block;background:#0b1b33}
  @keyframes pv2-bookpulse{0%,100%{box-shadow:0 10px 26px rgba(198,40,40,.30)}50%{box-shadow:0 13px 36px rgba(198,40,40,.55)}}
  @media (max-width:560px){.pv2-bookcta__btn{font-size:14px;padding:13px 22px}}
  @media (prefers-reduced-motion:reduce){.pv2-bookcta__btn{animation:none}}
  /* Per-tier cost breakdown accordion (SumoQuote-style: materials + labour + fees). */
  .pv2-bd{margin-top:14px;border-top:1px solid #e6ddc9;padding-top:8px;text-align:left}
  .pv2-bd__toggle{cursor:pointer;font-size:13px;font-weight:600;color:#13294b;list-style:none;display:flex;align-items:center;gap:7px;padding:5px 0}
  .pv2-bd__toggle::-webkit-details-marker{display:none}
  .pv2-bd__toggle::before{content:'+';font-weight:700;color:#b08d57;font-size:15px;line-height:1}
  .pv2-bd[open] .pv2-bd__toggle::before{content:'\2212'}
  .pv2-bd__group{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#b08d57;margin:11px 0 4px}
  .pv2-bd__row{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;color:#3a4250;padding:3px 0;line-height:1.4}
  .pv2-bd__label{flex:1}
  .pv2-bd__detail{display:block;font-size:11px;color:#8a93a3}
  .pv2-bd__amt{white-space:nowrap;font-variant-numeric:tabular-nums}
  .pv2-bd__row--sub{font-weight:600;color:#13294b;border-top:1px dashed #e6ddc9;margin-top:4px;padding-top:6px}
  .pv2-bd__row--grand{font-weight:700;color:#13294b;border-top:1.5px solid #13294b;margin-top:6px;padding-top:7px;font-size:13.5px}
</style>

<body class="pv2">

<!-- The renderer mounts every section here, in the order the data delivers. -->
<main id="pv2-root">
  <div class="pv2-boot" id="pv2-boot">
    <div>
      <div class="pv2-boot__spinner" aria-hidden="true"></div>
      Preparing your proposal.
    </div>
  </div>
</main>

<!-- Accept confirmation. Lives outside the section flow, shown on accept. -->
<div class="pv2-modal" id="pv2-modal" role="dialog" aria-modal="true" aria-labelledby="pv2-modal-title">
  <div class="pv2-modal__card">
    <div class="pv2-modal__seal" aria-hidden="true">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    <h3 id="pv2-modal-title">You are locked in.</h3>
    <p id="pv2-modal-pick"></p>
    <div class="pv2-modal__amt" id="pv2-modal-amt"></div>
    <p id="pv2-modal-rep"></p>
  </div>
</div>

<script>
/* ============================================================================
   proposal-v2.html  ::  the single greenfield customer-facing renderer

   ONE data-driven page. No boot-time mode branching. The shape that
   /api/proposal-v2.js returns drives everything: an ordered list of sections,
   each with a block_type, plus a products payload the products component owns.

   Flow:
     1. Read ?instance= or ?estimate=&template= from the URL, fetch ProposalData.
     2. Build a ctx (branding, rep, customer, variables, resolveVars).
     3. Walk DATA.sections in order. For each, look up SECTION_COMPONENTS[type],
        call it, mount the returned element. Unknown type warns and is skipped.
     4. The products component is the one stateful piece: tier / path / addon
        selection, a live total that re-totals on every change, and the accept
        and signature flow that posts the selection to /api/proposal-v2-accept.

   Jewels rules, lock-in CTA. No em or en dashes anywhere, comments included.
   ========================================================================== */

(function () {
  'use strict';

  /* --------------------------------------------------------------------------
     DATA + CONTEXT
     -------------------------------------------------------------------------- */
  var DATA = null;
  var ctx = null;

  // The live selection state. The products component owns and mutates this.
  // variantSel maps a multi-variant card's base id to its active variant id
  // (the metal card's European Clay vs Flat Panel toggle).
  var state = {
    tierId: null,
    pathId: null,
    addons: new Set(),
    variantSel: {},
    // panelSel is the active metal panel profile (flat / wavy / stand). It
    // re-prices every metal tier card live when switched.
    panelSel: null
  };

  /* --------------------------------------------------------------------------
     SMALL HELPERS
     -------------------------------------------------------------------------- */
  function $(sel, root) { return (root || document).querySelector(sel); }

  // Build an element from a tag, optional class, and optional html or text.
  function el(tag, cls, html) {
    var node = document.createElement(tag);
    if (cls) node.className = cls;
    if (html != null) node.innerHTML = html;
    return node;
  }

  // Escape for safe insertion into text or attribute contexts.
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // Currency, whole dollars, Canadian grouping.
  function money(n) {
    return '$' + (Math.round(Number(n) || 0)).toLocaleString('en-CA');
  }

  // Round a display amount to the nearest 25 dollars (house rule).
  function round25(n) {
    return Math.round((Number(n) || 0) / 25) * 25;
  }

  // The tax rate the data carries, defaulting to NB HST.
  function taxRate() {
    var p = DATA && DATA.products;
    return (p && typeof p.taxRate === 'number') ? p.taxRate : 0.15;
  }

  // FinanceIt style monthly estimate. Same math the proven client used.
  function monthlyFor(principal, termMonths) {
    var apr = 0.0899;
    var r = apr / 12;
    var term = termMonths || 120;
    if (!(principal > 0)) return 0;
    return (principal * r) / (1 - Math.pow(1 + r, -term));
  }

  /* --------------------------------------------------------------------------
     TOKEN RESOLUTION
     The server resolves {{tokens}} against variables before sending, but any
     leftover token is resolved here against ctx so nothing renders raw braces.
     -------------------------------------------------------------------------- */
  function resolveVars(input) {
    if (input == null) return '';
    var str = String(input);
    if (str.indexOf('{{') === -1) return str;
    var vars = (ctx && ctx.variables) || {};
    return str.replace(/\{\{\s*([\w.]+)\s*\}\}/g, function (whole, key) {
      if (Object.prototype.hasOwnProperty.call(vars, key)) {
        var v = vars[key];
        return (v == null) ? '' : String(v);
      }
      // Common fallbacks pulled from the structured ctx fields.
      var fb = {
        'customer.name': ctx.customer.name,
        'customer.address': ctx.customer.address,
        'rep.name': ctx.rep.name,
        'company.name': ctx.branding.companyName,
        'company.phone': ctx.branding.phone
      };
      return (fb[key] != null) ? String(fb[key]) : '';
    });
  }

  // Pull the first name off a full name for warm, personal copy.
  function firstName(full) {
    return String(full || '').trim().split(/\s+/)[0] || 'there';
  }

  /* ==========================================================================
     SECTION COMPONENTS
     Each is a pure function (content, ctx) that returns a single HTMLElement.
     They use only the .pv2 component classes from proposal-v2.css. The render
     loop maps a section's block_type to one of these.
     ========================================================================== */

  // A shared section heading group (eyebrow + title + lede).
  function sectionHead(content) {
    var wrap = document.createDocumentFragment();
    if (content.eyebrow) wrap.appendChild(el('p', 'pv2-eyebrow', esc(resolveVars(content.eyebrow))));
    if (content.title) wrap.appendChild(el('h2', null, esc(resolveVars(content.title))));
    if (content.lede) wrap.appendChild(el('p', 'pv2-lede', esc(resolveVars(content.lede))));
    return wrap;
  }

  // Wrap inner content in a standard band + centered measure.
  function band(inner, opts) {
    opts = opts || {};
    var section = el('section', 'pv2-section' + (opts.tint ? ' pv2-section--tint' : ''));
    var wrap = el('div', 'pv2-wrap');
    if (Array.isArray(inner)) inner.forEach(function (n) { if (n) wrap.appendChild(n); });
    else if (inner) wrap.appendChild(inner);
    section.appendChild(wrap);
    return section;
  }

  /* Standard assets injected into every proposal: the explainer video (now
     rendered before the packages) and the book-a-call calendar by the accept. */
  var EXPLAINER_VIDEO_URL = 'https://oyhn4tqzifmqqj0o.public.blob.vercel-storage.com/proposals/explainer-roof-system-v2.mp4';
  var EXPLAINER_VIDEO_POSTER = 'https://oyhn4tqzifmqqj0o.public.blob.vercel-storage.com/proposals/explainer-roof-system-poster-v2.jpg';
  var BOOKING_CALENDAR_URL = 'https://link.automator.ai/widget/booking/yiIwpQdoHSVnXa0ToyGK';
  var bookingScriptInjected = false;
  function loadBookingWidgetScript() {
    if (bookingScriptInjected) return;
    bookingScriptInjected = true;
    var s = document.createElement('script');
    s.src = 'https://link.automator.ai/js/form_embed.js';
    document.body.appendChild(s);
  }

  /* ---- hero ---------------------------------------------------------------
     The customer's own home, address, and a "Prepared for" line on royal. */
  function hero(content) {
    var c = content || {};
    var cust = ctx.customer;
    var brand = ctx.branding;
    var img = c.coverImage || cust.coverImage || '';

    var section = el('section', 'pv2-hero' + (img ? ' pv2-hero--photo' : ''));
    if (img) {
      var media = el('div', 'pv2-hero__media');
      media.style.backgroundImage = 'url("' + esc(img) + '")';
      section.appendChild(media);
    }
    var inner = el('div', 'pv2-hero__inner');
    inner.appendChild(el('p', 'pv2-hero__kicker',
      esc(resolveVars(c.kicker || brand.companyName || 'Plus Ultra Roofing'))));
    inner.appendChild(el('p', 'pv2-hero__for', esc(c.forLabel || 'Prepared for')));
    inner.appendChild(el('h1', null, esc(resolveVars(c.name || cust.name || 'Your Home'))));
    var addr = c.address || cust.address;
    if (addr) inner.appendChild(el('p', 'pv2-hero__addr', esc(resolveVars(addr))));
    var tag = c.tag || (brand.tagline || '');
    if (tag) inner.appendChild(el('span', 'pv2-hero__tag', esc(resolveVars(tag))));
    section.appendChild(inner);
    return section;
  }

  /* ---- intro --------------------------------------------------------------
     A signed personal note from the rep, set apart with a bronze rule. */
  function intro(content) {
    var c = content || {};
    var rep = ctx.rep;
    var letter = el('div', 'pv2-letter');

    if (c.greeting) letter.appendChild(el('p', 'pv2-letter__greeting', esc(resolveVars(c.greeting))));

    var bodyText = c.body || c.text || '';
    if (Array.isArray(c.paragraphs)) {
      c.paragraphs.forEach(function (p) {
        letter.appendChild(el('p', null, esc(resolveVars(p))));
      });
    } else if (bodyText) {
      String(resolveVars(bodyText)).split(/\n{2,}|\r?\n/).forEach(function (p) {
        if (p.trim()) letter.appendChild(el('p', null, esc(p.trim())));
      });
    }

    var sign = el('div', 'pv2-letter__sign');
    var photo = c.repPhoto || rep.photo;
    if (photo) {
      var av = el('img', 'pv2-letter__avatar');
      av.src = photo;
      av.alt = esc(rep.name || 'Your representative');
      av.loading = 'lazy';
      sign.appendChild(av);
    }
    var who = el('div');
    who.appendChild(el('div', 'pv2-letter__name', esc(resolveVars(c.repName || rep.name || ''))));
    who.appendChild(el('div', 'pv2-letter__role', esc(resolveVars(c.repTitle || rep.title || ''))));
    sign.appendChild(who);
    letter.appendChild(sign);

    // The explainer video used to sit here, directly under the letter. It now
    // renders lower, right before the packages, via explainerVideoBlock() in
    // the render loop (Mac asked to move it down + add chapter seeking).
    return band(letter, { tint: true });
  }

  /* ---- explainer video + chapters ----------------------------------------
     The roof-system anatomy talk, mounted right before the products so the
     customer understands what goes into the roof before seeing the packages.
     The chapter strip seeks the HTML5 video so they can jump to a topic. */
  var EXPLAINER_SUMMARY = 'A few minutes on everything that goes into a roof beyond the shingles: the underlayment, the flashing, the ice and water shield, the ventilation, and the install details that decide how long it lasts, plus how the warranties actually work. Watch the whole thing, or jump to a chapter below.';
  var EXPLAINER_CHAPTERS = [
    { label: 'Intro', t: 0, summary: 'Who we are and what this walkthrough covers.' },
    { label: 'The roof system', t: 16, summary: 'A roof is a system of layers working together, not just the shingles you see.' },
    { label: 'Underlayment', t: 74, summary: 'The water-resistant layer over the deck that backs up the shingles.' },
    { label: 'Flashing & valleys', t: 114, summary: 'The metal that seals walls, chimneys, and valleys, where most leaks actually start.' },
    { label: 'Hip & ridge', t: 154, summary: 'The capping along the peaks and hips, and how the ridge breathes.' },
    { label: 'Proper install', t: 194, summary: 'Correct nailing and nail placement, and why workmanship is what makes it last.' },
    { label: 'Ice & water shield', t: 294, summary: 'The self-sealing membrane at the eaves that protects against ice dams and wind-driven rain.' },
    { label: 'Warranty', t: 354, summary: 'The manufacturer and workmanship warranties and what each one covers.' },
    { label: 'Wrap-up', t: 470, summary: 'The bottom line and what happens next.' }
  ];
  function explainerVideoBlock() {
    if (!EXPLAINER_VIDEO_URL) return null;
    var nodes = [];
    nodes.push(sectionHead({
      eyebrow: 'Watch first',
      title: 'Your roof system, explained.',
      lede: 'A few minutes on what actually goes into the roof over your head, from the deck up.'
    }));
    var vidBox = el('div', 'pv2-explainer');
    var vid = document.createElement('video');
    vid.src = EXPLAINER_VIDEO_URL;
    if (EXPLAINER_VIDEO_POSTER) vid.poster = EXPLAINER_VIDEO_POSTER;
    vid.controls = true; vid.playsInline = true; vid.preload = 'metadata';
    vidBox.appendChild(vid);
    nodes.push(vidBox);

    var strip = el('div', 'pv2-chapters');
    EXPLAINER_CHAPTERS.forEach(function (ch) {
      var b = el('button', 'pv2-chapters__btn');
      b.type = 'button';
      var mm = Math.floor(ch.t / 60), ss = ch.t % 60;
      b.innerHTML = '<span class="pv2-chapters__t">' + mm + ':' + (ss < 10 ? '0' : '') + ss +
        '</span> ' + esc(ch.label);
      b.addEventListener('click', function () {
        try {
          vid.currentTime = ch.t;
          var pr = vid.play();
          if (pr && pr.catch) pr.catch(function () {});
        } catch (e) { /* seeking is best-effort */ }
        if (vidBox.scrollIntoView) vidBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
      strip.appendChild(b);
    });
    nodes.push(strip);

    // Summary dropdown: an overall summary plus a clickable per-chapter summary
    // list (each row seeks the video), so they can read what is covered or jump in.
    var sum = el('details', 'pv2-vidsum');
    sum.appendChild(el('summary', 'pv2-vidsum__toggle', 'Video summary'));
    sum.appendChild(el('p', 'pv2-vidsum__lede', esc(EXPLAINER_SUMMARY)));

      row.addEventListener('click', function () {
        try {
          vid.currentTime = ch.t;
          var pr = vid.play();
          if (pr && pr.catch) pr.catch(function () {});

        if (vidBox.scrollIntoView) vidBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
      sumList.appendChild(row);

    sum.appendChild(sumList);
    nodes.push(sum);

    var sec = band(nodes, { tint: true });

  /* Build an interactive before/after reveal slider. The after image fills the
     frame; the before image is layered on top and clipped from the right by a
     draggable vertical handle. Pointer and touch both drive the wipe. Both URLs
     are guaranteed present by the caller, so no empty image box is ever shown. */
  function buildReveal(beforeSrc, afterSrc) {
    var box = el('div', 'pv2-reveal');
    box.setAttribute('role', 'slider');
    box.setAttribute('aria-label', 'Drag to compare before and after');
    box.setAttribute('aria-valuemin', '0');
    box.setAttribute('aria-valuemax', '100');
    box.setAttribute('aria-valuenow', '50');
    box.tabIndex = 0;

    var after = el('img', 'pv2-reveal__img pv2-reveal__after');
    after.src = afterSrc; after.alt = 'After'; after.loading = 'eager';
    after.onerror = function () { box.style.display = 'none'; };
    box.appendChild(after);

    var before = el('img', 'pv2-reveal__img pv2-reveal__before');
    before.src = beforeSrc; before.alt = 'Before'; before.loading = 'eager';
    before.onerror = function () { box.style.display = 'none'; };
    box.appendChild(before);

    box.appendChild(el('span', 'pv2-reveal__tag pv2-reveal__tag--before', 'Before'));
    box.appendChild(el('span', 'pv2-reveal__tag pv2-reveal__tag--after', 'After'));

    var handle = el('div', 'pv2-reveal__handle');
    handle.appendChild(el('div', 'pv2-reveal__grip'));
    box.appendChild(handle);

    function setPos(pct) {
      pct = Math.max(0, Math.min(100, pct));
      before.style.clipPath = 'inset(0 ' + (100 - pct) + '% 0 0)';
      handle.style.left = pct + '%';
      box.setAttribute('aria-valuenow', String(Math.round(pct)));
    }
    function fromEvent(e) {
      var rect = box.getBoundingClientRect();
      var x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      setPos((x / rect.width) * 100);
    }
    var dragging = false;
    function down(e) { dragging = true; fromEvent(e); e.preventDefault(); }
    function move(e) { if (dragging) { fromEvent(e); e.preventDefault(); } }
    function up() { dragging = false; }
    box.addEventListener('mousedown', down);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
    box.addEventListener('touchstart', down, { passive: false });
    box.addEventListener('touchmove', move, { passive: false });
    box.addEventListener('touchend', up);
    box.addEventListener('keydown', function (e) {
      var now = Number(box.getAttribute('aria-valuenow')) || 50;
      if (e.key === 'ArrowLeft') { setPos(now - 4); e.preventDefault(); }
      else if (e.key === 'ArrowRight') { setPos(now + 4); e.preventDefault(); }
    });

    setPos(50);
    return box;
  }

  function proof(content) {
    var c = content || {};

    var beforeSrc = c.beforeImage || c.before;

    return band(nodes, { tint: true });

  // A small inline SVG for a why-us stat card. Stroke uses currentColor so the

  // common roofing proof points; anything else falls back to a shield seal.
  function whyIcon(name) {
    var paths = {
      shield: '<path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"></path>',
      check: '<path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"></path><polyline points="9 12 11 14 15 10"></polyline>',
      star: '<polygon points="12 2 15 9 22 9.5 17 14 18.5 21 12 17.5 5.5 21 7 14 2 9.5 9 9"></polygon>',
      home: '<path d="M3 11l9-7 9 7"></path><path d="M5 10v10h14V10"></path>',
      team: '<circle cx="9" cy="8" r="3"></circle><path d="M3 20c0-3 3-5 6-5s6 2 6 5"></path><path d="M16 6a3 3 0 0 1 0 6"></path>',
      clock: '<circle cx="12" cy="12" r="9"></circle><polyline points="12 7 12 12 16 14"></polyline>',
      award: '<circle cx="12" cy="9" r="6"></circle><path d="M9 14l-2 7 5-3 5 3-2-7"></path>'
    };
    var inner = paths[String(name || '').toLowerCase()] || paths.check;

  /* ---- guarantee ----------------------------------------------------------
     The promise, framed on royal as a seal. The data contract delivers
     { kicker, heading, items:[{title, body}], certifications:[string],
     certBadges:[{label, image}] }. Older payloads may carry lede / points,
     so both shapes render and the box never comes out near-empty. */
  function guarantee(content) {
    var c = content || {};
    var box = el('div', 'pv2-guarantee');
    var seal = el('div', 'pv2-guarantee__seal');
    seal.innerHTML = '<svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"></path><polyline points="9 12 11 14 15 10"></polyline></svg>';
    box.appendChild(seal);

    var kicker = c.kicker || c.eyebrow;
    if (kicker) box.appendChild(el('p', 'pv2-eyebrow', esc(resolveVars(kicker))));
    box.appendChild(el('h2', null, esc(resolveVars(c.heading || c.title || 'Our promise to you.'))));
    if (c.lede || c.body) box.appendChild(el('p', 'pv2-guarantee__lede', esc(resolveVars(c.lede || c.body))));

    // Primary shape: items as a grid of {title, body} commitments.
    if (Array.isArray(c.items) && c.items.length) {
      var grid = el('div', 'pv2-guarantee__items');
      c.items.forEach(function (it) {
        var item = el('div', 'pv2-guarantee__item');
        var title = (typeof it === 'string') ? it : (it.title || it.label || '');
        if (title) item.appendChild(el('div', 'pv2-guarantee__item-title', esc(resolveVars(title))));
        var body = (typeof it === 'string') ? '' : (it.body || it.desc || '');
        if (body) item.appendChild(el('p', 'pv2-guarantee__item-body', esc(resolveVars(body))));
        grid.appendChild(item);
      });
      box.appendChild(grid);
    } else if (Array.isArray(c.points) && c.points.length) {
      // Legacy shape: a simple checklist of points.
      var ul = el('ul', 'pv2-guarantee__points');
      c.points.forEach(function (p) {
        ul.appendChild(el('li', null, esc(resolveVars(typeof p === 'string' ? p : p.label))));
      });
      box.appendChild(ul);
    }

    // Certifications as bronze pills.
    if (Array.isArray(c.certifications) && c.certifications.length) {
      var certs = el('div', 'pv2-guarantee__certs');
      c.certifications.forEach(function (cert) {
        var label = (typeof cert === 'string') ? cert : (cert && (cert.label || cert.name));
        if (label) certs.appendChild(el('span', 'pv2-guarantee__cert', esc(resolveVars(label))));
      });
      box.appendChild(certs);
    }

    // Certification badge images (CertainTeed marks, etc.).
    if (Array.isArray(c.certBadges) && c.certBadges.length) {
      var badges = el('div', 'pv2-guarantee__badges');
      c.certBadges.forEach(function (b) {
        if (!b) return;
        var badge = el('div', 'pv2-guarantee__badge');
        if (b.image) {
          var im = el('img');
          im.src = b.image;
          im.alt = esc(resolveVars(b.label || 'Certification'));
          im.loading = 'lazy';
          badge.appendChild(im);
        } else if (b.label) {
          badge.appendChild(el('span', 'pv2-guarantee__badge-label', esc(resolveVars(b.label))));
        } else {
          return;
        }
        badges.appendChild(badge);
      });
      box.appendChild(badges);
    }

    return band(box);
  }

  /* ==========================================================================
     PRODUCTS  ::  the one stateful component
     Renders DATA.products.mode sub-views, maintains {tierId, pathId, addons},
     and keeps the live total bar and accept amount in sync on every change.
     ========================================================================== */

  // Resolve the tier list for the active products mode and path.
  function activeTiers() {
    var p = DATA.products || {};
    if (p.mode === 'two_path' && p.twoPath) {
      var path = (state.pathId === 'A') ? p.twoPath.pathA : p.twoPath.pathB;
      return (path && path.tiers) || [];
    }
    return p.tiers || [];
  }

  // The metal panel profiles available for the active products mode and path,
  // or null when the active ladder is not a metal (panel-priced) one. Reads
  // panels off the active two-path path first, then the top-level products.
  function activePanels() {
    var p = DATA.products || {};
    if (p.mode === 'two_path' && p.twoPath) {
      var path = (state.pathId === 'A') ? p.twoPath.pathA : p.twoPath.pathB;
      if (path && Array.isArray(path.panels) && path.panels.length) {
        return { panels: path.panels, def: path.defaultPanel || path.panels[0] };
      }
      return null;
    }
    if (Array.isArray(p.panels) && p.panels.length) {
      return { panels: p.panels, def: p.defaultPanel || p.panels[0] };
    }
    return null;
  }

  // Human label for a panel slug.
  var PANEL_LABELS = {
    flat: 'Standard Ribbed',
    wavy: 'European Clay',
    stand: 'Standing Seam'
  };

  // Photoreal preview render per metal panel profile. The hero image above the
  // metal tier cards swaps to the matching render as the customer toggles the
  // panel profile. Illustrative finish only; actual colour is chosen at signing.
  var PANEL_IMAGES = {
    flat: '/proposal-assets/metal/ribbed.jpg',
    wavy: '/proposal-assets/metal/clay.jpg',
    stand: '/proposal-assets/metal/standing.jpg'
  };

  // Pre-tax total for a tier, panel-aware. A metal tier carries panelPrices
  // { flat, wavy, stand }; the displayed/charged base follows the active panel.
  // Non-metal tiers (and metal tiers without a persisted SQ) fall back to total.
  function tierTotal(t) {
    if (!t) return 0;
    if (t.panelPrices) {
      var ap = activePanels();
      var sel = state.panelSel || (ap && ap.def) || 'flat';
      var v = t.panelPrices[sel];
      if (v == null && ap && ap.def != null) v = t.panelPrices[ap.def];
      if (v != null) return Number(v) || 0;
    }
    return Number(t.total) || 0;
  }

  // Resolve the active variant of a multi-variant card. Plain cards pass through.
  function effTier(t) {
    if (!t || !t.variants || !t.variants.length) return t;
    var sel = state.variantSel[t.id];
    for (var i = 0; i < t.variants.length; i++) if (t.variants[i].id === sel) return t.variants[i];
    return t.variants[0];
  }

  function findTier(id) {
    var list = activeTiers();
    for (var i = 0; i < list.length; i++) {
      var t = list[i];
      if (t.id === id) return effTier(t);
      if (t.variants) {
        for (var j = 0; j < t.variants.length; j++) {
          if (t.variants[j].id === id) return t.variants[j];
        }
      }
    }
    return list[0] ? effTier(list[0]) : null;
  }

  function getAddons() {
    var p = DATA.products || {};
    return Array.isArray(p.addons) ? p.addons : [];
  }

  function addonsSubtotal() {
    var sum = 0;
    getAddons().forEach(function (a) {
      if (state.addons.has(a.slug)) sum += Number(a.price) || 0;
    });
    return sum;
  }

  // Complete-project savings. A fixed pre-tax credit that applies only when
  // every add-on is toggled on. Guarded: returns 0 when the proposal carries
  // no bundleSavings rule, so proposals without it are completely unaffected.
  function bundleSavingsAmount() {
    var p = DATA.products || {};
    var bs = p.bundleSavings;
    if (!bs || !(Number(bs.amount) > 0)) return 0;
    var ad = getAddons();
    if (!ad.length) return 0;
    var allOn = ad.every(function (a) { return state.addons.has(a.slug); });
    return allOn ? Number(bs.amount) : 0;
  }

  function selectedAddonsList() {
    return getAddons()
      .filter(function (a) { return state.addons.has(a.slug); })
      .map(function (a) { return { slug: a.slug, label: a.label, price: Number(a.price) || 0 }; });
  }

  // The single source of truth for the displayed number.
  // Pre-tax base = selected tier total + selected add-ons.
  // Displayed total = base x (1 + tax), rounded to nearest 25.
  function computeTotals() {
    var t = findTier(state.tierId);
    var base = (t ? tierTotal(t) : 0) + addonsSubtotal() - bundleSavingsAmount();
    var withTax = base * (1 + taxRate());
    var display = round25(withTax);
    return { tier: t, base: base, withTax: withTax, display: display };
  }

  // Recompute every live surface: the total bar and the accept summary.
  function recompute() {
    var totals = computeTotals();
    var t = totals.tier;
    var count = state.addons.size;
    var label = t ? (t.name + (t.sub ? ' · ' + t.sub : '')) : '';
    var pickLabel = (count > 0)
      ? label + ' + ' + count + ' upgrade' + (count === 1 ? '' : 's')
      : label;

    var bar = $('#pv2-total-pick');
    if (bar) bar.textContent = pickLabel;
    var fin = DATA.products && DATA.products.financing;
    var financed = !!(fin && fin.enabled);
    var termMo = (fin && fin.termMonths) || 120;

    // Hero figure = monthly when financing is on, else the all-in total.
    var bsActive = bundleSavingsAmount() > 0;
    var amt = $('#pv2-total-amount');
    if (amt) {
      amt.textContent = financed
        ? money(monthlyFor(totals.display, termMo)) + '/mo'
        : money(totals.display);
      amt.classList.toggle('is-bundle', bsActive);
    }

    // Struck pre-discount price + promo tag. Only on the selected tier's own
    // discount, and only when no add-ons are stacked on top (so the strike
    // never misleads on a number that includes upgrades).
    var wasEl = $('#pv2-total-was');
    if (wasEl) {
      var bsAmt = bundleSavingsAmount();
      var showTierPromo = (t && t.originalTotal != null && Number(t.originalTotal) > Number(t.total) && count === 0);
      if (bsAmt > 0) {
        // Bundle savings active (every upgrade on): strike the pre-credit all-in
        // so the discount reads as a slash on the total, not just a line below.
        var preHst = round25((totals.base + bsAmt) * (1 + taxRate()));
        var bsLabel = (DATA.products && DATA.products.bundleSavings && DATA.products.bundleSavings.label) || 'Complete-project savings';
        wasEl.innerHTML = '';
        wasEl.appendChild(document.createTextNode(money(preHst)));
        wasEl.appendChild(el('span', 'pv2-total__promo', esc(resolveVars(bsLabel)) + ' − ' + money(bsAmt)));
        wasEl.style.display = '';
        wasEl.classList.add('is-bundle');
      } else if (showTierPromo) {
        var wasHst = round25((Number(t.originalTotal) || 0) * (1 + taxRate()));
        wasEl.innerHTML = '';
        wasEl.appendChild(document.createTextNode(money(wasHst)));
        if (t.promoLabel) {
          wasEl.appendChild(el('span', 'pv2-total__promo', esc(resolveVars(t.promoLabel))));
        }
        wasEl.style.display = '';
        wasEl.classList.remove('is-bundle');
      } else {
        wasEl.style.display = 'none';
        wasEl.classList.remove('is-bundle');
      }
    }

    // Sub line names what the hero figure is.
    var sub = $('#pv2-total-sub');
    if (sub) sub.textContent = financed ? ('with financing, ' + termMo + ' mo') : 'incl. HST';

    // Supporting all-in total, de-emphasized but always honest and visible.
    var moEl = $('#pv2-total-mo');
    if (moEl) {
      if (financed) {
        moEl.textContent = 'or ' + money(totals.display) + ' incl. HST';
        moEl.style.display = '';
      } else {
        moEl.style.display = 'none';
      }
      moEl.classList.toggle('is-bundle', bsActive);
    }

    // Price-lock urgency pill, sourced from the resolved priceLockDate variable.
    var lockEl = $('#pv2-total-lock');
    if (lockEl) {
      var lockDate = ctx.variables && ctx.variables.priceLockDate;
      if (lockDate) {
        lockEl.textContent = 'Price locked until ' + lockDate;
        lockEl.style.display = '';
      } else {
        lockEl.style.display = 'none';
      }
    }

    // Accept block mirrors the same number.
    var aPick = $('#pv2-accept-pick');
    if (aPick) aPick.textContent = pickLabel;
    var aAmt = $('#pv2-accept-amount');
    if (aAmt) {
      aAmt.textContent = financed
        ? money(monthlyFor(totals.display, termMo)) + '/mo'
        : money(totals.display) + ' incl. HST';
    }
    var aTot = $('#pv2-accept-total');
    if (aTot) {
      if (financed) {
        aTot.textContent = 'or ' + money(totals.display) + ' incl. HST, ' + termMo + ' mo';
        aTot.style.display = '';
      } else {
        aTot.style.display = 'none';
      }
    }

    // Complete-project savings line. Shows only when every add-on is on and the
    // proposal carries a bundleSavings rule; hidden (and a no-op) otherwise.
    var aSave = $('#pv2-accept-savings');
    if (aSave) {
      var savings = bundleSavingsAmount();
      if (savings > 0) {
        var bs = (DATA.products && DATA.products.bundleSavings) || {};
        var saveLabel = bs.label || 'Complete-project savings';
        aSave.innerHTML = '';
        aSave.appendChild(el('span', 'pv2-accept__savings-label', esc(resolveVars(saveLabel))));
        aSave.appendChild(el('span', 'pv2-accept__savings-amount', '− ' + money(savings)));
        aSave.style.display = '';
      } else {
        aSave.style.display = 'none';
      }
    }
  }

  // Tier card selection.
  function selectTier(id) {
    state.tierId = id;
    renderTierCards();
    recompute();
    logEvent('tier_selected', { id: id });
  }

  // Path switch in two-path mode. Reset the tier to the path's recommended.
  function selectPath(pathId) {
    state.pathId = pathId;
    var p = DATA.products.twoPath;
    var path = (pathId === 'A') ? p.pathA : p.pathB;
    state.tierId = (path && path.recommended) || (path && path.tiers && path.tiers[0] && path.tiers[0].id) || null;
    // Reset the panel profile to the new path's default (or clear it when the
    // new path has no panel ladder) so the metal toggle tracks the active path.
    var ap = activePanels();
    state.panelSel = ap ? ap.def : null;
    renderProductsBody();
    recompute();
    logEvent('path_selected', { path: pathId });
  }

  // Metal panel profile switch. Re-prices every metal card, the sticky total,
  // and the accept summary. The selected tier stays selected; only its price
  // (and every card's price) follows the new panel.
  function selectPanel(panel) {
    if (state.panelSel === panel) return;
    state.panelSel = panel;
    renderProductsBody();
    recompute();
    logEvent('panel_selected', { panel: panel });
  }

  // Add-on toggle.
  function toggleAddon(slug) {
    if (state.addons.has(slug)) state.addons.delete(slug);
    else state.addons.add(slug);
    renderAddons();
    recompute();
    logEvent('addon_toggled', { slug: slug, on: state.addons.has(slug) });
  }

  // Expandable per-tier cost breakdown: a material list + labor (with margin baked
  // into the labor rates) + fees, mirroring the old SumoQuote format. Reads
  // tier.breakdown = { materials:[{label,detail,amount}], materialsTotal,
  // labor:[...], laborTotal, subtotal, hst, total }. Customer-safe: bundled retail
  // line items only, never hard cost or margin.
  function buildBreakdown(b) {
    var det = el('details', 'pv2-bd');
    det.appendChild(el('summary', 'pv2-bd__toggle', 'See the full breakdown'));
    function group(title, rows, total) {
      if (!rows || !rows.length) return;
      det.appendChild(el('div', 'pv2-bd__group', title));
      rows.forEach(function (r) {
        var row = el('div', 'pv2-bd__row');
        var l = el('div', 'pv2-bd__label');
        l.appendChild(document.createTextNode(resolveVars(r.label || '')));
        if (r.detail) l.appendChild(el('span', 'pv2-bd__detail', esc(resolveVars(r.detail))));
        row.appendChild(l);
        row.appendChild(el('div', 'pv2-bd__amt', money(r.amount)));
        det.appendChild(row);
      });
      if (total != null) {
        var t = el('div', 'pv2-bd__row pv2-bd__row--sub');
        t.appendChild(el('div', 'pv2-bd__label', title + ' subtotal'));
        t.appendChild(el('div', 'pv2-bd__amt', money(total)));
        det.appendChild(t);
      }
    }
    group('Materials', b.materials, b.materialsTotal);
    group('Labour', b.labor, b.laborTotal);
    function tot(label, amt, grand) {
      if (amt == null) return;
      var r = el('div', 'pv2-bd__row' + (grand ? ' pv2-bd__row--grand' : ''));
      r.appendChild(el('div', 'pv2-bd__label', label));
      r.appendChild(el('div', 'pv2-bd__amt', money(amt)));
      det.appendChild(r);
    }
    tot('Subtotal', b.subtotal, false);
    tot('HST (15%)', b.hst, false);
    tot('Total', b.total, true);
    // Stop the toggle click from bubbling to the card's select handler, which
    // re-renders the cards and would snap this dropdown shut (looked dead).
    det.addEventListener('click', function (e) { e.stopPropagation(); });
    det.addEventListener('keydown', function (e) { e.stopPropagation(); });
    return det;
  }

  // Build one tier card. A card may carry variants (the metal European Clay vs
  // Flat Panel toggle); v is the active variant and supplies every displayed
  // field plus the selectable id, so price, monthly, perks and the accept
  // payload all follow the toggle.
  /* Shingle colour chart. The real CertainTeed colour chart image, shown in a
     collapsible section after the packages and expandable to a full-screen HD
     view (the pattern the older proposals used). One chart for the asphalt
     lines; final colour is confirmed at signing. */
  var COLOR_CHART_URL = '/brand/plus-ultra/colors/color-chart.jpg';

  // Lazy full-screen image viewer (built once, reused). Click anywhere to close.
  function openLightbox(src, alt) {
    var lb = $('#pv2-lightbox');
    if (!lb) {
      lb = el('div', 'pv2-lightbox');
      lb.id = 'pv2-lightbox';
      lb.setAttribute('role', 'dialog');
      lb.setAttribute('aria-modal', 'true');
      lb.innerHTML = '<button class="pv2-lightbox__close" type="button" aria-label="Close">&times;</button>' +
        '<img class="pv2-lightbox__img" alt="">';
      lb.addEventListener('click', function () { lb.classList.remove('is-open'); });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') lb.classList.remove('is-open');
      });
      document.body.appendChild(lb);
    }
    var img = lb.querySelector('.pv2-lightbox__img');
    img.src = src; img.alt = alt || '';
    lb.classList.add('is-open');
  }

  function colorChartBlock() {
    var nodes = [];
    nodes.push(sectionHead({
      eyebrow: 'Colours',
      title: 'Pick your shingle colour.',
      lede: 'The full CertainTeed colour range for your shingle. Open the chart for the high-resolution version. Your final colour is confirmed at signing, and physical samples are available on request.'
    }));
    var frame = el('button', 'pv2-colorchart__frame');
    frame.type = 'button';
    frame.setAttribute('aria-label', 'Open the colour chart full size');
    var img = el('img', 'pv2-colorchart__img');
    img.src = COLOR_CHART_URL;
    img.alt = 'CertainTeed shingle colour chart';
    img.loading = 'lazy';
    frame.appendChild(img);
    frame.appendChild(el('span', 'pv2-colorchart__zoom', 'Tap to view full size'));
    frame.addEventListener('click', function () {
      openLightbox(COLOR_CHART_URL, 'CertainTeed shingle colour chart');
    });
    nodes.push(frame);
    var sec = band(nodes, { tint: true });
    sec.classList.add('pv2-colorchart-band');
    return sec;
  }

  function tierCard(t, recommended) {
    var v = effTier(t);
    var card = el('div', 'pv2-tier');
    card.dataset.tier = v.id;
    card.tabIndex = 0;
    card.setAttribute('role', 'button');
    card.setAttribute('aria-pressed', String(v.id === state.tierId));
    if (recommended) card.classList.add('best');
    if (v.id === state.tierId) card.classList.add('is-selected');

    if (recommended) card.appendChild(el('div', 'pv2-ribbon', esc(v.promoLabel || 'Recommended')));

    var check = el('div', 'pv2-tier__check');
    check.setAttribute('aria-hidden', 'true');
    card.appendChild(check);

    if (v.tag) card.appendChild(el('div', 'pv2-tier__grade', esc(resolveVars(v.tag))));

    // Variant toggle pills, panel-style switch inside the one metal card.
    if (t.variants && t.variants.length > 1) {
      var seg = el('div', 'pv2-tier__variants');
      seg.setAttribute('role', 'group');
      seg.setAttribute('aria-label', 'Panel style');
      t.variants.forEach(function (vv) {
        var vb = el('button', 'pv2-tier__varbtn' + (vv.id === v.id ? ' is-on' : ''),
          esc(resolveVars(vv.toggle || vv.name)));
        vb.type = 'button';
        vb.setAttribute('aria-pressed', String(vv.id === v.id));
        vb.addEventListener('click', function (e) {
          e.stopPropagation();
          if (vv.id === v.id) return;
          state.variantSel[t.id] = vv.id;
          // If this card is the current pick, the pick follows the panel style.
          if (state.tierId === v.id) state.tierId = vv.id;
          renderTierCards();
          recompute();
          logEvent('variant_toggled', { card: t.id, id: vv.id });
        });
        vb.addEventListener('keydown', function (e) { e.stopPropagation(); });
        seg.appendChild(vb);
      });
      card.appendChild(seg);
    }

    card.appendChild(el('div', 'pv2-tier__name', esc(resolveVars(v.name))));
    if (v.sub || v.desc) card.appendChild(el('div', 'pv2-tier__sub', esc(resolveVars(v.sub || v.desc))));

    // Price shown incl. HST, rounded to 25, with the pre-tax origin honoured.
    // Metal cards re-price by the active panel profile via tierTotal.
    var preTax = tierTotal(v);
    var incHst = round25(preTax * (1 + taxRate()));

    // When a discount applies, show the struck pre-discount price plus a bronze
    // promo tag above the live price (originalTotal is the pre-tax list price).
    if (v.originalTotal != null && Number(v.originalTotal) > preTax) {
      var wasHst = round25((Number(v.originalTotal) || 0) * (1 + taxRate()));
      var wasRow = el('div', 'pv2-tier__was');
      wasRow.appendChild(document.createTextNode(money(wasHst)));
      if (v.promoLabel) {
        wasRow.appendChild(el('span', 'pv2-tier__promo', esc(resolveVars(v.promoLabel))));
      }
      card.appendChild(wasRow);
    }

    // Provisional metal pricing (e.g. standing-seam supply estimate) shows a star.
    var priceText = money(incHst) + (v.has_estimated_pricing ? ' *' : '');
    card.appendChild(el('div', 'pv2-tier__price', priceText));
    var pnBits = ['incl. HST'];
    if (v.has_estimated_pricing) pnBits.push('* Estimated');
    card.appendChild(el('div', 'pv2-tier__pn', esc(pnBits.join(' · '))));

    // Monthly payment promoted to its own weighted line on the card.
    var fin = DATA.products && DATA.products.financing;
    if (fin && fin.enabled) {
      var moBox = el('div', 'pv2-tier__mo');
      moBox.appendChild(el('div', 'pv2-tier__mo-amt', money(monthlyFor(incHst, fin.termMonths)) + '/mo'));
      moBox.appendChild(el('div', 'pv2-tier__mo-note',
        'with financing, ' + (fin.termMonths || 120) + ' mo'));
      card.appendChild(moBox);
    }

    var perks = v.perks || v.features || [];
    if (perks.length) {
      var ul = el('ul', 'pv2-tier__list');
      perks.forEach(function (perk) {
        ul.appendChild(el('li', null, esc(resolveVars(typeof perk === 'string' ? perk : perk.label))));
      });
      card.appendChild(ul);
    }

    if (v.breakdown && ((v.breakdown.materials && v.breakdown.materials.length) || (v.breakdown.labor && v.breakdown.labor.length))) {
      card.appendChild(buildBreakdown(v.breakdown));
    }

    var pick = el('div', 'pv2-tier__pick');
    var btn = el('button', 'pv2-tier__pickbtn',
      (v.id === state.tierId) ? 'Selected' : 'Choose ' + esc(resolveVars(v.name)));
    btn.type = 'button';
    pick.appendChild(btn);
    card.appendChild(pick);

    // The whole card and its button both select.
    function pick_() { selectTier(v.id); }
    card.addEventListener('click', pick_);
    card.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); pick_(); }
    });
    return card;
  }

  // Render just the tier cards into their grid (cheap re-render on selection).
  function renderTierCards() {
    var grid = $('#pv2-tiers');
    if (!grid) return;
    grid.innerHTML = '';
    var prods = DATA.products || {};
    var recommended = prods.recommended;
    if (prods.mode === 'two_path' && prods.twoPath) {
      var path = (state.pathId === 'A') ? prods.twoPath.pathA : prods.twoPath.pathB;
      recommended = (path && path.recommended) || recommended;
    }
    activeTiers().forEach(function (t) {
      grid.appendChild(tierCard(t, t.id === recommended));
    });
  }

  // Render the add-on toggle list (re-rendered on toggle for the checked state).
  function renderAddons() {
    var host = $('#pv2-addons');
    if (!host) return;
    var addons = getAddons();
    if (!addons.length) { host.innerHTML = ''; return; }
    host.innerHTML = '';
    var box = el('div', 'pv2-addons');
    box.appendChild(el('div', 'pv2-addons__head', 'Optional upgrades while we are already here'));
    addons.forEach(function (a) {
      var on = state.addons.has(a.slug);
      var row = el('div', 'pv2-addon');

      var text = el('div', 'pv2-addon__text');
      text.appendChild(el('div', 'pv2-addon__name', esc(resolveVars(a.label || a.slug))));
      if (a.description) text.appendChild(el('div', 'pv2-addon__desc', esc(resolveVars(a.description))));
      row.appendChild(text);

      row.appendChild(el('div', 'pv2-addon__price', '+ ' + money(Number(a.price) || 0)));

      var sw = el('label', 'pv2-switch');
      var input = el('input');
      input.type = 'checkbox';
      input.checked = on;
      input.setAttribute('aria-label', 'Add ' + (a.label || a.slug));
      sw.appendChild(input);
      sw.appendChild(el('span', 'pv2-switch__track'));
      sw.appendChild(el('span', 'pv2-switch__thumb'));
      input.addEventListener('change', function () { toggleAddon(a.slug); });
      row.appendChild(sw);

      box.appendChild(row);
    });
    host.appendChild(box);
  }

  // The system switcher for two-path mode: a centered segmented control
  // (e.g. Asphalt Shingles | Metal Roof) above the tier grid.
  function pathSwitcher() {
    var p = DATA.products.twoPath;
    var wrap = el('div', 'pv2-paths');
    wrap.setAttribute('role', 'group');
    wrap.setAttribute('aria-label', 'Roof system');

    [['A', p.pathA], ['B', p.pathB]].forEach(function (pair) {
      var id = pair[0], path = pair[1];
      if (!path) return;
      var on = (state.pathId === id);
      var btn = el('button', 'pv2-paths__btn' + (on ? ' is-on' : ''),
        esc(resolveVars(path.label || ('Option ' + id))));
      btn.type = 'button';
      btn.setAttribute('aria-pressed', String(on));
      btn.addEventListener('click', function () {
        if (state.pathId !== id) selectPath(id);
      });
      wrap.appendChild(btn);
    });
    return wrap;
  }

  // The metal panel-profile selector: a centered segmented control rendered
  // ABOVE the Standard / Enhanced / Premium cards on the metal path. Switching
  // it re-prices all three cards live. Returns null when the active ladder is
  // not metal (so non-metal ladders never show it).
  function panelSelector() {
    var ap = activePanels();
    if (!ap) return null;
    if (state.panelSel == null) state.panelSel = ap.def;
    var wrap = el('div', 'pv2-panels');
    wrap.setAttribute('role', 'group');
    wrap.setAttribute('aria-label', 'Metal panel profile');
    wrap.appendChild(el('div', 'pv2-panels__label', 'Panel profile'));
    var seg = el('div', 'pv2-panels__seg');
    ap.panels.forEach(function (panel) {
      var on = (state.panelSel === panel);
      var btn = el('button', 'pv2-panels__btn' + (on ? ' is-on' : ''),
        esc(PANEL_LABELS[panel] || panel));
      btn.type = 'button';
      btn.setAttribute('aria-pressed', String(on));
      btn.addEventListener('click', function () { selectPanel(panel); });
      seg.appendChild(btn);
    });
    wrap.appendChild(seg);
    return wrap;
  }

  // Render the body of the products section for the current mode and path.
  function renderProductsBody() {
    var host = $('#pv2-products-body');
    if (!host) return;
    host.innerHTML = '';
    var prods = DATA.products || {};
    var mode = prods.mode || 'single';

    // Initialise selection defaults the first time through.
    if (state.tierId == null) {
      if (mode === 'two_path' && prods.twoPath) {
        if (state.pathId == null) state.pathId = (prods.twoPath.defaultPath === 'A') ? 'A' : 'B';
        var path = (state.pathId === 'A') ? prods.twoPath.pathA : prods.twoPath.pathB;
        state.tierId = (path && path.recommended) || (path && path.tiers && path.tiers[0] && path.tiers[0].id) || null;
      } else {
        var list = prods.tiers || [];
        state.tierId = prods.recommended || (list[0] && list[0].id) || null;
      }
    }

    if (mode === 'gutters' || mode === 'repair') {
      host.appendChild(singlePriceView());
      // No tier grid for single-price modes; the total bar still totals.
      return;
    }

    if (mode === 'two_path' && prods.twoPath) {
      host.appendChild(pathSwitcher());
    }

    if (mode === 'configurator') {
      host.appendChild(configuratorView());
    }

    // Metal panel-profile selector, rendered above the tier cards on a metal
    // ladder. Re-prices all three grade cards live when switched.
    var panelSel = panelSelector();
    if (panelSel) host.appendChild(panelSel);

    // Photoreal preview of the roof in the active panel profile, above the
    // cards. Null (and so absent) on every non-metal ladder.
    var panelImg = panelImage();
    if (panelImg) host.appendChild(panelImg);

    // Selectable tier grid for single / good_better_best / two_path / configurator.
    var grid = $('#pv2-tiers');
    if (!grid) {
      grid = el('div', 'pv2-tiers');
      grid.id = 'pv2-tiers';
      host.appendChild(grid);
    }
    renderTierCards();

    // Add-ons host.
    var addonsHost = el('div');
    addonsHost.id = 'pv2-addons';
    host.appendChild(addonsHost);
    renderAddons();
  }

  /* ---- signature capture (ported, framework-free) ------------------------- */
  var signatureData = null;
  function initSignature() {
    var canvas = $('#pv2-sig-canvas');
    if (!canvas) return;
    var pen = canvas.getContext('2d');
    function resize() {
      var rect = canvas.getBoundingClientRect();
      var dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      pen.setTransform(dpr, 0, 0, dpr, 0, 0);
      pen.strokeStyle = '#13294b';
      pen.lineWidth = 2;
      pen.lineCap = 'round';
      pen.lineJoin = 'round';
    }
    resize();
    window.addEventListener('resize', resize);

    var drawing = false, hasDrawn = false;
    function pos(e) {
      var rect = canvas.getBoundingClientRect();
      var t = e.touches ? e.touches[0] : e;
      return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }
    function start(e) {
      e.preventDefault(); drawing = true;
      var p = pos(e); pen.beginPath(); pen.moveTo(p.x, p.y);
      var sig = $('#pv2-sig'); if (sig) sig.classList.remove('is-bad');
    }
    function move(e) {
      if (!drawing) return; e.preventDefault();
      var p = pos(e); pen.lineTo(p.x, p.y); pen.stroke(); hasDrawn = true;
    }
    function done() {
      if (!drawing) return; drawing = false;
      if (hasDrawn) {
        signatureData = canvas.toDataURL('image/png');
        var sig = $('#pv2-sig'); if (sig) sig.classList.add('is-signed');
      }
    }
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', done);
    canvas.addEventListener('mouseleave', done);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', done);
  }
  function clearSignature() {
    var canvas = $('#pv2-sig-canvas');
    if (!canvas) return;
    var pen = canvas.getContext('2d');
    pen.clearRect(0, 0, canvas.width, canvas.height);
    signatureData = null;
    var sig = $('#pv2-sig');
    if (sig) sig.classList.remove('is-signed');
  }

  /* ---- accept flow -------------------------------------------------------- */
  var accepted = false;
  function acceptProposal() {
    if (accepted) return;
    if (!signatureData) {
      var sig = $('#pv2-sig');
      if (sig) {
        sig.classList.add('is-bad');
        sig.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      return;
    }
    var totals = computeTotals();
    var t = totals.tier;
    accepted = true;

    var addonsList = selectedAddonsList();
    var fin = DATA.products && DATA.products.financing;
    var payload = {
      refId: DATA.meta && DATA.meta.refId,
      estimateId: DATA.meta && DATA.meta.estimateId,
      instanceSlug: DATA.meta && DATA.meta.instanceSlug,
      tierId: t ? t.id : null,
      // tier.total is the panel-aware pre-tax base actually charged (the metal
      // panel toggle changes it); panel records which profile was chosen.
      tier: t ? { id: t.id, name: t.name, sub: t.sub, total: tierTotal(t) } : null,
      pathId: state.pathId,
      panel: (t && t.panelPrices) ? state.panelSel : null,
      addons: addonsList,
      addonsSubtotal: addonsSubtotal(),
      bundleSavings: bundleSavingsAmount(),
      baseTotal: totals.base,
      totalWithTax: totals.display,
      financing: fin && fin.enabled
        ? { termMonths: fin.termMonths, monthly: Math.round(monthlyFor(totals.display, fin.termMonths)) }
        : null,
      signature: signatureData,
      acceptedAt: new Date().toISOString()
    };

    fetch('/api/proposal-v2-accept', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(function () {});
    logEvent('proposal_accepted', { tier: payload.tierId, total: totals.display });

    var btn = $('#pv2-accept-btn');
    if (btn) {
      btn.disabled = true;
      btn.textContent = 'Accepted';
    }

    var pickLabel = t ? (t.name + (t.sub ? ' · ' + t.sub : '')) : '';
    var mPick = $('#pv2-modal-pick');
    if (mPick) mPick.textContent = 'You chose ' + pickLabel + '.';
    var mAmt = $('#pv2-modal-amt');
    if (mAmt) mAmt.textContent = money(totals.display) + ' incl. HST';
    var rep = (ctx.rep && ctx.rep.name) ? firstName(ctx.rep.name) : 'Your rep';
    var mRep = $('#pv2-modal-rep');
    if (mRep) mRep.textContent = rep + ' will reach out within 24 hours to schedule your job and send the deposit invoice.';
    var modal = $('#pv2-modal');
    if (modal) {
      setTimeout(function () { modal.classList.add('is-open'); }, 250);
      modal.addEventListener('click', function (e) {
        if (e.target === modal) modal.classList.remove('is-open');
      });
    }
  }

  /* --------------------------------------------------------------------------
     EVENT LOGGING (fire and forget)
     -------------------------------------------------------------------------- */
  function logEvent(type, data) {
    try {
      fetch('/api/proposal-events', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          refId: DATA && DATA.meta && DATA.meta.refId,
          estimateId: DATA && DATA.meta && DATA.meta.estimateId,
          instanceSlug: DATA && DATA.meta && DATA.meta.instanceSlug,
          type: type,
          payload: data,
          at: new Date().toISOString()
        })
      }).catch(function () {});
    } catch (e) { /* never block the UI on telemetry */ }
  }

  /* --------------------------------------------------------------------------
     SECTION REGISTRY + RENDER LOOP
     -------------------------------------------------------------------------- */
  var SECTION_COMPONENTS = {
    hero: hero,
    intro: intro,
    inspection: inspection,
    scope: scope,
    products: products,
    proof: proof,
    portfolio: portfolio,
    reviews: reviews,
    why_us: why_us,
    guarantee: guarantee,
    comparison: comparison,
    accept: accept
  };

  function mount(node) {
    if (node) $('#pv2-root').appendChild(node);
  }

  function renderAll() {
    var root = $('#pv2-root');
    root.innerHTML = '';

    var sections = Array.isArray(DATA.sections) ? DATA.sections : [];
    var videoMounted = false, galleryMounted = false, chartMounted = false;
    function mountVideoOnce() { if (videoMounted) return; videoMounted = true; mount(explainerVideoBlock()); }
    function mountGalleryOnce() { if (galleryMounted) return; galleryMounted = true; mount(projectGalleryBlock()); }
    function mountChartOnce() { if (chartMounted) return; chartMounted = true; mount(colorChartBlock()); }

    sections.forEach(function (s) {
      if (!s || !s.type) return;
      // Explainer video sits right before the packages; the colour chart right
      // after them; the photo gallery right before the accept block.
      if (s.type === 'products') mountVideoOnce();
      if (s.type === 'accept') mountGalleryOnce();
      var comp = SECTION_COMPONENTS[s.type];
      if (typeof comp !== 'function') {
        // Unknown block type. Skip safely so one bad section never blanks
        // the whole proposal.
        console.warn('[proposal-v2] unknown section type, skipped:', s.type);
        return;
      }
      try {
        mount(comp(s.content || {}, ctx));
      } catch (err) {
        console.error('[proposal-v2] failed to render section:', s.type, err);
      }
      if (s.type === 'products') mountChartOnce();
    });

    // If the data carried products but no products section was listed, append
    // one so pricing is never lost (the offer is sections plus products).
    if (DATA.products && !sections.some(function (s) { return s.type === 'products'; })) {
      mountVideoOnce();
      mount(products({}, ctx));
      mountChartOnce();
    }
    if (DATA.products && !sections.some(function (s) { return s.type === 'accept'; })) {
      mountGalleryOnce();
      mount(accept({}, ctx));
    }
  }

  /* --------------------------------------------------------------------------
     BOOT  ::  read the URL, fetch ProposalData, build ctx, render.
     -------------------------------------------------------------------------- */
  function buildCtx() {
    var b = DATA.branding || {};
    var r = DATA.rep || {};
    var cust = DATA.customer || {};
    ctx = {
      branding: {
        companyName: b.companyName || 'Plus Ultra Roofing',
        phone: b.phone || '',
        email: b.email || '',
        website: b.website || '',
        logoUrl: b.logoUrl || '',
        accentColor: b.accentColor || '',
        tagline: b.tagline || ''
      },
      rep: {
        name: r.name || '', title: r.title || '', initials: r.initials || '',
        phone: r.phone || '', email: r.email || '', photo: r.photo || '', bio: r.bio || ''
      },
      customer: {
        name: cust.name || '', address: cust.address || '',
        phone: cust.phone || '', email: cust.email || '', coverImage: cust.coverImage || ''
      },
      variables: DATA.variables || {},
      resolveVars: resolveVars
    };

    // Honour a per-tenant accent if supplied, without breaking the Jewels base.
    // The proposal locks the approved bronze premium accent (the north-star look)
    // for the Best tier + the lock-in CTA. Tenant accentColor is intentionally NOT
    // mapped onto --bronze so the premium aesthetic stays consistent.

    // A precise, personal page title.
    document.title = (ctx.customer.name ? ctx.customer.name + ' | ' : '') +
      (ctx.branding.companyName || 'Your Roofing Proposal');
  }

  function showError(msg) {
    var root = $('#pv2-root');
    root.innerHTML = '';
    var boot = el('div', 'pv2-boot');
    boot.innerHTML = '<div><div style="font-family:Fraunces,serif;font-size:22px;color:#13294b;margin-bottom:8px">' +
      'We could not load this proposal.</div><div>' + esc(msg) +
      '</div><div style="margin-top:14px">Please call us and we will sort it out right away.</div></div>';
    root.appendChild(boot);
  }

  function renderData(data, opts) {
    DATA = data || {};
    if (!DATA.sections && !DATA.products) {
      throw new Error('This proposal has no content yet.');
    }
    buildCtx();
    renderAll();
    mountPdfButton();
    if (!(opts && opts.silent)) logEvent('proposal_viewed', {});
  }

  // The always-on PDF affordance. Opens the server-rendered, properly paginated
  // PDF (api/proposal-v2-pdf.js) so sections never split across a page, instead
  // of the browser print dialog which screenshots whatever is on screen.
  function mountPdfButton() {
    var params = new URLSearchParams(location.search);
    if (params.get('pdf') === '1') return;   // server PDF render: no floating button
    if ($('.pv2-pdfbtn')) return;
    var slug = (DATA && DATA.meta && DATA.meta.instanceSlug) || params.get('instance') || '';
    if (!slug) {
      var m = location.pathname.match(/^\/p\/([^\/?#]+)\/?$/);
      if (m) slug = decodeURIComponent(m[1]);
    }
    if (!slug) return;   // no resolvable slug, nothing to render server-side
    var btn = el('button', 'pv2-pdfbtn');
    btn.type = 'button';
    btn.setAttribute('aria-label', 'Save this proposal as a PDF');
    btn.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"></path><polyline points="7 10 12 15 17 10"></polyline><path d="M5 21h14"></path></svg>Save as PDF';
    btn.addEventListener('click', function () {
      logEvent('pdf_save', {});
      // Download the PDF rather than open it in a tab. A PDF tab can't carry a
      // favicon, so the browser would show the site's cached default icon; the
      // download avoids that entirely and matches the "Save as PDF" label.
      var a = document.createElement('a');
      a.href = '/api/proposal-v2-pdf?slug=' + encodeURIComponent(slug);
      a.download = '';
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      a.remove();
    });
    document.body.appendChild(btn);
  }

  function boot() {
    var params = new URLSearchParams(location.search);

    // Builder preview mode: do not fetch. Wait for the parent window (the block
    // builder) to post the assembled ProposalData on every edit, render in place.
    if (params.get('preview') === '1') {
      window.addEventListener('message', function (e) {
        var m = e && e.data;
        if (m && m.type === 'pv2-preview' && m.data) {
          try { renderData(m.data, { silent: true }); } catch (err) { showError(err.message); }
        }
      });
      try { if (window.parent) window.parent.postMessage({ type: 'pv2-preview-ready' }, '*'); } catch (e) {}
      return;
    }

    var qs = new URLSearchParams();
    var instance = params.get('instance');
    var estimate = params.get('estimate');
    var template = params.get('template');
    // /p/<slug> is served via a Vercel rewrite, so the browser keeps the path and
    // location.search is empty. Fall back to the slug (or share token) in the path.
    if (!instance && !estimate) {
      var pathMatch = location.pathname.match(/^\/p\/([^\/?#]+)\/?$/);
      if (pathMatch) instance = decodeURIComponent(pathMatch[1]);
    }
    if (instance) qs.set('instance', instance);
    if (estimate) qs.set('estimate', estimate);
    if (template) qs.set('template', template);
    // Carry a share token through if present (read-only viewing).
    if (params.get('share')) qs.set('share', params.get('share'));

    var url = '/api/proposal-v2' + (qs.toString() ? '?' + qs.toString() : '');

    fetch(url, { headers: { 'Accept': 'application/json' } })
      .then(function (res) {
        if (!res.ok) throw new Error('Request failed (' + res.status + ')');
        return res.json();
      })
      .then(function (data) { renderData(data, { silent: params.get('pdf') === '1' }); })
      .catch(function (err) {
        console.error('[proposal-v2] boot failed:', err);
        showError(err && err.message ? err.message : 'Unknown error.');
      });
  }

  // Expose a tiny surface for debugging and any inline handlers that survive.
  window.PV2 = {
    get data() { return DATA; },
    get state() { return state; },
    recompute: recompute,
    selectTier: selectTier,
    toggleAddon: toggleAddon
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
