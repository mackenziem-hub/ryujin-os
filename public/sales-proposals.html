<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Proposals</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow-x:hidden;position:relative;min-height:100vh}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(34,211,238,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(124,58,237,0.08) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(34,211,238,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}

.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(34,211,238,0.22);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#22d3ee,#7c3aed,transparent);opacity:0.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(200,240,255,0.3),rgba(34,211,238,0.22) 40%,rgba(5,15,30,0.8));box-shadow:0 0 14px rgba(34,211,238,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #fff;border-radius:10px;color:#030611;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none;transition:all 0.2s}
.btn-back:hover{background:rgba(255,255,255,0.85);box-shadow:0 0 14px rgba(255,255,255,0.35)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.btn-new{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;background:linear-gradient(135deg,rgba(34,211,238,0.22),rgba(124,58,237,0.14));border:1px solid rgba(34,211,238,0.5);border-radius:10px;color:#22d3ee;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none;transition:all 0.2s}
.btn-new:hover{background:linear-gradient(135deg,rgba(34,211,238,0.35),rgba(124,58,237,0.2));box-shadow:0 0 20px rgba(34,211,238,0.3)}
.btn-new svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.stage{position:relative;z-index:5;padding:80px 28px 60px;max-width:1180px;margin:0 auto}

.hero{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.hero-left .eyebrow{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:#22d3ee;letter-spacing:3px;margin-bottom:6px}
.hero-left h1{font-family:'Orbitron',sans-serif;font-size:2em;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{padding:14px 18px;background:rgba(14,22,40,0.55);border:1px solid rgba(34,211,238,0.14);border-radius:12px}
.stat .lbl{font-family:'Share Tech Mono',monospace;font-size:0.66em;color:rgba(200,220,255,0.5);letter-spacing:1.5px;text-transform:uppercase}
.stat .val{font-family:'Orbitron',sans-serif;font-size:1.5em;font-weight:900;color:#22d3ee;margin-top:4px}
@media (max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}}

.search{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search input{flex:1;min-width:220px;padding:11px 14px;background:rgba(6,10,20,0.55);border:1px solid rgba(34,211,238,0.18);border-radius:10px;color:#e0e6f0;font-family:'Inter',sans-serif;font-size:0.94em;outline:none;transition:all 0.2s}
.search input:focus{border-color:rgba(34,211,238,0.5);box-shadow:0 0 14px rgba(34,211,238,0.18)}
.search select{padding:11px 14px;background:rgba(6,10,20,0.55);border:1px solid rgba(34,211,238,0.18);border-radius:10px;color:#e0e6f0;font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1px;cursor:pointer;outline:none}

.list{display:flex;flex-direction:column;gap:8px}
.row{display:grid;grid-template-columns:2fr 110px 120px 100px 130px;align-items:center;gap:14px;padding:14px 18px;background:rgba(14,22,40,0.55);border:1px solid rgba(34,211,238,0.12);border-radius:12px;transition:all 0.2s;text-decoration:none;color:inherit}
.row:hover{border-color:rgba(34,211,238,0.4);background:rgba(14,22,40,0.75);transform:translateX(3px)}
.row.head{background:transparent;border-color:transparent;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.66em;letter-spacing:2px;text-transform:uppercase;cursor:default;padding:8px 18px;margin-bottom:-4px}
.row.head:hover{transform:none;border-color:transparent}
.row .client-name{font-weight:700;font-size:1em;margin-bottom:2px}
.row .client-meta{font-family:'Share Tech Mono',monospace;font-size:0.66em;color:rgba(200,220,255,0.5);letter-spacing:1px}
.row .date{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(200,220,255,0.7);letter-spacing:0.5px}
.row .val{font-family:'Orbitron',sans-serif;font-weight:800;color:#22d3ee;font-size:1em}
.row .open-arrow{justify-self:end;color:rgba(34,211,238,0.5);transition:all 0.2s}
.row:hover .open-arrow{color:#22d3ee;transform:translateX(4px)}
.row .open-arrow svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.badge{display:inline-block;padding:3px 9px;font-family:'Share Tech Mono',monospace;font-size:0.62em;font-weight:700;letter-spacing:1.5px;border-radius:5px}
@media (max-width:760px){
  .row{grid-template-columns:1fr auto;gap:8px}
  .row > div:nth-child(3), .row > div:nth-child(4){display:none}
  .row.head{display:none}
}

.empty{text-align:center;padding:60px 20px;color:rgba(200,220,255,0.5);font-size:0.95em;line-height:1.6}
.empty a{color:#22d3ee;text-decoration:none;font-weight:700}
.loading{text-align:center;padding:40px;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1.5px}
</style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="btn-back" href="sales.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> BACK</a>
  <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· PROPOSALS</span></div></div>
  <div class="tb-spacer"></div>
  <a class="btn-new" href="sales-proposal.html?skip=1">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    NEW PROPOSAL
  </a>
</div>

<div class="stage">
  <div class="hero">
    <div class="hero-left">
      <div class="eyebrow">SALES · EVERY PROPOSAL</div>
      <h1>All Proposals</h1>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="lbl">Total</div><div class="val" id="sTotal">—</div></div>
    <div class="stat"><div class="lbl">Drafts</div><div class="val" id="sDrafts">—</div></div>
    <div class="stat"><div class="lbl">Accepted</div><div class="val" id="sAccepted">—</div></div>
    <div class="stat"><div class="lbl">Pipeline Value</div><div class="val" id="sPipe">—</div></div>
  </div>

  <div class="search">
    <input id="searchIn" type="text" placeholder="Search by client name, address, or ref..." oninput="applyFilter()"/>
    <select id="sortIn" onchange="applyFilter()">
      <option value="new">Newest first</option>
      <option value="old">Oldest first</option>
      <option value="client">Client A→Z</option>
      <option value="value">Highest value</option>
    </select>
    <select id="filterIn" onchange="applyFilter()">
      <option value="all">All statuses</option>
      <option value="draft">Drafts</option>
      <option value="sent">Sent</option>
      <option value="accepted">Accepted</option>
    </select>
  </div>

  <div class="list" id="listHost">
    <div class="loading">LOADING PROPOSALS...</div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = n => n ? '$' + Math.round(n/1000) + 'K' : '—';

const STATUS_COLORS = {
  draft: { color: '#94a3b8', bg: 'rgba(148,163,184,0.14)' },
  sent: { color: '#22d3ee', bg: 'rgba(34,211,238,0.14)' },
  accepted: { color: '#4ade80', bg: 'rgba(74,222,128,0.14)' },
  signed: { color: '#4ade80', bg: 'rgba(74,222,128,0.14)' },
  rejected: { color: '#f87171', bg: 'rgba(248,113,113,0.14)' },
  cancelled: { color: '#f87171', bg: 'rgba(248,113,113,0.14)' }
};

function statusBadge(status){
  const s = String(status || 'draft').toLowerCase();
  const m = STATUS_COLORS[s] || STATUS_COLORS.draft;
  return `<span class="badge" style="background:${m.bg};color:${m.color};border:1px solid ${m.color}33">${s.toUpperCase()}</span>`;
}

function relDate(iso){
  if (!iso) return '—';
  const d = new Date(iso);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.round(diff/60) + 'm ago';
  if (diff < 86400) return Math.round(diff/3600) + 'h ago';
  if (diff < 604800) return Math.round(diff/86400) + 'd ago';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

let CACHED = [];
let LOADED = false;

async function loadAll(){
  try {
    const r = await fetch('/api/estimates?limit=200', { headers: { 'x-tenant-id': 'plus-ultra' } });
    if (!r.ok) { $('listHost').innerHTML = '<div class="empty">Could not load proposals. HTTP ' + r.status + '.<br><br>Try refreshing.</div>'; return; }
    const { estimates } = await r.json();
    if (!Array.isArray(estimates)) { $('listHost').innerHTML = '<div class="empty">Unexpected response from server.</div>'; return; }

    CACHED = estimates.map(e => {
      const pkgs = e.calculated_packages || {};
      let topVal = 0;
      for (const k in pkgs) { const t = (pkgs[k] || {}).total || 0; if (t > topVal) topVal = t; }
      const selVal = (pkgs[e.selected_package] || {}).total || topVal;
      const c = e.customer || {};
      return {
        at: e.updated_at || e.created_at,
        client: c.full_name || '(no name)',
        address: [c.address, c.city].filter(Boolean).join(', '),
        refId: 'PU-' + (e.estimate_number || (e.id || '').slice(0,8).toUpperCase()),
        status: e.status || 'draft',
        value: selVal,
        url: '/proposal-client.html?share=' + encodeURIComponent(e.share_token || '')
      };
    });
    LOADED = true;
    renderStats(CACHED);
    applyFilter();
  } catch(e) {
    $('listHost').innerHTML = '<div class="empty">Error loading proposals: ' + esc(e.message) + '</div>';
  }
}

function renderStats(list){
  $('sTotal').textContent = list.length;
  $('sDrafts').textContent = list.filter(p => p.status.toLowerCase() === 'draft').length;
  $('sAccepted').textContent = list.filter(p => /accepted|signed/i.test(p.status)).length;
  const pipe = list.filter(p => !/accepted|signed|rejected|cancelled/i.test(p.status))
                   .reduce((s,p) => s + (p.value || 0), 0);
  $('sPipe').textContent = pipe ? money(pipe) : '—';
}

function renderList(list){
  const host = $('listHost');
  if (!list.length) {
    if (!LOADED) { host.innerHTML = '<div class="loading">LOADING PROPOSALS...</div>'; return; }
    host.innerHTML = '<div class="empty">No proposals match.<br><br><a href="sales-proposal.html?skip=1">Create one →</a></div>';
    return;
  }
  const head = `<div class="row head"><div>CLIENT</div><div>STATUS</div><div>UPDATED</div><div>VALUE</div><div></div></div>`;
  const rows = list.map(p => `
    <a href="${esc(p.url)}" target="_blank" class="row">
      <div>
        <div class="client-name">${esc(p.client)}</div>
        <div class="client-meta">${esc(p.refId)}${p.address ? ' · ' + esc(p.address) : ''}</div>
      </div>
      <div>${statusBadge(p.status)}</div>
      <div class="date">${esc(relDate(p.at))}</div>
      <div class="val">${money(p.value)}</div>
      <div class="open-arrow"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
    </a>
  `).join('');
  host.innerHTML = head + rows;
}

function applyFilter(){
  const q = ($('searchIn').value || '').toLowerCase();
  const status = $('filterIn').value;
  const sort = $('sortIn').value;
  let list = CACHED.slice();
  if (status !== 'all') list = list.filter(p => new RegExp(status, 'i').test(p.status));
  if (q) list = list.filter(p => ((p.client||'') + ' ' + (p.refId||'') + ' ' + (p.address||'')).toLowerCase().includes(q));
  if (sort === 'old') list.sort((a,b) => new Date(a.at) - new Date(b.at));
  else if (sort === 'client') list.sort((a,b) => (a.client||'').localeCompare(b.client||''));
  else if (sort === 'value') list.sort((a,b) => (b.value||0) - (a.value||0));
  else list.sort((a,b) => new Date(b.at) - new Date(a.at));
  renderList(list);
}

function goBack(){
  if (window.parent !== window && window.parent.exitSectionOverlay) { window.parent.exitSectionOverlay(); return; }
  window.location.href = 'sales.html';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); goBack(); } });

loadAll();
</script>

<script src="assets/ryujin-mode.js"></script>
<script src="assets/ryujin-tenant.js"></script>
<script src="assets/ryujin-persist.js"></script>

</body>
</html>
