<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060a14">
<title>Dispatch · Ryujin OS</title>
<script>
  (function () {
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) &&
      !window.matchMedia('(min-width: 1024px)').matches;
    if (isMobile) location.replace('/portal-mobile.html');
  })();
</script>
<link rel="icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a14;--card:rgba(20,30,50,0.85);
  --border:rgba(34,211,238,0.16);--border-hi:rgba(34,211,238,0.35);
  --text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);
  --cyan:#22d3ee;--orange:#fb923c;--green:#4ade80;--yellow:#facc15;--red:#f87171;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;padding:32px}
.wrap{max-width:1500px;margin:0 auto}
.crumb{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
h1{font-family:'Orbitron',monospace;font-size:1.5em;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,#e0e6f0 20%,var(--cyan) 65%,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.sub{font-size:0.9em;color:var(--text-dim);margin-bottom:20px;line-height:1.5}
.sub b{color:var(--text)}
.back{display:inline-block;margin-bottom:18px;font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-dim);text-decoration:none;border:1px solid var(--border);padding:8px 16px;border-radius:18px}
.back:hover{color:var(--cyan);border-color:var(--border-hi)}

.toolbar{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.toolbar .stat{font-family:'Share Tech Mono',monospace;font-size:0.78em;letter-spacing:1px;color:var(--text-dim);background:rgba(8,12,24,0.6);border:1px solid var(--border);padding:7px 12px;border-radius:14px}
.toolbar .stat b{color:var(--cyan)}

.board{display:grid;grid-template-columns:repeat(7,minmax(180px,1fr));gap:10px;overflow-x:auto;padding-bottom:8px}
.col{
  background:rgba(11,17,32,0.7);border:1px solid var(--border);border-radius:14px;
  padding:12px 12px 14px;min-width:180px;
  display:flex;flex-direction:column;gap:8px;
}
.col.today{border-color:rgba(34,211,238,0.35);box-shadow:0 0 16px rgba(34,211,238,0.12)}
.col-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.col-day{font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.5px;color:var(--text);text-transform:uppercase}
.col-date{font-family:'Share Tech Mono',monospace;font-size:0.78em;color:var(--cyan)}
.col-count{font-family:'Share Tech Mono',monospace;font-size:0.65em;color:var(--text-muted);letter-spacing:1px}

.job{
  background:rgba(20,30,50,0.7);border:1px solid var(--border);border-radius:10px;
  padding:9px 11px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;
}
.job:hover{border-color:var(--border-hi);transform:translateY(-1px)}
.job::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.job.install::before{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.job.service::before{background:var(--orange);box-shadow:0 0 6px var(--orange)}
.job.service.urgent::before{background:var(--red);box-shadow:0 0 8px var(--red)}
.job.service.high::before{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}

.job-type{font-family:'Share Tech Mono',monospace;font-size:0.6em;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:3px}
.job.install .job-type{color:var(--cyan)}
.job.service .job-type{color:var(--orange)}
.job-customer{font-size:0.92em;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:3px;word-wrap:break-word}
.job-detail{font-size:0.76em;color:var(--text-dim);line-height:1.35;word-wrap:break-word}
.job-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;font-family:'Share Tech Mono',monospace;font-size:0.65em;letter-spacing:0.8px;color:var(--text-muted)}
.job-meta .chip{background:rgba(8,12,24,0.5);border:1px solid var(--border);padding:2px 7px;border-radius:8px}

.empty-day{font-size:0.78em;color:var(--text-muted);text-align:center;padding:14px 4px;font-style:italic}
.refresh-meta{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-muted);text-align:right;margin-top:18px;letter-spacing:1px}
</style>
<script src="/assets/portal-auth-client.js"></script>
</head>
<body>

<div class="wrap">

  <a class="back" href="/admin-overview.html">← Overview</a>

  <div class="crumb">Admin · Dispatch</div>
  <h1>Dispatch Board</h1>
  <p class="sub">Next 7 days of scheduled installs + service visits. <b>Cyan</b> = install (estimate scheduled). <b>Orange</b> = service ticket. <b>Red/yellow stripe</b> = urgent/high priority.</p>

  <div class="toolbar">
    <span class="stat"><b id="totInstalls">—</b> installs</span>
    <span class="stat"><b id="totService">—</b> service visits</span>
    <span class="stat">Window <b>7 days</b></span>
  </div>

  <div class="board" id="board">
    <div class="col"><div class="empty-day">Loading…</div></div>
  </div>

  <div class="refresh-meta" id="refreshMeta">—</div>

</div>

<script>
const TENANT = 'plus-ultra';
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmt$(n){if (n == null || n === '') return ''; const x = Number(n); if (!Number.isFinite(x)) return ''; return '$' + Math.round(x).toLocaleString()}

const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

async function load(){
  const tok = localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token');
  if (!tok) { document.getElementById('board').innerHTML = '<div class="col"><div class="empty-day">Sign in required.</div></div>'; return; }
  try{
    const r = await fetch('/api/schedule?days=7', {
      headers: { 'Authorization': `Bearer ${tok}`, 'x-tenant-id': TENANT },
    });
    if (r.status === 403) { document.getElementById('board').innerHTML = '<div class="col"><div class="empty-day">Admin access required.</div></div>'; return; }
    if (!r.ok) { document.getElementById('board').innerHTML = `<div class="col"><div class="empty-day">Couldn't load (HTTP ${r.status}).</div></div>`; return; }
    const data = await r.json();
    document.getElementById('totInstalls').textContent = data.total_installs;
    document.getElementById('totService').textContent = data.total_service;
    render(data.days || []);
    document.getElementById('refreshMeta').textContent = `Last refreshed ${new Date(data.generated_at).toLocaleTimeString()} · auto-refresh 2 min`;
  }catch(e){
    document.getElementById('board').innerHTML = `<div class="col"><div class="empty-day">Network error: ${esc(e.message)}</div></div>`;
  }
}

function render(days){
  if (!days.length) { document.getElementById('board').innerHTML = '<div class="col"><div class="empty-day">No days returned.</div></div>'; return; }
  const todayIso = new Date().toISOString().slice(0,10);
  const html = days.map(d => {
    const date = new Date(d.date + 'T00:00:00');
    const dayName = DAY_NAMES[date.getDay()];
    const dayDate = `${date.getMonth() + 1}/${date.getDate()}`;
    const isToday = d.date === todayIso;
    const count = (d.installs?.length || 0) + (d.service?.length || 0);
    const installs = (d.installs || []).map(j => `
      <div class="job install" onclick="openInstall('${esc(j.id)}')">
        <div class="job-type">Install · ${esc(j.ref)}</div>
        <div class="job-customer">${esc(j.label)}</div>
        ${j.address ? `<div class="job-detail">${esc(j.address)}</div>` : ''}
        <div class="job-meta">
          ${j.state ? `<span class="chip">${esc(j.state)}</span>` : ''}
          ${j.value ? `<span class="chip">${fmt$(j.value)}</span>` : ''}
          ${j.end_date ? `<span class="chip">→ ${esc(j.end_date.slice(5))}</span>` : ''}
        </div>
      </div>`).join('');
    const service = (d.service || []).map(j => `
      <div class="job service ${esc(j.priority)}" onclick="openTicket('${esc(j.id)}')">
        <div class="job-type">Service · ${j.priority === 'urgent' ? '⚠ URGENT' : j.priority === 'high' ? '⚠ HIGH' : esc(j.status || 'open')}</div>
        <div class="job-customer">${esc(j.label)}</div>
        <div class="job-detail">${esc(j.title || '')}</div>
        <div class="job-meta">
          ${j.time ? `<span class="chip">${esc(j.time)}</span>` : ''}
          ${j.phone ? `<span class="chip">${esc(j.phone)}</span>` : ''}
        </div>
      </div>`).join('');
    const body = (installs || service)
      ? `${installs}${service}`
      : `<div class="empty-day">no jobs</div>`;
    return `
      <div class="col ${isToday ? 'today' : ''}">
        <div class="col-head">
          <div><div class="col-day">${dayName}</div><div class="col-date">${dayDate}</div></div>
          <div class="col-count">${count}</div>
        </div>
        ${body}
      </div>`;
  }).join('');
  document.getElementById('board').innerHTML = html;
}

function openInstall(id){ window.location.href = `/admin.html#estimates`; }
function openTicket(id){ window.location.href = `/service-tickets.html?id=${encodeURIComponent(id)}`; }

load();
setInterval(load, 2 * 60 * 1000);
</script>

</body>
</html>
