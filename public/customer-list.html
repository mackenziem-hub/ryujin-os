<style>
:root{/* P6 batch-4 migration: repointed to canonical Telltale layer. Mode A. */--bg:var(--rj-bg-2);--glass:var(--rj-glass);--glass2:var(--rj-surface-2);--glass-border:var(--rj-line);--glass-border-hi:var(--rj-line-strong);--text:var(--rj-ink);--text-dim:var(--rj-ink-mid);--text-muted:var(--rj-ink-dim);--cyan:var(--rj-accent);--blue:var(--rj-accent);--purple:#7c3aed;--green:var(--rj-ok);--yellow:var(--rj-warn);--red:var(--rj-danger);--orange:#fb923c;--gold:var(--rj-warn);--radius:var(--rj-radius);--sidebar-w:72px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;overflow-x:hidden}
.sidebar{width:var(--sidebar-w);background:rgba(8,12,24,0.98);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;bottom:0;z-index:50}
.sidebar-logo{width:44px;height:44px;margin:18px 0 12px;border-radius:12px;background:url('/assets/logo/logo-glow.jpg') center/cover;box-shadow:0 0 20px rgba(74,158,255,0.3);cursor:pointer}
.sidebar-divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;margin:4px 0 8px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid transparent;color:var(--text-dim);text-decoration:none;transition:all 0.25s;position:relative}
.nav-icon:hover{background:rgba(74,158,255,0.06);color:var(--text)}
.nav-icon.active{background:linear-gradient(135deg,rgba(74,158,255,0.12),rgba(124,58,237,0.06));color:var(--cyan);border-color:rgba(74,158,255,0.2)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:3px;background:var(--cyan);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--cyan)}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.main{margin-left:var(--sidebar-w);padding:18px 22px 60px;max-width:1500px}
.hq-header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.hq-title .crumb{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hq-title h1{font-family:'Orbitron',monospace;font-size:1.7em;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,#e0e6f0 20%,var(--cyan) 70%,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hq-title .sub{font-size:0.85em;color:var(--text-dim);margin-top:6px}
.btn{font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:8px 16px;border-radius:18px;cursor:pointer;border:1px solid var(--glass-border);background:transparent;color:var(--text-dim);transition:all 0.2s}
.btn:hover{color:var(--text);border-color:var(--glass-border-hi)}
.btn.primary{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#0a0e1a;border:none;box-shadow:0 0 12px rgba(74,158,255,0.3)}

.search-bar{display:flex;gap:10px;align-items:center;margin-bottom:14px;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:10px 12px;position:relative;overflow:hidden}
.search-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan) 50%,transparent);opacity:0.4}
.search-input{flex:1;background:rgba(6,10,20,0.5);border:1px solid var(--glass-border);color:var(--text);padding:9px 14px;border-radius:18px;font-size:0.9em;font-family:inherit;outline:none}
.search-input::placeholder{color:var(--text-muted)}
.search-input:focus{border-color:var(--glass-border-hi)}

.section-head{display:flex;align-items:baseline;gap:10px;margin:18px 0 10px;font-family:'Orbitron',monospace}
.section-head h2{font-size:0.78em;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.section-head .count-pill{font-size:0.65em;font-family:'Share Tech Mono',monospace;padding:2px 8px;border-radius:10px;background:rgba(74,158,255,0.1);border:1px solid var(--glass-border);color:var(--cyan)}

.cust-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px}
.cust-row{position:relative;display:flex;flex-direction:column;gap:8px;background:rgba(14,22,40,0.92);border:1px solid var(--glass-border);border-radius:14px;padding:14px 16px;cursor:pointer;transition:transform 0.15s,border-color 0.15s,box-shadow 0.15s;backdrop-filter:blur(8px)}
.cust-row:hover{border-color:var(--glass-border-hi);transform:translateY(-2px);box-shadow:0 0 18px rgba(74,158,255,0.12)}
.cust-field .flabel{font-family:'Share Tech Mono',monospace;font-size:0.58em;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-muted);margin-bottom:1px}
.cust-field .fval{font-size:0.82em;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cust-name-card{font-weight:700;font-size:1em;color:var(--text);padding-right:78px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cust-est-badge{position:absolute;top:12px;right:14px;font-family:'Share Tech Mono',monospace;font-size:0.62em;letter-spacing:0.8px;padding:3px 9px;border-radius:999px;background:rgba(74,158,255,0.12);border:1px solid rgba(74,158,255,0.35);color:var(--cyan);white-space:nowrap}
.cust-foot{display:flex;justify-content:space-between;align-items:center;margin-top:4px;gap:8px}
.cust-ltv{font-family:'Orbitron',monospace;font-size:0.88em;font-weight:700;color:var(--gold);white-space:nowrap}
.cust-status{font-family:'Share Tech Mono',monospace;font-size:0.6em;letter-spacing:1px;text-transform:uppercase;padding:2px 9px;border-radius:999px}
.cust-status.active{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.25)}
.cust-status.repeat{background:rgba(124,58,237,0.12);color:#a78bfa;border:1px solid rgba(124,58,237,0.3)}
.cust-status.dormant{background:rgba(140,170,220,0.08);color:var(--text-dim);border:1px solid var(--glass-border)}

.filter-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.fchip{font-family:'Share Tech Mono',monospace;font-size:0.7em;letter-spacing:1px;text-transform:uppercase;padding:5px 13px;border-radius:999px;border:1px solid var(--glass-border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all 0.15s}
.fchip.active{border-color:var(--cyan);color:var(--cyan);background:rgba(74,158,255,0.08)}
.cust-est{font-family:'Share Tech Mono',monospace;font-size:0.68em;color:var(--text-dim);white-space:nowrap}
.cust-est b{color:var(--cyan);font-weight:600}
.empty-state{text-align:center;padding:30px 16px;color:var(--text-dim);border:1px dashed var(--glass-border);border-radius:var(--radius);font-size:0.85em}
.empty-state .ico{font-size:1.8em;margin-bottom:6px;opacity:0.5}
.skeleton{background:linear-gradient(90deg,var(--glass) 0%,var(--glass2) 50%,var(--glass) 100%);background-size:200% 100%;animation:sk 1.4s infinite;border:1px solid var(--glass-border);border-radius:var(--radius);height:64px;margin-bottom:6px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);font-size:0.8em;margin-bottom:14px}
.banner.warn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:var(--orange)}

@media(max-width:768px){.main{padding:12px}.hq-title h1{font-size:1.3em}.cust-list{grid-template-columns:1fr}}
@media(max-width:430px){.toolbar,.filter-row,.search-row,.controls,.hq-header{flex-wrap:wrap;gap:8px}.toolbar > *,.filter-row > *,.controls > *{min-width:0}.btn,button{max-width:100%}}
</style>

<body>

<aside class="sidebar">
  <a href="/admin.html" class="sidebar-logo" title="Admin Home"></a>
  <div class="sidebar-divider"></div>

    <a href="/marketing.html" class="nav-icon" title="Marketing"><svg viewBox="0 0 24 24"><path d="M3 11l18-9v18l-18-9zM7 13v6"/></svg></a>
    <a href="/sales.html" class="nav-icon" title="Sales"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9a4 4 0 100 8h6a4 4 0 110 8H6"/></svg></a>

    <a href="/admin.html" class="nav-icon" title="Full Admin"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></a>
  </nav>
</aside>

<main class="main">

  <div class="hq-header">
    <div class="hq-title">
      <div class="crumb">Customer · List</div>
      <h1>Client Navigator</h1>
      <div class="sub">Searchable. Sorted by lifetime value. Click a row to open the profile (jobs, payments, communications, callbacks).</div>
    </div>
    <a class="btn primary" href="/customer.html">← Customer</a>
  </div>

  <div id="banner-slot"></div>

  <div class="search-bar">
    <input class="search-input" id="searchInput" placeholder="Search by name, email, address, phone…" />
    <button class="btn" id="btnSort">Sort: LTV ↓</button>
  </div>

  <div class="filter-chips" id="filterChips">
    <button class="fchip active" data-f="all">All</button>
    <button class="fchip" data-f="open">Open Estimate</button>
    <button class="fchip" data-f="signed">Signed</button>
    <button class="fchip" data-f="repeat">Repeat</button>
    <button class="fchip" data-f="dormant">Dormant</button>
    <button class="fchip" data-f="none">No Estimate</button>
  </div>

  <div class="section-head"><h2>Customers</h2><span class="count-pill" id="custCount">—</span></div>
  <div class="cust-list" id="custList"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>

</main>

<script>
const TENANT = window.RYUJIN_TENANT_SLUG;
let cache = []; let sortMode = 'ltv'; let searchTerm = ''; let filterMode = 'all';
// Terminal load failure: the error owns the page. Filters and search go
// inert so a chip tap cannot repaint the lying "No customers match" over the
// real story (Walk 2 item 1).
let loadFailed = false;
function setLoadFailed(v) {
  loadFailed = v;
  const chips = document.getElementById('filterChips');
  if (chips) { chips.style.opacity = v ? '0.35' : ''; chips.style.pointerEvents = v ? 'none' : ''; }
  const search = document.getElementById('searchInput');
  if (search) search.disabled = v;
  if (v) document.getElementById('custCount').textContent = '—';
}
// Won/lost predicates mirror lib/customerLtvCalc.js (signing = acceptance;
// won estimates keep moving through scheduled/in_progress/complete).
const WON_STATUSES = ['signed','accepted','scheduled','in_progress','complete','won'];
const LOST_STATES = ['closed_lost','lost','rejected'];
function isWonEst(e) { return e.state === 'closed_won' || WON_STATUSES.includes(String(e.status || '').toLowerCase()); }
function isLostEst(e) { return e.state === 'closed_lost' || LOST_STATES.includes(String(e.status || '').toLowerCase()); }
// QA personas (Cat-test patterns + example.com seeds) pollute the roster;
// same filter class the snapshot applies server-side.
function isTestRow(c) {
  if (/\b(test|livetest)\b/i.test(String(c.full_name || ''))) return true;
  const email = String(c.email || '').toLowerCase();
  return email.endsWith('@example.com') || email.includes('catherinezeta');
}
function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtMoney(n) { if (n == null || isNaN(n)) return '—'; return '$' + Math.round(n).toLocaleString(); }
function showBanner(msg, isHtml=false) { const slot = document.getElementById('banner-slot'); if (isHtml) slot.innerHTML = `<div class="banner warn">${msg}</div>`; else slot.innerHTML = `<div class="banner warn">${escapeHtml(msg)}</div>`; }

function renderList(list) {
  // Error owns the page (Walk 2 item 1): after a terminal load failure the
  // filter chips must not repaint the body with a lying "No customers match"
  // over the real story.
  if (loadFailed) return;
  document.getElementById('custCount').textContent = list.length;
  const el = document.getElementById('custList');
  if (list.length === 0) { el.innerHTML = `<div class="empty-state"><div class="ico">◇</div>No customers match the search.</div>`; return; }
  el.innerHTML = list.map(c => {
    const status = c.job_count > 1 ? 'repeat' : c.last_job_at && (Date.now() - new Date(c.last_job_at).getTime() < 365 * 86400000) ? 'active' : 'dormant';
    return `
      <div class="cust-row" data-id="${c.id}">
        ${c.est_count ? `<div class="cust-est-badge">${c.est_count} Estimate${c.est_count===1?'':'s'}</div>` : ''}
        <div class="cust-field"><div class="flabel">Customer Name</div><div class="cust-name-card">${escapeHtml(c.full_name || 'unnamed')}</div></div>
        <div class="cust-field"><div class="flabel">Street Address</div><div class="fval">${escapeHtml(c.address || '—')}</div></div>
        <div class="cust-field"><div class="flabel">Phone Number</div><div class="fval">${escapeHtml(c.phone || '—')}</div></div>
        <div class="cust-field"><div class="flabel">Email</div><div class="fval">${escapeHtml(c.email || '—')}</div></div>
        <div class="cust-foot">
          <div class="cust-ltv">${fmtMoney(c.lifetime_value)}</div>
          <div class="cust-status ${status}">${status}</div>
        </div>
      </div>`;
  }).join('');
  el.querySelectorAll('.cust-row').forEach(row => row.addEventListener('click', () => window.location.href = `/customer-profile.html?id=${row.dataset.id}`));
}

function matchesFilter(c) {
  if (filterMode === 'all') return true;
  if (filterMode === 'open') return c.open_est_count > 0;
  if (filterMode === 'signed') return c.signed_est_count > 0;
  if (filterMode === 'none') return !c.est_count;
  if (filterMode === 'repeat') return c.job_count > 1;
  if (filterMode === 'dormant') return !(c.job_count > 1) && !(c.last_job_at && (Date.now() - new Date(c.last_job_at).getTime() < 365 * 86400000));
  return true;
}

function applyFiltersSort() {
  const term = searchTerm.toLowerCase().trim();
  let list = cache.filter(matchesFilter);
  if (term) list = list.filter(c => `${c.full_name || ''} ${c.email || ''} ${c.phone || ''} ${c.address || ''}`.toLowerCase().includes(term));
  if (sortMode === 'ltv') list.sort((a, b) => (b.lifetime_value || 0) - (a.lifetime_value || 0));
  else if (sortMode === 'name') list.sort((a, b) => (a.full_name || '').localeCompare(b.full_name || ''));
  else if (sortMode === 'recent') list.sort((a, b) => new Date(b.last_job_at || 0) - new Date(a.last_job_at || 0));
  renderList(list);
}

async function load() {
  // 10s timeout so a hung API leaves an error state, not skeletons forever.
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 10000);
  try {
    // Roster from the session-gated customers API; lifetime value from
    // /api/customer-state (computed server-side via lib/customerLtvCalc.js).
    // No page-side money math: the API computes, this page renders.
    const [cs, st, es] = await Promise.all([
      fetch('/api/customers?limit=500', { headers: { 'x-tenant-id': TENANT, ...window.RyujinAuth.headers() }, signal: ctrl.signal }),
      fetch('/api/customer-state', { headers: { 'x-tenant-id': TENANT, ...window.RyujinAuth.headers() }, signal: ctrl.signal }),
      fetch('/api/estimates?limit=500', { headers: { 'x-tenant-id': TENANT, ...window.RyujinAuth.headers() }, signal: ctrl.signal }).catch(() => null)
    ]);
    if (!cs.ok) {
      setLoadFailed(true);
      if (cs.status === 401 && window.RyujinAuth && window.RyujinAuth.sessionEnded) {
        // Shared signed-out partial: plain words + the door back in.
        window.RyujinAuth.sessionEnded(document.getElementById('custList'));
        document.getElementById('banner-slot').innerHTML = '';
      } else {
        showBanner(`Could not load customers (server said ${cs.status}). Refresh to retry.`);
        document.getElementById('custList').innerHTML = `<div class="empty-state"><div class="ico">⚠</div>Could not load customers. Refresh to retry.</div>`;
      }
      return;
    }
    setLoadFailed(false);
    const cData = await cs.json();
    const customers = cData.customers || cData.data || [];
    const valueByCustomer = {};
    if (st.ok) {
      const sData = await st.json();
      for (const v of sData.customer_values || []) valueByCustomer[v.id] = v;
    } else {
      showBanner(`Lifetime values unavailable (HTTP ${st.status}) - showing the roster without LTV.`);
    }
    const estByCustomer = {};
    if (es && es.ok) {
      const eData = await es.json();
      for (const e of (eData.estimates || eData.data || [])) {
        if (!e.customer_id) continue;
        const bucket = estByCustomer[e.customer_id] = estByCustomer[e.customer_id] || { total: 0, open: 0, signed: 0 };
        bucket.total++;
        if (isWonEst(e)) bucket.signed++;
        else if (!isLostEst(e)) bucket.open++;
      }
    }
    cache = (customers || []).filter(c => !isTestRow(c)).map(c => ({
      ...c,
      lifetime_value: valueByCustomer[c.id]?.lifetime_value || 0,
      job_count: valueByCustomer[c.id]?.job_count || 0,
      last_job_at: valueByCustomer[c.id]?.last_job_at || null,
      est_count: estByCustomer[c.id]?.total || 0,
      open_est_count: estByCustomer[c.id]?.open || 0,
      signed_est_count: estByCustomer[c.id]?.signed || 0
    }));
    if (st.ok) document.getElementById('banner-slot').innerHTML = '';
    applyFiltersSort();
  } catch (e) {
    setLoadFailed(true);
    const msg = e.name === 'AbortError' ? 'Request timed out after 10s' : `Network: ${e.message}`;
    showBanner(msg);
    document.getElementById('custList').innerHTML = `<div class="empty-state"><div class="ico">⚠</div>${escapeHtml(msg)}</div>`;
  } finally {
    clearTimeout(timer);
  }
}

document.getElementById('searchInput').addEventListener('input', e => { searchTerm = e.target.value; applyFiltersSort(); });
document.querySelectorAll('#filterChips .fchip').forEach(btn => btn.addEventListener('click', () => {
  filterMode = btn.dataset.f;
  document.querySelectorAll('#filterChips .fchip').forEach(b => b.classList.toggle('active', b === btn));
  applyFiltersSort();
}));
document.getElementById('btnSort').addEventListener('click', () => {
  const modes = ['ltv','name','recent'];
  const labels = { ltv: 'Sort: LTV ↓', name: 'Sort: A-Z', recent: 'Sort: Recent' };
  sortMode = modes[(modes.indexOf(sortMode) + 1) % modes.length];
  document.getElementById('btnSort').textContent = labels[sortMode];
  applyFiltersSort();
});

load();
</script>
</body>
