<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow-x:hidden;min-height:100vh}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(251,146,60,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(34,211,238,0.08) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(251,146,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(251,146,60,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}

.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(251,146,60,0.24);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#fb923c,#22d3ee,transparent);opacity:0.55}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #fff;border-radius:10px;color:#030611;font-family:'Inter',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none;transition:all 0.2s}
.btn-back:hover{background:rgba(255,255,255,0.85);box-shadow:0 0 14px rgba(255,255,255,0.35)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.3),rgba(251,146,60,0.22) 40%,rgba(30,10,5,0.8));box-shadow:0 0 14px rgba(251,146,60,0.35)}
.brand-name{font-family:'Inter',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}
.tb-controls{display:flex;gap:6px;align-items:center}
.tb-btn{padding:6px 12px;background:rgba(34,211,238,0.12);border:1px solid rgba(34,211,238,0.35);border-radius:8px;color:#22d3ee;font-family:'JetBrains Mono',monospace;font-size:0.66em;letter-spacing:1.2px;cursor:pointer;text-decoration:none}
.tb-btn:hover{background:rgba(34,211,238,0.22)}

.stage{position:relative;z-index:5;padding:80px 28px 60px;max-width:1280px;margin:0 auto}

/* Hero banner (always visible) */
.hero-job{background:linear-gradient(135deg,rgba(14,22,40,0.85),rgba(20,10,6,0.75));border:1px solid rgba(251,146,60,0.25);border-radius:18px;padding:24px 28px;margin-bottom:18px;position:relative;overflow:hidden}
.hero-job::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#fb923c,#22d3ee,transparent);opacity:0.7}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.hero-left .eyebrow{font-family:'JetBrains Mono',monospace;font-size:0.7em;color:#fb923c;letter-spacing:3px;margin-bottom:6px}
.hero-left h1{font-family:'Inter',sans-serif;font-size:2em;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.hero-left .addr{font-family:'JetBrains Mono',monospace;font-size:0.86em;color:rgba(200,220,255,0.72);letter-spacing:1px}
.hero-contact{text-align:right;font-size:0.85em;color:rgba(200,220,255,0.7);line-height:1.6;font-family:'JetBrains Mono',monospace;letter-spacing:0.5px}
.hero-contact a{color:#22d3ee;text-decoration:none}
.hero-contact a:hover{color:#67e8f9}
.hero-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;padding-top:14px;border-top:1px solid rgba(251,146,60,0.12)}
.hero-stat{display:flex;flex-direction:column;gap:2px}
.hero-stat .lbl{font-family:'JetBrains Mono',monospace;font-size:0.64em;color:rgba(200,220,255,0.5);letter-spacing:1.5px;text-transform:uppercase}
.hero-stat .val{font-family:'Inter',sans-serif;font-size:1em;font-weight:800;color:#fb923c}

/* Accordion sections */
details.acc{background:rgba(14,22,40,0.55);border:1px solid rgba(251,146,60,0.14);border-radius:14px;overflow:hidden;margin-bottom:12px}
details.acc[open]{border-color:rgba(251,146,60,0.28)}
details.acc>summary{list-style:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:rgba(6,10,20,0.55);border-bottom:1px solid rgba(251,146,60,0.1);transition:background 0.15s}
details.acc>summary::-webkit-details-marker{display:none}
details.acc>summary:hover{background:rgba(6,10,20,0.78)}
details.acc>summary .title{font-family:'Inter',sans-serif;font-size:0.8em;font-weight:800;letter-spacing:2px;color:#fb923c;display:flex;align-items:center;gap:8px}
details.acc>summary .title svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
details.acc>summary .meta{font-family:'JetBrains Mono',monospace;font-size:0.68em;color:rgba(200,220,255,0.55);letter-spacing:1.2px;display:flex;align-items:center;gap:10px}
details.acc>summary .meta a{color:#22d3ee;text-decoration:none}
details.acc>summary .chev{width:14px;height:14px;stroke:#fb923c;fill:none;stroke-width:2.4;transition:transform 0.2s;margin-left:6px}
details.acc[open]>summary .chev{transform:rotate(90deg)}
.acc-body{padding:16px 18px}
.empty-sec{padding:28px 18px;text-align:center;color:rgba(200,220,255,0.35);font-family:'JetBrains Mono',monospace;font-size:0.72em;letter-spacing:1.5px}

.badge{display:inline-block;padding:3px 9px;font-family:'JetBrains Mono',monospace;font-size:0.62em;font-weight:700;letter-spacing:1.5px;border-radius:5px}
.b-draft{background:rgba(148,163,184,0.14);color:#94a3b8;border:1px solid rgba(148,163,184,0.3)}
.b-issued{background:rgba(251,146,60,0.14);color:#fb923c;border:1px solid rgba(251,146,60,0.35)}
.b-active{background:rgba(34,211,238,0.14);color:#22d3ee;border:1px solid rgba(34,211,238,0.35)}
.b-done{background:rgba(74,222,128,0.14);color:#4ade80;border:1px solid rgba(74,222,128,0.35)}

/* Scope */
.scope-list{list-style:none;padding:0;margin-top:10px}
.scope-list li{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:0.88em}
.scope-list li .chk{width:14px;height:14px;border-radius:4px;display:flex;align-items:center;justify-content:center;background:rgba(74,222,128,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.35);flex-shrink:0}
.scope-list li .chk svg{width:9px;height:9px;stroke:currentColor;fill:none;stroke-width:3}
.scope-list li.off{color:rgba(200,220,255,0.35);text-decoration:line-through}
.scope-list li.off .chk{background:rgba(200,220,255,0.05);color:rgba(200,220,255,0.3);border-color:rgba(200,220,255,0.15)}

/* Gallery (PR-B replaces with interactive tiles) */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.ptile{aspect-ratio:4/3;border-radius:10px;background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.14);transition:border-color 0.15s;position:relative;z-index:1}
.ptile:hover{border-color:#fb923c}
.ptile:has(.pmenu.on){z-index:20}
.ptile .pthumb{position:absolute;inset:0;cursor:pointer;border-radius:10px;overflow:hidden}
.ptile .pthumb img,.ptile .pthumb video{width:100%;height:100%;object-fit:cover;display:block}
.ptile .badges{position:absolute;top:6px;left:6px;display:flex;gap:4px;flex-wrap:wrap;pointer-events:none}
.ptile .bd{padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:0.6em;font-weight:700;letter-spacing:1.2px;border:1px solid;background:rgba(0,0,0,0.65)}
.ptile .bd.cover{color:#22d3ee;border-color:rgba(34,211,238,0.5)}
.ptile .bd.before{color:#fb923c;border-color:rgba(251,146,60,0.5)}
.ptile .bd.after{color:#4ade80;border-color:rgba(74,222,128,0.5)}
.ptile .bd.video{color:#a78bfa;border-color:rgba(167,139,250,0.5)}
.ptile .menu-btn{position:absolute;top:6px;right:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.65);border:1px solid rgba(251,146,60,0.3);border-radius:6px;color:#fb923c;cursor:pointer;font-family:'Inter',system-ui,sans-serif;font-size:1em;line-height:1;padding:0;z-index:2;font-weight:700}
.ptile .menu-btn:hover{background:rgba(251,146,60,0.18);border-color:#fb923c}
.ptile .pmenu{position:absolute;top:38px;right:6px;background:rgba(14,22,40,0.96);border:1px solid rgba(251,146,60,0.32);border-radius:8px;padding:4px;min-width:160px;z-index:5;display:none;backdrop-filter:blur(10px);box-shadow:0 8px 20px rgba(0,0,0,0.5)}
.ptile .pmenu.on{display:block}
.ptile .pmenu button{display:block;width:100%;text-align:left;padding:7px 10px;background:transparent;border:none;color:#e0e6f0;font-family:'JetBrains Mono',monospace;font-size:0.68em;letter-spacing:1px;cursor:pointer;border-radius:5px}
.ptile .pmenu button:hover{background:rgba(251,146,60,0.14);color:#fb923c}
.ptile .pmenu button.danger{color:#f87171}
.ptile .pmenu button.disabled{opacity:0.4;cursor:not-allowed}
.ptile .pmenu button.disabled:hover{background:transparent;color:rgba(200,220,255,0.5)}
.ptile .pmenu button.danger:hover{background:rgba(248,113,113,0.14);color:#fca5a5}
.ptile .pcap{position:absolute;bottom:0;left:0;right:0;padding:5px 8px;font-family:'JetBrains Mono',monospace;font-size:0.62em;color:#fff;background:rgba(0,0,0,0.78);letter-spacing:0.5px;outline:none;cursor:text}
.ptile .pcap:focus{background:rgba(251,146,60,0.22);color:#fff}
.gallery-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
.gallery-actions .count{font-family:'JetBrains Mono',monospace;font-size:0.7em;color:rgba(200,220,255,0.55);letter-spacing:1.2px;margin-left:auto}
/* Multi-select / bulk delete */
.ptile .psel{position:absolute;top:7px;right:7px;width:22px;height:22px;z-index:7;cursor:pointer;display:none;accent-color:#f87171;margin:0}
.gallery.selecting .ptile .psel{display:block}
.gallery.selecting .ptile .menu-btn{display:none}
.gallery.selecting .ptile .pthumb,.gallery.selecting .ptile{cursor:pointer}
.ptile.selected{border-color:#f87171;box-shadow:0 0 0 2px rgba(248,113,113,0.55)}
.gallery-bulk{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px;padding:8px 10px;border:1px solid rgba(248,113,113,0.3);border-radius:9px;background:rgba(248,113,113,0.06)}
.gallery-bulk .count{margin:0}
.act.danger{background:rgba(248,113,113,0.14);color:#f87171;border-color:rgba(248,113,113,0.4)}
.act.danger:hover{background:rgba(248,113,113,0.25);box-shadow:0 0 12px rgba(248,113,113,0.3)}
.act.danger:disabled{cursor:not-allowed;opacity:0.45;box-shadow:none}

/* Info rows */
.info-row{display:grid;grid-template-columns:130px 1fr;gap:12px;padding:6px 0;font-size:0.88em;align-items:baseline}
.info-row .label{font-family:'JetBrains Mono',monospace;font-size:0.7em;color:rgba(200,220,255,0.5);letter-spacing:1.2px;text-transform:uppercase}
.info-row .value{color:#e0e6f0}

/* Editable inline controls */
.field-edit{padding:5px 10px;border-radius:6px;background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.28);color:#e0e6f0;font-family:'Inter',system-ui,sans-serif;font-size:0.92em;outline:none;width:100%;max-width:340px;transition:border-color 0.15s}
.field-edit:hover,.field-edit:focus{border-color:#fb923c}
select.field-edit{cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:0.78em;letter-spacing:1px;text-transform:uppercase}
textarea.field-edit{font-family:'Inter',system-ui,sans-serif;font-size:0.88em;text-transform:none;letter-spacing:0;min-height:60px;resize:vertical;max-width:none}

/* Action buttons */
.actions-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.act{padding:7px 14px;border-radius:9px;font-family:'Inter',sans-serif;font-size:0.66em;font-weight:700;letter-spacing:1.5px;text-decoration:none;border:1px solid;cursor:pointer;transition:all 0.2s}
.act.primary{background:rgba(251,146,60,0.14);color:#fb923c;border-color:rgba(251,146,60,0.4)}
.act.primary:hover{background:rgba(251,146,60,0.25);box-shadow:0 0 12px rgba(251,146,60,0.3)}
.act.ghost{background:rgba(6,10,20,0.6);color:rgba(200,220,255,0.7);border-color:rgba(251,146,60,0.18)}
.act.ghost:hover{color:#fb923c;border-color:#fb923c}
.act.cyan{background:rgba(34,211,238,0.12);color:#22d3ee;border-color:rgba(34,211,238,0.35)}
.act.cyan:hover{background:rgba(34,211,238,0.22)}
.joblog-entry{padding:11px 0;border-bottom:1px solid rgba(251,146,60,0.07)}
.joblog-entry:last-child{border-bottom:none}
.joblog-entry-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.joblog-meta{font-family:'JetBrains Mono',monospace;font-size:0.62em;color:rgba(200,220,255,0.4);letter-spacing:1px}
.joblog-entry-body{font-size:0.88em;color:rgba(200,220,255,0.82);line-height:1.5}
.joblog-input{background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.18);color:#e0e6f0;border-radius:9px;padding:8px 11px;font-family:inherit;font-size:0.85em}
.joblog-input:focus{outline:none;border-color:#fb923c}
.joblog-composer select.joblog-input{cursor:pointer}
.co-entry{padding:12px 0;border-bottom:1px solid rgba(251,146,60,0.07)}
.co-entry:last-child{border-bottom:none}
.co-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.co-reason{font-size:0.9em;color:rgba(200,220,255,0.85);margin:2px 0 6px}
.co-side{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:0.82em;color:rgba(200,220,255,0.8);margin:3px 0}
.co-side .who{font-family:'JetBrains Mono',monospace;font-size:0.66em;letter-spacing:1px;color:rgba(200,220,255,0.45);min-width:70px}
.co-new>summary{cursor:pointer;font-family:'Inter',sans-serif;font-size:0.64em;font-weight:700;letter-spacing:1.5px;color:#fb923c;list-style:none;padding:10px 0 4px}
.co-new>summary::-webkit-details-marker{display:none}
.co-form{display:flex;flex-direction:column;gap:8px;border-top:1px solid rgba(251,146,60,0.12);padding-top:12px;margin-top:2px}
.co-form .row2{display:flex;gap:8px;flex-wrap:wrap}
.co-form .row2 .joblog-input{flex:1;min-width:130px}
.thread{display:flex;flex-direction:column;gap:10px;max-height:340px;overflow-y:auto;padding-right:4px}
.tmsg{display:flex;flex-direction:column;gap:2px;max-width:88%}
.tmsg.mine{align-self:flex-end;align-items:flex-end}
.tmsg .tmeta{font-family:'JetBrains Mono',monospace;font-size:0.6em;letter-spacing:1px;color:rgba(200,220,255,0.45)}
.tmsg .tbody{background:rgba(6,10,20,0.5);border:1px solid rgba(251,146,60,0.12);border-radius:10px;padding:9px 12px;font-size:0.9em;color:rgba(200,220,255,0.88);line-height:1.5;white-space:pre-wrap;word-break:break-word}
.tmsg.mine .tbody{background:rgba(34,211,238,0.10);border-color:rgba(34,211,238,0.28)}
.thread-composer{display:flex;gap:8px;align-items:flex-end;margin-top:12px;border-top:1px solid rgba(251,146,60,0.12);padding-top:12px}
.thread-composer textarea{flex:1;min-height:42px;max-height:120px;resize:vertical;background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.18);color:#e0e6f0;border-radius:9px;padding:9px 11px;font-family:inherit;font-size:0.88em}
.thread-composer textarea:focus{outline:none;border-color:#fb923c}

.status-pick{padding:5px 10px;border-radius:6px;background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.28);color:#e0e6f0;font-family:'JetBrains Mono',monospace;font-size:0.68em;letter-spacing:1.2px;cursor:pointer;outline:none;text-transform:uppercase;margin-left:8px}
.status-pick:hover{border-color:#fb923c}
.status-pick:focus{border-color:#fb923c}
.saved-flash{display:inline-block;margin-left:8px;padding:2px 8px;background:rgba(74,222,128,0.14);border:1px solid rgba(74,222,128,0.4);color:#4ade80;font-family:'JetBrains Mono',monospace;font-size:0.62em;font-weight:700;letter-spacing:1.2px;border-radius:4px;opacity:0;transition:opacity 0.3s}
.saved-flash.on{opacity:1}

.loading{text-align:center;padding:80px;color:rgba(200,220,255,0.55);font-family:'JetBrains Mono',monospace;font-size:0.8em;letter-spacing:1.5px}

.acc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:0}
@media (min-width:1024px){.acc-grid{grid-template-columns:1fr 1fr;column-gap:14px}}
</style>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = n => n ? '$' + Number(n).toLocaleString('en-CA',{maximumFractionDigits:0}) : '-';
const DASH = '-';
const TENANT = window.RYUJIN_TENANT_SLUG;

// el() DOM builder. Use instead of template-string innerHTML when emitting
// user-controlled content as live DOM (prevents XSS from data fields).
function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null || v === false) continue;
    if (k === 'class') node.className = v;
    else if (k === 'dataset') Object.assign(node.dataset, v);
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2).toLowerCase(), v);
    else node.setAttribute(k, String(v));
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (Array.isArray(c)) c.forEach(x => node.appendChild(typeof x === 'string' ? document.createTextNode(x) : x));
    else node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return node;
}

// Common authed-fetch helper
function ah() {
  return { 'x-tenant-id': TENANT, ...(window.RyujinAuth ? window.RyujinAuth.headers() : {}) };

// Who's viewing. Privileged (owner/admin/manager) see the production-admin escape

// Unified save-on-change handler. Validates safe-field allow-list server-side.
async function saveField(table, id, field, value, flashId) {
  if (!id) return;
  const r = await fetch('/api/' + table, {
    method: 'PUT',
    headers: { ...ah(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, [field]: value }),
  });
  if (!r.ok) {
    const msg = await r.text().catch(() => '');
    alert(table + ' update failed: HTTP ' + r.status + (msg ? ' ' + msg.slice(0, 120) : ''));
    return null;
  }
  if (flashId) flashSaved(flashId);
  return r.json().catch(() => null);
}

function flashSaved(id){
  const node = document.getElementById(id);
  if (!node) return;
  node.classList.add('on');
  setTimeout(() => node.classList.remove('on'), 1500);
}

}

async function loadJob(){
  const params = new URLSearchParams(location.search);
  const custId = params.get('id') || params.get('customer_id');
  const estShare = params.get('share');
  const woParam = (params.get('wo') || '').replace(/^\s*wo\s*#?\s*/i, '').trim() || null;

  if (!custId && !estShare && !woParam) {
    await renderJobPicker();
    return;
  }

  const headers = ah();

  try {
    let customer = null;
    let resolvedWo = null; // the WO a ?wo deep-link resolved to, carried into render
    if (custId) {
      const r = await fetch('/api/customers?id=' + encodeURIComponent(custId), { headers });
      if (r.ok) customer = await r.json();
    }

    // ?wo= resolution: prefer workorder.customer_id, fall back to
    // linked_estimate_id -> estimate.customer_id walk.
    if (!customer && woParam) {
      // Direct lookup so a ?wo deep-link resolves no matter how many work orders
      // exist (a page-limited scan dropped upcoming rows past the limit). ?wo
      // accepts the workorder UUID (internal links) or the visible WO number
      // (field "Up next" + AI open_folder deep-links).
      const isUuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(woParam);
      const wR0 = await fetch('/api/workorders?' + (isUuid ? 'id=' : 'wo_number=') + encodeURIComponent(woParam), { headers });
      const matchWo = wR0.ok ? await wR0.json() : null;
      resolvedWo = matchWo;
      let resolvedCustomerId = matchWo?.customer_id || null;
      if (!resolvedCustomerId && matchWo?.linked_estimate_id) {
        const eR = await fetch('/api/estimates?id=' + encodeURIComponent(matchWo.linked_estimate_id), { headers });
        if (eR.ok) {
          const est = await eR.json();
          resolvedCustomerId = est?.customer_id || est?.estimate?.customer_id || null;
        }
      }
      if (resolvedCustomerId) {
        const rC = await fetch('/api/customers?id=' + encodeURIComponent(resolvedCustomerId), { headers });
        if (rC.ok) customer = await rC.json();
      }
    }

    const er = await fetch('/api/estimates?limit=200', { headers });
    const allEstimates = er.ok ? (await er.json()).estimates || [] : [];
    let estimates = customer ? allEstimates.filter(e => e.customer_id === customer.id) : [];
    if (estShare && !estimates.length) {
      const match = allEstimates.find(e => e.share_token === estShare);
      if (match) {
        estimates = [match];
        if (!customer) {
          const r2 = await fetch('/api/customers?id=' + encodeURIComponent(match.customer_id), { headers });
          if (r2.ok) customer = await r2.json();
        }
      }
    }
    if (!customer) { $('stage').innerHTML = '<div class="loading">Customer not found.</div>'; return; }

    const [wR, pR, roster] = await Promise.all([
      fetch('/api/workorders?limit=200', { headers }),
      fetch('/api/paysheets?limit=200', { headers }),
      loadRoster(),
    ]);
    const allWos = wR.ok ? (await wR.json()).workorders || [] : [];
    const allPss = pR.ok ? (await pR.json()).paysheets || [] : [];

    const nameLower = (customer.full_name || '').toLowerCase();
    const lastName = nameLower.split(/\s+/).pop();
    const workorders = allWos.filter(w =>
      (w.customer_name || '').toLowerCase().includes(lastName) ||
      estimates.some(e => e.id === w.linked_estimate_id)
    );
    // A ?wo deep-link is resolved directly (not page-limited); make sure that WO
    // drives the render even if it sits past the capped customer-WO scan.
    if (resolvedWo && resolvedWo.id && !workorders.some(w => w.id === resolvedWo.id)) {
      workorders.unshift(resolvedWo);
    }
    const paysheets = allPss.filter(p =>
      (p.customer_name || '').toLowerCase().includes(lastName)
    );

    let photos = [];
    const refWo = (woParam && workorders.find(w => w.id === woParam || String(w.wo_number) === String(woParam))) || workorders[0];
    if (refWo) {
      try {
        const mR = await fetch('/api/estimate-photos?wo_id=' + encodeURIComponent(refWo.id), { headers });
        if (mR.ok) {
          const { photos: union } = await mR.json();
          photos = union || [];
        }
      } catch { /* fall through */ }
    }
    if (!photos.length) {
      estimates.forEach(e => {
        (e.photos || []).forEach(p => photos.push({ ...p, from: 'est-' + e.estimate_number }));
      });
    }

    // Purchase orders for this job's estimates
    let purchaseOrders = [];
    if (estimates.length) {
      try {
        const poR = await Promise.all(estimates.map(e =>
          fetch('/api/purchase-orders?estimate_id=' + encodeURIComponent(e.id), { headers })
            .then(r => r.ok ? r.json() : { purchase_orders: [] })
            .catch(() => ({ purchase_orders: [] }))
        ));
        purchaseOrders = poR.flatMap(r => r.purchase_orders || []);
      } catch { /* fall through */ }
    }

    // When opened via ?wo (e.g. an AI open_job deep-link), the requested WO — not
    // just the first active one — drives the hero/status for multi-WO customers.
    const requestedWo = woParam ? workorders.find(w => w.id === woParam || String(w.wo_number) === String(woParam)) : null;
    render({ customer, estimates, workorders, paysheets, photos, roster, purchaseOrders, requestedWo });
  } catch(e) {
    $('stage').innerHTML = '<div class="loading">Error: ' + esc(e.message) + '</div>';
  }
}

  // 5. PAYSHEET — sub payout breakdown (labour + add-ons + surcharges + totals + notes)
  const _psTable = (rows) => rows.length ? `

  sections.push(`
    <details class="acc" open data-section="paysheet">

  const pnl = (() => {

      plannedMat: sumCat('materials', 'material'),

        <div class="title"><svg viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg> FILES</div>

      </div>
    </details>

  // 7.5 TEAM THREAD (internal, shared per-WO channel via /api/messages)
  sections.push(`
    <details class="acc" open data-section="teamthread">
      <summary>
        <div class="title"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg> TEAM THREAD</div>
        <div class="meta"><span id="threadCount">-</span><svg class="chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </summary>
      <div class="acc-body">
        ${activeWo ? `
          <div id="threadMount" class="thread"><div class="empty-sec">LOADING&hellip;</div></div>
          <form id="threadForm" class="thread-composer">
            <textarea id="threadInput" placeholder="Message the team about this job&hellip;"></textarea>
            <button type="submit" class="act primary" id="threadSendBtn">SEND</button>

          <div style="font-size:0.6em;color:rgba(200,220,255,0.35);font-family:'JetBrains Mono',monospace;letter-spacing:1px;margin-top:8px">INTERNAL ONLY. CUSTOMER SMS LIVES IN GHL (SEE COMMS HISTORY).</div>
        ` : '<div class="empty-sec">NO WORK ORDER ON THIS JOB YET. THE TEAM THREAD ATTACHES TO A WORK ORDER.</div>'}
      </div>

  `);

  // 8. COMMS HISTORY (placeholder)
  if (PRIV) sections.push(`
    <details class="acc" data-section="comms">
      <summary>
        <div class="title"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg> COMMS HISTORY</div>
        <div class="meta"><span>open in GHL</span><svg class="chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </summary>
      <div class="acc-body">
        <div class="empty-sec">${customer.ghl_contact_id ? 'GHL conversation thread will embed here in a follow-up release.' : 'NO GHL CONTACT LINKED'}</div>
        ${customer.ghl_contact_id ? `<div class="actions-bar"><a class="act cyan" href="https://app.gohighlevel.com/v2/location/PA9zJpJtmGJDk6wRBQqu/contacts/detail/${esc(customer.ghl_contact_id)}" target="_blank">OPEN IN GHL</a></div>` : ''}
      </div>
    </details>
  `);

  // 9. NOTES
  // Defensive: notes column has been legacy-corrupted to strings (and
  // "[object Object]" toString'd arrays) on some estimates. Normalize.
  // String branch tries JSON.parse first so [{date,author,body}] payloads
  // serialized as strings render as real entries, not raw JSON in a single note.
  const rawNotes = primaryEst?.notes;
  const coerceNotes = (val) => {
    if (Array.isArray(val)) return val;
    if (val && typeof val === 'object') return [val];
    if (typeof val === 'string' && val.trim()) {
      const t = val.trim();
      if (t[0] === '[' || t[0] === '{') {
        try {
          const parsed = JSON.parse(t);
          if (Array.isArray(parsed)) return parsed;
          if (parsed && typeof parsed === 'object') return [parsed];
        } catch { /* fall through to literal-body wrap */ }
      }
      return [{ date: '', author: '', body: val }];
    }
    return [];
  };
  const notesArr = coerceNotes(rawNotes);
  sections.push(`
    <details class="acc" data-section="notes">
      <summary>
        <div class="title"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> NOTES</div>
        <div class="meta"><span>${notesArr.length} entr${notesArr.length === 1 ? 'y' : 'ies'}</span><svg class="chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </summary>
      <div class="acc-body">
        ${notesArr.length ? notesArr.map(n => `
          <div style="padding:8px 0;border-bottom:1px solid rgba(251,146,60,0.06);font-size:0.88em;color:rgba(200,220,255,0.8);line-height:1.55">
            <div style="font-family:'JetBrains Mono',monospace;font-size:0.64em;color:rgba(200,220,255,0.45);letter-spacing:1.2px;margin-bottom:4px">${esc(n.date || '')} / ${esc(n.author || '').toUpperCase()}</div>
            <div>${esc(n.body || '')}</div>
          </div>
        `).join('') : '<div class="empty-sec">NO NOTES</div>'}
      </div>
    </details>
  `);

  $('stage').innerHTML = hero + sections.join('');

  // ------- Post-render wiring (live DOM, XSS-safe with el() builder) -------

  // Crew & Sub dropdowns (active workorder only)
  if (activeWo) {
    const crewCell = document.getElementById('crewLeadCell');
    const subCell = document.getElementById('subCell');
    if (crewCell) crewCell.appendChild(buildCrewSelect(activeWo, roster));
    if (subCell) subCell.appendChild(buildSubSelect(activeWo, roster));
  }

  // Job Log (activity feed): load entries + wire the inline composer
  if (activeWo) {
    loadJobLog(activeWo.id);
    const jlForm = document.getElementById('jobLogForm');
    if (jlForm) jlForm.addEventListener('submit', (ev) => { ev.preventDefault(); addJobLogEntry(activeWo.id); });
  }

  // Change Orders: load list + wire the create composer
  if (activeWo) {
    loadChangeOrders(activeWo.id);
    const coForm = document.getElementById('coForm');
    if (coForm) coForm.addEventListener('submit', (ev) => { ev.preventDefault(); createChangeOrder(activeWo.id); });
  }

  // Team Thread: load + wire composer (Enter sends, Shift+Enter for newline)
  if (activeWo) {
    loadTeamThread(activeWo.id);
    const tForm = document.getElementById('threadForm');
    if (tForm) tForm.addEventListener('submit', (ev) => { ev.preventDefault(); postTeamMessage(activeWo.id); });
    const tInput = document.getElementById('threadInput');
    if (tInput) tInput.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); postTeamMessage(activeWo.id); }
    });
  }

  // WO status pick
  const woPick = document.getElementById('woStatusPick');
  if (woPick && activeWo) {
    woPick.addEventListener('change', async ev => {
      const newStatus = ev.target.value;
      const extras = {};
      if (newStatus === 'complete') extras.completed_at = new Date().toISOString();
      if (newStatus === 'issued') extras.issued_at = new Date().toISOString();
      const updated = await saveField('workorders', activeWo.id, 'status', newStatus, 'woSaved');
      if (Object.keys(extras).length) {
        await fetch('/api/workorders', {
          method: 'PUT',
          headers: { ...ah(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: activeWo.id, ...extras }),
        });
      }
      // Sync PS dropdown visually
      const psPick = document.getElementById('psStatusPick');
      const WO_TO_PS = { draft:'scheduled', issued:'scheduled', in_progress:'in_progress', complete:'completed', cancelled:'cancelled' };
      if (psPick && WO_TO_PS[newStatus]) {
        psPick.value = WO_TO_PS[newStatus];
        flashSaved('psSaved');
      }
    });
  }

  // Paysheet status pick - also syncs the linked workorder so a paysheet
  // marked completed/cancelled doesn't leave its WO stale. Mirror of the
  // pre-PR-A behaviour that was lost in the rewrite. The PS_TO_WO map
  // matches the one in api/paysheets.js (server-side sync also runs, but
  // the client mirror keeps the WO dropdown in sync without a refresh).
  const psPick = document.getElementById('psStatusPick');
  if (psPick && activePs) {
    const PS_TO_WO = {
      'scheduled': 'issued',
      'in_progress': 'in_progress',
      'completed': 'complete',
      'invoice_final': 'complete',
      'cancelled': 'cancelled',
    };
    psPick.addEventListener('change', async ev => {
      const newStatus = ev.target.value;
      const extras = {};
      if (newStatus === 'completed') extras.completed_date = new Date().toISOString().slice(0,10);
      if (newStatus === 'invoice_final') extras.invoice_finalized_at = new Date().toISOString();
      const r = await fetch('/api/paysheets', {
        method: 'PUT',
        headers: { ...ah(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: activePs.id, status: newStatus, ...extras }),
      });
      if (!r.ok) { alert('Pay sheet update failed: HTTP ' + r.status); return; }
      flashSaved('psSaved');

      // Push the linked WO into the matching status if there is one. The
      // server side does this too via api/paysheets.js, but we want the
      // local woStatusPick to reflect the change without a reload.
      // Compare against the live DOM value, not the captured activeWo.status -
      // multiple PS status changes in one session would otherwise compare
      // against a stale snapshot and skip the WO update.
      const woTarget = PS_TO_WO[newStatus];
      const woSel = document.getElementById('woStatusPick');
      const currentWoStatus = woSel ? woSel.value : (activeWo && activeWo.status);
      if (activeWo && woTarget && currentWoStatus !== woTarget) {
        const woExtras = {};
        if (woTarget === 'complete') woExtras.completed_at = new Date().toISOString();
        await fetch('/api/workorders', {
          method: 'PUT',
          headers: { ...ah(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: activeWo.id, status: woTarget, ...woExtras }),
        });
        if (woSel) woSel.value = woTarget;
        flashSaved('woSaved');
      }
    });
  }

  // Interactive photo gallery + before/after generator link
  const photoMount = document.getElementById('photoMount');
  if (photoMount) {
    setSelectMode(false); // fresh render starts out of select mode
    renderPhotoGallery(photoMount, photos, activeWo);
  }
  const selBtn = document.getElementById('selectModeBtn');
  if (selBtn) selBtn.addEventListener('click', e => { e.preventDefault(); setSelectMode(!_selectMode); });
  const bulkAllBtn = document.getElementById('bulkSelectAll');
  if (bulkAllBtn) bulkAllBtn.addEventListener('click', e => { e.preventDefault(); bulkSelectAll(); });
  const bulkDelBtn = document.getElementById('bulkDeleteBtn');
  if (bulkDelBtn) bulkDelBtn.addEventListener('click', e => { e.preventDefault(); bulkDeletePhotos(); });
  const custShareBtn = document.getElementById('custShareBtn');
  if (custShareBtn) custShareBtn.addEventListener('click', e => { e.preventDefault(); copyCustomerPhotoLink(customer, estimates, custShareBtn); });
  const genBtn = document.getElementById('genBeforeAfterBtn');
  if (genBtn && activeWo) {
    genBtn.addEventListener('click', e => {
      e.preventDefault();
      // PR-C lands /before-after-preview.html; until then this is a fast-fail link.
      window.location.href = '/before-after-preview.html?wo=' + encodeURIComponent(activeWo.id);
    });
  }

  // Topbar expand / collapse
  document.querySelectorAll('details.acc').forEach(d => d._initial = d.open);
  $('expandAllBtn').addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('details.acc').forEach(d => d.open = true);
  });
  $('collapseAllBtn').addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('details.acc').forEach(d => d.open = false);
  });
}

function buildCrewSelect(wo, roster){
  const crew = (roster && roster.crew) || [];
  const sel = el('select', { class: 'field-edit' });
  sel.appendChild(el('option', { value: '' }, 'Unassigned'));
  const current = wo.sub_crew_lead || '';
  let matched = false;
  crew.forEach(u => {
    const opt = el('option', { value: u.name }, u.name + (u.role ? ' (' + u.role + ')' : ''));
    if (current && current.toLowerCase() === (u.name || '').toLowerCase()) {
      opt.selected = true;
      matched = true;
    }
    sel.appendChild(opt);
  });
  // Preserve legacy free-text values that don't match a current user.
  if (!matched && current) {
    const legacy = el('option', { value: current, selected: true }, current + ' (legacy)');
    sel.appendChild(legacy);
  }
  sel.addEventListener('change', async () => {
    await saveField('workorders', wo.id, 'sub_crew_lead', sel.value || null, 'crewSaved');
    const meta = document.getElementById('crewSubMeta');
    if (meta) meta.textContent = sel.value || 'unassigned';
  });
  return sel;
}

function buildSubSelect(wo, roster){
  const subs = (roster && roster.subs) || [];
  const sel = el('select', { class: 'field-edit' });
  sel.appendChild(el('option', { value: '' }, 'In-house / no sub'));
  let matched = false;
  subs.forEach(s => {
    const label = s.company ? s.name + ' (' + s.company + ')' : s.name;
    const opt = el('option', { value: s.id }, label);
    if (wo.subcontractor_id && wo.subcontractor_id === s.id) {
      opt.selected = true;
      matched = true;
    }
    sel.appendChild(opt);
  });
  // Preserve an archived-sub FK so historical assignments are not silently
  // overwritten. /api/crew-roster excludes archived subs (archived_at IS
  // NOT NULL), so when wo.subcontractor_id is set but no active sub matches
  // we surface it as "(archived sub - reassign to change)" with the FK
  // intact. Picking another option saves the new sub; picking In-house
  // clears the FK.
  if (!matched && wo.subcontractor_id) {
    const legacy = el('option', { value: wo.subcontractor_id, selected: true },
      'Archived sub (reassign to change)');
    sel.appendChild(legacy);
  }
  sel.addEventListener('change', async () => {
    await saveField('workorders', wo.id, 'subcontractor_id', sel.value || null, 'crewSaved');
  });
  return sel;
}

// --- Multi-select / bulk delete state ---
// Selection survives a cover-triggered re-render; _galleryState mirrors the
// live tiles so the bulk bar count and delete loop stay in sync.
let _selectMode = false;
let _galleryState = [];
const _selectedIds = new Set();

function tileById(id) {
  return Array.from(document.querySelectorAll('.ptile')).find(t => t.dataset.id === id) || null;
}
function selectedPhotos() {
  return _galleryState.filter(p => _selectedIds.has(p.id));
}
function updateBulkBar() {
  // Drop ids whose photos are gone (e.g. after upload re-render or a delete).
  for (const id of Array.from(_selectedIds)) {
    if (!_galleryState.some(p => p.id === id)) _selectedIds.delete(id);
  }
  const n = _selectedIds.size;
  const c = document.getElementById('bulkCount');
  if (c) c.textContent = n + ' selected';
  const del = document.getElementById('bulkDeleteBtn');
  if (del) del.disabled = n === 0;
}
function toggleSelect(p, tile, on) {
  if (on) _selectedIds.add(p.id); else _selectedIds.delete(p.id);
  if (tile) tile.classList.toggle('selected', on);
  updateBulkBar();
}
function setSelectMode(on) {
  _selectMode = on;
  if (!on) _selectedIds.clear();
  const grid = document.getElementById('photoGrid');
  if (grid) grid.classList.toggle('selecting', on);
  const bulk = document.getElementById('galleryBulk');
  if (bulk) bulk.style.display = on ? 'flex' : 'none';
  const btn = document.getElementById('selectModeBtn');
  if (btn) { btn.textContent = on ? 'CANCEL' : 'SELECT'; btn.classList.toggle('cyan', on); }
  if (!on) {
    document.querySelectorAll('.ptile.selected').forEach(t => t.classList.remove('selected'));
    document.querySelectorAll('.ptile .psel').forEach(c => { c.checked = false; });
  }
  updateBulkBar();
}
function bulkSelectAll() {
  const all = _galleryState;
  const allOn = all.length > 0 && all.every(p => _selectedIds.has(p.id));
  all.forEach(p => {
    const next = !allOn;
    if (next) _selectedIds.add(p.id); else _selectedIds.delete(p.id);
    const tile = tileById(p.id);
    if (tile) {
      tile.classList.toggle('selected', next);
      const box = tile.querySelector('.psel');
      if (box) box.checked = next;
    }
  });
  updateBulkBar();
}
async function bulkDeletePhotos() {
  const targets = selectedPhotos();
  if (!targets.length) return;
  if (!confirm('Delete ' + targets.length + ' photo' + (targets.length === 1 ? '' : 's')
    + ' permanently? The files will be removed from storage too.')) return;
  const btn = document.getElementById('bulkDeleteBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'DELETING...'; }
  const failures = [];
  for (const p of targets) {
    try {
      await deletePhoto(p);
      const idx = _galleryState.findIndex(o => o.id === p.id);
      if (idx >= 0) _galleryState.splice(idx, 1);
      _selectedIds.delete(p.id);
      const tile = tileById(p.id);
      if (tile) tile.remove();
    } catch (e) {
      failures.push((p.caption || p.id) + ': ' + e.message);
    }
  }
  if (btn) btn.textContent = 'DELETE SELECTED';
  updateGalleryMeta(_galleryState);
  if (!_galleryState.length) setSelectMode(false);
  else updateBulkBar();
  if (failures.length) alert('Some photos could not be deleted:\n' + failures.join('\n'));
}

// PATCH/PUT a photo. Branches on source (estimate_photos vs project_files).
async function patchPhoto(p, body) {
  if (p.source === 'estimate_photos') {
    const r = await fetch('/api/estimate-photos?id=' + encodeURIComponent(p.id), {
      method: 'PATCH',
      headers: { ...ah(), 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error('estimate-photos PATCH failed: HTTP ' + r.status);
    const data = await r.json();
    return data.photo || data;
  }
  if (p.source === 'project_files') {
    const r = await fetch('/api/files', {
      method: 'PUT',
      headers: { ...ah(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: p.id, ...body }),
    });
    if (!r.ok) throw new Error('files PUT failed: HTTP ' + r.status);
    return r.json();
  }
  throw new Error('Unknown photo source: ' + p.source);
}

async function deletePhoto(p) {
  const path = p.source === 'project_files' ? '/api/files' : '/api/estimate-photos';
  const r = await fetch(path + '?id=' + encodeURIComponent(p.id), {
    method: 'DELETE',
    headers: ah(),
  });
  if (!r.ok) throw new Error('DELETE failed: HTTP ' + r.status);
  return r.json();
}

// Customer-facing photo gallery share link (photos-share.html, project-based).
// Resolves the project for this job (by estimate, then customer), ensures a
// non-expiring share token, copies the URL and opens it. Mirrors the
// portal-mobile "Share with customer" flow.
function photoToast(msg, isErr) {
  const s = document.createElement('div');
  s.textContent = msg;
  s.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:'
    + (isErr ? '#f87171' : '#22d3ee') + ';color:#020615;padding:8px 18px;border-radius:8px;font-weight:700;'
    + 'font-family:monospace;z-index:99999;max-width:80vw;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,0.5)';
  document.body.appendChild(s);
  setTimeout(() => s.remove(), isErr ? 4500 : 2200);
}

async function copyCustomerPhotoLink(customer, estimates, btn) {
  const orig = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = 'GETTING LINK...'; }
  try {
    // 1. Resolve the project for this job: prefer the estimate link, fall back to customer.
    // Scope to this customer so the lookup never pages past a capped, newest-first list.
    const scope = (customer && customer.id) ? ('&customer_id=' + encodeURIComponent(customer.id)) : '';
    const r = await fetch('/api/projects?limit=200' + scope, { headers: ah() });
    if (!r.ok) throw new Error('projects HTTP ' + r.status);
    const projects = (await r.json()).projects || [];
    const estIds = new Set((estimates || []).map(e => e.id));
    const project = projects.find(p => p.estimate_id && estIds.has(p.estimate_id))
      || (customer && projects.find(p => p.customer_id === customer.id));
    if (!project) {
      photoToast('No customer photo gallery exists for this job yet. Upload job photos via the crew portal to create one.', true);
      return;
    }
    // 2. Ensure an (idempotent) non-expiring share token.
    const sr = await fetch('/api/projects?action=ensure-share&id=' + encodeURIComponent(project.id), {
      method: 'POST', headers: { ...ah(), 'Content-Type': 'application/json' }, body: '{}',
    });
    if (!sr.ok) throw new Error('ensure-share HTTP ' + sr.status);
    const token = (await sr.json()).share_token;
    if (!token) throw new Error('no share token returned');
    // 3. Copy + open the customer gallery URL.
    const url = location.origin + '/photos-share.html?share=' + encodeURIComponent(token);
    try { await navigator.clipboard.writeText(url); } catch (e) { /* clipboard may be blocked; link still opens */ }
    window.open(url, '_blank', 'noopener,noreferrer');
    photoToast('Customer photo link copied');
  } catch (e) {
    photoToast('Could not get the customer link: ' + e.message, true);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = orig; }
  }
}

// Materials COPY / PRINT — read from window._jobMaterials (set by render()).
// Uses RyMaterials.buildMaterialsTextSummary so output matches
// production-materials.html copyList() byte-for-byte.
function copyMaterialsText() {
  const ctx = window._jobMaterials;
  if (!ctx || !window.RyMaterials) { alert('Materials not loaded'); return; }
  const text = window.RyMaterials.buildMaterialsTextSummary(ctx.mats, ctx.address);
  navigator.clipboard.writeText(text).then(
    () => { const s = document.createElement('div'); s.textContent = 'Copied'; s.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#22d3ee;color:#020615;padding:8px 18px;border-radius:8px;font-weight:700;font-family:monospace;z-index:99999'; document.body.appendChild(s); setTimeout(() => s.remove(), 1500); },
    (e) => alert('Copy failed: ' + (e && e.message || e))
  );
}
function printMaterialsText() {
  const ctx = window._jobMaterials;
  if (!ctx || !window.RyMaterials) { alert('Materials not loaded'); return; }
  const text = window.RyMaterials.buildMaterialsTextSummary(ctx.mats, ctx.address);
  const w = window.open('', '', 'width=800,height=900');
  if (!w) { alert('Pop-up blocked. Allow pop-ups for ryujin-os.vercel.app to use Print.'); return; }
  w.document.write('<pre style="font-family:monospace;padding:40px;font-size:14px;line-height:1.6">' + text.replace(/</g, '&lt;') + '</pre>');
  w.document.close();
  w.print();
}

// Inline error banner -- guaranteed visible (alert() can be suppressed
// inside iframes by Chrome).
// ─── PROFIT & LOSS ─── compute + render, driven by window._jobPnl (set in render()).
// Sign-correct money for the readout: the global money() prints "$-1,200" for a
// negative (over-budget) gross and "-" for zero. P&L needs "-$1,200" and "$0".
function pmoney(n){
  const v = Number(n) || 0;
  const s = '$' + Math.abs(v).toLocaleString('en-CA', { maximumFractionDigits: 0 });

function marginChipStyle(m){

function pnlCompute(p, mode){
  let material, labour, other, matNote = '', labNote = '';
  if (mode === 'actual') {
    if (p.hasPO) { material = p.poMat; } else { material = p.plannedMat; matNote = 'planned · no PO yet'; }
    if (p.hasPs) { labour = p.psSub; other = 0; } else { labour = p.plannedLab; other = p.plannedOther; labNote = 'planned · no pay sheet yet'; }
  } else {
    material = p.plannedMat; labour = p.plannedLab; other = p.plannedOther;
  }
  const cost = material + labour + other;
  const gross = p.revenue - cost;
  const margin = p.revenue ? (gross / p.revenue) * 100 : 0;
  return { material, labour, other, matNote, labNote, cost, gross, margin };
}

// Vercel serverless caps request body at 4.5MB. Modern phone JPEGs often
// exceed that. Downscale photo formats (JPEG) to maxDim 2400px @ JPEG 0.85
// client-side — keeps detail for site photos, brings 5MB files under 1MB.
// createImageBitmap honors EXIF orientation. HEIC/HEIF can't decode in
// canvas, sent as-is. PNG/GIF/WebP/SVG pass through unchanged so we don't
// flatten transparency or strip animation by recompressing to JPEG.
async function downscaleImage(file, maxDim = 2400, quality = 0.85) {
  if (file.type !== 'image/jpeg' && file.type !== 'image/jpg') return file;
  try {
    const bmp = await createImageBitmap(file, { imageOrientation: 'from-image' });
    const ratio = Math.min(1, maxDim / Math.max(bmp.width, bmp.height));
    const w = Math.round(bmp.width * ratio);
    const h = Math.round(bmp.height * ratio);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(bmp, 0, 0, w, h);
    if (bmp.close) bmp.close();
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
    if (!blob || blob.size >= file.size) return file;
    const newName = file.name.replace(/\.[^.]+$/, '') + '.jpg';
    return new File([blob], newName, { type: 'image/jpeg', lastModified: file.lastModified });
  } catch (e) {
    console.warn('[upload] downscale failed, sending original', file.name, e);
    return file;
  }
}

async function uploadJobPhotos(fileList) {
  const input = document.getElementById('jobUploadInput');
  const status = document.getElementById('uploadStatus');
  const estId = input?.dataset.estId;
  const files = Array.from(fileList || []);
  const hasAuth = !!(window.RyujinAuth && window.RyujinAuth.token);
  console.log('[upload] start', { estId, count: files.length, hasAuth, ahHeaders: Object.keys(ah()) });
  if (!estId) { showUploadErrorBanner(['No estimate id on this job. Reload the page.'], files.length || 1, files.length || 1); return; }
  if (!hasAuth) { showUploadErrorBanner(['No auth token in window.RyujinAuth. Sign out + sign in.'], files.length, files.length); return; }
  if (!files.length) return;

  const setStatus = (txt) => { if (status) { status.style.display = ''; status.textContent = txt; } };
  setStatus(`preparing ${files.length} file${files.length === 1 ? '' : 's'}...`);

  // One-per-request to stay safely under Vercel's 4.5MB serverless body cap.
  let done = 0, failed = 0;
  const errors = [];
  for (let i = 0; i < files.length; i++) {
    const original = files[i];
    setStatus(`compressing ${i + 1} / ${files.length}: ${original.name}...`);
    const f = await downscaleImage(original);
    console.log(`[upload] ${original.name}: ${(original.size/1024/1024).toFixed(2)}MB -> ${(f.size/1024/1024).toFixed(2)}MB`);
    setStatus(`uploading ${i + 1} / ${files.length} (${done} done${failed ? ` · ${failed} failed` : ''})...`);
    const fd = new FormData();
    fd.append('estimate_id', estId);
    fd.append('category', 'site');
    fd.append('file', f, f.name);
    try {
      const r = await fetch('/api/estimate-photos', { method: 'POST', headers: ah(), body: fd });
      if (!r.ok) {
        const errText = await r.text().catch(() => '');
        throw new Error('HTTP ' + r.status + (errText ? ' ' + errText.slice(0, 400) : ''));
      }
      done++;
    } catch (e) {
      failed++;
      const sizeMB = (f.size/1024/1024).toFixed(2);
      const msg = `${original.name} (${sizeMB}MB after compress): ${e.message}`;
      console.error('[upload]', msg);
      errors.push(msg);
    }
    setStatus(`uploaded ${done} / ${files.length}${failed ? ` · ${failed} failed` : ''}`);
  }

  if (input) input.value = '';

  // Refresh gallery via estimate_id (uploads always have an estimate context)
  try {
    const mount = document.getElementById('photoMount');
    const eR = await fetch('/api/estimate-photos?estimate_id=' + encodeURIComponent(estId), { headers: ah() });
    const union = eR.ok ? ((await eR.json()).photos || []) : [];
    if (mount) renderPhotoGallery(mount, union, null);
  } catch (e) {
    console.error('[upload] gallery refresh failed', e);
  }

  if (errors.length) showUploadErrorBanner(errors, files.length, failed);
  setTimeout(() => { if (status && status.textContent.startsWith('uploaded') && !failed) status.style.display = 'none'; }, 4000);
}

function renderPhotoGallery(mount, photos, refWo) {
  mount.innerHTML = '';
  const countEl = document.getElementById('photoCount');
  const mixEl = document.getElementById('photoMix');

  if (!photos || !photos.length) {
    mount.appendChild(el('div', { class: 'empty-sec' },
      'NO PHOTOS OR VIDEOS / upload via crew portal or proposal builder'));
    if (countEl) countEl.textContent = '0 items';
    if (mixEl) mixEl.textContent = 'no media';
    const genBtn = document.getElementById('genBeforeAfterBtn');
    if (genBtn) genBtn.style.opacity = '0.4';
    return;
  }

  const grid = el('div', { class: 'gallery', id: 'photoGrid' });
  const state = photos.map(p => ({ ...p })); // local mutable copy

  state.forEach(p => grid.appendChild(buildTile(p, refWo, state)));

  updateGalleryMeta(state);
  updateBulkBar();

function updateGalleryMeta(state) {
  const countEl = document.getElementById('photoCount');
  const mixEl = document.getElementById('photoMix');
  if (countEl) countEl.textContent = state.length + ' item' + (state.length === 1 ? '' : 's');
  const before = state.filter(p => photoRole(p) === 'before').length;
  const after = state.filter(p => photoRole(p) === 'after').length;
  const cover = state.filter(p => p.is_cover).length;
  if (mixEl) mixEl.textContent = before + ' before / ' + after + ' after / ' + cover + ' cover';
  const genBtn = document.getElementById('genBeforeAfterBtn');
  if (genBtn) {
    const enabled = before > 0 && after > 0;
    genBtn.style.opacity = enabled ? '1' : '0.4';
    genBtn.title = enabled
      ? 'Generate a side-by-side post from the marked before + after'
      : 'Mark at least one before AND one after to enable';
  }
}

function buildTile(p, refWo, state) {
  const tile = el('div', { class: 'ptile', dataset: { id: p.id, source: p.source || '' } });
  const thumbWrap = el('div', { class: 'pthumb' });

  if (isVideo(p)) {
    thumbWrap.appendChild(el('video', { src: p.url, preload: 'metadata', muted: 'true', playsinline: 'true' }));
  } else {
    thumbWrap.appendChild(el('img', { src: p.url, loading: 'lazy', alt: p.caption || '' }));
  }
  thumbWrap.addEventListener('click', () => {
    if (_selectMode) {
      const next = !_selectedIds.has(p.id);
      const box = tile.querySelector('.psel');
      if (box) box.checked = next;
      toggleSelect(p, tile, next);
      return;
    }
    window.open(p.url, '_blank', 'noopener,noreferrer');
  });
  tile.appendChild(thumbWrap);

  // Multi-select checkbox (shown only in select mode via .gallery.selecting).
  const selBox = el('input', { type: 'checkbox', class: 'psel', title: 'Select photo' });
  selBox.checked = _selectedIds.has(p.id);
  if (selBox.checked) tile.classList.add('selected');
  selBox.addEventListener('click', ev => {
    ev.stopPropagation();
    toggleSelect(p, tile, selBox.checked);
  });
  tile.appendChild(selBox);

  // Badges
  const badges = el('div', { class: 'badges' });
  if (p.is_cover) badges.appendChild(el('span', { class: 'bd cover' }, 'COVER'));
  const role = photoRole(p);
  if (role === 'before') badges.appendChild(el('span', { class: 'bd before' }, 'BEFORE'));
  if (role === 'after') badges.appendChild(el('span', { class: 'bd after' }, 'AFTER'));
  if (isVideo(p)) badges.appendChild(el('span', { class: 'bd video' }, 'VIDEO'));
  tile.appendChild(badges);

  // Menu button + dropdown
  const menuBtn = el('button', { class: 'menu-btn', type: 'button', title: 'Photo actions' }, '⋮');
  tile.appendChild(menuBtn);
  const menu = el('div', { class: 'pmenu' });
  // estimate_photos rows can't be annotated by /annotate.html since the
  // annotator endpoint targets project_files only. Gray out the option for
  // those rows so Mac doesn't tap an inert link.
  const annotatable = !p.read_only && p.source !== 'estimate_photos';
  const annotateLabel = p.annotated_url ? 'Edit annotations' : 'Annotate';
  const actions = [
    { label: 'View original', action: 'view' },
    { label: annotateLabel, action: 'annotate', disabled: !annotatable, hint: annotatable ? null : 'Only project files can be annotated' },
    { label: 'Generate mockup (AI)', action: 'mockup', hint: 'Coming soon: Higgsfield render of this photo with the proposed roof installed' },
    { label: p.is_cover ? 'Unset cover' : 'Set as cover', action: 'cover' },
    { label: role === 'before' ? 'Unmark before' : 'Mark as before', action: 'before' },
    { label: role === 'after' ? 'Unmark after' : 'Mark as after', action: 'after' },
    { label: 'Delete photo', action: 'delete', danger: true },
  ];
  actions.forEach(a => {
    const attrs = { type: 'button' };
    if (a.danger) attrs.class = 'danger';
    if (a.disabled) { attrs.class = (attrs.class || '') + ' disabled'; attrs.disabled = 'true'; }
    if (a.hint) attrs.title = a.hint;
    const b = el('button', attrs, a.label);
    if (!a.disabled) {
      b.addEventListener('click', async ev => {
        ev.stopPropagation();
        menu.classList.remove('on');
        await handleAction(a.action, p, tile, state);
      });
    }
    menu.appendChild(b);
  });
  tile.appendChild(menu);

  menuBtn.addEventListener('click', ev => {
    ev.stopPropagation();
    document.querySelectorAll('.ptile .pmenu.on').forEach(m => { if (m !== menu) m.classList.remove('on'); });
    menu.classList.toggle('on');
  });

  // Caption (contenteditable on click)
  const cap = el('div', {
    class: 'pcap',
    contenteditable: 'true',
    spellcheck: 'false',
    title: 'Click to edit caption',
  });
  cap.textContent = p.caption || '';
  let originalCaption = p.caption || '';
  cap.addEventListener('focus', () => { originalCaption = cap.textContent; });
  cap.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); cap.blur(); }
    if (e.key === 'Escape') { cap.textContent = originalCaption; cap.blur(); }
  });
  cap.addEventListener('blur', async () => {
    const newCap = cap.textContent.trim();
    if (newCap === originalCaption) return;
    // Block overwriting a canonical role caption with free text via this control;
    // role changes go through the menu so they update category + caption together.
    if (CANONICAL_CAPTIONS.has(newCap.toLowerCase())) {
      cap.textContent = originalCaption;
      alert('Use the actions menu to change BEFORE / AFTER / COVER markers.');
      return;
    }
    try {
      await patchPhoto(p, { caption: newCap });
      p.caption = newCap;
      originalCaption = newCap;
    } catch (e) {
      alert(e.message);
      cap.textContent = originalCaption;
    }
  });
  tile.appendChild(cap);

  return tile;
}

async function handleAction(action, p, tile, state) {
  try {
    if (action === 'view') {
      window.open(p.url, '_blank', 'noopener,noreferrer');
      return;
    }
    if (action === 'annotate') {
      // /annotate.html opens the Konva editor. On save, annotated_url is
      // written to project_files and the proposal renderer picks it up
      // automatically (already prefers annotated_url over url).
      window.open('/annotate.html?file_id=' + encodeURIComponent(p.id), '_blank', 'noopener,noreferrer');
      return;
    }
    if (action === 'mockup') {
      // Stub: real Higgsfield integration coming next session. For now show
      // the intent so Mac knows the button is wired and where it'll land.
      alert('AI Mockup Generator\n\nNext-session build: Higgsfield render of this drone shot with the proposed roof system installed. You toggle a tier in the proposal-builder, click this, and the mockup renders showing the customer what the new roof will look like on THEIR house.\n\nNot wired tonight. Photo URL captured: ' + p.url.slice(0, 60) + '...');
      return;
    }
    if (action === 'cover') {
      const next = !p.is_cover;
      await patchPhoto(p, { is_cover: next });
      // Reflect single-cover constraint locally.
      if (next) state.forEach(o => { if (o.id !== p.id) o.is_cover = false; });
      p.is_cover = next;
      // Re-render the whole grid because cover affects every tile.
      const mount = document.getElementById('photoMount');
      if (mount) renderPhotoGallery(mount, state, null);
      return;
    }
    if (action === 'before' || action === 'after') {
      const currentRole = photoRole(p);
      const toggleOff = currentRole === action;
      const value = toggleOff ? null : action;
      // estimate_photos: set both category + caption (defensive: legacy reads
      // looked at caption, newer code reads category). project_files: category only.
      const body = p.source === 'project_files'
        ? { category: value || 'general' }
        : { category: value || 'general', caption: value || '' };
      await patchPhoto(p, body);
      if (p.source === 'project_files') {
        p.category = value || 'general';
      } else {
        p.category = value || 'general';
        p.caption = value || '';
      }
      replaceTile(tile, p, state);
      updateGalleryMeta(state);
      return;
    }
    if (action === 'delete') {
      if (!confirm('Delete this photo permanently? The file will be removed from storage too.')) return;
      await deletePhoto(p);
      const idx = state.findIndex(o => o.id === p.id);
      if (idx >= 0) state.splice(idx, 1);
      tile.remove();
      updateGalleryMeta(state);
      return;
    }
  } catch (e) {
    alert(e.message);
  }
}

function replaceTile(tile, p, state) {
  const fresh = buildTile(p, null, state);
  tile.parentNode.replaceChild(fresh, tile);
}

    return `

        <div class="joblog-entry-head">
          <span class="badge" style="background:${tag.color}22;color:${tag.color};border:1px solid ${tag.color}55">${esc(tag.label)}</span>
          ${jobLogStatusBadge(e.status)}
          <span class="joblog-meta">${esc(when)} / ${esc(who)}</span>
        </div>
        <div class="joblog-entry-body">${esc(e.description || '')}${amt}${vendor}</div>
        ${photos}
      </div>`;
  }).join('');
}

async function loadJobLog(woId){
  const mount = document.getElementById('jobLogMount');
  const countEl = document.getElementById('jobLogCount');
  if (!mount) return;
  try {
    const r = await fetch('/api/job-log?workorder_id=' + encodeURIComponent(woId), { headers: ah() });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const { entries = [] } = await r.json();
    mount.innerHTML = renderJobLogEntries(entries);
    if (countEl) countEl.textContent = entries.length + ' entr' + (entries.length === 1 ? 'y' : 'ies');
  } catch (e) {
    mount.innerHTML = '<div class="empty-sec">COULD NOT LOAD LOG: ' + esc(e.message) + '</div>';
    if (countEl) countEl.textContent = '-';
  }
}

async function addJobLogEntry(woId){
  const typeEl = document.getElementById('jobLogType');
  const descEl = document.getElementById('jobLogDesc');
  const amtEl  = document.getElementById('jobLogAmount');
  const btn    = document.getElementById('jobLogAddBtn');
  const msg    = document.getElementById('jobLogMsg');
  const description = (descEl?.value || '').trim();
  if (!description) { if (descEl) descEl.focus(); return; }
  const payload = {
    workorder_id: woId,
    entry_type: typeEl?.value || 'note',
    description,
    amount: amtEl?.value ? Number(amtEl.value) : 0,
    status: 'approved', // owner-logged entries are self-approved (not a sub reimbursement request)
  };
  if (btn) { btn.disabled = true; btn.textContent = 'SAVING…'; }
  try {
    const r = await fetch('/api/job-log', { method: 'POST', headers: { ...ah(), 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error(j.error || ('HTTP ' + r.status)); }
    if (descEl) descEl.value = '';
    if (amtEl) amtEl.value = '';
    await loadJobLog(woId);
    if (msg) { msg.style.display = 'inline'; msg.style.color = '#4ade80'; msg.textContent = 'SAVED'; setTimeout(() => { msg.style.display = 'none'; }, 1800); }
  } catch (e) {
    if (msg) { msg.style.display = 'inline'; msg.style.color = '#f87171'; msg.textContent = e.message; }
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'ADD ENTRY'; }
  }
}

// ───── CHANGE ORDERS (full-duplex accept; record + log only) ─────
const CO_STATUS = {
  draft:            { label: 'DRAFT',            cls: 'b-draft' },
  pending_customer: { label: 'PENDING CUSTOMER', cls: 'b-active' },
  pending_sub:      { label: 'PENDING SUB',      cls: 'b-active' },
  pending_both:     { label: 'PENDING BOTH',     cls: 'b-active' },
  approved:         { label: 'APPROVED',         cls: 'b-done' },
  rejected:         { label: 'REJECTED',         cls: 'b-draft' },
  superseded:       { label: 'SUPERSEDED',       cls: 'b-draft' },
  cancelled:        { label: 'CANCELLED',        cls: 'b-draft' },
};

function coSideAcceptBadge(status){
  const m = {
    pending:  { t: 'PENDING',    c: '#fbbf24' },
    accepted: { t: 'ACCEPTED',   c: '#4ade80' },
    declined: { t: 'DECLINED',   c: '#f87171' },
    superseded:{ t: 'SUPERSEDED', c: '#94a3b8' },
  }[status];
  if (!m) return '';
  return `<span class="badge" style="background:${m.c}22;color:${m.c};border:1px solid ${m.c}55">${m.t}</span>`;
}

function coSideRow(label, delta, acceptStatus, url){
  if (acceptStatus == null || acceptStatus === 'not_applicable') return '';
  // Zero-safe: the page-global money() returns '-' for 0 (falsy), but a $0 delta
  // is a real, creatable CO side. Format directly so $0 shows as +$0.00.
  const amt = delta != null
    ? `<span style="color:#e0e6f0;font-weight:700">${delta < 0 ? '-' : '+'}$${Math.abs(delta).toLocaleString('en-CA', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>` : '';
  const copy = (acceptStatus === 'pending' && url)
    ? `<button class="act ghost" type="button" data-link="${esc(url)}" onclick="copyCoLink(this)" style="padding:4px 9px;font-size:0.6em">COPY LINK</button>` : '';
  return `<div class="co-side"><span class="who">${esc(label)}</span>${amt} ${coSideAcceptBadge(acceptStatus)} ${copy}</div>`;
}

function renderChangeOrders(cos){
  if (!cos.length) return '<div class="empty-sec">NO CHANGE ORDERS YET</div>';
  return cos.map(c => {
    const st = CO_STATUS[c.status] || { label: String(c.status || '').toUpperCase(), cls: 'b-draft' };
    let when = '';
    if (c.created_at) { try { when = new Date(c.created_at).toLocaleString('en-CA', { month: 'short', day: 'numeric' }); } catch { when = ''; } }
    const scope = (c.scope_before || c.scope_after)
      ? `<div style="font-size:0.8em;color:rgba(200,220,255,0.55);margin:2px 0 6px">${esc(c.scope_before || '?')} &rarr; ${esc(c.scope_after || '?')}</div>` : '';
    return `
      <div class="co-entry">
        <div class="co-head">
          <span class="badge ${st.cls}">${esc(st.label)}</span>
          <span class="joblog-meta">${esc(when)}</span>
          ${c.totals_applied_at ? '<span class="joblog-meta" style="color:#4ade80">totals applied</span>' : ''}
        </div>
        <div class="co-reason">${esc(c.reason || '')}</div>
        ${scope}
        ${coSideRow('Customer', c.price_delta_customer, c.customer_accept_status, c.customer_accept_url)}
        ${coSideRow('Sub', c.rate_delta_sub, c.sub_accept_status, c.sub_accept_url)}
      </div>`;
  }).join('');
}

async function loadChangeOrders(woId){
  const mount = document.getElementById('coMount'); const countEl = document.getElementById('coCount');
  if (!mount) return;
  try {
    const r = await fetch('/api/change-orders?workorder_id=' + encodeURIComponent(woId), { headers: ah() });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const { change_orders = [] } = await r.json();
    mount.innerHTML = renderChangeOrders(change_orders);
    if (countEl) countEl.textContent = change_orders.length + (change_orders.length === 1 ? ' order' : ' orders');
  } catch (e) {
    mount.innerHTML = '<div class="empty-sec">COULD NOT LOAD: ' + esc(e.message) + '</div>';
    if (countEl) countEl.textContent = '-';
  }
}

window.copyCoLink = function(btn){
  const url = btn.dataset.link; if (!url) return;
  const done = () => { const t = btn.textContent; btn.textContent = 'COPIED'; setTimeout(() => { btn.textContent = t; }, 1500); };
  if (navigator.clipboard?.writeText) navigator.clipboard.writeText(url).then(done).catch(() => window.prompt('Copy this link:', url));
  else window.prompt('Copy this link:', url);
};

async function createChangeOrder(woId){
  const reason = (document.getElementById('coReason')?.value || '').trim();
  const msg = document.getElementById('coMsg'); const btn = document.getElementById('coAddBtn');
  if (!reason) { document.getElementById('coReason')?.focus(); return; }
  const custRaw = document.getElementById('coCustDelta')?.value;
  const subRaw = document.getElementById('coSubDelta')?.value;
  const payload = {
    workorder_id: woId, reason,
    scope_before: (document.getElementById('coScopeBefore')?.value || '').trim() || null,
    scope_after: (document.getElementById('coScopeAfter')?.value || '').trim() || null,
    price_delta_customer: custRaw !== '' && custRaw != null ? Number(custRaw) : null,
    rate_delta_sub: subRaw !== '' && subRaw != null ? Number(subRaw) : null,
  };
  if (btn) { btn.disabled = true; btn.textContent = 'CREATING…'; }
  try {
    const r = await fetch('/api/change-orders', { method: 'POST', headers: { ...ah(), 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error(j.error || ('HTTP ' + r.status)); }
    ['coReason', 'coScopeBefore', 'coScopeAfter', 'coCustDelta', 'coSubDelta'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    await loadChangeOrders(woId);
    if (msg) { msg.style.display = 'inline'; msg.style.color = '#4ade80'; msg.textContent = 'CREATED'; setTimeout(() => { msg.style.display = 'none'; }, 1800); }
  } catch (e) {
    if (msg) { msg.style.display = 'inline'; msg.style.color = '#f87171'; msg.textContent = e.message; }
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'CREATE CHANGE ORDER'; }
  }
}

// ───── TEAM THREAD (internal per-WO channel via /api/messages) ─────
function renderThread(msgs, meId){
  if (!msgs.length) return '<div class="empty-sec">NO MESSAGES YET. START THE THREAD BELOW.</div>';
  return msgs.map(m => {
    const mine = m.from_user_id && meId && m.from_user_id === meId;
    const who = (m.from_user && m.from_user.name) || m.from_label || 'Team';
    let when = '';
    if (m.created_at) { try { when = new Date(m.created_at).toLocaleString('en-CA', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }); } catch { when = ''; } }
    const names = Array.isArray(m.reader_names) ? m.reader_names : [];
    const seen = names.length
      ? `<div class="tmeta" style="color:rgba(74,222,128,0.55)">seen by ${esc(names.slice(0, 4).join(', '))}${names.length > 4 ? ' +' + (names.length - 4) : ''}</div>` : '';
    return `
      <div class="tmsg${mine ? ' mine' : ''}">
        <div class="tmeta">${esc(who)} / ${esc(when)}</div>
        <div class="tbody">${esc(m.body || '')}</div>
        ${seen}
      </div>`;
  }).join('');
}

async function loadTeamThread(woId){
  const mount = document.getElementById('threadMount'); const countEl = document.getElementById('threadCount');
  if (!mount) return;
  try {
    const r = await fetch('/api/messages?ref_workorder_id=' + encodeURIComponent(woId), { headers: ah() });
    if (r.status === 401) { mount.innerHTML = '<div class="empty-sec">SIGN IN TO SEE THE TEAM THREAD</div>'; if (countEl) countEl.textContent = '-'; return; }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const { messages = [], unread = 0, me } = await r.json();
    mount.innerHTML = renderThread(messages, me?.id);
    mount.scrollTop = mount.scrollHeight;
    // Real unread (server-side per-user reads), not a localStorage guess.
    if (countEl) countEl.textContent = messages.length + ' msg' + (messages.length === 1 ? '' : 's') + (unread ? ' / ' + unread + ' new' : '');
    // Now that the thread is on screen, mark it read for me.
    if (messages.length) markThreadRead(woId);
  } catch (e) {
    mount.innerHTML = '<div class="empty-sec">COULD NOT LOAD: ' + esc(e.message) + '</div>';
    if (countEl) countEl.textContent = '-';
  }
}

async function markThreadRead(woId){
  try {
    await fetch('/api/messages', { method: 'POST', headers: { ...ah(), 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'mark_read_thread', ref_workorder_id: woId }) });
  } catch { /* best-effort read receipt */ }
}

async function postTeamMessage(woId){
  const input = document.getElementById('threadInput'); const btn = document.getElementById('threadSendBtn');
  const text = (input?.value || '').trim();
  if (!text) { if (input) input.focus(); return; }
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  try {
    const r = await fetch('/api/messages', { method: 'POST', headers: { ...ah(), 'Content-Type': 'application/json' }, body: JSON.stringify({ thread_scope: 'job', ref_workorder_id: woId, body: text }) });
    if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error(j.error || ('HTTP ' + r.status)); }
    if (input) { input.value = ''; input.placeholder = 'Message the team about this job…'; }
    await loadTeamThread(woId);
  } catch (e) {
    if (input) input.placeholder = e.message;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'SEND'; }
  }
}
