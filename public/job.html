<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Job</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow-x:hidden;min-height:100vh}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(251,146,60,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(34,211,238,0.08) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(251,146,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(251,146,60,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}

.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(251,146,60,0.24);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#fb923c,#22d3ee,transparent);opacity:0.55}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #fff;border-radius:10px;color:#030611;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none;transition:all 0.2s}
.btn-back:hover{background:rgba(255,255,255,0.85);box-shadow:0 0 14px rgba(255,255,255,0.35)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.3),rgba(251,146,60,0.22) 40%,rgba(30,10,5,0.8));box-shadow:0 0 14px rgba(251,146,60,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}

.stage{position:relative;z-index:5;padding:80px 28px 60px;max-width:1280px;margin:0 auto}

/* Hero banner */
.hero-job{background:linear-gradient(135deg,rgba(14,22,40,0.85),rgba(20,10,6,0.75));border:1px solid rgba(251,146,60,0.25);border-radius:18px;padding:24px 28px;margin-bottom:18px;position:relative;overflow:hidden}
.hero-job::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#fb923c,#22d3ee,transparent);opacity:0.7}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.hero-left .eyebrow{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:#fb923c;letter-spacing:3px;margin-bottom:6px}
.hero-left h1{font-family:'Orbitron',sans-serif;font-size:2em;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.hero-left .addr{font-family:'Share Tech Mono',monospace;font-size:0.86em;color:rgba(200,220,255,0.72);letter-spacing:1px}
.hero-contact{text-align:right;font-size:0.85em;color:rgba(200,220,255,0.7);line-height:1.6;font-family:'Share Tech Mono',monospace;letter-spacing:0.5px}
.hero-contact a{color:#22d3ee;text-decoration:none}
.hero-contact a:hover{color:#67e8f9}
.hero-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;padding-top:14px;border-top:1px solid rgba(251,146,60,0.12)}
.hero-stat{display:flex;flex-direction:column;gap:2px}
.hero-stat .lbl{font-family:'Share Tech Mono',monospace;font-size:0.64em;color:rgba(200,220,255,0.5);letter-spacing:1.5px;text-transform:uppercase}
.hero-stat .val{font-family:'Orbitron',sans-serif;font-size:1em;font-weight:800;color:#fb923c}

/* Section grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media (max-width:860px){.grid{grid-template-columns:1fr}}
.section{background:rgba(14,22,40,0.55);border:1px solid rgba(251,146,60,0.14);border-radius:14px;overflow:hidden}
.section.wide{grid-column:1/-1}
.section-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:rgba(6,10,20,0.55);border-bottom:1px solid rgba(251,146,60,0.1)}
.section-head .title{font-family:'Orbitron',sans-serif;font-size:0.8em;font-weight:800;letter-spacing:2px;color:#fb923c;display:flex;align-items:center;gap:8px}
.section-head .title svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.section-head .meta{font-family:'Share Tech Mono',monospace;font-size:0.68em;color:rgba(200,220,255,0.55);letter-spacing:1.2px}
.section-head .meta a{color:#22d3ee;text-decoration:none}
.section-body{padding:16px 18px}
.empty-sec{padding:28px 18px;text-align:center;color:rgba(200,220,255,0.35);font-family:'Share Tech Mono',monospace;font-size:0.72em;letter-spacing:1.5px}

.badge{display:inline-block;padding:3px 9px;font-family:'Share Tech Mono',monospace;font-size:0.62em;font-weight:700;letter-spacing:1.5px;border-radius:5px}
.b-draft{background:rgba(148,163,184,0.14);color:#94a3b8;border:1px solid rgba(148,163,184,0.3)}
.b-issued{background:rgba(251,146,60,0.14);color:#fb923c;border:1px solid rgba(251,146,60,0.35)}
.b-active{background:rgba(34,211,238,0.14);color:#22d3ee;border:1px solid rgba(34,211,238,0.35)}
.b-done{background:rgba(74,222,128,0.14);color:#4ade80;border:1px solid rgba(74,222,128,0.35)}

/* Scope */
.scope-list{list-style:none;padding:0}
.scope-list li{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:0.88em}
.scope-list li .chk{width:14px;height:14px;border-radius:4px;display:flex;align-items:center;justify-content:center;background:rgba(74,222,128,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.35);flex-shrink:0}
.scope-list li .chk svg{width:9px;height:9px;stroke:currentColor;fill:none;stroke-width:3}
.scope-list li.off{color:rgba(200,220,255,0.35);text-decoration:line-through}
.scope-list li.off .chk{background:rgba(200,220,255,0.05);color:rgba(200,220,255,0.3);border-color:rgba(200,220,255,0.15)}

/* Pay table */
.ptable{width:100%;border-collapse:collapse;font-size:0.85em}
.ptable td,.ptable th{padding:6px 8px;border-bottom:1px solid rgba(251,146,60,0.06);text-align:left}
.ptable th{font-family:'Share Tech Mono',monospace;font-size:0.64em;color:rgba(200,220,255,0.45);letter-spacing:1.2px;text-transform:uppercase;font-weight:500}
.ptable td.num{text-align:right;font-family:'Orbitron',sans-serif;font-weight:700}
.ptable tr.total td{color:#fb923c;border-top:1px solid rgba(251,146,60,0.22);font-weight:800}

/* Gallery */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.gallery .photo{aspect-ratio:4/3;border-radius:8px;overflow:hidden;background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.1);cursor:pointer;transition:all 0.15s;position:relative}
.gallery .photo:hover{border-color:#fb923c;transform:scale(1.02)}
.gallery .photo img{width:100%;height:100%;object-fit:cover;display:block}
.gallery .photo .cap{position:absolute;bottom:0;left:0;right:0;padding:4px 8px;font-family:'Share Tech Mono',monospace;font-size:0.62em;color:#fff;background:rgba(0,0,0,0.7);letter-spacing:0.5px}

/* Info rows */
.info-row{display:grid;grid-template-columns:130px 1fr;gap:12px;padding:6px 0;font-size:0.88em;align-items:baseline}
.info-row .label{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(200,220,255,0.5);letter-spacing:1.2px;text-transform:uppercase}
.info-row .value{color:#e0e6f0}

/* Action buttons */
.actions-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.act{padding:7px 14px;border-radius:9px;font-family:'Orbitron',sans-serif;font-size:0.66em;font-weight:700;letter-spacing:1.5px;text-decoration:none;border:1px solid;cursor:pointer;transition:all 0.2s}
.act.primary{background:rgba(251,146,60,0.14);color:#fb923c;border-color:rgba(251,146,60,0.4)}
.act.primary:hover{background:rgba(251,146,60,0.25);box-shadow:0 0 12px rgba(251,146,60,0.3)}
.act.ghost{background:rgba(6,10,20,0.6);color:rgba(200,220,255,0.7);border-color:rgba(251,146,60,0.18)}
.act.ghost:hover{color:#fb923c;border-color:#fb923c}
.act.cyan{background:rgba(34,211,238,0.12);color:#22d3ee;border-color:rgba(34,211,238,0.35)}
.act.cyan:hover{background:rgba(34,211,238,0.22)}

.status-pick{padding:5px 10px;border-radius:6px;background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.28);color:#e0e6f0;font-family:'Share Tech Mono',monospace;font-size:0.68em;letter-spacing:1.2px;cursor:pointer;outline:none;text-transform:uppercase;margin-left:8px}
.status-pick:hover{border-color:#fb923c}
.status-pick:focus{border-color:#fb923c}
.saved-flash{display:inline-block;margin-left:8px;padding:2px 8px;background:rgba(74,222,128,0.14);border:1px solid rgba(74,222,128,0.4);color:#4ade80;font-family:'Share Tech Mono',monospace;font-size:0.62em;font-weight:700;letter-spacing:1.2px;border-radius:4px;opacity:0;transition:opacity 0.3s}
.saved-flash.on{opacity:1}

.loading{text-align:center;padding:80px;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1.5px}
</style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="btn-back" href="production-jobs.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> BACK</a>
  <div style="display:flex;align-items:center;gap:10px"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· JOB FOLDER</span></div></div>
  <div class="tb-spacer"></div>
  <div id="jobStatus" style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px">—</div>
</div>

<div class="stage" id="stage">
  <div class="loading">LOADING JOB...</div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = n => n ? '$' + Number(n).toLocaleString('en-CA',{maximumFractionDigits:0}) : '—';

async function loadJob(){
  const params = new URLSearchParams(location.search);
  const custId = params.get('id') || params.get('customer_id');
  const estShare = params.get('share');

  if (!custId && !estShare) {
    $('stage').innerHTML = '<div class="loading">No customer or share token passed.</div>';
    return;
  }

  const headers = { 'x-tenant-id': 'plus-ultra' };

  try {
    let customer = null;
    if (custId) {
      const r = await fetch('/api/customers?id=' + encodeURIComponent(custId), { headers });
      if (r.ok) customer = await r.json();
    }

    // Pull all estimates + filter to this customer
    const er = await fetch('/api/estimates?limit=200', { headers });
    const allEstimates = er.ok ? (await er.json()).estimates || [] : [];
    let estimates = customer ? allEstimates.filter(e => e.customer_id === customer.id) : [];
    if (estShare && !estimates.length) {
      const match = allEstimates.find(e => e.share_token === estShare);
      if (match) {
        estimates = [match];
        if (!customer) {
          const r2 = await fetch('/api/customers?id=' + encodeURIComponent(match.customer_id), { headers });
          if (r2.ok) customer = await r2.json();
        }
      }
    }
    if (!customer) { $('stage').innerHTML = '<div class="loading">Customer not found.</div>'; return; }

    // Pull WOs, pay sheets and match by customer name (paysheets don't have customer_id yet)
    const [wR, pR] = await Promise.all([
      fetch('/api/workorders?limit=200', { headers }),
      fetch('/api/paysheets?limit=200', { headers })
    ]);
    const allWos = wR.ok ? (await wR.json()).workorders || [] : [];
    const allPss = pR.ok ? (await pR.json()).paysheets || [] : [];

    const nameLower = (customer.full_name || '').toLowerCase();
    const lastName = nameLower.split(/\s+/).pop();
    const workorders = allWos.filter(w =>
      (w.customer_name || '').toLowerCase().includes(lastName) ||
      estimates.some(e => e.id === w.linked_estimate_id)
    );
    const paysheets = allPss.filter(p =>
      (p.customer_name || '').toLowerCase().includes(lastName)
    );

    // Collect photos across all estimates
    const photos = [];
    estimates.forEach(e => {
      (e.photos || []).forEach(p => photos.push({ ...p, from: 'est-' + e.estimate_number }));
    });

    render({ customer, estimates, workorders, paysheets, photos });
  } catch(e) {
    $('stage').innerHTML = '<div class="loading">Error: ' + esc(e.message) + '</div>';
  }
}

function render({ customer, estimates, workorders, paysheets, photos }){
  const primaryEst = estimates.sort((a,b) => (b.estimate_number||0) - (a.estimate_number||0))[0];
  const activeWo = workorders.find(w => ['in_progress','issued'].includes(w.status)) || workorders[0];
  const activePs = paysheets[0];
  const addr = [customer.address, customer.city, customer.province].filter(Boolean).join(', ');
  const pkg = primaryEst?.calculated_packages?.[primaryEst?.selected_package || 'gold'] || null;
  const tier = primaryEst?.selected_package || activeWo?.package_tier || '—';
  const sq = primaryEst?.roof_area_sqft ? (primaryEst.roof_area_sqft / 100).toFixed(1) + ' SQ' :
             (activeWo?.total_sq ? activeWo.total_sq + ' SQ' : '—');
  const total = pkg?.total || 0;
  const statusWo = activeWo?.status || 'no-wo';

  $('jobStatus').textContent = statusWo.toUpperCase().replace('_',' ');

  let html = `
    <div class="hero-job">
      <div class="hero-top">
        <div class="hero-left">
          <div class="eyebrow">JOB FOLDER</div>
          <h1>${esc(customer.full_name)}</h1>
          <div class="addr">${esc(addr || '—')}</div>
        </div>
        <div class="hero-contact">
          ${customer.phone ? `<div><a href="tel:${esc(customer.phone)}">${esc(customer.phone)}</a></div>` : ''}
          ${customer.email ? `<div><a href="mailto:${esc(customer.email)}">${esc(customer.email)}</a></div>` : ''}
          ${customer.ghl_contact_id ? `<div style="margin-top:4px;font-size:0.82em;color:rgba(200,220,255,0.5)">GHL · ${esc(customer.ghl_contact_id.slice(0,10))}...</div>` : ''}
        </div>
      </div>
      <div class="hero-stats">
        <div class="hero-stat"><div class="lbl">Tier</div><div class="val">${(tier||'').toUpperCase()}</div></div>
        <div class="hero-stat"><div class="lbl">Size</div><div class="val">${sq}</div></div>
        <div class="hero-stat"><div class="lbl">Deal Value</div><div class="val">${money(total)}</div></div>
        <div class="hero-stat"><div class="lbl">Work Order</div><div class="val">${activeWo ? 'WO-' + activeWo.wo_number : '—'}</div></div>
        <div class="hero-stat"><div class="lbl">Pay Sheet</div><div class="val">${activePs ? activePs.job_id : '—'}</div></div>
        <div class="hero-stat"><div class="lbl">Start Date</div><div class="val">${activeWo?.start_date || 'TBD'}</div></div>
      </div>
    </div>

    <div class="grid">
      <div class="section">
        <div class="section-head"><div class="title"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> PROPOSAL</div>${primaryEst ? `<div class="meta">PU-${primaryEst.estimate_number}</div>` : ''}</div>
        <div class="section-body">
          ${primaryEst ? `
            <div class="info-row"><div class="label">Tiers</div><div class="value">${Object.entries(primaryEst.calculated_packages || {}).map(([k,v]) => k + ' ' + money(v?.total)).join(' · ') || '—'}</div></div>
            <div class="info-row"><div class="label">Selected</div><div class="value">${(primaryEst.selected_package||'—').toUpperCase()}</div></div>
            <div class="info-row"><div class="label">Status</div><div class="value"><span class="badge ${(primaryEst.status||'draft')==='accepted'?'b-done':(primaryEst.status==='draft'?'b-draft':'b-active')}">${(primaryEst.status||'draft').toUpperCase()}</span></div></div>
            <div class="actions-bar">
              <a class="act cyan" href="/proposal-client.html?share=${esc(primaryEst.share_token)}" target="_blank">VIEW PROPOSAL →</a>
            </div>
          ` : '<div class="empty-sec">NO PROPOSAL YET</div>'}
        </div>
      </div>

      <div class="section">
        <div class="section-head"><div class="title"><svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg> WORK ORDER</div>${activeWo ? `<div class="meta">WO-${activeWo.wo_number}
          <select class="status-pick" onchange="updateWoStatus('${activeWo.id}', this.value)" title="Change WO status">
            ${['draft','issued','in_progress','complete','cancelled'].map(s => `<option value="${s}" ${activeWo.status === s ? 'selected' : ''}>${s.replace('_',' ').toUpperCase()}</option>`).join('')}
          </select>
          <span class="saved-flash" id="woSaved">SAVED ✓</span>
        </div>` : ''}</div>
        <div class="section-body">
          ${activeWo ? `
            <div class="info-row"><div class="label">Crew Lead</div><div class="value">${esc(activeWo.sub_crew_lead || '—')}</div></div>
            <div class="info-row"><div class="label">Start Date</div><div class="value">${activeWo.start_date || 'TBD'}</div></div>
            <div class="info-row"><div class="label">Duration</div><div class="value">${activeWo.estimated_duration_days ? activeWo.estimated_duration_days + ' days' : 'TBD'}</div></div>
            <div class="info-row"><div class="label">Product</div><div class="value">${esc(activeWo.shingle_product || '—')}${activeWo.shingle_color ? ' · ' + esc(activeWo.shingle_color) : ''}</div></div>
            <div class="info-row"><div class="label">Pitch</div><div class="value">${esc(activeWo.roof_pitch || '—')}</div></div>
            <div class="actions-bar">
              <a class="act primary" href="production-workorders.html?wo=${activeWo.wo_number}">OPEN WORK ORDER →</a>
            </div>
          ` : '<div class="empty-sec">NO WORK ORDER YET</div>'}
        </div>
      </div>

      <div class="section">
        <div class="section-head"><div class="title"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg> PAY SHEET</div>${activePs ? `<div class="meta">${esc(activePs.job_id)}
          <select class="status-pick" onchange="updatePsStatus('${activePs.id}', this.value)" title="Change pay sheet status">
            ${['scheduled','in_progress','completed','invoice_final','cancelled'].map(s => `<option value="${s}" ${activePs.status === s ? 'selected' : ''}>${s.replace('_',' ').toUpperCase()}</option>`).join('')}
          </select>
          <span class="saved-flash" id="psSaved">SAVED ✓</span>
        </div>` : ''}</div>
        <div class="section-body">
          ${activePs ? `
            <div class="info-row"><div class="label">Sub</div><div class="value">${esc(activePs.subcontractor || '—')}</div></div>
            <div class="info-row"><div class="label">Subtotal</div><div class="value">${money(activePs.subtotal)}</div></div>
            <div class="info-row"><div class="label">HST</div><div class="value">${money(activePs.hst)}</div></div>
            <div class="info-row"><div class="label">Total Due</div><div class="value" style="color:#fb923c;font-weight:700">${money(activePs.total)}</div></div>
            ${activePs.balance_due ? `<div class="info-row"><div class="label">Balance</div><div class="value" style="color:${Number(activePs.balance_due)>0?'#facc15':'#4ade80'};font-weight:700">${money(activePs.balance_due)}</div></div>` : ''}
            <div class="actions-bar">
              <a class="act primary" href="production-paysheet.html?job=${esc(activePs.job_id || '')}">OPEN PAY SHEET →</a>
            </div>
          ` : '<div class="empty-sec">NO PAY SHEET YET</div>'}
        </div>
      </div>

      <div class="section">
        <div class="section-head"><div class="title"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> GALLERY</div><div class="meta">${photos.length} photo${photos.length===1?'':'s'}</div></div>
        <div class="section-body">
          ${photos.length ? `<div class="gallery">${photos.map(p => `
            <a class="photo" href="${esc(p.url)}" target="_blank">
              <img src="${esc(p.url)}" loading="lazy" alt="${esc(p.caption||'')}"/>
              ${p.caption ? `<div class="cap">${esc(p.caption)}</div>` : ''}
            </a>`).join('')}</div>` : '<div class="empty-sec">NO PHOTOS · upload via proposal builder</div>'}

        <div class="section-body">

              ${esc(s.item)}${s.qty ? ' (' + s.qty + ')' : ''}
            </li>`).join('')}</ul>` : '<div class="empty-sec">NO SCOPE YET · create a work order</div>'}

        <div class="section-body">

  $('stage').innerHTML = html;
}

// WO status → equivalent PS status mapping (keeps the two records in sync)
const WO_TO_PS = {
  'draft': 'scheduled', 'issued': 'scheduled',
  'in_progress': 'in_progress', 'complete': 'completed', 'cancelled': 'cancelled'
};
const PS_TO_WO = {
  'scheduled': 'issued', 'in_progress': 'in_progress',
  'completed': 'complete', 'invoice_final': 'complete', 'cancelled': 'cancelled'
};

async function updateWoStatus(id, status){
  const extras = {};
  if (status === 'complete') extras.completed_at = new Date().toISOString();
  if (status === 'issued') extras.issued_at = new Date().toISOString();
  const r = await fetch('/api/workorders', {
    method: 'PUT',
    headers: {'x-tenant-id':'plus-ultra','Content-Type':'application/json'},
    body: JSON.stringify({ id, status, ...extras })
  });
  if (!r.ok) { alert('WO update failed: HTTP ' + r.status); return; }
  // Also sync linked pay sheet
  const wo = await r.json();
  if (wo.linked_paysheet_id && WO_TO_PS[status]) {
    const psStatus = WO_TO_PS[status];
    const psExtras = {};
    if (psStatus === 'completed') psExtras.completed_date = new Date().toISOString().slice(0,10);
    await fetch('/api/paysheets', {
      method: 'PUT',
      headers: {'x-tenant-id':'plus-ultra','Content-Type':'application/json'},
      body: JSON.stringify({ id: wo.linked_paysheet_id, status: psStatus, ...psExtras })
    });
    // Update the PS dropdown visually too
    const sel = document.querySelector('[onchange^="updatePsStatus"]');
    if (sel) sel.value = psStatus;
  }
  flashSaved('woSaved');
  if (wo.linked_paysheet_id) flashSaved('psSaved');
}

async function updatePsStatus(id, status){
  const extras = {};
  if (status === 'completed') extras.completed_date = new Date().toISOString().slice(0,10);
  if (status === 'invoice_final') extras.invoice_finalized_at = new Date().toISOString();
  const r = await fetch('/api/paysheets', {
    method: 'PUT',
    headers: {'x-tenant-id':'plus-ultra','Content-Type':'application/json'},
    body: JSON.stringify({ id, status, ...extras })
  });
  if (!r.ok) { alert('Pay sheet update failed: HTTP ' + r.status); return; }
  // Find the linked WO (the WO references this paysheet via linked_paysheet_id)
  const woR = await fetch('/api/workorders?limit=100', { headers: {'x-tenant-id':'plus-ultra'} });
  if (woR.ok) {
    const { workorders } = await woR.json();
    const linkedWo = (workorders || []).find(w => w.linked_paysheet_id === id);
    if (linkedWo && PS_TO_WO[status]) {
      const woStatus = PS_TO_WO[status];
      const woExtras = {};
      if (woStatus === 'complete') woExtras.completed_at = new Date().toISOString();
      await fetch('/api/workorders', {
        method: 'PUT',
        headers: {'x-tenant-id':'plus-ultra','Content-Type':'application/json'},
        body: JSON.stringify({ id: linkedWo.id, status: woStatus, ...woExtras })
      });
      const sel = document.querySelector('[onchange^="updateWoStatus"]');
      if (sel) sel.value = woStatus;
      flashSaved('woSaved');
    }
  }
  flashSaved('psSaved');
}
function flashSaved(id){
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), 1500);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); history.back(); } });
loadJob();
