<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow-x:hidden;min-height:100vh}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(251,146,60,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(34,211,238,0.08) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(251,146,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(251,146,60,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}

.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(251,146,60,0.24);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#fb923c,#22d3ee,transparent);opacity:0.55}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #fff;border-radius:10px;color:#030611;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none;transition:all 0.2s}
.btn-back:hover{background:rgba(255,255,255,0.85);box-shadow:0 0 14px rgba(255,255,255,0.35)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.3),rgba(251,146,60,0.22) 40%,rgba(30,10,5,0.8));box-shadow:0 0 14px rgba(251,146,60,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}

.stage{position:relative;z-index:5;padding:80px 28px 60px;max-width:1280px;margin:0 auto}

/* Hero banner (always visible) */
.hero-job{background:linear-gradient(135deg,rgba(14,22,40,0.85),rgba(20,10,6,0.75));border:1px solid rgba(251,146,60,0.25);border-radius:18px;padding:24px 28px;margin-bottom:18px;position:relative;overflow:hidden}
.hero-job::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#fb923c,#22d3ee,transparent);opacity:0.7}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.hero-left .eyebrow{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:#fb923c;letter-spacing:3px;margin-bottom:6px}

.hero-stat{display:flex;flex-direction:column;gap:2px}
.hero-stat .lbl{font-family:'Share Tech Mono',monospace;font-size:0.64em;color:rgba(200,220,255,0.5);letter-spacing:1.5px;text-transform:uppercase}
.hero-stat .val{font-family:'Orbitron',sans-serif;font-size:1em;font-weight:800;color:#fb923c}

/* Accordion sections */
details.acc{background:rgba(14,22,40,0.55);border:1px solid rgba(251,146,60,0.14);border-radius:14px;overflow:hidden;margin-bottom:12px}
details.acc[open]{border-color:rgba(251,146,60,0.28)}
details.acc>summary{list-style:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:rgba(6,10,20,0.55);border-bottom:1px solid rgba(251,146,60,0.1);transition:background 0.15s}

.acc-body{padding:16px 18px}

.badge{display:inline-block;padding:3px 9px;font-family:'Share Tech Mono',monospace;font-size:0.62em;font-weight:700;letter-spacing:1.5px;border-radius:5px}

.b-issued{background:rgba(251,146,60,0.14);color:#fb923c;border:1px solid rgba(251,146,60,0.35)}
.b-active{background:rgba(34,211,238,0.14);color:#22d3ee;border:1px solid rgba(34,211,238,0.35)}
.b-done{background:rgba(74,222,128,0.14);color:#4ade80;border:1px solid rgba(74,222,128,0.35)}

/* Scope */
.scope-list{list-style:none;padding:0;margin-top:10px}

/* Gallery (PR-B replaces with interactive tiles) */

.ptile:hover{border-color:#fb923c}
.ptile:has(.pmenu.on){z-index:20}
.ptile .pthumb{position:absolute;inset:0;cursor:pointer;border-radius:10px;overflow:hidden}
.ptile .pthumb img,.ptile .pthumb video{width:100%;height:100%;object-fit:cover;display:block}
.ptile .badges{position:absolute;top:6px;left:6px;display:flex;gap:4px;flex-wrap:wrap;pointer-events:none}

.ptile .bd.before{color:#fb923c;border-color:rgba(251,146,60,0.5)}
.ptile .bd.after{color:#4ade80;border-color:rgba(74,222,128,0.5)}
.ptile .bd.video{color:#a78bfa;border-color:rgba(167,139,250,0.5)}
.ptile .menu-btn{position:absolute;top:6px;right:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.65);border:1px solid rgba(251,146,60,0.3);border-radius:6px;color:#fb923c;cursor:pointer;font-family:'Inter',system-ui,sans-serif;font-size:1em;line-height:1;padding:0;z-index:2;font-weight:700}

.ptile .pmenu button.danger:hover{background:rgba(248,113,113,0.14);color:#fca5a5}
.ptile .pcap{position:absolute;bottom:0;left:0;right:0;padding:5px 8px;font-family:'Share Tech Mono',monospace;font-size:0.62em;color:#fff;background:rgba(0,0,0,0.78);letter-spacing:0.5px;outline:none;cursor:text}
.ptile .pcap:focus{background:rgba(251,146,60,0.22);color:#fff}
.gallery-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
.gallery-actions .count{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(200,220,255,0.55);letter-spacing:1.2px;margin-left:auto}

/* Info rows */
.info-row{display:grid;grid-template-columns:130px 1fr;gap:12px;padding:6px 0;font-size:0.88em;align-items:baseline}
.info-row .label{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(200,220,255,0.5);letter-spacing:1.2px;text-transform:uppercase}
.info-row .value{color:#e0e6f0}

/* Editable inline controls */
.field-edit{padding:5px 10px;border-radius:6px;background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.28);color:#e0e6f0;font-family:'Inter',system-ui,sans-serif;font-size:0.92em;outline:none;width:100%;max-width:340px;transition:border-color 0.15s}

select.field-edit{cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:0.78em;letter-spacing:1px;text-transform:uppercase}
textarea.field-edit{font-family:'Inter',system-ui,sans-serif;font-size:0.88em;text-transform:none;letter-spacing:0;min-height:60px;resize:vertical;max-width:none}

/* Action buttons */
.actions-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.act{padding:7px 14px;border-radius:9px;font-family:'Orbitron',sans-serif;font-size:0.66em;font-weight:700;letter-spacing:1.5px;text-decoration:none;border:1px solid;cursor:pointer;transition:all 0.2s}
.act.primary{background:rgba(251,146,60,0.14);color:#fb923c;border-color:rgba(251,146,60,0.4)}
.act.primary:hover{background:rgba(251,146,60,0.25);box-shadow:0 0 12px rgba(251,146,60,0.3)}
.act.ghost{background:rgba(6,10,20,0.6);color:rgba(200,220,255,0.7);border-color:rgba(251,146,60,0.18)}
.act.ghost:hover{color:#fb923c;border-color:#fb923c}
.act.cyan{background:rgba(34,211,238,0.12);color:#22d3ee;border-color:rgba(34,211,238,0.35)}
.act.cyan:hover{background:rgba(34,211,238,0.22)}

.status-pick{padding:5px 10px;border-radius:6px;background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.28);color:#e0e6f0;font-family:'Share Tech Mono',monospace;font-size:0.68em;letter-spacing:1.2px;cursor:pointer;outline:none;text-transform:uppercase;margin-left:8px}
.status-pick:hover{border-color:#fb923c}
.status-pick:focus{border-color:#fb923c}
.saved-flash{display:inline-block;margin-left:8px;padding:2px 8px;background:rgba(74,222,128,0.14);border:1px solid rgba(74,222,128,0.4);color:#4ade80;font-family:'Share Tech Mono',monospace;font-size:0.62em;font-weight:700;letter-spacing:1.2px;border-radius:4px;opacity:0;transition:opacity 0.3s}
.saved-flash.on{opacity:1}

.loading{text-align:center;padding:80px;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1.5px}

.acc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:0}
@media (min-width:1024px){.acc-grid{grid-template-columns:1fr 1fr;column-gap:14px}}
</style>

  <div class="loading">LOADING JOB...</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = n => n ? '$' + Number(n).toLocaleString('en-CA',{maximumFractionDigits:0}) : '-';
const DASH = '-';
const TENANT = window.RYUJIN_TENANT_SLUG;

// el() DOM builder. Use instead of template-string innerHTML when emitting
// user-controlled content as live DOM (prevents XSS from data fields).
function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null || v === false) continue;
    if (k === 'class') node.className = v;
    else if (k === 'dataset') Object.assign(node.dataset, v);
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2).toLowerCase(), v);
    else node.setAttribute(k, String(v));
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (Array.isArray(c)) c.forEach(x => node.appendChild(typeof x === 'string' ? document.createTextNode(x) : x));
    else node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return node;
}

// Common authed-fetch helper
function ah() {
  return { 'x-tenant-id': TENANT, ...(window.RyujinAuth ? window.RyujinAuth.headers() : {}) };
}

// Unified save-on-change handler. Validates safe-field allow-list server-side.
async function saveField(table, id, field, value, flashId) {
  if (!id) return;
  const r = await fetch('/api/' + table, {
    method: 'PUT',
    headers: { ...ah(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, [field]: value }),
  });
  if (!r.ok) {
    const msg = await r.text().catch(() => '');
    alert(table + ' update failed: HTTP ' + r.status + (msg ? ' ' + msg.slice(0, 120) : ''));
    return null;
  }
  if (flashId) flashSaved(flashId);
  return r.json().catch(() => null);
}

function flashSaved(id){
  const node = document.getElementById(id);
  if (!node) return;
  node.classList.add('on');
  setTimeout(() => node.classList.remove('on'), 1500);
}

// Cached roster fetched once per page load
let _roster = null;
async function loadRoster(){
  if (_roster) return _roster;
  try {
    const r = await fetch('/api/crew-roster', { headers: ah() });
    if (!r.ok) return { crew: [], subs: [] };
    _roster = await r.json();
  } catch {
    _roster = { crew: [], subs: [] };
  }
  return _roster;
}

// Empty-state picker: no id/share/wo in URL → render a "Pick a job" list
// from recent workorders. Replaces the bare "No customer..." console-error
// string that used to ship in prod. Includes a "+ Create new job" CTA that
// delegates to the global quick-create FAB (assets/quick-create.js).
async function renderJobPicker(){
  $('stage').innerHTML = `
    <div style="max-width:880px;margin:0 auto">
      <div class="hero-job" style="padding:28px">
        <div class="eyebrow" style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:#fb923c;letter-spacing:3px;margin-bottom:8px">PRODUCTION · PICK A JOB</div>
        <h1 style="font-family:'Orbitron',sans-serif;font-size:1.6em;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px">Job Folder</h1>
        <div style="font-size:0.9em;color:rgba(200,220,255,0.62);margin-bottom:16px">Open this page with <code style="color:#22d3ee">?wo=&lt;id&gt;</code> or <code style="color:#22d3ee">?share=&lt;token&gt;</code>, or pick from recent jobs below.</div>
        <button type="button" id="jpNew" style="padding:10px 18px;border-radius:10px;background:linear-gradient(135deg,rgba(45,212,191,0.3),rgba(45,212,191,0.12));border:1px solid rgba(45,212,191,0.55);color:#2dd4bf;font-family:'Orbitron',sans-serif;font-size:0.72em;font-weight:800;letter-spacing:1.3px;cursor:pointer">+ CREATE NEW JOB</button>
        <a href="production-jobs.html" style="margin-left:10px;padding:10px 18px;border-radius:10px;background:transparent;border:1px solid rgba(251,146,60,0.35);color:#fb923c;font-family:'Orbitron',sans-serif;font-size:0.72em;font-weight:800;letter-spacing:1.3px;text-decoration:none;display:inline-block">FULL JOB BOARD →</a>
      </div>
      <div id="jpList" class="gallery" style="grid-template-columns:repeat(auto-fill,minmax(260px,1fr));margin-top:6px"><div class="empty-sec">LOADING RECENT JOBS…</div></div>
    </div>
  `;
  document.getElementById('jpNew').addEventListener('click', () => {
    if (window.RyujinQuickCreate?.actions?.job) window.RyujinQuickCreate.actions.job();
    else if (window.RyujinQuickCreate?.open) window.RyujinQuickCreate.open();
    else alert('Quick-create not loaded yet — open production-jobs.html and use the + NEW button.');
  });
  try {
    const r = await fetch('/api/workorders?limit=24', { headers: ah() });
    if (!r.ok) { document.getElementById('jpList').innerHTML = `<div class="empty-sec">HTTP ${r.status}</div>`; return; }
    const { workorders } = await r.json();
    const rows = (workorders || [])
      .filter(w => w.status !== 'cancelled')
      .sort((a,b) => {
        const sa = a.status === 'in_progress' ? 0 : a.status === 'issued' ? 1 : a.status === 'draft' ? 2 : 3;
        const sb = b.status === 'in_progress' ? 0 : b.status === 'issued' ? 1 : b.status === 'draft' ? 2 : 3;
        if (sa !== sb) return sa - sb;
        return new Date(b.start_date || b.created_at || 0) - new Date(a.start_date || a.created_at || 0);
      })
      .slice(0, 18);
    if (!rows.length) {
      document.getElementById('jpList').innerHTML = `<div class="empty-sec">NO ACTIVE JOBS YET — TAP "+ CREATE NEW JOB"</div>`;
      return;
    }
    document.getElementById('jpList').innerHTML = rows.map(w => {
      const href = w.estimate?.share_token
        ? 'job.html?share=' + encodeURIComponent(w.estimate.share_token)
        : 'job.html?wo=' + encodeURIComponent(w.id);
      const st = (w.status || 'draft').replace('_', ' ').toUpperCase();
      const date = w.start_date
        ? new Date(w.start_date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
        : 'UNSCHEDULED';
      return `

async function loadJob(){
  const params = new URLSearchParams(location.search);
  const custId = params.get('id') || params.get('customer_id');
  const estShare = params.get('share');
  const woParam = params.get('wo');

  if (!custId && !estShare && !woParam) {
    await renderJobPicker();
    return;
  }

  const headers = ah();

  try {
    let customer = null;
    if (custId) {
      const r = await fetch('/api/customers?id=' + encodeURIComponent(custId), { headers });
      if (r.ok) customer = await r.json();
    }

    // ?wo= resolution: prefer workorder.customer_id, fall back to
    // linked_estimate_id -> estimate.customer_id walk.
    if (!customer && woParam) {
      const wR0 = await fetch('/api/workorders?limit=200', { headers });
      const allWos0 = wR0.ok ? (await wR0.json()).workorders || [] : [];
      const matchWo = allWos0.find(w => w.id === woParam);
      let resolvedCustomerId = matchWo?.customer_id || null;
      if (!resolvedCustomerId && matchWo?.linked_estimate_id) {
        const eR = await fetch('/api/estimates?id=' + encodeURIComponent(matchWo.linked_estimate_id), { headers });
        if (eR.ok) {
          const est = await eR.json();
          resolvedCustomerId = est?.customer_id || est?.estimate?.customer_id || null;
        }
      }
      if (resolvedCustomerId) {
        const rC = await fetch('/api/customers?id=' + encodeURIComponent(resolvedCustomerId), { headers });
        if (rC.ok) customer = await rC.json();
      }
    }

    const er = await fetch('/api/estimates?limit=200', { headers });
    const allEstimates = er.ok ? (await er.json()).estimates || [] : [];
    let estimates = customer ? allEstimates.filter(e => e.customer_id === customer.id) : [];
    if (estShare && !estimates.length) {
      const match = allEstimates.find(e => e.share_token === estShare);
      if (match) {
        estimates = [match];
        if (!customer) {
          const r2 = await fetch('/api/customers?id=' + encodeURIComponent(match.customer_id), { headers });
          if (r2.ok) customer = await r2.json();
        }
      }
    }
    if (!customer) { $('stage').innerHTML = '<div class="loading">Customer not found.</div>'; return; }

    const [wR, pR, roster] = await Promise.all([
      fetch('/api/workorders?limit=200', { headers }),
      fetch('/api/paysheets?limit=200', { headers }),
      loadRoster(),
    ]);
    const allWos = wR.ok ? (await wR.json()).workorders || [] : [];
    const allPss = pR.ok ? (await pR.json()).paysheets || [] : [];

    const nameLower = (customer.full_name || '').toLowerCase();
    const lastName = nameLower.split(/\s+/).pop();
    const workorders = allWos.filter(w =>
      (w.customer_name || '').toLowerCase().includes(lastName) ||
      estimates.some(e => e.id === w.linked_estimate_id)
    );
    const paysheets = allPss.filter(p =>
      (p.customer_name || '').toLowerCase().includes(lastName)
    );

    let photos = [];
    const refWo = (woParam && workorders.find(w => w.id === woParam)) || workorders[0];
    if (refWo) {
      try {
        const mR = await fetch('/api/estimate-photos?wo_id=' + encodeURIComponent(refWo.id), { headers });
        if (mR.ok) {
          const { photos: union } = await mR.json();
          photos = union || [];
        }
      } catch { /* fall through */ }
    }
    if (!photos.length) {
      estimates.forEach(e => {
        (e.photos || []).forEach(p => photos.push({ ...p, from: 'est-' + e.estimate_number }));
      });
    }

    render({ customer, estimates, workorders, paysheets, photos, roster });
  } catch(e) {
    $('stage').innerHTML = '<div class="loading">Error: ' + esc(e.message) + '</div>';
  }
}

      if (activeWo && woTarget && currentWoStatus !== woTarget) {
        const woExtras = {};
        if (woTarget === 'complete') woExtras.completed_at = new Date().toISOString();
        await fetch('/api/workorders', {
          method: 'PUT',
          headers: { ...ah(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: activeWo.id, status: woTarget, ...woExtras }),
        });
        if (woSel) woSel.value = woTarget;
        flashSaved('woSaved');
      }
    });
  }

  // Interactive photo gallery + before/after generator link
  const photoMount = document.getElementById('photoMount');
  if (photoMount) {
    renderPhotoGallery(photoMount, photos, activeWo);
  }
  const genBtn = document.getElementById('genBeforeAfterBtn');
  if (genBtn && activeWo) {
    genBtn.addEventListener('click', e => {
      e.preventDefault();
      // PR-C lands /before-after-preview.html; until then this is a fast-fail link.
      window.location.href = '/before-after-preview.html?wo=' + encodeURIComponent(activeWo.id);
    });
  }

  // Topbar expand / collapse
  document.querySelectorAll('details.acc').forEach(d => d._initial = d.open);
  $('expandAllBtn').addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('details.acc').forEach(d => d.open = true);
  });
  $('collapseAllBtn').addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('details.acc').forEach(d => d.open = false);
  });
}

function buildCrewSelect(wo, roster){
  const crew = (roster && roster.crew) || [];
  const sel = el('select', { class: 'field-edit' });
  sel.appendChild(el('option', { value: '' }, 'Unassigned'));
  const current = wo.sub_crew_lead || '';
  let matched = false;
  crew.forEach(u => {
    const opt = el('option', { value: u.name }, u.name + (u.role ? ' (' + u.role + ')' : ''));
    if (current && current.toLowerCase() === (u.name || '').toLowerCase()) {
      opt.selected = true;
      matched = true;
    }
    sel.appendChild(opt);
  });
  // Preserve legacy free-text values that don't match a current user.
  if (!matched && current) {
    const legacy = el('option', { value: current, selected: true }, current + ' (legacy)');
    sel.appendChild(legacy);
  }
  sel.addEventListener('change', async () => {
    await saveField('workorders', wo.id, 'sub_crew_lead', sel.value || null, 'crewSaved');
    const meta = document.getElementById('crewSubMeta');
    if (meta) meta.textContent = sel.value || 'unassigned';
  });
  return sel;
}

function buildSubSelect(wo, roster){
  const subs = (roster && roster.subs) || [];
  const sel = el('select', { class: 'field-edit' });
  sel.appendChild(el('option', { value: '' }, 'In-house / no sub'));
  let matched = false;
  subs.forEach(s => {
    const label = s.company ? s.name + ' (' + s.company + ')' : s.name;
    const opt = el('option', { value: s.id }, label);
    if (wo.subcontractor_id && wo.subcontractor_id === s.id) {
      opt.selected = true;
      matched = true;
    }
    sel.appendChild(opt);
  });
  // Preserve an archived-sub FK so historical assignments are not silently
  // overwritten. /api/crew-roster excludes archived subs (archived_at IS
  // NOT NULL), so when wo.subcontractor_id is set but no active sub matches
  // we surface it as "(archived sub - reassign to change)" with the FK
  // intact. Picking another option saves the new sub; picking In-house
  // clears the FK.
  if (!matched && wo.subcontractor_id) {
    const legacy = el('option', { value: wo.subcontractor_id, selected: true },
      'Archived sub (reassign to change)');
    sel.appendChild(legacy);
  }
  sel.addEventListener('change', async () => {
    await saveField('workorders', wo.id, 'subcontractor_id', sel.value || null, 'crewSaved');
  });
  return sel;
}

// -----------------------------------------------------------------
// Photo gallery (PR-B) - interactive tiles backed by estimate_photos
// and project_files. Live DOM, XSS-safe (el() builder, textContent
// only). Mutating ops branch on row.source.
// -----------------------------------------------------------------
const CANONICAL_CAPTIONS = new Set(['before', 'after', 'cover', 'cover_video', '']);

function photoRole(p) {
  const cat = String(p.category || '').toLowerCase();
  const cap = String(p.caption || '').toLowerCase();
  if (cat === 'before' || cap === 'before') return 'before';
  if (cat === 'after' || cap === 'after') return 'after';
  return null;
}

function isVideo(p) {
  return typeof p.mime_type === 'string' && p.mime_type.startsWith('video/');
}

// PATCH/PUT a photo. Branches on source (estimate_photos vs project_files).
async function patchPhoto(p, body) {
  if (p.source === 'estimate_photos') {
    const r = await fetch('/api/estimate-photos?id=' + encodeURIComponent(p.id), {
      method: 'PATCH',
      headers: { ...ah(), 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error('estimate-photos PATCH failed: HTTP ' + r.status);
    const data = await r.json();
    return data.photo || data;
  }
  if (p.source === 'project_files') {
    const r = await fetch('/api/files', {
      method: 'PUT',
      headers: { ...ah(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: p.id, ...body }),
    });
    if (!r.ok) throw new Error('files PUT failed: HTTP ' + r.status);
    return r.json();
  }
  throw new Error('Unknown photo source: ' + p.source);
}

async function deletePhoto(p) {
  const path = p.source === 'project_files' ? '/api/files' : '/api/estimate-photos';
  const r = await fetch(path + '?id=' + encodeURIComponent(p.id), {
    method: 'DELETE',
    headers: ah(),
  });
  if (!r.ok) throw new Error('DELETE failed: HTTP ' + r.status);
  return r.json();
}

function renderPhotoGallery(mount, photos, refWo) {
  mount.innerHTML = '';
  const countEl = document.getElementById('photoCount');
  const mixEl = document.getElementById('photoMix');

  if (!photos || !photos.length) {
    mount.appendChild(el('div', { class: 'empty-sec' },
      'NO PHOTOS OR VIDEOS / upload via crew portal or proposal builder'));
    if (countEl) countEl.textContent = '0 items';
    if (mixEl) mixEl.textContent = 'no media';
    const genBtn = document.getElementById('genBeforeAfterBtn');
    if (genBtn) genBtn.style.opacity = '0.4';
    return;
  }

  const grid = el('div', { class: 'gallery' });
  const state = photos.map(p => ({ ...p })); // local mutable copy

  state.forEach(p => grid.appendChild(buildTile(p, refWo, state)));
  mount.appendChild(grid);

  updateGalleryMeta(state);
}

function updateGalleryMeta(state) {
  const countEl = document.getElementById('photoCount');
  const mixEl = document.getElementById('photoMix');
  if (countEl) countEl.textContent = state.length + ' item' + (state.length === 1 ? '' : 's');
  const before = state.filter(p => photoRole(p) === 'before').length;
  const after = state.filter(p => photoRole(p) === 'after').length;
  const cover = state.filter(p => p.is_cover).length;
  if (mixEl) mixEl.textContent = before + ' before / ' + after + ' after / ' + cover + ' cover';
  const genBtn = document.getElementById('genBeforeAfterBtn');
  if (genBtn) {
    const enabled = before > 0 && after > 0;
    genBtn.style.opacity = enabled ? '1' : '0.4';
    genBtn.title = enabled
      ? 'Generate a side-by-side post from the marked before + after'
      : 'Mark at least one before AND one after to enable';
  }
}

function buildTile(p, refWo, state) {
  const tile = el('div', { class: 'ptile', dataset: { id: p.id, source: p.source || '' } });
  const thumbWrap = el('div', { class: 'pthumb' });

  if (isVideo(p)) {
    thumbWrap.appendChild(el('video', { src: p.url, preload: 'metadata', muted: 'true', playsinline: 'true' }));
  } else {
    thumbWrap.appendChild(el('img', { src: p.url, loading: 'lazy', alt: p.caption || '' }));
  }
  thumbWrap.addEventListener('click', () => window.open(p.url, '_blank', 'noopener,noreferrer'));
  tile.appendChild(thumbWrap);

  // Badges
  const badges = el('div', { class: 'badges' });
  if (p.is_cover) badges.appendChild(el('span', { class: 'bd cover' }, 'COVER'));
  const role = photoRole(p);
  if (role === 'before') badges.appendChild(el('span', { class: 'bd before' }, 'BEFORE'));
  if (role === 'after') badges.appendChild(el('span', { class: 'bd after' }, 'AFTER'));
  if (isVideo(p)) badges.appendChild(el('span', { class: 'bd video' }, 'VIDEO'));
  tile.appendChild(badges);

  // Menu button + dropdown
  const menuBtn = el('button', { class: 'menu-btn', type: 'button', title: 'Photo actions' }, '⋮');
  tile.appendChild(menuBtn);
  const menu = el('div', { class: 'pmenu' });
  const actions = [
    { label: 'View original', action: 'view' },
    { label: p.is_cover ? 'Unset cover' : 'Set as cover', action: 'cover' },
    { label: role === 'before' ? 'Unmark before' : 'Mark as before', action: 'before' },
    { label: role === 'after' ? 'Unmark after' : 'Mark as after', action: 'after' },
    { label: 'Delete photo', action: 'delete', danger: true },
  ];
  actions.forEach(a => {
    const b = el('button', { type: 'button', class: a.danger ? 'danger' : '' }, a.label);
    b.addEventListener('click', async ev => {
      ev.stopPropagation();
      menu.classList.remove('on');
      await handleAction(a.action, p, tile, state);
    });
    menu.appendChild(b);
  });
  tile.appendChild(menu);

  menuBtn.addEventListener('click', ev => {
    ev.stopPropagation();
    document.querySelectorAll('.ptile .pmenu.on').forEach(m => { if (m !== menu) m.classList.remove('on'); });
    menu.classList.toggle('on');
  });

  // Caption (contenteditable on click)
  const cap = el('div', {
    class: 'pcap',
    contenteditable: 'true',
    spellcheck: 'false',
    title: 'Click to edit caption',
  });
  cap.textContent = p.caption || '';
  let originalCaption = p.caption || '';
  cap.addEventListener('focus', () => { originalCaption = cap.textContent; });
  cap.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); cap.blur(); }
    if (e.key === 'Escape') { cap.textContent = originalCaption; cap.blur(); }
  });
  cap.addEventListener('blur', async () => {
    const newCap = cap.textContent.trim();
    if (newCap === originalCaption) return;
    // Block overwriting a canonical role caption with free text via this control;
    // role changes go through the menu so they update category + caption together.
    if (CANONICAL_CAPTIONS.has(newCap.toLowerCase())) {
      cap.textContent = originalCaption;
      alert('Use the actions menu to change BEFORE / AFTER / COVER markers.');
      return;
    }
    try {
      await patchPhoto(p, { caption: newCap });
      p.caption = newCap;
      originalCaption = newCap;
    } catch (e) {
      alert(e.message);
      cap.textContent = originalCaption;
    }
  });
  tile.appendChild(cap);

  return tile;
}

async function handleAction(action, p, tile, state) {
  try {
    if (action === 'view') {
      window.open(p.url, '_blank', 'noopener,noreferrer');
      return;
    }
    if (action === 'cover') {
      const next = !p.is_cover;
      await patchPhoto(p, { is_cover: next });
      // Reflect single-cover constraint locally.
      if (next) state.forEach(o => { if (o.id !== p.id) o.is_cover = false; });
      p.is_cover = next;
      // Re-render the whole grid because cover affects every tile.
      const mount = document.getElementById('photoMount');
      if (mount) renderPhotoGallery(mount, state, null);
      return;
    }
    if (action === 'before' || action === 'after') {
      const currentRole = photoRole(p);
      const toggleOff = currentRole === action;
      const value = toggleOff ? null : action;
      // estimate_photos: set both category + caption (defensive: legacy reads
      // looked at caption, newer code reads category). project_files: category only.
      const body = p.source === 'project_files'
        ? { category: value || 'general' }
        : { category: value || 'general', caption: value || '' };
      await patchPhoto(p, body);
      if (p.source === 'project_files') {
        p.category = value || 'general';
      } else {
        p.category = value || 'general';
        p.caption = value || '';
      }
      replaceTile(tile, p, state);
      updateGalleryMeta(state);
      return;
    }
    if (action === 'delete') {
      if (!confirm('Delete this photo permanently? The file will be removed from storage too.')) return;
      await deletePhoto(p);
      const idx = state.findIndex(o => o.id === p.id);
      if (idx >= 0) state.splice(idx, 1);
      tile.remove();
      updateGalleryMeta(state);
      return;
    }
  } catch (e) {
    alert(e.message);
  }
}

function replaceTile(tile, p, state) {
  const fresh = buildTile(p, null, state);
  tile.parentNode.replaceChild(fresh, tile);
}

// Close any open photo menu when clicking outside.
document.addEventListener('click', () => {
  document.querySelectorAll('.ptile .pmenu.on').forEach(m => m.classList.remove('on'));
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); history.back(); } });
loadJob();
