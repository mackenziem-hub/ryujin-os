<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Job Folder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow-x:hidden;min-height:100vh}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(251,146,60,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(34,211,238,0.08) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(251,146,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(251,146,60,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}

.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(251,146,60,0.24);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#fb923c,#22d3ee,transparent);opacity:0.55}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #fff;border-radius:10px;color:#030611;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none;transition:all 0.2s}
.btn-back:hover{background:rgba(255,255,255,0.85);box-shadow:0 0 14px rgba(255,255,255,0.35)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.3),rgba(251,146,60,0.22) 40%,rgba(30,10,5,0.8));box-shadow:0 0 14px rgba(251,146,60,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}
.tb-controls{display:flex;gap:6px;align-items:center}
.tb-btn{padding:6px 12px;background:rgba(34,211,238,0.12);border:1px solid rgba(34,211,238,0.35);border-radius:8px;color:#22d3ee;font-family:'Share Tech Mono',monospace;font-size:0.66em;letter-spacing:1.2px;cursor:pointer;text-decoration:none}
.tb-btn:hover{background:rgba(34,211,238,0.22)}

.stage{position:relative;z-index:5;padding:80px 28px 60px;max-width:1280px;margin:0 auto}

/* Hero banner (always visible) */
.hero-job{background:linear-gradient(135deg,rgba(14,22,40,0.85),rgba(20,10,6,0.75));border:1px solid rgba(251,146,60,0.25);border-radius:18px;padding:24px 28px;margin-bottom:18px;position:relative;overflow:hidden}
.hero-job::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#fb923c,#22d3ee,transparent);opacity:0.7}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.hero-left .eyebrow{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:#fb923c;letter-spacing:3px;margin-bottom:6px}
.hero-left h1{font-family:'Orbitron',sans-serif;font-size:2em;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.hero-left .addr{font-family:'Share Tech Mono',monospace;font-size:0.86em;color:rgba(200,220,255,0.72);letter-spacing:1px}
.hero-contact{text-align:right;font-size:0.85em;color:rgba(200,220,255,0.7);line-height:1.6;font-family:'Share Tech Mono',monospace;letter-spacing:0.5px}
.hero-contact a{color:#22d3ee;text-decoration:none}
.hero-contact a:hover{color:#67e8f9}
.hero-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;padding-top:14px;border-top:1px solid rgba(251,146,60,0.12)}
.hero-stat{display:flex;flex-direction:column;gap:2px}
.hero-stat .lbl{font-family:'Share Tech Mono',monospace;font-size:0.64em;color:rgba(200,220,255,0.5);letter-spacing:1.5px;text-transform:uppercase}
.hero-stat .val{font-family:'Orbitron',sans-serif;font-size:1em;font-weight:800;color:#fb923c}

/* Accordion sections */
details.acc{background:rgba(14,22,40,0.55);border:1px solid rgba(251,146,60,0.14);border-radius:14px;overflow:hidden;margin-bottom:12px}
details.acc[open]{border-color:rgba(251,146,60,0.28)}
details.acc>summary{list-style:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:rgba(6,10,20,0.55);border-bottom:1px solid rgba(251,146,60,0.1);transition:background 0.15s}
details.acc>summary::-webkit-details-marker{display:none}
details.acc>summary:hover{background:rgba(6,10,20,0.78)}
details.acc>summary .title{font-family:'Orbitron',sans-serif;font-size:0.8em;font-weight:800;letter-spacing:2px;color:#fb923c;display:flex;align-items:center;gap:8px}
details.acc>summary .title svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
details.acc>summary .meta{font-family:'Share Tech Mono',monospace;font-size:0.68em;color:rgba(200,220,255,0.55);letter-spacing:1.2px;display:flex;align-items:center;gap:10px}
details.acc>summary .meta a{color:#22d3ee;text-decoration:none}
details.acc>summary .chev{width:14px;height:14px;stroke:#fb923c;fill:none;stroke-width:2.4;transition:transform 0.2s;margin-left:6px}
details.acc[open]>summary .chev{transform:rotate(90deg)}
.acc-body{padding:16px 18px}
.empty-sec{padding:28px 18px;text-align:center;color:rgba(200,220,255,0.35);font-family:'Share Tech Mono',monospace;font-size:0.72em;letter-spacing:1.5px}

.badge{display:inline-block;padding:3px 9px;font-family:'Share Tech Mono',monospace;font-size:0.62em;font-weight:700;letter-spacing:1.5px;border-radius:5px}
.b-draft{background:rgba(148,163,184,0.14);color:#94a3b8;border:1px solid rgba(148,163,184,0.3)}
.b-issued{background:rgba(251,146,60,0.14);color:#fb923c;border:1px solid rgba(251,146,60,0.35)}
.b-active{background:rgba(34,211,238,0.14);color:#22d3ee;border:1px solid rgba(34,211,238,0.35)}
.b-done{background:rgba(74,222,128,0.14);color:#4ade80;border:1px solid rgba(74,222,128,0.35)}

/* Scope */
.scope-list{list-style:none;padding:0;margin-top:10px}
.scope-list li{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:0.88em}
.scope-list li .chk{width:14px;height:14px;border-radius:4px;display:flex;align-items:center;justify-content:center;background:rgba(74,222,128,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.35);flex-shrink:0}
.scope-list li .chk svg{width:9px;height:9px;stroke:currentColor;fill:none;stroke-width:3}
.scope-list li.off{color:rgba(200,220,255,0.35);text-decoration:line-through}
.scope-list li.off .chk{background:rgba(200,220,255,0.05);color:rgba(200,220,255,0.3);border-color:rgba(200,220,255,0.15)}

/* Gallery (PR-B replaces with interactive tiles) */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.gallery .photo{aspect-ratio:4/3;border-radius:8px;overflow:hidden;background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.1);cursor:pointer;transition:all 0.15s;position:relative}
.gallery .photo:hover{border-color:#fb923c;transform:scale(1.02)}
.gallery .photo img,.gallery .photo video{width:100%;height:100%;object-fit:cover;display:block}
.gallery .photo .cap{position:absolute;bottom:0;left:0;right:0;padding:4px 8px;font-family:'Share Tech Mono',monospace;font-size:0.62em;color:#fff;background:rgba(0,0,0,0.7);letter-spacing:0.5px}
.gallery .photo .play-badge{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.65);color:#22d3ee;font-family:'Share Tech Mono',monospace;font-size:0.62em;letter-spacing:1.2px;padding:2px 7px;border-radius:4px;border:1px solid rgba(34,211,238,0.4);pointer-events:none}

/* Info rows */
.info-row{display:grid;grid-template-columns:130px 1fr;gap:12px;padding:6px 0;font-size:0.88em;align-items:baseline}
.info-row .label{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(200,220,255,0.5);letter-spacing:1.2px;text-transform:uppercase}
.info-row .value{color:#e0e6f0}

/* Editable inline controls */
.field-edit{padding:5px 10px;border-radius:6px;background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.28);color:#e0e6f0;font-family:'Inter',system-ui,sans-serif;font-size:0.92em;outline:none;width:100%;max-width:340px;transition:border-color 0.15s}
.field-edit:hover,.field-edit:focus{border-color:#fb923c}
select.field-edit{cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:0.78em;letter-spacing:1px;text-transform:uppercase}
textarea.field-edit{font-family:'Inter',system-ui,sans-serif;font-size:0.88em;text-transform:none;letter-spacing:0;min-height:60px;resize:vertical;max-width:none}

/* Action buttons */
.actions-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.act{padding:7px 14px;border-radius:9px;font-family:'Orbitron',sans-serif;font-size:0.66em;font-weight:700;letter-spacing:1.5px;text-decoration:none;border:1px solid;cursor:pointer;transition:all 0.2s}
.act.primary{background:rgba(251,146,60,0.14);color:#fb923c;border-color:rgba(251,146,60,0.4)}
.act.primary:hover{background:rgba(251,146,60,0.25);box-shadow:0 0 12px rgba(251,146,60,0.3)}
.act.ghost{background:rgba(6,10,20,0.6);color:rgba(200,220,255,0.7);border-color:rgba(251,146,60,0.18)}
.act.ghost:hover{color:#fb923c;border-color:#fb923c}
.act.cyan{background:rgba(34,211,238,0.12);color:#22d3ee;border-color:rgba(34,211,238,0.35)}
.act.cyan:hover{background:rgba(34,211,238,0.22)}

.status-pick{padding:5px 10px;border-radius:6px;background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.28);color:#e0e6f0;font-family:'Share Tech Mono',monospace;font-size:0.68em;letter-spacing:1.2px;cursor:pointer;outline:none;text-transform:uppercase;margin-left:8px}
.status-pick:hover{border-color:#fb923c}
.status-pick:focus{border-color:#fb923c}
.saved-flash{display:inline-block;margin-left:8px;padding:2px 8px;background:rgba(74,222,128,0.14);border:1px solid rgba(74,222,128,0.4);color:#4ade80;font-family:'Share Tech Mono',monospace;font-size:0.62em;font-weight:700;letter-spacing:1.2px;border-radius:4px;opacity:0;transition:opacity 0.3s}
.saved-flash.on{opacity:1}

.loading{text-align:center;padding:80px;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1.5px}

.acc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:0}
@media (min-width:1024px){.acc-grid{grid-template-columns:1fr 1fr;column-gap:14px}}
</style>

<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="btn-back" href="production-jobs.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> BACK</a>
  <div style="display:flex;align-items:center;gap:10px"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· JOB FOLDER</span></div></div>
  <div class="tb-spacer"></div>
  <div class="tb-controls">
    <a class="tb-btn" id="expandAllBtn" href="#">EXPAND ALL</a>
    <a class="tb-btn" id="collapseAllBtn" href="#">COLLAPSE</a>
  </div>
  <div id="jobStatus" style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px">-</div>
</div>

<div class="stage" id="stage">
  <div class="loading">LOADING JOB...</div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = n => n ? '$' + Number(n).toLocaleString('en-CA',{maximumFractionDigits:0}) : '-';
const DASH = '-';
const TENANT = 'plus-ultra';

// el() DOM builder. Use instead of template-string innerHTML when emitting
// user-controlled content as live DOM (prevents XSS from data fields).
function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null || v === false) continue;
    if (k === 'class') node.className = v;
    else if (k === 'dataset') Object.assign(node.dataset, v);
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2).toLowerCase(), v);
    else node.setAttribute(k, String(v));
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (Array.isArray(c)) c.forEach(x => node.appendChild(typeof x === 'string' ? document.createTextNode(x) : x));
    else node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return node;
}

// Common authed-fetch helper
function ah() {
  return { 'x-tenant-id': TENANT, ...(window.RyujinAuth ? window.RyujinAuth.headers() : {}) };
}

// Unified save-on-change handler. Validates safe-field allow-list server-side.
async function saveField(table, id, field, value, flashId) {
  if (!id) return;
  const r = await fetch('/api/' + table, {
    method: 'PUT',
    headers: { ...ah(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, [field]: value }),
  });
  if (!r.ok) {
    const msg = await r.text().catch(() => '');
    alert(table + ' update failed: HTTP ' + r.status + (msg ? ' ' + msg.slice(0, 120) : ''));
    return null;
  }
  if (flashId) flashSaved(flashId);
  return r.json().catch(() => null);
}

function flashSaved(id){
  const node = document.getElementById(id);
  if (!node) return;
  node.classList.add('on');
  setTimeout(() => node.classList.remove('on'), 1500);
}

// Cached roster fetched once per page load
let _roster = null;
async function loadRoster(){
  if (_roster) return _roster;
  try {
    const r = await fetch('/api/crew-roster', { headers: ah() });
    if (!r.ok) return { crew: [], subs: [] };
    _roster = await r.json();
  } catch {
    _roster = { crew: [], subs: [] };
  }
  return _roster;
}

async function loadJob(){
  const params = new URLSearchParams(location.search);
  const custId = params.get('id') || params.get('customer_id');
  const estShare = params.get('share');
  const woParam = params.get('wo');

  if (!custId && !estShare && !woParam) {
    $('stage').innerHTML = '<div class="loading">No customer, share token, or workorder id passed.</div>';
    return;
  }

  const headers = ah();

  try {
    let customer = null;
    if (custId) {
      const r = await fetch('/api/customers?id=' + encodeURIComponent(custId), { headers });
      if (r.ok) customer = await r.json();
    }

    // ?wo= resolution: prefer workorder.customer_id, fall back to
    // linked_estimate_id -> estimate.customer_id walk.
    if (!customer && woParam) {
      const wR0 = await fetch('/api/workorders?limit=200', { headers });
      const allWos0 = wR0.ok ? (await wR0.json()).workorders || [] : [];
      const matchWo = allWos0.find(w => w.id === woParam);
      let resolvedCustomerId = matchWo?.customer_id || null;
      if (!resolvedCustomerId && matchWo?.linked_estimate_id) {
        const eR = await fetch('/api/estimates?id=' + encodeURIComponent(matchWo.linked_estimate_id), { headers });
        if (eR.ok) {
          const est = await eR.json();
          resolvedCustomerId = est?.customer_id || est?.estimate?.customer_id || null;
        }
      }
      if (resolvedCustomerId) {
        const rC = await fetch('/api/customers?id=' + encodeURIComponent(resolvedCustomerId), { headers });
        if (rC.ok) customer = await rC.json();
      }
    }

    const er = await fetch('/api/estimates?limit=200', { headers });
    const allEstimates = er.ok ? (await er.json()).estimates || [] : [];
    let estimates = customer ? allEstimates.filter(e => e.customer_id === customer.id) : [];
    if (estShare && !estimates.length) {
      const match = allEstimates.find(e => e.share_token === estShare);
      if (match) {
        estimates = [match];
        if (!customer) {
          const r2 = await fetch('/api/customers?id=' + encodeURIComponent(match.customer_id), { headers });
          if (r2.ok) customer = await r2.json();
        }
      }
    }
    if (!customer) { $('stage').innerHTML = '<div class="loading">Customer not found.</div>'; return; }

    const [wR, pR, roster] = await Promise.all([
      fetch('/api/workorders?limit=200', { headers }),
      fetch('/api/paysheets?limit=200', { headers }),
      loadRoster(),
    ]);
    const allWos = wR.ok ? (await wR.json()).workorders || [] : [];
    const allPss = pR.ok ? (await pR.json()).paysheets || [] : [];

    const nameLower = (customer.full_name || '').toLowerCase();
    const lastName = nameLower.split(/\s+/).pop();
    const workorders = allWos.filter(w =>
      (w.customer_name || '').toLowerCase().includes(lastName) ||
      estimates.some(e => e.id === w.linked_estimate_id)
    );
    const paysheets = allPss.filter(p =>
      (p.customer_name || '').toLowerCase().includes(lastName)
    );

    let photos = [];
    const refWo = (woParam && workorders.find(w => w.id === woParam)) || workorders[0];
    if (refWo) {
      try {
        const mR = await fetch('/api/estimate-photos?wo_id=' + encodeURIComponent(refWo.id), { headers });
        if (mR.ok) {
          const { photos: union } = await mR.json();
          photos = union || [];
        }
      } catch { /* fall through */ }
    }
    if (!photos.length) {
      estimates.forEach(e => {
        (e.photos || []).forEach(p => photos.push({ ...p, from: 'est-' + e.estimate_number }));
      });
    }

    render({ customer, estimates, workorders, paysheets, photos, roster });
  } catch(e) {
    $('stage').innerHTML = '<div class="loading">Error: ' + esc(e.message) + '</div>';
  }
}

function render({ customer, estimates, workorders, paysheets, photos, roster }){
  const primaryEst = estimates.sort((a,b) => (b.estimate_number||0) - (a.estimate_number||0))[0];
  const activeWo = workorders.find(w => ['in_progress','issued'].includes(w.status)) || workorders[0];
  const activePs = paysheets[0];
  const addr = [customer.address, customer.city, customer.province].filter(Boolean).join(', ');
  const pkg = primaryEst?.calculated_packages?.[primaryEst?.selected_package || 'gold'] || null;
  const tier = primaryEst?.selected_package || activeWo?.package_tier || DASH;
  const sq = primaryEst?.roof_area_sqft ? (primaryEst.roof_area_sqft / 100).toFixed(1) + ' SQ' :
             (activeWo?.total_sq ? activeWo.total_sq + ' SQ' : DASH);
  const total = pkg?.total || 0;
  const statusWo = activeWo?.status || 'no-wo';

  $('jobStatus').textContent = statusWo.toUpperCase().replace('_',' ');

  // Hero
  const hero = `
    <div class="hero-job">
      <div class="hero-top">
        <div class="hero-left">
          <div class="eyebrow">JOB FOLDER</div>
          <h1>${esc(customer.full_name)}</h1>
          <div class="addr">${esc(addr || DASH)}</div>
        </div>
        <div class="hero-contact">
          ${customer.phone ? `<div><a href="tel:${esc(customer.phone)}">${esc(customer.phone)}</a></div>` : ''}
          ${customer.email ? `<div><a href="mailto:${esc(customer.email)}">${esc(customer.email)}</a></div>` : ''}
          ${customer.ghl_contact_id ? `<div style="margin-top:4px;font-size:0.82em;color:rgba(200,220,255,0.5)">GHL ${esc(customer.ghl_contact_id.slice(0,10))}...</div>` : ''}
        </div>
      </div>
      <div class="hero-stats">
        <div class="hero-stat"><div class="lbl">Tier</div><div class="val">${(tier||'').toUpperCase()}</div></div>
        <div class="hero-stat"><div class="lbl">Size</div><div class="val">${sq}</div></div>
        <div class="hero-stat"><div class="lbl">Deal Value</div><div class="val">${money(total)}</div></div>
        <div class="hero-stat"><div class="lbl">Work Order</div><div class="val">${activeWo ? 'WO-' + activeWo.wo_number : DASH}</div></div>
        <div class="hero-stat"><div class="lbl">Pay Sheet</div><div class="val">${activePs ? esc(activePs.job_id) : DASH}</div></div>
        <div class="hero-stat"><div class="lbl">Start Date</div><div class="val">${activeWo?.start_date || 'TBD'}</div></div>
      </div>
    </div>
  `;

  // The bulk of each accordion's read-only body is built as a template-string
  // for brevity; user-controlled values run through esc() before injection.
  // Editable controls are appended as DOM nodes via el() (see post-render
  // wiring at the bottom of this function).
  const sections = [];

  // 1. CUSTOMER
  sections.push(`
    <details class="acc" open data-section="customer">
      <summary>
        <div class="title"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> CUSTOMER</div>
        <div class="meta"><span>${esc(customer.full_name || '')}</span><svg class="chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </summary>
      <div class="acc-body">
        <div class="info-row"><div class="label">Name</div><div class="value">${esc(customer.full_name || DASH)}</div></div>
        <div class="info-row"><div class="label">Address</div><div class="value">${esc(addr || DASH)}</div></div>
        <div class="info-row"><div class="label">Phone</div><div class="value">${customer.phone ? `<a href="tel:${esc(customer.phone)}" style="color:#22d3ee;text-decoration:none">${esc(customer.phone)}</a>` : DASH}</div></div>
        <div class="info-row"><div class="label">Email</div><div class="value">${customer.email ? `<a href="mailto:${esc(customer.email)}" style="color:#22d3ee;text-decoration:none">${esc(customer.email)}</a>` : DASH}</div></div>
        ${customer.ghl_contact_id ? `<div class="info-row"><div class="label">GHL ID</div><div class="value" style="font-family:'Share Tech Mono',monospace;font-size:0.78em">${esc(customer.ghl_contact_id)}</div></div>` : ''}
      </div>
    </details>
  `);

  // 2. ESTIMATE
  sections.push(`
    <details class="acc" open data-section="estimate">
      <summary>
        <div class="title"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> ESTIMATE</div>
        <div class="meta"><span>${primaryEst ? 'PU-' + primaryEst.estimate_number : 'NONE'}</span><svg class="chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </summary>
      <div class="acc-body">
        ${primaryEst ? `
          <div class="info-row"><div class="label">Tiers</div><div class="value">${Object.entries(primaryEst.calculated_packages || {}).map(([k,v]) => k + ' ' + money(v?.total)).join(' / ') || DASH}</div></div>
          <div class="info-row"><div class="label">Selected</div><div class="value">${(primaryEst.selected_package||DASH).toUpperCase()}</div></div>
          <div class="info-row"><div class="label">Status</div><div class="value"><span class="badge ${(primaryEst.status||'draft')==='accepted'?'b-done':(primaryEst.status==='draft'?'b-draft':'b-active')}">${(primaryEst.status||'draft').toUpperCase()}</span></div></div>
          <div class="actions-bar">
            <a class="act cyan" href="/proposal-client.html?share=${esc(primaryEst.share_token)}" target="_blank">VIEW PROPOSAL</a>
          </div>
        ` : '<div class="empty-sec">NO ESTIMATE YET</div>'}
      </div>
    </details>
  `);

  // 3. CREW & SUB (editable)
  sections.push(`
    <details class="acc" open data-section="crew-sub">
      <summary>
        <div class="title"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg> CREW &amp; SUB</div>
        <div class="meta"><span id="crewSubMeta">${esc(activeWo?.sub_crew_lead || (activeWo?.subcontractor_id ? 'sub assigned' : 'unassigned'))}</span> <span class="saved-flash" id="crewSaved">SAVED</span><svg class="chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </summary>
      <div class="acc-body" id="crewSubBody">
        ${activeWo ? `
          <div class="info-row"><div class="label">Crew Lead</div><div class="value" id="crewLeadCell"></div></div>
          <div class="info-row"><div class="label">Subcontractor</div><div class="value" id="subCell"></div></div>
          <div style="margin-top:8px;font-size:0.74em;color:rgba(200,220,255,0.45);font-family:'Share Tech Mono',monospace;letter-spacing:1px">Changes save automatically. Crew Lead pulls from active users (role=crew). Subs from active subcontractors.</div>
        ` : '<div class="empty-sec">CREATE A WORK ORDER TO ASSIGN CREW</div>'}
      </div>
    </details>
  `);

  // 4. WORKORDER
  sections.push(`
    <details class="acc" open data-section="workorder">
      <summary>
        <div class="title"><svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg> WORK ORDER</div>
        <div class="meta">${activeWo ? `<span>WO-${activeWo.wo_number}</span> <select class="status-pick" id="woStatusPick" title="Change WO status">${['draft','issued','in_progress','complete','cancelled'].map(s => `<option value="${s}" ${activeWo.status === s ? 'selected' : ''}>${s.replace('_',' ').toUpperCase()}</option>`).join('')}</select> <span class="saved-flash" id="woSaved">SAVED</span>` : '<span>NONE</span>'}<svg class="chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </summary>
      <div class="acc-body">
        ${activeWo ? `
          <div class="info-row"><div class="label">Start Date</div><div class="value">${activeWo.start_date || 'TBD'}</div></div>
          <div class="info-row"><div class="label">Duration</div><div class="value">${activeWo.estimated_duration_days ? activeWo.estimated_duration_days + ' days' : 'TBD'}</div></div>
          <div class="info-row"><div class="label">Product</div><div class="value">${esc(activeWo.shingle_product || DASH)}${activeWo.shingle_color ? ' / ' + esc(activeWo.shingle_color) : ''}</div></div>
          <div class="info-row"><div class="label">Pitch</div><div class="value">${esc(activeWo.roof_pitch || DASH)}</div></div>
          ${activeWo.scope_items?.length ? `<div style="margin-top:14px;font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(200,220,255,0.5);letter-spacing:1.2px;text-transform:uppercase">Scope</div><ul class="scope-list">${activeWo.scope_items.map(s => `<li class="${s.included ? '' : 'off'}"><span class="chk"><svg viewBox="0 0 24 24">${s.included ? '<polyline points="20 6 9 17 4 12"/>' : '<line x1="5" y1="12" x2="19" y2="12"/>'}</svg></span>${esc(s.item)}${s.qty ? ' (' + s.qty + ')' : ''}</li>`).join('')}</ul>` : ''}
          <div class="actions-bar">
            <a class="act primary" href="production-workorders.html?wo=${activeWo.wo_number}">OPEN FULL EDITOR</a>
          </div>
        ` : '<div class="empty-sec">NO WORK ORDER YET</div>'}
      </div>
    </details>
  `);

  // 5. PAYSHEET
  sections.push(`
    <details class="acc" open data-section="paysheet">
      <summary>
        <div class="title"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg> PAY SHEET</div>
        <div class="meta">${activePs ? `<span>${esc(activePs.job_id || '')}</span> <select class="status-pick" id="psStatusPick" title="Change pay sheet status">${['scheduled','in_progress','completed','invoice_final','cancelled'].map(s => `<option value="${s}" ${activePs.status === s ? 'selected' : ''}>${s.replace('_',' ').toUpperCase()}</option>`).join('')}</select> <span class="saved-flash" id="psSaved">SAVED</span>` : '<span>NONE</span>'}<svg class="chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </summary>
      <div class="acc-body">
        ${activePs ? `
          <div class="info-row"><div class="label">Subtotal</div><div class="value">${money(activePs.subtotal)}</div></div>
          <div class="info-row"><div class="label">HST</div><div class="value">${money(activePs.hst)}</div></div>
          <div class="info-row"><div class="label">Total Due</div><div class="value" style="color:#fb923c;font-weight:700">${money(activePs.total)}</div></div>
          ${activePs.balance_due ? `<div class="info-row"><div class="label">Balance</div><div class="value" style="color:${Number(activePs.balance_due)>0?'#facc15':'#4ade80'};font-weight:700">${money(activePs.balance_due)}</div></div>` : ''}
          <div class="actions-bar">
            <a class="act primary" href="production-paysheet.html?job=${esc(activePs.job_id || '')}">OPEN FULL EDITOR</a>
          </div>
        ` : '<div class="empty-sec">NO PAY SHEET YET</div>'}
      </div>
    </details>
  `);

  // 6. PHOTOS & VIDEO (PR-B will make interactive; placeholder UX with deeplinks)
  sections.push(`
    <details class="acc" open data-section="photos">
      <summary>
        <div class="title"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> PHOTOS &amp; VIDEO</div>
        <div class="meta"><span>${photos.length} item${photos.length===1?'':'s'}</span><svg class="chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </summary>
      <div class="acc-body">
        ${photos.length ? `<div class="gallery">${photos.map(p => {
          const isVid = typeof p.mime_type === 'string' && p.mime_type.startsWith('video/');
          const inner = isVid
            ? `<video src="${esc(p.url)}" preload="metadata" muted playsinline></video><div class="play-badge">VIDEO</div>`
            : `<img src="${esc(p.url)}" loading="lazy" alt="${esc(p.caption||'')}"/>`;
          const captionHtml = p.caption ? `<div class="cap">${esc(p.caption)}</div>` : '';
          return `<a class="photo" href="${esc(p.url)}" target="_blank">${inner}${captionHtml}</a>`;
        }).join('')}</div>` : '<div class="empty-sec">NO PHOTOS OR VIDEOS / upload via crew portal or proposal builder</div>'}
        <div style="margin-top:10px;font-size:0.72em;color:rgba(200,220,255,0.45);font-family:'Share Tech Mono',monospace;letter-spacing:1px">Inline delete + cover swap + mark-before/after lands in the next release.</div>
      </div>
    </details>
  `);

  // 7. FILES (placeholder until PR-B)
  sections.push(`
    <details class="acc" data-section="files">
      <summary>
        <div class="title"><svg viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg> FILES</div>
        <div class="meta"><span>0 files</span><svg class="chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </summary>
      <div class="acc-body">
        <div class="empty-sec">NON-IMAGE FILES (PDF, DOCX, etc) WILL SURFACE HERE</div>
      </div>
    </details>
  `);

  // 8. COMMS HISTORY (placeholder)
  sections.push(`
    <details class="acc" data-section="comms">
      <summary>
        <div class="title"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg> COMMS HISTORY</div>
        <div class="meta"><span>open in GHL</span><svg class="chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </summary>
      <div class="acc-body">
        <div class="empty-sec">${customer.ghl_contact_id ? 'GHL conversation thread will embed here in a follow-up release.' : 'NO GHL CONTACT LINKED'}</div>
        ${customer.ghl_contact_id ? `<div class="actions-bar"><a class="act cyan" href="https://app.gohighlevel.com/v2/location/PA9zJpJtmGJDk6wRBQqu/contacts/detail/${esc(customer.ghl_contact_id)}" target="_blank">OPEN IN GHL</a></div>` : ''}
      </div>
    </details>
  `);

  // 9. NOTES
  sections.push(`
    <details class="acc" data-section="notes">
      <summary>
        <div class="title"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> NOTES</div>
        <div class="meta"><span>${(primaryEst?.notes || []).length} entr${(primaryEst?.notes || []).length === 1 ? 'y' : 'ies'}</span><svg class="chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </summary>
      <div class="acc-body">
        ${(primaryEst?.notes || []).length ? (primaryEst.notes || []).map(n => `
          <div style="padding:8px 0;border-bottom:1px solid rgba(251,146,60,0.06);font-size:0.88em;color:rgba(200,220,255,0.8);line-height:1.55">
            <div style="font-family:'Share Tech Mono',monospace;font-size:0.64em;color:rgba(200,220,255,0.45);letter-spacing:1.2px;margin-bottom:4px">${esc(n.date || '')} / ${esc(n.author || '').toUpperCase()}</div>
            <div>${esc(n.body || '')}</div>
          </div>
        `).join('') : '<div class="empty-sec">NO NOTES</div>'}
      </div>
    </details>
  `);

  $('stage').innerHTML = hero + sections.join('');

  // ------- Post-render wiring (live DOM, XSS-safe with el() builder) -------

  // Crew & Sub dropdowns (active workorder only)
  if (activeWo) {
    const crewCell = document.getElementById('crewLeadCell');
    const subCell = document.getElementById('subCell');
    if (crewCell) crewCell.appendChild(buildCrewSelect(activeWo, roster));
    if (subCell) subCell.appendChild(buildSubSelect(activeWo, roster));
  }

  // WO status pick
  const woPick = document.getElementById('woStatusPick');
  if (woPick && activeWo) {
    woPick.addEventListener('change', async ev => {
      const newStatus = ev.target.value;
      const extras = {};
      if (newStatus === 'complete') extras.completed_at = new Date().toISOString();
      if (newStatus === 'issued') extras.issued_at = new Date().toISOString();
      const updated = await saveField('workorders', activeWo.id, 'status', newStatus, 'woSaved');
      if (Object.keys(extras).length) {
        await fetch('/api/workorders', {
          method: 'PUT',
          headers: { ...ah(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: activeWo.id, ...extras }),
        });
      }
      // Sync PS dropdown visually
      const psPick = document.getElementById('psStatusPick');
      const WO_TO_PS = { draft:'scheduled', issued:'scheduled', in_progress:'in_progress', complete:'completed', cancelled:'cancelled' };
      if (psPick && WO_TO_PS[newStatus]) {
        psPick.value = WO_TO_PS[newStatus];
        flashSaved('psSaved');
      }
    });
  }

  // Paysheet status pick - also syncs the linked workorder so a paysheet
  // marked completed/cancelled doesn't leave its WO stale. Mirror of the
  // pre-PR-A behaviour that was lost in the rewrite. The PS_TO_WO map
  // matches the one in api/paysheets.js (server-side sync also runs, but
  // the client mirror keeps the WO dropdown in sync without a refresh).
  const psPick = document.getElementById('psStatusPick');
  if (psPick && activePs) {
    const PS_TO_WO = {
      'scheduled': 'issued',
      'in_progress': 'in_progress',
      'completed': 'complete',
      'invoice_final': 'complete',
      'cancelled': 'cancelled',
    };
    psPick.addEventListener('change', async ev => {
      const newStatus = ev.target.value;
      const extras = {};
      if (newStatus === 'completed') extras.completed_date = new Date().toISOString().slice(0,10);
      if (newStatus === 'invoice_final') extras.invoice_finalized_at = new Date().toISOString();
      const r = await fetch('/api/paysheets', {
        method: 'PUT',
        headers: { ...ah(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: activePs.id, status: newStatus, ...extras }),
      });
      if (!r.ok) { alert('Pay sheet update failed: HTTP ' + r.status); return; }
      flashSaved('psSaved');

      // Push the linked WO into the matching status if there is one. The
      // server side does this too via api/paysheets.js, but we want the
      // local woStatusPick to reflect the change without a reload.
      // Compare against the live DOM value, not the captured activeWo.status -
      // multiple PS status changes in one session would otherwise compare
      // against a stale snapshot and skip the WO update.
      const woTarget = PS_TO_WO[newStatus];
      const woSel = document.getElementById('woStatusPick');
      const currentWoStatus = woSel ? woSel.value : (activeWo && activeWo.status);
      if (activeWo && woTarget && currentWoStatus !== woTarget) {
        const woExtras = {};
        if (woTarget === 'complete') woExtras.completed_at = new Date().toISOString();
        await fetch('/api/workorders', {
          method: 'PUT',
          headers: { ...ah(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: activeWo.id, status: woTarget, ...woExtras }),
        });
        if (woSel) woSel.value = woTarget;
        flashSaved('woSaved');
      }
    });
  }

  // Topbar expand / collapse
  document.querySelectorAll('details.acc').forEach(d => d._initial = d.open);
  $('expandAllBtn').addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('details.acc').forEach(d => d.open = true);
  });
  $('collapseAllBtn').addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('details.acc').forEach(d => d.open = false);
  });
}

function buildCrewSelect(wo, roster){
  const crew = (roster && roster.crew) || [];
  const sel = el('select', { class: 'field-edit' });
  sel.appendChild(el('option', { value: '' }, 'Unassigned'));
  const current = wo.sub_crew_lead || '';
  let matched = false;
  crew.forEach(u => {
    const opt = el('option', { value: u.name }, u.name + (u.role ? ' (' + u.role + ')' : ''));
    if (current && current.toLowerCase() === (u.name || '').toLowerCase()) {
      opt.selected = true;
      matched = true;
    }
    sel.appendChild(opt);
  });
  // Preserve legacy free-text values that don't match a current user.
  if (!matched && current) {
    const legacy = el('option', { value: current, selected: true }, current + ' (legacy)');
    sel.appendChild(legacy);
  }
  sel.addEventListener('change', async () => {
    await saveField('workorders', wo.id, 'sub_crew_lead', sel.value || null, 'crewSaved');
    const meta = document.getElementById('crewSubMeta');
    if (meta) meta.textContent = sel.value || 'unassigned';
  });
  return sel;
}

function buildSubSelect(wo, roster){
  const subs = (roster && roster.subs) || [];
  const sel = el('select', { class: 'field-edit' });
  sel.appendChild(el('option', { value: '' }, 'In-house / no sub'));
  subs.forEach(s => {
    const label = s.company ? s.name + ' (' + s.company + ')' : s.name;
    const opt = el('option', { value: s.id }, label);
    if (wo.subcontractor_id && wo.subcontractor_id === s.id) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', async () => {
    await saveField('workorders', wo.id, 'subcontractor_id', sel.value || null, 'crewSaved');
  });
  return sel;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); history.back(); } });
loadJob();
