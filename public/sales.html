<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Sales</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow:hidden;position:relative}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(34,211,238,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(124,58,237,0.08) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(34,211,238,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}
.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(34,211,238,0.22);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#22d3ee,#7c3aed,transparent);opacity:0.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(200,240,255,0.3),rgba(34,211,238,0.22) 40%,rgba(5,15,30,0.8));box-shadow:0 0 14px rgba(34,211,238,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}
.tb-stat{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:0.68em;color:rgba(160,190,230,0.62);letter-spacing:1px}
.tb-stat .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.tb-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(6,10,20,0.6);border:1px solid rgba(34,211,238,0.22);color:rgba(160,190,230,0.62);cursor:pointer;transition:all 0.2s}
.tb-icon:hover{color:#22d3ee;border-color:rgba(34,211,238,0.45);background:rgba(34,211,238,0.08)}
.tb-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

#subhub-stage{position:absolute;inset:0;width:100%;height:100%}
</style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <button class="tb-icon" onclick="goBackToMainHub()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· SALES</span></div></div>
  <div class="tb-stat"><div class="dot"></div><span>GHL · SYNCED</span></div>
  <div class="tb-spacer"></div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px">PIPELINE · LIVE</div>
</div>

<div id="subhub-stage"></div>

<script src="assets/ryujin-search.js"></script>
<script src="assets/ryujin-chat.js"></script>
<script src="assets/ryujin-tutor.js"></script>
<script src="assets/ryujin-subhub.js"></script>
<script>
RyujinSubHub.init({
  sector: 'SALES',
  subtitle: 'PICK A SYSTEM TO WORK ON',
  accent: { main: '#22d3ee', deep: '#0891b2', glow: 'rgba(34,211,238,0.35)' },
  panels: [
    {
      title: 'PIPELINE',
      sub: 'Full deal board · stages · velocity · rep performance',
      meta: 'OPEN · CLOSED · WON',
      url: 'sales-pipeline.html',
      icon: '<svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg>'
    },
    {
      title: 'PROPOSALS',
      sub: 'Generate custom proposals · price live · send to customer',
      meta: 'WIZARD · 3 TIERS · CLIENT LINK',
      url: 'sales-proposal.html',
      icon: '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>'
    },
    {
      title: 'FOLLOW-UPS',
      sub: 'Scheduled outreach · overdue · due today · upcoming',
      meta: 'CALLS · SMS · EMAIL',
      url: 'sales-followups.html',
      icon: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'
    },
    {
      title: 'CUSTOMERS',
      sub: 'CRM log · contacts · full history · communications',
      meta: 'CRM · HISTORY · ACTIONS',
      url: 'sales-customers.html',
      icon: '<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>'
    },
    {
      title: 'TRANSCRIPTS',
      sub: 'Fathom meetings · insights · objection patterns · playbook mining',
      meta: 'FATHOM · PLAYBOOK MINING',
      url: 'sales-transcripts.html',
      icon: '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>'
    }
  ]
});

Ryujin.init({
  sector: 'SALES',
  autoOpen: false,
  root: {
    msg: "Sales desk. Pick a system to work on — pipeline, proposals, follow-ups, customers, or transcripts.",
    choices: [
      { text: 'Open Pipeline', next: 'pipe' },
      { text: 'Start a new proposal', next: 'prop' },
      { text: 'Check overdue follow-ups', next: 'fu' },
      { text: 'Open Partridge\u2019s record', next: 'part' }
    ]
  },
  states: {
    pipe: { msg: "Routing to Pipeline.", effect: () => setTimeout(() => window.location.href='sales-pipeline.html', 500), choices: [] },
    prop: { msg: "Routing to the Proposal Generator.", effect: () => setTimeout(() => window.location.href='sales-proposal.html', 500), choices: [] },
    fu: { msg: "Opening Follow-ups.", effect: () => setTimeout(() => window.location.href='sales-followups.html', 500), choices: [] },
    part: { msg: "Opening Partridge in Customers.", effect: () => setTimeout(() => window.location.href='sales-customers.html', 500), choices: [] }
  }
});

function goBackToMainHub(){
  if (window.parent !== window && window.parent.exitSectionOverlay) { window.parent.exitSectionOverlay(); return; }
  window.location.href = 'command-center.html';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); goBackToMainHub(); } });
document.addEventListener('contextmenu', e => { e.preventDefault(); goBackToMainHub(); });
</script>

<script src="assets/ryujin-mode.js"></script>
<script src="assets/ryujin-tenant.js"></script>
<script src="assets/ryujin-persist.js"></script>
<script src="assets/ryujin-api.js"></script>
<script src="assets/ryujin-scenario.js"></script>
<script src="assets/ryujin-xp.js"></script>
<script src="assets/ryujin-mode-badge.js"></script>

</body>
</html>
