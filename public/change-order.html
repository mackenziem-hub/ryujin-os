<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Change Order | Plus Ultra Roofing</title>
<style>
  :root{ --cream:#faf7f0; --card:#ffffff; --ink:#1f2430; --muted:#6b7280; --line:#e7e0d4; --blue:#1d3a8a; --blue2:#2b53c4; --green:#1d7a4d; --red:#a83232; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:32px 20px 64px}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:24px}
  .brand .mark{width:34px;height:34px;border-radius:8px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1em}
  .brand .name{font-weight:700;letter-spacing:0.3px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px 24px;box-shadow:0 6px 24px rgba(31,36,48,0.06)}
  .eyebrow{font-size:0.72em;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--blue2);margin-bottom:8px}
  h1{font-size:1.5em;margin:0 0 6px;line-height:1.25}
  .reason{font-size:1.05em;color:var(--ink);margin:14px 0 4px;font-weight:600}
  .scope{display:grid;grid-template-columns:1fr;gap:10px;margin:18px 0}
  .scope .row{background:#faf8f3;border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .scope .lbl{font-size:0.68em;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
  .scope .val{font-size:0.95em}
  .delta{margin:22px 0;padding:18px;border-radius:12px;background:#f1f5ff;border:1px solid #d6e0fb;text-align:center}
  .delta .dlbl{font-size:0.72em;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--blue2)}
  .delta .damt{font-size:2.1em;font-weight:800;color:var(--blue);margin-top:4px}
  .delta.credit{background:#eefaf2;border-color:#cdeed9}
  .delta.credit .damt,.delta.credit .dlbl{color:var(--green)}
  .actions{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  button{font-family:inherit;font-size:1em;font-weight:700;border-radius:11px;padding:14px 18px;border:1px solid transparent;cursor:pointer;transition:filter .15s,transform .05s}
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.55;cursor:default}
  .btn-accept{background:var(--blue);color:#fff}
  .btn-accept:hover:not(:disabled){filter:brightness(1.08)}
  .btn-decline{background:transparent;color:var(--muted);border-color:var(--line)}
  .btn-decline:hover:not(:disabled){color:var(--red);border-color:#e6c9c9}
  textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-family:inherit;font-size:0.95em;resize:vertical;min-height:74px;margin-top:6px}
  .note{font-size:0.78em;color:var(--muted);text-align:center;margin-top:16px}
  .state{text-align:center;padding:18px 6px}
  .state .ico{font-size:2.4em;margin-bottom:8px}
  .state h2{margin:0 0 6px;font-size:1.25em}
  .state p{color:var(--muted);margin:0}
  .hidden{display:none}
  .spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:30px auto}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><div class="mark">P</div><div class="name">Plus Ultra Roofing</div></div>

  <div class="card">
    <div id="loading"><div class="spinner"></div></div>

    <div id="decideView" class="hidden">
      <div class="eyebrow" id="eyebrow">Change order</div>
      <h1 id="headline">A change to your project</h1>
      <div class="reason" id="reason"></div>
      <div class="scope" id="scope"></div>
      <div class="delta" id="deltaBox"><div class="dlbl" id="deltaLbl">Additional cost</div><div class="damt" id="deltaAmt"></div></div>
      <div class="actions">
        <button class="btn-accept" id="acceptBtn">Approve this change</button>
        <button class="btn-decline" id="declineToggle">I have a question / decline</button>
        <div id="declineArea" class="hidden">
          <textarea id="declineNote" placeholder="Optional: tell us what you'd like to talk through"></textarea>
          <div class="actions" style="margin-top:10px">
            <button class="btn-decline" id="declineBtn" style="border-color:#e6c9c9;color:var(--red)">Send decline</button>
          </div>
        </div>
      </div>
      <div class="note">Questions? Call Plus Ultra Roofing and we'll walk you through it.</div>
    </div>

    <div id="doneView" class="hidden state">
      <div class="ico" id="doneIco">✓</div>
      <h2 id="doneTitle">Recorded</h2>
      <p id="doneMsg"></p>
    </div>

    <div id="errView" class="hidden state">
      <div class="ico">⚠</div>
      <h2 id="errTitle">Link not valid</h2>
      <p id="errMsg">This change order link is not valid. Please contact Plus Ultra Roofing.</p>
    </div>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const token = new URLSearchParams(location.search).get('token');
  let SIDE = 'customer';

  const money = (n) => '$' + Math.abs(Number(n) || 0).toLocaleString('en-CA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  function show(view) {
    ['loading', 'decideView', 'doneView', 'errView'].forEach((v) => $(v).classList.toggle('hidden', v !== view));
  }
  function showError(title, msg) { if (title) $('errTitle').textContent = title; if (msg) $('errMsg').textContent = msg; show('errView'); }

  function renderDecided(side, status) {
    const isAccepted = status === 'accepted';
    $('doneIco').textContent = isAccepted ? '✓' : '•';
    $('doneTitle').textContent = isAccepted ? 'Already approved' : 'Already recorded';
    $('doneMsg').textContent = isAccepted
      ? 'You have already approved this change. Nothing more to do.'
      : 'This change has already been recorded. Contact Plus Ultra Roofing if that is not right.';
    show('doneView');
  }

  async function load() {
    if (!token) { showError('Link not valid', 'This change order link is missing its code.'); return; }
    try {
      const r = await fetch('/api/change-order-public?token=' + encodeURIComponent(token));
      if (r.status === 404) { showError(); return; }
      if (!r.ok) { showError('Something went wrong', 'Please try again or contact Plus Ultra Roofing.'); return; }
      const d = await r.json();
      SIDE = d.side;

      if (d.accept_status && d.accept_status !== 'pending') { renderDecided(d.side, d.accept_status); return; }

      const isSub = d.side === 'sub';
      $('eyebrow').textContent = isSub ? 'Work order change' : 'Change order';
      $('headline').textContent = isSub ? 'A change to your work order' : 'A change to your project';
      $('reason').textContent = d.reason || '';

      const rows = [];
      if (d.scope_before) rows.push(`<div class="row"><div class="lbl">Before</div><div class="val">${esc(d.scope_before)}</div></div>`);
      if (d.scope_after) rows.push(`<div class="row"><div class="lbl">Now</div><div class="val">${esc(d.scope_after)}</div></div>`);
      $('scope').innerHTML = rows.join('');

      const delta = Number(d.delta) || 0;
      const box = $('deltaBox');
      if (delta < 0) {
        box.classList.add('credit');
        $('deltaLbl').textContent = isSub ? 'Rate credit' : 'Credit';
      } else {
        $('deltaLbl').textContent = isSub ? 'Added to your pay' : 'Additional cost';
      }
      $('deltaAmt').textContent = (delta < 0 ? '-' : '+') + money(delta);
      $('acceptBtn').textContent = isSub ? 'Accept change' : 'Approve this change';

      show('decideView');
    } catch (e) {
      showError('Something went wrong', 'Please try again or contact Plus Ultra Roofing.');
    }
  }

  async function decide(decision) {
    const note = $('declineNote').value.trim();
    [$('acceptBtn'), $('declineBtn'), $('declineToggle')].forEach((b) => { b.disabled = true; });
    try {
      const r = await fetch('/api/change-order-accept', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, decision, note: decision === 'decline' ? note : undefined }),
      });
      if (r.status === 409) { const j = await r.json().catch(() => ({})); renderDecided(SIDE, j.side_status || 'recorded'); return; }
      if (!r.ok) { showError('Could not record that', 'Please try again or contact Plus Ultra Roofing.'); return; }
      const isAccept = decision === 'accept';
      $('doneIco').textContent = isAccept ? '✓' : '•';
      $('doneTitle').textContent = isAccept ? 'Approved. Thank you.' : 'Got it.';
      $('doneMsg').textContent = isAccept
        ? 'Your approval has been sent to Plus Ultra Roofing.'
        : 'We have noted this and someone will reach out.';
      show('doneView');
    } catch (e) {
      showError('Could not record that', 'Please try again or contact Plus Ultra Roofing.');
    }
  }

  $('acceptBtn').addEventListener('click', () => decide('accept'));
  $('declineToggle').addEventListener('click', () => { $('declineArea').classList.toggle('hidden'); });
  $('declineBtn').addEventListener('click', () => decide('decline'));
  load();
</script>
</body>
</html>
