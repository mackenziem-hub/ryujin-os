var PANEL_BY_KEY = {};
TABS.forEach(function(t){ t.panels.forEach(function(p){ p.tabId = t.id; p.tabLabel = t.label; p.num = t.num; PANEL_BY_KEY[p.key] = p; }); });

var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
var STORE_PIN = 'rj-pinned-administration';
var activeTab = 'operate';
var pinned = (function(){ try { return JSON.parse(localStorage.getItem(STORE_PIN)) || ['inbox','pricing','mockups','custprop']; } catch(e){ return ['inbox','pricing','mockups','custprop']; } })();
var recents = ['inbox','pricing','mockups','hall'];
var focusIdx = -1;

/* navigate to a real panel (top frame, matching the old target="_top") */
function goPanel(url){ if (!url) return; try { (window.top || window).location.href = url; } catch(e){ window.location.href = url; } }

/* ---- back to Command Center (preserves overlay + Esc + right-click) ---- */
function goBackToMainHub(){
  if (window.parent !== window && window.parent.exitSectionOverlay) { window.parent.exitSectionOverlay(); return; }
  if (window.RyujinNav && window.RyujinNav.back) { window.RyujinNav.back('command-center.html'); return; }
  window.location.href = 'command-center.html';
}

/* ============================ RAIL ============================ */
function renderRail(){
  var rail = document.getElementById('rail');
  rail.innerHTML = '';
  TABS.forEach(function(t){
    if (t.id === 'system') { var sp = document.createElement('div'); sp.className = 'rail-spacer'; rail.appendChild(sp); var sep = document.createElement('div'); sep.className = 'rail-sep'; rail.appendChild(sep); }
    var b = document.createElement('button');
    b.className = 'rail-tab' + (t.id === activeTab ? ' active' : '');
    b.setAttribute('data-needs', '0');
    b.setAttribute('data-tab', t.id);
    b.setAttribute('aria-label', t.num + ' ' + t.label);
    b.innerHTML =
      '<span class="needs-dot" title="needs you"></span>' +
      '<span class="cap">' + t.num + '</span>' +
      '<span class="glyph">' + t.glyph + '</span>' +
      '<span class="label">' + t.label + '</span>';
    b.addEventListener('click', function(){ selectTab(t.id); });
    rail.appendChild(b);
  });
}

/* ============================ QUICK-SLOT ============================ */
var STAR = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1"><path d="M12 2l3 7h7l-5.5 4.5L18 22l-6-4-6 4 1.5-8.5L2 9h7z"/></svg>';
var STAR_OUT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3 7h7l-5.5 4.5L18 22l-6-4-6 4 1.5-8.5L2 9h7z"/></svg>';

function renderQuickSlot(){
  var row = document.getElementById('qsRow');
  row.innerHTML = '';
  pinned.forEach(function(key, i){
    var p = PANEL_BY_KEY[key]; if (!p) return;
    var chip = document.createElement('div');
    chip.className = 'qs-chip';
    chip.setAttribute('title', p.title);
    chip.innerHTML =
      '<span class="pin-star" data-unpin="' + key + '" title="unpin">' + STAR + '</span>' +
      '<span class="qs-hot">' + (i + 1) + '</span>' +
      '<span class="qs-icon">' + p.icon + '</span>' +
      '<span class="qs-name">' + p.title + '</span>';
    chip.addEventListener('click', function(e){ if (e.target.closest('[data-unpin]')) return; pushRecent(p.key); goPanel(p.url); });
    row.appendChild(chip);
  });
  var add = document.createElement('button');
  add.className = 'qs-add';
  add.innerHTML = '<span style="font-size:15px;line-height:1">+</span> pin a panel';
  add.addEventListener('click', openPalette);
  row.appendChild(add);

  row.querySelectorAll('[data-unpin]').forEach(function(el){
    el.addEventListener('click', function(e){ e.stopPropagation(); togglePin(el.getAttribute('data-unpin')); });
  });
}

function togglePin(key){
  var i = pinned.indexOf(key);
  if (i >= 0) { pinned.splice(i, 1); }
  else if (pinned.length < 6) { pinned.push(key); }
  try { localStorage.setItem(STORE_PIN, JSON.stringify(pinned)); } catch(e){ /* persist best-effort */ }
  renderQuickSlot();
  renderGrid(false);
}

/* ============================ RECENTS ============================ */
function renderRecents(){
  var el = document.getElementById('recents');
  el.querySelectorAll('.r-chip').forEach(function(c){ c.remove(); });
  recents.slice(0, 4).forEach(function(key){
    var p = PANEL_BY_KEY[key]; if (!p) return;
    var chip = document.createElement('button');
    chip.className = 'r-chip';
    chip.innerHTML = '<span class="r-dot"></span>' + p.title;
    chip.addEventListener('click', function(){ selectTab(p.tabId); });
    el.appendChild(chip);
  });
}

/* ============================ STAGE GRID ============================ */
function tabObj(id){ return TABS.filter(function(t){ return t.id === id; })[0]; }

function renderGrid(animate){
  var t = tabObj(activeTab);
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  focusIdx = -1;
  grid.classList.remove('bloom');

  document.getElementById('shNum').textContent = t.num;
  document.getElementById('shName').textContent = t.label;
  document.getElementById('shSub').textContent = t.caption + ' · ' + t.surfaces + ' surfaces';

  var sweep = document.getElementById('shSweep');
  sweep.style.transition = 'none'; sweep.style.width = '0';
  if (animate && !prefersReduced) {
    requestAnimationFrame(function(){ sweep.style.transition = 'width 220ms var(--rj-ease-out)'; sweep.style.width = '100%'; });
  } else { sweep.style.width = '100%'; }

  t.panels.forEach(function(p, i){
    var card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('tabindex', '0');
    card.setAttribute('data-key', p.key);
    card.style.setProperty('--vt', 'card-' + p.key);
    var isPinned = pinned.indexOf(p.key) >= 0;
    card.innerHTML =
      '<span class="bracket tl"></span><span class="bracket br"></span>' +
      '<span class="card-pin' + (isPinned ? ' pinned' : '') + '" data-pin="' + p.key + '" title="' + (isPinned ? 'unpin' : 'pin to Quick-Slot') + '">' + (isPinned ? STAR : STAR_OUT) + '</span>' +
      '<div class="card-top">' +
        '<div class="card-icon">' + p.icon + '</div>' +
        '<span class="badge" data-badge-key="' + p.key + '">' + p.badge + '</span>' +
      '</div>' +
      '<div class="card-title">' + p.title + '</div>' +
      '<div class="card-sub">' + p.sub + '</div>' +
      '<div class="card-meta">' + p.meta + '</div>';

    card.addEventListener('mouseenter', function(){ litCard(i); });
    card.addEventListener('mouseleave', function(){ clearBloom(); });
    card.addEventListener('focus', function(){ litCard(i); });
    card.addEventListener('blur', function(){ if (document.activeElement && !grid.contains(document.activeElement)) clearBloom(); });
    card.addEventListener('click', function(e){ if (e.target.closest('[data-pin]')) return; pushRecent(p.key); goPanel(p.url); });
    card.addEventListener('keydown', function(e){ if (e.key === 'Enter') { e.preventDefault(); pushRecent(p.key); goPanel(p.url); } });

    if (animate && !prefersReduced) card.classList.add('enter');
    grid.appendChild(card);
  });

  grid.querySelectorAll('[data-pin]').forEach(function(el){
    el.addEventListener('click', function(e){ e.stopPropagation(); togglePin(el.getAttribute('data-pin')); });
  });

  if (animate && !prefersReduced) {
    grid.querySelectorAll('.card').forEach(function(c, i){
      setTimeout(function(){ c.classList.add('enter-active'); c.classList.remove('enter'); }, 30 * i);
    });
  }
}

function litCard(i){
  var grid = document.getElementById('grid');
  grid.classList.add('bloom');
  grid.querySelectorAll('.card').forEach(function(c, idx){ c.classList.toggle('lit', idx === i); });
  focusIdx = i;
}
function clearBloom(){
  var grid = document.getElementById('grid');
  grid.classList.remove('bloom');
  grid.querySelectorAll('.card').forEach(function(c){ c.classList.remove('lit'); });
}
function pushRecent(key){
  recents = [key].concat(recents.filter(function(k){ return k !== key; })).slice(0, 4);
  renderRecents();
}

/* ============================ TAB SWAP ============================ */
function selectTab(id, noAnim){
  if (id === activeTab) return;
  activeTab = id;
  document.querySelectorAll('.rail-tab').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-tab') === id); });
  location.hash = '#' + id;
  renderGrid(!noAnim);
}

/* ============================ PANEL FINDER ============================ */
var palScrim = document.getElementById('palScrim');
var palInput = document.getElementById('palInput');
var palList  = document.getElementById('palList');
var palSel = 0;
var palFlat = [];

function buildPalette(filter){
  palList.innerHTML = '';
  palFlat = [];
  var q = (filter || '').trim().toLowerCase();
  TABS.forEach(function(t){
    var matches = t.panels.filter(function(p){ return !q || p.title.toLowerCase().indexOf(q) >= 0 || t.label.toLowerCase().indexOf(q) >= 0; });
    if (!matches.length) return;
    var head = document.createElement('div');
    head.className = 'pal-group-head';
    head.textContent = t.num + ' · ' + t.label;
    palList.appendChild(head);
    matches.forEach(function(p){
      var idx = palFlat.length;
      palFlat.push(p);
      var row = document.createElement('div');
      row.className = 'pal-row' + (idx === 0 ? ' sel' : '');
      row.setAttribute('data-idx', idx);
      row.innerHTML =
        '<span class="pal-ic">' + p.icon + '</span>' +
        '<span class="pal-name">' + p.title + '</span>' +
        '<span class="pal-key">' + p.num + '</span>';
      row.addEventListener('click', function(){ pushRecent(p.key); goPanel(p.url); });
      row.addEventListener('mousemove', function(){ palSel = idx; markPalSel(); });
      palList.appendChild(row);
    });
  });
  palSel = 0; markPalSel();
}
function markPalSel(){
  palList.querySelectorAll('.pal-row').forEach(function(r){ r.classList.toggle('sel', parseInt(r.getAttribute('data-idx'), 10) === palSel); });
}
function openPalette(){ palScrim.classList.add('open'); palInput.value = ''; buildPalette(''); setTimeout(function(){ palInput.focus(); }, 30); }
function closePalette(){ palScrim.classList.remove('open'); }

document.getElementById('openPalette').addEventListener('click', openPalette);
palScrim.addEventListener('click', function(e){ if (e.target === palScrim) closePalette(); });
palInput.addEventListener('input', function(){ buildPalette(palInput.value); });
palInput.addEventListener('keydown', function(e){
  if (e.key === 'ArrowDown') { e.preventDefault(); palSel = Math.min(palSel + 1, palFlat.length - 1); markPalSel(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); palSel = Math.max(palSel - 1, 0); markPalSel(); }
  else if (e.key === 'Enter') { e.preventDefault(); var p = palFlat[palSel]; if (p) { pushRecent(p.key); goPanel(p.url); } }
});

/* ============================ KEYBOARD ============================ */
/* The fleet command-palette.js (mounted by auth-guard) owns "/" and Cmd-K, so
   this handler deliberately does NOT bind them. It keeps tab + card nav. */
document.addEventListener('keydown', function(e){
  if (palScrim.classList.contains('open')) {
    if (e.key === 'Escape') { e.preventDefault(); closePalette(); }
    return;
  }
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
  if (e.key === 'Escape') { e.preventDefault(); goBackToMainHub(); return; }

  if (e.key >= '1' && e.key <= '5') { var jt = TABS[parseInt(e.key, 10) - 1]; if (jt) { e.preventDefault(); selectTab(jt.id); } return; }

  var curTabIdx = TABS.map(function(t){ return t.id; }).indexOf(activeTab);
  if (e.key === 'ArrowDown') { e.preventDefault(); selectTab(TABS[Math.min(curTabIdx + 1, TABS.length - 1)].id); return; }
  if (e.key === 'ArrowUp')   { e.preventDefault(); selectTab(TABS[Math.max(curTabIdx - 1, 0)].id); return; }

  var grid = document.getElementById('grid');
  var cards = Array.prototype.slice.call(grid.querySelectorAll('.card'));
  if (!cards.length) return;
  if (e.key === 'ArrowRight') { e.preventDefault(); focusIdx = Math.min((focusIdx < 0 ? -1 : focusIdx) + 1, cards.length - 1); cards[focusIdx].focus(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); focusIdx = Math.max((focusIdx < 0 ? 1 : focusIdx) - 1, 0); cards[focusIdx].focus(); }
});

/* ============================ BACK + CONTEXT ============================ */
document.getElementById('backPill').addEventListener('click', goBackToMainHub);
document.addEventListener('contextmenu', function(e){ e.preventDefault(); goBackToMainHub(); });

/* ============================ PARTICLES ============================ */
var particleLayer = document.getElementById('particles');
(function buildParticles(){
  if (prefersReduced) return;
  for (var i = 0; i < 24; i++) {
    var d = document.createElement('span');
    d.className = 'dust';
    d.style.left = (Math.random() * 100) + '%';
    d.style.top = (60 + Math.random() * 40) + '%';
    d.style.setProperty('--dx', (Math.random() * 40 - 20) + 'px');
    d.style.animationDuration = (9 + Math.random() * 9) + 's';
    d.style.animationDelay = (-Math.random() * 14) + 's';
    particleLayer.appendChild(d);
  }
})();
document.addEventListener('visibilitychange', function(){
  particleLayer.querySelectorAll('.dust').forEach(function(d){ d.style.animationPlayState = document.hidden ? 'paused' : 'running'; });
});

/* ============================ INIT ============================ */
(function init(){
  var h = (location.hash || '').replace('#', '');
  if (h && tabObj(h)) activeTab = h;
  renderRail();
  renderQuickSlot();
  renderRecents();
  renderGrid(false);
  window.addEventListener('hashchange', function(){
    var nh = (location.hash || '').replace('#', '');
    if (nh && tabObj(nh) && nh !== activeTab) selectTab(nh, true);
  });
})();
</script>
