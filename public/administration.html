<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow:hidden;position:relative}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(74,158,255,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(124,58,237,0.08) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(74,158,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(74,158,255,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}
.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(74,158,255,0.24);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#4a9eff,#7c3aed,transparent);opacity:0.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(200,230,255,0.3),rgba(74,158,255,0.22) 40%,rgba(5,15,30,0.8));box-shadow:0 0 14px rgba(74,158,255,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}
.tb-stat{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:0.68em;color:rgba(160,190,230,0.62);letter-spacing:1px}
.tb-stat .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.tb-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(6,10,20,0.6);border:1px solid rgba(74,158,255,0.24);color:rgba(160,190,230,0.62);cursor:pointer;transition:all 0.2s}
.tb-icon:hover{color:#4a9eff;border-color:rgba(74,158,255,0.5);background:rgba(74,158,255,0.08)}
.tb-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#subhub-stage{position:absolute;inset:0;width:100%;height:100%}
</style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <button class="tb-icon" onclick="goBackToMainHub()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· ADMINISTRATION</span></div></div>
  <div class="tb-stat"><div class="dot"></div><span>ENGINE v3.1 · TENANT plus-ultra</span></div>
  <div class="tb-spacer"></div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px">TENANT · SETTINGS</div>
</div>

<div id="subhub-stage"></div>

<script src="assets/ryujin-search.js"></script>
<script src="assets/ryujin-chat.js"></script>
<script src="assets/ryujin-tutor.js"></script>
<script src="assets/ryujin-subhub.js"></script>
<script>
RyujinSubHub.init({
  sector: 'ADMINISTRATION',
  subtitle: 'TENANT SETTINGS · PRICING · TEAM · INTEGRATIONS',
  accent: { main: '#4a9eff', deep: '#2563eb', glow: 'rgba(74,158,255,0.4)' },
  panels: [
    {
      title: 'BRANDING',
      sub: 'Business name · phone · email · signer · sub · replaces "Ryujin" system-wide',
      meta: 'TENANT SETTINGS',
      url: 'admin-tenant.html',
      icon: '<svg viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4.5L18 22l-6-4-6 4 1.5-8.5L2 9h7z"/></svg>'
    },
    {
      title: 'OVERVIEW',
      sub: 'Dashboard of tenant settings, offers, merchants, team, integrations, costs',
      meta: 'ALL SYSTEMS · SNAPSHOT',
      url: 'admin-overview.html',
      icon: '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>'
    },
    {
      title: 'PRICING ENGINE',
      sub: 'Rates, margins, multipliers · live editor with preview · v3.1',
      meta: 'RATES · MARGINS · TAX',
      url: 'admin-pricing.html',
      icon: '<svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>'
    },
    {
      title: 'TEAM & ACCESS',
      sub: 'Members · roles · invites · role-based permissions',
      meta: 'MEMBERS · ROLES · INVITES',
      url: 'admin-team.html',
      icon: '<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>'
    },
    {
      title: 'INTEGRATIONS',
      sub: 'GHL · Meta · Supabase · Vercel · crons · infra costs',
      meta: 'GHL · META · VERCEL · CRONS',
      url: 'admin-integrations.html',
      icon: '<svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>'
    }
  ]
});

Ryujin.init({
  sector: 'ADMINISTRATION',
  autoOpen: false,
  root: {
    msg: "Admin. Engine <b>v3.1</b> stable, 9 migrations applied, 7/8 integrations healthy. <b>Top priority:</b> Gmail write access still pending \u2014 that blocks auto-send. Pick a system.",
    choices: [
      { text: 'Overview', next: 'ov' },
      { text: 'Edit pricing rates', next: 'pri' },
      { text: 'Team &amp; access', next: 'team' },
      { text: 'Integrations', next: 'int' }
    ]
  },
  states: {
    ov: { effect: () => setTimeout(() => window.location.href='admin-overview.html', 500), choices: [] },
    pri: { effect: () => setTimeout(() => window.location.href='admin-pricing.html', 500), choices: [] },
    team: { effect: () => setTimeout(() => window.location.href='admin-team.html', 500), choices: [] },
    int: { effect: () => setTimeout(() => window.location.href='admin-integrations.html', 500), choices: [] }
  }
});

function goBackToMainHub(){
  if (window.parent !== window && window.parent.exitSectionOverlay) { window.parent.exitSectionOverlay(); return; }
  window.location.href = 'command-center.html';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); goBackToMainHub(); } });
document.addEventListener('contextmenu', e => { e.preventDefault(); goBackToMainHub(); });
</script>

<script src="assets/ryujin-mode.js"></script>
<script src="assets/ryujin-tenant.js"></script>
<script src="assets/ryujin-persist.js"></script>
<script src="assets/ryujin-api.js"></script>
<script src="assets/ryujin-scenario.js"></script>
<script src="assets/ryujin-xp.js"></script>
<script src="assets/ryujin-mode-badge.js"></script>

</body>
</html>
