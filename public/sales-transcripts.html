<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Transcripts</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
:root{--accent:#22d3ee;--border:rgba(34,211,238,0.22);--border-hi:rgba(34,211,238,0.45);
  --text:#e0e6f0;--text-dim:rgba(160,190,230,0.62);--text-muted:rgba(140,170,220,0.32);
  --green:#4ade80;--red:#f87171;--yellow:#facc15;--purple:#7c3aed;--orange:#fb923c;--blue:#4a9eff}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:var(--text);overflow:hidden}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 40% 30%,rgba(34,211,238,0.08),transparent 55%),linear-gradient(180deg,#060a14,#030611)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(34,211,238,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,0.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at center,black 40%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 40%,transparent 85%)}

.app{position:relative;z-index:2;height:100vh;display:grid;grid-template-rows:52px 1fr;gap:10px;padding:10px 12px}
.topbar{display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid var(--border);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);position:relative;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--purple),transparent);opacity:0.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(200,240,255,0.3),rgba(34,211,238,0.22) 40%,rgba(5,15,30,0.8));box-shadow:0 0 14px rgba(34,211,238,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:var(--text-dim);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}
.tb-search{flex:0 1 340px;position:relative}
.tb-search input{width:100%;padding:8px 14px 8px 38px;background:rgba(6,10,20,0.7);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:0.86em;outline:none}
.tb-search input:focus{border-color:var(--accent);box-shadow:0 0 10px rgba(34,211,238,0.15)}
.tb-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text-dim);fill:none;stroke-width:2;stroke-linecap:round}
.tb-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(6,10,20,0.6);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all 0.2s}
.tb-icon:hover{color:var(--accent);border-color:var(--border-hi)}
.tb-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round}

.main{display:grid;grid-template-columns:300px 1fr;gap:10px;min-height:0}
.panel{background:rgba(14,22,40,0.78);border:1px solid var(--border);border-radius:14px;backdrop-filter:blur(14px);display:flex;flex-direction:column;min-height:0;overflow:hidden;position:relative}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.45}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid rgba(34,211,238,0.1);flex-shrink:0}
.panel-title{font-family:'Orbitron',sans-serif;font-size:0.62em;font-weight:700;letter-spacing:2.5px;color:var(--text-dim)}
.panel-badge{background:rgba(34,211,238,0.12);border:1px solid rgba(34,211,238,0.28);padding:2px 8px;border-radius:5px;font-family:'Share Tech Mono',monospace;font-size:0.65em;color:var(--accent);letter-spacing:0.5px}
.panel-body{flex:1;overflow-y:auto;padding:6px}

.mtg-row{padding:12px 14px;border-radius:9px;margin-bottom:3px;cursor:pointer;border:1px solid transparent;transition:all 0.2s}
.mtg-row:hover{background:rgba(34,211,238,0.05);border-color:rgba(34,211,238,0.1)}
.mtg-row.selected{background:rgba(34,211,238,0.1);border-color:rgba(34,211,238,0.3)}
.mtg-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px}
.mtg-title{font-size:0.84em;font-weight:600;line-height:1.25;flex:1;min-width:0}
.mtg-dur{font-family:'Share Tech Mono',monospace;font-size:0.62em;color:var(--text-muted);letter-spacing:0.5px;flex-shrink:0}
.mtg-meta{font-size:0.68em;color:var(--text-dim);font-family:'Share Tech Mono',monospace;letter-spacing:0.3px}
.mtg-tag{display:inline-block;font-size:0.6em;padding:1px 7px;border-radius:4px;margin-top:4px;font-family:'Share Tech Mono',monospace;letter-spacing:0.5px}
.mtg-tag.sales{background:rgba(34,211,238,0.1);color:var(--accent);border:1px solid rgba(34,211,238,0.2)}
.mtg-tag.partner{background:rgba(124,58,237,0.1);color:#a78bfa;border:1px solid rgba(124,58,237,0.2)}
.mtg-tag.internal{background:rgba(74,222,128,0.08);color:var(--green);border:1px solid rgba(74,222,128,0.2)}

.detail-head{padding:18px 22px;border-bottom:1px solid rgba(34,211,238,0.1);background:rgba(6,12,24,0.4)}
.detail-title{font-family:'Orbitron',sans-serif;font-size:1.15em;font-weight:800;letter-spacing:1px;margin-bottom:4px}
.detail-meta{display:flex;gap:14px;font-size:0.76em;color:var(--text-dim);font-family:'Share Tech Mono',monospace;letter-spacing:0.3px}
.detail-actions{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap}
.act-btn{padding:7px 13px;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:0.64em;font-weight:700;letter-spacing:1.2px;cursor:pointer;border:1px solid;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px}
.act-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.2}
.act-btn.primary{background:linear-gradient(135deg,rgba(34,211,238,0.25),rgba(34,211,238,0.1));color:var(--accent);border-color:rgba(34,211,238,0.4)}
.act-btn.primary:hover{background:linear-gradient(135deg,rgba(34,211,238,0.4),rgba(34,211,238,0.2));box-shadow:0 0 12px rgba(34,211,238,0.25)}
.act-btn.ghost{background:rgba(6,10,20,0.5);color:var(--text-dim);border-color:var(--border)}
.act-btn.ghost:hover{color:var(--text);border-color:var(--border-hi)}

.detail-tabs{display:flex;gap:2px;padding:10px 14px;border-bottom:1px solid rgba(34,211,238,0.08);flex-shrink:0}
.tab{padding:7px 14px;background:transparent;border:1px solid transparent;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:0.62em;font-weight:700;letter-spacing:1.5px;color:var(--text-dim);cursor:pointer;transition:all 0.2s}
.tab:hover{color:var(--text)}
.tab.active{background:rgba(34,211,238,0.1);border-color:rgba(34,211,238,0.25);color:var(--accent)}

.detail-body{flex:1;overflow-y:auto;padding:18px 22px}
.section-head{font-family:'Orbitron',sans-serif;font-size:0.62em;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin:14px 0 10px;display:flex;align-items:center;gap:8px}
.section-head .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--accent),transparent);opacity:0.3}
.summary-text{font-size:0.88em;line-height:1.6;color:var(--text);margin-bottom:16px}
.summary-text b{color:var(--accent)}

.ai-card{padding:14px 16px;background:rgba(6,10,20,0.5);border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.ai-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ai-title{font-family:'Orbitron',sans-serif;font-size:0.72em;font-weight:800;letter-spacing:1.5px}
.ai-title.win{color:var(--green)}
.ai-title.risk{color:var(--yellow)}
.ai-title.action{color:var(--accent)}
.ai-body{font-size:0.85em;line-height:1.55;color:var(--text)}
.ai-body b{color:var(--accent)}

.tscript{padding:12px 14px;background:rgba(6,10,20,0.35);border-left:3px solid rgba(34,211,238,0.3);border-radius:0 8px 8px 0;margin-bottom:6px;font-size:0.84em;line-height:1.55}
.tscript .sp{font-family:'Orbitron',sans-serif;font-size:0.68em;font-weight:800;letter-spacing:1.2px;color:var(--accent);margin-bottom:4px;display:flex;justify-content:space-between}
.tscript .sp .t{color:var(--text-muted);font-family:'Share Tech Mono',monospace;font-weight:600;letter-spacing:0.3px}
.tscript.you{border-left-color:var(--green)}
.tscript.you .sp{color:var(--green)}

.empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:0.82em;font-family:'Share Tech Mono',monospace}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-grid"></div>

<div class="app">
  <div class="topbar">
    <button class="tb-icon" onclick="window.location.href='sales.html'"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· SALES · TRANSCRIPTS</span></div></div>
    <div class="tb-spacer"></div>
    <div class="tb-search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="searchInput" placeholder="Search 25 Fathom transcripts..."/></div>
  </div>

  <div class="main">
    <!-- LEFT list -->
    <div class="panel">
      <div class="panel-head"><div class="panel-title">MEETINGS · 25</div><div class="panel-badge">FATHOM</div></div>
      <div class="panel-body" id="mtgList"></div>
    </div>

    <!-- RIGHT detail -->
    <div class="panel" id="detailPanel"></div>
  </div>
</div>

<script src="assets/ryujin-mode.js"></script>
<script src="assets/ryujin-tenant.js"></script>
<script src="assets/ryujin-persist.js"></script>
<script src="assets/ryujin-api.js"></script>
<script src="assets/ryujin-scenario.js"></script>
<script src="assets/ryujin-xp.js"></script>
<script src="assets/ryujin-mode-badge.js"></script>
<script src="assets/ryujin-chat.js"></script>
<script>
const meetings = [
  { id:'peach', title:'Shelagh Peach · inspection + pitch', date:'Apr 15', dur:'42 min', attendees:'Darcy · Shelagh Peach', tag:'sales',
    summary: 'On-site inspection at 205 Collishaw St. Peach wants redeck + ventilation upgrade. Referred by Northrup. Darcy presented Gold tier + ventilation add-on. She\'s <b>highly likely to sign</b> by Apr 20.',
    insights: [
      {type:'win', title:'Buying signal', body:'Peach asked about timing and warranty before Darcy brought it up. Classic late-funnel signal.'},
      {type:'action', title:'Send proposal Apr 19', body:'Redeck $3,700 + ventilation $11,850. Ryujin proposal tool ready.'},
      {type:'risk', title:'Competitor quote mentioned', body:'She got a $14K quote from a local competitor for just roofing. Address the difference in workmanship + warranty framing.'}
    ],
    snippets: [
      {sp:'Shelagh', you:false, t:'12:04', text:'And do you think the ventilation really makes that much of a difference?'},
      {sp:'Darcy', you:true, t:'12:05', text:'Huge. When your attic runs 10-15 degrees hotter in summer, you\'re cooking the shingles from underneath. We\'ve seen 30-year shingles fail at 12 years because of bad ventilation.'},
      {sp:'Shelagh', you:false, t:'13:22', text:'That makes sense. Northrup was really happy with you guys.'},
      {sp:'Darcy', you:true, t:'13:28', text:'Yeah, we fixed that one last month. I can send you his number if you want to hear it direct.'}
    ]
  },
  { id:'crocker', title:'Ben Crocker · NanoSeal partnership intro', date:'Apr 14', dur:'38 min', attendees:'Mackenzie · Ben Crocker (NanoSeal)', tag:'partner',
    summary: 'Ben is a red-seal certified carpenter running NanoSeal. Looking to subcontract or partner on roofing projects requiring carpentry expertise. Full follow-up Zoom scheduled Apr 21 at 1 PM.',
    insights: [
      {type:'win', title:'Capacity match', body:'Ben has red-seal carpentry you don\'t have in-house. Could handle mansard/complex structural work that you currently sub out.'},
      {type:'action', title:'Prep NanoSeal one-pager', body:'Before Apr 21 Zoom: outline subcontract terms, pay structure, and trial job scope.'},
      {type:'risk', title:'Exclusivity question', body:'Ben works with other roofers. Ask if exclusive arrangement is possible for Moncton/Riverview zone.'}
    ],
    snippets: [
      {sp:'Mackenzie', you:true, t:'08:14', text:'So you\'re red-seal certified? That\'s exactly the gap we have right now.'},
      {sp:'Ben', you:false, t:'08:20', text:'Yeah, 12 years. I specialize in structural and finish carpentry. Roofing edge work, fascia, mansard \u2014 that\'s my wheelhouse.'},
      {sp:'Mackenzie', you:true, t:'08:42', text:'Our top performer ad is actually a mansard job we just wrapped. If we could knock those out consistently, that opens up a whole tier.'}
    ]
  },
  { id:'partridge', title:'Robert Partridge · on-site + walkthrough', date:'Apr 12', dur:'55 min', attendees:'Mackenzie · Robert Partridge', tag:'sales',
    summary: 'Full on-site inspection at 32 Oak St. 28 SQ mansard with complex detail. Partridge is evaluating 3 contractors. Pushed Platinum tier + shell upgrade. Proposal sent Apr 18; 3 views in 48h.',
    insights: [
      {type:'win', title:'High intent', body:'3 proposal views in 48h = buying signal. Call this week.'},
      {type:'action', title:'Follow-up call scripted', body:'"Wanted to check in on the proposal \u2014 any questions I can answer?" Low-pressure, opens conversation.'},
      {type:'risk', title:'Shopping 3 contractors', body:'He mentioned getting 2 other quotes. Differentiate on workmanship + mansard experience. Offer the Shediac testimonial reference.'}
    ],
    snippets: [
      {sp:'Robert', you:false, t:'22:14', text:'I\'ve had two other guys come look at it already. What makes you different?'},
      {sp:'Mackenzie', you:true, t:'22:19', text:'Honest answer? Mansards are tricky. Most guys cut corners on the detail because it\'s time-consuming. We have a specific process \u2014 let me show you the Shediac job we finished last month.'},
      {sp:'Robert', you:false, t:'28:01', text:'What\'s your warranty situation?'},
      {sp:'Mackenzie', you:true, t:'28:04', text:'25-50 year from CertainTeed on materials depending on tier. Plus our 5-year workmanship warranty on the labor. And if it leaks in year one, we fix it and cover your hotel if it\'s uninhabitable. That\'s in writing.'}
    ]
  },
  { id:'aphl', title:'APHL · Kevin Chase · Q2 portfolio review', date:'Apr 8', dur:'1h 10min', attendees:'Mackenzie · Kevin Chase (APHL)', tag:'sales',
    summary: 'Quarterly review of APHL managed properties. Walked through 4 potential roofs. Tara Court is priority; two-tier quote requested. Competitor came in $5K below.',
    insights: [
      {type:'win', title:'Repeat customer', body:'$127K LTV already. Pattern-match the Core-Four "cold-outreach" win that scaled.'},
      {type:'action', title:'Differentiate on tenant experience', body:'Highlight crew professionalism \u2014 APHL has tenants. Cheap contractor = tenant complaints.'},
      {type:'risk', title:'Competitor undercut on price', body:'$11K vs our $16K on Tara Court. Explain material grade diff: repair-grade 3-tab vs architectural.'}
    ],
    snippets: [
      {sp:'Kevin', you:false, t:'34:12', text:'I\'ve got a quote for $11K on Tara. How are you at $16K?'},
      {sp:'Mackenzie', you:true, t:'34:18', text:'Fair question. Can I ask what they quoted \u2014 3-tab or architectural?'},
      {sp:'Kevin', you:false, t:'34:24', text:'Standard 3-tab.'},
      {sp:'Mackenzie', you:true, t:'34:26', text:'That\'s the difference. 3-tab is 15-20 year lifespan in NB weather. Architectural gets you 30-50. For a managed property you\'re holding long-term, the math is different.'}
    ]
  },
  { id:'seyeau-closeout', title:'Seyeau (Edgewater) · mid-project check-in', date:'Apr 10', dur:'22 min', attendees:'Mackenzie · Diego · Richard Seyeau', tag:'internal',
    summary: 'Mid-project walkthrough on the Edgewater mansard. Customer happy so far. FinanceIt funding cleared. Set expectation for caulk + mansard detail wrap by Apr 20.',
    insights: [
      {type:'win', title:'FinanceIt funded $29,900', body:'Use this case as social proof for other high-ticket deals. Testimonial worth asking for.'},
      {type:'action', title:'Schedule walk-through Apr 20+', body:'When mansard wraps, book the final walk-through and request Google review.'}
    ],
    snippets: [
      {sp:'Richard', you:false, t:'08:44', text:'The crew\'s been great. Diego keeps me in the loop every day.'},
      {sp:'Mackenzie', you:true, t:'08:48', text:'That means a lot. Diego\'s been with us 3 years now. When we wrap next week I\'ll schedule a walk-through and we\'ll do a final quality check together.'}
    ]
  },
  { id:'darcy-sync', title:'Darcy weekly sales sync', date:'Apr 14', dur:'34 min', attendees:'Mackenzie · Darcy', tag:'internal',
    summary: 'Weekly pipeline review. Darcy presenting Peach Apr 20. Lipton cooling; Darcy will re-engage with discount offer. Discussed commission structure clarity.',
    insights: [
      {type:'action', title:'Lipton re-engage script', body:'Darcy to send "Wanted to check in" message + a 5% spring-slot discount offer.'},
      {type:'risk', title:'Commission question', body:'Darcy wants clearer base + % structure. Address this in next 1:1 before he feels ambiguous about his deal.'}
    ],
    snippets: [
      {sp:'Darcy', you:false, t:'18:02', text:'The Lipton deal is going cold. Want me to push with a discount?'},
      {sp:'Mackenzie', you:true, t:'18:05', text:'5% spring-slot max. Don\'t go further than that \u2014 we\'re not a discount shop.'}
    ]
  }
];

const extraPlaceholders = 19;  // 25 total, 6 fleshed, 19 as placeholders
for (let i = 0; i < extraPlaceholders; i++) {
  meetings.push({
    id: 'mtg-' + i,
    title: ['Quick discovery call','Property inspection','Darcy-Mackenzie 1:1','Sub contractor briefing','Customer walk-through','Material vendor sync'][i % 6] + ' · #' + (i+7),
    date: 'Apr ' + (12 - (i % 10)),
    dur: (20 + i * 3) + ' min',
    attendees: ['Mackenzie','Darcy','Diego'][i % 3],
    tag: ['sales','internal','partner'][i % 3],
    summary: 'Full transcript available in Fathom. Click to view details.',
    insights: [],
    snippets: []
  });
}

let selectedId = 'peach';
let activeTab = 'summary';

function renderList(filter=''){
  const lower = filter.toLowerCase();
  const f = meetings.filter(m => !filter ||
    m.title.toLowerCase().includes(lower) ||
    m.summary.toLowerCase().includes(lower) ||
    m.attendees.toLowerCase().includes(lower)
  );
  const el = document.getElementById('mtgList');
  el.innerHTML = f.map(m => `
    <div class="mtg-row ${selectedId===m.id?'selected':''}" data-id="${m.id}" onclick="pickMtg('${m.id}')">
      <div class="mtg-head"><div class="mtg-title">${m.title}</div><div class="mtg-dur">${m.dur}</div></div>
      <div class="mtg-meta">${m.date} \u00B7 ${m.attendees}</div>
      <span class="mtg-tag ${m.tag}">${m.tag.toUpperCase()}</span>
    </div>
  `).join('') || '<div class="empty">No matches.</div>';
}

function pickMtg(id){ selectedId = id; activeTab = 'summary'; renderList(document.getElementById('searchInput').value); renderDetail(); }
function setTab(t){ activeTab = t; renderDetail(); }

function renderDetail(){
  const m = meetings.find(x => x.id === selectedId);
  const el = document.getElementById('detailPanel');
  if (!m) { el.innerHTML = '<div class="empty">Pick a meeting.</div>'; return; }
  const insightsHTML = (m.insights||[]).length
    ? m.insights.map(i => `<div class="ai-card"><div class="ai-head"><div class="ai-title ${i.type}">${i.type.toUpperCase()} \u00B7 ${i.title}</div></div><div class="ai-body">${i.body}</div></div>`).join('')
    : '<div class="empty">No insights extracted yet. Click "Re-analyze" to process with Ryujin.</div>';
  const snippetHTML = (m.snippets||[]).length
    ? m.snippets.map(s => `<div class="tscript ${s.you?'you':''}"><div class="sp"><span>${s.sp}</span><span class="t">${s.t}</span></div>${s.text}</div>`).join('')
    : '<div class="empty">Full transcript available in Fathom. Indexing pending.</div>';

  el.innerHTML = `
    <div class="detail-head">
      <div class="detail-title">${m.title}</div>
      <div class="detail-meta"><span>${m.date}</span><span>${m.dur}</span><span>${m.attendees}</span></div>
      <div class="detail-actions">
        <button class="act-btn primary" onclick="window.open('https://fathom.video/home','_blank')"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21"/></svg>OPEN IN FATHOM</button>
        <button class="act-btn ghost" onclick="reanalyze('${m.id}')"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>RE-ANALYZE WITH RYUJIN</button>
        <button class="act-btn ghost" onclick="exportNotes('${m.id}')"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/></svg>EXPORT NOTES</button>
      </div>
    </div>
    <div class="detail-tabs">
      <button class="tab ${activeTab==='summary'?'active':''}" onclick="setTab('summary')">Summary</button>
      <button class="tab ${activeTab==='insights'?'active':''}" onclick="setTab('insights')">Insights &amp; Actions</button>
      <button class="tab ${activeTab==='transcript'?'active':''}" onclick="setTab('transcript')">Transcript</button>
    </div>
    <div class="detail-body">
      ${activeTab === 'summary' ? `
        <div class="section-head">Summary<div class="rule"></div></div>
        <div class="summary-text">${m.summary}</div>
        <div class="section-head">Key Action Items<div class="rule"></div></div>
        ${(m.insights||[]).filter(i => i.type === 'action').map(i => `<div class="ai-card"><div class="ai-head"><div class="ai-title action">\u2192 ${i.title}</div></div><div class="ai-body">${i.body}</div></div>`).join('') || '<div class="empty" style="padding:20px">No action items logged.</div>'}
      ` : activeTab === 'insights' ? `
        <div class="section-head">Extracted by Ryujin<div class="rule"></div></div>
        ${insightsHTML}
      ` : `
        <div class="section-head">Transcript Snippets<div class="rule"></div></div>
        ${snippetHTML}
        <div style="margin-top:16px;padding:10px 12px;background:rgba(34,211,238,0.05);border:1px dashed rgba(34,211,238,0.25);border-radius:8px;font-size:0.78em;color:var(--text-dim);text-align:center">Full transcript in Fathom. Ryujin indexes excerpts for search and pattern-matching.</div>
      `}
    </div>
  `;
}

document.getElementById('searchInput').addEventListener('input', e => renderList(e.target.value));
function reanalyze(id){
  const queue = RyujinStore.load('ryujin_analyze_queue', []);
  queue.push({ mtg: id, at: new Date().toISOString() });
  RyujinStore.save('ryujin_analyze_queue', queue);
  RyujinToast('Queued for Ryujin re-analysis');
}
function exportNotes(id){
  const m = meetings.find(x => x.id === id);
  if (!m) return;
  const text = `${m.title}\n${m.date} \u00B7 ${m.dur} \u00B7 ${m.attendees}\n\n` +
    `SUMMARY\n${m.summary}\n\n` +
    `INSIGHTS\n` + (m.insights || []).map(i => `[${i.type.toUpperCase()}] ${i.title}: ${i.body}`).join('\n\n') +
    `\n\nTRANSCRIPT\n` + (m.snippets || []).map(s => `${s.sp} (${s.t}): ${s.text}`).join('\n');
  RyujinActions.downloadText(id + '-notes.txt', text);
  RyujinToast('Notes exported');
}
window.reanalyze = reanalyze;
window.exportNotes = exportNotes;
document.addEventListener('keydown', e => { if (e.key === 'Escape') window.location.href='sales.html'; });
document.addEventListener('contextmenu', e => { e.preventDefault(); window.location.href='sales.html'; });

Ryujin.init({
  sector: 'TRANSCRIPTS',
  root: {
    msg: "25 Fathom meetings indexed. <b>Most common objection pattern:</b> \u201Ccompetitor quoted cheaper\u201D \u2014 you\u2019ve answered this 7 times. Want me to pull the best responses into a sales playbook?",
    choices: [
      { text: 'Pull objection responses', next: 'obj' },
      { text: 'Open Peach meeting (most recent hot deal)', next: 'peach' },
      { text: 'APHL lifetime-value pattern', next: 'aphl' },
      { text: 'Just browse', dismiss: true }
    ]
  },
  states: {
    obj: { msg: "Pulled 7 price-objection handles across meetings. The best one: Kevin Chase 3/min 34 \u2014 you pivoted from price to material lifespan. I'll package as a Darcy training doc.", choices: [{text:'Send to Darcy', next:'root'}, {text:'Add to playbook', next:'root'}] },
    peach: { msg: "Opening Peach. Darcy has high close probability, Apr 20 presentation locked.", effect: () => pickMtg('peach'), choices: [{text:'Back', next:'root'}] },
    aphl: { msg: "APHL is your best case study for cold-outreach-to-commercial. $127K LTV from one cold door. Worth systematizing into a repeatable outreach playbook.", effect: () => pickMtg('aphl'), choices: [{text:'Draft outreach playbook', next:'root'}, {text:'Back', next:'root'}] }
  }
});

renderList();
renderDetail();
if(new URLSearchParams(location.search).has('embed')) document.documentElement.classList.add('embed-mode');
</script>
