<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow-x:hidden;min-height:100vh}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(251,146,60,0.12) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(251,146,60,0.24);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #fff;border-radius:10px;color:#030611;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none}
.btn-back:hover{background:rgba(255,255,255,0.85);box-shadow:0 0 14px rgba(255,255,255,0.35)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}

.stage{position:relative;z-index:5;padding:80px 28px 60px;max-width:1280px;margin:0 auto}
.hero{margin-bottom:20px}
.hero .eyebrow{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:#fb923c;letter-spacing:3px;margin-bottom:6px}
.hero h1{font-family:'Orbitron',sans-serif;font-size:2em;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.days{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
@media (max-width:1000px){.days{grid-template-columns:repeat(3,1fr)}}
@media (max-width:600px){.days{grid-template-columns:1fr}}
.day{background:rgba(14,22,40,0.55);border:1px solid rgba(251,146,60,0.14);border-radius:12px;padding:12px;display:flex;flex-direction:column;min-height:220px}
.day.today{background:rgba(251,146,60,0.08);border-color:rgba(251,146,60,0.45)}
.day-head{font-family:'Orbitron',sans-serif;font-size:0.74em;font-weight:800;letter-spacing:1.5px;color:rgba(200,220,255,0.7);margin-bottom:4px}
.day.today .day-head{color:#fb923c}
.day-date{font-family:'Share Tech Mono',monospace;font-size:0.66em;color:rgba(200,220,255,0.45);letter-spacing:1px;margin-bottom:12px}
.event{padding:8px 10px;background:rgba(6,10,20,0.55);border:1px solid rgba(251,146,60,0.1);border-radius:7px;margin-bottom:6px;font-size:0.8em;cursor:pointer;transition:all 0.15s;text-decoration:none;color:inherit;display:block}
.event:hover{border-color:rgba(251,146,60,0.4)}
.event .cust{font-weight:700;margin-bottom:2px}
.event .meta{font-family:'Share Tech Mono',monospace;font-size:0.62em;color:rgba(200,220,255,0.55);letter-spacing:0.5px}
.event.ps{border-color:rgba(34,211,238,0.2)}
.event.ps:hover{border-color:rgba(34,211,238,0.5)}
.empty-day{font-family:'Share Tech Mono',monospace;font-size:0.68em;color:rgba(200,220,255,0.3);letter-spacing:1.5px;text-align:center;padding:18px 0}
.loading{text-align:center;padding:60px;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1.5px}
.crew-filter{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.crew-pill{padding:9px 16px;background:rgba(14,22,40,0.55);border:1px solid rgba(251,146,60,0.18);border-radius:20px;font-family:'Share Tech Mono',monospace;font-size:0.72em;letter-spacing:1.2px;color:rgba(200,220,255,0.7);cursor:pointer;transition:all 0.2s;text-transform:uppercase}
.crew-pill:hover{color:#fb923c}
.crew-pill.on{background:rgba(251,146,60,0.14);border-color:#fb923c;color:#fb923c}
</style>
</head>
<body>
<div class="topbar">
  <a class="btn-back" href="production.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> BACK</a>
  <div style="display:flex;align-items:center;gap:10px"><div style="width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.3),rgba(251,146,60,0.22) 40%,rgba(30,10,5,0.8));box-shadow:0 0 14px rgba(251,146,60,0.35)"></div><div class="brand-name">RYUJIN <span class="dim">· SCHEDULE</span></div></div>
  <div class="tb-spacer"></div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px" id="countBadge">—</div>
</div>

<div class="stage">
  <div class="hero">
    <div class="eyebrow">PRODUCTION · NEXT 7 DAYS</div>
    <h1>This Week</h1>
  </div>
  <div class="crew-filter" id="crewFilter">
    <div class="crew-pill on" data-crew="all" onclick="setCrew('all',this)">All</div>
    <div class="crew-pill" data-crew="mackenzie" onclick="setCrew('mackenzie',this)">Mackenzie</div>
    <div class="crew-pill" data-crew="darcy" onclick="setCrew('darcy',this)">Darcy</div>
    <div class="crew-pill" data-crew="aj" onclick="setCrew('aj',this)">AJ</div>
    <div class="crew-pill" data-crew="diego" onclick="setCrew('diego',this)">Diego</div>
    <div class="crew-pill" data-crew="pavanjot" onclick="setCrew('pavanjot',this)">Pavanjot</div>
    <div class="crew-pill" data-crew="ryan" onclick="setCrew('ryan',this)">Ryan (Atlantic)</div>
  </div>
  <div class="days" id="days"><div class="loading" style="grid-column:1/-1">LOADING...</div></div>
</div>

<script>
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function dateKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y + '-' + m + '-' + day;
}

let RAW_WOS = [], RAW_PSS = [], crewFilter = 'all';

async function loadAll(){
  try {
    const headers = { 'x-tenant-id': 'plus-ultra' };
    const [woR, psR] = await Promise.all([
      fetch('/api/workorders?limit=200', { headers }),
      fetch('/api/paysheets?limit=200', { headers })
    ]);
    RAW_WOS = woR.ok ? (await woR.json()).workorders || [] : [];
    RAW_PSS = psR.ok ? (await psR.json()).paysheets || [] : [];
    render();
  } catch(e) {
    document.getElementById('days').innerHTML = '<div class="loading" style="grid-column:1/-1">Error: ' + e.message + '</div>';
  }
}

function setCrew(who, el){
  crewFilter = who;
  document.querySelectorAll('.crew-pill').forEach(p => p.classList.remove('on'));
  if (el) el.classList.add('on');
  render();
}

function matchesCrew(w){
  if (crewFilter === 'all') return true;
  const hay = ((w.sub_crew_lead || '') + ' ' + ((w.support_crew || []).join(' ')) + ' ' + (w.onsite_contact || '')).toLowerCase();
  if (crewFilter === 'ryan') return /ryan|atlantic/.test(hay);
  return hay.includes(crewFilter);
}

function render(){
  try {
    const wos = RAW_WOS.filter(matchesCrew);
    const pss = RAW_PSS;  // pay sheets always shown (they're subcontractor-scoped)
    const events = {};
    wos.forEach(w => {
      if (!w.start_date) return;
      (events[w.start_date] = events[w.start_date] || []).push({
        type: 'wo', customer: w.customer_name, address: w.address,
        tier: w.package_tier, sq: w.total_sq, crew: w.sub_crew_lead || '—',
        url: 'production-workorders.html'
      });
    });
    if (crewFilter === 'all' || crewFilter === 'ryan') {
      pss.forEach(p => {
        if (!p.scheduled_date) return;
        (events[p.scheduled_date] = events[p.scheduled_date] || []).push({
          type: 'ps', customer: p.customer_name, address: p.address,
          total: p.total, url: 'production-paysheet.html'
        });
      });
    }

    const days = [];
    const today = new Date(); today.setHours(0,0,0,0);
    for (let i = 0; i < 7; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      days.push(d);
    }

    let totalEvents = 0;
    document.getElementById('days').innerHTML = days.map(d => {
      const key = dateKey(d);
      const evs = events[key] || [];
      totalEvents += evs.length;
      const dow = d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase();
      const dateStr = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
      const isToday = key === dateKey(new Date());
      return '<div class="day ' + (isToday ? 'today' : '') + '">' +
        '<div class="day-head">' + dow + (isToday ? ' · TODAY' : '') + '</div>' +
        '<div class="day-date">' + dateStr + '</div>' +
        (evs.length ? evs.map(function(e){
          return '<a class="event ' + e.type + '" href="' + e.url + '">' +
            '<div class="cust">' + esc(e.customer || '(no name)') + '</div>' +
            '<div class="meta">' + esc(e.address || '') + '</div>' +
            '<div class="meta" style="margin-top:3px;color:#fb923c">' +
            (e.type === 'wo' ? (e.tier||'').toUpperCase() + ' · ' + (e.sq||'?') + ' SQ' : '$' + Math.round((e.total||0)/1000) + 'K') +
            '</div></a>';
        }).join('') : '<div class="empty-day">NO WORK</div>') +
      '</div>';
    }).join('');
    document.getElementById('countBadge').textContent = totalEvents + ' ITEM' + (totalEvents===1?'':'S');
  } catch(e) {
    document.getElementById('days').innerHTML = '<div class="loading" style="grid-column:1/-1">Error: ' + e.message + '</div>';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); window.location.href = 'production.html'; } });
loadAll();
</script>

</body>
</html>
