<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Before / After Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow-x:hidden;min-height:100vh}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(251,146,60,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(34,211,238,0.08) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(251,146,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(251,146,60,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}

.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(251,146,60,0.24);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#fb923c,#22d3ee,transparent);opacity:0.55}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #fff;border-radius:10px;color:#030611;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none}
.btn-back:hover{background:rgba(255,255,255,0.85)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.3),rgba(251,146,60,0.22) 40%,rgba(30,10,5,0.8));box-shadow:0 0 14px rgba(251,146,60,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}

.stage{position:relative;z-index:5;padding:80px 28px 60px;max-width:1440px;margin:0 auto}

h1.hd{font-family:'Orbitron',sans-serif;font-size:1.6em;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.hd-sub{font-family:'Share Tech Mono',monospace;font-size:0.8em;color:rgba(200,220,255,0.6);letter-spacing:1.5px;margin-bottom:18px}

.toolbar{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-bottom:18px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-family:'Share Tech Mono',monospace;font-size:0.66em;color:rgba(200,220,255,0.55);letter-spacing:1.5px;text-transform:uppercase}
.field input,.field select{padding:8px 12px;border-radius:8px;background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.28);color:#e0e6f0;font-family:'Inter',system-ui,sans-serif;font-size:0.95em;outline:none}
.field input:focus,.field select:focus{border-color:#fb923c}
.fmt-toggle{display:flex;gap:6px}
.fmt-toggle button{padding:8px 14px;border-radius:8px;background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.28);color:#e0e6f0;font-family:'Share Tech Mono',monospace;font-size:0.72em;letter-spacing:1.2px;cursor:pointer;text-transform:uppercase}
.fmt-toggle button.on{background:rgba(251,146,60,0.18);border-color:#fb923c;color:#fb923c}

.layout{display:grid;grid-template-columns:280px 1fr 280px;gap:14px;align-items:start}
@media (max-width:1100px){.layout{grid-template-columns:1fr}}

.rail{background:rgba(14,22,40,0.55);border:1px solid rgba(251,146,60,0.14);border-radius:14px;overflow:hidden}
.rail-head{padding:12px 14px;background:rgba(6,10,20,0.55);border-bottom:1px solid rgba(251,146,60,0.1);font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2px}
.rail-head.before-h{color:#fb923c}
.rail-head.after-h{color:#4ade80}
.rail-list{padding:10px;display:flex;flex-direction:column;gap:8px;max-height:600px;overflow-y:auto}
.rail-photo{position:relative;border-radius:10px;overflow:hidden;background:rgba(6,10,20,0.6);border:2px solid transparent;cursor:pointer;transition:border-color 0.15s}
.rail-photo:hover{border-color:rgba(251,146,60,0.5)}
.rail-photo.selected{border-color:#22d3ee;box-shadow:0 0 14px rgba(34,211,238,0.4)}
.rail-photo img{display:block;width:100%;aspect-ratio:4/3;object-fit:cover}
.rail-photo .check{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:#22d3ee;color:#030611;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1em;line-height:1;opacity:0;transition:opacity 0.15s}
.rail-photo.selected .check{opacity:1}
.rail-empty{padding:30px 16px;text-align:center;color:rgba(200,220,255,0.4);font-family:'Share Tech Mono',monospace;font-size:0.72em;letter-spacing:1.2px;line-height:1.55}

.preview{background:rgba(14,22,40,0.55);border:1px solid rgba(251,146,60,0.14);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:14px;align-items:center;min-height:600px;justify-content:center;position:relative}
.preview img.poster{max-width:100%;max-height:540px;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,0.55)}
.preview-empty{color:rgba(200,220,255,0.5);font-family:'Share Tech Mono',monospace;font-size:0.84em;letter-spacing:1.5px;text-align:center;line-height:1.6;padding:60px 30px}
.preview-loading{color:#22d3ee;font-family:'Share Tech Mono',monospace;font-size:0.78em;letter-spacing:1.5px}
.preview-error{color:#f87171;font-family:'Share Tech Mono',monospace;font-size:0.78em;letter-spacing:1.2px;text-align:center;padding:30px;line-height:1.5}

.preview-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.act{padding:9px 18px;border-radius:9px;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:700;letter-spacing:1.5px;text-decoration:none;border:1px solid;cursor:pointer;background:transparent}
.act.primary{background:rgba(251,146,60,0.14);color:#fb923c;border-color:rgba(251,146,60,0.45)}
.act.primary:hover{background:rgba(251,146,60,0.25)}
.act.cyan{background:rgba(34,211,238,0.12);color:#22d3ee;border-color:rgba(34,211,238,0.4)}
.act.cyan:hover{background:rgba(34,211,238,0.22)}
.act:disabled,.act.disabled{opacity:0.45;cursor:not-allowed}

.muted{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(200,220,255,0.45);letter-spacing:1px}
.loading{padding:60px;text-align:center;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace}
</style>
  <script src="/assets/auth-guard.js"></script>
</head>
<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="btn-back" id="backBtn" href="job.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> BACK TO JOB</a>
  <div style="display:flex;align-items:center;gap:10px"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">/ BEFORE-AFTER STUDIO</span></div></div>
  <div class="tb-spacer"></div>
  <div class="muted" id="ctxLabel">-</div>
</div>

<div class="stage" id="stage">
  <h1 class="hd">BEFORE / AFTER POST</h1>
  <div class="hd-sub">Pick one before + one after. Edit the burned-in text. Download.</div>

  <div class="toolbar">
    <div class="field">
      <label for="addrInput">Address (burned in)</label>
      <input id="addrInput" type="text" placeholder="265 Irving Blvd"/>
    </div>
    <div class="field">
      <label for="prodInput">Product (burned in)</label>
      <input id="prodInput" type="text" placeholder="CertainTeed Landmark Pro - Pewterwood"/>
    </div>
    <div class="field">
      <label>Format</label>
      <div class="fmt-toggle" id="fmtToggle">
        <button type="button" data-fmt="square" class="on">SQUARE 1080</button>
        <button type="button" data-fmt="landscape">LANDSCAPE 1920</button>
      </div>
    </div>
  </div>

  <div class="layout">
    <div class="rail">
      <div class="rail-head before-h">BEFORE</div>
      <div class="rail-list" id="beforeList"><div class="rail-empty">Loading...</div></div>
    </div>
    <div class="preview" id="previewPane">
      <div class="preview-empty">Pick one BEFORE on the left and one AFTER on the right to generate a preview.</div>
    </div>
    <div class="rail">
      <div class="rail-head after-h">AFTER</div>
      <div class="rail-list" id="afterList"><div class="rail-empty">Loading...</div></div>
    </div>
  </div>
</div>

<script>
const TENANT = 'plus-ultra';
const $ = id => document.getElementById(id);
function ah(){ return { 'x-tenant-id': TENANT, ...(window.RyujinAuth ? window.RyujinAuth.headers() : {}) }; }
function el(tag, attrs = {}, ...children){
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null || v === false) continue;
    if (k === 'class') node.className = v;
    else if (k === 'dataset') Object.assign(node.dataset, v);
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2).toLowerCase(), v);
    else node.setAttribute(k, String(v));
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (Array.isArray(c)) c.forEach(x => node.appendChild(typeof x === 'string' ? document.createTextNode(x) : x));
    else node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return node;
}

const state = {
  woId: new URLSearchParams(location.search).get('wo'),
  estId: new URLSearchParams(location.search).get('estimate_id'),
  before: [],
  after: [],
  selectedBefore: null,
  selectedAfter: null,
  format: 'square',
  address: '',
  product: '',
  generating: false,
  lastUrl: null,
  reqSeq: 0,
};

let debounceTimer = null;
function scheduleGen(){
  if (debounceTimer) clearTimeout(debounceTimer);
  debounceTimer = setTimeout(generate, 250);
}

async function bootstrap(){
  if (!state.woId && !state.estId) {
    $('previewPane').innerHTML = '';
    $('previewPane').appendChild(el('div', { class: 'preview-error' }, 'Missing ?wo= or ?estimate_id= in the URL. Open this page from the job folder.'));
    return;
  }
  if (state.woId) $('backBtn').href = 'job.html?wo=' + encodeURIComponent(state.woId);

  // Fetch job context for prefill (address + product) and the before/after pool.
  try {
    const params = new URLSearchParams();
    if (state.woId) params.set('wo_id', state.woId);
    if (state.estId) params.set('estimate_id', state.estId);
    const r = await fetch('/api/before-after?' + params.toString(), { headers: ah() });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    state.before = data.before || [];
    state.after = data.after || [];
  } catch (e) {
    $('beforeList').innerHTML = '';
    $('afterList').innerHTML = '';
    $('beforeList').appendChild(el('div', { class: 'rail-empty' }, 'Could not load photos: ' + e.message));
    return;
  }

  // Prefill address + product from the workorder when present.
  if (state.woId) {
    try {
      const r = await fetch('/api/workorders?id=' + encodeURIComponent(state.woId), { headers: ah() });
      if (r.ok) {
        const wo = await r.json();
        state.product = [wo.shingle_product, wo.shingle_color].filter(Boolean).join(' - ');
        state.address = wo.address || '';
        if (wo.customer_name) $('ctxLabel').textContent = 'WO ' + (wo.wo_number || '').toString().slice(0, 6) + ' / ' + wo.customer_name;
      }
    } catch {}
  }

  $('addrInput').value = state.address || '';
  $('prodInput').value = state.product || '';
  renderRails();
  bindToolbar();
}

function renderRails(){
  fillRail($('beforeList'), state.before, 'before');
  fillRail($('afterList'), state.after, 'after');
}

function fillRail(mount, photos, side){
  mount.innerHTML = '';
  if (!photos.length) {
    mount.appendChild(el('div', { class: 'rail-empty' }, 'No ' + side.toUpperCase() + ' photos marked yet. Mark some in the job folder, then refresh.'));
    return;
  }
  photos.forEach(p => {
    const tile = el('div', { class: 'rail-photo', dataset: { id: p.id, src: p.source || '' } });
    tile.appendChild(el('img', { src: p.url, loading: 'lazy', alt: p.caption || '' }));
    tile.appendChild(el('div', { class: 'check' }, '✓'));
    tile.addEventListener('click', () => {
      const key = side === 'before' ? 'selectedBefore' : 'selectedAfter';
      // Toggle: clicking the already-selected tile clears it.
      if (state[key] && state[key].id === p.id) {
        state[key] = null;
      } else {
        state[key] = { id: p.id, source: p.source, url: p.url };
      }
      mount.querySelectorAll('.rail-photo').forEach(t => t.classList.toggle('selected', state[key] && t.dataset.id === state[key].id));
      scheduleGen();
    });
    mount.appendChild(tile);
  });
}

function bindToolbar(){
  $('addrInput').addEventListener('input', e => { state.address = e.target.value; scheduleGen(); });
  $('prodInput').addEventListener('input', e => { state.product = e.target.value; scheduleGen(); });
  document.querySelectorAll('#fmtToggle button').forEach(b => {
    b.addEventListener('click', () => {
      state.format = b.dataset.fmt;
      document.querySelectorAll('#fmtToggle button').forEach(x => x.classList.toggle('on', x === b));
      scheduleGen();
    });
  });
}

async function generate(){
  if (!state.selectedBefore || !state.selectedAfter) {
    $('previewPane').innerHTML = '';
    $('previewPane').appendChild(el('div', { class: 'preview-empty' }, 'Pick one BEFORE on the left and one AFTER on the right to generate a preview.'));
    return;
  }
  const seq = ++state.reqSeq;
  $('previewPane').innerHTML = '';
  $('previewPane').appendChild(el('div', { class: 'preview-loading' }, 'GENERATING...'));
  try {
    const r = await fetch('/api/before-after-generate', {
      method: 'POST',
      headers: { ...ah(), 'Content-Type': 'application/json' },
      body: JSON.stringify({
        before_id: state.selectedBefore.id,
        after_id: state.selectedAfter.id,
        before_source: state.selectedBefore.source,
        after_source: state.selectedAfter.source,
        format: state.format,
        address: state.address,
        product: state.product,
        wo_id: state.woId || null,
      }),
    });
    if (seq !== state.reqSeq) return; // a newer request superseded this one
    if (!r.ok) {
      const txt = await r.text().catch(() => '');
      throw new Error('HTTP ' + r.status + (txt ? ': ' + txt.slice(0, 140) : ''));
    }
    const data = await r.json();
    state.lastUrl = data.url;
    $('previewPane').innerHTML = '';
    $('previewPane').appendChild(el('img', { class: 'poster', src: data.url, alt: 'Before-After preview' }));
    const actions = el('div', { class: 'preview-actions' });
    const dl = el('a', { class: 'act primary', href: data.url, download: '' }, 'DOWNLOAD JPEG');
    const open = el('a', { class: 'act cyan', href: data.url, target: '_blank' }, 'OPEN FULL SIZE');
    actions.appendChild(dl);
    actions.appendChild(open);
    $('previewPane').appendChild(actions);
    $('previewPane').appendChild(el('div', { class: 'muted' }, data.width + 'x' + data.height + ' / ' + Math.round(data.size / 1024) + ' KB'));
  } catch (e) {
    if (seq !== state.reqSeq) return;
    $('previewPane').innerHTML = '';
    $('previewPane').appendChild(el('div', { class: 'preview-error' }, e.message));
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); history.back(); } });
bootstrap();
</script>

<script src="assets/ryujin-mode.js"></script>
<script src="assets/ryujin-tenant.js"></script>

</body>
</html>
