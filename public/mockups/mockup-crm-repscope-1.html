<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ryujin // Follow-Up Roster</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
:root{
  --rj-bg:#030611; --rj-bg-2:#060b16; --rj-surface:#0a1120; --rj-surface-2:#0e1727; --rj-surface-sunken:#050811;
  --rj-glass:rgba(14,22,40,0.62); --rj-glass-blur:16px; --rj-glass-edge:rgba(150,190,255,0.50); --rj-glass-inner:rgba(120,170,255,0.10);
  --rj-ink:#e9eefa; --rj-ink-mid:rgba(202,216,242,0.82); --rj-ink-dim:rgba(165,190,226,0.62);
  --rj-accent:#4a9eff; --rj-accent-bright:#7ab6ff; --rj-accent-deep:#2563eb; --rj-accent-glow:rgba(74,158,255,0.40); --rj-on-accent:#061021;
  --rj-line:rgba(122,162,222,0.16); --rj-line-strong:rgba(122,162,222,0.30); --rj-bracket:rgba(74,158,255,0.55);
  --rj-ok:#46d68a; --rj-warn:#f5b13a; --rj-danger:#f8746e;
  --rj-attention:#f5b13a; --rj-attention-glow:rgba(245,177,58,0.32);
  --rj-font-ui:'Inter',system-ui,sans-serif; --rj-font-display:'Orbitron','Inter',sans-serif; --rj-font-mono:'Share Tech Mono',monospace;
  --rj-radius-sm:8px; --rj-radius:12px; --rj-radius-lg:16px; --rj-radius-pill:999px;

  /* rep accent map */
  --rep-mackenzie:#4a9eff;
  --rep-darcy:#46d68a;
  --rep-diego:#c08bff;
  --rep-none:#7e8aa6;

  --ease-out-quint:cubic-bezier(.22,1,.36,1);
  --ease-spring:cubic-bezier(.16,1.18,.32,1);

  --z-grid:1; --z-raised:5; --z-sticky:20; --z-overlay:40; --z-toast:60;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--rj-font-ui);
  color:var(--rj-ink);
  background:var(--rj-bg);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  line-height:1.45;
  overflow-x:hidden;
}

/* ambient field */
.field{
  position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
  background:
    radial-gradient(1100px 700px at 18% -8%, rgba(37,99,235,0.16), transparent 60%),
    radial-gradient(900px 620px at 92% 4%, rgba(74,158,255,0.10), transparent 62%),
    radial-gradient(1000px 800px at 50% 118%, rgba(15,30,60,0.55), transparent 60%),
    linear-gradient(180deg, var(--rj-bg) 0%, var(--rj-bg-2) 55%, var(--rj-bg) 100%);
}
.field::before{
  content:""; position:absolute; inset:-2px;
  background-image:
    linear-gradient(var(--rj-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--rj-line) 1px, transparent 1px);
  background-size:46px 46px;
  -webkit-mask-image:radial-gradient(1200px 760px at 50% 22%, #000 0%, transparent 78%);
          mask-image:radial-gradient(1200px 760px at 50% 22%, #000 0%, transparent 78%);
  opacity:.5;
}
.field::after{
  content:""; position:absolute; inset:0;
  background:radial-gradient(2px 2px at 20% 30%, rgba(150,190,255,.5), transparent),
             radial-gradient(2px 2px at 70% 60%, rgba(150,190,255,.35), transparent),
             radial-gradient(1.5px 1.5px at 40% 80%, rgba(150,190,255,.4), transparent),
             radial-gradient(1.5px 1.5px at 85% 25%, rgba(150,190,255,.3), transparent);
  opacity:.6;
  animation:drift 26s linear infinite;
}
@keyframes drift{from{transform:translateY(0)}to{transform:translateY(-46px)}}

.wrap{position:relative; z-index:1; max-width:1280px; margin:0 auto; padding:22px 22px 80px;}

/* ---------- top chrome ---------- */
.topbar{
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  padding-bottom:18px; border-bottom:1px solid var(--rj-line);
}
.brand{display:flex; align-items:center; gap:12px; min-width:0;}
.brand .glyph{
  width:38px; height:38px; flex:none; border-radius:10px;
  display:grid; place-items:center;
  background:linear-gradient(150deg, rgba(74,158,255,.30), rgba(37,99,235,.10));
  border:1px solid var(--rj-glass-edge);
  box-shadow:inset 0 0 14px var(--rj-glass-inner), 0 0 18px var(--rj-accent-glow);
  font-family:var(--rj-font-display); font-weight:800; color:var(--rj-accent-bright); font-size:18px;
}
.brand h1{
  font-family:var(--rj-font-display); font-weight:700; font-size:15px; letter-spacing:.16em;
  text-transform:uppercase; margin:0; color:var(--rj-ink);
}
.brand .sub{font-size:11px; color:var(--rj-ink-dim); letter-spacing:.08em; margin-top:2px;}

.preview-tag{
  margin-left:auto; display:inline-flex; align-items:center; gap:8px;
  font-family:var(--rj-font-mono); font-size:11px; letter-spacing:.10em; text-transform:uppercase;
  color:var(--rj-warn);
  border:1px dashed var(--rj-attention); border-radius:var(--rj-radius-pill);
  padding:6px 12px; background:var(--rj-attention-glow);
}
.preview-tag .dot{width:7px; height:7px; border-radius:50%; background:var(--rj-warn); box-shadow:0 0 8px var(--rj-warn); animation:pulse 2.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* ---------- rep control ---------- */
.controls{
  margin-top:22px;
  display:flex; flex-direction:column; align-items:center; gap:14px;
}
.rep-label{
  font-family:var(--rj-font-mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--rj-ink-dim);
  display:flex; align-items:center; gap:10px;
}
.rep-label b{color:var(--rj-accent-bright); font-weight:400;}
.rep-label .whose{
  color:var(--rj-ink); font-weight:700; font-family:var(--rj-font-ui); letter-spacing:.02em; text-transform:none; font-size:13px;
}

.repseg{
  position:relative; display:inline-flex; padding:5px; gap:4px;
  background:var(--rj-surface-sunken);
  border:1px solid var(--rj-line-strong);
  border-radius:var(--rj-radius-pill);
  box-shadow:inset 0 2px 10px rgba(0,0,0,.5);
}
.repseg .thumb{
  position:absolute; top:5px; bottom:5px; left:5px;
  border-radius:var(--rj-radius-pill);
  background:linear-gradient(180deg, rgba(74,158,255,.30), rgba(37,99,235,.18));
  border:1px solid var(--rj-glass-edge);
  box-shadow:0 0 16px var(--rep-glow, var(--rj-accent-glow)), inset 0 0 12px var(--rj-glass-inner);
  transition:transform .42s var(--ease-spring), width .42s var(--ease-spring), background .3s ease, box-shadow .3s ease;
  z-index:0;
}
.repseg button{
  position:relative; z-index:1; appearance:none; cursor:pointer;
  background:transparent; border:0; color:var(--rj-ink-dim);
  font-family:var(--rj-font-display); font-weight:600; font-size:12px; letter-spacing:.10em; text-transform:uppercase;
  padding:9px 16px; border-radius:var(--rj-radius-pill);
  display:inline-flex; align-items:center; gap:8px;
  transition:color .25s ease;
}
.repseg button .pip{width:8px; height:8px; border-radius:50%; background:currentColor; box-shadow:0 0 6px currentColor;}
.repseg button[data-rep="Mackenzie"] .pip{color:var(--rep-mackenzie);}
.repseg button[data-rep="Darcy"] .pip{color:var(--rep-darcy);}
.repseg button[data-rep="Diego"] .pip{color:var(--rep-diego);}
.repseg button[data-rep="All"] .pip{background:linear-gradient(90deg,var(--rep-mackenzie),var(--rep-darcy),var(--rep-diego)); box-shadow:none;}
.repseg button.active{color:var(--rj-ink);}
.repseg button:not(.active):hover{color:var(--rj-ink-mid);}
.repseg button .default-flag{
  font-family:var(--rj-font-mono); font-size:8.5px; letter-spacing:.08em; color:var(--rj-on-accent);
  background:var(--rj-accent-bright); border-radius:3px; padding:1px 4px; transform:translateY(-1px);
}

/* preset + count row */
.subcontrols{
  margin-top:6px; width:100%;
  display:flex; align-items:center; justify-content:center; gap:18px; flex-wrap:wrap;
}
.presets{display:inline-flex; gap:6px; background:var(--rj-surface-sunken); border:1px solid var(--rj-line); border-radius:var(--rj-radius); padding:4px;}
.presets button{
  appearance:none; cursor:pointer; border:0; background:transparent; color:var(--rj-ink-dim);
  font-family:var(--rj-font-ui); font-weight:600; font-size:12px; padding:7px 13px; border-radius:var(--rj-radius-sm);
  display:inline-flex; flex-direction:column; align-items:flex-start; gap:1px; transition:background .22s ease, color .22s ease;
}
.presets button .pk{font-family:var(--rj-font-mono); font-size:9px; letter-spacing:.10em; text-transform:uppercase; color:var(--rj-ink-dim);}
.presets button.active{background:rgba(74,158,255,.16); color:var(--rj-ink); box-shadow:inset 0 0 0 1px var(--rj-line-strong);}
.presets button.active .pk{color:var(--rj-accent-bright);}
.presets button:not(.active):hover{color:var(--rj-ink-mid);}

.tally{
  font-family:var(--rj-font-mono); font-size:12px; letter-spacing:.04em; color:var(--rj-ink-dim);
  display:inline-flex; align-items:center; gap:14px;
}
.tally b{color:var(--rj-ink); font-weight:400;}
.tally .val{color:var(--rj-accent-bright);}

/* ---------- board ---------- */
.board{
  margin-top:26px;
  display:grid; gap:16px;
  grid-template-columns:repeat(auto-fill, minmax(248px, 1fr));
}

/* bubble */
.bubble{
  position:relative; cursor:pointer; isolation:isolate;
  border-radius:var(--rj-radius-lg);
  background:var(--rj-glass);
  -webkit-backdrop-filter:blur(var(--rj-glass-blur)); backdrop-filter:blur(var(--rj-glass-blur));
  border:1px solid var(--rj-line-strong);
  padding:16px 16px 14px;
  min-height:150px;
  display:flex; flex-direction:column; gap:10px;
  box-shadow:0 12px 30px rgba(0,0,0,.40), inset 0 1px 0 rgba(255,255,255,.04);
  transition:transform .32s var(--ease-spring), box-shadow .3s ease, border-color .3s ease, opacity .3s ease;
  --rep-accent:var(--rj-accent);
}
.bubble::before{ /* owner edge glow */
  content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
  box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--rep-accent) 38%, transparent),
             inset 0 -22px 38px -26px var(--rep-accent);
  opacity:.9;
}
.bubble:hover{transform:translateY(-3px); box-shadow:0 18px 40px rgba(0,0,0,.5), 0 0 24px color-mix(in srgb, var(--rep-accent) 26%, transparent);}
.bubble:focus-visible{outline:2px solid var(--rj-accent-bright); outline-offset:3px;}

.bubble.lost,.bubble.nocontact{
  opacity:.5; filter:grayscale(.5);
  background:rgba(10,16,28,.42);
}
.bubble.lost:hover,.bubble.nocontact:hover{opacity:.72; transform:translateY(-2px);}
.bubble.lost::before,.bubble.nocontact::before{opacity:.4;}

/* bubble head */
.b-top{display:flex; align-items:flex-start; gap:10px;}
.owner-pip{
  width:11px; height:11px; flex:none; border-radius:50%; margin-top:5px;
  background:var(--rep-accent); box-shadow:0 0 10px var(--rep-accent);
}
.b-name{min-width:0; flex:1;}
.b-name h3{
  margin:0; font-size:15px; font-weight:700; color:var(--rj-ink); letter-spacing:.005em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.b-addr{font-size:11.5px; color:var(--rj-ink-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px;}

/* score ring */
.ring{position:relative; width:44px; height:44px; flex:none;}
.ring svg{transform:rotate(-90deg); display:block;}
.ring .track{stroke:var(--rj-line-strong); fill:none;}
.ring .meter{fill:none; stroke:var(--rep-accent); stroke-linecap:round; transition:stroke-dashoffset .9s var(--ease-out-quint);}
.ring .num{
  position:absolute; inset:0; display:grid; place-items:center;
  font-family:var(--rj-font-mono); font-size:13px; color:var(--rj-ink); font-variant-numeric:tabular-nums;
}
.ring.dim .num{color:var(--rj-ink-dim);}

/* status + value chips */
.b-chips{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:auto;}
.chip{
  font-family:var(--rj-font-mono); font-size:10.5px; letter-spacing:.04em; text-transform:uppercase;
  padding:4px 8px; border-radius:var(--rj-radius-pill); border:1px solid var(--rj-line-strong);
  color:var(--rj-ink-mid); white-space:nowrap;
}
.chip.status-open{color:var(--rj-ink-mid);}
.chip.status-lost{color:var(--rj-danger); border-color:color-mix(in srgb,var(--rj-danger) 40%, transparent); background:rgba(248,116,110,.10);}
.chip.value{
  margin-left:auto; font-size:13px; color:var(--rj-ink); letter-spacing:0;
  border-color:color-mix(in srgb,var(--rep-accent) 35%, transparent);
  font-variant-numeric:tabular-nums;
}
.chip.value.zero{color:var(--rj-ink-dim);}

/* touch line (calm view, one-glance honesty) */
.b-touch{
  display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--rj-ink-dim);
  padding-top:8px; border-top:1px solid var(--rj-line);
}
.touch-tag{
  font-family:var(--rj-font-mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase;
  padding:2px 6px; border-radius:5px; flex:none;
}
.touch-tag.human{color:var(--rj-ink); border:1px solid var(--rj-line-strong);}
.touch-tag.human.inbound{color:var(--rj-ok); border-color:color-mix(in srgb,var(--rj-ok) 45%,transparent); background:rgba(70,214,138,.10);}
.touch-tag.auto{color:var(--rj-warn); border:1px dashed var(--rj-attention); background:var(--rj-attention-glow);}
.b-touch .ago{margin-left:auto; flex:none; font-family:var(--rj-font-mono); font-variant-numeric:tabular-nums;}

/* ---------- expanded drill panel (overlay) ---------- */
.scrim{
  position:fixed; inset:0; z-index:var(--z-overlay);
  background:rgba(2,5,12,.66);
  -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
  display:grid; place-items:center; padding:24px;
  opacity:0; pointer-events:none; transition:opacity .28s ease;
}
.scrim.open{opacity:1; pointer-events:auto;}

.drill{
  position:relative; width:min(560px, 100%); max-height:88vh; overflow:auto;
  border-radius:var(--rj-radius-lg);
  background:linear-gradient(180deg, var(--rj-surface-2), var(--rj-surface));
  border:1px solid var(--rj-glass-edge);
  box-shadow:0 40px 90px rgba(0,0,0,.7), 0 0 40px color-mix(in srgb,var(--drep,var(--rj-accent)) 22%, transparent), inset 0 1px 0 rgba(255,255,255,.05);
  transform:scale(.9) translateY(12px); opacity:0;
  transition:transform .42s var(--ease-spring), opacity .3s ease;
  --drep:var(--rj-accent);
}
.scrim.open .drill{transform:scale(1) translateY(0); opacity:1;}

.drill-bar{height:3px; width:100%; background:linear-gradient(90deg, var(--drep), transparent 75%); border-radius:var(--rj-radius-lg) var(--rj-radius-lg) 0 0;}
.drill-inner{padding:22px 24px 24px;}

.drill-head{display:flex; align-items:flex-start; gap:14px;}
.drill-head .owner-pip{margin-top:7px; width:13px; height:13px;}
.drill-head h2{margin:0; font-size:22px; font-weight:700; letter-spacing:.005em; color:var(--rj-ink);}
.drill-head .addr{font-size:13px; color:var(--rj-ink-dim); margin-top:3px;}
.drill-head .ring{width:56px; height:56px; margin-left:auto;}
.drill-head .ring .num{font-size:16px;}

.drill-meta{display:flex; flex-wrap:wrap; gap:8px; margin-top:16px;}
.drill-meta .chip{font-size:11px; padding:5px 10px;}
.owner-chip{
  display:inline-flex; align-items:center; gap:7px;
  font-family:var(--rj-font-mono); font-size:11px; letter-spacing:.05em; text-transform:uppercase;
  padding:5px 10px; border-radius:var(--rj-radius-pill);
  border:1px solid color-mix(in srgb,var(--drep) 45%, transparent);
  color:var(--rj-ink); background:color-mix(in srgb,var(--drep) 12%, transparent);
}
.owner-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--drep);box-shadow:0 0 8px var(--drep);}

/* context rows: this is the full-context rule made legible */
.ctx{margin-top:20px; display:flex; flex-direction:column; gap:1px; border:1px solid var(--rj-line); border-radius:var(--rj-radius); overflow:hidden; background:var(--rj-surface-sunken);}
.ctx-row{display:grid; grid-template-columns:138px 1fr; gap:10px; padding:13px 15px; background:var(--rj-surface); align-items:start;}
.ctx-row + .ctx-row{border-top:1px solid var(--rj-line);}
.ctx-k{
  font-family:var(--rj-font-mono); font-size:10px; letter-spacing:.10em; text-transform:uppercase; color:var(--rj-ink-dim);
  padding-top:2px;
}
.ctx-v{font-size:13.5px; color:var(--rj-ink); line-height:1.5;}
.ctx-v .who{font-weight:700;}
.ctx-v em{font-style:normal; color:var(--rj-ink-mid);}
.ctx-v .muted{color:var(--rj-ink-dim);}

.dir-flag{
  display:inline-flex; align-items:center; gap:6px;
  font-family:var(--rj-font-mono); font-size:10px; letter-spacing:.05em; text-transform:uppercase;
  padding:2px 7px; border-radius:5px; margin-right:8px; vertical-align:1px;
}
.dir-flag.outbound{color:var(--rj-accent-bright); border:1px solid color-mix(in srgb,var(--rj-accent) 45%,transparent);}
.dir-flag.inbound{color:var(--rj-ok); border:1px solid color-mix(in srgb,var(--rj-ok) 45%,transparent); background:rgba(70,214,138,.08);}
.dir-flag.auto{color:var(--rj-warn); border:1px dashed var(--rj-attention); background:var(--rj-attention-glow);}

.quote-state{font-weight:600;}
.quote-state.out{color:var(--rj-accent-bright);}
.quote-state.none{color:var(--rj-warn);}

.reasons{display:flex; flex-wrap:wrap; gap:6px; margin-top:14px;}
.reason{
  font-size:11.5px; color:var(--rj-ink-mid);
  padding:5px 10px; border-radius:var(--rj-radius-pill);
  border:1px solid var(--rj-line-strong); background:rgba(74,158,255,.06);
}
.reason.lost{color:var(--rj-danger); border-color:color-mix(in srgb,var(--rj-danger) 40%, transparent); background:rgba(248,116,110,.08);}

.drill-actions{margin-top:20px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
.btn-draft{
  appearance:none; cursor:pointer; border:0;
  font-family:var(--rj-font-display); font-weight:600; font-size:12.5px; letter-spacing:.06em; text-transform:uppercase;
  color:var(--rj-on-accent);
  background:linear-gradient(180deg, var(--rj-accent-bright), var(--rj-accent-deep));
  border-radius:var(--rj-radius); padding:12px 18px;
  display:inline-flex; align-items:center; gap:9px;
  box-shadow:0 8px 22px var(--rj-accent-glow), inset 0 1px 0 rgba(255,255,255,.25);
  transition:transform .18s var(--ease-out-quint), box-shadow .2s ease, filter .2s ease;
}
.btn-draft:hover{transform:translateY(-2px); box-shadow:0 12px 28px var(--rj-accent-glow);}
.btn-draft:active{transform:translateY(0);}
.btn-draft.copied{filter:saturate(.5); background:linear-gradient(180deg,var(--rj-ok),#2fae6e); box-shadow:0 8px 22px rgba(70,214,138,.4);}
.btn-draft[disabled]{opacity:.4; cursor:not-allowed; box-shadow:none;}
.copy-note{font-family:var(--rj-font-mono); font-size:10.5px; letter-spacing:.05em; color:var(--rj-ink-dim);}
.copy-note b{color:var(--rj-warn); font-weight:400;}

.drill-close{
  position:absolute; top:14px; right:14px; z-index:2;
  appearance:none; cursor:pointer; width:34px; height:34px; border-radius:9px;
  background:var(--rj-surface-sunken); border:1px solid var(--rj-line-strong); color:var(--rj-ink-mid);
  font-size:18px; line-height:1; display:grid; place-items:center;
  transition:color .2s ease, border-color .2s ease, transform .2s ease;
}
.drill-close:hover{color:var(--rj-ink); border-color:var(--rj-glass-edge); transform:rotate(90deg);}

/* draft preview block */
.draft-preview{
  margin-top:16px; border:1px solid var(--rj-line); border-radius:var(--rj-radius); overflow:hidden;
  max-height:0; opacity:0; transition:max-height .4s var(--ease-out-quint), opacity .3s ease, margin .3s ease;
}
.draft-preview.show{max-height:420px; opacity:1;}
.draft-preview .dp-head{
  display:flex; align-items:center; gap:8px; padding:9px 13px; background:var(--rj-surface-sunken); border-bottom:1px solid var(--rj-line);
  font-family:var(--rj-font-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--rj-ink-dim);
}
.draft-preview .dp-head .live-dot{width:6px;height:6px;border-radius:50%;background:var(--rj-warn);box-shadow:0 0 6px var(--rj-warn);}
.draft-preview pre{
  margin:0; padding:14px 15px; font-family:var(--rj-font-ui); font-size:13px; line-height:1.55; color:var(--rj-ink-mid);
  white-space:pre-wrap; word-break:break-word;
}

/* empty state */
.empty{
  grid-column:1/-1; text-align:center; padding:50px 20px; color:var(--rj-ink-dim);
  border:1px dashed var(--rj-line-strong); border-radius:var(--rj-radius-lg); background:var(--rj-surface-sunken);
}
.empty .big{font-family:var(--rj-font-display); font-size:14px; letter-spacing:.10em; text-transform:uppercase; color:var(--rj-ink-mid); margin-bottom:6px;}

footer{
  margin-top:38px; padding-top:18px; border-top:1px solid var(--rj-line);
  display:flex; gap:14px; flex-wrap:wrap; align-items:center; justify-content:space-between;
  font-family:var(--rj-font-mono); font-size:11px; letter-spacing:.04em; color:var(--rj-ink-dim);
}
footer .legend{display:flex; gap:16px; flex-wrap:wrap;}
footer .leg{display:inline-flex; align-items:center; gap:6px;}
footer .leg .sw{width:9px;height:9px;border-radius:50%;}

/* toast */
.toast{
  position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); z-index:var(--z-toast);
  background:var(--rj-surface-2); border:1px solid var(--rj-glass-edge);
  color:var(--rj-ink); font-size:13px; padding:11px 18px; border-radius:var(--rj-radius-pill);
  box-shadow:0 14px 34px rgba(0,0,0,.6), 0 0 20px var(--rj-accent-glow);
  display:inline-flex; align-items:center; gap:9px;
  opacity:0; pointer-events:none; transition:opacity .3s ease, transform .35s var(--ease-spring);
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
.toast .ic{color:var(--rj-ok);}

@media (max-width:560px){
  .ctx-row{grid-template-columns:1fr; gap:4px;}
  .repseg button{padding:9px 11px; font-size:11px;}
  .repseg button .default-flag{display:none;}
  .drill-head h2{font-size:19px;}
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none !important; transition-duration:.01ms !important;}
  .ring .meter{transition:none;}
}
</style>
</head>
<body>
<div class="field" aria-hidden="true"></div>

<div class="wrap">
  <header class="topbar">
    <div class="brand">
      <div class="glyph">&#40845;</div>
      <div>
        <h1>Follow-Up Roster</h1>
        <div class="sub">Ryujin Operator // Rep-Scoped Close Board</div>
      </div>
    </div>
    <div class="preview-tag"><span class="dot"></span>Design Preview // Sample Data</div>
  </header>

  <section class="controls">
    <div class="rep-label">
      <span>Whose book</span><b>::</b><span class="whose" id="whoseLabel">Mackenzie</span>
    </div>

    <div class="repseg" id="repSeg" role="tablist" aria-label="Filter board by rep">
      <span class="thumb" id="repThumb" aria-hidden="true"></span>
      <button data-rep="All" role="tab"><span class="pip"></span>All</button>
      <button data-rep="Mackenzie" role="tab" class="active" aria-selected="true"><span class="pip"></span>Mackenzie<span class="default-flag">YOU</span></button>
      <button data-rep="Darcy" role="tab"><span class="pip"></span>Darcy</button>
      <button data-rep="Diego" role="tab"><span class="pip"></span>Diego</button>
    </div>

    <div class="subcontrols">
      <div class="presets" id="presets" role="tablist" aria-label="Board preset">
        <button data-preset="top20" class="active"><span class="pk">By Score</span>Top-20 Follow-Ups</button>
        <button data-preset="warm50"><span class="pk">Warm-360</span>Warm-50</button>
        <button data-preset="recent"><span class="pk">Latest</span>Recent Activity</button>
      </div>
      <div class="tally" id="tally"></div>
    </div>
  </section>

  <main class="board" id="board" aria-live="polite"></main>

  <footer>
    <div class="legend">
      <span class="leg"><span class="sw" style="background:var(--rep-mackenzie)"></span>Mackenzie</span>
      <span class="leg"><span class="sw" style="background:var(--rep-darcy)"></span>Darcy</span>
      <span class="leg"><span class="sw" style="background:var(--rep-diego)"></span>Diego</span>
      <span class="leg"><span class="sw" style="background:var(--rep-none)"></span>Unassigned</span>
    </div>
    <div>Lost &amp; no-contact records are dimmed and held out of the actionable presets. Drafts copy to clipboard only, never send.</div>
  </footer>
</div>

<!-- drill overlay -->
<div class="scrim" id="scrim" role="dialog" aria-modal="true" aria-labelledby="drillName">
  <div class="drill" id="drill">
    <div class="drill-bar"></div>
    <button class="drill-close" id="drillClose" aria-label="Close">&times;</button>
    <div class="drill-inner" id="drillInner"></div>
  </div>
</div>

<div class="toast" id="toast"><span class="ic">&#10003;</span><span id="toastMsg"></span></div>

<script>
const CUSTOMERS = [
  { name:'Ablak Properties', address:'42 Robinson St, Moncton', rep:'Mackenzie', status:'open', stage:'Quote Sent', value:76400, lastTouchDays:3, lastTouch:{who:'Mackenzie', dir:'outbound', kind:'call', summary:'walked the Platinum scope, sending revised number'}, lastAsk:'can you split it into two phases?', proposalState:'quote-out', score:94, reasons:['high value ($76k)','warm, mid-close','quote is out'], preset:['top20','warm50'] },
  { name:'Montina Cormier', address:'8 Henderson, Dieppe', rep:'Mackenzie', status:'open', stage:'New Lead', value:0, lastTouchDays:0, lastTouch:{who:'system', dir:'auto', kind:'form', summary:'IE submission, no human reply yet'}, lastAsk:'submitted the instant estimate', proposalState:'no-quote', score:71, reasons:['fresh inbound today','needs first human touch'], preset:['top20'] },
  { name:'Greg Allen', address:'210  Portage, Riverview', rep:'Mackenzie', status:'open', stage:'Follow Up 1', value:18900, lastTouchDays:11, lastTouch:{who:'Mackenzie', dir:'outbound', kind:'sms', summary:'left a follow-up text, no reply'}, lastAsk:'thinking about timing for spring', proposalState:'quote-out', score:62, reasons:['quote is out','cooling 11d'], preset:['top20','warm50'] },
  { name:'Priya Nadeau', address:'77 Cameron, Moncton', rep:'Mackenzie', status:'open', stage:'Client Responded', value:24050, lastTouchDays:1, lastTouch:{who:'Priya', dir:'inbound', kind:'email', summary:'asked about financing options'}, lastAsk:'do you offer monthly payments?', proposalState:'quote-out', score:88, reasons:['just replied','asked to buy (financing)','$24k'], preset:['top20','warm50'] },
  { name:'Chris Goguen', address:'715 Rt 11, Cocagne', rep:'Darcy', status:'open', stage:'Quote Sent', value:30075, lastTouchDays:56, lastTouch:{who:'Darcy', dir:'outbound', kind:'email', summary:'sent the proposal, no reply since'}, lastAsk:'wanted metal vs shingle compared', proposalState:'quote-out', score:76, reasons:['high value ($30k)','cooling 56d','quote is out'], preset:['top20','warm50'] },
  { name:'Sharon Boudreau', address:'19 Lockhart, Moncton', rep:'Darcy', status:'open', stage:'Quote Sent', value:20750, lastTouchDays:39, lastTouch:{who:'Darcy', dir:'outbound', kind:'call', summary:'voicemail, quote still out'}, lastAsk:'needs to talk to her husband', proposalState:'quote-out', score:90, reasons:['$21k','quiet 39d, prime to nudge','quote is out'], preset:['top20','warm50'] },
  { name:'Robert Partridge', address:'76 Charlotte, Moncton', rep:'Darcy', status:'lost', stage:'Lost', value:44370, lastTouchDays:120, lastTouch:{who:'Darcy', dir:'outbound', kind:'note', summary:'went with a competitor'}, lastAsk:'price was the blocker', proposalState:'quote-out', score:0, reasons:['LOST, excluded from follow-up'], preset:[] },
  { name:'Lena Vautour', address:'33 Pine Glen, Riverview', rep:'Diego', status:'open', stage:'Inspection Scheduled', value:0, lastTouchDays:2, lastTouch:{who:'Diego', dir:'outbound', kind:'sms', summary:'confirmed Thursday inspection'}, lastAsk:'booked the inspection', proposalState:'no-quote', score:55, reasons:['inspection booked, pre-quote'], preset:['warm50'] },
  { name:'[Native estimate]', address:'(no contact captured)', rep:null, status:'open', stage:'Ryujin estimate', value:0, lastTouchDays:null, lastTouch:{who:'system', dir:'auto', kind:'estimate', summary:'self-serve estimate, never linked to a contact'}, lastAsk:null, proposalState:'no-quote', score:0, reasons:['no contact, not a real lead'], preset:[] }
];

const REP_VAR = { Mackenzie:'--rep-mackenzie', Darcy:'--rep-darcy', Diego:'--rep-diego' };
const REP_GLOW = { All:'var(--rj-accent-glow)', Mackenzie:'rgba(74,158,255,.45)', Darcy:'rgba(70,214,138,.40)', Diego:'rgba(192,139,255,.40)' };

let currentRep = 'Mackenzie';
let currentPreset = 'top20';

const fmtMoney = v => v > 0 ? '$' + v.toLocaleString('en-CA') : '$0 // no quote';
const repColor = rep => rep && REP_VAR[rep] ? `var(${REP_VAR[rep]})` : 'var(--rep-none)';
const isActionable = c => c.status !== 'lost' && c.rep !== null && (c.score > 0 || c.preset.length > 0);
const isDead = c => c.status === 'lost' || c.rep === null;

const kindLabel = k => ({call:'Call', sms:'Text', email:'Email', note:'Note', form:'Form fire', estimate:'Estimate'}[k] || k);
const dirLabel = d => ({outbound:'Out', inbound:'In', auto:'Auto'}[d] || d);

function agoLabel(d){
  if (d === null) return 'no touch';
  if (d === 0) return 'today';
  if (d === 1) return '1d ago';
  return d + 'd ago';
}

/* ---------- filtering + sorting ---------- */
function getRows(){
  let rows = CUSTOMERS.slice();
  if (currentRep !== 'All') rows = rows.filter(c => c.rep === currentRep);

  // honest eligibility: presets only show actionable; dead records appended dimmed at the end
  const live = rows.filter(c => !isDead(c));
  const dead = rows.filter(c => isDead(c));

  let eligible;
  if (currentPreset === 'top20'){
    eligible = live.filter(c => c.preset.includes('top20')).sort((a,b) => b.score - a.score);
  } else if (currentPreset === 'warm50'){
    eligible = live.filter(c => c.preset.includes('warm50')).sort((a,b) => b.score - a.score);
  } else { // recent
    eligible = live.filter(c => c.lastTouchDays !== null)
      .sort((a,b) => (a.lastTouchDays - b.lastTouchDays) || (b.score - a.score));
  }
  return { eligible, dead };
}

/* ---------- ring builder ---------- */
function ring(score, rep, size){
  const r = (size/2) - 4, c = 2*Math.PI*r;
  const pct = Math.max(0, Math.min(100, score)) / 100;
  const off = c * (1 - pct);
  const dim = score <= 0 ? ' dim' : '';
  return `<div class="ring${dim}" style="--rep-accent:${repColor(rep)}; width:${size}px; height:${size}px;">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle class="track" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="3"/>
      <circle class="meter" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="3"
        stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${score<=0?c.toFixed(2):off.toFixed(2)}"/>
    </svg>
    <span class="num">${score > 0 ? score : '--'}</span>
  </div>`;
}

/* ---------- card ---------- */
function card(c, idx){
  const dead = isDead(c);
  const cls = c.status === 'lost' ? 'lost' : (c.rep === null ? 'nocontact' : '');
  const t = c.lastTouch;
  const human = t.dir !== 'auto';
  const touchTagCls = human ? ('human' + (t.dir === 'inbound' ? ' inbound' : '')) : 'auto';
  const touchTagTxt = human ? `${dirLabel(t.dir)} // ${t.who}` : 'Auto // not a touch';

  return `<article class="bubble ${cls}" style="--rep-accent:${repColor(c.rep)}"
      tabindex="0" role="button" aria-label="Open ${c.name}" data-idx="${idx}">
    <div class="b-top">
      <span class="owner-pip" title="${c.rep || 'Unassigned'}"></span>
      <div class="b-name">
        <h3>${c.name}</h3>
        <div class="b-addr">${c.address}</div>
      </div>
      ${ring(c.score, c.rep, 44)}
    </div>
    <div class="b-touch">
      <span class="touch-tag ${touchTagCls}">${touchTagTxt}</span>
      <span>${kindLabel(t.kind)}</span>
      <span class="ago">${agoLabel(c.lastTouchDays)}</span>
    </div>
    <div class="b-chips">
      <span class="chip status-${c.status}">${c.status === 'lost' ? 'Lost' : c.stage}</span>
      <span class="chip value ${c.value>0?'':'zero'}">${fmtMoney(c.value)}</span>
    </div>
  </article>`;
}

/* ---------- render ---------- */
function render(){
  const board = document.getElementById('board');
  const { eligible, dead } = getRows();

  // FLIP: capture old positions
  const firstRects = {};
  board.querySelectorAll('.bubble').forEach(el => {
    firstRects[el.dataset.key] = el.getBoundingClientRect();
  });

  const all = eligible.concat(dead);
  if (all.length === 0){
    board.innerHTML = `<div class="empty"><div class="big">Clean book</div>No actionable follow-ups for this rep under this preset. Lost and no-contact records are held out.</div>`;
    updateTally(eligible, dead);
    return;
  }

  board.innerHTML = all.map((c) => {
    const realIdx = CUSTOMERS.indexOf(c);
    return card(c, realIdx);
  }).join('');

  // tag keys + run FLIP
  board.querySelectorAll('.bubble').forEach((el, i) => {
    el.dataset.key = all[i].name;
    el.style.setProperty('--enter-delay', (i * 38) + 'ms');
  });
  flip(board, firstRects);
  animateRings(board);
  updateTally(eligible, dead);
}

function flip(board, firstRects){
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  board.querySelectorAll('.bubble').forEach((el, i) => {
    const last = el.getBoundingClientRect();
    const first = firstRects[el.dataset.key];
    if (first && !reduce){
      const dx = first.left - last.left, dy = first.top - last.top;
      if (dx || dy){
        el.animate(
          [{ transform:`translate(${dx}px, ${dy}px)` }, { transform:'translate(0,0)' }],
          { duration:520, easing:'cubic-bezier(.22,1,.36,1)' }
        );
        return;
      }
    }
    if (!reduce){
      el.animate(
        [{ opacity:0, transform:'translateY(14px) scale(.96)' }, { opacity:1, transform:'translateY(0) scale(1)' }],
        { duration:460, delay:i*36, easing:'cubic-bezier(.16,1.18,.32,1)', fill:'backwards' }
      );
    }
  });
}

function animateRings(scope){
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduce) return;
  scope.querySelectorAll('.ring .meter').forEach(m => {
    const target = m.getAttribute('stroke-dashoffset');
    const len = m.getAttribute('stroke-dasharray');
    m.style.strokeDashoffset = len;
    requestAnimationFrame(() => requestAnimationFrame(() => { m.style.strokeDashoffset = target; }));
  });
}

function updateTally(eligible, dead){
  const totalVal = eligible.reduce((s,c) => s + c.value, 0);
  const who = currentRep === 'All' ? 'the full roster' : currentRep + "'s book";
  document.getElementById('tally').innerHTML =
    `<span><b>${eligible.length}</b> actionable</span>` +
    `<span>pipeline <span class="val">${totalVal>0?'$'+totalVal.toLocaleString('en-CA'):'$0'}</span></span>` +
    (dead.length ? `<span>${dead.length} held out</span>` : '');
}

/* ---------- drill panel ---------- */
function openDrill(c){
  const scrim = document.getElementById('scrim');
  const inner = document.getElementById('drillInner');
  const drill = document.getElementById('drill');
  drill.style.setProperty('--drep', repColor(c.rep));

  const t = c.lastTouch;
  const human = t.dir !== 'auto';
  const dead = isDead(c);

  const touchV = human
    ? `<span class="dir-flag ${t.dir}">${dirLabel(t.dir)} // ${kindLabel(t.kind)}</span><span class="who">${t.who}</span> - <em>${t.summary}</em>`
    : `<span class="dir-flag auto">Auto // ${kindLabel(t.kind)}</span><span class="muted">No human has touched this yet.</span> <em>${t.summary}</em>`;

  const sentV = c.proposalState === 'quote-out'
    ? `<span class="quote-state out">Quote is out</span> <span class="muted">// sub-facing number delivered</span>`
    : `<span class="quote-state none">No quote sent</span> <span class="muted">// $0, nothing priced yet</span>`;

  const askV = c.lastAsk
    ? `&ldquo;${c.lastAsk}&rdquo;`
    : `<span class="muted">Nothing asked. No real conversation on record.</span>`;

  const reasons = c.reasons.map(r =>
    `<span class="reason${dead?' lost':''}">${r}</span>`).join('');

  const draftBtn = (dead || c.rep === null)
    ? `<button class="btn-draft" disabled>Not eligible to draft</button>
       <span class="copy-note">${c.status==='lost'?'Lost record':'No contact on file'} - excluded from follow-up.</span>`
    : `<button class="btn-draft" id="draftBtn" data-name="${c.name}">&#9998; Draft follow-up</button>
       <span class="copy-note">Copies to clipboard. <b>Never sends.</b> Mac presses send.</span>`;

  inner.innerHTML = `
    <div class="drill-head">
      <span class="owner-pip" style="background:${repColor(c.rep)}; box-shadow:0 0 10px ${repColor(c.rep)}"></span>
      <div>
        <h2 id="drillName">${c.name}</h2>
        <div class="addr">${c.address}</div>
      </div>
      ${ring(c.score, c.rep, 56)}
    </div>

    <div class="drill-meta">
      <span class="owner-chip"><span class="dot"></span>${c.rep || 'Unassigned'}</span>
      <span class="chip status-${c.status}">${c.status === 'lost' ? 'Lost' : 'Open'}</span>
      <span class="chip">${c.stage}</span>
      <span class="chip value ${c.value>0?'':'zero'}" style="margin-left:0">${fmtMoney(c.value)}</span>
    </div>

    <div class="ctx">
      <div class="ctx-row"><div class="ctx-k">Status</div><div class="ctx-v">${c.status==='lost'?'<span class="muted">Lost</span>':'Open'} &middot; ${c.stage}</div></div>
      <div class="ctx-row"><div class="ctx-k">Owner</div><div class="ctx-v">${c.rep || '<span class="muted">Unassigned - no rep</span>'}</div></div>
      <div class="ctx-row"><div class="ctx-k">Last real touch</div><div class="ctx-v">${touchV} <span class="muted">&middot; ${agoLabel(c.lastTouchDays)}</span></div></div>
      <div class="ctx-row"><div class="ctx-k">What was sent</div><div class="ctx-v">${sentV}</div></div>
      <div class="ctx-row"><div class="ctx-k">What they asked</div><div class="ctx-v">${askV}</div></div>
    </div>

    <div class="reasons">${reasons}</div>

    <div class="draft-preview" id="draftPreview">
      <div class="dp-head"><span class="live-dot"></span>Draft preview &middot; copy-only &middot; voice-aligned</div>
      <pre id="draftText"></pre>
    </div>

    <div class="drill-actions">${draftBtn}</div>
  `;

  scrim.classList.add('open');
  document.body.style.overflow = 'hidden';

  const db = document.getElementById('draftBtn');
  if (db) db.addEventListener('click', () => doDraft(c, db));
}

function closeDrill(){
  document.getElementById('scrim').classList.remove('open');
  document.body.style.overflow = '';
}

/* ---------- voice-aligned draft (copy only) ---------- */
function buildDraft(c){
  const first = c.name.split(' ')[0];
  const t = c.lastTouch;
  let body;

  if (c.proposalState === 'no-quote' && t.dir === 'auto'){
    body = `Hi ${first}, thanks for running the instant estimate. I want to get you a real number, not just the ballpark. Quick question so I size it right: are you looking at the full roof or a section? I can have a firm quote over to you fast once I know.`;
  } else if (c.lastAsk && /financ|payment|monthly/i.test(c.lastAsk)){
    body = `Hi ${first}, good question on the payments. Yes, we can set you up on monthly financing, and I can show you exactly what that looks like on your number. Want me to put the options beside the ${fmtMoney(c.value)} so you can see both side by side?`;
  } else if (c.lastAsk && /phase|split/i.test(c.lastAsk)){
    body = `Hi ${first}, yes, we can split this into two phases. I will lay out what each phase covers and the timing so there are no surprises. Want me to send the revised number broken out that way?`;
  } else if (c.proposalState === 'quote-out'){
    body = `Hi ${first}, just circling back on the quote I sent. No pressure at all. If it helps, I can walk you through any line you have a question on, or adjust the scope. Where is your head at on it?`;
  } else {
    body = `Hi ${first}, following up to see where you landed. Happy to answer anything or get you a firm number whenever you are ready.`;
  }
  return body + `\n\nKing regards,\nMackenzie\nPlus Ultra Roofing`;
}

function doDraft(c, btn){
  const text = buildDraft(c);
  const pre = document.getElementById('draftText');
  const prev = document.getElementById('draftPreview');
  pre.textContent = text;
  prev.classList.add('show');

  const done = () => {
    btn.classList.add('copied');
    btn.innerHTML = '&#10003; Copied to clipboard';
    showToast('Draft copied. Nothing was sent.');
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '&#9998; Draft follow-up'; }, 2600);
  };

  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, cb){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch(e){}
  document.body.removeChild(ta); cb();
}

let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

/* ---------- rep segment control + thumb ---------- */
function moveThumb(){
  const seg = document.getElementById('repSeg');
  const thumb = document.getElementById('repThumb');
  const active = seg.querySelector('button.active');
  if (!active) return;
  thumb.style.width = active.offsetWidth + 'px';
  thumb.style.transform = `translateX(${active.offsetLeft - 5}px)`;
  thumb.style.setProperty('--rep-glow', REP_GLOW[currentRep] || 'var(--rj-accent-glow)');
}

function setRep(rep){
  currentRep = rep;
  document.querySelectorAll('#repSeg button').forEach(b => {
    const on = b.dataset.rep === rep;
    b.classList.toggle('active', on);
    b.setAttribute('aria-selected', on ? 'true' : 'false');
  });
  document.getElementById('whoseLabel').textContent =
    rep === 'All' ? 'Everyone' : (rep === 'Mackenzie' ? 'Mackenzie (you)' : rep);
  moveThumb();
  render();
}

function setPreset(p){
  currentPreset = p;
  document.querySelectorAll('#presets button').forEach(b =>
    b.classList.toggle('active', b.dataset.preset === p));
  render();
}

/* ---------- wiring ---------- */
document.getElementById('repSeg').addEventListener('click', e => {
  const btn = e.target.closest('button'); if (btn) setRep(btn.dataset.rep);
});
document.getElementById('presets').addEventListener('click', e => {
  const btn = e.target.closest('button'); if (btn) setPreset(btn.dataset.preset);
});
document.getElementById('board').addEventListener('click', e => {
  const card = e.target.closest('.bubble'); if (card) openDrill(CUSTOMERS[+card.dataset.idx]);
});
document.getElementById('board').addEventListener('keydown', e => {
  if ((e.key === 'Enter' || e.key === ' ') && e.target.classList.contains('bubble')){
    e.preventDefault(); openDrill(CUSTOMERS[+e.target.dataset.idx]);
  }
});
document.getElementById('drillClose').addEventListener('click', closeDrill);
document.getElementById('scrim').addEventListener('click', e => { if (e.target.id === 'scrim') closeDrill(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrill(); });
window.addEventListener('resize', moveThumb);

/* init */
window.addEventListener('load', () => { moveThumb(); });
moveThumb();
setRep('Mackenzie');
</script>
</body>
</html>
