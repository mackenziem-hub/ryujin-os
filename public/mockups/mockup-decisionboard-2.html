<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WAR ROOM — Decision Board mockup 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#06070b; --ink2:#0b0d13; --paperwhite:#f2f1ec; --dim:#b9b6ac; --faint:#86847b;
  --gold:#e8a93c; --gold-hot:#ffc95e; --green:#59c98a; --red:#e05656; --blue:#6aa7d8;
  --hairline:rgba(242,241,236,.10); --panel:rgba(11,13,19,.72);
  --lane-A:#e05656;--lane-B:#e8893c;--lane-C:#6aa7d8;--lane-D:#59c98a;--lane-E:#a98ce0;--lane-F:#e08cb4;--lane-G:#5fd6c8;
  --grot:'Space Grotesk',system-ui,sans-serif; --mono:'JetBrains Mono','Cascadia Code',Consolas,monospace;
}
*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{font-family:var(--grot);color:var(--paperwhite);background:var(--ink);overflow:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:-25%;z-index:0;pointer-events:none;
  background:
   radial-gradient(38% 46% at 12% 14%,rgba(232,169,60,.09),transparent 70%),
   radial-gradient(42% 50% at 88% 86%,rgba(106,167,216,.09),transparent 70%);
  animation:drift 40s ease-in-out infinite alternate}
@keyframes drift{to{transform:translate3d(-2%,2%,0) scale(1.07)}}
/* scanline veil for the ops-wall texture */
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.5;
  background:repeating-linear-gradient(180deg,rgba(255,255,255,.012) 0 1px,transparent 1px 3px)}

.wrap{position:relative;z-index:2;height:100%;display:flex;flex-direction:column}

/* header */
.head{display:flex;align-items:center;gap:22px;padding:14px 26px;border-bottom:1px solid var(--hairline);
  background:linear-gradient(180deg,rgba(6,7,11,.96),rgba(6,7,11,.55));backdrop-filter:blur(10px)}
.sigil{font-weight:700;font-size:15px;letter-spacing:.28em}
.sigil b{color:var(--gold)}
.vbox{display:flex;align-items:center;gap:13px}
.vlamp{width:13px;height:13px;border-radius:50%;background:var(--green);box-shadow:0 0 14px var(--green);animation:beat 2.6s ease-in-out infinite}
.vbox .vtext{font-size:13px;font-weight:700;letter-spacing:.2em}
.vbox.GREEN .vtext{color:var(--green)} .vbox.AMBER .vtext{color:var(--gold-hot)} .vbox.AMBER .vlamp{background:var(--gold-hot);box-shadow:0 0 14px var(--gold)}
.vbox.RED .vtext{color:var(--red)} .vbox.RED .vlamp{background:var(--red);box-shadow:0 0 14px var(--red)}
.oneline{flex:1;min-width:0;font-family:var(--mono);font-size:12px;color:var(--dim);line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;max-width:60ch}
.hclock{font-family:var(--mono);font-size:13px;color:var(--faint);letter-spacing:.1em;white-space:nowrap}
@keyframes beat{50%{box-shadow:0 0 4px currentColor;opacity:.7}}

/* body grid */
.grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--hairline);min-height:0}
.col{background:var(--ink);overflow-y:auto;min-height:0}
.colhead{position:sticky;top:0;z-index:5;display:flex;align-items:baseline;justify-content:space-between;
  padding:15px 24px 11px;background:linear-gradient(180deg,var(--ink),rgba(6,7,11,.6));backdrop-filter:blur(6px)}
.colhead h2{font-size:13px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--paperwhite)}
.colhead .sub{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.08em}
.colhead .sub b{color:var(--gold-hot)}

/* decisions */
.decisions{padding:6px 24px 30px}
.zone-label{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);
  margin:20px 0 10px;display:flex;align-items:center;gap:10px}
.zone-label::after{content:'';flex:1;height:1px;background:var(--hairline)}
.dec{padding:15px 17px;border-radius:13px;background:var(--panel);border:1px solid var(--hairline);
  margin-bottom:11px;backdrop-filter:blur(6px);transition:.16s}
.dec:hover{border-color:rgba(242,241,236,.22)}
.dec.p0{background:linear-gradient(135deg,rgba(224,86,86,.14),rgba(11,13,19,.72));border-color:rgba(224,86,86,.5)}
.dec.handled{opacity:.4}
.dec-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.tag{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.06em;padding:3px 8px;border-radius:5px}
.tag.P0{background:rgba(224,86,86,.2);color:#ff9a9a;border:1px solid rgba(224,86,86,.5)}
.tag.P1{background:rgba(232,169,60,.16);color:var(--gold-hot);border:1px solid rgba(232,169,60,.4)}
.tag.P2{background:rgba(134,132,123,.14);color:var(--dim);border:1px solid var(--hairline)}
.tag.lane{margin-left:auto;background:transparent}
.dec p{font-size:14.5px;line-height:1.45;color:var(--paperwhite);font-weight:500}
.dec .due{font-family:var(--mono);font-size:11px;color:#ff9a9a;margin-top:8px}
.dec-act{display:flex;gap:8px;margin-top:13px}
.mini{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:8px 14px;border-radius:7px;cursor:pointer;border:1px solid var(--hairline);background:transparent;color:var(--dim);transition:.15s}
.mini.go{background:var(--gold);color:var(--ink);border-color:var(--gold)}
.mini.go:hover{background:var(--gold-hot)}
.mini.sec:hover{border-color:var(--paperwhite);color:var(--paperwhite)}
.mini:focus-visible{outline:2px solid var(--gold-hot);outline-offset:2px}

/* terminals grid */
.ops{padding:6px 22px 18px}
.term-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.term{padding:13px 14px;border-radius:12px;background:var(--panel);border:1px solid var(--hairline);position:relative;overflow:hidden}
.term::before{content:'';position:absolute;inset:0 auto 0 0;width:100%;height:2px;top:0;background:var(--lane,#888);opacity:.7}
.term-top{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.mono-badge{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;font-weight:700;font-size:13px;font-family:var(--grot)}
.term .lane-name{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-lamp{width:9px;height:9px;border-radius:50%;flex:none}
.st-lamp.working{background:var(--green);box-shadow:0 0 9px var(--green);animation:beat 2.6s ease-in-out infinite}
.st-lamp.idle{background:var(--faint)} .st-lamp.dark{background:rgba(134,132,123,.4)}
.term .task{font-size:12.5px;line-height:1.4;color:var(--dim);
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;min-height:52px}
.term .foot{display:flex;justify-content:space-between;margin-top:9px;font-family:var(--mono);font-size:10px;color:var(--faint)}
.term .orders{color:var(--gold-hot)}

/* activity stream */
.stream-wrap{margin-top:8px}
.act-item{display:flex;gap:11px;padding:11px 4px;border-bottom:1px solid rgba(242,241,236,.05)}
.act-when{font-family:var(--mono);font-size:11px;color:var(--faint);flex:none;width:48px;padding-top:1px}
.act-by{font-family:var(--mono);font-weight:700;font-size:11px;flex:none;width:18px;text-align:center}
.act-what{font-size:12.5px;line-height:1.5;color:var(--dim)}
.act-what b{color:var(--green)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink2);
  border:1px solid rgba(232,169,60,.5);border-radius:10px;padding:12px 20px;font-size:13px;font-family:var(--mono);
  opacity:0;transition:.25s;z-index:70;box-shadow:0 20px 50px rgba(0,0,0,.6)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){body::before{animation:none}.vlamp,.st-lamp{animation:none}}
@media (max-width:900px){.grid{grid-template-columns:1fr;overflow-y:auto}.col{overflow:visible}.term-grid{grid-template-columns:1fr}.oneline{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <header class="head">
    <div class="sigil">WAR <b>ROOM</b></div>
    <div class="vbox GREEN" id="vbox"><span class="vlamp"></span><span class="vtext" id="vtext">GREEN</span></div>
    <div class="oneline" id="oneline">—</div>
    <div class="hclock" id="clock">--:-- AT</div>
  </header>

  <div class="grid">
    <section class="col">
      <div class="colhead"><h2>Decisions</h2><div class="sub"><b id="needCount">0</b> need you</div></div>
      <div class="decisions" id="decisions"></div>
    </section>

    <section class="col">
      <div class="colhead"><h2>Live terminals</h2><div class="sub" id="deskSub">7 desks</div></div>
      <div class="ops">
        <div class="term-grid" id="terms"></div>
        <div class="zone-label">Activity stream</div>
        <div class="stream-wrap" id="stream"></div>
      </div>
    </section>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const PRANK={P0:0,P1:1,P2:2};
let DATA=null,decisions=[];
const handled=new Set(JSON.parse(localStorage.getItem('war_handled')||'[]'));
const $=s=>document.querySelector(s);
function clk(){const d=new Date();$('#clock').textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+' AT';}
setInterval(clk,1000);clk();
const lc=l=>getComputedStyle(document.documentElement).getPropertyValue('--lane-'+(l||'A').toUpperCase())||'#888';
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const key=d=>(d.priority||'')+'|'+(d.item||'').slice(0,40);
const dstat=d=>d.status==='working'?'working':(d.live===false?'dark':(d.status||'idle'));

async function load(){
  try{DATA=await (await fetch('/FLEET_DECK_DATA.json',{cache:'no-store'})).json();}
  catch(e){DATA={blockedOnMac:[],desks:{},shippedToday:[],healthVerdict:'?'};}
  render();
}
function render(){
  const v=(DATA.healthVerdict||'GREEN').toUpperCase();
  $('#vbox').className='vbox '+v; $('#vtext').textContent=v;
  $('#oneline').textContent=DATA.healthOneLine||(DATA.slides&&DATA.slides[0]&&DATA.slides[0].headline)||'';
  // decisions
  decisions=(DATA.blockedOnMac||[]).slice().sort((a,b)=>(PRANK[a.priority]??9)-(PRANK[b.priority]??9));
  $('#needCount').textContent=decisions.filter(d=>!handled.has(key(d))).length;
  const groups={P0:[],P1:[],P2:[]};
  decisions.forEach((d,i)=>{(groups[d.priority]||groups.P2).push({d,i});});
  let html='';
  for(const g of ['P0','P1','P2']){
    if(!groups[g].length)continue;
    const lbl=g==='P0'?'Act now':g==='P1'?'This session':'When you can';
    html+=`<div class="zone-label">${g} · ${lbl}</div>`;
    html+=groups[g].map(({d,i})=>{
      const h=handled.has(key(d));
      return `<div class="dec ${g==='P0'?'p0':''} ${h?'handled':''}">
        <div class="dec-top"><span class="tag ${g}">${g}</span><span class="tag lane" style="color:${lc(d.lane)}">LANE ${d.lane||'?'}</span></div>
        <p>${esc(d.item)}</p>${d.due?`<div class="due">due ${esc(d.due)}</div>`:''}
        <div class="dec-act"><button class="mini go" onclick="act(${i},'approve')">${h?'✓ done':'Approve'}</button>
        <button class="mini sec" onclick="act(${i},'respond')">Respond</button>
        <button class="mini sec" onclick="act(${i},'defer')">${h?'Reopen':'Defer'}</button></div></div>`;
    }).join('');
  }
  $('#decisions').innerHTML=html||'<div class="zone-label">All clear · nothing needs you</div>';
  // terminals
  const desks=DATA.desks||{};const ids=Object.keys(desks);
  $('#deskSub').textContent=ids.filter(id=>dstat(desks[id])==='working').length+' working · '+ids.length+' total';
  $('#terms').innerHTML=ids.map(id=>{
    const d=desks[id],st=dstat(d);
    return `<div class="term" style="--lane:${lc(id)}">
      <div class="term-top"><div class="mono-badge" style="background:${lc(id)}22;color:${lc(id)}">${id}</div>
      <div class="lane-name">${esc(d.lane||'')}</div><div class="st-lamp ${st}"></div></div>
      <div class="task">${esc(d.task||'idle')}</div>
      <div class="foot"><span>${st}</span>${d.openOrders?`<span class="orders">${d.openOrders} queued</span>`:'<span>clear</span>'}</div></div>`;
  }).join('');
  // stream
  $('#stream').innerHTML=(DATA.shippedToday||[]).map(s=>`<div class="act-item">
    <div class="act-when">${esc(s.when)}</div><div class="act-by" style="color:${lc(s.by)}">${esc(s.by)}</div>
    <div class="act-what">${esc(s.what)}</div></div>`).join('')||'<div class="act-item"><div class="act-what">No ships logged yet today.</div></div>';
}
function act(i,a){
  const d=decisions[i];if(!d)return;
  if(a==='defer'){handled.has(key(d))?handled.delete(key(d)):handled.add(key(d));}
  else if(a==='approve'){handled.add(key(d));toast('Approved · '+(d.item||'').slice(0,42)+'  (mockup)');}
  else{toast('Respond composer would open  (mockup)');return;}
  localStorage.setItem('war_handled',JSON.stringify([...handled]));render();
}
let tt;function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2600);}
load();setInterval(load,15000);
</script>
</body>
</html>
