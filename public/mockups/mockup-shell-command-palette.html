<!DOCTYPE html>
<html lang="en" data-rj="telltale">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ryujin OS · Quick-Nav</title>
<style>
/* ============================================================================
 * RYUJIN OS · Quick-Nav palette + ambiguous-query options + ads report drill
 * Self-contained mockup. Telltale token layer inlined + brief's type override
 * (Inter ink, JetBrains Mono figures, no Orbitron). Near-black Ambient ground.
 * No /api, no auth, baked Plus Ultra data. No em dashes.
 * ========================================================================== */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root{
  /* Surfaces (near-black, layered) */
  --bg:#060709; --bg-2:#0a0c10;
  --surface:#0e1218; --surface-2:#12161e; --sunken:#070a0e;

  /* Glass */
  --glass:rgba(20,24,31,0.62);
  --glass-2:rgba(24,29,38,0.74);
  --glass-blur:22px;
  --edge:rgba(255,255,255,0.10);
  --edge-bright:rgba(255,255,255,0.16);
  --inner:rgba(140,180,255,0.06);

  /* Ink (soft high-contrast white, no pure white) */
  --ink:#f3f5f8; --ink-mid:rgba(225,231,240,0.74); --ink-dim:rgba(190,200,216,0.50);
  --ink-faint:rgba(170,182,202,0.32);

  /* One restrained cool-blue accent */
  --accent:#4a9eff; --accent-bright:#7ab6ff; --accent-deep:#2563eb;
  --accent-glow:rgba(74,158,255,0.38); --on-accent:#061021;

  /* Valence pops ONLY */
  --ok:#46d68a; --warn:#f5b13a; --danger:#f8746e;
  --warn-glow:rgba(245,177,58,0.30); --ok-glow:rgba(70,214,138,0.24);

  /* Hairlines */
  --line:rgba(255,255,255,0.08); --line-strong:rgba(255,255,255,0.14);
  --bracket:rgba(74,158,255,0.50);

  --font-ui:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;

  /* Semantic z-scale: ground<presence<veil<panel<active<bubble<input */
  --z-ground:0; --z-presence:5; --z-veil:50; --z-panel:100; --z-active:200;
  --z-bubble:400; --z-input:600; --z-toast:900;

  --r-sm:9px; --r:13px; --r-lg:18px; --r-pill:999px;

  --sh-sm:0 1px 2px rgba(0,0,0,0.5);
  --sh-md:0 10px 30px rgba(0,0,0,0.5), inset 0 1px 0 var(--inner);
  --sh-lg:0 28px 70px rgba(0,0,0,0.62), inset 0 1px 0 var(--edge-bright);
  --sh-float:0 40px 110px rgba(0,0,0,0.7), 0 0 0 1px var(--edge), inset 0 1px 0 var(--edge-bright);

  --dur-fast:130ms; --dur:240ms; --dur-slow:420ms; --dur-move:520ms;
  --ease:cubic-bezier(.16,1,.3,1);
}

*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-ui);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow:hidden;
}
.mono,[data-figure]{font-family:var(--font-mono);font-variant-numeric:tabular-nums;letter-spacing:.01em;}
::selection{background:var(--accent-glow);color:#fff;}
:focus-visible{outline:none;box-shadow:0 0 0 3px var(--accent-glow);border-radius:var(--r-sm);}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;}

/* ---- Ambient ground: a calm dark room, static at rest ---- */
.ambient{position:fixed;inset:0;z-index:var(--z-ground);pointer-events:none;overflow:hidden;}
.ambient::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(60% 50% at 24% 12%, rgba(74,158,255,0.085) 0%, transparent 60%),
    radial-gradient(55% 50% at 80% 92%, rgba(74,158,255,0.05) 0%, transparent 60%),
    linear-gradient(180deg,var(--bg-2) 0%, var(--bg) 62%);
}
/* faint slow grain drift, motion that recedes */
.ambient::after{
  content:"";position:absolute;inset:-40%;
  background:radial-gradient(40% 40% at 50% 50%, rgba(74,158,255,0.05), transparent 70%);
  filter:blur(40px);
  animation:drift 38s var(--ease) infinite alternate;
}
@keyframes drift{from{transform:translate(-4%,-3%) scale(1);}to{transform:translate(5%,4%) scale(1.12);}}

/* ============================================================================
 * THE PRESENCE: a luminous AI anchor. Sits calm, brightens when "speaking".
 * ========================================================================== */
.presence-anchor{
  position:fixed; left:50%; top:96px; transform:translateX(-50%);
  z-index:var(--z-presence); display:flex; flex-direction:column; align-items:center; gap:14px;
  pointer-events:none; transition:opacity var(--dur) var(--ease), transform var(--dur-slow) var(--ease);
}
.orb{
  width:56px;height:56px;border-radius:50%;
  background:radial-gradient(circle at 38% 34%, var(--accent-bright), var(--accent) 46%, var(--accent-deep) 100%);
  box-shadow:0 0 0 1px rgba(255,255,255,0.12), 0 0 34px var(--accent-glow), inset 0 -6px 14px rgba(0,0,0,0.4);
  position:relative;
  animation:breathe 5.5s ease-in-out infinite;
}
.orb::after{
  content:"";position:absolute;inset:-14px;border-radius:50%;
  border:1px solid rgba(74,158,255,0.16);
  animation:ring 5.5s ease-in-out infinite;
}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
@keyframes ring{0%,100%{transform:scale(1);opacity:.5;}50%{transform:scale(1.22);opacity:0;}}
.presence-anchor.speaking .orb{box-shadow:0 0 0 1px rgba(255,255,255,0.2), 0 0 56px var(--accent-glow), inset 0 -6px 14px rgba(0,0,0,0.4);}
.presence-hint{font-size:12.5px;color:var(--ink-dim);letter-spacing:.02em;text-align:center;max-width:280px;}
.presence-hint kbd{
  font-family:var(--font-mono);font-size:11px;color:var(--ink-mid);
  background:var(--surface-2);border:1px solid var(--line-strong);border-bottom-width:2px;
  border-radius:6px;padding:2px 6px;margin:0 1px;
}
.workspace-open .presence-anchor{opacity:0;transform:translateX(-50%) translateY(-12px) scale(.9);}

/* DESIGN PREVIEW marker */
.preview-mark{
  position:fixed; left:18px; bottom:16px; z-index:var(--z-toast);
  font-family:var(--font-mono); font-size:10px; letter-spacing:.18em;
  color:var(--ink-faint); text-transform:uppercase;
  display:flex; align-items:center; gap:7px; pointer-events:none;
}
.preview-mark .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent-glow);}

/* status bar top-right, recedes */
.statusbar{
  position:fixed; right:20px; top:18px; z-index:var(--z-veil);
  display:flex; align-items:center; gap:14px; font-size:11.5px; color:var(--ink-dim);
}
.statusbar .seg{display:flex;align-items:center;gap:6px;}
.statusbar .pulse{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok-glow);animation:livedot 3s ease-in-out infinite;}
@keyframes livedot{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ============================================================================
 * COMMAND PALETTE (input layer)
 * ========================================================================== */
.veil{
  position:fixed; inset:0; z-index:var(--z-veil);
  background:rgba(4,5,7,0.46); backdrop-filter:blur(3px);
  opacity:0; transition:opacity var(--dur) var(--ease); pointer-events:none;
}
.palette-open .veil{opacity:1;}

.palette{
  position:fixed; left:50%; top:200px; transform:translateX(-50%) translateY(8px) scale(.98);
  width:min(680px, calc(100vw - 36px));
  z-index:var(--z-input);
  background:var(--glass-2); backdrop-filter:blur(var(--glass-blur)) saturate(1.3);
  -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.3);
  border:1px solid var(--edge); border-radius:var(--r-lg);
  box-shadow:var(--sh-float);
  overflow:hidden;
  opacity:0; pointer-events:none;
  transition:opacity var(--dur) var(--ease), transform var(--dur-slow) var(--ease);
}
.palette-open .palette{opacity:1; transform:translateX(-50%) translateY(0) scale(1); pointer-events:auto;}
.workspace-open .palette{top:24px; transform:translateX(-50%) scale(.96); opacity:0; pointer-events:none;}

.pal-inputrow{
  display:flex; align-items:center; gap:13px; padding:18px 20px;
  border-bottom:1px solid var(--line);
}
.pal-mode{
  font-family:var(--font-mono); font-size:11px; letter-spacing:.04em;
  color:var(--accent-bright); background:rgba(74,158,255,0.10);
  border:1px solid rgba(74,158,255,0.28); border-radius:6px; padding:3px 7px;
  white-space:nowrap; transition:all var(--dur) var(--ease);
}
.pal-input{
  flex:1; background:none; border:none; outline:none;
  color:var(--ink); font-size:19px; font-weight:500; letter-spacing:-0.01em;
}
.pal-input::placeholder{color:var(--ink-faint);font-weight:400;}
.pal-caret{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);}

.pal-body{max-height:min(56vh,440px);overflow-y:auto;overscroll-behavior:contain;}
.pal-body::-webkit-scrollbar{width:9px;}
.pal-body::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:9px;border:2px solid transparent;background-clip:content-box;}

.pal-group{padding:10px 8px 4px;}
.pal-group-label{
  font-size:10.5px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--ink-faint); padding:4px 13px 8px; display:flex; align-items:center; justify-content:space-between;
}
.pal-group-label .hint{font-family:var(--font-mono);letter-spacing:.04em;text-transform:none;font-size:10px;}

.pal-item{
  display:flex; align-items:center; gap:13px; padding:10px 13px; border-radius:10px;
  transition:background var(--dur-fast) var(--ease);
  position:relative; width:100%; text-align:left;
}
.pal-item:hover,.pal-item.sel{background:rgba(74,158,255,0.09);}
.pal-item.sel::before{
  content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:20px;border-radius:3px;background:var(--accent);box-shadow:0 0 10px var(--accent-glow);
}
.pal-icon{
  width:30px;height:30px;flex:none;border-radius:8px;
  display:grid;place-items:center; font-size:14px;
  background:var(--surface-2); border:1px solid var(--line); color:var(--ink-mid);
}
.pal-icon.glow{color:var(--accent-bright);border-color:rgba(74,158,255,0.3);}
.pal-text{flex:1;min-width:0;}
.pal-title{font-size:14.5px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pal-sub{font-size:12px;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pal-meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);flex:none;}
.pal-kbd{font-family:var(--font-mono);font-size:10px;color:var(--ink-dim);border:1px solid var(--line-strong);border-radius:5px;padding:2px 6px;flex:none;}

/* ONE preattentive pop: cold-lead amber. Nothing else glows. */
.pop-attention{position:relative;}
.pop-attention .pal-icon{
  color:var(--warn); border-color:rgba(245,177,58,0.45);
  box-shadow:0 0 0 1px rgba(245,177,58,0.3), 0 0 16px var(--warn-glow);
}
.pop-attention .pal-flag{
  font-family:var(--font-mono);font-size:10.5px;color:var(--warn);
  background:rgba(245,177,58,0.10);border:1px solid rgba(245,177,58,0.32);
  border-radius:var(--r-pill);padding:2px 9px;flex:none;
}

.pal-empty-note{padding:7px 21px 13px;font-size:12px;color:var(--ink-dim);}

.pal-footer{
  display:flex;align-items:center;gap:18px;padding:10px 18px;
  border-top:1px solid var(--line); font-size:11px; color:var(--ink-dim);
}
.pal-footer .fk{display:flex;align-items:center;gap:6px;}
.pal-footer kbd{font-family:var(--font-mono);font-size:10px;color:var(--ink-mid);border:1px solid var(--line-strong);border-radius:5px;padding:2px 6px;}
.pal-footer .spacer{flex:1;}

/* ---- AI interpretation block (ambiguous query answer-first) ---- */
.interp{
  margin:8px 13px 4px; padding:15px 16px;
  background:linear-gradient(180deg, rgba(74,158,255,0.07), rgba(74,158,255,0.02));
  border:1px solid rgba(74,158,255,0.22); border-radius:var(--r);
  position:relative; overflow:hidden;
}
.interp::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:2px;
  background:linear-gradient(180deg,var(--accent-bright),transparent);
}
.interp-head{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.interp-orb{
  width:18px;height:18px;border-radius:50%;flex:none;
  background:radial-gradient(circle at 38% 34%, var(--accent-bright), var(--accent-deep));
  box-shadow:0 0 12px var(--accent-glow);
}
.interp-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-bright);}
.interp-line{font-size:14.5px;color:var(--ink);line-height:1.45;}
.interp-line em{font-style:normal;color:var(--ink-mid);}
.interp-line b{font-weight:600;color:var(--ink);}
.interp-ask{font-size:12.5px;color:var(--ink-dim);margin-top:10px;margin-bottom:10px;}
.interp-chips{display:flex;flex-wrap:wrap;gap:9px;}
.chip{
  display:inline-flex;align-items:center;gap:8px;padding:8px 13px;border-radius:var(--r-pill);
  background:var(--surface-2);border:1px solid var(--line-strong);
  font-size:13px;color:var(--ink);
  transition:border-color var(--dur) var(--ease), background var(--dur) var(--ease), transform var(--dur-fast) var(--ease);
}
.chip:hover{border-color:var(--accent);background:rgba(74,158,255,0.10);transform:translateY(-1px);}
.chip:active{transform:translateY(0);}
.chip .scent{font-family:var(--font-mono);font-size:11px;color:var(--accent-bright);font-variant-numeric:tabular-nums;}
.chip.primary{border-color:rgba(74,158,255,0.4);}
.chip-stagger{opacity:0;transform:translateY(6px);animation:chipIn var(--dur-slow) var(--ease) forwards;}
@keyframes chipIn{to{opacity:1;transform:none;}}

/* ============================================================================
 * WORKSPACE: Miller columns (focus + context), breadcrumb, report
 * ========================================================================== */
.workspace{
  position:fixed; inset:0; z-index:var(--z-panel);
  display:flex; flex-direction:column;
  opacity:0; pointer-events:none;
  transition:opacity var(--dur) var(--ease);
}
.workspace-open .workspace{opacity:1;pointer-events:auto;}

/* breadcrumb = reversible spatial HISTORY */
.crumbtrail{
  display:flex; align-items:center; gap:4px; padding:16px 22px 10px;
  flex:none; flex-wrap:wrap;
}
.crumb{
  display:inline-flex;align-items:center;gap:8px;padding:7px 13px;border-radius:var(--r-pill);
  font-size:12.5px;color:var(--ink-dim);
  background:var(--glass);border:1px solid var(--line);
  transition:all var(--dur) var(--ease); max-width:240px;
}
.crumb:hover{color:var(--ink);border-color:var(--line-strong);}
.crumb.here{color:var(--ink);border-color:var(--accent);background:rgba(74,158,255,0.08);cursor:default;}
.crumb .ci{width:16px;height:16px;display:grid;place-items:center;flex:none;opacity:.8;}
.crumb-sep{color:var(--ink-faint);font-family:var(--font-mono);font-size:12px;padding:0 1px;}
.crumb-cmdk{
  margin-left:auto;font-size:11.5px;color:var(--ink-dim);display:flex;align-items:center;gap:7px;
  border:1px solid var(--line);border-radius:var(--r-pill);padding:6px 12px;
  transition:border-color var(--dur) var(--ease),color var(--dur) var(--ease);
}
.crumb-cmdk:hover{border-color:var(--accent);color:var(--ink);}
.crumb-cmdk kbd{font-family:var(--font-mono);font-size:10px;border:1px solid var(--line-strong);border-radius:4px;padding:1px 5px;}

/* the column rail */
.rail{
  flex:1; display:flex; gap:16px; padding:6px 22px 22px;
  overflow-x:auto; overflow-y:hidden; align-items:stretch;
  scroll-behavior:smooth; scroll-snap-type:x proximity;
}
.rail::-webkit-scrollbar{height:9px;}
.rail::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:9px;border:2px solid transparent;background-clip:content-box;}

.col{
  flex:none; width:min(560px, 86vw); height:100%;
  background:var(--glass); backdrop-filter:blur(var(--glass-blur));
  -webkit-backdrop-filter:blur(var(--glass-blur));
  border:1px solid var(--edge); border-radius:var(--r-lg);
  box-shadow:var(--sh-md);
  display:flex; flex-direction:column; overflow:hidden;
  scroll-snap-align:start;
  transform-origin:left center;
  animation:colIn var(--dur-move) var(--ease);
}
/* prior columns recede to pure context */
.col.context{opacity:0.52; filter:saturate(0.6);}
.col.context::after{content:"";position:absolute;inset:0;background:rgba(6,7,9,0.28);pointer-events:none;}
.col.active{box-shadow:var(--sh-lg);}
@keyframes colIn{from{opacity:0;transform:translateX(26px) scale(.97);}to{opacity:1;transform:none;}}

.col-head{padding:18px 20px 14px;border-bottom:1px solid var(--line);flex:none;}
.col-eyebrow{display:flex;align-items:center;gap:9px;margin-bottom:8px;}
.col-kind{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--accent-bright);background:rgba(74,158,255,0.10);
  border:1px solid rgba(74,158,255,0.24);border-radius:5px;padding:2px 7px;
}
.col-title{font-size:18px;font-weight:600;letter-spacing:-0.01em;color:var(--ink);}
.col-scroll{flex:1;overflow-y:auto;overscroll-behavior:contain;padding:18px 20px 22px;}
.col-scroll::-webkit-scrollbar{width:9px;}
.col-scroll::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:9px;border:2px solid transparent;background-clip:content-box;}

/* provenance chip */
.prov{
  display:inline-flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:10.5px;
  color:var(--ink-dim);background:var(--sunken);border:1px solid var(--line);
  border-radius:var(--r-pill);padding:3px 9px;
}
.prov .pv-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 6px var(--ok-glow);}

/* ANSWER FIRST: terse verdict + echoed framing */
.answer{margin-bottom:18px;}
.answer-framing{font-size:12.5px;color:var(--ink-dim);margin-bottom:6px;display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;}
.answer-framing .echo{color:var(--ink-mid);}
.answer-verdict{font-size:16px;color:var(--ink);line-height:1.45;}
.answer-verdict b{font-weight:600;}
.answer-verdict .good{color:var(--ok);}
.answer-verdict .bad{color:var(--danger);}

/* Hick window toggle: few, equal, mutually exclusive. RE-BINDS in place. */
.window-toggle{
  display:inline-flex;gap:2px;padding:3px;margin:14px 0 20px;
  background:var(--sunken);border:1px solid var(--line);border-radius:var(--r-pill);
}
.wt-opt{
  font-family:var(--font-mono);font-size:12px;color:var(--ink-dim);
  padding:6px 15px;border-radius:var(--r-pill);
  transition:color var(--dur) var(--ease),background var(--dur) var(--ease);
  position:relative;
}
.wt-opt.on{color:var(--on-accent);background:var(--accent);box-shadow:0 2px 10px var(--accent-glow);}
.wt-opt:not(.on):hover{color:var(--ink);}

/* HERO number with length-encoded delta sparkline (position/length, one hue valence) */
.hero{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  padding:18px 20px;margin-bottom:18px;position:relative;overflow:hidden;
}
.hero-row{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.hero-num{font-family:var(--font-mono);font-size:38px;font-weight:600;letter-spacing:-0.02em;color:var(--ink);line-height:1;}
.hero-label{font-size:12px;color:var(--ink-dim);margin-bottom:8px;letter-spacing:.02em;}
.hero-delta{display:flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:13px;}
.hero-delta.up{color:var(--ok);} .hero-delta.down{color:var(--danger);}
.hero-delta .arrow{font-size:11px;}
.hero-spark{margin-top:14px;}
.spark-cap{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);margin-bottom:5px;}
.spark-svg{display:block;width:100%;height:46px;overflow:visible;}

/* per-row small multiples, tabular numerals, drillable (scented chevron) */
.rows-label{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin:4px 0 11px;}
.drow{
  display:grid;grid-template-columns:1fr auto auto 26px;align-items:center;gap:14px;
  padding:13px 14px;border-radius:var(--r);border:1px solid var(--line);
  background:var(--surface);margin-bottom:9px;width:100%;text-align:left;
  transition:border-color var(--dur) var(--ease),background var(--dur) var(--ease),transform var(--dur-fast) var(--ease);
}
.drow:hover{border-color:var(--line-strong);background:var(--surface-2);transform:translateX(2px);}
.drow .dr-name{font-size:14px;font-weight:500;color:var(--ink);}
.drow .dr-sub{font-size:11.5px;color:var(--ink-dim);font-family:var(--font-mono);}

.drow .dr-val{font-family:var(--font-mono);font-size:14px;color:var(--ink);text-align:right;font-variant-numeric:tabular-nums;}
.drow .dr-val small{display:block;font-size:10.5px;color:var(--ink-dim);font-weight:400;}
.drow .dr-chev{color:var(--ink-faint);display:grid;place-items:center;transition:color var(--dur) var(--ease),transform var(--dur) var(--ease);}
.drow:hover .dr-chev{color:var(--accent-bright);transform:translateX(3px);}

/* scented door: elaborate / progressive disclosure */
.door{
  display:flex;align-items:center;gap:9px;width:100%;
  margin-top:6px;padding:12px 14px;border-radius:var(--r);
  border:1px dashed var(--line-strong);background:transparent;
  color:var(--ink-dim);font-size:13px;
  transition:border-color var(--dur) var(--ease),color var(--dur) var(--ease),background var(--dur) var(--ease);
}
.door:hover{border-color:var(--accent);color:var(--ink);background:rgba(74,158,255,0.05);}
.door .door-ic{color:var(--accent-bright);}
.door .door-scent{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);}
.door-extra{margin-top:9px;display:none;}
.door-extra.show{display:block;animation:fade var(--dur-slow) var(--ease);}
@keyframes fade{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}
.elab-line{display:flex;gap:11px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:13px;color:var(--ink-mid);}
.elab-line:last-child{border-bottom:none;}
.elab-line .el-k{color:var(--ink-dim);width:130px;flex:none;}
.elab-line .el-v{font-family:var(--font-mono);color:var(--ink);}

/* RELATE strip: "connected to" */
.relate{margin-top:20px;padding-top:16px;border-top:1px solid var(--line);}
.relate-label{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:11px;display:flex;align-items:center;gap:8px;}
.relate-label .link-ic{color:var(--accent-bright);}
.relate-strip{display:flex;gap:10px;flex-wrap:wrap;}
.rel-card{
  display:flex;flex-direction:column;gap:3px;padding:11px 13px;border-radius:var(--r);
  background:var(--surface);border:1px solid var(--line);min-width:138px;text-align:left;
  transition:border-color var(--dur) var(--ease),transform var(--dur-fast) var(--ease),background var(--dur) var(--ease);
}
.rel-card:hover{border-color:var(--accent);transform:translateY(-2px);background:var(--surface-2);}
.rel-kind{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);}
.rel-name{font-size:13.5px;font-weight:500;color:var(--ink);}
.rel-val{font-family:var(--font-mono);font-size:12px;color:var(--ink-mid);}
.rel-card.attn{border-color:rgba(245,177,58,0.4);box-shadow:0 0 14px var(--warn-glow);}
.rel-card.attn .rel-name{color:var(--warn);}

/* record / detail column body */

.rec-kpi{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:6px;}
.rec-kpi .k{display:flex;flex-direction:column;gap:3px;}
.rec-kpi .k .kl{font-size:11px;color:var(--ink-dim);}
.rec-kpi .k .kv{font-family:var(--font-mono);font-size:22px;color:var(--ink);font-weight:600;}
.rec-kpi .k .kv.warn{color:var(--warn);}
.rec-note{font-size:13.5px;color:var(--ink-mid);line-height:1.55;margin:10px 0;padding:12px 14px;background:var(--sunken);border-radius:var(--r);border:1px solid var(--line);}
.rec-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;}
.btn{
  display:inline-flex;align-items:center;gap:8px;min-height:40px;padding:0 16px;
  border-radius:var(--r-sm);font-size:13px;font-weight:600;
  background:var(--surface-2);border:1px solid var(--line-strong);color:var(--ink);
  transition:border-color var(--dur) var(--ease),transform var(--dur-fast) var(--ease),background var(--dur) var(--ease);
}
.btn:hover{border-color:var(--accent);} .btn:active{transform:translateY(1px);}
.btn.primary{background:linear-gradient(180deg,var(--accent),var(--accent-deep));border-color:transparent;color:var(--on-accent);box-shadow:0 4px 16px var(--accent-glow);}

}

/* ============================================================================
 * Sparkline drawing: position + LENGTH encode magnitude. Prior baseline drawn
 * as a reference line so the delta reads as length, not as a color compare.
 * Hue used ONLY for valence of the endpoint.
 * ========================================================================== */
function sparkline(values, opts){
  opts = opts || {};
  const w = opts.w || 280, h = opts.h || 46, pad = opts.pad || 4;
  const baseline = opts.baseline;
  const clean = values.filter(v=>v!==null && v!==undefined);
  const lo = Math.min(...clean, baseline ?? Infinity);
  const hi = Math.max(...clean, baseline ?? -Infinity);
  const range = (hi - lo) || 1;
  const innerH = h - pad*2;
  const innerW = w - pad*2;
  const n = values.length;
  const x = i => pad + (innerW * (n<=1?0:i/(n-1)));
  const y = v => pad + innerH - ((v - lo)/range) * innerH;
  // valence hue
  const valence = opts.valence || "neutral";
  const hue = valence==="good" ? "var(--ok)" : valence==="bad" ? "var(--danger)" : "var(--accent)";
  // path (skip nulls cleanly)
  let d = "", started=false;
  values.forEach((v,i)=>{
    if(v===null||v===undefined){ started=false; return; }
    d += (started?" L":" M") + x(i).toFixed(1) + "," + y(v).toFixed(1);
    started=true;
  });
  // area under the curve = length/position reinforce
  const lastIdx = values.reduce((acc,v,i)=> (v!==null&&v!==undefined)?i:acc, 0);
  const firstIdx = values.findIndex(v=>v!==null&&v!==undefined);
  let area="";
  if(firstIdx>=0){
    area = `M${x(firstIdx).toFixed(1)},${(h-pad).toFixed(1)}` + d.replace(/^ M[\d.]+,[\d.]+/, l=>" L"+l.slice(3)) + ` L${x(lastIdx).toFixed(1)},${(h-pad).toFixed(1)} Z`;
  }
  const lastV = values[lastIdx];
  const gid = "g"+Math.random().toString(36).slice(2,7);
  // baseline reference line (so delta = vertical LENGTH from baseline to endpoint)
  let baseEl = "";
  if(baseline!==undefined){
    const by = y(baseline).toFixed(1);
    baseEl = `<line x1="${pad}" y1="${by}" x2="${w-pad}" y2="${by}" stroke="var(--ink-faint)" stroke-width="1" stroke-dasharray="2 3"/>`;
    // the delta segment as a literal vertical bar at the endpoint = length encoding
    baseEl += `<line x1="${x(lastIdx).toFixed(1)}" y1="${by}" x2="${x(lastIdx).toFixed(1)}" y2="${y(lastV).toFixed(1)}" stroke="${hue}" stroke-width="2" opacity="0.5"/>`;
  }
  return `<svg class="${opts.cls||''}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" role="img" aria-label="trend">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${hue}" stop-opacity="0.20"/>
      <stop offset="1" stop-color="${hue}" stop-opacity="0"/>
    </linearGradient></defs>
    ${area?`<path d="${area}" fill="url(#${gid})"/>`:""}
    ${baseEl}
    <path d="${d}" fill="none" stroke="${hue}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${x(lastIdx).toFixed(1)}" cy="${y(lastV).toFixed(1)}" r="3" fill="${hue}"/>
  </svg>`;
}

/* ============================================================================
 * PALETTE behavior
 * ========================================================================== */
const $ = s=>document.querySelector(s);
const palette=$("#palette"), veil=$("#veil"), input=$("#palInput"),
      body=$("#palBody"), modeEl=$("#palMode"), caret=$("#palCaret"),
      presence=$("#presence");
let selIndex=0, currentItems=[];

function openPalette(){
  document.body.classList.add("palette-open");
  presence.classList.add("speaking");
  setTimeout(()=>input.focus(),60);
  render("");
}
function closePalette(){
  document.body.classList.remove("palette-open");
  presence.classList.remove("speaking");
  input.value="";
}
function setMode(q){
  let m="JUMP";
  if(q.startsWith(">")) m="COMMAND";
  else if(q.startsWith("@")) m="PERSON";
  else if(q.startsWith("#")) m="JOB";
  else if(q.startsWith("?")) m="ASK";
  else if(isQuestion(q)) m="ASK";
  modeEl.textContent=m;
}
function isQuestion(q){
  const ql=q.toLowerCase().trim();
  if(!ql) return false;
  return /\b(how|what|why|when|where|which|is|are|did|do|does|hows|how's)\b/.test(ql)
      || ql.endsWith("?") || ql.startsWith("?");
}

/* Detect the ambiguous "ads" ask → answer-first interpretation + scented chips */
function ambiguousAds(q){
  const ql = q.toLowerCase().replace(/^\?\s*/,"");
  return /\bads?\b|advertis|meta|google|campaign/.test(ql) && isQuestion(q.startsWith("?")?q:q) && /how|doing|going|perform|status|update|look/.test(ql);
}

function pill(item, idx, attentionClass){
  return `<button class="pal-item ${attentionClass||""} ${idx===selIndex?'sel':''}" data-idx="${idx}" role="option">
    <span class="pal-icon ${item.glow?'glow':''}">${item.ic}</span>
    <span class="pal-text">
      <span class="pal-title">${item.title}</span>
      <span class="pal-sub">${item.sub||""}</span>
    </span>
    ${item.attention?'<span class="pal-flag">cold 39d</span>':''}
    ${item.meta?`<span class="pal-meta">${item.meta}</span>`:''}
    ${item.kbd?`<span class="pal-kbd">${item.kbd}</span>`:''}
  </button>`;
}

function render(q){
  setMode(q);
  caret.textContent = q ? "" : "";
  currentItems = [];
  let html = "";

  // ----- ASK with ambiguous ads query: ANSWER FIRST + scented option chips -----
  if(ambiguousAds(q)){
    html += `
      <div class="interp">
        <div class="interp-head">
          <span class="interp-orb"></span>
          <span class="interp-label">I read that as</span>
        </div>
        <div class="interp-line">Ad performance, <em>and you did not say which platform or window.</em> Default read: <b>Meta, last 7 days</b> (Google has no conversion pixel wired, so its numbers are blind).</div>
        <div class="interp-ask">Pick the cut so I answer the right question:</div>
        <div class="interp-chips">
          <button class="chip primary chip-stagger" style="animation-delay:40ms" data-go="ads:7d">Meta &middot; 7d <span class="scent">$13.20 CPL</span></button>
          <button class="chip chip-stagger" style="animation-delay:110ms" data-go="ads:google">Google &middot; 7d <span class="scent">pixel blind</span></button>
          <button class="chip chip-stagger" style="animation-delay:180ms" data-go="ads:month">Both &middot; month <span class="scent">26 leads</span></button>
        </div>
      </div>
      <div class="pal-empty-note">Or keep typing to narrow it yourself.</div>`;
    body.innerHTML = html;
    bindChips();
    return;
  }

  // ----- normal filtered / never-blank list -----
  const ql = q.replace(/^[>@#?]\s*/,"").toLowerCase().trim();
  const match = it => !ql || (it.title+" "+(it.sub||"")).toLowerCase().includes(ql);

  if(!ql){
    html += groupHTML("Recent", "since last session", RECENTS);
    html += groupHTML("Frequent", "&#8984;1-4", FREQUENTS);
  } else {
    const r = RECENTS.filter(match), f = FREQUENTS.filter(match), c = COMMANDS.filter(match);
    if(r.length) html += groupHTML("Recent", "", r);
    if(f.length) html += groupHTML("Surfaces", "", f);
    if(c.length) html += groupHTML("Commands", "", c);
    if(!r.length && !f.length && !c.length){
      html += `<div class="pal-empty-note">No exact match. Try <b>?how are ads doing</b> to ask, or <b>&gt;</b> for commands.</div>`;
      // never truly blank: still offer frequents as fallback
      html += groupHTML("Jump anywhere", "", FREQUENTS);
    }
  }
  body.innerHTML = html;
  bindItems();
}

function groupHTML(label, hint, items){
  let h = `<div class="pal-group"><div class="pal-group-label"><span>${label}</span>${hint?`<span class="hint">${hint}</span>`:''}</div>`;
  items.forEach(it=>{
    const idx = currentItems.length;
    currentItems.push(it);
    h += pill(it, idx, it.attention?"pop-attention":"");
  });
  h += `</div>`;
  return h;
}

function bindItems(){
  body.querySelectorAll(".pal-item").forEach(el=>{
    el.addEventListener("click",()=>{
      const it = currentItems[+el.dataset.idx];
      if(it && it.go){ closePalette(); enterWorkspace(); setTimeout(it.go, 40); }
    });
    el.addEventListener("mouseenter",()=>{ selIndex=+el.dataset.idx; highlight(); });
  });
}
function bindChips(){
  body.querySelectorAll(".chip").forEach(el=>{
    el.addEventListener("click",()=>{
      const g = el.dataset.go;
      closePalette(); enterWorkspace();
      setTimeout(()=>{
        if(g==="ads:7d") openAds("7d","you picked Meta 7d");
        else if(g==="ads:month") openAds("month","you picked both, month");
        else if(g==="ads:google") openAds("google","you picked Google 7d");
      },40);
    });
  });
}
function highlight(){
  body.querySelectorAll(".pal-item").forEach((el,i)=>{
    el.classList.toggle("sel", +el.dataset.idx===selIndex);
  });
}

input.addEventListener("input", e=>{ selIndex=0; render(e.target.value); });
input.addEventListener("keydown", e=>{
  if(e.key==="ArrowDown"){ e.preventDefault(); selIndex=Math.min(selIndex+1,currentItems.length-1); highlight(); scrollSel(); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); selIndex=Math.max(selIndex-1,0); highlight(); scrollSel(); }
  else if(e.key==="Enter"){
    e.preventDefault();
    const it = currentItems[selIndex];
    if(it && it.go){ closePalette(); enterWorkspace(); setTimeout(it.go,40); }
  }
});
function scrollSel(){ const el=body.querySelector(".pal-item.sel"); if(el) el.scrollIntoView({block:"nearest"}); }

veil.addEventListener("click", closePalette);
document.addEventListener("keydown", e=>{
  if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==="k"){ e.preventDefault(); document.body.classList.contains("palette-open")?closePalette():openPalette(); }
  else if(e.key==="Escape"){ closePalette(); }
});

/* ============================================================================
 * WORKSPACE: Miller columns + reversible breadcrumb (HISTORY)
 * ========================================================================== */
const rail=$("#rail"), crumbtrail=$("#crumbtrail"), workspace=$("#workspace");
let stack = []; // each: {kind,title,icon,render}

function enterWorkspace(){ document.body.classList.add("workspace-open"); }
function exitWorkspace(){
  document.body.classList.remove("workspace-open");
  stack=[]; rail.innerHTML=""; crumbtrail.innerHTML="";
}

function pushColumn(col){
  stack.push(col);
  renderStack();
  // scroll the new active column into view (magic-move settle)
  requestAnimationFrame(()=>{ rail.scrollTo({left:rail.scrollWidth, behavior:"smooth"}); });
}
function truncateTo(index){
  stack = stack.slice(0, index+1);
  renderStack();
  requestAnimationFrame(()=>{ rail.scrollTo({left:rail.scrollWidth, behavior:"smooth"}); });
}

function renderStack(){
  // columns
  rail.innerHTML="";
  stack.forEach((col,i)=>{
    const active = i===stack.length-1;
    const el = document.createElement("section");
    el.className = "col " + (active?"active":"context");
    el.style.position="relative";
    el.innerHTML = `
      <div class="col-head">
        <div class="col-eyebrow"><span class="col-kind">${col.kind}</span></div>
        <div class="col-title">${col.title}</div>
      </div>
      <div class="col-scroll">${col.render()}</div>`;
    rail.appendChild(el);
    if(col.afterMount) col.afterMount(el);
  });
  // breadcrumb (reversible, spatial)
  crumbtrail.innerHTML = stack.map((c,i)=>{
    const here = i===stack.length-1;
    return `${i>0?'<span class="crumb-sep">&#8250;</span>':''}<button class="crumb ${here?'here':''}" data-i="${i}"><span class="ci">${c.icon}</span>${c.crumb||c.title}</button>`;
  }).join("") + `<button class="crumb-cmdk" id="reopenCmdk"><kbd>&#8984;</kbd><kbd>K</kbd> nav</button>`;
  crumbtrail.querySelectorAll(".crumb").forEach(b=>{
    b.addEventListener("click",()=>{ if(+b.dataset.i!==stack.length-1) truncateTo(+b.dataset.i); });
  });
  $("#reopenCmdk").addEventListener("click", openPalette);
}

/* ============================================================================
 * ADS REPORT column (the flagship report pattern)
 * ========================================================================== */
let adsWindow = "7d";
let adsFraming = "Meta, last 7 days";

function openAds(win, framing){
  exitToRootAds(win, framing);
}
function exitToRootAds(win, framing){
  adsWindow = (win==="google") ? "7d" : win;
  const googleBlind = (win==="google");
  adsFraming = framing || "Meta, last 7 days";
  stack = [];
  pushColumn(adsColumn(googleBlind));
}

function adsColumn(googleBlind){
  return {
    kind:"REPORT", icon:"&#128202;", title:"Ads performance", crumb:"Ads",
    render(){ return adsBody(googleBlind); },
    afterMount(el){ wireAds(el); }
  };
}

function adsBody(googleBlind){
  const d = DATA.ads[adsWindow];
  const deltaCls = d.deltaDir==="up" ? "up" : "down";
  const arrow = d.deltaPct<0 ? "&#9660;" : "&#9650;"; // CPL down = arrow down = good
  const valence = d.verdict; // 'good'
  const verdictWord = `<b class="good">improving</b>`;

  const googleNote = googleBlind ? `
    <div class="rec-note" style="border-color:rgba(245,177,58,0.3);">
      <b style="color:var(--warn);">Google is blind.</b> ~$464 spent over 30 days, <b>0 conversions tracked</b> since Apr 11. The conversion pixel was never wired on the Instant Estimator submit. Until that ships, Google CPL cannot be trusted. Showing Meta as the answerable cut.
    </div>` : "";

  // window toggle (Hick: few, equal, mutually exclusive, re-binds in place)
  const windows = ["24h","7d","month","lifetime"];
  const toggle = `<div class="window-toggle" role="tablist" aria-label="Time window">
    ${windows.map(w=>`<button class="wt-opt ${w===adsWindow?'on':''}" data-win="${w}" role="tab">${w}</button>`).join("")}
  </div>`;

  // hero number + length-encoded delta sparkline
  const hero = `
    <div class="hero">
      <div class="hero-row">
        <div>
          <div class="hero-label">${d.headlineLabel} &middot; cost per lead</div>
          <div class="hero-num">${d.unit}${d.headline.toFixed(2)}</div>
        </div>
        <div class="hero-delta ${deltaCls}">
          <span class="arrow">${arrow}</span> ${Math.abs(d.deltaPct)}% vs prior
        </div>
      </div>
      <div class="hero-spark">
        <div class="spark-cap"><span>prior baseline ${d.unit}${d.baseline.toFixed(2)}</span><span>now ${d.unit}${d.headline.toFixed(2)}</span></div>
        ${sparkline(d.spark, {w:480,h:46,baseline:d.baseline,valence:valence,cls:"spark-svg"})}
      </div>
    </div>`;

  // rows (small multiples, drillable)
  const rows = d.rows.map((r,i)=>`
    <button class="drow" data-row="${i}">
      <span>
        <span class="dr-name">${r.name}</span>
        <span class="dr-sub">${r.sub}</span>
      </span>
      <span class="dr-mini">${sparkline(r.trend,{w:78,h:24,valence:r.dir==="up"?"good":"neutral"})}</span>
      <span class="dr-val">${r.cpl?("$"+r.cpl.toFixed(2)):"n/a"}<small>${r.leads} leads</small></span>
      <span class="dr-chev">&#8250;</span>
    </button>`).join("");

  // scented door (progressive disclosure: elaborate)
  const door = `
    <button class="door" id="adsDoor">
      <span class="door-ic">&#9662;</span> Elaborate: spend, CTR, and why CPL moved
      <span class="door-scent">+3 metrics</span>
    </button>
    <div class="door-extra" id="adsDoorExtra">
      <div class="elab-line"><span class="el-k">Total spend</span><span class="el-v">$${d.spend.toLocaleString()}</span></div>
      <div class="elab-line"><span class="el-k">Leads this window</span><span class="el-v">${d.leads}</span></div>
      <div class="elab-line"><span class="el-k">Live campaigns</span><span class="el-v">${d.live} of 2</span></div>
      <div class="elab-line"><span class="el-k">Why CPL fell</span><span class="el-v" style="font-family:var(--font-ui);color:var(--ink-mid);">May IE exited learning; Riverview 35-54 price hook is carrying it.</span></div>
    </div>`;

  // RELATE strip (connected to)
  const relate = `
    <div class="relate">
      <div class="relate-label"><span class="link-ic">&#128279;</span> Connected to</div>
      <div class="relate-strip">
        <button class="rel-card" data-rel="leads"><span class="rel-kind">Leads</span><span class="rel-name">6 open</span><span class="rel-val">1 this week</span></button>
        <button class="rel-card" data-rel="pipeline"><span class="rel-kind">Pipeline</span><span class="rel-name">$199,843</span><span class="rel-val">13 proposals out</span></button>
        <button class="rel-card attn" data-rel="follow"><span class="rel-kind">Cold lead</span><span class="rel-name">Sharon</span><span class="rel-val">$20,750 &middot; 39d</span></button>
      </div>
    </div>`;

  return `
    <div class="answer">
      <div class="answer-framing"><span class="prov"><span class="pv-dot"></span> snapshot &middot; ${adsFraming}</span></div>
      <div class="answer-verdict" style="margin-top:11px;">CPL is ${verdictWord} and <b>under your $${d.baseline.toFixed(2)} target</b> at <b>${d.unit}${d.headline.toFixed(2)}</b> across ${d.live} live Meta campaigns.</div>
    </div>
    ${googleNote}
    ${toggle}
    ${hero}
    <div class="rows-label">By campaign</div>
    ${rows}
    ${door}
    ${relate}
  `;
}

function wireAds(el){
  // window toggle: RE-BIND same panel in place (no new column)
  el.querySelectorAll(".wt-opt").forEach(b=>{
    b.addEventListener("click",()=>{
      adsWindow = b.dataset.win;
      adsFraming = "Meta, "+ ({ "24h":"last 24 hours","7d":"last 7 days","month":"this month","lifetime":"lifetime" }[adsWindow]);
      const scroll = el.querySelector(".col-scroll");
      scroll.style.opacity="0.3";
      setTimeout(()=>{ scroll.innerHTML = adsBody(false); scroll.style.opacity="1"; wireAds(el); }, 110);
    });
  });
  // door: progressive disclosure
  const door = el.querySelector("#adsDoor"), extra = el.querySelector("#adsDoorExtra");
  if(door) door.addEventListener("click",()=>{
    extra.classList.toggle("show");
    door.querySelector(".door-ic").innerHTML = extra.classList.contains("show") ? "&#9652;" : "&#9662;";
  });
  // row drill → new Miller column (details-on-demand)
  el.querySelectorAll(".drow").forEach(b=>{
    b.addEventListener("click",()=>{
      const r = DATA.ads[adsWindow].rows[+b.dataset.row];
      pushColumn(campaignColumn(r));
    });
  });
  // RELATE drill
  el.querySelectorAll(".rel-card").forEach(b=>{
    b.addEventListener("click",()=>{
      if(b.dataset.rel==="follow") pushColumn(followColumn());
      else pushColumn(relatedColumn(b.dataset.rel));
    });
  });
}

        <div class="rec-block">

function relatedColumn(kind){

    leads:{kind:"LEADS",icon:"&#128269;",title:"Open leads",crumb:"Leads",
      body:`<div class="answer"><div class="answer-verdict"><b>6 open</b>, only <b>1 arrived this week</b>. Lead flow is the constraint, not close rate.</div></div>
            <div class="rec-note">Meta is the only live source. Google is dark (no pixel). Volume rides entirely on the May Instant Estimator at $14.99 CPL.</div>`},
    pipeline:{kind:"PIPELINE",icon:"&#128176;",title:"Proposals out",crumb:"Pipeline",
      body:`<div class="answer"><div class="answer-verdict"><b>$199,843</b> across <b>13</b> proposals out. <b>$33,264</b> signed MTD, <b>$275,464</b> YTD.</div></div>
            <div class="rec-note">Three quotes are the weight of the pipe: Sharon $20,750, Jean Gauvin $20,750, Lee Baxter $16,250. Sharon is the one going cold.</div>`}

  const c = map[kind];
  return { kind:c.kind, icon:c.icon, title:c.title, crumb:c.crumb, render(){ return c.body; } };
}

    <div class="draft-banner">&#9998; <b>Draft only.</b> Crew check-in is written, not sent.</div>`; }
}); }

/* tiny ephemeral toast for not-built surfaces */
function toast(label){
  let t = document.querySelector(".rj-toast");
  if(!t){ t=document.createElement("div"); t.className="rj-toast"; document.body.appendChild(t);
    Object.assign(t.style,{position:"fixed",left:"50%",bottom:"54px",transform:"translateX(-50%) translateY(10px)",
      zIndex:"900",background:"var(--glass-2)",backdropFilter:"blur(18px)",border:"1px solid var(--edge)",
      borderRadius:"var(--r-pill)",padding:"11px 20px",fontSize:"13px",color:"var(--ink)",
      boxShadow:"var(--sh-md)",opacity:"0",transition:"opacity var(--dur) var(--ease), transform var(--dur) var(--ease)",
      pointerEvents:"none",fontFamily:"var(--font-ui)"});
  }
  t.innerHTML = `<span style="font-family:var(--font-mono);font-size:11px;color:var(--accent-bright);">DESIGN PREVIEW</span> &nbsp; ${label} would open here`;
  requestAnimationFrame(()=>{ t.style.opacity="1"; t.style.transform="translateX(-50%) translateY(0)"; });
  clearTimeout(t._h); t._h=setTimeout(()=>{ t.style.opacity="0"; t.style.transform="translateX(-50%) translateY(10px)"; },1900);
}
