<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Sales Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow-x:hidden;min-height:100vh}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(34,211,238,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(124,58,237,0.08) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(34,211,238,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}
.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(34,211,238,0.22);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#22d3ee,#7c3aed,transparent);opacity:0.5}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #fff;border-radius:10px;color:#030611;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none;transition:all 0.2s}
.btn-back:hover{background:rgba(255,255,255,0.85);box-shadow:0 0 14px rgba(255,255,255,0.35)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(200,240,255,0.3),rgba(34,211,238,0.22) 40%,rgba(5,15,30,0.8));box-shadow:0 0 14px rgba(34,211,238,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}

.stage{position:relative;z-index:5;padding:80px 28px 60px;max-width:1400px;margin:0 auto}
.hero{margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
.hero .eyebrow{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:#22d3ee;letter-spacing:3px;margin-bottom:6px}
.hero h1{font-family:'Orbitron',sans-serif;font-size:2em;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.pipe-selector{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.pipe-pill{padding:9px 16px;background:rgba(14,22,40,0.55);border:1px solid rgba(34,211,238,0.18);border-radius:20px;font-family:'Share Tech Mono',monospace;font-size:0.72em;letter-spacing:1.2px;color:rgba(200,220,255,0.7);cursor:pointer;transition:all 0.2s;text-transform:uppercase}
.pipe-pill:hover{color:#22d3ee}
.pipe-pill.on{background:rgba(34,211,238,0.14);border-color:#22d3ee;color:#22d3ee}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{padding:14px 18px;background:rgba(14,22,40,0.55);border:1px solid rgba(34,211,238,0.16);border-radius:12px}
.stat .lbl{font-family:'Share Tech Mono',monospace;font-size:0.66em;color:rgba(200,220,255,0.5);letter-spacing:1.5px;text-transform:uppercase}
.stat .val{font-family:'Orbitron',sans-serif;font-size:1.4em;font-weight:900;color:#22d3ee;margin-top:4px}
@media (max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}}

.board{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px}
.board::-webkit-scrollbar{height:8px}
.board::-webkit-scrollbar-thumb{background:rgba(34,211,238,0.2);border-radius:4px}
.col{min-width:280px;flex:1;background:rgba(14,22,40,0.55);border:1px solid rgba(34,211,238,0.14);border-radius:14px;display:flex;flex-direction:column;overflow:hidden;max-height:75vh}
.col-head{padding:14px 14px;background:rgba(6,10,20,0.65);border-bottom:1px solid rgba(34,211,238,0.14)}
.col-head .name{font-family:'Orbitron',sans-serif;font-size:0.68em;font-weight:800;letter-spacing:2px;color:#22d3ee;margin-bottom:3px}
.col-head .stats-row{display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:0.68em;color:rgba(200,220,255,0.55);letter-spacing:1px}
.col-head .count{color:#22d3ee;font-weight:700}
.col-body{padding:10px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1}
.col-body::-webkit-scrollbar{width:5px}
.col-body::-webkit-scrollbar-thumb{background:rgba(34,211,238,0.2);border-radius:3px}

.card{padding:10px 12px;background:rgba(6,10,20,0.55);border:1px solid rgba(34,211,238,0.1);border-radius:9px;cursor:pointer;transition:all 0.2s;text-decoration:none;color:inherit;display:block}
.card:hover{border-color:rgba(34,211,238,0.4);background:rgba(6,10,20,0.8);transform:translateX(2px)}
.card .cust{font-weight:700;font-size:0.86em;margin-bottom:2px}
.card .meta{font-family:'Share Tech Mono',monospace;font-size:0.66em;color:rgba(200,220,255,0.55);letter-spacing:0.5px}
.card .val{font-family:'Orbitron',sans-serif;font-size:0.88em;font-weight:800;color:#22d3ee;margin-top:6px}
.card .rep{font-family:'Share Tech Mono',monospace;font-size:0.62em;color:rgba(124,58,237,0.85);letter-spacing:1px;margin-top:4px;text-transform:uppercase}

.empty{text-align:center;padding:20px 10px;color:rgba(200,220,255,0.3);font-family:'Share Tech Mono',monospace;font-size:0.7em;letter-spacing:1.5px}
.loading{text-align:center;padding:60px;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1.5px}
</style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="btn-back" href="sales.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> BACK</a>
  <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· PIPELINE</span></div></div>
  <div class="tb-spacer"></div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px" id="countBadge">—</div>
</div>

<div class="stage">
  <div class="hero">
    <div class="hero-left">
      <div class="eyebrow">SALES · GHL PIPELINES</div>
      <h1>Sales Pipeline</h1>
    </div>
  </div>

  <div class="pipe-selector" id="pipeSelector">
    <div class="pipe-pill on" data-pipe="all" onclick="setPipe('all')">All Pipelines</div>
    <div class="pipe-pill" data-pipe="Darcy's Pipeline" onclick="setPipe('Darcy\\'s Pipeline')">Darcy</div>
    <div class="pipe-pill" data-pipe="Main Pipeline" onclick="setPipe('Main Pipeline')">Main</div>
    <div class="pipe-pill" data-pipe="Lead" onclick="setPipe('Lead')">Lead</div>
    <div class="pipe-pill" data-pipe="Client" onclick="setPipe('Client')">Client</div>
    <div class="pipe-pill" data-pipe="Mack's Pipeline" onclick="setPipe('Mack\\'s Pipeline')">Mack</div>
    <div class="pipe-pill" data-pipe="Repairs" onclick="setPipe('Repairs')">Repairs</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="lbl">Open Deals</div><div class="val" id="sOpen">—</div></div>
    <div class="stat"><div class="lbl">Pipeline Value</div><div class="val" id="sValue">—</div></div>
    <div class="stat"><div class="lbl">Avg Deal</div><div class="val" id="sAvg">—</div></div>
    <div class="stat"><div class="lbl">Stages</div><div class="val" id="sStages">—</div></div>
  </div>

  <div class="board" id="board">
    <div class="loading" style="width:100%">LOADING GHL PIPELINE...</div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = n => n ? '$' + Math.round(n/1000) + 'K' : '—';

let CACHED = [];
let currentPipe = 'all';

async function loadAll(){
  try {
    const r = await fetch('https://shenron-app.vercel.app/api/ghl?mode=pipeline&limit=200');
    if (!r.ok) { $('board').innerHTML = '<div class="loading" style="width:100%">GHL fetch failed · HTTP ' + r.status + '</div>'; return; }
    const { opportunities } = await r.json();
    CACHED = (opportunities || []).filter(o => o.status === 'open');
    $('countBadge').textContent = CACHED.length + ' OPEN DEALS';
    render();
  } catch(e) {
    $('board').innerHTML = '<div class="loading" style="width:100%">Error: ' + esc(e.message) + '</div>';
  }
}

function setPipe(p){
  currentPipe = p;
  document.querySelectorAll('.pipe-pill').forEach(el => el.classList.toggle('on', el.dataset.pipe === p));
  render();
}

function render(){
  const list = currentPipe === 'all' ? CACHED : CACHED.filter(o => o.pipeline === currentPipe);

  // Group by stage, preserve insertion order
  const byStage = {};
  list.forEach(o => {
    const stage = o.stage || 'Unknown';
    (byStage[stage] = byStage[stage] || []).push(o);
  });

  const totalValue = list.reduce((s,o) => s + (Number(o.value)||0), 0);
  $('sOpen').textContent = list.length;
  $('sValue').textContent = totalValue ? money(totalValue) : '—';
  $('sAvg').textContent = list.length ? money(totalValue / list.length) : '—';
  $('sStages').textContent = Object.keys(byStage).length;

  if (!list.length) {
    $('board').innerHTML = '<div class="loading" style="width:100%">No deals in this pipeline.</div>';
    return;
  }

  $('board').innerHTML = Object.entries(byStage).map(([stage, opps]) => {
    const total = opps.reduce((s,o) => s + (Number(o.value)||0), 0);
    return `
      <div class="col">
        <div class="col-head">
          <div class="name">${esc(stage)}</div>
          <div class="stats-row">
            <span><span class="count">${opps.length}</span> deal${opps.length===1?'':'s'}</span>
            <span>${total ? money(total) : ''}</span>
          </div>
        </div>
        <div class="col-body">
          ${opps.map(o => `
            <a class="card" href="https://app.gohighlevel.com/v2/location/aHotOUdq9D8m3JPrRz9n/opportunities/list" target="_blank">
              <div class="cust">${esc(o.name || '(no name)')}</div>
              <div class="meta">${esc(o.pipeline || '')}</div>
              ${o.value ? `<div class="val">${money(o.value)}</div>` : ''}
              ${o.source ? `<div class="rep">${esc(o.source)}</div>` : ''}
            </a>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); window.location.href = 'sales.html'; } });
loadAll();
</script>

<script src="assets/ryujin-mode.js"></script>
<script src="assets/ryujin-tenant.js"></script>
<script src="assets/ryujin-persist.js"></script>

</body>
</html>
