<style>
:root{--bg:#060a14;--glass:rgba(20,30,50,0.85);--glass-border:rgba(34,211,238,0.16);--glass-border-hi:rgba(34,211,238,0.35);--text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);--cyan:#22d3ee;--purple:#7c3aed;--green:#4ade80;--gold:#fbbf24;--orange:#fb923c;--red:#f87171;--radius:12px;--sidebar-w:72px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;overflow-x:hidden}
.sidebar{width:var(--sidebar-w);background:rgba(8,12,24,0.98);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;bottom:0;z-index:50}
.sidebar-logo{width:44px;height:44px;margin:18px 0 12px;border-radius:12px;background:url('/assets/logo/logo-glow.jpg') center/cover;box-shadow:0 0 20px rgba(34,211,238,0.3)}
.sidebar-divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;margin:4px 0 8px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid transparent;color:var(--text-dim);text-decoration:none;transition:all 0.25s;position:relative}
.nav-icon:hover{background:rgba(34,211,238,0.06);color:var(--text)}
.nav-icon.active{background:linear-gradient(135deg,rgba(251,191,36,0.12),rgba(34,211,238,0.06));color:var(--gold);border-color:rgba(251,191,36,0.3)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:3px;background:var(--gold);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--gold)}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.main{margin-left:var(--sidebar-w);padding:18px 22px 60px;max-width:1400px}
.hq-header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.hq-title .crumb{font-family:'JetBrains Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hq-title h1{font-family:'Inter',monospace;font-size:1.7em;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,#e0e6f0 20%,var(--gold) 70%,var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hq-title .sub{font-size:0.85em;color:var(--text-dim);margin-top:6px}
.btn{font-family:'Inter',monospace;font-size:0.7em;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:8px 16px;border-radius:18px;cursor:pointer;border:1px solid var(--glass-border);background:transparent;color:var(--text-dim);text-decoration:none;display:inline-block}
.btn:hover{color:var(--text);border-color:var(--glass-border-hi)}
.btn.primary{background:linear-gradient(135deg,var(--gold),var(--orange));color:#0a0e1a;border:none;box-shadow:0 0 12px rgba(251,191,36,0.3)}

.kpi-rail{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:18px}
.kpi-tile{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
.kpi-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--orange),transparent);opacity:0.5}
.kpi-label{font-family:'Inter',monospace;font-size:0.6em;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px}
.kpi-value{font-family:'Inter',monospace;font-size:1.5em;font-weight:800;color:var(--orange);line-height:1.1}
.kpi-value.cyan{color:var(--cyan)}.kpi-value.gold{color:var(--gold)}

.section-head{display:flex;align-items:baseline;gap:10px;margin:18px 0 10px;font-family:'Inter',monospace}
.section-head h2{font-size:0.78em;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.section-head .count-pill{font-size:0.65em;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:10px;background:rgba(251,146,60,0.1);border:1px solid var(--glass-border);color:var(--orange)}

.ap-list{display:flex;flex-direction:column;gap:6px}
.ap-row{display:grid;grid-template-columns:1fr auto auto auto;gap:14px;align-items:center;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:12px 14px}
.ap-info .name{font-weight:600;color:var(--text)}
.ap-info .meta{font-family:'JetBrains Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:0.5px}
.ap-status{font-family:'JetBrains Mono',monospace;font-size:0.6em;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:8px;background:rgba(251,146,60,0.1);color:var(--orange);border:1px solid var(--glass-border)}
.ap-status.approved{background:rgba(74,222,128,0.1);color:var(--green)}
.ap-amt{font-family:'Inter',monospace;font-weight:700;color:var(--orange);font-size:0.95em}
.ap-time{font-family:'JetBrains Mono',monospace;font-size:0.7em;color:var(--text-dim);letter-spacing:0.5px}

.empty-state{text-align:center;padding:30px 16px;color:var(--text-dim);border:1px dashed var(--glass-border);border-radius:var(--radius);font-size:0.85em}
.empty-state .ico{font-size:1.8em;margin-bottom:6px;opacity:0.5}
.skeleton{background:linear-gradient(90deg,var(--glass) 0%,rgba(22,34,58,0.8) 50%,var(--glass) 100%);background-size:200% 100%;animation:sk 1.4s infinite;border:1px solid var(--glass-border);border-radius:var(--radius);height:64px;margin-bottom:6px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);font-size:0.8em;margin-bottom:14px}
.banner.warn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:var(--orange)}

@media(max-width:768px){.main{padding:12px}.hq-title h1{font-size:1.3em}}
</style>
  <script src="/assets/ryujin-slug.js"></script>
</head>
<body>
<aside class="sidebar"><a href="/admin.html" class="sidebar-logo" title="Admin Home"></a><div class="sidebar-divider"></div><nav class="sidebar-nav">

<a href="/service.html" class="nav-icon" title="Service"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg></a>
<a href="/customer.html" class="nav-icon" title="Customer"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/></svg></a>
<a href="/finance.html" class="nav-icon active" title="Finance"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9a4 4 0 100 8h6a4 4 0 110 8H6"/></svg></a>
<a href="/admin.html" class="nav-icon" title="Full Admin"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></a>
</nav></aside>

<main class="main">
  <div class="hq-header">
    <div class="hq-title"><div class="crumb">Finance · Payables</div><h1>Payables (AP)</h1><div class="sub">Paysheets pending approval/payout + supplier invoices coming due.</div></div>
    <a class="btn primary" href="/finance.html">← Finance</a>
  </div>
  <div id="banner-slot"></div>

  <div class="kpi-rail">
    <div class="kpi-tile"><div class="kpi-label">Paysheets Pending</div><div class="kpi-value" id="kPending">—</div></div>
    <div class="kpi-tile"><div class="kpi-label">Total Owed (Subs)</div><div class="kpi-value gold" id="kSubs">—</div></div>
    <div class="kpi-tile"><div class="kpi-label">Approved Awaiting Pay</div><div class="kpi-value cyan" id="kApproved">—</div></div>
  </div>

  <div class="section-head"><h2>Paysheet Queue</h2><span class="count-pill" id="psCount">—</span></div>
  <div class="ap-list" id="psList"><div class="skeleton"></div></div>

</main>

<script>
const TENANT = window.RYUJIN_TENANT_SLUG;
function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtMoney(n) { if (n == null || isNaN(n)) return '—'; return '$' + Math.round(n).toLocaleString(); }
function fmtRel(iso) { if (!iso) return ''; const dt = Date.now() - new Date(iso).getTime(); if (dt < 86400000) return Math.floor(dt/3600000) + 'h ago'; return Math.floor(dt/86400000) + 'd ago'; }

async function load() {
  try {
    const r = await fetch('/api/paysheets?limit=200', { headers: { 'x-tenant-id': TENANT } });
    if (!r.ok) { document.getElementById('psList').innerHTML = `<div class="empty-state">Could not load paysheets.</div>`; return; }
    const data = await r.json();
    const list = data.paysheets || data.data || [];
    const pending = list.filter(p => ['pending_approval','submitted','approved'].includes((p.state || p.status || '').toLowerCase()));
    let totalOwed = 0, approved = 0;
    for (const p of pending) {
      const v = parseFloat(p.total_pay || 0);
      totalOwed += v;
      if ((p.state || p.status) === 'approved') approved += v;
    }
    document.getElementById('kPending').textContent = pending.length;
    document.getElementById('kSubs').textContent = fmtMoney(totalOwed);
    document.getElementById('kApproved').textContent = fmtMoney(approved);
    document.getElementById('psCount').textContent = pending.length;

    const el = document.getElementById('psList');
    if (pending.length === 0) { el.innerHTML = `<div class="empty-state"><div class="ico">✓</div>No paysheets pending. Subs are paid up.</div>`; return; }
    el.innerHTML = pending.map(p => `
      <div class="ap-row">
        <div class="ap-info">
          <div class="name">${escapeHtml(p.subcontractor_name || p.sub_name || 'Sub')}</div>
          <div class="meta">${escapeHtml(p.job_id || p.estimate_number || p.id?.slice(0,8))}</div>
        </div>
        <div class="ap-status ${(p.state || p.status) === 'approved' ? 'approved' : ''}">${escapeHtml((p.state || p.status || '—').replace(/_/g,' '))}</div>
        <div class="ap-amt">${fmtMoney(p.total_pay || 0)}</div>
        <div class="ap-time">${fmtRel(p.updated_at || p.created_at)}</div>
      </div>`).join('');
  } catch (e) { document.getElementById('banner-slot').innerHTML = `<div class="banner warn">${escapeHtml(e.message)}</div>`; }
}
load();
</script>
</body>
