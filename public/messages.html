<style>
:root{--bg:#060a14;--glass:rgba(20,30,50,0.85);--glass2:rgba(22,34,58,0.80);--glass-border:rgba(34,211,238,0.16);--glass-border-hi:rgba(34,211,238,0.35);--text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);--cyan:#22d3ee;--purple:#7c3aed;--green:#4ade80;--gold:#fbbf24;--red:#f87171;--orange:#fb923c;--radius:12px;--sidebar-w:72px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;overflow:hidden}

.sidebar{width:var(--sidebar-w);background:rgba(8,12,24,0.98);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;bottom:0;z-index:50}
.sidebar-logo{width:44px;height:44px;margin:18px 0 12px;border-radius:12px;background:url('/assets/logo/logo-glow.jpg') center/cover;cursor:pointer}
.sidebar-divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;margin:4px 0 8px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid transparent;color:var(--text-dim);text-decoration:none;transition:all 0.25s;position:relative}
.nav-icon:hover{background:rgba(34,211,238,0.06);color:var(--text)}
.nav-icon.active{background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(124,58,237,0.06));color:var(--cyan);border-color:rgba(34,211,238,0.2)}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.app{display:grid;grid-template-columns:340px 1fr;margin-left:var(--sidebar-w);height:100vh}
.list-pane{border-right:1px solid var(--glass-border);background:rgba(8,12,24,0.6);display:flex;flex-direction:column;min-width:0}
.list-head{padding:18px 18px 14px;border-bottom:1px solid var(--glass-border);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.list-head h1{font-family:'Orbitron',monospace;font-size:1.1em;font-weight:700;letter-spacing:1.5px;color:var(--text)}
.tab-row{display:flex;gap:4px;padding:10px 12px;border-bottom:1px solid var(--glass-border)}
.tab{padding:6px 12px;font-family:'Share Tech Mono',monospace;font-size:0.62em;letter-spacing:1.6px;text-transform:uppercase;background:transparent;border:1px solid transparent;color:var(--text-dim);cursor:pointer;border-radius:8px}
.tab.active{background:rgba(34,211,238,0.1);color:var(--cyan);border-color:var(--glass-border)}
.list{flex:1;overflow-y:auto;padding:6px}
.list-row{display:flex;flex-direction:column;gap:4px;padding:12px 14px;border-radius:10px;cursor:pointer;border:1px solid transparent;margin-bottom:4px}
.list-row:hover{background:rgba(34,211,238,0.04);border-color:var(--glass-border)}
.list-row.active{background:rgba(34,211,238,0.08);border-color:rgba(34,211,238,0.25)}
.list-row.unread::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--cyan);margin-right:6px;vertical-align:middle}
.list-row .from{font-size:0.72em;font-family:'Share Tech Mono',monospace;letter-spacing:1.2px;text-transform:uppercase;color:var(--cyan)}
.list-row .subject{font-size:0.92em;font-weight:600;color:var(--text)}
.list-row.unread .subject{font-weight:700}
.list-row .preview{font-size:0.78em;color:var(--text-dim);line-height:1.35;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.list-row .time{font-size:0.65em;color:var(--text-muted);font-family:'Share Tech Mono',monospace}

.thread-pane{display:flex;flex-direction:column;min-width:0;height:100vh}
.thread-head{padding:18px 22px;border-bottom:1px solid var(--glass-border);background:rgba(8,12,24,0.4)}
.thread-head h2{font-family:'Orbitron',monospace;font-size:1em;font-weight:700;letter-spacing:1.2px;color:var(--text)}
.thread-head .meta{font-family:'Share Tech Mono',monospace;font-size:0.7em;letter-spacing:1.2px;color:var(--text-dim);margin-top:4px;text-transform:uppercase}
.thread-body{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:14px}
.msg{padding:14px 16px;border-radius:14px;max-width:80%;line-height:1.5;overflow-wrap:anywhere}
.msg.from-me{align-self:flex-end;background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(124,58,237,0.08));border:1px solid rgba(34,211,238,0.25)}
.msg.from-them{align-self:flex-start;background:rgba(20,30,50,0.85);border:1px solid var(--glass-border)}
.msg .who{font-family:'Share Tech Mono',monospace;font-size:0.65em;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px}
.msg .when{font-size:0.7em;color:var(--text-muted);font-family:'Share Tech Mono',monospace;margin-top:4px}

.compose-row{padding:14px 22px;border-top:1px solid var(--glass-border);display:flex;gap:8px;background:rgba(8,12,24,0.5)}
.compose-row textarea{flex:1;background:rgba(6,10,20,0.5);border:1px solid var(--glass-border);color:var(--text);padding:10px 14px;border-radius:12px;font-family:inherit;font-size:0.92em;outline:none;min-height:42px;max-height:160px;resize:vertical}
.compose-row textarea:focus{border-color:rgba(34,211,238,0.4)}
.btn{padding:10px 18px;font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.6px;text-transform:uppercase;font-weight:700;cursor:pointer;border-radius:12px;background:linear-gradient(135deg,var(--cyan),var(--purple));color:#0a0e1a;border:none}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn.ghost{background:transparent;color:var(--text-dim);border:1px solid var(--glass-border)}
.btn.ghost:hover{color:var(--text);border-color:var(--glass-border-hi)}

.empty-state{padding:40px;text-align:center;color:var(--text-dim);font-size:0.9em}
.empty-state .ico{font-size:1.8em;margin-bottom:6px;opacity:0.5}

.compose-modal{position:fixed;inset:0;z-index:80;background:rgba(6,10,20,0.85);display:none;align-items:center;justify-content:center;padding:22px}
.compose-modal.open{display:flex}
.compose-modal .card{background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;padding:22px;width:min(560px,100%);display:flex;flex-direction:column;gap:12px}
.compose-modal h2{font-family:'Orbitron',monospace;font-size:0.92em;letter-spacing:1.4px;color:var(--text)}
.compose-modal label{font-size:0.72em;color:var(--text-dim);font-family:'Share Tech Mono',monospace;letter-spacing:1.2px;text-transform:uppercase;display:block;margin-bottom:4px}
.compose-modal select,.compose-modal input,.compose-modal textarea{width:100%;background:rgba(6,10,20,0.5);border:1px solid var(--glass-border);color:var(--text);padding:10px 14px;border-radius:10px;font-family:inherit;font-size:0.92em;outline:none}
.compose-modal textarea{min-height:120px;resize:vertical}

@media(max-width:880px){.app{grid-template-columns:1fr}.list-pane{display:none}.app.show-list .list-pane{display:flex}.app.show-list .thread-pane{display:none}}

.compose-pick { padding: 5px 10px; border-radius: 16px; background: rgba(20,30,50,0.85); border: 1px solid var(--glass-border); color: var(--text-dim); font-size: 0.78em; cursor: pointer; transition: all 0.15s; }

<script>
const TENANT = window.RYUJIN_TENANT_SLUG;
let me = null;
let users = [];
let activeBox = 'inbox';
let activeThread = null;

function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtRel(iso) { if (!iso) return ''; const dt = Date.now() - new Date(iso).getTime(); if (dt < 60000) return 'just now'; if (dt < 3600000) return Math.floor(dt/60000) + 'm ago'; if (dt < 86400000) return Math.floor(dt/3600000) + 'h ago'; if (dt < 604800000) return Math.floor(dt/86400000) + 'd ago'; return new Date(iso).toLocaleDateString(); }

function authHeaders() {
  const headers = { 'x-tenant-id': TENANT };
  const tok = localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token');
  if (tok) headers['Authorization'] = 'Bearer ' + tok;
  return headers;
}

function resetSessionAndLogin() {
  ['ryujin_token','ryujin_user','ryujin_tenant'].forEach(k => { try { localStorage.removeItem(k); sessionStorage.removeItem(k); } catch {} });
  location.href = '/login.html?next=' + encodeURIComponent(location.pathname);
}

function showAuthBanner(reason) {
  if (document.getElementById('authBanner')) return;
  const b = document.createElement('div');
  b.id = 'authBanner';
  b.style.cssText = 'position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:200;background:rgba(248,113,113,0.14);border:1px solid rgba(248,113,113,0.5);color:#fecaca;padding:12px 18px;border-radius:12px;font-size:0.85em;display:flex;gap:10px;align-items:center;backdrop-filter:blur(20px);box-shadow:0 8px 30px rgba(0,0,0,0.4);max-width:90vw';
  b.innerHTML = `<span style="flex:1">⚠ ${escapeHtml(reason || 'Your session is missing or expired — messages will not send.')}</span>
    <button onclick="resetSessionAndLogin()" style="padding:6px 14px;border-radius:8px;background:#f87171;color:#0a0e1a;border:none;font-family:'Orbitron',monospace;font-size:0.72em;font-weight:700;letter-spacing:1.2px;cursor:pointer">↻ Reset & Sign In</button>`;
  document.body.appendChild(b);
}

(function checkTokenOnLoad() {
  const tok = localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token');
  if (!tok) showAuthBanner('No session token found. Click Reset & Sign In to fix.');
})();

// Account menu wiring
document.addEventListener('DOMContentLoaded', () => {
  const acctBtn = document.getElementById('acctBtn');
  const acctMenu = document.getElementById('acctMenu');
  const acctIdentity = document.getElementById('acctIdentity');
  const resetLink = document.getElementById('resetSessionLink');
  const signOutLink = document.getElementById('signOutLink');

  function refreshIdentity() {
    try {
      const u = JSON.parse(localStorage.getItem('ryujin_user') || '{}');
      acctIdentity.textContent = u.name ? `${u.name} · ${u.role || ''}` : 'Not signed in';
    } catch { acctIdentity.textContent = 'Not signed in'; }
  }
  refreshIdentity();

  acctBtn?.addEventListener('click', (e) => {
    e.stopPropagation();
    acctMenu.style.display = acctMenu.style.display === 'none' ? 'block' : 'none';
    if (acctMenu.style.display === 'block') refreshIdentity();
  });
  document.addEventListener('click', (e) => {
    if (!acctMenu.contains(e.target) && e.target !== acctBtn) acctMenu.style.display = 'none';
  });
  resetLink?.addEventListener('click', (e) => { e.preventDefault(); resetSessionAndLogin(); });
  signOutLink?.addEventListener('click', (e) => {
    e.preventDefault();
    ['ryujin_token','ryujin_user','ryujin_tenant','ry_onboarding_done'].forEach(k => { try { localStorage.removeItem(k); sessionStorage.removeItem(k); } catch {} });
    location.href = '/login.html';
  });
});

async function handleAuthResponse(r) {
  if (r.status === 401) {
    let info = {};
    try { info = await r.clone().json(); } catch {}
    showAuthBanner(info.hint || info.error || 'Your session expired. Sign in to continue.');
    return true;
  }
  return false;
}

async function loadList() {
  const r = await fetch(`/api/messages?box=${activeBox}&limit=200`, { headers: authHeaders() });
  if (!r.ok) {
    document.getElementById('list').innerHTML = `<div class="empty-state"><div class="ico">⚠</div>${r.status === 401 ? 'Sign in to read messages' : `Could not load (HTTP ${r.status})`}</div>`;
    return;
  }
  const data = await r.json();
  me = data.me;
  const msgs = data.messages || [];
  if (msgs.length === 0) {
    document.getElementById('list').innerHTML = `<div class="empty-state"><div class="ico">◇</div>No messages in ${activeBox}.</div>`;
    return;
  }
  // Collapse to one row per thread (latest message wins).
  const byThread = new Map();
  for (const m of msgs) {
    const cur = byThread.get(m.thread_id);
    if (!cur || new Date(m.created_at) > new Date(cur.created_at)) byThread.set(m.thread_id, m);
  }
  const threads = [...byThread.values()].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  document.getElementById('list').innerHTML = threads.map(m => {
    const otherName = (activeBox === 'sent' || m.from_user_id === me.id) ? (m.to_user?.name || 'recipient') : (m.from_user?.name || m.from_label || 'system');
    const isUnread = !m.read_at && m.to_user_id === me.id;
    return `
      <div class="list-row ${isUnread ? 'unread' : ''} ${activeThread === m.thread_id ? 'active' : ''}" data-thread="${m.thread_id}">
        <div class="from">${escapeHtml(otherName)}</div>
        <div class="subject">${escapeHtml(m.subject || (m.body ? m.body.slice(0, 60) : 'no subject'))}</div>
        <div class="preview">${escapeHtml((m.body || '').slice(0, 140))}</div>
        <div class="time">${fmtRel(m.created_at)}</div>
      </div>
    `;
  }).join('');
  document.querySelectorAll('.list-row[data-thread]').forEach(r => {
    r.addEventListener('click', () => openThread(r.dataset.thread));
  });
}

async function openThread(threadId) {
  activeThread = threadId;
  document.querySelectorAll('.list-row').forEach(r => r.classList.toggle('active', r.dataset.thread === threadId));
  const r = await fetch(`/api/messages?thread_id=${encodeURIComponent(threadId)}`, { headers: authHeaders() });
  if (!r.ok) { document.getElementById('threadBody').innerHTML = `<div class="empty-state"><div class="ico">⚠</div>Failed (HTTP ${r.status})</div>`; return; }
  const data = await r.json();
  // Force ascending by created_at — defensive sort so replies always
  // append to the bottom regardless of API ordering quirks.
  const msgs = (data.messages || []).slice().sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  if (msgs.length === 0) { document.getElementById('threadBody').innerHTML = `<div class="empty-state">Empty thread</div>`; return; }
  const head = msgs[0];
  const otherName = head.from_user_id === me.id ? (head.to_user?.name || 'recipient') : (head.from_user?.name || head.from_label || 'system');
  document.getElementById('threadHead').innerHTML = `<h2>${escapeHtml(head.subject || 'Thread')}</h2><div class="meta">with ${escapeHtml(otherName)} · ${msgs.length} message${msgs.length === 1 ? '' : 's'}</div>`;
  document.getElementById('threadBody').innerHTML = msgs.map(m => {
    const fromMe = m.from_user_id === me.id;
    const who = fromMe ? 'You' : (m.from_user?.name || m.from_label || 'system');
    const voiceId = m.metadata?.voice_memo_id;
    if (voiceId) {
      const url = m.metadata.voice_memo_url;
      const dur = m.metadata.voice_memo_duration ? ` · ${fmtRecDur(m.metadata.voice_memo_duration * 1000)}` : '';
      const status = m.metadata.voice_memo_status;
      const transcript = m.metadata.voice_memo_transcription || (m.body || '').replace(/^🎤\s*/, '');
      return `<div class="msg voice-bubble ${fromMe ? 'from-me' : 'from-them'}">
        <div class="who">${escapeHtml(who)} · 🎤 voice memo${escapeHtml(dur)}</div>
        <audio controls preload="metadata" src="${escapeHtml(url || '')}"></audio>
        <div class="vt ${(status === 'transcribing' || status === 'pending') ? 'pending' : ''}">${escapeHtml(transcript || (status === 'transcribing' ? 'Transcribing…' : 'No transcript'))}</div>
        <div class="when">${fmtRel(m.created_at)}</div>
      </div>`;
    }
    return `<div class="msg ${fromMe ? 'from-me' : 'from-them'}"><div class="who">${escapeHtml(who)}</div>${escapeHtml(m.body)}<div class="when">${fmtRel(m.created_at)}</div></div>`;
  }).join('');
  document.getElementById('composeRow').style.display = 'flex';
  document.getElementById('threadBody').scrollTop = document.getElementById('threadBody').scrollHeight;

  // Mark unread inbox messages as read.
  for (const m of msgs) {
    if (!m.read_at && m.to_user_id === me.id) {
      fetch(`/api/messages?id=${m.id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json', ...authHeaders() }, body: JSON.stringify({ read: true }) }).catch(() => {});
    }
  }
  // Set reply target.
  document.getElementById('replyBtn').dataset.threadHead = head.id;
  document.getElementById('replyBtn').dataset.threadOtherUser = head.from_user_id === me.id ? head.to_user_id : head.from_user_id;
}

async function sendReply() {
  const text = (document.getElementById('replyText').value || '').trim();
  if (!text) return;
  const replyTo = document.getElementById('replyBtn').dataset.threadHead;
  const toUser = document.getElementById('replyBtn').dataset.threadOtherUser;
  document.getElementById('replyBtn').disabled = true;
  const r = await fetch('/api/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', ...authHeaders() },
    body: JSON.stringify({ to_user_id: toUser, body: text, reply_to: replyTo, thread_id: activeThread }),
  });
  document.getElementById('replyBtn').disabled = false;
  if (await handleAuthResponse(r)) return;
  if (r.ok) {
    document.getElementById('replyText').value = '';
    openThread(activeThread);
    loadList();
  } else {
    alert(`Reply failed: HTTP ${r.status}`);
  }
}

let composeSelected = new Set();   // user_ids picked for the New Message modal

async function loadUsers() {
  try {
    const r = await fetch('/api/users', { headers: authHeaders() });
    if (!r.ok) return;
    const data = await r.json();
    users = (data.users || data.data || data || []).filter(u => me ? u.id !== me.id : true);
    renderUserPicker();
  } catch {}
}

function renderUserPicker() {
  const list = document.getElementById('composeUserList');
  if (!list) return;
  list.innerHTML = users.map(u => {
    const slug = (u.name || '').split(/\s+/)[0] || (u.email || '').split('@')[0];
    return `<button class="compose-pick ${composeSelected.has(u.id) ? 'selected' : ''}" data-uid="${u.id}" data-slug="${escapeHtml(slug.toLowerCase())}">${escapeHtml(u.name || u.email)}${u.role ? ' · ' + u.role : ''}</button>`;
  }).join('');
  list.querySelectorAll('.compose-pick').forEach(b => b.addEventListener('click', () => toggleRecipient(b.dataset.uid)));
  renderRecipChips();
}

function toggleRecipient(uid) {
  if (composeSelected.has(uid)) composeSelected.delete(uid); else composeSelected.add(uid);
  renderUserPicker();
}

function renderRecipChips() {
  const wrap = document.getElementById('composeRecipChips');
  if (!wrap) return;
  if (composeSelected.size === 0) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = [...composeSelected].map(uid => {
    const u = users.find(x => x.id === uid);
    return `<span class="compose-chip">${escapeHtml(u?.name || 'unknown')}<button data-uid="${uid}" title="Remove">×</button></span>`;
  }).join('');
  wrap.querySelectorAll('button[data-uid]').forEach(b => b.addEventListener('click', () => toggleRecipient(b.dataset.uid)));
}

// Parse @mentions out of a message body and merge their user_ids into recipients.
// Supports @firstname (case-insensitive); finds first user whose first name
// matches. Drops the @-token from the visible body if you want — kept inline
// so recipients see who you tagged.
function extractMentions(text) {
  const found = new Set();
  const re = /@([a-zA-Z][a-zA-Z0-9_-]{1,30})/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    const handle = m[1].toLowerCase();
    const u = users.find(x => {
      const slug = (x.name || '').toLowerCase().split(/\s+/)[0] || (x.email || '').split('@')[0].toLowerCase();
      return slug === handle;
    });
    if (u) found.add(u.id);
  }
  return [...found];
}

async function sendNew() {
  const subject = document.getElementById('composeSubject').value;
  const body = document.getElementById('composeBody').value;
  if (!body.trim()) return;
  // Merge picker-selected recipients + @mentions from body.
  const mentions = extractMentions(body);
  const allRecipients = [...new Set([...composeSelected, ...mentions])];
  if (allRecipients.length === 0) {
    alert('Pick at least one recipient or @mention someone in the body.');
    return;
  }
  const r = await fetch('/api/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', ...authHeaders() },
    body: JSON.stringify({ to_user_ids: allRecipients, subject: subject || null, body: body.trim() }),
  });
  if (await handleAuthResponse(r)) return;
  if (r.ok) {
    document.getElementById('composeModal').classList.remove('open');
    document.getElementById('composeBody').value = '';
    document.getElementById('composeSubject').value = '';
    composeSelected.clear();
    renderUserPicker();
    activeBox = 'sent';
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.box === 'sent'));
    loadList();
  } else {
    let errText = `Send failed: HTTP ${r.status}`;
    try { const j = await r.json(); if (j.error) errText += ' — ' + j.error; } catch {}
    alert(errText);
  }
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === t));
    activeBox = t.dataset.box;
    loadList();
  });
});
document.getElementById('replyBtn').addEventListener('click', sendReply);
document.getElementById('replyText').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
});

// ─── Voice memo recording ──────────────────────────────────────
let mediaRecorder = null;
let recChunks = [];
let recStartTime = 0;
let recTimer = null;

function fmtRecDur(ms) { const s = Math.floor(ms/1000); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

async function startRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : (MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '');
    mediaRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
    recChunks = [];
    mediaRecorder.ondataavailable = (e) => { if (e.data?.size) recChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(recChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      const durationSec = (Date.now() - recStartTime) / 1000;
      await uploadAndSendVoiceMemo(blob, durationSec);
    };
    mediaRecorder.start();
    recStartTime = Date.now();
    document.getElementById('recordingIndicator').style.display = 'block';
    recTimer = setInterval(() => { document.getElementById('recDuration').textContent = fmtRecDur(Date.now() - recStartTime); }, 250);
  } catch (e) {
    alert(`Mic error: ${e.message}`);
  }
}

function stopRecording(cancel) {
  if (recTimer) { clearInterval(recTimer); recTimer = null; }
  document.getElementById('recordingIndicator').style.display = 'none';
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    if (cancel) {
      mediaRecorder.ondataavailable = null;
      mediaRecorder.onstop = () => mediaRecorder.stream?.getTracks().forEach(t => t.stop());
    }
    mediaRecorder.stop();
  }
  if (cancel) recChunks = [];
}

async function uploadAndSendVoiceMemo(blob, durationSec) {
  if (durationSec < 1) return;
  const replyBtn = document.getElementById('replyBtn');
  replyBtn.disabled = true;
  try {
    const { upload } = await import('https://esm.sh/@vercel/blob/client@0.27');
    const filename = `memo-${Date.now()}.${(blob.type.split('/')[1] || 'webm').split(';')[0]}`;
    const blobResult = await upload(filename, blob, {
      access: 'public',
      handleUploadUrl: '/api/voice-memo-upload-token',
      contentType: blob.type,
      clientPayload: JSON.stringify({ tenant: TENANT }),
    });
    const memoR = await fetch('/api/voice-memo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({
        blob_url: blobResult.url,
        mime_type: blob.type,
        duration_sec: durationSec,
        size_bytes: blob.size,
      }),
    });
    if (!memoR.ok) { alert('Voice memo failed: HTTP ' + memoR.status); return; }
    const { memo } = await memoR.json();
    const replyTo = replyBtn.dataset.threadHead;
    const toUser = replyBtn.dataset.threadOtherUser;
    const transcript = memo.transcription || '';
    await fetch('/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({
        to_user_id: toUser,
        body: transcript ? `🎤 ${transcript}` : '🎤 Voice memo (transcribing…)',
        reply_to: replyTo,
        thread_id: activeThread,
        metadata: {
          voice_memo_id: memo.id,
          voice_memo_url: memo.blob_url,
          voice_memo_duration: durationSec,
          voice_memo_status: memo.transcription_status,
          voice_memo_transcription: transcript,
        },
      }),
    });
    openThread(activeThread);
    loadList();
  } catch (e) {
    alert(`Voice send failed: ${e.message}`);
  } finally {
    replyBtn.disabled = false;
  }
}

document.getElementById('micBtn').addEventListener('click', startRecording);
document.getElementById('stopRecBtn').addEventListener('click', () => stopRecording(false));
document.getElementById('cancelRecBtn').addEventListener('click', () => stopRecording(true));
document.getElementById('newBtn').addEventListener('click', () => {
  document.getElementById('composeModal').classList.add('open');
  loadUsers();
});
document.getElementById('composeCancel').addEventListener('click', () => document.getElementById('composeModal').classList.remove('open'));
document.getElementById('composeSend').addEventListener('click', sendNew);

loadList();
setInterval(loadList, 60 * 1000);

// Deep-link: /messages.html?thread=<id> opens that thread directly. Used by the
// inbox "View thread" button for bridged sub-portal messages. openThread fetches
// by id, so it does not depend on the list having rendered yet.
(function(){
  const t = new URLSearchParams(location.search).get('thread');
  if (t) openThread(t);
})();
</script>
