<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="theme-color" content="#060a14">
<title>Receivables · Finance · Ryujin OS</title>
<link rel="icon" href="/assets/logo/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<script src="/assets/auth-guard.js"></script>
<script src="/assets/finance-toolbar.js" defer></script>
<style>
:root{--bg:#060a14;--glass:rgba(20,30,50,0.85);--glass-border:rgba(34,211,238,0.16);--glass-border-hi:rgba(34,211,238,0.35);--text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);--cyan:#22d3ee;--purple:#7c3aed;--green:#4ade80;--gold:#fbbf24;--orange:#fb923c;--red:#f87171;--radius:12px;--sidebar-w:72px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;overflow-x:hidden}
.sidebar{width:var(--sidebar-w);background:rgba(8,12,24,0.98);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;bottom:0;z-index:50}
.sidebar-logo{width:44px;height:44px;margin:18px 0 12px;border-radius:12px;background:url('/assets/logo/logo-glow.jpg') center/cover;box-shadow:0 0 20px rgba(34,211,238,0.3)}
.sidebar-divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;margin:4px 0 8px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid transparent;color:var(--text-dim);text-decoration:none;transition:all 0.25s;position:relative}
.nav-icon:hover{background:rgba(34,211,238,0.06);color:var(--text)}
.nav-icon.active{background:linear-gradient(135deg,rgba(251,191,36,0.12),rgba(34,211,238,0.06));color:var(--gold);border-color:rgba(251,191,36,0.3)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:3px;background:var(--gold);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--gold)}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.main{margin-left:var(--sidebar-w);padding:18px 22px 60px;max-width:1400px}
.hq-header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.hq-title .crumb{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hq-title h1{font-family:'Orbitron',monospace;font-size:1.7em;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,#e0e6f0 20%,var(--gold) 70%,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hq-title .sub{font-size:0.85em;color:var(--text-dim);margin-top:6px}
.btn{font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:8px 16px;border-radius:18px;cursor:pointer;border:1px solid var(--glass-border);background:transparent;color:var(--text-dim);text-decoration:none;display:inline-block;transition:all 0.2s}
.btn:hover{color:var(--text);border-color:var(--glass-border-hi)}
.btn.primary{background:linear-gradient(135deg,var(--gold),var(--cyan));color:#0a0e1a;border:none;box-shadow:0 0 12px rgba(251,191,36,0.3)}

.kpi-rail{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:18px}
.kpi-tile{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
.kpi-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.5}
.kpi-label{font-family:'Orbitron',monospace;font-size:0.6em;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px}
.kpi-value{font-family:'Orbitron',monospace;font-size:1.5em;font-weight:800;color:var(--gold);line-height:1.1}
.kpi-value.cyan{color:var(--cyan)}.kpi-value.red{color:var(--red)}.kpi-value.green{color:var(--green)}

.section-head{display:flex;align-items:baseline;gap:10px;margin:18px 0 10px;font-family:'Orbitron',monospace}
.section-head h2{font-size:0.78em;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.section-head .count-pill{font-size:0.65em;font-family:'Share Tech Mono',monospace;padding:2px 8px;border-radius:10px;background:rgba(251,191,36,0.1);border:1px solid var(--glass-border);color:var(--gold)}

.ar-list{display:flex;flex-direction:column;gap:6px}
.ar-row{display:grid;grid-template-columns:1fr auto auto auto auto;gap:14px;align-items:center;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:12px 14px}
.ar-row.overdue{border-color:rgba(248,113,113,0.4);background:rgba(248,113,113,0.04)}
.ar-info .name{font-weight:600;color:var(--text);font-size:0.95em}
.ar-info .meta{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:0.5px}
.ar-stage{font-family:'Share Tech Mono',monospace;font-size:0.6em;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:8px;background:rgba(34,211,238,0.1);color:var(--cyan);border:1px solid var(--glass-border)}
.ar-amt{font-family:'Orbitron',monospace;font-weight:700;color:var(--gold);font-size:0.95em;white-space:nowrap}
.ar-age{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:var(--text-dim);letter-spacing:0.5px;white-space:nowrap}
.ar-age.cold{color:var(--orange)}.ar-age.dead{color:var(--red)}

.empty-state{text-align:center;padding:30px 16px;color:var(--text-dim);border:1px dashed var(--glass-border);border-radius:var(--radius);font-size:0.85em}
.empty-state .ico{font-size:1.8em;margin-bottom:6px;opacity:0.5}
.skeleton{background:linear-gradient(90deg,var(--glass) 0%,rgba(22,34,58,0.8) 50%,var(--glass) 100%);background-size:200% 100%;animation:sk 1.4s infinite;border:1px solid var(--glass-border);border-radius:var(--radius);height:64px;margin-bottom:6px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);font-size:0.8em;margin-bottom:14px}
.banner.warn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:var(--orange)}

@media(max-width:768px){.main{padding:12px}.hq-title h1{font-size:1.3em}.ar-row{grid-template-columns:1fr auto;gap:10px}.ar-row .ar-stage,.ar-row .ar-age{display:none}}
</style>
</head>
<body>
<aside class="sidebar"><a href="/admin.html" class="sidebar-logo" title="Admin Home"></a><div class="sidebar-divider"></div><nav class="sidebar-nav">
<a href="/admin-overview.html" class="nav-icon" title="Overview"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg></a>
<a href="/marketing.html" class="nav-icon" title="Marketing"><svg viewBox="0 0 24 24"><path d="M3 11l18-9v18l-18-9zM7 13v6"/></svg></a>
<a href="/sales.html" class="nav-icon" title="Sales"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9a4 4 0 100 8h6a4 4 0 110 8H6"/></svg></a>
<a href="/production.html" class="nav-icon" title="Production"><svg viewBox="0 0 24 24"><path d="M2 22V12l10-7 10 7v10M2 12l10 7 10-7M9 22V14h6v8"/></svg></a>
<a href="/service.html" class="nav-icon" title="Service"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg></a>
<a href="/customer.html" class="nav-icon" title="Customer"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/></svg></a>
<a href="/finance.html" class="nav-icon active" title="Finance"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9a4 4 0 100 8h6a4 4 0 110 8H6"/></svg></a>
<a href="/admin.html" class="nav-icon" title="Full Admin"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></a>
</nav></aside>

<main class="main">
  <div class="hq-header">
    <div class="hq-title"><div class="crumb">Finance · Receivables</div><h1>Receivables (AR)</h1><div class="sub">Outstanding deposits + signed-not-paid invoices. Aging buckets identify who needs a nudge.</div></div>
    <a class="btn primary" href="/finance.html">← Finance</a>
  </div>
  <div id="banner-slot"></div>

  <div class="kpi-rail" id="kpiRail">
    <div class="kpi-tile"><div class="kpi-label">Pending Deposits</div><div class="kpi-value" id="kPending">—</div></div>
    <div class="kpi-tile"><div class="kpi-label">Cleared (30d)</div><div class="kpi-value green" id="kCleared">—</div></div>
    <div class="kpi-tile"><div class="kpi-label">Outstanding Total</div><div class="kpi-value" id="kOutstanding">—</div></div>
    <div class="kpi-tile"><div class="kpi-label">Overdue</div><div class="kpi-value red" id="kOverdue">—</div></div>
  </div>

  <div class="section-head"><h2>Outstanding Estimates</h2><span class="count-pill" id="arCount">—</span></div>
  <div class="ar-list" id="arList"><div class="skeleton"></div><div class="skeleton"></div></div>
</main>

<script>
const TENANT = (function(){
  function pick(key){
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return null;
      try { const o = JSON.parse(raw); if (o && o.slug) return o.slug; } catch (e) {}
      if (typeof raw === 'string' && /^[a-z0-9-]{1,80}$/i.test(raw.trim())) return raw.trim();
    } catch (e) {}
    return null;
  }
  return pick('ryujin_tenant') || pick('ry_tenant_cfg') || 'plus-ultra';
})();
function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtMoney(n) { if (n == null || isNaN(n)) return '—'; return '$' + Math.round(n).toLocaleString(); }
function fmtAge(iso) { if (!iso) return { label: '—', cls: '' }; const days = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000); if (days < 7) return { label: days + 'd', cls: '' }; if (days < 30) return { label: days + 'd', cls: 'cold' }; return { label: days + 'd', cls: 'dead' }; }
function showBanner(msg) { document.getElementById('banner-slot').innerHTML = `<div class="banner warn">${escapeHtml(msg)}</div>`; }

async function load() {
  try {
    const [stateR, estsR] = await Promise.all([
      fetch('/api/finance-state', { headers: { 'x-tenant-id': TENANT } }),
      fetch('/api/estimates?limit=300', { headers: { 'x-tenant-id': TENANT, ...window.RyujinAuth.headers() } })
    ]);
    if (stateR.ok) {
      const d = await stateR.json();
      const s = d.stats || {};
      document.getElementById('kPending').textContent = fmtMoney(s.deposits_pending);
      document.getElementById('kCleared').textContent = fmtMoney(s.deposits_cleared_30d);
    }
    if (!estsR.ok) { document.getElementById('arList').innerHTML = `<div class="empty-state">Could not load estimates.</div>`; return; }
    const data = await estsR.json();
    const ests = data.estimates || data.data || [];
    const sellingPrice = (e) => { const tier = (e.selected_package || 'gold').toLowerCase(); const pkg = e.calculated_packages?.[tier] || {}; return pkg.sellingPrice || pkg.total || 0; };
    // Outstanding = deposit_pending OR (closed_won + no fully cleared) — simplest heuristic: deposit_pending + contract_pending + financing_pending
    const outstanding = ests.filter(e => ['deposit_pending','contract_pending','financing_pending','schedule_pending'].includes(e.state || ''));
    let totalOut = 0, totalOverdue = 0;
    for (const e of outstanding) {
      const v = sellingPrice(e);
      totalOut += v;
      if (e.rate_hold_expires_at && new Date(e.rate_hold_expires_at).getTime() < Date.now()) totalOverdue += v;
    }
    document.getElementById('kOutstanding').textContent = fmtMoney(totalOut);
    document.getElementById('kOverdue').textContent = fmtMoney(totalOverdue);
    document.getElementById('arCount').textContent = outstanding.length;

    const el = document.getElementById('arList');
    if (outstanding.length === 0) { el.innerHTML = `<div class="empty-state"><div class="ico">✓</div>No outstanding estimates. AR is clean.</div>`; return; }
    el.innerHTML = outstanding.map(e => {
      const age = fmtAge(e.approved_at || e.updated_at);
      const overdue = e.rate_hold_expires_at && new Date(e.rate_hold_expires_at).getTime() < Date.now();
      return `
        <div class="ar-row ${overdue ? 'overdue' : ''}">
          <div class="ar-info">
            <div class="name">${escapeHtml(e.customer?.full_name || e.customer_name || `est ${e.estimate_number || e.id?.slice(0,8)}`)}</div>
            <div class="meta">est ${escapeHtml(e.estimate_number || e.id?.slice(0,8))}${e.proposal_mode ? ' · ' + escapeHtml(e.proposal_mode) : ''}</div>
          </div>
          <div class="ar-stage">${escapeHtml((e.state || e.status || '—').replace(/_/g,' '))}</div>
          <div class="ar-age ${age.cls}">${age.label} since approval</div>
          <div class="ar-amt">${fmtMoney(sellingPrice(e))}</div>
          <a class="btn" href="/customer-profile.html?id=${e.customer_id || ''}" style="font-size:0.6em">Profile</a>
        </div>`;
    }).join('');
  } catch (e) { showBanner(`Network: ${e.message}`); }
}
load();
</script>
</body>
</html>
