<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060a14">
<title>Ryujin OS — Field</title>
<!-- Hard-kill the LIVE/SANDBOX floating badge on this page regardless of JS load order or cache -->
<style>#ry-mode-badge{display:none !important}</style>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
:root{
  --bg:#060a14;--surface:rgba(14,22,40,0.85);
  --border:rgba(34,211,238,0.08);--border-hi:rgba(34,211,238,0.2);
  --text:#d0daf0;--text-dim:rgba(160,190,230,0.5);
  --cyan:#22d3ee;--blue:#4a9eff;--green:#4ade80;--yellow:#facc15;--red:#f87171;--orange:#fb923c;
  --purple:#7c3aed;--glow:rgba(34,211,238,0.12);
  --radius:12px;--nav-h:62px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:calc(var(--nav-h) + 16px)}

/* ─── Background ─── */
.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-layer video{width:100%;height:100%;object-fit:cover;opacity:0.06}
.bg-layer::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,10,20,0.4) 0%,rgba(6,10,20,0.7) 100%)}
.dragon-watermark{position:fixed;bottom:-10%;right:-8%;width:45vw;max-width:280px;aspect-ratio:1;background:url('/assets/textures/dragon-watermark.jpg') center/contain no-repeat;mix-blend-mode:screen;opacity:0.04;pointer-events:none;z-index:0}

/* ─── Top Bar ─── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;
  background:rgba(6,10,20,0.95);border-bottom:1px solid var(--border)}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.2}
.topbar .brand{display:flex;align-items:center;gap:8px}
.topbar .brand .logo{width:28px;height:28px;border-radius:7px;background:url('/assets/logo/logo-glow.jpg') center/cover;box-shadow:0 0 10px rgba(34,211,238,0.15)}
.topbar .brand .name{font-family:'Orbitron',monospace;font-size:0.7em;font-weight:600;letter-spacing:1.5px;color:var(--cyan)}
.topbar .user-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:rgba(34,211,238,0.06);border:1px solid var(--border);font-size:0.7em;font-weight:600;color:var(--text-dim)}
.topbar .user-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 4px var(--green)}

/* ─── Bottom Nav ─── */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:var(--nav-h);display:flex;
  background:rgba(6,10,20,0.97);border-top:1px solid var(--border)}
.nav::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),transparent);opacity:0.25}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text-dim);transition:color 0.2s;padding:6px 0;position:relative}
.nav-item.active{color:var(--cyan)}
.nav-item.active::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--cyan);border-radius:0 0 2px 2px;box-shadow:0 0 6px var(--cyan)}
.nav-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-item span{font-size:0.58em;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}

/* ─── Content ─── */
.content{position:relative;z-index:1;padding:66px 14px 14px;max-width:500px;margin:0 auto}

/* ─── Glass Panel ─── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,var(--cyan) 30%,var(--purple) 70%,transparent 95%);opacity:0.3}
.panel:active{border-color:var(--border-hi)}
.panel-title{font-family:'Orbitron',monospace;font-size:0.6em;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}

/* ─── Task/Ticket Cards ─── */
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.2s}
.task-card:active{border-color:var(--border-hi)}
.task-card.urgent{border-left:3px solid var(--red)}
.task-card.high{border-left:3px solid var(--orange)}
.task-card.active-task{border-left:3px solid var(--green)}
.task-card .title{font-weight:700;font-size:0.88em;margin-bottom:3px}
.task-card .sub{font-size:0.72em;color:var(--text-dim)}
.task-card .meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px}

/* ─── Badges ─── */
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:0.6em;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
.badge-open{background:rgba(34,211,238,0.1);color:var(--cyan);border:1px solid rgba(34,211,238,0.12)}
.badge-active{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.12)}
.badge-done{background:rgba(255,255,255,0.04);color:var(--text-dim);border:1px solid rgba(255,255,255,0.06)}
.badge-urgent{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.12)}
.badge-high{background:rgba(251,146,60,0.1);color:var(--orange);border:1px solid rgba(251,146,60,0.12)}
.badge-task{background:rgba(74,158,255,0.1);color:var(--blue);border:1px solid rgba(74,158,255,0.12)}
.badge-ticket{background:rgba(124,58,237,0.1);color:var(--purple);border:1px solid rgba(124,58,237,0.12)}

/* ─── Buttons ─── */
.btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-family:inherit;font-weight:700;font-size:0.88em;cursor:pointer;transition:all 0.2s;letter-spacing:0.3px}
.btn-primary{background:linear-gradient(135deg,var(--cyan),#0891b2);color:#000}
.btn-primary:active{transform:scale(0.98)}
.btn-success{background:linear-gradient(135deg,var(--green),#22c55e);color:#000}
.btn-outline{background:rgba(34,211,238,0.04);border:1px solid var(--border);color:var(--text)}
.btn-outline:active{background:rgba(34,211,238,0.08)}

/* ─── Metrics ─── */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.2}
.stat-val{font-family:'Orbitron',monospace;font-size:1.5em;font-weight:700;letter-spacing:-0.5px}
.stat-label{font-size:0.6em;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* ─── Clock ─── */
.clock-panel{text-align:center;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;position:relative;overflow:hidden}
.clock-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3}
.clock-time{font-family:'Orbitron',monospace;font-size:2.6em;font-weight:700;color:var(--cyan);text-shadow:0 0 20px rgba(34,211,238,0.2);letter-spacing:-1px}
.clock-label{font-size:0.78em;color:var(--text-dim);margin-top:4px}

/* ─── Project Detail ─── */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.photo-thumb{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;border:1px solid var(--border)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all 0.2s;color:var(--text-dim);font-size:0.82em;margin-top:10px}
.upload-zone:active{border-color:var(--cyan);background:rgba(34,211,238,0.04)}

/* ─── Checklist ─── */
.check-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(34,211,238,0.04)}
.check-item:last-child{border:none}
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.2s}
.check-box.checked{background:var(--green);border-color:var(--green)}
.check-box.checked::after{content:'✓';color:#000;font-size:0.7em;font-weight:800}
.check-label{font-size:0.85em;padding-top:1px}
.check-label.done{color:var(--text-dim);text-decoration:line-through}

/* ─── Empty State ─── */
.empty{text-align:center;padding:40px 20px;color:var(--text-dim)}
.empty p{font-size:0.88em;margin-top:8px}

/* ─── Detail View ─── */
.detail-back{display:flex;align-items:center;gap:5px;color:var(--text-dim);font-size:0.82em;font-weight:600;cursor:pointer;margin-bottom:14px}
.detail-header h2{font-family:'Orbitron',monospace;font-size:1.1em;font-weight:700;letter-spacing:0.5px}

/* ─── Section ─── */
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;margin-top:14px}
.section-label{font-family:'Orbitron',monospace;font-size:0.55em;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}

/* ─── Toast ─── */
.toast-c{position:fixed;bottom:72px;left:14px;right:14px;z-index:200;display:flex;flex-direction:column-reverse;gap:6px;pointer-events:none}
.toast{padding:10px 14px;border-radius:8px;font-size:0.78em;font-weight:500;pointer-events:auto;box-shadow:0 4px 16px rgba(0,0,0,0.4);animation:toastIn 0.3s ease}
.toast.ok{background:rgba(16,50,16,0.92);color:var(--green);border:1px solid rgba(74,222,128,0.15)}
.toast.err{background:rgba(50,16,16,0.92);color:var(--red);border:1px solid rgba(248,113,113,0.15)}
.toast.info{background:rgba(16,24,50,0.92);color:var(--cyan);border:1px solid rgba(34,211,238,0.15)}
.toast.warn{background:rgba(50,32,8,0.92);color:var(--orange);border:1px solid rgba(251,146,60,0.2)}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ─── Modal ─── */
.modal-bd{position:fixed;inset:0;background:rgba(6,10,20,0.88);backdrop-filter:blur(4px);z-index:300;display:none;align-items:flex-end;padding:0}
.modal-bd.open{display:flex}
.modal{width:100%;max-height:92vh;background:var(--surface);border-top:1px solid var(--border-hi);border-radius:18px 18px 0 0;padding:18px 16px 24px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;position:relative}
.modal::before{content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);width:38px;height:4px;border-radius:2px;background:rgba(160,190,230,0.25)}
.modal h3{font-family:'Orbitron',monospace;font-size:0.88em;font-weight:700;letter-spacing:1.2px;margin-top:6px}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-family:'Orbitron',monospace;font-size:0.56em;font-weight:600;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase}
.fld input[type=text],.fld input[type=date],.fld textarea,.fld select{background:rgba(6,10,20,0.7);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:inherit;font-size:0.9em;outline:none;-webkit-appearance:none;appearance:none}
.fld textarea{min-height:60px;resize:vertical;font-family:inherit}
.fld input:focus,.fld textarea:focus,.fld select:focus{border-color:var(--cyan)}
.priority-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.prio-chip{padding:8px 0;background:rgba(6,10,20,0.7);border:1px solid var(--border);border-radius:7px;font-family:'Orbitron',monospace;font-size:0.58em;font-weight:700;letter-spacing:1.2px;color:var(--text-dim);cursor:pointer;text-align:center;transition:all 0.15s}
.prio-chip[data-p="low"].on{background:rgba(74,158,255,0.15);border-color:var(--blue);color:var(--blue)}
.prio-chip[data-p="medium"].on{background:rgba(34,211,238,0.15);border-color:var(--cyan);color:var(--cyan)}
.prio-chip[data-p="high"].on{background:rgba(251,146,60,0.15);border-color:var(--orange);color:var(--orange)}
.prio-chip[data-p="urgent"].on{background:rgba(248,113,113,0.15);border-color:var(--red);color:var(--red)}

/* ─── Rapid-fire camera ─── */
.cam-overlay{position:fixed;inset:0;z-index:500;background:#000;display:none;flex-direction:column}
.cam-overlay.open{display:flex}
.cam-video-wrap{flex:1;position:relative;overflow:hidden;background:#000}
.cam-video{width:100%;height:100%;object-fit:cover;background:#000}
.cam-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity 0.1s}
.cam-flash.on{opacity:0.65}
.cam-topbar{position:absolute;top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:linear-gradient(180deg,rgba(0,0,0,0.6),transparent);z-index:3}
.cam-close{width:40px;height:40px;border-radius:20px;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;color:#fff;border:none;cursor:pointer;font-size:1.1em;font-weight:700}
.cam-count{color:#fff;font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.5px;font-weight:700;padding:7px 14px;background:rgba(0,0,0,0.55);border-radius:20px;display:flex;align-items:center;gap:6px}
.cam-count .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.cam-controls{padding:16px 14px 22px;background:rgba(0,0,0,0.85);border-top:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;gap:12px}
.cam-strip{display:flex;gap:6px;overflow-x:auto;min-height:56px;padding:2px 0}
.cam-strip::-webkit-scrollbar{display:none}
.cam-thumb{position:relative;width:56px;height:56px;flex-shrink:0;border-radius:8px;overflow:hidden;border:1.5px solid rgba(255,255,255,0.18)}
.cam-thumb img{width:100%;height:100%;object-fit:cover}
.cam-thumb .cam-thumb-status{position:absolute;bottom:2px;right:2px;width:18px;height:18px;border-radius:9px;background:rgba(0,0,0,0.75);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.66em;font-weight:700}
.cam-thumb.pending{border-color:rgba(251,146,60,0.7)}
.cam-thumb.pending .cam-thumb-status{color:var(--orange)}
.cam-thumb.done{border-color:rgba(74,222,128,0.8)}
.cam-thumb.done .cam-thumb-status{color:var(--green)}
.cam-thumb.failed{border-color:rgba(248,113,113,0.8)}
.cam-thumb.failed .cam-thumb-status{color:var(--red)}
.cam-shutter-row{display:flex;align-items:center;justify-content:center;gap:22px}
.cam-shutter{width:74px;height:74px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,0.4);cursor:pointer;transition:transform 0.08s, box-shadow 0.08s;box-shadow:0 0 0 2px rgba(0,0,0,0.6) inset}
.cam-shutter:active{transform:scale(0.92);box-shadow:0 0 0 4px rgba(34,211,238,0.6) inset}
.cam-shutter:disabled{opacity:0.4}
.cam-done-btn{position:absolute;right:14px;padding:10px 16px;background:rgba(34,211,238,0.18);border:1px solid rgba(34,211,238,0.5);border-radius:10px;color:var(--cyan);font-family:'Orbitron',monospace;font-weight:700;font-size:0.7em;letter-spacing:1.3px;cursor:pointer}
.cam-hint{text-align:center;color:rgba(255,255,255,0.45);font-size:0.68em;letter-spacing:1px;font-family:'Share Tech Mono',monospace}

/* ─── View toggle (MINE / BOARD) ─── */
.view-toggle{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:12px;background:rgba(6,10,20,0.7);border:1px solid var(--border);border-radius:10px;overflow:hidden;padding:3px}
.vt-btn{padding:8px;text-align:center;font-family:'Orbitron',monospace;font-size:0.64em;font-weight:700;letter-spacing:1.5px;color:var(--text-dim);cursor:pointer;border-radius:7px;transition:all 0.15s}
.vt-btn.on{background:rgba(34,211,238,0.12);color:var(--cyan);box-shadow:inset 0 0 0 1px rgba(34,211,238,0.25)}

/* ─── Board columns (status groups) ─── */
.board-col{margin-bottom:14px}
.board-col-head{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:rgba(6,10,20,0.5);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.board-col-head .lbl{font-family:'Orbitron',monospace;font-size:0.62em;font-weight:700;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase}
.board-col.open .board-col-head{border-left:3px solid var(--cyan)}
.board-col.active .board-col-head{border-left:3px solid var(--green)}
.board-col.done .board-col-head{border-left:3px solid var(--text-dim);opacity:0.8}
.assignee-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:10px;font-size:0.62em;font-weight:700;letter-spacing:0.3px;background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.18)}
.assignee-pill.unassigned{background:rgba(251,146,60,0.1);color:var(--orange);border-color:rgba(251,146,60,0.2)}

/* ─── New-Assignment button ─── */
.new-assign-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;margin-bottom:10px;background:linear-gradient(135deg,rgba(34,211,238,0.15),rgba(34,211,238,0.05));border:1px solid rgba(34,211,238,0.25);border-radius:10px;font-weight:700;font-size:0.88em;color:var(--cyan);cursor:pointer;letter-spacing:0.3px}
.new-assign-btn:active{transform:scale(0.98)}
.new-assign-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}

/* ─── User Selector ─── */
.user-select-card{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
.user-select-card:active{border-color:var(--cyan);background:rgba(34,211,238,0.04)}
.user-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.9em;flex-shrink:0}
.user-avatar.owner{background:rgba(34,211,238,0.15);color:var(--cyan)}
.user-avatar.estimator{background:rgba(74,158,255,0.15);color:var(--blue)}
.user-avatar.crew{background:rgba(74,222,128,0.15);color:var(--green)}
.user-avatar.field-ops{background:rgba(251,146,60,0.15);color:var(--orange)}
.user-info .name{font-weight:700;font-size:0.9em}
.user-info .role-label{font-size:0.68em;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
</style>
</head>
<body>

<!-- Background -->
<div class="bg-layer">
  <video muted loop playsinline preload="none" id="bgVid"><source data-src="/assets/videos/ocean-caustics-bg.mp4" type="video/mp4"></video>
</div>
<div class="dragon-watermark"></div>

<!-- Top Bar -->
<div class="topbar">
  <div class="brand">
    <div class="logo"></div>
    <span class="name">RYUJIN OS</span>
  </div>
  <div class="user-pill" id="userPill" onclick="switchUser()" style="cursor:pointer">
    <span class="dot"></span>
    <span id="userName">Loading...</span>
  </div>
</div>

<!-- User Selector (shown before content loads) -->
<div class="content" id="userSelect" style="display:none;padding-top:80px">
  <div style="text-align:center;margin-bottom:20px">
    <div class="logo" style="width:48px;height:48px;border-radius:12px;background:url('/assets/logo/logo-glow.jpg') center/cover;margin:0 auto 12px;box-shadow:0 0 20px rgba(34,211,238,0.2)"></div>
    <div style="font-family:'Orbitron',monospace;font-size:0.9em;font-weight:600;letter-spacing:2px;color:var(--cyan)">RYUJIN OS</div>

<script>
// ═══════════════════════════════════════════
// RYUJIN OS — Field Crew PWA v2
// Tasks (assigned) | Tickets (grab) | Checklists (steps)
// ═══════════════════════════════════════════

const API = window.location.origin + '/api';
const TENANT = 'plus-ultra';
let currentUser = null;
let currentTab = 'home';

async function api(path, opts = {}) {
  const sep = path.includes('?') ? '&' : '?';
  try {
    const resp = await fetch(`${API}${path}${sep}tenant=${TENANT}`, {...opts, headers:{'Content-Type':'application/json',...opts.headers}});
    return resp.json();
  } catch(e) { return {error:'Connection failed'}; }
}

function esc(s) { return (s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function toast(msg,type='info') {
  let c=document.getElementById('toastC');
  if(!c){c=document.createElement('div');c.id='toastC';c.className='toast-c';document.body.appendChild(c);}
  const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;c.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  render();
}

function render() {
  const c = document.getElementById('content');
  switch(currentTab) {
    case 'home': return renderHome(c);
    case 'tasks': return renderTasks(c);
    case 'projects': return renderProjects(c);
    case 'clock': return renderClock(c);
  }
}

// ═══ HOME — Daily Overview ═══
async function renderHome(c) {
  const [ticketData, activeData, projData] = await Promise.all([
    api(`/tickets?status=open${currentUser?.id ? '&assigned_to='+currentUser.id : ''}`),
    api(`/tickets?status=active${currentUser?.id ? '&assigned_to='+currentUser.id : ''}`),
    api('/projects')
  ]);
  const allTasks = [...(activeData.tickets||[]),...(ticketData.tickets||[])];
  const projects = (projData.projects||[]).filter(p => p.status === 'active' || p.status === 'not_started');
  const now = new Date();
  const greeting = now.getHours() < 12 ? 'Good morning' : now.getHours() < 17 ? 'Good afternoon' : 'Good evening';
  const urgent = allTasks.filter(t => t.priority === 'urgent').length;
  const active = allTasks.filter(t => t.status === 'active').length;

  let html = '';

  // Greeting
  html += `<div style="margin-bottom:14px">
    <div style="font-family:'Orbitron',monospace;font-size:1.1em;font-weight:700;letter-spacing:0.5px">${greeting}, ${esc(currentUser?.name||'Crew')}</div>
    <div style="font-size:0.78em;color:var(--text-dim)">${now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
  </div>`;

  // Quick new assignment
  html += `<button class="new-assign-btn" onclick="openAssignModal()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    NEW ASSIGNMENT
  </button>`;

  // Stats
  html += `<div class="stats-row">
    <div class="stat-card"><div class="stat-val" style="color:${active>0?'var(--green)':'var(--cyan)'}">${active}</div><div class="stat-label">In Progress</div></div>
    <div class="stat-card"><div class="stat-val" style="color:${urgent>0?'var(--red)':'var(--cyan)'}">${allTasks.length}</div><div class="stat-label">Open</div></div>
  </div>`;

  // Active projects
  if (projects.length > 0) {
    html += `<div class="section-head"><div class="section-label">Active Jobs</div></div>`;
    for (const p of projects.slice(0,3)) {
      html += `<div class="task-card active-task" onclick="showProject('${p.id}')">
        <div class="title">${esc(p.name||p.address||'Job')}</div>
        <div class="sub">${esc(p.address||'')}${p.city?', '+esc(p.city):''}</div>
        <div class="meta"><span class="badge badge-active">${(p.status||'').replace('_',' ')}</span></div>
      </div>`;
    }
  }

  // Today's tasks
  html += `<div class="section-head"><div class="section-label">My Tasks</div><div class="section-label" style="color:var(--cyan)">${allTasks.length}</div></div>`;
  if (allTasks.length === 0) {
    html += `<div class="empty"><div style="font-size:1.5em;opacity:0.2;margin-bottom:8px">🐉</div><p>All clear. No open tasks.</p></div>`;
  } else {
    for (const t of allTasks) {
      const pClass = t.priority==='urgent'?'urgent':t.priority==='high'?'high':t.status==='active'?'active-task':'';
      html += `<div class="task-card ${pClass}" onclick="showTask('${t.id}')">
        <div class="title">${esc(t.title)}</div>
        <div class="sub">${esc(t.project?.name||t.project?.address||'')}</div>
        <div class="meta">
          <span class="badge badge-${t.status==='active'?'active':'open'}">${t.status}</span>
          ${t.priority!=='medium'?`<span class="badge badge-${t.priority==='urgent'?'urgent':'high'}">${t.priority}</span>`:''}
          ${t.due_date?`<span class="sub">${new Date(t.due_date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</span>`:''}
        </div>
      </div>`;
    }
  }
  c.innerHTML = html;
}

// ═══ TASKS — MINE view (assigned to me + grabbable) or BOARD view (everyone) ═══
let tasksView = 'mine'; // 'mine' | 'board'
async function renderTasks(c) {
  let html = '';

  // New assignment button
  html += `<button class="new-assign-btn" onclick="openAssignModal()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    NEW ASSIGNMENT
  </button>`;

  // View toggle
  html += `<div class="view-toggle">
    <div class="vt-btn ${tasksView==='mine'?'on':''}" onclick="setTasksView('mine')">MINE</div>
    <div class="vt-btn ${tasksView==='board'?'on':''}" onclick="setTasksView('board')">BOARD</div>
  </div>`;

  c.innerHTML = html + '<div id="tasksInner"><div class="empty">Loading…</div></div>';

  if (tasksView === 'mine') {
    await renderMineView();
  } else {
    await renderBoardView();
  }
}

function setTasksView(v) {
  tasksView = v;
  renderTasks(document.getElementById('content'));
}

async function renderMineView() {
  const inner = document.getElementById('tasksInner');
  const [myData, myActive, allOpen] = await Promise.all([
    api(`/tickets?status=open${currentUser?.id?'&assigned_to='+currentUser.id:''}`),
    api(`/tickets?status=active${currentUser?.id?'&assigned_to='+currentUser.id:''}`),
    api('/tickets?status=open')
  ]);
  const myTasks = [...(myActive.tickets||[]),...(myData.tickets||[])];
  const myIds = new Set(myTasks.map(t=>t.id));
  const availableTickets = (allOpen.tickets||[]).filter(t => !myIds.has(t.id));

  let html = '';
  html += `<div class="section-head"><div class="section-label">My Tasks</div><span class="badge badge-task">${myTasks.length}</span></div>`;
  if (myTasks.length === 0) {
    html += `<div class="panel" style="text-align:center;padding:20px;color:var(--text-dim);font-size:0.85em">No tasks assigned to you</div>`;
  }
  for (const t of myTasks) {
    const pClass = t.priority==='urgent'?'urgent':t.priority==='high'?'high':t.status==='active'?'active-task':'';
    html += `<div class="task-card ${pClass}" onclick="showTask('${t.id}')">
      <div class="title">${esc(t.title)}</div>
      <div class="sub">${esc(t.project?.name||t.project?.address||'')}</div>
      <div class="meta">
        <span class="badge badge-${t.status==='active'?'active':'open'}">${t.status}</span>
        ${t.priority!=='medium'?`<span class="badge badge-${t.priority==='urgent'?'urgent':'high'}">${t.priority}</span>`:''}
      </div>
    </div>`;
  }

  if (availableTickets.length > 0) {
    html += `<div class="section-head" style="margin-top:16px"><div class="section-label">Available Tickets</div><span class="badge badge-ticket">${availableTickets.length}</span></div>`;
    html += `<div style="font-size:0.72em;color:var(--text-dim);margin-bottom:8px">Tap to claim and start working</div>`;
    for (const t of availableTickets) {
      html += `<div class="task-card" onclick="showTask('${t.id}')">
        <div class="title">${esc(t.title)}</div>
        <div class="sub">${esc(t.project?.name||'')} ${t.assigned_user?'— '+esc(t.assigned_user.name):''}</div>
        <div class="meta">
          <span class="badge badge-ticket">ticket</span>
          ${t.priority!=='medium'?`<span class="badge badge-${t.priority==='urgent'?'urgent':'high'}">${t.priority}</span>`:''}
        </div>
      </div>`;
    }
  }
  inner.innerHTML = html;
}

async function renderBoardView() {
  const inner = document.getElementById('tasksInner');
  const [openD, activeD, doneD] = await Promise.all([
    api('/tickets?status=open&limit=100'),
    api('/tickets?status=active&limit=100'),
    api('/tickets?status=done&limit=30'),
  ]);
  const open = openD.tickets || [];
  const active = activeD.tickets || [];
  const done = doneD.tickets || [];

  const cardHtml = (t) => {
    const pClass = t.priority==='urgent'?'urgent':t.priority==='high'?'high':t.status==='active'?'active-task':'';
    const who = t.assigned_user?.name ? `<span class="assignee-pill">${esc(t.assigned_user.name)}</span>` : `<span class="assignee-pill unassigned">unassigned</span>`;
    return `<div class="task-card ${pClass}" onclick="showTask('${t.id}')">
      <div class="title">${esc(t.title)}</div>
      <div class="sub">${esc(t.project?.name||t.project?.address||'')}</div>
      <div class="meta">
        ${who}
        ${t.priority!=='medium'?`<span class="badge badge-${t.priority==='urgent'?'urgent':t.priority==='high'?'high':'open'}">${t.priority}</span>`:''}
        ${t.due_date?`<span class="sub" style="font-size:0.68em">${new Date(t.due_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>`:''}
      </div>
    </div>`;
  };

  let html = '';
  html += `<div class="board-col active">
    <div class="board-col-head"><span class="lbl">IN PROGRESS</span><span class="badge badge-active">${active.length}</span></div>
    ${active.length ? active.map(cardHtml).join('') : `<div style="font-size:0.78em;color:var(--text-dim);padding:8px 4px">Nothing in progress</div>`}
  </div>`;

  html += `<div class="board-col open">
    <div class="board-col-head"><span class="lbl">OPEN</span><span class="badge badge-open">${open.length}</span></div>
    ${open.length ? open.map(cardHtml).join('') : `<div style="font-size:0.78em;color:var(--text-dim);padding:8px 4px">No open tickets</div>`}
  </div>`;

  html += `<div class="board-col done">
    <div class="board-col-head"><span class="lbl">RECENTLY DONE</span><span class="badge badge-done">${done.length}</span></div>
    ${done.length ? done.slice(0,10).map(cardHtml).join('') : `<div style="font-size:0.78em;color:var(--text-dim);padding:8px 4px">No completed tickets yet</div>`}
  </div>`;

  inner.innerHTML = html;
}

// ═══ Checklist templates — auto-pick by task title ═══
const CHECKLIST_TEMPLATES = {
  install: [
    { id:'before',    label:'Before photos (full roof, all sides)',                    photoReq:true },
    { id:'safety',    label:'Safety check-in (harness, ladders, fall protection)',     photoReq:true },
    { id:'damages',   label:'Existing damages documented',                             photoReq:true },
    { id:'deck',      label:'Deck inspection (rot, nails, sheathing sound)',           photoReq:true },
    { id:'dryin',     label:'Drying-in inspection (ice & water, underlayment)',        photoReq:true },
    { id:'nails',     label:'Shingle nail placement (line, 4-6 nails/shingle)',        photoReq:true },
    { id:'stagger',   label:'Stagger (offset pattern correct)',                        photoReq:true },
    { id:'flashing',  label:'Flashings (step, counter, valleys, pipes)',               photoReq:true },
    { id:'vent',      label:'Ventilation (ridge vent, intake, baffles)',               photoReq:true },
    { id:'cleanup',   label:'Final cleanup (magnet sweep, debris gone)',               photoReq:true }
  ],
  repair: [
    { id:'assess',    label:'Damage assessed — before photos',                         photoReq:true },
    { id:'materials', label:'Materials matched (color / profile)',                     photoReq:false },
    { id:'repair',    label:'Repair complete — after photo',                           photoReq:true },
    { id:'seal',      label:'Sealed + flashed',                                        photoReq:true },
    { id:'cleanup',   label:'Site cleaned',                                            photoReq:false }
  ],
  cleanup: [
    { id:'debris',    label:'Debris bagged + dumpster loaded',                         photoReq:true },
    { id:'magnet',    label:'Magnetic sweep completed',                                photoReq:true },
    { id:'walk',      label:'Walkthrough with customer',                               photoReq:false },
    { id:'final',     label:'Final drive-by photos',                                   photoReq:true }
  ],
  inspect: [
    { id:'arrive',    label:'Arrived on site',                                         photoReq:false },
    { id:'measure',   label:'Measurements (SQ, pitch, complexity)',                    photoReq:true },
    { id:'damage',    label:'Damage photos + notes',                                   photoReq:true },
    { id:'report',    label:'Report sent to estimator',                                photoReq:false }
  ],
  caulk: [
    { id:'clean',     label:'Surfaces cleaned + primed',                               photoReq:false },
    { id:'apply',     label:'Caulk applied — smooth bead',                             photoReq:true },
    { id:'tool',      label:'Tooled + neat',                                           photoReq:true }
  ],
  doors: [
    { id:'map',       label:'Area mapped — start addr',                                photoReq:false },
    { id:'doors',     label:'Doors knocked',                                           photoReq:false },
    { id:'leads',     label:'Leads logged in Ryujin',                                  photoReq:false },
    { id:'end',       label:'End addr + quit time',                                    photoReq:false }
  ],
  default: [
    { id:'start',     label:'On site — task started',                                  photoReq:false },
    { id:'progress',  label:'Progress photo for records',                              photoReq:true },
    { id:'done',      label:'Task complete',                                           photoReq:false }
  ]
};

function pickTemplate(title) {
  const t = (title || '').toLowerCase();
  if (/install|reroof|tear[-\s]?off|shingle/.test(t)) return 'install';
  if (/caulk|mansard|seal/.test(t)) return 'caulk';
  if (/repair|leak|fix|patch/.test(t)) return 'repair';
  if (/cleanup|debris|magnet|sweep/.test(t)) return 'cleanup';
  if (/inspect|measure|assess|eagleview|walkthrough/.test(t)) return 'inspect';
  if (/canvass|door|lead/.test(t)) return 'doors';
  return 'default';
}

// Checklist state lives on the ticket row in Supabase (tickets.checklist_state JSONB)
// — we mirror to localStorage for instant render + offline tolerance.
// `currentTaskChecklist` is hydrated from the latest api/tickets?id= payload.
let currentTaskChecklist = null;
function loadChecklist(taskId) {
  if (currentTaskChecklist) return currentTaskChecklist;
  try { return JSON.parse(localStorage.getItem('ryujin_checklist_' + taskId) || '{}'); }
  catch(e){ return {}; }
}
function saveChecklist(taskId, state) {
  currentTaskChecklist = state;
  try { localStorage.setItem('ryujin_checklist_' + taskId, JSON.stringify(state)); } catch(e){}
  // Fire-and-forget sync to Supabase — offline failures are non-fatal; localStorage still wins locally
  api('/tickets', {
    method: 'PUT',
    body: JSON.stringify({ id: taskId, checklist_state: state })
  }).catch(() => {});
}

function renderChecklist(task, templateKey) {
  const items = CHECKLIST_TEMPLATES[templateKey] || CHECKLIST_TEMPLATES.default;
  const state = loadChecklist(task.id);
  const done = items.filter(i => state[i.id]?.done).length;
  const blocking = items.filter(i => i.photoReq && !state[i.id]?.photoUrl).length;

  const rows = items.map(i => {
    const s = state[i.id] || {};
    const hasPhoto = !!s.photoUrl;
    const canCheck = !i.photoReq || hasPhoto;
    return `<div class="check-item">
      <div class="check-box ${s.done?'checked':''}" onclick="toggleCheckItem('${task.id}','${i.id}',${canCheck})"></div>
      <div style="flex:1">
        <div class="check-label ${s.done?'done':''}">${esc(i.label)}</div>
        ${i.photoReq ? `<div style="display:flex;gap:8px;margin-top:6px;align-items:center">
          ${hasPhoto
            ? `<img src="${esc(s.photoUrl)}" style="width:48px;height:48px;border-radius:6px;object-fit:cover;border:1px solid var(--border)" onclick="document.getElementById('photoFor_${i.id}').click()"><span style="font-size:0.7em;color:var(--green)">Photo ✓ — tap to retake</span>`
            : `<button class="btn btn-primary" style="padding:7px 12px;font-size:0.74em;width:auto;background:linear-gradient(135deg,var(--cyan),#0891b2);color:#000" onclick="document.getElementById('photoFor_${i.id}').click()">📸 Take Photo</button>`
          }
          <input type="file" id="photoFor_${i.id}" accept="image/*" capture="environment" style="display:none" onchange="uploadChecklistPhoto('${task.id}','${i.id}','${task.project?.id||''}',this.files)">
        </div>` : ''}
      </div>
    </div>`;
  }).join('');

  return `<div class="panel" style="margin-top:14px">
    <div class="panel-title">Checklist · ${done}/${items.length} · ${templateKey}</div>
    ${rows}
    ${blocking ? `<div style="font-size:0.72em;color:var(--orange);margin-top:10px">${blocking} step${blocking>1?'s':''} need photo before check</div>` : ''}
  </div>`;
}

function toggleCheckItem(taskId, itemId, canCheck) {
  if (!canCheck) { toast('Photo required first','warn'); return; }
  const state = loadChecklist(taskId);
  state[itemId] = { ...(state[itemId]||{}), done: !state[itemId]?.done };
  saveChecklist(taskId, state);
  showTask(taskId);
}

async function uploadChecklistPhoto(taskId, itemId, projectId, fileList) {
  if (!fileList || !fileList.length) return;
  const f = fileList[0];
  toast('Uploading photo...','info');
  // Store data URL locally for instant preview (survives offline)
  const reader = new FileReader();
  reader.onload = async (e) => {
    const dataUrl = e.target.result;
    const state = loadChecklist(taskId);
    state[itemId] = { ...(state[itemId]||{}), photoUrl: dataUrl };
    saveChecklist(taskId, state);
    showTask(taskId);
    // Fire-and-forget upload to /api/files if we have a project
    if (projectId) {
      try {
        const form = new FormData();
        form.append('project_id', projectId);
        form.append('uploaded_by', currentUser?.id || '');
        form.append('category', 'checklist');
        form.append('caption', 'checklist:' + itemId);
        form.append('files', f);
        await fetch(API + '/files?tenant=' + TENANT, { method: 'POST', body: form });
      } catch(e) { /* offline — local copy remains */ }
    }
  };
  reader.readAsDataURL(f);
}

// ═══ RAPID-FIRE CAMERA ═══
// Custom viewfinder via getUserMedia. Shutter captures a canvas frame,
// downscales to 1920px/JPEG 0.85 (~400KB vs 5MB native) and fires upload
// in the background (max 3 parallel). Shutter is re-enabled immediately
// so crew can tap-tap-tap without waiting for previous upload.
let camStream = null;
let camProjectId = null;
let camCount = 0;
let uploadInFlight = 0;
const MAX_PARALLEL_UPLOADS = 3;
const uploadQueue = [];
let camPendingCount = 0;

async function openCamera(projectId) {
  camProjectId = projectId;
  camCount = 0;
  document.getElementById('camStrip').innerHTML = '';
  document.getElementById('camCount').textContent = '0 TAKEN';
  const overlay = document.getElementById('camOverlay');
  overlay.classList.add('open');

  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1920 },
        height: { ideal: 1080 },
      },
      audio: false,
    });
    const vid = document.getElementById('camVideo');
    vid.srcObject = camStream;
    await vid.play().catch(() => {});
  } catch (e) {
    // Permission denied or unsupported — fall back to native picker
    closeCamera();
    toast('Camera access blocked · using device picker', 'warn');
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'image/*'; inp.capture = 'environment';
    inp.onchange = () => handlePhotoUpload(projectId, inp.files);
    inp.click();
  }
}

function closeCamera() {
  if (camStream) {
    try { camStream.getTracks().forEach(t => t.stop()); } catch(e){}
    camStream = null;
  }
  document.getElementById('camOverlay').classList.remove('open');
  // Only refresh the project view if we actually took photos AND they're done uploading
  if (camCount > 0 && camProjectId) {
    // Wait for in-flight uploads to settle, then refresh once
    const wait = () => {
      if (uploadInFlight === 0 && uploadQueue.length === 0) {
        showProject(camProjectId);
      } else {
        setTimeout(wait, 400);
      }
    };
    wait();
  }
}

function flashCamera() {
  const f = document.getElementById('camFlash');
  f.classList.add('on');
  setTimeout(() => f.classList.remove('on'), 120);
}

function captureFrame() {
  const vid = document.getElementById('camVideo');
  if (!vid.videoWidth) return; // stream not ready yet

  const canvas = document.createElement('canvas');
  const maxEdge = 1920;
  let w = vid.videoWidth, h = vid.videoHeight;
  if (Math.max(w, h) > maxEdge) {
    const scale = maxEdge / Math.max(w, h);
    w = Math.round(w * scale); h = Math.round(h * scale);
  }
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(vid, 0, 0, w, h);

  flashCamera(); // instant visual feedback — shutter stays responsive

  canvas.toBlob((blob) => {
    if (!blob) return;
    camCount++;
    document.getElementById('camCount').textContent = camCount + ' TAKEN';
    const thumbUrl = URL.createObjectURL(blob);
    const thumb = addThumbnail(thumbUrl);
    queueUpload(blob, thumb);
  }, 'image/jpeg', 0.85);
}

function addThumbnail(url) {
  const strip = document.getElementById('camStrip');
  const t = document.createElement('div');
  t.className = 'cam-thumb pending';
  t.innerHTML = `<img src="${url}"><div class="cam-thumb-status">…</div>`;
  strip.insertBefore(t, strip.firstChild);
  strip.scrollLeft = 0;
  return t;
}

function queueUpload(blob, thumb) {
  if (uploadInFlight < MAX_PARALLEL_UPLOADS) {
    startUpload(blob, thumb);
  } else {
    uploadQueue.push({ blob, thumb });
  }
}

async function startUpload(blob, thumb) {
  uploadInFlight++;
  const form = new FormData();
  form.append('project_id', camProjectId);
  form.append('uploaded_by', currentUser?.id || '');
  form.append('category', 'general');
  const fname = `photo-${Date.now()}-${Math.random().toString(36).slice(2, 6)}.jpg`;
  form.append('files', blob, fname);
  try {
    const r = await fetch(API + '/files?tenant=' + TENANT, { method: 'POST', body: form });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    thumb.classList.remove('pending'); thumb.classList.add('done');
    thumb.querySelector('.cam-thumb-status').textContent = '✓';
  } catch (e) {
    thumb.classList.remove('pending'); thumb.classList.add('failed');
    thumb.querySelector('.cam-thumb-status').textContent = '✗';
  } finally {
    uploadInFlight--;
    const next = uploadQueue.shift();
    if (next) startUpload(next.blob, next.thumb);
  }
}

// Wire shutter (once — overlay is persistent in DOM)
document.addEventListener('DOMContentLoaded', () => {
  const sh = document.getElementById('camShutter');
  if (sh && !sh._wired) {
    sh._wired = true;
    sh.addEventListener('click', captureFrame);
  }
});
// Also wire immediately in case DOM is already parsed by the time this runs
(function wireShutterNow(){
  const sh = document.getElementById('camShutter');
  if (sh && !sh._wired) {
    sh._wired = true;
    sh.addEventListener('click', captureFrame);
  }
})();

async function showTask(id) {
  const c = document.getElementById('content');
  const t = await api(`/tickets?id=${id}`);
  const tmpl = pickTemplate(t.title);
  // Hydrate the in-memory checklist state from the ticket row (DB wins over local mirror
  // when server returned something non-empty). Falls back to localStorage when offline.
  if (t.checklist_state && typeof t.checklist_state === 'object' && Object.keys(t.checklist_state).length) {
    currentTaskChecklist = t.checklist_state;
    try { localStorage.setItem('ryujin_checklist_' + t.id, JSON.stringify(t.checklist_state)); } catch(e){}
  } else {
    currentTaskChecklist = null;
  }
  const state = loadChecklist(t.id);
  const items = CHECKLIST_TEMPLATES[tmpl] || CHECKLIST_TEMPLATES.default;
  const allDone = items.every(i => state[i.id]?.done);

  c.innerHTML = `
    <div class="detail-back" onclick="render()">← Back</div>
    <div class="detail-header">
      <h2>${esc(t.title)}</h2>
      <div style="display:flex;gap:6px;margin-top:6px">
        <span class="badge badge-${t.status==='active'?'active':t.status==='done'?'done':'open'}">${t.status}</span>
        ${t.priority!=='medium'?`<span class="badge badge-${t.priority==='urgent'?'urgent':'high'}">${t.priority}</span>`:''}
      </div>
      <div style="display:flex;gap:10px;margin-top:8px;font-size:0.78em;color:var(--text-dim);flex-wrap:wrap">
        ${t.due_date?`<span>Due: ${new Date(t.due_date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</span>`:''}
        ${t.project?.address?`<span>${esc(t.project.address)}</span>`:''}
        ${t.assigned_user?`<span>→ ${esc(t.assigned_user.name)}</span>`:''}
      </div>
    </div>
    ${t.description?`<div class="panel" style="margin-top:14px"><div class="panel-title">Details</div><div style="font-size:0.88em;line-height:1.7;color:rgba(255,255,255,0.75)">${esc(t.description)}</div></div>`:''}
    ${renderChecklist(t, tmpl)}
    <div style="display:flex;gap:8px;margin-top:16px">
      ${t.status==='open'?`<button class="btn btn-primary" style="flex:1" onclick="taskAction('${t.id}','acknowledge')">Start Task</button>`:''}
      ${t.status==='active'?`<button class="btn ${allDone?'btn-success':'btn-outline'}" style="flex:1" onclick="taskAction('${t.id}','complete',${allDone})">${allDone?'Complete':'Finish Checklist First'}</button>`:''}
      <button class="btn btn-outline" style="flex:1" onclick="render()">Back</button>
    </div>
  `;
}

async function taskAction(id, action, allowed) {
  if (action === 'complete' && allowed === false) {
    toast('Finish checklist first','warn');
    return;
  }
  await api('/tickets',{method:'PUT',body:JSON.stringify({id,action})});
  toast(action==='complete'?'Task completed!':'Task started','ok');
  render();
}

let allProjectsCache = null;
async function openAssignModal() {
  const mdl = document.getElementById('assignModal');
  // Populate users (exclude customers/clients; keep only staff)
  const uSel = document.getElementById('aAssignee');
  uSel.innerHTML = '<option value="">— Unassigned (anyone can grab) —</option>'
    + [...allUsers]
      .sort((a,b) => a.name.localeCompare(b.name))
      .map(u => `<option value="${u.id}" ${u.id===currentUser?.id?'selected':''}>${esc(u.name)}</option>`)
      .join('');

  // Populate projects (cached after first fetch)
  const pSel = document.getElementById('aProject');
  pSel.innerHTML = '<option value="">— None —</option>';
  if (!allProjectsCache) {
    try {
      const data = await api('/projects');
      allProjectsCache = (data.projects || []).filter(p => p.status !== 'archived');
    } catch(e) { allProjectsCache = []; }
  }
  for (const p of allProjectsCache) {
    pSel.innerHTML += `<option value="${p.id}">${esc(p.name || p.address || 'Project')}</option>`;
  }

  // Reset form
  document.getElementById('aTitle').value = '';
  document.getElementById('aDue').value = '';
  document.getElementById('aDesc').value = '';
  document.querySelectorAll('#aPriority .prio-chip').forEach(c => c.classList.toggle('on', c.dataset.p === 'medium'));

  mdl.classList.add('open');
  setTimeout(() => document.getElementById('aTitle').focus(), 60);
}

function closeAssignModal() {
  document.getElementById('assignModal').classList.remove('open');
}

// Priority chip toggles
document.addEventListener('click', (e) => {
  const chip = e.target.closest('#aPriority .prio-chip');
  if (!chip) return;
  document.querySelectorAll('#aPriority .prio-chip').forEach(c => c.classList.remove('on'));
  chip.classList.add('on');
});

// Backdrop tap closes
document.addEventListener('click', (e) => {
  if (e.target.id === 'assignModal') closeAssignModal();
});

async function createAssignment() {
  const title = document.getElementById('aTitle').value.trim();
  if (!title) { toast('Title required', 'warn'); return; }

  const assignee = document.getElementById('aAssignee').value || null;
  const project = document.getElementById('aProject').value || null;
  const priority = document.querySelector('#aPriority .prio-chip.on')?.dataset.p || 'medium';
  const due = document.getElementById('aDue').value || null;
  const description = document.getElementById('aDesc').value.trim() || null;

  const btn = document.getElementById('aCreateBtn');
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = 'Creating…';

  const res = await api('/tickets', {
    method: 'POST',
    body: JSON.stringify({
      title, description, priority,
      assigned_to: assignee,
      project_id: project,
      due_date: due,
    }),
  });

  btn.disabled = false;
  btn.textContent = orig;

  if (res?.error) {
    toast('Error · ' + res.error, 'err');
    return;
  }
  toast('Assignment created', 'ok');
  closeAssignModal();
  render();
}

// ═══ PROJECTS ═══
async function renderProjects(c) {
  const data = await api('/projects');
  const projects = data.projects || [];
  let html = `<div class="section-head"><div class="section-label">Projects</div><span class="badge badge-open">${projects.length}</span></div>`;

  if (projects.length === 0) {
    html += `<div class="empty"><div style="font-size:1.5em;opacity:0.2;margin-bottom:8px">📋</div><p>No projects yet.</p></div>`;
  } else {
    for (const p of projects) {
      const sc = {not_started:'open',active:'active',punch_list:'urgent',complete:'done'};
      html += `<div class="task-card ${p.status==='active'?'active-task':''}" onclick="showProject('${p.id}')">
        <div class="title">${esc(p.name||p.address||'Project')}</div>
        <div class="sub">${esc(p.address||'')}${p.city?', '+esc(p.city):''}</div>
        <div class="meta">
          <span class="badge badge-${sc[p.status]||'open'}">${(p.status||'').replace('_',' ')}</span>
          ${p.customer?.full_name?`<span class="sub">${esc(p.customer.full_name)}</span>`:''}
        </div>
      </div>`;
    }
  }
  c.innerHTML = html;
}

async function showProject(id) {
  const c = document.getElementById('content');
  const p = await api(`/projects?id=${id}`);
  const files = p.files || [];
  const photos = files.filter(f => f.mime_type && f.mime_type.startsWith('image/'));
  const tickets = p.tickets || [];

  let html = `
    <div class="detail-back" onclick="switchTab('projects')">← Projects</div>
    <div class="detail-header">
      <h2>${esc(p.name||p.address||'Project')}</h2>
      <div style="font-size:0.78em;color:var(--text-dim);margin-top:4px">${esc(p.address||'')}${p.city?', '+esc(p.city):''}</div>
    </div>`;

  // Photos
  html += `<div class="section-head"><div class="section-label">Photos (${photos.length})</div></div>
    <div class="photo-grid">
      ${photos.map(f => `<div class="photo-thumb"><img src="${esc(f.url)}" alt="${esc(f.caption||'')}" loading="lazy"></div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:8px;margin-top:10px">
      <button class="btn btn-primary" style="padding:14px;font-size:0.9em" onclick="openCamera('${id}')">📸 Take Photos</button>
      <button class="btn btn-outline" style="padding:14px;font-size:0.82em" onclick="document.getElementById('libraryInput').click()">📁 Library</button>
    </div>
    <input type="file" id="libraryInput" accept="image/*,video/*" multiple style="display:none" onchange="handlePhotoUpload('${id}',this.files)">`;

  // Tasks for this project
  html += `<div class="section-head"><div class="section-label">Tasks (${tickets.length})</div></div>`;
  if (tickets.length === 0) {
    html += `<div style="font-size:0.82em;color:var(--text-dim);padding:8px 0">No tasks for this project.</div>`;
  }
  for (const t of tickets) {
    html += `<div class="task-card" onclick="showTask('${t.id}')">
      <div class="title">${esc(t.title)}</div>
      <div class="meta"><span class="badge badge-${t.status==='done'?'done':t.status==='active'?'active':'open'}">${t.status}</span></div>
    </div>`;
  }

  c.innerHTML = html;
}

async function handlePhotoUpload(projectId, fileList) {
  if (!fileList || fileList.length === 0) return;
  toast('Uploading...','info');
  const form = new FormData();
  form.append('project_id', projectId);
  form.append('uploaded_by', currentUser?.id || '');
  form.append('category', 'general');
  for (const f of fileList) form.append('files', f);
  await fetch(API + '/files?tenant=' + TENANT, { method: 'POST', body: form });
  toast('Photos uploaded!','ok');
  showProject(projectId);
}

// ═══ CLOCK ═══
async function renderClock(c) {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

  let clockLabel = 'Not clocked in';
  let clockBtn = '';

  if (currentUser?.id) {
    const today = now.toISOString().split('T')[0];
    const data = await api(`/time?user_id=${currentUser.id}&from=${today}&to=${today}`);
    const entry = (data.entries||[])[0];
    if (!entry) {
      clockBtn = `<button class="btn btn-primary" style="margin-top:12px;padding:18px;font-size:1em;border-radius:14px" onclick="clockIn()">⏱ Clock In</button>`;
    } else if (!entry.clock_out) {
      const hrs = ((now - new Date(entry.clock_in))/3600000).toFixed(1);
      clockLabel = 'Clocked in · ' + hrs + 'h';
      clockBtn = `<button class="btn btn-success" style="margin-top:12px;padding:18px;font-size:1em;border-radius:14px" onclick="clockOut()">⏱ Clock Out</button>`;
    } else {
      clockLabel = 'Done · ' + (entry.total_hours||'0') + 'h today';
    }
  }

  let html = `
    <div class="clock-panel">
      <div class="clock-time">${timeStr}</div>
      <div class="clock-label">${clockLabel}</div>
    </div>
    ${clockBtn}

    <div class="section-head" style="margin-top:20px"><div class="section-label">Performance</div></div>
    <div class="stats-row" id="perfStats">
      <div class="stat-card"><div class="stat-val" style="color:var(--cyan)">--</div><div class="stat-label">Completed</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--green)">--</div><div class="stat-label">On-Time</div></div>
    </div>

    <div class="panel" style="text-align:center">
      <div style="font-weight:700;font-size:1em">${esc(currentUser?.name||'Crew')}</div>
      <div style="font-size:0.78em;color:var(--text-dim);margin-top:2px">${esc((ROLE_CONFIG[getDisplayRole(currentUser?.role, currentUser?.name)]||{}).label || currentUser?.role || 'crew')}</div>
      ${currentUser?.phone ? `<div style="font-size:0.75em;color:var(--text-dim);margin-top:4px">${esc(currentUser.phone)}</div>` : ''}
      ${currentUser?.email ? `<div style="font-size:0.72em;color:var(--text-dim);margin-top:2px">${esc(currentUser.email)}</div>` : ''}
    </div>
    <button class="btn btn-outline" style="margin-top:12px" onclick="switchUser()">Switch Account</button>`;

  c.innerHTML = html;

  // Load metrics
  if (currentUser?.id) {
    const m = await api(`/tickets?view=metrics&assigned_to=${currentUser.id}`);
    if (m.metrics) {
      const s = m.metrics;
      const el = document.getElementById('perfStats');
      if (el) el.innerHTML = `
        <div class="stat-card"><div class="stat-val" style="color:var(--cyan)">${s.completed||0}</div><div class="stat-label">Completed</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--green)">${s.onTimeRate||'--'}</div><div class="stat-label">On-Time</div></div>`;
    }
  }
}

async function clockIn() {
  await api('/time',{method:'POST',body:JSON.stringify({user_id:currentUser.id})});
  toast('Clocked in!','ok');
  renderClock(document.getElementById('content'));
}
async function clockOut() {
  await api('/time',{method:'PUT',body:JSON.stringify({user_id:currentUser.id,action:'clock_out'})});
  toast('Clocked out!','ok');
  renderClock(document.getElementById('content'));
}

// ═══ ROLE CONFIG ═══
const ROLE_CONFIG = {
  owner: { label: 'Owner', color: 'owner', icon: '👑' },
  estimator: { label: 'Estimator / Partner', color: 'estimator', icon: '📋' },
  production_assistant: { label: 'Production Assistant', color: 'field-ops', icon: '🎯' },
  operations_specialist: { label: 'Operations Specialist', color: 'crew', icon: '🔧' },
  laborer: { label: 'Laborer', color: 'crew', icon: '🔨' },
  subcontractor: { label: 'Subcontractor', color: 'crew', icon: '⚡' },
  crew: { label: 'Crew', color: 'crew', icon: '🔨' }
};

// Map user names to specific roles (until DB roles are updated)
const USER_ROLES = {
  'AJ': 'production_assistant',
  'Diego': 'operations_specialist',
  'Pavanjot': 'laborer',
  'Ryan': 'subcontractor'
};

function getDisplayRole(role, name) {
  if (name && USER_ROLES[name]) return USER_ROLES[name];
  if (role === 'owner' || role === 'admin' || role === 'manager') return 'owner';
  if (role === 'estimator') return 'estimator';
  return 'crew';
}

let allUsers = [];

// ═══ INIT ═══
async function init() {
  const data = await api('/users');
  allUsers = data.users || [];

  // Check if user was previously selected
  const savedId = localStorage.getItem('ryujin_crew_user');
  if (savedId) {
    const saved = allUsers.find(u => u.id === savedId);
    if (saved) {
      selectUser(saved);
      return;
    }
  }

  // Show user selector
  showUserSelector();

  // Lazy load background video
  setTimeout(() => {
    const v = document.getElementById('bgVid');
    if (v) { const s = v.querySelector('source'); if (s?.dataset.src) { s.src = s.dataset.src; v.load(); v.play().catch(()=>{}); }}
  }, 2000);
}

function showUserSelector() {
  document.getElementById('content').style.display = 'none';
  document.querySelector('.nav').style.display = 'none';
  const sel = document.getElementById('userSelect');
  sel.style.display = 'block';

  const list = document.getElementById('userList');
  let html = '';

  // Sort: owner first, then estimator, then crew
  const sorted = [...allUsers].sort((a,b) => {
    const order = {owner:0, admin:0, manager:1, estimator:2, crew:3};
    return (order[a.role]||3) - (order[b.role]||3);
  });

  for (const u of sorted) {
    const dr = getDisplayRole(u.role, u.name);
    const cfg = ROLE_CONFIG[dr] || ROLE_CONFIG.crew;
    html += `<div class="user-select-card" onclick="selectUser(allUsers.find(x=>x.id==='${u.id}'))">
      <div class="user-avatar ${cfg.color}">${cfg.icon}</div>
      <div class="user-info">
        <div class="name">${esc(u.name)}</div>
        <div class="role-label">${cfg.label}</div>
      </div>
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:var(--text-dim);fill:none;stroke-width:2;margin-left:auto"><polyline points="9 18 15 12 9 6"/></svg>
    </div>`;
  }

  // Add AJ as field_ops specifically
  // (AJ's role is 'crew' in DB but she's actually field ops)

  list.innerHTML = html;
}

function selectUser(user) {
  currentUser = user;
  localStorage.setItem('ryujin_crew_user', user.id);
  document.getElementById('userSelect').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.querySelector('.nav').style.display = 'flex';
  document.getElementById('userName').textContent = user.name;

  // Update user pill color based on role
  const dr = getDisplayRole(user.role, user.name);
  const pill = document.getElementById('userPill');
  if (pill) pill.style.borderColor = dr === 'owner' ? 'rgba(34,211,238,0.2)' : dr === 'estimator' ? 'rgba(74,158,255,0.2)' : 'rgba(74,222,128,0.2)';

  render();
}

function switchUser() {
  localStorage.removeItem('ryujin_crew_user');
  currentUser = null;
  showUserSelector();
}

init();
