<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>Ryujin OS</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;--surface:rgba(255,255,255,0.04);--surface-hover:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.08);--text:#e0e6f0;--text-dim:rgba(200,220,255,0.5);
  --accent:#4a9eff;--accent-glow:rgba(74,158,255,0.15);
  --green:#4ade80;--yellow:#facc15;--red:#f87171;--orange:#fb923c;
  --radius:12px;--nav-h:64px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:calc(var(--nav-h) + 20px)}

/* ─── Animated BG ─── */
.bg-anim{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 20% 80%,rgba(15,40,80,0.4) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(10,30,70,0.3) 0%,transparent 50%);animation:bgDrift 40s ease infinite alternate}
@keyframes bgDrift{0%{opacity:0.6}100%{opacity:1}}

/* ─── Top Bar ─── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(10,14,26,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.topbar .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.05em}
.topbar .brand .logo{width:28px;height:28px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:0.8em;font-weight:800;color:#fff}
.topbar .notif{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--red)}

/* ─── Bottom Nav ─── */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:var(--nav-h);display:flex;background:rgba(10,14,26,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--text-dim);transition:color 0.2s;padding:8px 0}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-item span{font-size:0.65em;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}

/* ─── Content ─── */
.content{position:relative;z-index:1;padding:72px 16px 16px;max-width:500px;margin:0 auto}

/* ─── Cards ─── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;backdrop-filter:blur(8px);transition:background 0.2s}
.card:active{background:var(--surface-hover)}
.card-title{font-weight:700;font-size:0.95em;margin-bottom:4px}
.card-sub{font-size:0.8em;color:var(--text-dim)}
.card-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}

/* ─── Badges ─── */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.7em;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
.badge-open{background:rgba(74,158,255,0.15);color:var(--accent)}
.badge-active{background:rgba(74,222,128,0.15);color:var(--green)}
.badge-done{background:rgba(255,255,255,0.06);color:var(--text-dim)}
.badge-urgent{background:rgba(248,113,113,0.15);color:var(--red)}
.badge-high{background:rgba(251,146,60,0.15);color:var(--orange)}

/* ─── Buttons ─── */
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--radius);font-family:inherit;font-weight:700;font-size:0.9em;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{background:#3a8eef;transform:scale(0.98)}
.btn-success{background:var(--green);color:#000}
.btn-success:active{background:#3cc070}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:active{background:var(--surface)}
.btn-clock{padding:20px;font-size:1.1em;border-radius:16px;margin:12px 0}

/* ─── Clock Widget ─── */
.clock-status{text-align:center;padding:24px 16px;background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:16px}
.clock-time{font-size:2.4em;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.clock-label{font-size:0.8em;color:var(--text-dim);margin-top:4px}

/* ─── Metrics ─── */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.metric-val{font-size:1.6em;font-weight:800;letter-spacing:-1px}
.metric-label{font-size:0.7em;color:var(--text-dim);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.metric-val.green{color:var(--green)}.metric-val.yellow{color:var(--yellow)}.metric-val.red{color:var(--red)}.metric-val.accent{color:var(--accent)}

/* ─── Calendar ─── */
.cal-day{margin-bottom:16px}
.cal-date{font-size:0.75em;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:8px}
.cal-date.today{color:var(--accent)}

/* ─── Empty State ─── */
.empty{text-align:center;padding:40px 20px;color:var(--text-dim)}
.empty svg{width:48px;height:48px;stroke:var(--text-dim);opacity:0.3;margin-bottom:12px}
.empty p{font-size:0.9em}

/* ─── Project Files ─── */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:12px}
.photo-thumb{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-badge{position:absolute;bottom:4px;left:4px;padding:2px 6px;border-radius:4px;font-size:0.6em;font-weight:700;background:rgba(0,0,0,0.7);color:#fff}

/* ─── Upload Zone ─── */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;color:var(--text-dim);font-size:0.85em;margin-top:12px}
.upload-zone:active{border-color:var(--accent);background:var(--accent-glow)}

/* ─── Section Header ─── */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section-title{font-size:0.75em;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim)}

/* ─── Ticket Detail ─── */
.detail-back{display:flex;align-items:center;gap:6px;color:var(--text-dim);font-size:0.85em;font-weight:600;cursor:pointer;margin-bottom:16px}
.detail-header{margin-bottom:16px}
.detail-header h2{font-size:1.3em;font-weight:800;margin-bottom:4px}
.detail-meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:0.8em;color:var(--text-dim)}
.detail-section{margin-top:20px}
.detail-section h3{font-size:0.75em;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:8px}
.detail-section p{font-size:0.9em;line-height:1.7;color:rgba(255,255,255,0.75)}
.action-row{display:flex;gap:8px;margin-top:20px}
.action-row .btn{flex:1}

/* ─── Responsive ─── */
@media(min-width:500px){.content{padding-top:72px}}
</style>
</head>
<body>
<div class="bg-anim"></div>

<!-- Top Bar -->
<div class="topbar">
  <div class="brand">
    <div class="logo" id="brandLogo">R</div>
    <span id="brandName">Ryujin OS</span>
  </div>
  <div class="notif" onclick="showNotifications()">
    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
    <div class="notif-dot" id="notifDot" style="display:none"></div>
  </div>
</div>

<!-- Content -->
<div class="content" id="content"></div>

<!-- Bottom Nav -->
<div class="nav">
  <div class="nav-item active" data-tab="tickets" onclick="switchTab('tickets')">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    <span>Tickets</span>
  </div>
  <div class="nav-item" data-tab="calendar" onclick="switchTab('calendar')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Calendar</span>
  </div>
  <div class="nav-item" data-tab="projects" onclick="switchTab('projects')">
    <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
    <span>Projects</span>
  </div>
  <div class="nav-item" data-tab="account" onclick="switchTab('account')">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Account</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// RYUJIN OS — Crew PWA
// ═══════════════════════════════════════════

const API = window.location.origin + '/api';
const TENANT = 'plus-ultra'; // TODO: resolve from auth/config
let currentUser = null;
let currentTab = 'tickets';

// Simulated user for now — will be replaced by auth
const DEMO_USER = {
  id: null, // will be set on load
  name: 'Diego',
  role: 'crew'
};

async function api(path, opts = {}) {
  const sep = path.includes('?') ? '&' : '?';
  const url = `${API}${path}${sep}tenant=${TENANT}`;
  const resp = await fetch(url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...opts.headers }
  });
  return resp.json();
}

// ─── Tab Switching ───
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  render();
}

function render() {
  const c = document.getElementById('content');
  switch(currentTab) {
    case 'tickets': return renderTickets(c);
    case 'calendar': return renderCalendar(c);
    case 'projects': return renderProjects(c);
    case 'account': return renderAccount(c);
  }
}

// ─── TICKETS TAB ───
async function renderTickets(c) {
  c.innerHTML = '<div class="section-header"><div class="section-title">My Tickets</div></div>';

  const params = currentUser?.id ? `&assigned_to=${currentUser.id}` : '';
  const data = await api(`/tickets?status=open${params}`);
  const activeData = await api(`/tickets?status=active${params}`);
  const tickets = [...(activeData.tickets || []), ...(data.tickets || [])];

  if (tickets.length === 0) {
    c.innerHTML += '<div class="empty"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><p>No open tickets. You\'re all caught up.</p></div>';
    return;
  }

  for (const t of tickets) {
    const priorityClass = t.priority === 'urgent' ? 'badge-urgent' : t.priority === 'high' ? 'badge-high' : '';
    const statusClass = t.status === 'active' ? 'badge-active' : 'badge-open';
    c.innerHTML += `
      <div class="card" onclick="showTicket('${t.id}')">
        <div class="card-title">${esc(t.title)}</div>
        <div class="card-sub">${t.project?.address || t.project?.name || ''}</div>
        <div class="card-row">
          <span class="badge ${statusClass}">${t.status}</span>
          ${t.priority !== 'medium' ? `<span class="badge ${priorityClass}">${t.priority}</span>` : ''}
          ${t.due_date ? `<span class="card-sub">${formatDate(t.due_date)}</span>` : ''}
        </div>
      </div>
    `;
  }
}

async function showTicket(id) {
  const c = document.getElementById('content');
  const t = await api(`/tickets?id=${id}`);

  const statusClass = t.status === 'active' ? 'badge-active' : t.status === 'done' ? 'badge-done' : 'badge-open';

  c.innerHTML = `
    <div class="detail-back" onclick="render()">← Back to tickets</div>
    <div class="detail-header">
      <h2>${esc(t.title)}</h2>
      <div style="margin-top:6px"><span class="badge ${statusClass}">${t.status}</span></div>
      <div class="detail-meta">
        ${t.due_date ? `<span>Due: ${formatDate(t.due_date)}</span>` : ''}
        ${t.project?.address ? `<span>${t.project.address}</span>` : ''}
        ${t.customer?.full_name ? `<span>${t.customer.full_name}</span>` : ''}
      </div>
    </div>
    ${t.description ? `<div class="detail-section"><h3>Details</h3><p>${esc(t.description)}</p></div>` : ''}
    <div class="action-row">
      ${t.status === 'open' ? `<button class="btn btn-primary" onclick="ticketAction('${t.id}','acknowledge')">Acknowledge</button>` : ''}
      ${t.status === 'active' ? `<button class="btn btn-success" onclick="ticketAction('${t.id}','complete')">Mark Complete</button>` : ''}
    </div>
  `;
}

async function ticketAction(id, action) {
  await api('/tickets', { method: 'PUT', body: JSON.stringify({ id, action }) });
  render();
}

// ─── CALENDAR TAB ───
async function renderCalendar(c) {
  c.innerHTML = '<div class="section-header"><div class="section-title">This Week</div></div>';

  const params = currentUser?.id ? `&assigned_to=${currentUser.id}` : '';
  const today = new Date();
  const from = today.toISOString().split('T')[0];
  const to = new Date(today.getTime() + 7 * 86400000).toISOString().split('T')[0];

  const data = await api(`/tickets?view=calendar${params}&from=${from}&to=${to}`);
  const cal = data.calendar || {};
  const days = Object.keys(cal).sort();

  if (days.length === 0) {
    c.innerHTML += '<div class="empty"><p>No tickets scheduled this week.</p></div>';
    return;
  }

  for (const day of days) {
    const isToday = day === from;
    c.innerHTML += `<div class="cal-day"><div class="cal-date ${isToday ? 'today' : ''}">${isToday ? 'Today' : formatDate(day)}</div>`;
    for (const t of cal[day]) {
      const statusClass = t.status === 'active' ? 'badge-active' : 'badge-open';
      c.innerHTML += `
        <div class="card" onclick="showTicket('${t.id}')">
          <div class="card-title">${esc(t.title)}</div>
          <div class="card-sub">${t.project?.address || ''}</div>
          <div class="card-row"><span class="badge ${statusClass}">${t.status}</span></div>
        </div>
      `;
    }
    c.innerHTML += '</div>';
  }
}

// ─── PROJECTS TAB ───
async function renderProjects(c) {
  c.innerHTML = '<div class="section-header"><div class="section-title">Projects</div></div>';

  const data = await api('/projects');
  const projects = data.projects || [];

  if (projects.length === 0) {
    c.innerHTML += '<div class="empty"><p>No projects yet.</p></div>';
    return;
  }

  for (const p of projects) {
    const statusColors = { not_started: 'badge-open', active: 'badge-active', punch_list: 'badge-urgent', complete: 'badge-done' };
    c.innerHTML += `
      <div class="card" onclick="showProject('${p.id}')">
        <div class="card-title">${esc(p.name)}</div>
        <div class="card-sub">${p.address || ''}, ${p.city || ''}</div>
        <div class="card-row">
          <span class="badge ${statusColors[p.status] || ''}">${p.status.replace('_', ' ')}</span>
          ${p.customer?.full_name ? `<span class="card-sub">${p.customer.full_name}</span>` : ''}
        </div>
      </div>
    `;
  }
}

async function showProject(id) {
  const c = document.getElementById('content');
  const p = await api(`/projects?id=${id}`);
  const files = p.files || [];
  const photos = files.filter(f => f.mime_type && f.mime_type.startsWith('image/'));

  c.innerHTML = `
    <div class="detail-back" onclick="switchTab('projects')">← Back to projects</div>
    <div class="detail-header">
      <h2>${esc(p.name)}</h2>
      <div class="card-sub">${p.address || ''}, ${p.city || ''}</div>
    </div>

    <div class="detail-section">
      <h3>Photos (${photos.length})</h3>
      <div class="photo-grid">
        ${photos.map(f => `
          <div class="photo-thumb">
            <img src="${f.url}" alt="${f.caption || ''}" loading="lazy">
            ${f.category !== 'general' ? `<div class="photo-badge">${f.category}</div>` : ''}
          </div>
        `).join('')}
      </div>
      <div class="upload-zone" onclick="uploadPhoto('${id}')">
        📷 Tap to upload photos
      </div>
      <input type="file" id="photoInput" accept="image/*,video/*" multiple capture="environment" style="display:none" onchange="handlePhotoUpload('${id}', this.files)">
    </div>

    <div class="detail-section">
      <h3>Tickets</h3>
      ${(p.tickets || []).map(t => `
        <div class="card" onclick="showTicket('${t.id}')">
          <div class="card-title">${esc(t.title)}</div>
          <div class="card-row"><span class="badge badge-${t.status === 'done' ? 'done' : 'open'}">${t.status}</span></div>
        </div>
      `).join('') || '<div class="card-sub">No tickets for this project.</div>'}
    </div>
  `;
}

function uploadPhoto(projectId) {
  document.getElementById('photoInput').click();
}

async function handlePhotoUpload(projectId, fileList) {
  if (!fileList || fileList.length === 0) return;
  const form = new FormData();
  form.append('project_id', projectId);
  form.append('uploaded_by', currentUser?.id || '');
  form.append('category', 'general');
  for (const f of fileList) form.append('files', f);

  const sep = '/files' + (('/files').includes('?') ? '&' : '?') + 'tenant=' + TENANT;
  await fetch(API + sep, { method: 'POST', body: form });
  showProject(projectId);
}

// ─── ACCOUNT TAB ───
async function renderAccount(c) {
  c.innerHTML = `
    <div class="clock-status" id="clockWidget">
      <div class="clock-time" id="clockTime">--:--</div>
      <div class="clock-label" id="clockLabel">Loading...</div>
    </div>
    <div id="clockBtn"></div>
    <div class="section-header" style="margin-top:24px"><div class="section-title">Performance</div></div>
    <div class="metrics-grid" id="metricsGrid">
      <div class="metric-card"><div class="metric-val accent">--</div><div class="metric-label">Completed</div></div>
      <div class="metric-card"><div class="metric-val green">--</div><div class="metric-label">On-Time</div></div>
      <div class="metric-card"><div class="metric-val accent">--</div><div class="metric-label">This Week</div></div>
      <div class="metric-card"><div class="metric-val yellow">--</div><div class="metric-label">Avg Hours</div></div>
    </div>
    <div class="card" style="text-align:center;margin-top:16px">
      <div style="font-weight:700;font-size:1.1em">${esc(currentUser?.name || 'Crew')}</div>
      <div class="card-sub" style="margin-top:4px">${currentUser?.role || 'crew'}</div>
    </div>
  `;

  updateClock();
  loadMetrics();
}

async function updateClock() {
  const timeEl = document.getElementById('clockTime');
  const labelEl = document.getElementById('clockLabel');
  const btnEl = document.getElementById('clockBtn');
  if (!timeEl) return;

  // Show current time
  const now = new Date();
  timeEl.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

  if (!currentUser?.id) {
    labelEl.textContent = 'Select user to clock in';
    return;
  }

  // Check today's time entry
  const today = now.toISOString().split('T')[0];
  const data = await api(`/time?user_id=${currentUser.id}&from=${today}&to=${today}`);
  const entry = (data.entries || [])[0];

  if (!entry) {
    labelEl.textContent = 'Not clocked in';
    btnEl.innerHTML = `<button class="btn btn-primary btn-clock" onclick="clockIn()">⏱ Clock In</button>`;
  } else if (!entry.clock_out) {
    const start = new Date(entry.clock_in);
    const hrs = ((now - start) / 3600000).toFixed(1);
    labelEl.textContent = `Clocked in · ${hrs}h`;
    btnEl.innerHTML = `<button class="btn btn-success btn-clock" onclick="clockOut()">⏱ Clock Out</button>`;
  } else {
    labelEl.textContent = `Done · ${entry.total_hours}h today`;
    btnEl.innerHTML = '';
  }
}

async function clockIn() {
  await api('/time', { method: 'POST', body: JSON.stringify({ user_id: currentUser.id }) });
  renderAccount(document.getElementById('content'));
}

async function clockOut() {
  await api('/time', { method: 'PUT', body: JSON.stringify({ user_id: currentUser.id, action: 'clock_out' }) });
  renderAccount(document.getElementById('content'));
}

async function loadMetrics() {
  if (!currentUser?.id) return;
  const data = await api(`/tickets?view=metrics&assigned_to=${currentUser.id}`);
  const m = data.metrics;
  if (!m) return;

  const grid = document.getElementById('metricsGrid');
  if (!grid) return;

  const onTimeColor = parseInt(m.onTimeRate) >= 90 ? 'green' : parseInt(m.onTimeRate) >= 70 ? 'yellow' : 'red';
  grid.innerHTML = `
    <div class="metric-card"><div class="metric-val accent">${m.completed}</div><div class="metric-label">Completed</div></div>
    <div class="metric-card"><div class="metric-val ${onTimeColor}">${m.onTimeRate}</div><div class="metric-label">On-Time</div></div>
    <div class="metric-card"><div class="metric-val accent">${m.doneThisWeek}</div><div class="metric-label">This Week</div></div>
    <div class="metric-card"><div class="metric-val yellow">${m.avgCompletionHours || '--'}h</div><div class="metric-label">Avg Time</div></div>
  `;
}

// ─── Helpers ───
function esc(s) { return (s || '').replace(/[<>&"]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' }[c])); }
function formatDate(d) {
  const date = new Date(d + 'T00:00:00');
  return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

  setInterval(() => {

}

init();
