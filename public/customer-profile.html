<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060a14">
<title>Customer Profile · Ryujin OS</title>
<link rel="icon" href="/assets/logo/icon.png" onerror="this.href='/assets/logo/logo-glow.jpg'">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=optional" rel="stylesheet">
<script src="/assets/auth-guard.js"></script>
<script src="/assets/customer-toolbar.js" defer></script>
<style>
:root{--bg:#060a14;--glass:rgba(14,22,40,0.92);--glass2:rgba(22,34,58,0.80);--glass-border:rgba(34,211,238,0.16);--glass-border-hi:rgba(34,211,238,0.40);--text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);--cyan:#22d3ee;--teal:#2dd4bf;--purple:#7c3aed;--green:#4ade80;--gold:#fbbf24;--orange:#fb923c;--red:#f87171;--blue:#60a5fa;--pink:#f472b6;--radius:12px;--sidebar-w:72px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;overflow-x:hidden}
.sidebar{width:var(--sidebar-w);background:rgba(8,12,24,0.98);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;bottom:0;z-index:50}
.sidebar-logo{width:44px;height:44px;margin:18px 0 12px;border-radius:12px;background:url('/assets/logo/logo-glow.jpg') center/cover;box-shadow:0 0 20px rgba(34,211,238,0.3);cursor:pointer}
.sidebar-divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;margin:4px 0 8px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid transparent;color:var(--text-dim);text-decoration:none;transition:all 0.25s;position:relative}
.nav-icon:hover{background:rgba(34,211,238,0.06);color:var(--text)}
.nav-icon.active{background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(124,58,237,0.06));color:var(--cyan);border-color:rgba(34,211,238,0.2)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:3px;background:var(--cyan);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--cyan)}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.main{margin-left:var(--sidebar-w);padding:18px 22px 60px;max-width:1320px}
.hq-header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.hq-title .crumb{font-family:'JetBrains Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hq-title h1{font-family:'Inter',monospace;font-size:1.7em;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,#e0e6f0 20%,var(--cyan) 70%,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn{font-family:'Inter',monospace;font-size:0.7em;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:8px 16px;border-radius:18px;cursor:pointer;border:1px solid var(--glass-border);background:transparent;color:var(--text-dim);transition:all 0.2s;text-decoration:none;display:inline-block}
.btn:hover{color:var(--text);border-color:var(--glass-border-hi)}
.btn.primary{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#0a0e1a;border:none;box-shadow:0 0 12px rgba(34,211,238,0.3)}

/* ── Header card ─────────────────────────────────────────────── */
.profile-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;padding:22px 24px;margin-bottom:14px;position:relative;overflow:hidden;backdrop-filter:blur(8px)}
.profile-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan) 30%,var(--purple) 70%,transparent);opacity:0.8}
.profile-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.profile-name{font-family:'Inter',monospace;font-size:1.55em;font-weight:800;color:#eef3ff;letter-spacing:1px;text-shadow:0 0 24px rgba(34,211,238,0.25)}
.status-chip{font-family:'JetBrains Mono',monospace;font-size:0.62em;letter-spacing:1.6px;text-transform:uppercase;padding:4px 12px;border-radius:999px;white-space:nowrap}
.status-chip.signed{background:rgba(74,222,128,0.10);color:var(--green);border:1px solid rgba(74,222,128,0.35);box-shadow:0 0 10px rgba(74,222,128,0.15)}
.status-chip.repeat{background:rgba(124,58,237,0.14);color:#b9a4f7;border:1px solid rgba(124,58,237,0.40)}
.status-chip.open{background:rgba(34,211,238,0.10);color:var(--cyan);border:1px solid rgba(34,211,238,0.35)}
.status-chip.lead{background:rgba(140,170,220,0.08);color:var(--text-dim);border:1px solid var(--glass-border)}
.dnd-chip{font-family:'JetBrains Mono',monospace;font-size:0.58em;letter-spacing:1.4px;text-transform:uppercase;padding:3px 10px;border-radius:999px;background:rgba(248,113,113,0.10);color:var(--red);border:1px solid rgba(248,113,113,0.35)}
.match-note{font-family:'JetBrains Mono',monospace;font-size:0.62em;color:var(--text-muted);letter-spacing:0.5px}
.profile-meta{display:flex;flex-wrap:wrap;gap:6px 18px;font-family:'JetBrains Mono',monospace;font-size:0.82em;color:var(--text-dim);letter-spacing:0.5px;margin-bottom:16px}
.profile-meta .m-item{display:flex;align-items:center;gap:6px;min-width:0}
.profile-meta .m-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tag{font-family:'JetBrains Mono',monospace;font-size:0.58em;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:8px;background:rgba(34,211,238,0.06);border:1px solid var(--glass-border);color:var(--text-dim)}
.action-row{display:flex;gap:10px;flex-wrap:wrap}
.act-btn{display:flex;align-items:center;gap:8px;font-family:'Inter',monospace;font-size:0.68em;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;padding:11px 20px;border-radius:999px;border:1px solid rgba(45,212,191,0.40);background:linear-gradient(135deg,rgba(45,212,191,0.10),rgba(34,211,238,0.05));color:var(--teal);text-decoration:none;transition:all 0.18s;cursor:pointer}
.act-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 4px rgba(45,212,191,0.6))}
.act-btn:hover{border-color:var(--teal);background:linear-gradient(135deg,rgba(45,212,191,0.20),rgba(34,211,238,0.10));box-shadow:0 0 16px rgba(45,212,191,0.25);transform:translateY(-1px)}
.act-btn.ghl{border-color:rgba(124,58,237,0.45);color:#b9a4f7;background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(34,211,238,0.04))}
.act-btn.ghl:hover{border-color:var(--purple);box-shadow:0 0 16px rgba(124,58,237,0.30)}
.act-btn.disabled{opacity:0.30;pointer-events:none;filter:grayscale(0.6)}

/* ── Deal bar ────────────────────────────────────────────────── */
.deal-bar{display:flex;align-items:center;gap:18px;flex-wrap:wrap;background:linear-gradient(135deg,rgba(124,58,237,0.10),rgba(34,211,238,0.04));border:1px solid rgba(124,58,237,0.30);border-radius:14px;padding:14px 20px;margin-bottom:14px;backdrop-filter:blur(8px)}
.deal-bar .dl-stage{font-family:'Inter',monospace;font-size:1.0em;font-weight:800;color:#eef3ff;letter-spacing:0.5px}
.deal-bar .dl-pipe{font-family:'JetBrains Mono',monospace;font-size:0.66em;letter-spacing:1.6px;text-transform:uppercase;color:#b9a4f7;margin-bottom:3px}
.deal-bar .dl-val{font-family:'Inter',monospace;font-size:1.1em;font-weight:800;color:var(--gold);text-shadow:0 0 16px rgba(251,191,36,0.3);margin-left:auto}
.deal-bar .dl-age{font-family:'JetBrains Mono',monospace;font-size:0.66em;color:var(--text-dim);letter-spacing:0.5px}
.deal-bar.none{background:rgba(14,22,40,0.6);border-color:var(--glass-border)}
.deal-bar.none .dl-stage{color:var(--text-dim);font-weight:600;font-size:0.86em}

/* ── Stat tiles ──────────────────────────────────────────────── */
.profile-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.pstat{background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;padding:16px 14px;text-align:center;position:relative;overflow:hidden;backdrop-filter:blur(8px);transition:border-color 0.2s}
.pstat::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:1px;opacity:0.55}
.pstat.gold::after{background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.pstat.cyan::after{background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.pstat.green::after{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.pstat.purple::after{background:linear-gradient(90deg,transparent,#a78bfa,transparent)}
.pstat .v{font-family:'Inter',monospace;font-size:1.45em;font-weight:800;letter-spacing:0.5px}
.pstat.gold .v{color:var(--gold);text-shadow:0 0 18px rgba(251,191,36,0.35)}
.pstat.cyan .v{color:var(--cyan);text-shadow:0 0 18px rgba(34,211,238,0.35)}
.pstat.green .v{color:var(--green);text-shadow:0 0 18px rgba(74,222,128,0.35)}
.pstat.purple .v{color:#a78bfa;text-shadow:0 0 18px rgba(167,139,250,0.35)}
.pstat .l{font-family:'JetBrains Mono',monospace;font-size:0.60em;letter-spacing:1.8px;color:var(--text-dim);text-transform:uppercase;margin-top:6px}

/* ── Layout grid ─────────────────────────────────────────────── */
.cols{display:grid;grid-template-columns:1.15fr 1fr;gap:20px;align-items:start}
@media(max-width:1000px){.cols{grid-template-columns:1fr}}

.section-head{display:flex;align-items:baseline;gap:10px;margin:20px 0 10px;font-family:'Inter',monospace;position:relative}
.section-head:first-child{margin-top:0}
.section-head h2{font-size:0.78em;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.section-head::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(34,211,238,0.35),transparent);margin-left:4px;align-self:center}
.section-head .count-pill{font-size:0.65em;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:10px;background:rgba(34,211,238,0.1);border:1px solid var(--glass-border);color:var(--cyan)}

/* ── Interaction timeline (the centerpiece) ──────────────────── */
.timeline{display:flex;flex-direction:column;max-height:680px;overflow-y:auto;padding-right:6px}
.timeline::-webkit-scrollbar{width:6px}.timeline::-webkit-scrollbar-thumb{background:var(--glass-border);border-radius:3px}
.tl-item{display:flex;gap:12px;position:relative;padding:0 0 14px 0}
.tl-rail{display:flex;flex-direction:column;align-items:center;width:30px;flex-shrink:0}
.tl-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--glass-border);background:rgba(6,10,20,0.92);flex-shrink:0;color:var(--text-dim)}
.tl-dot svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tl-line{flex:1;width:1px;background:linear-gradient(180deg,var(--glass-border),transparent);margin-top:3px;min-height:6px}
.tl-item:last-child .tl-line{display:none}
.tl-card{flex:1;background:var(--glass);border:1px solid var(--glass-border);border-radius:11px;padding:10px 13px;backdrop-filter:blur(8px);min-width:0;transition:border-color .18s}
.tl-card:hover{border-color:var(--glass-border-hi)}
.tl-head{display:flex;align-items:baseline;gap:10px;justify-content:space-between}
.tl-title{font-family:'Inter',monospace;font-weight:700;font-size:0.8em;color:#eef3ff;letter-spacing:0.3px;text-transform:capitalize}
.tl-date{font-family:'JetBrains Mono',monospace;font-size:0.64em;color:var(--text-muted);white-space:nowrap;letter-spacing:0.5px}
.tl-body{font-size:0.82em;color:var(--text-dim);line-height:1.45;margin-top:5px;white-space:pre-wrap;word-break:break-word}
.tl-item a.tl-link{font-family:'JetBrains Mono',monospace;font-size:0.64em;color:var(--cyan);text-decoration:none;letter-spacing:0.5px}
.tl-item a.tl-link:hover{text-decoration:underline}
/* channel + kind colors on the dot */
.tl-item.ch-sms .tl-dot{color:var(--green);border-color:rgba(74,222,128,0.5)}
.tl-item.ch-email .tl-dot{color:var(--cyan);border-color:rgba(34,211,238,0.5)}
.tl-item.ch-facebook .tl-dot{color:var(--blue);border-color:rgba(96,165,250,0.5)}
.tl-item.ch-instagram .tl-dot{color:var(--pink);border-color:rgba(244,114,182,0.5)}
.tl-item.ch-whatsapp .tl-dot{color:#25d366;border-color:rgba(37,211,102,0.5)}
.tl-item.k-note .tl-dot{color:var(--gold);border-color:rgba(251,191,36,0.5)}
.tl-item.k-appointment .tl-dot{color:#a78bfa;border-color:rgba(167,139,250,0.5)}
.tl-item.k-task .tl-dot{color:var(--orange);border-color:rgba(251,146,60,0.5)}
.tl-item.k-stage_change .tl-dot{color:var(--teal);border-color:rgba(45,212,191,0.5)}
.tl-item.k-estimate .tl-dot,.tl-item.k-estimate_accepted .tl-dot{color:var(--cyan);border-color:rgba(34,211,238,0.5)}
.tl-item.k-workorder .tl-dot,.tl-item.k-workorder_done .tl-dot{color:var(--green);border-color:rgba(74,222,128,0.5)}
.tl-item.dir-inbound .tl-card{border-left:2px solid rgba(74,222,128,0.4)}
.tl-item.dir-outbound .tl-card{border-left:2px solid rgba(34,211,238,0.3)}

/* ── Talking points (research) ───────────────────────────────── */
.tp-card{background:linear-gradient(135deg,rgba(251,191,36,0.06),rgba(124,58,237,0.04));border:1px solid rgba(251,191,36,0.25);border-radius:14px;padding:16px 18px;backdrop-filter:blur(8px)}
.tp-card .tp-summary{font-size:0.86em;color:var(--text);line-height:1.5;margin-bottom:10px}
.tp-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.tp-list li{font-size:0.84em;color:var(--text-dim);padding-left:18px;position:relative;line-height:1.4}
.tp-list li::before{content:'▸';position:absolute;left:0;color:var(--gold)}
.tp-empty{text-align:center;padding:18px 14px;color:var(--text-dim);font-size:0.84em}
.tp-meta{font-family:'JetBrains Mono',monospace;font-size:0.62em;color:var(--text-muted);margin-top:10px;letter-spacing:0.5px}

/* ── Estimates ───────────────────────────────────────────────── */
.est-list{display:flex;flex-direction:column;gap:10px}
.est-card{display:flex;align-items:center;gap:16px;background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;padding:14px 18px;backdrop-filter:blur(8px);transition:border-color 0.2s,box-shadow 0.2s;flex-wrap:wrap}
.est-card:hover{border-color:var(--glass-border-hi);box-shadow:0 0 18px rgba(34,211,238,0.10)}
.est-id{min-width:150px}
.est-num{font-family:'Inter',monospace;font-weight:700;font-size:0.92em;color:#eef3ff;letter-spacing:0.5px}
.est-date{font-family:'JetBrains Mono',monospace;font-size:0.70em;color:var(--text-muted);letter-spacing:0.5px;margin-top:3px}
.est-chip{font-family:'JetBrains Mono',monospace;font-size:0.58em;letter-spacing:1.4px;text-transform:uppercase;padding:3px 10px;border-radius:999px;white-space:nowrap}
.est-chip.signed{background:rgba(74,222,128,0.10);color:var(--green);border:1px solid rgba(74,222,128,0.35)}
.est-chip.lost{background:rgba(251,146,60,0.10);color:var(--orange);border:1px solid rgba(251,146,60,0.30)}
.est-chip.draft{background:rgba(140,170,220,0.08);color:var(--text-dim);border:1px solid var(--glass-border)}
.est-chip.open{background:rgba(34,211,238,0.10);color:var(--cyan);border:1px solid rgba(34,211,238,0.35)}
.tier-row{display:flex;gap:8px;flex-wrap:wrap;flex:1;justify-content:center}
.tier-box{min-width:90px;text-align:center;background:rgba(6,10,20,0.45);border:1px solid var(--glass-border);border-radius:10px;padding:7px 12px}
.tier-box .t-name{font-family:'JetBrains Mono',monospace;font-size:0.56em;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-dim)}
.tier-box .t-price{font-family:'Inter',monospace;font-size:0.84em;font-weight:700;color:var(--text);margin-top:2px}
.tier-box.sel{border-color:rgba(34,211,238,0.55);background:rgba(34,211,238,0.08);box-shadow:0 0 12px rgba(34,211,238,0.18)}
.tier-box.sel .t-name{color:var(--cyan)}
.tier-box.sel .t-price{color:var(--cyan);text-shadow:0 0 10px rgba(34,211,238,0.4)}
.tier-box.gold-t.sel{border-color:rgba(251,191,36,0.55);background:rgba(251,191,36,0.07)}
.tier-box.gold-t.sel .t-name,.tier-box.gold-t.sel .t-price{color:var(--gold)}
.est-actions{display:flex;align-items:center;gap:10px;margin-left:auto}
.est-accepted{font-family:'Inter',monospace;font-size:0.80em;font-weight:700;color:var(--green);white-space:nowrap}
.mini-btn{font-family:'Inter',monospace;font-size:0.60em;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;padding:7px 14px;border-radius:999px;border:1px solid rgba(34,211,238,0.40);color:var(--cyan);text-decoration:none;white-space:nowrap;transition:all 0.18s;background:rgba(34,211,238,0.05);cursor:pointer}
.mini-btn:hover{background:rgba(34,211,238,0.14);box-shadow:0 0 12px rgba(34,211,238,0.22)}

/* ── Work orders + photos + job folders ──────────────────────── */
.wo-list{display:flex;flex-direction:column;position:relative}
.wo-row{display:flex;gap:14px;position:relative;padding:0 0 16px 0}
.wo-rail{display:flex;flex-direction:column;align-items:center;width:14px;flex-shrink:0}
.wo-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--cyan);background:rgba(6,10,20,0.9);box-shadow:0 0 10px rgba(34,211,238,0.5);flex-shrink:0;margin-top:4px}
.wo-row.complete .wo-dot{border-color:var(--green);box-shadow:0 0 10px rgba(74,222,128,0.5)}
.wo-row.in_progress .wo-dot{border-color:var(--gold);box-shadow:0 0 10px rgba(251,191,36,0.5)}
.wo-row.draft .wo-dot,.wo-row.cancelled .wo-dot{border-color:var(--text-muted);box-shadow:none}
.wo-line{flex:1;width:1px;background:linear-gradient(180deg,rgba(34,211,238,0.4),rgba(34,211,238,0.05));margin-top:4px}
.wo-row:last-child .wo-line{display:none}
.wo-body{flex:1;background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:12px 14px;backdrop-filter:blur(8px);min-width:0}
.wo-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.wo-num{font-family:'Inter',monospace;font-weight:700;font-size:0.85em;color:#eef3ff}
.wo-meta{font-family:'JetBrains Mono',monospace;font-size:0.70em;color:var(--text-dim);letter-spacing:0.5px;margin-top:6px;display:flex;flex-wrap:wrap;gap:4px 14px}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
.photo-cell{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid var(--glass-border);cursor:pointer;background:rgba(6,10,20,0.5);transition:border-color 0.18s,transform 0.18s}
.photo-cell:hover{border-color:var(--glass-border-hi);transform:scale(1.03)}
.photo-cell img{width:100%;height:100%;object-fit:cover;display:block}
.photo-more{display:flex;align-items:center;justify-content:center;font-family:'Inter',monospace;font-size:0.78em;font-weight:700;color:var(--cyan);background:rgba(34,211,238,0.06);text-decoration:none}
.jf-list{display:flex;flex-direction:column;gap:8px}
.jf-row{display:flex;align-items:center;gap:10px;background:var(--glass);border:1px solid var(--glass-border);border-radius:11px;padding:10px 14px;text-decoration:none;transition:border-color .18s}
.jf-row:hover{border-color:var(--glass-border-hi)}
.jf-addr{font-family:'Inter',monospace;font-weight:700;font-size:0.84em;color:#eef3ff}
.jf-stage{font-family:'JetBrains Mono',monospace;font-size:0.62em;letter-spacing:1.2px;text-transform:uppercase;color:var(--teal);margin-left:auto;white-space:nowrap}

.glass-section{background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;padding:16px 18px;backdrop-filter:blur(8px)}
.notes-body{font-size:0.86em;color:var(--text);white-space:pre-wrap;line-height:1.5}
.empty-state{text-align:center;padding:22px 16px;color:var(--text-dim);border:1px dashed var(--glass-border);border-radius:var(--radius);font-size:0.85em}
.banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);font-size:0.8em;margin-bottom:14px}
.banner.warn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:var(--orange)}
.skeleton{background:linear-gradient(90deg,var(--glass) 0%,var(--glass2) 50%,var(--glass) 100%);background-size:200% 100%;animation:sk 1.4s infinite;border:1px solid var(--glass-border);border-radius:var(--radius);height:64px;margin-bottom:8px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media(max-width:768px){
  .main{padding:12px 12px 50px}.hq-title h1{font-size:1.25em}
  .profile-name{font-size:1.2em}
  .action-row{display:grid;grid-template-columns:repeat(2,1fr)}
  .act-btn{justify-content:center;padding:12px 8px}
  .profile-stats{grid-template-columns:repeat(2,1fr)}
  .est-card{flex-direction:column;align-items:stretch;gap:10px}
  .est-id{min-width:0;display:flex;justify-content:space-between;align-items:center}
  .tier-row{justify-content:flex-start}
  .est-actions{margin-left:0;justify-content:flex-end}
  .photo-grid{grid-template-columns:repeat(3,1fr)}
  .timeline{max-height:none}
}

<script>
const TENANT = window.RYUJIN_TENANT_SLUG;
const params = new URLSearchParams(location.search);
const id = params.get('id') || params.get('ghl');

const WON_STATUSES = ['signed','accepted','scheduled','in_progress','complete','won'];
const LOST_STATES = ['closed_lost','lost','rejected'];
const TIER_ORDER = ['economy','standard','premium','gold','platinum','diamond'];

function estState(e){ return String(e.state || e.status || '').toLowerCase(); }
function escapeHtml(s){ if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtMoney(n){ if (n == null || isNaN(n)) return '—'; return '$' + Math.round(n).toLocaleString(); }
function fmtDate(iso){ if (!iso) return ''; const d = new Date(iso); return isNaN(d) ? '' : d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtMonthYear(iso){ if (!iso) return '—'; const d = new Date(iso); return isNaN(d) ? '—' : d.toLocaleDateString('en-US',{month:'short',year:'numeric'}).toUpperCase(); }
function fmtWhen(iso){ if (!iso) return ''; const d = new Date(iso); if (isNaN(d)) return ''; const days = Math.floor((Date.now()-d.getTime())/86400000); const date = d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); if (days <= 0) return 'Today'; if (days === 1) return 'Yesterday'; if (days < 7) return days+'d ago'; return date + (d.getFullYear()!==new Date().getFullYear() ? ' '+d.getFullYear() : ''); }
function showBanner(msg){ document.getElementById('banner-slot').innerHTML = `<div class="banner warn">${escapeHtml(msg)}</div>`; }
function _headers(){ return { 'x-tenant-id': TENANT, ...window.RyujinAuth.headers() }; }

function tierVal(p){ if (!p) return null; const v = p.total ?? p.summary?.sellingPrice ?? p.sellingPrice; return v != null ? Number(v) || 0 : null; }
function estKind(e){
  const status = String(e.status || '').toLowerCase();
  if (e.state === 'closed_won' || WON_STATUSES.includes(status)) return 'signed';
  if (e.state === 'closed_lost' || LOST_STATES.includes(status)) return 'lost';
  if (estState(e).includes('draft')) return 'draft';
  return 'open';
}

const ICONS = {
  call:  '<svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.12.92.34 1.82.66 2.68a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.4-1.23a2 2 0 012.11-.45c.86.32 1.76.54 2.68.66A2 2 0 0122 16.92z"/></svg>',
  text:  '<svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>',
  email: '<svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M22 6l-10 7L2 6"/></svg>',
  maps:  '<svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>',
  ghl:   '<svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><path d="M15 3h6v6M10 14L21 3"/></svg>'
};
// timeline glyphs per kind/channel
const TL_ICON = {
  message: '<svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>',
  email:   ICONS.email,
  note:    '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h6"/></svg>',
  appointment: '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
  task:    '<svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>',
  stage_change: '<svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>',
  estimate: '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>',
  workorder:'<svg viewBox="0 0 24 24"><path d="M2 22V12l10-7 10 7v10M9 22V14h6v8"/></svg>'
};
function tlGlyph(kind, channel){
  if (kind === 'message') return channel === 'email' ? TL_ICON.email : TL_ICON.message;
  if (kind === 'estimate_accepted') return TL_ICON.estimate;
  if (kind === 'workorder_done') return TL_ICON.workorder;
  return TL_ICON[kind] || TL_ICON.message;
}

function actionBtn(href, icon, label, extraClass){
  const cls = `act-btn${extraClass ? ' ' + extraClass : ''}${href ? '' : ' disabled'}`;
  const target = (icon === 'ghl' || icon === 'maps') ? ' target="_blank" rel="noopener"' : '';
  return `<a class="${cls}" href="${href || '#'}"${target}>${ICONS[icon]}${label}</a>`;
}

function customerStatus(signedCount, openCount, jobCount){
  if (jobCount > 1) return { cls:'repeat', label:'Repeat Customer' };
  if (signedCount > 0) return { cls:'signed', label:'Signed' };
  if (openCount > 0) return { cls:'open', label:'Open Estimate' };
  return { cls:'lead', label:'Lead' };
}

function renderHeader(c, status, resolvedBy){
  const phoneDigits = (c.phone || '').replace(/[^\d+]/g, '');
  const mapsQ = [c.address, c.city, c.province].filter(Boolean).join(', ');
  const matchNote = (resolvedBy === 'phone' || resolvedBy === 'email')
    ? `<span class="match-note">· CRM matched by ${resolvedBy}</span>` : '';
  const tags = (c.tags || []).filter(Boolean).slice(0, 8);
  document.getElementById('profileCard').innerHTML = `
    <div class="profile-top">
      <div class="profile-name">${escapeHtml(c.full_name || 'Unnamed')}</div>
      <span class="status-chip ${status.cls}">${status.label}</span>
      ${c.dnd ? '<span class="dnd-chip">Do Not Disturb</span>' : ''}
      ${matchNote}
    </div>
    <div class="profile-meta">
      ${c.address ? `<div class="m-item">📍 <span>${escapeHtml([c.address, c.city].filter(Boolean).join(', '))}</span></div>` : ''}
      ${c.phone ? `<div class="m-item">📞 <span>${escapeHtml(c.phone)}</span></div>` : ''}
      ${c.email ? `<div class="m-item">📧 <span>${escapeHtml(c.email)}</span></div>` : ''}
      ${c.source ? `<div class="m-item">◆ <span>${escapeHtml(c.source)}</span></div>` : ''}
      ${c.created_at ? `<div class="m-item">◷ <span>Since ${fmtDate(c.created_at)}</span></div>` : ''}
    </div>
    ${tags.length ? `<div class="tag-row">${tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
    <div class="action-row">
      ${actionBtn(phoneDigits ? `tel:${phoneDigits}` : null, 'call', 'Call')}
      ${actionBtn(phoneDigits ? `sms:${phoneDigits}` : null, 'text', 'Text')}
      ${actionBtn(c.email ? `mailto:${encodeURIComponent(c.email)}` : null, 'email', 'Email')}
      ${actionBtn(mapsQ ? `https://maps.google.com/?q=${encodeURIComponent(mapsQ)}` : null, 'maps', 'Maps')}
      ${c.ghl_contact_id ? actionBtn(`https://app.gohighlevel.com/v2/location/aHotOUdq9D8m3JPrRz9n/contacts/detail/${encodeURIComponent(c.ghl_contact_id)}`, 'ghl', 'Open CRM', 'ghl') : ''}
    </div>`;
}

function renderDeal(deal){
  const slot = document.getElementById('dealSlot');
  if (!deal) { slot.innerHTML = `<div class="deal-bar none"><div class="dl-stage">No active deal in the pipeline</div></div>`; return; }
  slot.innerHTML = `
    <div class="deal-bar">
      <div>
        <div class="dl-pipe">${escapeHtml(deal.pipeline || 'Pipeline')}</div>
        <div class="dl-stage">${escapeHtml(deal.stage || '—')}</div>
      </div>
      ${deal.lastStatusChange ? `<div class="dl-age">Moved ${fmtWhen(deal.lastStatusChange)}</div>` : ''}
      ${deal.value ? `<div class="dl-val">${fmtMoney(deal.value)}</div>` : ''}
    </div>`;
}

function renderStats(s){
  document.getElementById('profileStats').innerHTML = `
    <div class="pstat gold"><div class="v">${fmtMoney(s.ltv)}</div><div class="l">Lifetime Value</div></div>
    <div class="pstat cyan"><div class="v">${s.jobCount || 0}</div><div class="l">Jobs Won</div></div>
    <div class="pstat green"><div class="v">${s.openCount || 0}</div><div class="l">Open Estimates</div></div>
    <div class="pstat purple"><div class="v">${fmtMonthYear(s.lastJobAt)}</div><div class="l">Last Job</div></div>`;
}

function renderTimeline(items){
  document.getElementById('tlCount').textContent = items.length;
  const el = document.getElementById('timeline');
  if (!items.length) { el.innerHTML = `<div class="empty-state">No interactions on file yet. Calls, texts, emails, notes, appointments and deal moves will appear here.</div>`; return; }
  el.innerHTML = items.map(t => {
    const ch = t.channel ? `ch-${escapeHtml(t.channel)}` : '';
    const dir = t.direction ? `dir-${escapeHtml(t.direction)}` : '';
    let link = '';
    if (t.kind === 'estimate' && t.meta?.shareToken) link = `<a class="tl-link" href="/proposal-client.html?share=${encodeURIComponent(t.meta.shareToken)}" target="_blank" rel="noopener">View proposal ›</a>`;
    else if ((t.kind === 'workorder' || t.kind === 'workorder_done') && t.meta?.id) link = `<a class="tl-link" href="/job.html?id=${encodeURIComponent(t.meta.id)}">Open job ›</a>`;
    return `
      <div class="tl-item k-${escapeHtml(t.kind)} ${ch} ${dir}">
        <div class="tl-rail"><div class="tl-dot">${tlGlyph(t.kind, t.channel)}</div><div class="tl-line"></div></div>
        <div class="tl-card">
          <div class="tl-head"><span class="tl-title">${escapeHtml(t.title || t.kind)}</span><span class="tl-date">${fmtWhen(t.ts)}</span></div>
          ${t.body ? `<div class="tl-body">${escapeHtml(t.body)}</div>` : ''}
          ${link}
        </div>
      </div>`;
  }).join('');
}

function renderTalkingPoints(research){
  const slot = document.getElementById('tpSlot');
  if (!research || (!research.summary && !(research.talking_points || []).length)) {
    slot.innerHTML = `<div class="tp-card"><div class="tp-empty">No research on file yet. Pre-call talking points and interests appear here once research runs.</div></div>`;
    return;
  }
  const points = research.talking_points || research.points || [];
  const interests = research.interests || [];
  slot.innerHTML = `
    <div class="tp-card">
      ${research.summary ? `<div class="tp-summary">${escapeHtml(research.summary)}</div>` : ''}
      ${points.length ? `<ul class="tp-list">${points.map(p => `<li>${escapeHtml(typeof p === 'string' ? p : (p.point || p.text || ''))}</li>`).join('')}</ul>` : ''}
      ${interests.length ? `<div class="tag-row" style="margin-top:10px">${interests.map(i => `<span class="tag">${escapeHtml(i)}</span>`).join('')}</div>` : ''}
      <div class="tp-meta">${research.researched_at ? 'Researched ' + fmtWhen(research.researched_at) : ''}${(research.sources || []).length ? ' · ' + research.sources.length + ' sources' : ''}</div>
    </div>`;
}
async function requestResearch(){
  const btn = document.getElementById('researchBtn');
  if (btn) { btn.textContent = 'Queued…'; btn.disabled = true; }
  try {
    await fetch('/api/customer-research', { method:'POST', headers:{ 'Content-Type':'application/json', ..._headers() }, body: JSON.stringify({ ghl_contact_id: STATE.ghlId, customer_id: STATE.nativeId }) });
    if (btn) btn.textContent = 'Queued — check back shortly';
  } catch { if (btn) { btn.textContent = 'Try again'; btn.disabled = false; } }
}

function tierBoxes(e){
  const pk = e.calculated_packages || {};
  const sel = String(e.selected_package || '').toLowerCase();
  const keys = Object.keys(pk).filter(k => tierVal(pk[k])).sort((a,b) => {
    const ia = TIER_ORDER.indexOf(a.toLowerCase()), ib = TIER_ORDER.indexOf(b.toLowerCase());
    return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
  }).slice(0, 4);
  if (!keys.length) return '';
  return `<div class="tier-row">${keys.map(k => {
    const price = tierVal(pk[k]); const isSel = k.toLowerCase() === sel; const goldT = k.toLowerCase() === 'gold' ? ' gold-t' : '';
    return `<div class="tier-box${goldT}${isSel ? ' sel' : ''}"><div class="t-name">${escapeHtml(k)}</div><div class="t-price">${fmtMoney(price)}</div></div>`;
  }).join('')}</div>`;
}
function renderEstimates(estimates){
  document.getElementById('estCount').textContent = estimates.length;
  const el = document.getElementById('estList');
  if (!estimates.length) { el.innerHTML = `<div class="empty-state">No estimates yet.</div>`; return; }
  const sorted = [...estimates].sort((a,b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
  el.innerHTML = sorted.map(e => {
    const kind = estKind(e);
    const label = kind === 'signed' ? 'Signed' : kind === 'lost' ? 'Lost' : kind === 'draft' ? 'Draft' : escapeHtml((estState(e) || 'open').replace(/_/g,' '));
    return `
      <div class="est-card">
        <div class="est-id">
          <div>
            <div class="est-num">EST ${escapeHtml(e.estimate_number || (e.id || '').slice(0,8))}</div>
            <div class="est-date">${fmtDate(e.created_at)}${e.proposal_mode ? ' · ' + escapeHtml(e.proposal_mode) : ''}</div>
          </div>
          <span class="est-chip ${kind}">${label}</span>
        </div>
        ${tierBoxes(e)}
        <div class="est-actions">
          ${kind === 'signed' && e.final_accepted_total ? `<span class="est-accepted">✓ ${fmtMoney(e.final_accepted_total)}</span>` : ''}
          ${e.share_token ? `<a class="mini-btn" href="/proposal-client.html?share=${encodeURIComponent(e.share_token)}" target="_blank" rel="noopener">View Proposal</a>` : ''}
        </div>
      </div>`;
  }).join('');
}

function renderWorkorders(wos){
  document.getElementById('woCount').textContent = wos.length;
  const el = document.getElementById('woList');
  if (!wos.length) { el.innerHTML = `<div class="empty-state">No work orders linked yet.</div>`; return; }
  const sorted = [...wos].sort((a,b) => new Date(b.start_date || b.created_at || 0) - new Date(a.start_date || a.created_at || 0));
  el.innerHTML = sorted.map(w => {
    const st = String(w.status || 'draft').toLowerCase();
    return `
      <div class="wo-row ${escapeHtml(st)}">
        <div class="wo-rail"><div class="wo-dot"></div><div class="wo-line"></div></div>
        <div class="wo-body">
          <div class="wo-head">
            <span class="wo-num">${escapeHtml(w.wo_number || 'WO')}</span>
            <span class="est-chip ${st === 'complete' ? 'signed' : st === 'cancelled' ? 'lost' : st === 'draft' ? 'draft' : 'open'}">${escapeHtml(st.replace(/_/g,' '))}</span>
          </div>
          <div class="wo-meta">
            ${w.start_date ? `<span>▸ Start ${fmtDate(w.start_date)}</span>` : ''}
            ${w.completed_at ? `<span>✓ Done ${fmtDate(w.completed_at)}</span>` : ''}
            ${w.job_type ? `<span>${escapeHtml(String(w.job_type).replace(/_/g,' '))}</span>` : ''}
            ${w.sub_crew_lead ? `<span>Crew: ${escapeHtml(w.sub_crew_lead)}</span>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

function renderJobFolders(folders){
  if (!folders.length) return;
  document.getElementById('jfWrap').style.display = '';
  document.getElementById('jfCount').textContent = folders.length;
  document.getElementById('jfList').innerHTML = folders.map(f => `
    <a class="jf-row" href="/job.html?id=${encodeURIComponent(f.linked_workorder_id || f.id)}">
      <span class="jf-addr">${escapeHtml(f.address || 'Job folder')}</span>
      ${f.current_stage ? `<span class="jf-stage">${escapeHtml(String(f.current_stage).replace(/_/g,' '))}</span>` : ''}
    </a>`).join('');
}

function renderPhotos(photos, jobId){
  document.getElementById('photoCount').textContent = photos.length;
  const wrap = document.getElementById('photoWrap');
  if (!photos.length) { wrap.innerHTML = `<div class="empty-state">No job photos yet.${jobId ? ` <a class="mini-btn" style="margin-left:8px" href="/job.html?id=${encodeURIComponent(jobId)}">Open Job Page</a>` : ''}</div>`; return; }
  const MAX = 9; const shown = photos.slice(0, MAX); const extra = photos.length - shown.length;
  wrap.innerHTML = `
    <div class="photo-grid">
      ${shown.map(p => `<div class="photo-cell" data-url="${escapeHtml(p.url)}"><img loading="lazy" src="${escapeHtml(p.thumbnail_url || p.url)}" alt="${escapeHtml(p.caption || 'job photo')}"></div>`).join('')}
      ${jobId ? `<a class="photo-cell photo-more" href="/job.html?id=${encodeURIComponent(jobId)}">${extra > 0 ? '+' + extra + ' more' : 'Job ›'}</a>` : ''}
    </div>`;
  wrap.querySelectorAll('.photo-cell[data-url]').forEach(cell => cell.addEventListener('click', () => window.open(cell.dataset.url, '_blank', 'noopener')));
}

let authFailed = false;
async function fetchJson(url){
  const r = await fetch(url, { headers: _headers() });
  if (r.status === 401) { authFailed = true; return null; }
  if (!r.ok) return null;
  return r.json();
}

function terminalState(title, msg, auth){
  document.getElementById('pageTitle').textContent = title;
  const fill = '<div class="empty-state">' + escapeHtml(msg) + '</div>';
  for (const sid of ['timeline','woList','photoWrap','tpSlot']) { const el = document.getElementById(sid); if (el) el.innerHTML = fill; }
  const est = document.getElementById('estList');
  if (est) { if (auth && window.RyujinAuth && window.RyujinAuth.sessionEnded) window.RyujinAuth.sessionEnded(est); else est.innerHTML = fill; }
  document.getElementById('dealSlot').innerHTML = '';
  for (const cid of ['tlCount','estCount','woCount','photoCount']) { const el = document.getElementById(cid); if (el) el.textContent = '—'; }
}

const STATE = { ghlId: null, nativeId: null };
async function load(){
  if (!id) { showBanner('Missing customer id in URL.'); terminalState('Not Found', 'No customer id in the URL. Open a customer from the Client Navigator.', false); return; }
  let data;
  try { data = await fetchJson(`/api/customer-360?id=${encodeURIComponent(id)}`); }
  catch (e) { showBanner(`Network: ${e.message}`); terminalState('Could Not Load', `Network problem: ${e.message}. Refresh to retry.`, false); return; }

  if (!data || !data.ok) {
    showBanner(authFailed ? 'Session expired. Sign in again.' : 'Customer not found.');
    terminalState(authFailed ? 'Signed Out' : 'Not Found', authFailed ? 'Your session ended.' : 'No customer with this id.', authFailed);
    return;
  }

  const c = data.customer || {};
  STATE.ghlId = c.ghl_contact_id || null;
  STATE.nativeId = c.id || null;
  document.getElementById('pageTitle').textContent = c.full_name || 'Unnamed';
  document.title = `${c.full_name || 'Customer'} · Ryujin OS`;

  const s = data.stats || {};
  const estimates = data.estimates || [];
  const open = estimates.filter(e => ['open','draft'].includes(estKind(e)));
  const won = estimates.filter(e => estKind(e) === 'signed');

  renderHeader(c, customerStatus(won.length, open.length, s.jobCount || 0), data.ghlResolvedBy);
  renderDeal(data.deal);
  renderStats(s);
  renderTimeline(data.timeline || []);
  renderTalkingPoints(data.research);
  renderEstimates(estimates);
  renderWorkorders(data.workorders || []);
  renderJobFolders(data.jobFolders || []);
  // job.html keys by the native customer id (its projects join); fall back to none.
  renderPhotos(data.photos || [], STATE.nativeId);

  if (c.notes) { document.getElementById('notesWrap').style.display = ''; document.getElementById('notesBody').textContent = c.notes; }

  // Surface partial-source degradation honestly rather than a hollow "complete" card.
  const failed = Object.entries(data.sources || {}).filter(([,v]) => v && v.ok === false).map(([k]) => k);
  if (failed.length) showBanner(`Some sources were slow or unreachable: ${failed.join(', ')}. Showing what loaded.`);
}
load();
</script>
