<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060a14">
<title>Customer Profile · Ryujin OS</title>
<link rel="icon" href="/assets/logo/icon.png" onerror="this.href='/assets/logo/logo-glow.jpg'">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<script src="/assets/auth-guard.js"></script>
<script src="/assets/customer-toolbar.js" defer></script>
<style>
:root{--bg:#060a14;--glass:rgba(20,30,50,0.85);--glass-border:rgba(34,211,238,0.16);--glass-border-hi:rgba(34,211,238,0.35);--text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);--cyan:#22d3ee;--purple:#7c3aed;--green:#4ade80;--gold:#fbbf24;--orange:#fb923c;--radius:12px;--sidebar-w:72px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;overflow-x:hidden}
.sidebar{width:var(--sidebar-w);background:rgba(8,12,24,0.98);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;bottom:0;z-index:50}
.sidebar-logo{width:44px;height:44px;margin:18px 0 12px;border-radius:12px;background:url('/assets/logo/logo-glow.jpg') center/cover;box-shadow:0 0 20px rgba(34,211,238,0.3);cursor:pointer}
.sidebar-divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;margin:4px 0 8px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid transparent;color:var(--text-dim);text-decoration:none;transition:all 0.25s;position:relative}
.nav-icon:hover{background:rgba(34,211,238,0.06);color:var(--text)}
.nav-icon.active{background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(124,58,237,0.06));color:var(--cyan);border-color:rgba(34,211,238,0.2)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:3px;background:var(--cyan);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--cyan)}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.main{margin-left:var(--sidebar-w);padding:18px 22px 60px;max-width:1300px}
.hq-header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.hq-title .crumb{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hq-title h1{font-family:'Orbitron',monospace;font-size:1.7em;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,#e0e6f0 20%,var(--cyan) 70%,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hq-title .sub{font-size:0.85em;color:var(--text-dim);margin-top:6px}
.btn{font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:8px 16px;border-radius:18px;cursor:pointer;border:1px solid var(--glass-border);background:transparent;color:var(--text-dim);transition:all 0.2s;text-decoration:none;display:inline-block}
.btn:hover{color:var(--text);border-color:var(--glass-border-hi)}
.btn.primary{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#0a0e1a;border:none;box-shadow:0 0 12px rgba(34,211,238,0.3)}

.profile-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;padding:24px;margin-bottom:14px;position:relative;overflow:hidden}
.profile-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan) 30%,var(--purple) 70%,transparent);opacity:0.7}
.profile-name{font-family:'Orbitron',monospace;font-size:1.5em;font-weight:800;color:var(--text);margin-bottom:8px}
.profile-contact{display:flex;flex-wrap:wrap;gap:14px;font-size:0.88em;color:var(--text-dim);font-family:'Share Tech Mono',monospace;letter-spacing:0.5px;margin-bottom:14px}
.profile-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.pstat{background:rgba(6,10,20,0.4);border:1px solid var(--glass-border);border-radius:10px;padding:12px}
.pstat .v{font-family:'Orbitron',monospace;font-size:1.4em;font-weight:800}
.pstat .v.gold{color:var(--gold)}.pstat .v.cyan{color:var(--cyan)}.pstat .v.green{color:var(--green)}.pstat .v.purple{color:#a78bfa}
.pstat .l{font-family:'Orbitron',monospace;font-size:0.6em;letter-spacing:1.8px;color:var(--text-dim);text-transform:uppercase;margin-top:4px}

.section-head{display:flex;align-items:baseline;gap:10px;margin:18px 0 10px;font-family:'Orbitron',monospace}
.section-head h2{font-size:0.78em;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.section-head .count-pill{font-size:0.65em;font-family:'Share Tech Mono',monospace;padding:2px 8px;border-radius:10px;background:rgba(34,211,238,0.1);border:1px solid var(--glass-border);color:var(--cyan)}

.history-list{display:flex;flex-direction:column;gap:6px}
.history-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:12px;align-items:center;background:var(--glass);border:1px solid var(--glass-border);border-radius:8px;padding:10px 14px;font-size:0.85em}
.history-dot{width:10px;height:10px;border-radius:50%}
.history-dot.estimate{background:var(--cyan)}.history-dot.signed{background:var(--green);box-shadow:0 0 6px var(--green)}.history-dot.lost{background:var(--orange)}.history-dot.draft{background:var(--text-muted)}
.history-name{font-weight:600;color:var(--text)}
.history-meta{font-family:'Share Tech Mono',monospace;font-size:0.78em;color:var(--text-dim);letter-spacing:0.5px}
.history-amount{font-family:'Orbitron',monospace;font-weight:700;color:var(--cyan)}
.history-date{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-muted);letter-spacing:0.5px}

.empty-state{text-align:center;padding:24px 16px;color:var(--text-dim);border:1px dashed var(--glass-border);border-radius:var(--radius);font-size:0.85em}
.banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);font-size:0.8em;margin-bottom:14px}
.banner.warn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:var(--orange)}

@media(max-width:768px){.main{padding:12px}.hq-title h1{font-size:1.3em}}
</style>
</head>
<body>

<aside class="sidebar">
  <a href="/admin.html" class="sidebar-logo" title="Admin Home"></a>
  <div class="sidebar-divider"></div>
  <nav class="sidebar-nav">
    <a href="/admin-overview.html" class="nav-icon" title="Overview"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg></a>
    <a href="/marketing.html" class="nav-icon" title="Marketing"><svg viewBox="0 0 24 24"><path d="M3 11l18-9v18l-18-9zM7 13v6"/></svg></a>
    <a href="/sales.html" class="nav-icon" title="Sales"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9a4 4 0 100 8h6a4 4 0 110 8H6"/></svg></a>
    <a href="/production.html" class="nav-icon" title="Production"><svg viewBox="0 0 24 24"><path d="M2 22V12l10-7 10 7v10M2 12l10 7 10-7M9 22V14h6v8"/></svg></a>
    <a href="/service.html" class="nav-icon" title="Service"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg></a>
    <a href="/customer.html" class="nav-icon active" title="Customer"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/></svg></a>
    <a href="/admin.html" class="nav-icon" title="Full Admin"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></a>
  </nav>
</aside>

<main class="main">

  <div class="hq-header">
    <div class="hq-title">
      <div class="crumb">Customer · Profile</div>
      <h1 id="custName">Loading…</h1>
      <div class="sub">Full history: estimates, jobs, payments, callbacks, warranty claims.</div>
    </div>
    <a class="btn primary" href="/customer-list.html">← Back to List</a>
  </div>

  <div id="banner-slot"></div>

  <div class="profile-card" id="profileCard">
    <div class="profile-name">Loading…</div>
  </div>

  <div class="section-head"><h2>History</h2><span class="count-pill" id="historyCount">—</span></div>
  <div class="history-list" id="historyList"><div class="empty-state">Loading history…</div></div>

</main>

<script>
const TENANT = (function(){
  function pick(key){
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return null;
      try { const o = JSON.parse(raw); if (o && o.slug) return o.slug; } catch (e) {}
      if (typeof raw === 'string' && /^[a-z0-9-]{1,80}$/i.test(raw.trim())) return raw.trim();
    } catch (e) {}
    return null;
  }
  return pick('ryujin_tenant') || pick('ry_tenant_cfg') || 'plus-ultra';
})();
const params = new URLSearchParams(location.search);
const id = params.get('id');

function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtMoney(n) { if (n == null || isNaN(n)) return '—'; return '$' + Math.round(n).toLocaleString(); }
function fmtDate(iso) { if (!iso) return ''; return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
function showBanner(msg) { document.getElementById('banner-slot').innerHTML = `<div class="banner warn">${escapeHtml(msg)}</div>`; }

async function load() {
  if (!id) { showBanner('Missing customer id in URL.'); return; }
  try {
    const [cs, es] = await Promise.all([
      fetch(`/api/customers?id=${id}`, { headers: { 'x-tenant-id': TENANT, ...window.RyujinAuth.headers() } }),
      fetch(`/api/estimates?customer_id=${id}&limit=100`, { headers: { 'x-tenant-id': TENANT, ...window.RyujinAuth.headers() } })
    ]);
    let customer = null;
    if (cs.ok) {
      const data = await cs.json();
      customer = data.customer || data;
    }
    let estimates = [];
    if (es.ok) {
      const data = await es.json();
      estimates = data.estimates || data.data || [];
    }

    if (!customer) { showBanner('Customer not found.'); return; }

    document.getElementById('custName').textContent = customer.full_name || 'Unnamed';
    const sellingPrice = (e) => {
      const tier = (e.selected_package || 'gold').toLowerCase();
      const pkg = e.calculated_packages?.[tier] || {};
      return pkg.sellingPrice || pkg.total || 0;
    };
    const won = estimates.filter(e => ['closed_won','signed'].includes(e.state || e.status));
    const ltv = won.reduce((s, e) => s + sellingPrice(e), 0);
    const lastJob = won.map(e => e.closed_won_at || e.updated_at).filter(Boolean).sort().reverse()[0];

    document.getElementById('profileCard').innerHTML = `
      <div class="profile-name">${escapeHtml(customer.full_name || 'Unnamed')}</div>
      <div class="profile-contact">
        ${customer.email ? `<span>📧 ${escapeHtml(customer.email)}</span>` : ''}
        ${customer.phone ? `<span>📞 ${escapeHtml(customer.phone)}</span>` : ''}
        ${customer.address ? `<span>📍 ${escapeHtml(customer.address)}</span>` : ''}
        ${customer.city ? `<span>${escapeHtml(customer.city)}</span>` : ''}
      </div>
      <div class="profile-stats">
        <div class="pstat"><div class="v gold">${fmtMoney(ltv)}</div><div class="l">Lifetime Value</div></div>
        <div class="pstat"><div class="v cyan">${won.length}</div><div class="l">Jobs</div></div>
        <div class="pstat"><div class="v green">${estimates.length - won.length}</div><div class="l">Open Estimates</div></div>
        <div class="pstat"><div class="v purple">${lastJob ? fmtDate(lastJob) : '—'}</div><div class="l">Last Job</div></div>
      </div>
    `;

    // Render history
    const events = estimates.map(e => ({
      kind: ['closed_won','signed'].includes(e.state || e.status) ? 'signed' : ['closed_lost','lost'].includes(e.state || e.status) ? 'lost' : (e.state || e.status) === 'proposal_draft' ? 'draft' : 'estimate',
      label: `Estimate #${e.estimate_number || e.id?.slice(0,8)} · ${e.proposal_mode || ''} · ${e.state || e.status}`,
      amount: sellingPrice(e),
      at: e.closed_won_at || e.updated_at || e.created_at
    }));
    events.sort((a, b) => new Date(b.at) - new Date(a.at));
    document.getElementById('historyCount').textContent = events.length;
    const el = document.getElementById('historyList');
    if (events.length === 0) el.innerHTML = `<div class="empty-state">No history yet for this customer.</div>`;
    else el.innerHTML = events.map(ev => `<div class="history-row"><div class="history-dot ${ev.kind}"></div><div class="history-name">${escapeHtml(ev.label)}</div><div class="history-amount">${fmtMoney(ev.amount)}</div><div class="history-date">${fmtDate(ev.at)}</div></div>`).join('');
  } catch (e) { showBanner(`Network: ${e.message}`); }
}
load();
</script>
</body>
</html>
