<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0c0f">
<title>Plus Ultra - Team Live</title>
<style>#ry-mode-badge{display:none !important}</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
window.__ryujinDriveMounted=true; window.__ryujinGlobalNavInjected=true;
window.__ryujinPaletteInjected=true; window.__ryujinUnreadInjected=true;
window.__ryujinPrefetchInjected=true; window.__ryujinSkinInjected=true;
</script>
<script src="/assets/auth-guard.js"></script>
<style>
  :root{
    --bg:#0b0c0f; --surface:#14161b; --surface-2:#1a1d24; --row:#15171d;
    --border:#252932; --border-hi:#39404c;
    --text:#eceef2; --dim:#9aa2ae; --faint:#646b76;
    --accent:#5b9dff; --accent-dim:rgba(91,157,255,0.14);
    --blueprint:#5fc4e6; --bp-dim:rgba(95,196,230,0.12);
    --green:#56d68c; --amber:#f0a64f; --red:#f4736b; --violet:#b18cff;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
    --sans:Inter,system-ui,-apple-system,sans-serif; --r:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.4;min-height:100vh;
    background-image:radial-gradient(900px 500px at 85% -5%, rgba(91,157,255,.08), transparent 60%),radial-gradient(700px 500px at 0% 100%, rgba(95,196,230,.06), transparent 55%)}
  .bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:58px;background:rgba(11,12,15,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .bar .brand{font-weight:800;font-size:15px;letter-spacing:.3px}.bar .brand span{color:var(--blueprint)}
  .live{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12px;color:var(--green)}
  .live .pulse{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(86,214,140,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(86,214,140,.5)}70%{box-shadow:0 0 0 9px rgba(86,214,140,0)}100%{box-shadow:0 0 0 0 rgba(86,214,140,0)}}
  .wrap{max-width:1200px;margin:0 auto;padding:18px 18px 80px}
  .cols{display:grid;grid-template-columns:1fr;gap:22px}
  @media(min-width:960px){.cols{grid-template-columns:1.55fr .95fr;align-items:start}}
  .lbl{font-family:var(--mono);font-size:11px;letter-spacing:1.6px;color:var(--faint);text-transform:uppercase;margin:0 2px 12px;display:flex;justify-content:space-between;align-items:center}
  .lbl .n{color:var(--dim)}
  .ltiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:13px}
  .ltile{position:relative;background:linear-gradient(160deg,var(--surface),var(--row));border:1px solid var(--border);border-radius:var(--r);padding:16px;overflow:hidden;transition:border-color .2s}
  .ltile.online{border-color:rgba(86,214,140,.4);box-shadow:0 0 0 1px rgba(86,214,140,.12),0 10px 30px -16px rgba(86,214,140,.3)}
  .ltile.online::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);animation:scan 2.4s ease-in-out infinite}
  @keyframes scan{0%,100%{opacity:.35}50%{opacity:1}}
  .ltile.idle{opacity:.62}
  .lh{display:flex;align-items:center;gap:11px;margin-bottom:13px}
  .lav{width:44px;height:44px;border-radius:12px;background:var(--surface-2);border:1px solid var(--border-hi);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0;text-transform:uppercase;color:var(--blueprint)}
  .ltile.online .lav{color:var(--green);border-color:rgba(86,214,140,.4)}
  .ln{font-weight:700;font-size:15.5px;display:flex;align-items:center;gap:8px}
  .ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--faint)}
  .ltile.online .ldot{background:var(--green);box-shadow:0 0 9px var(--green);animation:blink 1.6s infinite}
  @keyframes blink{50%{opacity:.4}}
  .lr{font-family:var(--mono);font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--faint);margin-top:2px}
  .lnow{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:9px;min-height:22px}
  .lnow .ico{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--accent-dim)}
  .lnow .ico svg{width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .ltile.online .lnow .ico{background:rgba(86,214,140,.14)}.ltile.online .lnow .ico svg{stroke:var(--green)}
  .lago{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:9px}
  .ltile.online .lago{color:var(--green)}
  .feed{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;max-height:74vh;overflow-y:auto}
  .fitem{display:flex;gap:12px;align-items:center;padding:11px 14px;background:var(--row)}
  .fitem .fav{width:30px;height:30px;border-radius:9px;background:var(--surface-2);border:1px solid var(--border-hi);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;text-transform:uppercase;color:var(--dim)}
  .fitem .fb{flex:1;min-width:0}
  .fitem .fl{font-size:13.5px}.fitem .fl b{font-weight:700}.fitem .fl .act{color:var(--dim)}
  .fitem .fs{font-size:12px;color:var(--faint);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono)}
  .fitem .ft{font-family:var(--mono);font-size:10.5px;color:var(--faint);flex-shrink:0;white-space:nowrap}
  .ki{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .ki svg{width:13px;height:13px;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .k-clock_in{background:rgba(86,214,140,.12)}.k-clock_in svg{stroke:var(--green)}
  .k-clock_out{background:rgba(244,115,107,.1)}.k-clock_out svg{stroke:var(--red)}
  .k-photo,.k-video{background:var(--bp-dim)}.k-photo svg,.k-video svg{stroke:var(--blueprint)}
  .k-task_done{background:rgba(86,214,140,.12)}.k-task_done svg{stroke:var(--green)}
  .k-task_claim{background:var(--accent-dim)}.k-task_claim svg{stroke:var(--accent)}
  .k-message{background:rgba(177,140,255,.12)}.k-message svg{stroke:var(--violet)}
  .k-job,.k-file{background:var(--surface-2)}.k-job svg,.k-file svg{stroke:var(--dim)}
  .daydiv{font-family:var(--mono);font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.8px;padding:12px 14px 7px;background:var(--row)}
  .empty{text-align:center;color:var(--faint);font-size:13px;padding:30px 10px;background:var(--row);border-radius:var(--r);border:1px solid var(--border)}
  .err{background:rgba(244,115,107,.08);border:1px solid rgba(244,115,107,.3);border-radius:12px;padding:16px;color:var(--red);font-size:14px;margin-top:20px}
  .err a{color:var(--accent)}
</style>
</head>
<body>
<div class="bar">
  <div class="brand">PLUS&nbsp;ULTRA <span>· TEAM LIVE</span></div>
  <div class="live"><span class="pulse"></span><span id="liveTxt">live</span></div>
</div>

<div class="wrap">
  <div id="err"></div>
  <div class="cols">
    <div>
      <div class="lbl">Live now <span class="n" id="liveN">…</span></div>
      <div class="ltiles" id="tiles"><div class="empty">Connecting to the team…</div></div>
    </div>
    <div>
      <div class="lbl">Activity log <span class="n" id="logN"></span></div>
      <div id="log"><div class="empty">Loading history…</div></div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin + '/api';
const TENANT = window.RYUJIN_TENANT_SLUG || 'plus-ultra';
function tok(){ try { return localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token') || ''; } catch(e){ return ''; } }
async function api(path){ const h={'x-tenant-id':TENANT}; const t=tok(); if(t)h['Authorization']='Bearer '+t; const sep=path.includes('?')?'&':'?'; const r=await fetch(API+path+sep+'tenant='+TENANT,{headers:h}); return {status:r.status, body:await r.json().catch(()=>({}))}; }
function esc(s){ return (s==null?'':String(s)).replace(/[<>&"']/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(n){ return (String(n||'?').trim().split(/\s+/).map(p=>p[0]).slice(0,2).join('')||'?'); }
function ago(iso){ if(!iso) return ''; const s=(Date.now()-new Date(iso).getTime())/1000; if(s<60)return Math.max(1,Math.floor(s))+'s'; if(s<3600)return Math.floor(s/60)+'m'; if(s<86400)return Math.floor(s/3600)+'h'; return Math.floor(s/86400)+'d'; }
function secsTxt(s){ if(s<5)return'live now'; if(s<60)return s+'s ago'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; }
function dayKey(iso){ const d=new Date(iso),n=new Date(); const same=(a,b)=>a.toDateString()===b.toDateString(); if(same(d,n))return'Today'; const y=new Date(n);y.setDate(y.getDate()-1); if(same(d,y))return'Yesterday'; return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function timeStr(iso){ return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
function showErr(h){ document.getElementById('err').innerHTML = h?('<div class="err">'+h+'</div>'):''; }

const VIEW_ICON = {
  job:'<path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>',
  jobs:'<path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>',
  tasks:'<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>',
  schedule:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/>',
  clock:'<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/>',
  messages:'<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>',
  upload:'<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>'
};
function liveLine(p){
  if(p.action) return { t: p.action, icon: /upload|photo/i.test(p.action)?'upload':(/clock/i.test(p.action)?'clock':(p.view||'tasks')) };
  if(p.view==='job' && p.context) return { t:'In '+p.context, icon:'job' };
  const map={ tasks:'On their tasks', jobs:'Browsing jobs', schedule:'On the schedule', clock:'On the clock', messages:'In messages' };
  return { t: map[p.view] || ('In the app'), icon: p.view||'tasks' };
}
function vIcon(k){ return '<span class="ico"><svg viewBox="0 0 24 24">'+(VIEW_ICON[k]||VIEW_ICON.tasks)+'</svg></span>'; }

async function loadPresence(){
  const r = await api('/presence');
  if(r.status===401){ showErr('Sign in as an owner or admin to watch the team. <a href="/login.html">Log in</a>'); return; }
  if(r.status===403){ showErr('This live view is owner and admin only.'); return; }
  if(!r.body || !r.body.ok){ return; }
  showErr('');
  document.getElementById('liveTxt').textContent = 'updated '+timeStr(r.body.generatedAt);
  const recent = (r.body.presence||[]).filter(p=>p.secsAgo < 1800); // last 30 min = "live"
  const onlineN = recent.filter(p=>p.online).length;
  document.getElementById('liveN').textContent = onlineN+' online';
  const tiles=document.getElementById('tiles');
  if(!recent.length){ tiles.innerHTML='<div class="empty">Nobody is in the app right now. Tiles light up the moment someone opens it.</div>'; return; }
  tiles.innerHTML = recent.map(p=>{
    const L=liveLine(p);
    const cls = p.online?'online':'idle';
    return '<div class="ltile '+cls+'"><div class="lh"><div class="lav">'+esc(initials(p.name))+'</div><div>'
      + '<div class="ln">'+esc(p.name)+'<span class="ldot"></span></div><div class="lr">'+esc(p.role||'team')+'</div></div></div>'
      + '<div class="lnow">'+vIcon(L.icon)+'<span>'+esc(L.t)+'</span></div>'
      + '<div class="lago">'+(p.online?secsTxt(p.secsAgo):('last seen '+secsTxt(p.secsAgo)))+'</div></div>';
  }).join('');
}

const KI = {
  clock_in:'<polyline points="20 6 9 17 4 12"/>', clock_out:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  photo:'<rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/>',
  video:'<polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/>',
  task_done:'<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>',
  task_claim:'<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/>',
  message:'<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>',
  job:'<path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>',
  file:'<path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/>'
};
function kindIcon(k){ return '<span class="ki k-'+k+'"><svg viewBox="0 0 24 24">'+(KI[k]||KI.job)+'</svg></span>'; }

async function loadLog(){
  const r = await api('/team-activity?days=14&limit=120');
  if(!r.body || !r.body.ok) return;
  const feed = r.body.feed||[];
  document.getElementById('logN').textContent = feed.length+' events';
  const log=document.getElementById('log');
  if(!feed.length){ log.innerHTML='<div class="empty">No activity in the last 14 days.</div>'; return; }
  let h='<div class="feed">', curDay='';
  for(const e of feed){
    const dk=dayKey(e.at);
    if(dk!==curDay){ curDay=dk; h+='<div class="daydiv">'+dk+'</div>'; }
    h += '<div class="fitem">'+kindIcon(e.kind)+'<div class="fav">'+esc(initials(e.user))+'</div>'
      + '<div class="fb"><div class="fl"><b>'+esc(e.user)+'</b> <span class="act">'+esc(e.label)+'</span></div>'
      + (e.sub?'<div class="fs">'+esc(e.sub)+'</div>':'')+'</div><div class="ft">'+ago(e.at)+'</div></div>';
  }
  log.innerHTML = h+'</div>';
}

loadPresence(); loadLog();
setInterval(loadPresence, 4000);
setInterval(loadLog, 20000);
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden){ loadPresence(); loadLog(); } });
</script>
</body>
</html>
