<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0c0f">
<title>Plus Ultra - Team Live</title>
<style>#ry-mode-badge{display:none !important}</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
// Operator page: keep the auth-guard bearer injection + redirect, but opt out of
// the heavy fleet chrome so this reads as a clean cockpit.
window.__ryujinDriveMounted=true; window.__ryujinGlobalNavInjected=true;
window.__ryujinPaletteInjected=true; window.__ryujinUnreadInjected=true;
window.__ryujinPrefetchInjected=true; window.__ryujinSkinInjected=true;
</script>
<script src="/assets/auth-guard.js"></script>
<style>
  :root{
    --bg:#0b0c0f; --surface:#14161b; --surface-2:#1a1d24; --row:#15171d;
    --border:#252932; --border-hi:#39404c;
    --text:#eceef2; --dim:#9aa2ae; --faint:#646b76;
    --accent:#5b9dff; --accent-dim:rgba(91,157,255,0.14);
    --blueprint:#5fc4e6; --bp-dim:rgba(95,196,230,0.12);
    --green:#56d68c; --amber:#f0a64f; --red:#f4736b; --violet:#b18cff;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
    --sans:Inter,system-ui,-apple-system,sans-serif; --r:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.4;min-height:100vh;
    background-image:radial-gradient(900px 500px at 85% -5%, rgba(91,157,255,.08), transparent 60%),radial-gradient(700px 500px at 0% 100%, rgba(95,196,230,.06), transparent 55%)}
  .bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:58px;background:rgba(11,12,15,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .bar .brand{font-weight:800;font-size:15px;letter-spacing:.3px}.bar .brand span{color:var(--blueprint)}
  .bar .right{display:flex;align-items:center;gap:14px}
  .live{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12px;color:var(--green)}
  .live .pulse{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(86,214,140,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(86,214,140,.5)}70%{box-shadow:0 0 0 9px rgba(86,214,140,0)}100%{box-shadow:0 0 0 0 rgba(86,214,140,0)}}
  .wrap{max-width:1160px;margin:0 auto;padding:20px 18px 80px}
  .lbl{font-family:var(--mono);font-size:11px;letter-spacing:1.6px;color:var(--faint);text-transform:uppercase;margin:26px 2px 12px;display:flex;justify-content:space-between;align-items:center}
  .lbl:first-child{margin-top:6px}.lbl .n{color:var(--dim)}
  .online{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:4px}
  .ochip{display:flex;align-items:center;gap:8px;padding:8px 13px;background:rgba(86,214,140,.08);border:1px solid rgba(86,214,140,.25);border-radius:999px;font-size:13px;font-weight:600}
  .ochip .d{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  .ochip .since{font-family:var(--mono);font-size:11px;color:var(--dim);font-weight:400}
  .ochip.none{background:var(--row);border-color:var(--border);color:var(--faint);font-weight:400}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:13px}
  .pcard{background:linear-gradient(160deg,var(--surface),var(--row));border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:border-color .15s,transform .15s}
  .pcard:hover{border-color:var(--border-hi);transform:translateY(-2px)}
  .pcard .ph{display:flex;align-items:center;gap:11px;margin-bottom:13px}
  .av{width:42px;height:42px;border-radius:12px;background:var(--surface-2);border:1px solid var(--border-hi);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0;text-transform:uppercase;color:var(--blueprint)}
  .pcard .nm{font-weight:700;font-size:15.5px;display:flex;align-items:center;gap:7px}
  .pcard .nm .od{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex-shrink:0}
  .pcard .rl{font-family:var(--mono);font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--faint);margin-top:2px}
  .pcard .nums{display:flex;gap:18px;margin-bottom:12px}
  .pcard .num .v{font-size:24px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
  .pcard .num .l{font-family:var(--mono);font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--faint);margin-top:1px}
  .pcard .num .v.dim{color:var(--dim)}
  .brk{display:flex;gap:6px;flex-wrap:wrap}
  .bpill{font-family:var(--mono);font-size:10.5px;padding:3px 8px;border-radius:7px;background:var(--surface-2);border:1px solid var(--border);color:var(--dim);display:flex;align-items:center;gap:5px}
  .bpill b{color:var(--text);font-weight:700}
  .pcard .last{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:11px}
  .feed{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
  .fitem{display:flex;gap:13px;align-items:center;padding:13px 16px;background:var(--row)}
  .fitem .fav{width:34px;height:34px;border-radius:10px;background:var(--surface-2);border:1px solid var(--border-hi);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;text-transform:uppercase;color:var(--dim)}
  .fitem .fb{flex:1;min-width:0}
  .fitem .fl{font-size:14px}.fitem .fl b{font-weight:700}
  .fitem .fl .act{color:var(--dim)}
  .fitem .fs{font-size:12.5px;color:var(--faint);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono)}
  .fitem .ft{font-family:var(--mono);font-size:11px;color:var(--faint);flex-shrink:0;white-space:nowrap}
  .ki{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .ki svg{width:14px;height:14px;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .k-clock_in{background:rgba(86,214,140,.12)}.k-clock_in svg{stroke:var(--green)}
  .k-clock_out{background:rgba(244,115,107,.1)}.k-clock_out svg{stroke:var(--red)}
  .k-photo,.k-video{background:var(--bp-dim)}.k-photo svg,.k-video svg{stroke:var(--blueprint)}
  .k-task_done{background:rgba(86,214,140,.12)}.k-task_done svg{stroke:var(--green)}
  .k-task_claim{background:var(--accent-dim)}.k-task_claim svg{stroke:var(--accent)}
  .k-message{background:rgba(177,140,255,.12)}.k-message svg{stroke:var(--violet)}
  .k-job{background:var(--surface-2)}.k-job svg{stroke:var(--dim)}
  .k-file{background:var(--surface-2)}.k-file svg{stroke:var(--dim)}
  .daydiv{font-family:var(--mono);font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.8px;padding:14px 16px 8px;background:var(--row)}
  .empty{text-align:center;color:var(--faint);font-size:13.5px;padding:36px 10px}
  .err{background:rgba(244,115,107,.08);border:1px solid rgba(244,115,107,.3);border-radius:12px;padding:16px;color:var(--red);font-size:14px;margin-top:20px}
</style>
</head>
<body>
<div class="bar">
  <div class="brand">PLUS&nbsp;ULTRA <span>· TEAM LIVE</span></div>
  <div class="right">
    <div class="live"><span class="pulse"></span><span id="liveTxt">live</span></div>
  </div>
</div>

<div class="wrap" id="root"><div class="empty">Loading the team feed…</div></div>

<script>
const API = window.location.origin + '/api';
const TENANT = window.RYUJIN_TENANT_SLUG || 'plus-ultra';
function tok(){ try { return localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token') || ''; } catch(e){ return ''; } }
async function api(path){
  const h = { 'x-tenant-id':TENANT }; const t=tok(); if(t) h['Authorization']='Bearer '+t;
  const sep = path.includes('?') ? '&' : '?';
  const r = await fetch(API+path+sep+'tenant='+TENANT, { headers:h });
  return { status:r.status, body: await r.json().catch(()=>({})) };
}
function esc(s){ return (s==null?'':String(s)).replace(/[<>&"']/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(n){ return (String(n||'?').trim().split(/\s+/).map(p=>p[0]).slice(0,2).join('')||'?'); }
function ago(iso){ if(!iso) return ''; const s=(Date.now()-new Date(iso).getTime())/1000; if(s<60)return Math.max(1,Math.floor(s))+'s'; if(s<3600)return Math.floor(s/60)+'m'; if(s<86400)return Math.floor(s/3600)+'h'; return Math.floor(s/86400)+'d'; }
function dayKey(iso){ const d=new Date(iso), n=new Date(); const same=(a,b)=>a.toDateString()===b.toDateString(); if(same(d,n))return'Today'; const y=new Date(n); y.setDate(y.getDate()-1); if(same(d,y))return'Yesterday'; return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function timeStr(iso){ return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }

const KI = {
  clock_in:'<polyline points="20 6 9 17 4 12"/>', clock_out:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  photo:'<rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/>',
  video:'<polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/>',
  task_done:'<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>',
  task_claim:'<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/>',
  message:'<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>',
  job:'<path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>', file:'<path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/>'
};
function kindIcon(k){ return '<span class="ki k-'+k+'"><svg viewBox="0 0 24 24">'+(KI[k]||KI.job)+'</svg></span>'; }
const BRK_LABEL = { clock_in:'in', clock_out:'out', photo:'photos', video:'clips', task_done:'done', task_claim:'tasks', message:'msgs', job:'edits', file:'files' };

let timer=null;
async function load(){
  const r = await api('/team-activity?days=14&limit=140');
  const root = document.getElementById('root');
  if(r.status===401){ root.innerHTML='<div class="err">Sign in as an owner or admin to view the team feed. <a href="/login.html" style="color:var(--accent)">Log in</a></div>'; return; }
  if(r.status===403){ root.innerHTML='<div class="err">This live feed is owner and admin only.</div>'; return; }
  if(!r.body || !r.body.ok){ root.innerHTML='<div class="err">Could not load the feed right now. Retrying…</div>'; return; }
  const { feed=[], byUser=[], online=[], generatedAt } = r.body;
  document.getElementById('liveTxt').textContent = 'updated '+timeStr(generatedAt);

  let h = '';
  // Online now
  h += '<div class="lbl">On the clock now <span class="n">'+online.length+'</span></div><div class="online">';
  h += online.length ? online.map(o=>'<div class="ochip"><span class="d"></span>'+esc(o.name)+'<span class="since">since '+timeStr(o.since)+'</span></div>').join('')
    : '<div class="ochip none">Nobody clocked in right now</div>';
  h += '</div>';

  // Per-person portals
  const onlineSet = new Set(online.map(o=>o.userId));
  h += '<div class="lbl">Portals <span class="n">'+byUser.length+' active</span></div><div class="cards">';
  h += byUser.map(u=>{
    const brk = Object.entries(u.breakdown||{}).filter(([k,v])=>v>0).slice(0,4)
      .map(([k,v])=>'<span class="bpill"><b>'+v+'</b>'+(BRK_LABEL[k]||k)+'</span>').join('');
    return '<div class="pcard"><div class="ph"><div class="av">'+esc(initials(u.name))+'</div><div>'
      + '<div class="nm">'+esc(u.name)+(onlineSet.has(u.userId)?'<span class="od"></span>':'')+'</div>'
      + '<div class="rl">'+esc(u.role||'team')+'</div></div></div>'
      + '<div class="nums"><div class="num"><div class="v">'+u.last24h+'</div><div class="l">today</div></div>'
      + '<div class="num"><div class="v dim">'+u.last7d+'</div><div class="l">7 days</div></div></div>'
      + '<div class="brk">'+(brk||'<span class="bpill">quiet</span>')+'</div>'
      + '<div class="last">last seen '+ago(u.lastActive)+' ago</div></div>';
  }).join('');
  h += '</div>';

  // Live feed
  h += '<div class="lbl">Live activity <span class="n">'+feed.length+' events</span></div>';
  if(!feed.length){ h += '<div class="empty">No activity in the last 14 days.</div>'; }
  else {
    h += '<div class="feed">';
    let curDay='';
    for(const e of feed){
      const dk=dayKey(e.at);
      if(dk!==curDay){ curDay=dk; h += '<div class="daydiv">'+dk+'</div>'; }
      h += '<div class="fitem">'+kindIcon(e.kind)
        + '<div class="fav">'+esc(initials(e.user))+'</div>'
        + '<div class="fb"><div class="fl"><b>'+esc(e.user)+'</b> <span class="act">'+esc(e.label)+'</span></div>'
        + (e.sub?'<div class="fs">'+esc(e.sub)+'</div>':'')+'</div>'
        + '<div class="ft">'+ago(e.at)+'</div></div>';
    }
    h += '</div>';
  }
  root.innerHTML = h;
}
load();
timer = setInterval(load, 20000);
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) load(); });
</script>
</body>
</html>
