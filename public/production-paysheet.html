<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Pay Sheets</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
:root{--accent:#fb923c;--accent-deep:#c2410c;--green:#4ade80;--red:#f87171;--yellow:#facc15;--blue:#22d3ee;--gray:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow-x:hidden;min-height:100vh}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(251,146,60,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(248,113,113,0.06) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(251,146,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(251,146,60,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}

.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(251,146,60,0.24);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#fb923c,#f87171,transparent);opacity:0.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.3),rgba(251,146,60,0.22) 40%,rgba(30,10,5,0.8));box-shadow:0 0 14px rgba(251,146,60,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #fff;border-radius:10px;color:#030611;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none;transition:all 0.2s}
.btn-back:hover{background:rgba(255,255,255,0.85);box-shadow:0 0 14px rgba(255,255,255,0.35)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}

.stage{position:relative;z-index:5;padding:80px 28px 60px;max-width:1280px;margin:0 auto}

.hero{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.hero .eyebrow{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:#fb923c;letter-spacing:3px;margin-bottom:6px}
.hero h1{font-family:'Orbitron',sans-serif;font-size:2em;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{padding:14px 18px;background:rgba(14,22,40,0.55);border:1px solid rgba(251,146,60,0.16);border-radius:12px}
.stat .lbl{font-family:'Share Tech Mono',monospace;font-size:0.66em;color:rgba(200,220,255,0.5);letter-spacing:1.5px;text-transform:uppercase}
.stat .val{font-family:'Orbitron',sans-serif;font-size:1.4em;font-weight:900;color:#fb923c;margin-top:4px}
@media (max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}}

.search{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search input{flex:1;min-width:220px;padding:11px 14px;background:rgba(6,10,20,0.55);border:1px solid rgba(251,146,60,0.18);border-radius:10px;color:#e0e6f0;font-family:'Inter',sans-serif;font-size:0.94em;outline:none;transition:all 0.2s}
.search input:focus{border-color:rgba(251,146,60,0.5);box-shadow:0 0 14px rgba(251,146,60,0.18)}
.search select{padding:11px 14px;background:rgba(6,10,20,0.55);border:1px solid rgba(251,146,60,0.18);border-radius:10px;color:#e0e6f0;font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1px;cursor:pointer;outline:none}

.list{display:flex;flex-direction:column;gap:8px}
.row{display:grid;grid-template-columns:2fr 130px 110px 110px 130px 40px;align-items:center;gap:12px;padding:14px 18px;background:rgba(14,22,40,0.55);border:1px solid rgba(251,146,60,0.12);border-radius:12px;transition:all 0.2s;cursor:pointer}
.row:hover{border-color:rgba(251,146,60,0.5);background:rgba(14,22,40,0.75);transform:translateX(3px)}
.row.head{background:transparent;border-color:transparent;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.66em;letter-spacing:2px;text-transform:uppercase;cursor:default;padding:8px 18px;margin-bottom:-4px}
.row.head:hover{transform:none;border-color:transparent;background:transparent}
.row .job-id{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:#fb923c;letter-spacing:1px;margin-bottom:2px}
.row .addr{font-weight:600;font-size:0.95em}
.row .cust{font-size:0.78em;color:rgba(200,220,255,0.62);margin-top:2px}
.row .total{font-family:'Orbitron',sans-serif;font-size:1em;font-weight:800;color:#fb923c}
.row .balance{font-family:'Share Tech Mono',monospace;font-size:0.78em}
.row .arrow{justify-self:end;color:rgba(251,146,60,0.5)}
.row:hover .arrow{color:#fb923c;transform:translateX(4px);transition:all 0.2s}
.row .arrow svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.badge{display:inline-block;padding:3px 9px;font-family:'Share Tech Mono',monospace;font-size:0.62em;font-weight:700;letter-spacing:1.5px;border-radius:5px}
@media (max-width:760px){
  .row{grid-template-columns:1fr auto}
  .row>div:nth-child(3),.row>div:nth-child(4),.row>div:nth-child(5){display:none}
  .row.head{display:none}
}

.empty{text-align:center;padding:60px 20px;color:rgba(200,220,255,0.5);font-size:0.95em;line-height:1.6}
.loading{text-align:center;padding:40px;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1.5px}

/* Edit-mode inputs */
.edit-in{background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.25);border-radius:5px;color:#e0e6f0;padding:3px 6px;font-family:inherit;font-size:0.9em;outline:none;transition:border 0.15s;width:100%;box-sizing:border-box}
.edit-in:focus{border-color:#fb923c;background:rgba(6,10,20,0.9)}
.edit-in.num{text-align:right;font-family:'Orbitron',sans-serif;font-weight:700}
.edit-in.narrow{max-width:90px}
.btn-sm{padding:5px 10px;border-radius:6px;font-family:'Orbitron',sans-serif;font-size:0.6em;font-weight:800;letter-spacing:1.2px;cursor:pointer;transition:all 0.15s;border:1px solid}
.btn-sm.add{background:rgba(74,222,128,0.14);color:#4ade80;border-color:rgba(74,222,128,0.4)}
.btn-sm.add:hover{background:rgba(74,222,128,0.22)}
.btn-sm.del{background:rgba(248,113,113,0.1);color:#f87171;border-color:rgba(248,113,113,0.3);padding:3px 8px}
.btn-sm.del:hover{background:rgba(248,113,113,0.22)}
.btn-sm.save{background:rgba(74,222,128,0.22);color:#4ade80;border-color:#4ade80;padding:7px 16px;font-size:0.66em}
.btn-sm.cancel{background:rgba(148,163,184,0.12);color:#94a3b8;border-color:rgba(148,163,184,0.3);padding:7px 16px;font-size:0.66em}

/* Detail modal */
.modal-bg{position:fixed;inset:0;background:rgba(3,6,17,0.88);backdrop-filter:blur(14px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal-bg.on{display:flex}
.modal{max-width:920px;width:100%;background:rgba(10,18,34,0.98);border:1px solid rgba(251,146,60,0.45);border-radius:16px;padding:28px 32px;position:relative;box-shadow:0 28px 80px rgba(0,0,0,0.6)}
.modal-close{position:absolute;top:16px;right:18px;background:none;border:none;color:rgba(200,220,255,0.5);font-size:1.5em;cursor:pointer;padding:6px 10px;border-radius:6px}
.modal-close:hover{color:#fb923c;background:rgba(251,146,60,0.1)}
.modal h2{font-family:'Orbitron',sans-serif;font-size:1.4em;font-weight:900;background:linear-gradient(135deg,#fff,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.modal .sub{font-family:'Share Tech Mono',monospace;font-size:0.74em;color:rgba(200,220,255,0.65);letter-spacing:1.5px;margin-bottom:18px}
.modal-section{margin-top:20px}
.modal-section h3{font-family:'Orbitron',sans-serif;font-size:0.74em;font-weight:800;letter-spacing:2.5px;color:#fb923c;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(251,146,60,0.14)}
.mtable{width:100%;border-collapse:collapse;font-size:0.9em}
.mtable td,.mtable th{padding:8px 10px;border-bottom:1px solid rgba(251,146,60,0.06);text-align:left}
.mtable th{font-family:'Share Tech Mono',monospace;font-size:0.66em;color:rgba(200,220,255,0.45);letter-spacing:1.5px;text-transform:uppercase;font-weight:500}
.mtable td.num{text-align:right;font-family:'Orbitron',sans-serif;font-weight:700}
.mtable tr.total td{font-weight:800;color:#fb923c;border-top:1px solid rgba(251,146,60,0.22)}
.note-list{list-style:none;padding:0}
.note-list li{padding:5px 0;color:rgba(200,220,255,0.82);font-size:0.88em;line-height:1.55;padding-left:18px;position:relative}
.note-list li::before{content:'·';position:absolute;left:6px;color:#fb923c;font-weight:700;font-size:1.3em;line-height:1}
</style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="btn-back" href="production.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> BACK</a>
  <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· PAY SHEETS</span></div></div>
  <div class="tb-spacer"></div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px" id="countBadge">—</div>
</div>

<div class="stage">
  <div class="hero">
    <div class="hero-left">
      <div class="eyebrow">PRODUCTION · SUB PAY TRACKER</div>
      <h1>Pay Sheets</h1>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="lbl">Total</div><div class="val" id="sTotal">—</div></div>
    <div class="stat"><div class="lbl">Scheduled</div><div class="val" id="sSched">—</div></div>
    <div class="stat"><div class="lbl">Completed</div><div class="val" id="sDone">—</div></div>
    <div class="stat"><div class="lbl">Pipeline $</div><div class="val" id="sPipe">—</div></div>
  </div>

  <div class="search">
    <input id="searchIn" type="text" placeholder="Search by address, job ID, or customer..." oninput="applyFilter()"/>
    <select id="sortIn" onchange="applyFilter()">
      <option value="new">Newest first</option>
      <option value="old">Oldest first</option>
      <option value="status">By status</option>
      <option value="value">Highest total</option>
    </select>
    <select id="filterIn" onchange="applyFilter()">
      <option value="all">All statuses</option>
      <option value="scheduled">Scheduled</option>
      <option value="in_progress">In Progress</option>
      <option value="invoice_final">Invoice Final</option>
      <option value="completed">Completed</option>
    </select>
  </div>

  <div class="list" id="listHost">
    <div class="loading">LOADING PAY SHEETS...</div>
  </div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBody"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = n => n ? '$' + (n).toLocaleString('en-CA',{minimumFractionDigits:0,maximumFractionDigits:2}) : '—';
const moneyK = n => n ? '$' + Math.round(n/1000) + 'K' : '—';

const STATUS_STYLE = {
  scheduled: { color: '#facc15', bg: 'rgba(250,204,21,0.14)' },
  in_progress: { color: '#22d3ee', bg: 'rgba(34,211,238,0.14)' },
  invoice_final: { color: '#fb923c', bg: 'rgba(251,146,60,0.14)' },
  completed: { color: '#4ade80', bg: 'rgba(74,222,128,0.14)' },
  cancelled: { color: '#f87171', bg: 'rgba(248,113,113,0.14)' }
};
const statusBadge = s => {
  const m = STATUS_STYLE[s] || STATUS_STYLE.scheduled;
  return `<span class="badge" style="background:${m.bg};color:${m.color};border:1px solid ${m.color}33">${s.replace(/_/g,' ').toUpperCase()}</span>`;
};

function relDate(iso){
  if (!iso) return '—';
  const d = new Date(iso);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.round(diff/60) + 'm ago';
  if (diff < 86400) return Math.round(diff/3600) + 'h ago';
  if (diff < 604800) return Math.round(diff/86400) + 'd ago';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

let CACHED = [];
let LOADED = false;

async function loadAll(){
  try {
    const r = await fetch('/api/paysheets?limit=200', { headers: { 'x-tenant-id': 'plus-ultra' } });
    if (!r.ok) { $('listHost').innerHTML = '<div class="empty">Could not load pay sheets. HTTP ' + r.status + '.</div>'; return; }
    const { paysheets } = await r.json();
    CACHED = Array.isArray(paysheets) ? paysheets : [];
    LOADED = true;
    renderStats(CACHED);
    applyFilter();
    $('countBadge').textContent = CACHED.length + ' SHEETS';
    return CACHED;
  } catch(e) {
    $('listHost').innerHTML = '<div class="empty">Error: ' + esc(e.message) + '</div>';
    return [];
  }
}

function renderStats(list){
  $('sTotal').textContent = list.length;
  $('sSched').textContent = list.filter(p => p.status === 'scheduled').length;
  $('sDone').textContent = list.filter(p => ['completed','invoice_final'].includes(p.status)).length;
  const pipe = list.filter(p => ['scheduled','in_progress','invoice_final'].includes(p.status))
                   .reduce((s,p) => s + (Number(p.total)||0), 0);
  $('sPipe').textContent = pipe ? moneyK(pipe) : '—';
}

function renderList(list){
  const host = $('listHost');
  if (!list.length) {
    if (!LOADED) { host.innerHTML = '<div class="loading">LOADING PAY SHEETS...</div>'; return; }
    host.innerHTML = '<div class="empty">No pay sheets match.</div>';
    return;
  }
  const head = `<div class="row head"><div>ADDRESS / CUSTOMER</div><div>STATUS</div><div>UPDATED</div><div>BALANCE</div><div style="text-align:right">TOTAL</div><div></div></div>`;
  const rows = list.map(p => `
    <div class="row" onclick="openDetailById('${esc(p.id)}')">
      <div>
        <div class="job-id">${esc(p.job_id || '—')}</div>
        <div class="addr">${esc(p.address || '')}</div>
        <div class="cust">${esc(p.customer_name || '—')}</div>
      </div>
      <div>${statusBadge(p.status || 'scheduled')}</div>
      <div class="balance" style="color:rgba(200,220,255,0.7)">${esc(relDate(p.updated_at))}</div>
      <div class="balance" style="color:${Number(p.balance_due) > 0 ? '#facc15' : '#4ade80'}">${money(Number(p.balance_due)||0)}</div>
      <div class="total" style="text-align:right">${money(Number(p.total)||0)}</div>
      <div class="arrow"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
    </div>
  `).join('');
  host.innerHTML = head + rows;
}

function applyFilter(){
  const q = ($('searchIn').value || '').toLowerCase();
  const status = $('filterIn').value;
  const sort = $('sortIn').value;
  let list = CACHED.slice();
  if (status !== 'all') list = list.filter(p => p.status === status);
  if (q) list = list.filter(p => ((p.address||'') + ' ' + (p.job_id||'') + ' ' + (p.customer_name||'')).toLowerCase().includes(q));
  if (sort === 'old') list.sort((a,b) => new Date(a.updated_at) - new Date(b.updated_at));
  else if (sort === 'status') list.sort((a,b) => (a.status||'').localeCompare(b.status||''));
  else if (sort === 'value') list.sort((a,b) => (Number(b.total)||0) - (Number(a.total)||0));
  else list.sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
  renderList(list);
}

let EDIT_WORKING = null;

function openDetailById(id){
  const idx = CACHED.findIndex(p => p.id === id);
  if (idx >= 0) openDetail(idx);
}

function enterEdit(id){
  const p = CACHED.find(x => x.id === id);
  if (!p) return;
  // Deep-copy so cancel restores cleanly
  EDIT_WORKING = JSON.parse(JSON.stringify(p));
  renderEditModal();
}

function cancelEdit(){
  EDIT_WORKING = null;
  const id = $('modalBody').dataset.editingId;
  if (id) openDetailById(id);
}

async function saveEdit(){
  if (!EDIT_WORKING) return;
  recomputeTotals(EDIT_WORKING);
  try {
    const r = await fetch('/api/paysheets', {
      method: 'PUT',
      headers: {'x-tenant-id': 'plus-ultra', 'Content-Type': 'application/json'},
      body: JSON.stringify({
        id: EDIT_WORKING.id,
        labour_breakdown: EDIT_WORKING.labour_breakdown,
        add_ons: EDIT_WORKING.add_ons,
        surcharges: EDIT_WORKING.surcharges,
        subtotal: EDIT_WORKING.subtotal,
        hst: EDIT_WORKING.hst,
        total: EDIT_WORKING.total,
        balance_due: EDIT_WORKING.total - (EDIT_WORKING.paid_to_date || 0),
        scope_notes: (EDIT_WORKING.scope_notes || []).filter(s => String(s).trim()),
        pricing_sources: (EDIT_WORKING.pricing_sources || []).filter(s => String(s).trim()),
        outstanding: (EDIT_WORKING.outstanding || []).filter(s => String(s).trim())
      })
    });
    if (!r.ok) { alert('Save failed: HTTP ' + r.status); return; }
    const updated = await r.json();
    // Replace in cache
    const i = CACHED.findIndex(x => x.id === updated.id);
    if (i >= 0) CACHED[i] = updated;
    EDIT_WORKING = null;
    openDetailById(updated.id);
    renderStats(CACHED);
    applyFilter();
  } catch(e) { alert('Save error: ' + e.message); }
}

function recomputeTotals(p){
  const sum = arr => (arr || []).reduce((s,x) => s + (Number(x.total)||0), 0);
  p.subtotal = sum(p.labour_breakdown) + sum(p.add_ons) + sum(p.surcharges);
  p.hst = Math.round(p.subtotal * 0.15 * 100) / 100;
  p.total = Math.round((p.subtotal + p.hst) * 100) / 100;
  const tot = $('eTotal'); if (tot) tot.textContent = money(p.total);
  const sub = $('eSubtotal'); if (sub) sub.textContent = money(p.subtotal);
  const hst = $('eHst'); if (hst) hst.textContent = money(p.hst);
}

function updateLine(section, idx, field, value){
  const p = EDIT_WORKING; if (!p) return;
  const arr = p[section]; if (!arr || !arr[idx]) return;
  if (field === 'total' || field === 'qty_sq') {
    arr[idx][field] = value === '' ? 0 : Number(value);
  } else {
    arr[idx][field] = value;
  }
  recomputeTotals(p);
}

function addLine(section){
  if (!EDIT_WORKING) return;
  EDIT_WORKING[section] = EDIT_WORKING[section] || [];
  EDIT_WORKING[section].push({ description: '', qty: section === 'labour_breakdown' ? 0 : '', rate: '', total: 0 });
  renderEditModal();
}

function removeLine(section, idx){
  if (!EDIT_WORKING) return;
  EDIT_WORKING[section].splice(idx, 1);
  renderEditModal();
}

function updateTextLine(field, idx, value){
  if (!EDIT_WORKING) return;
  EDIT_WORKING[field] = EDIT_WORKING[field] || [];
  EDIT_WORKING[field][idx] = value;
}
function addTextLine(field){
  if (!EDIT_WORKING) return;
  EDIT_WORKING[field] = EDIT_WORKING[field] || [];
  EDIT_WORKING[field].push('');
  renderEditModal();
}
function removeTextLine(field, idx){
  if (!EDIT_WORKING) return;
  EDIT_WORKING[field].splice(idx, 1);
  renderEditModal();
}

function renderEditModal(){
  const p = EDIT_WORKING; if (!p) return;
  const editRow = (section, line, i) => {
    const qty = section === 'labour_breakdown' ? (line.qty_sq ?? '') : (line.qty || '');
    const qtyField = section === 'labour_breakdown' ? 'qty_sq' : 'qty';
    return `<tr>
      <td><input class="edit-in" value="${esc(line.description||'')}" oninput="updateLine('${section}',${i},'description',this.value)"></td>
      <td style="width:90px"><input class="edit-in narrow" value="${esc(qty)}" oninput="updateLine('${section}',${i},'${qtyField}',this.value)"></td>
      <td style="width:90px"><input class="edit-in narrow" value="${esc(line.rate_per_sq || line.rate || '')}" oninput="updateLine('${section}',${i},'${section==='labour_breakdown'?'rate_per_sq':'rate'}',this.value)"></td>
      <td style="width:100px"><input class="edit-in num" value="${line.total ?? 0}" oninput="updateLine('${section}',${i},'total',this.value)"></td>
      <td style="width:36px"><button class="btn-sm del" onclick="removeLine('${section}',${i})" title="Remove">×</button></td>
    </tr>`;
  };

  const textListSection = (field, title, lines) => `
    <div class="modal-section">
      <h3>${title}</h3>
      ${(lines||[]).map((t,i) => `
        <div style="display:flex;gap:6px;margin-bottom:5px;align-items:flex-start">
          <textarea class="edit-in" rows="2" style="flex:1;resize:vertical;min-height:32px;font-family:inherit" oninput="updateTextLine('${field}',${i},this.value)">${esc(t)}</textarea>
          <button class="btn-sm del" onclick="removeTextLine('${field}',${i})" title="Remove">×</button>
        </div>`).join('') || '<div style="color:rgba(200,220,255,0.35);padding:8px 0;font-family:Share Tech Mono,monospace;font-size:0.72em;letter-spacing:1.5px">NO ENTRIES</div>'}
      <button class="btn-sm add" style="margin-top:6px" onclick="addTextLine('${field}')">+ ADD</button>
    </div>`;

  const table = (section, title, lines) => `
    <div class="modal-section">
      <h3>${title}</h3>
      <table class="mtable"><thead>
        <tr><th>Description</th><th>Qty</th><th>Rate</th><th style="text-align:right">Total</th><th></th></tr>
      </thead><tbody>
        ${(lines||[]).map((l,i) => editRow(section, l, i)).join('') || '<tr><td colspan="5" style="color:rgba(200,220,255,0.35);padding:10px;font-family:Share Tech Mono,monospace;font-size:0.72em;letter-spacing:1.5px;text-align:center">NO LINES</td></tr>'}
      </tbody></table>
      <button class="btn-sm add" style="margin-top:8px" onclick="addLine('${section}')">+ ADD LINE</button>
    </div>`;

  const html = `
    <button class="modal-close" onclick="cancelEdit()">×</button>
    <div class="sub">${esc(p.job_id || '')} · ${statusBadge(p.status || 'scheduled')} · <span style="color:#fb923c">EDITING</span></div>
    <h2>${esc(p.address || '')}</h2>
    <div style="font-size:0.9em;color:rgba(200,220,255,0.7);margin-top:4px">${esc(p.customer_name || '')}</div>

    ${table('labour_breakdown', 'Labour Breakdown', p.labour_breakdown)}
    ${table('add_ons', 'Add-Ons', p.add_ons)}
    ${table('surcharges', 'Surcharges', p.surcharges)}
    ${textListSection('scope_notes', 'Scope Notes', p.scope_notes)}
    ${textListSection('pricing_sources', 'Pricing Sources', p.pricing_sources)}
    ${textListSection('outstanding', 'Outstanding / To Confirm', p.outstanding)}

    <div class="modal-section"><h3>Totals (auto-calc)</h3>
      <table class="mtable"><tbody>
        <tr><td>Subtotal</td><td class="num" id="eSubtotal">${money(p.subtotal)}</td></tr>
        <tr><td>HST (15%)</td><td class="num" id="eHst">${money(p.hst)}</td></tr>
        <tr class="total"><td>Total</td><td class="num" id="eTotal">${money(p.total)}</td></tr>
      </tbody></table>
    </div>

    <div style="margin-top:18px;display:flex;gap:10px;justify-content:flex-end">
      <button class="btn-sm cancel" onclick="cancelEdit()">CANCEL</button>
      <button class="btn-sm save" onclick="saveEdit()">💾 SAVE</button>
    </div>
  `;
  $('modalBody').innerHTML = html;
  $('modalBody').dataset.editingId = p.id;
  $('modalBg').classList.add('on');
  recomputeTotals(p);
}

function openDetail(idx){
  const p = CACHED[idx];
  if (!p) return;
  const lbr = (p.labour_breakdown || []).filter(x => !/subtotal/i.test(x.description || ''));
  const adds = p.add_ons || [];
  const sur = p.surcharges || [];
  const pays = p.payment_tracker || [];
  const lineRow = x => `<tr><td>${esc(x.description||'')}</td><td style="font-family:'Share Tech Mono',monospace;font-size:0.82em;color:rgba(200,220,255,0.62)">${esc((x.qty_sq != null ? x.qty_sq + ' SQ' : x.qty) || '')}</td><td style="font-family:'Share Tech Mono',monospace;font-size:0.82em;color:rgba(200,220,255,0.62)">${esc(x.rate_per_sq || x.rate || '')}</td><td class="num">${money(Number(x.total)||0)}</td></tr>`;

  const html = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <div style="position:absolute;top:16px;right:56px;display:flex;gap:6px">
      <button onclick='enterEdit("${esc(p.id)}")' style="background:rgba(34,211,238,0.14);border:1px solid rgba(34,211,238,0.5);color:#22d3ee;padding:6px 12px;border-radius:7px;font-family:'Orbitron',sans-serif;font-size:0.64em;font-weight:800;letter-spacing:1.5px;cursor:pointer" title="Edit pay sheet">✏ EDIT</button>
      <button onclick='RyujinPDF.paySheet(${JSON.stringify(p).replace(/'/g,"&#39;")})' style="background:rgba(251,146,60,0.18);border:1px solid rgba(251,146,60,0.5);color:#fb923c;padding:6px 12px;border-radius:7px;font-family:'Orbitron',sans-serif;font-size:0.64em;font-weight:800;letter-spacing:1.5px;cursor:pointer" title="Download PDF">📄 PDF</button>
    </div>
    <div class="sub">${esc(p.job_id || '')} · ${statusBadge(p.status || 'scheduled')}</div>
    <h2>${esc(p.address || '')}</h2>
    <div style="font-size:0.9em;color:rgba(200,220,255,0.7);margin-top:4px">${esc(p.customer_name || '')} · ${esc(p.subcontractor || '')}</div>
    ${p.shingle_product ? `<div style="font-size:0.8em;color:rgba(200,220,255,0.5);margin-top:4px;font-family:'Share Tech Mono',monospace;letter-spacing:1px">SHINGLE: ${esc(p.shingle_product)}${p.eagleview_report ? ' · EagleView ' + esc(p.eagleview_report) : ''}</div>` : ''}

    ${lbr.length ? `<div class="modal-section"><h3>Labour Breakdown</h3><table class="mtable"><thead><tr><th>Description</th><th>Qty</th><th>Rate</th><th style="text-align:right">Total</th></tr></thead><tbody>${lbr.map(lineRow).join('')}</tbody></table></div>` : ''}

    ${sur.length ? `<div class="modal-section"><h3>Surcharges</h3><table class="mtable"><tbody>${sur.map(lineRow).join('')}</tbody></table></div>` : ''}

    ${adds.length ? `<div class="modal-section"><h3>Add-Ons</h3><table class="mtable"><tbody>${adds.map(lineRow).join('')}</tbody></table></div>` : ''}

    <div class="modal-section"><h3>Totals</h3><table class="mtable"><tbody>
      <tr><td>Subtotal</td><td class="num">${money(Number(p.subtotal)||0)}</td></tr>
      <tr><td>HST (15%)</td><td class="num">${money(Number(p.hst)||0)}</td></tr>
      <tr class="total"><td>Total Due</td><td class="num">${money(Number(p.total)||0)}</td></tr>
    </tbody></table></div>

    ${pays.length ? `<div class="modal-section"><h3>Payment History</h3><table class="mtable"><tbody>${pays.map(x => `<tr><td>${esc(x.method||x.date||'')}</td><td class="num" style="color:#4ade80">-${money(Number(x.amount)||0)}</td></tr>`).join('')}<tr class="total"><td>Paid to Date</td><td class="num">${money(Number(p.paid_to_date)||0)}</td></tr><tr class="total"><td>Balance Due</td><td class="num" style="color:${Number(p.balance_due)>0?'#facc15':'#4ade80'}">${money(Number(p.balance_due)||0)}</td></tr></tbody></table></div>` : ''}

    ${(p.scope_notes||[]).length ? `<div class="modal-section"><h3>Scope Notes</h3><ul class="note-list">${p.scope_notes.map(n => '<li>' + esc(n) + '</li>').join('')}</ul></div>` : ''}
    ${(p.outstanding||[]).length ? `<div class="modal-section"><h3>Outstanding / To Confirm</h3><ul class="note-list" style="color:#facc15">${p.outstanding.map(n => '<li>' + esc(n) + '</li>').join('')}</ul></div>` : ''}
    ${(p.pricing_sources||[]).length ? `<div class="modal-section"><h3>Pricing Sources</h3><ul class="note-list" style="font-family:'Share Tech Mono',monospace;font-size:0.82em">${p.pricing_sources.map(n => '<li>' + esc(n) + '</li>').join('')}</ul></div>` : ''}
  `;
  $('modalBody').innerHTML = html;
  $('modalBg').classList.add('on');
}

function closeModal(){ $('modalBg').classList.remove('on'); }

function goBack(){
  if (window.parent !== window && window.parent.exitSectionOverlay) { window.parent.exitSectionOverlay(); return; }
  window.location.href = 'production.html';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    e.preventDefault();
    if ($('modalBg').classList.contains('on')) closeModal();
    else goBack();
  }
});

loadAll().then(() => {
  // Auto-open modal if ?job= or ?id= param is present
  const params = new URLSearchParams(location.search);
  const jobId = params.get('job') || params.get('job_id');
  const psId = params.get('id');
  if (jobId || psId) {
    const idx = CACHED.findIndex(p => (jobId && p.job_id === jobId) || (psId && p.id === psId));
    if (idx >= 0) setTimeout(() => openDetail(idx), 100);
  }
});
</script>
