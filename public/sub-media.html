<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b1d3a">
<title>Plus Ultra · Photos</title>
<link rel="manifest" href="/sub-media-manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PU Photos">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='38' fill='%230b1d3a'/%3E%3Crect x='38' y='58' width='104' height='75' rx='10' fill='none' stroke='%23ffffff' stroke-width='7'/%3E%3Ccircle cx='90' cy='96' r='20' fill='none' stroke='%23ffffff' stroke-width='7'/%3E%3Crect x='79' y='49' width='22' height='11' rx='2' fill='%23ffffff'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #0b1d3a;
  --accent-line: #1e3a6e;
  --accent-soft: #eef2f8;
  --bg: #f7f8fa;
  --surface: #ffffff;
  --ink: #101828;
  --ink-2: #475467;
  --ink-3: #98a2b3;
  --line: #e4e7ec;
  --green: #15803d;
  --green-bg: #dcfce7;
  --amber: #b45309;
  --amber-bg: #fef3c7;
  --red: #b91c1c;
  --red-bg: #fee2e2;
  --blue: #1d4ed8;
  --blue-bg: #dbeafe;
  --shadow: 0 1px 2px rgba(16,24,40,0.06), 0 1px 3px rgba(16,24,40,0.04);
  --radius: 14px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent }
html, body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased; font-size: 16px; line-height: 1.45 }
body { padding-bottom: 40px }
.wrap { max-width: 720px; margin: 0 auto; padding: 14px }

.top { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 14px; box-shadow: var(--shadow) }
.top-id { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0 }
.logo { width: 40px; height: 40px; border-radius: 10px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; flex-shrink: 0 }
.title { font-weight: 700; font-size: 16px; line-height: 1.2 }
.subtitle { font-size: 12px; color: var(--ink-2); line-height: 1.2; margin-top: 2px }
.install-btn { display: none; padding: 8px 12px; border-radius: 8px; background: var(--accent); color: #fff; border: none; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0; min-height: 36px; align-items: center; gap: 6px }
.install-btn:active { opacity: 0.85 }
.install-btn.on { display: inline-flex }
.install-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round }

h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; margin: 14px 4px 12px }

.job { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow) }
.job-head { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; user-select: none; transition: background 0.1s }
.job-head:active { background: var(--accent-soft) }
.job-head .info { flex: 1; min-width: 0 }
.job-head .addr { font-weight: 700; font-size: 15px; color: var(--ink); line-height: 1.3 }
.job-head .meta { font-size: 12px; color: var(--ink-2); margin-top: 3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap }
.job-head .chev { color: var(--ink-3); transition: transform 0.2s }
.job-head .chev svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round }
.job.open .job-head .chev { transform: rotate(90deg) }

.pill { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.5px }
.pill.green { background: var(--green-bg); color: var(--green) }
.pill.amber { background: var(--amber-bg); color: var(--amber) }
.pill.blue { background: var(--blue-bg); color: var(--blue) }
.pill.gray { background: #f1f3f6; color: var(--ink-3) }

.job-body { display: none; border-top: 1px solid var(--line); padding: 12px 14px 16px }
.job.open .job-body { display: block }

.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px }
@media (min-width: 480px) { .grid { grid-template-columns: repeat(4, 1fr) } }
.grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; background: var(--accent-soft); cursor: pointer; transition: transform 0.12s }
.grid img:active { transform: scale(0.97) }
.grid-empty { padding: 18px; text-align: center; color: var(--ink-3); font-size: 13px; background: var(--accent-soft); border-radius: 8px; margin-bottom: 12px }

.upload-row { display: flex; gap: 8px; margin-bottom: 14px }
.upload-btn { padding: 16px 14px; border-radius: 10px; border: none; font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer; min-height: 60px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; line-height: 1; transition: transform 0.06s }
.upload-btn:active { transform: scale(0.98) }
.upload-btn:disabled { opacity: 0.6; cursor: not-allowed }
.upload-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round }
.upload-btn.camera { flex: 2; background: var(--accent); color: #fff; font-size: 17px }
.upload-btn.gallery { flex: 1; background: var(--surface); color: var(--ink); border: 1px solid var(--line) }
.upload-status { font-size: 13px; color: var(--ink-2); margin-bottom: 12px; min-height: 18px }
.upload-status.err { color: var(--red) }
.upload-status.ok { color: var(--green) }

.loading, .error, .empty { padding: 40px 24px; text-align: center; color: var(--ink-2); font-size: 15px }
.error { color: var(--red) }

.modal-bg { position: fixed; inset: 0; background: rgba(16,24,40,0.85); display: none; align-items: center; justify-content: center; z-index: 100; padding: 14px }
.modal-bg.open { display: flex }
.modal { background: var(--surface); border-radius: 14px; max-width: 720px; width: 100%; padding: 20px 18px 16px; max-height: 90vh; overflow-y: auto }
.modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px }
.modal p { font-size: 14px; color: var(--ink-2); margin-bottom: 14px }
.modal ol { padding-left: 22px; margin-bottom: 14px; font-size: 14px; color: var(--ink-2); line-height: 1.7 }
.modal-actions { display: flex; gap: 10px }
.modal-actions .btn { flex: 1; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; font-family: inherit; min-height: 48px; background: var(--accent); color: #fff }

.lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; z-index: 200; padding: 14px }
.lightbox.open { display: flex }
.lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px }
.lightbox-close { position: absolute; top: 14px; right: 14px; width: 44px; height: 44px; border-radius: 99px; background: rgba(255,255,255,0.18); color: #fff; border: none; font-size: 22px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; backdrop-filter: blur(6px) }
</style>
</head>
<body>
<div class="wrap">

<div class="top">
  <div class="top-id">
    <div class="logo">PU</div>
    <div>
      <div class="title" id="brandName" data-tenant="name">Plus Ultra Roofing</div>
      <div class="subtitle">Photos</div>
    </div>
  </div>
  <button class="install-btn" id="installBtn" title="Save to home screen">
    <svg viewBox="0 0 24 24"><path d="M12 3v12"/><polyline points="7 10 12 15 17 10"/><path d="M5 21h14"/></svg>
    <span>Save to phone</span>
  </button>
</div>

<h1>Your Jobs</h1>
<div id="app">
  <div class="loading">Loading…</div>
</div>

</div>

<!-- iOS install instructions modal -->
<div class="modal-bg" id="iosInstallModal">
  <div class="modal">
    <h3>Save to your phone</h3>
    <p>Add this page to your home screen so it opens like an app:</p>
    <ol>
      <li>Tap the <strong>Share</strong> button at the bottom of Safari</li>
      <li>Scroll and tap <strong>Add to Home Screen</strong></li>
      <li>Tap <strong>Add</strong> in the top corner</li>
    </ol>
    <div class="modal-actions">
      <button class="btn" id="iosInstallClose">Got it</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">×</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
const TENANT = 'plus-ultra';
const API = '/api';
const TOKEN_KEY = 'ry_sub_token';

const params = new URLSearchParams(location.search);
const urlToken = params.get('token');
let storedToken = null;
try { storedToken = localStorage.getItem(TOKEN_KEY); } catch (_) {}
const TOKEN = urlToken || storedToken;

const app = document.getElementById('app');
const installBtn = document.getElementById('installBtn');
const iosInstallModal = document.getElementById('iosInstallModal');
const iosInstallClose = document.getElementById('iosInstallClose');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxClose = document.getElementById('lightboxClose');

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function fmtDate(iso) {
  if (!iso) return 'TBD';
  const d = new Date(iso);
  if (isNaN(d)) return 'TBD';
  return d.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' });
}

function statusPill(status) {
  const s = (status || '').toLowerCase();
  if (s === 'complete' || s === 'completed') return '<span class="pill green">Complete</span>';
  if (s === 'in_progress') return '<span class="pill blue">In progress</span>';
  if (s === 'issued' || s === 'scheduled') return '<span class="pill amber">Scheduled</span>';
  return `<span class="pill gray">${esc(s || 'draft')}</span>`;
}

async function api(path, opts) {
  const sep = path.includes('?') ? '&' : '?';
  const r = await fetch(`${API}${path}${sep}tenant=${TENANT}`, {
    headers: { 'Content-Type': 'application/json', 'x-tenant-id': TENANT },
    ...(opts || {})
  });
  const body = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(body.error || `HTTP ${r.status}`);
  return body;
}

let SUB = null;

async function boot() {
  if (!TOKEN) {
    app.innerHTML = '<div class="error">No link. Ask Mackenzie for a fresh link at (506) 540-1052.</div>';
    return;
  }

  let auth;
  try {
    auth = await api(`/sub-auth?token=${encodeURIComponent(TOKEN)}`);
  } catch (e) {
    app.innerHTML = `<div class="error">${esc(e.message || 'Could not validate link.')}</div>`;
    return;
  }
  SUB = auth.sub;
  if (auth.branding && auth.branding.company_name) {
    document.getElementById('brandName').textContent = auth.branding.company_name;
  }

  let jobs;
  try {
    const r = await api(`/sub-auth?action=jobs&sub_id=${SUB.id}`);
    jobs = (r.workorders || []).filter(w => {
      const s = (w.status || '').toLowerCase();
      // Exclude cancelled + drafts. Keep issued / in_progress / complete.
      return s !== 'cancelled' && s !== 'draft';
    });
  } catch (e) {
    app.innerHTML = `<div class="error">${esc(e.message || 'Could not load jobs.')}</div>`;
    return;
  }

  if (!jobs.length) {
    app.innerHTML = '<div class="empty">No active jobs assigned. Ask Mackenzie if you expect to see one.</div>';
    return;
  }

  app.innerHTML = jobs.map((w, i) => {
    const meta = [];
    meta.push(statusPill(w.status));
    if (w.start_date) meta.push(esc(fmtDate(w.start_date)));
    if (w.customer_name) meta.push(esc(w.customer_name));
    return `
      <div class="job" data-wo="${esc(w.id)}" data-idx="${i}">
        <div class="job-head" onclick="toggleJob(${i})">
          <div class="info">
            <div class="addr">${esc(w.address || '(no address)')}</div>
            <div class="meta">${meta.join(' · ')}</div>
          </div>
          <div class="chev"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
        </div>
        <div class="job-body" id="body-${i}"></div>
      </div>
    `;
  }).join('');

  // Stash jobs for the click handlers.
  window.__jobs = jobs;
}

async function toggleJob(idx) {
  const card = document.querySelector(`.job[data-idx="${idx}"]`);
  if (!card) return;
  const wasOpen = card.classList.contains('open');
  // Close all others (single-open accordion to keep page short on phones)
  document.querySelectorAll('.job.open').forEach(c => c.classList.remove('open'));
  if (wasOpen) return;
  card.classList.add('open');
  const body = document.getElementById(`body-${idx}`);
  const w = window.__jobs[idx];
  if (!w) return;
  if (!body.dataset.loaded) {
    body.innerHTML = '<div class="loading" style="padding:20px 0">Loading photos…</div>';
    try {
      const r = await api(`/sub-portal?action=photos&wo_id=${w.id}&token=${encodeURIComponent(TOKEN)}`);
      renderJobBody(idx, w, r.photos || []);
      body.dataset.loaded = '1';
    } catch (e) {
      body.innerHTML = `<div class="upload-status err">${esc(e.message || 'Could not load photos.')}</div>` + uploadHtml(idx, w);
    }
  }
}

// Two inputs: camera (capture=environment) launches the device camera directly
// on Android, and iOS Safari treats it as preferred camera in the chooser.
// Gallery input has no capture attribute so it always opens the photo library.
// Both feed the same onPick handler.
function uploadHtml(idx) {
  return `
    <div class="upload-row">
      <input type="file" accept="image/*" capture="environment" id="cam-${idx}" style="display:none" onchange="onPick(${idx}, this)">
      <input type="file" accept="image/*" multiple id="lib-${idx}" style="display:none" onchange="onPick(${idx}, this)">
      <button class="upload-btn camera" id="camBtn-${idx}" onclick="document.getElementById('cam-${idx}').click()">
        <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="2"/><circle cx="12" cy="13" r="4"/><path d="M9 6l1.5-2h3L15 6"/></svg>
        <span>Take Photo</span>
      </button>
      <button class="upload-btn gallery" id="libBtn-${idx}" onclick="document.getElementById('lib-${idx}').click()">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>Gallery</span>
      </button>
    </div>
    <div class="upload-status" id="status-${idx}"></div>
  `;
}

// Upload-row goes ABOVE the grid so the camera button is the first thing
// visible when a job opens, not buried below 30 thumbnails.
function renderJobBody(idx, w, photos) {
  const body = document.getElementById(`body-${idx}`);
  const grid = photos.length
    ? `<div class="grid">${photos.map(p => `<img src="${esc(p.url)}" alt="${esc(p.caption || '')}" onclick="openLightbox('${esc(p.url)}')">`).join('')}</div>`
    : '<div class="grid-empty">No photos yet — tap Take Photo to start.</div>';
  body.innerHTML = uploadHtml(idx) + grid;
}

// Resize + re-encode large iPhone/Android photos as JPEG before upload.
// iPhone HEIC and Pro-model photos routinely hit the 15MB server limit and
// fail silently from the sub's POV. Browser-native canvas pipeline:
//   1. Decode any format the browser can render (incl. HEIC on iOS 17+).
//   2. Scale to fit MAX_DIM in either axis.
//   3. Re-encode as JPEG at QUALITY.
// If anything fails (codec unsupported, decoder error), fall back to the
// original file so we still attempt the upload — server-side limit handles
// the rest.
const MAX_DIM = 2048;
const JPEG_QUALITY = 0.85;

async function compressImage(file) {
  if (!file.type.startsWith('image/')) return file;
  try {
    const bitmap = await createImageBitmap(file);
    const w0 = bitmap.width, h0 = bitmap.height;
    const scale = Math.min(1, MAX_DIM / Math.max(w0, h0));
    const w = Math.round(w0 * scale);
    const h = Math.round(h0 * scale);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(bitmap, 0, 0, w, h);
    bitmap.close && bitmap.close();
    const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', JPEG_QUALITY));
    if (!blob) return file;
    const baseName = (file.name || 'photo').replace(/\.[^.]+$/, '') || 'photo';
    return new File([blob], baseName + '.jpg', { type: 'image/jpeg' });
  } catch (e) {
    console.warn('compressImage fell back to original', e);
    return file;
  }
}

async function onPick(idx, input) {
  const files = Array.from(input.files || []);
  if (!files.length) return;
  const w = window.__jobs[idx];
  if (!w) return;
  const camBtn = document.getElementById(`camBtn-${idx}`);
  const libBtn = document.getElementById(`libBtn-${idx}`);
  const status = document.getElementById(`status-${idx}`);
  if (camBtn) camBtn.disabled = true;
  if (libBtn) libBtn.disabled = true;
  status.className = 'upload-status';

  let done = 0, failed = 0;
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    status.textContent = `Uploading ${i + 1} of ${files.length}…`;
    try {
      const compressed = await compressImage(file);
      const fd = new FormData();
      fd.append('photo', compressed, compressed.name || 'photo.jpg');
      fd.append('token', TOKEN);
      fd.append('workorder_id', w.id);
      fd.append('stage_label', 'Field');
      const r = await fetch(`${API}/job-log-photo?tenant=${TENANT}`, {
        method: 'POST',
        headers: { 'x-tenant-id': TENANT },
        body: fd
      });
      if (!r.ok) {
        const e = await r.json().catch(() => ({}));
        throw new Error(e.error || `HTTP ${r.status}`);
      }
      done++;
    } catch (e) {
      failed++;
      console.error('upload failed', e);
    }
  }

  input.value = '';
  if (camBtn) camBtn.disabled = false;
  if (libBtn) libBtn.disabled = false;
  if (failed === 0) {
    status.className = 'upload-status ok';
    status.textContent = `✓ Uploaded ${done} photo${done === 1 ? '' : 's'} — Mackenzie can see them now.`;
  } else if (done === 0) {
    status.className = 'upload-status err';
    status.textContent = `Upload failed (${failed}). Check your signal and tap Take Photo again.`;
  } else {
    status.className = 'upload-status err';
    status.textContent = `${done} uploaded, ${failed} failed. Try the missing ones again.`;
  }

  // Refresh the grid so newly uploaded photos appear.
  const body = document.getElementById(`body-${idx}`);
  delete body.dataset.loaded;
  try {
    const r = await api(`/sub-portal?action=photos&wo_id=${w.id}&token=${encodeURIComponent(TOKEN)}`);
    renderJobBody(idx, w, r.photos || []);
    body.dataset.loaded = '1';
    // Re-show the status text (renderJobBody overwrites it).
    const newStatus = document.getElementById(`status-${idx}`);
    if (newStatus && status.textContent) {
      newStatus.className = status.className;
      newStatus.textContent = status.textContent;
    }
  } catch (_) {
    // Best-effort — the upload already succeeded, just leave the count.
  }
}

// Lightbox
function openLightbox(url) {
  lightboxImg.src = url;
  lightbox.classList.add('open');
}
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox || e.target === lightboxImg) {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
  }
});
lightboxClose.addEventListener('click', () => {
  lightbox.classList.remove('open');
  lightboxImg.src = '';
});

// PWA install
let deferred = null;
function isIos() { return /iPhone|iPad|iPod/i.test(navigator.userAgent || ''); }
function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
}
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferred = e;
  if (!isStandalone()) installBtn.classList.add('on');
});
window.addEventListener('appinstalled', () => {
  installBtn.classList.remove('on');
  deferred = null;
  // Lock the current URL token into the installed PWA so home-screen launches
  // (no query string) restore the same crew context.
  if (urlToken) {
    try { localStorage.setItem(TOKEN_KEY, urlToken); } catch (_) {}
  }
});
installBtn.addEventListener('click', async () => {
  if (deferred) {
    deferred.prompt();
    await deferred.userChoice;
    deferred = null;
    installBtn.classList.remove('on');
    return;
  }
  if (isIos()) {
    // iOS does not fire appinstalled — lock the token at the install-intent
    // click so the home-screen launch can restore it.
    if (urlToken) {
      try { localStorage.setItem(TOKEN_KEY, urlToken); } catch (_) {}
    }
    iosInstallModal.classList.add('open');
  }
});
iosInstallClose.addEventListener('click', () => iosInstallModal.classList.remove('open'));
if (isIos() && !isStandalone()) installBtn.classList.add('on');

boot();
</script>
<script src="/assets/ryujin-tenant.js"></script>
</body>
</html>
