<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Demo · Ryujin OS</title></head>
<body><script>
// Demo redirect: routes to admin-overview with the demo tenant slug.
// Demo tenant has tenant_settings.entitlements.features.demo_data=true
// and is seeded by scripts/_oneshot/_seed_demo_tenant.mjs (run by Mac
// before launching publicly). Read-only-feeling — operators can poke
// around the UI but writes go to the demo tenant's sandbox data,
// which gets reset by a daily cron.
localStorage.setItem('ryujin_tenant', 'demo');
location.replace('/admin-overview.html?tenant=demo&demo=1');
</script><!-- pu-print-btn -->

.pu-print-btn:hover { background: #1e293b; }
</style>
<button class="pu-print-btn" type="button" onclick="window.print()" aria-label="Print or save as PDF">&#9000; Print / PDF</button>
