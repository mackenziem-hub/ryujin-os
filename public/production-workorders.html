<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Work Orders</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow-x:hidden;min-height:100vh}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(251,146,60,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(248,113,113,0.06) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(251,146,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(251,146,60,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}
.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(251,146,60,0.24);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#fb923c,#f87171,transparent);opacity:0.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.3),rgba(251,146,60,0.22) 40%,rgba(30,10,5,0.8));box-shadow:0 0 14px rgba(251,146,60,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1px solid #fff;border-radius:10px;color:#030611;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-decoration:none;transition:all 0.2s}
.btn-back:hover{background:rgba(255,255,255,0.85);box-shadow:0 0 14px rgba(255,255,255,0.35)}
.btn-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}

.stage{position:relative;z-index:5;padding:80px 28px 60px;max-width:1280px;margin:0 auto}
.hero{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.hero .eyebrow{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:#fb923c;letter-spacing:3px;margin-bottom:6px}
.hero h1{font-family:'Orbitron',sans-serif;font-size:2em;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{padding:14px 18px;background:rgba(14,22,40,0.55);border:1px solid rgba(251,146,60,0.16);border-radius:12px}
.stat .lbl{font-family:'Share Tech Mono',monospace;font-size:0.66em;color:rgba(200,220,255,0.5);letter-spacing:1.5px;text-transform:uppercase}
.stat .val{font-family:'Orbitron',sans-serif;font-size:1.4em;font-weight:900;color:#fb923c;margin-top:4px}
@media (max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}}

.search{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search input{flex:1;min-width:220px;padding:11px 14px;background:rgba(6,10,20,0.55);border:1px solid rgba(251,146,60,0.18);border-radius:10px;color:#e0e6f0;font-family:'Inter',sans-serif;font-size:0.94em;outline:none;transition:all 0.2s}
.search input:focus{border-color:rgba(251,146,60,0.5)}
.search select{padding:11px 14px;background:rgba(6,10,20,0.55);border:1px solid rgba(251,146,60,0.18);border-radius:10px;color:#e0e6f0;font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1px;cursor:pointer;outline:none}

.list{display:flex;flex-direction:column;gap:8px}
.row{display:grid;grid-template-columns:2fr 130px 100px 100px 80px 40px;align-items:center;gap:12px;padding:14px 18px;background:rgba(14,22,40,0.55);border:1px solid rgba(251,146,60,0.12);border-radius:12px;transition:all 0.2s;cursor:pointer}
.row:hover{border-color:rgba(251,146,60,0.5);background:rgba(14,22,40,0.75);transform:translateX(3px)}
.row.head{background:transparent;border-color:transparent;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.66em;letter-spacing:2px;text-transform:uppercase;cursor:default;padding:8px 18px;margin-bottom:-4px}
.row.head:hover{transform:none;border-color:transparent;background:transparent}
.row .wo-num{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:#fb923c;letter-spacing:1px;margin-bottom:2px}
.row .cust{font-weight:600;font-size:0.95em}
.row .addr{font-size:0.78em;color:rgba(200,220,255,0.62);margin-top:2px}
.row .sq{font-family:'Orbitron',sans-serif;font-weight:800;color:#fb923c;font-size:1em}
.row .arrow{justify-self:end;color:rgba(251,146,60,0.5)}
.row:hover .arrow{color:#fb923c;transform:translateX(4px);transition:all 0.2s}
.row .arrow svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.badge{display:inline-block;padding:3px 9px;font-family:'Share Tech Mono',monospace;font-size:0.62em;font-weight:700;letter-spacing:1.5px;border-radius:5px}
@media (max-width:760px){
  .row{grid-template-columns:1fr auto}
  .row>div:nth-child(3),.row>div:nth-child(4),.row>div:nth-child(5){display:none}
  .row.head{display:none}
}
.empty{text-align:center;padding:60px 20px;color:rgba(200,220,255,0.5);font-size:0.95em;line-height:1.6}
.loading{text-align:center;padding:40px;color:rgba(200,220,255,0.55);font-family:'Share Tech Mono',monospace;font-size:0.8em;letter-spacing:1.5px}

.edit-in{background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.25);border-radius:5px;color:#e0e6f0;padding:5px 8px;font-family:inherit;font-size:0.9em;outline:none;width:100%;box-sizing:border-box}
.edit-in:focus{border-color:#fb923c;background:rgba(6,10,20,0.9)}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.edit-grid.full{grid-template-columns:1fr}
.edit-field label{display:block;font-family:'Share Tech Mono',monospace;font-size:0.64em;color:rgba(200,220,255,0.5);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.edit-scope-item{display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(251,146,60,0.06)}
.edit-scope-item input[type=checkbox]{width:18px;height:18px;accent-color:#fb923c;cursor:pointer;flex-shrink:0}
.btn-sm{padding:5px 10px;border-radius:6px;font-family:'Orbitron',sans-serif;font-size:0.6em;font-weight:800;letter-spacing:1.2px;cursor:pointer;transition:all 0.15s;border:1px solid}
.btn-sm.add{background:rgba(74,222,128,0.14);color:#4ade80;border-color:rgba(74,222,128,0.4)}
.btn-sm.del{background:rgba(248,113,113,0.1);color:#f87171;border-color:rgba(248,113,113,0.3);padding:3px 8px}
.btn-sm.save{background:rgba(74,222,128,0.22);color:#4ade80;border-color:#4ade80;padding:7px 16px;font-size:0.66em}
.btn-sm.cancel{background:rgba(148,163,184,0.12);color:#94a3b8;border-color:rgba(148,163,184,0.3);padding:7px 16px;font-size:0.66em}

.modal-bg{position:fixed;inset:0;background:rgba(3,6,17,0.88);backdrop-filter:blur(14px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal-bg.on{display:flex}
.modal{max-width:920px;width:100%;background:rgba(10,18,34,0.98);border:1px solid rgba(251,146,60,0.45);border-radius:16px;padding:28px 32px;position:relative;box-shadow:0 28px 80px rgba(0,0,0,0.6)}
.modal-close{position:absolute;top:16px;right:18px;background:none;border:none;color:rgba(200,220,255,0.5);font-size:1.5em;cursor:pointer;padding:6px 10px;border-radius:6px}
.modal-close:hover{color:#fb923c;background:rgba(251,146,60,0.1)}
.modal h2{font-family:'Orbitron',sans-serif;font-size:1.4em;font-weight:900;background:linear-gradient(135deg,#fff,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.modal .sub{font-family:'Share Tech Mono',monospace;font-size:0.74em;color:rgba(200,220,255,0.65);letter-spacing:1.5px;margin-bottom:18px}
.modal-section{margin-top:18px}
.modal-section h3{font-family:'Orbitron',sans-serif;font-size:0.74em;font-weight:800;letter-spacing:2.5px;color:#fb923c;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(251,146,60,0.14)}
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 18px;font-size:0.88em}
.info-grid .item{padding:4px 0}
.info-grid .label{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(200,220,255,0.5);letter-spacing:1.5px;text-transform:uppercase}
.info-grid .value{color:#e0e6f0;font-weight:500;margin-top:2px}
.scope-list{list-style:none;padding:0}
.scope-list li{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:0.9em;color:rgba(200,220,255,0.85)}
.scope-list li .chk{width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(74,222,128,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.35)}
.scope-list li.off .chk{background:rgba(200,220,255,0.05);color:rgba(200,220,255,0.35);border-color:rgba(200,220,255,0.15)}
.scope-list li.off{color:rgba(200,220,255,0.4);text-decoration:line-through}
.scope-list li .chk svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:3}
</style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="btn-back" href="production.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> BACK</a>
  <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· WORK ORDERS</span></div></div>
  <div class="tb-spacer"></div>
  <button onclick="openPrivacySettings()" style="background:rgba(251,146,60,0.14);border:1px solid rgba(251,146,60,0.4);color:#fb923c;padding:7px 12px;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:0.62em;font-weight:800;letter-spacing:1.5px;cursor:pointer;margin-right:10px" title="Customize which words are redacted from work order displays and PDFs">⚙ PRIVACY</button>
  <div style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px" id="countBadge">—</div>
</div>

<div class="stage">
  <div class="hero">
    <div class="hero-left">
      <div class="eyebrow">PRODUCTION · JOB SCOPE + DISPATCH</div>
      <h1>Work Orders</h1>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="lbl">Total</div><div class="val" id="sTotal">—</div></div>
    <div class="stat"><div class="lbl">Drafts</div><div class="val" id="sDrafts">—</div></div>
    <div class="stat"><div class="lbl">Issued</div><div class="val" id="sIssued">—</div></div>
    <div class="stat"><div class="lbl">Total SQ</div><div class="val" id="sSq">—</div></div>
  </div>

  <div class="search">
    <input id="searchIn" type="text" placeholder="Search by customer or address..." oninput="applyFilter()"/>
    <select id="sortIn" onchange="applyFilter()">
      <option value="new">Newest first</option>
      <option value="start">Start date</option>
      <option value="sq">Largest SQ</option>
      <option value="customer">Customer A-Z</option>
    </select>
    <select id="filterIn" onchange="applyFilter()">
      <option value="all">All statuses</option>
      <option value="draft">Drafts</option>
      <option value="issued">Issued</option>
      <option value="in_progress">In Progress</option>
      <option value="complete">Complete</option>
    </select>
  </div>

  <div class="list" id="listHost">
    <div class="loading">LOADING WORK ORDERS...</div>
  </div>
</div>

<div class="modal-bg" id="modalBg" onclick="handleModalBgClick(event)">
  <div class="modal" id="modalBody"></div>
</div>

<div class="modal-bg" id="settingsBg" onclick="if(event.target===this)closeSettings()">
  <div class="modal" id="settingsBody" style="max-width:540px"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// Work orders are crew-facing — hide anything that leaks pricing, financing, or pay.
// Terms are editable via ⚙ PRIVACY (stored per-browser in localStorage).
const SENSITIVE_KEY = 'ry_wo_sensitive_terms';
const SENSITIVE_DEFAULTS = ['$','total','subtotal','HST','GST','tax','financ','deposit','balance','commission','payout','margin','quote','estimate','price','cost','retail'];
function loadSensitiveTerms(){
  try {
    const raw = localStorage.getItem(SENSITIVE_KEY);
    if (raw == null) return SENSITIVE_DEFAULTS.slice();
    return raw.split('\n').map(s => s.trim()).filter(Boolean);
  } catch { return SENSITIVE_DEFAULTS.slice(); }
}
function buildSensitiveRx(terms){
  if (!terms || !terms.length) return /a^/;  // matches nothing
  const escRx = t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return new RegExp(terms.map(escRx).join('|'), 'i');
}
let SENSITIVE_RX = buildSensitiveRx(loadSensitiveTerms());

const STATUS_STYLE = {
  draft: { color: '#94a3b8', bg: 'rgba(148,163,184,0.14)' },
  issued: { color: '#fb923c', bg: 'rgba(251,146,60,0.14)' },
  in_progress: { color: '#22d3ee', bg: 'rgba(34,211,238,0.14)' },
  complete: { color: '#4ade80', bg: 'rgba(74,222,128,0.14)' },
  cancelled: { color: '#f87171', bg: 'rgba(248,113,113,0.14)' }
};
const statusBadge = s => {
  const m = STATUS_STYLE[s] || STATUS_STYLE.draft;
  return `<span class="badge" style="background:${m.bg};color:${m.color};border:1px solid ${m.color}33">${s.replace(/_/g,' ').toUpperCase()}</span>`;
};

let CACHED = [];
let LOADED = false;

async function loadAll(){
  try {
    const r = await fetch('/api/workorders?limit=200', { headers: { 'x-tenant-id': 'plus-ultra' } });
    if (!r.ok) { $('listHost').innerHTML = '<div class="empty">Could not load work orders. HTTP ' + r.status + '.</div>'; return []; }
    const { workorders } = await r.json();
    CACHED = Array.isArray(workorders) ? workorders : [];
    LOADED = true;
    renderStats(CACHED);
    applyFilter();
    $('countBadge').textContent = CACHED.length + ' ORDERS';
    return CACHED;
  } catch(e) {
    $('listHost').innerHTML = '<div class="empty">Error: ' + esc(e.message) + '</div>';
    return [];
  }
}

function renderStats(list){
  $('sTotal').textContent = list.length;
  $('sDrafts').textContent = list.filter(w => w.status === 'draft').length;
  $('sIssued').textContent = list.filter(w => ['issued','in_progress'].includes(w.status)).length;
  const sq = list.filter(w => w.status !== 'cancelled').reduce((s,w) => s + (Number(w.total_sq)||0), 0);
  $('sSq').textContent = sq ? Math.round(sq) + ' SQ' : '—';
}

function renderList(list){
  const host = $('listHost');
  if (!list.length) {
    if (!LOADED) { host.innerHTML = '<div class="loading">LOADING WORK ORDERS...</div>'; return; }
    host.innerHTML = '<div class="empty">No work orders match.</div>';
    return;
  }
  const head = `<div class="row head"><div>CUSTOMER / ADDRESS</div><div>STATUS</div><div>TIER</div><div>START</div><div style="text-align:right">SQ</div><div></div></div>`;
  const rows = list.map(w => `
    <div class="row" onclick="openDetailById('${esc(w.id)}')">
      <div>
        <div class="wo-num">WO-${w.wo_number || '-'}</div>
        <div class="cust">${esc(w.customer_name || '(no name)')}</div>
        <div class="addr">${esc(w.address || '')}</div>
      </div>
      <div>${statusBadge(w.status || 'draft')}</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:0.82em;color:rgba(200,220,255,0.7)">${(w.package_tier || '-').toUpperCase()}</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:0.78em;color:rgba(200,220,255,0.7)">${w.start_date || '-'}</div>
      <div class="sq" style="text-align:right">${w.total_sq || '-'}</div>
      <div class="arrow"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
    </div>
  `).join('');
  host.innerHTML = head + rows;
}

function applyFilter(){
  const q = ($('searchIn').value || '').toLowerCase();
  const status = $('filterIn').value;
  const sort = $('sortIn').value;
  let list = CACHED.slice();
  if (status !== 'all') list = list.filter(w => w.status === status);
  if (q) list = list.filter(w => ((w.customer_name||'') + ' ' + (w.address||'')).toLowerCase().includes(q));
  if (sort === 'start') list.sort((a,b) => new Date(a.start_date||'9999') - new Date(b.start_date||'9999'));
  else if (sort === 'sq') list.sort((a,b) => (Number(b.total_sq)||0) - (Number(a.total_sq)||0));
  else if (sort === 'customer') list.sort((a,b) => (a.customer_name||'').localeCompare(b.customer_name||''));
  else list.sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
  renderList(list);
}

let WO_EDIT = null;

function openDetailById(id){
  const idx = CACHED.findIndex(w => w.id === id);
  if (idx >= 0) openDetail(idx);
}

function enterEditWo(id){
  const w = CACHED.find(x => x.id === id);
  if (!w) return;
  WO_EDIT = JSON.parse(JSON.stringify(w));
  if (!WO_EDIT.scope_items) WO_EDIT.scope_items = [];
  renderEditWo();
}

function cancelEditWo(){
  const id = $('modalBody').dataset.editingId;
  WO_EDIT = null;
  if (id) openDetailById(id);
}

const numOrZero = v => { const n = Number(v); return Number.isFinite(n) && n > 0 ? n : 0; };

async function saveEditWo(){
  if (!WO_EDIT) return;
  const body = {
    id: WO_EDIT.id,
    customer_name: WO_EDIT.customer_name,
    address: WO_EDIT.address,
    phone: WO_EDIT.phone,
    email: WO_EDIT.email,
    special_notes: WO_EDIT.special_notes,
    start_date: WO_EDIT.start_date || null,
    estimated_duration_days: WO_EDIT.estimated_duration_days ? Number(WO_EDIT.estimated_duration_days) : null,
    work_hours: WO_EDIT.work_hours,
    sub_crew_lead: WO_EDIT.sub_crew_lead,
    onsite_contact: WO_EDIT.onsite_contact,
    job_type: WO_EDIT.job_type,
    total_sq: WO_EDIT.total_sq ? Number(WO_EDIT.total_sq) : null,
    roof_pitch: WO_EDIT.roof_pitch,
    layers_to_remove: WO_EDIT.layers_to_remove ? Number(WO_EDIT.layers_to_remove) : null,
    shingle_product: WO_EDIT.shingle_product,
    shingle_color: WO_EDIT.shingle_color,
    package_tier: WO_EDIT.package_tier,
    // Edge measurements — drive the crew-side material order (production-materials.html).
    // Required for accurate drip edge, starter, ice & water, and ridge cap counts.
    eaves_lf: numOrZero(WO_EDIT.eaves_lf),
    rakes_lf: numOrZero(WO_EDIT.rakes_lf),
    ridges_lf: numOrZero(WO_EDIT.ridges_lf),
    hips_lf: numOrZero(WO_EDIT.hips_lf),
    valleys_lf: numOrZero(WO_EDIT.valleys_lf),
    walls_lf: numOrZero(WO_EDIT.walls_lf),
    pipes: numOrZero(WO_EDIT.pipes),
    vents: numOrZero(WO_EDIT.vents),
    chimneys: numOrZero(WO_EDIT.chimneys),
    osb_sheets: numOrZero(WO_EDIT.osb_sheets),
    scope_items: WO_EDIT.scope_items,
    additional_scope: WO_EDIT.additional_scope,
    notes: WO_EDIT.notes
  };
  const r = await fetch('/api/workorders', {
    method: 'PUT',
    headers: {'x-tenant-id':'plus-ultra','Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if (!r.ok) { alert('Save failed: HTTP ' + r.status); return; }
  const updated = await r.json();
  const i = CACHED.findIndex(x => x.id === updated.id);
  if (i >= 0) CACHED[i] = updated;
  WO_EDIT = null;
  openDetailById(updated.id);
  renderStats(CACHED);
  applyFilter();
}

function setWoField(field, value){
  if (!WO_EDIT) return;
  WO_EDIT[field] = value;
}

function addScopeItem(){
  if (!WO_EDIT) return;
  WO_EDIT.scope_items.push({ item: '', included: true, qty: null });
  renderEditWo();
}
function removeScopeItem(idx){
  if (!WO_EDIT) return;
  WO_EDIT.scope_items.splice(idx, 1);
  renderEditWo();
}
function updateScopeItem(idx, field, value){
  if (!WO_EDIT) return;
  const it = WO_EDIT.scope_items[idx];
  if (!it) return;
  it[field] = value;
}

function renderEditWo(){
  const w = WO_EDIT; if (!w) return;
  const txt = (label, field, value) => `
    <div class="edit-field"><label>${label}</label><input class="edit-in" value="${esc(value||'')}" oninput="setWoField('${field}', this.value)"></div>`;

    <div class="edit-field"><label>${label}</label>
      <select class="edit-in" onchange="setWoField('${field}', this.value)">
        ${opts.map(o => `<option value="${o}" ${o === value ? 'selected' : ''}>${o.toUpperCase().replace(/_/g,' ')}</option>`).join('')}
      </select>

  const html = `
    <button class="modal-close" onclick="cancelEditWo()">×</button>
    <div class="sub">WO-${w.wo_number || '-'} · <span style="color:#fb923c">EDITING</span></div>

    <div class="modal-section"><h3>Client</h3>
    <div class="edit-grid">
      ${txt('Customer Name','customer_name', w.customer_name)}
      ${txt('Address','address', w.address)}
      ${txt('Phone','phone', w.phone)}
      ${txt('Email','email', w.email)}
    </div>
    <div style="margin-top:10px"><label style="font-family:'Share Tech Mono',monospace;font-size:0.64em;color:rgba(200,220,255,0.5);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;display:block">Special Notes</label>
    <textarea class="edit-in" rows="2" oninput="setWoField('special_notes', this.value)">${esc(w.special_notes||'')}</textarea></div>
    </div>

    <div class="modal-section"><h3>Schedule</h3>
    <div class="edit-grid">
      ${txt('Start Date (YYYY-MM-DD)','start_date', w.start_date)}
      ${txt('Duration (days)','estimated_duration_days', w.estimated_duration_days)}
      ${txt('Sub / Crew Lead','sub_crew_lead', w.sub_crew_lead)}
      ${txt('On-site Contact','onsite_contact', w.onsite_contact)}
    </div></div>

    <div class="modal-section"><h3>Scope</h3>
    <div class="edit-grid">
      ${sel('Job Type','job_type', w.job_type || 'full_replacement', ['full_replacement','repair','gutters','siding','other'])}
      ${txt('Total SQ','total_sq', w.total_sq)}
      ${txt('Pitch','roof_pitch', w.roof_pitch)}
      ${txt('Layers to Remove','layers_to_remove', w.layers_to_remove)}
      ${txt('Shingle Product','shingle_product', w.shingle_product)}
      ${txt('Shingle Color','shingle_color', w.shingle_color)}
      ${sel('Package Tier','package_tier', w.package_tier || 'gold', ['gold','platinum','diamond','grand_manor'])}
    </div></div>

    <div class="modal-section"><h3>Measurements <span style="font-size:0.6em;color:rgba(200,220,255,0.45);letter-spacing:1.5px">· drives the material list</span></h3>
    <div class="edit-grid">
      ${txt('Eaves (LF)','eaves_lf', w.eaves_lf)}
      ${txt('Rakes (LF)','rakes_lf', w.rakes_lf)}
      ${txt('Ridges (LF)','ridges_lf', w.ridges_lf)}
      ${txt('Hips (LF)','hips_lf', w.hips_lf)}
      ${txt('Valleys (LF)','valleys_lf', w.valleys_lf)}
      ${txt('Wall Flashing (LF)','walls_lf', w.walls_lf)}
      ${txt('Pipes','pipes', w.pipes)}
      ${txt('Vents','vents', w.vents)}
      ${txt('Chimneys','chimneys', w.chimneys)}
      ${txt('OSB Redeck (sheets)','osb_sheets', w.osb_sheets)}
    </div></div>

    <div class="modal-section"><h3>Scope Checklist</h3>
      ${w.scope_items.map((s,i) => `
        <div class="edit-scope-item">
          <input type="checkbox" ${s.included ? 'checked' : ''} onchange="updateScopeItem(${i},'included',this.checked)">
          <input class="edit-in" style="flex:1" value="${esc(s.item||'')}" oninput="updateScopeItem(${i},'item',this.value)">
          <input class="edit-in" style="width:80px" placeholder="qty" value="${esc(s.qty||'')}" oninput="updateScopeItem(${i},'qty',this.value)">
          <button class="btn-sm del" onclick="removeScopeItem(${i})">×</button>
        </div>
      `).join('') || '<div style="padding:10px;color:rgba(200,220,255,0.35);font-family:Share Tech Mono,monospace;font-size:0.72em;letter-spacing:1.5px;text-align:center">NO SCOPE ITEMS</div>'}
      <button class="btn-sm add" style="margin-top:8px" onclick="addScopeItem()">+ ADD ITEM</button>

    <div class="modal-section"><h3>Additional Scope + Notes</h3>
      <label style="font-family:'Share Tech Mono',monospace;font-size:0.64em;color:rgba(200,220,255,0.5);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;display:block">Additional Scope</label>
      <textarea class="edit-in" rows="2" oninput="setWoField('additional_scope', this.value)">${esc(w.additional_scope||'')}</textarea>
      <label style="font-family:'Share Tech Mono',monospace;font-size:0.64em;color:rgba(200,220,255,0.5);letter-spacing:1.5px;text-transform:uppercase;margin:10px 0 4px;display:block">Notes</label>

      <button class="btn-sm save" onclick="saveEditWo()">💾 SAVE</button>

  $('modalBody').innerHTML = html;
  $('modalBody').dataset.editingId = w.id;
  $('modalBg').classList.add('on');

function openDetail(idx){
  const w = CACHED[idx];
  if (!w) return;
  const scope = w.scope_items || [];
  const checkMark = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
  const dashMark = `<svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>`;

  const html = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <div style="position:absolute;top:16px;right:56px;display:flex;gap:6px">
      <button onclick='enterEditWo("${esc(w.id)}")' style="background:rgba(34,211,238,0.14);border:1px solid rgba(34,211,238,0.5);color:#22d3ee;padding:6px 12px;border-radius:7px;font-family:'Orbitron',sans-serif;font-size:0.64em;font-weight:800;letter-spacing:1.5px;cursor:pointer" title="Edit work order">✏ EDIT</button>
      <button onclick='RyujinPDF.workOrder(${JSON.stringify(w).replace(/'/g,"&#39;")})' style="background:rgba(251,146,60,0.18);border:1px solid rgba(251,146,60,0.5);color:#fb923c;padding:6px 12px;border-radius:7px;font-family:'Orbitron',sans-serif;font-size:0.64em;font-weight:800;letter-spacing:1.5px;cursor:pointer" title="Download PDF">📄 PDF</button>
    </div>
    <div class="sub">WO-${w.wo_number || '-'} · ${statusBadge(w.status || 'draft')}${w.package_tier ? ' · ' + (w.package_tier.toUpperCase()) : ''}</div>
    <h2>${esc(w.customer_name || '')}</h2>
    <div style="font-size:0.9em;color:rgba(200,220,255,0.7);margin-top:4px">${esc(w.address || '')}</div>
    ${w.phone && false ? `<div style="font-size:0.8em;color:rgba(200,220,255,0.55);margin-top:2px;font-family:'Share Tech Mono',monospace;letter-spacing:1px">${esc(w.phone)}</div>` : ''}

    <div class="modal-section"><h3>Job Details</h3>
    <div class="info-grid">
      <div class="item"><div class="label">Job Type</div><div class="value">${esc((w.job_type||'full_replacement').replace(/_/g,' '))}</div></div>
      <div class="item"><div class="label">Total SQ</div><div class="value">${w.total_sq || '-'} SQ</div></div>
      <div class="item"><div class="label">Pitch</div><div class="value">${esc(w.roof_pitch || '-')}</div></div>
      <div class="item"><div class="label">Layers to Remove</div><div class="value">${w.layers_to_remove || '-'}</div></div>
      <div class="item"><div class="label">Shingle Product</div><div class="value">${esc(w.shingle_product || '-')}</div></div>
      <div class="item"><div class="label">Color</div><div class="value">${esc(w.shingle_color || 'TBD')}</div></div>
      <div class="item"><div class="label">Start Date</div><div class="value">${w.start_date || 'TBD'}</div></div>
      <div class="item"><div class="label">Est. Duration</div><div class="value">${w.estimated_duration_days ? w.estimated_duration_days + ' days' : 'TBD'}</div></div>
    </div></div>

    ${(w.eaves_lf || w.rakes_lf || w.ridges_lf || w.hips_lf || w.valleys_lf || w.walls_lf || w.pipes || w.vents || w.chimneys || w.osb_sheets) ? `<div class="modal-section"><h3>Measurements</h3>
    <div class="info-grid">
      ${w.eaves_lf ? `<div class="item"><div class="label">Eaves</div><div class="value">${w.eaves_lf} LF</div></div>` : ''}
      ${w.rakes_lf ? `<div class="item"><div class="label">Rakes</div><div class="value">${w.rakes_lf} LF</div></div>` : ''}
      ${w.ridges_lf ? `<div class="item"><div class="label">Ridges</div><div class="value">${w.ridges_lf} LF</div></div>` : ''}
      ${w.hips_lf ? `<div class="item"><div class="label">Hips</div><div class="value">${w.hips_lf} LF</div></div>` : ''}
      ${w.valleys_lf ? `<div class="item"><div class="label">Valleys</div><div class="value">${w.valleys_lf} LF</div></div>` : ''}
      ${w.walls_lf ? `<div class="item"><div class="label">Wall Flashing</div><div class="value">${w.walls_lf} LF</div></div>` : ''}
      ${w.pipes ? `<div class="item"><div class="label">Pipes</div><div class="value">${w.pipes}</div></div>` : ''}
      ${w.vents ? `<div class="item"><div class="label">Vents</div><div class="value">${w.vents}</div></div>` : ''}
      ${w.chimneys ? `<div class="item"><div class="label">Chimneys</div><div class="value">${w.chimneys}</div></div>` : ''}
      ${w.osb_sheets ? `<div class="item"><div class="label">OSB Redeck</div><div class="value">${w.osb_sheets} sheets</div></div>` : ''}
    </div></div>` : `<div class="modal-section"><h3>Measurements</h3>
    <div style="padding:12px 14px;background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.3);border-radius:10px;color:rgba(200,220,255,0.78);font-size:0.82em;line-height:1.45">
      <strong style="color:#fb923c">Not recorded.</strong> Click EDIT above to enter eaves, rakes, valleys, ridges, and hips — the material order can't be calculated accurately without them.
    </div></div>`}

    ${scope.length ? `<div class="modal-section"><h3>Scope Checklist</h3>
    <ul class="scope-list">${scope.map(s => `<li class="${s.included ? '' : 'off'}"><span class="chk">${s.included ? checkMark : dashMark}</span>${esc(s.item)}${s.qty ? ' (' + s.qty + ')' : ''}</li>`).join('')}</ul></div>` : ''}

    ${w.special_notes && !SENSITIVE_RX.test(w.special_notes) ? `<div class="modal-section"><h3>Site / Access</h3><div style="color:#e0e6f0;line-height:1.5;font-size:0.9em">${esc(w.special_notes)}</div></div>` : ''}

    ${w.notes && !SENSITIVE_RX.test(w.notes) ? `<div class="modal-section"><h3>Notes</h3><div style="color:rgba(200,220,255,0.7);line-height:1.5;font-size:0.85em;font-family:'Share Tech Mono',monospace;letter-spacing:0.3px">${esc(w.notes)}</div></div>` : ''}
  `;
  $('modalBody').innerHTML = html;
  $('modalBody').dataset.currentId = w.id;
  delete $('modalBody').dataset.editingId;
  $('modalBg').classList.add('on');
}

function closeModal(){ $('modalBg').classList.remove('on'); }

function openPrivacySettings(){
  const terms = loadSensitiveTerms();
  $('settingsBody').innerHTML = `
    <button class="modal-close" onclick="closeSettings()">×</button>
    <h2>Privacy Filter</h2>
    <div class="sub">WORD LIST · REDACTED FROM NOTES + PDFS</div>
    <p style="color:rgba(200,220,255,0.7);font-size:0.88em;line-height:1.5;margin-bottom:14px">
      Any note containing one of these words (case-insensitive substring match) is hidden from the work order display and the PDF. One per line. Changes apply instantly — no code edits, no redeploy.
    </p>
    <textarea id="privTerms" rows="14" class="edit-in" style="font-family:'Share Tech Mono',monospace;font-size:0.88em;white-space:pre">${esc(terms.join('\n'))}</textarea>
    <div style="margin-top:14px;display:flex;gap:10px;justify-content:space-between;align-items:center">
      <button class="btn-sm cancel" onclick="resetPrivacyDefaults()" title="Restore the shipped default list">↺ RESET DEFAULTS</button>
      <div style="display:flex;gap:10px">
        <button class="btn-sm cancel" onclick="closeSettings()">CANCEL</button>
        <button class="btn-sm save" onclick="savePrivacySettings()">💾 SAVE</button>
      </div>
    </div>
  `;
  $('settingsBg').classList.add('on');
}
function closeSettings(){ $('settingsBg').classList.remove('on'); }
function resetPrivacyDefaults(){
  const ta = $('privTerms');
  if (ta) ta.value = SENSITIVE_DEFAULTS.join('\n');
}
function savePrivacySettings(){
  const ta = $('privTerms');
  if (!ta) return;
  const terms = ta.value.split('\n').map(s => s.trim()).filter(Boolean);
  try { localStorage.setItem(SENSITIVE_KEY, terms.join('\n')); } catch {}
  SENSITIVE_RX = buildSensitiveRx(terms);
  closeSettings();
  // Refresh any open detail view so filtering reflects the new list.
  const openId = $('modalBody').dataset.currentId;
  if ($('modalBg').classList.contains('on') && openId && !WO_EDIT) openDetailById(openId);
}

// Don't close the modal while editing — would discard unsaved changes.
// Exit editing explicitly via × or CANCEL.
function handleModalBgClick(e){
  if (e.target !== e.currentTarget) return;
  if (WO_EDIT) return;
  closeModal();
}

function goBack(){
  if (window.parent !== window && window.parent.exitSectionOverlay) { window.parent.exitSectionOverlay(); return; }
  window.location.href = 'production.html';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if ($('settingsBg').classList.contains('on')) {
      e.preventDefault();
      closeSettings();
    } else if ($('modalBg').classList.contains('on')) {
      if (WO_EDIT) return;
      e.preventDefault();
      closeModal();
    } else {
      e.preventDefault();
      goBack();
    }
  }
});

loadAll().then(() => {
  const params = new URLSearchParams(location.search);
  const woNum = params.get('wo');
  const woId = params.get('id');
  if (woNum || woId) {
    const idx = CACHED.findIndex(w => (woNum && String(w.wo_number) === String(woNum)) || (woId && w.id === woId));
    if (idx >= 0) setTimeout(() => openDetail(idx), 100);
  }
});
