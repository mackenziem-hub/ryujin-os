<!DOCTYPE html>
<html lang="en">

<title>Ryujin OS · Work Orders</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--accent:#fb923c;--border:rgba(251,146,60,0.24);--border-hi:rgba(251,146,60,0.55);
  --text:#e0e6f0;--text-dim:rgba(160,190,230,0.62);--text-muted:rgba(140,170,220,0.32);
  --green:#4ade80;--red:#f87171;--yellow:#facc15;--cyan:#22d3ee}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:var(--text);overflow:hidden}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 35% 25%,rgba(251,146,60,0.08),transparent 55%),linear-gradient(180deg,#060a14,#030611)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(251,146,60,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(251,146,60,0.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at center,black 40%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 40%,transparent 85%)}
.app{position:relative;z-index:2;height:100vh;display:grid;grid-template-rows:56px 1fr;gap:10px;padding:10px 12px}

.topbar{display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.82);border:1px solid var(--border);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);position:relative;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--red),transparent);opacity:0.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.3),rgba(251,146,60,0.22) 40%,rgba(30,10,5,0.8));box-shadow:0 0 14px rgba(251,146,60,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.82em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:var(--text-dim);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}
.btn{padding:8px 14px;border-radius:9px;font-family:'Orbitron',sans-serif;font-size:0.68em;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:all 0.2s;border:1px solid;display:inline-flex;align-items:center;gap:8px;text-decoration:none}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn.ghost{background:rgba(6,10,20,0.6);border-color:var(--border);color:var(--text-dim)}
.btn.ghost:hover{border-color:var(--border-hi);color:var(--accent)}
.btn.primary{background:linear-gradient(135deg,var(--accent),#c2410c);border-color:var(--accent);color:#0a0604;box-shadow:0 0 16px rgba(251,146,60,0.35)}
.btn.primary:hover{filter:brightness(1.1)}
.btn.success{background:linear-gradient(135deg,var(--green),#16a34a);border-color:var(--green);color:#05180a;box-shadow:0 0 16px rgba(74,222,128,0.35)}

/* Layout */
.main{display:grid;grid-template-columns:300px 1fr;gap:10px;min-height:0}
.panel{background:rgba(14,22,40,0.78);border:1px solid var(--border);border-radius:14px;backdrop-filter:blur(14px);display:flex;flex-direction:column;min-height:0;overflow:hidden;position:relative}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.5}
.panel-head{padding:14px 18px;border-bottom:1px solid rgba(251,146,60,0.12)}
.panel-title{font-family:'Orbitron',sans-serif;font-size:0.68em;font-weight:800;letter-spacing:2.5px;color:var(--accent);text-transform:uppercase}
.panel-sub{font-family:'Share Tech Mono',monospace;font-size:0.68em;color:var(--text-muted);letter-spacing:1px;margin-top:3px}
.panel-body{flex:1;overflow-y:auto}

/* Left: WO list */
.wo-item{padding:14px 18px;border-bottom:1px solid rgba(251,146,60,0.08);cursor:pointer;transition:all 0.15s;position:relative}
.wo-item:hover{background:rgba(251,146,60,0.04)}
.wo-item.on{background:rgba(251,146,60,0.08)}
.wo-item.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.wo-num{font-family:'Share Tech Mono',monospace;font-size:0.68em;color:var(--text-muted);letter-spacing:1.2px}
.wo-client{font-family:'Orbitron',sans-serif;font-weight:800;font-size:0.86em;letter-spacing:0.5px;margin:3px 0 2px}
.wo-addr{font-size:0.76em;color:var(--text-dim)}
.wo-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-family:'Share Tech Mono',monospace;font-size:0.7em;letter-spacing:0.8px}
.wo-foot .st{padding:2px 8px;border-radius:4px}
.wo-foot .st.draft{background:rgba(160,190,230,0.12);color:var(--text-dim)}
.wo-foot .st.scheduled{background:rgba(34,211,238,0.12);color:var(--cyan);border:1px solid rgba(34,211,238,0.3)}
.wo-foot .st.active{background:rgba(250,204,21,0.12);color:var(--yellow);border:1px solid rgba(250,204,21,0.3)}
.wo-foot .st.complete{background:rgba(74,222,128,0.12);color:var(--green);border:1px solid rgba(74,222,128,0.3)}
.wo-foot .v{font-family:'Orbitron',sans-serif;font-weight:700;color:var(--accent)}

/* Right: WO detail */
.wo-detail-head{padding:20px 24px 16px;border-bottom:1px solid rgba(251,146,60,0.12);display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
.wo-detail-num{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-muted);letter-spacing:2px;margin-bottom:6px}
.wo-detail-client{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.5em;letter-spacing:0.5px;margin-bottom:4px}
.wo-detail-addr{font-size:0.92em;color:var(--text-dim)}
.wo-detail-meta{display:flex;gap:16px;font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:1px;margin-top:10px}
.wo-detail-meta b{color:var(--accent)}
.wo-actions{display:flex;gap:8px;flex-wrap:wrap}

.wo-body{padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
.wo-card{background:rgba(6,10,20,0.55);border:1px solid rgba(251,146,60,0.12);border-radius:11px;padding:16px 18px}
.wo-card h4{font-family:'Orbitron',sans-serif;font-size:0.66em;font-weight:800;letter-spacing:2px;color:var(--accent);margin-bottom:12px;text-transform:uppercase;border-bottom:1px dashed rgba(251,146,60,0.2);padding-bottom:8px}
.wo-kv{display:flex;justify-content:space-between;padding:6px 0;font-size:0.88em;border-bottom:1px solid rgba(251,146,60,0.05)}
.wo-kv:last-child{border-bottom:none}
.wo-kv .k{color:var(--text-dim)}
.wo-kv .v{color:var(--text);font-weight:600}

.wo-tasks{grid-column:1 / -1}
.wo-task{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(251,146,60,0.06)}
.wo-task:last-child{border-bottom:none}
.wo-check{width:22px;height:22px;border:1.5px solid rgba(251,146,60,0.35);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.wo-check.on{background:var(--accent);border-color:var(--accent);color:#0a0604}
.wo-check svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:3;stroke-linecap:round;display:none}
.wo-check.on svg{display:block}
.wo-task-body{flex:1}
.wo-task-title{font-size:0.92em;color:var(--text);font-weight:500;margin-bottom:3px}
.wo-task-meta{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:var(--text-muted);letter-spacing:0.5px}

.wo-notes{grid-column:1 / -1}
.wo-notes textarea{width:100%;min-height:100px;background:rgba(6,10,20,0.7);border:1px solid rgba(251,146,60,0.2);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.9em;resize:vertical;line-height:1.5}
.wo-notes textarea:focus{outline:none;border-color:var(--border-hi)}

.new-btn{width:100%;padding:14px;background:linear-gradient(135deg,rgba(251,146,60,0.12),rgba(194,65,12,0.06));border:1px dashed var(--border-hi);border-radius:11px;color:var(--accent);font-family:'Orbitron',sans-serif;font-weight:800;font-size:0.72em;letter-spacing:2px;cursor:pointer;transition:all 0.2s;margin:12px}
.new-btn:hover{background:rgba(251,146,60,0.15)}

@media (max-width: 980px){
  .main{grid-template-columns:1fr}
  .wo-body{grid-template-columns:1fr}
}

@media print{
  .bg,.bg-grid,.topbar,.panel:first-child,.wo-actions{display:none!important}
  body{background:#fff!important;color:#000!important}
  .panel{background:#fff!important;border:none!important}
  .wo-card{border:1px solid #ccc!important;background:#fff!important}
  .wo-detail-client,.wo-card h4,.panel-title{color:#0a1530!important;-webkit-text-fill-color:#0a1530!important}
}


/* Mobile — tool pages should be scrollable and stack columns */
@media (max-width: 900px){
  html,body{overflow:auto!important;height:auto!important;min-height:100%}
  body{overflow-x:hidden}
  .app{height:auto!important;min-height:100vh;grid-template-rows:auto auto 1fr!important;padding:8px 8px}
  .topbar{position:sticky;top:0;z-index:15;flex-wrap:wrap;padding:8px 12px!important;height:auto!important;gap:6px}
  .topbar .btn,.topbar .tb-icon{padding:6px 9px;font-size:0.6em;letter-spacing:0.8px}
  .topbar .btn svg,.topbar .tb-icon svg{width:12px;height:12px}
  .topbar .brand-name{font-size:0.7em}
  .tb-spacer{display:none}
  .main{grid-template-columns:1fr!important;grid-auto-rows:auto!important;gap:10px}
  .panel{max-height:none;min-height:280px}
  .panel-head{padding:12px 14px!important;flex-wrap:wrap;gap:8px}
  .panel-body{padding:10px 12px!important}
  .field-row,.field-row.three{grid-template-columns:1fr!important}
  /* Pay sheet 3-col → 1-col */
  .step-nav{order:-1;max-height:none;padding:10px!important}
  .content-body{padding:14px 16px!important}
  .content-foot{flex-direction:column;gap:6px;padding:10px!important}
  .content-foot .btn{width:100%;justify-content:center}
}
</style>
</head>

</div>

// v4 storage key — seeded with real Plus Ultra signed jobs.
// Bump this key when default data changes so users get fresh seed.
const WO_KEY = 'ry_v1_work_orders_v4';
function loadWOs(){
  try {
    const r = localStorage.getItem(WO_KEY);
    if (r) return JSON.parse(r);
  } catch(e){}
  // First load: seed with current signed jobs
  const seed = DEFAULT_WOS.map(wo => ({ ...wo, taskDone: {} }));
  try { localStorage.setItem(WO_KEY, JSON.stringify(seed)); } catch(e){}
  return seed;
}
function saveWOs(list){
  try { localStorage.setItem(WO_KEY, JSON.stringify(list)); } catch(e){}
}

const wos = loadWOs();
// If ?wo=WO-xxx is in URL, pre-select that work order (coming from Materials link)
const urlWo = new URLSearchParams(location.search).get('wo');
let selected = 0;
if (urlWo) {
  const idx = wos.findIndex(w => w.num === urlWo);
  if (idx >= 0) selected = idx;
}

// ── Render ──
function $(id){ return document.getElementById(id); }
function fmt(n){ return '$' + Math.round(n).toLocaleString('en-CA'); }

function renderList(){
  $('listCount').textContent = wos.length + ' order' + (wos.length === 1 ? '' : 's');
  if (!wos.length) {
    $('woList').innerHTML = '<div style="padding:36px 24px;text-align:center;color:var(--text-muted);font-size:0.88em;line-height:1.6">No work orders yet.<br><span style="font-family:\'Share Tech Mono\',monospace;font-size:0.82em;color:var(--text-dim)">Click <b style="color:var(--accent)">+ NEW WORK ORDER</b> below to add your first one.</span></div>';
    return;
  }
  $('woList').innerHTML = wos.map((w, i) => `
    <div class="wo-item ${i === selected ? 'on' : ''}" onclick="selectWO(${i})">
      <div class="wo-num">${w.num}</div>
      <div class="wo-client">${w.client}</div>
      <div class="wo-addr">${(w.address || '').split(',')[0]}</div>
      <div class="wo-foot">
        <span class="st ${w.status}">${w.status.toUpperCase()}</span>
        <span class="v">${fmt(w.total)}</span>
      </div>
    </div>
  `).join('');
}

function renderDetail(){
  const w = wos[selected];
  if (!w) {
    $('woDetail').innerHTML = `
      <div style="padding:80px 40px;text-align:center">
        <div style="width:72px;height:72px;margin:0 auto 18px;border-radius:18px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.25),rgba(251,146,60,0.2) 40%,rgba(10,5,2,0.9));border:1px solid rgba(251,146,60,0.35);display:flex;align-items:center;justify-content:center;color:var(--accent);box-shadow:0 0 22px rgba(251,146,60,0.15)">
          <svg viewBox="0 0 24 24" style="width:34px;height:34px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/><line x1="9" y1="11" x2="15" y2="11"/></svg>
        </div>
        <h3 style="font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.15em;letter-spacing:0.5px;color:var(--text);margin-bottom:10px">No work orders yet</h3>
        <p style="color:var(--text-dim);font-size:0.92em;line-height:1.55;max-width:420px;margin:0 auto 22px">Create a work order for a signed job. Includes scope, crew assignment, task checklist, and client contact info.</p>
        <button class="btn primary" onclick="newWO()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>NEW WORK ORDER</button>
      </div>
    `;
    return;
  }
  const doneCount = Object.values(w.taskDone || {}).filter(Boolean).length;
  // Editable field helper — every input saves on blur
  const inp = (field, type, value, placeholder) => `<input data-wo-field="${field}" type="${type}" value="${(value ?? '').toString().replace(/"/g, '&quot;')}" placeholder="${placeholder || ''}" style="background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.18);color:var(--text);padding:8px 11px;border-radius:7px;font-family:inherit;font-size:0.92em;width:100%;outline:none" />`;
  const sel = (field, value, options) => `<select data-wo-field="${field}" style="background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.18);color:var(--text);padding:8px 11px;border-radius:7px;font-family:inherit;font-size:0.92em;width:100%;outline:none">${options.map(o => `<option value="${o}" ${o === value ? 'selected' : ''}>${o}</option>`).join('')}</select>`;

  $('woDetail').innerHTML = `
    <div class="wo-detail-head">
      <div style="flex:1;min-width:0">
        <div class="wo-detail-num">${w.num}</div>
        <div style="margin:5px 0 8px">${inp('client','text',w.client,'Client name')}</div>
        <div>${inp('address','text',w.address,'Street, City Province')}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;min-width:200px">
        <div style="display:flex;gap:6px;align-items:center">
          <span style="font-family:'Share Tech Mono',monospace;font-size:0.68em;color:var(--text-muted);letter-spacing:1.5px">STATUS</span>
          ${sel('status', w.status, ['draft','scheduled','active','complete'])}
        </div>
      </div>
    </div>
    <div class="wo-body">
      <div class="wo-card">
        <h4>Client Contact</h4>
        <div style="display:grid;gap:10px">
          <div><label style="font-family:'Share Tech Mono',monospace;font-size:0.62em;color:var(--text-muted);letter-spacing:1.5px;display:block;margin-bottom:4px">PHONE</label>${inp('phone','tel',w.phone,'(506) 555-0100')}</div>
          <div><label style="font-family:'Share Tech Mono',monospace;font-size:0.62em;color:var(--text-muted);letter-spacing:1.5px;display:block;margin-bottom:4px">EMAIL</label>${inp('email','email',w.email || '','name@example.com')}</div>
        </div>
        <div class="wo-actions" style="margin-top:12px">
          <button class="btn ghost" onclick="callClient()"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>CALL</button>
          <button class="btn ghost" onclick="smsClient()"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>SMS</button>
          <button class="btn primary" onclick="openMaterials('${w.num}')"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>MATERIAL LIST</button>
        </div>
      </div>

      <div class="wo-card">
        <h4>Scope &amp; Schedule</h4>
        <div style="display:grid;gap:10px">
          <div><label style="font-family:'Share Tech Mono',monospace;font-size:0.62em;color:var(--text-muted);letter-spacing:1.5px;display:block;margin-bottom:4px">SCOPE OF WORK</label><textarea data-wo-field="scope" style="background:rgba(6,10,20,0.6);border:1px solid rgba(251,146,60,0.18);color:var(--text);padding:8px 11px;border-radius:7px;font-family:inherit;font-size:0.92em;width:100%;min-height:54px;outline:none;resize:vertical" placeholder="Full tear-off + install...">${w.scope || ''}</textarea></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div><label style="font-family:'Share Tech Mono',monospace;font-size:0.62em;color:var(--text-muted);letter-spacing:1.5px;display:block;margin-bottom:4px">SQ</label>${inp('sq','number',w.sq,'')}</div>
            <div><label style="font-family:'Share Tech Mono',monospace;font-size:0.62em;color:var(--text-muted);letter-spacing:1.5px;display:block;margin-bottom:4px">TIER</label>${sel('tier', w.tier, ['Economy','Gold','Platinum','Diamond','Custom','Full Exterior'])}</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div><label style="font-family:'Share Tech Mono',monospace;font-size:0.62em;color:var(--text-muted);letter-spacing:1.5px;display:block;margin-bottom:4px">START DATE</label>${inp('start','date',w.start,'')}</div>
            <div><label style="font-family:'Share Tech Mono',monospace;font-size:0.62em;color:var(--text-muted);letter-spacing:1.5px;display:block;margin-bottom:4px">DAYS</label>${inp('days','number',w.days,'3')}</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div><label style="font-family:'Share Tech Mono',monospace;font-size:0.62em;color:var(--text-muted);letter-spacing:1.5px;display:block;margin-bottom:4px">TOTAL ($)</label>${inp('total','number',w.total,'')}</div>
            <div><label style="font-family:'Share Tech Mono',monospace;font-size:0.62em;color:var(--text-muted);letter-spacing:1.5px;display:block;margin-bottom:4px">DEPOSIT ($)</label>${inp('deposit','number',w.deposit,'')}</div>
          </div>
          <div><label style="font-family:'Share Tech Mono',monospace;font-size:0.62em;color:var(--text-muted);letter-spacing:1.5px;display:block;margin-bottom:4px">CREW / SUB</label>${inp('crew','text',w.crew,'Ryan · Atlantic Roofing')}</div>
        </div>
      </div>

      <div class="wo-card wo-tasks">
        <h4>Task Checklist · ${doneCount}/${w.tasks.length} done</h4>
        ${w.tasks.map((t, i) => `
          <div class="wo-task">
            <div class="wo-check ${w.taskDone && w.taskDone[i] ? 'on' : ''}" onclick="toggleTask(${i})"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
            <div class="wo-task-body">
              <div class="wo-task-title">${t.t}</div>
              <div class="wo-task-meta">${t.m}</div>
            </div>
          </div>
        `).join('')}
      </div>

      <div class="wo-card wo-notes">
        <h4>Notes</h4>
        <textarea id="woNotes" oninput="updateNotes(this.value)" placeholder="Site access notes, customer preferences, hidden damage flags...">${w.notes || ''}</textarea>
      </div>
    </div>
  `;

  // Wire inline-edit handlers — any field change saves to storage
  document.querySelectorAll('[data-wo-field]').forEach(el => {
    el.addEventListener('change', () => updateField(el.dataset.woField, el.value));
    el.addEventListener('blur',   () => updateField(el.dataset.woField, el.value));
  });
}

function updateField(field, value){
  if (!wos[selected]) return;
  // Coerce numeric fields
  if (['sq','days','total','deposit'].includes(field)) value = parseFloat(value) || 0;
  wos[selected][field] = value;
  saveWOs(wos);
  // Refresh list sidebar (client name / status may have changed)
  renderList();
}
window.updateField = updateField;

function selectWO(i){ selected = i; renderList(); renderDetail(); }
function toggleTask(i){
  const w = wos[selected];
  w.taskDone = w.taskDone || {};
  w.taskDone[i] = !w.taskDone[i];
  saveWOs(wos);
  renderDetail();
}
function updateNotes(v){ wos[selected].notes = v; saveWOs(wos); }

function markActive(){
  wos[selected].status = wos[selected].status === 'active' ? 'complete' : (wos[selected].status === 'scheduled' ? 'active' : 'scheduled');
  saveWOs(wos);
  renderList(); renderDetail();
}

function newWO(){
  const client = prompt('Client name?');
  if (!client) return;
  const address = prompt('Address?', '');
  const phone = prompt('Client phone?', '') || '';
  const email = prompt('Client email?', '') || '';
  const scope = prompt('One-line scope?', 'Full tear-off + install');
  const sq = parseInt(prompt('Squares?', '20'), 10) || 20;
  const start = prompt('Start date (YYYY-MM-DD)?', new Date(Date.now() + 7*24*60*60*1000).toISOString().slice(0,10));
  const tier = prompt('Tier? (Economy / Gold / Platinum / Diamond)', 'Gold') || 'Gold';
  // Sub-crew pulled from tenant config
  const tenantSub = (window.RyujinTenant && RyujinTenant.get().sub) || { name: '', contact: '' };
  const crew = tenantSub.name ? (tenantSub.contact + ' · ' + tenantSub.name) : '';
  // Per-SQ rate: real Plus Ultra Gold ~$600/SQ selling price (placeholder fallback if no engine)
  const totalEstimate = sq * 600;
  wos.unshift({
    num: 'WO-' + new Date().toISOString().slice(5,10).replace('-','') + '-' + String(wos.length + 1).padStart(2,'0'),
    status: 'draft', client, address: address || '', phone, email,
    scope: scope || '', sq, system: 'asphalt', tier,
    start: start || new Date().toISOString().slice(0,10), days: 3, crew,
    total: totalEstimate, deposit: Math.round(totalEstimate * 0.35),
    matJobId: '', // link to material list later via edit
    tasks: [
      { t: 'Prep + landscaping tarps', m: 'Day 1' },
      { t: 'Tear-off to deck', m: 'Day 1' },
      { t: 'Substrate inspection', m: 'Day 1' },
      { t: 'Ice & water shield', m: 'Day 2' },
      { t: 'Underlayment', m: 'Day 2' },
      { t: 'Drip + flashings', m: 'Day 2' },
      { t: 'Shingle install', m: 'Day 2-3' },
      { t: 'Ridge vent', m: 'Day 3' },
      { t: 'Cleanup + magnet', m: 'Day 3' },
      { t: 'Walkthrough + sign-off', m: 'Day 3' }
    ],
    taskDone: {},
    notes: ''
  });
  selected = 0;
  saveWOs(wos);
  renderList(); renderDetail();
}

function callClient(){
  const w = wos[selected];
  if (w.phone && window.RyujinActions) RyujinActions.call(w.phone);
  else alert('No phone on file — add one first.');
}
function smsClient(){
  const w = wos[selected];
  if (!w.phone) { alert('No phone on file'); return; }
  const body = `Hi ${w.client.split(' ')[0]} — ${w.num} scheduled ${w.start}. Any questions before we start? — Plus Ultra`;
  if (window.RyujinActions) RyujinActions.sms(w.phone, body);
}

function smsToForeman(){
  const w = wos[selected];
  const body = `${w.num} · ${w.client}\n${w.address}\nScope: ${w.scope}\nStart ${w.start}\nCrew: ${w.crew}`;
  if (window.RyujinActions) RyujinActions.sms('', body);
}

function printWO(){ window.print(); }
function openMaterials(jobId){
  // Pass the WO number so the materials page can auto-generate a list if none exists
  window.location.href = 'production-materials.html?wo=' + encodeURIComponent(jobId);
}
function goBack(){ window.location.href = 'production.html'; }

document.addEventListener('keydown', e => { if (e.key === 'Escape') goBack(); });
document.addEventListener('contextmenu', e => { e.preventDefault(); goBack(); });

window.selectWO = selectWO;
window.toggleTask = toggleTask;
window.updateNotes = updateNotes;
window.markActive = markActive;
window.newWO = newWO;
window.callClient = callClient;
window.smsClient = smsClient;
window.smsToForeman = smsToForeman;
window.printWO = printWO;
window.openMaterials = openMaterials;
window.goBack = goBack;

renderList();
renderDetail();
</script>
<script src="assets/ryujin-prod-nav.js"></script>
</body>
</html>
