<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060a14">
<title>Portal · Ryujin OS</title>
<script>
  (function () {
    const r = (new URLSearchParams(location.search).get('role') || '').toLowerCase();
    const pillar = ({ sales: 'sales', service: 'service', crew: 'production', team: 'production', estimator: 'sales' })[r] || 'sales';
    document.documentElement.dataset.pillar = pillar;
  })();
</script>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2322d3ee'/%3E%3Cstop offset='1' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%23060a14'/%3E%3Ctext x='32' y='46' font-family='sans-serif' font-size='44' font-weight='800' text-anchor='middle' fill='url(%23g)'%3ER%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<style>
:root{--bg:#060a14;--glass:rgba(20,30,50,0.85);--glass2:rgba(22,34,58,0.80);--glass-border:rgba(45,212,191,0.16);--glass-border-hi:rgba(45,212,191,0.35);--text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);--accent:#2dd4bf;--blue:#4a9eff;--accent-2:#0ea5e9;--green:#4ade80;--gold:#fbbf24;--orange:#fb923c;--red:#f87171;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;padding:32px 22px 60px}
.wrap{max-width:1100px;margin:0 auto}
.crumb{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.greeting{font-family:'Orbitron',monospace;font-size:1.9em;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,#e0e6f0 20%,var(--accent) 65%,var(--accent-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.sub{font-size:0.95em;color:var(--text-dim);max-width:780px;line-height:1.5;margin-bottom:28px}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,180px),1fr));gap:12px;margin-bottom:24px}
.stat-tile{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
.stat-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.45}
.stat-tile .num{font-family:'Orbitron',monospace;font-size:1.6em;font-weight:800;line-height:1.1}
.stat-tile .num.cyan{color:var(--accent)}.stat-tile .num.gold{color:var(--gold)}.stat-tile .num.green{color:var(--green)}.stat-tile .num.orange{color:var(--orange)}.stat-tile .num.purple{color:#5eead4}
.stat-tile .lbl{font-family:'Orbitron',monospace;font-size:0.6em;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-top:6px}

.section-head{display:flex;align-items:baseline;gap:10px;margin:24px 0 12px;font-family:'Orbitron',monospace}
.section-head h2{font-size:0.78em;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.section-head .count-pill{font-size:0.65em;font-family:'Share Tech Mono',monospace;padding:2px 8px;border-radius:10px;background:rgba(45,212,191,0.1);border:1px solid var(--glass-border);color:var(--accent)}

.action-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,260px),1fr));gap:12px;margin-bottom:24px}
.action-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:18px 18px;text-decoration:none;color:var(--text);position:relative;overflow:hidden;transition:all 0.18s;display:flex;align-items:flex-start;gap:14px;min-width:0}
.action-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent) 30%,var(--accent-2) 70%,transparent);opacity:0.6}
.action-card:hover{border-color:var(--glass-border-hi);transform:translateY(-2px);box-shadow:0 6px 18px rgba(45,212,191,0.15)}
.action-card .ico{font-size:1.6em;flex-shrink:0;color:var(--accent);font-family:'Orbitron',monospace;font-weight:800}
.action-card .body{min-width:0}
.action-card .label{font-family:'Orbitron',monospace;font-size:0.85em;font-weight:700;letter-spacing:1px;color:var(--text);margin-bottom:4px}
.action-card .desc{font-size:0.82em;color:var(--text-dim);line-height:1.4;overflow-wrap:anywhere}

.brief-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;position:relative;overflow:hidden;min-width:0;overflow-wrap:anywhere}
.brief-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent) 25%,var(--accent-2) 75%,transparent);opacity:0.6}
.brief-card.urgent::before{background:linear-gradient(90deg,transparent,var(--red) 25%,var(--orange) 75%,transparent);opacity:0.85}
.brief-card.high::before{background:linear-gradient(90deg,transparent,var(--orange) 25%,var(--gold) 75%,transparent);opacity:0.7}
.brief-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.brief-prio{font-family:'Share Tech Mono',monospace;font-size:0.6em;letter-spacing:1.6px;text-transform:uppercase;padding:2px 7px;border-radius:9px}
.brief-prio.urgent{background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.3)}
.brief-prio.high{background:rgba(251,146,60,0.15);color:var(--orange);border:1px solid rgba(251,146,60,0.3)}
.brief-prio.normal{background:rgba(45,212,191,0.1);color:var(--accent);border:1px solid var(--glass-border)}
.brief-source{font-size:0.65em;color:var(--text-muted);font-family:'Share Tech Mono',monospace;letter-spacing:1px;text-transform:uppercase}
.brief-title{font-size:0.92em;font-weight:600;color:var(--text);line-height:1.35}
.brief-body{font-size:0.78em;color:var(--text-dim);line-height:1.4;margin-top:4px}

.empty-state{text-align:center;padding:24px 16px;color:var(--text-dim);border:1px dashed var(--glass-border);border-radius:var(--radius);font-size:0.9em}
.empty-state .ico{font-size:1.6em;margin-bottom:6px;opacity:0.5}
.skeleton{background:linear-gradient(90deg,var(--glass) 0%,var(--glass2) 50%,var(--glass) 100%);background-size:200% 100%;animation:sk 1.4s infinite;border:1px solid var(--glass-border);border-radius:var(--radius);height:48px;margin-bottom:8px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

.footer-link{display:inline-block;margin-top:30px;font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-dim);text-decoration:none;border:1px solid var(--glass-border);padding:8px 16px;border-radius:18px;transition:all 0.15s}
.footer-link:hover{color:var(--accent);border-color:var(--glass-border-hi)}

@media(max-width:540px){
  body{padding:18px 12px}
  .greeting{font-size:1.4em}
  .stat-row{grid-template-columns:1fr 1fr;gap:8px}
  .stat-tile{padding:10px 12px}
  .stat-tile .num{font-size:1.3em}
  .action-grid{grid-template-columns:1fr;gap:8px}
  .action-card{padding:12px 14px}
}
</style>
  <script src="/assets/ryujin-slug.js"></script>
</head>
<body>
<div class="wrap">
  <div class="crumb" id="roleCrumb">Portal</div>
  <h1 class="greeting" id="greeting">Welcome.</h1>
  <p class="sub" id="subline">Loading your day…</p>

  <div class="stat-row" id="statRow">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  </div>

  <div class="section-head"><h2>Tasks</h2><span class="count-pill" id="queueCount">—</span></div>
  <div id="queueList"><div class="skeleton"></div></div>

  <div class="section-head" style="margin-top:30px"><h2>Quick Actions</h2></div>
  <div class="action-grid" id="actionGrid"></div>

  <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:30px">
    <a href="/admin-overview.html" class="footer-link" style="margin-top:0">Open full Ryujin OS →</a>
    <a href="#" data-install-btn class="footer-link" style="margin-top:0">📱 Install on phone</a>
  </div>
</div>
<script src="/assets/mode-switcher.js" defer></script>
<script src="/assets/page-catalog.js" defer></script>
<script src="/assets/agent-mode-shell.js" defer></script>
<script src="/assets/interactive-mode-shell.js" defer></script>
<script src="/assets/install-pwa.js" defer></script>

<script>
const TENANT = window.RYUJIN_TENANT_SLUG;
const params = new URLSearchParams(location.search);
const ROLE = (params.get('role') || 'sales').toLowerCase();
const USER_FILTER = params.get('user') || null; // user_id slug if pre-filtered
const PERSON_NAME = params.get('name') || null;

// Role-driven configuration. Each role: greeting prefix, the pillar(s) it
// cares about, and a quick-action set. Stays simple — these are entry-point
// portals that route into existing pages, not new tools.
const ROLE_CONFIG = {
  sales: {
    label: 'Sales · Outside Rep',
    greeting: (name) => name ? `Hey ${name} —` : `Sales day —`,
    sub: 'Pipeline, follow-ups, today\'s leads. Tap a card to dive in. Open the full OS for editing power.',
    sourceAgent: 'sales',
    statsEndpoint: '/api/sales-state',
    actions: [
      { ico: '$', label: 'Pipeline', desc: 'Open deals across pipelines · Mac + Darcy', href: '/sales-pipeline.html' },
      { ico: '✉', label: 'Follow-ups', desc: 'Stale proposals + leads waiting on you', href: '/sales-followups.html' },
      { ico: '⚡', label: 'New Estimate', desc: 'Build a quick estimate for an inbound', href: '/instant-estimator.html' },
      { ico: '★', label: 'Daily Brief', desc: 'Sales agent\'s top 4 actions for today', href: '/sales.html' },
    ],
    pickStat: (s) => [
      { num: s.estimates_open ?? '—', cls: 'cyan', lbl: 'Open Estimates' },
      { num: s.estimates_signed_30d ?? '—', cls: 'green', lbl: 'Signed (30d)' },
      { num: s.follow_ups_due ?? '—', cls: 'orange', lbl: 'Follow-ups Due' },
      { num: s.pipeline_value != null ? '$' + Math.round(s.pipeline_value).toLocaleString() : '—', cls: 'gold', lbl: 'Pipeline $' },
    ],
  },
  crew: {
    label: 'Crew · Production',
    greeting: (name) => name ? `Morning ${name} —` : `Crew day —`,
    sub: 'Today\'s workorders, your paysheets, materials waiting on you. Tap a card to open it.',
    sourceAgent: 'ops',
    statsEndpoint: '/api/production-state',
    actions: [
      { ico: '⚒', label: 'Today\'s Workorders', desc: 'Active jobs you\'re scheduled on', href: '/production-workorders.html' },
      { ico: '$', label: 'My Paysheets', desc: 'Pending approval + paid history', href: '/production-paysheet.html' },
      { ico: '☷', label: 'Materials', desc: 'Material lists + supplier orders', href: '/production-materials.html' },
      { ico: '★', label: 'Daily Brief', desc: 'Production agent\'s top 4 actions', href: '/production.html' },
    ],
    pickStat: (s) => [
      { num: s.workorders_open ?? s.tickets_total ?? '—', cls: 'cyan', lbl: 'Workorders Open' },
      { num: s.tickets_active_today ?? '—', cls: 'green', lbl: 'Active Today' },
      { num: s.tickets_overdue ?? '—', cls: 'red', lbl: 'Overdue' },
      { num: s.paysheets_pending ?? '—', cls: 'orange', lbl: 'Paysheets Pending' },
    ],
  },
  team: {
    label: 'Team · Field Crew',
    greeting: (name) => name ? `Morning ${name}` : `Crew day`,
    sub: 'Today\'s workorders, your tasks, and the schedule. Tap a card to open it.',
    sourceAgent: 'ops',
    statsEndpoint: '/api/production-state',
    actions: [
      { ico: '⚒', label: 'Today\'s Workorders', desc: 'Active jobs you\'re scheduled on', href: '/production-workorders.html' },
      { ico: '✓', label: 'My Tasks', desc: 'Your assigned tasks for today', href: '/production.html' },
      { ico: '▦', label: 'Calendar', desc: 'The crew schedule', href: '/production-calendar.html' },
      { ico: '☷', label: 'Materials', desc: 'Material lists for your jobs', href: '/production-materials.html' },
    ],
    pickStat: (s) => [
      { num: s.workorders_open ?? s.tickets_total ?? '—', cls: 'cyan', lbl: 'Workorders Open' },
      { num: s.tickets_active_today ?? '—', cls: 'green', lbl: 'Active Today' },
      { num: s.tickets_overdue ?? '—', cls: 'red', lbl: 'Overdue' },
    ],
  },
  service: {
    label: 'Service · Repairs & Warranty (AJ)',
    greeting: (name) => name ? `Hey ${name} —` : `Service day —`,
    sub: 'Repair queue, callbacks, warranty claims. Tap to triage. Open the full Service pillar for advanced tools.',
    sourceAgent: 'service',
    statsEndpoint: '/api/service-state',
    actions: [
      { ico: '⚒', label: 'Tickets', desc: 'Repair + callback + warranty visit queue', href: '/service-tickets.html' },
      { ico: '◇', label: 'Warranty Claims', desc: 'CertainTeed + workmanship filings', href: '/service-warranties.html' },
      { ico: '★', label: 'Daily Brief', desc: 'Service agent\'s top 4 actions', href: '/service.html' },
      { ico: '⚙', label: 'Auto-Route Rules', desc: 'Sub-cap + escalation rules', href: '/service-advanced.html' },
    ],
    pickStat: (s) => [
      { num: s.tickets_open ?? '—', cls: 'cyan', lbl: 'Tickets Open' },
      { num: s.callbacks_open ?? '—', cls: 'orange', lbl: 'Callbacks Open' },
      { num: s.tickets_overdue ?? '—', cls: 'red', lbl: 'Overdue' },
      { num: s.warranty_claims_open ?? '—', cls: 'gold', lbl: 'Warranties Open' },
    ],
  },
};

const cfg = ROLE_CONFIG[ROLE] || ROLE_CONFIG.sales;

function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function renderHeader() {
  document.getElementById('roleCrumb').textContent = cfg.label;
  document.getElementById('greeting').textContent = cfg.greeting(PERSON_NAME);
  document.getElementById('subline').textContent = cfg.sub;
}

function renderStats(s) {
  const tiles = cfg.pickStat(s || {});
  document.getElementById('statRow').innerHTML = tiles.map(t =>
    `<div class="stat-tile"><div class="num ${t.cls || ''}">${escapeHtml(String(t.num))}</div><div class="lbl">${escapeHtml(t.lbl)}</div></div>`
  ).join('');
}

function renderQueue(items) {
  document.getElementById('queueCount').textContent = items.length;
  const root = document.getElementById('queueList');
  if (items.length === 0) {
    root.innerHTML = `<div class="empty-state"><div class="ico">◇</div>No tasks right now. The daily agent runs at 10:45 UTC; refresh after that for a fresh brief.</div>`;
    return;
  }
  root.innerHTML = items.slice(0, 10).map(b => `
    <div class="brief-card ${b.priority || 'normal'}">
      <div class="brief-meta">
        <span class="brief-prio ${b.priority || 'normal'}">${(b.priority || 'normal').toUpperCase()}</span>
        <span class="brief-source">${escapeHtml(b.source_agent || cfg.sourceAgent)} agent</span>
      </div>
      <div class="brief-title">${escapeHtml(b.title)}</div>
      ${b.body ? `<div class="brief-body">${escapeHtml(b.body)}</div>` : ''}
    </div>
  `).join('');
}

function renderActions() {
  document.getElementById('actionGrid').innerHTML = cfg.actions.map(a =>
    `<a class="action-card" href="${a.href}"><div class="ico">${escapeHtml(a.ico)}</div><div class="body"><div class="label">${escapeHtml(a.label)}</div><div class="desc">${escapeHtml(a.desc)}</div></div></a>`
  ).join('');
}

// Resolve the current session user's UUID via /api/me so per-user
// filtering on /api/state and /api/sales-state actually works. The
// thin /portal-aj.html wrappers pass ?user=aj as a hint but state.js
// expects a real UUID — falling back to the slug breaks the filter.
let RESOLVED_USER_ID = null;
async function resolveMe() {
  try {
    const tok = localStorage.getItem('ryujin_token') || sessionStorage.getItem('ryujin_token');
    if (!tok) return null;
    const r = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${tok}` } });
    if (!r.ok) return null;
    const me = await r.json();
    RESOLVED_USER_ID = me?.user_id || null;
    return RESOLVED_USER_ID;
  } catch { return null; }
}

function currentUserParam() {
  // Prefer the live session UUID; fall back to the slug hint from the URL
  // if we couldn't resolve (e.g. during local dev with no token).
  return RESOLVED_USER_ID || USER_FILTER;
}

async function loadStats() {
  try {
    const u = currentUserParam();
    const url = cfg.statsEndpoint + (u ? `?user_id=${encodeURIComponent(u)}` : '');
    const r = await fetch(url, { headers: { 'x-tenant-id': TENANT } });
    if (!r.ok) { renderStats({}); return; }
    const data = await r.json();
    renderStats(data.stats || {});
  } catch { renderStats({}); }
}

async function loadQueue() {
  try {
    // Pull today's tasks for this user — combines briefing items (the
    // daily-agent feed) with open quests (the routed/manual task list).
    const today = new Date().toISOString().slice(0, 10);
    const u = currentUserParam();
    const r = await fetch(`/api/state?source_agent=${encodeURIComponent(cfg.sourceAgent)}&for_date=${today}` + (u ? `&user_id=${encodeURIComponent(u)}` : ''), {
      headers: { 'x-tenant-id': TENANT }
    });
    if (!r.ok) { renderQueue([]); return; }
    const data = await r.json();
    const briefing = data.briefing || data.briefing_items || [];
    const openQuests = (data.quests?.open || []).map(q => ({
      title: q.title,
      body: q.description || null,
      priority: q.metadata?.urgency === 'urgent' ? 'urgent' : (q.metadata?.urgency === 'high' ? 'high' : 'normal'),
      source_agent: q.source_agent || cfg.sourceAgent,
    }));
    renderQueue([...openQuests, ...briefing]);
  } catch { renderQueue([]); }
}

renderHeader();
renderActions();
// Resolve the live user first so per-user filters work; then load. The
// 5-minute interval keeps Tasks fresh as agents emit new items.
resolveMe().then(() => { loadStats(); loadQueue(); });
setInterval(() => { loadStats(); loadQueue(); }, 5 * 60 * 1000);
</script>
</body>
</html>
