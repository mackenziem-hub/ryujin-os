<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060a14">
<title>Ads · Marketing · Ryujin OS</title>
<link rel="icon" href="/assets/logo/icon.png" onerror="this.href='/assets/logo/logo-glow.jpg'">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<style>
:root{
  --bg:#060a14;--glass:rgba(20,30,50,0.85);--glass2:rgba(22,34,58,0.80);
  --glass-border:rgba(34,211,238,0.16);--glass-border-hi:rgba(34,211,238,0.35);
  --text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);
  --cyan:#22d3ee;--blue:#4a9eff;--purple:#7c3aed;
  --green:#4ade80;--yellow:#facc15;--red:#f87171;--orange:#fb923c;--gold:#fbbf24;
  --radius:12px;--sidebar-w:72px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;overflow-x:hidden}

.sidebar{width:var(--sidebar-w);background:rgba(8,12,24,0.98);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;bottom:0;z-index:50;box-shadow:2px 0 12px rgba(0,0,0,0.4)}
.sidebar-logo{width:44px;height:44px;margin:18px 0 12px;border-radius:12px;background:url('/assets/logo/logo-glow.jpg') center/cover;box-shadow:0 0 20px rgba(34,211,238,0.3);cursor:pointer}
.sidebar-divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;margin:4px 0 8px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid transparent;cursor:pointer;color:var(--text-dim);transition:all 0.25s;position:relative;text-decoration:none}
.nav-icon:hover{background:rgba(34,211,238,0.06);color:var(--text)}
.nav-icon.active{background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(124,58,237,0.06));color:var(--cyan);border-color:rgba(34,211,238,0.2);box-shadow:0 0 20px rgba(34,211,238,0.08)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:3px;background:var(--cyan);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--cyan)}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.main{margin-left:var(--sidebar-w);padding:18px 22px 60px;max-width:1600px}

.hq-header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.hq-title{flex:1;min-width:280px}
.hq-title .crumb{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hq-title h1{font-family:'Orbitron',monospace;font-size:1.7em;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,#e0e6f0 20%,var(--cyan) 70%,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hq-title .sub{font-size:0.85em;color:var(--text-dim);margin-top:6px;max-width:680px;line-height:1.4}

.hq-actions{display:flex;align-items:center;gap:10px}
.btn{font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:8px 16px;border-radius:18px;cursor:pointer;border:1px solid var(--glass-border);background:transparent;color:var(--text-dim);transition:all 0.2s}
.btn:hover{color:var(--text);border-color:var(--glass-border-hi)}
.btn.primary{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#0a0e1a;border:none;box-shadow:0 0 12px rgba(34,211,238,0.3)}
.btn.primary:hover{box-shadow:0 0 18px rgba(34,211,238,0.5)}

/* Token health pill */
.token-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:18px;font-family:'Share Tech Mono',monospace;font-size:0.7em;letter-spacing:1px;border:1px solid var(--glass-border)}
.token-pill .dot{width:7px;height:7px;border-radius:50%}
.token-pill.ok{background:rgba(74,222,128,0.08);color:var(--green);border-color:rgba(74,222,128,0.3)}
.token-pill.ok .dot{background:var(--green);box-shadow:0 0 6px var(--green)}
.token-pill.warn{background:rgba(251,146,60,0.08);color:var(--orange);border-color:rgba(251,146,60,0.3)}
.token-pill.warn .dot{background:var(--orange);box-shadow:0 0 6px var(--orange)}
.token-pill.bad{background:rgba(248,113,113,0.08);color:var(--red);border-color:rgba(248,113,113,0.3)}
.token-pill.bad .dot{background:var(--red);box-shadow:0 0 6px var(--red)}

/* KPI rail */
.kpi-rail{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:16px}
.kpi-tile{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
.kpi-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.45}
.kpi-tile.alert::before{background:linear-gradient(90deg,transparent,var(--red),transparent);opacity:0.7}
.kpi-tile::after{content:'';position:absolute;bottom:-1px;right:-1px;width:18px;height:18px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);border-radius:0 0 var(--radius) 0;opacity:0.25}
.kpi-label{font-family:'Orbitron',monospace;font-size:0.6em;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px}
.kpi-value{font-family:'Orbitron',monospace;font-size:1.6em;font-weight:800;color:var(--text);line-height:1.1}
.kpi-value.cyan{color:var(--cyan)}.kpi-value.green{color:var(--green)}.kpi-value.gold{color:var(--gold)}
.kpi-value.red{color:var(--red)}.kpi-value.orange{color:var(--orange)}.kpi-value.purple{color:#a78bfa}
.kpi-sub{font-size:0.7em;color:var(--text-muted);font-family:'Share Tech Mono',monospace;letter-spacing:0.5px;margin-top:4px}

/* Filter bar */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:10px 12px;position:relative;overflow:hidden}
.filter-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan) 50%,transparent);opacity:0.4}
.label{font-family:'Orbitron',monospace;font-size:0.6em;letter-spacing:1.8px;color:var(--text-muted);text-transform:uppercase;margin-right:6px}
.fchip{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:18px;background:rgba(6,10,20,0.4);border:1px solid var(--glass-border);font-size:0.72em;cursor:pointer;color:var(--text-dim);transition:all 0.2s;font-family:inherit;letter-spacing:0.3px}
.fchip:hover{border-color:var(--glass-border-hi);color:var(--text)}
.fchip.active{background:linear-gradient(135deg,rgba(34,211,238,0.14),rgba(124,58,237,0.08));color:var(--cyan);border-color:rgba(34,211,238,0.4)}

.section-head{display:flex;align-items:baseline;gap:10px;margin:18px 0 10px;font-family:'Orbitron',monospace}
.section-head h2{font-size:0.78em;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.section-head .count-pill{font-size:0.65em;font-family:'Share Tech Mono',monospace;padding:2px 8px;border-radius:10px;background:rgba(34,211,238,0.1);border:1px solid var(--glass-border);color:var(--cyan)}

/* Campaign rows */
.campaign-list{display:flex;flex-direction:column;gap:6px}
.camp-row{
  display:grid;grid-template-columns:auto 1fr auto auto auto auto;gap:14px;align-items:center;
  background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);
  padding:12px 14px;transition:all 0.2s;cursor:pointer;position:relative;overflow:hidden;
}
.camp-row:hover{border-color:var(--glass-border-hi)}
.camp-row.alert{border-color:rgba(248,113,113,0.4);background:rgba(248,113,113,0.04)}
.camp-row.alert::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),var(--orange),transparent);opacity:0.7}

.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.status-dot.active{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.paused{background:var(--text-muted)}
.status-dot.completed{background:var(--blue)}
.camp-info{min-width:0}
.camp-name{font-weight:600;color:var(--text);font-size:0.95em;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.camp-meta{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:0.5px;display:flex;gap:10px;flex-wrap:wrap}
.camp-meta .alert-text{color:var(--red);font-weight:700}
.camp-stat{display:flex;flex-direction:column;align-items:flex-end;gap:1px;min-width:80px}
.camp-stat .v{font-family:'Orbitron',monospace;font-size:0.95em;font-weight:700;color:var(--text)}
.camp-stat .v.high{color:var(--red)}
.camp-stat .v.mid{color:var(--orange)}
.camp-stat .v.low{color:var(--green)}
.camp-stat .l{font-family:'Orbitron',monospace;font-size:0.55em;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase}

/* Drilldown drawer */
.drawer-backdrop{position:fixed;inset:0;background:rgba(3,6,17,0.75);backdrop-filter:blur(4px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.drawer-backdrop.show{display:flex}
@media(min-width:900px){.drawer-backdrop{align-items:center}}
.drawer{background:var(--glass);border:1px solid var(--glass-border-hi);border-radius:14px 14px 0 0;width:100%;max-width:780px;max-height:88vh;overflow-y:auto;position:relative;backdrop-filter:blur(20px);box-shadow:0 -20px 60px rgba(0,0,0,0.6),0 0 30px rgba(34,211,238,0.1)}
@media(min-width:900px){.drawer{border-radius:14px;max-height:80vh}}
.drawer::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan) 30%,var(--purple) 70%,transparent);border-radius:14px 14px 0 0}
.drawer-head{padding:18px 22px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;gap:14px}
.drawer-title{font-family:'Orbitron',monospace;font-size:1.05em;font-weight:700;letter-spacing:1.2px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.drawer-close{background:transparent;border:1px solid var(--glass-border);color:var(--text-dim);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.drawer-close:hover{color:var(--red);border-color:rgba(248,113,113,0.4)}
.drawer-close svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.drawer-section{padding:14px 22px;border-bottom:1px solid var(--glass-border)}
.drawer-section:last-child{border-bottom:none}
.drawer-sh{font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:2.5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px}

.adset-list{display:flex;flex-direction:column;gap:6px}
.adset{background:rgba(6,10,20,0.4);border:1px solid var(--glass-border);border-radius:8px;padding:10px 12px;font-size:0.85em;display:grid;grid-template-columns:auto 1fr auto auto;gap:12px;align-items:center}
.adset-name{font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.adset-flag{font-family:'Share Tech Mono',monospace;font-size:0.62em;letter-spacing:1.2px;text-transform:uppercase;padding:2px 6px;border-radius:6px;background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.25)}

.empty-state{text-align:center;padding:30px 16px;color:var(--text-dim);border:1px dashed var(--glass-border);border-radius:var(--radius);font-size:0.85em}
.empty-state .ico{font-size:1.8em;margin-bottom:6px;opacity:0.5}
.skeleton{background:linear-gradient(90deg,var(--glass) 0%,var(--glass2) 50%,var(--glass) 100%);background-size:200% 100%;animation:sk 1.4s infinite;border:1px solid var(--glass-border);border-radius:var(--radius);height:64px;margin-bottom:6px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);font-size:0.8em;margin-bottom:14px;line-height:1.4}
.banner.warn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:var(--orange)}
.banner.bad{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.25);color:var(--red)}
.banner code{font-family:'Share Tech Mono',monospace;background:rgba(0,0,0,0.3);padding:1px 6px;border-radius:4px;color:var(--text)}

@media(max-width:768px){.main{padding:12px}.hq-title h1{font-size:1.3em}.camp-row{grid-template-columns:auto 1fr auto;gap:10px}.camp-stat{min-width:60px}}
</style>
<script src="/assets/marketing-toolbar.js" defer></script>
</head>
<body>

<aside class="sidebar">
  <a href="/admin.html" class="sidebar-logo" title="Admin Home"></a>
  <div class="sidebar-divider"></div>
  <nav class="sidebar-nav">

<main class="main">

  <div class="hq-header">
    <div class="hq-title">
      <div class="crumb">Marketing · Ads</div>

      <div class="sub">Live Meta Ads pipeline. Spend, leads, CPL alerts above $50, ad-set drilldown. Pulls fresh data on each load.</div>

  <!-- Filters -->
  <div class="filter-bar">

<script>
const TENANT = (window.RyujinTenant?.get?.()?.slug) || 'plus-ultra';
let cache = [];
let activeStatus = '';
let activeSort = 'spend';
let drawerCampaign = null;

function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtMoney(n) { if (n == null || isNaN(n)) return '—'; return '$' + Math.round(parseFloat(n)).toLocaleString(); }
function fmtMoney2(n) { if (n == null || isNaN(n)) return '—'; return '$' + parseFloat(n).toFixed(2); }

function showBanner(msg, kind='warn', isHtml=false) {
  const slot = document.getElementById('banner-slot');
  if (isHtml) slot.innerHTML = `<div class="banner ${kind}">${msg}</div>`;
  else slot.innerHTML = `<div class="banner ${kind}">${escapeHtml(msg)}</div>`;
}

function setTokenPill(state, label) {
  const el = document.getElementById('tokenPill');
  el.className = `token-pill ${state}`;
  el.innerHTML = `<span class="dot"></span>${escapeHtml(label)}`;
}

function renderKpis(summary) {
  const cplFlagged = summary.alerts && summary.alerts.length > 0;
  document.getElementById('kpiRail').innerHTML = `
    <div class="kpi-tile"><div class="kpi-label">Total Spend</div><div class="kpi-value cyan">${fmtMoney(summary.totalSpend)}</div><div class="kpi-sub">${summary.activeCampaigns || 0} active campaigns</div></div>
    <div class="kpi-tile"><div class="kpi-label">Total Leads</div><div class="kpi-value green">${summary.totalLeads || 0}</div></div>
    <div class="kpi-tile"><div class="kpi-label">Avg CPL</div><div class="kpi-value gold">${fmtMoney2(summary.avgCPL)}</div><div class="kpi-sub">$50 = alert threshold</div></div>
    <div class="kpi-tile ${cplFlagged ? 'alert' : ''}"><div class="kpi-label">CPL Alerts</div><div class="kpi-value ${cplFlagged ? 'red' : 'green'}">${(summary.alerts || []).length}</div></div>
    <div class="kpi-tile"><div class="kpi-label">Total Campaigns</div><div class="kpi-value purple">${summary.totalCampaigns || 0}</div></div>
  `;
}

function statusClass(s) {
  if (s === 'ACTIVE') return 'active';
  if (s === 'PAUSED') return 'paused';
  return 'completed';
}

function applyFilters() {
  let list = cache.slice();
  if (activeStatus) list = list.filter(c => (c.status || c.effectiveStatus) === activeStatus);
  list.sort((a, b) => {
    if (activeSort === 'cpl') {
      const ac = parseFloat(a.cpl) || Infinity, bc = parseFloat(b.cpl) || Infinity;
      return bc - ac;
    }
    if (activeSort === 'leads') return (b.messagingLeads || b.leads || 0) - (a.messagingLeads || a.leads || 0);
    if (activeSort === 'alert') return (b.alert ? 1 : 0) - (a.alert ? 1 : 0);
    // spend default
    return (parseFloat(b.spend) || 0) - (parseFloat(a.spend) || 0);
  });
  return list;
}

function renderCampaigns(list) {
  document.getElementById('campCount').textContent = list.length;
  const el = document.getElementById('campList');
  if (list.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="ico">◇</div>No campaigns match the current filters.</div>`;
    return;
  }
  el.innerHTML = list.map(c => {
    const cpl = parseFloat(c.cpl);
    const cplCls = cpl > 50 ? 'high' : cpl > 25 ? 'mid' : 'low';
    return `
      <div class="camp-row ${c.alert ? 'alert' : ''}" data-id="${escapeHtml(c.id)}">
        <div class="status-dot ${statusClass(c.status || c.effectiveStatus)}"></div>
        <div class="camp-info">
          <div class="camp-name">${escapeHtml(c.name || 'Unnamed')}</div>
          <div class="camp-meta">
            <span>${escapeHtml(c.objective || c.optimization_goal || '—')}</span>
            ${c.alert ? `<span class="alert-text">⚠ ${escapeHtml(c.alert)}</span>` : ''}
          </div>
        </div>
        <div class="camp-stat"><div class="v">${fmtMoney(c.spend)}</div><div class="l">Spend</div></div>
        <div class="camp-stat"><div class="v">${c.messagingLeads || c.leads || 0}</div><div class="l">Leads</div></div>
        <div class="camp-stat"><div class="v ${cplCls}">${cpl ? fmtMoney2(cpl) : '—'}</div><div class="l">CPL</div></div>
        <div class="camp-stat"><div class="v">${(parseFloat(c.ctr) || 0).toFixed(2)}%</div><div class="l">CTR</div></div>
      </div>`;
  }).join('');
  el.querySelectorAll('.camp-row').forEach(row => {
    row.addEventListener('click', () => openDrawer(row.dataset.id));
  });
}

async function load() {
  try {
    const resp = await fetch('/api/meta-ads', { headers: { 'x-tenant-id': TENANT, 'x-owner-call': '1' } });
    if (resp.status === 401) {
      const data = await resp.json();
      setTokenPill('bad', 'token expired');
      showBanner(`Meta token invalid: <code>${escapeHtml(data.detail || 'check META_ACCESS_TOKEN')}</code>. Generate a System User token in Meta Business Settings → System Users.`, 'bad', true);
      cache = []; renderKpis({}); renderCampaigns([]);
      return;
    }
    if (!resp.ok) {
      const txt = await resp.text();
      showBanner(`Could not load Meta Ads: HTTP ${resp.status} — ${txt.slice(0, 200)}`);
      cache = []; renderKpis({}); renderCampaigns([]);
      return;
    }
    const data = await resp.json();
    cache = data.campaigns || [];
    document.getElementById('banner-slot').innerHTML = '';

    // Token pill
    const expDays = data.tokenHealth?.expiresAt ? Math.floor((new Date(data.tokenHealth.expiresAt) - Date.now()) / 86400000) : null;
    if (data.tokenHealth?.valid && expDays !== null && expDays < 14) {
      setTokenPill('warn', `token expires in ${expDays}d`);
    } else if (data.tokenHealth?.valid) {
      setTokenPill('ok', 'token healthy');
    } else {
      setTokenPill('bad', 'token issue');
    }

    renderKpis(data.summary || {});
    renderCampaigns(applyFilters());
  } catch (e) {
    showBanner(`Network error: ${e.message}`);
  }
}

// Filters
document.querySelectorAll('.fchip[data-status]').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.fchip[data-status]').forEach(x => x.classList.toggle('active', x === c));
    activeStatus = c.dataset.status;
    renderCampaigns(applyFilters());
  });
});
document.querySelectorAll('.fchip[data-sort]').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.fchip[data-sort]').forEach(x => x.classList.toggle('active', x === c));
    activeSort = c.dataset.sort;
    renderCampaigns(applyFilters());
  });
});
document.getElementById('btnRefresh').addEventListener('click', load);

// Drawer
async function openDrawer(campaignId) {
  drawerCampaign = cache.find(c => c.id === campaignId);
  if (!drawerCampaign) return;
  document.getElementById('drawerTitle').textContent = drawerCampaign.name || 'Campaign';
  document.getElementById('drawerAdSets').innerHTML = `<div class="empty-state" style="padding:14px">Loading ad sets…</div>`;
  document.getElementById('btnMetaLink').href = `https://www.facebook.com/adsmanager/manage/campaigns?selected_campaign_ids=${campaignId}`;
  document.getElementById('drawerBackdrop').classList.add('show');

  try {
    const resp = await fetch(`/api/meta-ads?detail=${encodeURIComponent(campaignId)}`, { headers: { 'x-tenant-id': TENANT, 'x-owner-call': '1' } });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const sets = data.adSets || [];
    if (sets.length === 0) {
      document.getElementById('drawerAdSets').innerHTML = `<div class="empty-state" style="padding:14px">No ad sets returned.</div>`;
    } else {
      document.getElementById('drawerAdSets').innerHTML = sets.map(s => `
        <div class="adset">
          <div class="status-dot ${statusClass(s.status || s.effective_status)}"></div>
          <div class="adset-name">${escapeHtml(s.name || 'Unnamed ad set')}</div>
          <div class="camp-stat"><div class="v">${fmtMoney(s.spend)}</div><div class="l">Spend</div></div>
          ${s.flags && s.flags.length > 0 ? `<div class="adset-flag">${escapeHtml(s.flags[0])}</div>` : '<div></div>'}
        </div>`).join('');
    }
  } catch (e) {
    document.getElementById('drawerAdSets').innerHTML = `<div class="empty-state" style="padding:14px">Could not load ad sets: ${escapeHtml(e.message)}</div>`;
  }
}
function closeDrawer() {
  document.getElementById('drawerBackdrop').classList.remove('show');
  drawerCampaign = null;
}
document.getElementById('btnDrawerClose').addEventListener('click', closeDrawer);
document.getElementById('drawerBackdrop').addEventListener('click', e => { if (e.target.id === 'drawerBackdrop') closeDrawer(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && document.getElementById('drawerBackdrop').classList.contains('show')) closeDrawer(); });

document.getElementById('btnPause').addEventListener('click', async () => {
  if (!drawerCampaign) return;
  if (!confirm(`Pause "${drawerCampaign.name}"?`)) return;
  await fetch(`/api/meta-ads?campaign=${drawerCampaign.id}&action=pause`, { method: 'POST', headers: { 'x-tenant-id': TENANT, 'x-owner-call': '1' } });
  closeDrawer(); load();
});
document.getElementById('btnResume').addEventListener('click', async () => {
  if (!drawerCampaign) return;
  await fetch(`/api/meta-ads?campaign=${drawerCampaign.id}&action=resume`, { method: 'POST', headers: { 'x-tenant-id': TENANT, 'x-owner-call': '1' } });
  closeDrawer(); load();
});

load();
</script>
</body>
</html>
