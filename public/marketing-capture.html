<style>
:root{--bg:#060a14;--glass:rgba(20,30,50,0.85);--glass-border:rgba(34,211,238,0.16);--glass-border-hi:rgba(34,211,238,0.35);--text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);--cyan:#22d3ee;--purple:#7c3aed;--green:#4ade80;--red:#f87171;--orange:#fb923c;--radius:12px;--sidebar-w:72px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.sidebar{width:var(--sidebar-w);background:rgba(8,12,24,0.98);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;bottom:0;z-index:50}
.sidebar-logo{width:44px;height:44px;margin:18px 0 12px;border-radius:12px;background:url('/assets/logo/logo-glow.jpg') center/cover;box-shadow:0 0 20px rgba(34,211,238,0.3);cursor:pointer}
.sidebar-divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;margin:4px 0 8px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid transparent;color:var(--text-dim);text-decoration:none;transition:all 0.25s;position:relative}
.nav-icon:hover{background:rgba(34,211,238,0.06);color:var(--text)}
.nav-icon.active{background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(124,58,237,0.06));color:var(--cyan);border-color:rgba(34,211,238,0.2)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:3px;background:var(--cyan);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--cyan)}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.main{margin-left:var(--sidebar-w);padding:18px 22px 60px;max-width:760px;display:flex;flex-direction:column;gap:14px}

.hq-header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
.hq-title .crumb{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hq-title h1{font-family:'Orbitron',monospace;font-size:1.7em;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,#e0e6f0 20%,var(--cyan) 70%,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hq-title .sub{font-size:0.85em;color:var(--text-dim);margin-top:6px}
.btn{font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:8px 16px;border-radius:18px;cursor:pointer;border:1px solid var(--glass-border);background:transparent;color:var(--text-dim);transition:all 0.2s}
.btn:hover{color:var(--text);border-color:var(--glass-border-hi)}
.btn.primary{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#0a0e1a;border:none;box-shadow:0 0 12px rgba(34,211,238,0.3)}

.preview-frame{background:#000;border:1px solid var(--glass-border);border-radius:14px;overflow:hidden;position:relative;aspect-ratio:9/16;max-height:75vh;margin:0 auto;width:100%;max-width:420px}
.preview-frame video{width:100%;height:100%;object-fit:cover}
.preview-frame .empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-dim);text-align:center;padding:24px;gap:10px}
.preview-frame .empty svg{width:54px;height:54px;stroke:var(--text-muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;opacity:0.6}

.rec-dot{position:absolute;top:14px;right:14px;display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:0.72em;color:#fff;letter-spacing:1px;background:rgba(248,113,113,0.85);padding:4px 10px;border-radius:10px;display:none}
.rec-dot.show{display:flex}
.rec-dot::before{content:'';width:8px;height:8px;border-radius:50%;background:#fff;animation:blink 1s infinite}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0.2}}

.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-rec{background:var(--red);color:#fff;border:none;padding:14px 28px;border-radius:30px;font-family:'Orbitron',monospace;font-size:0.85em;letter-spacing:2px;text-transform:uppercase;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 0 14px rgba(248,113,113,0.4)}
.btn-rec:hover{box-shadow:0 0 22px rgba(248,113,113,0.6)}
.btn-rec.recording{background:#7a2727}
.btn-rec:disabled{opacity:0.5;cursor:not-allowed}

.field{margin-bottom:10px}
.field label{display:block;font-family:'Orbitron',monospace;font-size:0.6em;letter-spacing:1.8px;color:var(--text-dim);text-transform:uppercase;margin-bottom:5px}
.field input,.field select{width:100%;background:rgba(6,10,20,0.5);border:1px solid var(--glass-border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:0.9em;font-family:inherit;outline:none}

.banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);font-size:0.8em;line-height:1.4}
.banner.warn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:var(--orange)}
.banner.ok{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.25);color:var(--green)}
.banner.info{background:rgba(34,211,238,0.06);border:1px solid var(--glass-border);color:var(--text-dim)}

@media(max-width:768px){.main{padding:12px}.hq-title h1{font-size:1.3em}}
</style>
<script src="/assets/marketing-toolbar.js" defer></script>

<body>

  <a href="/admin.html" class="sidebar-logo" title="Admin Home"></a>

  </nav>

<main class="main">

  <div class="hq-header">
    <div class="hq-title">
      <div class="crumb">Marketing · Capture</div>
      <h1>Capture</h1>
      <div class="sub">Record straight from the browser. Mobile-friendly. Auto-uploads to Creatives when you stop.</div>
    </div>
    <a class="btn primary" href="/marketing.html">← Back</a>
  </div>

  <div id="banner-slot"></div>

  <div class="preview-frame">
    <video id="preview" autoplay muted playsinline></video>
    <div class="empty" id="emptyOverlay">
      <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <div style="font-size:0.95em">Tap <b>Start Camera</b> to begin.</div>
      <div style="font-size:0.78em;color:var(--text-muted);max-width:280px">Browser-based recording. We'll auto-upload when you stop, and the clip lands in <a href="/marketing-creatives.html" style="color:var(--cyan)">Creatives</a> for caption + render.</div>
    </div>
    <div class="rec-dot" id="recDot">REC <span id="recTime">0:00</span></div>
  </div>

  <div class="controls">
    <button class="btn" id="btnStart">Start Camera</button>
    <button class="btn-rec" id="btnRec" disabled>● Record</button>
    <button class="btn" id="btnStop" disabled>Stop & Upload</button>
  </div>

  <div class="field">
    <label>Title (saved with the clip)</label>
    <input id="f_title" placeholder="e.g. 'Aging shingles tear-off — Cornhill'" />
  </div>

</main>

<script>
const TENANT = window.RYUJIN_TENANT_SLUG;
let stream = null;
let recorder = null;
let chunks = [];
let startTime = 0;
let timerInterval = null;

const preview = document.getElementById('preview');
const emptyOverlay = document.getElementById('emptyOverlay');
const recDot = document.getElementById('recDot');
const recTime = document.getElementById('recTime');
const btnStart = document.getElementById('btnStart');
const btnRec = document.getElementById('btnRec');
const btnStop = document.getElementById('btnStop');

function showBanner(msg, kind='warn') {
  document.getElementById('banner-slot').innerHTML = `<div class="banner ${kind}">${msg}</div>`;
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1080 }, height: { ideal: 1920 } },
      audio: true
    });
    preview.srcObject = stream;
    emptyOverlay.style.display = 'none';
    btnStart.disabled = true;
    btnRec.disabled = false;
    showBanner('Camera ready. Hit Record when you\'re set.', 'info');
  } catch (e) {
    showBanner(`Camera error: ${e.message}. Check browser permissions.`);
  }
}

function startRecording() {
  if (!stream) return;
  chunks = [];
  const mimeTypes = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm', 'video/mp4'];
  const mimeType = mimeTypes.find(t => MediaRecorder.isTypeSupported(t));
  recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = onRecordingStopped;
  recorder.start(1000);

  startTime = Date.now();
  recDot.classList.add('show');
  btnRec.classList.add('recording');
  btnRec.textContent = '● Recording';
  btnRec.disabled = true;
  btnStop.disabled = false;

  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    recTime.textContent = `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
  }, 1000);
}

function stopRecording() {
  if (recorder && recorder.state !== 'inactive') {
    recorder.stop();
  }
  clearInterval(timerInterval);
  recDot.classList.remove('show');
  btnRec.classList.remove('recording');
  btnRec.textContent = '● Record';
  btnRec.disabled = false;
  btnStop.disabled = true;
}

async function onRecordingStopped() {
  const blob = new Blob(chunks, { type: chunks[0]?.type || 'video/webm' });
  const title = document.getElementById('f_title').value.trim() || `Capture ${new Date().toLocaleString()}`;

  showBanner(`Uploading ${(blob.size / 1024 / 1024).toFixed(1)}MB to Creatives…`, 'info');

  try {
    // 1. Get an upload token
    const tokenResp = await fetch('/api/marketing-upload-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-tenant-id': TENANT },
      body: JSON.stringify({ contentType: blob.type, filename: title.replace(/[^\w\d]+/g, '-').toLowerCase() + '.webm' })
    });
    if (!tokenResp.ok) throw new Error(`Upload token: HTTP ${tokenResp.status}`);
    const { uploadUrl, blobUrl } = await tokenResp.json();

    // 2. PUT to blob URL
    const putResp = await fetch(uploadUrl, { method: 'PUT', body: blob, headers: { 'Content-Type': blob.type } });
    if (!putResp.ok) throw new Error(`Blob PUT: HTTP ${putResp.status}`);

    // 3. Register with /api/marketing
    const fd = new FormData();
    fd.append('title', title);
    fd.append('blobUrl', blobUrl);
    fd.append('source', 'capture');
    const regResp = await fetch('/api/marketing', { method: 'POST', headers: { 'x-tenant-id': TENANT }, body: fd });
    if (!regResp.ok) throw new Error(`Register: HTTP ${regResp.status}`);

    showBanner(`✓ Uploaded. Find it in <a href="/marketing-creatives.html" style="color:var(--green)">Creatives</a> — render starts automatically.`, 'ok');
  } catch (e) {
    showBanner(`Upload failed: ${e.message}. The endpoint may not be wired yet — see /marketing-creatives.html for the existing upload path.`);
  }
}

btnStart.addEventListener('click', startCamera);
btnRec.addEventListener('click', startRecording);
btnStop.addEventListener('click', stopRecording);

// Cleanup on unload
window.addEventListener('beforeunload', () => {
  if (stream) stream.getTracks().forEach(t => t.stop());
});

// Mobile-friendly check
if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
  showBanner('Your browser doesn\'t support camera capture. Use the upload button on Creatives instead.');
  btnStart.disabled = true;
}
</script>
</body>
</html>
