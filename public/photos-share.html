<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1d3a8a">
<title>Project Photos</title>
<link rel="icon" type="image/png" href="/brand/plus-ultra/favicon-mark.png">
<link rel="apple-touch-icon" href="/brand/plus-ultra/favicon-mark.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf7f2;
  --card:#ffffff;
  --ink:#0a0a0a;
  --ink-dim:#525252;
  --ink-muted:#8a8a8a;
  --line:rgba(10,10,10,0.08);
  --brand:#1d3a8a;
  --brand-dim:#3553ad;
  --yellow:#fdd835;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
.stripe{height:6px;background:linear-gradient(to right,var(--brand) 0%,var(--brand) 70%,var(--yellow) 70%,var(--yellow) 100%)}
.wrap{max-width:1100px;margin:0 auto;padding:0 18px}

/* Header */
header{padding:24px 0 18px}
.brand-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand-mark{display:flex;align-items:center;gap:10px}
.brand-mark .badge{
  width:42px;height:42px;border-radius:10px;background:var(--brand);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:800;letter-spacing:1px;font-size:0.92em;
}
.brand-mark .name{font-weight:800;font-size:1.05em;letter-spacing:0.4px}
.brand-mark .name span{display:block;font-weight:500;color:var(--ink-dim);font-size:0.74em;letter-spacing:1px;text-transform:uppercase;margin-top:2px}

/* Hero */
.hero{padding:18px 0 22px;border-bottom:1px solid var(--line);margin-bottom:18px}
.hero h1{font-size:1.6em;font-weight:800;letter-spacing:-0.01em;line-height:1.2;margin-bottom:6px}
.hero .sub{color:var(--ink-dim);font-size:0.95em}

/* Count line */
.count-line{
  color:var(--ink-muted);font-size:0.84em;letter-spacing:0.5px;text-transform:uppercase;
  font-weight:600;margin-bottom:12px;
}

/* Grid */
.gallery{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;
  padding-bottom:40px;
}
@media(min-width:640px){.gallery{grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}}
.photo{
  background:var(--card);border-radius:12px;overflow:hidden;
  border:1px solid var(--line);cursor:pointer;
  transition:transform 0.15s, box-shadow 0.15s;
  display:flex;flex-direction:column;
}
.photo:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,0.06)}
.photo .frame{aspect-ratio:4/3;background:#e8e3da;position:relative;overflow:hidden}
.photo .frame img,.photo .frame video{width:100%;height:100%;object-fit:cover;display:block}
.photo .cap{
  padding:9px 12px 12px;font-size:0.85em;color:var(--ink-dim);line-height:1.4;
  min-height:40px;
}
.photo.is-cover{outline:2px solid var(--brand);outline-offset:-2px}
.photo .cover-tag{
  position:absolute;top:8px;left:8px;background:var(--brand);color:#fff;
  font-size:0.62em;font-weight:800;letter-spacing:1px;padding:3px 8px;border-radius:999px;
}

/* Empty / error states */
.state{
  text-align:center;padding:70px 20px;color:var(--ink-dim);
}
.state h2{font-size:1.25em;font-weight:700;color:var(--ink);margin-bottom:8px}
.state p{font-size:0.95em;line-height:1.5;max-width:380px;margin:0 auto}

/* Lightbox */
.lb{
  position:fixed;inset:0;background:rgba(10,10,10,0.92);z-index:100;
  display:flex;flex-direction:column;animation:lb-in 0.2s ease-out;
}
@keyframes lb-in{from{opacity:0}to{opacity:1}}
.lb-bar{
  display:flex;align-items:center;justify-content:space-between;color:#fff;padding:16px 18px;
}
.lb-bar button{
  background:rgba(255,255,255,0.10);color:#fff;border:none;
  width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.lb-bar button svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.4}
.lb-bar .pos{font-size:0.9em;color:rgba(255,255,255,0.7);font-feature-settings:'tnum'}
.lb-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:0 16px;min-height:0}
.lb-stage img,.lb-stage video{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px}
.lb-caption{
  color:rgba(255,255,255,0.85);text-align:center;padding:12px 24px 18px;
  font-size:0.95em;max-width:760px;margin:0 auto;line-height:1.4;
}
.lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,0.10);color:#fff;border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.lb-nav:disabled{opacity:0.3;cursor:default}
.lb-nav.prev{left:14px}.lb-nav.next{right:14px}
.lb-nav svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.4}

/* Footer */
footer{
  padding:30px 0 24px;border-top:1px solid var(--line);margin-top:30px;
  text-align:center;color:var(--ink-muted);font-size:0.84em;
}
footer a{color:var(--brand);text-decoration:none;font-weight:600}
footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="stripe"></div>

<div class="wrap">
  <header>
    <div class="brand-row">
      <div class="brand-mark">
        <div class="badge">PU</div>
        <div class="name">Plus Ultra Roofing<span>Project photos</span></div>
      </div>
      <a href="https://plusultraroofing.com" target="_blank" rel="noopener" style="color:var(--brand);font-size:0.86em;font-weight:600;text-decoration:none">plusultraroofing.com</a>
    </div>
  </header>

  <div id="content">
    <div class="state"><p style="color:var(--ink-muted)">Loading photos&hellip;</p></div>
  </div>

  <footer>
    Photos by <a href="https://plusultraroofing.com">Plus Ultra Roofing</a> &nbsp;&middot;&nbsp; powered by Ryujin
  </footer>
</div>

<script>
const params = new URLSearchParams(location.search);
const SHARE = params.get('share');
const content = document.getElementById('content');

function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderError(title, body){
  content.innerHTML = `
    <div class="state">
      <h2>${esc(title)}</h2>
      <p>${esc(body)}</p>
    </div>
  `;
}

async function load(){
  if (!SHARE){
    renderError('No share link provided', 'This page needs a share link. Check the URL you were sent and try again.');
    return;
  }
  let data;
  try {
    const r = await fetch(`/api/projects?share=${encodeURIComponent(SHARE)}`);
    if (r.status === 404){
      renderError('Link not found', 'This share link is no longer active. Check with Plus Ultra if you think this is a mistake.');
      return;
    }
    if (r.status === 410){
      renderError('Link expired', 'This share link has expired. Reach out to Plus Ultra for an updated link.');
      return;
    }
    if (!r.ok) throw new Error(`status ${r.status}`);
    data = await r.json();
  } catch (e){
    console.error('[photos-share] load failed', e);
    renderError('Could not load photos', 'Something went wrong on our end. Try refreshing in a moment.');
    return;
  }

  const project = data?.project || {};
  const files = Array.isArray(data?.files) ? data.files : [];
  document.title = project.name ? `${project.name} – Plus Ultra Roofing` : 'Project photos';

  const heroLine = [project.address, project.city, project.province].filter(Boolean).join(', ');
  const sub = project.customer
    ? `Prepared for ${project.customer}${heroLine ? ' · ' + heroLine : ''}`
    : (heroLine || '');

  if (!files.length){
    content.innerHTML = `
      <div class="hero">
        <h1>${esc(project.name || 'Your project')}</h1>
        ${sub ? `<div class="sub">${esc(sub)}</div>` : ''}
      </div>
      <div class="state">
        <h2>Photos coming soon</h2>
        <p>The crew is still adding to this gallery. Check back shortly.</p>
      </div>
    `;
    return;
  }

  const gridHtml = files.map((f, i) => {
    const isVideo = (f.mime_type || '').startsWith('video/');
    const thumb = f.thumbnail_url || f.url;
    const media = isVideo
      ? `<video src="${esc(f.url)}" preload="metadata" muted playsinline></video>`
      : `<img src="${esc(thumb)}" alt="${esc(f.caption || 'Project photo')}" loading="lazy">`;
    return `
      <div class="photo ${f.is_cover ? 'is-cover' : ''}" data-idx="${i}">
        <div class="frame">
          ${f.is_cover ? `<div class="cover-tag">Cover</div>` : ''}
          ${media}
        </div>
        ${f.caption ? `<div class="cap">${esc(f.caption)}</div>` : ''}
      </div>
    `;
  }).join('');

  content.innerHTML = `
    <div class="hero">
      <h1>${esc(project.name || 'Your project')}</h1>
      ${sub ? `<div class="sub">${esc(sub)}</div>` : ''}
    </div>
    <div class="count-line">${files.length} photo${files.length === 1 ? '' : 's'}</div>
    <div class="gallery" id="gallery">${gridHtml}</div>
  `;

  document.getElementById('gallery').querySelectorAll('.photo').forEach(el => {
    el.addEventListener('click', () => openLightbox(parseInt(el.dataset.idx, 10), files));
  });

  // Fire-and-forget event — also triggers the first-open notify on the server
  // (already handled by /api/projects?share=X first-touch tag write).
  try {
    fetch('/api/proposal-events', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ shareToken: SHARE, type: 'photo_gallery_opened', at: new Date().toISOString() })
    }).catch(() => {});
  } catch {}
}

let lbIdx = -1;
let lbFiles = [];
function openLightbox(i, files){
  lbFiles = files;
  lbIdx = i;
  const existing = document.getElementById('lb');
  if (existing) existing.remove();
  const lb = document.createElement('div');
  lb.className = 'lb';
  lb.id = 'lb';
  lb.innerHTML = `
    <div class="lb-bar">
      <button id="lbClose" aria-label="Close"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <div class="pos" id="lbPos"></div>
      <div style="width:40px"></div>
    </div>
    <div class="lb-stage" id="lbStage">
      <button class="lb-nav prev" id="lbPrev" aria-label="Previous"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
      <button class="lb-nav next" id="lbNext" aria-label="Next"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
    <div class="lb-caption" id="lbCap"></div>
  `;
  document.body.appendChild(lb);

  document.getElementById('lbClose').addEventListener('click', () => lb.remove());
  document.getElementById('lbPrev').addEventListener('click', () => { if (lbIdx > 0){ lbIdx--; renderLb(); }});
  document.getElementById('lbNext').addEventListener('click', () => { if (lbIdx < lbFiles.length - 1){ lbIdx++; renderLb(); }});

  // Swipe
  let startX = 0;
  lb.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  lb.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 50){
      if (dx < 0 && lbIdx < lbFiles.length - 1){ lbIdx++; renderLb(); }
      else if (dx > 0 && lbIdx > 0){ lbIdx--; renderLb(); }
    }
  });

  document.addEventListener('keydown', onKey);
  function onKey(e){
    if (!document.getElementById('lb')){ document.removeEventListener('keydown', onKey); return; }
    if (e.key === 'Escape') lb.remove();
    if (e.key === 'ArrowLeft' && lbIdx > 0){ lbIdx--; renderLb(); }
    if (e.key === 'ArrowRight' && lbIdx < lbFiles.length - 1){ lbIdx++; renderLb(); }
  }

  renderLb();
}

function renderLb(){
  const f = lbFiles[lbIdx];
  if (!f) return;
  const stage = document.getElementById('lbStage');
  const isVideo = (f.mime_type || '').startsWith('video/');
  const media = isVideo
    ? `<video src="${esc(f.url)}" controls playsinline></video>`
    : `<img src="${esc(f.url)}" alt="${esc(f.caption || '')}">`;
  // Preserve the nav buttons that are already inside the stage
  const prev = document.getElementById('lbPrev');
  const next = document.getElementById('lbNext');
  stage.innerHTML = media;
  stage.appendChild(prev);
  stage.appendChild(next);
  prev.disabled = lbIdx === 0;
  next.disabled = lbIdx === lbFiles.length - 1;
  document.getElementById('lbPos').textContent = `${lbIdx + 1} / ${lbFiles.length}`;
  document.getElementById('lbCap').textContent = f.caption || '';
}

load();
</script>
</body>
</html>
