<style>
:root{--bg:#060a14;--glass:rgba(20,30,50,0.85);--glass-border:rgba(34,211,238,0.16);--glass-border-hi:rgba(34,211,238,0.35);--text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);--cyan:#22d3ee;--green:#4ade80;--gold:#fbbf24;--red:#f87171;--orange:#fb923c;--radius:12px;--sidebar-w:72px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;overflow-x:hidden}
.sidebar{width:var(--sidebar-w);background:rgba(8,12,24,0.98);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;bottom:0;z-index:50}
.sidebar-logo{width:44px;height:44px;margin:18px 0 12px;border-radius:12px;background:url('/assets/logo/logo-glow.jpg') center/cover;box-shadow:0 0 20px rgba(34,211,238,0.3)}
.sidebar-divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;margin:4px 0 8px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid transparent;color:var(--text-dim);text-decoration:none;transition:all 0.25s;position:relative}
.nav-icon:hover{background:rgba(34,211,238,0.06);color:var(--text)}
.nav-icon.active{background:linear-gradient(135deg,rgba(251,191,36,0.12),rgba(34,211,238,0.06));color:var(--gold);border-color:rgba(251,191,36,0.3)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:3px;background:var(--gold);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--gold)}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.main{margin-left:var(--sidebar-w);padding:18px 22px 60px;max-width:1300px}
.hq-header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.hq-title .crumb{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hq-title h1{font-family:'Orbitron',monospace;font-size:1.7em;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,#e0e6f0 20%,var(--gold) 70%,var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hq-title .sub{font-size:0.85em;color:var(--text-dim);margin-top:6px}
.btn{font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:8px 16px;border-radius:18px;cursor:pointer;border:1px solid var(--glass-border);background:transparent;color:var(--text-dim);text-decoration:none;display:inline-block}
.btn:hover{color:var(--text);border-color:var(--glass-border-hi)}
.btn.primary{background:linear-gradient(135deg,var(--gold),var(--cyan));color:#0a0e1a;border:none;box-shadow:0 0 12px rgba(251,191,36,0.3)}

.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:14px;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:10px 12px;flex-wrap:wrap}
.label{font-family:'Orbitron',monospace;font-size:0.6em;letter-spacing:1.8px;color:var(--text-muted);text-transform:uppercase;margin-right:6px}
.fchip{padding:5px 11px;border-radius:18px;background:rgba(6,10,20,0.4);border:1px solid var(--glass-border);font-size:0.72em;cursor:pointer;color:var(--text-dim);transition:all 0.2s;font-family:inherit}
.fchip:hover{border-color:var(--glass-border-hi);color:var(--text)}
.fchip.active{background:linear-gradient(135deg,rgba(251,191,36,0.14),rgba(34,211,238,0.08));color:var(--gold);border-color:rgba(251,191,36,0.4)}

.section-head{display:flex;align-items:baseline;gap:10px;margin:18px 0 10px;font-family:'Orbitron',monospace}
.section-head h2{font-size:0.78em;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.section-head .count-pill{font-size:0.65em;font-family:'Share Tech Mono',monospace;padding:2px 8px;border-radius:10px;background:rgba(251,191,36,0.1);border:1px solid var(--glass-border);color:var(--gold)}

.pay-list{display:flex;flex-direction:column;gap:6px}
.pay-row{display:grid;grid-template-columns:auto 1fr auto auto auto;gap:14px;align-items:center;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:12px 14px}
.pay-row.unmatched{border-color:rgba(248,113,113,0.4);background:rgba(248,113,113,0.04)}
.pay-status{font-family:'Share Tech Mono',monospace;font-size:0.6em;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:8px}
.pay-status.matched{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.25)}
.pay-status.unmatched{background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.3)}
.pay-info .name{font-weight:600;color:var(--text)}
.pay-info .meta{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:0.5px}
.pay-amt{font-family:'Orbitron',monospace;font-weight:700;color:var(--gold);font-size:0.95em;white-space:nowrap}
.pay-date{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:var(--text-dim);letter-spacing:0.5px;white-space:nowrap}

.empty-state{text-align:center;padding:30px 16px;color:var(--text-dim);border:1px dashed var(--glass-border);border-radius:var(--radius);font-size:0.85em}
.empty-state .ico{font-size:1.8em;margin-bottom:6px;opacity:0.5}
.skeleton{background:linear-gradient(90deg,var(--glass) 0%,rgba(22,34,58,0.8) 50%,var(--glass) 100%);background-size:200% 100%;animation:sk 1.4s infinite;border:1px solid var(--glass-border);border-radius:var(--radius);height:64px;margin-bottom:6px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);font-size:0.8em;margin-bottom:14px}
.banner.warn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:var(--orange)}

.modal-overlay{position:fixed;inset:0;background:rgba(4,8,16,0.75);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:60px 16px}
.modal-overlay.open{display:flex}
.modal{background:var(--glass);border:1px solid var(--glass-border-hi);border-radius:14px;width:100%;max-width:560px;padding:18px;box-shadow:0 18px 60px rgba(0,0,0,0.5)}
.modal h3{font-family:'Orbitron',monospace;font-size:0.85em;letter-spacing:2px;text-transform:uppercase;color:var(--text);margin-bottom:4px}
.modal .modal-sub{font-size:0.78em;color:var(--text-dim);margin-bottom:12px}
.modal input.search{width:100%;background:rgba(6,10,20,0.5);border:1px solid var(--glass-border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:0.9em;font-family:inherit;outline:none;margin-bottom:10px}
.est-list{max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:5px}
.est-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:rgba(6,10,20,0.4);border:1px solid var(--glass-border);border-radius:10px;padding:9px 12px;cursor:pointer;transition:all 0.15s}
.est-row:hover{border-color:var(--glass-border-hi);background:rgba(34,211,238,0.05)}
.est-row .ename{font-weight:600;color:var(--text);font-size:0.85em}
.est-row .emeta{font-family:'Share Tech Mono',monospace;font-size:0.68em;color:var(--text-dim)}
.est-row .eamt{font-family:'Orbitron',monospace;font-weight:700;color:var(--gold);font-size:0.8em;white-space:nowrap}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.modal-msg{font-size:0.78em;padding:6px 0;color:var(--text-dim);min-height:1.4em}
.modal-msg.err{color:var(--red)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(8,14,26,0.97);border:1px solid rgba(74,222,128,0.4);color:var(--green);padding:10px 18px;border-radius:10px;font-size:0.82em;z-index:200;opacity:0;transition:all 0.25s;pointer-events:none}
.toast.err{border-color:rgba(248,113,113,0.4);color:var(--red)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:768px){.main{padding:12px}.hq-title h1{font-size:1.3em}}
</style>

<main class="main">
  <div class="hq-header">
    <div class="hq-title"><div class="crumb">Finance · Payments</div><h1>Payments</h1><div class="sub">Inbound payments. Match unmatched ones to estimates. Cashflow agent flagged unmatched payments daily.</div></div>
    <a class="btn primary" href="/finance.html">← Finance</a>
  </div>
  <div id="banner-slot"></div>

  <div class="filter-bar">
    <span class="label">Match Status</span>
    <button class="fchip active" data-f="">All</button>
    <button class="fchip" data-f="matched">Matched</button>
    <button class="fchip" data-f="unmatched">Unmatched</button>
  </div>

  <div class="section-head"><h2>Payments (Last 90 Days)</h2><span class="count-pill" id="payCount">—</span></div>
  <div class="pay-list" id="payList"><div class="skeleton"></div><div class="skeleton"></div></div>

</main>

<div class="modal-overlay" id="matchModal">
  <div class="modal">
    <h3>Match Payment to Estimate</h3>
    <div class="modal-sub" id="matchSub"></div>
    <input class="search" id="estSearch" type="text" placeholder="Search by customer, estimate #, or address..." autocomplete="off">
    <div class="est-list" id="estList"></div>
    <div class="modal-msg" id="matchMsg"></div>
    <div class="modal-actions"><button class="btn" id="matchCancel" type="button">Cancel</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const TENANT = window.RYUJIN_TENANT_SLUG;
let cache = []; let activeFilter = '';
function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtMoney(n) { if (n == null || isNaN(n)) return '—'; return '$' + parseFloat(n).toFixed(2); }
function fmtDate(iso) { if (!iso) return ''; return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }

function render(list) {
  document.getElementById('payCount').textContent = list.length;
  const el = document.getElementById('payList');
  if (list.length === 0) { el.innerHTML = `<div class="empty-state"><div class="ico">$</div>No payments to show.</div>`; return; }
  el.innerHTML = list.map(p => {
    const matched = !!p.matched_estimate_id;
    return `
      <div class="pay-row ${matched ? '' : 'unmatched'}">
        <div class="pay-status ${matched ? 'matched' : 'unmatched'}">${matched ? '✓ Matched' : 'Unmatched'}</div>
        <div class="pay-info">
          <div class="name">${escapeHtml(p.customer_name || 'Unknown')}</div>
          <div class="meta">${escapeHtml(p.invoice_description || p.payment_method || '—')}${typeof p.matched_estimate_id === 'string' ? ' · est ' + p.matched_estimate_id.slice(0,8) : ''}</div>
        </div>
        <div class="pay-amt">${fmtMoney(p.amount)}</div>
        <div class="pay-date">${fmtDate(p.payment_date)}</div>
        ${!p.id ? '<span></span>' : (matched
          ? `<button class="btn" data-unmatch="${escapeHtml(p.id)}">Unmatch</button>`
          : `<button class="btn" data-match="${escapeHtml(p.id)}">Match</button>`)}
      </div>`;
  }).join('');
}

// ── Reconcile modal (match payment -> estimate) ──────────────
let estCache = null;          // estimates fetched once per page load
let estLoadError = null;
let matchingPaymentId = null; // payment currently being matched
let matchBusy = false;

function toast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('err', !!isErr);
  t.classList.add('show');
  clearTimeout(toast._h);
  toast._h = setTimeout(() => t.classList.remove('show'), 3500);
}

function fetchWithTimeout(url, opts = {}, ms = 10000) {
  const ctrl = new AbortController();
  const h = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { ...opts, signal: ctrl.signal }).finally(() => clearTimeout(h));
}

function estPrice(e) {
  const tier = (e.selected_package || 'gold').toLowerCase();
  const pkg = (e.calculated_packages || {})[tier] || {};
  return pkg.total ?? pkg.summary?.sellingPrice ?? pkg.sellingPrice ?? 0;
}

async function loadEstimates() {
  if (estCache) return estCache;
  estLoadError = null;
  try {
    const r = await fetchWithTimeout('/api/estimates?limit=500', { headers: { 'x-tenant-id': TENANT, ...window.RyujinAuth.headers() } });
    if (!r.ok) { estLoadError = `HTTP ${r.status}`; return null; }
    const data = await r.json();
    estCache = data.estimates || data.data || [];
    return estCache;
  } catch (e) {
    estLoadError = e.name === 'AbortError' ? 'Timed out after 10s' : e.message;
    return null;
  }
}

function renderEstList(filter) {
  const el = document.getElementById('estList');
  if (estLoadError) {
    el.innerHTML = `<div class="empty-state">Could not load estimates: ${escapeHtml(estLoadError)} <button class="btn" type="button" onclick="estCache=null;estLoadError=null;refreshEstList()">Retry</button></div>`;
    return;
  }
  if (!estCache) { el.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>'; return; }
  if (estCache.length === 0) { el.innerHTML = '<div class="empty-state">No estimates found for this tenant yet.</div>'; return; }
  const q = (filter || '').trim().toLowerCase();
  const list = estCache.filter(e => {
    if (!q) return true;
    const hay = [e.estimate_number, e.customer?.full_name, e.customer?.address, e.customer?.city].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q);
  }).slice(0, 50);
  if (list.length === 0) { el.innerHTML = '<div class="empty-state">No estimates match that search.</div>'; return; }
  el.innerHTML = list.map(e => {
    const price = estPrice(e);
    return `
      <div class="est-row" data-est="${escapeHtml(e.id)}">
        <div>
          <div class="ename">#${escapeHtml(e.estimate_number != null ? e.estimate_number : '?')} · ${escapeHtml(e.customer?.full_name || 'Unknown')}</div>
          <div class="emeta">${escapeHtml([e.customer?.address, e.customer?.city].filter(Boolean).join(', ') || '')}${e.status ? ' · ' + escapeHtml(e.status) : ''}</div>
        </div>
        <div class="eamt">${price ? fmtMoney(price) : ''}</div>
      </div>`;
  }).join('');
}

async function refreshEstList() {
  renderEstList(document.getElementById('estSearch').value); // skeleton while loading
  await loadEstimates();
  renderEstList(document.getElementById('estSearch').value);
}

function openMatchModal(paymentId) {
  const p = cache.find(x => x.id === paymentId);
  if (!p) return;
  matchingPaymentId = paymentId;
  matchBusy = false;
  document.getElementById('matchSub').textContent = `${p.customer_name || 'Unknown'} · ${fmtMoney(p.amount)} · ${fmtDate(p.payment_date)}. Pick the estimate this payment belongs to.`;
  document.getElementById('matchMsg').textContent = '';
  document.getElementById('matchMsg').classList.remove('err');
  document.getElementById('estSearch').value = '';
  document.getElementById('matchModal').classList.add('open');
  document.getElementById('estSearch').focus();
  refreshEstList();
}

function closeMatchModal() {
  matchingPaymentId = null;
  document.getElementById('matchModal').classList.remove('open');
}

async function patchPayment(paymentId, body) {
  const r = await fetchWithTimeout(`/api/payments?id=${encodeURIComponent(paymentId)}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'x-tenant-id': TENANT, ...window.RyujinAuth.headers() },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    let msg = `HTTP ${r.status}`;
    try { const d = await r.json(); if (d.error) msg = d.error; } catch {}
    throw new Error(msg);
  }
  const d = await r.json();
  return d.payment;
}

async function doMatch(estimateId) {
  if (matchBusy || !matchingPaymentId) return;
  matchBusy = true;
  const msg = document.getElementById('matchMsg');
  msg.classList.remove('err');
  msg.textContent = 'Matching...';
  const est = (estCache || []).find(e => e.id === estimateId);
  const p = cache.find(x => x.id === matchingPaymentId);
  const body = { matched_estimate_id: estimateId };
  // Enrich the payment row from the estimate when the payment is missing links.
  if (est && est.customer_id && !(p && p.customer_id)) body.customer_id = est.customer_id;
  if (est && est.customer?.full_name && !(p && p.customer_name)) body.customer_name = est.customer.full_name;
  try {
    const updated = await patchPayment(matchingPaymentId, body);
    const i = cache.findIndex(x => x.id === matchingPaymentId);
    if (i !== -1) cache[i] = { ...cache[i], ...updated };
    closeMatchModal();
    applyFilter();
    toast(`Payment matched to estimate #${est?.estimate_number != null ? est.estimate_number : estimateId.slice(0, 8)}.`);
    load(); // background refresh so the list reflects server truth
  } catch (e) {
    msg.classList.add('err');
    msg.textContent = `Match failed: ${e.name === 'AbortError' ? 'timed out after 10s' : e.message}`;
  }
  matchBusy = false;
}

async function doUnmatch(paymentId) {
  if (!confirm('Clear the estimate match on this payment?')) return;
  try {
    const updated = await patchPayment(paymentId, { matched_estimate_id: null, status: 'unmatched' });
    const i = cache.findIndex(x => x.id === paymentId);
    if (i !== -1) cache[i] = { ...cache[i], ...updated };
    applyFilter();
    toast('Match cleared. Payment is back in the unmatched queue.');
    load();
  } catch (e) {
    toast(`Unmatch failed: ${e.name === 'AbortError' ? 'timed out after 10s' : e.message}`, true);
  }
}

document.getElementById('payList').addEventListener('click', (e) => {
  const m = e.target.closest('[data-match]');
  if (m) return openMatchModal(m.dataset.match);
  const u = e.target.closest('[data-unmatch]');
  if (u) return doUnmatch(u.dataset.unmatch);
});
document.getElementById('estList').addEventListener('click', (e) => {
  const row = e.target.closest('[data-est]');
  if (row) doMatch(row.dataset.est);
});
document.getElementById('estSearch').addEventListener('input', () => renderEstList(document.getElementById('estSearch').value));
document.getElementById('matchCancel').addEventListener('click', closeMatchModal);
document.getElementById('matchModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeMatchModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeMatchModal(); });

function applyFilter() {
  let list = cache.slice();
  if (activeFilter === 'matched') list = list.filter(p => p.matched_estimate_id);
  if (activeFilter === 'unmatched') list = list.filter(p => !p.matched_estimate_id);
  render(list);
}

async function load() {
  try {
    const r = await fetch('/api/payments?since_days=90&limit=300', { headers: { 'x-tenant-id': TENANT, ...window.RyujinAuth.headers() } });
    if (!r.ok) {
      // Fallback: try table direct via finance-state's recent payments
      const fr = await fetch('/api/finance-state', { headers: { 'x-tenant-id': TENANT } });
      if (fr.ok) {
        const d = await fr.json();
        // Activity timeline has recent payments; use those
        const fromActivity = (d.activity || []).filter(e => e.kind === 'payment');
        document.getElementById('banner-slot').innerHTML = `<div class="banner warn">Direct /api/payments unavailable; showing recent activity only. Full reconciliation needs the payments endpoint.</div>`;
        cache = fromActivity.map(e => ({ customer_name: e.label, amount: 0, matched_estimate_id: !e.label.includes('unmatched') }));
        applyFilter();
        return;
      }
      document.getElementById('payList').innerHTML = `<div class="empty-state">Could not load payments.</div>`;
      return;
    }
    const data = await r.json();
    cache = data.payments || data.data || [];
    applyFilter();
  } catch (e) { document.getElementById('banner-slot').innerHTML = `<div class="banner warn">${escapeHtml(e.message)}</div>`; }
}

document.querySelectorAll('.fchip').forEach(c => c.addEventListener('click', () => {
  document.querySelectorAll('.fchip').forEach(x => x.classList.toggle('active', x === c));
  activeFilter = c.dataset.f;
  applyFilter();
}));

load();
</script>
</body>
</html>
