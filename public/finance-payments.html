<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="theme-color" content="#060a14">
<title>Payments · Finance · Ryujin OS</title>
<link rel="icon" href="/assets/logo/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<script src="/assets/finance-toolbar.js" defer></script>
<style>
:root{--bg:#060a14;--glass:rgba(20,30,50,0.85);--glass-border:rgba(34,211,238,0.16);--glass-border-hi:rgba(34,211,238,0.35);--text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--text-muted:rgba(140,170,220,0.30);--cyan:#22d3ee;--green:#4ade80;--gold:#fbbf24;--red:#f87171;--orange:#fb923c;--radius:12px;--sidebar-w:72px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg) url('/assets/textures/app-bg.png') center/cover fixed no-repeat;color:var(--text);min-height:100vh;overflow-x:hidden}
.sidebar{width:var(--sidebar-w);background:rgba(8,12,24,0.98);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;bottom:0;z-index:50}
.sidebar-logo{width:44px;height:44px;margin:18px 0 12px;border-radius:12px;background:url('/assets/logo/logo-glow.jpg') center/cover;box-shadow:0 0 20px rgba(34,211,238,0.3)}
.sidebar-divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3;margin:4px 0 8px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nav-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid transparent;color:var(--text-dim);text-decoration:none;transition:all 0.25s;position:relative}
.nav-icon:hover{background:rgba(34,211,238,0.06);color:var(--text)}
.nav-icon.active{background:linear-gradient(135deg,rgba(251,191,36,0.12),rgba(34,211,238,0.06));color:var(--gold);border-color:rgba(251,191,36,0.3)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:3px;background:var(--gold);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--gold)}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.main{margin-left:var(--sidebar-w);padding:18px 22px 60px;max-width:1300px}
.hq-header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.hq-title .crumb{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hq-title h1{font-family:'Orbitron',monospace;font-size:1.7em;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,#e0e6f0 20%,var(--gold) 70%,var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hq-title .sub{font-size:0.85em;color:var(--text-dim);margin-top:6px}
.btn{font-family:'Orbitron',monospace;font-size:0.7em;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:8px 16px;border-radius:18px;cursor:pointer;border:1px solid var(--glass-border);background:transparent;color:var(--text-dim);text-decoration:none;display:inline-block}
.btn:hover{color:var(--text);border-color:var(--glass-border-hi)}
.btn.primary{background:linear-gradient(135deg,var(--gold),var(--cyan));color:#0a0e1a;border:none;box-shadow:0 0 12px rgba(251,191,36,0.3)}

.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:14px;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:10px 12px;flex-wrap:wrap}
.label{font-family:'Orbitron',monospace;font-size:0.6em;letter-spacing:1.8px;color:var(--text-muted);text-transform:uppercase;margin-right:6px}
.fchip{padding:5px 11px;border-radius:18px;background:rgba(6,10,20,0.4);border:1px solid var(--glass-border);font-size:0.72em;cursor:pointer;color:var(--text-dim);transition:all 0.2s;font-family:inherit}
.fchip:hover{border-color:var(--glass-border-hi);color:var(--text)}
.fchip.active{background:linear-gradient(135deg,rgba(251,191,36,0.14),rgba(34,211,238,0.08));color:var(--gold);border-color:rgba(251,191,36,0.4)}

.section-head{display:flex;align-items:baseline;gap:10px;margin:18px 0 10px;font-family:'Orbitron',monospace}
.section-head h2{font-size:0.78em;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.section-head .count-pill{font-size:0.65em;font-family:'Share Tech Mono',monospace;padding:2px 8px;border-radius:10px;background:rgba(251,191,36,0.1);border:1px solid var(--glass-border);color:var(--gold)}

.pay-list{display:flex;flex-direction:column;gap:6px}
.pay-row{display:grid;grid-template-columns:auto 1fr auto auto auto;gap:14px;align-items:center;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:12px 14px}
.pay-row.unmatched{border-color:rgba(248,113,113,0.4);background:rgba(248,113,113,0.04)}
.pay-status{font-family:'Share Tech Mono',monospace;font-size:0.6em;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:8px}
.pay-status.matched{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.25)}
.pay-status.unmatched{background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.3)}
.pay-info .name{font-weight:600;color:var(--text)}
.pay-info .meta{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:0.5px}
.pay-amt{font-family:'Orbitron',monospace;font-weight:700;color:var(--gold);font-size:0.95em;white-space:nowrap}
.pay-date{font-family:'Share Tech Mono',monospace;font-size:0.7em;color:var(--text-dim);letter-spacing:0.5px;white-space:nowrap}

.empty-state{text-align:center;padding:30px 16px;color:var(--text-dim);border:1px dashed var(--glass-border);border-radius:var(--radius);font-size:0.85em}
.empty-state .ico{font-size:1.8em;margin-bottom:6px;opacity:0.5}
.skeleton{background:linear-gradient(90deg,var(--glass) 0%,rgba(22,34,58,0.8) 50%,var(--glass) 100%);background-size:200% 100%;animation:sk 1.4s infinite;border:1px solid var(--glass-border);border-radius:var(--radius);height:64px;margin-bottom:6px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);font-size:0.8em;margin-bottom:14px}
.banner.warn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:var(--orange)}

@media(max-width:768px){.main{padding:12px}.hq-title h1{font-size:1.3em}}
</style>
</head>
<body>
<aside class="sidebar"><a href="/admin.html" class="sidebar-logo" title="Admin Home"></a><div class="sidebar-divider"></div><nav class="sidebar-nav">
<a href="/admin-overview.html" class="nav-icon" title="Overview"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg></a>
<a href="/marketing.html" class="nav-icon" title="Marketing"><svg viewBox="0 0 24 24"><path d="M3 11l18-9v18l-18-9zM7 13v6"/></svg></a>
<a href="/sales.html" class="nav-icon" title="Sales"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9a4 4 0 100 8h6a4 4 0 110 8H6"/></svg></a>
<a href="/production.html" class="nav-icon" title="Production"><svg viewBox="0 0 24 24"><path d="M2 22V12l10-7 10 7v10M2 12l10 7 10-7M9 22V14h6v8"/></svg></a>
<a href="/service.html" class="nav-icon" title="Service"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg></a>
<a href="/customer.html" class="nav-icon" title="Customer"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/></svg></a>
<a href="/finance.html" class="nav-icon active" title="Finance"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9a4 4 0 100 8h6a4 4 0 110 8H6"/></svg></a>
<a href="/admin.html" class="nav-icon" title="Full Admin"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></a>
</nav></aside>

<main class="main">
  <div class="hq-header">
    <div class="hq-title"><div class="crumb">Finance · Payments</div><h1>Payments</h1><div class="sub">Inbound payments. Match unmatched ones to estimates. Cashflow agent flagged unmatched payments daily.</div></div>
    <a class="btn primary" href="/finance.html">← Finance</a>
  </div>
  <div id="banner-slot"></div>

  <div class="filter-bar">
    <span class="label">Match Status</span>
    <button class="fchip active" data-f="">All</button>
    <button class="fchip" data-f="matched">Matched</button>
    <button class="fchip" data-f="unmatched">Unmatched</button>
  </div>

  <div class="section-head"><h2>Payments (Last 90 Days)</h2><span class="count-pill" id="payCount">—</span></div>
  <div class="pay-list" id="payList"><div class="skeleton"></div><div class="skeleton"></div></div>

</main>

<script>
const TENANT = (function(){
  // Auth-set on login; authoritative for non-default tenants.
  try { const a = JSON.parse(localStorage.getItem('ryujin_tenant') || 'null'); if (a && a.slug) return a.slug; } catch (e) {}
  // Branding-config fallback (user changed brand without re-login).
  try { const c = JSON.parse(localStorage.getItem('ry_tenant_cfg') || 'null'); if (c && c.slug) return c.slug; } catch (e) {}
  return 'plus-ultra';
})();
let cache = []; let activeFilter = '';
function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtMoney(n) { if (n == null || isNaN(n)) return '—'; return '$' + parseFloat(n).toFixed(2); }
function fmtDate(iso) { if (!iso) return ''; return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }

function render(list) {
  document.getElementById('payCount').textContent = list.length;
  const el = document.getElementById('payList');
  if (list.length === 0) { el.innerHTML = `<div class="empty-state"><div class="ico">$</div>No payments to show.</div>`; return; }
  el.innerHTML = list.map(p => {
    const matched = !!p.matched_estimate_id;
    return `
      <div class="pay-row ${matched ? '' : 'unmatched'}">
        <div class="pay-status ${matched ? 'matched' : 'unmatched'}">${matched ? '✓ Matched' : 'Unmatched'}</div>
        <div class="pay-info">
          <div class="name">${escapeHtml(p.customer_name || 'Unknown')}</div>
          <div class="meta">${escapeHtml(p.invoice_description || p.payment_method || '—')}${p.matched_estimate_id ? ' · est ' + p.matched_estimate_id.slice(0,8) : ''}</div>
        </div>
        <div class="pay-amt">${fmtMoney(p.amount)}</div>
        <div class="pay-date">${fmtDate(p.payment_date)}</div>
        ${matched ? '<span></span>' : '<button class="btn" onclick="alert(\'Match flow: full reconciliation UI in v1.1. Today: edit the payment row in Supabase Studio and set matched_estimate_id manually.\')">Match</button>'}
      </div>`;
  }).join('');
}

function applyFilter() {
  let list = cache.slice();
  if (activeFilter === 'matched') list = list.filter(p => p.matched_estimate_id);
  if (activeFilter === 'unmatched') list = list.filter(p => !p.matched_estimate_id);
  render(list);
}

async function load() {
  try {
    const r = await fetch('/api/payments?since_days=90&limit=300', { headers: { 'x-tenant-id': TENANT } });
    if (!r.ok) {
      // Fallback: try table direct via finance-state's recent payments
      const fr = await fetch('/api/finance-state', { headers: { 'x-tenant-id': TENANT } });
      if (fr.ok) {
        const d = await fr.json();
        // Activity timeline has recent payments; use those
        const fromActivity = (d.activity || []).filter(e => e.kind === 'payment');
        document.getElementById('banner-slot').innerHTML = `<div class="banner warn">Direct /api/payments unavailable; showing recent activity only. Full reconciliation needs the payments endpoint.</div>`;
        cache = fromActivity.map(e => ({ customer_name: e.label, amount: 0, matched_estimate_id: !e.label.includes('unmatched') }));
        applyFilter();
        return;
      }
      document.getElementById('payList').innerHTML = `<div class="empty-state">Could not load payments.</div>`;
      return;
    }
    const data = await r.json();
    cache = data.payments || data.data || [];
    applyFilter();
  } catch (e) { document.getElementById('banner-slot').innerHTML = `<div class="banner warn">${escapeHtml(e.message)}</div>`; }
}

document.querySelectorAll('.fchip').forEach(c => c.addEventListener('click', () => {
  document.querySelectorAll('.fchip').forEach(x => x.classList.toggle('active', x === c));
  activeFilter = c.dataset.f;
  applyFilter();
}));

load();
</script>
</body>
</html>
