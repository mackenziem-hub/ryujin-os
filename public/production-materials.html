<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Material Lists</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
:root{--accent:#fb923c;--border:rgba(251,146,60,0.24);--border-hi:rgba(251,146,60,0.55);
  --text:#e0e6f0;--text-dim:rgba(160,190,230,0.62);--text-muted:rgba(140,170,220,0.32);
  --green:#4ade80;--red:#f87171;--yellow:#facc15;--cyan:#22d3ee}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:var(--text);overflow:hidden}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 40% 30%,rgba(251,146,60,0.08),transparent 55%),linear-gradient(180deg,#060a14,#030611)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(251,146,60,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(251,146,60,0.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at center,black 40%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 40%,transparent 85%)}
.app{position:relative;z-index:2;height:100vh;display:grid;grid-template-rows:56px 1fr;gap:10px;padding:10px 12px}

/* Topbar */
.topbar{display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.82);border:1px solid var(--border);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);position:relative;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--red),transparent);opacity:0.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(255,220,200,0.3),rgba(251,146,60,0.22) 40%,rgba(30,10,5,0.8));box-shadow:0 0 14px rgba(251,146,60,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.82em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:var(--text-dim);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}
.btn{padding:8px 14px;border-radius:9px;font-family:'Orbitron',sans-serif;font-size:0.68em;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:all 0.2s;border:1px solid;display:inline-flex;align-items:center;gap:8px;text-decoration:none}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn.ghost{background:rgba(6,10,20,0.6);border-color:var(--border);color:var(--text-dim)}
.btn.ghost:hover{border-color:var(--border-hi);color:var(--accent)}
.btn.primary{background:linear-gradient(135deg,var(--accent),#c2410c);border-color:var(--accent);color:#0a0604;box-shadow:0 0 16px rgba(251,146,60,0.35)}
.btn.primary:hover{filter:brightness(1.1)}

/* Job selector */
.jobs-row{display:flex;gap:8px;padding:4px;overflow-x:auto}
.job-pill{flex-shrink:0;padding:7px 14px;background:rgba(6,10,20,0.6);border:1px solid var(--border);border-radius:10px;cursor:pointer;display:flex;flex-direction:column;gap:2px;min-width:160px;transition:all 0.2s}
.job-pill:hover{border-color:var(--border-hi)}
.job-pill.on{background:rgba(251,146,60,0.1);border-color:var(--accent);box-shadow:0 0 12px rgba(251,146,60,0.2)}
.job-pill .n{font-family:'Orbitron',sans-serif;font-weight:800;font-size:0.72em;letter-spacing:0.5px;color:var(--text)}
.job-pill.on .n{color:var(--accent)}
.job-pill .m{font-family:'Share Tech Mono',monospace;font-size:0.64em;color:var(--text-muted);letter-spacing:0.5px}

/* Main layout */
.main{display:grid;grid-template-columns:1.35fr 1fr;gap:10px;min-height:0}
.panel{background:rgba(14,22,40,0.78);border:1px solid var(--border);border-radius:14px;backdrop-filter:blur(14px);display:flex;flex-direction:column;min-height:0;overflow:hidden;position:relative}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.5}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid rgba(251,146,60,0.12);gap:12px;flex-wrap:wrap}
.panel-title{font-family:'Orbitron',sans-serif;font-size:0.68em;font-weight:800;letter-spacing:2.5px;color:var(--accent);text-transform:uppercase}
.panel-sub{font-family:'Share Tech Mono',monospace;font-size:0.68em;color:var(--text-muted);letter-spacing:1px}
.panel-body{flex:1;overflow-y:auto;padding:14px 18px}

/* Material list */
.mat-cat{font-family:'Orbitron',sans-serif;font-size:0.62em;font-weight:800;letter-spacing:2.2px;color:var(--text-dim);margin:18px 0 8px;padding-bottom:6px;border-bottom:1px dashed rgba(251,146,60,0.18);text-transform:uppercase}
.mat-cat:first-child{margin-top:0}
.mat-item{display:grid;grid-template-columns:1fr 80px 100px 90px 36px;gap:12px;align-items:center;padding:10px 6px;border-bottom:1px solid rgba(251,146,60,0.06);transition:background 0.15s}
.mat-item:hover{background:rgba(251,146,60,0.03)}
.mat-item:last-child{border-bottom:none}
.mat-name{font-size:0.9em;color:var(--text)}
.mat-name .sku{display:block;font-family:'Share Tech Mono',monospace;font-size:0.7em;color:var(--text-muted);letter-spacing:0.5px;margin-top:2px}
.mat-qty{font-family:'Orbitron',sans-serif;font-weight:800;font-size:0.92em;color:var(--accent);text-align:right}
.mat-qty .u{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-muted);margin-left:4px;font-weight:500;letter-spacing:0.5px}
.mat-src{font-family:'Share Tech Mono',monospace;font-size:0.72em;color:var(--text-dim);letter-spacing:0.5px}
.mat-cost{font-family:'Orbitron',sans-serif;font-weight:700;font-size:0.88em;color:var(--text);text-align:right}
.mat-check{display:flex;justify-content:center;align-items:center;width:22px;height:22px;border:1.5px solid rgba(251,146,60,0.3);border-radius:6px;cursor:pointer;transition:all 0.15s;margin:0 auto}
.mat-check.on{background:var(--accent);border-color:var(--accent);color:#0a0604}
.mat-check svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:3;stroke-linecap:round;display:none}
.mat-check.on svg{display:block}

.mat-totals{margin-top:14px;padding:14px 16px;background:rgba(251,146,60,0.06);border:1px solid rgba(251,146,60,0.22);border-radius:11px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mat-total{text-align:center}
.mat-total .l{font-family:'Share Tech Mono',monospace;font-size:0.62em;color:var(--text-muted);letter-spacing:1.3px;text-transform:uppercase;margin-bottom:4px}
.mat-total .v{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.15em}
.mat-total.cost .v{color:var(--accent)}
.mat-total.lines .v{color:var(--text)}
.mat-total.checked .v{color:var(--green)}

/* Right: POs + vendors */
.po-card{padding:13px 15px;border-radius:10px;margin-bottom:8px;background:rgba(6,10,20,0.45);border:1px solid rgba(251,146,60,0.1);cursor:pointer;transition:all 0.2s}
.po-card:hover{border-color:rgba(251,146,60,0.35)}
.po-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;gap:8px}
.po-vendor{font-family:'Orbitron',sans-serif;font-weight:800;font-size:0.76em;letter-spacing:1px;color:var(--accent)}
.po-status{font-size:0.6em;padding:2px 8px;border-radius:4px;font-family:'Share Tech Mono',monospace;letter-spacing:0.8px}
.po-status.open{background:rgba(34,211,238,0.12);color:var(--cyan);border:1px solid rgba(34,211,238,0.28)}
.po-status.shipped{background:rgba(250,204,21,0.12);color:var(--yellow);border:1px solid rgba(250,204,21,0.28)}
.po-status.delivered{background:rgba(74,222,128,0.12);color:var(--green);border:1px solid rgba(74,222,128,0.28)}
.po-job{font-size:0.82em;font-weight:600}
.po-meta{font-size:0.7em;color:var(--text-dim);font-family:'Share Tech Mono',monospace;margin-top:2px;letter-spacing:0.3px}
.po-total{display:flex;justify-content:space-between;align-items:baseline;margin-top:8px;padding-top:8px;border-top:1px solid rgba(251,146,60,0.08)}
.po-total .l{font-family:'Share Tech Mono',monospace;font-size:0.6em;color:var(--text-muted);letter-spacing:1px}
.po-total .v{font-family:'Orbitron',sans-serif;font-weight:700;font-size:0.96em;color:var(--accent)}

.stat-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;font-size:0.84em;border-bottom:1px solid rgba(251,146,60,0.06)}
.stat-row .l{color:var(--text-dim)}
.stat-row .v{font-family:'Orbitron',sans-serif;font-weight:700}

/* Mode switch inside right panel */
.mode-tabs{display:flex;gap:4px;padding:3px;background:rgba(6,10,20,0.55);border:1px solid rgba(251,146,60,0.12);border-radius:9px;margin-bottom:6px}
.mode-tab{flex:1;padding:7px;background:transparent;border:none;color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:0.68em;letter-spacing:1.2px;cursor:pointer;border-radius:7px;transition:all 0.15s}
.mode-tab.on{background:rgba(251,146,60,0.12);color:var(--accent)}

@media (max-width: 980px){
  .main{grid-template-columns:1fr;grid-auto-rows:auto}
  .mat-item{grid-template-columns:1fr 80px 70px 36px;gap:8px}
  .mat-item .mat-src{display:none}
}


/* Mobile — tool pages should be scrollable and stack columns */
@media (max-width: 900px){
  html,body{overflow:auto!important;height:auto!important;min-height:100%}
  body{overflow-x:hidden}
  .app{height:auto!important;min-height:100vh;grid-template-rows:auto auto 1fr!important;padding:8px 8px}
  .topbar{position:sticky;top:0;z-index:15;flex-wrap:wrap;padding:8px 12px!important;height:auto!important;gap:6px}
  .topbar .btn,.topbar .tb-icon{padding:6px 9px;font-size:0.6em;letter-spacing:0.8px}
  .topbar .btn svg,.topbar .tb-icon svg{width:12px;height:12px}
  .topbar .brand-name{font-size:0.7em}
  .tb-spacer{display:none}
  .main{grid-template-columns:1fr!important;grid-auto-rows:auto!important;gap:10px}
  .panel{max-height:none;min-height:280px}
  .panel-head{padding:12px 14px!important;flex-wrap:wrap;gap:8px}
  .panel-body{padding:10px 12px!important}
  .field-row,.field-row.three{grid-template-columns:1fr!important}
  /* Pay sheet 3-col → 1-col */
  .step-nav{order:-1;max-height:none;padding:10px!important}
  .content-body{padding:14px 16px!important}
  .content-foot{flex-direction:column;gap:6px;padding:10px!important}
  .content-foot .btn{width:100%;justify-content:center}
}
</style>
</head>
<body data-prod-tool="materials">

<div class="bg"></div>
<div class="bg-grid"></div>

<div class="app">
  <div class="topbar">
    <button class="btn ghost" onclick="goBack()" title="Back to Production"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· MATERIAL LISTS</span></div></div>
    <div class="tb-spacer"></div>
    <button class="btn ghost" onclick="exportJobList()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>EXPORT</button>
    <button class="btn ghost" onclick="printList()"><svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>PRINT</button>
    <button class="btn primary" onclick="createPO()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>CREATE PO</button>
    <a class="btn ghost" href="command-center.html" title="Main menu"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>MAIN MENU</a>
  </div>

  <div class="main">

    <!-- LEFT: Per-job material list -->
    <div class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">MATERIAL LIST</div>
          <div class="panel-sub">Shopping list for the selected job · check items as they land on site</div>
        </div>
        <div class="jobs-row" id="jobsRow"></div>
      </div>
      <div class="panel-body" id="matBody"></div>
    </div>

    <!-- RIGHT: POs + vendors + summary -->
    <div class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">SUPPLY CHAIN</div>
          <div class="panel-sub">POs · vendors · month-to-date spend</div>
        </div>
      </div>
      <div class="panel-body">
        <div class="mode-tabs">
          <button class="mode-tab on" data-tab="pos" onclick="setTab('pos')">OPEN POs</button>
          <button class="mode-tab" data-tab="vendors" onclick="setTab('vendors')">VENDORS</button>
          <button class="mode-tab" data-tab="spend" onclick="setTab('spend')">SPEND</button>
        </div>
        <div id="rightContent"></div>
      </div>
    </div>

  </div>
</div>

<script src="assets/ryujin-mode.js"></script>
<script src="assets/ryujin-tenant.js"></script>

<script>
// ── POs + Vendors: localStorage-backed with seed fallback ──
const POS_KEY = 'ry_v1_pos_v1';
const VENDORS_KEY = 'ry_v1_vendors_v1';

const SEED_POS = [
  { vendor: 'CERTAINTEED', status: 'shipped', job: 'Faulkner — Moire Black · 24 SQ', meta: 'PO #PU-0419-01 · ETA Tue', total: 4200 },
  { vendor: 'STERLING', status: 'open', job: 'Summerhill gutters — white 5"', meta: 'PO #PU-0419-02 · pickup Wed', total: 980 },
  { vendor: 'HOME HARDWARE', status: 'open', job: 'Peach redeck — 12 OSB sheets', meta: 'PO #PU-0420-03 · ordering Apr 20', total: 780 },
  { vendor: 'CERTAINTEED', status: 'delivered', job: 'Stock restock — misc flashing', meta: 'PO #PU-0416-04 · received Apr 17', total: 1240 }
];

const SEED_VENDORS = [
  { name: 'CertainTeed', tag: 'PRIMARY', meta: 'Shingles · ice guard · ridge · certified partner' },
  { name: 'Sterling — John Sterling', tag: 'PRIMARY', meta: 'Gutters · downspouts · accessories' },
  { name: 'Home Hardware', tag: 'BACKUP', meta: 'OSB · lumber · fasteners · misc' },
  { name: 'Roofmart', tag: 'BACKUP', meta: 'Alternate shingle stock · emergency runs' }
];

function loadPOs(){
  try { const r = localStorage.getItem(POS_KEY); if (r) return JSON.parse(r); } catch(e){}
  savePOs(SEED_POS); return [...SEED_POS];
}
function savePOs(list){ try { localStorage.setItem(POS_KEY, JSON.stringify(list)); } catch(e){} }

function loadVendors(){
  try { const r = localStorage.getItem(VENDORS_KEY); if (r) return JSON.parse(r); } catch(e){}
  saveVendors(SEED_VENDORS); return [...SEED_VENDORS];
}
function saveVendors(list){ try { localStorage.setItem(VENDORS_KEY, JSON.stringify(list)); } catch(e){} }

let POS = loadPOs();
let VENDORS = loadVendors();

function cyclePOStatus(idx){
  const order = ['open','shipped','delivered'];
  const cur = POS[idx].status;
  POS[idx].status = order[(order.indexOf(cur) + 1) % order.length];
  savePOs(POS);
  renderRight();
}
function deletePO(idx){
  if (!confirm('Delete PO for ' + POS[idx].vendor + '?')) return;
  POS.splice(idx, 1);
  savePOs(POS);
  renderRight();
}
function newPOPrompt(){
  const job = currentJob();
  const defVendor = job ? 'CertainTeed' : '';
  const vendor = (prompt('Vendor?', defVendor) || '').toUpperCase(); if (!vendor) return;
  const jobDesc = prompt('Job / description?', job ? job.client + ' — ' + (job.meta || '') : '') || '';
  const poNum = prompt('PO number?', 'PU-' + new Date().toISOString().slice(5,10).replace('-','') + '-' + String(POS.length + 1).padStart(2,'0')) || '';
  const eta = prompt('ETA / notes?', 'ETA this week') || '';
  const total = parseFloat(prompt('Total ($)?', '0')) || 0;
  POS.unshift({ vendor, status: 'open', job: jobDesc, meta: 'PO #' + poNum + (eta ? ' · ' + eta : ''), total });
  savePOs(POS);
  renderRight();
}
function newVendorPrompt(){
  const name = prompt('Vendor name?'); if (!name) return;
  const tag = (prompt('Tag (PRIMARY / BACKUP / SPECIAL)?', 'BACKUP') || 'BACKUP').toUpperCase();
  const meta = prompt('What they supply?', '') || '';
  VENDORS.push({ name, tag, meta });
  saveVendors(VENDORS);
  renderRight();
}
function deleteVendor(idx){
  if (!confirm('Remove vendor ' + VENDORS[idx].name + '?')) return;
  VENDORS.splice(idx, 1);
  saveVendors(VENDORS);
  renderRight();
}

// ── Auto-generate a Plus Ultra material list for a given WO based on SQ + tier ──
function generateMatListFromWO(wo){
  const sq = wo.sq || 0;
  const items = [];
  if (sq > 0 && wo.system !== 'exterior') {
    // CertainTeed Landmark ~3.1 bundles/SQ; Designer ~4 bundles/SQ
    const isPremium = (wo.tier === 'Platinum' || wo.tier === 'Diamond');
    const shingleBundles = Math.ceil(sq * (isPremium ? 4.0 : 3.1));
    const ridgeBundles = Math.ceil(sq * 0.25);
    const underlayRolls = Math.ceil(sq / 10);
    const iceWaterRolls = Math.max(2, Math.ceil(sq / 7));
    const dripEdgePieces = Math.ceil(sq * 1.4);
    const shingleName = isPremium ? 'CT Designer (premium)' : 'CT Landmark AR';
    items.push({ cat: 'Shingles', name: shingleName + ' — color TBD', sku: 'CT-SHING', qty: shingleBundles, unit: 'bundles', cost: isPremium ? 72 : 48, vendor: 'CertainTeed' });
    items.push({ cat: 'Shingles', name: 'Ridge cap — matched', sku: 'CT-RC', qty: ridgeBundles, unit: 'bundles', cost: 52, vendor: 'CertainTeed' });
    items.push({ cat: 'Underlayment', name: 'DiamondDeck synthetic', sku: 'CT-DD-10SQ', qty: underlayRolls, unit: 'rolls', cost: 148, vendor: 'CertainTeed' });
    items.push({ cat: 'Ice & Water', name: 'WinterGuard HT — 2SQ rolls', sku: 'CT-WG-2SQ', qty: iceWaterRolls, unit: 'rolls', cost: 132, vendor: 'CertainTeed' });
    items.push({ cat: 'Flashings', name: 'Aluminum drip edge — 10ft', sku: 'DE-ALU-10', qty: dripEdgePieces, unit: 'pieces', cost: 14.80, vendor: 'Home Hardware' });
    items.push({ cat: 'Flashings', name: 'Step flashing — 8x8', sku: 'SF-8X8-50', qty: 1, unit: 'box of 50', cost: 72, vendor: 'Home Hardware' });
    items.push({ cat: 'Flashings', name: 'Pipe boot — 3" ABS', sku: 'PB-3ABS', qty: 3, unit: 'each', cost: 22.40, vendor: 'Home Hardware' });
    items.push({ cat: 'Ventilation', name: 'Ridge vent — 4ft sections', sku: 'RV-4FT', qty: Math.ceil(sq * 0.4), unit: 'pieces', cost: 38, vendor: 'CertainTeed' });
    items.push({ cat: 'Fasteners', name: 'Coil nails 1-1/4" ring shank', sku: 'CN-125-RS', qty: Math.ceil(sq / 12), unit: 'boxes', cost: 78, vendor: 'Home Hardware' });
    items.push({ cat: 'Fasteners', name: 'Plastic cap nails 1-1/2"', sku: 'PCN-150', qty: 1, unit: 'box', cost: 48, vendor: 'Home Hardware' });
    items.push({ cat: 'Consumables', name: 'Roofing cement', sku: 'RC-10OZ', qty: Math.max(4, Math.ceil(sq / 4)), unit: 'tubes', cost: 8.40, vendor: 'Home Hardware' });
    items.push({ cat: 'Consumables', name: 'Caulk — clear tripolymer', sku: 'CA-TRI', qty: 4, unit: 'tubes', cost: 11, vendor: 'Home Hardware' });
  } else if (wo.system === 'exterior') {
    items.push({ cat: 'Siding', name: 'Siding — TBD', sku: '', qty: 0, unit: 'pieces', cost: 0, vendor: 'Home Hardware' });
    items.push({ cat: 'Gutter', name: '5" seamless — color TBD', sku: '', qty: 0, unit: 'sections', cost: 44, vendor: 'Sterling' });
    items.push({ cat: 'Consumables', name: 'Caulk + sealant', sku: 'CA-TRI', qty: 4, unit: 'tubes', cost: 11, vendor: 'Home Hardware' });
  }
  return items;
}

// Load WOs from the work-orders page's storage
function loadWOs(){
  try { const r = localStorage.getItem('ry_v1_work_orders_v6'); if (r) return JSON.parse(r); } catch(e){}
  return [];
}

// User-edited line items saved per WO number (so auto-gen doesn't overwrite their changes)
const MAT_OVERRIDES_KEY = 'ry_v1_material_overrides_v1';
function loadOverrides(){
  try { return JSON.parse(localStorage.getItem(MAT_OVERRIDES_KEY) || '{}'); } catch(e){ return {}; }
}
function saveOverrides(){ try { localStorage.setItem(MAT_OVERRIDES_KEY, JSON.stringify(overrides)); } catch(e){} }
const overrides = loadOverrides();

// Build JOBS array from WOs — each WO becomes a material list
function buildJobs(){
  const wos = loadWOs();
  return wos.filter(w => w.status !== 'complete').map(w => {
    const ov = overrides[w.num];
    const items = (ov && ov.items) ? ov.items : generateMatListFromWO(w);
    return {
      id: w.num,
      client: w.client || '(unnamed)',
      meta: ((w.address || '').split(',')[0] || '') + ' · ' + (w.sq ? w.sq + ' SQ · ' : '') + (w.tier || ''),
      woNum: w.num,
      items
    };
  });
}
let JOBS = buildJobs();
function saveJobs(){
  // Persist whatever the currently-selected job has back to overrides (keyed by WO num)
  const job = JOBS.find(j => j.id === state.selectedJob);
  if (!job) return;
  overrides[job.id] = { items: job.items };
  saveOverrides();
}

const urlJob = new URLSearchParams(location.search).get('job');
const urlWo = new URLSearchParams(location.search).get('wo');
const state = {
  selectedJob: (JOBS.find(j => j.id === urlWo) ? urlWo : (JOBS.find(j => j.id === urlJob) ? urlJob : (JOBS[0] && JOBS[0].id))) || null,
  checked: loadChecked(),
  tab: 'pos'
};

function loadChecked(){
  try { return JSON.parse(localStorage.getItem('ry_v1_material_checked') || '{}'); } catch(e){ return {}; }
}
function saveChecked(){
  try { localStorage.setItem('ry_v1_material_checked', JSON.stringify(state.checked)); } catch(e){}
}

function currentJob(){ return JOBS.find(j => j.id === state.selectedJob) || null; }

function fmt(n){ return '$' + Math.round(n).toLocaleString('en-CA'); }

// ── Render jobs row ──
function renderJobs(){
  const row = document.getElementById('jobsRow');
  if (!JOBS.length) {
    row.innerHTML = '<button class="btn primary" onclick="newJob()" style="margin:4px"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>ADD FIRST JOB</button>';
    return;
  }
  row.innerHTML = JOBS.map(j => `
    <div class="job-pill ${j.id === state.selectedJob ? 'on' : ''}" onclick="selectJob('${j.id}')">
      <div class="n">${j.client}</div>
      <div class="m">${j.meta}</div>
    </div>
  `).join('') + '<button class="btn ghost" onclick="newJob()" style="flex-shrink:0;margin-left:4px"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>NEW</button>';
}

function selectJob(id){ state.selectedJob = id; renderJobs(); renderMatList(); }

function newJob(){
  const client = prompt('Job client / name?'); if (!client) return;
  const meta = prompt('Short description? (e.g. "Moncton · 24 SQ · CT Landmark")', '') || '';
  const woNum = prompt('Linked work order # (optional)', '') || '';
  const id = client.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,20) + '-' + Date.now().toString(36).slice(-4);
  JOBS.push({ id, client, meta, woNum, items: [] });
  saveJobs();
  state.selectedJob = id;
  renderJobs(); renderMatList();
}
window.newJob = newJob;

// ── Render material list ──
function renderMatList(){
  const job = currentJob();
  const body = document.getElementById('matBody');
  if (!job) {
    body.innerHTML = `
      <div style="padding:80px 40px;text-align:center">
        <div style="width:68px;height:68px;margin:0 auto 18px;border-radius:16px;background:rgba(251,146,60,0.15);border:1px solid rgba(251,146,60,0.35);display:flex;align-items:center;justify-content:center;color:var(--accent)">
          <svg viewBox="0 0 24 24" style="width:30px;height:30px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        </div>
        <h3 style="font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.1em;margin-bottom:10px">No material lists yet</h3>
        <p style="color:var(--text-dim);font-size:0.9em;line-height:1.55;max-width:420px;margin:0 auto 20px">Add a job to start a shopping list — line items by category (shingles, underlayment, flashings, etc.), vendor, unit cost, and check-off as materials arrive on site.</p>
        <button class="btn primary" onclick="newJob()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>ADD NEW JOB</button>
      </div>
    `;
    return;
  }
  // Group by category
  const byCat = {};
  job.items.forEach((item, idx) => {
    (byCat[item.cat] = byCat[item.cat] || []).push({ ...item, _idx: idx });
  });
  let totalCost = 0, checkedCost = 0, checkedCount = 0;
  job.items.forEach(it => { totalCost += it.qty * it.cost; });

  if (!job.items.length) {
    body.innerHTML = `
      <div style="padding:40px 20px;text-align:center;border:1px dashed rgba(251,146,60,0.2);border-radius:12px;background:rgba(6,10,20,0.3)">
        <div style="font-family:'Orbitron',sans-serif;font-weight:800;font-size:0.95em;margin-bottom:6px;color:var(--text)">${job.client}</div>
        <div style="color:var(--text-dim);font-size:0.85em;margin-bottom:18px">No line items yet. Add materials you need for this job.</div>
        <button class="btn primary" onclick="addLineItem()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>ADD LINE ITEM</button>
      </div>
    `;
    return;
  }
  body.innerHTML = Object.entries(byCat).map(([cat, items]) => {
    return `
      <div class="mat-cat">${cat}</div>
      ${items.map(it => {
        const key = job.id + ':' + it._idx;
        const isChecked = !!state.checked[key];
        if (isChecked) { checkedCost += it.qty * it.cost; checkedCount++; }
        return `
          <div class="mat-item">
            <div class="mat-name">${it.name}<span class="sku">${it.sku ? it.sku + ' · ' : ''}${it.vendor || ''}</span></div>
            <div class="mat-qty">${it.qty}<span class="u">${it.unit}</span></div>
            <div class="mat-src">${fmt(it.cost)} each</div>
            <div class="mat-cost">${fmt(it.qty * it.cost)}</div>
            <div class="mat-check ${isChecked ? 'on' : ''}" onclick="toggleCheck('${key}')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
          </div>
        `;
      }).join('')}
    `;
  }).join('');
  body.innerHTML += `<div style="margin-top:14px;text-align:center"><button class="btn ghost" onclick="addLineItem()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>ADD LINE ITEM</button></div>`;

  body.innerHTML += `
    <div class="mat-totals">
      <div class="mat-total lines"><div class="l">Line Items</div><div class="v">${job.items.length}</div></div>
      <div class="mat-total checked"><div class="l">Checked Off</div><div class="v">${checkedCount} / ${job.items.length}</div></div>
      <div class="mat-total cost"><div class="l">Total Cost</div><div class="v">${fmt(totalCost)}</div></div>
    </div>
    ${job.woNum ? `
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(6,10,20,0.55);border:1px solid rgba(251,146,60,0.15);border-radius:10px">
        <div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:0.62em;color:var(--text-muted);letter-spacing:1.5px">LINKED TO WORK ORDER</div>
          <div style="font-family:'Orbitron',sans-serif;font-size:0.85em;color:var(--accent);font-weight:800;margin-top:2px">${job.woNum}</div>
        </div>
        <button class="btn primary" onclick="openWorkOrder('${job.woNum}')"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>VIEW WORK ORDER</button>
      </div>
    ` : ''}
  `;
}

function toggleCheck(key){
  state.checked[key] = !state.checked[key];
  saveChecked();
  renderMatList();
}

// ── Right panel (POs / Vendors / Spend) ──
function setTab(tab){
  state.tab = tab;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('on', t.dataset.tab === tab));
  renderRight();
}

function renderRight(){
  const el = document.getElementById('rightContent');
  if (state.tab === 'pos') {
    el.innerHTML = `
      <button class="btn ghost" style="width:100%;margin-bottom:10px" onclick="newPOPrompt()">+ NEW PO</button>
      ${POS.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--text-dim);font-size:0.85em">No POs yet</div>' : ''}
      ${POS.map((p, idx) => `
        <div class="po-card">
          <div class="po-head">
            <div class="po-vendor">${p.vendor}</div>
            <div class="po-status ${p.status}" style="cursor:pointer" onclick="cyclePOStatus(${idx})" title="Tap to advance status">${p.status.toUpperCase()}</div>
          </div>
          <div class="po-job">${p.job || ''}</div>
          <div class="po-meta">${p.meta || ''}</div>
          <div class="po-total"><span class="l">TOTAL</span><span class="v">${fmt(p.total)}</span></div>
          <div style="text-align:right;margin-top:6px"><span style="font-size:0.7em;color:var(--text-dim);cursor:pointer" onclick="deletePO(${idx})">× delete</span></div>
        </div>
      `).join('')}`;
  } else if (state.tab === 'vendors') {
    el.innerHTML = `
      <button class="btn ghost" style="width:100%;margin-bottom:10px" onclick="newVendorPrompt()">+ ADD VENDOR</button>
      ${VENDORS.map((v, idx) => `
        <div class="po-card">
          <div class="po-head"><div class="po-vendor">${v.name}</div><div class="po-status open">${v.tag}</div></div>
          <div class="po-meta">${v.meta}</div>
          <div style="text-align:right;margin-top:6px"><span style="font-size:0.7em;color:var(--text-dim);cursor:pointer" onclick="deleteVendor(${idx})">× remove</span></div>
        </div>
      `).join('')}`;
  } else {
    const openTotal = POS.filter(p => p.status !== 'delivered').reduce((a, p) => a + p.total, 0);
    const deliveredTotal = POS.filter(p => p.status === 'delivered').reduce((a, p) => a + p.total, 0);
    const pendingTotal = POS.filter(p => p.status === 'shipped').reduce((a, p) => a + p.total, 0);
    el.innerHTML = `
      <div class="stat-row"><span class="l">Open POs</span><span class="v" style="color:var(--accent)">${fmt(openTotal)}</span></div>
      <div class="stat-row"><span class="l">Delivered MTD</span><span class="v" style="color:var(--green)">${fmt(deliveredTotal)}</span></div>
      <div class="stat-row"><span class="l">Pending delivery</span><span class="v" style="color:var(--yellow)">${fmt(pendingTotal)}</span></div>
      <div class="stat-row"><span class="l">Material cost % of revenue</span><span class="v">23.4%</span></div>
      <div class="stat-row" style="border-top:1px solid rgba(251,146,60,0.2);padding-top:12px;margin-top:8px"><span class="l" style="color:var(--text);font-weight:700">Total MTD</span><span class="v" style="color:var(--accent)">${fmt(openTotal + deliveredTotal)}</span></div>
    `;
  }
}

// ── Actions ──
function addLineItem(){
  const job = currentJob(); if (!job) { newJob(); return; }
  const name = prompt('Item name (e.g. CT Landmark AR — Moire Black)?'); if (!name) return;
  const cat = prompt('Category (Shingles / Underlayment / Ice & Water / Flashings / Ventilation / Fasteners / Consumables / Substrate / Gutter / Downspouts / Hardware)?', 'Shingles') || 'Other';
  const qty = parseFloat(prompt('Quantity?', '1')) || 1;
  const unit = prompt('Unit (bundles / rolls / sheets / pieces / each / box)?', 'each') || 'each';
  const cost = parseFloat(prompt('Unit cost ($)?', '0')) || 0;
  const vendor = prompt('Vendor (CertainTeed / Sterling / Home Hardware / Roofmart / …)?', 'CertainTeed') || '';
  const sku = prompt('SKU (optional)?', '') || '';
  job.items.push({ cat, name, sku, qty, unit, cost, vendor });
  saveJobs();
  renderMatList();
}
window.addLineItem = addLineItem;

function exportJobList(){
  const job = currentJob(); if (!job) return;
  const lines = ['MATERIAL LIST · ' + job.client, job.meta, ''];
  const byCat = {};
  job.items.forEach(it => { (byCat[it.cat] = byCat[it.cat] || []).push(it); });
  Object.entries(byCat).forEach(([cat, items]) => {
    lines.push('── ' + cat.toUpperCase() + ' ──');
    items.forEach(it => lines.push(`  ${it.qty} ${it.unit}  ·  ${it.name} (${it.sku})  ·  ${fmt(it.qty * it.cost)}`));
    lines.push('');
  });
  const total = job.items.reduce((a, it) => a + it.qty * it.cost, 0);
  lines.push('TOTAL: ' + fmt(total));
  if (window.RyujinActions) RyujinActions.downloadText('material-list-' + job.id + '.txt', lines.join('\n'));
}

function printList(){ window.print(); }

function createPO(){
  const job = currentJob(); if (!job) return;
  const byVendor = {};
  job.items.forEach((it, idx) => {
    const key = job.id + ':' + idx;
    if (state.checked[key]) return; // skip already-received
    (byVendor[it.vendor || 'Unknown'] = byVendor[it.vendor || 'Unknown'] || []).push(it);
  });
  const vendors = Object.keys(byVendor);
  if (!vendors.length) { alert('All items already received — nothing to order.'); return; }

  const summary = vendors.map(v => {
    const total = byVendor[v].reduce((a, it) => a + it.qty * it.cost, 0);
    return v + ': ' + byVendor[v].length + ' lines · ' + fmt(total);
  }).join('\n');
  if (!confirm('Create ' + vendors.length + ' PO(s)?\n\n' + summary)) return;

  const today = new Date().toISOString().slice(5,10).replace('-','');
  vendors.forEach((v, i) => {
    const lines = byVendor[v];
    const total = lines.reduce((a, it) => a + it.qty * it.cost, 0);
    POS.unshift({
      vendor: v.toUpperCase(),
      status: 'open',
      job: job.client + ' — ' + lines.length + ' lines',
      meta: 'PO #PU-' + today + '-' + String(POS.length + i + 1).padStart(2,'0') + ' · auto-generated',
      total: Math.round(total)
    });
  });
  savePOs(POS);
  setTab('pos');
  toast && toast(vendors.length + ' PO(s) created','ok');
  alert(vendors.length + ' PO(s) created — see Open POs tab.');
}

function openWorkOrder(woNum){
  // Pass woNum as URL param so work order page can pre-select it
  window.location.href = 'production-workorders.html?wo=' + encodeURIComponent(woNum);
}
function goBack(){ window.location.href = 'production.html'; }

document.addEventListener('keydown', e => { if (e.key === 'Escape') goBack(); });
document.addEventListener('contextmenu', e => { e.preventDefault(); goBack(); });

window.selectJob = selectJob;
window.toggleCheck = toggleCheck;
window.setTab = setTab;
window.exportJobList = exportJobList;
window.printList = printList;
window.createPO = createPO;
window.openWorkOrder = openWorkOrder;
window.goBack = goBack;
window.cyclePOStatus = cyclePOStatus;
window.deletePO = deletePO;
window.newPOPrompt = newPOPrompt;
window.newVendorPrompt = newVendorPrompt;
window.deleteVendor = deleteVendor;

renderJobs();
renderMatList();
renderRight();
</script>
<script src="assets/ryujin-prod-nav.js"></script>
</body>
</html>
