<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0e1a">
<title>Ryujin OS — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
:root{--bg:#060a14;--accent:#22d3ee;--accent2:#4a9eff;--text:#d0daf0;--text-dim:rgba(160,190,230,0.55);--glass:rgba(8,14,30,0.75);--glass-border:rgba(100,160,255,0.12);--green:#4ade80;--red:#f87171}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.bg-anim{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 25% 75%,rgba(34,211,238,0.08),transparent 50%),radial-gradient(ellipse at 75% 25%,rgba(124,58,237,0.06),transparent 50%)}
.card{position:relative;z-index:1;width:100%;max-width:460px;padding:36px;background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;backdrop-filter:blur(24px) saturate(1.5);box-shadow:0 8px 60px rgba(0,0,0,0.5)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);opacity:0.5}
h1{font-family:'Orbitron',monospace;font-size:1.15em;font-weight:700;letter-spacing:2px;margin-bottom:6px}
.sub{font-size:0.82em;color:var(--text-dim);margin-bottom:26px}
label{display:block;font-size:0.7em;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin:14px 0 7px}
input{width:100%;padding:13px 16px;border:1px solid var(--glass-border);border-radius:10px;background:rgba(10,20,40,0.6);color:var(--text);font-family:inherit;font-size:0.95em;outline:none}
input:focus{border-color:var(--accent)}
.btn{width:100%;margin-top:18px;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),#0891b2);color:#000;font-family:inherit;font-weight:700;font-size:0.95em;cursor:pointer;letter-spacing:0.5px}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.msg{padding:11px 14px;border-radius:10px;font-size:0.85em;margin-top:14px;display:none}
.msg.ok{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);color:var(--green)}
.msg.err{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);color:var(--red)}
.reset-url{margin-top:14px;padding:12px;background:rgba(34,211,238,0.06);border:1px solid rgba(34,211,238,0.2);border-radius:10px;font-family:'Share Tech Mono',monospace;font-size:0.74em;word-break:break-all;color:var(--accent);display:none}
.footer{text-align:center;margin-top:22px;font-size:0.78em;color:var(--text-dim)}
.footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="bg-anim"></div>
<div class="card">
  <h1>Reset Password</h1>
  <div class="sub" id="subText">Enter your email and we'll generate a reset link.</div>

  <!-- Request form (no token in URL) -->
  <form id="requestForm" onsubmit="doRequest(event)">
    <label>Email</label>
    <input type="email" id="email" required autofocus placeholder="you@company.com">
    <button class="btn" type="submit" id="reqBtn">Send Reset Link</button>
  </form>

  <!-- Reset form (token in URL) -->
  <form id="resetForm" style="display:none" onsubmit="doReset(event)">
    <label>New Password</label>
    <input type="password" id="password" required placeholder="At least 6 characters" minlength="6">
    <label>Confirm Password</label>
    <input type="password" id="password2" required placeholder="Type it again" minlength="6">
    <button class="btn" type="submit" id="resetBtn">Set New Password</button>
  </form>

  <div class="msg" id="msg"></div>
  <div class="reset-url" id="resetUrl"></div>

  <div class="footer">
    <a href="/login.html">← Back to Sign In</a>
  </div>
</div>

<script>
const API = window.location.origin + '/api';
const params = new URLSearchParams(location.search);
const token = params.get('token');

// If token is in URL, show the reset form. Otherwise show the request form.
if (token) {
  document.getElementById('requestForm').style.display = 'none';
  document.getElementById('resetForm').style.display = 'block';
  document.getElementById('subText').textContent = 'Enter a new password to finish your reset.';
  setTimeout(() => document.getElementById('password').focus(), 50);
}

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + type;
  m.style.display = 'block';
}

async function doRequest(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('reqBtn');
  btn.disabled = true; btn.textContent = 'Generating...';
  try {
    const resp = await fetch(`${API}/auth?action=forgot`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, tenant_slug: 'plus-ultra' })
    });
    const data = await resp.json();
    if (!resp.ok) { showMsg(data.error || 'Request failed', 'err'); btn.disabled = false; btn.textContent = 'Send Reset Link'; return; }
    showMsg(data.message || 'Reset link ready.', 'ok');
    if (data.resetUrl) {
      const u = document.getElementById('resetUrl');
      u.innerHTML = '<strong style="display:block;margin-bottom:6px;font-family:inherit">Reset link (valid 1 hour):</strong><a href="' + data.resetUrl + '" style="color:inherit">' + data.resetUrl + '</a>';
      u.style.display = 'block';
    }
    btn.textContent = 'Link Generated';
  } catch(e) {
    showMsg('Connection error. Try again.', 'err');
    btn.disabled = false; btn.textContent = 'Send Reset Link';
  }
}

async function doReset(e) {
  e.preventDefault();
  const p1 = document.getElementById('password').value;
  const p2 = document.getElementById('password2').value;
  if (p1 !== p2) { showMsg('Passwords do not match.', 'err'); return; }
  const btn = document.getElementById('resetBtn');
  btn.disabled = true; btn.textContent = 'Updating...';
  try {
    const resp = await fetch(`${API}/auth?action=reset`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: p1 })
    });
    const data = await resp.json();
    if (!resp.ok) { showMsg(data.error || 'Reset failed', 'err'); btn.disabled = false; btn.textContent = 'Set New Password'; return; }
    // Wipe any old session state locally
    ['ryujin_token','ryujin_user','ryujin_tenant'].forEach(k => localStorage.removeItem(k));
    showMsg('Password updated — redirecting to sign in...', 'ok');
    setTimeout(() => { location.href = '/login.html'; }, 1400);
  } catch(e) {
    showMsg('Connection error. Try again.', 'err');
    btn.disabled = false; btn.textContent = 'Set New Password';
  }
}
</script>
</body>
</html>
