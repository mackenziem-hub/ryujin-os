<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryujin OS · Post-Production</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=optional" rel="stylesheet">
<link rel="stylesheet" href="/assets/ryujin-perf.css">
<script src="/assets/ryujin-perf.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#030611;color:#e0e6f0;overflow:hidden;position:relative}
.bg-ambient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(74,222,128,0.12) 0%,transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(34,211,238,0.08) 0%,transparent 55%),linear-gradient(180deg,#060a14 0%,#030611 100%)}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(74,222,128,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(74,222,128,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%);-webkit-mask-image:radial-gradient(ellipse at center,black 35%,transparent 85%)}
.topbar{position:fixed;top:10px;left:12px;right:12px;height:52px;display:flex;align-items:center;gap:12px;background:rgba(14,22,40,0.78);border:1px solid rgba(74,222,128,0.24);border-radius:14px;padding:0 14px;backdrop-filter:blur(20px);z-index:20;overflow:hidden}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#4ade80,#22d3ee,transparent);opacity:0.5}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:radial-gradient(circle at 35% 30%,rgba(200,255,220,0.3),rgba(74,222,128,0.22) 40%,rgba(5,25,12,0.8));box-shadow:0 0 14px rgba(74,222,128,0.35)}
.brand-name{font-family:'Orbitron',sans-serif;font-size:0.78em;font-weight:800;letter-spacing:2.5px}
.brand-name .dim{color:rgba(160,190,230,0.62);font-weight:500;letter-spacing:2px;margin-left:8px}
.tb-spacer{flex:1}
.tb-stat{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:0.68em;color:rgba(160,190,230,0.62);letter-spacing:1px}
.tb-stat .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.tb-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(6,10,20,0.6);border:1px solid rgba(74,222,128,0.24);color:rgba(160,190,230,0.62);cursor:pointer;transition:all 0.2s}
.tb-icon:hover{color:#4ade80;border-color:rgba(74,222,128,0.5);background:rgba(74,222,128,0.08)}
.tb-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#subhub-stage{position:absolute;inset:0;width:100%;height:100%}
</style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="topbar">
  <button class="tb-icon" onclick="goBackToMainHub()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <div class="brand"><div class="brand-mark"></div><div class="brand-name">RYUJIN <span class="dim">· POST-PRODUCTION</span></div></div>
  <div class="tb-stat"><div class="dot"></div><span>CLOSE-OUT · HEALTHY</span></div>
  <div class="tb-spacer"></div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:0.7em;color:rgba(160,190,230,0.5);letter-spacing:1.5px">CLOSE-OUT · REVIEWS</div>
</div>

<div id="subhub-stage"></div>

<script src="assets/ryujin-search.js"></script>
<script src="assets/ryujin-chat.js"></script>
<script src="assets/ryujin-tutor.js"></script>
<script src="assets/ryujin-subhub.js"></script>
<script>
RyujinSubHub.init({
  sector: 'POST-PRODUCTION',
  subtitle: 'CLOSE-OUT · WALK-THROUGH · REVIEWS · WARRANTIES',
  accent: { main: '#4ade80', deep: '#16a34a', glow: 'rgba(74,222,128,0.4)' },
  panels: [
    {
      title: 'CLOSE-OUT',
      sub: 'Jobs wrapping · invoices · reviews pending · remediation',
      meta: 'INVOICES · REMEDIATION',
      url: 'post-production-closeout.html',
      icon: '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
    },
    {
      title: 'WALK-THROUGH',
      sub: 'On-site final inspection · 14-point checklist · customer sign-off',
      meta: 'SIGN-OFF · CHECKLIST',
      url: 'post-production-walkthrough.html',
      icon: '<svg viewBox="0 0 24 24"><path d="M9 11l3 3 8-8"/><path d="M20 12v7a2 2 0 01-2 2H6a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>'
    },
    {
      title: 'REVIEWS',
      sub: 'Google + Facebook reviews · request flow · incentives',
      meta: '3 OUT \u00B7 4.9\u2605',
      url: 'post-production-reviews.html',
      icon: '<svg viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4.5L18 22l-6-4-6 4 1.5-8.5L2 9h7z"/></svg>'
    },
    {
      title: 'WARRANTIES',
      sub: 'CertainTeed filings · workmanship · customer packets',
      meta: 'CERTAINTEED · WORKMANSHIP',
      url: 'post-production-warranties.html',
      icon: '<svg viewBox="0 0 24 24"><path d="M12 2l7 4v6c0 5-3.5 9-7 10-3.5-1-7-5-7-10V6l7-4z"/></svg>'
    }
  ]
});

Ryujin.init({
  sector: 'POST-PRODUCTION',
  autoOpen: false,
  root: {
    msg: "Close-out desk. <b>Top priority:</b> schedule Seyeau walk-through \u2014 job wraps this week and the final <b>$15,450</b> is tied to it. Also 3 review requests outstanding. Pick a system.",
    choices: [
      { text: 'Walk-Through tool \u2192 Seyeau', next: 'wt' },
      { text: 'Review request follow-ups', next: 'rev' },
      { text: 'File the remaining warranty', next: 'war' },
      { text: 'Open Close-Out dashboard', next: 'co' }
    ]
  },
  states: {
    wt: { effect: () => setTimeout(() => window.location.href='post-production-walkthrough.html', 500), choices: [] },
    rev: { effect: () => setTimeout(() => window.location.href='post-production-reviews.html', 500), choices: [] },
    war: { effect: () => setTimeout(() => window.location.href='post-production-warranties.html', 500), choices: [] },
    co: { effect: () => setTimeout(() => window.location.href='post-production-closeout.html', 500), choices: [] }
  }
});

function goBackToMainHub(){
  if (window.parent !== window && window.parent.exitSectionOverlay) { window.parent.exitSectionOverlay(); return; }
  window.location.href = 'command-center.html';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); goBackToMainHub(); } });
document.addEventListener('contextmenu', e => { e.preventDefault(); goBackToMainHub(); });
</script>

<script src="assets/ryujin-mode.js"></script>
<script src="assets/ryujin-tenant.js"></script>
<script src="assets/ryujin-persist.js"></script>
<script src="assets/ryujin-api.js"></script>
<script src="assets/ryujin-scenario.js"></script>
<script src="assets/ryujin-xp.js"></script>
<script src="assets/ryujin-mode-badge.js"></script>

</body>
</html>
